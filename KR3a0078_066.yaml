body:
  text: 性理大全書卷六十六治道一總論程子曰論治者貴識體治身齊家以至平天下者治之道也建立綱紀分正百職順天揆事創制立度以盡天下之務治之法也法者道之用也聖王為治修刑罰以齊衆明教化以善俗刑罰立則教化行矣教化成而刑罰措矣雖曰尚德而不尚刑顧豈偏廢哉治則有為治之因亂必有致亂之因在人而已矣立治有體施治有序酌而應之臨時之宜也治道之要有三曰立志責任求賢必井田必肉刑必封建而後天下可為非聖人之逹道也善治者放井田而行之而民不病放封建而臨之而民不勞放肉刑而用之而民不怨得聖人之意而不膠其迹迹者聖人因一時之利而利焉者耳天地之生萬物之成合而後遂天下國家至於事為之末所以不遂者由不合也所以不合者由有間也故間隔者天下之大害聖王之所必去也事事物物各有其所得其所則安失其所則悖聖人所以能使天下順治非能為物作則也惟止之各於其所而已止之不得其所則無可止之理養民者以愛其力為本民力足則生養遂然後教化可行風俗可美是故善為政者必重民力教人者養其善心則惡自消治民者導以敬遜則爭自止聖人為戒必於方盛之時方盛慮衰則可以防其滿極而圗其永久至於既衰而後戒則無及矣自古天下之治未有久而不亂者蓋不能戒於其盛也狃安富則驕侈生樂舒肆則紀綱壞忘禍亂則釁孽萌是以浸淫滋蔓而不知亂亡之相尋也守國者必設險山河之固城郭溝洫之阻特其大端耳若夫尊卑貴賤之分明之以等威異之以物采凡所以杜絶陵僣限隔上下皆險之大用也治道亦有從本而言亦有從事而言從本而言惟從格君心之非正心以正朝廷正朝廷以正百官若從事而言不救則已若須救之必須變大變則大益小變則小益為天下安可求近效才計校著利害便不是王者髙拱於穆清之上而化行於禆海之外何修何飾而致哉以純王之心行純王之政爾老吾老以及人之老幼吾幼以及人之幼此純王之心也使老者得其養幼者得其所此純王之政也尚慮其未也則又尊國老而躬事之優庶老而時飬之風行海流民陶其化孰有怠於親而慢於長者哉虞夏商周之盛王由是道也人倫以正風俗以厚鰥寡孤獨無不得其飬焉後世禮廢法壞教化不明播棄耆老饑寒轉死者往往而是嗚呼率是而行而欲王道之成猶却行而求及前抑有甚焉爾安危之本在乎人情治亂之機繫乎事始衆心暌乖則所言不信萬邦協和則所為必成先王之世以道治天下後世只是以法把持天下民可明也不可愚也民可教也不可威也民可順也不可强也民可使也不可欺也又嘗與客語為政曰甚矣小人之無行也牛壯食其力老則屠之客曰不得不然也牛老不可用屠之猶得半牛之價復稱貸以買壯者不爾則廢耕矣且安得芻粟飬無用之牛乎曰爾之言知計利而不知義者也為政之本莫大於使民興行民善俗而衣食不足者未之有也水旱螟蟲之災皆不善之致也天下之事無一定之理不進則退不退則進時極道窮理當必變惟聖人為能通其變於未窮使其不至於極堯舜時也三代忠質文其因時之尚然也夏近古人多忠誠故為忠忠弊故救之以質質弊故救之以文非道有弊也後世不守故浸而成弊雖不可以一二事觀之大槩可知如堯舜禹之相繼其文章氣象亦自小異也識變知化為難古今風氣不同故器用亦異宜是以聖人通其變使民不倦各隨其時而已矣後世雖有作者虞帝為不可及已蓋當是時風氣未開而虞帝之德又如此故後世莫可及也若三代之治後世决可復不以三代為治者終茍道也自古聖人之救難而定亂也設施有未暇及焉者既安之矣然後為可久可繼之治自漢而下禍亂既除則不復有為始隨時維持而己所以不能髣佛於三代歟三代而後有聖王者作必四三王而立制矣或曰夫子云三重既備人事盡矣而可四乎曰三王之治以宜乎今之世則四王之道也若夫建亥為正則事之悖繆者也張子曰大都君相以父母天下為王道不能推父母之心於百姓謂之王道可乎所謂父母之心非徒見於言必須視四海之民如己之子設使四海之內皆為己之子則講治之術必不為秦漢之少恩必不為五伯之假名井田而不封建猶能養而不能教封建而不井田猶能教而不能飬封建井田而不肉刑猶能教飬而不能使然此未可遽行之秦為月令必取先王之法以成文字未必實行之道千乘之國敬事而信節用而愛人使民以時此皆法外之意秦茍有愛民為惠心方能行徒法不能以自行須實有其心也有其心而無其法則是雖有仁心仁聞不行先王之道不能為政於天下華陽范氏曰治天下之繁者必以至簡制天下之動者必以至靜是故號令簡則民聼不惑心慮靜則事變不撓此所以能成功也民莫不惡危而欲安惡勞而欲息以仁義治之則順以刑罰治之則咈矣故治天下在順之而已咈之而能治者未之聞也龜山楊氏曰書曰德惟善政孔子曰為政以德離道德而為政事非先王之政事也書曰德惟善政則以德為政也伯夷降典折民惟刑則以禮用刑也有德禮則刑政在其中矣政者正也王中心無為以守至正而天下從之或謂經綸天下須有方法亦須才氣運轉得行曰天保以上治內采薇以下治外先王經綸之迹也其效博矣然觀其作處豈嘗費力本之誠意而已今鹿鳴四牡諸詩皆在先王所歌以燕群臣勞使臣者也若徒取而歌之其有效乎然則先王之用心蓋有在矣如書堯典序言克明俊德以至親睦九族平章百姓協和萬邦法度蓋未及也而其效已臻黎民於變時雍然後乃命羲和以欽若昊天之事然則法度雖不可廢豈所宜先正心一事自人未嘗深知之若深知而體之自有其效觀後世治天下者皆未嘗識此然此亦惟聖人力做得徹蓋心有所忿懥恐懼好樂憂患一毫少差即不得其正自非聖人必須有不正處然有意乎此者隨其淺深必有見效但不如聖人之效著耳為政要得厲威嚴使事事齊整甚易但失於不寬便不是古人作處孔子言居上不寬吾何以觀之哉又曰寬則得衆若使寬非常道聖人不只如此說了今人只要事事如意故覺見寬政悶人不知權柄在手不是使性氣處何嘗見百姓不畏官人但見官人多虐百姓耳然寬亦須有制始得若百事不管唯務寬大則胥吏舞文弄法不成官府須要權常在已操縱豫奪總不由人儘寬不妨程伯淳作縣常於坐右書視民如傷四字云某每日常有愧於此觀其用心應是不錯決撻了人古人於民若保赤子為其無知也常以無知恕之則雖有可怒之事亦無所施其怒無知則固不察利害所在教之趨利避害全在保者今赤子若無人保則雖有坑穽在前蹈之而不知故凡事疑有後害而民所見未到者當與他做主始得上蔡謝氏曰君君臣臣父父子子親親而尊尊所謂民彞也為政之道保民而已不然人類幾何其不相噬嚙也五峯胡氏曰造車於室而可以通天下之險易鑄鑑於冶而可以定天下之妍醜蓋得其道而握其要也治天下者何獨不觀乎此反而求諸身乎是故一正君心而天下定矣下之於上德不待聲色而後化人之於其類不待聲色而後從禍福於善惡不待聲色而後應詩云民之秉彞好是懿德是故君子篤恭而天下平事成則極極則變物盈則傾傾則革聖人裁成其道輔相其宜百姓於變而不知此堯舜之所以為聖也處之以義而理得則人不亂臨之以敬而愛行則物不爭守之以正行之以中則事不悖而天下理矣聖人尚賢使民知勸教不能使民不爭明善惡之歸如日月之照白黑然民猶有惑於欲而陷於惡故孔子觀上世之化喟然而歎曰甚哉知之難也雖堯舜之民比屋可封能使之由而已亦不能使之知也夫人目於五色耳於五聲口於五味其性固然非外來也聖人因其性而道之由於至善故民之化之也易馬牛人畜也御之失道則奮其角踶雖有猛士莫之敢攖得其道則三尺童子用之周旋無不如志焉天下分裂兆民離散欲以一之固有其方患在人不仁雖與言而不入也井法行然後愚智可擇學無濫士野無濫農人才各得其所而游手鮮矣君臨卿卿臨大夫大夫臨士士臨農與工商所受有分制多寡均而無貧苦者矣人皆受地世世守之無交易之侵牟也無交易之侵牟則無爭奪之訟獄無爭奪之訟獄則刑罰省而民安刑罰省而民安則禮樂修而和氣應矣飬民惟恐不足此世之所以治安也取民惟恐不足此世之所以敗亡也財出於九職兵起於鄉遂學校起於鄉行士選於庠孰政令行乎世臣然後政行乎百姓而仁覆天下矣豫章羅氏曰三代之治在道而不在法三代之法貴實而不貴名後世反之此享國與治安所以不同教化者朝廷之先務亷恥者士人之美節風俗者天下之大事朝廷有教化則士人有亷恥士人有亷恥則天下有風俗或朝廷不務教化而責士人之亷恥士人不尚亷恥而望風俗之美其可得乎天下之變不起於四方而起於朝廷譬如人之傷氣則寒暑易侵木之傷心則風雨易折故內有李林甫之姦則外有祿山之亂內有盧杞之邪則外有朱泚之叛易曰負且乘致寇至不虛言哉延平李氏曰治道必以明天理正人心崇莭義厲亷恥為先本末備具可舉而行元城劉氏曰嘗考禮記春夏月令以謂無聚大衆無置城郭掩骼埋胔毋起土功有以見聖人奉順隂陽取法天地力役之事不奪農時行道之墐亦順生氣是以風雨時若災害不生天人和同上下交泰其或賦政違道役使過中人力疲勞飬氣搖動則國有水旱之變民罹疾疫之災此繼天奉元之君所以夙夜恭敬而不敢忽也朱子曰天下萬事有大根本而每事之中又各有要切處所謂大根本者固無出於人主之心術而所謂要切處者則必大本既立然後可推而見也如論任賢相杜私門則立政之要也擇良吏輕賦役則飬民之要也公選將帥不由近習則治軍之要也樂聞警戒不喜導諛則聼言用人之要也推此數端餘皆可見然未有大本不立而可以與此者此古之欲平天下者所以汲汲於正心誠意以立其本也若徒言正心而不足以識事物之要或精核事情而特昧夫根本之歸則是腐儒迂闊之論俗士功利之談皆不足與論當世之務矣天下之事有本有末正其本者雖若迂緩而實易為力救其末者雖若切至而實難為功是以昔之善論事者必深明夫本末之所在而先正其本本正則末之不治非所憂矣古聖賢之言治必以仁義為先而不以功利為急夫豈故為是迂濶亡用之談以欺世眩俗而甘受實禍哉蓋天下萬事本於一心而仁者此心之存之謂也此心既存乃克有制而義者此心之制之謂也誠使是說著明於天下則自天子以至於庶人人人得其本心以制萬事無一不合宜者夫何難而不濟不知出此而曰事求可功求成吾以茍為一切之計而已是申商吳李之徒所以亡人之國而自滅其身國雖富其民必貧兵雖彊其國必病利雖近其為害也必逺顧弗察而已矣天下之事有緩急之勢朝廷之政有緩急之宜當緩而急則繁細苛察無以存大體而朝廷之氣為之不舒當急而緩則怠慢廢弛無以赴事幾而天下之事日入於壞均之二者皆失也然愚以為當緩而急者其害固不為小若當急而反緩則其害有不可勝言者不可以不察也天下國家之大務莫大於恤民而恤民之實在省賦省賦之實在治軍若夫治軍省賦以為恤民之本則又在夫人君正其心術以立紀綱而已矣董子所謂正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方蓋謂此也治道别無說若使人主恭儉好善有言逆于心必求諸道有言孫于志必求諸非道這如何㑹不治這别無說從古來都有見成樣子直是如此人主以論相為職宰相以正君為職二者各得其職然後體統正而朝廷尊天下之政必出於一而無多門之弊茍當論相者求其適己而不求其正己取其可愛而不取其可畏則人主失其職矣當正君者不以獻可替否為事而以趨和承意為能不以經世宰物為心而以容身固寵為術則宰相失其職矣二者交失其職是以體統不正綱紀不立而左右近習皆得以竊弄威權賣官鬻獄使政體日亂國勢日卑雖有非常之禍伏於冥冥之中而上恬下熙亦莫知以為慮者是可不察其所以然者而反之以汰其所已用而審其所將用者乎選之以其能正已而可畏則必有以得自重之士而吾所以任之不得不重任之既重則彼得以盡其獻可替否之志而行其經世宰物之心而又公選天下直諒敢言之士使為臺諫給舍以參其議論使吾腹心耳目之寄常在於賢士大夫而不在於群小陟罰臧否之柄常在於廊廟而不出於私門如此而主威不立國勢不彊綱維不舉刑政不清民力不裕軍政不修者吾不信也書曰成王畏相語曰和臣不忠且以唐太宗之聰明英特號為身兼將相然猶必使天下之事關由宰相審熟便安然後施行蓋謂理勢之當然有不可得而易者四海之廣兆民至衆人各有意欲行其私而善為治者乃能總攝而整齊之使之各循其理而莫敢不如吾志之所欲者則以先有綱紀以持之於上而後有風俗以驅之於下也何謂綱紀辨賢否以定上下之分核功罪以公賞罰之施也何謂風俗使人皆知善之可慕而必為皆知不善之可羞而必去也然綱紀之所以振則以宰執秉持而不敢失臺諫補察而無所私人主又以其大公至正之心恭己於上而照臨之是以賢者必上不肖者必下有功者必賞有罪者必刑而萬事之統無所闕也綱紀既振則天下之人自將各自矜奮更相勸勉以去惡而從善蓋不待黜陟刑賞一一加於其身而禮義之風亷恥之俗已丕變矣惟至公之道不行於上是以宰執臺諫有不得人黜陟刑賞多出私意而天下之俗遂至於靡然不知名節行檢之可貴而惟阿諛軟熟奔競交結之為務一有端言正色於其間則群譏衆排必使無所容於斯世而後已此其形勢如將傾之屋輪奐舟艧雖未覺其有變於外而材木之心已皆蠧朽腐爛而不可復支持矣茍非斷自聖志灑濯其心而有以大警敕之使小大之臣各舉其職以明黜陟以信刑賞則何以振已頽之綱紀而厲已壞之風俗乎管子曰禮義亷恥是謂四維四維不張國乃滅亡賈誼嘗為漢文誦之而曰使管子而愚人也則可使管子而少知治體是豈可不為寒心也哉二子之言明白深切非虛語者天下豈有兼行正道邪術雜用君子小人而可以有為者人情不能皆正故古人治世以大德不以小惠然則固有不必皆順之人情者若曰順人心則氣象差正當耳井田肉刑二事儘有曲折恐亦未可遽以為非欲整頓一時之弊譬如常洗浣不濟事須是善洗者一一折洗乃不枉了庶幾有益為政如無大利害不必議更張則所更一事未成必閧然成紛擾卒未已也至於大家且假借之故子産引鄭書曰安定國家必大焉先古人為政一本於寬今必須反之以嚴蓋必如是矯之而後有以得其當今人為寬至於事無統紀緩急豫奪之權皆不在我下梢却是姦豪得志平民既不䝉其惠又反受其殃矣問為政更張之初莫亦須稍嚴以整齊之否曰此事難斷定說在人如何處置然亦何消要過於嚴今所難者是難得曉事底人若曉事底人厯練多事才至面前他都曉得依那事分寸而施以應之人自然畏服今人往往過嚴者多半是自家不曉又慮人欺已又怕人慢已遂將大拍頭去拍他要他畏服若自見得何消過嚴問政治當明其號令不必嚴刑以為威曰號令既明刑罰亦不可弛茍不用刑罰則號令徒掛墻壁爾與其不遵以梗吾治曷若懲其一以戒百與其覆實檢察於其終曷若嚴其始而使之無犯做大事豈可以小不忍為心問為政者當以寬為本而以嚴濟之曰某謂當以嚴為本而以寬濟之曲禮謂蒞官行法非禮威嚴不行須是令行禁止若曰令不行禁不止而以是為寬則非也或問程子云論治須要識體這體字是事理合當做處凡事皆有箇體皆有箇當然處問是體假之體否曰也是如此又問如為朝廷有朝廷之體為一國有一國之體為州縣有州縣之體否曰然是箇大體有格局當做處如作州縣便合治告訐除盜賊勸農桑抑末作如朝廷便須開言路通下情消朋黨如為大吏便須求賢才去贓吏除暴斂均力役這箇都是定底格局合當如此做南軒張氏曰周家建國自后稷以農事為務厯世相傳其君子則重稼穡之事其室家則躬織絍之勤相與咨嗟歎息服習乎艱難詠歌其勞苦此實王業之根本也如周公之告成王其見於詩有若七月皆言農桑之候也其見於書有若無逸則欲其知稼穡之艱難知小人之依也帝王所傳心法之要端在乎此夫治常生於敬而亂常起於驕肆使為國者而每念乎稼穡之勞而其后妃又不忘乎織絍之事則心不存焉寡矣何者其必嚴恭朝夕而不敢怠也其必懷保小民而不敢康也其必思天下之饑寒若已饑寒之也是心常存則驕矜放肆何自而生豈非治之所由興也歟美哉周之家法也聖哲相繼固不待論而其后妃之賢見於簡編太王之妃則姜女也而文王之母則太任妃則太姒而武王之后又邑姜也皆助其君子焦勞于內以成風化之美觀后妃則太王文武之德可知矣以此垂世而其後世猶有若幽王者惑褒姒而廢正后以召犬戎之禍而詩人刺之曰婦無公事休其蠶織蓋推其禍端良由稼穡織絍之事不聞於耳不動於心以至於此故誦服之無斁之章則知周之所以興誦休其蠶織之章則知周之所以衰其得失所自豈不較著乎以是意而考秦漢以下其治亂成壞之源皆可見矣問三代治天下曰井田封建肉刑後世變井田為阡陌變封建為郡縣變肉刑為鞭笞而末流愈不勝其弊今欲追復舊制於斯三者何先潛室陳氏曰復古惟唐得之世業府兵六典建官分畫措置最有法度其不傳逺者非作法不善自是家法不正無賢子孫耳先儒謂必有關雎麟趾之化而後可以行周官之法度古人所以兢業寅畏左規右矩者正欲立箇人樣以為守法之地耳西山真氏曰世之言政者有曰寬以待良民而嚴以馭姦民也或曰撫民當寬而束吏貴嚴也或曰始嚴而終之以寬也然則治人之術其果盡於此乎如其盡於此也夫人之所知也吾何庸思且世之能是者亦衆矣抑何其合於聖賢者寡也嗚呼吾患不能存吾心焉爾吾之心存則藴之為仁義發之為惻隱羞惡隨物以應而無容心焉則寬與嚴在其中矣且獨不觀諸天乎熙然而春物無不得其生者凛然而秋物無不遂其成者是果孰為之哉曰隂與陽而已人知天道之妙若是而不知吾之所謂仁義者即天之隂陽也昔者聖人繫易蓋並言之以見夫人之與天其本則一自夫汩之以私亂之以欲於是乎與天不相似矣盍亦反其本而觀之怵惕於情之所可矜顙泚於事之所可愧此固有之良心而非由外鑠者也吾能存之使勿失飬之亡以害則天理渾然隨感輒應於其當愛者憫惻施焉非吾愛之也仁發乎中而不能不愛也於其當惡者懲艾加焉非吾惡之也義動乎中而不能不惡也吾之愛惡以天不以人故雖寬而寬之名不聞雖嚴而嚴之迹不立以之治人其庶矣乎嘗觀古今之變大抵盛衰强弱之分不在兵力而在國勢不在財用而在人心誠使國勢奠安人心豫附運掉伸縮惟所欲為以之治財則財可豐以之治兵則兵可强其機易回而其事易察也惟吾之所恃者國勢也而操持不定無以遏其趨吾之所恃者人心也而繫屬不加無以保其固百度搶攘衆志渙散天下之患方倀然未知底止之地雖兵財之畫日討月究何益哉或者患國勢未張而欲振以威刑患財用未豐而欲益以聚斂謂誠信不如權譎謂忠厚不如刻深有一於兹皆伐國之斧斨蠧民之螟螣也鶴山魏氏曰自三代以還王政不明而天下無善治寥寥千百載間豈無明君令辟修立法度講明政刑欲以挈其國於久安長治之域者哉然撑東而西傾捉襟而肘見治之形常浮於亂之意則亦未明乎紀綱而已矣魯齊許氏曰孔子曰政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和斯不易之常道也革人之非不可革其事要當先革其心其心既革其事有不言而自革者也為天下國家有大規摹規摹既定循其序而行之使無過焉無不及焉則治功可期否則心疑目眩變易紛更日計有餘而嵗計不足未見其可也昔子産處衰周之列國孔明用西蜀之一隅具有定論而終身由之况堂堂天下可無一定之論而妄為之哉古今立國規摹雖各不同然其大要在得天下心得天下心無他愛與公而已矣愛則民心順公則民心服既順且服於為治也何有然開創之始重臣挾功而難制有以害吾公小民雜屬而未一有以梗吾愛於此為計其亦難矣自非英睿之君賢良之佐未易處也勢雖難制必求其所以制衆雖未一必求其所以一前慮却顧因時順理豫之奪之進之退之內主甚堅日戞月摩周還曲折必使吾之愛吾之公達於天下而後已至是則紀綱法度施行有地天下雖大可不勞而理也然其先後之序緩急之宜密有定則可以意㑹而不可以言傳也是之謂規摹禮樂程子曰禮儀三百威儀三千非絶民之欲而强人以不能也所以防其欲戒其侈而使之入道也禮者人之規範守禮所以立身也安禮而和樂斯為盛德矣禮者理也文也理者實也本也文者華也末也理文若二而一道也文過則奢實過則儉奢自文至儉自實生形影之類也學禮者考文必求先王之意得意乃可以沼革禮之本出於民之情聖人因而道之耳禮之器出於民之俗聖人因而節文之耳聖人復出必因今之衣服器用而為之節文其所謂貴本而親用者亦在時王斟酌損益之爾行禮不可全泥古須當視時之風氣自不同故所處不得不與古異若全用古物亦不相稱雖聖人作須有損益大凡禮必須有意禮之所尊尊其義也失其義陳其數祝史之事也人或勸先生以加禮近貴曰何不見責以盡禮而責之以加禮禮盡則已豈有加也禮者因人情者也人情之所宜則義也三年之服禮之至義之盡也禮樂大矣然於進退之間則己得性情之正樂隨風氣至韶則極備若堯之洪水方割四凶未去和有未至也至舜以聖繼聖治之極和之至故韶為備先王之樂必須律以考其聲今律既不可求人耳又不可全信正惟此為難求中聲須得律律不得則中聲無由見律者自然之數至如今之度量權衡亦非正也今之法且以為凖則可非如古法也此等物雖出於自然一有之數字亦須人為之但古人為之得其自然至於規矩則極盡天下之方圎張子曰禮所以持性蓋本出於性持性反本也凡未成性須禮以持之能守禮已不畔道矣禮即天地之德也如顔子者方勉勉於非禮勿言非禮勿動勉勉者勉勉以成性也禮非止著見於外亦有無體之禮蓋禮之原在心禮者聖人之成法也除了禮天下更無道矣欲飬民當自井田始治民則教化刑罰俱不出於禮外五常出於凡人之常情五典人日日為但不知耳時措之宜便是禮禮即時措時中見之事業者非禮之禮非義之義但非時中者皆是也非禮之禮非義之義又不可一槩言如孔子喪出母子思守禮為非也又如制禮以小功不稅使曾子制禮又不知如何以此不可易言時中之義甚大須是精義入神以致用觀其㑹通以行典禮此則真義理也行其典禮而不達㑹通則有非時中者矣禮亦有不須變者如天叙天秩如何可變禮不必皆出於人至如無人天地之禮自然而有何假於人天之生物便有尊卑大小之象人順之而已此所以為禮也學者有專以禮出於人而不知禮本天之自然告子専以義為外而不知所以行義由內也皆非也當合內外之道學者且須觀禮蓋禮者滋養人德性又使人有常業守得定又可學便可行又可集得義能答曾子之問能教孺悲之學斯可以言知禮矣進人之速無如禮學學之行之而復疑之此習矣而不察者也故學禮所以求不疑仁守之者在學禮也學者行禮時人不過以為迂彼以為迂在我乃是徑捷此則從吾所好文則要密察心則要𢎞放如天地自然從容中禮者盛德之至也古人無椅卓智非不能及也聖人之才豈不如今人但席地則體恭可以拜伏今坐椅卓至有坐到起不識動者主人始親一酌己是非常之敬蓋後世一切取便安也禮文參校是非去取不待己自了當蓋禮者理也須是學窮理禮則所以行其義知理則能制禮然則禮出於理之後今在上者未能窮則在後者烏能盡今禮文殘缺須是先求得禮之意然後觀禮合此理者即是聖人之制不合者即是諸儒添入可以去取今學者所以宜先觀禮者類聚一處他日得理以意參校禮但去其不可者其他取力能為之者大凡禮不可大假駭俗不知者以為怪且難之甚者至于怒之疾之故禮亦當有漸於不可知者少行之已為多矣但不出户庭親行之可也毋强其人為之已德性充實人自化矣正已而物正也古樂不可見蓋為今人求古樂太深始以古樂為不可知只以虞書詩言志歌永言聲依永律和聲求之得樂之意蓋盡於是詩只是言志歌只是永其言而已只要轉其聲令人可聼今日歌者亦以轉聲而不變字為善歌長言後却要入於律律則知音者知之知此聲入得何律古樂所以飬人德性中和之氣後之言樂者止以求哀故晉平公曰音無哀於此乎哀則止以感人不善之心歌亦不可以太髙亦不可以太下太髙則入於噍殺太下則入於嘽緩蓋窮本知變樂之情也聲音之道與天地同和與政通蠶吐絲而商絃絶正與天地相應方蠶吐絲木之氣極盛之時商金之氣衰如言律中太簇律中林鐘於此盛則彼必衰方春木當盛却金氣不衰便是不和不與天地之氣相應五峯胡氏曰等級至嚴也失禮樂則不威山河至險也失禮樂則不固禮乎樂乎天下所日用不可以造次顛沛廢焉者乎朱子曰天叙有典勑我五典五惇哉天秩有禮自我五禮有庸哉這箇典禮自是天理之當然缺他一毫不得添他一毫不得惟是聖人之心與天合一故行出這禮無一不與天合其間曲折厚薄淺深莫不恰好這都不是聖人白撰出都是天理法定合著如此後之人此心未得似聖人之心只得將聖人已行底聖人所傳於後世底依這樣子做做得合時便是合天理之自然禮即理也但謂之理則疑若未有形迹之可言制而為禮則有品節文章之可見矣人事如五者固皆可見其大槩之所宜然到禮上方見其威儀法則之詳也問冠昏之禮如欲行之當須使冠昏之人易曉其言乃為有益如三加之辭出門之戒若只以古語告之彼將謂何曰只以今之俗語告之使之易曉乃佳禮時為大古禮如此零碎繁冗今豈可行亦且得隨時裁損爾孔子從先進恐已有此意或曰禮之所以亡正以其太繁而難行耳曰然古人於禮直如今人相揖相似終日周回於其間自然使人有感他處後世安得如此聖人有作古禮未必盡用須别有箇措置視許多瑣細制度皆若具文且是要理㑹大本大原曾子臨死丁寧說君子所貴乎道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣籩豆之事則有司存上許多正是大本大原如今所理㑹許多正是籩豆之事曾子臨死教人去不要理㑹這箇夫子焉不學而亦何常師之有非是孔子如何盡做這事到孟子巳是不說到細碎上只說諸侯之禮吾未之學也吾嘗聞之矣三年之喪齊疏之服饘粥之食自天子達於庶人這三項便是大原大本嘗見劉昭信云禮之趨翔登降揖遜皆須習也是如此漢時如大射等禮雖不行却依舊令人習人自傳得一般今雖是不能行亦須是立一科令人習得也是一事六經之道同歸而禮樂之用為急遭秦滅學禮樂先壞漢晋以來諸儒補緝竟無全書其頗存者三禮而已周官一書固為禮之綱領至其儀法度數則儀禮乃其本經而禮記郊特牲冠義等篇乃其義疏耳若乃樂之為教則又絶無師授律尺短長聲音清濁學士大夫莫有知其說者而不知其為闕也古禮繁縟後人於禮日益疏略然居今而欲行古禮亦恐情文不相稱不若只就今人所行禮中刪修令有節文制數等威足矣古樂亦難遽復且如今樂中去其噍殺促數之音并考其律吕令得其正更令掌詞命之官製撰樂章其間略述教化訓戒及賔主相與之情及如人主待臣下恩意之類令人歌之亦足以養人心之和平古者教法禮樂射御書數不可闕一就中樂之教尤親切䕫教胄子只用樂大司徒之職也是用樂蓋是教人朝夕從事於此物得心長在這上面蓋為樂有節奏學他底急也不得慢也不得久之都換了他一副當情性古者太子生則太師吹管以度其聲看合甚律及長其聲音高下皆要中律今之士大夫問以五音十二律無能曉者要之當立一樂學使士大夫習之久後必有精通者出人今都不識樂器不聞其聲故不通其義如古人尚識鐘鼓然後以鐘鼓為樂如孔子云樂云樂云鐘鼓云乎哉今人鐘鼓已自不識音律只是氣人亦只是氣故相關樂律自黃鐘至中吕皆屬陽自㽔賔至應鐘皆屬隂此是一箇大隂陽黃鐘為陽大吕為隂太簇為陽夾鐘為隂每一陽間一隂又是一箇小隂陽自黃鐘至中吕皆下生自㽔賔至應鐘皆上生以上生下皆三生二以下生上皆三生四北溪陳氏曰禮樂有本有文禮只是中樂只是和中和是禮樂之本然本與文二者不可一闕禮之文如爼豆玉帛之類樂之文如聲音節奏之類須是有這中和而文以玉帛爼豆與聲音節奏方成禮樂就心上論禮只是箇恭敬底意樂只是箇和樂底意本是裏面有此敬與和底意然此意何自而見須於賔客祭祀時將之以玉帛寓之於籩豆播之於聲音節奏間如此則內外本末相副方成禮樂禮樂亦不是判然二物不相干涉禮只是箇序樂只是箇和才有序便順而和失序便乖戾而不和如父子夫婦兄弟所以相戕相賊相怨相仇如彼其不和者都先緣無父子君臣兄弟夫婦之禮無親義序别便如此禮樂無所不在所謂明則有禮樂幽則有鬼神如何離得如盜賊至無道亦須上下有統屬此便是禮底意才有統屬便自相聼從自相和睦這便是樂底意又如行路人兩箇同行才存長少次序長先少後便相和順而無爭其所以有爭鬪之心皆緣是無箇少長之序先自亂了安得有和順底意人徒見升降禓襲有類乎美觀鏗鏘節奏有近乎末節以為禮樂若無益於人者抑不知釋回增美皆由於禮器之大備而好善聼過皆本於樂節之素明禮以治躬則莊敬不期而自肅樂以治心則鄙詐不期而自銷蓋接於視聼者所以養其耳目而非以娛其耳目形於舞蹈者所以導其血氣而非以亂其血氣則禮樂之用可知矣西山真氏曰敬者禮之本制度威儀者禮之文和者樂之本鐘鼓管磬者樂之文禮樂二者闕一不可記曰樂由陽來禮由隂作天髙地下萬物散殊而禮制行焉天尊於上地卑於下萬物散殊有大有小此即制之所由起蓋禮主乎别故也流而不息合同而化而樂興焉隂陽二氣流行於天地之間未嘗止息二氣和合而化生萬物此樂之所由興蓋樂主乎和故也所謂隂陽二氣者日月雷霆風雨寒暑之類皆是二氣和合方能生成萬物故禮屬隂凡天地間道理一定而不可易者皆屬隂樂屬陽凡天地間流行運轉者皆屬陽禮樂之不可闕一如隂陽之不可偏勝一嵗之間寒暑之相易雨露霜雪之相濟方能氣候和平物遂其生陽太勝則亢而為旱隂太勝則溢而為水有隂無陽則物不生有陽無隂則生而不成禮勝則離以其太嚴而不通乎人情故離而難合樂勝則流以其太和而無所限節則流蕩忘返所以有禮須用有樂有樂須用有禮此禮樂且是就性情上說然精粗本末亦初無二理禮中有樂言嚴肅之中有自然之和此即是禮中之樂樂中有禮言和樂之中有自然之節此即是樂中之禮朱文公謂嚴而泰此即禮中有樂和而節此即樂中有禮鶴山魏氏曰人生莫不有仁義之性具乎其心禮儀三百威儀三千聖人所以合內外之道而節文乎仁義者也昔之教人者必以是為先魯齊許氏曰凡天倫如父子兄弟夫婦長幼禮應如法不可妄意增損簡易者略之細密者過之皆非也禮者人事之儀則天理之節文聖人之於儀則節文乃所以當然者不可易也禮只是箇敬之節文不可令人後來有悔心亦不可使己有悔心故曰己辭者猶可受己與者不可奪饋獻亦然聖人感人心天下和平聖人和順積於中發之為禮樂禮樂之本在是古人所以作樂寓情性風化於其中非為鐘鼓之鏗鍧也小雅盡廢四夷交侵禮壞樂崩不能固結人心人心無所係屬元氣虛隙邪氣乘之以入三百篇古樂章也與後世樂章大異尤以見古人敦本業厚人倫念念在是未嘗流於邪僻也傷人倫之廢哀刑政之苛禮樂廢故也宗廟張子曰宗子為士立二廟支子為大夫當立三廟是曾祖之廟為大夫立不為宗立然不可二宗别統故其廟亦立于宗子之家朱子曰王制天子七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大抵士無太祖而皆及其祖考也鄭氏曰夏五廟商六廟周七廟今按商書已云七世之廟鄭說恐非顔師古曰父為昭子為穆孫復為昭昭明也穆美也後以晉室諱昭故學者改昭為韶其制皆在中門外之左外為都宫內各有寢廟别有門垣太祖在北左昭右穆以次而南天子太祖百世不遷一昭一穆為宗亦百世不遷宗亦曰世室亦曰祧鄭注周禮守祧曰宗亦曰祧亦曰世室周禮有守祧之官鄭氏曰逺廟為祧周為文武之廟遷主藏焉又曰遷主所藏曰祧先公之遷主藏于太祖后稷之廟先王之遷主藏於文武之廟羣穆於文羣昭於武明堂位有文世室武世空鄭氏曰世室者不毁之名也二昭二穆為四親廟高祖以上親盡則毁而遞遷昭常為昭穆常為穆昭之二廟親盡則毁而遷其主于昭之宗曾祖遷于昭之二新入廟者祔于昭之三而髙祖及祖在穆如故穆廟親盡放此新死者如當為昭則祔於昭之近廟而自近廟遷其祖於昭之次廟而於主祭者為曾祖自次廟遷其髙祖于昭之世室蓋於主祭者為五世而親盡故也其穆之兩廟如故不動其次廟於主祭者為髙祖其近廟於主祭者為祖也主祭者沒則祔于穆之近廟而遞遷其上放此凡毁廟遷主改塗昜檐示有所變非盡毁也見榖梁傳及注諸侯則無二宗大夫又無二廟其遷毁之次則與天子同但毁廟之主藏於太祖儀禮所謂以其班祔檀弓所謂祔於祖父者也曲禮云君子抱孫不抱子此言孫可以為王父尸子不可以為父尸鄭氏云以孫與祖昭穆同也周自后稷為太祖不窟為昭􅕦陶為穆以下十二世至太王復為穆十三世至王季復為昭十四世至文王又為穆十五世至武王復為昭故書稱文王為穆考詩稱武王為昭考而左氏傳曰太伯虞仲太王之昭也虢仲虢叔王季之穆也又曰管蔡魯衛文之昭也䢴晋應韓武之穆也蓋其次序一定百世不易雖文王在右武王在左嫌於倒置而諸廟别有門垣足以各全其尊初不以左右為尊卑也三代之制其詳雖不得聞然其大略不過如此漢承秦敝不能深考古制諸帝之廟各在一處不容合為都宫以序昭穆韋元成傳云宗廟異處昭穆不序但考周制先公廟在岐周文王在豐武王在鎬則都宫之制亦不得為與漢亦無甚異未詳其說貢禹韋元成匡衡之徒雖欲正之而終不能盡合古制旋亦廢罷後漢明帝又欲遵儉自抑遺詔無起寢廟但藏其主於光武廟中更衣别室其後章帝又復如之後世遂不敢加而公私之廟皆為同堂異室之制見後漢明帝紀祭祀志又云其後積多無别而顯宗但為陵寢之號自是以來更厯魏晉下及隋唐其間非無奉先思孝之君据經守禮之臣而皆不能有所裁正其弊至使太祖之位下同孫子而更僻處於一隅既無以見其為七廟之尊群廟之神則又上厭祖考而不得自為一廟之主以人情而論之則生居九重窮極壯麗而沒祭一室不過尋丈之間甚或無地以容鼎爼而隂損其數孝子順孫之心於此宜亦有所不安矣肆我神宗始獨慨然深詔儒臣討論舊典蓋將以逺迹三代之隆一正千古之繆甚盛舉也不幸未及營表世莫得聞秉筆之士又復不能特書其事以詔萬世今獨其見於陸氏之文者為可考耳然其所論昭穆之說亦未有定論獨原廟之制外為都宫而各為寢廟門垣乃為近古但其禮本不經義亦非古故儒者得以議之如李清臣所謂略于七廟之室而為祠於佛老之側不為木主而為神象不為禘祫蒸嘗之祀而行一酌奠之禮楊時所謂舍二帝三王之正禮而從一繆妄之叔孫通者其言皆是也然不知其所以致此則由於宗廟不立而人心有所不安也不議復此而徒欲廢彼亦安得為至當之論哉祖有功而宗有德是為百世不遷之廟商六百年只三宗皆以有功德當百世祀故其廟稱宗至後世始不復問其功德之有無一例以宗稱之古人七廟恐是祖宗功德者不遷胡氏謂如此則是子孫得以去取其祖宗然其論續諡法又謂諡乃天下之公義非子孫得以私之如此則廟亦然問漢儒所論如何曰劉歆說得較是他謂宗不在七廟中者謂恐有功德者多則占了那七廟數也或問逺廟為祧如何曰天子七廟如周文武之廟不祧文為穆則凡後之屬乎穆者皆歸於文之廟武為昭則凡後之屬乎昭者皆歸乎武之廟也昭穆昭常為昭穆常為穆中間世祖太廟門向南兩邉分昭穆周家則自王季以上之主皆祧于后稷始祖之夾室自成王昭王以下則隨昭穆遞遷于昭穆之首廟而止如周則文王為穆之首廟凡新崩者祔廟則看昭穆但昭則從昭穆則從穆不交互兩邊也又云諸廟皆有夾室問廟主自西而列何所據曰此也不是古禮如古時一代只奉之於一廟如后稷為始封之廟文王自有文王之廟武王自有武王之廟不曾混雜共一廟古者一世自為一廟有門有堂有寢凡屋三重而墻四周焉自後漢以來乃為同堂異室之廟一世一室而以西為上如韓文中家廟碑有祭初室祭東室之語今國家亦只用此制故士大夫家亦無一世一廟之法而一世一室之制亦不能備故溫公諸家祭禮皆用以右為尊之說獨文潞公嘗立家廟今溫公集中有碑載其制度頗詳亦是一世一室而以右為上自可檢看伊川之說亦誤昭穆之說則又甚長中庸或問中已詳言之更當細考大抵今士大夫家只當且以溫公之法為定也家廟要就人住居神依人不可離外做廟又在外時婦女遇雨時難出入臨川吳氏曰古之大夫元士有家有家者何謂都邑有食采之田以奉宗廟子孫雖不世爵而猶世祿承家之宗子世世守其宗廟所在而支子不得與焉宗子出在他國而不復然後命其兄弟若族人主之此古者大夫士之家所以與國咸休而無時或替也性理大全書卷六十六

body:
  text: 性理大全書卷五十九厯代一唐虞三代堯舜程子曰得天理之正極人倫之至者堯舜之道也堯舜知他幾千年其心至今在泰山雖髙矣絶頂之外無預乎山也唐虞事業自堯舜觀之亦猶一點浮雲過於太虛爾龜山楊氏曰舜在側微堯舉而試之慎徽五典則五典克從納于百揆則百揆時敘賔于四門則四門穆穆以至以天下授之而不疑觀其所施設舜之所以為舜其才其德可謂大矣宜非深山之中所能久處而為舜者當堯未之知方且飯糗茹草若將終身若使今人有才氣者雖不得時其能自已其功名之心乎以此見人必能不為然後能有為也非有為之難其不為尤難矣禹南軒張氏曰禹之有天下也無所與於己又曰禹之為聖本由學而成皆其工夫至到者也湯文武程子曰聖人無過湯武反之也其始未必無過所謂如日月之食乃君子之過或問高宗之於傅説文王之於太公知之素矣恐民之未信也故假夢卜以重其事曰然則是偽也聖人無偽或問湯之伐桀也衆以為我后不恤我衆舍我穡事而割正夏而湯告以必往是聖人之任者也文王三分天下有其二以服事商是聖人之清者也龜山楊氏曰非也湯之伐桀雖其衆有不悅之言憚勞而已若夏之人則不然曰時日曷喪豫及汝偕亡故攸徂之民室家相慶簞食壺漿以迎王師湯雖欲不往不可得矣文王之時紂猶有天下三分之一民猶以為君則文王安得而不事之至於武王而受罔有悛心賢人君子不為所殺則或為囚奴或去國紂之在天下為一夫矣故武王誅之亦不得已也由此觀之湯非樂為任而文王非樂為清也會逢其適而已宣華陽范氏曰昔周宣王任賢使能吉甫征伐於外而王之所與處者張仲孝友也夫使文武之臣征伐而左右前後得正良之士善其君心則讒言不至而忠謀見用此所以能成功也茍使憸邪之人從中制之則雖吉甫無以成其功宣王能復文武之業以致中興者內順治而外威嚴也伊尹傅説程子曰伊尹之耕于莘傅説之築于巖天下之事非一一而學之天下之賢才非人人而知之也明其在我者而已朱子曰伊尹是兩截人方其耕于莘野若將終身焉是一截人及湯三聘翻然而往便以天下之重為己任是一截人總論程子曰五帝公天下故與賢三王家天下故與子論善之盡則公而與賢不易之道也然賢人難得而爭奪興焉故與子以定萬世是亦至公之法也堯與舜更無優劣及至湯武便别孟子言性之反之自古無人如此説只孟子分别出來便知得堯舜是生而知之湯武是學而能之文王之德則似堯舜禹之德則似湯武要之皆是聖人聖人無優劣堯舜之讓禹之功湯武之征伐伯夷之清栁下惠之和伊尹之任周公在上而道行孔子在下而道不行其道一也張子曰稽衆舍己堯也與人為善舜也聞善言則拜禹也用人惟已改過不吝湯也不聞亦式不諫亦入文王也皆虛其心以為天下也華陽范氏曰象日以殺舜為事舜為天子則封之管蔡啓商以叛周周公為相也則誅之其迹不同其道一也舜知象之將殺己也故象憂亦憂象喜亦喜盡其誠以親之而已矣象得罪於舜故封之管蔡流言於國將危周公以間王室得罪於天下故誅之非周公誅之天下之所當誅也周公豈得而私之哉後世如有王者不幸而有害兄之弟如象則當如舜封之是也不幸而有亂天下之兄如管蔡則當如周公誅之是也舜處其常周公處其變此聖人所以同歸于道也五峰胡氏曰堯舜以天下與人而無人德我之望湯武有人之天下而無我取人之嫌是故天下無大事我不能大則以事為大而處之也難矣庸齋許氏曰五帝之禪三代之繼皆數然也其間如堯舜有子之不肖變也堯舜能通之以揖遜而不能使己子之不朱均湯武遇君之無道變也湯武能通之以征伐而不能使夏商之無桀紂聖人遇變而通之亦惟達於自然之數一毫之己私無與也春秋戰國魯衛程子曰蒯聵得罪於父不得復立輒亦不得背其父而不與共國委於所可立使不失先君之社稷而身從父則義矣五峰胡氏曰欲撥亂興治者當正大綱知大綱然後本可正而末可定大綱不知雖或善於條目有一時之功終必於大綱不正之處而生大亂然大綱無定體各隨其時事故魯莊之大綱在於復讎也衛國之大綱在於正名也讎不復名不正雖有仲尼之德亦不能聽魯衛之政矣管仲或言使管仲而未死內嬖復六人何傷桓公之霸乎程子曰管仲為國政之時齊候之心未蠱也既蠱矣雖兩管仲將如之何未有蠱心於女色而能盡心於用賢也涑水司馬氏曰孔子稱管仲之器小哉先儒以為管仲得君如此不勉之以王而僅止於霸此其所以為小也愚以為周天子存而管仲勉齊桓公以王是教之篡也此管仲所耻而不為孔子顧欲其為之邪夫大人者顧時不用則已用則必以禮樂正天下使綱紀文章粲然有萬世之安豈直一時之功名而已邪管仲相桓公霸諸侯禹迹所及冠帶所加未能使之皆率職也而偃然自以天下為莫己若也朱紘而鏤簋反玷而三歸此其器豈不小哉楊子曰大器其猶規矩準繩乎先自治而後治人斯言得之矣荀息涑水司馬氏曰晉獻公使荀息傅奚齊荀息曰臣竭其股肱之力不濟則以死繼之及里克殺奚齊荀息死之君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也荀息有焉杜元凱以為荀息有此詩人重言之義以愚觀之元凱失左氏之意多矣彼生與君言死而背之者是小人穿窬之行君子所不譏也夫立嫡以長正也獻公溺於嬖寵廢長立少荀息為國正卿君所倚信不能明白禮義以格君心之非而遽以死許之是則荀息之言玷於獻公未沒之前而不可救於己沒之後也然則左氏之志所以貶荀息而非所以為褒也狐偃趙衰西山真氏曰狐偃趙衰晉文之以父師事之者也從亡十有九年其所以輔翼扶持者不遺餘力矣然聖賢修身治國之道二子蓋未嘗講也故其始霸也請王者之隧圍天子之邑勤天子之狩使二子嘗從事於格心之學素以義禮迪其君詎至於是哉以行事考之惟用人一節頗得古人推賢遜能之意其餘則皆孔門之所羞言者也然自二人而觀則子餘之言論風旨又非舅犯可及趙文子東萊吕氏曰趙文子其中退然如不勝衣其言呐呐然如不出諸其口及宋之盟談笑當衷甲之變神間氣定而不亂晏子長不滿六尺及崔慶之盟白刃在前毅然賁育不能奪蓋其怯者血氣也其勇者義也西山真氏曰趙文子之賢出於天資而未嘗輔之學故志不能帥氣年未及耄而偷惰形焉其視畢公弼四世而克勤小物衛武過九十而以禮自防何相去之遠耶此無他有理義以養其心則雖老而神明不衰茍為不然則昏於豢養敗於戕賊未老而已然矣有志之士可不戒諸子産或問子産相鄭鑄刑書作丘賦時人不以為然是他不達為國以禮底道理徒恃法制以為國故鄭國日以衰削朱子曰是他力量只到得這裏觀他與韓宣子爭時似守得定及到伯有子晳之徒撓他時則度其可治者治之若治他不得便只含糊過亦然當時列國世卿每國須有三兩族強大根株盤互勢力相依倚卒急動他不得不比如今大臣才被人論便可逐去故當時自有一般議論如韓獻子分謗之説只是要大家含糊過不要見得我是你不是又如魯以相忍為國意思都如此後來張文潛深取之故其所著雖連篇纍牘不過只是這一意西山真氏曰鄭子産以鄭簡公十二年為卿明年得政簡公在位三十六年乃卒又厯事定公獻公聲公合凡四十餘年方其始也內則有諸大夫之爭權互相誅殺外則晉楚之兵無嵗不至城下國之危且弱幾不可為矣子産於此從容回斡皆有次第其於內也務息諸大夫之爭而去其猶不可令者然根之難拔者不輕動以激其變惡之既稔者不緩治以失其機有勸懲之公而無忿疾之過故自子南逐子晳死豪宗大姓弭然聽順無復有梗其政者其於外也事大國以禮而不茍徇其求故終其身免於諸侯之討而鄭能以弱為強考其所為惟作丘賦鑄刑書見譏當世其餘鮮不合於理者然大人格心之業則未之聞焉豈其所事四公皆凡庸之主不足與有進耶不然何其無有以一善著者至於用人各以所長蓋得聖門所謂器使之道春秋卿大夫未有能及之者後之以權衡人物為職者當觀法焉商鞅或問商鞅説孝公帝王道不從乃説以霸道鞅亦不曉帝王道但是先將此説在前者渠知孝公決不能從且恁地説庶可以堅後面霸道之説耳朱子曰鞅又如何理會得帝王之道但是大拍頭去揮那孝公耳他知孝公是行不得他恁地説只是欲人知道我無所不曉問開阡陌曰阡陌便是井田陌百也阡千也東西曰阡南北曰陌或問南北曰阡東西曰陌未知孰是但却是一箇橫一箇直且如百夫有遂遂上有塗這便是陌若十箇塗恁地直在橫頭又作一大溝謂之洫洫上有路這便是阡阡陌只是疆界自阡陌之外有空地則只恁地間在那裏所以先王要如此者也只是要正其疆界怕人相侵互而今商鞅却開破了遇可做田處便墾作田更不要恁地齊整這開字非開創之開乃開闢之開也或問商君初變法秦民不悅言不便者以千數令行之後秦道不拾遺鄉邑大治秦民後來言令便潛室陳氏曰始言不便猶是三代直道之民終復言便則戰國刑戮之民矣不下毒手如何得他合口當看商鞅行法始末問秦謫戍法先發吏有謫籍及贅壻賈人又父母有市籍者所以重困商賈何故曰秦自商君立法欲民務農力戰故重耕戰之賞以商賈務末不能耕戰故重為謫罰以抑之所以立致富強樂毅孫臏或問樂毅伐齊文中子以為善藏其用東坡則責其不合妄效王者事業以取敗二説孰是朱子曰這只是他每愛去立説後都不去考教子細這箇是那田單會守後不奈他何當時樂毅自是兼秦魏之師又因人怨湣王之暴故一旦下齊七十餘城及既殺了湣王則人心自是休了他又怕那三國來分他底連忙發遣了他以燕之力量也只做得恁地更是那田單也忠義盡死節守那二城樂毅不是不要取他也煞費氣力被他善守後不奈他何樂毅也只是戰國之士又何嘗是王者之師他當時也恣意去鹵掠政如孟子所謂毁其宗廟遷其重器不過如此舉措他當時那鼎也去扛得來他豈是不要他底但是田單與他皆會兩箇相遇智勇相角至相持三年便是樂毅也煞費氣力但取不得及騎劫用則是大段無能後被田單使一箇小術數子便乘勢殺將去便是國不可以無人如齊但有一田單盡死節恁地守便不奈他何樂毅莒即墨之圍乃用師之道適當如此用速不得又齊湣王人多叛之及死而其子立于莒則人復惜之不忍盡亡其國即墨又有田單故下之難使毅得盡其䇿必不失之或問孫臏料龐涓暮當至馬陵如何料得如此好沈僴曰使其不燭火看白書則如之何曰臏料龐涓是箇絮底人必看無疑此有三樣上智底人他曉得必不看下智呆底人亦必不看中智底人必看看則墮其機矣嘗思古今智士之謀略詭譎固不可及然記之者能如此曲折書之而不失其意則其智亦不可及矣毛遂趙括魯仲連潛室陳氏曰毛遂上不數於其主下不齒於其徒而卒能奮身決起著名楚趙茍非見棄於人安能以有激乎吾觀戰國遊士所以䇿名當時致身將相快平生之憤酬夙昔之願往往皆因所激而能致之蘇秦之相六國其家激之也張儀之相秦其友激之也范睢談笑而取秦柄其讎激之也故善用人者於其凌厲頓挫之時而乘其感慨奮激之氣則雖尋常之人皆能以自效於尺寸如其習安於豢養之餘而生平之意願已足則雖竒人節士亦或無以自見也趙括虛張無實言大而才疏其父母知之趙廷之臣知之而敵國之人亦知之獨其君不之知者蓋當是時應侯行千金於趙以為反間是必左右近臣隂受秦賂相與蒙蔽主知故其君不悟至此人多以名用人失之趙括不知括之在趙未嘗以名聞也使括而以名聞於趙則秦當忌之矣而胡為利括之為將也是括虛張疏繆之實已久聞於鄰國其主不知之耳問趙長平之敗曰長平之敗豈不哀哉此不惟一趙括為之兵端一開平原君實為之也蓋當是時秦嘗有事於魏韓而馮亭欲嫁禍於鄰國故以上黨自歸於趙夫秦拔野王而上黨路絶是上黨之在韓也有已亡之形而秦有垂得之勢今韓以空名歸趙實欲嫁秦兵於趙此蓋馮亭狙詐之術耳夫秦日夜勞心苦力以蠶食於韓今上黨有垂得之勢而趙乃欲安坐而利之則雖強大不能得之弱小而弱小顧能得之強大乎且無故之獲有道之所深憂也非望之福哲人之所甚禍也平原不見天下之大勢暗於狙詐之術棄龜鑑之名言而自速危亡之禍則長平之敗豈獨趙括為之哉魯仲連亦戰國䇿士耳而竒氣疏節憤激陳義有非䇿士所能及者鷹隼高飛於雲漢虎豹長嘯於山林其頡頏飛騰之氣豈人之所能近哉一旦受人之羈縶而豢養於韝圈之中則與雞犬何異何者惟其有所欲故也戰國遊士大抵不勝其利欲之私心擔簦而往鼓篋而逰夫孰非有富貴之心者故一受人之羈縻甘人之豢養則雖有竒氣疏節將無所用之而俯首帖尾碌碌人下者往往而是也尚何望其憤激陳義哉仲連惟不見其所欲故不受人之羈縻不甘人之豢養是以高飛長嘯而足以頡頑於一世雖未必為天下士而人固以天下士竒之矣藺相如龜山楊氏曰周室之季天下分裂為戰國遊談之士出於其間各挾術以干時君視其喜怒悲懼而捭闔之徼名射利固無足道者間有感憤激昂以就一時之功其材力有足過人而鮮克自重其身者何多耶豫讀藺相如傳未嘗不壯其為人而惜其如此也夫秦藉纍世之資肆虎狼之暴摶噬天下有並吞諸侯之心非可與義禮接而論曲直也相如區區掉三寸舌入睚眥不測之秦卒能以完璧歸亦足壯哉然當其捧璧睨柱示以必死蓋亦摩虎牙矣夫死非難死不失義不傷勇君子所難也且秦趙之不敵蓋雄雌之國也身之存亡非特一璧之重而社稷安危之機亦不在夫璧之存亡也然則趙之有璧存可也亡可也初相如捧璧入秦趙之君臣計議非有親秦之心特迫其威強耳夫以小事大古之人有以皮幣犬馬珠玉而不得免者至棄國而逃况一璧乎雖與之可也相如計不出此乃以孤單之使逞螳怒之威抗臂秦庭當車轍之勢其危如一髮引千鈞豈不殆哉當是時使秦知趙璧終不可得則欲徼幸不死難矣若是則尚安得為不失義不傷勇乎不三數年趙卒有覆軍陷城之禍者徒以璧為之祟也然則全璧歸趙何益哉至於澠池之會則其危又甚矣方趙王之西也廉頗約以一月不返則立太子以絶秦望則是行也非有萬全之計雖無往可也傳曰智者慮義者行仁者守然後可以會三者一闕焉則危事矣挾萬乘之君蹈危事非得計也相如為趙卿相其智勇不足重趙使秦不敢惴焉乃欲以頸血濺之豈孔子所謂暴虎馮河死而無悔者歟嗚呼周道衰士無中行久矣區區戰國之際尚足追議其失哉豫於相如惜其雄傑俊偉於戰國士有足稱者而其失如此故特為之論著云或曰藺相如其始能勇於制秦其終能和以待廉頗可謂賢矣以某觀之使相如能以待頗之術待秦乃為善謀蓋柔乃能制剛弱乃能勝強今乃欲以匹夫之勇恃區區之趙而鬬強秦若秦奮其虎狼之威將何以處之今能使秦不加兵者特幸而成事耳朱子曰子由有一段説大故取他説他不是戰國之士此説也太過其實他只是戰國之士龜山亦有一説大槩與公説相似説相如不合要與秦爭那璧要之恁地説也不得和氏璧也是趙國相傳以此為寶若當時驟然被人將去則國勢也解不振古人傳國皆以寶玉之屬為重若子孫不能謹守便是不孝當時秦也是強但相如也是料得秦不敢殺他後方恁地做若其他人則是怕秦殺了便不敢去如藺相如豈是孟浪恁地做他須是料度得那秦過了戰國時如此等也多黃歇取楚太子也是如此當時被他取了秦也不曽做聲只恁休了廉頗蘇秦張儀東萊吕氏曰趙使武襄君樂乘代廉頗頗怒攻武襄君廉頗出奔魏以是推之則向者肉袒負荆之悔特感相如之義而非真悔也悔不發於己而發於人烏可久邪蘇秦約從説齊王曰夫韓魏所以畏秦者為其與秦接境壤也韓魏戰而勝秦則兵半折四境不守戰而不勝國已危亡故韓魏所以重與秦戰而輕為之臣也吾不知蘇秦之説韓魏敢出此語乎此蘇秦之所以為蘇秦也蘇秦張儀同門友也蘇秦將止秦兵不以情而遣儀乃以術而激儀何邪蓋平昔師友之間未嘗用情故臨事不可以情告也屈原朱子曰屈原之心其為忠清潔白固無待於辨論而自顯若其為行之不能無過則亦非區區辨説所能全故君子之於人取其大節之純全而略其細行之不能無弊則雖三人猶必有師者况如屈子乃千載而一人哉孔子曰人之過也各於其黨觀過斯知仁矣此觀人之法也夫屈原之忠忠而過者也屈原之過過於忠者也故論其大節則其他可以一切置之不問論其細行而必其合於聖賢之矩度則吾固已言其不能皆合於中庸矣尚何説哉范雎涑水司馬氏曰穰侯相秦秦益強宰制諸侯如嚴主之役僕夫左右前後無不如志此穰侯之功也范睢非能為秦忠謀亦非有怨於穰候也欲行其説而穰侯適妨其路故控其喉拊其背而奪之位秦王視聽之不明遂至於遷逐母弟况穰侯何有哉穰侯雖擅權未至如睢之所言孔子惡夫佞者豈以此夫總論庸齋許氏曰春秋上下二百餘年其間人材有一節一行之可稱者固難以指而數若夫宏碩之器明敏之識端實之行正大之議論未嘗不相望于世今試舉其材美之著者言之如齊之鮑叔管仲晉之舅犯先軫卻克趙衰宋之華元楚之子文蒍賈秦之百里奚鄭之子産吳之季札此十數輩者皆足以尊主而庇民皆足以捍災而制變皆足以繼絶世而興治平若較之三代王佐之才固未可同日語若求之漢唐全盛之際未見有出其右者然考諸人之事業其大者僅能輔其君以主夏盟餘皆保全境內幸免社稷之變遷而已遂使後之議者謂其規模淺狹皆無能用於天下而止足以用一國斯言也果足以病諸人乎愚竊以為春秋之時吾道與元氣會合者皆支離於光嶽之分裂天綱地維一墜而難振民彛國政一壞而難修事物統類一紛亂而未易以整齊當是之時隂陽氣運之厄方有以成吾道之厄雖有偉人特起欲以天下為己任吾知其材力無所施秦始皇或云秦始皇用王翦將兵伐楚翦請田宅甚衆或者非之翦曰王怛中而不信人今空國中之甲士盡以委我儻不多請田宅為子孫業則王疑我矣范陽張氏曰君臣至於此衰世之風也君不信其臣故以術而御其臣臣不信其君故以術而防其君君臣上下無非以術相與欲其終始無間難矣然當此時三綱五常既已淪斁使秦皇不疑其臣則臣下必移其權使王翦不防其君則後日必被其禍君臣之風喪至此天下可知矣或問自秦始皇變法之後後世人君皆不能易之何也朱子曰秦之法盡是尊君卑臣之事所以後世不肯變且如三皇稱皇五帝稱帝三王稱王秦則兼皇帝之號只此一事後世如何肯變又問賈生仁義攻守之説恐秦如此亦難以仁義守之曰他若延得數十年亦可扶持整頓只是犯衆怒多下面逼得來緊所以不旋踵而亡如三皇五帝三王以來皆以封建治天下秦一切掃除不留種子秦視六國之君如坑嬰兒今年捉一人明年捉兩人絶滅都盡所以犯天下衆怒當時但聞秦字不問智愚男女盡要起而亡之陳涉便做陳王張耳便做趙王更阻遏他不住漢高祖自小路入秦由今襄陽金商藍田入關項羽自河北大路入關及項羽盡殺秦人想得秦人亦悔不且留取子嬰在也茅蕉陳勝潛室陳氏曰秦遷太后於離宫諫死者二十七人而後來之輸忠者猶未已夫秦無道極矣而在廷何多直節臣也且其諫者非必皆社稷之臣皆貴戚之卿也非必皆析秦之圭皆儋秦之爵也又非必皆秦之所産皆直言之士也而為是奮死而不顧蓋生乎戰國之世無一而非口舌之士仕於危亡之朝無一而非口舌之功故常喜出於波濤洶湧之間遊人之所不能泳與濟俱沒與汩俱出而幸不死焉是其所以為工耳若夫潢汙行潦弱翁稚子可褰裳而濟彼豈以是而動其心哉此所以積尸秦庭而後來者愈出而愈竒也雖然亦危矣逆驪龍之頷下而取其珠料虎口而奪之食若茅蕉者亦幸矣陳涉之王也其事至微淺然縉紳先生抱祭器而往歸之張耳陳餘房君之徒又皆以興王之業説之舊史按其行事謂其不幸如是而致敗設不如是其事當復如何耶至其再三致意也猶曰其所置王侯將相竟足以亡秦且涉所置王候將相微矣而史誇之若曰夫涉起謫戍而首事志在免死而已其大要不過偷一時之欲其用軍行師未嘗有一日之規徒不勝其憤憤之心決一旦之死為天下首事蓋未知烏止誰屋也在天下後世正不當以興王之事責之舊史猶復云云至今尚論涉事者猶惜其孰得而孰失也吁亦悲矣天下苦秦之禍故家遺俗豪人俠士喪氣略盡乃其所不慮之戍卒猶能為天下而首事雖其人物卑陋事至微淺而古今猶幸之蓋積萬年之憾而發憤於陳王猶曰此秦民之湯武耳總論五峰胡氏曰一氣太息震蕩無垠海宇變動山勃川湮人消物盡舊迹亡滅是所以為鴻荒之世歟氣復而滋萬物化生日以益衆不有以道之則亂不有以齊之則爭敦倫理所以道之也飭封井所以齊之也封井不先定則倫理不可得而敦堯為天子憂之而命舜舜為宰臣不能獨任憂之而命禹禹周視海內奔走八年辨土田肥瘠之等而定之立井牧多寡之制而授之定公侯伯子男之封而建之然後五典可敷而兆民治矣此夏后氏之所以王天下也後王才不出庶物大侵小強侵弱智詐愚禹之制浸隳浸紊以至于桀天下大亂而成湯正之明其等申其制正其封以復大禹之舊而人紀修矣此殷之所以王天下也後王才不出庶物大侵小強吞弱智詐愚湯之制浸隳浸壞以至于紂天下大亂而周武王征之明其等申其制正其封以復成湯之舊而五教可行矣此周之所以王天下也後王才不出庶物大吞小強侵弱智詐愚武王之制浸隳浸亂先變於齊後變於魯大壞於秦而仁覆天下之政亡矣仁政既亡有天下者漢唐之盛其不王人也非天也其後亡天也非人也噫孰謂而今而後無繼三王之才者乎病在世儒不知王政之本議三王之有天下不以其道而反以亡秦為可法也或問關中形勝周用以興到得後來秦又用以興朱子曰此亦在人做當春秋時秦亦為齊晉所軋不得伸到戰國時六國又皆以夷狄擯之使不得與中國會盟及孝公因此發憤致得商鞅而用之遂以強大後來又得惠文武昭襄皆是會做底故相繼做起來若其間有一二君昏庸則依舊做壞了以此見得形勝也須是要人相副因言昭王因范睢傾穰侯之故却盡收得許多權柄秦遂益強豈不是會問溫公稽古録秦論謂知及之仁不能守之雖得之必失之秦之謂矣又引賈生之論曰仁義不施而攻守之勢異也某竊謂秦以虎狼並天下設使守之以道且不可保况又非其道耶論者不當徒咎其守之非道而不論其攻之己不善也曰賈生溫公之論若究其極固為有病然彼其立論非為攻取者謀以為可以如是取之而無害也乃為既得之後而謀以為如是則或可以守耳今且試以身處胡亥子嬰之地而自謀所以處之之宜則彼前日取之之逆者既不可及矣吾乃可以拱手安坐以待其亡耶性理大全書卷五十九

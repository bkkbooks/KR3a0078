body:
  text: 性理大全書卷六十七治道二宗法程子曰宗子繼别為宗言别則非一也如别子五人五人各為大宗所謂兄弟宗之者謂别子之子繼禰者之兄弟宗其小宗子也宗子無法則朝廷無世臣立宗子則人知重本朝廷之勢自尊矣古者子弟從父兄今也父兄從子弟由不知本也人之所以順從而不辭者以其有尊卑上下之分而已茍無法以聨屬之可乎凡小宗以五世為法親盡則族散若髙祖之子尚存欲祭其父則見為宗子者雖是六世七世亦須計㑹今日之宗子然後祭其父宗子有君道後世骨肉之間多至仇怨忿爭其實為爭財使之均布立之宗法官為法則無所爭宗非朝廷之所禁但患人自不能行之凡大宗與小宗皆不在廟數禮長子不得為人後若無兄弟又繼祖之宗絶亦當繼祖禮雖不言可以義起凡人家法須令每有族人逺来則為一㑹以合族雖無事亦當每月一為之古人有花樹韋家㑹法可取也然族人每有吉凶嫁娶之類更須相與為禮使骨肉之意常相通骨肉日疎者只為不相見情不相接爾張子曰宗子之法不立則朝廷無世臣且如公卿一日崛起於貧賤之中以至公相宗法不立既死遂族散其家不傳宗法若立則人人各知来處朝廷大有所益或問朝廷何所益曰公卿各保其家忠義豈有不立忠義既立朝廷之本豈有不固今驟得富貴者止能為三四十年之計造宅一區及其所有既死則衆子分裂未㡬蕩盡則家遂不存如此則家且不能保又安能保國家夫所謂宗者以己之旁親兄弟来宗已所以得宗之名是人來宗已非已宗於人也所以繼禰則謂之繼禰之宗繼祖則謂之繼祖之宗曽髙亦然言宗子者謂宗主祭祀宗子為士庶子為大夫以上牲祭於宗子之家非獨宗子之為士為庶人亦然宗子之母在不為宗子之妻服非也宗子之妻與宗子共事宗廟之祭者豈可夫婦異服故宗子雖母在亦當為宗子之妻服也東酌犧象西酌罍尊須夫婦共事豈可母子共事也未娶而死則難立後為其無母也如不得已須當立後又須并其妾母與之大不得已也未娶而死有妾之子則自是妾母也古所謂支子不祭也者惟使宗子立廟主之而已支子雖不得祭至於齊戒致其誠意則與祭者不異與則以身執事不可與則以物助之但不别立廟為位行事而已後世如欲立宗子當從此義雖不與祭情亦可安朱子曰宗子法雖宗子庶子孫死亦許其子孫别立廟問周制有大宗之禮乃有立適之義立適以為後故父為長子權其重者若然今大宗之禮廢無立適之法而子各得以為後則長子少子當為不異庶子不得為長子三年者不必然也父為長子三年者亦不可以適庶論也曰宗子雖未能立然服制自當從古是亦愛禮存羊之意不可妄有改易也如漢時宗子法已廢然其詔令猶云賜民當為父後者爵一級是此禮意猶在也可謂宗法廢而諸子皆得為父後乎北溪陳氏曰神不歆非類民不祀非族古人繼嗣大宗無子則以族人之子續之取其一氣脈相為感通可以嗣續無間此亦至正大公之舉而聖人所不諱也後世理義不明人家以無嗣為諱不肯顯立同宗之子多是潛養異姓之兒陽若有繼而隂已絶矣盖自春秋鄫子取莒公子為後故聖人書曰莒人滅鄫非莒人滅之也以異姓主祭祀滅亡之道也秦以吕政絶晉以牛睿絶亦皆一類然在今世論之立同宗又不可泛葢姓出於上世聖人之所造正所以别生分類自後有賜姓匿姓者又皆混雜故立宗者又不可恃同姓為憑須擇近親有来厯分明者立之則一氣所感父祖不至失祀今世多有以女子之子為後以姓雖異而有氣類相近似勝於姓同而屬疎者然賈充以外孫韓謐為後當時太常博士秦秀已議其昏亂紀度是則氣類雖近而姓氏實異此説亦斷不可行潛室陳氏曰宗法為諸子之庶子設恐其後流派寖多姓氏紛錯易至殽亂故於源頭有大宗以統之則人同知尊祖分派處有小宗以統之則人各知敬禰且始封之君其適子襲封則庶子為大夫大夫不得以禰諸侯故自别為大夫之祖是謂别子為祖也别子之適子則為大宗使繼其祖之所自出從此直下適子世為大宗合族同宗之是謂繼别為宗也别子之庶子又不得以禰别子却待其子繼之而自别為禰繼禰者遂為小宗凡小宗之適子服屬未盡常為小宗凡小宗之庶子又别為禰而其適子又各為小宗兄弟同宗之謂繼禰為小宗是也大宗是始祖正派下雖其後支分派别皆同宗此祖則合族皆服齊衰九月初不以親屬近逺論是為百世不遷之宗小宗是禰正派下親盡則絶如繼禰者親兄弟宗之為之服朞繼祖者則從兄弟宗之為之服大功繼曾祖者再從兄弟宗之為之服小功繼髙祖者三從兄弟宗之為之服緦自此以後代常䟎一代是為五世則遷之宗宗法之立嫡長之尊有君道焉大宗所以統其宗族凡合族中有大事當禀大宗而後行小宗所以統其兄弟如同禰者有大事則同禰之兄弟當禀繼禰之小宗而後行一族之中大宗只是一人小宗儘多故一人之身從下數至始祖大宗惟一數至髙祖小宗則四此古者宗族人情相親人倫不亂豈非明嫡庶之分有君臣之義由大宗小宗之法而然歟謚法程子曰古之君子之相其君而能致天下於太治者無他術善惡明而勸懲之道至焉爾勸得其道而天下樂為善懲得其道而天下懼為惡二者為政之大權也然行之必始於朝廷而至要莫先扵謚法何則刑罰雖嚴可警於一時爵賞雖重不及於後世惟美惡之謚一定則榮辱之名不朽矣故厯代聖君賢相莫不持此以勵世風也或問臣子加謚於君父當極其美有諸曰正終大事也加君父以不正之謚知忠孝者不為也涑水司馬氏答程子書曰承問及張子厚謚倉卒奉對以漢魏以來此例甚多無不可者退而思之有所未盡竊惟子厚平生用心欲率今世之人復三代之禮者也漢魏以下葢不足法郊特牲曰古者生無爵死無謚爵謂大夫以上也檀弓記禮所由失以謂士之有誄自縣賁父始子厚官比諸侯之大夫則已貴宜有謚矣然曾子問曰賤不誄貴幼不誄長禮也唯天子稱天以誄之諸侯相誄猶為非禮况弟子而誄其師乎孔子之没哀公誄之不聞弟子復為之謚也子路欲使門人為臣孔子以為欺天門人厚𦵏顔淵孔子嘆不得視猶子也君子愛人以禮今闗中諸君欲謚子厚而不合於古禮非子厚之志與其以陳文範陶靖節王文中子孟貞曜為比其尊之也曷若以孔子為比乎和靖尹氏曰謚法最公以成周之時其子孫自以幽厲赧為謚此孝子慈孫所不能改也文王只用箇文字武王只用箇武字大小大公五峯胡氏曰昔周公作謚法豈使子議父臣議君哉合天下之公奉君父以天道耳孝愛不亦深乎所以訓後世為君父者以立身之本也知本則身立家齊國治天下平不知本則縱慾恣暴惡聞其過入於滅亡天下知之而不自知也唯其私而已是故不合天下之公則為子議父臣議君夫臣子也君父有不善所當陳善閉邪引之當道若生不能正既亡而又黨之是不以天道奉君父而不以人道事君父也謂之忠孝可乎今夫以筆寫神者必欲其肖不肖吾父則非吾父不肖吾君則非吾君奈何以謚立神而不肖之乎是故不正之謚忠孝臣子不忍為也封建問封建可行否程子曰封建之法本出於不得已栁子厚有論亦窺測得分數秦法固不善亦有不可變者罷侯置守是也栁子厚論曰天地果無初乎吾不得而知之也生人果有初乎吾不得而知之也然則孰為近曰直初為近孰明之由封建而明之也彼封建者更古聖王堯舜禹湯文武而莫能去之盖非不欲去之也勢不可也勢之来其生人之初乎不初無以有封建封建非聖人意也彼其初與萬物皆生草木榛榛鹿豕狉狉人不能摶噬而且無毛羽莫克自奉自衛茍卿有言必将假物以為用者也夫假物者必爭爭而不已必就其能斷曲直者而聴命焉其智而明者所伏必衆告之以直而不改必痛之而後畏由是君長刑政生焉故近者聚而為羣羣之分其爭必大大而後有兵有徳又有大者衆羣之長又就而聴命焉以安其屬於是有諸侯之列則其爭又有大者焉徳又大者諸侯之列又就而聴命焉以安其封於是有方伯連帥之類則其爭又有大者焉徳又大者方伯連帥又就而聴命以安其人然後天下㑹於一是故有里胥而後有縣大夫有縣大夫而後有諸侯有諸候而後有方伯連帥有方伯連帥而後有天子自天子至於里胥其徳在人者死必求其嗣而奉之故封建非聖人意也勢也夫堯舜禹湯之事逺矣及有周而甚詳周有天下列土田而𤓰分之設五等邦羣后布履星羅四周於天下輪運而輻集合為朝覲㑹同離為守臣扞城然而降于夷王􅊣禮傷尊下堂而迎覲者厯于宣王挾中興復古之徳雄南征北伐之威卒不能定魯侯之嗣陵夷迄於幽厲王室東徙而自列為諸侯厥後問鼎之輕重者有之射王中肩者有之伐凡伯誅萇𢎞者有之天下乖盭無君君之心余以為周之喪久矣徒建空名於公侯之上耳得非諸侯之盛強末大不掉之咎歟遂判為十二合為七國威分於陪臣之邦國殄於後封之秦則周之敗端其在乎此矣秦有天下裂都㑹而為之郡邑廢侯衛而為之守牢據天下之雄圖都六合之上㳺攝制四海運於掌握之内此其所以為得也不數載而天下大壊其有由矣亟役萬人暴其威刑竭其貨賄負鋤梃謫戍之徒圜視而合從大呼而成羣時則有叛人而無叛吏人怨于下而吏畏于上天下相合殺守刼令而並起咎在人怨非郡邑之制失也漢有天下矯秦之枉徇周之制剖海内而立宗子封功臣數年之間奔走扶傷而不暇困平城病流矢陵遲不救者三代後乃謀臣獻畫而離削自守矣然而封建之始郡國居半時則有叛國而無判郡秦制之得亦以明矣繼漢而帝者雖百代可知也唐興制州邑立守宰此其所以為宜也然猶桀猾時起虐害方域失不在於州而在扵兵時則有叛將而無叛州州縣之設固不可革也或者曰封建者必私其土子其人適其俗修其理施化易也守宰者茍其心思遷其秩而已何能理乎余又非之周之事迹斷可見矣列侯驕盈黯貨事戎大凡亂國多理國寡侯伯不得亂其政天子不得變其君私土子人者百不有一失在扵制不在政周事然也秦之事迹亦斷可見矣有理人之制而不委郡邑是矣有理人之臣而不使守宰是矣郡邑不得正其制守宰不得行其理酷刑苦役而萬人側目失在於政不在於制秦事然也漢興天子之政行於郡不行於國制其守宰不制其侯王候王雖亂不可變也國人雖病不可除也及夫大逆不道然後掩捕而遷之勒兵而夷之耳大逆未彰奸利浚財怙勢作威大刻於民者無如之何及夫郡邑可謂理且安矣何以言之且漢知孟舒於田叔得魏尚於馮唐聞黄覇之明審覩汲黯之簡靖拜之可也復其位可也卧而委之以輯一方可也有罪得以黜有能得以賞朝拜而不道夕斥之矣夕受而不法朝斥之矣設使漢室盡城邑而侯王之縱令其亂人戚之而已孟舒魏尚之術莫得而施黄霸汲黯之化莫得而行明譴而導之拜受而退已違矣下令而削之締交合從之謀周於同列則相顧裂眦勃然而起幸而不起則削其半削其半民猶瘁矣曷若舉而移之以全其人乎漢事然也今國家盡制郡邑連置守宰其不可變也固矣善制兵謹擇守則理平矣或者又曰夏啇周漢封建而延秦郡邑而促尤非所謂知理者也魏之承漢也封爵猶建晉之承魏也因循不革而二姓陵替不聞延祚今矯而變之垂二百祀大業彌固何繫於諸侯哉或者又以為殷周聖王也而不革其制固不當復議也是大不然夫殷周之不革者是不得已也盖以諸侯歸殷者三千焉資以黜夏湯不得而廢歸周者八百焉資以勝殷武王不得而易徇之已以為安仍之以為俗湯武之所不得已也夫不得非公之大者也私其力於已也私其衛於子孫也秦之所以革之者其為制公之大者也其情私也私其一已之威也私其盡臣畜於我也然而公天下之端自秦始夫天下之道理安斯得人者也使賢者居上不肖者居下而後可以理安今夫封建者繼世而理繼世而理者上果賢乎下果不肖乎則生人之理亂未可知也將欲利其社稷以一其人之視聴則又有世大夫世食禄邑以盡其封畧聖賢生於其時亦無以立於天下封建者為之也豈聖人之制使至於是乎吾固曰非聖人之意也勢也張子曰古者諸侯之建繼世以立此象賢也雖有不賢者象之而已天子使吏治其國彼不得暴其民故舜封象是不得已周禮建國大小必參相得盖是建大國其勢不能相下皆小國則無紀以小事大莫不有法五峯胡氏曰封建之法始於黄帝成於堯舜夏禹因之至桀而亂成湯興而脩之天下以安至紂而又亂文王武王興而修之天下亦以安至幽王而又亂齊桓晉文不能脩而益壊之故天下紛紛不能定及秦始皇而掃滅之故天下大亂爭起而亡秦猶反覆手於須臾間也黄帝堯舜安天下非封建一事也然封建其大法也夏禹成湯安天下亦非封建一事也然封建其大法也文王武王安天下亦非封建一事也然封建其大法也齊桓晉文之不王非一事也然不能封建其大失也秦二世而亡非一事也然掃滅封建其大繆也故封建也者帝王之所以順天理承天心公天下之大端大本也聖人制四海之命法天而不私已盡制而不曲防分天下之地以為萬國而與英才共焉誠知興廢之無常不可以私守之也故農夫受田百畝諸侯百里天子千里農夫食其力諸侯報其功天子享其徳此天之分也郡縣天下可以持承平而不可以支變故封建諸侯可以持承平可以支變故朱子曰栁子厚以封建為非胡明仲輩破其説則專以封建為是要之天下制度無全利而無害底道理但㸔利害分數如何封建則根本較固國家可恃郡縣則截然易制然來來去去無長久之意不可恃以為固也封建實是不可行若論三代之世則封建好處便是君民之情相親可以久安而無患不似後世郡縣一二年輒易雖有賢者善政亦做不成封建只是厯代循襲勢不容已栁子厚亦説得是賈生謂樹國必相疑之勢甚然封建後來自然有尾大不掉之勢成周盛時能得㡬時到春秋列國強盛周之勢亦浸微矣後来到戰國東西周分治赧王但寄於西周公耳雖是聖人法豈有無弊問後世封建郡縣何者為得曰論治亂畢竟不在此以道理觀之封建之意是聖人不以天下為已私分與親賢共理但其制則不過大此所以為得賈誼於漢言衆建諸侯而少其力其後主父偃竊其說用之於武帝或論郡縣封建之弊曰大抵立法必有弊未有無弊之法其要只在得人若是個人則法雖不善亦占分數多了若非其人則有善法亦何益於事且如說郡縣不如封建若封建非其人且是世世相繼不能得他去如郡縣非其人却只三兩年任滿便去忽然換得好底來亦無定范太史唐鑑議論大率皆歸於得人某初嫌他恁地説後来思之只得如此說或疏胡五峰論封建井田數事以質疑曰封建井田乃聖王之制公天下之法豈敢以為不然但在今日恐難下手設使強做得成亦恐意外别生弊病反不如前則難收拾耳因論封建曰此亦難行恐膏粱之子弟不學而居士民上其為害豈有涯哉且以漢諸王觀之其荒縱滛虐如此豈可以治民故主父偃勸武帝分王子弟而使吏治其國故禍不及民所以後來諸王也都善弱盖漸染使然積而至於魏之諸王遂使人監守雖飲食亦皆禁制更存活不得及至晉懲其弊諸王各使之典大藩總強兵相屠相戮馴致大亂沈們云監防太密則有魏之傷恩若寛去繩勒又有晉之禍亂恐皆是無古人教養之法故爾曰那箇雖教無人奈他何或言今之守令亦善曰却無前代尾大不掉之患只是州縣之權太輕卒有變故更支撑不住問封建周禮説公五百里孟子説百里如何不同曰孟子説恐是夏啇之制孟子不詳考亦只説甞聞其略也若夏啇時諸處廣濶人各自聚為一國其大者止百里故禹合諸侯執玉帛者萬國到周時漸漸吞併地里只管添國數只管少到周時只千八百國較之萬國五分已滅了四分已上此時諸國已自大了到得封諸公非五百里不得如周公封魯七百里盖欲優於其他諸公如左氏説云大國多兼數圻也是如此後来只管併來併去到周衰便制他不得也是尾大了到孟子時只有七國這是事勢必到這裏雖有大聖大智亦不能遏其衝今人只説漢封諸侯王土地太過㸔來不如此不得初間髙祖定天下不能得韓彭英盧許多人來使所得地又未定是我底當時要殺項羽若有人説道中分天下與我我便與你殺項羽也沒奈何與他到少間封自子弟也自要挾小不得須是教當得許多異姓過學校程子曰古者八嵗入小學十五嵗入大學擇其才可教者聚之不肖者復之田畝盖士農不易業既入學則不治農然後士農判在學有養若士大夫之子則不慮無養雖庶人之子既入學則亦必有養古之士者自十五入學至四十方仕中間自有二十五年學又無利可趨則所志可知須去趨善便自此成徳後之人自童穉間已有汲汲趨利之意何由得向善故古必使四十而仕然後志定只營衣食却無害惟利祿之誘最害人人有養便方定志於學古者家有塾黨有庠三老坐扵里門察其長幼出入揖遜之序詠歌諷誦無非禮義之言今也上無所學而民風日以偷薄父子兄弟惟知以利相與耳以古所習如彼欲不善得乎以今所習如此欲其善得乎生民之道以教為本故古者自家黨遂至于國皆有教之之地民生八年則入小學是天下無不教之民也既天下之民莫不從教小人脩身君子明道故賢能羣聚於朝良善成風於下禮義大行習俗粹美刑罰雖設而不犯此三代盛治由教而致也後世不知為治之本不善其心而驅之以力法令嚴於上而教不明於下民放僻而入於罪然後從而刑之噫是可以美風俗而成善治乎朱子曰昔者聖王作民君師設官分職以長以治而其教民之目則曰父子有親君臣有義夫婦有别長幼有序朋友有信五者而已盖民有是身則必有是五者而不能以一日離有是心則必有是五者之理而不可以一日離也是以聖王之教因其固有還以導之使不忘乎其初然又慮其由而不知無以久而不壊也則為之擇其民之秀者羣之以學校而聨之以師儒開之以詩書成之以禮樂凡所以使之明是理而守之不失傳是教而施之無窮者盖亦莫非因其固有而發明之而未始有所務於外也夫如是是以其教易明其學易成而其施之之博至於無逺之不暨而無微之不化此先王教化之澤所以為盛而非後世所能及也古者學校選舉之法始扵鄉黨而達於國都教之以徳行道藝而興其賢者能者盖其所以居之者無異處所以官之者無異術所以取之者無異路是以士有定志而無外慕蚤夜孜孜唯懼徳業之不修而不憂爵禄之未至也若夫三代之教藝為最下然皆由有實用而不可闕其為法制之密又足以為治心養氣之助而進於道徳之歸此古之為法所以能成人材而厚風俗濟世務而興太平也道不逺人理不外事故古之教者自其能食能言而所以訓導整齊之者莫不有法而况於家塾黨庠遂序之間乎彼其學者所以入孝出弟行謹言信羣居終日徳進業修而暴慢放肆之氣不設於身體者繇此故也天生斯人而予之以仁義禮智之性而使之有君臣父子兄弟夫婦朋友之倫所謂民彛者也惟其氣質之禀不能一於純秀之㑹是以欲動情勝則或以䧟溺而不自知焉古先聖王為是之故立學校以教其民而其為教必始於洒掃應對進退之間禮樂射御書數之際使之敬恭朝夕脩其孝弟忠信而無違也然後從而教之格物致知以盡其道使之所以自身及家自家及國而達天下者蓋無二理其匡直輔翼優柔漸漬必使天下之人皆有以不失其性不亂其倫而後已焉此二帝三王之盛所以化行俗美黎民醇厚而非後世之所能及也古者聖王設為學校以教其民由家及國大小有序使其民無不入乎其中而受學焉而其所以教之之具則皆因其天賦之秉彜而為之品節以開導而勸勉之使其明諸心修諸身行扵父子兄弟夫婦朋友之間而推之以達乎君臣上下人民事物之際必無不盡之分焉者及其學之既成則又興其賢且能者寘之列位是以當是之時理義休明風俗醇厚而公卿大夫列士之選無不得其人焉此先王學校之官所以為政事之本道徳之歸而不可以一日廢焉者也至于後世學校之設雖或不異乎先王之時然其師之所以教弟子之所以學則皆忘本逐末懐利去義而無復先王之意以故學校之名雖在而其實不舉其效至於風俗日敝人材日衰雖以唐漢之盛隆而無以彷彿乎三代之叔季然猶莫有察其所以然者顧遂以學校為虚文而無所與於道徳政理之實於是為士者求道於老子釋氏之門為吏者責治乎薄書期㑹之最葢學校之僅存而不至於遂廢者亦無㡬耳學校之政不患法制之不立而患理義之不足以悦其心而區區於法制之末以防之是猶決湍水注之千仞之壑而徐翳蕭葦以捍其衝流也亦必不勝矣南軒張氏曰惟民之生其典有五君臣父子兄弟夫婦朋友是也而其徳有四仁義禮智是也人能充其徳之所固有以率夫典之所當然則必無力不足之患惟人之不能是也故聖人使之學焉自唐虞以来固莫不以是教矣至於三代之世立教人之所設官以董莅之而其法益加詳焉然其所以為教則一道耳故曰學則三代共之皆所以明人倫也嗟夫人倫之在天下不可一日廢廢則國隨之然則有國者之於學其可一日而忽哉先王所以建學造士之本意葢將使士者講夫仁義禮智之彛以明夫君臣父子兄弟朋友之倫以之修身齊家治國平天下其事盖甚大矣而為之則有其序教之則有其方故必先使之從事於小學習乎六藝之節講乎為弟為子之職而躬乎洒掃應對進退之事周旋乎爼豆羽籥之間優㳺乎絃歌誦讀之際有以固其肌膚之㑹筋骸之束齊其耳目一其心志所謂大學之道格物致知者由是可以進焉至於格物知至而仁義禮智之彛得於其性君臣父子兄弟夫婦朋友之倫皆以不亂而修身齊家治國平天下無不宜者此先王之所以教而三代之所以治後世不可以跂及者也後世之學校朝夕所講不過綴緝文辭以為規取利祿之計亦與古人之道大戾矣上之人所以教養成就之者夫豈端為是哉三代之學至周而大備自天子之國都以及於鄉黨莫不有學使之朝夕優㳺於絃誦詠歌之中而服習乎進退揖遜之節則又申之以孝弟之義為之冠昏喪祭之法春秋釋菜與鄉飲酒養老之禮其耳目手足肌膚之㑹筋骸之束無不由於學在上則司徒總其事樂正崇其教下而鄉黨亦莫不有師其教養之也宻故其成材也易士生斯時藏修㳺息於其間誦言而知味其文而㑹其理徳業之進日引月長自宜然也於是自鄉論其行而升之司徒司徒又論之而升之國庠大樂正則察其成以告于王定其論而官之其官之也因其才之大小葢有一居其官至於終身不易者士修其身而已非有求於君也修身而君舉之耳夫然故禮義興行人材衆多風俗醇厚至於班白者不負戴於道路而王道成矣東萊吕氏曰學校之設非為士之貧而食之也又非欲羣其類而習為文辭也不農不商若何而可以為士非老非釋若何而可以為儒事親從兄當以何者為法希聖慕賢當自何門而入道徳性命之理當如何而明治亂興衰之故當何由而達考之古以為得失之鑒驗之今以為因革之宜此事之所當用心也自孔門髙弟猶勤勤於問仁問孝問智問政所以為士請之於師辨之於友後世之士不逮逺矣儻離羣索居而蔽其所習則固陋乖僻無自進於道聖人憂之著為成書以詔萬世教養漸摩以俾之講習立師儒之官以董正之此開設學校之本意也西山真氏曰按古教法其近民者教彌數故二十五家為閭閭有塾民朝夕處焉四閭為族則嵗之讀法者十有四法者何大司徒所須之三物也士生斯時不待舎去桑梓而有學有師敬敏任恤則閭胥書之孝弟睦淵則族師書之其所以教又皆因性牖民而納諸至善之域禮鎔樂冶以成其徳達其材古者作人之功葢如此然士之於學豈直處庠序為然哉鷄鳴夙興嚮晦宴息皆學之時微而暗室屋漏顯而鄉黨朝廷皆學之地動容周旋洒掃應對皆學之事知無時之非學則晝而有為夜而計過者其敢懈知無地之非學則警于㝠㝠惕於未形者其敢忽知無事之非學則矜細行勤小物者其敢或遺魯齋許氏曰先王設學校養育人材以濟天下之用及其弊也科目之法愈嚴密而士之進於此者愈巧以至編摩字様期於必中上之人不以人材待天下之士下之人應此者亦豈仁人君子之用心也哉雖得之何益於用上下相待其弊如此欲使生靈䝉福其可得乎先王設學校後世亦設學但不知先王何為而設也上所以教人人所以為學皆本於天理民彛無他教也無異學也學則三代共之皆所以明人倫也司徒之職教以人倫而已凡不本於人倫皆非所以為教樹之君以立政謹此教也作之師以立教教以此也先王皆本於人心之所固有不強以其所無有故人易從而風俗美非後世所謂教也文公小學四書次第本末甚備有王者起必須取法臨川呉氏曰古者盛時萬二千五百家之鄉有鄉學鄉大夫主之頒教法于州黨族閭俾教其民二千五百家之州則州長屬民讀法以時習鄉射於學而尚功五百家之黨則黨正屬民讀法以時習鄉飲酒於學而尚齒雖二十五家之閭巷口亦有塾閭内致仕之老朝夕坐其中民之出入者必受教此所以教成俗善而人人有士君子之行也用人程子曰海宇之廣億兆之衆一人不可以獨治必頼輔弼之賢然後能成天下之務自古聖人未有不以求任輔相為先者也在商王髙宗之初未得其人則恭黙不言盖事無當先者也及其得傅説而命之則曰濟川作舟楫嵗旱作霖雨和羮惟鹽梅其相須倚賴之如是此聖人任輔相之道也夫圗任之道以慎擇為本擇之慎故知之明知之明故信之篤信之篤故任之専任之專故禮之厚而責之重擇之慎則必得其賢知之明則仰成而不疑信之篤則人致其誠任之專則得盡其才禮之厚則體貎尊而其勢重責之重則自任切而功有成是故推誠任之待以師傅之禮坐而論道責之以天下治隂陽和故當之者自知禮尊而任專責深而勢重則挺然以天下為己任故能稱其職也雖有姦諛巧侫知其交深而不可間勢重而不可揺亦將息其邪謀歸附於正矣後之任相者異於是其始也不慎擇擇之不慎故知之不明知之不明故信之不篤信之不篤故任之不專任之不專故禮之不厚而責之亦不重矣擇不慎則不得其人知不明則用之猶豫信不篤則人懐疑慮任不専則不得盡其能禮不厚則其勢輕而易揺責不重則不稱其職是故任之不盡其誠待之不以其禮僕僕趨走若吏史然文案紛冗下行有司之事當之者自知交不深而其勢輕動懐顧慮不肯自盡上懼君心之疑下虞羣議之奪故蓄縮不敢有為茍循常以圗自安爾君子弗願處也姦邪之人亦知其易揺日伺間隙如是其能自任以天下之重乎若曰非任之艱知之為艱且何以知其賢而任之或失其人治亂所繫此人君所以難之也天地生一世人自足了一世事但恨人不能盡用天下之才此其不能大治涑水司馬氏曰用人者無親疎故舊之殊惟賢不肖之為察其人未必賢也以親故而取之固非公也茍賢以親故而捨之亦非公也夫天下之賢固非一人所能盡也若必待素識熟其才行而用之所遺亦多矣古之為相者則不然舉之以衆取之以公衆曰賢矣已雖不知其詳姑用之待其無功然後退之有功則進之所舉得其人則賞之非其人則罰之進退賞罰皆衆人所共然也已不置毫髮之私於其間茍推是心以行之又何遺賢曠官之足病哉元城劉氏曰朝廷之務莫先於用人君子進則治之本也小人用則亂之階也王者深居於九重不能盡知臣下之邪正是以設諫官御史之職俾司耳目之任而採中外之公議是非可否惟衆之從故蔽賢之言不能害君子黨姦之論無以助小人明君無所用心而賢不肖自辨知人則哲其道不過於此天下之治亂在朝廷朝廷輕重在執政論執政才否而進退之者人主之職也使廟堂之上皆得當時之賢而都俞戒敕以圗天下之治則善日進而君子道長此易之卦所以為泰使公卿輔相非其人而姦邪朋黨更相比周以蔽人君之聰明則惡日滋而小人道長此易之卦所以為否也自古雖至聖之君不能無惡人立朝堯之四凶是已雖甚衰之世未甞無君子在位商之三仁是已聖人之興賢者衆則惡人不能勝其善故雖有四凶而或竄或殛卒無幸免暴君在上䜛謟並進則善人不能勝其惡故雖有三仁而或去或死終莫能用此乃治亂盛衰之機不可不察也自古及今未有任君子而不治用小人而不亂者盖甘言美辭足以感移人意小莭偽行足以欺惑世俗及其得志茍患失之隂引姦邪廣布心腹根深蔕固牢莫可破則其為國家之害將有不可勝言者矣故陸贄之論以為操兵以刃人天下不委罪於兵而委罪於所操之主蓄蠱以殃物天下不歸咎於蠱而歸咎扵所蓄之家此言雖小可以喻大齊桓公之郭問其父老曰郭何故亡父老曰以其善善而惡惡也桓公曰若子之言乃賢君也何至於亡父老曰不然郭君善善而不能用惡惡而不能去所以亡也每讀至此未甞不掩卷太息以謂鄙夫固陋燭理不明人之所非反以為是衆之所惡覆以為美此乃愚者偏暗之常態固不足論若夫能知天下之善惡如辨黒白而無疑惑之心葢非智者有所不及然而郭君反以此而亡國其故何也夫郭君能知善之為善惡之為惡則不可謂之不智特以其見善而不能用使君子無以自立知惡而不能去使小人得以成朋因循積累其害遂至于亡國然則有天下者可不視此以為戒乎華陽范氏曰才有君子之才有小人之才古之所謂才者君子之才也後世之所謂才者小人之才也髙陽氏有子八人天下以為才其所謂才者曰齊聖廣淵明允篤誠髙辛氏有子八人天下以為才其所以為才者曰忠肅恭懿宣慈恵和周公制禮作樂孔子以為才然則古之所謂才者兼徳行而言也後世之所謂才者辯給以禦人詭詐以用兵僻邪險詖趨利就事是以天下多亂職斯人之用於世也在易師之上六曰開國承家小人勿用象曰小人勿用必亂邦也未濟曰髙宗伐鬼方三年克之小人勿用王者創業垂統敷求哲人以遺後嗣故能長世也豈以天下未定而可専用小人之才歟人君勞於求賢逸於任人古者疇咨僉諧然後用之茍得其人則任而勿疑乃可以責成功明君用人而不自用故恭已而成功多疑之君自用而不用人故勞心而敗事自古征伐或勝或負多由於此二者矣自古君子易疏小人易親盖君子難於進而果於退小人不恥於自售而戚於不見知其進也無所不至人君一為所惑不能自解鮮有不至禍敗者也五峯胡氏曰唐文宗云宰相薦人當不間疎戚若親故果才避嫌而棄之亦為不公誠哉是言也豫章羅氏曰名器之貴賤以其人何則授扵君子則貴授於小人則賤名器之所貴則君子勇扵行道而小人甘於下僚名器之所賤則小人勇於浮競而君子恥於求進以此觀之人君之名器可輕授人哉君子在朝則天下必治盖君子進則常有亂世之言使人主多憂而善心生故天下所以必治小人在朝則天下必亂葢小人進則常有治世之言使人主多樂而怠心生故天下所以必亂朱子曰天下之治固必出於一人而天下之事則有非一人所能獨任者是以人君既正其心誠其意於堂阼之上穾奥之中而必深求天下敦厚誠實剛明公正之賢以為輔相使之博選士大夫之聰明達理直諒敢言忠信㢘節足以有為有守者隨其器能寘之列位使之交脩衆職以上輔君徳下固邦本而左右私䙝使令之賤無得以奸其間者有功則久其任不稱則更求賢者而易之葢其人可退而其位不可以茍充其人可廢而其任不可以輕奪此天理之當然而不可易者也人君察於此理而不敢以一毫私意鑿於其間則其心郭然大公儼然至正泰然行其所無事而坐收百官衆職之成功一或反是則為人欲私意之病其偏黨反側黯闇猜嫌固日擾擾乎方寸之間而姦偽䜛慝叢脞眩瞀又將有不可勝言者此亦理之必然也尋常之人將欲屬人以一至微至細之事猶必先為規模使其盡善然後所屬之人有所持循而不失吾之所以屬之之意况有天下者將以天下至大之事屬之於人而不先為盡善可守之規以授之乎蓬生麻中不扶而直白沙在泥不染而黒故賈誼之言曰習與正人居之不能無正猶生長於楚之地不能不楚言也是以古之聖賢欲脩身以治人者必逺便嬖以近忠直葢君子小人如冰炭之不相容薫蕕之不相入小人進則君子必退君子親則小人必疎未有可以兼收並蓄而不相害者也能審乎此以定取舍則其見聞之益薫陶之助所以謹邪僻之防安義理之習者自不能已而其舉措刑賞所以施於外者必無偏陂之失一有不審則不惟其妄行請託竊弄威權有以害吾之政事而其導諛薫染使人不自知覺而與之俱化則其害吾之本心正性又有不可勝言者然而此輩其類不同盖其本出下流不知禮義而稍通文墨者亦有服儒衣冠叨竊科第而實全無行檢者是皆國家之大賊人主之大蜮茍非心正身脩有以灼見其情狀如臭惡之可惡則亦何以逺之而来忠直之士望徳業之成乎伏節死義之士當平居無事之時誠若無所用者然古之人君所以必汲汲以求之者盖以如此之人臨患難而能外死生則其在平世必能輕爵禄臨患難而能盡忠節則其在平世必能不詭隨平日無事之時得而用之則君心正扵上風俗美於下足以逆折姦萌濳消禍本自然不至真有伏節死義之事非謂必知後日當有變故而預蓄此人以擬之也惟其平日自持安寧便謂此等人材必無所用而專取一種無道理無學識重爵祿輕名義之人以為不務矯激而尊寵之是以綱紀日壊風俗日偷非常之禍伏於㝠㝠之中而一但發於意慮之所不及平日所用之人交臂降叛而無一人可同患難然後前日擯棄流落之人始復不幸而著其忠義之節以天寳之亂觀之其將相貴戚近幸之臣皆已頓顙賊庭而起兵討賊卒至於殺身滅族而不悔如巡逺杲卿之流則逺方下邑人主不識其面目之人也使明皇早得巡等而用之豈不銷患於未萌巡等早見用於明皇又何至真為伏節死義之舉哉自古君子小人雜居並用非此勝彼即彼勝此無有兩相疑而終不決者此必然之理也故雖舉朝皆君子而但有一二小人雜於百執事之間投隙抵巇已足為患况居侍從之列乎况居丞弼之任而濳植私黨布滿要津乎盖二三大臣者人主之所與分别賢否進退人材以圖天下之事自非同心一徳協恭和衷彼此坦然一以國家為念而無一毫有已之私間於其間無以克濟若以小人叅之則我之所賢而欲進之者彼以為害已而欲退之我之所否而欲退之者彼以為助已而欲親之且其可否異同不待勉爭力辨而後決但於相與進退之間小為俯仰前卻之態而已足以敗吾事矣是豈可不先以為慮而輕為他計以發其害我之機哉象山陸氏曰銖銖而稱之至石必繆寸寸而度之至丈必差石稱丈量徑而寡失此可為論人之法且如其人大槩論之在於為國為民為道義此則君子人矣大槩論之在於為私已為權勢而非忠於國㣘於義者則是小人矣若銖稱寸量校其一二節目而違其大綱則小人或得為欺君子反被猜疑邪正賢否未免倒置矣東萊吕氏曰用人之道詎可信其虚言而不試之以事乎是以人君將欲付大任於是人必納之於膠擾繁劇之地以觀其材處之於閒暇寂寞之鄉以觀其量使之甞險阻艱難以觀其操使之當盤根錯節以觀其斷投之州縣磨之嵗月習之既久養之既深異時束帶立於朝天下之事莫不迎刃而解也西山真氏曰易君子在内小人在外則謂之泰泰者通而治也君子在外小人在内則謂之否否者閉而亂也君子小人並生於天地間不能使之無也但當區處得宜使有徳者布列朝廷有才者奔走任事於外如此則治矣鶴山魏氏曰甞聞朱熹云天地之間有自然之理凡陽必剛剛必明明則易知凡隂必柔柔必闇闇則難測故光明正大疏暢通達無纖芥可疑者必君子也回互隠伏閃倐狡獪不可方物者必小人也某甞以是為察言觀人之鑒邪正之辨了不可掩則取舎之極定於内矣魯齋許氏曰賢者以公為心以愛為心不為利回不為勢屈寘之周行則庶事得其正天下被其澤賢者之於人國其重固如此也然或遭世不偶務自韜晦有舉一世而人不知者雖或知之而當路之人未有同類不見汲引獨人君有不知者人君雖或知之召之命之泛如厮養而賢者有不屑就者雖或接之以貎待之以禮而其所言不見信用有超然引去者雖或信用復使小人參於其間責小利期近効有用賢之名無用賢之實賢者亦豈肯尸位素餐徒費廩祿取譏誚於天下也雖然此特論難進者然也又有難合者焉人君位處崇髙日受容悦大抵樂聞人之過而不樂聞已之過務快已之心而不務快民之心賢者必欲匡而正之扶而安之使如堯舜之正堯舜之安而後已故其勢難合况姦邪佞倖醜正惡直肆為詆毁多方以䧟之將見罪戾之免又可望庶事得其正天下被其澤邪自古及今端人雅士所以重於進而輕扵退者葢以此爾大禹聖人聞善即拜益戒之曰任賢勿貳去邪勿疑貳之一言在大禹猶當警省後世人主宜如何哉此任賢之難也任用人材興作事功自己已有一定之見然不可獨用己意獨用己意則排沮者必多吾事敗矣稽於衆取諸人以為善然後可堯之禪舜也以聖人見聖不待三載之久而後知也當一見便知之然而不敢以己之見便以天位付之必也賔於四門納于大麓厯試諸難使天下之人共知之四岳十二牧共推之若不出於堯之意也然後居天位理天職人無間言後世稱聖後世之任用人材立事功者皆獨出己意憲宗淮蔡功成而裴中立不得安於朝矣況大於此者乎姦邪之人其為心險其用術巧惟險也故千態萬狀而人莫能知如以甘言卑辭誘人入於過失然後發之之類惟巧也故千蹊萬徑而人莫能禦如勢在近習則謟近習勢在宫闈則謟宫闈之類人君不察以諛為恭以訐為公以欺為可信以佞為可近喜怒愛惡人主固不能無然有可者有不可者而姦邪之人一於迎合竊其勢以立己之威濟其欲以結主之愛愛隆於上威擅於下大臣不敢議近親不敢言毒被天下而上莫之知此前人所謂城狐也所謂社鼠也至是而求去之不亦難乎雖然此由人主不悟誤至於此猶有説也如宇文化及之佞太宗灼見其情而竟不能斥李林甫妬賢疾能明皇洞見其姦而卒不能退邪之惑人有如此者可不畏哉天下之務固不勝其煩也然其大要在用人立法而已古人謂得士者昌自用則小意正如此夫賢者識治之體知事之要與庸人相懸葢十百而千萬也布之周行百職具舉然人之賢否未能灼知其詳固不敢用或已知其孰為君子孰為小人復畏首畏尾患得患失坐視其弊而不能進退之徒曰知人而實不能用人亦何益哉生民休戚係於用人之當否用得其人則民賴其利用失其人則民被其害自古論治道者必以用人為先務用既得人則其所謂善政者始可得而行之以善人行善政其於為治也何有臨川呉氏曰治天下者在得人相天下者在用人用人必自好賢始周公大聖也而急於見賢一食三吐其哺一沐三握其髪趙文子賢大夫也所舉筦庫之士七十有餘家嗚呼當時周公所見文子所舉豈必皆其親舊而有所請求者哉好賢之臣能容人而天下治妬賢之臣不能容人而天下亂此大學平天下章所以引秦誓之言而深切教戒也性理大全書卷六十七

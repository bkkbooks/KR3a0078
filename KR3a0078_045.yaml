body:
  text: 性理大全書卷四十五學三總論為學之方朱子曰為學之道聖經賢傳所以告人者已竭盡而無餘不過欲人存此一心使自家身有主宰今人馳騖紛擾一箇心都不在軀殼裏孟子曰學問之道無他求其放心而已又曰存其心養其性所以事天也學者須要識此涵養工夫如一粒菜子中間含許多生意亦須是培㙲澆灌方得成不成說道有那種子在此只待他自然生根生苖去若只見道理如此便要受用去則一日止如一日一年止如一年不㑹長進正如菜子無糞去培㙲無水去澆灌也須是更將語孟中庸大學中道理來涵養人之為學惟患不自知其所不足既知之則亦即此而加勉焉耳為人由已豈他人所能與惟讀書窮理之功不可不講也涵養致知力行三者便是以涵養做頭致知次之力行次之不涵養則無主宰如做事須用人才放下或困睡這事便無人做主都由别人不由自家既涵養又須致知既致知又須力行若致知而不力行與不知同亦須一時並了非謂今日涵養明日致知後日力行也要當皆以敬為本敬却不是將來做一箇事今人多先安一箇敬字在這裡如何做得敬只是提起這心莫教放散恁地則心便自明這裏便窮理格物見得當如此便是不當如此便不是既見了便行將去今且將大學來讀便見為學次第初無許多屈曲又曰某於大學中所以力言小學者以古人於小學中已自把捉成了故於大學之道無所不可今人既無小學之功却當以敬為本問程子云看雞雛可以觀仁如何曰既通道理後這般箇久久自知之記曰善問者如攻堅木先其易者後其節目所以游先生問隂陽不測之謂神而程子問之曰公是揀難底問是疑後問故昨曰與公說讀書須看一句後又看一句讀一章後又讀一章格物須格一物後又格一物見這箇物事道理既多則難者道理自然識得童蜚卿曰程子謂近思只是此類推去曰程子說得推字極好又曰此類莫是比這一箇意思推去否曰固是如為子則當止於孝為臣則當止於忠自此節節推去然只一愛字雖出於孝畢竟千頭萬緒皆當推去須得人之為學五常百行豈能盡常常記得人之性惟五常為大五常之中仁尤為大而人之所以為是仁者又但當守敬之一字只是常求放心晝夜相承只管提撕莫令廢惰則雖不能常常盡記衆理而義禮智信之用自然隨其事之當然而發見矣子細思之學者最是此一事為要所以孔門只是教人求仁也為學無許多事只是要持守身心研究道理分别得是非善惡直是如好好色如惡惡臭到這裏方是踏著實地自住不得問持敬豈不欲純一於敬然自有不敬之念固欲與已相反愈制則愈甚或謂只自持敬雖念慮妄發莫管他久將自定還如此得否曰要之邪正本不對立但恐自家胸中無箇主若有主邪自不能入又問不敬之念非出於本心如忿欲之萌學者固當自克雖聖賢亦無如之何至於思慮妄發欲制之而不能曰才覺恁地自家便挈起了但莫先去防他然此只是自家見理不透做主不定所以如此大學者物格而後知至知至而後意誠才意誠則自然無此病為學大要只在求放心此心流濫無所收拾將甚處做管轄處其他用工總間慢須先就自心上立得定决不雜則自然光明四逹照用有餘凡所謂是非美惡亦不難辨况天理人欲决不兩立須得全在天理上行方見人欲消盡義之與利不待分辨而明至若所謂利者凡有分毫求自利便處皆是便與克去不待顯著方謂之利此心須令純純只在一處不可令有外事參差遇事而發合道理處便與果决行去勿顧慮若臨事見義方復遲疑則又非也仍須勤勤把將做事不可俄頃放寬日日時時如此便須見驗人之精神習久自成大凡人心若勤緊收拾莫令寬縱逐物安有不得其正者若真箇提得緊雖半月見驗可也凡看文字非是要理㑹文字正要理㑹自家性分上事學者須要主一主一常要心存在這裏方可做工夫如人須尋箇屋子住至于為農工商賈方惟其所之主者無箇屋子如小人趂得百錢亦無歸宿孟子說求其放心已是兩截如常知得心存這裏則心自不放又云無事時須要知得此心不知此心恰似睡困都不濟事今看文字又理㑹理義不出亦只緣主一工夫缺闕學者若不為已看做甚事都只是為别人雖做得好亦不關已自家去從師也不是要理㑹身已自家去取友也不是要理㑹身已只是漫恁地只是要人說道也曽如此要人說道好自家又識得甚麼人自家又有幾個朋友這都是徒然說道看道理不曽著自家身已如何㑹曉得世上如此為學者多只看為已底是如何他直是苦切事事都是自家合做底事如此方可不如此定是不可今有人苦學者他因甚恁地苦只為見這物事是自家合做底事如人喫飯是自家肚饑定是要喫又如人做家主要錢使在外靣百方做計一錢也要將歸這是為甚如此只為自家身上事若如此為學如何㑹無所得學問之功無內外身心之間無粗細隱顯之分初時且要大綱持守勿令放逸而常切提撕漸加嚴密更讀聖賢之書逐句逐字一一理㑹從頭至尾不要揀擇如此久之自當見得分明守得純熟矣學道做工夫須是奮厲警發悵然如有所失不尋得則不休如自家有一大光明寶藏被人偷將去此心還肯放捨否定是去追捕尋捉得了方休做工夫亦須如此或問理㑹應變處曰今且當理㑹常未要理㑹變常底許多道理未能理㑹得盡如何便要理㑹變聖賢說話許多道理平鋪在那裏且要闊著心胸平去看通透後自能應變不是硬捉定一物便要討常便要討變今也須如僧家行腳接四方之賢士察四方之事情覽山川之形勢觀古今興亡治亂得失之迹這道理方見得周遍士而懷居不足以為士矣不是塊然守定這物事在一室關門獨坐便了便可以為聖賢自古無不曉事情底聖賢亦無不通變底聖賢亦無關門獨坐底聖賢聖賢無所不通無所不能那箇事理㑹不得如中庸天下國家有九經便要理㑹許多物事如武王訪箕子陳洪範自身之視聽言貌思極至於天人之際以人事則有八政以天時則有五紀稽之於卜筮驗之於庶徵無所不備如周禮一部書載周公許多經國制度那裏便有國家當自家做只是古聖賢許多規模大體也要識蓋這道理無所不該無所不在且如禮樂射御書數許多周旋升降文章品節之繁豈有妙道精義在只是也要理㑹理㑹得熟時道理便在上面又如律歷刑法天文地理軍旅官職之類都要理㑹雖未能洞究其精微然也要識箇規模大槩道理方浹洽通透若只守箇些子捉定在這裡把許多都做間事便都無事了如此只理㑹得門內事門外事便了不得所以聖人教人要博學須是博學之審問之慎思之明辨之篤行之子曰我非生而知之者好古敏以求之者也文武之道布在方冊在人賢者識其大者不賢者識其小者夫子焉不學而亦何常師之有聖人雖是生知然也事事理㑹過無一之不講這道理不是只就一件事上理㑹見得便了學時無所不學理㑹時却是逐件上理㑹去凡事雖未理㑹得詳密亦有箇大要處縱詳密處未曉得而大要處已被自己見了今只就一線上窺見天理便說天理只恁地了便要去通那萬事不知如何得萃百物然後觀化工之神聚衆材然後知作室之用於一事一義上欲窺聖人之用心非上智不能也須開心胸去理㑹天理大所包得亦大且如五常之教自家而言只有箇父子夫婦兄弟才出外便有朋友朋友之中事已煞多及身有一官君臣之分便定這裏面又煞多事事事都合講過他人未做工夫底亦不敢向他說如吾友於已分上已自見得若不說與公又可惜了他人於已分上不曽見得泛而觀萬事固是不得而今已有箇本領却只捉定這些子便了也不得如今只道是持敬收拾身心日用要合道理無差失此固是好然出而應天下事應這事得時應那時又不得學之大本中庸大學已說盡了大學首便說格物致知為甚要格物致知便是要無所不格無所不知物格知至方能意誠心正身修推而至於家齊國治天下平自然滔滔去都無障礙古人學問只是為已而已聖賢教人具有倫理學問是人合理㑹底事學者須是切已方有所得今人知為學者聽人說一席好話亦解開悟到切已工夫却全不曽做所以悠悠嵗月無可理㑹若使切已下工聖賢言語雖散在諸書自有箇通貫道理須實有見處自然休歇不得今人事無大小皆潦草過了只如讀書一事頭邊看得兩假便揭過後面或看得一二假或看得三五行殊不曽子細理㑹如何㑹有益為學大端在於求復性命之本然求聖賢之之極致須是便立志如此便做去始得若曰我之志只是要做箇好人識些道理便休宜乎工夫不進日夕漸漸消靡今須思量天之所以與我者必須是光明正大必不應只如此而止就自家性分儘做得去不到聖賢地位不休如此立志自是歇不住自是儘有工夫可做如顔子之欲罷不能如小人之孳孳為利念念自不忘若不立志終不得力因舉程子云學者為氣所勝習所奪只可責志又舉云立志以定其本居敬以持其志此是五峯議論好處又舉士尚志何謂尚志曰仁義而已矣又舉舜為法於天下可傳於後世我猶未免為鄉人也是則可憂也憂之如何如舜而已矣又舉三軍可奪帥匹夫不可奪志也如孔門亦有不能立志者如冉求非不說子之道力不足也是也所以其後志於聚斂無足怪問下學與上逹固相對是兩事然下學却當大假多著工夫曰聖賢教人多說下學事少說上逹事說下學工夫要多也好但只理㑹下學又局促了須事事理㑹過將來也要知箇貫通處不去理㑹下學只理㑹上逹即都無事可做恐孤單枯燥程先生云但是自然更無玩索既是自然便都無可理㑹了譬如耕田須是種下種子便去耘鋤灌溉然後到那熟處而今只想像那熟處却不曽下得種子如何㑹熟如一以貫之是聖人論到極處了而今只去想像那一不去理㑹那貫譬如討一條錢索在此都無錢可穿又問為學工夫大槩在身則有箇心心之體為性心之用為情外則目視耳聽手持足履在事則事親事長以至於待人接物灑掃應對飲食寢處件件都是合做工夫處聖賢千言萬語便只是其中細碎條目曰講論時是如此講論做工夫時須是著實去做道理聖人都說盡了論語中有許多詩書中有許多須是一一與理㑹過方得程先生謂或讀書講明道義或論古今人物而别其是非或應接事物而處其當否如何而為孝如何而為忠以至天地之所以髙厚一物之所以然都逐一理㑹不只是箇一便都了又問下學莫只是就切近處求否曰也不須恁地揀事到面前便與他理㑹且如讀書讀第一章便與他理㑹第一章讀第二章便與他理㑹第二章今日撞著這事便與他理㑹這事明日撞著那事便理㑹那事萬事只是一理不成只揀大底要底理㑹其他都不管譬如海水一灣一曲一洲一渚無非海水不成道大底是海水小底不是程先生云窮理者非謂必盡窮天下之理又非謂只窮得一理便到但積纍多厚自當脫然有悟處又曰自一身之中以至萬物之理理㑹得多自當豁然有箇覺處今人務博者却要盡窮天下之理務約者又謂反身而誠則天下之物無不在我此皆不是且如一百件事理㑹得五六十件了這三四十件雖未理㑹也大槩可曉了問為學道理日用間做工夫所以要步步縝密者蓋緣天理流行乎日用之間千條萬緒無所不在故不容有所缺缺若工夫有所缺缺便於天理不凑得著曰也是如此理只在事物之中做工夫須是密然亦須是那疏處斂向密又就那密處展放開若只拘要那縝密處又却局促了問放開底樣子如何曰亦只是見得天理是如此人欲是如此便做將去或云無時不戒謹恐懼則天理無時而不流行有時而不戒謹恐懼則天理有時而不流行此語如何曰不如此也不得然也不須得將戒謹恐懼說得太重也不是恁地驚恐只是常常提撕認得這物事常常存得不失今人只見他說得此四箇字重便作臨事驚恐看了如臨深淵如履薄氷曽子也只是順這道理常常恁地把捉去一云恁地兢謹把捉去不成便恁地驚恐學問只是要此心常存若不用戒謹恐懼而此理常流通者惟天地與聖人耳聖人不勉而中不思而得從容中道亦只是此心常存理常明故能如此賢人所以異於聖人衆人所以異於賢人亦只爭這些子境界存與不存而已嘗謂人無有極到處便是堯舜周孔不成說我是從容中道不要去戒謹恐懼那工夫亦自未嘗得息子思說尊德性又却說道問學致廣大又却說盡精微極髙明又却說道中庸溫故又却說知新敦厚又却說崇禮這五句是為學用工精粗全體說盡了如今所說却只偏在尊德性上去揀那便宜多底占了無道學問底許多工夫只恐是占便宜自了之學出門動步便有礙做一事不得今人之患在於徒務末而不究其本然只去理㑹那本而不理㑹那末亦不得時變日新而無窮安知他日之事非吾輩之責乎若是少間事勢之來當應也只得應若只是自了便待工夫做得二十分到終不足以應變到那時却怕人說道不能應變也牽强去應應得便只成杜撰便只是人欲又有誤認人欲作天理處若應變不合義理則平日許多工夫依舊都是錯了一日之間事變無窮小而一身有許多事一家又有許多事大而一國又大而天下事業恁地多都要人與他做不是人做却教誰做不成我只管得自家若將此樣學問去應變如何通得許多事情做出許多事業學者須是立定此心泛觀天下之事精粗巨細無不周遍下梢打成一塊亦是一箇物事方可見於用不是揀那精底放在一邊粗底放在一邊所謂天理人欲只是一箇大綱如此下面煞有條目須是就事物上辨剖那箇是天理那箇是人欲不可恁地空說將大綱來罩却籠統無界分恐一向暗昧更動不得如做器具固是教人要做得好不成要做得不好好底是天理不好底是人欲然須是較量所以好處如何樣做方好做得南軒張氏曰人之性善然自非上智生知之資其氣禀不容無所偏學也者所以化其偏而若其善也氣禀之偏其始甚微惟夫習而不察日以滋長非用力之深末由返也古人所以從事於學者其果何所為而然哉天之生斯人也則有常性人之立於天地之間也則有常事在身有一身之事在家有一家之事在國有一國之事其事也非人之所能為也性之所有也弗勝其事則為弗有其性弗有其性則為弗克若天矣克保其性而不悖其事所以順乎天也然則捨講學其能之哉凡天下之事皆人之所當為君臣父子兄弟夫婦朋友之際人事之大者也以至於視聽言動周旋食息至纎至悉何莫非事者一事之不貫則天性以之陷溺也然則講學其可不汲汲乎學所以明萬事而奉天職也雖然事有其理而著於吾心心也者萬事之宗也惟人放其良心故事失其統紀學也者所以收其放而存其良也夏葛而冬裘饑食而渴飲理之所固有而事之所當然者凡吾於萬事皆見其若是也而後為當其可學者求乎此而已嘗竊怪今世之學者其所從事往往異乎是鼓篋入學抑亦思吾所謂學者果何事乎聖人之立教者果何在乎而朝廷建學羣聚而教養者又果何為乎嗟夫此獨未之思而已矣使其知所思則必竦然動于中而其朝夕所接君臣父子兄弟夫婦朋友之際視聽言動之間必有不得而遁者庶乎可以知入德之門矣入德有門户得其門而入然後有進也夫子之教人循循善誘始學者聞之即有用力之地而至於成德亦不外是今欲求所持循而施吾弗措之功其可不深考之於夫子之遺經乎試舉一端而論夫子之言曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文嗟乎是數言者視之若易而為之甚難驗之不逺而測之愈深聖人之言化工也學者如果有志盍亦於所謂入孝出弟所謂謹而信所謂泛愛親仁者學之而弗措乎學然後知不足其間精微曲折未易盡也其亦問之而弗措乎思之未至終不為己物盍亦思之而弗措乎思之而有疑盍亦辨之而弗措乎思而得辨而明又盍行之而弗措乎是五者蓋同體以相成相資而互相發也真積力久所見益深所履益固而所以弗措者蓋有不可以己髙明博厚端可馴而識矣噫學不躐等也譬如燕人適越其道里之所從城郭之所經山川之阻修風雨之晦冥必一一實履焉中道無畫然後越可幾也若坐環堵之室而望越之渺茫車不發軔而欲乘雲駕風以遂抵越有是理哉且夫為孝必自冬溫夏凊昏定晨省始為弟必自徐行後長者始故善言學者必以灑掃應對進退為先焉惟夫弗措之為貴也學必有序故自灑掃應對進退而往皆序也由近以及逺自粗以至精學之方也如適千里者雖步步踏實亦須循次而進今欲濶步一蹴而至有是理哉自欺自誤而已講究義理須要看得如饑食渴飲只是平常事若談髙說妙便是懸空揣度去道逺矣近日學者論仁字多只是要見得仁字意思縱使逼真亦終非實得看論語中聖人所言只欲人下工夫升髙自下陟遐自邇循序積習自有所至存養省察固當並進存養是本工夫固不越於敬敬固在主一此事惟用力者方知其難講學不可以不精也毫釐之差則其弊有不可勝言者故夫専於考索則有遺本溺心之患而騖於髙逺則有躐等憑虛之憂二者皆其弊也考聖人之教固不越乎致知力行之大端患在人不知所用力耳莫非致知也日用之間事之所遇物之所觸思之所起以至於讀書考古茍知所用力則莫非吾格物之妙也其為力行也豈但見於孝悌忠信之所發形於事而後為行乎自息養瞬存以至於三千三百之間皆合內外之實也行之力則知愈進知之深則行愈逺如今一輩學者往往希慕髙逺畢竟終無所得要之仁之實事親是也義之實從兄是也當於事親從兄之際踐履中體察之此最親切若升髙必自下若陟遐必自邇須是下學而上逹雖灑掃應對其中自有妙理至如禮經三百威儀三千在吾儒為之雖若遲緩然為之不已雖至聖人可也更當博親伊洛議論涵泳於中使之自得且如聽人說他處市井如何山川如何比之親到氣象殊别責己須要備人有片善皆當取之古人之學只是為己如晏平仲其事君臨政未必皆是然善與人交聖人便取之子産有君子之道四焉其不合道處想多只此四者便是吾之師責己而取人不惟養吾之德亦與人為善也象山陸氏曰學者大病在於師心自用師心自用則不能克己不能聽言雖使羲皇唐虞以來羣聖人之言畢聞於耳畢熟於口畢記於心祗益其私增其病耳為過益大去道愈逺非徒無益而又害之為學但當孜孜進德修業使此心於日用間戕賊日少光潤日著則聖賢垂訓向以為盤根錯節未可遽解者將渙然氷釋怡然理順有不加思而得之者矣學者且當大綱思省平時雖號為士人雖讀聖賢書其實何曽篤志於聖賢事業往往從俗浮沉與時俯仰徇情縱欲汩沒而不能以自振日月逾邁而有泯然與草木俱腐之恥到此能有愧懼大决其志乃求涵養磨礪之方若有事役未得讀書未得親師亦可隨處自家用力檢㸃見善則遷有過則改所謂心誠求之不中不逺若事役有暇便可親書册無不有益者東萊吕氏曰靜多於動踐履多於發用涵養多於講說讀經多於讀史工夫至此然後可久可大問人之格局卑者不知能進否曰中人以下固不可以語上然如人坐暗室久必自明若人果有志積以嵗月之久亦自有見又問必有所見然後能立否曰人之初學豈能一一自有所見須去下工夫工夫既深其久乃有所見為學須先識得大綱模樣使志趣常在這裏到做工夫却隨節次做去漸漸行得一節又問一節方能見衆理所聚今學者病多在間邊問人路頭尚不知大率問人須是就實做工夫處商量方是凡勤學須是出於本心不待父母先生督責造次不忘寢食在念然後見功茍有人則作無人則輟此之謂為父母先生勤學非為己修終無所得持養之久則氣漸和氣和則溫裕婉順望之者意消忿解而無招咈取怒之患矣體察之久則理漸明理明則諷導詳欵聽之者心諭慮移而無起爭見卻之患矣更須參觀物理深察人情體之以身揆之以時則無偏蔽之失也持養察識之功要當並進更當於事事物物試驗學力若有窒礙齟齬處即深求病源所在而鋤去之士生於三代之後所見未必皆正人也所聞未必皆正言也一日暴之十日寒之其為善難矣哉處此者有道善者以為法不善者以為戒善者以為法是見其善而從其善也不善者以為戒是因其不善而知其善也在人者雖有善不善之殊在我者一歸於善而已矣如此則所遇之人無非碩師所聽之言無非法語何入而不自得哉凡見人有一行之善則當學之勿以其同時同處貴耳賤目焉為人立基址須是堅實既堅實須是就充擴所謂士不可以不𢎞毅為學必須於平日氣禀資質上驗之如滯固者疏通顧慮者坦蕩智巧者易直茍未如此轉變要是未得力耳須要公平觀理而撤户牖之小嚴敬持身而戒防範之踰周密而非發於避就精察而不安於小成此病痛皆所素共㸃檢者耳義理無窮才智有限非全放下終難凑泊然放下政自非易事也培養克治殊不可緩私意之根若尚有眇忽未去異日遇事接物助發滋養便張皇不可剪截其害非特一身也要須著實省察令毫髮不留乃善羣居以和肅為上若為學之志専則自無暇及他事勉齊黃氏曰靜處下工誠為長䇿然居敬集義博文約禮皆不可廢朋友切磨固欲相觀而善然講習一事尤為至切須將聖賢言語逐一研究不可以為非切己若不自此用工則義理不明生出無限病痛人能於虛靜處認得分曉又於閒靜時存得純固此乃萬理之宅萬事之原看到惺惺處則於一二疑義合商量處肯細心磨講則洞然無疑矣致知持敬兩事相發人心如火遇木即焚遇事即應惟於世間利害得喪及一切好樂見得分明則此心亦自然不為之動而所謂持守者始易為力若利欲為此心之主則雖是强加控制此心隨所動而發恐亦不易遏也便使强制得下病根不除如以石壓草石去而草復生矣此不可不察也學問須是就險難窮困處試一過真能不動方是學者人生最難克是利欲利欲之大是富貴貧賤吾夫子只許顔淵子路兩箇若是處打不過便教說得天花亂墜盡是間話也進道之要固多端且刋落世間利欲外慕見得榮辱是非得失利害皆不足道只有直截此心無愧無懼方且見之動靜語默皆是道理不然則浮湛出入渾殽膠擾無益於己見窺於人甚可畏也為學須隨其氣質察其所偏與其所未至擇其最切者而用吾力焉譬如用藥古人方書亦言其大法耳而病證多端則亦須對證而謹擇之也古先聖賢言學無非就身心上用工人心道心直內方外都未說近講學處夫子恐其識見易差於是以博文約禮對言博文先而約禮後博文易而約禮難後來學者専務其所易而常憚其所難此道之所以無傳須是如中庸之㫖戒懼慎獨為終身事業不可須臾廢離而講學窮理所以求其明且正耳若但務學而於身心不加意恐全不成學問也人之為學但當操存涵養使心源純靜探賾索隱使義理精熟力加克制使私意不生三者並行而日勉焉則學進矣為學只要收拾身心勿令放逸如臨深淵如履薄氷如見大賔如承大祭蓋理義非由外鑠我固有之也此心放逸則固有之理先已昏惑紛擾而失其正矣便說得天花亂落亦於我何有干涉况亦未見心不純靜而能理明義精者理義無窮如登嵩華如涉溟渤且要根腳純實深厚然後可以承載初涉文義便跳踉有自喜之意又安能任重而致逺耶世間固有全不識學問而能質實厚重小心謹畏者不害為君子亦有親師取友講明道義而輕狷浮薄者未免為小人此等處皆後生所當别識先以戒謹厚重為心然後可以言學也古人為學大抵先於身心上用工如危微精一之㫖制心制事之語敬勝怠義勝欲之戒無非欲人檢㸃身心存天理去人欲而已然學問之方難以人人口授故必載之方䇿而義理精微亦難以意見揣度故必參之聖賢故初學之法且令格物窮理考古驗今者蓋欲知為學之方求義理之正使知所以居敬集義而無毫釐之差亦卒歸於檢㸃身心而已年來學者但見古人有格物窮理之說但馳心於辨析講論之間而不務持養省察之實所以辨析講論者又不原切問近思之意天之所以與我與吾之所以全乎天者大本大原漫不加省而尋行數墨入耳出口以為即此便是學問退而察其胸中之所存與夫應事接物無一不相背馳聖人教人决不若是留意講習若是實體之於心見吾一身之中實具此理操而存之實有諸己則不至流於口耳之學今世知學者少都以易說了學問但能斂束身心便道㑹持敬但曉文義便道㑹明理俯視世之不學者既有間仰觀昔者聖賢之言學條目又不過如此便道為學都了不知後面都不是惟孔子全不如此逐日只見不足如曰學而不厭誨人不倦乃曰何有於我哉如曰德之不修學之不講乃曰是吾憂也豈聖人不情之語哉此心直是歉然今之學者須當體得此心切實用功逐日察之念慮心術之微驗之出入起居之際體之應人接物之間真箇無歉益當加勉豈可一說便了著問孟子才髙學之無所依據學者當學顔子入聖人為近有用力處如何曰如博文約禮克己復禮不遷怒不二過等皆用力處就務實切已下工所以入聖人為近問濓溪曰聖希天聖希聖士希賢一條曰才說為學便以伊尹顔子並言若非為己務實之論蓋人之心量自是有許多事不然則褊狹了然又不可不知輕重先後故伊尹曰志顔子曰學大學既言明德便言新民聖賢無一偏之學北溪陳氏曰道之浩浩何處下手聖門用工節目其大要亦不過曰致知力行而已致者推之而至其極之謂致其知者所以明萬理於心而使之無所疑也力者勉焉而不敢怠之謂力其行者所以復萬善於己而使之無不偹也知不致則真是真非無以辨其行將何所適從必有錯認人欲作天理而不自覺者矣行不力則雖精義入神亦徒為空言而盛德至善竟何有於我哉此大學明明德之功必以格物致知為先而誠意正心修身繼其後中庸擇善固執之目必自夫博學審問慎思明辨而篤行之而顔子稱夫子循循善誘亦惟在於博我以文約我以禮而已無他說也然二者亦非截然判先後為二事猶之行者目視足履動輒相應蓋亦交進而互相發也故知之明則行愈逺而行之力則所知又益精矣其所以為致知力行之地者必以敬為主敬者主一無適之謂所以提撕警省此心使之惺惺乃心之生道而聖學所以貫動靜徹終始之功也能敬則中有涵養而大本清明由是而致知則心與理相涵而無頑冥之患由是而力行則身與事相安而不復有扞格之病矣雖然人性均善均可與適道而鮮有能從事於斯者由其二病一則病於安常習故而不能奮然立志以求自拔二則病於偏執私主而不能豁然虛心以求實見蓋必如孟子以舜為法於天下而我猶未免為鄉人者為憂必期如舜而後已然後為能立志必如顔子以能問於不能以多問於寡有若無實若虛然後能為虛心既能立志而不肯自棄又能虛心而不敢自是然後聖門用工節目循序而進日有維新之益升堂入室惟吾之所欲而無所阻矣此又學者所當深自警也西山真氏曰學者觀聖人論人之得失皆當反而觀己之得失然後為有補云程子云涵養須用敬進學則在致知蓋窮理以此心為主必須以敬自持使心有主宰無私意邪念之紛擾然後有以為窮理之基本心既有所主宰矣又須事事物物各窮其理然後致盡心之功欲窮理而不知持敬以養心則私慮紛紜精神昏亂於義理必無所得知持敬以養心矣而不知窮理則此心雖清明虛靜又只箇空蕩蕩底物事而無許多義理以為之主其於應事接物必不能皆當釋氏禪學正是如此故必以敬涵養而又講學審問慎思明辨以致其知則於清明虛靜之中而衆理悉備其靜則湛然寂然而為未發之中其動則泛應曲當而為中節之和天下義理學者工夫無以加於此自伊川發出而文公又從而闡明之中庸尊德性道問學章即此意也學問之道有三曰省察也克治也存養也是三者不容以一闕也夫學者之治心猶其治疾然省察焉者視脉而知疾也克治焉者用藥以去疾也而存養者則又調虞愛護以杜未形之疾者也聖賢大道為必當繇異端邪徑為不可蹈此明趨向之要也非義而富貴逺之如垢汚不幸而賤貧甘之如飴蜜志道而遺利重內而輕外此審取舍之要也欲進此二者非學不能學必讀書然書不可以泛讀先大學次論孟而終之以中庸經既明然後可觀史此其序也沈潜乎訓義反覆乎句讀以身體之以心驗之循序而後進熟讀而精思此其法也然所以維持此心而為讀書之地者豈無要乎亦曰敬而已矣子程子所謂主一無適者敬之存乎中者也整齊嚴肅者敬之形於外者也平居齊栗如對神明言動酬酢不失尺寸則心有定主而理義入矣蓋操存固則知識明知識明則操存愈固子朱子之所以教人大略如此潛室陳氏曰橫渠云未知立心患思多之致疑蓋立心持敬之謂先立箇主人翁了方做得窮理格物工夫問伊川云盡性至命必本於孝弟窮神知化由通於禮樂不知孝弟何以能盡性至命不知禮樂何以能窮神知化曰盡性至命窮神至化皆聖人事欲學聖人皆從實地上做起升髙必自下陟遐必自邇此聖門切實之學積纍之久將自有融液貫通處非謂一蹴便能問明道以記誦博識為玩物喪志如何曰徒記誦該博而理學不明不造融㑹貫通處是逐其小者忘其大者反以無用之物纍其空明之心是為玩物喪志問明道謂學不言而自得者乃自得也有安排布置者皆非自得也安排布置須是見於施設以安排布置為非自得如何曰安排布置非是見於設施謂此心此理未到純熟兩忘地位必有營度計慮之勞逆施偷作之病才到自得處則心便是口理便是心心與理忘口與心忘處處安行自在默識心通不用安排布置也記問之學雖博而有限中窒故也義理之學至約而無窮中明故也鶴山魏氏曰氣質之禀自非生知上知寧能無偏學則所以矯其偏而復於正也然今之學者有二繇博以致約則斂華而就實故志為之主愈斂則愈實愈久則愈明或者唯博之趨若可以譁世取榮然氣為之主氣衰則志索於是有始鋭而終惰始明而終暗者矣雙峯饒氏曰為學之方其大略有四一曰立志二曰居敬三曰窮理四曰反身若夫趨向卑陋而此志之不立特養疏略而此心之不存講學之功不加而所知者昏蔽反身之誠不篤而所行者悖戾將見人欲愈熾天理愈微本心一亡亦將何所不至哉人之為學莫先於立志立志之初當先於分别古今人品之髙下孰為可尊可慕而可法孰為可賤可惡而可戒此入德之先務也此志既立然後講學以明志力行以充之則德之進也浩乎其不可禦矣君子之學不守諸約則泛濫支離固無以為體道之本不知其其博則狹陋偏黨亦無以盡道體之全存養省察致知力行闕一不可誠之為道無所不體自學者言之敬所以存心也敬立則內直義所以制事也義形則外方二者皆學者切己之事茍非有誠意以為之則敬非真敬而其為敬也必疏略義非實義而其為義也必駁雜所謂不誠無物也今之學者所以不能學為聖賢者其大患在於無志其次在於無所守蓋人而無志則趨向卑陋不足與議髙明光大之事業勉之以道義則曰難知難行期之以聖賢則曰不可企及不過終身汩汩為鄉里之庸人而已何足與有為哉人而無守則見利必趨見害必避平居非不粗知義理至於臨事則為利欲所驅而有所不暇顧何足與有所立哉仁者天地生物之心而人得之以為心義禮智信之理皆具於中而為心之全德者也此雖人心之所固有然學者茍無存養體驗之功則氣質物欲有以蔽之而無以識其體之實有於已矣幸而有以識其體之實有於已矣然或不能博學於文講求義理以栽培之則如孤根獨立而無所㙲培非特無以助其生長而使之進於盛大亦恐風霜雕摧而其根將不能以自存也魯齊許氏曰凡為學之道必須一言一句自求已事如六經語孟中我所未能當勉而行之或我所行不合於六經語孟中便須改之先務躬行非止誦書作文而已臨川吳氏曰學者之於道其立志當極乎逺大而用功必循夫近小逺大者何究其源也近小者何有其漸也漸者自流遡源而不遽以探原為務也道之有原如水之有原人之學道如禹之治水禹之治水也治河必自下流始兖州之功為多而冀川次之河之外名川三百支川三千無所不理若畎若澮田間水道爾亦濬之以距于川其不遺近小也如是聖門教人自庸言庸行之常至一事一物之微諄切平實未嘗輕以道之大原示人也仁道之大子所罕言聖人豈有隱哉三百三千之儀流分𣲖别殆猶三千三百之川雖瑣細繁雜然無一而非道之用子貢之頴悟曽子之誠篤皆俟其每事用力知之既遍行之既周而後引之㑹歸于一以貫之之地無子貢曽子平日積纍之功則一貫之㫖不可得而聞也近世程子受學於周子太極一圖道之大原也程子之所手授而終身祕藏一語曽莫之及寧非有深慮乎朱子演繹推明之後此圖家傳人誦宋末之儒髙談性命者比比誰是真知實行之人蓋有不勝其弊者矣夫小德之川流道之𣲖也大德之敦化道之原也未周遍乎小德而欲窺覘乎大德舍𣲖而尋原者也所貴乎學者以其能變化氣質也學而不足以變化氣質何以學為哉世固有率意而建功立業者矣亦有肆情而敗國殄民者矣彼其或剛或柔或善或惡任其氣質之何如而無復矯揉克治以成今學者則不如是昏可變而明也弱可變而强也貪可變而亷也忍可變而慈也學之為用大矣哉凡氣質之不美皆可變而美况其生而美者乎為學而逐逐於欲役役於利汩沒於卑汚茍賤以終其身與彼不學者曽不見其少異是何也所學非吾所謂學也夫今之學者之學不過二端讀書與為文而已矣讀書所以求作聖人之路徑而或徒以資口耳為文所以述垂世之訓辭而或徒以眩華采如是而學欲以變化其氣質不亦難乎宜其愈學而無益雖皓首沒世猶夫人也勉生於不足不勉生於足不足則勉勉則進足則不勉不勉則止昔之聖賢兢兢業業孜孜汲汲不自足故也世之自以為有餘者反是敏不敏天也學不學人也天者不可恃而人者可勉也蟹不如蚓駑可以及驥何也敏而不學猶不敏也不敏而學猶敏也夫子上聖也而好學顔子大賢也而好學古之人不恃其天資之敏也如此既敏且學則事半而功倍性理大全書卷四十五

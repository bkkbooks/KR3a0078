body:
  text: 性理大全書卷二十二律吕新書一古樂之亡乆矣然秦漢之間去周未逺其器與聲猶有存者故其道雖不行於當世而其為法猶未有異論也逮於東漢之末以接西晉之初則已浸多説矣厯魏周齊隋唐五季論者愈多而法愈不定爰及我朝功成治定理宜有作建隆皇祐元豐之間蓋亦三致意焉而和胡阮李范馬劉楊諸賢之議終不能以相一也而况於崇宣之季姦諛之㑹黥湼之餘而能有一語夫天地之和哉丁未南狩今六十年神人之憤猶有未攄是固不皇於稽古禮文之士然學士大夫因仍簡陋遂無復以鐘律為意者則已甚矣吾友建陽蔡君元定季通當此之時乃獨心好其説而力求之旁搜逺取巨細不捐積之累年乃若㝠契著書両卷凡若干言予嘗得而讀之愛其明白而淵深縝密而通暢不為牽合附㑹之談而横斜曲直如珠之不出於盤其言雖多出於近世之所未講而實無一字不本於古人已試之成法蓋若黄鍾圍徑之數則漢斛之積分可攷寸以九分為法則淮南太史小司馬之説可推五聲二變之數變律半聲之例則杜氏之通典具焉變宫變徵之不得為調則孔氏之禮疏因亦可見至於先求聲氣之元而因律以生尺則尤所謂卓然者而亦班班雜見於両漢之制蔡邕之説與夫國朝㑹要以及程子張子之言顧讀者不深考其間雖或有得於此而又不能無失於彼是以晦蝕紛拏無復定論大抵不拘攣於習熟見聞之近即肆其胷臆妄為穿穴而無所㨿依季通乃能奮其獨見超然逺覧爬梳剔抉参互攷㝷用其半生之力以至於一旦豁然而融㑹貫通焉斯亦可謂勤矣及其著論則又能推原本根比次條理撮取機要闡䆒精微不為浮詞濫説以汩亂於其間亦庶㡬乎得書之體者予謂國家行且平定中原以開中天之運必將審音協律以諧神人當是之時受詔典領之臣能得此書而奏之則東京郊廟之樂將不待公孫述之瞽師而後備而参摹四分之書亦無待乎後世之子雲而後知好之矣抑季通之為此書詞約理明初非難讀而讀之者徃徃未及終篇輙已欠伸思睡固無由了其歸趣獨以予之頑鈍不敏乃能熟復數過而僅得其指意之彷彿季通於是亦許予為能知己志者故屬予以序引而予不得辭焉季通更欲均調節族被之管弦别為樂書以䆒其業而又以其餘力發揮武侯六十四陳之圖緒正邵氏皇極經世之厯以大備乎一家之書其用意亦健矣予雖老病儻及見之則亦豈非千古之一快也哉淳熙丁未正月朔旦新安朱熹序朱子曰荼神與名發博學强記高簡廓落不能與世俗相俯仰因去遊四方聞見益廣遂於易象天文地理三式之説無所不通而皆能訂其得失杜門掃執専以讀書教子為事季通生十年即教使讀西銘稍長則示以程氏語録邵氏絰世張氏正䝉而語之曰此孔孟正脉也季通承厥志學行之餘尤䆳律厯討論定著遂成一家之言使千古之誤曠然一新而遡其源流皆有成法是以足以顯其親於無窮矣季通律書法度甚精近世諸儒皆莫能及季通律書分明是好却不是臆說自有按據季通理㑹樂律大段有心力看得許多書劉文簡公爚曰先生天資高聞道早於書無所不讀於事無所不講明陰陽消長之運逹古今盛衰之理上稽天時下攷人事文公嘗曰人讀易書難季通讀難書易又曰造化㣲妙惟深於理者識之吾與季通言而未甞厭也西山真氏曰先生嘗特召堅辭不起世謂之聘君聘君以師事文公而文公顧曰季通吾老友也凡性與天道之妙他弟子不得聞者必以語季通焉異篇粤傳微辭䆳㫖先今討究而後親折𠂻之先生於經無不通嘗語三子曰淵汝宜紹吾易學曰沉汝宜演吾皇極數而春秋則以屬知方焉黄瑞節曰按蔡氏祖子孫於斯文可知也而盛時逵引三世一轍朱子云蔡神與所以教其子不干利祿而開之以聖賢之學其志識髙逺非世人所及西山先生辭聘不起九峯先生三十嵗即棄舉子業一以聖賢為師九峯之子抗始擢進士第理宗寳祐參政云律呂書蓋朱恭師弟子相與成之者朱子與西山書云但用古書古語或注疏而以巳意附其下方甚簡約而極周盡學者一覧可見梗槩其他推說之泛濫旁正之異同不盡載也律吕本原黄鐘第一以漢志斛銘文定長九寸空圍九分積八百一十分按天地之數始於一終于十其一三五七九為陽九者陽之成也其二四六八十為隂十者隂之成也黄鐘者陽聲之始陽氣之動也故其數九分寸之數具于聲氣之元不可得而見及斷竹為管吹之而聲和候之而氣應而後數始形焉均其長得九寸審其圍得九分此章凡言分者皆十分寸之一積其實得八百一十分長九寸圍九分積八百一十分是為律本度量衡權於是而受法十一律由是而損益焉算法置八百一十分分作九重毎重得九分圓田術三分益一得一十二以開方法除之得三分四釐六毫强為實徑之數不盡二毫八絲四忽今求圓積之數以徑三分四釐六毫自相乗得十一分九釐七毫一絲六忽加一開方不盡之數二毫八絲四忽得一十二分以管長九十分乗之得一千八十分為方積之數四分取三為圓積得八百一十分朱子曰本原第一章圍徑之數此是最大節目不可草草又曰古者只説空圍九分不説徑三分蓋不啻三分猶有竒也圍魯齊彭氏曰黄鐘律管有周有徑有面羃有空内積有從長如史記論從長律厯志論從長及積東漢鄭氏注月令論羃東漢蔡氏月令章句論從長皆不易之論獨周徑之説漢以前俱無明文漢律厯志聞端未竟東漢蔡氏始創為徑三分之説晉孟氏以後諸儒續為徑三分圍九分之説宋胡氏蔡氏乂為徑三分四釐六毫圍十分三釐八毫之説然攷之古方圍周徑羃積率皆未有合嘗依東漢蔡氏所言徑三分以九章少廣内祖氏密率乗除止得空圍内面羃七分七釐竒乃少一分九十二釐竒空圍内積實止得六百三十六分竒乃少一百七十三分竒如此則黄鐘之管無乃太狹蓋黄鐘空積忽微若徑内差一忽即面羃及積所差忽數至多此東漢蔡氏之説所以不合也晉孟氏諸儒言徑三分圍九分又用徑一圍三之法雖是古率然古人大約以此圓田若以密率推之徑一則圍三有竒假如徑七則圍當二十有二今依孟氏所言徑三分則圍長當九分四釐二毫一秒彊不但止於九分也若依九分圍長之數則徑當止有二分八釐六毫二秒六忽彊又不及三分也此晉孟氏諸儒之説所以不合也宋胡氏不主徑三圍九之説大意疑其管狹耳然所言徑長三分四釐六毫圍長十分三釐八毫亦用徑一圍三之率若依所言三分四釐六毫徑當得圍長十分八釐七毫六秒二忽彊不但止於十分三釐八毫也若依十分三釐八毫圍長之數則徑止得三分三釐竒又不及三分四釐六毫也此宋胡氏之説所以不合也宋蔡氏説徑圍分數與胡氏同至於筭法用圓田術三分益一得一十二開方除之求徑又以徑相乗以管長乗之用三分益一四分退一之法求羃積今姑依其説以九分平置囲又三分益一以三方分割置於九方分之外如此共積十二方分其從横可得三分四釐六毫彊不盡二毫八絲四忽的如蔡氏之説但依此徑以密率相乗則空圍内面羃不但止得九方分乃得九方分零四十釐六十毫五十七秒十四忽竒空圍内積實不但止得八百一十分乃得八百四十六分五百四十五釐一百四十二秒六百忽竒如此則黄鐘之管無乃太大細考之方内之圓所占者不止四分三圓外之方所當退者又不及四分一以此之三分益一四分退一乃虚加實退筭家大約之法此宋蔡氏之説所以又不能以盡合也今欲求黄鐘律管從長周徑羃積的實定數者須依蔡氏多截管候氣之説又以祖氏冲之密率乗除方可昰祖冲之乃古今筭家之最而蔡氏多截管候氣之説實得造律本原其説有前人未發者今宜依此説先多截竹以擬黄鐘之管或短或長長短之内毎差纎微各為一管悉以此諸管埋地中俟冬至時驗之若諸管之中有氣應者即取其管而計之知此管合於造化自然非人力可為即以此管分作九寸寸作九分分作九釐釐作九毫毫作九秒秒作九忽以合八十一終天之數及元氣運行自子至亥得十七萬七千一百四十七之數凡用此管三分損益上下相生由此又取此管九寸寸作十分分作十釐釐作十毫毫作十秒秒作十忽以合天地五位終於十之數乃以十乗八十一得八百一十分以八百一十分配九十分管知此管長九十分空圍中容八百一十分即十分管長空圍中容九十分一分管長空圍中容九分凡求度量衡由此乃以此管面空圍中所容九分以平方羃法推之知一分有百釐釐有百毫毫有百秒秒有百忽積而計之一平方分通有面羃一萬萬忽九平方分通有面羃九萬萬忽乃以此九萬萬忽依筭經少廣章所載宋祖冲之密率乗除得圓周長的計十分六釐三毫六秒八忽萬分忽之六千三百一十二又一圓周求徑計三分三釐八毫四秒四忽萬分忽之五千六百四十五又以半徑半周相乗仍得九萬萬忽内一忽弱通得而羃九平方分也既以周徑相乗復得面羃如此則黄鐘之廣與長及空圍内積實皆可計矣故而羃計九方分深一分管則空圍内當有九立方分深九十分管計九寸則空圍内當有八百一十立方分此即黄鐘一管之實其數與天地造化無不相合此算法所以成也算法既成之後或以竹或以銅别為之依其長各作八十一分以為十二律相生之法又依其長作九十分乃取九十分之分計三分三釐八毫四秒四忽萬分忽之五千六百四十五以合孔徑如此則圓長面羃與夫空圍内積自然無不諧㑹特徑數自八毫以下非可細分而算法積忽與秒不容不然黄鐘之實二以淮南子漢前志定其寸分釐毫子一黄鐘之律丑三為絲法寅九為寸數卯二十七為毫法辰八十一為分數已二百四十三為釐法午七百二十九為釐數未二千一百八十七為分法申六千五百六十一為毫數酉一萬九千六百八十三為寸法戌五萬九千四十九為絲數亥一十七萬七千一百四十七黄鐘之實按黄鐘九寸以三分為損益故以三厯十二辰得一十七萬七千一百四十七為黄鐘之實其十二辰所得之數在子寅辰午申戌六陽辰為黄鐘寸分釐毫絲之數子為黄鐘之律寅為九寸辰為八寸一分午為七百二十九釐申為六千五百六十一毫戌為五萬九千四十九絲在亥酉未己卯丑六隂辰為黄鐘寸分釐毫絲之法亥為黄鐘之實酉之一萬九千六百八十三為寸未之二千一百八十七為分巳之二百四十三為釐卯之二十七為毫丑之三為絲其寸分釐毫絲之法皆用九數故九絲為毫九毫為釐九釐為分九分為寸為黄鐘蓋黄鐘之實一十七萬七千一百四十七之數以三約之為絲者五萬九千四十九以二十七約之為毫者六千五百六十一以二百四十三約之為釐者七百二十九以二千一百八十七約之為分者八十一以一萬九千六百八十三約之為寸者九由是三分損益以生十一律焉或曰徑圍之分以十為法而相生之分釐毫絲以九為法何也曰以十為法者天地之全數也以九為法者因三分損益而立也全數者即十而取九相生者約十而為九即十而取九者體之所以立約十而為九者用之所以行體者所以定中聲用者所以生十一律也或問算到十七萬有餘之數當何用朱子曰以定管之長短而出是聲大抵考究其法是如此黄鐘生十一律第三子一分一為九寸丑三分二一為三寸寅九分八一為一寸卯二十七分十六三為一寸一為三分辰八十一分六十四九為一寸一為一分巳二百四十三分一百二十八二十七為一寸三為一分一為三釐午七百二十九分五百一十二八十一為一寸九為一分一為一釐未二千一百八十七分一千二十四二百四十三為一寸二十七為一分三為一釐一為三毫申六千五百六十一分四千九十六七百二十九為一寸八十一為一分九為一釐一為一毫酉一萬九千六百八十三分八千一百九十二二千一百八十七為一寸二百四十三為一分二十七為一釐三為一毫一為三絲戌五萬九千四十九分三萬二千七百六十八六千五百六十一為一寸七百二十九為一分八十一為一釐九為一毫一為一絲亥一十七萬七千一百四十七分六萬五千五百三十六一萬九千六百八十三為一寸二千一百八十七為一分二百四十三為一釐二十七為一毫三為一絲一為三忽按黄鐘生十一律子寅辰午申戌穴陽辰皆下生丑卯巳未酉亥六隂辰皆上生其上以三歴十二辰者皆黄鐘之全數其下隂數以倍者即筭法倍其實三分本律而損其一也陽數以四者即筭法四其實三分本律而増其一也六陽辰當位自得六隂辰則居其衝其林鐘南吕應鐘三吕在隂無所増損其大吕夾鐘仲吕在陽則用倍數方與十二月之氣相應盖隂之從陽自然之理也習軒吳氏曰子一分者數起子得一也丑三分二者三其法為三分両其實為二也寅九分八者三其法為九分四其實為八也以下生者倍其實一上生者四其實也其法以子析為三分毎分五萬九千四十九丑於三分之中得其二為十一萬八千九十八積六寸為林鐘此黄鐘之實三分損一下生林鐘也以子一析為九分每分得萬九千六百八十三寅於九分之中得其八為十五萬七千四百六十四積八寸為太簇此林鐘之實三分益一上生太簇也自卯而下放此黄瑞節曰其上云者十二辰分字以上如子一分丑三分是也其下云者十二辰分字以下如二八十六是也其上為黄鐘全數其下為損益相生之數圖此損益數即下章十二律實數呉氏算法全載類今舉二律起例附此未子為陽辰黄鐘當位自得也丑為未衝林鐘以而居丑居其衝也他放此衝二作衝餘載後辦證十二律之實第四子黄鐘十七萬七千一百四十七全九寸半無丑林鐘十一萬八千九十八全六寸半三寸不用寅太簇十五萬七千四百六十四全八寸半四寸卯南吕十萬四千九百七十六全五寸三分半二寸六分不用辰姑洗十三萬九千九百六十八全七寸一分半三寸五分已應鐘九萬三千三百一十二全四寸六分六釐半二寸三分三釐不用午㽔賔十二萬四千四百一十六全六寸二分八釐半三寸一分四釐未大吕十六萬五千八百八十八全八寸三分七釐六毫半四寸一分八釐三毫申夷則十一萬五百九十二全五寸五分五釐一毫半二寸七分二釐五毫酉夾鐘十四萬七千四百五十六全七寸四分三釐七毫三絲半三寸六分六釐三毫六絲戌無射九萬八千三百四全四寸八分八釐四毫八絲半二寸四分四釐二毫四絲亥仲吕十三萬一千七十三全六寸五分八釐三毫四絲六忽餘二筭半三寸二分八釐六毫二絲二忽按十二律之實約以寸法則黄鐘林鐘太簇得全寸約以分法則南吕姑洗得全分約以釐法則應鐘㽔賔得全釐約以毫法則大吕夷則得全毫約以絲法則夾鐘無射得全絲至仲吕之實十三萬一千七十二以三分之不盡二筭其數不行此律之所以止於十二也變律第五黄鐘十七萬四千七百六十二小分四百八十六全八寸七分八釐一毫六絲二忽不用半四寸三分八釐五毫三絲一忽林鐘十一萬六千五百八小分三百二十四全五寸八分二釐四毫一絲一忽三初半二寸八分五釐六毫五絲六初太簇十五萬五千三百四十四小分四百三十二全七寸八分二毫四絲四忽七初不用半三寸八分四釐五毫六絲六忽八初南吕十萬三千五百六十三小分四十五全五寸二分三釐一毫六絲一初六秒半二寸五分六釐七絲四忽五初三秒姑洗十三萬八千八十四小分六十全七寸一釐二毫二絲一初二秒不用半三寸四分五釐一毫一絲一初一秒應鐘九萬二千五十六小分四十全四寸六分七毫四絲三忽一初四秒半二寸三分三毫六絲六忽六秒彊不用按十二律各自為宫以生五聲二變其黄鐘林鐘太簇南吕姑洗應鐘六律則能具足至㽔賔大吕夷則夾鐘無射仲吕六律則取黄鐘林鐘太簇南吕姑洗應鐘六律之聲少下不和故有變律變律者其聲近正而少高於正律也然仲吕之實一十三萬一千七十二以三分之不盡二筭既不可行當有以通之律當變者有六故置一而六三之得七百二十九以七百二十九因仲吕之實十三萬一千七十二為九千五百五十五萬一千四百八十八三分益一再生黄鐘林鐘太簇南吕姑洗應鐘六律又以七百二十九歸之以從十二律之數紀其餘分以為忽秒然後洪纎高下不相奪倫至應鐘之實六千七百一十萬八千八百六十四以三分之又不盡一筭數又不可行此變律之所以止於六也變律非正律故不為宫也朱子曰自黄鐘至仲吕相生之道至是窮矣遂復變而上生黄鐘之宫再生之黄鐘不及九寸只是八寸有餘然黄鐘君象也非諸宫之所能役故虚其正而不復用所用只再生之變者就再生之變又缺其半所謂缺其半者盖若大吕為宫黄鐘為變宫時黄鐘管長最所以只得用其半其餘宫亦放此律生五聲圖第六宫聲八十一商聲七十二角聲六十四徵聲五十四羽聲四十八按黄鐘之數九九八十一是為五聲之本三分損一以下生徵徵三分益一以上生商商三分損一以下生羽羽三分益一以上生角至角聲之數六十四以三分之不盡一筭數不可行此聲之數所以止於五也或曰此黄鐘一均五聲之數他律不然曰置本律之實以九九因之三分損益以為五聲再以本律之實約之則宫固八十一商亦七十二角亦六十四徵亦五十四羽亦四十八矣假令應鐘九萬三千三百一十二以八十一乗之得七百五十五萬八千二百七十二為宫以九萬三千三百一十二約之得八十一三分宫損一得五百三萬八千八百四十八為徵以九萬三千三百一十二約之得五十四三分㣲益一得六百七十一萬八千四百六十四為商以九萬三千三百一十二約之得七十二三分商損一得四百四十七萬八千九百七十六為羽以九萬三千三百一十二約之得四十八三分羽益一得五百九十七萬一千九百六十八為角以九萬三千三百一十二約之得六十四變聲第七變宫聲四十二小分六變徵聲五十六小分八按五聲宫與商商與徵徵與羽相去各一律至角與徵羽與宫相去乃二律相去一律則音節和相去二律則音節逺故角徵之間近徵収一聲比徵少下故謂之變徵羽宫之間近宫収一聲少高於宫故謂之變宫也角聲之實六十有四以三分之不盡一筭既不能行當有以通之聲之變者二故置一而両三之得九以九因角聲之實六十有四得五百七十六三分損益再生變徵變宫二聲以九歸之以徵五聲之數存其餘數以為强弱至變徵之數五百一十二以三分之又不盡二筭其數又不行此變聲所以止於二也變宫變徵宫不成宫徵不成徵古人謂之和繆又曰所以濟五聲之不及也變聲非正故不謂調也朱子曰五聲之序宫最大而沉濁羽最細而輕清商之大次宫徵之細次羽而角居四者之中焉然世之論中聲者不以角而以宫何也曰凡聲陽也自下而上未及其半則屬于隂而未暢故不可用上而及半然後屬于陽而始和故即其始而用之以為宫因其毎變而益上則為商為角為變徵為徵為羽為變宫而皆以為宫之用焉是以宫之一聲在五行為土在五常為信在五事為思盖以其正當衆聲和與未和用與未用隂陽際㑹之中所以為盛若角則雖當五聲之中而非衆聲之㑹且以七均論之又有變徵以居焉亦非五聲之所取正也然自其聲之始和者推而上之亦至於變宫而止耳自是而上則又過乎輕清而不可以為宫於是就其両間而細分之則其别又十有二以其最大而沉濁者為黄鐘以其極細而輕清者為應鐘反其旋相為宫而上下相生以盡五聲二變之用則宮聲常不越乎十二之中而四聲者或時出於其外以取諸律半聲之管然後七均偮而一調成也黄鐘之與餘律其所以為貴賤者亦然若諸半聲以上則又過乎輕清之外而不可以為樂矣盖黄鐘之宫始之始中之中也十律之宫始之次而中少過也應鐘之宫始之中而中已盡也諸律半聲過乎輕清始之外而中之上也半聲之外過乎輕清之甚則又外之外上之上而不可為樂者也正如子時初四刻屬前一日正四刻屬後日其両日之間即所謂始之始中之中也然則聲自屬隂以下亦當黙有十二正變半律之地以為中聲之前段如子初四刻之為者但無聲氣之可紀耳由是論之則審音之難不在於聲而在於律不在於宮而在於黄鐘蓋不以十二律節之則無以著夫五聲之實不得黄鐘之正則十一律者又無所受以為本律之宫也八十四聲圖第八正律墨書變律朱書半聲朱書半聲墨書十一月黄鐘宫六月林鐘宫黄鐘徵正月太簇宫林鐘徴黄鐘商八月南吕宫太簇徵林鐘商黄鐘商三月姑洗宫南吕徴太簇商林鐘羽黄鐘角十月應鐘宫姑洗徵南吕商太簇羽林鐘角黄鐘變宫五月㽔賔宫應鐘徴姑洗商南吕羽太簇角林鐘變宫黄鐘變徵十二月大吕宫㽔賔徴應鐘商姑洗羽南吕角太簇變宫林鐘變徵七月夷則宫大吕徵㽔賔商應鐘羽姑洗角南吕變宫太簇變徵二月夾鐘宫夷則徴大吕商㽔賔羽應鐘角姑洗變宫南吕變徴九月無射宫夾鐘徵夷則商大吕羽㽔賔角應鐘變宫姑洗變徵四月仲吕宫無射徴夾鐘商夷則羽大吕角㽔賔變宫應鐘變徴黄鐘變仲吕徵無射商夾鐘羽夷則角大吕變宫㽔賔變徵林鐘變仲吕商無射羽夾鐘角夷則變宫大吕變徵太簇變仲吕羽無射角夾鐘變宫夾射變徵南吕變仲吕角無射變宫夾鐘變徵姑洗變仲吕變宫無射變徵應鐘變仲吕變徵按律吕之數徃而不返故黄鐘不復為他律役所用七聲皆正律無空積忽㣲自林鐘而下則有半聲大吕太簇一半聲夾鐘姑洗二半聲㽔賔林鐘四半聲夷則南吕五半聲無射應鐘六半聲仲吕為十二律之窮三半聲自㽔賔而下則有變律㽔賔一變律大吕二變律夷則三變律夾鐘四變律無射五變律仲吕六變律皆有空積忽微不得其正故黄鐘獨為聲氣之元雖十二律八十四聲皆黄鐘所生然黄鐘一均所謂純粹中之純粹者也八十四聲正律六十三變律二十一六十三者九七之數也二十一者三七之數也或問聲氣之元朱子曰律歴家最重這元聲元聲一定向下都定元聲差下都差六十調圖第九以周禮淮南子禮記鄭氏註孔氏正義定宫商角變徵徵羽變宫黄鐘宫黄正大正姑正㽔正林正南正應正無射商無正黄變半太變半姑變半仲半林變半南變半夷則角夷正無正黄變半太變半夾半仲半林變半仲吕徵仲正林變南變應變黄變半太變半姑變半夾鐘羽夾正仲正林變南變無正黄變半太變半大吕宫大正夾正仲正林變夷正無正黄變半應鐘商應正大半夾半仲半㽔半夷半無半南吕角南正應正大半夾半姑半㽔半夷半㽔賔徵㽔正夷正無正黄變半大半夾半仲半姑洗羽姑正㽔正夷正無正應正大半夾半太簇宫太正姑正㽔正夷正南正應正大半黄鐘商黄正大正姑正㽔正林正南正應正無射角無正黄變半太變半姑變半仲半林變半南變半林鐘徵林正南正應正大半太半姑半㽔半仲吕羽仲正林變南變應變黄變半太變半姑變半夾鐘宫夾正仲正林變南變無正黄變半太變半大吕商大正夾正仲正林變夷正無正黄變半應鐘角應正大半夾半仲半㽔半夷半無半夷則徵夷正
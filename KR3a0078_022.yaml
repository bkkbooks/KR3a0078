升始於子午雖隂生而陽之升于上者未巳至亥而後窮上反下隂之升始于午子雖陽生而隂之升于上者亦未巳至巳而後窮上反下律於隂則不書故終不復始也是以升陽之數自子至已差彊在律為尤彊在吕為少弱自午至亥漸弱在律為尤弱在吕為差彊分數多寡雖若不齊然其絲分毫别各有條理此氣之所以飛灰聲之所以中律也或曰易以道隂陽而律不書隂何也曰易者盡天下之變善與惡無不備也律者致中和之用止於至善者也以聲言之大而至於雷霆細而至於蠛蠓無非聲也易則無不備也律則寫其所謂黄鐘一聲而已矣雖有十二律六十調而實一黄鐘也是理也在聲為中聲在氣為中氣在人則喜怒哀樂未發與發而中節也此聖人所以一天人賛化育之道也魯齋彭氏曰西山蔡氏所述禮記月令章句蔡邕說也如邕所云則是為十二月律有室内十二辰若其月氣至則辰之管灰飛而管空也然則十二月各當其辰斜埋地下入地處庳出地處髙故云内庳外髙黄鐘之管埋于子位上頭向南以外諸管推之可悉知又律書云以河内葭莩為灰宜陽金門山竹為管熊氏云灰實律管以羅縠覆之氣至則吹灰動縠矣又長樂陳氏曰候氣之法造室三重各啟門為門之位外之以子中之以午内復以子楊子所謂九閉之中也盖布緹縵室中上圓下方依辰位埋律管使其端與地齊而以薄紗覆之中秋白露䧏採葭莩為灰加管端以候氣至灰去為氣所動者灰散為物所動者灰聚今採諸說具圖云審度第十一度者分寸尺丈引所以度長短也生於黄鐘之長以子榖秬黍中者九十枚度之一為一分凡黍實於管中則十三黍三分黍之一而滿一分積九十分則千有二百黍矣故此九十黍之數與下章千二百黍之數其實一也十分為寸十寸為尺十尺為丈十丈為引數始於一終於十者天地之全數也律未成之前有是數而未見律成而後數始得以形焉度之成在律之後度之數在律之前故律之長短圍徑以度之寸分之數而定焉嘉量第十二量者龠合升斗斛所以量多少也生於黄鐘之容以子榖秬黍中者一千二百實其龠以井水准其槩以度數審其容一龠積八百一十分合龠為合両龠也積一千六百二十分十合為升二十龠也積一萬六千二百分十升為斗百合二百龠也積十六萬二千分十斗為斛二千龠千合百升也積一百六十二萬分謹權衡第十三權衡者銖両斤鈞石所以權輕重也生于黄鐘之重以子榖秬黍中者一千二百實其龠百黍一銖一龠十二銖二十四銖為一両両龠也十六両為斤三十二龠三百八十四銖也三十斤為鈞九百六十龠一萬一千五百二十銖四百八十両也四鈞為石三千八百四十龠四萬六千八十銖一萬九百二百両也性理大全書卷二十二

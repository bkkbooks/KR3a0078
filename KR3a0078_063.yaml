body:
  text: 性理大全書卷六十三厯代五晉元帝或問晉元帝所以不能中興者其病安在朱子曰元帝與王導元不曽有中原志收拾吳中人情惟欲宴安南軒張氏曰為國有大幾大幾一失則其弊隨起而不可禁所謂大幾三綱之所存是也晉元帝初以懷帝之命來臨江左當時之意固以時事艱難分建賢王以為屏翰庶幾增國家之勢折姦宄之心緩急之際實賴其糾率義旅入衛王室其責任蓋不輕矣而琅琊之入建業考觀其規模以原其心度之所安蓋有自為封殖之意而無慷慨謀國之誠懷帝卒以蒙塵迄不聞勤王之舉愍帝之立增重寄委制詔深切而亦自若也祖逖擊楫渡江聊復以兵應其請反從而制之使不得有為則其意不在中原也審矣坐視神州板蕩戎馬縱橫不以動其心不過欲因時自利云耳愍再蒙塵懼天下之議己則楊為出師之勢遷延顧望終歸罪於運餉稽緩斬一無辜令史以塞責赤眚之異亦深切矣吾誰欺欺天乎夫受君父之委託而坐視其禍變因時事之艱難而覬幸以自利三綱淪矣惟其大幾既失故其所以見國規模亦復不竸亂臣賊子如王敦輩不旋踵而起蓋其弊有以致之也使元帝痛懷愍之難篤君臣之義念家國之讎率江東英俊鼓忠義之氣北向討賊名正理順安知中原無響應者以區區一祖逖倔強自立於羣雄之間猶幾以自振况肺腑之親總督之任數路之勢何所不濟哉惟其不以大公為心而私意蔽之甚可歎息也溫嶠南軒張氏曰溫太真忠義慷慨風節表著足以為晉室名臣古今所共推不待詳言然吾獨有所恨者絶𥚑之事也太真少時常以孝友篤至稱一旦奉劉琨之檄將命江左母崔固止之不可至於絶裾而行噫太真有母在此身固不得以許琨矣獨不見徐元直之事乎元直所謂方寸亂矣蓋其天性不可已者也而太真獨忍於此乎若既以委質為人之臣當危難而無避可也將命之舉豈無他人太真念母獨不得辭乎度其意不過以江左將興奉檄勸進徼幸投富貴之機赴功名之會耳而其所喪不過甚乎或曰使太真不來江左則寧復有後世之事業太真固不得以兩全矣此殆不然昔人之事業皆非有所為而為之事理至前因而有成之耳若懷希慕求必之心則其私欲而已茍可以就異日之事則凡背親賊性皆可以屑為此三綱之所由壞而弊之所由生也故伯夷叔齊不受其國夫子以為求仁而得仁商之三臣微子不得不去箕子不得不為奴比干不得不死皆素其位而行也豈直太真之事業為不足道就使太真能佐晉室克復神州一正天下勳烈如此浮雲之過太虛耳豈足以塞其天性之傷也夫太真順母之心而終其身雖泯滅無聞於後顧其所全者大於身無愧烏能以此易彼哉故豫謂太真稱為功名之士則可尚論古人則可憾矣顧榮賀循朱子曰東晉時所用人才皆中州浮誕者之後惟顧榮賀循有人望不得已而用之王導謝安殷浩或云庾亮欲移鎮石城興兵討趙王導許之郤鑒蔡謨等皆以為不可也范陽張氏曰晉以寡弱之師一旦討強暴之冦是無異驅羣羊以攻猛虎不格明矣使王道不知利害則導為不智知而許之則導為不忠不智不忠何以為導豫竊料其意蓋當是時導與庾亮有隙亮欲起兵以廢導於此復沮其謀適所以激彼之怒故不若陽且許之以快其情隂使郤鑒等拒之以絶其議此乃君子之待小人不得不然耳觀史者當逆其意可也或問老子之道曹參文帝用之皆有效何故以王謝之力量反做不成朱子曰王導謝安又何曽得老子妙處然謝安又勝王導石林説王導只是隨波逐流底人謝安却較有建立也煞有心於中原王導自渡江來只是恁地都無取中原之意此説也是但謝安也被這清虛絆了都做不得謝安之待桓溫本無䇿溫之來廢了一君幸而要討九錫要理資序未至太甚猶是半和秀才若他便做箇二十分賊如朱全忠之類更進一步安亦無如之何王儉平日自比謝安王儉是已敗闕底謝安謝安特幸未踈脫底王儉耳安比王儉只是有些英氣苻堅之來亦無措置前輩云非晉人之善乃苻堅之不善耳然堅只不合擁衆來謝安必有以料之兼秦人國內自亂晉亦必知之故安得以鎮靜待之堅之來在安亦只得發兵去迎敵當來苻堅若不以大衆來只以輕兵時擾晉邊便坐見狼狽因問萬正淳曰桓溫移晉祚時安能死節否曰必不能却須逃去曰逃將安往若非死節即北面事賊耳到這裏是築底處中間更無空地因説韋孝寬智略如此當楊堅篡周時尉遲逈等皆死孝寬乃獻金尉斗始嘗疑之既不與他為異亦何必如此結附之元來到這地位便不與辨亦不免死既不能死便只得失節耳又曰謝安之於符堅如近世陳魯公之於完顔亮幸而推得他死耳又曰如前代多有幸而不敗者如謝安桓溫入朝已自無䇿從其廢立九錫已成但故為遷延以俟其死不幸而病小蘇則將何以處之擁重兵上流而下何以當之於此看謝安果可當伏節死義之資乎或曰坦之倒持手板而安從容間雅似亦有執者曰世間自有一般心膽大底人如廢海西公時他又不能挋廢也得不廢也得大節在那裏南軒張氏曰符堅掃境入冦方是時晉室之勢亦甚殆矣梁益既非吾有而襄沔復為所破在他人宜恐懼失措之不暇而謝安方且從容應敵不過以江北軍事付之謝玄及劉之輩輩卒以成功蓋其方略素定非僥幸茍然也安明於用人考察既精不以親踈而廢玄有謀慮善使人而牢之勇鋭出衆安所施置各得其宜蓋用兵之道當以竒正相須使玄將重兵于後此正也使牢之將精兵迎擊於前此竒也秦兵既近洛澗牢之攖其鋒直搏而勝之固以奪其心矣淝水之戰其勝算已在目中故秦兵一退風聲鶴唳以至山川草木皆足以懼之惟牢之先奪其心故也安之方略可謂素定矣惟其素定故安靜而不撓其矯情鎮物豈固為是哉夫有所恃故耳至於却上流之兵又其一竒也得上流之兵不足以助益而適足以銷薄聲勢搖動人心桓沖是舉亦無謀矣吾慮既定一却其兵而戰士之心益固國內之情舉安安見之明且審矣嗟乎國之所恃者人才耳以當時晉室之勢獨任一謝安足以當符秦百萬之師以豫觀之非特安方略之妙抑其所存忠義純固負荷國事直欲與晉室同存亡故能運用英豪克成勳業誠與才合故也大抵立大事者非誠與才合不足以濟若安者其在東晉人物中傑出者哉或問晉殷浩謝安少有重名方其隱而未用也人皆以公輔期之或曰淵源不起如蒼生何或曰謝安不起當如蒼生何及其既用也謝安却符秦安晉室功業亦可無負而殷浩舉兵北伐師徒屢敗桓溫因朝野之怨而廢之如棄草芥夫人之擬二子則同而二子事業何其相逺潛室陳氏曰東晉諸賢大抵務養民節不務實用幸而成功則為謝安如其無成則為殷浩然安能矯情鎮物浩則遇事周章較是輸他一著也符堅程子曰符堅養民而用之一敗不復振無本故也或問符堅立國之勢亦堅牢治平許多年百姓愛戴何故一敗塗地更不可救朱子曰他是掃土而來所以一敗更救不得又問他若欲滅晉遣一良將提數萬之兵以臨之有何不可何必掃境而來曰他是急要做正統恐後世以其非正統故急欲亡晉此人性也急躁初令王猛滅燕猛曰既委臣陛下不必親臨及猛入燕忽然堅至蓋其心又恐猛之功大故親來分其功也便是他器量小所以後來如此孔明臨陳對敵意思安間如不欲戰而符堅踴躍不寐而興師此其敗不待至淝水而決矣桓溫朱子曰桓溫入三秦王猛來見眼中不識人却謂三秦豪傑未有至何也三秦豪傑非猛而誰可笑陶潛朱子曰陶淵明有髙志逺識不能俯仰時俗故作歸去來詞以見志抑以其自謂晉臣恥事二姓自劉裕將移晉祚遂不復仕則其意亦不為不悲矣然其詞義夷曠蕭散雖託楚聲而無其尤怨切蹙之病云張子房五世相韓韓亡不愛萬金之産弟死不葬為韓報讎雖博浪之謀不遂橫陽之命不延然卒藉漢滅秦誅項以攄其憤然後棄人間事導引辟榖託意寓言將與古之形解銷化者相期於八紘九垓之外使千載之下聞其風者想像歎息不知其心胸面目為何如人其志可謂壯哉陶元亮自以晉世宰輔子孫恥復屈身後代自劉裕篡奪勢成遂不肯仕雖其功名事業不少槩見而其髙情逸想播於聲詩者後世能言之士皆自以為莫能及也蓋古之君子其於天命民彛君臣父子大倫大法之所在惓惓如此是以大者既立而後節槩之髙語言之妙乃有可得而言者如其不然則紀逡唐林之節非不苦王維儲光羲之詩非不翛然清逺也然一失身於新莽祿山之朝則其平生之所辛勤而僅得以傳世者適足為後人嗤笑之資耳鶴山魏氏曰世之辨證陶氏者曰前後名字之互變也死生嵗月之不同也彭澤退休之年史與集所載之各異也然是所當考而非其要也其稱美陶公者曰榮利不足以易其守也聲味不足以纍其真也文詞不足以溺其志也然是亦近之而公之所以悠然自得之趣則未之深識也風雅以降詩人之詞樂而不淫哀而不傷以物觀物而不牽於物吟咏性情而不纍於情孰有能如公者乎有謝康之忠而勇退過之有阮嗣宗之逹而不至於放有元次山之漫而不著其迹此豈小小進退所能窺其際耶先儒所謂經道之餘因間觀時因靜照物因時起志因物寓言因志發詠因言成詩因詠成聲因詩成音者陶公有焉臨川吳氏曰靖節先生髙志逺識超越古今而設施不少槩見其令彭澤也不過一時牧伯辟舉扳授俾得公田之利以自養如古人不得已而為祿者爾非受天子命而仕也曽幾何時不肯屈於督郵而去克此志節異時詎肯忍恥於二姓哉觀述酒荆軻等作殆欲為漢相孔明之事而無其資責子有詩與子有疏志趣之同苦樂之安一家父子夫婦又如此夫人道三綱為首先生一身而三綱舉無愧焉忘言於真意委運於大化則幾於同道矣誰謂漢魏以降而有斯人者乎崔浩或問崔浩如何朱子曰也是箇博洽的人他雖自比子房然却學得子房呆了子房之辟榖姑以免禍耳他却真箇要做總論五峯胡氏曰桀紂秦政皆窮天下之惡百姓之所同惡故商周劉漢因天下之心伐而代之百姓親附居之安久所謂仁義之兵也魏晉以來莫不假人之柄而有隳三綱之罪仁義不立綱紀不張無以締固民心而欲居之安久可乎象山陸氏曰燕昭王之於樂毅漢髙帝之於蕭何蜀先主之於孔明符秦之於王猛相知之深相信之篤這般處所不可不理會讀其書不知其人可乎臨川吳氏曰楚三閭大夫竭其忠志欲強宗國懷王信讒踈之國事日非竟客死於秦襄王又信讒放之江南原不忍見宗國駸駸趨於亡遂沈江而死韓為秦所滅韓臣之子子房自以五世相韓散財結客為韓報讎博浪之椎不中則匿身下邳以俟時山東兵起從沛公入關立韓公子成續韓後秦亡而楚霸王沛公於漢又殺韓成良乃輔漢滅楚而從隱去諸葛孔明初見昭烈已知賊之必亡漢而勸昭烈跨有荆益圖霸業復帝室後卒償其所言晉陶淵明自其髙祖長沙桓公為晉忠臣及桓玄篡逆劉裕起自布衣誅玄又滅秦滅燕挾震主之威晉祚將易既無昭烈可輔以興復又無髙皇可倚以報復志願莫伸其憤悶之情往往發見於詩蓋四賢者其遇時不同其為人不同而君臣之義重則其心一也唐髙祖或問劉武周兵勢甚鋭關中震駭上出手敕曰賊勢如此難與爭鋒宜棄大河以東謹守關西而已秦王世民上表請行如何范楊張氏曰髙祖可謂謬而無䇿矣且唐所以能守關西者以河東為之障蔽也今舉而棄之則賊兵深入是棄關西也豈不謬哉以此推之髙祖之取天下賴有世民耳不然事未可知也問李密據洛口倉流民就食日以萬數何也曰隋失其鹿豪傑並起而逐之李密據洛口王世充據東都竇建德據山東以至蕭銑薛軌之徒莫不各據險要以爭進取惟唐髙祖用秦王䇿獨決計入關關中既定遂尊立代王以號令天下除隋苛法以隂結民心收攬豪傑以經營四方則天下之柄已在唐掌握中矣彼李密輩雖橫騖於外果何益哉朱子曰唐髙祖辭得九鍚却是太宗或問貞觀之治不幾於三代之盛乎程子曰關雎麟趾之意安在或問范祖禹唐鑑譏太宗曰陷父之罪脅以起兵古人行一不義而得天下弗為也太宗終守臣節可也愚厯觀唐史隋煬帝既遣江都之使唐髙祖不宜坐處夷滅況大業之末生民塗炭太宗茍不為此必無以濟蒼生之困范氏正大之説果可用否使聖賢處此當守臣節乎將權以濟事乎潛室陳氏曰孤隋之暴何止桀紂若欲行湯武之事但當正名弔伐不當自陷於盜賊之地而脅以起兵以斯舉事是以亂易亂也大桀小桀也惜乎太宗有濟世之志傷於欲速迫切反以堂堂禮義之師自陷於亂臣賊子之倫世上有理明義直之事只為學術不正舉動不明便壞了事體問唐太宗誅髙德儒之諂諛薄宇文士及之不忠豈不知姦邪讒諂之士不可厠文墨議論之臣而定十八學士之選而許敬宗之姦獨録而不棄何耶曰知人甚難太宗不但失於許敬宗以李績可任大事此失之尤者中宗武后附朱子曰唐中宗事致堂南軒皆謂五王合併廢中宗因誅武氏别立宗英然當事勢中宗却未有過正緣無罪被廢又是太宗孫髙宗子天下之心思之為他不憤五王亦因此易於成功耳中宗後來所為固是謬然當時便廢他不得問狄梁公雖復正中宗然大義終不明做得似鶻突曰當此時做得到恁地狄梁公終死於周然薦得張柬之迄能反正又問吕后事勢倒做得只如此然武后却可畏曰吕后只是一箇村婦人因滅姬遂迤邐做到後來許多不好武后乃是武功臣之女合下便有無稽之心自為昭儀便鴆殺其子以傾王后中宗無罪而廢之則武后之罪已定只可便以此廢之拘於子無廢母之義不得胡文定謂武后之罪當告于宗廟社稷而誅之問武后之禍曰前輩云當廢武后所出别立太宗子孫曰此論固善但當時宗室為武后殺盡存者皆愚暗豈可恃南軒張氏曰致堂胡氏論武王不誅武后事曰武氏誠當誅但既立其子難誅其母或者以為子奪輕重之間不過告于唐家宗廟廢置幽處之耳然以中宗之昏庸其復之如反手耳亦豈是長䇿以愚觀之五王若有伊周之見則當時復唐家社稷何必須立中宗中宗雖為武后所廢然嘗欲傳位與后父是其得罪宗廟不可負荷已自著見五王若正大義於唐家見存子孫中公選一人以承天序告于宗廟誅此老媪則義正理順唐祚有泰山之安矣玄宗元城劉氏嘗與馬永卿論唐史及明皇信任姚宋事曰此二人與張説乃天后時相也非已自用故敬憚之至於張九齡輩乃己所自用故於進退輕也永卿曰人主用相必要専一明皇用二相専故能成開元之治曰明皇仰面不對除吏雖是好事然未也明皇之任用宰相是也其以情告宦官者非也使力士以誠告崇固可若加以誕謾之語則崇何從質之曷若以語力士之言面諭崇則君臣之情洞然無疑矣又曰以明皇之任韓休一事觀之信忠臣之難遇而佞臣之難去也藉使令知其人曰某人忠某人姦亦未必能任且去之也明皇分明知韓休之忠乃速去之分明知蕭嵩之佞乃久任之後來任李林甫又更好笑分明知其姦至用之二十來年至死乃罷人主唯患不能分别忠佞今分明知之乃如此欲天下不亂可乎又曰雖大無道之君亦惡亂亡而明皇中材之主知姦邪而用之何也曰此蔽於左右之佞幸耳蓋所謂佞幸者嬪御也內臣也戚里也幸臣也此皆在人主左右而可以進言者也賢相不與佞幸交結彼有所幸求則執法而抑之人人與之為讎必旦旦而譛之而人主之眷日衰矣姦臣則交結佞幸彼有所僥求則謹奉而行之人人感其私恩必旦旦而譽之則人主之眷日深矣人主雖欲用忠臣而去佞臣不可得也李林甫所以作相二十年不去者正緣得髙力士安祿山陳希烈等內外贊助之也或問唐明皇開元天寶之治何始之不克終耶潛室陳氏曰開元之世乃無妄之時雖四夷時有不靖乃無妄之疾緣小人以邊功動之致令邊釁一開生出萬端病痛乃無病服藥之故肅宗致堂胡氏曰玄宗既有傳位之命大子非真叛也其失在玄宗命不亟行而裴冕諸人急於榮貴是以致其咎也使肅宗著於父子君臣之義豈為諸人所移得以移之則其心有以來之爾唐髙祖睿玄之逼不見幾故也而太宗明肅之惡欲速見小利故父不父子不子豈非後世之大鑒歟朱子曰肅宗之收復京師其功過可稱至不待父命而即位分明是篡功過當作兩項説不以相掩可也憲宗朱子曰退之云凡此蔡功惟斷乃成今須要知他斷得是與不是古今煞有以斷而敗者如唐德宗非不斷却生出事來要之只是任私意帝剛愎不明理不納人言惟憲宗知蔡之不可不討知裴度之不可不任若使他理自不明胸中無所見則何以知裴公之可任若只就斷字上看而遺其左右前後殊不濟事王圭魏徵程子曰天下寧無魏公之忠亮而不可無君臣之義昔事建成而今事太宗可乎或云王魏事後世人不當盡繩以古人禮法畢竟髙祖不當立建成朱子曰建成既如此王魏何故不見得又何故不知太宗如此便須莫事建成亦只是望僥幸問二人如此機敏何故不見得曰王魏亦只是直馬周禇遂良狄仁傑龜山楊氏曰馬周言事每事須開人主一線路終是不如魏徴之正如諫太宗避暑論事親之道甚善然又云鑾輿之出有日不可遽止願示還期若事非是即從而止之何用如此此正孟子所謂月攘一雞者豈是以堯舜望其君乎禇遂良修起居注唐太宗曰朕有不善卿亦當記之乎或為之言曰借使遂良不記天下亦記之曰此語亦善但人主好名則可以此動之耳未盡也夫君子居室出其言善則千里之外應之出其言不善則千里之外違之故言行君子之樞機不可不謹縱使史官不記而民之應違如此雖欲自掩其不善其可得乎狄仁傑在武后時能撥亂反正謂之社稷之臣可也然亦何嘗挾數任術觀史氏所載其議論未嘗不以正當時但以母子天性之論告武后其濵於死者亦屢矣卒至武后怒而言曰還汝太子夫豈嘗姑務柔從以隂幸事之成乎孟子曰君子創業垂統為可繼也若夫成功則天也人臣之事君或逺或近或去或不去歸潔其身而已可也豈可枉己以求難必之功乎陸贄龜山楊氏曰陸宣公當擾攘之際説其君未嘗用數觀其奏議可見欲論天下事當以此為法宣公在朝自以不恤其身知無不言言無不盡至於遷貶惟杜門集古方書而已可謂知進退者或問陸宣公既貶避謗闔户不著書秪為古今集驗方朱子曰此亦未是豈無聖經賢傳可以玩索可以討論終不成和這箇也不得理會陸宣公奏議末數卷論稅事極盡纎悉是他都理會來此便是經濟之學史以陸宣公比賈誼誼才髙似宣公宣公諳練多學更純粹大抵漢去戰國近故人才多是不粹問陸宣公比諸葛武侯如何曰武侯氣象較大恐宣公不及武侯當面便説得如説孫權一假雖辨士不及其細密處不知比宣公如何只是武侯也密如橋梁道路井龜圊溷無不修繕市無醉人更是密只是武侯密得來嚴其氣象剛大嚴毅楊綰朱子曰楊綰用而大臣損音樂減騶御則人豈可不有以養素自重耶東萊吕曰楊綰為吏部欲去科舉後世皆以為不可但未之知耳及為相半年而死志遂不及施唐時如陸贄楊綰論治道皆有規模陽城或論及陽城事謂永叔不取純夫取之其言曰陽城蓋有待而為者也後世猶責之無已其不成人之美亦甚哉此論似近厚龜山楊氏曰陽城固可取然以為可法則不可裴延齡之欲相其來非一朝一夕何不救之於漸乎至於陸贄之貶然後論延齡之姦佞無益矣觀古人退小人之道不然易之姤卦曰女壯勿用取女夫姤一隂生未壯也而曰壯者生而不用固有壯之理也取女則引而與之齊也引而與之齊則則難制矣隂者小人之象也小人固當制之於漸也故當隂之生則知其有壯之理知其有壯之理則勿用娶女可也是以姤之初爻曰繫于金柅貞吉有攸往見凶金柅止車之行也隂之初動必有以柅之其制之於漸乎蓋小人之惡制之於未成則易制之於己成則難延齡之用事權傾宰相雖不正名其為相其惡自若也何更云待其為相然後取白麻壞之耶然城之所為當時所難能也取之亦是但不可以為法耳朱子曰説者謂陽城居諌職與屠沽出沒果然則豈能使其君聽其言哉張巡涑水司馬氏曰天授之謂才人從而成之之謂義發而著之事業之謂功精敏辨博拳捷趫勇非才也驅市井數千之衆摧胡虜百萬之師戰則不可勝守則不可拔斯可謂之才矣死黨友存孤兒非義也明君臣之大分識天下之大義守死而不變斯可謂之義矣攻城拔邑之衆斬首捕虜之多非功也控扼天下之咽喉蔽全天下之大半使其國家定於已傾存於既亡斯可謂之功矣嗚呼以巡之才如是義如是功如是而猶不免於流俗之毁況其曖曖者邪總論或問百世可知之道程子曰以三代而後觀之秦以反道暴政亡漢興尚德行崇經術鑒前失也學士大夫雖未必知道然背理甚者亦鮮矣故賊莽之時多伏節死義之士世祖興而褒尚之勢當然也節久而苦視死如歸而不明乎理義之中也故魏晉一變而為曠蕩浮虛之習人紀不立相胥為夷五胡亂華行之弊也隂極則陽生亂極則治形隋驅除之唐混一之理不可易也唐室三綱不立由太宗啓之故後世雖子弟不用父兄之命玄宗使其子篡肅宗使其弟反選武才人以刺王妃入也納夀王妃以武才人進也終唐之世夷狄數為中國患而藩鎮陵犯卒以亡唐及乎五季之甚人為而致也元城劉氏曰嘗考前世已然之事蓋有真朋黨而不能去亦有非朋黨而不能辨者此實治亂消長之機不可不察也東漢之衰姦人先以黨事誅戮禁錮天下之賢者而在朝皆小人也故漢以之亡此所謂非朋黨而不能辨者也唐之季世牛李之徒迭進相毁巧相傾覆而善人君子廢斥無餘其所用者皆庸鄙不肖也故唐以之亂此所謂真朋黨而不能去者也蓋君子之進則至公引類以報國小人之進則徇私立黨以固寵雖世主深疾臣下之背公成朋而小人窺見間隙鄉原上意閉匿其私陽若可信反指君子引類之功以為有黨黨之與類相似而不同是非虛實間不容髮辨之不早遂生亂階此正人所以常被誣而小人所以常得志也五峯胡氏曰漢唐以來天下既定人君非因循自怠則沉溺聲色非沉溺聲色則開拓邊境非開拓邊境則崇飾虛文其下乃有惑於神仙真空之術者曷若講明先王之道存其心正其情大其德新其政光其國為萬世之大君乎後世必有髙於漢唐賢君之聰明者然後能行之矣而漢唐賢君志趣識量亦未易及也可輕棄哉又况三代之盛王行一不義殺一不辜而得天下不為者其仁何可及乎豫章羅氏曰漢武帝知汲黯之賢而不用唐太宗知宇文士及之佞而不去何其誤也夫人主知賢而不能用未若不知之為善知佞而不能去未若不知之為愈茍知賢而不能用則善無所勸知佞而不能去則惡無所懲雖然武帝知賢而不用猶愈於元帝知蕭望之之賢而反罪焉太宗知佞而不去猶愈於德宗知盧杞之姦而復用焉觀元帝德宗之與武帝太宗豈不相寥絶哉石守道採托唐史中女后姦臣宧官事各以其類作三卷目之曰唐鑑而言曰巍巍巨唐女后亂之於前姦臣壞之於中宧官覆之於後考其所論可為萬世鑑惜乎不推其本而言之故人主欲懲三者之患其本不過有二以內則清心以外則知人能清心則女后不能亂之能知人則姦臣不能壞之宦官不能覆之請借明皇一君而論開元能清心矣能知人矣武惠妃蕭嵩楊思勉豈能易其志及天寶之際不能清心矣不能知人矣而楊貴妃李林甫髙力士遂亂其心清心知人其人主致治之本歟人主欲明而不察仁而不懦蓋察常纍明而懦反害仁也漢昭帝明而不察章帝仁而不懦孝宣明矣而失之察孝元仁矣而失之懦若唐德宗則察而不明髙宗則懦而不仁兼二者之長其惟漢文乎樂庵李氏曰人讀書須是識字固有讀書而不識字者如漢之孔光張禹唐之許敬宗栁宗元非不讀書但不識字或問其説曰孔光不識進退字張禹不識剛正字許敬宗不識忠孝字栁宗元不識節義字朱子曰漢髙祖取天下却正當為他直截恁地做去無許多委曲唐初隋大亂如此髙祖太宗因羣盜之起直截如此做去只是誅獨夫為他心中打不過又立恭帝假援回護委曲如此亦何必耳所以不及漢之創業也漢髙祖私意分數少唐太宗一切假仁借義以行其私劉漢而下髙祖太宗亦是如此都是自智謀功力中做來不是自聖賢門户中來不是自自家心地義理中流出使髙祖太宗當湯武固自不得若當桓文尚未可知問使二君與桓文同時還在其上還在其下曰桓公精密做工夫多年若文公只是六年以自甚快但管仲作內政盡從腳底做出所以獨盛於諸侯漢髙從初起至入秦只是虜掠將去與項羽何異但寬大不甚殺人耳秦以苛虐亡故髙祖不得不寬大隋以拒諫失國故太宗不得不聽人言皆是他天資髙見得利害分明稍不如此則天下便判而去之如太宗從諫甚不得已然當時只有這一處服得人太宗從魏鄭公仁義之説只是利心意謂如此便可以安居民上漢文帝資質較好然皆老氏術也太宗功髙天下所係屬亦自無安頓處只髙祖不善處置了又建成乃欲立功蓋之如玄宗誅韋氏有功睿宗欲立宋王成器宋王成器便理會得事堅不受論三代而下以義為之只有一箇諸葛孔明若魏鄭公全只是利漢唐之興皆是為利須是有湯武之興始做得太宗亦只是為利亦做不得曰漢髙祖見始皇出謂丈夫當如此耳項羽謂彼可取而代也其利心一也問唐宦官與東漢末如何曰某嘗説唐時天下尚可為唐時猶有餘䇿東漢末直是無著手處且是無主了如唐昭宗文宗直要除許多宦官那時若有人似尚可為那時只宣宗便度得事勢不能誅便一向不問他也是老練了如此伊川易解也失契勘説屯其膏云又非恬然不為若唐之僖昭也這兩人全不同一人是要做事一人是不要做與小黃門啖果食度日呼田令孜為阿父不知東漢時若一向盡引得忠賢布列在內不知如何只那都無主可立天下大勢如人衰老之極百病交作略有些少變動便成大病如乳母也聒噪一場如單超徐璜也作怪一場如張讓趙忠之徒才有些小權柄便作怪一場這是甚麼時節或曰從那時直到唐太宗天下大勢方定疊曰這許多時節直是無著手處然亦有幸而不亡者東晉是也汪萃作詩史以為竇武陳蕃誅宦者不合前收鄭颯而末收曹節王甫侯覽若一時便收却四箇便了陽球誅宦者不合前誅王甫假煩而末誅曹節朱瑀若一時便誅却四箇亦自定矣此説是東萊吕氏曰自古以來雖經太康之亂三代之季只是一變其罪皆由商君雖漢文帝唐太宗出來扶持天下然此骨子終不換得井田最先壞其次封建其他亦未盡壞府兵尚存古制及張説方壞盡兩稅壞於楊炎自然有此等人來兩漢以來明君良臣屬意於邦本者多矣賈誼治安之䇿言雖忠而道則踈義府承華之針言雖切而心則詐元稹教本之書言雖華而要則寡用智囊為家令則輔之非其人開博望延賔客則處之非其地養之無術無惑乎其治效之卑汚蹇淺也潛室陳氏曰漢髙祖事事不能只有一箇帝王器度本不擬到此地位自是天人推出來所以規模比三代太宗事事了得本是唐之第一君為其必欲做帝王不待天人自安排所以只做得魏晉規模問髙祖之興計謀有人光武之起既身為之謀又身為之戰遂復故物馬援乃以為光武不及髙帝意者用人者大自用者小邪曰光武太宗身經百戰真千古英雄之將所以不似漢髙者蓋漢髙不能為將而善將將此光武太宗所以見容於漢髙也問漢宣帝之麒麟閣明帝之雲臺二十八將及唐太宗之十八學士凌煙閣皆所以圖畫功臣也須觀漢之人主務實不務名唐太宗務名而無實以許敬宗之姦佞而與十八學士之選以侯君集之小人而與凌煙之數皆失實也不然漢唐之世皆有得失否曰此未免以成敗論所可論處者亦多却不只在二子二子不足為輕重唐學士之選即淮南王安之招致賔客羽翼既多便有相軋之勢凌煙雖祖麒麟雲臺然漢時却有教化之意寓其間如以蘇武而與麒麟以馬援而不與雲臺此殆有深意唐則無之問唐太宗恭儉不若孝文而功烈過之何耶曰三代而下英主無出文帝太宗止做得創業功臣君德上可議處甚多不止恭儉文帝不是無功但當守文時故不以征伐顯耳太宗只是削平蕩定之功而德在人心處少問漢七制景帝昭帝何為不與唐三宗宣宗武宗何為不録願聞其説曰景帝天資刻薄無人君之度但以不失文帝之恭儉故史人之辭稱曰文景昭帝雖聰明早成而享國不永所以不在七制之數唐三宗已不似漢更添宣武何為庸齋許氏曰髙祖天資本明而將之以寬大太宗識見固髙而將之以詳審惟其寬大故事為常暗與道合而間失之踈帷其詳審故事為每關於念慮而或過於密性理大全書卷六十三

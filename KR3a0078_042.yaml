body:
  text: 性理大全書卷四十二諸儒四吕祖謙字伯恭號東萊朱子曰伯恭説義理大多傷巧未免杜撰問東萊博學多識則有之矣守約恐未也曰然某嘗謂人讀書寕失之拙不可失之巧寜失之低不可失之髙伯恭之弊盡在於巧問東萊之學曰伯恭於史分外子細於經却不甚理㑹東萊聰明看文理却不子細向嘗與較程易到噬嗑卦和而且治一本治作洽據治字於理為是他硬執要做洽字和已有洽意更下洽字不得縁他先讀史多所以看麄着眼讀書湏是以經為本而後讀史伯恭教人看文字也麄有以論語是非問者伯恭曰公不㑹看文字管他是與非做甚但有益於我者切於我者看之足矣且天下湏有一箇是與不是是處便是理不是處便是咈理如何不理㑹得東萊文鑑編得泛然亦見得淺伯恭所編奏議皆優柔和緩者亦未為全是今丘宗卿作序者是舊所編後修文鑑不止乎此更添入東萊自不合做這大事記他那時自感疾了一日要做一年若不死自漢武至五季只千來年他三年自可了此文字人多云其觧題煞有工夫其實他當初作題目却煞有工夫只一句要包括一叚意觧題只見成檢令諸生寫伯恭病後既免人事應接免出做官若不死大叚做得文字問伯恭少儀外傳多𤨏碎處曰人之所見不同某只愛看人之大體大節磊磊落落處這般𤨏碎便懶看伯恭又愛理㑹這處其間多引忍恥之説最害義縁他資質弱與此意有合遂就其中推廣得大想其於忠臣義士死節底事都不愛他亦有詩説張廵許逺那時不應出來伯恭宗太史公之學以為非漢儒所及某嘗痛與之辨子由古史言馬遷淺陋而不學疎略而輕信此二句最中馬遷之失伯恭極惡之古史序云古之帝王其必為善如火之必熱水之必寒其不為不善如騶虞之不殺竊脂之不糓此語最好某嘗問伯恭此豈馬遷所能及然子由此語雖好又自有病處如云帝王之道以無為為宗之類他只説得箇頭勢大下靣工夫又皆空踈亦猶馬遷禮書云大哉禮樂之道洋洋鼓舞萬物役使羣動説得頭勢甚大然下靣亦空踈却引荀子諸説以足之又加諸侯年表盛言形勢之利有國者不可無末却云形勢雖強要以仁義為本他上文本意主張形勢而其末却如此説者盖他也知仁義是箇好底物事不得不説且説教好看如禮書所云亦此意也伯恭極喜渠此等説以為遷知行夏之時乘殷之輅服周之冕為得聖人為邦之法非漢儒所及此亦衆所共知何必馬遷然遷嘗從董仲舒游史記中有余聞之董生云此等語言亦有所自來也遷之學也説仁義也説詐力也用權謀也用功利然其本意却只在於權謀功利孔子説伯夷求仁得仁又何怨他一傳中首尾皆是怨辭盡説壊了伯夷子由古史皆删去之盡用孔子之語作傳豈可以子由為非馬遷為是聖賢以六經垂訓炳若丹青無非仁義道徳之説今求義理不於六經而反取踈略淺陋之子長亦惑之甚矣賛先生像曰以一身而備四氣之和以一心而㴠千古之秘推其有足以尊主而庇民出其餘足以範俗而埀世然而狀貎不踰於中人衣冠不詭於流俗迎之而不見其來随之而莫覩其躅矧是丹青孰形心曲惟嘗見之者於此而復見之焉則不但遺編之可續而已西山真氏曰吕成公所傳中原之文獻也其所闡繹河洛之㣲言也扶持絶學有千載之功教育英材有數世之澤及慶元初孽臣始竊大柄大愚以一太府丞抗䟽顯斥其姦孤忠凜然之死不悔迨其晚年義精仁熟有成公之風焉陸九淵字子靜號象山朱子曰陸子静説只是一心一邊属人心一邊属道心那時尚説得好在子靜説克己復禮云不是克去己私利欲之類别自有箇克處又却不肯説破某嘗代之下語云不過是要言語道斷心行路絶耳因言此是䧟溺人之深坑學者切不可不戒問子静不喜人説性曰怕只是自理㑹不曽分曉怕人問難又長大了不肯與人商量故一截截斷了然學而不論性不知所學何事某向與子靜説話子靜以為意見某曰邪意見不可有正意見不可無子靜説此是閑議論某曰閑議論不可議論合議論則不可不議論又曰大學不曽説無意而説誠意若無意見将何物去擇乎中庸將何物去察邇言論語無意只是要無私意若是正意則不可無又曰他之無意見則是不理㑹理只是胡撞將去若無意見成甚麽人在這裏問告子不得於言勿求於心曰子靜不著言語其學正似告子故常諱這些子又問陸嘗云人不惟不知孟子髙處也不知告子髙處曰試説看陸只鶻突説過又曰陸子靜説告子也髙也是他尚不及告子告子将心硬制得不動陸遇事未必皆能不動向來見子靜與王順伯論佛云釋氏與吾儒所見亦同只是義利公私之間不同此説不然如此却是吾儒與釋氏同一箇道理若是同時何縁得有義利不同只彼源頭便不同吾儒萬理皆實釋氏萬理皆空又曰他尋常要説集義所生者其徒包敏道至説成襲義而取却不説義集而取之他説如何陳正淳曰他説湏是實得如義集只是强探力取曰謂如人心知此義理行之得宜固自内發人性質有不同或有魯鈍一時見未到得别人説出來反之於心見得為是而行之是亦内也人心所見不同聖人方見得盡今陸氏只是要自渠心裏見得底方謂之内若别人説底一句也不是才自别人説出便指為義外如此乃是告子之説如生而知之與學而知之困而知之安而行之與利而行之勉強而行之及其知之行之則一也豈可一一湏待自我心而出方謂之内所以指文義而求之者皆不為内故自家才見得如此便一向執著将聖賢言語便亦不信更不去講貫只是我底是其病痛只在此只是專主生知安行而學知以下一切皆廢又只管理㑹一貫理㑹一且如一貫只是萬理一貫無内外本末隱顯精粗皆一以貫之此政同歸殊塗百慮一致無所不備今却不教人恁地㑹却只尋箇一不知去那裏討頭處子靜之學看他千般萬般病只在不知有氣稟之雜把許多麄惡底氣都做心之妙理合當恁地自然做將去向在鉛山得他書云看見佛之所以與儒異者止是他底全是利吾儒止是全在義某答他云公亦只見得第二著看他意只説吾儒絶斷得許多利欲便是千了百當一向任意做出都不妨不知初自受得這氣稟不好今才任意發出許多不好底也只都做好啇量了只道這是胷中流出自然天理不知氣有不好底夾雜在裏一齊衮將去道害事不害事看子靜書只見他許多麄暴底意思可畏其徒都是這様才説得㡬句便無大無小無父無兄只我胷中流出底是天理全不著得些工夫看來這錯處只在不知有氣稟之性或説象山説克己復禮不但只是欲克去那利欲忿懥之私只是有一念要做聖賢便不可曰聖門何嘗有這般説話人要去學聖賢此是好底念慮有何不可若以為不得則堯舜之兢兢業業周公之思兼三王孔子之好古敏求顔子之有為若是孟子之願學孔子之念皆當克去矣看他意思只是禪誌公云不起纎毫修學心無相光中常自在他只是要如此然豈有此理又曰子靜説話常是兩頭明中間暗或問暗是如何曰是他那不説破處他所以不説破便是禪家所謂鴛鴦繡出從君看莫把金針度與人他禪家自愛如此子靜説良知良能四端等處且成片舉似經語不可謂不是但説人便能如此不假修為存飬此却不得譬如旅寓之人自家不能送他回鄉但與説云你自有田有屋大叚快樂何不便回去那人既無資送如何便回去得又如脾胃傷弱不能飲食之人却硬将飯将肉塞入他口不問他喫得與喫不得若是一頓便理㑹得亦豈不好然非生知安行者豈有此理便是生知安行也湏用學大抵子思説率性孟子説存心飬性大叚説破夫子更不曽説只説孝弟忠信篤敬蓋能如此則道理便在其中矣子靜云㴠飬是主人翁省察是奴婢陳正已力排其説曰子靜之説無定常要云今日之説自如此明日之説自不如此大抵他只要拗才見人説省察他便反而言之謂湏是㴠養若有人向他説涵養他又言湏是省察以勝之自渠好為訶佛罵祖之説致令其門人以夫子之道反害夫子問象山道當下便是曰看聖賢教人曽有此等語無聖人教人皆從平實地上做去所謂克己復禮天下歸仁湏是先克去己私方得孟子雖云人皆可以為堯舜也湏是服堯之服誦堯之言行堯之行方得聖人告顔子以克己復禮告仲弓以出門如見大賔使民如承大祭告樊遲以居處恭執事敬與人忠告子張以言忠信行篤敬這箇是説甚底話又平時告弟子也湏道是學而時習行有餘力則以學文又豈曽説箇當下便是底語大抵今之為學者有二病一種只當下便是底一種便是如公平日所習底却是這中間一條路不曽有人行得而今人既不能知但有聖賢之言可以引路聖賢之言分分曉曉八字打開無些子回互隱伏説話因説子靜云這箇只爭些子才差了便如此他只是差過去了更有一項却是不及若使過底拗轉来却好不及底䟎向上去却好只縁他纔髙了便不肯下纔不及了便不肯向上過底便道只是就過裏靣求箇中不及底也道只就不及裏靣求箇中初間只差了些子所謂差之毫釐繆以千里又曰某看近日學問髙者便説做天地之外去卑者便只管䧟溺髙者必入於佛老卑者必入於管商定是如此定是如此陸氏㑹説其精神亦能感發人一時被他聳動底亦便清明只是虚更無底簟思而不學則殆正謂無底簟便危殆也山上有木漸君子以居賢徳善俗有階梯而進不患不到今其徒徃徃進時甚鋭然其退亦速纔到退時便如墜千仞之淵問子靜君子喻於義口義曰子靜只是拗伊川云惟其深喻是以篤好子靜必要云好後方喻看來人之於義利喻而好者多若全不曉又安能好然好之則喻矣畢竟伊川説占得多朱子門人朱子曰蔡神與慱學強記髙簡廓落易象之文地理之説無所不通季通承父志學行之餘尤邃律歴討論定著遂成一家之言使千古之誤曠然一新而遡其源流皆有成法季通有精詣之識卓絶之才不可屈之志不可窮之辯南軒云亡吾道益孤朋友亦難得十分可指擬者黄直卿明睿端莊造詣純篤斯道有望於直卿者不輕輔漢卿身在都城俗學聲利塲中而能閉門自守味衆人之所不味更㡬勉力卒究大業陳安卿論顔子卓爾之説甚善論大本達道意甚備若得不容己處即自可黙㑹矣陳才卿一室蕭然有以自樂令人敬歎日用工夫精進如此尤為可喜若知此心此理端的在我則參前倚衡自有不容舍者徐子融志趣操守非他人所及大率志氣剛决痛快無支離纒繞之弊余正叔在此無日不講説終是葛藤不斷也方叔看得道理儘自稳實廖徳明學有根據為政能舉先王已墜之典以活中路無告之人固學道愛人之君子所樂聞而願為者方賔王為學之意親切的當而不失其序近日所見朋友講習未有能及此者鄭子上説易中庸甚子細論人心道心之説比舊益精宻矣晏亞夫進學意氣頗多激昂而心志未甚凝定於日用之間益加持敬工夫則見得本來明徳之體用動靜如一矣勉齋黄氏曰晦翁先生之門從遊者多矣季通之來先生必留數日徃徃通夕對床不暇寢從先生遊者歸必過其家聼其言論不忍去去皆充然有所得也其負英邁之氣藴該洽之學智極乎道徳性命之原行謹乎家庭唯諾之際於先生之門可謂傑然者矣西山真氏曰季通師事文公文公顧曰季通吾老友也凡性與天道之妙他弟子不得聞者必以語季通焉異篇奥傳㣲辭䆳㫖先令討䆒而後折𠂻先生於經無所不通嘗語三子曰淵汝宜紹吾易學曰沉汝宜演吾皇極數而春秋則以屬知方焉仲黙自勝衣趣拜入則服􅈾父教出則從晦庵游晦庵晚年訓傳諸經略備獨書未及為環眂門下生求可付者遂以屬仲黙洪範之數學者乆失其傳西山獨心得之然未及論著亦曰成吾書者沉也雲莊劉氏曰季通天資髙聞道早於書無所不讀於事無所不講明隂陽消長之運逹古今盛衰之理上稽天時下考人事皆有明證若禮樂兵制度數皆正其流而㑹于一方技曲學異端邪説悉㧞其根而辨其非凡古書竒辭奥㫖人所不能讀者一見即觧文公甞曰人讀易書難季通讀難書易又曰造化㣲妙惟深於理者能識之吾與季通言而未甞厭也先生處家以孝弟忠信儀刑子孫而其教人也以性與天道為先自本而支自源而流聞者莫不興起甞言文公教人以訓詁文義為先下學上達固是常序然世衰道㣲邪説交作學者未知本原未必不惑於異端之説也故文公晚年接引後學亦無隱焉李士英言行録曰西山從晦翁㳺最乆精識慱聞同輩皆不能及義理大原固已心通意觧尤長於天文地理樂律厯數兵陣之説凡古書盤錯肯綮學者讀之不能以句元定爬梳剖析細入秋毫莫不暢達晦翁論易推本河圖洛書邵氏皇極經世書先天圖徃徃多與元定徃復而有發焉仲黙年僅三十即屏去舉子業一以聖賢為師平居仰觀俯察黙坐終晷瞭然有見於天地之心萬物之情反求諸躬衆理具偹信前聖之言不予欺也仲黙父師之託凛凛焉常若有負盖沉潜反復者數十年然後克就其於書也考序文之誤訂諸儒之説以發明二帝三王羣聖賢用心洪範洛誥秦誓諸篇徃徃有先儒所未及者其於洪範數也謂體天地之撰者易之象紀天地之撰者範之數數始於一竒象成於二偶竒者數之所以立偶者象之所以在故二四有八八卦之象也三三而九九疇之數也由是八八而又八之為四千九十六而𧰼備矣九九而又九之為五百六十一而數周矣易更四聖而象已著範錫神禹而數不傳後之作者昧象數之源窒變通之妙或即象而為數或反數而擬象洞極有書潜虚有圖非無作也牽合傅㑹自然之數益晦焉嗟夫天地之所以肇人物之所以生萬事之所以得失莫非數也數之體著於形數之用妙於理非窮神知化者曷足以語此仲黙於二書闡發幽㣲至於如此真不媿父師之託哉董氏䚮曰勉齋先生得紫陽之正傳造詣精深而見於講説者特簡易明白的當痛快讀之使人興起黄氏瑞節曰蔡氏祖子孫三世一轍朱子云蔡神與所以教其子者不干利禄而開之以聖賢之學其志識髙逺非人所及真徳秀字景元後更希元號西山勉齋黄氏曰西山在朝屢進危言力扶大義公論藉以開明善類為之踊躍吴郡李氏曰子朱子沉潜乎性命而發越乎詞章先生心得其傳汪洋乎翰墨沉浸乎仁義所入雖不同其見於道一也子朱子之道不盡行於時故私淑諸其徒先生之道方大顯於世盖将公利澤於民物所遭雖不同其衣被萬世亦一也邵庵虞氏曰先生大學衍義之書本諸聖賢之學以明帝王之治據已徃之跡以待方來之事慮周乎天下憂及乎後世君人之軌範盖莫偹於斯焉董仲舒曰人主而不知春秋前有讒而不知後有賊而不見此雖未敢上比於春秋然有天下國家者誠反覆於其言則治亂之别得失之故情偽之變其殆庻㡬無隱者矣史傳云自韓侂胄立偽學之名以錮善類凡近世大儒之書皆顯禁以絶之徳秀晚出獨慨然以斯文自任講習而服行之黨禁既開而正學遂明于天下後世多其力也魏華父字了翁號鶴山邵庵虞氏曰孔子顔子殁其學不傳曽子以其傳授子思而孔子之精㣲益以明著孟子得以擴而充之後千五百年以至于宋汝南周氏始有以繼顔子之絶學傳之程伯淳氏而正叔氏又深有取於曽子之學以成已而教人而張子厚氏又多得於孟子者也顔曽之學均出於夫子豈有異哉固其資之所及而用力有不同焉者爾朱元晦氏論定諸君子之言而集其成一時小人用事惡其厲已倡邪説以為之禁士大夫身蹈其禍而學者公自絶以茍全論世道者能無䀌然于兹乎方是時臨卭魏華父起於白鶴山下奮然有以倡其説於摧廢之餘極其弊於口耳之末故其立朝惓惓焉以周程張朱四君子易名為請尊其統而接其傳非直為之名也又曰魏氏之為學即物以明義反身以求仁審夫小學文藝之細以推乎典禮㑹通之大本諸平居屋漏之隐而充極於天地鬼神之著巖巖然立朝之大節不以夷險而少變而立言垂世又足以作新乎斯人盖庻㡬乎不悖不惑者矣若夫聖賢之書實由秦漢以來諸儒誦而傳之得至于今其師弟子之所授受以顓門相尚雖卒莫得其要然而古人之遺制前哲之緒言或者存乎其間盖有不可廢者自濓洛之説行朱氏祖述而發明之於是學者知趨乎道徳性命之本廓如也而從事於斯者誦習而成言惟日不足所以博文多識之事若将略焉則亦有所未盡者矣况乎近世之弊好為鹵莽其求於此者或未切於身心而攷諸彼者曾弗及於詳博於是傳注之所存者其舛譌牴牾之相承既無以明辨其非是而名物度數之幸在者又不察其本原誠使有為於世何以徵聖人制作之意而為因革損益之器哉魏氏又有憂於此也故其致知之日加意於儀禮周官大小戴之記及取九經注䟽正義之文據事别類而録之謂之九經要義其志将以見夫道器之不離而有以正其臆説聚訟之惑世此正張氏以禮為教而程氏所以有徹上徹下之語者也許衡字平仲號魯齋牧庵姚氏曰先生之學一以朱子之言為師窮理以致其知反躬以踐其實始而行其家中而及之人故于魏于輝于秦摳衣其門所在林立盛徳之聲昭聞于時官諸胄學其教也入徳之門始惟由小學而四書講貫之精而後進于易書詩春秋耳提靣命者莫不以孝弟忠信為本四方化之雖吏為師刀筆筐篋之流父以之訓其子兄以之勗其弟者亦惟以是為先語述作固不及朱子之富而扶植人極開世太平之功不慚徳焉耶律氏有尚曰雪齋姚樞隠蘓門傳伊洛之學於南士趙復仁甫先生即詣蘓門訪求之得伊川易傳晦庵論孟集註大學中庸章句或問小學等書讀之深有黙契于中遂一一手寫以還聚學者謂之曰昔所授受殊孟浪也今始聞進學之序若必欲相從當悉棄前日所學章句之習從事於小學洒掃應對以為進學之基不然則當求他師衆皆唯遂悉取向來簡帙焚之使無大小皆自小學入先生亦旦夕精讀不輟篤志力行以身先之雖隆寒盛暑不廢也先生自得伊洛之學冰釋理順羙如芻豢甞謂終夜以思不知手之舞足之蹈先生天資𢎞毅卓然有守其恭儉正直出於天性雖艱危窮阨之際所守益堅而好學不倦聞一善言見一善行不啻飢渴於名利紛華畏若探湯誠心自然人皆信之建元以來十被召㫖未甞不起然卒不肯枉尺直尋而去毎入對則衆皆注意而聼之衛士或舉手加額曰是欲澤被生民者也圭齋歐陽氏曰先生自謹獨之功充而至於天徳王道之藴故告世祖治天下之要惟曰王道及問其功則曰三年有成是以啟沃之際務以堯舜其君堯舜其民為己任由其真積力乆至誠交孚言雖剴切終無以忤至於其身之進退則凛若萬夫之勇何可以利祿誘而威武屈也晚年義精仁熟躬偹四時道出萬物之表無事而靜則大空晴雲舒卷自如應物而動則雷雨滿盈草木甲拆事至而不凝事過而無迹四方之人聞之而知敬望之而知畏親之而知愛逺之而知慕求其所以然則惟見其胷中磅礴浩大人欲淨盡天理流行動靜語黙無徃而非斯道之著形也又曰先生天資之髙固得不傳之妙於聖賢之遺言然淳篤似司馬君實剛果似張子厚光霽似周茂叔英邁似邵堯夫窮理致知擇善固執似程叔子朱元晦至於體用兼該表裏洞徹超然自得於不動而敬不言而信之域者又有濓洛數君子所未發者焉宜夫抗萬鈞之勢而道不危擅四方之名而行無毁邵庵虞氏曰南北未一許文正公先得朱子之書伏讀而深信之持其説以事世祖而儒者之道不廢許公實啟之是以世祖以來不愛名爵以起天下之處士雖所學所造各有以自見其質諸聖賢而不悖俟乎百世而不惑者論者尚慊然也陳氏剛曰魏國文正公出學者翕然師之其學尊信朱子而濓洛之道益明使天下之人皆知誦習程朱之書以至於今者公之力也吳澄字㓜清號草廬邵庵虞氏曰孟子歿千五百年而周子出河南兩程夫子為得其傳時則有若張子精思以致其道其逈出千古則又有邵子焉邵子之學既無傳而張子之歿門人徃徃卒業於程氏程門學者篤信師説各有所奮力以張皇斯道柰何世運衰㣲民生寡佑而亂亾随之矣悲夫斯道之南豫章延平髙明純㓗又得朱子而屬之百有餘年間師弟子之言折𠂻無復遺憾求之書盖所謂集大成者時則有若陸子靜氏超然有得於孟子先立乎其大者之㫖其於斯文互有發明學者於焉可以見其全體大用之盛而二家門人區區異同相勝之淺見盖無足論也先生之生炎運垂息自其髫齡特異常人得斷簡於衆遺發新知於卓識盛年英邁自任以天下斯文之重盖不可禦也摧折窮山壮志莫遂艱難避地垂十數年其所以自致於聖賢之道者日就月将矣厯觀近代進學之勇其孰能過之許文正公為祭酒門人守其法乆之䆮失其舊先生繼至深閔乎學者之日就荒唐而徒從事於利誘也思有以作新之於是六舘諸生以次授業晝退堂後寓舍則執經者随而請問先生懇懇循循其言明白痛切因其才質之髙下聞見之淺深而開導誘掖之使其刻意研窮以究乎精㣲之藴反身克治以踐乎進修之實講論不倦毎至夜分寒暑不廢於是一時㳺觀之彦雖不列在弟子員者亦皆有所觀感而興起矣甞與人書曰天生豪傑之士不數也夫所謂豪傑之士以其知之過人度越一世而超出等夷也戰國之時孔子徒黨盡矣充塞仁義若楊墨之徒又㴞㴞也而孟子生乎其時獨願學孔子而卒得其傳當斯時也曠古一人而已真豪傑之士哉孟子歿千有餘年溺於俗儒之陋習淫於老佛之異教無一豪傑之士生於其間至于周程張邵一時迭出非豪傑其孰能與於斯乎又百年子朱子集數子之大成則中興之豪傑也以紹朱子之統自任者果有其人乎揭氏傒斯曰先生磨研六經䟽滌百氏綱明目張如禹之治水雖未獲任君之政而著書立言師表百世又豈一才一藝所得並哉其學之源則見于易書春秋禮記諸纂言其學之叙則見於學基學統諸書而深造極詣尤莫尚於邵子其所著書及文章皆行于世公隱居時有草屋數間程文憲公過而署之曰草廬元文敏公明善以學自命問易詩書春秋歎曰與吳先生言如探淵海性理大全書卷四十二

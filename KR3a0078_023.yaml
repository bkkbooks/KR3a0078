body:
  text: 性理大全書卷二十三律吕新書二律吕證辨造律第一班固漢前志曰黄帝使伶倫自大夏之西昆侖之隂取竹之解谷生其竅厚均者斷兩節間而吹之以為黄鐘之宫制十二筩以聽鳯之鳴其雄鳴為六雌鳴亦六比黄鐘之宫而皆可以生之是為律本至治之世天地之氣合以生風天地之風氣正十二律定劉昭漢後志曰伏羲作易紀陽氣之初以為律法建日冬至之聲以黄鐘為宫太簇為商姑洗為角林鐘為徵南吕為羽應鐘為變宫㽔賔為變徴此聲氣之元五音之正也又曰截管為律吹以攷聲列以候氣道之本也國朝會要曰古者黄鐘為萬事根本故尺量權衡皆起於黄鐘至晉隋間累黍為尺而以制律容受卒不能合及平陳得古樂遂用之唐興因聲以制樂其器雖無法而其聲猶不失於古五代之亂大樂淪散王朴始用尺定律而聲與器皆失之故太祖患其聲高特減一律至是又減半律然太常樂比唐之聲猶高五律比今燕樂高三律帝雖勤勞於制作而未得其當者有司失之於以尺而生律也按此皆范蜀公之説河南程氏曰黄鐘之聲亦不難定世自有知音者將上下聲攷之既得正便將黍以實其管看管實得幾粒然後推而定法可也古法律管當實千二百粒黍今羊頭黍不相應則將數等騐之看如何大小者方應其數然後為正昔胡先生定樂取羊頭山黍用三等篩子篩之取中等者特未定也又曰以律管定尺乃是以天地之氣為準非秬黍之比也秬黍積數在先王時惟此適與度量合故可用今時則不同横渠張氏曰律吕有可求之理徳性淳厚者必能知之按律吕㪚亡其器不可復見然古人所以制作之意則猶可攷也太史公曰細若氣微若聲聖人因神而存之雖妙必効言黄鐘始於聲氣之元也班固所謂黄帝使伶倫取竹斷兩節間吹之以為黄鐘之宫又曰天地之風氣正而十二律定劉昭所謂伏羲紀陽氣之初以為律法又曰吹以攷聲列以候氣皆以聲之清濁氣之先後求黄鐘者也是古人制作之意也夫律長則聲濁而氣先至極長則不成聲而氣不應律短則聲清而氣後至極短則不成聲而氣不應此其大凡也今欲求聲氣之中而莫適為準則莫若且多截竹以擬黄鐘之管或極其短或極其長長短之内每差一分以為一管皆即以其長權為九寸而度其圍徑如黄鐘之法焉如是而更迭以吹則中聲可得淺深以列則中氣可騐茍聲和氣應則黄鐘之為黄鐘者信矣黄鐘者信則十一律與度量衡權者得矣後世不知出此而唯尺之求晉氏而下則多求之金石梁隋以來又叅之秬黍下至王朴剛果自用遂專恃累黍而金石亦不復攷矣夫金石真偽固難盡信者秬黍則嵗有凶豐地有肥瘠種有長短小大圓妥不同尤不可恃况古人謂子榖秬黍中者實其龠則是先得黄鐘而後度之以黍不足則易之以大有餘則易之以小為九十黍之長中容千二百黍之實以見周徑之廣以生度量衡權之數而已非律生於黍也百世之下欲求百世之前之律者其亦求之於聲氣之元而毋必之於秬黍則得之矣律長短圍徑之數第二司馬遷律書本文改正黄鐘八寸七分一宫八寸十分一林鐘五寸七分四角五寸十分四太簇七寸七分二商七寸十分二南宫姑寸七分八徴四寸十分八姑洗六寸七分四羽六寸十分四應鐘四寸二分三分二羽四寸二分三分二㽔賔五寸六分三分一五寸六分三分二强四百八十六大宫七寸四分三分一七寸五分三分二强四百五夷則五寸四分三分二商五寸三分二弱二百一十六夾鐘六寸一分三分一六寸七分三分一强一百九十八無射四寸四分三分二四寸四分三分二强六百二仲吕五寸九分三分二徴五寸九分三分二强五百八十一按律書此章所記分寸之法與他記不同以難曉故多誤葢取黄鐘之律九寸一寸九分凡八十一分而又以十約之為寸故云八寸十分一本作七分一者誤也今以相生次序列而正之其應鐘以下則有小分小分以三為法如厯家太少餘分强弱耳其法未密也今以二千一百八十七為全分七百二十九為三分一一千四百五十一為三分二餘分之多者為强少者為弱列於逐律之下其誤字悉正之隋志引此章中黄鐘林鐘太簇應鐘四律寸分以為與班固司馬彪鄭氏蔡邕杜䕫荀朂所論雖尺有増減而十二律之寸數並同則是時律書尚未誤也及司馬貞索隠始以舊本作七分一為誤其誤亦未久也沈括亦曰此章七字皆當作十字誤屈中畫耳大要律書用相生分數相生之法以黄鐘為八十一分今以十為寸法故有八寸一分漢前後志及諸家用審度分數審度之法以黄鐘之長為九十分亦以十為寸法故有九十分法雖不同其長短則一故隋志云寸數並同也其黄鐘下有宫太簇下有商姑洗下有羽林鐘下有角南吕下有徴字晉志論律書五音相生而以宫生角角生商商生徵徵生羽羽生宫求其理用罔見通達者是也仲吕下有徵夷則下有商應鐘下有羽字三者未詳亦疑後人誤増也下云上九商八羽七角六宫五徴九者即是上文聲律數太簇八寸為商姑洗七寸為羽林鐘六寸為角南吕五寸為徴黄鐘九寸為宫其曰宫五徴九誤字也漢志曰易曰參天兩地而倚數天之數始於一終於二十五其義紀之以三故置一得三又二十五分之六凡二十五置中天之數得八十一以天地五位之合終於十者乗之為八百一十分應厯一統孟康曰十九嵗為一章一統凡八十一章千五百三十九嵗之章數黄鐘之實也繇此之義起十二律之周徑孟康曰律孔徑三分參天數也圍九分終天數也地之數始於二終於三十其義紀之以兩故置一得二凡三十置終地之數得六十以地中六數乗之為三百六十分當期之日林鐘之實也孟康曰林鐘長六寸圍六分以圍乗長得三百六十分人者繼天順地序氣成物統八卦調八風理八政正八節諧八音舞八風監八方被八荒以終天地之功故八八六十四其義極天地之變以天地五位之合終於十者乗之為六百四十分以應六十四卦太簇之實也孟康曰太簇長八寸圍八分為積六百四十分也按漢志以黄鐘林鐘太簇三律之長自相乘又因之以十也黄鐘長九寸九九八十一又以十因之為八百一十林鐘長六寸六六三十六又以十因之為三百六十太簇長八寸八八六十四又以十因之為六百四十黄鐘應厯一統林鐘當期之日太簇應六十四卦皆倚數配合為説而已獨黄鐘云繇此之義起十二律之周徑葢黄鐘十其廣之分以為長十一其長之分以為廣故空圍九分積八百一十分其數與此相合長九寸積八百一十分則其周徑可以數起矣即胡安定所謂徑三分四釐六毫圍十分二釐八毫者是也孟康不察乃謂凡律圍徑不同各以圍乗長而得此數者葢未之攷也後漢鄭康成月令註曰凡律空圍九分孔穎達疏曰諸律雖短長有差其圍皆以九分為限蔡邕銅龠黄鐘之宫之宫宫長九寸空圍九分容秬黍一千二百粒稱重十二銖兩之為一合三分損益轉生十一律月令章句曰古之為鐘律者以耳齊其聲後人不能則假數以正其度度正則音已正矣鐘以斤兩尺寸中所容受升斗之數為法律亦以寸分長短為度故曰黄鐘之管長九寸徑三分其餘皆稍短雖大小圍數無増減以度量者可以文載𫝊與衆共知然不如耳决之明也韋昭周語註曰黄鐘之變也管長九寸徑三分圍九分因而九之九九八十一故黄鐘之數立焉按鄭康成月令註云凡律空圍九分蔡邕銅龠銘亦云空圍九分葢空圍中廣九分也東都之亂樂律㪚亡蔡邕之時未亂當親見之又曉解律吕而月令句云徑三分何也孟康韋昭之時漢斛雖在而律不存矣康昭等不通律吕故康云黄鐘林鐘太簇圍徑各異昭云黄鐘徑三分皆無足怪者隋氏之失豈康昭等有以啟之與不知而作宜聖人所深戒也魏徴隋志曰開皇元年平陳後牛𢎞辛彦之鄭譯何妥等參考古律度合依時代制律其黄鐘之管俱徑三分長九寸度自有損益故聲有高下圍徑長短與度而差故容黍不同今列其數云晉前尺黄鐘容黍八百八粒法法尺黄鐘容黍百二十八梁表尺黄鐘三其一容九百二十五其一容九百一十其一容一千一百二十漢官尺黄鐘容九百三十九古銀錯題黄鐘龠容一千二百宋氏尺即鐵尺黄鐘凡二其一容一千二百其一容一千四十七後魏前尺黄鐘容一千一百一十五後周玉尺黄鐘容一千二百六十七後魏中尺黄鐘容一千五百五十五後魏後尺黄鐘容一千八百一十九東魏尺黄鐘容二千八百六十九萬寳常水尺律母黄鐘容黍一千三百二十梁寳鐵尺律黄鐘副别者其長短及口空之圍徑並同而容黍或多或少皆是作者旁庣其腹使有盈虚按梁表尺三律與宋氏尺二律容授不同史謂作者旁庣其腹使有盈虚則當時制作之疎亦可見矣晉前尺律黄鐘止容八百八黍者失在於徑三分也古銀錯與玉尺玉斗合玉斗之容受與晉前尺徑三分四釐六毫者不甚相逺但玉尺律徑不及三分故其律遂長而尺長於晉前尺一寸五分八釐葢自漢魏而下造律竟不能成而度之長短量之容受權衡之輕重皆戾於古大率皆由徑三分之説誤之也本朝胡安定律吕議曰按厯代律吕之制黄鐘之管長九十黍之廣積九寸度之所由起也容千二百黍積八百一十分量之所由起也重十有二銖權衡之所由起也既度量權衡皆出於黄鐘之龠則黄鐘之龠圍徑容受可取四者之法交相酬騐使不失其實也今驗黄鐘律管每長一分内實十三黍又三分黍之一圍中容九方分也後世儒者執守孤法多不能貫知權量之法但制尺求律便為堅證因謂圍九分者取空圍圓長九分爾以是圍九分之誤遂有徑三分之説若從徑三圍九之法則黄鐘之管止容九百黍積止六百七分半如此則黄鐘之聲無從而正權量之法無從而生周之嘉量漢之銅斛皆不合其數矣按十二律圍徑自先以以前傳記並無明文惟班志云黄鐘八百一十分繇此之義起十二律之周徑然其説乃是以律之長自乗而因之以十葢配合為説耳未可以為據也惟審度章云一黍之廣度之九十分黄鐘之長一為一分嘉量章則以千二百黍實其龠分衡權章則以千二百黍為十二銖則是累九十黍以為長積千二百黍以為廣可見也夫長九十黍容千二百黍則空圍當有九方分乃是圍十分三釐八毫徑三分四釐六毫也毎一分容十三黍又三分黍之一以九十因之則一千二百也又漢斛銘文云律加量方尺圓其外庣旁九釐五毫羃百六十二寸深尺積一千六百二十寸容十斗嘉量之法合龠為合十合為升十升為斗十斗為石一石積一千六百二十寸為分者一百六十二萬一斗積一百六十二寸為分者十六萬二千一升積十六寸二分為分者一萬六千二百一合積一寸六分二釐為分者一千六百二十則黄鐘之龠為八百一十分明矣空圍八百一十分則長累九十黍廣容一千二百黍矣葢十其廣之分以為長十一其長之分以為廣自然之數也自孟康以律之長十之一為圍之謬其後韋昭之徒遂皆有徑三分之説而隋志始著以為定論然累九十黍徑三黍止容黍八百有竒終與一千二百黍之法兩不相通而律竟不成唐因聲制樂雖近於古而律亦非是本朝承襲皆不能覺獨胡安定以為九分者方分也以破徑三分之法然所定之律不本於聲氣之元一取之秬黍故其度量權衡皆與古不合又不知變律之法但見仲吕反生不及黄鐘之數乃遷就林鐘以下諸律圍徑以就黄鐘清聲以夷則南吕為徑三分圍九分無射為徑二分八釐圍八分四釐應鐘為徑二分六釐五毫圍七分九釐五毫夫律以空圍之同故其長短之異可以定聲之高下而其所以為廣狹長短者又莫不有自然之數非人之所能為也今其律之空圍不同如此則亦不成律矣遂使十二律之聲皆不當位反不如何峴舊樂之為條理亦可惜也房庻以徑三分周圍九分累黍容受不能相通遂廢一黍為一分之法而增益班志八字以就其説范蜀公乃從而信之過黄鐘之實第三淮南子曰規始於一一不生故分而為隂陽隂陽合和而萬物生故曰一生二二生三三生萬物天地三月而為一時故祭祀三飯以為禮喪紀三踊以為節兵重三罕以為制三叅物三三如九故黄鐘之九寸而宫音調因而九之九九八十一故黄鐘之數立焉黄者土徳之色鐘者氣所種也日冬至徳氣為土土色黄故曰黄鐘律之數六分為雌雄故曰十二分以副十二月十二各以三成故置一而十一三之為積分十七萬七千一百四十七黄鐘大數立焉前漢志曰太極元氣函三為一極中也元始也行於十二辰始動於子參之於丑得三又參之於寅得九又參之於邜得二十七又參之於辰得八十一又參之於已得二百四十三又參之於午得七百二十九又參之於未得二千一百八十七又參之於申得六千五百六十一又參之於酉得萬九千六百八十三又參之於戌得五萬九千四十九又參之於亥得十七萬七千一百四十七此隂陽合徳氣鐘於子化生萬物者也律書曰置一而九三之以為法實如法得長一寸凡得九寸命曰黄鐘之律按淮南子謂置一而十一三之以為黄鐘之大數即此置一而九三之以為寸法者其術一也夫置一而九三之既為寸法則七三之為分法五三之為釐法三三之為毫法一三之為絲法從可知矣律書獨舉寸法者葢已生於鐘分内黙具律寸分釐毫絲之法而又於此律數之下指其大者以明凡例也一三之而得三三三之而得二十七五三之而得二百四十三七三之而得二千一百八十七九三之而得一萬九千六百八十三故一萬九千六百八十三以九分之則為二千一百八十七二千一百八十七以九分之則為二百四十三二百四十三以九分之則為二十七二十七以九分之則為三三者絲法也九其三得二十七則毫法也九其二十七得二百四十三則釐法也九其二百四十三得二千一百八十七則分法也九其二千一百八十七得一萬九千六百八十三則寸法也一寸九分一分九釐一釐九毫一毫九絲以之生十一律以之生五聲二變上下乗除參同契合無所不通葢數之自然也顧自淮南太史公之後即無識其意者如京房之六十律雖亦用此十七萬七千一百四十七之數然乃謂不盈寸者十之所得為分又不盈分者十之所得為小分以其餘為强弱不知黄鐘九寸以三損益數不出九茍不盈分者十之則其竒零無時而能盡雖泛以强弱該之而卒無以見强弱之為幾何則其數之精㣲固有不可得而紀者矣至於杜佑胡瑗范蜀公等則又不復知有此數而以意强為之法故通典則自南吕而下各自為法固不可以見分釐毫絲之實胡范則止用八百一十分乃是以積實生量之數為律之長而其因乗之法亦用十數故其餘筭亦皆棄而不録葢非有意於棄之實其重分累析至於無數之可紀故有所不得而録耳夫自絲以下雖非日力之所能分然既有其數而或一算之差則法於此而遂變不以約十為九之法分之則有終不可得而齊者故淮南太史公之書其論此也已詳特房等有不察耳司馬貞史記索隱註黄鐘八寸十分一云律九九八十一故云八寸十分一漢書云長九寸者九分之寸也此則古人論律以九分為寸之明騐也三分損益上下相生第四吕氏春秋曰黄鐘生林鐘林鐘生太簇太簇生南吕南吕生姑洗姑洗生應鐘應鐘生㽔賔㽔賔生大吕大吕生夷則夷則生夾鐘夾鐘生無射無射生仲吕三分所生益之一分以上生三分所生去其一分以下生黄鐘大吕太簇夾鐘姑洗仲吕㽔賔為上林鐘夷則南吕無射應鐘為下淮南子曰黄鐘位子其數八十一主十一月下生林鐘林鐘之數五十四主六月上生太簇太簇之數七十二主正月下生南吕南吕之數四十八主八月上生姑洗姑洗之數六十四主三月下生應鐘應鐘之數四十二主十月上生㽔賔㽔賔之數五十六主五月上生大吕大吕之數七十六主十二月下生夷則夷則之數五十一主七月上生夾鐘夾鐘之數六十八主二月下生無射無射之數四十五主九月上生仲吕仲吕之數六十主四月極不生按吕氏淮南子上下相生與司馬氏律書漢前志不同雖大吕夾鐘仲吕用倍數則一然吕氏淮南不過以數之多寡為生之上下律吕隂陽皆錯亂而無倫非其本法也律書生鐘分子一分丑三分二寅九分八夘二十七分十六辰八十一分六十四巳二百四十三分一百二十八午七百二十九分五百一十二未二千一百八十七分一千口口二十四申六千五百六十一分四千口口九十六酉一萬九千六百八十三分八千一百九十二戌五萬九千口口四十九分三萬二千七百六十八亥一十七萬七千一百四十七分六萬五千五百三十六按此即三分損益上下相生之數其分字以上者皆黄鐘之全數子律數寅寸數辰分數午釐數申毫數戌絲數其丑夘巳未酉亥則三分律寸分釐毫絲之法也其分字以下者諸律所取於黄鐘長短之數也假令子一分則一為九寸是黄鐘之全數丑三分二則一為三寸三三如九亦是黄鐘之九寸二分取其二故林鐘得六寸寅九分八則一為一寸亦是黄鐘之九寸九分取其八故太簇得八寸其上下相生之叙則晉志所謂在六律為陽則當位自得而下生於隂六吕為隂則得其所衝而上生於陽者是也丑為林鐘夘為南吕巳為應鐘未為大吕酉為夾鐘亥為仲吕大吕夾鐘仲吕止得半聲必用倍數乃與天地之氣相應其寸分釐毫絲皆積九以為法詳見上章漢前志曰黄鐘三分損一下生林鐘三分林鐘益一上生太簇三分太簇損一下生南吕三分南吕益一上生姑洗三分姑洗損一下生應鐘三分應鐘益一上生㽔賔三分㽔賔損一下生大吕三分大吕益一上生夷則三分夷則損一下生夾鐘三分夾鐘益一上生無射三分無射損一下生仲吕隂陽相生自黄鐘始而左旋八八為伍律書曰術曰以下生者倍其實三其法上生者四其實三其法假令黄鐘九寸下生則倍其實為一尺八寸三其法乃為六寸而得林鐘林鐘六寸上生則四其實為二尺四寸三其法乃為八寸而得太簇他皆倣此漢後志曰術曰陽以圖為形其性動隂以方為節其性静動者數三静者數二以陽生隂倍之以隂生陽四之皆三而一陽生隂曰下生隂生陽曰上生上生不得過黄鐘之清濁下生不得及黄鐘之數實皆參天兩地圓葢方覆六耦承竒之道也黄鐘律吕之首而生十一律者也和聲第五漢前志曰黄鐘為宫則太簇姑洗林鐘南吕皆以正聲應無有忽㣲不復與他律為役者同心一統之義也非黄鐘而他律雖當其月自宫者則其和應之律有空積忽㣲不得其正此黄鐘至尊亡與並也按黄鐘為十二律之首他律無大於黄鐘故其正聲不為他律役其半聲當為四寸五分而前乃云無者以十七萬七千一百四十七之數不可分乂三分損益上下相生之所不及故亦無所用也至於大吕之變宫夾鐘之羽仲吕之徵㽔賔之變徵夷則之角無射之商自用變律半聲非復黄鐘矣此其所以最尊而為君之象然亦非人之所能為乃數之自然他律雖欲役之而不可得也此一節最為律吕旋宫用聲之綱領古人言之已詳唯杜佑通典再生黄鐘之法為得之而他人皆不及也右説見下條漢後志京房六十律黄鐘子黄鐘生林鐘未林鐘生太簇寅太族生南吕酉南吕生姑洗辰姑洗生應鐘亥應鐘生㽔賔午㽔賔生大吕丑大吕生夷則申夷則生夾鐘夘夾鐘生無射戌無射生仲吕巳仲吕生執始子執始生去滅未去滅生時息寅時息生結躬酉結躬生變虞辰變虞生遲内亥遲内生盛變午盛變生分否丑分否生觧形申觧形生開時夘開時生閉掩戌閉掩生南中巳南中生丙盛子丙盛生安度未安度生屈齊寅屈齊生歸期酉歸期生路時辰路時生未育亥未育生離宫午離宫生凌隂丑凌隂生去南申去南生族嘉夘族嘉生鄰齊戌鄰齊生内負巳内負生分動子分動生歸嘉未歸嘉生隨時寅隨時生未夘酉未夘生形始辰形始生遲時亥遲時生制時午制時生少出丑少出生分積申分積生争南夘争南生期保戌期保生物應巳物應生質未子質未生否與未否與生形晉寅形晉生惟汗酉惟汗生依行辰依行生包育亥包育生謙待未謙待生未知寅未知生白吕酉白吕生南授辰南授生分烏亥分烏生南事午按世之論律者皆以十二律為循環相生不知三分損益之數往而不返仲吕再生黄鐘止得八寸七分有竒不成黄鐘正聲京房覺其如此故仲吕再生别名執始轉生四十八律其三分損益不盡之筭或棄或增夫仲吕上生不成黄鐘京房之見則是矣至於轉生四十八律則是不知變律之數止於六者出於自然不可復加雖强加之而亦無所用也况律學㣲妙其生數立法正在毫釐秒忽之間今乃以不盡之筭不容損益遂或棄之或増之則其畸贏贅虧之積亦不得為此律矣又依行在辰上生包育編於黄鐘之次乃是隔九其黄鐘林鐘太簇南吕姑洗毎律統五律㽔賔應鐘毎律統四律大吕夾鐘仲吕夷則無射毎律統三律三五不周多寡不例其與反生黄鐘相去五十百步之間耳意者房之所𫝊出于焦氏焦氏卦氣之學亦去四而為六十故其推律亦必求合卦氣之數不知數之自然在律者不可増而於卦者不可減也何承天劉焯譏房之病葢得其一二然承天與焯皆欲增林鐘已下十一律之分使至仲吕反生黄鐘還得十七萬七千一百四十七之數如此則是惟黄鐘一律成律他十一律皆不應三分損益之數其尖又甚於房矣可謂目察秋毫而不見其睫也杜佑通典曰陳仲儒云調聲之體宫商宜濁徵羽宜清若依公孫崇止以十二律而云還相為宫清濁悉足非惟未練五調調器之法至於五聲次第自是不足何者黄鐘為聲氣之元其管最長故以黄鐘為宫太簇為商林鐘為徵則一相順若均之八音猶湏錯採衆聲配成其美若以應鐘為宫大吕為商㽔賔為徵則徵濁而宫清雖有其韻不成音曲若以無射為宫則十二律中惟得取仲吕為徵其商角羽並無其韻若以仲吕為宫則十二律内全無所取何者仲吕為十二律之窮變律之首也依京房書仲吕為宫乃以去滅為商執始為徵然後成韻而崇乃以仲吕為宫猶用林鐘為商黄鐘為徵何由可諧按仲儒所以攻公孫崇者當矣其論應鐘為宫大吕為商㽔賔為徴商徵皆濁於宫雖有其韻不成音曲又謂仲吕為宫則十二律内全無所取由為的切然仲儒所主是京氏六十律不知依行為宫包育為徵果成音曲乎果有其韻乎盖仲儒知仲吕之反生不可為黄鐘而不知變至扵六則數窮不生雖或增或棄成就使然之數强生餘律亦無所用也通典曰十二律相生之法自黄鐘始黄鐘之管九寸三分損益下生林鐘林鐘上生太簇太簇下生南吕南吕上生姑洗姑洗下生應鐘應鐘上生㽔賔㽔賔上生大吕大吕下生夷則夷則上生夾鐘夾鐘下生無射無射上生仲吕仲吕之管長六寸一萬九千六百八十三分寸之萬二千九百七十四此謂十二律長短相生一終於仲吕之法又制十二鐘以准十二律之正聲又鳬氏為鐘以律計自倍半以子聲比正聲則正聲為倍以正聲比子聲則子聲為半但先儒釋用倍聲有二義一義云半十二律正律為十二子聲之鐘二義云從於仲吕之管寸數以三分益一上生黄鐘以所得管之寸數然後半之以為子聲之鐘其為變正聲之法者以黄鐘之管正聲九寸子聲則四寸半又上下相生之法者以仲吕之管長六寸一萬九千六百八十三分寸之萬二千九百七十四上生黄鐘三分益一得八寸五萬九千四十九分寸之五萬一千八百九十六半之得四寸五萬九千四十九分寸之二萬五千九百四十八以為黄鐘又上下相生以至仲吕皆以相生所得之律寸數半之以為子聲之律按此説黄鐘九寸生十一律有十二子聲所謂正律正半律也又自仲吕上生黄鐘黄鐘八寸五萬九千四十九分寸之五萬一千八百九十六又生十一律亦有十二子聲即所謂變律變半律也正變及半凡四十八聲上下相生最得漢志所謂黄鐘不復為他律役之意與律書五聲大小次第之法但變律止於應鐘雖設而無所用則其實三十六聲而已其間陽律不用變聲而黄鐘又不用正半聲隂吕不用正半聲而應鐘又不用變半聲其實又二十八聲而已其詳見於前篇之八章五聲小大之次第六國語曰大不踰宫細不過羽夫宫音之生也第以及羽律書曰律數九九八十一以為宫三分去一五十四以為徴三分益一七十二以為商三分去一四十八以以為羽三分益一六十四以為角通典曰古之神瞽攷律均聲必先立黄鐘之均也聲十二律起黄鐘之氣數黄鐘之管以九寸為法度其中氣明其陽數之極故用九自乗為管絲之數九九八十一數其增減之法又以三為度以上生者皆三分益一下生者皆三分去一宫生徴三分宫數八十一則分各二十七下生者去一去二十七餘有五十四以為徴故徴數五十四也徴生商三分徴數五十四則分各十八上生者益一加十八於五十四得七十二以為商故商數七十二也商生羽三分商數七十二則分各二十四下生者去其一去二十四得四十八以為羽故羽數四十八也羽生角三分羽數四十八則分各十六上生者益一加十六於四十八則得六十四以為角故角數六十四也此五聲小大之次也是黄鐘為均用五聲之法以下十一辰辰各有五聲其為宫商之法亦如之辰各有五聲合為六十聲是十一律之正聲也按宫聲之數八十一商聲之數七十二角聲之數六十四徴聲之數五十四羽聲之數四十八是黄鐘一均之數而十一律於此取法焉通典所謂以下十一辰辰各五聲其為宫為商之法亦如之者是也夫以十二律之宫長短不同而其臣民事物尊卑莫不有序而不相陵犯良以是耳沈括不知此理乃以為五十四在黄鐘為徴在夾鐘為角在仲吕為商者其亦誤矣俗樂之有清聲葢亦畧知此意但不知仲吕反生黄鐘黄鐘又自林鐘再生太簇皆為變律已非黄鐘太簇之清聲耳胡安定知其如此故於四清聲皆小其圍徑則黄鐘太簇二聲雖合而大吕夾鐘二聲又非本律之半且自夷則至應鐘四律皆以次小其圍徑以就之遂使十二律五聲皆有不得其正者則亦不成樂矣若李照蜀公正用十二律則又全然不知此理者也葢樂之和者在於三分損益樂之辨者在於上下相生若李照蜀公之法其合於三分損益者則和矣自夷則已降則其臣民事物豈能尊卑有辨而不相陵犯乎晉荀朂之笛梁武帝之通亦不知此而有作者也變宫變徴第七春秋左氏傳晏子曰先生之齊五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也漢前志曰書曰予欲聞六律五聲八音七始詠以出納五言汝聽淮南子曰宫生徴徴生商商生羽羽生角角生應鐘不比於正音故為和應鐘生㽔賔不比於正音故為繆通典注曰按應鐘為變宫㽔賔為變徴自殷以前但有五音自周以來加文武二聲謂之七聲五聲為正二聲為變變者和也按宫與商商與角徴與羽相去皆一律角與徴羽與宫相去獨二律一律則近而和二律則逺而不相及故宫羽之間有變宫角徴之間有變徴此亦出於自然左氏所謂七音漢前志所謂七始是也然五聲者正聲故以起調畢曲為諸聲之綱至二變聲則宫不成官徴不成徴不比於正音但可以濟五聲之所不及而已然有五音而無二變亦不可以成樂也六十調第八周禮曰春官大司樂凡樂圜鐘為宫黄鐘為角太簇為徴姑洗為羽雷鼓雷鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鐘為宫太簇為角姑洗為徴南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黄鐘為宫大吕為角太簇為徴應鐘為羽路鼓路鼗隂竹之管龍門之琴瑟九徳之歌九磬之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣按此祭祀之樂不用商聲只有宫角徴羽四聲無變宫變徴葢古人變宫變徴不為調也左氏傳曰中聲以降五降之後不容彈矣夫五降之後更有變宫變徴而曰不容彈者以二變之不可為調也或問周禮大司樂説宫角徴羽與七聲不合如何朱子曰此是降神之樂如黄鐘為宫大吕為角大簇為徴應鐘為羽自是四樂各舉其一者而言之以大吕為角則南吕為宫太簇為徴則林鐘為宫應鐘為羽則太簇為宫以七聲推之合如此注家之説非也禮記禮運曰五聲六律十二管還相為宫也鄭氏注曰五聲宫商角徴羽也其管陽曰律隂曰吕布十二辰始於黄鐘管長九寸下生者三分去一上生者三分益一終於仲吕更相為宫凡六十也孔氏疏曰黄鐘為第一宫下生林鐘為徴上生太簇為商下生南吕為羽上生姑洗為角林鐘為第二宫上生太簇為徴下生南吕為商商上生姑洗為羽下生應鐘為角太簇為第三宫下生南吕為徴上生姑洗為商下生應鐘為羽上生㽔賔為角南吕為第四宫上生姑洗為徴下生應鐘為商上生㽔賔為羽下生太吕為角姑洗為第五宫下生應鐘為徴上生㽔賔為商上生大吕為羽下生夷則為角應鐘為第六宫上生㽔賔為徴上生大吕為商下生夷則為羽上生夾鐘為角㽔賔為第七宫上生大吕為徴下生夷則為商上生夾鐘為羽下生無射為角大吕為第八宫下生夷則為徴上生夾鐘為商下生無射為羽上生仲吕為角夷則為第九宫上生夾鐘為徴下生無射為商上生仲吕為羽上生黄鐘為角夾鐘為第十宫下生無射為徴上生仲吕為商上生黄鐘為羽下生林鐘為角無射為第十一宫上生仲吕為徴上生黄鐘為商下生林鐘為羽上生太簇為角仲吕為第十二宫上生黄鐘為徴下生林鐘為商上生太簇為羽下生南吕為角是十二宫各有五聲凡六十聲淮南子曰一律而五音十二律而為六十音因而六之六六三十六故三百六十音以當一嵗之日故律厯之數天之道也按聲者所以起調畢曲為諸聲之綱領禮運所謂還相為宫所以始於黄鐘終於南吕也後世以變宫變徴參而八十四調其亦不攷矣候氣第九後漢志候氣之法為室三重户閉塗釁必周密布緹縵室中以木為按毎律各一内庳外髙從其方位加律其上以葭莩灰抑其内端按厯而候之氣至者灰去其為氣所動者其灰㪚人及風所動者其灰聚隋志後齊神武覇府田曺㕘軍信都芳深有巧思能以管候氣仰觀雲色嘗與人對語即指天曰孟春之氣至矣人往驗管而飛灰已應毎月所候言皆無爽又為輪扇二十四埋地中以測二十四氣每一氣感則一扇自動他扇自住與管灰相應若符契焉開皇九年平陳後髙祖遣毛爽及蔡子元于普明等以候節氣依古於三重宻室之内以木為按十有二具毎取律吕之管隨十二辰位置于按上而以土埋之上平於地中實葭莩之灰以輕緹素覆律口毎其月氣至與律冥符則灰飛衝素散出于外而氣應有早晩灰飛有多少或初入月其氣即應或至中下旬間氣始應者或灰飛出三五夜而盡或終月纔飛少許者高祖異之以問牛𢎞牛𢎞對曰灰飛半出為和氣吹灰全出為猛氣吹灰不能出為衰氣吹和氣應者其政平猛氣應者其臣縱衰氣應者其君暴高祖駁之曰臣縱君暴其政不平非日别而月異也今十二月於一嵗之内應用不同安得暴君縱臣若斯之甚也宏不能對令爽等草定其法爽因稽諸故實以著于篇名曰律譜其畧云漢興張蒼定律乃推五勝之法以為水徳實因戰國官失其守後秦滅學其道浸㣲蒼補綴之未獲詳究及孝武創制乃置協律之官用李延年以為都尉頗解新聲變曲未達音律之源至于元帝自曉音律郎官京房亦達其妙於後劉歆典領奏著其始末理漸研精班氏漢志盡歆所出也司馬彪志並房所出也至於後漢尺度稍長魏代杜䕫亦制律吕以之候氣灰悉不飛晉光禄大夫荀朂得古銅管校䕫所制長古四分方知不調事由其誤乃依周禮更造古尺用之定管聲韻始調左晉之後漸又訛謬至梁武帝時猶有汲冢玉律宋蒼梧時鑽為横吹然其長短厚薄大體具存臣先人栖誠學筭祖暅問律於何承天沈研三紀頗達其妙後為太常丞典司樂職乃取玉管及宋太史尺並以聞奏詔付大匠依様制管自斯以後律又飛灰侯景之亂臣兄喜於大樂得之後陳宣帝詣荆州為質俄遇梁元帝敗喜没於周適欲上聞陳武帝立遂以十二管衍為六十律私候氣序并有徴應至太建乃與均鐘器合按律者陽氣之動陽聲之始必聲和氣應然後可以見天地之心今不此之先而乃區區於黍之縱横古錢之大小其亦難矣然非精於厯數則氣節亦未易正也度量權衡第十周禮典瑞璧羡以起度玉人璧羡度尺好三寸以為度按爾雅曰肉倍好謂之璧羡延也此璧本圓徑九寸好三寸肉六寸而裁其兩旁各半寸以益上下也其好三寸所以為璧也裁其兩旁以益上下所以為羡也袤十寸廣八寸所以為度尺也以為度者以為長短之度也則周家十寸八寸皆為尺矣陳氏曰以十寸之尺起度則十尺為丈十丈為引以八寸之尺起度則八尺為㝷倍㝷為常説文曰人手却十分動脉為寸口十寸為尺周制寸咫尺㝷常仞皆以人體為法又曰婦人手八寸謂之咫周尺也又曰丈丈夫也周制以八寸為尺十尺為丈人長八尺故曰丈夫淮南子曰秋分蔈定蔈定而禾熟律之數十二故十二蔈而當一粟十二粟而當一寸律以當辰音以當日日之數十故十寸而為尺十尺而為丈説苑曰度量權衡以粟生之一粟為一分十分為一寸十寸為一尺十尺為一丈易緯通卦驗以十馬尾為一分孫子筭術曰蠶所吐絲為忽十忽為一絲十絲為一毫十毫為一釐十釐為一分十分為一寸十寸為一尺十尺為一丈漢前志曰度者分寸尺丈引也所以度長短也本起黄鐘之長以子榖秬黍中者一黍房庶云得古本漢書一黍字下有之起積一千二百黍八字今本漢書闕之之廣度之九十分黄鐘之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣按一黍之廣為分故累九十黍為黄鐘之長積千二百黍為黄鐘之廣古人葢三五以存法也自晉宋以來儒者論律圍徑始有同異至隋因定圍徑三分之説茍徑三分則九十黍之長止容黍八百有竒與千二百黍之廣兩不相通矣房庻不知徑三分之為誤乃欲增益漢志之文以就其説范蜀公又從而信之其過益又甚矣隋志十五等尺一周尺前漢志王莽時劉歆銅斛尺後漢建武銅尺晉荀朂律尺為晉前尺祖冲之所傳銅尺晉武帝泰始九年中書監荀朂校太樂八音不和始知為後漢至魏尺長於古尺四分有餘朂乃部著作郎劉恭依周禮制尺所謂古尺也依古尺更鑄銅律吕以調聲韻以尺量古器與本銘尺寸無差又汲郡盗發魏襄王冢得古周時玉律及鐘磬與新律聲韻闇同于時郡國或得漢時故鐘吹新律命之皆應梁武鐘律緯云祖冲之所𫝊銅尺其銘曰晉泰始十年中書考古器揆校今尺長四分半所校古法有七品一曰姑洗玉律二曰小吕玉律三曰西京銅望臬四曰金錯望臬五曰銅斛六曰古錢七曰建武銅尺姑洗㣲强西京望臬㣲弱其餘與此尺同銘八十二字此尺者朂新尺也今尺者杜䕫尺也按此尺出於汲冡之律與劉歆之斛最為近古葢漢去古未逺古之律度量權衡獨在也故班氏所志無諸家異同之論王莽之制作雖不足據然律度量衡當不敢變於古也自董卓之亂而樂律㪚亡故杜䕫之律圍徑差小而尺因以長荀朂雖定此尺然其樂聲高急不知當時律之圍徑又果何如也後周以玉斗生律玉斗之容受則近古矣然當時以斗制律圍徑不及三分其尺遂長於此尺一寸五分八釐意者後世尺度之差皆由律圍徑之誤也今司馬公所𫝊此尺者出於王莽之法錢葢丁度所奏高若訥所定者也雖其年代久逺輪郭不無消毁然其大約當尚近之後之君子有能驗聲氣之元以求之古之律吕者於此當有考而不可忽也二晉田父玉尺梁法尺實比晉前尺一尺七釐世説稱有田父於野地中得周時玉尺便是天下正尺荀朂試以校已所造金石絲竹皆短校一米梁武帝鐘律緯稱從上相傳有周時銅尺一枚古玉律八枚檢周尺東昏用為章信尺不復存玉律一口簫餘定七枚夾鐘有昔題刻廼制為尺以相叅驗取細毫中黍積次訓定最為詳密以新尺制為四器名曰通又依新尺為笛以命古鐘按此兩尺長短近同三梁表尺實比晉前尺一尺二分二釐一毫有竒蕭吉云出於司馬法梁朝刻其度於影表以測影按此即祖暅所筭造銅圭影表者也四漢官尺晉時始平掘地得古銅尺實比晉前尺一尺三分七毫蕭吉云漢章帝時零陵文學史奚景於冷道縣舜廟下得玉律度為此尺傳暢晉諸公讚云荀勗新造鐘律時人並稱其精密惟陳留阮咸譏其聲高後始平掘地得古銅尺嵗久欲腐以校荀勗今尺短校四分時人以咸為神解此兩尺長短近同五魏尺杜䕫所用調律實比晉前尺一尺四分七釐按劉徽九章註云此尺長於王莽斛尺四分五釐然即其斛分以二千龠約之知其律止容七百二十分六釐六毫六絲有竒則其徑為三分三釐弱爾然則其斛分數與王莽斛分雖不同而其容受多寡相去未懸逺也六晉後尺實比晉前尺一尺六分二釐蕭吉云晉氏江東所用七後魏前尺實比晉前尺一尺二寸七釐八中尺實比晉前尺一尺二寸一分一釐九後尺實比晉前尺一尺二寸八分一釐後周市尺開皇官尺即鐵尺一尺二寸此後魏初及東西分國後周未用玉尺之前雜用此等尺十東後魏尺實比晉前尺一尺五寸八毫魏史律歴志云公孫崇永平中更造新尺以一黍之長累為寸法㝷太常卿劉芳受詔脩樂以秬黍中者一黍之廣即為一分而中尉元匡以一黍之廣度黍二縫以取一分三家分競久不能决太和十九年高祖詔以一黍之廣用成分體九十之黍黄鐘之長以定銅尺有司奏從前詔而芳尺同高祖所置故遂典脩金石迄武定未有論律者十一蔡邕銅龠尺後周玉尺實比晉前尺一尺一寸五分八釐從上相承有銅龠一以銀錯題其銘見制律篇中祖孝孫云相承傳是蔡邕銅龠後周武帝保定中詔遣盧景宣長孫紹逺斛斯徴等累黍造尺從横不定後因脩倉掘地得古玉斗以為正噐據斗造律度量衡因用此尺大赦改元天和百司行用終於大象之未其律與蔡邕古龠同按銅龠玉斗二者當是古之嘉量當時據斗造尺但以容受乗除求之然自魏而下論律者多成於三分之徑今以隋志所載玉斗容受析之為一十一萬八百分有竒一斗計二百龠以二百約之得五百五十四分有竒為一龠之分以筭法攷之其徑不及三分故其尺律遂長然權量與聲尚相依近也唐之度量權衡與玉斗相符即此尺爾十二宋氏尺錢樂之渾天儀尺後周鐵尺實比晉前尺一尺六分四釐開皇初調鐘律尺及平陳後調鐘律水尺此宋代人間所用尺傳入齊梁陳以制樂制與晉後尺及梁時俗尺劉曜渾儀尺畧相依近當由人間常用增損訛替之所致也周建徳六年平齊後即以此同律度量頒于天下其後宣帝時達奚震及牛𢎞等議曰竊惟權衡度量經邦懋軌誠須詳求故實考校得𠂻謹㝷今之鐵尺是太祖遣尚書故蘇綽所造當時檢勘用為前周之尺驗其長短與宋尺符同即以調鐘律并用均田度地今以上黨羊頭山黍依漢書歴志度之若以大者稠黍依數滿尺實於黄鐘之律須撼乃容若以中者累尺雖復小稀實於黄鐘之律不動而滿計此二事之殊良由消息未善其於鐵尺終有一㑹且上黨之黍有異他鄉其色至烏其形圓重用之為量定不徒然正以時有水旱之差地有肥瘠之異取黍大小未必得中按許慎解秬黍體大本異於常疑今之大者正是其中累百滿尺即是會古實龠之外纔剰十餘此恐圍徑或差造律未妙就如撼動取滿論理亦通今勘周漢古錢大小有合宋氏渾儀尺度又依淮南累粟十二成寸明先王制法索隠鉤深以律計分義無差異漢書食貨志云黄金方寸其重一斤今鑄金校驗鐵尺為近依文據理符㑹處多且平齊之始已用宣布今因而為定彌合時宜至於玉尺累黍以廣為長累既有剰實復不滿㝷訪古今恐不可用其晉梁尺量過為短小以黍實管彌復不容據律調聲必致高急且八音克諧明王盛軌同律度量哲后通規臣等詳校前經斟量時事謂用鐵尺於理為便未及詳定高祖受終牛𢎞辛彦之鄭譯何妥等久議不决既平陳一以江東樂為善曰此華夏舊聲雖隨俗改變大體猶是古法祖孝孫云平陳後廢周玉尺律便用此鐵尺律以一尺二寸即為市尺按此即本朝和峴所用影表尺也平陳以後葢用此尺范蜀公以為即今大府帛尺誤矣十三開皇十年萬寳常所造律吕水尺實比晉前尺一尺一寸八分六釐今大樂庫及内出銅律一部是萬寳常所造名水尺律説稱其黄鐘律當鐵尺南吕倍聲南吕黄鐘羽也故謂之水尺律按萬寳常之律與祖孝孫相近然亦皆徑三分之法也十四雜尺劉暉渾天儀土圭尺實比晉前尺一尺五分十五梁朝俗間尺實比晉前尺一尺七分一釐按十五等尺其間多無所取證所以存而不削者要見諸代之不同多由於累黍及圍徑之誤也五代王朴準尺比漢前尺一尺二分見丁度表本朝和峴用景表石尺比漢前尺一尺六分見丁度表太府布帛尺李照尺比漢前尺一尺三寸五分見温公尺圖阮逸胡瑗尺横累一百黍比太府布帛尺七寸八分六釐與景表尺同見胡瑗樂義鄧保信尺縱累百黍短於太府尺九分長於胡瑗尺九分五釐見鄧保信奏議大晟樂尺徽宗皇帝指三節為三寸長於王朴尺二寸一分和峴尺一寸八分弱阮逸胡瑗尺一寸七分短於鄧保信尺三分太府帛尺四分見大晟樂書仁宗景祐三年丁度等詳定黍尺鐘律丁度等言鄧保信所製尺用上黨秬黍圓者一黍之長累百而成又律管一據尺裁九十黍之長空徑三分圍九分容秬黍千二百遂用黍長為分再累成尺校保信尺律不同其龠合升斗深闊推以筭法類皆差舛不同周漢量法阮逸胡瑗所製亦上黨秬黍中者累廣求尺制黄鐘之律今用再累成尺比逸所製又復不同至於律管龠合升斗斛豆區鬴亦率類是葢黍有圓長大小而保信所用者圓黍又首尾相銜逸等止用大者故再攷之即不同尺既有差故難以定鐘磬謹詳古今之制自晉至隋累黍之法但求尺管不以權量叅校故歴代黄鐘之管容黍之數不同惟後周掘地得古玉斗據斗造律兼制權量亦不同周漢制度故漢志有備數和聲審度嘉量權衡之説悉起於黄鐘今欲數器之制參伍無失則班志積分之法為近逸等以大黍累尺小黍實龠自戾本法保信黍尺以長為分雖合後魏公孫崇説然當時已不施用况保信今尺以圓黍累之及首尾相銜又與實龠之黍再累成尺不同其量器分寸既不合古即權衡之法不可獨用詔悉罷之又詔丁度等詳定太府寺并鄧保信阮逸胡瑗所制四尺度等言漢志審度之法云一黍之廣為分十分為寸十寸為尺先儒訓解經籍多引以為義厯世祖襲著之定令然而嵗有豐儉地有磽肥就令一嵗之中一境之内取黍檢驗亦復不齊是葢天之生物理難均一古人立法存其大槩爾故前代制尺非特累黍必求古雅之器以黍校焉晉泰始十年荀公魯等校定尺度以調鐘律是為晉之前尺前史稱其意精密隋志所載諸代尺度十有五等以晉之前尺為本以其與姬周之尺劉歆銅斛尺建武銅尺相合竊惟周漢二代享年永久聖賢制作可取則焉而隋氏鑄毁金石典正之物罕復存者矣夫古物之有分寸明著史籍可以酬驗者惟有法錢而已周之圜法厯代曠逺莫得而詳察之半兩實重八銖漢初四銖其文亦曰半兩孝武之世始行五銖下洎隋朝多以五銖為號既厯代尺度屢改故小大輕重鮮有同者惟劉歆制銅斛之世所鑄錯刀并大泉五十王莽天鳯元年改鑄貨布貨錢之類不聞後世復有鑄者臣等檢詳漢志通典唐六典大泉五十重十二銖徑一寸二分錯刀環如大泉身形如刀長二寸貨布重二十五銖長二寸五分廣一寸首長八分有竒廣八分足枝長八分間廣二分圓好徑二分半貨錢重五銖徑一寸今以大泉錯刀貨布貨帛四物相叅校分寸正同或有小大輕重與本志微差者葢當時盗鑄既多不必皆中法度但當校其首足肉好長廣分寸皆合正史者用之則銅斛之尺從而可知矣有唐享國三百年其制作法度雖未逮周漢然亦可謂治安之世矣今朝廷必求尺度之中當依漢錢分寸若以為太祖膺圖受禪創制垂法甞詔和峴等用景表尺典脩金石七十年間薦之郊廟稽合唐制以示詒謀則可且依景表舊尺俟有妙達鐘律之學者俾攷正以從周漢之制王朴律準尺比漢錢尺寸長二分有竒比景表尺短四分既前代未甞施用復經太祖朝更易其逸瑗保信照所用太府寺尺其制彌長去古彌逺不可依用謹攷舊文再造景表尺一校漢錢尺二并大泉錯刀貨布貨泉總十七枚上進而高若訥卒用漢貨泉度一寸依隋書定尺十五種上之藏于太常寺周禮㮚氏為量改煎金錫則不耗不耗然後權之權之然後準之準之然後量之量之以為鬴深尺内方尺而圓其外其實一鬴鄭氏注曰以其容為之名也四升曰豆四豆曰區四區曰鬴鬴六斗四升也鬴十則鐘方尺積千寸於今粟米法少二升八十一分升之二十二其數必容鬴此言方耳圜其外者為之唇其臋一寸其實一豆故書臋作唇杜子春云當為臋謂覆之其底深一寸也其耳三寸其實一升耳在旁可舉也重一鈞三十斤聲中黄鐘之宫按周鬴容六斗四升實一千二百八十龠計一百三萬六千八百分為一千三十六寸八分甞攷漢斛容十斗實二千龠計一百六十二萬分為一千六百二十寸葢方尺圓其外庣旁九釐五毫故羃百六十二寸深尺積一千六百二十寸今攷周家八寸十寸皆為尺范蜀公曰周鬴方尺者八寸之尺深尺者十寸之尺方八寸圓其外庣其旁則羃一百三寸六分八釐深十寸則積一千三十六寸八分與漢斛同法無疑也鄭氏云方尺積千寸又云圓其外者為之唇二説皆非是方鄭氏之世漢斛尚在豈偶不及見歟抑鄭氏以為周鬴之制異於漢斛歟漢志曰量者龠合升斗斛也所以量多少也本起於黄鐘之龠用度數審其容以子榖秬黍中者千有二百實其龠以井水準其槩合龠為合十合為升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圜其外旁有庣焉其上為斛其下為斗左耳為升右耳為合龠其狀似爵上三下二參天兩地圜而函方左一右二隂陽之象也其圜象規其重二鈞備氣物之數合萬有一千五百二十聲中黄鐘之宫始於黄鐘而反覆焉隋志載斛銘曰律嘉量斛方尺而圓其外庣旁九釐五毫羃百六十二寸深尺積一千六百二十寸容十斗魏陳留王景元四年劉徽注九章商功曰當今大司農斛圍徑一尺三寸五分五釐深一尺積一千四百四十一寸十分寸之三王莽銅斛於今寸為深九寸五分五釐徑一尺三寸六分八釐七毫以徽計之於今斛為容九斗七升四合有竒比魏斛大而尺長王莽斛小而尺短也祖冲之以圜率攷之此斛當徑一尺四寸三分六釐一毫九秒二忽庣旁一分九毫有竒劉歆庣旁少一釐四毫有竒歆數術不精之所致也按斛銘文云方尺者所以起數也圜其外循四角而規圜之其徑當一尺四寸有竒也庣旁九釐五毫者徑一尺四寸有竒之數猶未足也羃百六十二寸者方尺羃百寸圜其外毎旁約十五寸合六十寸庣其旁約二寸也深尺積一千六百二十者以十而登也容十斗者一寸羃百六十二寸為容一斗積十寸容一千六百二十寸為容十斗也漢志止言旁有庣焉不言九釐五毫者數猶有未足也祖冲之所筭云少一釐四毫有竒是也胡安定之法積一千六百二十寸其律是也范蜀公之法積一千二百五十寸其律非也蜀公惑乎徑三分之説遂生圓分之法自古筭法無所謂圓分也圓其外以為之唇與安定之深一尺六寸二分蜀公之深一尺二寸五分其制皆非也律之圍徑古無明文向非因量之積分則黄鐘之龠亦無由可得其實自漢以下律之所以不成者其失皆此之由也淮南子曰十二粟而當一分十二分而當一銖十二銖而當半兩衡有左右因倍之故二十四銖為一兩天有四時以成一嵗因而四之四四十六故十六兩為一斤三月而為一時三十日為一月故三十斤為一鈞四時而為嵗故四鈞為石漢前志曰衡權者衡平也權重也衡所以任權而均物平輕重也本起於黄鐘之重一龠容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤一十六斤為鈞四鈞為石忖為十八易有十八變之象也五權之制以義立之以物鈞之其餘小大之差以輕重為宜圜而環之令之肉倍好者周旋無端終而復始無窮已也隋開皇中以古斗三升為一升以古稱三斤為一斤以一尺二寸為一尺大業中依復古法大唐貞觀中張文收鑄銅斛稱尺升合咸得其數詔以其副藏於樂署至武延秀為太常卿以為竒玩以律與古玉尺玉斗升合獻焉開元十七年將攷宗廟樂有司請出之勑唯以銅律付太常而亡其九管今正聲有銅律三百五十六銅斛二銅稱二銅甌十四斛左右耳與臋皆正方積十而登以至於斛銘云大唐貞觀十年嵗次𤣥枵月旅應鐘依新令累黍尺定律校龠成兹嘉量與古玉斗相符同律度量衡協律郎張文收奉勑脩定稱磬銘云大唐貞觀稱同律度權衡匣上有朱漆題稱尺二字尺亡其跡猶存以今常用度量校之尺當六之五衡量皆三之一一斛一稱是文收總章年所造斛正圓而小與稱相符也按萬寳常之樂當時以為近前漢之樂則是隋代漢律管雖亡而樂聲猶在也魏延陵得玉律當時以漢律較之所謂黄鐘乃當太簇肅宗之時不應更有漢律葢律之聲調耳張文收所定度量衡權與玉斗相符者即此聲也夫後周玉斗意者必古之嘉量但無寸分之數當時造律特以容受乘除取之自魏而降律之圍徑不得其真多惑於徑三分之説故當時據斗造律圍徑既小其律必長律長則尺亦長矣今以隋志所載玉斗分數求之其黄鐘之管止徑二分七釐七毫有竒圍八分一釐有竒羃五分五釐四毫有竒積五百五十四分有竒夫容受同則量與權當與古無異而樂之聲亦必依近焉故會要云唐樂器雖無法而聲不失於古自王朴以黍定尺以尺生律又惑於三分之徑聲與器始皆失之矣好古博雅君子於此葢不能無憾焉朱子曰禮記注疏説五聲六律十二管還相為宫處極分明漢書所載甚詳然不得其要史記所載甚畧却是要𦂳處如説律數葢自然之理與先天圖一般更無安排但數到窮處又須變而生之却生變律國語有七聲之説但韋昭解得無理㑹杜佑通典所筭分數極精葢唐以前樂律尚有制度可攷唐以後都無可攷胡安定與阮逸李照議不合仁宗以胡安定阮逸樂書令天下名山藏之意思甚好司馬公與范蜀公議又不合司馬比范又低諸公於通典皆似未曽看只如沈存中筆談所攷器數甚精亦似未曽看筆談所論過於范馬逺甚今世人無曉音律只憑器論造器又紛紛如此是故季通之書諸儒莫能及也廖子晦曰河出圖洛出書而起八卦九疇之數聽鳯鳴而生六律六吕之序然則黄帝造律一事與伏羲畫卦大禹錫疇同功况度量權衡皆起於律而衡運生規規生圓圓生矩䋲直準平至於定四時興六樂悉由是出故曰律者萬事之根本學者詎可廢而不講哉性理大全書卷二十三

body:
  text: 性理大全書卷五十七諸子一老子程子曰老氏之言雜權詐秦愚黔首其術蓋有所自老子語道德而雜權詐本末舛矣申韓蘇張皆其流之弊也申韓原道德之意而為刑名後世猶或師之蘇張得權詐之說而為縱橫其失益遠矣是以無傳焉老子言甚雜如隂符經却不雜然皆窺測天道之未盡者也老子曰無為又曰無為而無不為當有為而以無為為之是乃有為為也聖人作易未嘗言無為惟無思也無為也此戒夫作為也然下即曰寂然不動感而遂通天下之故是動靜之理未嘗為一偏之說矣老氏言虛能生氣非也隂陽之開闔相因無有先也無有後也可謂今日有陽而後明日有隂則亦可謂今日有形而後明日有影也豫奪翕張理所有也而老子之言非也與之之意乃在乎取之張之之意乃在乎翕之權詐之術也老子曰失道而後德失德而後仁失仁而後義失義而後禮則道德仁義禮分而為五也君子之學也使先知覺後知使先覺覺後覺而老子以為非以明民將以愚之其亦自賊其性歟問老子言天地不仁聖人不仁如何曰謂天地不仁以萬物為芻狗是也謂聖人不仁以百姓為芻狗非也聖人豈有不仁所患者不仁也天地何意於仁鼓舞萬物而不與聖人同憂聖人則仁此其為能𢎞道也老子書其言自不相入處如氷炭其初意欲談道之極𤣥妙處後來却入做權詐者上去如將欲取之必固與之之類然老子之後有申韓看申韓與老子道甚懸絶然其原乃自老子來蘇秦張儀則更是取道遠朱子曰老子之術謙冲儉嗇全不肯役精神須自家占得十分穩便方肯做才有一毫於己不便便不肯做老子之學只要退步柔伏不與你爭才有一毫主張計較思慮之心這氣便粗了故曰致虛極守靜篤又曰專氣致柔能如嬰兒乎又曰知其雄守其雌為天下溪知其白守其黑為天下谷所謂溪所謂谷只是低下處讓你在高處他只要在卑下處全不與你爭他這工夫極難常見畫本老子便是這般氣象笑嘻嘻地便是箇退步占便宜底人雖未必肖他然亦是他氣象也只是他放出無狀來便不可當如曰以正治國以竒用兵以無事取天下他取天下便是用此道老子之學大抵以虛靜無為沖退自守為事故其為說常以懦弱謙下為表以空虛不毁萬物為實其為治雖曰我無為而民自化然不化者則亦不之問也其為道每每如此非特載營魄一章之指為然也若曰旁日月挾宇宙揮斥八極神氣不變者是乃莊生之荒唐其曰光明寂照無所不通不動道場遍周沙界者則又瞿曇之幻語老子則初曷嘗有是哉今世人論老子者必欲合二家之似而一之以為神嘗載魄而無所不之則是莊釋之所談而非老子之意矣問老子與鄉原如何曰老子是出人理之外不好聲不好色又不做官然害倫理鄉原猶在人倫中只是箇無見識的好人人皆言孟子不排老子老子便是楊氏問楊氏愛身其學亦淺近而舉世崇尚之何也曰其學也不淺近自有好處便是老子之學今觀老子書自有許多說話人如何不愛其學也要出來治天下清虛無為所謂因者君之綱事事只是因而為之如漢文帝曹參便是用老氏之效然又只用得老子皮膚凡事只是包容因循將去老氏之學最忍他閒時似箇虛無卑弱底人若教緊要處發出來更教你支吾不住如張子房是也子房皆老氏之學問楊朱似老子頃見先生如此說看來楊朱較放退老子又要以此治國以此取天下曰大槩氣象相似如云致虛極守靜篤之類老子初間亦只是要放退未要放出那無狀來及至反一反方說以無事取天下如云反者道之動弱者道之用之類問程子云老子之言竊弄闔闢者何也曰如將欲取之必固與之之類是他亦窺得些道理將來竊弄如所謂代大匠斫則傷手者謂如人之惡者不必自去治他自有别人與他理㑹只是占便宜不肯自犯手做程子論老子隂符經可謂言約而理盡括盡二書曲折康節嘗言老氏得易之體孟子得易之用非也老子自有老子之體用孟子自有孟子之體用將欲取之必固與之此老子之體用也存心養性充廣其四端此孟子之體用也問橫渠云言有無諸子之陋也曰無者無物却有此理有此理則有矣老氏乃云物生於有有生於無和理也無便錯了老子之術自有退後一著事也不攙前去做說也不曽說將出但任你做得狼狽了自家徐出以應之如人當紛爭之際自出僻靜處坐任其如何彼之利害長短一一都冷看破了從旁下一著定是的當此固是不好底術數然較之今者浮躁胡說亂道底人彼又較勝因舉老子語豫兮若冬涉川猶兮若畏四鄰儼若客涣若氷將釋子房深於老子之學曹參學之有體而無用問老子道可道章或欲以常無常有為句讀而欲字屬下句者如何曰先儒亦有如此做句者不妥貼不若只作常有欲無欲㸃問道可道如何解曰道而可道則非常道名而可名則非常名又問𤣥之義曰𤣥只是深遠而至於黑窣窣地處那便是衆妙所在又問寵辱若驚貴大患若身曰從前理㑹此章不得常有欲以觀其徼徼之義是那邊徼如邊界相似說那應接處谷神谷只是虛而能受神謂無所不應他又云虛而不屈動而愈出有一物之不受則虛而屈矣有一物之不應是動而不能出矣𤣥牝或云𤣥是衆妙之門牝是萬物之祖不是牝只是木孔承筍能受底物事如今門􅗚謂之牡鐶則謂之牝鎖管便是牝鎖鬚便是牡雌雄謂之牝牡可見𤣥者謂是至妙底牝不是那一樣底牝問谷神不死曰谷之虛也聲達焉則響應之乃神化之自然也是謂𤣥牝𤣥妙也牝是有所受而能生物者也至妙之理有生生之意焉程子所以取老氏之說也又曰𤣥牝蓋言萬物之感而應之不窮又言受而不先如言聖人執左契而不責於人契有左右左所以銜右言左契受之義也問三十輻共一轂當其無有車之用無是車之坐處否曰恐不然若以坐處為無則上文自是就輻轂而言與下文户牖埏埴是一例語某嘗思之無是轂中空處惟其中空故能受軸而運轉不窮猶傘柄上木管子衆骨所㑹者不知名何緣管子中空又可受傘柄而開闔下上車之轂亦猶是也莊子所謂樞始得其環中以應無窮亦此意也載營魄抱一能無離乎一便是魄抱便是載蓋以火養水也魄是水以火載之營字恐是熒字光也古字或通用不可知蘇潁濵解云神載魄而行言魄是箇沉滯之物須以神去載他令他升舉其說云聖人則以魄隨神而動衆人則神役於魄他全不曉得老子大意他解神載魄而行便是箇剛强升舉底意思老子之意正不如此只是要柔伏退步耳觀他這一章盡說柔底意思云載營魄抱一能無離乎專氣致柔能無嬰兒乎天門開闔能無雌乎老子一書意思都是如此他只要退步不與你爭如一箇人叫哮跳躑我這裏只是不做聲只管退步少間叫哮跳躑者自然而屈而我之柔伏應自有餘老子心最毒其所以不與人爭者乃所以深爭之也其設心措意都是如此閒時他只是如此柔伏遇著那剛强底人他便是如此待你如云惟天下之至柔馳騁天下之至堅又云以無為取天下便是他柔之發用功效處又曰魄是一魂是二一是水二是火二抱一火守水魂載魄動守靜也專氣致柔只看他這箇甚麼樣工夫專非守之謂也只是專一無間斷致柔是到那柔之極處才有一毫發露便是剛這氣便粗了豫兮若冬涉川猶兮若畏四鄰儼若客老子說話大抵如此只是欲得退步占强不要與事物接如治人事天莫若嗇迫之而後動不得已而後起皆是這樣意思故為其學者多流於術數如申韓之徒皆是也其後兵家亦祖其說如隂符經之類是也問柔能勝剛弱能勝强之說曰他便揀便宜底先占了若這下則剛柔寬猛各有用時問他云禮忠信之薄而亂之首孔子又却問禮於他不知何故曰他曉得禮之曲折只是他說這是箇無緊要底物事不將為事某初間疑有兩箇老聃橫渠亦意其如此今看來不是如此他曽為柱下史故禮自是理㑹得所以與孔子說得如此好只是他又說這箇物事不用得亦可一似聖人用禮時反若多事所以如此說問反者道之動弱者道之用曰老子說話都是這樣意思緣他看得天下事變熟了都於反處做起且如人剛强咆哮跳躑之不已其勢必有時而屈故他只務為弱人才弱時却蓄得那精剛完全及其發也自然不可當故張文潜說老子惟靜故能知變然其勢必至於忍心無情視天下之人皆如土偶爾其心都冷氷氷地了便是殺人也不恤故其流多入於變詐刑名太史公將他與申韓同傳非是强安排其源流實是如此一便生二二便生四老子却說二生三便是不理㑹得多藏必厚亡老子也是說得好儉德極好凡事儉則鮮失老子言治人事天莫若嗇夫惟嗇是謂早服早服是謂重積德被他說得曲盡早服者言能嗇則不遠而復便在此也嗇只是吝嗇之意是要收斂不要放出重積德者言先已有所積復養以嗇是又加積之也如修養者此身未有所損失而又加以嗇養是謂早服而重積若待其已損而後養則養之方足以補其所損不得謂之重積矣所以貴早服早服者早覺未損而嗇之也敬夫言老子云不善人善人之資善人不善人之師與孔子見賢思齊見不賢內省之意不同為老子不合有資之之意不善也或問如何是天得一以清樂庵李氏曰夫物不一而各有其一如日月之照臨星辰之輝粲風雷之鼓舞雨露之滲漉各有其一而不相亂天惟得此不一之一是以清淨無為而化推此言之地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下正亦只是這箇道理且如人君治天下亦何容心哉公卿大夫各依其等列士農工商各就其職分如此則尊卑貴賤不相混殽好惡取舍不相貿亂天下自然而治鶴山魏氏曰道家者流其始不見於聖人之經自老聃氏為周柱下史著書以自明其說亦不過恬養虛應以自淑其身者之所為爾世有為老氏而不至者初無得於其約而徒有慕乎其高直欲垢濁斯世妄意於六合之外求其所謂道者於是神仙荒誕之術或得以乘間抵巇而蕩搖人主之侈心厯世窮年其說猶未泯也或問黃老清淨無為之學也申韓之學出於黃老流入於刑名慘刻前輩謂無情之極至於無恩然否潛室陳氏曰才無情便無恩意脈如此魯齊許氏曰老氏言道德仁義禮智與吾儒全别故其為教大異多隱伏退縮不肯光明正大做得去吾道大公至正以天下公道大義行之故其法度森然明以示人雖然三代以前人忠厚篤實必不如老氏所說老氏衰世之書也其流必變詐刻薄知老氏之所長復知老氏之所短可也後世澆薄不如三代篤實或可以老氏濟之如文帝子房之所為是也老氏以道德仁義皆失然後至於禮禮為忠信之薄而亂之首又謂以智治國國之賊不以智治國國之福孟子曰智之實知斯二者弗去是也又謂若禹之行水行其所無事非老氏所見之智也孟子開口便說仁義蓋不可須㬰離也道指鴻荒之世又謂上德不德皆所見之異不必槩舉臨川吳氏曰老子云天下萬物生於有有生於無萬物者指動植之類而言有字指隂陽之氣而言無字指無形之道體而言此老子本㫖也理在氣中元不相離老子以為先有理而後有氣橫渠張子詆其有生於無之非晦庵先生詆其有無為二之非其無字是說理字有字是說氣字列子朱子曰列子平淡疏曠列子所謂生之所生者死矣而生生者未嘗終形之所形者實矣而形形者未嘗有爾豈子思中庸之㫖哉其言精神入其門骨骸反其根我尚何存者即佛書四大各離今者妄身當在何處之所由出也他若此類甚衆聊記其一二於此可見剽掠之端云莊子問莊周何如程子曰其學無禮無本然形容道理之言則亦有善者問商開􅉌之事信乎曰大道不明於天下莊列之徒窺測而言之者也問齊物論如何曰莊子之意欲齊物理邪物理從來齊何待莊子而後齊若齊物形物形從來不齊如何齊得此是莊子見道淺不奈胸中所得何遂著此論也學者後來多耽莊子若謹禮者不透則是他須看莊子為他極有膠固纒縳則須求一放曠之說以自適譬之有人於此久困纒縳則須覓一箇出身處如東漢末尚節行太甚須有東晉放曠其勢必然五峰胡氏曰莊周云伯夷死名於首陽之下非知伯夷者也若伯夷可謂全其性命之情者矣謂之死名可乎周不為一世用以保其身可矣而未知天下之大本也朱子曰莊周書都讀來所以他說話都說得也是但不合沒拘撿便九百了或問康節近似莊周曰康節較穩問莊子孟子同時何不一相遇又不聞相道及如何曰莊子當時也無人宗之他只在僻處自說然亦止是楊朱之學但楊氏說得大了故孟子力排之問孟子與莊子同時否曰莊子後得幾年然亦不爭多或云莊子都不說著孟子一句曰孟子平生足跡只在齊魯滕宋大梁之間不曽過大梁之南莊子自是楚人想見聲聞不相接大抵楚地便多有此樣差異底人物學問所以孟子說陳良之非曰如今看許行之說如此鄙陋當時亦有數十百人從他是如何曰不特此也如莊子書中說惠施鄧析之徒與夫堅白異同之論是甚麼學問然亦自名家或云他恐是借此以顯理曰便是禪家要如此凡事須要倒說如所謂不管夜行投明要到如人上樹口銜樹枝手足懸空却要答話皆是此意因者君之綱道家之說最要這因萬件事且因來做史記老子傳贊云虛無因應變化於無窮虛無是體與因應字當為一句蓋因應是用因而應之之義云爾因論庖丁解牛一段至恢恢乎其有餘刃曰理之得名以此所見無全牛熟莊子云各有儀則之謂性此謂各有儀則如有物有則比之諸家差善問野馬也塵埃也生物之以息相吹也是如何曰他是言九萬里底風也是這箇推去息是鼻息出入之氣問莊子實而不知以為忠當而不知以為信此語似好曰以實當言忠信也好只是他意思不如此雖實而我不知以為忠雖當而我不知以為信問莊生他都曉得只是却轉了說曰其不知處便在此莊子云天其運乎地其處乎日月其爭於所乎孰主張是孰綱維是孰居無事推而行是意者其有機緘而不得已邪意者其運轉一能自止邪雲者為雨乎雨者為雲乎孰隆施是孰居無事淫樂而勸是這數語甚好是他見得方說到此其才高如老子天下篇言詩以道志書以道事禮以道行樂以道和易以道隂陽春秋以道名分若見不分曉焉敢如此道要之他病我雖理㑹得只是不做又曰莊老二書解注者甚多竟無一人說得他本義出只據他臆說某若拈出便别只是不欲得為善無近名為惡無近刑緣督以為經督舊以為中蓋人身有督脈循脊之中貫徹上下故衣背當中之縫亦謂之督皆此意也老莊之學不論義理之當否而但欲依阿於其間以為全身避害之計正程子所謂閃姦打訛者故其意以為為善而近名者為善之過也為惡而近刑者亦為惡之過也唯能不大為善不大為惡而但循中以為常則可以全身而盡年矣然其為善無近名者語或似是而實不然蓋聖賢之道但教人以力於為善之實初不教人以求名亦不教人以逃名也蓋為學而求名者自非為己之學蓋不足道若畏名之纍已而不敢盡其為學之力則其為心亦已不公而稍入於惡矣至謂為惡無近刑則尤悖理夫君子之惡惡如惡惡臭非有所畏而不為也今乃擇其不至於犯刑者而竊為之至於刑禍之所在巧其途以避之而不敢犯此其計私而害理又有甚焉乃欲以其依違茍且之兩間為中之所在而循之其無忌憚亦益甚矣客嘗有語豫者曰昔人以誠為入道之要恐非易行不若以中易誠則人皆可行而無難也豫應之曰誠而中者君子之中庸也不誠而中則小人之無忌憚耳今世俗茍偷恣睢之論蓋多類此不可不深察也或曰然則莊子之意得無與子莫之執中者類耶曰不然子莫執中但無權耳蓋猶擇於義理而誤執此一定之中也莊子之意則不論義理專計利害又非子莫比矣蓋即其本心實無以異乎世俗鄉原之所見而其揣摩精巧校計深切則又非世俗鄉原之所及是乃賊德之尤者所以清談盛而晉俗衰蓋其勢有所必至而王通猶以為非老莊之罪則吾不能識其何說也魯齊許氏曰莊子好將未大見趣及義理粗淺處徹說得不知大小無邊際緘縢得深密教人窺測不著讀此等書便須大著眼目與看破休教被他瞞了引了或問史記稱莊子作漁父盜跖胠篋以詆訾孔子之徒當時去戰國未遠也而己莫辨其書之異同矣且其書汪洋恣縱乎繩墨之外而乃規規焉局局焉議其篇章得無陋哉臨川吳氏曰得意固可以忘言將欲既其實而謂不必既其文欺也程子曰莊生形容道體之語儘有好處老氏谷神不死一章最佳已下總論老莊列問學者何習老莊之衆也曰謹禮而不達者為其所膠固焉放情而不莊者畏法度之拘已也必資其放曠之說以自適其勢則然朱子曰老子猶要做事在莊子都不要做了又却說道他㑹做只是不肯做莊周是箇大秀才他都理㑹得只是不肯做事觀其第四篇人間世及漁父篇以後多是說孔子與諸人語只是不肯學孔子所謂知者過之者也如說易以道隂陽春秋以道名分等語後來人如何下得他直是似快刀利斧劈截將去字字有著落李公晦曰莊子較之老子較平帖些曰老子極勞攘莊子得些只也乖莊子跌蕩老子收斂齊腳斂手莊子却將許多道理掀翻說不拘繩墨問老子與莊子似是兩般說話曰莊子於篇末自說破矣問先儒論老子多為之出脫云老子乃矯時之說以某觀之不是矯時只是不見實理故不知禮樂刑政之所出而欲去之曰渠若識得寂然不動感而遂通天下之故自不應如此他本不知下一節欲占一簡徑言之然上節無實見故亦不脫灑問原壤看來也是學老子曰他也不似老子老子却不恁地周莊仲曰却似莊子曰是便是夫子時已有這樣人了莊仲曰莊子雖以老子為宗然老子之學尚要出來應世莊子却不如此曰莊子說得較開闊較高逺然却較虛走了老子意思若在老子當時看來也不甚喜他如此說莊子比老子便不同莊子又轉調了精神發出來粗列子比莊子又較細膩問御風之說亦寓言否曰然問程先生謂莊生形容道體之語儘有好處老氏谷神不死一章最佳莊子云嗜欲深者天機淺此言最善又曰謹禮不透者深看莊子然則莊老之學未可以為異端而不講之耶曰君子不以人廢言言有可取安得而不取之如所謂嗜欲深者天機淺此語甚的當不可盡以為虛無之論而妄訾之也周謨曰平時慮為異教所汩未嘗讀莊老等書今欲讀之如何曰自有所主則讀之何害要在識其意所以異於聖人者如何爾楊朱之學出於老子蓋是楊朱曽就老子學來故莊列之書皆說楊朱孟子闢楊朱便是闢莊老了莊子全寫列子又變得峻竒列子語溫純列莊本楊朱之學故其書多引其語莊子說子之於親也命也不可解於心至臣之於君則曰義也無所逃於天地之間是他看得那君臣之義却似是逃不得不奈何須著臣服他更無一箇自然相胥為一體處可怪故孟子以為無君此類是也儒教自開闢以來二帝三王述天理順人心治世教民惇典庸禮之道後世聖賢遂著書立言以示後世及世之衰亂方外之士厭一世之紛拏畏一身之禍害耽空寂以求全身於亂世而已及老子唱其端而列禦寇莊周楊朱之徒和之孟子嘗闢之以為無父無君比之禽獸然其言易入其教易行當漢之初時君世主皆信其說而民亦化之雖以蕭何曹參汲黯太史談輩亦皆主之以為真足以先於六經治世者不可以莫之尚也及後漢以來米賊張陵海島寇謙之之徒遂為盜賊曹操以兵取陽平陵之孫魯即納降款可見其虛謬不足稽矣西山真氏曰魏正始中何晏等祖述老莊以清談相尚至晉此風益甚晏嘗立論以天地萬物皆以無為本由是士大夫皆以浮誕為美裴頠著崇有論以釋其蔽然不能救也陳頵嘗遺王導書以老莊之俗傾惑朝廷今宜改張然後大業可舉導不能從一時名士如庾亮輩皆以清談為風流之宗國子祭酒袁瓌嘗請立太學而士大夫習尚莊老儒術終以不振㑹稽王昱等又從而扇之雖謝安石之賢不免為習俗所移終於晉亡而不能革至梁武帝好佛而太子又講莊老詹事何敬容歎曰西晉尚浮虛使中原淪於胡羯今江東復爾江南其為戎乎其後元帝好𤣥談於龍光殿講老子胡氏論之曰老子之言其害非釋氏比也然棄仁義捐禮樂以為道遺物離人趨於淡泊而生人之治忽矣或問曹參治齊師蓋公其相漢也以清淨文景之治大率依本黃老約躬省事薄斂緩獄不言兵而天下富老子之教亦何負歟曰蓋公之語參曰治道貴清淨而民自定此在老子書中一語爾此一語非有槌提仁義絶滅禮樂之失也故參用之務為休息不擾至於文景斯極功矣雖然庶矣富矣而未及於教也比之二帝三王化民成俗之道可同日語哉又况掇拾其𤣥談清論而不切於事理有如西晉至使胡羯氐羌腥薰岱華幾三百年仲尼之道豈有此禍哉彼蕭繹曽何足云然方在漂搖隉杌中不思保國之計而講老子近有簡文不知監也其亦愚蔽之甚矣又曰自何晏王弼以老莊之書訓釋大易王衍葛𤣥競相慕效專事清談糟粕五經蔑棄本實風流波蕩晉遂以亡又曰為清談者以心與迹二道與事殊形器法度皆芻狗之餘視聽言動非性命之理此其所以大失而不自知也何晏王衍自喪其身喪人之國者如出一軌胡氏之論至矣而文中子乃曰清談盛而晉室衰非老莊之罪也夫清談之弊正祖於老莊謂非其罪可乎近嵗文士又謂自正始以風流相命賞好成俗士雖坐談空解不畏臨戎紈袴子弟能破百萬兵矣清言致效而非喪邦也夫卻敵者臨戎之功而喪邦由清談所致其得失自不相掩而曰清言致效可乎此所謂反理之評不得不辨墨子程子曰墨子之德至矣而君子弗學也以其舍正道而之他也問韓退之讀墨篇如何曰此篇意亦甚好但言不謹嚴便有不是處且孟子言墨子愛其兄之子猶鄰之子墨子書中何嘗有如此等言但孟子拔本塞源知其流必至於此大凡儒者學道差之毫釐繆以千里楊朱本是學義墨子本是學仁但所學者稍偏故其流遂至於無父無君孟子欲正其本故推至此退之樂取人善之心可謂忠恕然持教不知謹嚴故失之朱子曰楊墨皆是邪說但墨子之說尤出於矯僞不近人情而難行孔墨並稱乃退之之繆然亦未見得其原道之作孰先孰後也管子朱子曰管子之書雜管子以功業著者恐未必曽著書如弟子職之篇全似曲禮他篇有似莊老又有說得太卑直是小意智處不應管仲如此之陋其內政分鄉之制國語載之却詳管仲當時任齊國之政事甚多稍閒時又有三歸之溺決不是閒工夫著書底人著書者是不見用之人也其書想只是戰國時人收拾仲當時行事言語之類著之並附以他書問管子中說辟雍言不是學只是君和也曰既不是學君和又是箇甚物事而今不必論禮記所謂疑事毋質蓋無所考據不必恁地辨析且如辟雍之義古不可考或以為學名或以為樂名無由辨證某初解詩亦疑放那裏但今說作學亦說得好了亦有人說辟雍是天子之書院太學又别或問內政何名寓軍令潛室陳氏曰自伯圗之興大抵兵不詭則不能謀人國政不詭則不能自謀其國故春秋善戰者兵有所不交善詭者城有所不守詭道相高求以得志乃於治民之中而默寓治兵之法陽為治民以欺其人隂為治兵以壯其勢其言於桓公曰君欲正卒伍修甲兵大國亦將修之而小國設備則難以速得志不若隱其事而寄其政於是作內政而寓軍令焉今觀自五家為軌軌有長積而至十連之鄉鄉有良人以為內政自伍人為伍軌長率之積而至於萬人為軍五鄉之帥帥之以為軍令名為內政實則軍令寓焉寓之云者猶旅之有寓非其所居而暫居之謂也夷吾志在强國內政之作豈在於民乎特假內政之名以行軍令耳是故外假王政之名內修强國之利夷吾巧於用詭固如是哉嗟夫有為為善雖善實利有意為公雖公實私成周自五家為比至五州為鄉居民之法也自五人為伍至五師為軍㑹萬民之法也其事暴白於天下而無非王道之公夷吾之法能髣佛其一二矣獨奈何以詭道行之以欺其鄰國則安得不為伯者之私哉孫子朱子曰鄭厚藝圃折衷云孫子十三篇不惟武人之根本文士亦當盡心焉其詞約而縟易而深暢而可用論語易大傳之流孟荀楊著書皆不及也以正合以竒勝非善也正變為竒竒變為正非善之善也即竒為正即正為竒善之善也而余隱之辨曰昔吾夫子對衛靈公以軍旅之事未之學答孔文子以甲兵之事未之聞及觀夾谷之㑹則以兵加萊人而齊侯懼費人之亂則命將士以伐之而費人北嘗曰我戰則克而冉有亦曰聖人文武並用孔子豈有真未學未聞哉特以軍旅甲兵之事非所以為訓也乃謂孫子十三篇不惟武人根本文士所當盡心其詞可用論語易大傳之流孟荀楊著書皆不及是啓人君窮兵黷武之心庸非過歟叛吾夫子已甚矣何立言之不審也以豫觀之此段本不必辨但其薄三王罪孟子而尊堯舜似矣乃取孫武之書厠之易論語之列何其駮之甚歟豫嘗謂鄭氏未能真知堯舜而好為太高之論以駭世若商鞅之談帝道於是信矣孔叢子朱子曰家語雖記得不純却是當時書孔叢子是後來白撰出家語只是王肅編古録雜記其書雖多疵然非肅所作孔叢子乃其所注之人僞作讀其首幾章皆法左傳句己疑之及讀其後序乃謂渠好左傳便可見孔叢子鄙陋之甚理既無足取而詞亦不足觀孔叢子說話多類東漢人文其氣軟弱又全不似西漢人文兼西漢初若有此等話何故不略見於賈誼董仲舒所述恰限到東漢方突出來皆不可曉申韓或問史記云申子卑卑施於名實韓子引繩墨切事情明是非其極慘核少恩皆原於道德之意朱子曰張文潜之說得之宋齊􅉌化書序中所論也楊道夫曰東坡謂商鞅韓非得老子所以輕天下者是以敢為殘忍而無疑曰也是這意要之只是孟子所謂楊氏為我是無君也荀子周子曰荀子云養心莫善於誠荀子元不識誠既誠矣心安用養邪程子曰荀子謂博聞多見可以取道欲力行堯禹之所行其所學皆外也有學不至而言至者循其言可以入道門人曰何謂也曰真積力久則入荀卿之言也優而柔之使自求之饜而飫之使自趨之若江河之浸膏澤之潤涣然氷釋怡然理順杜預之言也思之思之又重思之思而不通鬼神將通之非鬼神之力也精誠之極也管子之言也此三者循其言皆可以入道而三子初不能及此也朱子曰荀子說能定而後能應此是荀子好話或言性謂荀卿亦是教人踐履曰須是有是物而後可踐履今於頭段處既錯又如何踐履天下事從其是曰同須求其真箇同曰異須求其真箇異今則不然只欲立異道何由明問荀子言性惡禮僞其失蓋出於一大要不知其所自來而二者亦互相資也其不識天命之懿而以人欲橫流者為性不知天秩之自然而以出於人為者為禮所謂不知所自來也至於以性為惡則凡禮文之美是聖人制此以返人之性而防遏之則禮之僞明矣以禮為僞則凡人之為禮皆反其性矯柔以就之則性之惡明矣此所謂互相資也告子杞栁之論則性惡之意也義外之論則禮僞之意也曰亦得之西山真氏曰荀子云水火有氣而無生草木有生而無知禽獸有知而無義人有氣有生有知亦且有義故最為天下之貴也其論似矣至其論性則以為惡論禮則以為僞何其自相戾耶荀子論心如君子大心則天而道小心則畏義而節等語皆可取若所謂湛濁在下而清明在上則有可疑蓋心之虛靈知覺者萬理具焉初豈有一毫之汙濁哉自夫汩於物欲而後有汙濁耳學者必盡去物欲之害則本然之清明自全今曰湛濁在下而清明在上是物欲之害初未嘗去但伏而未作耳其可恃以為安耶水不能不遇風長川巨浸泓澄無底雖大風不能使之濁心不能不應物欲盡理明表裏瑩徹雖酬酢萬變不能使之昏無風則清有風則濁者塵滓之伏于下也靜之則明動之則昏者利欲之藏於中也董子程子曰董子言仁人正其誼不謀其利明其道不計其功度越諸子逺矣漢儒近似者三人董仲舒大毛公揚雄朱子曰董仲舒資質純良摸索道得數句著如正誼不謀利之類然亦非他真見得這道理仲舒識得本原如云正心修身可以治國平天下如說仁義禮樂皆其具此等說話皆好問仲舒云性者生之質也曰不是只當云性者生之理也氣者生之質也問其以情為人之欲如何曰也未害蓋欲為善欲為惡皆人之情也問董仲舒見道不分明處曰也見得鶻突如命者天之令性者生之質情者人之欲命非聖人不行性非教化不成情非制度不節等語似不識性善模樣又云明於天性知自貴於物知自貴於物然後知仁義知仁義然後重禮節重禮節然後安處善安處善然後樂循理又似見得性善模樣終是說得騎墻不分明端的仲舒言命者天之令性者生之質如此說固未害下云命非聖人不行便牽於對句說開去了如正誼明道之言却自是好問或謂此語是有是非無利害如何曰是不論利害只論是非理固然也要亦當權其輕重方盡善無此亦不得只被今人只知計利害於是非全輕了正其誼不謀其利明其道不計其功誼必正非是有意要正道必明非是有意要明功利自是所不論仁人於此有不能自已者師出無名事故不成明其為賊敵乃可服此便是有意立名以正其誼問諸葛誠之云仁人正其誼不謀其利明其道不計其功仲舒說得不是只怕不是誼是誼必有利只怕不是道是道必有功曰才如此人必求功利而為之非所以為訓也固是得道誼則功利自至然而有得道誼而功利不至者人將惟功利之徇而不顧道誼矣仲舒所立甚高後世之所以不如古人者以道誼功利關不透耳其議胸奴一節婁敬賈誼智謀之士為之亦不過如此問正其誼明其道道誼如何分别曰道誼是箇體用道是大綱說誼是就一事上說誼是道中之細分别功是就道中做得功效出來問正其誼者凡處此一事但當處置使合宜而不可有謀利占便宜之心明其道則處此事便合義是乃所以為明其道而不可有計後日功效之心正義不謀利在處事之先明道不計功在處事之後如此看可否曰恁地說也得他本是合掌說看來也須微有先後之序仲舒本領純正如說正心以正朝廷與命者天之令也以下諸語皆善班固所謂醇儒極是至於天下國家事業恐施展未必得三䇿說得稍親切終是脫不得漢儒氣味西山真氏曰仲舒醇正近理之言見稱於諸老先生外如曰彊勉學問則聞見博而智益明彊勉行道則德日起而大有功又引曽子尊聞行知之說此二條最有功於學者蓋學道之要致知力行而已虞書之精一論語之知及仁守中庸之博學篤行皆是也秦漢以下未有識之者而仲舒能言之此豈諸儒所可及哉其曰道之大原出於天則天命率性之意尤所謂知其本源者至謂有國者不可不知春秋其言亦有補於世本傳稱其進退容止非禮不行兩相驕主正身率下方公孫𢎞以阿意容悅取相位仲舒獨終始守正卒老于家以其質之美守之固使得從遊於聖人之門淵源所漸當無慚於游夏矣惜其生於絶學之後雖潜心大業終未能窺大道之全至或流於災異之術吁可歎哉性理大全書卷五十七

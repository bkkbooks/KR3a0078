body:
  text: 性理大全書卷二十八鬼神總論程子曰聚為精氣㪚為游魂聚則為物㪚則為變觀聚㪚則鬼神之情狀著矣萬物之終始不越聚㪚而已鬼神者造化之功也鬼是往而不反之義物形有大小精粗之不同神則一而已或問鬼神之有無曰吾為爾言無則聖人有是言矣為爾言有爾得不於吾言求之乎張子曰天地變化至著至速者目為鬼神所謂吉凶害福誅殛窺伺豈天所不能耶必有耳目口鼻之象而後能之耶藍田吕氏曰萬物之生莫不有氣氣也者神之盛也莫不有魄魄也者鬼之盛也故人亦鬼神之會爾鬼神者周流天地之間無所不在雖寂然不動而有感必通雖無形無聲而有所謂昭昭不可欺者朱子曰天下大底事自有箇大底根本小底事亦自有箇𦂳切處若見得天下亦無甚事如鬼神之事聖賢説得甚分明只將禮熟讀便見二程初不説無鬼神但無而今世俗所謂鬼神耳古來聖人所制皆是察見得天地之理如此神伸也鬼屈也如風雨雷電初發時神也及至風止雨過雷住電息則鬼也鬼神不過隂陽消長而已亭毒化育風雨晦冥皆是在人則精是魄魄者鬼之盛也氣是魂魂者神之盛也精氣聚而為物何物而無鬼神游魂為變游魂則魄之降可知鬼神只是氣屈伸往來者氣也天地間無非氣人之氣與天地之氣常相接無間斷人自不見人心纔動必達於氣便與這屈伸往來者相感通如卜筮之類皆是心自有此物只説你心上事纔動必應也問鬼神有無曰此豈卒乍可説便説公亦豈能信得及須於衆理看得漸明則此惑自解樊遲問知子曰務民之義敬鬼神而逺之可謂知矣人且理會合當理會底事其理會未得底且推向一邊待日用常行處理會得透則鬼神之理將自見得乃所以為知也未能事人焉能事鬼意亦如此問鬼神便只是此氣否曰又是這氣裏面神靈相似問先生説鬼神自有界分如何曰如日為神夜為鬼生為神死為鬼豈不是界分問先生前説日為神夜為鬼所以鬼夜出如何曰間有然者亦不能皆然夜屬隂且如妖鳥皆隂類皆是夜鳴雨風露雷日月晝夜此鬼神之迹也此是白日公平正直之鬼神若所謂有嘯于梁觸于胷此則所謂不正邪暗或有或無或去或來或聚或㪚者又有所謂禱之而應祈之而獲此亦所謂鬼神同一理也世間萬事皆此理但精粗大小之不同爾又曰以功用謂之鬼神即此便見鬼神死生之理定不如世俗所見然又有其事昭昭不可以理推者此等處且莫要理會問理有明未盡處如何得意誠且如鬼神事今是有是無張仲隆曽至金沙堤見巨人迹此是如何或謂册子説并人傳説皆不可信須是親見某平昔見册子上并人説得滿頭滿耳只是都不曾自見曰只是不曾見畢竟其理如何張南軒亦只是硬不信有時戯説一二如禹鼎鑄魑魅魍魎之屬便是有這物深山大澤是彼所居處人往占之豈不為崇問敬鬼神而逺之則亦是言有但當敬而逺之自盡其道便不相闗曰聖人只便是如此説嘗以此理問李先生曰此處不須理會南軒張氏曰鬼神之説合而言之來而不測謂之神往而不返謂之鬼分而言之天地山川風雷之屬凡氣之可接者皆曰神祖考祠饗於廟曰鬼就人物而言之聚而生為神㪚而死為鬼又就一身而言之魂氣為神體魄為鬼凡六經所稱葢不越是數端然一言以蔽之莫非造化之迹而語其徳則誠而已昔者季路葢嘗問事鬼神之説矣夫子之所以告之者將使之致知力行而自得之故示其理而不詳語也至於後世異説熾行譸張為幻莫可致詰流俗眩於怪誕怵於畏懼胥靡而從之聖學不明雖襲儒衣冠號為英才敏識亦徃往習熟崇尚而不以為異至於其説之窮則曰焉知天地間無有是事委諸茫昧而已耳信夫事之妄而不察夫理之真於是鬼神之説淪於空虚而所為交於幽明者皆失其理禮瓌而樂廢人心不正浮偽日滋其間所為因其説而為善者亦莫非私利之流亂徳害教孰此為甚故河南二程子横渠張子與學者反復講論而不置夫豈好辯哉葢有所不得已也若夫程子發明感通之妙張子推極聚㪚之藴所以示來世深矣學者誠能致知以窮其理則不為衆説所咻克己以去其私則不為血氣所動於其有無是非之故毫分縷析了然於中各有攸當而不亂然後昔人事鬼神之精意可得而求徳可立而經可正也不然辨之不明守之不固眩於外而怵於内一理之蔽則為一事之礙一念之差則為一物之誘聞見雖多亦鮮不為異説所溺矣北溪陳氏曰程子云鬼神者造化之迹張子云鬼神者二氣之良能二説皆精切造化之迹以隂陽流行著見於天地間言之良能言二氣之屈伸往來自然能如此大抵鬼神只是隂陽二氣主屈伸往來者言之神是陽之靈鬼是隂之靈靈云者只是自然屈伸往來恁地活爾自一氣言之則氣之方伸而來者屬陽為神氣之已屈而往者屬隂為鬼是春夏是氣之方長屬陽為神秋冬是氣之方退屬隂為鬼其實二氣亦只是一氣耳天地間無物不是隂陽隂陽無所不在則鬼神亦無所不有大抵神之為言伸也伸是氣之方長者也鬼之為言歸也歸是氣之已退者也自天地言之天屬陽神也地屬隂鬼也就四時言之春夏氣之伸屬神秋冬氣之屈屬鬼又自晝夜分之晝屬神夜屬鬼就日月言之日屬神月屬鬼又如鼓之以雷霆潤之以風雨是氣之伸屬神及至收歛後帖然無蹤跡是氣之歸屬鬼以一日言之則早起日方升屬神午以後漸退屬鬼以月言之則月初三生來屬神到十五以後屬鬼如草木生枝生葉時屬神衰落時屬鬼如潮之來屬神潮之退屬鬼凡氣之伸者皆為陽屬神凡氣之屈者皆為隂屬鬼古人論鬼神大槩如此更在人自體究問先儒謂鬼神造化之迹又曰二氣之良能潛室陳氏曰鬼神只隂陽屈伸之氣所以為寒為暑為晝為夜為榮為枯有迹可見此處便是鬼神葢隂陽是氣鬼神是氣之良能流轉活動處故曰良能天地造化萬物露生於天地之間者皆造化之迹也是孰為之耶鬼神也造化之迹猶言造化之可見者非粗迹之迹于今一禽一獸一花一木鍾英孕秀有雕斲繪畫所不能就者倐忽見于人間是孰為之耶即造化之迹鬼神也西山真氏曰鬼神之理雖非始學者所易窮然亦須識其名義若以神示鬼三字言之則天之神曰神以其造化神妙不測也地之神曰示以其山川草木有形可見顯然示人也示古祇字人之神曰鬼鬼謂氣之已屈者也若以鬼神二字言之則神者氣之伸鬼者氣之屈氣之方伸者屬陽故為神氣之屈者屬隂故為鬼神者伸也鬼者歸也且以人之身論之生則曰人死則曰鬼此生死之大分也然自其生而言之則自㓜而壯此氣之伸也自壯而老自老而死此又伸而屈也自其死而言之則魂游魄降寂無形兆此氣之屈也及子孫享祀以誠感之則又能來格此又屈而伸也姑舉人鬼一端如此至若造化之鬼神則山澤水火雷風是也日與電皆火也月與雨亦水也此數者合而言之又只是隂陽二氣而已隂陽二氣流行於天地之間萬物頼之以生頼之以成此即所謂鬼神也今人只以塑像畫像為鬼神及以幽暗不可見者為鬼神殊不知山峙川流日照雨潤雷動風㪚乃分明有迹之鬼神伊川云鬼神者造化之迹又云鬼神天地之功用横渠云鬼神二氣之良能凡此皆指隂陽而言天地之氣即人身之氣人身之氣即天地之氣也鶴山魏氏曰鬼神之説尚矣自聖賢不作正塗壅底士不知道民罔常心非置諸茫昧則怵於竒衺或又諉曰夫子所不語也季路所弗知也吁是難言也其果難言也而聖謨孔彰實理莫掩其有獨不可見者乎天有四時地載神氣亘古今薄宇宙盪摩而罔息者熟非鬼神之功用乎反之吾身而嘘吸之屈伸視聽之往來浩乎愽哉妙萬物而無不在也宇􅨚之間氣之至而伸者為神反而歸者為鬼其在人焉則陽魂為神隂魄為鬼二氣合則魂聚魄凝而生離則魂升為神魄降為鬼易所謂精氣游魂記所謂禮樂鬼神夫子所謂物之精神之著而子思所謂徳之盛誠之不可掩者其義葢若此而古之聖賢所貴乎知者亦惟知此而已論在人鬼神兼精神魂魄程子曰心所感通者只是理也知天下事有即有無即無無古今前後至如夢寐皆無形只是有此理若言渉於形聲之類則是氣也物生則氣聚死則㪚而歸盡有聲則須是口既觸則須是身其質既壞又安得有此乃知無此理便不可信古之言鬼神不過著於祭祀亦只是言如聞嘆息之聲亦不曾道聞如何言語亦不曾道見如何形狀如漢武帝之見李夫人只為道士先説與在甚處使端目其地故想出也然武帝作詩亦曰是耶非耶嘗聞好談鬼神者皆所未曾聞見皆是見説燭理不明便𫝊以為信也假使實所聞見亦未足信或是心病或是目病如孔子言人之所信者目目亦有不足信者邪此言甚善楊定鬼神之説只是道人心有感通如有人平生不識一字一日病作却念得一部杜甫詩却有此理天地間事只有一個有一個無既有即有無即無如杜甫詩者是世界上實有杜甫詩故人之心病及至精一有個道理自相感通以至人心在此託夢在復亦有是理只是心之感通也世間有鬼神馮依言語者葢屢見之未可全不信此亦有理莫現乎隱莫顯乎微而已神與氣未嘗相離不以生存不以死亡魂謂精魂其死也魂歸於天消㪚之意張子曰范巽之嘗言神姦物怪某以言難之謂天地之雷霆草木至怪也以其有定形故不怪人之陶冶舟車亦至怪也以其有定理故不怪今言鬼者不可見其形或云有見者且不定一難信又以無形而移變有形之物此不可以理推二難信又嘗推天地之雷霆草木人莫能為之人之陶冶舟車天地亦莫能為之今之言鬼神以其無形則如天地言其動作則不異於人豈謂人死之鬼反能兼天人之能乎今更就世俗之言評之如人死皆有知則慈母有深愛其子者一旦化去獨不日日憑人言語託人夢寐存恤之耶言能福善禍淫則或小悪反遭重罰而大憝反享厚福不可勝數又謂人之精明者能為厲秦皇獨不罪趙高唐太宗獨不罰武后耶又謂衆人所傳不可全非自古聖人獨不傳一言耶聖人或容不言自孔孟而下荀况楊雄王仲淹韓愈學未能及聖人亦不見畧言者以為有數子又或偶不言今世之稍信實亦未甞有言親見者朱子曰二氣之分即一氣之運所謂一動一静互為其根分隂分陽兩儀立焉者也在人者以分言之則精為隂而氣為陽故魄為鬼而魂為神以運言之則消為隂而息為陽故伸為神而歸為鬼然魂性動故當其伸時非無魄也而必以魂為主魄性静故方其歸時非無魂也而必以魄為主則亦初無二理矣問生死鬼神之理一云問鬼神生死雖知得是一理然未見得端的曰精氣為物游魂為變便是生死底道理未達曰精氣凝則為人㪚則為鬼又問精氣凝時此理便附在氣上否曰天道流行發育萬物有理而有氣雖是一時都有畢竟以理為主人得之以有生氣之清者為氣濁者為質一云清者屬陽濁者屬隂知覺運動陽之為也形體隂之為也氣曰魂體曰魄高誘淮南子註曰魂者陽之神魄者隂之神所謂神者以其主乎形氣也人所以生精氣聚也人只有許多氣須有個盡時一云醫家所謂隂陽不升降是也盡則魂氣歸於天形魄歸於地而死矣人將死時熱氣上出所謂魂升也下體漸冷所謂魄降也此所以有生必有死有始必有終也夫聚㪚者氣也若理則只泊在氣上初不是凝結自為一物但人分上所合當然者便是理不可以聚㪚言也然人死雖終歸於㪚然亦未便散盡故祭祀有感格之理先祖世次逺者氣之有無不可知然奉祭祀者既是他子孫畢竟只是一氣所以有感通之理然已㪚者不復聚至如伯有為厲伊川謂别是一般道理葢其人氣未當盡而强死自是能為厲子産為之立後使有所歸遂不為厲亦可謂知鬼神之情狀矣問伊川言鬼神造化之迹此豈亦造化之迹乎曰皆是也葢論正理則似樹上忽生出花葉此便是造化之迹又如空中忽然有雷霆風雨皆是也但人所常見故不之怪忽聞鬼嘯鬼火之屬則便以為怪不知此亦造化之迹但不是正理故為怪異如家語云山之怪曰䕫魍魎水之怪曰龍罔象土之怪羵羊皆是氣之雜揉乖戾所生亦非理之所無也專以為無則不可如冬寒夏熱此理之正也有時忽然夏寒冬熱豈可謂無此理但既非理之常便謂之怪孔子所以不語學者亦未須理會也問伯有之事别是一理如何曰是别是一理人之所以病而終盡則其氣㪚矣或遭刑或忽然而死者氣猶聚而未㪚然亦終於一㪚銜寃憤者亦然故其氣皆不㪚伯有為厲之事自是一理謂非生死之常理人死則氣㪚理之常也他却用物宏取精多族大而强死故其氣未㪚耳問來而伸者為神往而屈者為鬼凡隂陽魂魄人之嘘吸皆然不獨死者為鬼生者為神故横渠云神祇者歸之始歸往者來之終曰此二句正如俗語駡鬼云你是已死我我是未死你楚詞中説終古亦是此義楚詞云去終古之所之兮今逍遥而來東羗靈魂之欲歸兮何須臾而忘反問既屈之中恐又自有屈伸曰祭祀致得鬼神來格便是就既屈之氣又能伸也問魂氣則能既屈而伸若祭祀來格是也若魄既死恐不能復伸矣曰也能伸葢他來則俱來如祭祀報魂報魄求之四方上下便是皆有感格之理問游魂為變聖愚皆一否曰然又問人之禱天地山川是以我之有感彼之有子孫之祭先祖是以我之有感他之無曰神祇之氣常屈伸而不已人鬼之氣則消㪚而無餘矣其消㪚亦有久速之異人有不伏其死者所以既死而此氣不㪚為妖為怪如人之凶死及僧道既死多不㪚僧道務養精神所以凝聚不㪚若聖賢則安於死豈有不㪚而為神怪者乎如黄帝堯舜不聞其既死而為靈怪也甞見輔漢卿説某人死其氣温温然熏蒸滿室數日不㪚是他氣盛所以如此劉元城死時風雷轟于正室雲霧晦㝠少頃辨色而公已端坐薨矣他是什麽様氣魄曰莫是元城忠誠感動天地之氣否曰只是元城之氣自㪚爾他養得此氣剛大所以㪚時如此祭義云其氣發揚于上為昭明焄蒿悽愴此百物之精也此數句説盡了人死時其魂氣發揚于上昭明是人死時自有一般光景焄蒿即前所云温温之氣也悽愴是一般肅然之氣令人悽愴如漢武帝時神君來則風肅然是也此皆萬物之精既死而㪚也問鬼神便是精神魂魄如何曰然且就這一身看自會笑語有許多聦明知識這是如何得恁地虚空之中忽然有風有雨忽然有雷有電這是如何得恁地這都是隂陽相感都是鬼神看得到這裏見一身只是個軀殻在這裏内外無非天地隂陽之氣所以説道天地之塞吾其體天地之帥吾其性思量來只是一個道理又曰如魚之在水外面水便是肚裏面水鱖魚肚裏水與鯉魚肚裏水只一般問魂魄如何是隂陽曰魂如火魄如水只今人生便自一半是神一半是鬼了但未死以前則神為主已死之後則鬼為主縱横在這裏以屈伸往來之氣言之則來者為神去者為鬼以人身言之則氣為神而精為鬼然其屈伸往來也各以漸問魂魄曰氣質是實底魂魄是半虚半實底鬼神是虚分數多實分數少底魄是一㸃精氣氣交時便有這神魂是發揚出來底如氣之出入息魄是如水人之視能明聽能聦心能强記底有這魄便有這神不是外面入來魄是精魂是氣魄主静魂主動又曰草木之生自有個神他自不能生在人則心便是所謂形既生矣神發知矣是也問生魄死魄曰古人只説三五而盈三五而闕近時人方推得他所以圓闕乃是魄受光處魄未甞無也人有魄先衰底有魂先衰底如某近來覺得重聽多忘便是魄先衰先儒言口鼻之嘘吸為魂耳目之聰明為魄也只説得大槩都更有個母子這便是坎離水火煖氣便是魂冷氣便是魄魂便是氣之神魄便是精之神會思量計度底便是魂會記當去底便是魄又曰見於目而明耳而聰者是魄之用又曰無魂則魄不能以自存今人多思慮役役魂都與魄相離了隂陽之始交天一生水物生始化曰魄既生魄煖者為魂先有魄而後有魂故魄常為主為幹又曰先輩説魂魄多不同左傳説魄先魂而有看來也是以賦形之初言之必是先有此體象方有陽氣來附也動者魂也静者魄也動静二字括盡魂魄凡能運用作為皆魂也魄則不能也今人之所以能運動都是魂使之耳魂若去魄則不能也月之黒暈便是魄其光者乃日加之光耳他本無光也所以説哉生魄旁死魄莊子曰日火外影金水内影此便是魂魄之説問氣之出入者為魂耳目之聰明為魄然則魄中復有魂魂中復有魄耶曰精氣周流充滿於一身之中嘘吸聰明乃其發而易見者耳然既周流充滿於一身之中則鼻之知臭口之知味非魄乎耳目之中皆有煖氣非魂乎推之遍體莫不皆然問先生甞言體魄自然二物然則魄氣亦為兩物耶曰將魂氣細推之亦有精粗但其為精粗也甚微非若體魄之懸殊耳問以目言之目之輪體也睛之明魄也耳則何如曰竅即體也聰即魄也又問月魄之魄豈只指其光而言之而其輪則體耶曰月不可以體言只有魂魄耳月魄即其全體而光處乃其魂之發也魂屬木魄屬金所以説三魂七魄是金木之數也問人有盡記得一生以來履厯事者此是智以藏往否曰此是魄强所以記得多問魂氣升於天莫只是消㪚其實無物歸于天上否曰也是氣㪚只是才㪚便無如火將滅也有烟上只是便㪚葢縁木之性已盡無以繼之人之將死便氣㪚即是這裏無個主子一㪚便死大率人之氣常上且如説話氣都出上去魂㪚則魄便自沉了今人説虎死則眼光入地便是如此問或云氣㪚而非無某竊謂人禀得隂陽五行之氣以生到死後其氣雖散只反本還原去曰不須如此説若説無便是索性無了惟其可以感格得來故只説得㪚要之㪚也是無了又問燈熖衝上漸漸無去要之不可謂之無只是其氣在此一室之内曰只是他有子孫在便是不可謂之無死而氣㪚泯然無迹者是其常道理恁地有托生者是偶然聚得氣不㪚又怎生去凑著那生氣便冄生然非其常也問游魂為變間有為妖孽者是如何得未㪚曰游字是漸漸㪚若是為妖孽者多是不得其死其氣未㪚故欝結而成妖孽若是尫羸病死底人這氣消耗盡了方死豈復更欝結成妖孽然不得其死者久之亦㪚如今打麵做糊中間自有成小塊核不㪚底久之漸漸也自會㪚横渠云物之初生氣日至而滋息物之既盈氣日反而游㪚至之謂神以其伸也反之謂鬼以其歸也天下萬物萬事自古及今只是個隂陽消息屈伸横渠將屈伸説得貫通上蔡説却似不説得循環意思萇𢎞死三年而化為碧此所謂魄也如虎威之類𢎞以忠死故其氣凝結如此問鬼神魂魄就一身而總言之不外乎隂陽二氣而已然既謂之鬼神又謂之魂魄何耶某竊謂以其屈伸往來而言故謂之鬼神以其靈而有知有覺而言故謂之魂魄或者乃謂屈伸往來不足以言鬼神葢合而言之則一氣之往來屈伸者是也分而言之則神者陽之靈鬼者隂之靈也以其可合而言可分而言故謂之鬼神以其可分而言不可合而言故謂之魂魄或又執南軒陽魂為神隂魄為鬼之説乃謂鬼神魂魄不容更有分别某竊謂如中庸或問雖曰一氣之屈伸往來然屈者為隂伸者為陽往者為隂來者為陽而所謂陽之靈者隂之靈者亦不過指屈伸往來而為言也曰鬼神通天地間一氣而言魂魄主於人身而言方氣之伸精魂固具然神為主及氣之屈魂氣雖存然鬼為主氣盡則魄降而純於鬼矣故人死曰鬼南軒説不記首尾云何然只據二句亦不得為别矣問聖人凡言鬼神皆只是以理之屈伸者言也鬼者屈也神者伸也屈者往也伸者來也屈伸往來之謂也至言鬼神禍福凶吉等事此亦只是以理言葢人與鬼神天地同此一理而理則無有不善人能順理則吉逆理則凶其於禍福亦然此豈謂天地鬼神一一下降于人哉且如書稱天道福善禍淫易言鬼神害盈而福謙亦只是這個意思葢盈者逆理者也自當得害謙者順理者也自應獲福自是道理合如此安有所謂鬼神降之哉甞讀禮記祭義宰我曰吾聞鬼神之名不知其所謂孔子曰神也者氣之盛也鬼也者魄之盛也又曰衆生必死死必歸土是之謂鬼骨肉斃于下隂為野土其氣發揚于上為昭明焄蒿悽愴百物之精神之著也魄既歸土此則不同其曰氣曰精曰昭明又似有物矣既只是理則安得有所謂氣與昭明者哉及觀禮運論祭祀則曰以嘉魂魄是謂合莫注謂莫無也又曰上通無莫此説又似與祭義不合曰如子所論是無鬼神也鬼神固是以理言然亦不可謂無氣所以先王祭祀或以燔燎或以鬱鬯以其有氣故以類求之爾至如禍福吉凶之事則子之言是也横渠所謂物怪神姦不必辨且只守之不失如精氣為物游魂為變此是理之常也守之勿失者以此為正且恁地去他日當自見也若要之無窮求之不可知此又溺於茫昧不能以常理為主者也伯有為厲别是一種道理此言其變如世之妖妄者也南軒張氏曰向在淮上宿一小寺中夜聞小雞聲以數萬計起視之見彌空燈明滿地問之寺僧云此舊戰場也遇天氣隂晦則有此夫氣不㪚則因隂陽蒸薄而有聲氣自為聲於人何預又曰鬼神之説須自窮究真是無疑方得不然他人説得分明亦不濟事勉哉黄氏曰夫人之生惟精與氣為毛骨肉血者精也為呼吸冷熱者氣也然人為萬物之靈非木石故其精其氣莫不各有神焉精之神謂之魄氣之神謂之魂耳目之所以能視聽者魄為之也此心之所以能思慮者魂為之也合魄與魂乃隂陽之神而理實具乎其中惟其魂魄之中有理具焉是以静則為仁義禮智之性動則為惻隠羞惡恭敬是非之情胥此焉出也人須如此分作四節看方體認得著實或問朱文公但將理與氣對看今先生分作四節何也曰理與氣對是自天地生物而言今之説是自人禀受而言若但言氣大易何以謂精氣為神但言理横渠何以謂合性與知覺為心耶此意玩味當自知之若以語人徒起紛紛也因論虚靈知覺曰人只有個魂與魄人記事自然記得底是魄如會恁地搜索思量底這是魂魂日長一日魄是禀得來合下恁地如月之光彩是魂無光處是魄魄亦有光但是藏在裏面又曰氣之呼吸為魂耳目之精明為魄耳目精明是光藏在裏面如今人聽得事何甞是去聽他乃是他自入耳裏面來因透諸心便記得此是魄魄主受納魂主經營故魄屬隂魂屬陽隂凝静陽發㪚易云精氣為物精是精血氣是煖氣有這兩件方始成得個好物出來如人在胞胎中只是這兩個物骨肉肌體是精血一路做出會呼吸活動是煖氣一路做出然而精血煖氣則自有個虚靈知覺在裏面精血之虚靈知覺便是魄煖氣之虚靈知覺便是魂這虚靈知覺又不是一個虚浮底物裏面却又具許多道理故木神曰仁是虚靈知覺人受木之氣其虚靈知覺則具仁之理木便是氣血神便即是魂魄仁便是個道理如此看方是北溪陳氏曰禮運言人者隂陽之交鬼神之會説得亦親切此真聖賢之遺言非漢儒所能道也葢人受隂陽二氣而生此身莫非隂陽如氣陽血隂脉陽體隂頭陽足隂上體為陽下體為隂至於口之語黙目之寤寐鼻息之呼吸手足之屈伸皆是隂陽分屬不特人如此凡萬物皆然中庸所謂體物而不遺者言隂陽二氣為物之體而無不在耳天地間無一物不是隂陽則無一物不是鬼神子産謂人生始化曰魄既生魄陽曰魂斯言亦眞得聖賢之遺旨所謂始化是胎中畧成形時人初間纔受得氣便結成個胚胎模様是魄既成魄便漸漸會動屬陽曰魂及形既生矣神發知矣故人之知覺屬魂形體屬魄陽為魂隂為魄魂者陽之靈而氣之英魄者隂之靈而體之精如口鼻呼吸是氣那靈處便屬魂視聽是體那聰明處便屬魄就人身上細論大槩隂陽二氣會在吾身之中為鬼神以寤寐言則寤屬陽寐屬隂以語黙言則語屬陽黙屬隂及動静進退行止皆有隂陽凡屬陽者皆為魂為神凡屬隂者皆為魄為鬼人自孩提至於壯是氣之伸屬神中年以後漸漸衰老是氣之屈屬鬼以生死論則生者氣之伸死者氣之屈就死上論則魂之升者為神魄之降者為鬼魂氣本乎天故騰上體魄本乎地故降下書言帝乃殂落正是此意殂是魂之升上落是魄之降下者也易云精氣為物游魂為變故知鬼神之情狀言隂精陽氣聚而生物乃神之伸也而屬乎陽魂游魄降㪚而為變乃鬼之歸也而屬乎隂鬼神情狀大槩不過如此西山真氏曰人之生也精與氣合而已精者血之類是滋養一身者故屬隂氣是能知覺運動者故屬陽二者合而為神精即魄也目之所以明耳之所以聰者即精之為也此之為魄氣充乎體凡人心之能思慮有所識身之能舉動與夫勇决敢為者即氣之所為也此之為魂人之少壯也血氣强血氣强故魂魄盛此所謂伸及其老也血氣既耗魂魄亦衰此所謂屈也既死則魂升於天以從陽魄降於地以從隂所以各從其類也魂魄合則生離則死故先王制祭享之禮使為人子孫者盡誠致敬以􅌊蕭之屬求之於陽灌鬯之屬求之於隂求之既至則魂魄雖離而可以復合故禮記曰合鬼與神敬之至也神指魂而言鬼指魄而言此所謂屈而伸也論祭祀祖考神祗程子曰致敬乎鬼神者理也暱鬼神而求焉斯不智矣古人祭祀用尸極有深意不可不深思葢人之魂氣既㪚孝子求神而祭無尸則不享無主則不依故易於渙萃皆言王假有廟即渙㪚之時事也魂氣必求其類而依之人與人既為類骨肉又為一家之類已與尸各既以㓗齊至誠相通以此求神宜其享之後世不知此直以尊卑之勢遂不肯行耳祖考來格者惟至誠為有感必通上蔡謝氏曰隂陽交而有神形氣離而有鬼知此者為智事此者為神推仁智之合者可以制祀典祀典之意可者使人格之不使人致死之不可者使人逺之不使人致生之致生之故其鬼神致死之故其鬼不神則鬼神之情狀豈不昭昭乎動而不已其神乎滯而有迹其鬼乎往來不息神也推仆歸根鬼也致生之故其鬼神致死之故其鬼不神何也人以為神則神以為不神則不神矣知死而致生之不智知死而致死之不仁聖人所以神明之也問死生之説曰人死時氣盡也曰有鬼神否曰余當時亦曾問明道先生明道云待向你道無來你怎生信得及待向你道有來你但去尋討看此便是答底語又曰横渠説得來别這箇便是天地間妙用須是將來做個題目入思議始得講説不濟事曰沉魂滯魄影響底事如何曰須是自家看得破始得曰先王祭享鬼神則甚曰是他意思别三日齋五日戒求諸隂陽四方上下葢是要集自家精神所以假有廟必於萃與渙言之如武王伐啇所過名山大川致禱山川何知武王禱之者以此雖然如是以為有亦不可以為無亦不可這裏有妙理於若有若無之間須斷置得去始得曰如此却是鶻突也曰不是鶻突自家要有便有自家要無便無始得鬼神在虚空中辟塞滿觸目皆是為他是天地間妙用祖考精神便是自家精神朱子曰自天地言之只是一個氣自一身言之我之氣即祖先之氣亦只是一個氣所以纔感必應問何故天曰神地曰祇人曰鬼曰此又别氣之清明者為神如日月星辰之類是也此變化不可測祇本示字以有跡之可示山河草木是也比天象又差著至人則死為鬼矣又問既曰往為鬼何故謂祖考來格曰此以感而言所謂來格亦畧有些神祇意思以我之精神感彼之精神葢謂此也祭祀之禮全是如此且天子祭天地諸侯祭山川大夫祭五祀皆是自家精神抵當得他過方能感召得他來如諸侯祭天地大夫祭山川便沒意思了問祖宗是天地間一個統氣因子孫祭享而聚㪚曰這便是上蔡所謂若要有時便有若要無時便無是皆由乎人矣鬼神是本有底物事祖宗亦只是同此一氣但有個總腦處子孫這身在此祖宗之氣便在此他是有個血脉貫通所以神不歆非類民不祀非族只為這氣不相闗如天子祭天地諸侯祭山川大夫祭五祀雖不是我祖宗然天子者天下之主諸侯者山川之主大夫者五祀之主我主得他便是他氣又總統在我身上如此便有個相闗處問上蔡説鬼神云道有便有道無便無初看此二句與有其誠則有其神無其誠則無其神一般而先生言上蔡之語未稳如何曰有其誠則有其神無其誠則無其神便是合有底我若誠則有之不誠則無之道有便有道無便無是合有的當有無的當無上蔡而今都説得麤了合當道合有底從而有之則有合無底自是無了便從而無之今却只説道有便有道無便無則不可上蔡言鬼神我要有便有以天地祖考之類要無便無以非其鬼而祭之者你氣一正而行則彼氣皆㪚矣鬼神上蔡説得好只覺得隂陽交而有神之説與後神字有些不同只是他大綱説得極好如曰可者使人格之不使人致死之可者是合當祭如祖宗父母這須著盡誠感格之不要人便做死人看待他不可者使人逺之不使人致生之不可者是不當祭如閑神野鬼聖人便要人逺之不要人做生人看待他可者格之須要得他來不可者逺之我不管他便都無了問上蔡云隂陽交而有神形氣離而有鬼知此者為智事此者為仁上兩句只是説伸而為神歸而為鬼底意思曰是如此問事此者為仁只是説能事鬼神者必極其誠敬以感格之所以為仁否曰然問禮謂致生為不知此謂致生為知曰那只是説明器如三日齋七日戒直是將做個生底去祭他方得問謝又云致死之故其鬼不神曰你心不嚮他便無了又問齋戒只是要團聚自家精神然自家精神即祖考精神不知天地山川鬼神亦只以其來處一般否曰是如此天子祭天地諸侯祭封内山川是他是主如古人祭墓亦只以墓人為尸問鬼神之義來教云只思上蔡祖考精神便是自家精神一句則可見其苖脉矣某甞讀太極圖義有云人物之始以氣化而生者也氣聚成形則形交氣感遂以形化而人物生生變化無窮是知人物在天地間其生生不窮者固理也其聚而生㪚而死者則氣也有是理則有是氣氣聚於此則其理亦命於此今所謂氣者既已化而無有矣則所謂理者抑於何而寓耶然吾之此身即祖考之遺體祖考之所具以為祖考者葢具於我而未甞亡也是其魂升魄降雖已化而無有然理之根於彼者既無止息氣之具於我者復無間斷吾能致精竭誠以求之此氣既純一而無所雜則此理自昭著而不可掩此其苖脉之較然可睹者也上蔡云三日齋七日戒求諸隂陽上下只是要集自家精神葢我之精神即祖考之精神在我者既集即是祖考之來格也然古人於祭祀必立之尸其義精甚葢又是因祖考遺體以凝聚祖考之氣氣與質合則其㪚者庻乎復聚此教之至也故曰神不歆非類民不祀非族曰所喻鬼神之説甚精密大抵人之氣傳於子孫猶木之氣傳於實也此實之傳不泯則其生木雖枯毁無餘而氣之在此者猶自若也鬼神二事古人誠實於此處直是見得幽明一致如在其上下左右非心知其不然而姑為是言以設教也問性即是理不可以聚㪚言聚而生㪚而死者氣而已所謂精神魂魄有知有覺者氣也故聚則有㪚則無若理則亘古今常存不復有聚㪚消長也曰只是這個天地隂陽之氣人與萬物皆得之氣聚則為人㪚則為鬼然其氣雖已㪚這個天地隂陽之理生生而不窮祖考之精神魂魄雖已㪚而子孫之精神魂魄自有些小相屬故祭祀之禮盡其誠敬便可以致得祖考之魂魄這個自是難説看既㪚後一似都無了能盡其誠敬便有感格亦縁是理常只在這裏也問鬼神以祭祀而言天地山川之屬分明是一氣流通而兼以理言之人之先祖則大槩以理為主而亦以氣魄言之若上古聖賢則只是專以理言之否曰有是理必有是氣不可分説都是裡都是氣那個不是理那個不是氣又問上古聖賢所謂氣者只是天地間公共之氣若祖考精神則畢竟是自家精神否曰祖考亦只是此公共之氣此身在天地間便是理與氣凝聚底天子統攝天地負荷天地間事與天地相闗此心便與天地相通不可道他是虚氣與我不相干如諸侯不當祭天地與天地不相闗便不能相通聖賢道在萬世功在萬世今行聖賢之道傳聖賢之心便是負荷這物事此氣便與他相通如釋奠列許多籩豆設許多禮儀不成是無此姑謾為之人家子孫負荷祖宗許多基業此心便與祖考之心相通祭義所謂春禘秋甞者亦以春陽來則神亦來秋陽退則神亦退故於是時而設祭初間聖人亦只是畧為禮以達吾之誠意後來遂加詳密問人之死也不知魂魄便㪚否曰固是㪚又問子孫祭祀却有感格者如何曰畢竟子孫是祖宗之氣他氣雖㪚他根却在這裏盡其誠敬則亦能呼召得他氣聚在此如水波漢後水非前水後波非前波然却通只是一水波子孫之氣與祖考之氣亦是如此他那個當下自㪚了然他根却在這裏根既在此又却能引聚得他那氣在此此事難説只要人自看得問下武詩三后在天先生解云在天言其既沒而精神上合于天此是如何曰便是又有此理問恐只是此理上合於天耳曰既有此理便有此氣又問想是聖人禀得清明純粹之氣故其死也其氣上合于天曰也是如此這事又微妙難説要人自看得世間道理有正當易見者又有變化無常不可窺測者如此方看得這個道理活又如云文王陟降在帝左右如今若説文王真個在上帝之左右真個有上帝如世間所塑之像固不可然聖人如此説便是有此理問先生答廖子晦書云氣之已㪚者既化而無有矣而根於理而日生者則固浩然而無窮也故上蔡謂我之精神即祖考之精神葢謂此也且根於理而日生者浩然而無窮此是説天地氣化之氣否曰此氣只一般周禮所謂天神地示人鬼雖有三様其實只一般若説有子孫底引得他氣來則不成無子孫底他氣便絶無了他血氣雖不流傳他那個亦自浩然日生無窮如禮書諸侯因國之祭祭其國之無主後者如齊大公封於齊便用祭甚爽鳩氏季萴逢伯陵蒲姑氏之屬葢他先主此國來禮合祭他然聖人制禮惟繼其國者則合祭之非在其國者便不當祭便是理合如此道理合如此便有此氣如衛侯夢康叔云相奪予饗葢衛徙都帝丘夏后相亦都帝丘則都其國自合當祭不祭宜其如此又如晋侯夢黄熊入寢門以為鯀之神亦是此類不成説有子孫底方有感格之理便使其無子孫其氣亦未甞亡也如今祭勾芒他更是逺然既合當祭他便有些一作此氣要之通天地人只是這一氣所以説洋洋然如在其上如在其左右虚空偪塞無非此理自要人看得活難以言曉也問死者精神既㪚必須生人祭祀盡誠以聚之方能凝聚若相奪予饗事如伊川所謂别是一理否曰他夢如此不知是如何或是他有這念便有這夢也不可知問人祭祖先是以己之精神去聚彼之精神可以合聚葢為自家精神便是祖考精神故能如此諸侯祭因國之主與自家不相闗然而也呼喚得他聚葢為天地之氣便是他氣底母就這母上聚他故亦可以感通曰此謂無主後者祭時乃可以感動若有主後者祭時又也不感通問若理不相闗則聚不得他若理相闗則方可聚得他曰是如此又曰若不是因國也感他不得葢為他元是這國之主自家今主他國土地他無主後合是自家祭他便可感通問鬼神恐有兩様天地之間二氣氤氲無非鬼神祭祀交感是以有感有人死為鬼祭祀交感是以有感無曰是所以道天神人鬼神便是氣之伸此是常在底鬼便是氣之屈便是已㪚了底然以精神去合他又合得在問不交感時常在否曰若不感而常有則是有餒鬼矣鬼神以主宰言然以物言不得又不是如今泥塑底神之類只是氣且如祭祀只是你聚精神以感祖考是你所承流之氣故可以感問事鬼神曰古人交神明之道無些子不相接處古人立尸便是接鬼神之意問祭祀之理還是有其誠則有其神無其誠則無其神否曰鬼神之理即是此心之理祭祀之感格或求之隂或求之陽各從其類來則俱來然非有一物積于空虚之中以待子孫之求也但主祭祀者既是他一氣之流傳則盡其誠敬感格之時此氣固寓此也問子孫祭祀盡其誠意以聚祖考精神不知是合他魂魄只是感格其魂氣曰焫蕭祭脂所以報氣灌鬼鬱鬯所以招魂便是合他所謂合鬼與神教之至也又問不知常常恁地只是祭祀時恁地曰但有子孫之氣在則他便在然不是祭祀時如何得他聚人死雖是魂魄各自飛㪚要之魄又較定須是招魂來復這魄要他相合復不獨是要他活是要聚他魂魄不教㪚了聖人教人子孫常常祭祀也是要去聚得他問祖考精神既㪚必須三日齊七日戒求諸陽求諸隂方得他聚然其聚也倐忽其聚到得禱祠既畢誠敬既㪚則又忽然而㪚曰然問祖考精神便是自家精神故齊戒祭祀則祖考來格若祭旁親及子亦是一氣猶可推也至於祭妻及外親則其精神非親之精神矣豈於此但於心感之而不以氣乎曰但所祭者其精神魂魄無不感通葢本從一源中流出初無間隔雖天地山川鬼神亦然也問死者魂氣既㪚而立主以主之亦須聚得些子氣在這裏否曰古人自始死弔魂復魄立重設主便是常要接續他些子精神在這裏古有釁龜用牲血便是覺見那龜久後不靈了又用些子生氣去接續他史記上龜筮傳占春將雞子就上面開卦便也是將生氣去接他便是釁龜之意又曰古人立尸也是將生人生氣去接他勉齋黄氏曰古人奉先追逺之誼至重生而盡孝則此身此心無一念不在其親及親之歿也升屋而號設重以祭則祖考之精神魂魄亦不至於遽㪚朝夕之奠悲慕之情自有相為感通而不離者及其嵗月既逺若未易格則祖考之氣雖㪚而所以為祖考之氣未甞不流行於天地之間祖考之精神雖亡而吾所受之精神即祖考之精神以吾受祖考之精神而交於所以為祖考之氣神氣交感則洋洋然在其上在其左右者葢有必然而不能無者矣學者但知世間可言可見之理而稍幽㝠難曉則一切以為不可信是以其説率不能合於聖賢之意也北溪陳氏曰古人祭祀以魂氣歸于天體魄歸于地故或求諸陽或求諸隂如祭義曰燔燎羶音馨薌音香見以蕭光以報氣也薦黍稷羞肝肺首心加以鬱鬯以報魄也郊特牲曰周人尚臭灌用鬯臭鬱合鬯臭隂達於淵泉既灌然後迎牲致隂氣也蕭合黍稷臭陽達於牆屋故既奠然後焫蕭合羶薌凡祭謹諸此又曰祭黍稷加肺祭齊加明水報隂也取膟膋燔燎升首報陽也所以求鬼神之義大槩亦不過如此人與天地萬物皆是兩間公共一個氣子孫與祖宗又是就公共一氣中有個脉絡相闗繫尤親切謝上蔡曰祖考精神便只是自家精神故子孫能極盡其誠敬則己之精神便聚而祖宗之精神亦聚便自來格今人於祭自已祖宗正合著實處却都鹵莽只管外面祀他鬼神必極其誠敬不知他鬼神與己何相干涉假如極其誠敬備其牲牢若是正神不歆非類必無相交接之理若是淫邪茍簡竊食而已亦必無降福之理范氏謂有其誠則有其神無其誠則無其神此説得最好誠只是真實無妄雖以理言亦以心言須是有此實理然後致其誠敬而副以實心方有此神茍無實理雖有實心亦不歆享且如季氏不當祭泰山而冒祭是無此實理矣假饒極盡其誠敬之心與神亦不相干涉㤗山之神决不吾享大槩古人祭祀須是有此實理相闗然後三日濟七日戒以聚吾之精神吾之精神既聚則所祭者之精神亦聚必自有來格底道理鶴山魏氏曰或曰盈宇宙之間其生生不窮者理也其聚而生㪚而死者氣也氣聚於此則其理亦命於此今氣化而無有矣而理惡乎寓曰是不然先儒謂致生之故其鬼神致死之故其鬼不神古人修其祖廟陳其宗器設其裳衣薦其時食者將以致其如在之誠庻幾享之其昭明焄蒿悽愴洋洋乎承祀之際者是皆精誠之攸寓而實理之不可揜也論祭祀神祇程子曰俗人酷畏鬼神久亦不復敬畏問易言知鬼神情狀果有情狀否曰有之又問既有情狀必有鬼神矣曰易説鬼神便是造化也又問如名山大川能興雲致雨何也曰氣之蒸成耳又問既有祭則莫須有神否曰只氣便是神也今人不知此理纔有水旱便去廟中祈禱不知雨露是甚物從何處出復於廟中求邪名山大川能興雲致雨却都不説著却只於山川外木土人身上討雨露木土人身上有雨露邪又問莫是人自興妖曰只妖亦無皆人心興之也世人只因祈禱而有雨遂指為靈騐耳豈知適然張子曰所謂山川門霤之神與郊社一作祀天地隂陽之神有以異乎易謂天且不違而况於鬼神乎仲尼以何道而異其稱耶又謂遊魂為變魂果何物其遊也情狀何如試求之使無疑然後可以拒怪神之説知亡者之歸此外學素所援據以質成其論者不可不察以自祛其疑耳或問鬼神事伊川以為造化之迹但如敬與逺字却似有跡不知逺個甚底和靖伊氏正色曰非其鬼而祭之謟也又如今人將鬼神來邀福便是不敬不逺又曰鬼神事無他却只是個誠吕堅中曰如在其上如在其左右曰然朱子曰地祇者周禮作示字只是示見著見之義地之神只是萬物發生山川出雲之類鬼神若是無時古人不如是求七日戒三日齊或求諸陽或求諸隂須是見得有如天子祭天地定是有個天有個地諸候祭境内名山大川定是有個名山大川大夫祭五祀定是有個門行户竈中霤今廟宇有靈底亦是山川之氣會聚處久之被人掘鑿損壞於是不復有靈亦是這些氣過了問祭天地山川而用牲帛酒醴者只是表吾心之誠耶抑真有氣來格也曰若道無物來享時自家祭甚底肅然在上令人奉承敬畏是甚物若道真有雲車擁從而來又妄誕問天神地示之義曰注疏謂天氣常伸謂之神地道常㸃以示人謂之示問鬼者隂之靈神者陽之靈司命中霤竈與門行人之所用者有動有静有作有止故亦隂陽鬼神之理古人所以祀之然否曰有此物便有此鬼神葢莫非隂陽之所為也五祀之神若細分之則户竈屬陽門行屬隂中霤兼統隂陽就一事之中又自有隂陽也問子之祭先祖固是以氣而求若祭其他鬼神則如之何有來享之意否曰子之於祖先固有顯然不易之理若祭其他亦祭其所當祭祭如在祭神如神在如天子則祭天是其當祭亦有氣類鳥得而不來歆乎諸侯祭社稷故今祭社亦是從氣類而祭烏得而不來歆乎今祭孔子必於學其氣類亦可想問天地山川是有個物事則祭之其神可致人死氣已㪚如何致之曰只是一氣如子孫有個氣在此畢竟是因何有此其所自來葢自厥初生民氣化之祖相傳到此只是此氣問祭先賢先聖如何曰有功徳在人人自當報之古人祀五人帝只是如此後世有個新生底神道縁衆人心邪向他他便盛如狄仁傑只留吳泰伯伍子胥廟壞了許多廟其鬼亦不能為害縁是他見得無這物事了上蔡云可者欲人致生之故其鬼神不可者欲人致死之故其鬼不神問道理有正則有邪有是則有非鬼神之事亦然世間有不正之鬼神謂其無此理則不可曰老子謂以道蒞天下者其鬼不神若是王道脩明則此等不正之氣都消鑠了一云老子云以道治世則其鬼不神此有理行正當事人自不作怪棄常則妖興北溪陳氏曰古人祭天地山川皆立尸誠以天地山川只是隂陽二氣用尸要得二氣來聚這尸上不是徒然歆享所以用灌用燎用牲用幣大要盡吾心之誠敬誠敬既盡則天地山川之氣便自聚天子是天地之主天地大氣闗繫於一身極盡其誠敬則天地之氣闗聚有感應處諸侯是一國之主只祭境内之名山大川極盡其誠敬則山川之氣便聚於此而有感應皆是各隨其分限小大如此敬鬼神而逺之此一語説得圓而盡如正神能知敬矣又易失之不能逺邪神能知逺矣又易失之不能敬須是都要敬而逺逺而敬始兩盡幽明之義文公論解説專用力於人道之所宜而不惑於鬼神之不可知此語示人極為親切未能事人焉能事鬼須是盡事人之道則事鬼之道斷無二致所以發子路者深矣論生死程子曰死生存亡皆知所從來胷中瑩然無疑止此理爾孔子言未知生焉知死葢畧言之死之事即生是也更無别理凡物參和交感則生離㪚不和則死合而生非來也盡而死非往也然而精氣歸於天形魄歸於地謂之往亦可矣原始則足以知其終反終則足以知其始死生之説如是而已矣故以春為始而原之必有冬以冬為終而反之其必有春死生者其與是類也五峯胡氏曰物之生死理也理者萬物之貞也生聚而可見則為有死㪚而不可見則為無見者物之形也物之理則未甞有無也朱子曰氣聚則生氣㪚則死問死生一理也死而為鬼猶生而為人也但有去來幽顯之異耳如一晝一夜晦明雖異而天理未甞變也曰死者去而不來其不變者只是理非有一物常在而不變也問人死時只當初禀得許多氣氣盡則無否曰是曰如此則與天地造化不相干曰死生有命當初禀得氣時便定了便是天地造化只有許多氣能保之亦可延魯齋許氏曰人生天地間生死常有之理豈能逃得却要㝷個不死寧有是理性理大全書卷二十八

body:
  text: 性理大全書卷五十三學十一讀書法一程子曰讀書将以窮理将以致用也今或滯心於章句之末則無所用也此學者之大患凡觀書不可以相類泥其義不爾則字字相梗當觀其文勢上下之意如充實之謂美與詩之美不同嘗觀讀書有令人喜時有令人手舞足蹈時或問莫是古人之意與先生之意相合後如此否曰是也論語孟子只剰讀著便自意足學者湏是玩味若以語言觧著意便不足問世有以讀書為文為藝者曰為文謂之藝猶之可也讀書謂之藝則求諸書者淺矣張子曰觀書必總其言而求作者之意讀書少則無由考校得義精盖書以維持此心一時放下則一時徳性有懈讀書則此心常在不讀書則終看義理不見書湏成誦精思多在夜中或静坐得之不記則思不起但通貫得大原後書亦易記所以觀書者釋已之疑明已之未達每見每加新益則學進矣於不疑處有疑方是進上蔡謝氏曰學者先學文鮮有能至道至如博觀泛覽亦自為害故明道先生敎余嘗曰賢讀書慎不要尋行數墨龜山楊氏語羅仲素曰某嘗有數句敎學者讀書之法云以身體之以心驗之從容黙㑹於幽閒静一之中超然自得於書言象意之表此盖某所自為者如此和靖尹氏曰吕獻可嘗言讀書不湏多讀得一字行取一字伊川亦嘗言讀得一尺不如行得一寸行得便是㑹讀書二公之意正同讀書湏是㸔聖人用心處自家臨事時一一要使延平李氏曰讀書者知其所言莫非吾事而即吾身以求之則凡聖賢所至而吾所未至者皆可勉而進矣若直以文字求之説其詞義以資誦説其不為玩物䘮志者㡬希朱子曰讀書湏是虚心切已虚心方能得聖賢意切已則聖賢之言不為虚説讀書湏且虚心静慮依傍文義推㝷句脈看定此句指意是説何事略用今人言語襯貼替換一兩字説得古人意思出來先敎自家心裏分明厯落如與古人對面説話彼此對答無一言一字不相肯可此外都無閒雜説話方是得箇入處讀書先要虚心平氣熟讀精思令一字一句皆有下落諸家注觧一一通貫然後可以較其是非以求聖賢立言之本意雖已得之亦且更如此反復玩味令其義理浹洽於中淪肌浹髄然後乃可言學耳觀書但當虚心平氣以徐觀義理之所在如其可取雖世俗庸人之言有所不廢如有可疑雖或傳以為聖賢之言亦湏更加審擇自然意味平和道理明白脚踏實地動有據依無籠罩自欺之患矣讀書湏是優游玩味徐觀聖賢立言本意所向如何然後随其逺近淺深輕重緩急而為之説如孟子所謂以意逆志者庶乎可以得之若便以吾先入之説横於胷次而驅率聖賢之言以從已意設使義理可通已涉私意穿鑿而不免於郢書燕説之誚况又義理窒礙亦有所不可行者乎嘗見人云大凡不公底人讀書不得今看来是如此如觧説聖經一向都不有自家身已全然虚心只把他道理自看其是非恁地看文字猶更自有牽於舊習失㸃檢處全然把一己私意去看聖賢之書如何看得出讀書有箇法只是刷刮净了那心後去看若不曉得又且放下待他意思好時又将來看而今却説要虚心心如何觧虚得而今正要将心在那上面讀書湏是要身心都入在這一段裏面更不問外面有何事方見得一段道理出如博學而篤志切問而近思如何却説箇仁在其中盖自家能常常存得此心莫敎走作則理自然在其中今人却一邉去看文字一邉去思量外事只是枉費了工夫不如放下了文字待打疊敎意思静了却去看觀書當平心以觀之不可穿鑿看從分明處不可尋從隐僻處去聖賢之言多是與人説話若是嶢﨑却敎當時人如何曉聖賢立言本自平易而平易之中其㫖無窮今必推之使髙鑿之使深是未必真能髙深而固已離其本指䘮其平易無窮之味矣問方讀書時覺得無静底工夫須有讀書之時有静虚之時曰某舊見李先生嘗教令静坐後来看得不然只是一箇敬字好方無事時敬於自持及應事時敬於應事讀書時敬於讀書便自然該貫動静心無時不存初學於敬不能無間斷只是纔覺間斷便提起此心只是覺處便是接續某要得人只就讀書上體認義理日間常讀書則此心不走作或只去事物中衮則此心易得汩沒知得如此便就讀書上體認義理便可喚轉来本心陷溺之久義理浸灌未透且宜讀書窮理常不間㫁則物欲之心自不能勝而本心之義理自安且固矣學者觀書多走作者亦恐是根本上工夫未齊整只是以紛擾雜亂心去看不曽以湛然凝定心去看不若先涵養本原且将已熟底義理玩味待其浹洽然後去看書便自知只是如此老蘇自述其學為文處有云取古人之文而讀之始覺其出言用意與已大異及其久也讀之益精胷中豁然以明若人之言固當然者此是他於學文上工夫有見處可取以喻今日讀書其工夫亦合如此又曰看得一兩段却且放心胷寛閒不可貪多放寛心以他説看他説以物觀物無以己觀物張子云書所以維持此心一時放下則一時徳性有懈也是説得維持字好盖不讀書則此心便無用處今但見得些子便更不肯去窮究那許多道理䧟溺其心於清虚曠蕩之地却都不知豈可如此昔陳烈先生苦無記性一日讀孟子學問之道無他求其放心而已矣忽悟曰我心不曽收得如何記得書遂閉門静坐不讀書百餘日以收放心却去讀書遂一覽無遺讀書固收心之一助然今只讀書時收得心而不讀書時便為事所奪則是心之存也常少而其放也常多矣且胡為而不移此讀書工夫向不讀書處用力使動静兩得而此心無時不存乎學問就自家身己上切要處理㑹方是那讀書底已是第二義自家身上道理都具不曽外面添得来然聖人教人湏要讀這書時盖為自家雖有這道理湏是經厯過方得聖人説底是他曽經厯過来讀書以觀聖賢之意因聖賢之意以觀自然之理人之為學固是欲得之於心體之於身但不讀書則不知心之所得者何事讀書窮理當體之於身凡平日所講貫窮究者不知逐日常見得在心目間否不然則随文逐義趕趂期限不見恱處恐終無益讀書不可只専就紙上求義理湏反来就自家身上推究秦漢以後無人説到此亦只是一向去書冊上求不就自家身上理㑹自家見未到聖人先説在那裏自家只借他言語来就身上推究始得如説仁義禮智曽認得自家如何是仁自家如何是義如何是禮如何是智湏是著已體認方得如讀學而時習之自家曽如何學自家曽如何習不亦説乎曽見得如何是説湏恁地認始得若只逐段觧過去觧得了便休也不濟事讀聖人書當反身而求亦湏是講學不講學遇事便有嵲屼不自安處講學明則坦坦地行将去此道理無出聖人之言但當熟讀深思且如人看生文字與熟文字自是兩般既熟時他人説底便是我底讀其他書不如讀論語最要盖其中無所不有若只躬行而不講學只是箇鶻突底好人問平日讀書時似亦有所見既釋書則别是一般又每苦思慮紛擾雖持敬亦未免弛慢不知病根安在曰此乃不求之於身而専求之於書固應如此古人曰為仁由己而由人乎哉凡吾身日用之間無非道書則所以接凑此心耳故必先求之於身而後求之於書則讀書方有味大凡讀書且要讀不可只管思口中讀則心中閒而義理自出某之始學亦如是爾更無别法或問讀書未知統要曰統要如何便㑹知得近来學者有一種則舍去冊子却欲於一言半句上便要見道理又有一種則一向汎濫不知歸著處此皆非知學者湏要熟看熟思久久之間自然見箇道理四停八當而所謂統要者自在其中矣書只貴讀讀多自然曉今只思量得寫在紙上底也不濟事終非我有只貴乎讀這箇不知如何自然心與氣合舒暢發越自是記得牢縱饒熟看過心裏思量過也不如讀讀来讀去少間曉不得底自然曉得已曉得者越有滋味若是讀不熟都沒這般滋味而今未説讀得注且只熟讀正經行住坐臥心常在此自然曉得嘗思之讀便是學夫子説學而不思則㒺思而不學則殆學便是讀讀了又思思了又讀自然有意若讀而不思又不知其意味思而不讀縱使曉得終是􅑶臲不安一似倩得人来守屋相似不是自家人終不屬自家使喚若讀得熟而又思得精自然心與理一永逺不㤀某舊苦記文字不得後来只是讀今之記得者皆讀之功也老蘇只取孟子論語韓子與諸聖人之書安坐而讀之者七八年後来做出許多文字如此好他資質固不可及然亦湏著如此讀只是他讀時便只要摸寫他言語做文章若移此心與這様資質去講究義理那裏得来是知書只貴讀别無方法讀書湏是成誦方精熟今所以記不得説不去心下若存若亡皆是不精不熟之患若曉得義理又皆記得固是好若曉文義不得只背得少間不知不覺自然相觸發曉得這義理盖這一段文義横在心下自是放不得必曉而後已若曉不得又記不得更不消讀書矣横渠云讀書湏是成誦今人所以不如古人處只争這些子古人記得故曉得今人鹵莽記不得故曉不得緊要處慢處皆湏成誦自然曉得也韓退之謂沉潜乎訓義反復乎句讀湏有沉潜反復之功方得所謂審問之湏是表裏内外無一毫之不盡方謂之審恁地竭盡心力猶有見未到處却不奈何如今人不曽竭盡心力只見得三兩分了便草草揭過少間只是鶻突無理㑹枉著日月依舊似不曾讀相似只如退之老蘇作文章本自沒要緊事然他大段用功少間方㑹漸漸掃去那許多鄙俗底言語換了箇心胷説這許多言語出来如今讀書湏是加沉潜之功将義理去澆灌胷腹漸漸盪滌去那許多淺近鄙陋之見方㑹見識髙明因説如今讀書多是不曾理㑹得一處通透了少間却多牽引前面疑難来説此最學者大病講論一篇書湏是理㑹得透把這一篇書與自家衮作一片方是去了本子時許多節目次第都厯厯落落在心中皆説得去方好為學雖是立志然書亦不可不讀湏将經傳本文熟復若専一静坐如浮屠氏塊然獨處更無酬酢然後為得吾徒之學正不如此遇無事則静坐有書則讀書以至接物處事常放此心光地便是存心豈可凡百放下秪是静坐古人讀書與今人異如孔門學者於聖人纔問仁問知終身事業已在此今人讀書仁義禮智總識而却無落泊處此不熟之故也昔五峯於京師問龜山讀書法龜山云先讀論語五峯問論語二十篇以何為緊要龜山曰事事緊要看此可見讀書工夫莫草略近日學者多縁草略過了故下梢頭儧無去處一齊棄了大凡看書粗則心粗看書細則心細若研窮不熟得些義理以為是亦得以為非亦得湏是見得差之毫釐繆以千里方可聖人千言萬語只是説箇當然之理恐人不曉又筆之於書自書契以来二典三謨伊尹武王周公箕子孔孟都只是如此可謂盡矣只就文字間求之句句皆是做得一分便是一分工夫非茫然不可測也但患人不子細求索之耳湏要思量聖人之言是説箇甚麽要将何用若只讀過便休又何必讀問讀書之法如今看来聖賢言行本無相違其間所以有可疑者只是不逐處研究得通透所以見得牴牾若真箇逐處逐節逐段見得精切少間却自到貫通地位曰固是如今若茍簡看過只一處便自未曽理㑹得了却要别生疑義徒勞無益讀書湏是子細逐句逐字要見去著若用工粗鹵不務精思只道無可疑處非無可疑理㑹未到不知有疑爾觀書湏静著心寛著意思沉潜反覆将久自㑹曉得去聖賢之言湏常将来眼頭過口頭轉心頭運讀書之法先要熟讀湏是正看背看左看右看看得是了未可便説道是更湏反覆玩味讀書當擇先儒舊説之當於理者反覆玩味朝夕涵泳便與本經正言之要通貫浹洽於胷中然後有益不必段段立説徒為觀美而實未必深有得於心也講學正要反復研窮方見義理歸宿處不可只略説過便休也讀書玩味其意理㑹未得處且記著時時拈起看久之湏有得力處為學讀書湏是耐煩細意去理㑹切不可粗心若曰何必讀書自有箇㨗径法便是悞人底深坑也未見道理時恰如數重物色包裹在裏許無縁可以便見得湏是今日去了一重又見得一重明日又去了一重又見得一重去盡皮方見肉去盡肉方見骨去盡骨方見髄使粗心大氣不得聖人言語一重又一重湏入深去看若只要皮膚便有差錯湏深沉方有得讀書理㑹一件了又一件不止是讀書如遇一件事且就這事上思量合當如何做處得来當方理㑹别一件書不可只就皮膚上看事亦不可只就皮膚上理㑹天下無書不是合讀底無事不是合做底若一箇書不讀這裏便闕此一書之理一件事不做這裏便闕此一事之理大而天地隂陽細而昆蟲草木皆當理㑹一物不理㑹這裏便闕此一物之理讀書是格物一事今且湏逐段子細玩味反来覆去逐旋捱得多後却見頭頭道理都到這工夫湏用行思坐想或将已曉得者再三思省却自有一箇曉悟處出不容安排書之句法義理雖只是如此觧説但一次看有一次見識所以某書一畨看有一畨改亦有已説定一畨看一畨見得稳當愈加分曉或問先生謂講論固不可無湏是自去體認如何是體認曰體認是把那聴得底自去心裏重復思繹過伊川曰時復思繹浹洽於中則説矣某向来從師曰間所聞説話夜間如温習一般一一子細思量過纔有疑明日又問學者當以聖賢之言反求諸身一一體察湏是曉然無疑積日既久當自有見但恐用意不精或貪多務廣或得少為足則無由明耳讀書湏要切已體驗不可只作文字看又不可助長學者讀書湏要斂身正坐緩視㣲吟虚心涵泳切已省察讀一句書湏體察這一句我将来甚處用得觀書以已體驗固為親切然亦湏遍觀衆理而合其歸趣乃佳若只據已見却恐於事理有所不周欲徑急而反疎緩也讀書湏是以自家之心體驗聖人之心少間體驗得熟自家之心便是聖人之心某自二十時看道理便要看那裏面嘗看上蔡語録其初将紅筆抹出後又用青筆抹出又要黄筆抹出三四畨後又用黒筆抺出是要尋那精底看道理湏是漸漸向裏尋到那精英處方是山谷與李㡬仲帖云大率學者喜博而常病不精汎濫百書不若精於一也有餘力然後及諸書則涉獵諸篇亦得其精盖以我觀書則處處得益以書博我則釋卷而茫然某深喜之以為有補於學者學者只知觀書都不知有四邉方始有味嘗看横渠成誦之説最為㨗径盖未論看得義理如何且是收得此心有歸著處不至走作然亦湏是専一精研使一書通透爛熟都無記不起處方可别換一書乃為有益若但輪流通念而覈之不精則亦未免枉費工夫也湏是都通透後又却如此温習乃為佳耳讀書湏讀到不忍舍處方是見得真味若讀之數過畧曉其義即厭之欲别求書看則是於此一卷書猶未得趣也葢人心之靈天理所在用之則愈眀只提醒精神終日著意看得多少文字窮得多少義理徒為懶倦則精神自是憒憒只恁昏塞不通可惜舊見李先生説理㑹文字湏令一件融釋了後方更理㑹一件融釋二字下得極好此亦伊川所謂今日格一件明日又格一件格得多後自脱然有貫通處此亦是他真曾經厯來便説得如此分明今若一件未能融釋而又欲理㑹一件則第二件又不了推之萬事事事不了何益讀書之法湏是從頭至尾逐句玩味看上字時如不知有下字看上句時如不知有後句看得都通透了又却從頭看此一段令其首尾通貫然方其看此段時亦不知有後段也如此漸進庶㡬心與理㑹自然浹洽非惟㑹得聖賢言語意脈不差且是自已分上身心義理日見純熟若只如此匆匆檢閲一過便可随意穿鑿排布硬説則不唯錯㑹了經意於已分上亦有何干涉讀書之法當循序而有常致一而不懈從容乎句讀文義之間而體驗乎操存踐履之實然後心静理明漸見意味不然則雖廣求博取日誦五車亦奚益於學哉故程子曰善學者求言必自近易於近者非知言者也此言殊有味夫學非讀書之謂然不讀書又無以知為學之方故讀之者貴専而不貴博葢唯専為能知其意而得其用徒博則反苦於雜亂淺略而無所得必也致精一書優柔厭飫以求聖學工夫次第之實俟其心通意觧書冊之外别有實下工夫處然後更易而少進焉則得尺得寸雖少而皆為吾有矣學者且将一件書讀聖人之言即聖人之心聖人之心即天下之理且逐段看令分曉一段分曉又看一段如此至一二十段亦未觧便見箇道理但如此心平氣定不東馳西騖則道理自逐段分明去得自家心上一病便是一箇道理明也道理固是自家本有但如今隔一隔了湏逐旋揩磨呼喚得歸然無一喚便見之理如金溪只要自得若自得底是固善若自得底非却如何不若且虚心讀書切不可自謂理㑹得了便理㑹得且只做理㑹不得方有長進學者理㑹文義只是要先理㑹難底遂至於易者亦不能曉學記曰善問者如攻堅木先其易者後其節目所謂攻瑕則堅者瑕攻堅則瑕者堅不知道理好處又却多在平易處觀書湏從頭循序而進不以淺深難易有所取舍自然意味詳宻至於浹洽貫通則無緊要處所下工夫亦不落空矣今人多是揀難底好底看非惟聖賢之言不可如此間别且是只此心意便不定疊縱然用心探索得到亦與自家這裏不相干突兀聱牙無田地可安頓此病不可不知也讀書且就那一段本文意上看不必又生枝節看一段湏反復看来看去要十分爛熟方見意味方快活令人都不愛去看别段始得人多是向前䟎去不曾向後反復只要去看明日未讀底不曽去紬繹前日已讀底湏玩味反復始得用力深便見意味長意味長便受用牢固亦不可信口依希略綽説過便是心曉讀書不可貪多常使自家力量有餘萬正淳云欲将諸書循環看曰不可如此湏看得一書徹了方再看一書若雜然並進却反為所困如射弓有五斗力且用四斗弓便可拽滿已力欺得他過今學者不忖自已力量去觀書恐自家照管他不過讀書只恁逐段子細看積累去則一生讀多少書若務貪多則反不曾讀得湏是緊著工夫不可悠悠又不湏忙只常抖擻得此心醒則看愈有力讀書小作課程大施功力如㑹讀得二百字只讀得一百字却於百字中猛施工夫理㑹子細讀誦敎熟如此不㑹記性人自記得無識性人亦理㑹得若泛泛然念多只是皆無益耳書宜少看要極熟小兒讀書記得大人多記不得者只為小兒心専一日授一百字則只是一百字二百字則只是二百字大人一日或看百板不恁精専人多看一分之十今宜看十分之一寛著期限緊著課程今人讀書看未到這裏心已在後面纔看到這裏便欲舎去了如此只是不求自家曉觧湏是徘徊顧戀如不欲去方㑹認得讀書湏是徧布周滿某嘗以為寜詳毋略寜下毋髙寜拙毋巧寜近毋逺書雖是古人書今日讀之所以蓄自家之徳却不是欲這邉讀得些子便搬出做那邉用讀書将以求道不然讀作何用今人不去這上理㑹道理皆以涉獵該博為能所以有道學俗學之别學者讀書湏是於無味處當致思焉至於羣疑並興寝食俱廢乃能驟進因歎驟進二字最下得好湏是如此若進得些子或進或退若存若亡不濟事如用兵相殺争得些兒小可一二十里地也不濟事湏大殺一畨方是善勝為學之要亦是如此讀書湏見得有曉不得處方是長進又更就此闕其所疑而反復其餘則庶㡬得聖人之意識事理之真而其不可曉者不足為病矣某向時與朋友説讀書也敎他去思索求所疑近方見得讀書只是且恁地虚心就上面熟讀久之自有所得亦自有疑處葢熟讀後自有窒礙不通處是自然有疑方好較量今若先去尋箇疑便不得這般也有時候舊日看論語合下便有疑葢自有一様事被諸先生説成數様所以便著疑今却有集注了且可傍本看敎心熟少間或有説不通處自見得疑只是今未可先去疑著又曰讀書無疑者湏敎有疑有疑者却要無疑到這裏方是長進讀書若有所見未必便是不可便執著且放在一邉益更讀書以来新見若執著一見則此心便被此見遮蔽了譬如一片浄潔田地若上面纔安一物便湏有遮蔽了處聖人七通八達事事説到極致處學者湏是多讀書使互相發明事事窮到極致處所謂本諸身徵諸庶民考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑直到這箇田地方是語云執徳不𢎞易云寛以居之聖人多説箇廣大寛𢎞之意學者要湏體之讀書之法無他唯是篤志虚心反復詳玩為有功耳近見學者多是卒然穿鑿便為定論或即信所傳聞不復稽考所以日誦聖賢之書而不識聖賢之意其所誦説只是據自家見識杜撰成耳如此豈復能有長進前輩盖有親見有道而其所論終不免背馳處者想亦正坐此耳近日讀書人少也縁科舉時文之弊也纔把書来讀便先立箇意思要討新竒都不理㑹他本意著實纔討得新竒便準擬作時文使下梢㺯得熟只是這箇将来使雖是朝廷甚麽大典禮也胡亂信手捻合出来使不知一撞百碎某嘗謂為學老少不同年少精力有餘湏用無書不讀無不究竟其義若年齒向晩却湏擇要用功讀一書便覺後来難得工夫再去理㑹湏沉潜玩索究極至處可也葢天下義理只有一箇是與非而已是便是是非便是非既有著落雖不再讀自然道理浹洽省記不忘譬如飲食從容咀嚼其味必長大嚼大咽終不知味也精神長者博取之所得多精神短者但以詞義簡易者涵飬終年以後之人讀書不要多只少少玩索自見道理温公答一學者書説為學之法舉荀子四句云誦數以貫之思索以通之為其人以處之除其害以持養之荀子此説亦好誦數云者想是古人誦書亦記遍數貫字訓熟如習貫如自然又訓通誦得熟方能通曉若誦不熟亦無可得思索讀書不可不先立程限政如農功如農之有畔為學亦然今之始學者不知此理初時甚鋭漸漸懶去終至都不理㑹了此只是當初不立程限之故問嘗聞先生為學者言讀書湏有箇悦處方進又嘗自言某雖如此屢覺有所悦因請曰此先生進徳日新工夫不知學者如何到得悦處曰亦只是時習時習故悦讀書之道用力愈多收功愈逺先難而後獲先事而後得皆是此理讀書看義理湏是胷次放開磊落明快恁地去第一不可先責效纔責效便有憂愁底意只管如此胷中便結聚一餅子不散今且放置閑事不要閑思量只専心去玩味義理便㑹心精心精便㑹熟人言讀書當從容玩味此乃自怠之一説若是讀此書未曉道理雖不可急迫亦不放下猶可也若徜徉終日謂之從容却無做工夫處譬之煎藥湏是以大火煑滚然後以慢火飬之却不妨讀書不可有欲了底心纔有此心便心只在背後白紙處了無益讀書湏是看著他那縫罅處方尋得道理透徹若不見得縫罅無由入得看見縫罅時脈絡自開讀書閑暇且静坐敎他心平氣定見得道理漸次分曉這箇却是一身總㑹處且如看大學在明明徳一句湏常常提醒在這裏他日長進亦只在這裏人只是一箇心做本湏存得在這裏識得他條理脈絡自有貫通處讀書湏是有精力楊至之曰亦湏是聰明曰雖是聰明亦湏是静方運得精神昔見延平説羅先生觧春秋也淺不似胡文定後来随人入廣在羅浮山住三兩年去那裏心静湏看得較透某初疑觧春秋干心静甚事後来方曉盖静則心虚道理方看得出看書與日用工夫皆要放開心胷令其平易廣濶方可徐徐旋看道理浸灌培飬切忌合下便立已意把捉得太緊了即氣象急迫田地陿隘無處著工夫也凡讀書處事當煩亂疑惑之際正當虚心博采以求至當或未有得亦當且以闕疑闕殆之意處之若遽以已所粗通之一説而盡廢已所未究之衆論則非惟所處之得失或未可知而此心之量亦不宏矣讀書且當随文熟看俟其詞㫖曉析貫通然後自有發明未可遽捨本文别立議論徒長虚見無益於實也讀書先且虚心考其文詞指意所歸然後可以要其義理之所在近見學者多是先立已見不問經文向背之勢而横以義理加之其説雖不背理然非經文本意也如此則但據已見自為一書亦可何必讀古聖賢之書哉所以讀書政恐吾之所見未必是而求正於彼耳惟其闕文㫁簡名器物色有不可考者則無可奈何其他在義理中可推而得者切湏字字句句反復精詳不可草草説過也今人觀書先自立了意後方觀盡率古人語言入做自家意思中来如此只是推廣得自家意思如何見得古人意思湏是虚此心将右人語言放前面看他意思倒殺向何處去如此玩心方可得古人意有長進處且如孟子説詩要以意逆志是為得之逆者等待之謂也如前途等待一人未来時且湏耐心等待将来自有来時候他未来其心急切又要進前尋求却不是以意逆志是以意捉志也如此只是牽率古人言語入做自家意中来終無進益讀書理㑹道理只是将勤苦捱将去不觧得不成文王猶勤而况寡徳乎今世上有一般議論成就後生懶惰如云不敢輕議前輩不敢妄立論之類皆中怠惰者之意前輩固不敢妄議然論其行事之是非何害固不可鑿空立論然讀書有疑有所見自不容不立論其不立論者只是讀書不到疑處耳将諸家説相比並以求其是便自有合辨處學者觀書病在只要向前不肯退步看愈向前愈看得不分曉不若退步却看得審大槩病在執著不肯放下正如聴訟心先有主張乙底意思便只尋甲底不是先有主張甲底意思便只見乙底不是不若姑置甲乙之説徐徐觀之方能辨其曲直横渠云濯去舊見以来新意此説甚當若不濯去舊見何處得新意來今學者有二種病一是主私意一是舊有先入之説雖欲擺脱亦被他自来相尋讀書湏是知貫通處東邉西邉都觸著這闗捩子方得而今説已前不曽做得又怕遲晩又怕做不及又怕那箇難又怕性格遲鈍又怕記不起都是閑説只認下著頭去做莫問遲速少間自有至處既是已前不曽做得今便用工夫去補填莫要瞻前顧後思量東西少間檐閣一生不知年嵗之老如今看一件書湏是著力至誠去看一畨将聖賢説底一句一字都理㑹過直要見聖賢語脉所在這一句一字是如何道理及看聖賢因何如此説直是用力理㑹敎分曉然後将来玩味方盡見得意思出来若是泛濫看過今次又見是好明次又見是好終是無工夫不得力東坡敎人讀書小簡某取以示學者曰讀書要當如是東坡與王郎書云少年為學者每一書皆作數次讀之當如入海百貨皆有人之精力不能兼收盡取但得其所欲求者爾故願學者每次作一意求之如欲求古今興亡治亂聖賢作用且只作此意求之勿生餘念又别作一次求事迹文物之類亦如之他皆放此若學成八面受敵與涉獵者不可同日而語問伊川説讀書當觀聖人所以作經之意與聖人所以用心一條曰此條程先生説讀書最為親切今人不㑹讀書是如何只縁不曽求聖人之意纔拈得些小便把已意硬入放裏面胡説亂説故敎他就聖人意上求看如何講習孔孟書孔孟往矣口不能言湏以此心比孔孟之心将孔孟心作自已心要湏自家説時孔孟㸃頭道是方得不可謂孔孟不㑹説話一向任已見説将去今人所以讀書茍簡者縁書皆有印本多了如古人皆用竹簡除非大段有力底人方做得若一介之士如何置所以後漢呉恢欲殺青以寫漢書其子呉祐諌曰此書若成則載之兼兩昔馬援以薏苡興謗王陽以衣囊徼名正此謂也如黄覇在獄中從夏侯勝受書凡再踰冬而後傳盖古人無本除非首尾熟背得方得至於講誦者也是都背得然後從師受學如東坡作李氏山房藏書記那時書猶自難得眺以道嘗欲得公穀傳遍求無之後得一本方傳寫得今人連寫也自厭煩了所以讀書茍簡讀書便是做事凡做事有是有非有得有失善處事者不過稱量其輕重耳讀書而講究其義理判别其是非臨事即此理學得此事了不可自以為了恐怠意生如讀得此書湏終身記之讀書推類反求固不害為切已但却又添了一重事不若且依文看逐處各自見箇道理久之自然貫通不湏如此費力也性理大全書卷五十三

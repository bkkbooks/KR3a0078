body:
  text: 性理大全書卷五十三學十一讀書法一程子曰讀書將以窮理將以致用也今或滯心於章句之末則無所用也此學者之大患凡觀書不可以相類泥其義不爾則字字相梗當觀其文勢上下之意如充實之謂美與詩之美不同嘗觀讀書有令人喜時有令人手舞足蹈時或問莫是古人之意與先生之意相合後如此否曰是也論語孟子只剩讀著便自意足學者須是玩味若以語言解著意便不足問世有以讀書為文為藝者曰為文謂之藝猶之可也讀書謂之藝則求諸書者淺矣張子曰觀書必總其言而求作者之意讀書少則無由考校得義精蓋書以維持此心一時放下則一時德性有懈讀書則此心常在不讀書則終看義理不見書須成誦精思多在夜中或靜坐得之不記則思不起但通貫得大原後書亦易記所以觀書者釋已之疑明已之未達每見每加新益則學進矣於不疑處有疑方是進上蔡謝氏曰學者先學文鮮有能至道至如博觀泛覽亦自為害故明道先生教余嘗曰賢讀書慎不要尋行數墨龜山楊氏語羅仲素曰某嘗有數句教學者讀書之法云以身體之以心驗之從容默㑹於幽閒靜一之中超然自得於書言象意之表此蓋某所自為者如此和靖尹氏曰吕獻可嘗言讀書不須多讀得一字行取一字伊川亦嘗言讀得一尺不如行得一寸行得便是㑹讀書二公之意正同讀書須是看聖人用心處自家臨事時一一要使延平李氏曰讀書者知其所言莫非吾事而即吾身以求之則凡聖賢所至而吾所未至者皆可勉而進矣若直以文字求之說其詞義以資誦說其不為玩物喪志者幾希朱子曰讀書須是虛心切已虛心方能得聖賢意切已則聖賢之言不為虛說讀書須且虛心靜慮依傍文義推尋句脈看定此句指意是說何事略用今人言語襯貼替換一兩字說得古人意思出來先教自家心裏分明厯落如與古人對面說話彼此對答無一言一字不相肯可此外都無閒雜說話方是得箇入處讀書先要虛心平氣熟讀精思令一字一句皆有下落諸家注解一一通貫然後可以較其是非以求聖賢立言之本意雖已得之亦且更如此反復玩味令其義理浹洽於中淪肌浹髓然後乃可言學耳觀書但當虛心平氣以徐觀義理之所在如其可取雖世俗庸人之言有所不廢如有可疑雖或傳以為聖賢之言亦須更加審擇自然意味平和道理明白腳踏實地動有據依無籠罩自欺之患矣讀書須是優游玩味徐觀聖賢立言本意所向如何然後隨其逺近淺深輕重緩急而為之說如孟子所謂以意逆志者庶乎可以得之若便以吾先入之說橫於胸次而驅率聖賢之言以從已意設使義理可通已涉私意穿鑿而不免於郢書燕說之誚况又義理窒礙亦有所不可行者乎嘗見人云大凡不公底人讀書不得今看來是如此如解說聖經一向都不有自家身已全然虛心只把他道理自看其是非恁地看文字猶更自有牽於舊習失㸃檢處全然把一己私意去看聖賢之書如何看得出讀書有箇法只是刷刮净了那心後去看若不曉得又且放下待他意思好時又將來看而今却說要虛心心如何解虛得而今正要將心在那上面讀書須是要身心都入在這一段裏面更不問外面有何事方見得一段道理出如博學而篤志切問而近思如何却說箇仁在其中蓋自家能常常存得此心莫教走作則理自然在其中今人却一邉去看文字一邉去思量外事只是枉費了工夫不如放下了文字待打疊教意思靜了却去看觀書當平心以觀之不可穿鑿看從分明處不可尋從隱僻處去聖賢之言多是與人說話若是嶢﨑却教當時人如何曉聖賢立言本自平易而平易之中其㫖無窮今必推之使髙鑿之使深是未必真能髙深而固已離其本指喪其平易無窮之味矣問方讀書時覺得無靜底工夫須有讀書之時有靜虛之時曰某舊見李先生嘗教令靜坐後來看得不然只是一箇敬字好方無事時敬於自持及應事時敬於應事讀書時敬於讀書便自然該貫動靜心無時不存初學於敬不能無間斷只是才覺間斷便提起此心只是覺處便是接續某要得人只就讀書上體認義理日間常讀書則此心不走作或只去事物中衮則此心易得汩沒知得如此便就讀書上體認義理便可喚轉來本心陷溺之久義理浸灌未透且宜讀書窮理常不間斷則物欲之心自不能勝而本心之義理自安且固矣學者觀書多走作者亦恐是根本上工夫未齊整只是以紛擾雜亂心去看不曽以湛然凝定心去看不若先涵養本原且將已熟底義理玩味待其浹洽然後去看書便自知只是如此老蘇自述其學為文處有云取古人之文而讀之始覺其出言用意與已大異及其久也讀之益精胸中豁然以明若人之言固當然者此是他於學文上工夫有見處可取以喻今日讀書其工夫亦合如此又曰看得一兩段却且放心胸寬閒不可貪多放寬心以他說看他說以物觀物無以己觀物張子云書所以維持此心一時放下則一時德性有懈也是說得維持字好蓋不讀書則此心便無用處今但見得些子便更不肯去窮究那許多道理陷溺其心於清虛曠蕩之地却都不知豈可如此昔陳烈先生苦無記性一日讀孟子學問之道無他求其放心而已矣忽悟曰我心不曽收得如何記得書遂閉門靜坐不讀書百餘日以收放心却去讀書遂一覽無遺讀書固收心之一助然今只讀書時收得心而不讀書時便為事所奪則是心之存也常少而其放也常多矣且胡為而不移此讀書工夫向不讀書處用力使動靜兩得而此心無時不存乎學問就自家身己上切要處理㑹方是那讀書底已是第二義自家身上道理都具不曽外面添得來然聖人教人須要讀這書時蓋為自家雖有這道理須是經厯過方得聖人說底是他曽經厯過來讀書以觀聖賢之意因聖賢之意以觀自然之理人之為學固是欲得之於心體之於身但不讀書則不知心之所得者何事讀書窮理當體之於身凡平日所講貫窮究者不知逐日常見得在心目間否不然則隨文逐義趕趂期限不見恱處恐終無益讀書不可只専就紙上求義理須反來就自家身上推究秦漢以後無人說到此亦只是一向去書冊上求不就自家身上理㑹自家見未到聖人先說在那裏自家只借他言語來就身上推究始得如說仁義禮智曽認得自家如何是仁自家如何是義如何是禮如何是智須是著已體認方得如讀學而時習之自家曽如何學自家曽如何習不亦說乎曽見得如何是說須恁地認始得若只逐段解過去解得了便休也不濟事讀聖人書當反身而求亦須是講學不講學遇事便有嵲屼不自安處講學明則坦坦地行將去此道理無出聖人之言但當熟讀深思且如人看生文字與熟文字自是兩般既熟時他人說底便是我底讀其他書不如讀論語最要蓋其中無所不有若只躬行而不講學只是箇鶻突底好人問平日讀書時似亦有所見既釋書則别是一般又每苦思慮紛擾雖持敬亦未免弛慢不知病根安在曰此乃不求之於身而専求之於書固應如此古人曰為仁由己而由人乎哉凡吾身日用之間無非道書則所以接凑此心耳故必先求之於身而後求之於書則讀書方有味大凡讀書且要讀不可只管思口中讀則心中閒而義理自出某之始學亦如是爾更無别法或問讀書未知統要曰統要如何便㑹知得近來學者有一種則舍去冊子却欲於一言半句上便要見道理又有一種則一向泛濫不知歸著處此皆非知學者須要熟看熟思久久之間自然見箇道理四停八當而所謂統要者自在其中矣書只貴讀讀多自然曉今只思量得寫在紙上底也不濟事終非我有只貴乎讀這箇不知如何自然心與氣合舒暢發越自是記得牢縱饒熟看過心裏思量過也不如讀讀來讀去少間曉不得底自然曉得已曉得者越有滋味若是讀不熟都沒這般滋味而今未說讀得注且只熟讀正經行住坐臥心常在此自然曉得嘗思之讀便是學夫子說學而不思則罔思而不學則殆學便是讀讀了又思思了又讀自然有意若讀而不思又不知其意味思而不讀縱使曉得終是􅑶臲不安一似倩得人來守屋相似不是自家人終不屬自家使喚若讀得熟而又思得精自然心與理一永逺不忘某舊苦記文字不得後來只是讀今之記得者皆讀之功也老蘇只取孟子論語韓子與諸聖人之書安坐而讀之者七八年後來做出許多文字如此好他資質固不可及然亦須著如此讀只是他讀時便只要摸寫他言語做文章若移此心與這樣資質去講究義理那裏得來是知書只貴讀别無方法讀書須是成誦方精熟今所以記不得說不去心下若存若亡皆是不精不熟之患若曉得義理又皆記得固是好若曉文義不得只背得少間不知不覺自然相觸發曉得這義理蓋這一段文義橫在心下自是放不得必曉而後已若曉不得又記不得更不消讀書矣橫渠云讀書須是成誦今人所以不如古人處只爭這些子古人記得故曉得今人鹵莽記不得故曉不得緊要處慢處皆須成誦自然曉得也韓退之謂沉潜乎訓義反復乎句讀須有沉潜反復之功方得所謂審問之須是表裏內外無一毫之不盡方謂之審恁地竭盡心力猶有見未到處却不奈何如今人不曽竭盡心力只見得三兩分了便草草揭過少間只是鶻突無理㑹枉著日月依舊似不曾讀相似只如退之老蘇作文章本自沒要緊事然他大段用功少間方㑹漸漸掃去那許多鄙俗底言語換了箇心胸說這許多言語出來如今讀書須是加沉潜之功將義理去澆灌胸腹漸漸蕩滌去那許多淺近鄙陋之見方㑹見識髙明因說如今讀書多是不曾理㑹得一處通透了少間却多牽引前面疑難來說此最學者大病講論一篇書須是理㑹得透把這一篇書與自家衮作一片方是去了本子時許多節目次第都厯厯落落在心中皆說得去方好為學雖是立志然書亦不可不讀須將經傳本文熟復若専一靜坐如浮屠氏塊然獨處更無酬酢然後為得吾徒之學正不如此遇無事則靜坐有書則讀書以至接物處事常放此心光地便是存心豈可凡百放下秪是靜坐古人讀書與今人異如孔門學者於聖人才問仁問知終身事業已在此今人讀書仁義禮智總識而却無落泊處此不熟之故也昔五峯於京師問龜山讀書法龜山云先讀論語五峯問論語二十篇以何為緊要龜山曰事事緊要看此可見讀書工夫莫草略近日學者多緣草略過了故下梢頭儧無去處一齊棄了大凡看書粗則心粗看書細則心細若研窮不熟得些義理以為是亦得以為非亦得須是見得差之毫釐繆以千里方可聖人千言萬語只是說箇當然之理恐人不曉又筆之於書自書契以來二典三謨伊尹武王周公箕子孔孟都只是如此可謂盡矣只就文字間求之句句皆是做得一分便是一分工夫非茫然不可測也但患人不子細求索之耳須要思量聖人之言是說箇甚麼要將何用若只讀過便休又何必讀問讀書之法如今看來聖賢言行本無相違其間所以有可疑者只是不逐處研究得通透所以見得抵牾若真箇逐處逐節逐段見得精切少間却自到貫通地位曰固是如今若茍簡看過只一處便自未曽理㑹得了却要别生疑義徒勞無益讀書須是子細逐句逐字要見去著若用工粗鹵不務精思只道無可疑處非無可疑理㑹未到不知有疑爾觀書須靜著心寬著意思沉潜反覆將久自㑹曉得去聖賢之言須常將來眼頭過口頭轉心頭運讀書之法先要熟讀須是正看背看左看右看看得是了未可便說道是更須反覆玩味讀書當擇先儒舊說之當於理者反覆玩味朝夕涵泳便與本經正言之要通貫浹洽於胸中然後有益不必段段立說徒為觀美而實未必深有得於心也講學正要反復研窮方見義理歸宿處不可只略說過便休也讀書玩味其意理㑹未得處且記著時時拈起看久之須有得力處為學讀書須是耐煩細意去理㑹切不可粗心若曰何必讀書自有箇捷徑法便是誤人底深坑也未見道理時恰如數重物色包裹在裏許無緣可以便見得須是今日去了一重又見得一重明日又去了一重又見得一重去盡皮方見肉去盡肉方見骨去盡骨方見髓使粗心大氣不得聖人言語一重又一重須入深去看若只要皮膚便有差錯須深沉方有得讀書理㑹一件了又一件不止是讀書如遇一件事且就這事上思量合當如何做處得來當方理㑹别一件書不可只就皮膚上看事亦不可只就皮膚上理㑹天下無書不是合讀底無事不是合做底若一箇書不讀這裏便闕此一書之理一件事不做這裏便闕此一事之理大而天地隂陽細而昆蟲草木皆當理㑹一物不理㑹這裏便闕此一物之理讀書是格物一事今且須逐段子細玩味反來覆去逐旋捱得多後却見頭頭道理都到這工夫須用行思坐想或將已曉得者再三思省却自有一箇曉悟處出不容安排書之句法義理雖只是如此解說但一次看有一次見識所以某書一畨看有一畨改亦有已說定一畨看一畨見得穩當愈加分曉或問先生謂講論固不可無須是自去體認如何是體認曰體認是把那聽得底自去心裏重復思繹過伊川曰時復思繹浹洽於中則說矣某向來從師曰間所聞說話夜間如溫習一般一一子細思量過才有疑明日又問學者當以聖賢之言反求諸身一一體察須是曉然無疑積日既久當自有見但恐用意不精或貪多務廣或得少為足則無由明耳讀書須要切已體驗不可只作文字看又不可助長學者讀書須要斂身正坐緩視微吟虛心涵泳切已省察讀一句書須體察這一句我將來甚處用得觀書以已體驗固為親切然亦須遍觀衆理而合其歸趣乃佳若只據已見却恐於事理有所不周欲徑急而反疏緩也讀書須是以自家之心體驗聖人之心少間體驗得熟自家之心便是聖人之心某自二十時看道理便要看那裏面嘗看上蔡語録其初將紅筆抹出後又用青筆抹出又要黃筆抹出三四畨後又用黑筆抹出是要尋那精底看道理須是漸漸向裏尋到那精英處方是山谷與李幾仲帖云大率學者喜博而常病不精泛濫百書不若精於一也有餘力然後及諸書則涉獵諸篇亦得其精蓋以我觀書則處處得益以書博我則釋卷而茫然某深喜之以為有補於學者學者只知觀書都不知有四邉方始有味嘗看橫渠成誦之說最為捷徑蓋未論看得義理如何且是收得此心有歸著處不至走作然亦須是専一精研使一書通透爛熟都無記不起處方可别換一書乃為有益若但輪流通念而核之不精則亦未免枉費工夫也須是都通透後又却如此溫習乃為佳耳讀書須讀到不忍舍處方是見得真味若讀之數過略曉其義即厭之欲别求書看則是於此一卷書猶未得趣也蓋人心之靈天理所在用之則愈眀只提醒精神終日著意看得多少文字窮得多少義理徒為懶倦則精神自是憒憒只恁昏塞不通可惜舊見李先生說理㑹文字須令一件融釋了後方更理㑹一件融釋二字下得極好此亦伊川所謂今日格一件明日又格一件格得多後自脫然有貫通處此亦是他真曾經厯來便說得如此分明今若一件未能融釋而又欲理㑹一件則第二件又不了推之萬事事事不了何益讀書之法須是從頭至尾逐句玩味看上字時如不知有下字看上句時如不知有後句看得都通透了又却從頭看此一段令其首尾通貫然方其看此段時亦不知有後段也如此漸進庶幾心與理㑹自然浹洽非惟㑹得聖賢言語意脈不差且是自已分上身心義理日見純熟若只如此匆匆檢閲一過便可隨意穿鑿排布硬說則不唯錯㑹了經意於已分上亦有何干涉讀書之法當循序而有常致一而不懈從容乎句讀文義之間而體驗乎操存踐履之實然後心靜理明漸見意味不然則雖廣求博取日誦五車亦奚益於學哉故程子曰善學者求言必自近易於近者非知言者也此言殊有味夫學非讀書之謂然不讀書又無以知為學之方故讀之者貴専而不貴博蓋唯専為能知其意而得其用徒博則反苦於雜亂淺略而無所得必也致精一書優柔厭飫以求聖學工夫次第之實俟其心通意解書冊之外别有實下工夫處然後更易而少進焉則得尺得寸雖少而皆為吾有矣學者且將一件書讀聖人之言即聖人之心聖人之心即天下之理且逐段看令分曉一段分曉又看一段如此至一二十段亦未解便見箇道理但如此心平氣定不東馳西騖則道理自逐段分明去得自家心上一病便是一箇道理明也道理固是自家本有但如今隔一隔了須逐旋揩磨呼喚得歸然無一喚便見之理如金溪只要自得若自得底是固善若自得底非却如何不若且虛心讀書切不可自謂理㑹得了便理㑹得且只做理㑹不得方有長進學者理㑹文義只是要先理㑹難底遂至於易者亦不能曉學記曰善問者如攻堅木先其易者後其節目所謂攻瑕則堅者瑕攻堅則瑕者堅不知道理好處又却多在平易處觀書須從頭循序而進不以淺深難易有所取舍自然意味詳密至於浹洽貫通則無緊要處所下工夫亦不落空矣今人多是揀難底好底看非惟聖賢之言不可如此間别且是只此心意便不定疊縱然用心探索得到亦與自家這裏不相干突兀聱牙無田地可安頓此病不可不知也讀書且就那一段本文意上看不必又生枝節看一段須反復看來看去要十分爛熟方見意味方快活令人都不愛去看别段始得人多是向前䟎去不曾向後反復只要去看明日未讀底不曽去紬繹前日已讀底須玩味反復始得用力深便見意味長意味長便受用牢固亦不可信口依希略綽說過便是心曉讀書不可貪多常使自家力量有餘萬正淳云欲將諸書循環看曰不可如此須看得一書徹了方再看一書若雜然並進却反為所困如射弓有五斗力且用四斗弓便可拽滿已力欺得他過今學者不忖自已力量去觀書恐自家照管他不過讀書只恁逐段子細看積纍去則一生讀多少書若務貪多則反不曾讀得須是緊著工夫不可悠悠又不須忙只常抖擻得此心醒則看愈有力讀書小作課程大施功力如㑹讀得二百字只讀得一百字却於百字中猛施工夫理㑹子細讀誦教熟如此不㑹記性人自記得無識性人亦理㑹得若泛泛然念多只是皆無益耳書宜少看要極熟小兒讀書記得大人多記不得者只為小兒心専一日授一百字則只是一百字二百字則只是二百字大人一日或看百板不恁精専人多看一分之十今宜看十分之一寬著期限緊著課程今人讀書看未到這裏心已在後面才看到這裏便欲舍去了如此只是不求自家曉解須是徘徊顧戀如不欲去方㑹認得讀書須是遍布周滿某嘗以為寧詳毋略寧下毋髙寧拙毋巧寧近毋逺書雖是古人書今日讀之所以蓄自家之德却不是欲這邉讀得些子便搬出做那邉用讀書將以求道不然讀作何用今人不去這上理㑹道理皆以涉獵該博為能所以有道學俗學之别學者讀書須是於無味處當致思焉至於羣疑並興寢食俱廢乃能驟進因歎驟進二字最下得好須是如此若進得些子或進或退若存若亡不濟事如用兵相殺爭得些兒小可一二十里地也不濟事須大殺一畨方是善勝為學之要亦是如此讀書須見得有曉不得處方是長進又更就此闕其所疑而反復其餘則庶幾得聖人之意識事理之真而其不可曉者不足為病矣某向時與朋友說讀書也教他去思索求所疑近方見得讀書只是且恁地虛心就上面熟讀久之自有所得亦自有疑處蓋熟讀後自有窒礙不通處是自然有疑方好較量今若先去尋箇疑便不得這般也有時候舊日看論語合下便有疑蓋自有一樣事被諸先生說成數樣所以便著疑今却有集注了且可傍本看教心熟少間或有說不通處自見得疑只是今未可先去疑著又曰讀書無疑者須教有疑有疑者却要無疑到這裏方是長進讀書若有所見未必便是不可便執著且放在一邉益更讀書以來新見若執著一見則此心便被此見遮蔽了譬如一片淨潔田地若上面才安一物便須有遮蔽了處聖人七通八達事事說到極致處學者須是多讀書使互相發明事事窮到極致處所謂本諸身徵諸庶民考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑直到這箇田地方是語云執德不𢎞易云寬以居之聖人多說箇廣大寬𢎞之意學者要須體之讀書之法無他唯是篤志虛心反復詳玩為有功耳近見學者多是卒然穿鑿便為定論或即信所傳聞不復稽考所以日誦聖賢之書而不識聖賢之意其所誦說只是據自家見識杜撰成耳如此豈復能有長進前輩蓋有親見有道而其所論終不免背馳處者想亦正坐此耳近日讀書人少也緣科舉時文之弊也才把書來讀便先立箇意思要討新竒都不理㑹他本意著實才討得新竒便準擬作時文使下梢㺯得熟只是這箇將來使雖是朝廷甚麼大典禮也胡亂信手捻合出來使不知一撞百碎某嘗謂為學老少不同年少精力有餘須用無書不讀無不究竟其義若年齒向晚却須擇要用功讀一書便覺後來難得工夫再去理㑹須沉潜玩索究極至處可也蓋天下義理只有一箇是與非而已是便是是非便是非既有著落雖不再讀自然道理浹洽省記不忘譬如飲食從容咀嚼其味必長大嚼大咽終不知味也精神長者博取之所得多精神短者但以詞義簡易者涵飬終年以後之人讀書不要多只少少玩索自見道理溫公答一學者書說為學之法舉荀子四句云誦數以貫之思索以通之為其人以處之除其害以持養之荀子此說亦好誦數云者想是古人誦書亦記遍數貫字訓熟如習貫如自然又訓通誦得熟方能通曉若誦不熟亦無可得思索讀書不可不先立程限政如農功如農之有畔為學亦然今之始學者不知此理初時甚鋭漸漸懶去終至都不理㑹了此只是當初不立程限之故問嘗聞先生為學者言讀書須有箇悅處方進又嘗自言某雖如此屢覺有所悅因請曰此先生進德日新工夫不知學者如何到得悅處曰亦只是時習時習故悅讀書之道用力愈多收功愈逺先難而後獲先事而後得皆是此理讀書看義理須是胸次放開磊落明快恁地去第一不可先責效才責效便有憂愁底意只管如此胸中便結聚一餅子不散今且放置間事不要間思量只専心去玩味義理便㑹心精心精便㑹熟人言讀書當從容玩味此乃自怠之一說若是讀此書未曉道理雖不可急迫亦不放下猶可也若徜徉終日謂之從容却無做工夫處譬之煎藥須是以大火煮滚然後以慢火飬之却不妨讀書不可有欲了底心才有此心便心只在背後白紙處了無益讀書須是看著他那縫罅處方尋得道理透徹若不見得縫罅無由入得看見縫罅時脈絡自開讀書間暇且靜坐教他心平氣定見得道理漸次分曉這箇却是一身總㑹處且如看大學在明明德一句須常常提醒在這裏他日長進亦只在這裏人只是一箇心做本須存得在這裏識得他條理脈絡自有貫通處讀書須是有精力楊至之曰亦須是聰明曰雖是聰明亦須是靜方運得精神昔見延平說羅先生解春秋也淺不似胡文定後來隨人入廣在羅浮山住三兩年去那裏心靜須看得較透某初疑解春秋干心靜甚事後來方曉蓋靜則心虛道理方看得出看書與日用工夫皆要放開心胸令其平易廣濶方可徐徐旋看道理浸灌培飬切忌合下便立已意把捉得太緊了即氣象急迫田地狹隘無處著工夫也凡讀書處事當煩亂疑惑之際正當虛心博采以求至當或未有得亦當且以闕疑闕殆之意處之若遽以已所粗通之一說而盡廢已所未究之衆論則非惟所處之得失或未可知而此心之量亦不宏矣讀書且當隨文熟看俟其詞㫖曉析貫通然後自有發明未可遽捨本文别立議論徒長虛見無益於實也讀書先且虛心考其文詞指意所歸然後可以要其義理之所在近見學者多是先立已見不問經文向背之勢而橫以義理加之其說雖不背理然非經文本意也如此則但據已見自為一書亦可何必讀古聖賢之書哉所以讀書政恐吾之所見未必是而求正於彼耳惟其闕文斷簡名器物色有不可考者則無可奈何其他在義理中可推而得者切須字字句句反復精詳不可草草說過也今人觀書先自立了意後方觀盡率古人語言入做自家意思中來如此只是推廣得自家意思如何見得古人意思須是虛此心將右人語言放前面看他意思倒殺向何處去如此玩心方可得古人意有長進處且如孟子說詩要以意逆志是為得之逆者等待之謂也如前途等待一人未來時且須耐心等待將來自有來時候他未來其心急切又要進前尋求却不是以意逆志是以意捉志也如此只是牽率古人言語入做自家意中來終無進益讀書理㑹道理只是將勤苦捱將去不解得不成文王猶勤而况寡德乎今世上有一般議論成就後生懶惰如云不敢輕議前輩不敢妄立論之類皆中怠惰者之意前輩固不敢妄議然論其行事之是非何害固不可鑿空立論然讀書有疑有所見自不容不立論其不立論者只是讀書不到疑處耳將諸家說相比並以求其是便自有合辨處學者觀書病在只要向前不肯退步看愈向前愈看得不分曉不若退步却看得審大槩病在執著不肯放下正如聽訟心先有主張乙底意思便只尋甲底不是先有主張甲底意思便只見乙底不是不若姑置甲乙之說徐徐觀之方能辨其曲直橫渠云濯去舊見以來新意此說甚當若不濯去舊見何處得新意來今學者有二種病一是主私意一是舊有先入之說雖欲擺脫亦被他自來相尋讀書須是知貫通處東邉西邉都觸著這關捩子方得而今說已前不曽做得又怕遲晚又怕做不及又怕那箇難又怕性格遲鈍又怕記不起都是間說只認下著頭去做莫問遲速少間自有至處既是已前不曽做得今便用工夫去補填莫要瞻前顧後思量東西少間檐閣一生不知年嵗之老如今看一件書須是著力至誠去看一畨將聖賢說底一句一字都理㑹過直要見聖賢語脉所在這一句一字是如何道理及看聖賢因何如此說直是用力理㑹教分曉然後將來玩味方盡見得意思出來若是泛濫看過今次又見是好明次又見是好終是無工夫不得力東坡教人讀書小簡某取以示學者曰讀書要當如是東坡與王郎書云少年為學者每一書皆作數次讀之當如入海百貨皆有人之精力不能兼收盡取但得其所欲求者爾故願學者每次作一意求之如欲求古今興亡治亂聖賢作用且只作此意求之勿生餘念又别作一次求事迹文物之類亦如之他皆放此若學成八面受敵與涉獵者不可同日而語問伊川說讀書當觀聖人所以作經之意與聖人所以用心一條曰此條程先生說讀書最為親切今人不㑹讀書是如何只緣不曽求聖人之意才拈得些小便把已意硬入放裏面胡說亂說故教他就聖人意上求看如何講習孔孟書孔孟往矣口不能言須以此心比孔孟之心將孔孟心作自已心要須自家說時孔孟㸃頭道是方得不可謂孔孟不㑹說話一向任已見說將去今人所以讀書茍簡者緣書皆有印本多了如古人皆用竹簡除非大段有力底人方做得若一介之士如何置所以後漢吳恢欲殺青以寫漢書其子吳祐諌曰此書若成則載之兼兩昔馬援以薏苡興謗王陽以衣囊徼名正此謂也如黃霸在獄中從夏侯勝受書凡再踰冬而後傳蓋古人無本除非首尾熟背得方得至於講誦者也是都背得然後從師受學如東坡作李氏山房藏書記那時書猶自難得眺以道嘗欲得公穀傳遍求無之後得一本方傳寫得今人連寫也自厭煩了所以讀書茍簡讀書便是做事凡做事有是有非有得有失善處事者不過稱量其輕重耳讀書而講究其義理判别其是非臨事即此理學得此事了不可自以為了恐怠意生如讀得此書須終身記之讀書推類反求固不害為切已但却又添了一重事不若且依文看逐處各自見箇道理久之自然貫通不須如此費力也性理大全書卷五十三

body:
  text: 性理大全書卷四十一諸儒三朱子名熹字仲晦號晦庵屏山劉氏作元晦字詞曰木晦於根春容曄敷人晦於身神明內腴昔者曽子稱其友曰有若無實若虛不斥厥名而傳于書雖百世之逺揣其氣象知顔如愚自諸子言志回欲無伐一宣於言終身弗越陋巷暗然其光烈烈從事於兹惟參也無慚貫道雖一省身則三夾輔孔門翺翔兩驂學的欲正吾知斯之為指南惟先吏部文儒之粹彪炳育珍又華其繼來兹講磨融融喜熹真聰廓開如源之方駛望洋渺瀰老我縮氣古人不云乎純亦不已子德不日新則時豫之耻勿謂此耳充之益充借曰合矣宜養於䝉言而思毖動而思躓凛乎惴惴惟顔曽是畏其後以元為四德之首不敢當遂更曰仲延平李氏與其友羅博文書曰元晦進學甚力樂善畏義吾黨鮮有晚得此人商量所疑甚慰又云此人極頴悟力行可畏講學極造其微處論辨某因此追求有所省渠所論難處皆是操戈入室須從原頭體認來所以好說話某昔於羅先生得入處後無朋友幾放倒了得渠如此極有益渠初從謙開善處下工夫來故皆就裏面體認今既論難見儒者路脉極能指其差誤之處自見羅先生來未見有如此者又云此子别無他事一味潛心於此初講學時頗為道理所縳今漸能融釋於日用處一意下工夫若於此漸熟則體用合矣此道理全在日用處熟若靜處有而動處無即非矣朱子自題畫像曰從容乎禮法之場沈潛乎仁義之府是豫蓋將有意焉而力莫能與也佩先師之格言奉前烈之遺矩惟暗然而日修或庶幾乎斯語勉齊黃氏曰先生自少厲志聖賢之學自韋齊得中原文獻之𫝊聞河洛之學推明聖賢遺意日誦大學中庸以用力於致知誠意之地先生早嵗已知其說而心好之韋齊病且亟屬曰籍溪胡原仲白水劉致中屏山劉彥冲三人吾友也學有淵源吾所敬畏吾即死汝往事之而惟其言之聽則吾死不恨矣先生既孤則奉以告三君子而禀學焉時年十有四慨然有求道之志博求之經𫝊遍交當世有識之士雖釋老之學亦必究其歸趣訂其是非延平於韋齊為同門友先生歸自同安不逺數百里徒步往從之延平稱之曰樂善好義鮮與倫比又曰頴悟絶人力行可畏其所論難體認切至自是從遊纍年精思實體而學之所造者益深矣其為學也窮理以致其知反躬以踐其實居敬者所以成始成終也謂致知不以敬則昏惑紛擾無以察義理之歸躬行不以敬則怠惰放肆無以致義理之實持敬之方莫先主一既為之針以自警又筆之書以為小學大學皆本於此終日儼然端坐一室討論典則未嘗少輟自吾一心一身以至萬事萬物莫不有理存此心於齊莊靜一之中窮此理於學問思辨之際皆有以見其所當然而不容己與其所以然而不可易然充其知而見於行者未嘗不反之於身也不暏不聞之前所以戒懼者愈嚴愈敬隱微幽獨之際所以省察者愈精愈密思慮未萌而知覺不昧事物既接而品節不差無所容乎人欲之私而有以全乎天理之正不安於偏見不急於小成而道之正統在是矣其為道也有太極而隂陽分有隂陽而五行具禀隂陽之氣以生則太極之理各具於其中天所賦為命人所受為性感於物為情統性情為心根於性則為仁義禮智之德發於情則為惻隱羞惡辭讓是非之端形於身則為手足耳目口鼻之用見於事則為君臣父子夫婦兄弟朋友之常求諸人則人之理不異於己參諸物則物之理不異於人貫徹古今充塞宇宙無一息之間斷無一毫之空闕莫不析之極其精而不亂然後合之盡其大而無餘先生之於道可謂建諸天地而不悖質諸聖賢而無疑矣故其得於己而為德也以一心而窮造化之原盡性情之妙逹聖賢之藴以一身而體天地之運備事物之理任綱常之責明足以察其微剛足以任其重𢎞足以致其廣毅足以極其常其存之也虛而靜其發之也果而確其用之也應事接物而不窮其守之也厯變履險而不易本末精粗不見其或遺表裏初終不見其或異至其養深積厚矜持者純熟嚴厲者和平心不待操而存義不待索而精猶以為義理無窮嵗月有限常慊然有不足之意蓋有日新又新不能自已者而非後學之所可擬議也其可見之行則修諸身者其色莊其言厲其行舒而恭其坐端而直其間居也未明而起深衣幅巾方履拜於家廟以及先聖退坐書室几案必正書籍器用必整其飲食也羮食行列有定位匕箸舉措有定所倦而休也暝目端坐休而起也整步徐行中夜而寢既寢而寤則擁衾而坐或至逹旦威儀容止之則自少至老祁寒盛暑造次顛沛未嘗有須㬰之離也行於家者奉親極其孝撫下極其慈閨庭之間內外斬斬恩義之篤怡怡如也其祭祀也事無巨細必誠必敬小不如儀則終日不樂已祭無違禮則油然而喜死喪之際哀戚備至飲食衰絰各稱其情賔客往來無不延遇稱家有無常盡其歡於親故雖疏逺必致其愛於鄉閭雖微賤必致其恭吉凶慶弔禮無所遺賙恤問遺恩無所闕其自奉則衣取蔽體食取充腹居止取足以障風雨人不能堪而處之裕如也若其措諸事業則州縣之施設立朝之言論經綸規畫正大宏偉亦可槩見雖逹而行道不能施之一時然退而明道足以傳之萬代謂聖賢道統之傳散在方冊聖賢之㫖不明則道統之傳始晦於是竭其精力以研窮聖賢之經訓於大學中庸則補其闕遺别其次第綱領條目粲然復明於語孟則深原當時答問之意使讀而味之者如親見聖賢而面命之於易與詩則求其本義攻其末失深得古人遺意於數千載之上凡數經者見諸傳注其關於天命之微人心之奧入德之門造道之閾者既以極深研幾探賾索隱發其㫖趣而無所遺矣至於一字未安一詞未備亦必沈潛反復或逹旦不寐或纍日不倦必求至當而後已故章㫖字義至微至細莫不理明辭順易知易行於書則疑今文之艱澀反不若古文之平易於春秋則疑聖心之正大決不類傳注之穿鑿於禮則病王安石廢罷儀禮而傳記獨存於樂則憫後世律尺既亡而清濁無據是數經者亦嘗討論本末雖未能著為成書然其大㫖固已獨得之矣若厯代史記則又考論西周以來至於五代取司馬公編年之書緝以春秋紀事之法綱舉而不繁目張而不紊國家之理亂君臣之得失如指諸掌周程張邵之書所以繼孔孟道統之傳厯時未久微言大義鬱而不章先生為之裒集發明而後得以盛行於世太極先天圖精微廣博不可涯涘為之解剝條畫而後天地本原聖賢藴奧不至於泯沒程張門人祖述其學所得有淺深所見有疏密先生既為之區别以悉取其所長至或識見小偏流於異端者亦必研窮剖析而不沒其所短南軒張公東萊吕公同出其時先生以其志同道合樂與之友至或識見少異亦必講磨辨難以一其歸至若求道而過者病𫝊注誦習之煩以為不立文字可以識心見性不修修為可以造道入德守虛靈之識而昧天理之真借儒者之言以文佛老之說學者利其簡便詆訾聖賢捐棄經典猖狂呌呶側僻固陋自以為悟立論愈下者則又崇奬漢唐比附三代以便其計功謀利之私二說並立髙者陷於空無下者溺於卑陋其害豈淺淺哉先生力排之俾不至亂吾道以惑天下於是學者靡然向之教人以大學語孟中庸為入道之序而後及諸經以為不先乎大學則無以提綱挈領而盡語孟之精微不參之論孟則無以融㑹貫通而極中庸之㫖趣然不㑹其極於中庸則又何以建立大本經綸大經而讀天下之書論天下之事哉其於讀書也必使之辨其音釋正其章句玩其辭求其義研精覃思以究其所難平心易氣以聽其所自得然為已務實辨别義利毋自欺謹其獨之戒未嘗不三致意焉蓋亦欲學者窮理反身而持之以敬也從遊之士迭誦所習以質其疑意有未喻則委曲告之而未嘗倦問有未切則反覆戒之而未嘗隱務學篤則喜見於言進道難則憂形于色講論經典商略古今率至夜半雖疾病支離至諸生問辨則脫然沈痾之去體一日不講學則惕然常以為憂摳衣而來逺自川蜀文詞之傳流及海外至於夷鹵亦知慕其道竊問其起居窮鄉晚出家蓄其書私淑諸人者不可勝數先生既沒學者傳其書信其道者益衆亦足以見理義之感於人者深矣繼往聖將微之緒啓前賢未發之機辨諸儒之得失闢異端之訛繆明天理正人心事業之大又孰有加於此者至若天文地志律厯兵機亦皆洞究淵微文詞字畫騷人才士疲精竭神常病其難至先生未嘗用意而亦皆動中規繩可為世法是非姿禀之異學行之篤安能事事物物各當其理而造其極哉學修而道立德成而行尊見之事業者又如此秦漢以來迂儒曲學既皆不足以望其藩墻而近代諸儒有志乎孔孟周程之學者亦豈能以造其閫域哉嗚呼是殆天所以相斯文焉篤生哲人以大斯道之傳也道之正統待人而後傳自周以來任傳道之責得統之正者不過數人而能使斯道章章較著者一二人而止耳由孔子而後曽子子思繼其微至孟子而始著由孟子而後周程張子繼其絶至先生而始著蓋千有餘年之間孔孟之徒所以推明是道者既已煨燼殘闕離析穿鑿蠧壞之後扶持植立厥功偉然未及百年蹐駮尤甚先生出而自周以來聖賢相傳之道一旦豁然如大明中天昭晰呈露先生平居惓惓無一念不在於國聞時政之闕失則戚然有不豫之色語及國勢之未振則感慨以至泣下然謹難進之禮則一官之拜必抗章而力辭厲易退之節則一語不合必奉身而亟去其事君也不貶道以求售其愛民也不徇俗以茍安故其與世動輒齟齬自筮仕以至屬纊五十年間厯仕四朝仕於外者僅九考立於朝者四十日道之難行也如此然紹道統立人極為萬世宗師則不以用舍為加損也果齊李氏曰先生之道之至原其所以臻斯閾者無他焉亦由主敬以立其本窮理以致其知反躬以踐其實而敬者又貫通乎三者之間所以成始而成終也故其主敬也一其內以制乎外齊其外以養其內內則無二無適寂然不動以為酬酢萬變之主外則儼然肅然終日若對神明而有以保其其中心之所存及其久也靜虛動直中一外融而人不見其持守之力則篤敬之驗也其窮理也虛其心平其氣字求其訓句索其㫖未得乎前則不敢求乎後未通乎此則不敢志乎彼使之意定理明而無躁易淩躐之患心専慮一而無貪多欲速之蔽始以熟讀使其言皆若出於吾之口繼以精思使其意皆若出於吾之心自表而究裏自流而遡源索其精微若别黑白辨其節目若數一二而又反復以㴠泳之切己以體察之必若先儒所謂沛然若河海之浸膏澤之潤渙然冰釋怡然順順而後為有得焉若乃立論以驅率聖言鑿說以妄求新意或援引以相紏紛或假借以相混惑粗心浮氣意象匆匆常若有所迫逐而未嘗徘徊顧戀如不忍去以待其浹洽貫通之功深以為學者之大病不痛絶乎此則終無入德之期蓋自孔孟以降千五百年之間讀書者衆矣未有窮理若此其精者也先生天姿英邁視世之所屑者不啻如草芥翛然獨與道俱卓然獨與道立固已逈出庶物之表及夫理明義精養深積盛充而為德行發而為事業人之視之但見其渾灝磅礴不可涯涘而莫知為之者又曰先生入以事君則必思堯舜其君出以治民則必欲堯舜其民言論風㫖之所傳政教條令之所布固皆可為世法而其考諸先聖而不繆建諸天地而不悖百世以俟聖人而不惑者則以訂正羣書立為凖則使學者有所據依循守以入於堯舜之道此其勳烈之尤彰明盛大者語孟二書世所誦習為之說者亦多而析理未精釋言未備大學中庸至程子始表章之然大學次序不倫闕遺未補中庸雖為完篇而章句渾淪讀者亦莫知其條理之粲然也先生搜輯先儒之說而斷以己意彚别區分文從字順妙得聖人之本㫖昭示斯道之標的又使學者先讀大學以立其規模次及語孟以盡其藴奧而後㑹其歸於中庸尺度權衡之既定由是以窮諸經訂羣史以及百氏之書則將無理之不可精無事之不可處矣又嘗集小學使學者得以先正其操履集近思録使學者得以先識其門庭羽翼四子以相左右蓋此六書者學者之飲食裘葛凖繩規矩不可以須臾離也聖人復起不易斯言矣其於易也推卦畫之本體辨三聖之㫖歸専主筮占而實該萬變以還潔靜精微之舊其於詩也深玩辭氣而得詩人之本意盡削小序以破後儒之臆說妄言美刺悉就芟夷以復溫柔敦厚之教其於禮也則以儀禮為經而取禮記及諸經史書所載有及於禮者皆以附於本經之下具列注疏諸儒之說補其闕遺而析其疑晦雖不克就而宏綱大要固已舉矣謂書之出於口授者多艱澀得於壁藏者反平易學者當沉潛反復於其易而不必穿鑿附㑹於其難謂春秋正義明道尊王賤霸尊君抑臣內夏外夷乃其大義而以爵氏名字日月土地為褒貶之例若法家之深刻乃傳者之鑿說謂周官遍布周密周公運用天理熟爛之書學者既通四子又讀一經而遂學焉則所以治國平天下者思過半矣謂通鑑編年之體近古因就繩以䇿牘之法以綱提其要以目紀其詳綱倣春秋而兼採羣史之長目倣左氏而稽合諸儒之粹褒貶大義凛乎烈日秋霜而繁簡相發又足為史家之矩範謂諸子百家其言多詭於聖人獨韓子論性専指五常最為得之因為之考訂其集之同異以𫝊于世而屈原忠憤千古莫白亦頗為發明其㫖樂律久亡清濁無據亦嘗討論本末探測幽眇雖未及著為成書而其大㫖固已獨得之矣若夫析世學之繆辨異教之非搗其巢穴砭其隱微使學者由於大中至正之則而不躓於荆棘擭穽之塗摧陷肅清之功固非近世諸儒所能髣佛其萬一也自夫子設教洙泗以慱文約禮授學者顔曽思孟相與守之未嘗失墜其後正學失傳士各以意為學其騖於該洽者既以聞見積纍自矜而流於泛濫駁雜之歸其溺於徑約也又謂不立文字可以識心見性而陷於曠蕩空虛之域學者則知所傳矣亦或恱於持敬之約而憚於觀理之煩先生身任道統而廣覽載籍先秦古書既加考索厯代史記國朝典章以及古今儒生學士之作靡不遍觀取其所同而削其不合稽其實用而翦其煩蕪參伍辨證以扶經訓而詰其舛差秋毫不得遁焉數千年間世道學術議論文詞之變皆若身親厯於其間而耳接目覩焉者大本大根固已上逹直遂柯葉散殊亦皆隨其所至究其所窮條分𣲖别經緯萬端本末巨細包羅囊括無所遺漏故所釋諸書悉有依據不為臆度料想之說外至文章字畫亦皆髙絶一世蓋其包㴠停蓄溥博淵泉故其出之者自若是其無窮也學者據經辨疑隨問隨析固皆極其精要暇而辨難古今其應如響愈扣愈深亹亹不絶及詳味而細察之則方融貫於一理而已矣嘗有言曰學者望道未見固必即書以窮理茍有見焉亦當考諸書有所證驗而後實有所禆助而後安不然則德孤而與枯槁寂滅者無以異矣潛心大業何有哉矧自周衰教失禮樂養德之具一切盡廢所以維持此心者惟有書耳謂可躪躒經傳遽指為糟粕而不觀乎要在以心體之以身踐之而勿以空言視之而已矣以是存心以是克己仁豈逺乎哉至於晚歲德尊言立猶以義理無窮嵗月有限慊然有不足之意洙泗以還博文約禮兩極其至者先生一人而已先生教人規模廣大而科級甚嚴循循有序不容躐等淩節而進至於切已務實辨别義利毋自欺謹其獨之戒未嘗不丁寧懇到提耳而極言之每誦南軒張公無所為而然之語必三歎焉晚見諸生繳繞於文義之間深慮斯道之無傳始頗指示本體使深思而自得之其望於學者益切矣嗚呼道之在天下未嘗亡也而統之相傳茍非其人則不得而與自孟子沒千有餘年而後周程張子出焉厯時未久浸失其真及先生出而後合濓溪之正傳紹鄒魯之墜緒前聖後賢之道該遍全備其亦可謂盛矣蓋昔者易更三古而混於八索詩書煩亂禮樂散亡而莫克正也夫子從而贊之定之刪之正之又作春秋六經始備以為萬世道德之宗主秦火之餘六經既已爛脫諸儒各以己見妄穿鑿為說未嘗有知道者也周程張子其道明矣然於經言未暇釐正一時從遊之士或昧其㫖遁而入於異端者有矣先生於是考訂訛繆探索深微總裁大典勒成一家之言仰包粹古之載籍下採近世之文獻集其大成以定萬世之法然後斯道大明如日中天有目者皆可睹也夫子之經得先生而正夫子之道得先生而明起斯文於將墜覺來裔於無窮雖與天壤俱敝可也吳氏壽昌曰先生每觀一水一石一草一木稍清隂處竟日目不瞬飲酒不過兩三行又移一處大醉則跌坐髙拱經史子集之餘雖記録雜說舉輒成誦微醺則吟哦古文氣調清壯某所聞見則先生每愛誦屈原楚騷孔明出師表淵明歸去來詞并杜子美數詩而已北溪陳氏曰先生道巍而德尊義精而仁熟立言平正溫潤清巧的實徹人心洞天理逹羣哲㑹百聖粹乎洙泗伊洛之緒凡曩時有發端而未竟者今悉該且備凡曩時有疑辨而未瑩者今益信且白宏綱大義如指諸掌掃千百年之繆誤為後學一定不易之凖則辭約而理盡㫖明而味深而其心度澄朗瑩無查滓工夫縝密渾無隙漏尤可想見於辭氣間故孔孟周程之道至先生而益明所謂主盟斯世獨惟先生一人而已鶴山魏氏曰天生斯民必有出乎其類者為之君師以任先覺之責然而非一人所能自為也必並生錯出交修五發然後道章而化成是故有堯舜則有禹臯陶有湯文則有伊尹萊朱太公望散宜生各當其世觀其㑹通以盡其所當為之分然後天衷以位人極以立萬世之標凖以定雖氣數詘信之不齊而天之愛人閲千古如一日也自比閭節授之法壞射飲讀法之禮無所於行君師之道移於孔子則又有冉閔顔曽羣弟子左右羽異之微言大義天開日揭萬物咸覩自孔子沒則諸子已有不能盡得其傳者於是子思孟子又為之闡幽明微著嫌辨似而後孔氏之道厯萬世而亡弊嗚呼是不曰天之所命而誰為之秦漢以來諸儒生於籍去書焚師異指殊之後不惟孔道晦蝕孟氏之說亦鮮知之千數百年間何可謂無人則往往孤立寡儔倡焉莫之和也絶焉莫之續也乃至國朝之盛南自湖湘北至河洛西極關輔地之相去何翅千餘里而大儒輩出聲應氣求若合符節曰極曰誠曰仁曰道曰中曰恕曰性命曰氣質曰天理人欲曰隂陽鬼神若此等類凡皆聖門講學之樞要而千數百年習浮踵漏莫知其說者至是脫然如沈痾之間大寐之醒至于吕謝游楊尹張侯胡諸儒切磋究之分别白之亦幾無餘藴矣然而絶之久而復之難傳者寡而咻者衆也朱文公先生始以彊志博見淩髙厲空自受學延平李先生退然如將弗勝於是斂華就實反博歸約逮其蓄久而思渾資深而行熟則貫精粗合外內羣獻之精藴百家之異指毫分縷析如示諸掌張宣公吕成公同心協力以間先聖之道而僅及中身論述靡竟惟先生巍然獨存中更學禁自信益篤蓋自易詩中庸大學論語孟子悉為之推明演繹以至三禮孝經下逮屈韓之文周程邵張之書司馬氏之史先正之言行亦各為之論著然後帝王經世之規聖賢新民之學粲然中興學者習其讀推其義則知三才一本道器一致幽探乎無極大極之妙而實不離乎匹夫匹婦之所知大至於位天地育萬物而實不外乎暗室屋漏之無愧蓋至近而逺至顯而微非若棄倫絶學者之慕乎髙而譁世取寵者之安於卑也徛其盛歟嗚呼帝王不作而洙泗之教興微孟子吾不知大道之與異端果孰為勝負也聖賢既熄而關洛之學興微朱子亦未知聖傳之與俗學果孰為顯晦也韓子謂孟子之功不在禹下豫謂朱子之功不在孟子下張栻字敬夫號南軒朱子曰南軒張公生有異質頴悟夙成忠獻愛之自其幼學而所以教者莫非忠孝仁義之實既長命往從胡仁仲之門問程氏學先生一見知其大器即以所聞孔門論仁親切之指告之公退而思若有得也以書質焉而先生報之曰聖門有人吾道幸矣公以是益自奮勵直以古之聖賢自期作希顔録一篇蚤夜觀省以自警䇿所造既深逺矣猶未敢自以為足則又取友四方益務求其所未至蓋玩索講評踐行體驗反覆不置者十有餘年然後昔之所造愈深逺而反以得乎簡易平實之地其於天下之理蓋皆瞭然心目之間而實有以見其不能已者是以決之勇行之力而守之固其所以篤於君親一於道義而沒世不忘者初非有所勉慕而强為之也公為人坦蕩明白表裏洞然詣理既精信道又篤其樂於聞過而勇於徙義則又奮厲明決無毫髮滯吝意故其德日新業日廣而所以見於論說行事之間者上下信之至於如此雖小人以其好惡之私或能壅塞於一時然至於公論之久長蓋亦莫得而掩之也公之教人必使之先有以察乎義利之間而後明理居敬以造其極其剖析開明傾倒切至必竭兩端而後已平生所著書唯論語說最後出而洙泗言仁諸葛忠武侯傳為成書其他如書詩孟子太極圖說經世編年之屬則猶欲稍更定焉而未及也然其提綱挈領所以開悟後學使不迷於所鄉其功則已多矣蓋其常言有曰學莫先於義理之辨而義也者本心之所當為而不能自已非有所為而為之者也一有所為而為之則皆人欲之私而非天理之所存矣嗚呼至哉言也其亦可謂擴前聖所未發而同於性善養氣之功者歟又曰靖康之變國家之禍極矣小大之臣奮不顧身以任其責者蓋無幾人而其承家之孝許國之忠判決之明計慮之審又未有如公者雖降命不長不克卒就其業然其志義偉然死而後已則質諸鬼神而不可誣也某嘗竊病聖門之學不傳而道術遂為天下裂士之醇慤者拘於記誦其敏秀者衒於詞章既皆不足以發明天理而見諸人事於是言理者歸於老佛而論事者騖於管商則於理事之正反皆有以病焉而去道益逺矣中間河洛之間先生君子得其不傳之緒而推明之然今不能百年而學者又失其指近歲乃幸得吾友敬夫焉而天下之士乃有以知理之未始不該於事而事之未始不根於理也孟子沒而義利之說不明於天下董相仲舒諸葛武侯兩程先生屢發明之而世之學者莫之能信是以其所以自為者鮮不溺於人欲之私而其所以謀人之國家則亦曰功利焉而已爾自魏國張忠獻公唱明大義以斷國論南陽胡文定公誦說遺經以開聖學其託於空言見諸行事雖若不同而於孟子之言董葛程氏之意則皆有所謂千載而一轍者張公敬夫則又忠獻公之嗣子而胡公季子五峯先生之門人也自其幼壯不出家庭而固已得夫忠孝之傳既又講於五峯之門以㑹其歸則其所以默契於心者人有所不得而知也獨其見於論說則義利之間豪釐之辨蓋有出於前哲之所欲言而未及究者措諸事業則凡宏綱大用巨細顯微莫不洞然於胸次而無一毫功利之雜是以論道於家而四方學者爭卿往之入侍經帷出臨藩屏則天子亦味其言嘉其績且將倚以大用而敬夫不幸死矣敬夫最不可得聽人說話便肯改敬夫見識純粹踐行純實使人望而敬之敬夫學問愈髙所見卓然議論出人意表近讀其語說不覺胸中灑然誠可歎服敬夫見處卓然不可及從游之久反復開益為多但其天姿明敏從初不厯階級而得之故今日語人亦多失之太高南軒見處高如架屋相似大間架已就只中間少裝折問先生舊與南軒反復論仁後來畢竟合否曰亦有一二處未合敬夫說本出胡氏胡氏之說惟敬夫獨得之其餘門人皆不曉但云當守師之說向來往長沙正與敬夫辨此敬夫髙明他將謂人都似他才一說時便更不問人曉㑹與否且要說盡他箇故他門人敏底秪學得他說話若資質不逮依舊無著摸某則性鈍讀書極是辛苦故尋常與人言多不敢為髙逺之論蓋為是身曽親經厯過故不敢以是責人爾學記曰進而不顧其安使人不由其誠今教者之病多是如此學者於理有未至處切不可輕易與之說而敬夫為人明快每與學者說話一切傾倒說出此非不可但學者見未到這裏見他如此說便不復致思亦甚害事某則不然非是不與他說蓋不欲與學者語未至之理耳敬夫見識極髙却不耐事吕伯恭學耐事却有病南軒伯恭之學皆疏略南軒疏略從髙處去伯恭疏略從卑處去伯恭說道理與作為自是兩件事如云仁義道德與度數刑政介然為兩塗不可相通他在時不曽見與某說他死後諸門人弟子此等議論方漸漸說出來乃云皆原於伯恭也贊先生像曰擴仁義之端至於可以彌六合謹義利之判至於可以析秋毫拳拳乎其致主之功汲汲乎其幹父之勞仡仡乎其任道之勇卓卓乎其立心之髙知之者識其春風沂水之樂不知者以為湖海一世之豪彼其揚休山立之姿既與其不可傳者死矣觀於此者尚有以卜其見伊吕而失蕭曹也耶

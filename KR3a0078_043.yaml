body:
  text: 性理大全書卷四十三學一小學程子曰古人雖胎教與保傅之教猶勝今日庠序鄉黨之教古人自幼學耳目遊處所見皆善至長而不見異物故易以成就今日自少所見皆不善才能言便習穢惡日日銷鑠更有甚天理古之人自能食能言而教之是故大學之法以豫為先蓋人之幼也智愚未有所主則當以格言至論日陳於前盈耳充腹久自安習若固有之者日復一日雖有讒説搖惑不能入也若為之不豫及乎稍長意慮偏好生於內衆口辨言鑠於外欲其純全不可得已人多以子弟輕俊為可喜而不知其可憂也有輕俊之質者必教以通經學使近本而不以文辭之末習則所以矯其偏質而復其德性也勿謂小兒無記性所厯事皆能不忘故善養子者當其嬰孩鞠之使得所養全其和氣乃至長而性美教之示以好惡有常至如養犬者不欲其升堂則時其升堂而撲之若既撲其升堂又復食之於堂則使孰從雖日撻而求其不升不可得也養異類且爾况人乎故養正者聖人也朱子曰古者初年入小學只是教之以事如禮樂射御書數及孝弟忠信之事自十六七入大學然後教之以理如致知格物及所以為忠信孝弟者古人自入小學時已自知許多事了至入大學時只要做此工夫今人全未曽知此古人只去心上理會至去治天下皆自心中流出今人只去事上理會古人小學養得小兒子誠敬善端發見了然而大學等事小兒子不會推將去所以又入大學教之古人便都從小學中學了所以大來都不費力如禮樂射御書數大綱都學了及至長大也更不大假學便只理會窮理致知工夫而今自小失了要補填實是難但須莊敬誠實立其基本逐事逐物理會道理待此通透意誠心正了就切身處理會旋旋去理會禮樂射御書數今則無所用乎御如禮樂射書數也是合當理會底皆是切用但不先就切身處理會得道理便教考究得些禮文制度又干自家身己甚事古人小學教之以事便自養得他心不知不覺自好了到得漸長漸更厯通達事物將無所不能今人既無本領只去理會許多間汩董百方措置思索反以害心問大學與小學不是截然為二小學是學其事大學是窮其理以盡其事否曰只是一箇事小學是學事親學事長且直理會那事大學是就上面委曲詳究那理其所以事親是如何所以事長是如何古人於小學存養已熟根基已深厚到大學只就上面點化出些精彩古人自能食能言便已教了一嵗有一嵗工夫到二十時聖人資質已自有二三分大學只出治光彩又曰如今全失了小學工夫今只教人且把敬為主收斂身心却可可下工夫或云敬當不得小學某看來小學却未當得敬敬已是包得小學敬是徹上徹下工夫雖做得聖人田地也只放下這敬不得如堯舜也終始是一箇敬如説欽明文思頌堯之德四箇字獨將這箇敬做劈初頭如説恭已正南面而已如説篤恭而天下平皆是陸子壽言古者教小弟子自能言能食即有教以至灑掃應對之類皆有所習故長大則易語今人自小即教做對稍大即教作虛誕之文皆壞其性質天命非所以教小兒教小兒只説箇義理大槩只眼前事或以灑掃應對之類作假子亦可每嘗疑曲禮衣毋撥足毋蹶將上堂聲必揚將入户視必下等叶韻處皆是古人初教小兒語列女傳孟母又添兩句曰將入門問誰存教小兒讀詩不可破章又曰授書莫限長短但文理斷處便住若文勢未斷者雖多授數行亦不妨蓋兒時讀書終身改口不得嘗見人教兒讀書限長短後來長大後都念不轉如訓詁則當依古注問向謂小兒子讀書未須把近代解説底音訓教之却不知解時如何若依古注恐他不甚曉曰解時却須正説始得若大假小底又却只是粗義自與古注不相背了嘗訓其子曰起居坐立務要端莊不可傾倚恐至昏怠出入步趨務要凝重不可票輕以害德性以謙遜自牧以和敬待人凡事切須謹飭無故不須出入少説間話恐廢光隂勿觀雜書恐分精力早晚頻自點檢所習之業每旬休日將一旬內書溫習數過勿令心少有放逸則自然漸近道理講習易明矣問女子亦當有教自孝經之外如論語只取其面前明白者教之如何曰亦可如曺大家女戒溫公家範亦好問小學載樂一假不知今人能用得否曰姑使知之古人自小即以樂教之乃是人執手提誨到得大來涵養已成稍能自立便可今人既無此非志大有所立因何得成立因論小學曰古者教必以樂後世不復然問此是作樂使之聽或其自作曰自作若自理會不得自作何益古者國君備樂士無故不去琴瑟日用之物無時不列於前弟子職所受是極云受業去後須窮究道理到盡處也毋驕恃力如恃氣力欲胡亂打人之類蓋自小便教之以德教之以尚德不尚力之事後生初學且看小學之書那是做人底樣子小學多説那恭敬處少説那防禁處又曰前賢之言須是真箇躬行佩服方始有功不可只如此説過不濟事問小學父慈而教子孝而針曰人既自有箇良知良能了聖賢又恁地説直要人尋教親切父慈而教子孝而針看我是能恁地不恁地小學所説教人逐一去上面尋許多道理到著大學亦只是這道理又教人看得親切實如此不是胡亂恁地説去問某今看大學如小學中有未曉處亦要理會曰相兼看亦不妨學者於文為度數不可存終理會不得之心須立箇大規模都要理會得至於其明其暗則係乎人之才如何耳東萊吕氏曰教小兒當以正不可便使之情竇日開問教小兒以何為先曰先教以恭謹不輕忽不躐等讀書乃餘事今之有資質者父兄便教以科舉之文不容不躐等皆因父兄無識見至有以得一第便為成材者後生學問且須理會曲禮少儀儀禮等學灑掃應對進退之事及先理會爾雅訓詁等文字然後可以語上下學而上達自此脫然有得自然度越諸子也不如此則是躐等犯分凌莭終不能成孰先傳焉孰後倦焉不可不察也西山真氏曰小學之書先載胎教之法而後以內則之文繼之列女傳曰古者婦人妊子寢不側坐不邊立不蹕不食邪味割不正不食席不正不坐目不視惡色耳不聽淫聲夜則令瞽頌詩道正事如此則生子形容端正才過人矣此言妊子之時必慎所感感於善則善感於惡則惡也合列女傳與內則二篇觀之則小學之教略備矣魯齋許氏曰小學內明父子之親言凡為人子為人婦幼男與未嫁女子皆當盡愛盡敬不敢自專事親之道也凡人幼小時不引得正後便難了如字畫端楷之類是也臨川吳氏曰古之教者子能食而教之食子能言而教之言欲其有别也而教之以異處欲其有讓也而教之以後長因其良知良能而導之而未及乎讀誦也教之數教之方教之日與夫學書計學幼儀則既辨名物矣而亦非事夫讀誦也弟子之職曰孝曰弟曰謹曰信曰愛曰親行之有餘力而後學文今世童子甫能言不過教以讀誦而已其視古人之教何如也然古人豈廢讀誦哉戴氏記拾曲禮遺經句三言或四言管氏書載弟子職一篇句四言或五言六言皆韻語句短而音諧蓋取其讀誦之易而便於童習也古書闕而教法泯俗間教子率以周興嗣千文李瀚蒙求開其先讀誦雖易而竟何所用士大夫之家頗欲知其無用而舍旃童習之初遽授小學孝經等書字語短長參差不齊往往不能以句教者強揠而學者苦其難又胡能使之樂學哉程子嘗欲作詩略言教童子灑掃應對事長之節而不果作陳氏五言禮詩近之而有未備君子病焉總論為學之方程子曰學也者使人求於內也不求於內而求於外非聖人之學也何謂求於外以文為主者是也學也者使人求於本也不求於本而求於末非聖人之學也何謂求於末考詳略採同異者是也是二者無益於德君子弗之學也名數之學君子學之而不以為本也言語有序君子知之而不以為始也義之精者須是自求得之如此則善求義也學莫貴於自得得非外也故曰自得學而不自得則至老而益衰自得者所守不變自信者所守不疑解義理若一向靠書册何由得居之安資之深不惟自失兼亦誤人古之學者優柔厭飫有先後次序今之學者却只做一場話説務髙而已常愛杜元凱語若江海之浸膏澤之潤渙然冰釋怡然理順然後為得也今之學者往往以遊夏為小不足學然遊夏一言一事却總是實知之必好之好之必求之求之必得之古人此箇學是終身事果能顛沛造次必於是豈有不得道理問何如學可謂之有得曰大凡學問聞之知之皆為有得得者須默識心通學者欲有所得須是要誠意燭理上知則頴悟自别其次須以義理涵養而得之凡志於求道者可謂誠心矣欲速助長而不中理反不誠矣故求道而有迫切之心雖得之必失之觀天地之化一息不留疑於速也然寒暑之變極微曷嘗遽哉學者須要知言凡人才學便須知著力處既學便須知得力處多聞識者猶廣儲藥物也知所用為貴進學莫大於致知養心莫大於理義古人所養處多若聲音以養其耳舞蹈以養其血脈今人都無只有箇義理之養人又不知求耻不知而不問終於不知而已以為不知而必求之終能知之矣學而未有所知者譬猶人之方醉也亦何所不至及其既醒必愓然而耻矣醒而不以為耻末如之何也學者必知所以入德不知所以入德未見其能進也故孟子曰不明乎善不誠其身易曰知至至之學者自治極於剛則守道愈固勇於進則遷善愈速今之學者如登山麓方其迤邐莫不濶步及到峻處便逡巡一云或以峻而遂止或以難而稍緩茍能遇難而益堅聞過則改何逺弗至也人少長須激昻自進中年已後自至成德者事方可自安君子之學必日新日新者日進也不日新者必日退未有不進而不退者唯聖人之道無所進退以其所造者極也君子莫進於學莫止於畫莫病於自足莫罪於自棄進而不止湯武所以反之而聖學者所見所期不可不逺且大然行之亦須量力有漸志大心勞力小任重恐終敗事學貴乎成既成矣將以行之也學而不能成其業用而不能行其學則非學矣百工治器必貴於有用器而不可用工不為也學而無所用學將何為也力學而得之必擴充而行之不然者局局其守耳學者有所聞而不著於心不見乎行則其所聞故自他人之言耳於已何與焉學莫大於平心平莫大於正正莫大於誠問有因苦學失心者何也曰未之聞也善學者之於其心治其亂收其放明其蔽安其危曽謂為心害乎古之人十五而學四十而仕其未仕也優遊養德無求進之心故其所學必至於有成後世之人自其為兒童從父兄之所教與其壯長追逐時習之所尚莫不汲汲於勢利也善心何以不喪哉學而為名內不足也根本須是先培壅然後可以趨向也趨向既正一作立所造有淺深則由勉與不勉也守之必嚴執之必定少怠而縱之則存者亡矣君子之學要其所歸而已矣有志於道而學不加進者是無勇也博奕小技也不專心致志猶不可得况學聖人之道悠悠焉何能自得也孔子曰吾嘗終日不食終夜不寢以思無益不如學也又曰朝聞道夕死可矣夫聖人何所為而迫切至於如是其極哉善學者當求其所以然之故不當誦其文過目而已也學如不及猶恐失之茍曰姑俟來日斯自棄也無好學之志則雖聖人復出亦無益矣不知性善不可以言學知性之善而以忠信為本是曰先立乎其大者也問人有日記萬言或妙絶技藝者是可學乎曰不可才可勉而少進鈍者不可使利也惟積學明理既久而氣質變焉則暗者必明弱者必立矣質之美者一明即盡濁滓渾化斯與天地同體矣莊敬持養抑其次也及其至則一也氣質沉靜於受學為易意必固我既亡之後必有事焉此學者所宜盡心也夜氣之所存者良知也良能也茍擴而充之化旦晝之所害為夜氣之所存然後可以至於聖人學禮義考制度必求聖人之意得其意則可以沿革矣人之於學避其所難而姑為其易者斯自棄也已夫學者必志於大道以聖人自期而猶有不至者焉人皆可以為聖人而君子之學必至於聖人而後已不至於聖人而已者皆自棄也孝其所當孝悌其所當悌自是而推之是亦聖人而已矣學者不學聖人則已欲學之須是熟玩聖人氣象不可止於名上理會如是只是講論文字今之學者有三弊溺於文辭牽於詁訓惑於異端茍無是三者則必求歸於聖人之道矣人之學當以大人為標凖然上面更有化爾人當學顔子之學一作事君子之學貴乎一一則明明則有功學要在敬也誠也中間便一作更有箇仁博學而篤志切問而近思仁在其中矣之意敬主事不思故有惑不求故無得不問故莫知學不貴博貴於正而已正則博言不貴文貴於當而已當則文能盡飲食言語之道則可以盡去就之道能盡去就之道則可以盡死生之道飲食言語去就死生小大之勢一也故君子之學自微而顯自小而章問立德進德先後曰此有二有立而後進有進而至於立立而後進則是卓然定後有所進立則是三十而立進則是吾見其進也有進而至於立則進而至於立道處也此進是可與適道者也立是可與立者也張子曰在始學者得一義須固執從粗入精也如孝事親忠事君一種是義然其中有多少義理也聞見之善者謂之學則可謂之道則不可須是自求己能尋見義理則自有旨趣自得之則居之安矣學者只是於義理中求譬如農夫是穮是蓘雖有飢饉必有豐年蓋求之則須有所得發源端本處既不誤則義可以自求人欲得正已而物正大抵道義雖不可緩又不欲急迫在人固須求之有漸於已亦然蓋精思潔慮以求大功則其心隘惟是得心宏放得如天地易簡易簡然後能應物皆平正玩心未熟可求之平易勿迂也若始求太深恐自茲愈逺為學所急在於正心求益若求之不已無有不獲惟勉勉不忘為要耳人若志趣不逺心不在焉雖學無成人惰於進道無自得達自非成德君子必勉勉至從心所欲不踰矩方可放下德薄者終學不成也學之不勤者正猶七年之病不蓄三年之艾今之於學加之數年自是享之無窮人多是耻於問人假使今人問於人明日勝於人有何不可如是則孔子問於老聃萇宏郯子賔牟賈有甚不得聚天下衆人之善者是聖人也豈有得其一端而便勝於聖人也義理有疑一作礙則濯去舊見以來一作求新意心中茍有所開即便劄記不思則還塞之矣更須得朋友之助一日間朋友論著則一日間意思差别須日日如此講論久則自覺進也慕學之始猶聞都會紛華盛麗未見其美而知其有美不疑步步進則漸到畫則自棄也觀書解大義非聞也必以了悟為聞人之好強者以其所知少也所知多則不自強滿學然後知不足有若無實若虛此顔子之所以進也變化氣質孟子曰居移氣養移體况居天下之廣居者乎居仁由義自然心和而體正更要約時但拂去舊日所為使動作皆中禮則氣質自然全好禮曰心廣體胖心既宏廣則自然舒泰而樂也若心但能宏廣不謹敬則不立若但能謹敬而心不宏廣則入於隘須寬而敬大抵有諸中者必形諸外故君子心和則氣和心正則氣正其始也固亦須矜持古之為冠者以重其首為履者以重其足至於盤盂几杖為銘皆所以慎戒之人之氣質美惡與貴賤夭壽之理皆是所受定分如氣質惡者學即能移今人所以多為氣所使而不得為賢者蓋為不知學為學大益在自能變化氣質不爾卒無所發明不得見聖人之奧故學者先須變化氣質變化氣質與虛心相表裏大中天地之道也得大中隂陽鬼神莫不盡之矣天資美不足為功惟矯惡為善矯惰為勤方是為功人必不能便無是心須是思慮但使常遊心於義理之間立本處以易簡為是接物處以時中為是易簡而天下之理得時中則要博學素備有志於學者都更不論氣之美惡只看志如何匹夫不可奪志也惟患學者不能堅勇多求新意以開昏蒙吾學不振非強有力者不能自奮惟信篤持謹何患不至書多閲而好忘者只為理未精耳理精則須記了無去處也仲尼一以貫之蓋只著一義理都貫却學者但養心識明靜自然可見下學而上達者兩得之人謀又得天道又盡任私意以求是未必是虛心以求是方為是夫道仁與不仁是與不是而已既學而先有以功業為意者於學便相害既有意必穿鑿創意作起事也德未成而先以功業為事是代大匠斫希不傷手也學者大不宜志小氣輕志小則易足易足則無由進氣輕則虛而為盈約而為泰亡而為有以未知為已知未學為已學人之有耻於就問便謂我勝於人只是病在不知求是為心故學者當毋我明善為本固執之乃立擴充之則大昜視之則小在人能宏之而已富貴之得不得天也至於道德則在已求之而無不得者也上蔡謝氏曰學須是熟講學不講用盡工夫只是舊時人學之不講是吾憂也仁亦在夫熟而已今之學須是如飢之須食寒之須衣始得若只欲彼善於此則不得人須先立志立志則有根本譬如樹木須先有箇根本然後能培養成合抱之木若無根本又培養箇甚顔子工夫真百世之範舍此應無入路無住宅龜山楊氏曰今之學者只為不知為學之方又不知學成要何用此事體大須是曽著力來方知不昜夫學者學聖賢之所為也欲為聖賢之所為須是聞聖賢所得之道若只要博通古今為文章作忠信願慤不為非義之士而已則古來如此等人不少然以為聞道則不可且如東漢之衰處士逸人與夫名節之士有聞當世者多矣觀其作處責之以古聖賢之道則略無毫髮髣佛相似何也以彼于道初無所聞故也今時學者平居則曰吾當為古人之所為才有一事到手便措置不得蓋其所學以博通古今為文章或志於忠信願慤不為非義而已而不知須是聞道故應如此由是觀之學而不聞道猶不學也為己之學正猶飢渴之於飲食非有悅乎外也以為弗飲弗食則飢渴之病必至於致死人而不學則失其本心不足以為人其病蓋無異於飢渴者此固學之不可已也然古之善學者必先知所止知所止然後可以漸進倀倀然莫知所之而欲望聖賢之域多見其難矣此理宜切求之不可忽也六經之義驗之於心而然施之於行事而順然後為得驗之於心而不然施之於行事而不順則非所謂經義今之治經者為無用之文徼幸科第而已果何益哉學者必以孔孟為師學而不求諸孔孟之言亦末矣昜曰君子多識前言往行以蓄其德孟子博學而詳説之將以反説約也世之學者欲以雕繪組織為工誇多鬭靡以資見聞而已故托其華不茹其實未嘗蓄德而反約也彼亦焉用學為哉自孟子殁聖學失傳荀卿而下皆未得其門而入者也七篇之書具在終始考之不過道性善而已知此則天下之理得而諸子之失其傳皆可見也夫學道者捨先聖之書何求哉譬之適九達之衢未知所之六經能指其攸趣而已因其所指而之焉則庶乎其有至也徒弊精神於章句之間則末矣古之學者以聖人為師其學有不至故其德有差焉人見聖人之難為也故凡學者以聖人為可至則必以為狂而竊笑之夫聖人固未昜至若舍聖人而學是將何所取則乎以聖人為師猶學射而立的然的立於彼然後射者可視之而求中若其中不中則在人而已不立之的何以為凖顔淵請問其目學也請事斯語則習矣學而不習徒學也譬之學射而志於彀則知所學矣若夫承梃而目不瞬貫虱而懸不絶由是而求盡其妙非習不能也習而察故説久而性成之則説不足道也學者當有所疑乃能進德然亦須著力深方有疑今之士讀書為學蓋自以為無可疑者故其學莫能相尚如孔子門人所疑皆後世所謂不必疑者也子貢問政子曰足食足兵民信之矣子貢疑所可去答之以去兵於食與信猶有疑焉故能發孔子民無信不立之説若今之人問政答之足食與兵何疑之有樊遲問仁子曰愛人問知子曰知人是蓋甚明白而遲猶曰未達故孔子以舉直錯諸枉能使枉者直教之由是而行之於知之道不其庶矣乎然而退而見子夏猶再問舉直錯諸枉之義於是又得舜舉臯陶湯舉伊尹之事為證故仁知兼盡其説如使今之學者方得其初問之答便不復疑矣蓋嘗謂古人以為疑者今人不知疑也學何以進和靖尹氏曰凡問問切忌間斷便不是學一日暴之十日寒之奚可哉學問不可有私心私心人欲也人欲去天理還問如何仕而優則學曰學豈有休時書曰念終始典於學荀子曰學至死乃已是也涑水司馬氏曰學者所以求治心也學雖多而心不治安以學為問蘧伯玉五十而知四十九年非信乎曰何啻其然也古之君子好學者有垂死而知其未死之前所為非者况五十乎夫道如山也愈升而愈髙如路也愈行而愈逺學者亦盡其力而止耳自非聖人有能窮其髙逺者哉五峰胡氏曰學欲博不欲雜守欲約不欲陋雜似博陋似約學者不可不察也學貴大成不貴小用大成者參於天地之謂也小用者謀利計功之謂也人之生也良知良能根於天拘於已汩於事誘於物故無所不用學也學必習習則熟熟則久久則天天則神天則不慮而行神則不期而應以反求諸己為要法以言人不善為至戒靜觀萬物之理得吾心之悅也昜動處萬物之分得吾心之樂也難是故知仁合一然後君子之學成有之在已知之在人有之而人不知從而與人較者非能有者也學道者正如學射才持弓矢必先知的然後可以積習而求中的矣若射者不求知的不求中的則何用持弓矢以射為列聖諸經千言萬語必有大體必有要妙人自少而有志尚恐奪於世念日月蹉跎終身不見也若志不在於的茍欲玩其辭而已是謂口耳之學曽何足云夫滯情於章句之末固逺勝於博奕戲豫者矣特以一斑自喜何其小也何不志於大體以求要妙譬如遊山必上東岱至於絶頂坐使天下髙峰逺岫卷阿大澤悉來獻狀豈不偉歟修身以寡欲為要行已以恭儉為先自天子至於庶人一也延平李氏曰講學切在深潛縝密然後氣味深長蹊徑不差若槩以理一而不察乎其分之殊此學者所以流於疑似亂真之説而不自知也學問之道不在多言但默坐澄心體認天理若真有所見雖一毫私欲之發亦退聽矣久久用力於此庶幾漸明講學始有力耳學者之病在於未有灑然冰釋凍解處縱有持守不過茍免顯然尤悔而已若此者恐未足道也孔門諸子羣居終日交相切磨又得夫子為之依歸日用之間觀感而化者多矣恐於融釋而脫落處非言説所及也不然子貢何以言夫子之言性與天道不可得而聞也耶大率有疑處須靜坐體究人倫必明天理必察於日用處著力可見端緒在勉之爾朱子曰聖門日用工夫甚覺淺近然推之理無有不包無有不貫及其充廣可與天地同其廣大故為聖為賢位天地育萬物只此一理而已常人之學多是偏於一理主於一説故不見四旁以起爭辨聖人則中正和平無所偏倚聖賢所説工夫都只一般只是一箇擇善固執論語則説學而時習之孟子則説明善誠身只是隨他地頭所説不同下得字來各自精細其實工夫只是一般須是盡知其所以不同方知其所謂同也學者工夫但患不得其要若是尋究得這箇道理自然頭頭有箇著落貫通浹洽各有條理如或不然則處處窒礙學者常談多説持守未得其要不知持守甚底説擴充説體驗説涵養皆是揀好底言語做箇説話必有實得力處方可所謂要於本領上理會者蓋緣如此為學須先立得箇大腔當了却旋去裏面修治壁落教綿密今人多是未曽知得箇大規模先去修治得一間半房所以不濟事識得道理源頭便是地盤如人要起屋須是先築教基址堅牢上面方可架屋若自無好址基空自今日買得多少木去起屋少間只起在别人地上自家身已自沒頓放處學問須是大進一畨方始有益若能於一處大處攻得破見那許多零碎只是這一箇道理方是快活然零碎底非是不當理會但大處攻不破縱零碎理會得些少終不快活曽點膝雕開已見大意只緣他大處看得分曉今且道他那大底是甚物事天下只有一箇道理學只要理會得這一箇道理這裏才通則凡天理人欲義利公私善惡之辨莫不皆通或問氣質之偏如何救得曰才説偏了又著一箇物事去救他偏越見不平正了越討頭不見要緊只是看教大底道理分明偏處自見得如暗室求物把火來便照得若止管去摸索費盡心力只是摸索不見若見得大底道理分明有病痛處也自會變移不自知不消得費力成已方能成物成物在成已之中須是如此推出方能合義理聖賢千言萬語教人且從近處做去如灑掃大廳大廊亦只是如灑掃小室模樣掃得小處淨潔大處亦然若有大處開拓不去即是於小處便不曽盡心學者貪髙慕逺不肯從近處做去如何理會得大頭項底而今也有不曽從裏做得底外面也做得好此只是才髙以智力勝將去中庸説細處只是謹獨謹言謹行大處是武王周公達孝經綸天下無不載小者便是大者之驗須是要謹行謹言從細處做起方能充得如此太又曰如今為學甚難緣小學無人習得如今却是從頭起古人於小學小事中便皆存箇大學大事底道理在大學只是推將開闊去向來小時做底道理存其中正似一箇坯素相似學者做工夫莫説道是要待一箇頓假大項目工夫後方做得即今逐些零碎積纍將去才等得大項目後方做即今便蹉過了學者只今便要做去斷以不疑鬼神避之需者事之賊也如今學問未識箇入路就他自做倒不覺惟既識得箇入頭却事事須著理會且道世上多多少少事既識得路頭許多事都自是合著如此不如此不得自是天理合下當然若不見得入頭處緊也不可慢也不得若識得些路頭須是莫斷了若斷了便不成待得再新整頓起來費多少力如雞抱卵看來抱得有甚暖氣只被他常常恁地抱得成若把湯去湯便死了若抱才住便冷了然而實是見得入頭處也自不解住了自要做去他自得些滋味了如喫果子相似未識滋味時喫也得不消喫也得到識滋味了要住自住不得為學切須收斂端嚴就自家身心上做工夫自然有所得為學工夫固當有先後然亦不是今日截然為此明日為彼也且如所謂先明性之本體而敬以持之固是如此然從初若都不敬亦何由得有見耶或言學者工夫多間斷曰聖賢教人只是要救一箇間斷收拾放心乃是緊切下功夫處講學乃其中之一事今但專一於此下功不須思前算後計較得失講學亦且看直截明白處不要支蔓學問緊要是見處要得透徹然不自主敬致知上著功夫亦無入頭處也為學不厭卑近愈卑愈近則功夫愈實而所得愈髙逺其直為髙逺者則反是此不可不察也持敬讀書表裏用力切須實下功夫不可徒為虛説然表裏亦非二事但不可取此而舍彼耳其實互相為用只是一事人須做功夫方有疑初做時定是觸著相礙沒理會處只如居敬窮理始初定分作兩假居敬則執持在此才動則便忘了問始學必如此否曰固然要知居敬在此動時理便自窮只是此話功夫未到時難説又曰但能無事時存養教到動時也會求理學者精神短底看義理只到得半途便以為前面沒了或曰若功夫不已亦須有向進曰須知得前面有方肯做功夫今之學者大槩有二病一以為古聖賢亦只此是了故不肯做功夫一則自謂做聖賢事不得不肯做功夫學者須於主一上做功夫若無主一功夫則所講義理無安著處都不是自家物事若有主一功夫則外面許多義理方始為我有都是自家物事功夫到時才主一便覺意思好卓然精明不然便緩散消索了沒意思做功夫只自腳下便做將去固不免有散緩時但才覺便收斂將來漸漸做去但得收斂時節多散緩之時少便是長進處故孟子説學問之道無他求其放心而已所謂求放心者非是别去求箇心來存著只才覺放心便在此孟子又曰雞犬放則知求之心放則不知求某嘗謂雞犬猶是外物才放了須去外面捉將來若是自家心更不用别求才覺便在這裏雞犬放猶有求不得時自家心則無求不得之理因言橫渠説做功夫處更精切似二程二程資稟髙潔淨不大假用工夫橫渠資稟有偏駁夾雜處他大假用工夫來觀其言曰心清時少亂時多其清時視明聼聰四體不待羈束而自然恭謹其亂時反是説得來大假精切人生與天地一般無些欠缺處且去子細看秉彛常性是何如將孟子言性善處看是如何善須精細看來質敏不學乃大不敏有聖人之資必好學必下問若就自家杜撰更不學更不問便已是凡下了聖人之所以為聖也只是好學下問舜自耕稼陶漁以至於帝無非取諸人以為善孔子説禮吾聞諸老聃這也是學於老聃方知得這一事或問東萊謂變化氣質方可言學曰此意甚善但如鄙意則以為學乃能變化氣質耳若不讀書窮理主敬存心而徒切切計較於昨非今是之間恐亦勞而無補也待文王而後興者凡民也若夫豪傑之士雖無文王猶興豪傑質美生下來便見這道理何用費力今人至於沉迷而不反聖人為之屢言方始肯來已是下愚了况又不知求之則終於為禽獸而已蓋人為萬物之靈自是與物異若迷其靈而昏之則與禽獸何異學問是自家合做底不知學問則是欠闕了自家底知學問則方無所欠闕今人把學問來做外面添底事看了聖賢只是做得人當為底事盡今做到聖賢止是恰好又不是過外凡人須以聖賢為己任世人多以聖賢為髙而自視為卑故不肯進抑不知使聖賢本自髙而已别是一樣人則早夜孜孜别是分外事不為亦可為之亦可然聖賢稟性與常人一同既與常人一同又安得不以聖賢為己任自開闢以來生多少人求其盡已者千萬人中無一二只是衮同枉過一世詩曰天生蒸民有物有則今世學者往往有物而不能有其則中庸曰尊德性而道問學極髙明而道中庸此數句乃是徹首徹尾人性本性只為嗜欲所迷利害所逐一齊昏了聖賢能盡其心故耳極天下之聰目極天下之明為子極其孝為臣極其忠或問明性須以敬為先曰固是但敬亦不可混淪説須是每事上檢點論其大要只是不放過耳大抵為已之學於他人無一毫干預聖賢千言萬語只是使人反其固有而復其性耳學者大要立心所謂志者不道將這些意氣去蓋他人只是直截要學堯舜孟子道性善言必稱堯舜此是真實道理世子自楚反復見孟子孟子曰世子疑吾言乎夫道一而已矣這些道理更無走作只是一箇性善可至堯舜别沒去處了下文引成覸顏子公明儀所言便見得人人皆可為也學者立志須教勇猛自當有進志不足以有為此學者之大病世俗之學所以與聖賢不同者亦不難見聖賢直是真箇去做説正心直要心正説誠意直要意誠修身齊家皆非空言今之學者説正心但將正心吟詠一餉説誠意又將誠意吟詠一餉説修身又將聖賢許多説修身處諷誦而已或掇拾言語綴緝時文如此為學却於自家身上有何交涉這裏須用著意理會今之朋友固有樂聞聖賢之學而終不能去世俗之陋者無他只是志不立爾學者大要立志才學便要做聖人是也問人氣力怯弱於學有妨否曰為學在立志不干氣稟強弱事又曰為學何用憂惱但放令平昜寬快去或舉聖門弟子唯稱顔子好學其次方説及曽子以此知事大難曰固是如此某看來亦有甚難有甚昜只是堅立著志順義理做去他無蹺欹也這箇物事要得不難如飢之欲食渴之欲飲如救火如追亡似此年嵗間看得透活潑潑地在這裏流轉方是學者做工夫當忘寢食做一上使得些入處自後方滋味接續浮浮沉沉半上落下不濟得事而今緊要且看聖人是如何常人是如何自家因甚便不似聖人因甚便只是常人就此理會得透自可超凡入聖為學須覺今是而昨非日改月化便是長進今之學者全不曽發憤為學不進只是不勇不可倚靠師友今人做工夫不肯便下手皆是要等待如今日早間有事午間無事則午間便可下手午間有事晚間便可下手却須要待明日今月若尚有數日必直待後月今年尚有數月不做工夫必曰今年嵗月無幾直須來年如此何緣長進凡人便是生知之資也須下困學勉行底工夫方得蓋道理縝密去那裏捉摸若不下工夫如何會了得大抵為學雖有聰明之資必須做遲鈍工夫始得既是遲鈍之資却做聰明底樣工夫如何得今人不肯做工夫有是覺得難後遂不肯做有自知不可為公然遜與他人如退産相似甘伏批退自己不願做為學勿責無人為自家剖析出來須是自家去裏面講究做工夫要自見得小立課程大作工夫且理會去未須計其得才計於得則心便二頭便低了嚴立功程寬著意思久之自當有味不可求欲速之功人多言為事所奪有妨講學此為不能使船嫌溪曲者也遇富貴就富貴上做工夫遇貧賤就貧賤上做工夫兵法一言甚佳因其勢而利導之也人謂齊人弱田單乃因其弱以取勝又如韓信特地送許多人安於死地乃始得勝學者若有絲毫氣在必須進力除非無了此氣只口不會説話方可休也為學極要求把篙處著力到工夫要斷絶處又更增工夫著力不妨令倒方是向進處為學正如撑上水船方平穩處儘行不妨及到灘脊急流之中舟人來這上一篙不可放緩直須著力撑上不得一步不緊放退一步則此船不得上矣學者理會道理當深沉潛思又曰讀書如煉丹初時烈火煆煞然後漸漸慢火養又如煮物初時烈火煮了却須慢火養讀書初勤敏著力子細窮究後來却須緩緩溫尋反復玩味道理自出又不得貪多欲速直須要熟工夫自熟中出大要須先立頭緒頭緒既立然後有所持守書曰若藥弗瞑眩厥疾弗瘳今日學者皆是養病須磨厲精神去理會天下事非燕安暇豫之可得陽氣發處金石亦透精神一到何事不成人氣須是剛方做得事如天地之氣剛故不論甚物事皆透過人氣之剛其本相亦如此若只遇著一重薄物事便退轉去如何做得事進取得失之念放輕却將聖賢格言處研窮考究若悠悠地似做不做如捕風捉影有甚長進今日是這箇人明日也是這箇人學者只是不為已故日間此心安頓在義理上時少安頓在間事上時多於義理却生於間事却熟今學者要緊且要分别箇路頭要緊是為已為人之際為已者直拔要理會這箇物事欲自家理會得不是漫恁地理會且恁地理會做好看教人説道自家也曽理會來這假饒理會得十分是當也都不關自身已事要須先理會這箇路頭若分别得了方可理會文字今之學者直與古異今人只是強探上向去古人則逐步步實做將去為學須是切實為已則安靜篤實承載得許多道理若輕揚淺露如何探討得道理縱使探討得説得去也承載不住入道之門是將自家身已入那道理中去漸漸相親久之與已為一而今人道理在這裏自家身在外面全不曽相干涉或問為學曰今人將作箇大底事説不切已了全無益一向去前人説中乘虛接渺接取許多枝蔓只見逺了只見無益於已聖賢千言萬語儘自多了前輩説得分曉了如何不切已去理會如今看文字且要以前賢程先生等所解為主看他所説如何聖賢言語如何將已來聼命於他切已思量體察就日用常行中著衣喫飯事親從兄盡是學問若是不切已只是説話今人只憑一已私意瞥見些子説話便立箇主張硬要去説便要聖賢從我言語路頭去如何會有益此其病只是要説髙説妙將來做箇好看底物事做弄如人喫飯方知滋味如不曽喫只要攤出在外面與人看濟人濟已都不得或問為學如何做工夫曰不過是切已便的當此事自有大綱亦有節目常存大綱在我至於節目之間無非此理體認省察一毫不可放過理明學至件件是自家事物然亦須各有倫序問如何是倫序曰不是安排此一件為先此一件為後此一件為大此一件為小隨人所為先其昜者闕其難者將來難者亦自可理會且如讀書二禮春秋有制度之難明本末之難見且放下未要理會亦得如詩書直是不可不先理會又如詩之名數書之盤誥恐難理會且先讀典謨之書雅頌之詩何嘗一言一句不説道理何嘗深潛諦玩無有滋味只是人不曽子細看若子細看裏面有多少倫序須是子細參研方得此便是格物窮理如遇事亦然事中自有一箇平平當當道理只是人討不出只隨事衮將去亦做得却有掣肘不中節處亦緣鹵莽了所以如此聖賢言語何曽誤天下後世人自學不至耳為學須是專一吾儒惟專一於道理則自有得須是在已見得只是欠闕他人見之却有長進方可為學之道須先存得這箇道理方可講究事情今人口略依稀説過不曽心曉博學謂天地萬物之理修已治人之方皆所當學然亦各有次序當以其大而急者為先不可雜而無統也今之學者多好説得髙不喜平殊不知這箇只是合當做底事譬如登山人多要至髙處不知自低處不理會終無至髙處之理於顯處平昜處見得則幽微底自在裏許學者須是直前做去莫起計獲之心如今説底恰似畫卦影一般吉凶未應時一場鶻突知他是如何到應後方始如元來是如此學者須是熟熟時一喚便在目前不熟時須著旋思索到思索得來意思已不如初了性理大全書卷四十三

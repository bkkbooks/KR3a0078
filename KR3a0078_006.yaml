body:
  text: 性理大全書卷六正䝉至當篇第九至當之謂德百順之謂福德者福之基福者德之致無入而非百順故君子樂得其道循天下之理之謂道得天下之理之謂德故曰易簡之善配至德大德敦化仁智合一厚且化也小德川流淵泉時出之也大德不踰間小德出入可也大者器則小者不器矣德者得也凡有性質而可有者也日新之謂盛德過而不有不凝滯於心知之細也浩然無害則天地合德照無偏繫則日月合明天地同流則四時合序酬酢不倚則鬼神合吉凶天地合德日月合明然後能無方體能無方體然後能無我禮器則藏諸身用無不利禮運云者語其達也禮器云者語其成也達與成體與用之道合體與用大人之事備矣禮器不泥於小者則無非禮之禮非義之義蓋大者器則出入小者莫非時中也子夏謂大德不踰間小德出入可也斯之謂爾禮器則大矣修性而非小成者歟運則化矣達順而樂亦至焉爾萬物皆備於我言萬物皆有素於我也反身而誠謂行無不慊於心則樂莫大焉未能如玉不足以成德未能成德不足以孚天下修己以安人修己而不安人不行乎妻子况可愾於天下正己而不求於人不願乎外之盛者與仁道有本近譬諸身推以及人乃其方也必欲博施濟衆擴之天下施之無窮必有聖人之才能𢎞其道制行以己非所以同乎人必物之同者己則異矣必物之是者己則非矣能通天下之志者為能感人心聖人同乎人而無我故和平天下莫盛於感人心道逺人則不仁易簡理得則知幾知幾然後經可正天下達道五其生民之大經乎經正則道前定事豫立不疑其所行利用安身之要莫先焉性天經然後仁義行故曰有父子君臣上下然後禮義有所錯仁通極其性故能致養而靜以安義致行其知故能盡文而動以變義仁之動也流於義者於仁或傷體之常也也過於仁者於義或害立不易方安於仁而已乎安所遇而敦仁故其愛有常心有常心則物被常愛也大海無潤因暍者有潤至仁無恩因不足者有恩樂天知命所居而安不纍於物也愛人然後能保其身助寡則親戚叛之能保其身則不擇地而安不能有其身則資安處以置之不擇地而安蓋所達者大矣大達於天則成性成身矣上達則樂天樂天則不怨下學則治己治己則無尤不知來物不足以利用不通晝夜未足以樂天聖人成其德不私其身故乾乾自强所以成之於天爾君子於仁聖為不厭教不倦然且自謂不能蓋所以為能也能不過人故與人爭能以能病人大則天地合德自不見其能也君子之道達諸天故聖人有所不能夫婦之智淆諸物故大人有所不與匹夫匹婦非天之聰明不成其為人聖人天聰明之盡者爾大人者有容物無去物有愛物無徇物天之道然天以直養萬物代天而理物者曲成而不害其直斯盡道矣志大則才大事業大故曰可大又曰富有志久則氣久德性久故曰可久又曰日新清為異物和為徇物金和而玉節之則不過知運而貞一之則不流道所以可久可大以其肖天地而不離也與天地不相似其違道也逺矣久者一之純大者兼之富大則直不絞方不劌故不習而無不利易簡然後能知險阻易簡理得然後一以貫天下之道易簡故能悅諸心知險阻故能研諸慮知幾為能以屈為伸君子無所爭彼伸則我屈知也彼屈則我不伸而伸矣又何爭無不容然後盡屈伸之道至虛則無所不伸矣君子無所爭知幾於屈伸之感而已精義入神交伸於不爭之地順莫甚焉利莫大焉天下何思何慮明屈伸之變斯盡之矣勝兵之勝勝在至柔明屈伸之神爾敬斯有立有立斯有為敬禮之輿也不敬則禮不行恭敬撙節退讓以明禮仁之至也愛道之極也己不勉明則人無從倡道無從𢎞教無從成矣禮直斯清撓斯昏和斯利樂斯安將致用者幾不可緩思進德者徙義必精此君子所以立多凶多懼之地乾乾德業不少懈於趨時也動靜不失其時義之極也義極則光明著見唯其時物前定而不疚有吉凶利害然後人謀作大業生若無施不宜則何業之有天下何思何慮行其所無事斯可矣知崇天也形而上也通晝夜而知其知崇矣知及之而不以禮性之非己有也故知禮成性而道義出如天地位而易行知德之難言知之至也孟子謂我於辭命則不能又謂浩然之氣難言易謂不言而信存乎德行又以尚辭為聖人之道非知德達乎是哉暗然修於隱也的然著於外也作者篇第十作者七人伏羲神農黃帝堯舜禹湯制法興王之道非述於人者也以知人為難故不輕去未彰之罪以安民為難故不輕變未厭之君及舜而去之堯君德故得以厚吾終舜臣德故不敢不䖍其始稽衆舍己堯也與人為善舜也聞善言則拜禹也用人惟己改過不吝湯也不聞亦式不諫亦入文王也别生分類孟子所謂明庶物蔡人倫者與象憂喜舜亦憂喜所過者化也與人為善也隱惡也所覺者先也好問好察邇言隱惡揚善與人為善象憂亦憂象喜亦喜皆行其所無事也過化也不藏怒也不宿怨也舜之孝湯武之武雖順逆不同其為不幸均矣明庶物察人倫然後能精義致用性其仁而行湯放桀有慙德而不敢赦執中之難也如是天下有道而已在人在已不見其間也立賢無方也如是立賢無方此湯所以公天下而不疑周公所以于其身望道而必吾見也疑周公上有坐以待旦四字黃瑞節曰于與迂同出文王世子帝臣不蔽言桀有罪己不敢違天縱赦既已克之今天天下莫非上帝之臣善惡皆不可掩惟帝擇而命之已不敢不聽虞芮質厥成訟獄者不之紂而之文王文王之生所以縻縶於天下由多助於四友之臣爾以杞包瓜文王事紂之道也厚下以防中潰盡人謀而聽天命者與上天之載無聲臭可象正惟儀刑文王當冥契天德而萬邦信悅故易曰神而明之存乎其人不以聲色為政不革命為有中國默順帝則而天下自歸者其惟文王乎黃瑞節曰張子用詩語而以不革為不革命未詳是否可願可欲雖聖人之知不越盡其才以勉焉而已故君子之道四雖孔子自謂未能博施濟衆修己安百姓堯舜病諸是知人能有願有欲不能窮其願欲周有八士記善人之富也重耳婉而不直小白直而不婉魯政之弊馭法者非其人而已齊因管仲遂併壞其法故必再變而後至於道孟子以智之於賢者為有命如晏嬰知矣而獨不知於仲尼非天命耶山楶藻棁為藏龜之室祀爰居之義同歸於不智宜矣使民義不害不能教愛猶衆人之毋不害使之義禮樂不興僑之病與獻子者忘其勢五人者忘人之勢不資其勢而利其有然後能忘人之勢若五人者有獻子之勢則反為獻子之所賤矣顓㬰主祀東䝉既魯地則是已在邦域之中矣雖非魯臣乃吾事社稷之臣也三十篇第十一三十器於禮非强立之謂也四十精義致用時措而不疑五十窮理盡性至天之命然不可自謂之至故曰知六十盡人物之性聲入心通七十與天同德不思不勉從容中道常人之學日益而不自知也仲尼學行習察異於他人故自十五至於七十化而知裁其德進之盛者與窮理盡性然後至於命盡人物之性然後耳順與天地參無意必固我然後範圍天地之化從心而不踰矩老而安死然後不夢見周公從心莫如夢夢見周公志也不夢欲不踰矩也不願乎外也順之至也老而安死也故曰吾衰也久矣困而不知變民斯為下矣不待困而喻賢者之常也困之進人也為德辨為感速孟子謂人有德慧術知者存乎疢疾以此自古困於內無如舜困於外無如孔子以孔子之聖而下學於困則其䝉難正志聖德日躋必有人所不及知而天獨知之者矣故曰莫知我也夫知我者其天乎立斯立道斯行綏斯來動斯和從欲風動神而化也仲尼生於周從周禮故公旦法壞夢寐不忘為東周之意使其繼周而王則其損益可知矣滔滔忘反者天下莫不然如何變易之天下有道丘不與易知天下無道而不隱者道不逺人且聖人之仁不以無道必天下而棄之也仁者先事後得先難後獲故君子事事則得食不以事事雖有粟吾得而食諸仲尼少也國人不知委吏乘田得而食之矣及德備道尊至是邦必聞其政雖欲仕貧無從以得之今召我者而豈徒哉庶幾得以事事矣而又絶之是誠繫滯如匏瓜不食之物也不待備而勉於禮樂先進於禮樂者也備而後至於禮樂後進於禮樂者也仲尼以貧賤者必待文備而後進則於禮樂終不可得而行矣故自謂野人而必為所謂不願乎其外也功業不試則人所見者藝而已鳯至圖出文明之祥伏羲舜文之瑞不至則夫子之文章知其已矣魯禮文闕失不以仲尼正之如有馬者不借人以乘習不曰禮文而曰史之闕文者祝史所任儀章器數而已舉近者而言約也師摰之始樂失其次徒洋洋盈耳而已焉夫子自衛反魯一嘗治之其後伶人賤工識樂之正及魯益下衰三桓僭妄自大師以下皆知散之四方逾河蹈海以去亂聖人俄頃之助功化如此用我者期月而可豈虛語哉與與如也君或在朝在廟容色不忘向君也君召使擯趨進翼如此翼如左右在君也沒階趨進翼如張拱而翔賓不顧矣相君送賓賓去則白曰賓不顧而去矣紓君敬也上堂如揖恭也下堂如授其容紓也冉子請粟與原思為宰見聖人之用財也聖人於物無畔援雖佛肸南子茍以是心至教之在我爾不為巳甚也如是子欲居九夷不遇於中國庶遇於九夷中國之陋為可知欲居九夷言忠信行篤敬雖蠻貊之邦可行何陋之有栖栖者依依其君而不能忘也固猶不回也仲尼應問雖叩兩端而竭然言必因人為變化所貴乎聖人之詞者以其知變化也富而可求也雖執鞭之士吾亦為之不憚卑以求富求之有可致之道也然得乃有命是求無益於得也愛人以德喻於義者常多故罕及於利盡性者方能至命未達之人告之無益故不以亟言仁大難名人未易及故言之亦鮮顔子於天下有不善未嘗不知知之未嘗復行故怒於人者不使加乎其身愧於己者不輒二之於後也顔子之徒隱而未見行而未成故曰吾聞其語而未見其人也用則行舍則藏惟我與爾有是夫顔子龍德而隱故遁世不見知而不悔與聖者同龍德聖修之極也顔子之進則欲一朝而至焉可謂好學也已矣回非助我者無疑問也有疑問則吾得以感通其故而達夫異同者矣放鄭聲逺佞人顔回為邦禮樂法度不必教之惟損益三代蓋所以教之也法立而能守則德可久業可大鄭聲佞人能使為邦者喪所以守故放逺之天下有道則見無道則隱君子疾沒世而名不稱蓋士而懷居不可以為士必也去無道就有道遇有道而貧且賤君子恥之舉天下無道然後窮居獨善不見知而不悔中庸所謂惟聖者能之仲尼所以獨許顔回惟我與爾為有是也仲由樂善故車馬衣裘喜與賢者共敝顔子樂進故願無伐善施勞聖人樂天故合內外而成其仁子路禮樂文章未足盡為政之道以其重然諾言為衆信故片言可以折獄如易所謂利用折獄利用刑人皆非爻卦盛德適能是而已焉顔淵從師進德於孔子之門孟子命世修業於戰國之際此所以潛見之不同犁牛之子雖無全純然使其色騂且角縱不為太祀所取次祀小祀終必取之言大者茍立人所不棄也有德篇第十二有德者必有言能為有也志於仁而無惡能為無也行修言道則當為人取不務徇物强施以引取乎人故往教妄說皆取人之弊也言不必信行不必果志正深逺不務硜硜信其小者辭取意達則止多或反害也君子寧言之不顧不規規於非義之信寧身被困辱不徇人以非禮之恭寧孤立無助不失親於可賤之人三者知和而能以禮節之也與上有子之言文相屬而不不相䝉者凡論語孟子發明前文義各未盡者皆挈之他皆放此德主天下之善善原天下之一善同歸治故王心一言必主德故王言大言有教動有法晝有為宵有得息有養瞬有存朱子曰此語極好君子終日乾乾不可食息問亦不必終日讀書或靜坐存養亦是天地之生物以四時運動春生夏長固是不息及至秋冬凋落亦只藏於其中故明年復生若使秋冬已絶則來春無緣復有生意學者常喚令此心不死則日有進是一息之間亦有養一瞬之間亦有存如造次必於顛沛必於是之意伹說得大緊君子於民導使為德而禁其為非不大望於愚者之道與禮謂道民以言禁民以行斯之謂爾無徵而言取不信啓詐妄之道也杞宋不足徵吾言則不言周足徵則從之故無徵不信君子不言便僻足恭善柔令色便佞巧言節禮樂不使流離相勝能進反以為文也程子曰禮之與樂只在進反之間便得性情之利進朱子曰樂記云禮主其減樂主其盈禮減而進以為文樂盈而反以反為文減是退讓撙節收斂底意思是禮之體本如此然非人之所樂故須進步向前著力去做故以進為文盈是舒暢發越快滿底意思是樂之體本如此然易至於流蕩却須收拾向裏故以反為文驕樂侈靡宴樂宴安言形則卜如響以是知蔽固之私心不能默然以達於性與天道人道知所先後則恭不勞慎不葸勇不亂直不絞民化而歸厚矣膚受陽也其行隂也象生法必效故君子重夫剛者歸罪為尤罪己為悔言寡尤者不以言得罪於人也己所不欲勿施於人能恕己以仁人也在邦無怨在家無怨己雖不施不欲於人然人施於己能無怨也敬而無失與人接而當也恭而有禮不為非禮之恭也聚百順以事君親故曰孝者畜也又曰畜君者好君也事父母先意承志故能辨志意之異然後能教人程子曰意與志異志是所存處意是發動處如先意承志自不同也藝者日為之分義涉而不有過而不存故曰游天下有道道隨身出天下無道身隨道屈安土不懷居也有為而重遷無為而輕遷皆懷居也老而不死是為賊幼不率教長無循述老不安死三者皆賊生之道也樂驕樂則佚欲樂宴樂則不能徙義不僭不賊其不忮不求之謂乎不穿窬義也謂非其有而取之曰盜亦義也惻隱仁也如天亦仁也故擴而充之不可勝用自養薄於人私也厚於人私也稱其才隨其等無驕吝之心斯得之矣罪己則無尤困辱非憂取困辱為憂榮利非樂忘榮利為樂勇者不懼死且不避而反不安貧則其勇將何施耶不足稱也仁者愛人彼不仁而疾之深其仁不足稱也皆迷謬不思之甚故仲尼率歸之亂云擠人者人擠之侮人者人侮之出乎爾者反乎爾理也藝不得反亦理也克己行法為賢樂己可法為聖聖與賢迹相近而心之所至有差焉辟世者依乎中庸沒世不遇而無嫌辟地者不懷居以害仁辟色者逺恥於將形辟言者免害於禍辱此為士清濁淹速之殊也辟世辟地雖聖人亦同然憂樂於中與賢者其次者為異故曰迹相近而心之所至者不同進賢如不得已將使卑踰尊疏踰戚之意與表記所謂事君難進而易退則位有序易進而難退則亂也相表裏弓調而後求徑焉馬服而後求良焉士必慤而後智能焉不慤而多能譬之豺狼不可近谷神能象其聲而應之非謂能報以律吕之變也猶卜筮叩以是言則應以是物而已易所謂同聲相應是也王弼謂命吕者律語聲之變非此之謂也行前定而不疚光明也大人虎變夫何疚之有言從作乂名正其言易知人易從聖人不患為政難患民難喻有司篇第十三有司政之綱紀也始為政者未暇論其賢否必先正之求得賢才而後舉之為政不以德人不附且勞子之不欲雖賞之不竊欲生於不足則民盜能使無欲則民不為盜假設以子不欲之物賞子使竊其所不欲子必不竊故為政者在乎足民使無所不足不見可欲而盜必息矣為政必身倡之且不愛其勞又益之以不倦天子討而不伐諸侯伐而不討故雖湯武之舉不謂之討而謂之伐陳恆弒君孔子請討之此必因周制鄰有弒逆諸侯當不請而討孟子又謂征者上伐下敵國不相征然湯十一征非賜斧鉞則征討之名至周始定乎野九一而助郊之外助也國中什一使自賦郊門之內通謂之國中田不井授故使什而自賦其一也道千乘之國不及禮樂刑政而云節用而愛人使民以時言能如是則法行不能如是則法不徒行禮樂刑政亦制數而已爾富而不治不若貧而治大而不察不若小而察報者天下之利率德而致善有勸不善有沮皆天下之利也小人私己利於不治君子公物利於治大易篇第十四大易不言有無言有無諸子之陋也易語天地隂陽情僞至隱賾而不可惡也諸子馳騁說辭窮髙極幽而知德者厭其言故言為非難使君子樂取之為貴易一物而三才隂陽氣也而謂之天剛柔質也而謂之地仁義德也而謂之人易為君子謀不為小人謀故撰德於卦雖爻有小大及繫辭其爻必諭之以君子之義一本大作又無其爻二字一物而兩體其太極之謂與隂陽天道象之成也剛柔地道法之效也仁義人道性之立也三才兩之莫不有乾坤之道隂陽剛柔仁義之本立而後知趨時應變故乾坤毁則無以見易六爻各盡利而動所以順隂陽剛柔仁義性命之理也故曰六爻之動三極之道也陽遍體衆隂衆隂共事一陽理也是故二君共一民一民事二君上與下皆小人之道也一君而體二民二民而宗一君上與下皆君子之道也吉凶變化悔吝剛柔易之四象與悔吝由贏不足而生亦兩而已尚辭則言無所茍尚變則動必精義尚象則法必致用尚占則謀必知來四者非知神之所為孰能與於此易非天下之至精則詞不足待天下之問非深不足通天下之志非通變極數則文不足以成物象不足以制器幾不足以成務非周知兼體則其神不能通天下之故不疾而速不行而至示人吉凶其道顯矣知來藏往其德行神矣語蓍龜之用也顯道者危使平易使傾懼以終始其要無咎之道也神德行者寂然不動冥㑹於萬化之感而莫知為之者也受命如響故可與酬酬曲盡鬼謀故可以佑神開物於幾先故曰知來明患而弭其故故曰藏往極數知來前知也前知其變有道術以通之君子所以措於民者逺矣潔靜精微不纍其迹知足而不賊則於易深矣天下之理得元也㑹而通亨也說諸心利也一天下之動貞也乾之四德終始萬物迎之隨之不見其首尾然後推本而言當父母萬物彖明萬物資始故不得不以天配乾坤其偶也故不得不以元配坤仁統天下之善禮嘉天下之㑹義公天下之利信一天下之動六爻擬議各正性命故乾德旁通不失太和而利且貞也顔氏求龍德正中而未見其止故擇中庸得一善則拳拳服膺嘆夫子之忽焉前後也乾三四位過中重剛庸言庸行不足以濟之雖大人之盛有所不安外趨變化內正性命故其危其疑艱於見德者時不得舍也九五大人化矣天德位矣成性聖矣故既曰利見大人又曰聖人作而萬物覩亢龍以位畫為言若聖人則不失其正何亢之有聖人用中之極不勉而中有大人之極不為其大大人望之所謂絶塵而奔峻極于天不可階而升者也乾之九五曰飛龍在天利見大人乃大人造位天德成性躋聖者爾若夫受命首出則所性不存焉故不曰位乎天位而曰位乎天德不曰大人君矣而曰大人造也潜室陳氏曰橫渠此說不要作得時位大人看要作孔子看所謂君有君用臣有臣用聖人有聖人用學者有學者用此善學易者若專指為堯舜湯武則不識易矣庸言庸行蓋天下經德逹道大人之德施於是者溥矣天下之文明於是者衆矣然非窮變化之神以時措之宜則或陷於非禮之禮非義之義此顔子所以求龍德正中乾乾進德思處其極未敢以方體之常安吾止也惟君子為能與時消息順性命躬天德而誠行之也精義時措故能保合太和健利且貞孟子所謂始終條理集大成於聖智者與易曰大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞其此之謂乎成性則躋聖而位天德乾九二正位於內卦之中有君德矣而非上治也九五言上治者言乎天之德聖人之性故捨曰君而謂之天見大人德與位之皆造也大而得易簡之理當成位乎天地之中時舍而不受命乾九二有焉及乎化而聖矣造而位天德矣則富貴不足以言之樂則行之憂則違之主於求吾志而己無所求於外故善世博化龍德而見者也若潛而未見則為己而巳未暇及人者也成德為行德成自信則不疑所行日見乎外可也乾九三修辭立誠非繼日待旦如周公不足以終其業九四以陽居隂故曰在淵能不忘於躍乃可免咎非為邪也終其義也至健而易至順而簡故其險其阻不可階而升不可勉而至仲尼猶天九五飛龍在天其致一也坤至柔而動也剛乃積大勢成而然也乾至健無體為感速故易知坤至順不煩其施普故簡能坤先迷不知所從故失道後能順聽則得其常矣造化之功發乎動畢達乎順形諸明養諸容載遂乎說潤勝乎健不匱乎勞終始乎止健動陷止剛之象順麗入說柔之體㢲為木萌於下滋於上為繩直順以達也為工巧且順也為白所遇而從也為長為髙木之性也為臭風也入也於人為寡髮廣顙躁人之象也坎為血卦周流而勞血之象也為赤其色也離為乾卦於木為科上稿附且躁也艮為小石堅難入也為徑路通或寡也或一本作且字兑為附决內實則外附必决也為毁折物成則上柔者必折也坤為文衆色也為衆容載廣也乾為大赤其正色也為冰健極而寒甚也震為萑葦為蒼莨竹為敷皆蕃鮮也一陷溺而不得出為坎一附麗而不得去為離艮一陽為主於兩隂之上各得其位而其勢止也易言光明者多艮之象著則明之義也䝉無遽亨之理由九二循循行時中之亨也不終日貞吉言疾正則吉也仲尼以六二以隂居隂獨無纍於四故其介如石雖體柔順以其在中而靜何俟終日必知幾而正矣坎維心亨故行有尚外雖積險茍處之心亨不疑則雖難必濟而往有功也中孚上㢲施之下悅承之其中必有感化而出焉者蓋孚者覆乳之象有必生之理物因雷動雷動不妄則物亦不妄故曰物與無妄靜之動也無休息之期故地雷為卦言反又言復終則有始循環無窮人指其化而裁之爾深其反也幾其復也故曰反復其道又曰出入無疾益長裕而不設益以實也妄加以不誠之益非益也井泄而不食强施行惻然且不售作易者之嘆與闔户靜密也闢户動達也形開而目覩耳聞受於陽也辭各指其所之聖人之情也指之以趨時盡利順性命之理臻三極之道也能從之則不陷於凶悔矣所謂變動以利言者也然爻有攻取愛惡本情素動因生吉凶悔吝而不可變者乃所謂吉凶以情遷者也能深存繫辭所命則二者之動見矣又有義命當吉當凶當否當亨者聖人不使避凶趨吉一以貞勝而不顧如大人否亨有隕自天過涉滅頂凶無咎損益龜不克違及其命亂也之類三者情異不可不察因爻象之既動明吉凶於未形故曰爻象動乎內吉凶見乎外富有者大無外也日新者久無窮也顯其聚也隱其散也顯且隱幽明所以存乎象聚且散推蕩所以妙乎神變化進退之象云者進退之動也微必驗之於變化之著故察進退之理為難察變化之象為易憂悔吝者存乎介欲觀易象之小疵宜存志靜知所動之幾微也往之為義有已往有方往臨文者不可不察樂器篇第十五樂器有相周召之治與其有雅太公之志乎雅者正也直巳而行正也故訊疾蹈厲者太公之事耶詩亦有雅亦正言而直歌之無隱諷譎諫之巧也象武武王初有天下象文王武功之舞歌維清以奏之成童學之大武武王沒嗣王象武王之功之舞歌武以奏之冠者舞之酌周公沒嗣王以武功之成由周公告其成於宗廟之歌也十三舞焉興己之善觀人之志羣而思無邪怨而止禮義入可事親出可事君伹言君父舉其重者也志至詩至有象必可名有名斯有體故禮亦至焉幽贊天地之道非聖人而能哉詩人謂后稷之穡有相之道贊化育之一端也禮矯實求稱或文或質居物後而不可常也他人才未美故絢飾之以文莊姜才甚美乃更絢之用質素下文繪事後素素謂其材字雖同而義施各異故設色之工材黃白者必繪以青赤材赤黑必絢以粉素陟降庭止上下無常非為邪也進德修業欲及時也在帝左右所謂欲及時者與潜室陳氏曰一陟一降初無定所此言上下無常而常若有所見於庭真有物臨之者豈非存誠無邪之驗邪在帝左右天理無時離吾身豈非進修欲及時邪江沱之婘以類行而欲喪朋故無怨嫡以類行而不能喪其朋故不以媵備數卒能自悔得安貞之吉乃終有慶而其嘯也歌采枲耳議酒食女子所以奉賓祭厚君親者足矣又思酌使臣之勞推及求賢審官王季文王之心豈是過歟甘棠初能使民不忍去中能使民不忍傷卒能使民知心敬而不瀆之以拜非善教寖明能取是於民哉振振勸使勉也歸哉歸哉序其情也卷耳念臣下小勞則思小飲之大勞則思大飲之甚則知其怨苦噓嘆婦人能此則險詖私謁害政之心知其無也綢直如髮貧者紒縰無餘順其髮而直韜之爾蓼蕭裳華有譽處兮皆謂君接已溫厚則下情得伸讒毁不入而美名可保也商頌顧豫蒸嘗湯孫之將言祖考來顧以助湯孫也鄂不韡韡兄弟之見不致文於初本諸誠也采苓之詩舍旃則無然為言則求所得所譽必有所試厚之至也簡略也無所難也甚則不恭焉賢者仕祿非迫於饑寒不恭莫甚焉簡兮簡兮雖刺時君不用然為士者不能無太簡之譏故詩人陳其容色之盛善御之强與夫君子由房由敖不語其材武者異矣破我斧鈌我斨言四國首亂烏能有為徒破缺我斧斨而已周公征而安之愛人之至也伐柯言正當加禮於周公取人以身也其終見書豫小子其新逆九罭言王見周公當大其禮命則大人可致也狼跋美周公不失其聖卒能感人心於和平也甫田歲取十千一成之田九萬畝公取十千畝九一之法也后稷之生當在堯舜之中年而詩云上帝不寧疑在堯時髙辛子孫為二王後而詩人稱帝爾唐棣枝類棘枝隨節屈曲則其華一偏一反左右相矯因得全體均正偏喻管蔡失道反喻周公誅殛言我豈不思兄弟之愛以權宜合義主在逺者爾唐棣本文王之詩此一章周公制作序己情而加之仲尼以不必常存而去之朱子曰唐棣自是一篇詩與常棣别且是兩般物夫子止是取下面兩句云人但不思思則何逺之有不與上文通漢儒合為一章故誤認偏其反而為反經合道也黃瑞節曰張子誤以唐棣為常棣又誤襲漢儒之失然以為仲尼去之甚善蓋刪詩也日出而隂升自西日迎而㑹之雨之候也喻婚姻之得禮者也日西矣而隂生於東喻婚姻之失道者也鶴鳴而子和言出之善者與鶴鳴魚潜畏聲聞之不臧者與鴥彼晨風鬱彼北林晨風雖摯擊之鳥猶時得退而依深林而止也漸漸之石言有豕白蹢蒸涉波矣豕之負塗曳泥其常性也今豕足皆白衆與涉波而去水患之多為可知也君子所貴乎道者三猶王天下有三重焉言也動也行也茍造德降則民諴和而鳯可致故鳴鳥聞所以為和氣之應也九疇次叙民資以生莫先天材故首曰五行君天下必先正己故次五事己正然後邦得而治故次八政政不時舉必昏故次五紀五紀明然後時措得中故次建皇極求大中不可不知權故次三德權必有疑故次稽疑可徵然後疑決故次庶徵福極徵然後可不勞而治故九以嚮勸終焉五為數中故皇極處之權過中而合義者也故三德處六親親尊尊又曰親親尊賢義雖各施然而親均則尊其尊尊均則親其親為可矣若親均尊均則齒不可以不先此施於有親者不疑若尊賢之等則於親尊之殺必有權而後行急親賢為堯舜之道然則親之賢者先得之於疏之賢者為必然堯明峻德於九族而九族睦章峻德於百姓而萬邦協黎民雍臯陶亦以惇叙九族庶明勵翼為邇可逺之道則九族勉敬之人固先明之然後逺者可次叙而及大學謂克明峻德為自明其德不若孔氏之注愈義民安分之良民而已俊民俊德之民也官能則準牧無義民治昏則俊民用微五言樂語歌詠五德之言也卜不習吉言卜官將占先決問人心有疑乃卜無疑則否朕志無疑人謀僉同故無所用卜鬼神必依龜筮必從故不必卜筮玩習其吉以瀆神也愆忒未分有悔吝之防此卜筮之所由作也王禘篇第十六禮不王不禘則知諸侯歲闕一祭為不禘明矣至周以祠為春以禴為夏宗廟歲六享則二享四祭為六矣諸侯不禘其四享歟夏商諸候夏特一祫王制謂礿則不禘禘則不嘗假其名以見時祀之數爾作記者不知文之害意過矣禘於夏周為春夏嘗於夏商為秋冬作記者交舉以二氣對互而言爾享嘗云者享為追享朝享禘亦其一爾嘗以配享亦對舉秋冬而言也夏商以禘為時祭知追享之必在夏也然則及商天子歲乃五享禘列四祭并祫而五也周改禘為禴則天子享六諸侯不禘又歲闕一祭則亦四而已矣王制所謂天子犆礿祫禘祫嘗祫蒸既以禘為時祭則祫可同時而舉礿以物薄而犆嘗從舊諸侯礿犆如天子禘一犆一祫言於夏禘之時正為一祭特一祫而已然則不王不禘又著見於此矣下又云嘗祫蒸祫則嘗蒸且祫無疑矣若周制亦當闕一時之祭則當云諸侯祠則不禴禴則不嘗黃瑞節曰禘祫之說不一禮記方鄭二家皆非是往往因王制所說四時祭名有所謂禘遂例以大禘釋之張子云假其名以見時祀之數此語最明今考以禘為四時之祭之一惟王制有此蓋禘天子大祭也祭始祖自出之帝於始祖之廟而以始祖配之只祭此二位其禮極嚴祫有二有時祫有大祫時祫者祭始祖與親廟而不及祧廟也大祫者三年而祫則合已毁未毁之廟而祭於始祖之廟也毁廟即祧廟也方氏分祧毁為二非也王制所謂祫禘與大禘之禘不同張子所云假禘之名以見數是已天子犆礿者春祭時物不備故每廟特祭不遷主於祖廟也祫禘祫嘗祫蒸者夏秋冬三時之祭禮物可備故皆合羣主於祖廟也天子之禮也諸侯下天子一等故春之礿犆秋之嘗祫冬之蒸祫皆與天子同惟夏之禘則或一犆焉或一祫焉也張子云不王不禘又著見於此此釋王制說也犆音特礿禴通庶子不祭祖不止言王考而已明其宗也明宗子當祭也不祭禰以父為親之極甚者故又發此文明其宗也庶子不為長子斬不繼祖與禰故也此以服言不以祭言故又發此條庶子不祭殤與無後者注不祭殤者父之庶蓋以殤未足語世數特以己不祭禰故不祭之不祭無後者祖之庶也雖無後以其成人備世數當祔祖以祭之巳不祭祖故不得而祭之也祖庶之殤則自祭之也言庶孫則得祭其子之殤者以巳為其祖矣無所祔之也凡所祭殤者唯適子此據禮天子下祭殤五皆適子適孫之類故知凡殤非適皆不當特祭惟當從祖祔食無後者謂昆弟諸父殤與無後者如祖廟在小宗之家祭之如在大宗見曾子問注黃瑞節曰禮記喪服小記篇庶子不祭祖者明其宗也庶子不為長子斬不繼祖與禰故也庶子不祭殤與無後者殤與無後者從祖祔食庶子不祭禰者明其宗也鄭氏注云不祭殤者父之庶也不祭無後者祖之庶也此二者當從祖祔食而已不祭祖無所食之也共其牲物而宗子主其禮焉祖庶之殤則自祭之凡所祭殤者惟適子耳無後者謂昆弟諸父也宗子之諸父無後者為墠祭之曾子問篇曰凡殤與無後者祭於宗子之家鄭氏注云言祭於宗子之家者有異居之道也凡祖廟在小宗之家祭之亦然大宗小宗說見家禮殷而上七廟自祖考而下五并逺廟為祧者二無不遷之太祖廟至周有百世不毁之祖則三昭三穆四為親廟二為文武二世室并始祖而七諸侯無二祧故五大夫無不遷之祖則一昭一穆與祖考而三故以祖考通謂為太祖若祫則請於其君并髙祖于祫之于祫之不當祫而特祫之也孔注王制謂周制亦粗及之而不詳爾朱子禘祫議曰王制天子七廟三昭三穆與太祖之廟而七諸侯大夫士降殺以兩而祭法又有適士二廟官師一廟之文大扺士無二祖而皆及其祖考也鄭氏曰夏五廟商六廟周七廟今按商書已云七世之廟鄭說恐非顔師古曰父為昭子為穆孫復為昭昭明也穆美也後以晉室諱昭故學者改昭為韶其制皆在中門外之左外為都宫內各有寢廟别有門垣太祖在北左昭右穆以次而南晉博士孫育議天子太祖百世不遷一昭一穆為宗亦百世不遷宗亦曰世室亦曰祧鄭注周禮守祧曰宗亦曰祧亦曰世室周禮有守祧之官鄭氏曰逺廟為祧周為文武之廟遷主藏焉又曰遷主所藏曰祧先公之遷主藏于太祖后稷之廟先王之遷主藏于文武之廟羣穆於文羣昭於武明明位有文世室武世室鄭氏曰世室者不毁之名也二昭二穆為四親廟髙祖以上親盡則毁而遞遷昭常為昭穆常為穆昭之二廟親盡則毁而遷其主于昭之宗曽祖遷于昭之二新入廟者祔于昭之三而髙祖及祖在穆如故穆廟親盡放此新死者如當為昭則祔于昭之近廟而自近廟遷其祖于昭之次廟而于主祭者為曽祖自次廟遷其髙祖于昭之世蓋於主祭者為五世而親盡故也其穆之兩廟如故不動其次廟於主祭者為髙祖其近廟於主祭者為祖也主祭者沒則祔於穆之近廟而遞遷其上放此凡毁廟遷主改塗易檐示有所變非盡毁也見榖梁傳及注諸侯則無二宗大夫又無二廟其遷毁之次則與天子同但毁廟之主藏於太祖儀禮所謂以其班祔檀弓所謂祔於祖父者也曲禮云君子抱孫不抱子此言孫可以為王父尸子不可以為父尸廓氏云以孫與祖昭穆同也周制自后稷為太祖不窋為昭鞠為穆以下十二世至太王復為穆十三世至王季復為昭十四世至文王又為穆十五世至武王又為昭故書稱文王為穆考詩稱武王為昭考而左氏傳曰太伯虞仲大王之昭也虢仲虢叔王季之穆也又曰管蔡魯衛文之昭也䢴晉應韓武之穆也蓋其次序一定百世不易雖文王在右武王在左嫌於倒置而諸廟别有門垣足以各全其尊初不以左右為尊卑也三代之制其詳雖不得聞然其大略不過如此鋪筵設同几疑左右几一云交鬼神異於人故夫婦而同几求之或於室或於祊也黃瑞節曰禮記祭統篇曰鋪筵設同几為依神也詔祝於室而出於祊此交神明之道也鄭氏注云同之為言詷也祭者以其妃配亦不特几也詔祝告事於尸也出于祊謂索祭也張子語録鋪筵設同几只設一位以其精神合也祊伯更反詷作貢反祭社稷五祀百神者以百神之功報天之德爾故以天事鬼神事之至也理之盡也天子因生以賜姓諸侯以字為諡蓋以尊統上卑統下之義天子因生以賜姓難以命於下之人亦尊統上之道也朱子曰姓是大總腦處氏是後來次第分别處如魯本姬姓其後有孟氏季氏同為姬姓而氏有不同諸侯以字為諡切恐諡本氏字傳寫之訛先儒承訛解將去義理不通如舜生溈汭武王遂賜胡公滿為溈姓即因生賜姓如鄭之國氏本子國之後駟氏本子駟之後即以字為氏因以為族杜預㸃諸侯以字為句亦是强解據玉藻疑天子聽朔於明堂諸侯則於大廟就藏朔之處告祖而行受命祖廟作龜禰宫次序之宜公之士及大夫之衆臣為衆臣公之卿大夫卿大夫之室老及家邑之士為貴臣上言公士所以别士於公者也下言室老士所以别士於家者也衆臣不以杖即位疑義與庶子同適士疑諸侯薦於天子之士及王朝爵命之通名蓋三命方受位天子之朝一命再命受職受服者疑官長自辟除未有位於王朝故謂之官師而已小事則専達蓋得自達於其君不俟聞於長者禮所謂達官者也所謂達官之長者謂自達之長也所謂官師者次其長者也然則達官之長必三命而上者官師則中士而再命者庶士則一命為可知黃瑞節曰周禮六官之屬皆曰大事則從其長小事則専達賜官使臣其屬也若卿大夫以室老士為貴臣未賜官則不得臣其士也祖廟未毁教於公宫則知諸侯於有服族人亦引而親之如家人焉下而飲者不勝者自下堂而受飲也其爭也爭為謙讓而已君子之射以中為勝不必以貫革為勝侯以布鵠以革其不貫革而墜於地者中鵠為可知矣此為力不同科之一也知死而不知生傷而不弔畏壓溺可傷尤甚故特致哀死者不弔生者以異之且如何不淑之詞無所施焉博依善依永而歌樂之也雜服雜習於制數服近之文也春秋大要天子之事也故曰知我者其惟春秋乎罪我者其惟春秋乎苗而不秀者與下不足畏也為一說乾稱篇第十七取西銘首句為篇名今自為一書不復載凡可狀皆有也凡有皆象也凡象皆氣也氣之性本虛而神則神與性乃氣所固有此鬼神所以體物而不可遺也至誠天性也不息天命也人能至誠則性盡而神可窮矣不息則命行而化可知矣學未至知化非真得也舍氣有象否非象有意否有無虛實通為一物者性也不能為一非盡性也飲食男女皆性也是烏可滅然則有無皆性也是豈無對莊老浮屠為此說久矣果暢真理乎天包載萬物於內所感所性乾坤隂陽二端而已無內外之合無耳目之引取與人物蕞然異矣人能盡性知天不為蕞然起見則幾矣有無一內外合庸聖同此人心之所自來也若聖人則不專以聞見為心故能不専以聞見為用無所不感者虛也感即合也咸也以萬物本一故一能合異以其能合異故謂之感若非有異則無合天性乾坤隂陽也二端故有感一故能合天地生萬物所受雖不同皆無須㬰之不感故謂性即天道也感者性之神性者感之體在天在人其究一也惟屈伸動靜終始之能一也故所以妙萬物而謂之神通萬物而謂之道體萬物而謂之性至虛之實實而不固至靜之動動而不窮實而不固則一而散動而不窮則往且來性通極於無氣其一物爾命禀同於性遇乃適然焉人一己百人十己千然有不至猶難語性可以言氣行同報異猶難語命可以言遇浮屠明鬼謂有識之死受生循環遂厭苦求免可謂知鬼乎以人生為妄可謂知人乎天人一物輒生取舍可謂知天乎孔孟所謂天彼所謂道惑者指游魂為變為輪回未之思也大學當先知天德知天德則知聖人知鬼神今浮屠極論要歸必謂死生轉流非得道不免謂之悟道可乎悟則有義有命均死生一天人惟知晝夜通隂陽體之不二自其說熾𫝊中國儒者未容窺聖學門墻已為引取淪胥其間指為大道其俗達之天下致善惡知愚男女臧獲人人著信使英才間氣生則溺耳目恬習之事長則師世儒宗尚之言遂冥然被驅因謂聖人可不修而至大道可不學而知故未識聖人心已謂不必求其迹未見君子志已謂不必事其文此人倫所以不察庶物所以不明治所以忽德所以亂異言滿耳上無禮以防其僞下無學以稽其弊自古詖淫邪遁之詞翕然並興一出於佛氏之門者千五百年自非獨立不懼精一自信有大過人之才何以正立其間與之較是非計得失釋氏語實際乃知道者所謂誠也天德也其語到實際則以人生為幻妄有為為疣贅以世界為䕃濁遂厭而不有遣而弗存就使得之乃誠而惡明者也儒者則因明致誠因誠致明故天人合一致學而可以成聖得天而未始遺人易所謂不遺不流不過者也彼語雖似是觀其發本要歸與吾儒二本殊歸矣道一而已此是則彼非此非則彼是固不當同日而語其言流遁失守窮大則淫推行則詖致曲則邪求之一卷之中此弊數數有之大率知晝夜隂陽則能知性命能知性命則能知聖人知鬼神彼欲直語太虛不以晝夜隂陽纍其心則是未始見易未始見易則雖欲免隂陽晝夜之纍末由也已易且不見又烏能更語真際捨真際而談鬼神妄也所謂實際彼徒能語之而已未始心解也易謂原始反終故知死生之說者謂原始而知生則求其終而知死必矣此夫子所以直季路之問而不隱也體不偏滯乃可謂無方無體偏滯於晝夜隂陽者物也若道則兼體而無纍也以其兼體故曰一隂一陽又曰隂陽不測又曰一闔一闢又曰通乎晝夜語其推行故曰道語其不測故曰神語其生生故曰易其實一物指事異名爾大率天之為德虛而善應其應非思慮聰明可求故謂之神老氏况諸谷以此太虛者氣之體氣有隂陽屈伸相感之無窮故神之應也無窮其散無數故神之應也無數雖無窮其實湛然雖無數其實一而已隂陽之氣散則萬殊人莫知其一也合則混然人不見其殊也形聚為物形潰反原反原者其游魂為變與所謂變者對聚散存亡為文非如螢雀之化指前後身而為說也益物必誠如天之生物日進日息自益必識如川之方至日增日得施之妄學之不勤欲自益且益人難矣哉易曰益長裕而不設信夫將修己必先厚重以自持厚重知學德乃進而不固矣忠信進德惟尚友而急賢欲勝己者親無如改過之不吝戲言出於思也戲動作於謀也發乎聲見乎四支謂非己心不明也欲人無己疑不能也過言非心也過動非誠也失於聲繆迷其四體謂已當然自誣也欲他人已從誣人也或者以出於心者歸咎為己戲失於思者自誣為己誠不知戒其出汝者歸咎其不出汝者長傲且遂非不知孰甚焉程子答張子書云所論大槩有苦心極力之象而無寬裕溫柔之氣非明睿所照而考索至此故意屢偏而言多窒小出入時有之明所照者如目所覩纎微盡識之矣考索至者如揣料於物見倣佛爾能無差乎更望完養思慮涵泳義理他日自當條暢又曰子厚謹嚴才謹嚴便有迫切意象無寬舒之意朱子曰此章即東銘正如今法書所謂故失兩字因作圖子與西銘對看伊川云非明睿所照而考索至此蓋橫渠却是一向苦思求將向前去却缺涵泳以待其義理自形見處答江仲謀論正蒙書曰道之極致物我固為一矣然豈獨物我之間驗之蓋天地鬼神幽明隱顯本末精粗無不通貫而為一也正䝉之㫖不外是然聖賢言之亦已多矣正䝉之作復何為乎恐須反覆研究其說求其所以一者而合之於其所謂一者必銖銖而較之至於鈞而必合寸寸而度之至於丈而不差然後為得也黃瑞節曰張子有文集諸經說語録皆其門人記録之書朱子取以入近思録凡八十條惟正䝉乃其手所撰著云又按東萊吕氏云知言勝正䝉朱子曰正䝉規模大知言小知言蓋五峯胡氏所撰云性理大全書卷六

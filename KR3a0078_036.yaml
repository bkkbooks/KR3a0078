body:
  text: 性理大全書卷三十性理八仁義程子曰仲尼言仁未嘗兼義獨於易曰立人之道曰仁與義孟子言仁必以義配蓋仁者體也義者用也知義之為用而不外焉者可與論道矣世之論仁義者多外之不然則混而無别非知仁義之説也昔者聖人立人之道曰仁曰義孔子曰仁者人也親親為大義者宜也尊賢為大唯能親親故老吾老以及吾之老幼吾幼以及人之幼唯能尊賢故賢者在位能者在職唯仁與義盡人之道則謂之聖人人必有仁義之心然後仁義之氣睟然達於外朱子曰仁義如隂陽只是一氣陽是正長底氣隂是方消底氣仁便是方生底義義便是收回頭底仁要之仁未能盡得道體道則平有地散在裏仁固未能盡得然仁却是足以該道之體若識得陽便識得隂識得仁便識得義識得一箇便曉得其餘箇問於仁也柔於義也剛曰仁體柔而用剛義體剛而用柔又問此豈所謂陽根陽隂根陽邪曰然問自太極之動言之則仁為剛而義為柔自一物中隂陽言之則仁之用柔義之用剛曰是如此仁便有箇流動發越之意然其用則慈柔義便有箇商量從宜之義然其用則決裂問仁義體用動靜何如曰仁固為體義固為用然仁義各有體用各有動靜仁義互為體用動靜仁之體本靜而其用則流行不窮義之用本動而其體則各止其所義之嚴肅即是仁底收斂尋常人施恩惠底心便發得易當刑殺時此心便疑可見仁屬陽屬剛義屬隂屬柔黃直卿云只將舒斂二字看便見喜則舒怒則斂問義者仁之質曰義有裁制割斷意是把定處便發出許多仁來如非禮勿視聽言動便是把定處一日克己復禮天下歸仁便是流行處問孟子以惻隱為仁之端羞惡為義之端周子云愛曰仁宜曰義然以其存於心者而言則惻隱與愛固為仁心之發然羞惡乃就恥不義上反説而非直指義之端也宜字只是就事物上説不知義在心上其體段如何曰義之在心乃是決裂果斷者也或曰存得此心即便是仁曰此句甚好但下面説合於心者為之不合於心者勿為却又從義上去了不干仁事今且只以孟子仁人心也義人路也便見得仁義之别蓋仁是此心之德才存得此心即無不仁如説克己復禮亦只是要得私欲去後此心常存耳未説到行處也才説合於心行之便侵過義人路底界分矣然義之所以能行却是仁之用處學者須是此心常存方能審度事理而行其所當行也此孔門之學所以必以求仁為先蓋此是萬理之原萬事之本且要先識認得先存養得方有下手立腳處耳克己復禮為仁善善惡惡為義仁只是那流行底義是那合當做處仁只是發出來底及至發出來有截然不可亂處便是義仁存諸心性之所以為體也義制夫事性之所以為用也天命之性流行發用見於日用之間無一息之不然無一物之不體其大端全體即所謂仁而於其間事事物物莫不各有自然之分如方維上下定位不易毫釐之間不可差謬即所謂義立人之道不過二者而二者則初未嘗相離也問龜山説知其理一所以為仁知其分殊所以為義仁便是體義便是用否曰仁只是流出來底義是合當做底如水流動處是仁流為江河匯為池沼便是義如惻隱之心便是仁愛父母愛兄弟愛鄉黨愛朋友故舊有許多等差便是義問心無內外心而有內外是私心也非天理也故愛吾親而人之親亦所當愛敬吾長而人之長亦所當敬今吾有親則愛焉而人有親不愛有長則敬焉而人之長不敬是心有兩也是二本也且天之生物使之一本而二本可乎南軒張氏曰此緊要處不可毫釐差蓋愛敬之心由一本而施有差等此仁義之道所以未嘗相離也易所謂稱物平施稱物之輕重而吾施無不平焉此吾儒所謂理一而分殊也勉齋黃氏曰論語一書未嘗以仁義對言而孟子言仁義者不一而足聖賢之教宜無異指而若是不同何也仁義性所有也夫子言性不可得聞而孟子道性善也夫子教人無非仁義之道使人油然入於仁義而不自知也孟子憫斯世之迷惑故開關啓鑰直指人心而明告之五常百行皆性所有而獨言仁義又何也仁義蓋總其名而五常百行其支派也孟子提綱挈領使人由是而推之無往而非仁義也孟子之言仁義也其強為是名耶抑亦有自來也且何以知其為性所有而五常百行之總名也夫子固嘗言之矣立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義三才之道一而已隂陽以氣言剛柔以質言仁義以理言也人受氣於天賦形於地稟隂陽剛柔氣質以為體則具仁義之理以為性此豈人之所能強名而五常百行孰有出於仁義之外哉仁義之道不在他求孟子曰惻隱之心仁之端也羞惡之心義之端也又曰孩提之童無不知愛其親者及其長也無不知敬其兄也親親仁也敬長義也仁義之道根於吾心之固有初非有甚髙難能之事也存之於虛靜純一之中推之於動作應酬之際則仁義之道在我矣試以吾平日設心者思之果能事親而孝乎果能處宗族而睦乎果能交於鄉黨朋友而兼所愛乎果能視人如己乎果能視民如傷乎即是心而充之以至於無一念之不公則仁之道盡矣果能從兄而順乎果能事上而敬乎果能應事接物而求其是乎果能見利不趨乎果能見害不避乎即是心而充之以至於無一事之不宜則義之道盡矣盡仁義之道則仰不愧俯不怍而上下與天地同流矣北溪陳氏曰仁義起發是惻隱羞惡及到那人物上方見得愛與宜故曰愛之理宜之理仁義禮智問仁義禮智立名還有意義否朱子曰説仁便有慈愛底意思説義便有剛果底意思聲音氣象自然如此黃直卿云六經中専言仁者包四端也言仁義而不言禮智者仁包禮義包智生底意思是仁殺底意思是義發見會通是禮收一作深藏不測是智仁與義是柔軟底禮智是堅實底仁義是頭禮智是尾一似説春秋夏冬相似仁義一作仁禮是陽底一截禮智一作義智是隂底一截問仁義禮智體用之别曰自隂陽上看下來仁禮屬陽義智屬隂春夏是陽秋冬是隂只將仁義説則春作夏長仁也秋斂冬藏義也若將仁義禮智説則春仁也夏禮也秋義也冬智也仁禮是敷施出來底義便是肅殺果斷底智便是收藏底如人肚臟有許多事如何見得其智愈大其臟愈深正如易中道立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義解者多以仁為柔以義為剛非也却是以仁為剛以義為柔蓋仁是箇發出來了便硬而強義便是收斂向裏底外面見之便是柔仁禮屬陽義智屬隂袁機仲却説義是剛底物合屬陽仁是柔底物合屬隂殊不知舒暢發達便是那剛底意思收斂藏縮便是那柔底意思他只念得於仁也柔於義也剛兩句便如此説殊不知正不如此又云以氣之呼吸言之則呼為陽吸為隂吸便是收斂底意鄉飲酒義云溫厚之氣盛於東南此天地之仁氣也嚴凝之氣盛於西北此天地之義氣也仁禮屬陽屬健義智屬隂屬順問義則截然有定分有收斂底意思自是屬隂順不知智如何解曰智更是截然更是收斂如知得是知得非知得便了更無作用不似仁義禮三者有作用知只是知得了便交付惻隱羞惡辭遜三者他那箇更收斂得快人只是此仁義禮智四種心如春夏秋冬千頭萬緒只是此四種心發出來仁義禮智便是元亨利貞若春間不曽發心得到夏無緣得長秋冬亦無可收藏問仁是天地之生氣義理智又於其中分别然其初只是生氣故為全體曰然問肅殺之氣亦只是生氣曰不是二物只是斂些春夏秋冬亦只是一氣問仁包義禮智惻隱包羞惡辭讓是非元包亨利貞春包夏秋冬以五行言之亦如木是包得火金水曰木是生氣有生氣然後物可得而生若無生氣則火金水皆無自而能生矣故木能包此三者仁義禮智性也性無形影可以摸索只是有這理耳惟情乃可得而見惻隱羞惡辭遜是非是也故孟子言性曰乃若其情則可以為善矣蓋性無形影惟情可見觀其發處既善則知其性之本善必矣或問論語言仁處曰理難見氣易見但就氣上看便見如看元亨利貞是也元亨利貞也難看且看春夏秋冬春時盡是溫厚之氣仁便是這般氣象夏秋冬雖不同皆是陽春生育之氣行乎其中故偏言則一事専言則包四者明道謂義禮智皆仁也若見得此理則聖人言虛處或就仁上説或就事上説皆是這一箇道理程正叔云滿腔子是惻隱之心曰仁便是惻隱之母又曰若曉得此理便見得克己復禮私欲盡去便純是溫和沖粹之氣乃天地生物之心其餘人所以未仁者只是心中未有此氣象論語但云求仁之方者是其門人必嘗理會得此一箇道理今但問其求仁之方故夫子隨其人而告之趙致道云李先生云仁是天理之體統曰是仁有兩般有作為底有自然底看來人之生便自然如此不待作為如説父子欲其親君臣欲其義是他自會如此不待欲也父子自會親君臣自會義既自會恁地便活潑潑地便是仁孟子説乍見孺子入井時皆有怵惕惻隱之心最親切人心自是會如此不是內交要譽方如此大凡人心中皆有仁義禮智然元只是一物發用出來自然成四派如破梨相似破開成四片如東對著西便有南北相對仁對著義便有禮智相對以一嵗言之便有寒暑以氣言之便有春夏秋冬以五行言之便有金木水火土且如隂陽之間儘有次第大寒後不成便熱須是且做箇春溫漸次到熱田地大熱後不成便寒須是且做箇秋涼漸次到寒田地所以仁義禮智自成四派各有界限仁流行到義處便成義禮智處便成禮智且如萬物收藏何嘗休了都有生意在四面如穀種桃仁杏仁之類種著便生不是死物所以名之曰仁見得都是生意如春之生物夏是生物之盛秋是生意漸漸收斂冬是生意收藏又曰春夏是行進去秋冬是退後去正如人呵氣呵出時便熱吸入時便冷問仁是生底意義禮智則如何曰只是一元之氣春生時全見是生到夏時長也只是這底到秋天來成遂也只是這底到冬天藏斂也只是這底仁義禮智割做四段一箇便是一箇渾淪看只是一箇問先生以為一分為二二分為四四分為八又細分將去程子説性中只有仁義禮智四者而已只分到四便住何也曰周先生亦只分到五行住若要細分則如易樣分若説仁義便如隂陽若説四端便如四時若分四端八字便如八節蓋嘗言仁義禮智只是一箇道理分為兩箇兩箇分為四箇一箇是仁一箇是義一箇是禮一箇是智這四箇便是箇種子惻隱羞惡恭敬是非便是種子所生底苗問以愛名仁是仁之迹以覺言仁是仁之端程子云仁道難名惟公近之不可便以公為仁畢竟仁之全體如何識認克己復禮天下歸仁孟子所謂萬物皆備於我是仁之體否曰覺決不可以言仁雖足以知仁自屬智了愛分明是仁之迹曰惻隱是仁情之動處要識仁須是兼義禮智看有箇宜底意思是義有箇讓底意思是禮有箇别白底意思是智有箇愛底意思是仁仁是天理公是天理故伊川謂惟公近之又恐人滯著隨即曰不可便以公為仁萬物皆備固是仁然仁之得名却不然問元亨利貞有次第仁義禮智因發而感則無次第曰發時無次第生時有次第仁義禮智性之大目皆是形而上者豈可分也問仁得之最先蓋言仁具義禮智曰先有是生理三者由此推之仁渾淪言則渾淪都是一箇生意義禮智都是仁對言則仁與義禮智一般仁與智包得義與禮包不得仁所以包三者蓋義禮智皆是流動底物所以皆從仁上漸漸推出仁智元貞是始終之事這兩頭却重如坎與震是始萬物終萬物處艮則是中間接續處問孟子説仁義禮智義在第二太極圖以義配利則在第三曰禮是陽故曰亨仁義禮智猶言東西南北元貞利貞猶言東南西北一箇是對説一箇是從一邊説起四端猶四德逐一言之則各自為界限分而言之則仁義又是一大界限故曰仁人心也義人路也如乾文言既曰四德又曰乾元者始而亨者也利貞者性情也或言性之四端迭為賓主然仁智其總統也恭而無禮則勞是以禮為主也君子義以為質是以義為主也蓋四德未嘗相離遇事則迭見層出要在人默而識之曰説得是仁義禮智才去尋討他時便動了便不是本來底又曰心之所以會做許多蓋具得許多道理又曰何以見得有此四者因其惻隱知其有仁因其羞惡知其有義又曰伊川穀種之説最好又曰冬飲湯是宜飲湯夏飲水是宜飲水冬飲水夏飲湯便不宜童蜚卿問仁恐是生生不已之意人惟為私意所汩故生意不得流行克去己私則全體大用無時不流行矣曰此是衆人公共説底畢竟緊要處不知如何今要見仁字意思須將仁義禮智四者共看便見仁字分明如何是義如何是禮如何是智如何是仁便仁字自分明若只看仁字越看越不出曰仁字恐只是生意故其發而為惻隱為羞惡為辭遜為是非曰且只得就惻隱字上看楊道夫問先生嘗説仁字就初處看只是乍見孺子入井而怵惕惻隱之心蓋有不期然而然便是初處否曰恁地靠著也不得大抵人之德性上自有此四者意思仁便是箇溫和底意思義便是箇慘烈剛斷底意思禮便是箇宣著發揮底意思智便是箇收斂無痕迹底意思性中有此四者聖門却只以求仁為急者緣仁却是四者之先若常存得溫厚底意思在這裏到宣著發揮時便自然會宣著發揮到剛斷時便自然會剛斷到收斂時便自然會收斂若將别箇做主便都對副不著了此仁之所以包四者也直卿問此恐如五行之木若不是先有箇木便亦自生下面四箇不得曰若無木便無火無火便無土無土便無金無金便無水又曰仁字如人釀酒酒方微發時帶些溫氣便是仁到發得極熱時便是禮到得熟時便是義到得成酒後却只與水一般便是智又如一日之間早間天氣清明便是仁午間極熱時便是禮晚下漸涼便是義到夜半全然收斂無些形迹時便是智只如此看甚分明當來得於天者只是箇仁所以為心之全體却自仁中分四界子一界子上是仁之仁一界子上是仁之義一界子是仁之禮一界子是仁之智一箇物事四腳撑在裏面唯仁兼統之心裏只有此四物萬物萬事皆由此出問如溫和之氣固是見得仁若就包四者意思看便自然有節文自然得宜自然明辨曰然禮者仁之發智者義之藏且以人之資質言之溫厚者多謙遜通曉者多刻剝仁字専言之則混然而難名必以仁義禮智四者兼舉而並觀則其意味情狀互相形比乃為易見仁義禮智同具於性而其體渾然莫得而見至於感物而動然後見其惻隱羞惡辭遜是非之用而仁義禮智之端於此形焉乃所謂情而程子以謂陽氣發處者此也但此四者同在一處之中而仁乃生物之主故雖居四者之一而四者不能外焉此易傳所以有偏言則一事専言則包四者之説固非獨以仁為性之統體而謂三者必已發而後見也大抵仁義禮智性也惻隱羞惡辭遜是非情也心則統乎性情者也以此觀之則區域分辨而不害其同脈絡貫通而不害其别庶乎其得之矣人之為人孰不具是性若非是四端則亦非人之道矣然分而論之其别有四猶四體然其位各置不容相奪而其體用互為相須合而言之則仁蓋可兼包也故言其未發則仁之體立而義禮智即是而存焉循其既發則惻隱之心形而其羞惡辭讓是非亦由是而著焉故孟子首舉不忍人之心而後復詳於四端也人有之而自謂不能是自賊其良心者也性是太極渾然之體本不可以名字言但其中含具萬理而綱領之大者有四故命之曰仁義禮智孔門未嘗備言至孟子而始備言之者蓋孔子時性善之理素明雖不詳著其條而説自具至孟子時異端蜂起往往以性為不善孟子思有以明之於是别而言之蓋四端之未發也雖寂然不動而其中自有條理自有間架不是儱侗都無一物所以外邊才感中間便應如赤子入井之事感則仁之理便應而惻隱之心於是乎形如過廟過朝之事感則禮之理便應而恭敬之心於是乎形蓋由其中間衆理渾具各各分明故外邊所遇隨感而應所以四端之發各有面貌之不同是以孟子析而為四以示學者使知渾然全體之中而粲然有條若此則性之善可知矣然四端之未發也所謂渾然全體無聲臭之可言無形象之可見何以知其粲然有條如此蓋是理之可驗乃依然就他發處驗得凡物必有本根性之理雖無形而端的之發最可驗故由其惻隱所以必知其有仁由其羞惡所以必知其有義由其恭敬所以必知其有禮由其是非所以必知其有智使其本無是理於內則何以有是端於外由其有是端於外所以必知有是理於內而不可誣也故孟子言乃若其情則可以為善矣乃所謂善也是則孟子之言性善蓋亦遡其情而逆知之耳問仁兼四端意思理會不透曰謝上蔡見明道先生舉史文成誦明道謂其玩物喪志上蔡汗流浹背面發赤色明道云此便見得惻隱之心且道上蔡聞得過失恁地慙惶自是羞惡之心如何却説道見得惻隱之心公試思久之先生曰惟是有惻隱之心方會動若無惻隱之心却不會動惟是先動了方始有羞惡方始有恭敬方始有是非動處便是惻隱若不會動却不成人若不從動處發出所謂羞惡者非羞惡所謂恭敬者非恭敬所謂是非者非是非天地生生之理這些動意未嘗止息看如何梏亡亦未嘗盡消滅自是有時而動學者只怕間斷了南軒張氏曰四者具於性而根於心猶木之著本水之發源由是而生生不息也仁義禮智根於心而生色於外充盛著現自不可掩故其睟然之和見於面盎於背施於四體四體不言而喻涵養擴充積久而熟天理融會動用周旋無非此理人之性仁義禮智四德具焉其愛之理則仁也宜之理則義也讓之理則禮也知之理則智也是四者雖未形見而其理固根於此則體實具於此矣性之中只有是四者萬善皆管乎是焉而所謂愛之理者是乃天地生物之心而其所由生者也故仁為四德之長而又可以兼包焉惟性之中有是四者故其發見於情則為惻隱羞惡是非辭讓之端而所謂惻隱者亦未嘗不貫通焉此性情之所以為體用而心之道則主乎性情者也人惟己私蔽之以失其性之理而為不仁甚至於為忮為忍豈人之情也哉其陷溺者深矣是以為仁莫要乎克己己私既克則廓然大公而其愛之理素具於性者無所蔽矣愛之理無所蔽則與天地萬物血脈貫通而其用亦無不周矣故指愛以名仁則迷其體程子所謂愛是情仁是性謂此而愛之理則仁也指公以為仁則失其真程子所謂仁道難名惟公近之不可便指公為仁謂此而公者人之所以能仁也夫靜而仁義禮智之體具動而惻隱羞惡辭讓是非之端達其名義位置固不容相奪倫然而惟仁者為能推之而得其宜是義之所存者也惟仁者為能恭讓而有節文是禮之所存者也惟仁者為能知覺而不昧是智之所存者也此可見其兼能而貫通者矣是以孟子於仁統言之曰仁人心也亦猶在易乾坤四德而統言乾元坤元也勉齋黃氏曰道固莫大於仁義而孟子又曰惻隱之心仁也羞惡之心義也恭敬之心禮也是非之心智也向之二者分而為四又何也天固不外乎隂陽矣隂陽互分而為老少則為四矣隂陽互分而為老少金木水火之所以流行也木神則仁金神則義火神則禮水神則智五行既不外乎隂陽則五性亦不外乎仁義也嗟夫人稟五行隂陽之秀氣以生而具有仁義禮智之性所以與天地並立而為三也自其氣稟所昏物欲所汩則惻隱者變而為殘忍矣羞惡者變而為鄙賤矣恭敬者變而為傲慢矣是非者變而為昏愚矣如是則雖具人之形而亦何異於禽獸哉北溪陳氏曰人性之有仁義禮智只是天地元亨利貞之理仁在天為元於時為春乃生物之始萬物於此方萌芽發露如仁之生生所以為衆善之長也禮在天為亨於時為夏萬物到此時一齊盛長衆美所會聚如經禮三百曲禮三千燦然文物之盛亦衆美所會聚也義在天為利於時為秋萬物到此時皆成遂各得其所如義斷制萬事亦各得其宜秋有肅殺氣義亦有嚴肅底意智在天為貞於時為冬萬物到此時皆歸根復命收斂都定了如智見得萬事是非都一定確然不可易便是貞固道理貞後又生元元又生亨亨又生利利又生貞只管如此去循環無端總而言之又只是一箇元蓋元是箇生意亨只是此生意之通利只是此生意之遂貞也只是此生意之藏此元所以兼通四德故曰大哉乾元萬物資始乃統天謂統乎天則終始周流都是一箇元如仁兼統四者義禮智都是仁至其為四端則所謂惻隱一端亦貫通乎羞惡辭讓是非之端而為之統焉今即就四端不覺發動之初真情懇切時便自見惻隱貫通處故程子曰四德之元猶五常之仁偏言則一事専言則包四者可謂示人親切萬世不易之論矣問何謂義禮智都是仁曰仁者此心渾是天理流行到那禮儀三百威儀三千亦都渾是這天理流行到那義之裁斷千條萬緒各得其宜亦都渾是這天理流行到那智之分别萬事是非各定亦都渾是這天理流行仁義禮智四者判作兩邊只是仁義兩箇如春夏秋冬四時分來只是隂陽兩箇春夏為陽秋冬為隂夏之通暢只是春之發生盛大處冬之斂藏只是秋之肅殺歸根處潛室陳氏曰性是太極渾然之全體本不可以名字言但其中含具萬理而綱領之大者有四故命之曰仁義禮智孔門未嘗備言至孟子始備言之茍但曰渾然本體則恐為無星之稱無寸之尺而終不足以曉天下於是别而言之界為四破而四端之説於是乎立孟子之言亦遡其情而逆知之耳仁義禮智既見得他界分分明又須知四者之中仁義是一箇對立底關鍵蓋仁仁也而禮者則仁之著義義也而智者則義之藏猶春夏秋冬雖為四時然春夏皆陽之屬也秋冬皆隂之屬也故曰立天之道曰隂與陽立人之道曰仁與義是知天地之道不兩則不能以立故端有四而立之兩耳仁義雖對立而成兩然仁實通乎四者之中蓋偏言則一事専言則包四者故仁者仁之本禮者仁之節文義者仁之節制智者仁之分别猶春夏秋冬雖不同而同出於春春則春之生夏則春之長秋則春之收冬則春之藏也自四而兩自兩而一則統之有宗會之有元矣故曰五行一隂陽一太極是天地之理固然也仁包四端而智居四端之末者蓋冬者藏也所以終萬物而始萬物者也智有藏之義焉有終始之義焉是惻隱羞惡恭敬三者皆有可為之事而智則無事可為但分别其為是為非耳是以謂之藏也又惻隱羞惡恭敬皆是一面底道理而是非則有兩面既别其所是又别其所非終始萬物之象也故仁為四端之首而智則或終而或始猶元為四德之長然元不生於元而生於貞蓋天地之化不翕聚則不能發散理固然也仁智交際之間乃萬化之機軸循環不窮吻合無間程子所謂隂陽無端動靜無始者此也西山真氏曰人之為人所以與天地並立而為三者蓋形有大小之殊而理無大小之間故也理者何仁義禮智是也人之有是理者天與之也自天道而言則曰元亨利貞自人道而言則曰仁義禮智其實一而已人與天地本一無二而其所以異者天地無心而人有欲天地惟無心也是以於穆之命終古常新元而亨亨而利利而貞貞而又元一通一復循環而無間人之生也初皆全具此理惟其有形體之纍則不能無物欲之私故當其惻隱之發而有以撓之則仁不能充矣當其羞惡之發而有以奪之則義不能充矣恭敬是非之發亦然此孟子所以惓惓于充之一言也蓋善端之發其始甚微亦猶隂陽之氣兆於二至初皆眇然而未著也逮陽浸而長至于正月則天地之氣和而物皆發達矣隂浸而長至于七月則天地之氣肅而物皆收斂矣天地無心其生成萬物之理皆自微至著無一嵗不然者人能體天地之心以為心因其善端之發保養扶持去其所以害之者若火之然因而噓之若泉之達因而導之則一念之惻隱可以澤百世一念之羞惡可以正萬民堯舜之仁湯武之義所以與天地同其大者以其能充之也性理大全書卷三十六

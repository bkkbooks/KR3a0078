body:
  text: 性理大全書卷五十一學九教人程子曰君子之敎人或引之或拒之各因其所虧者成之而已孟子之不受曹交以交未嘗知道固在我而不在人也故使歸而求之語學者以所見未到之理不惟所聞不深徹人将理低㸔了人之知識未嘗不全其䝉者猶寐也呼而覺之斯不䝉矣射中鵠舞中莭御中度皆誠也古人敎人以射御象勺所養之意如此以書傳道與口相傳煞不相干相見而言因事發明則并意思一時傳了書雖言多其實不盡禁人之惡者獨治其惡而不絶其為惡之原則終不得止易曰獖豕之牙言見聖人處機㑹之際也聖人責人緩而不迫事正則已矣胡安定在湖州置治道齋學者有欲明治道者講之於中如治兵治民水利算數之類嘗言劉彛善治水利後累為政皆興水利有功問人之於善也必其誠心欲為然後有所得其不欲不可以強人也曰是不然任其自為聽其不為則中人以下自棄自暴者衆矣聖人所以貴於立敎也賢人君子未得其位無所發施其素藴則推其道以淑諸人講明聖人之學開道後進使其敎益明其傳益廣故身雖隠而道光跡雖處而敎行出處雖異推已及人之心則一也張子曰聖人設敎便是人人可以至此人人可以為堯舜若是言且要設敎在人有所不可到則聖人之語虚設耳敎之而不受則雖强告之無益莊子謂内無受者不入外無正者不行常人敎小童亦可取益絆己不出入一益也授人數次己亦了此文義二益也對之必正衣冠尊瞻視三益也嘗以因己而壊人之才為憂則不敢隋四益也藍田吕氏曰自洒掃應對上達乎天道性命聖人未嘗不竭以敎人但人所造自有淺深故所得亦有小大也仲尼曰吾無隠乎爾又曰有鄙夫問於我我叩其兩端而竭焉然子貢髙弟猶未聞乎性與天道非聖人之有隠而人自不能盡耳如天降時雨百果草木皆甲折其盛衰小大之不齊膏澤豈私於物哉横渠張子敎學者多告以知禮成性變化氣質之道學必如聖人而後己聞者莫不動心有自得之者上蔡謝氏曰横渠敎人以禮為先大要欲得正容謹莭其意謂世人汗漫無守便當以禮為地敎他就上面做工夫然其門人下梢頭溺於刑名度數之間故其學無傳之者明道先生則不然先使學者有知識却従敬入或問横渠敎人以禮為先與明道使學者従敬入何故不同曰既有知識窮得物理却従敬上涵養出來自然是别正容謹莭外面威儀非禮之本又曰横渠以禮敎人明道以忠信為先廣平游氏曰張子厚學成徳尊然猶其秘學不多為人講之其意若曰雖復多聞不務蓄徳徒善口耳而已故不屑與之言明道先生謂之曰道之不明於天下久矣人善其所習自謂至足必欲如孔門不憤不啟不悱不發則師資勢隔而先王之道或幾乎熄矣趨今之時且當随其資而誘之雖識有明暗志有淺深亦各有得焉而堯舜之道庻可馴致子厚用其言故闗中學者躬行之多與洛人並推其所自先生發之也問昔人敎人必因其才之所可而敎之不以其所不可而強之如陳圖南之敎錢若水是也近世師匠不論人材所可只一律以其所見敎之是以有不得盡其材者和靖尹氏曰固是初學之人豈可便説與十分話然亦不可以逆料其才之不可而不以盡告只看他志趣所向氣質如何随量而得也如陳希夷之於錢是因其氣質志趣以教之非謂其才不可也如公孫丑萬章之徒不是不信孟子豈不願為聖人亦豈其才之不可只為他見得未如孟子又志趣不同氣質或異所見膚淺便差七差八謂告之者其言太髙若不可及大率人未嘗有箇入處便語以髙者大者徒令驚疑以止其進學之心固非善敎者然謂其才不可而不以告之得為善敎歟如公孫丑曰道則髙矣羙矣宜若登天然似不可及何不使彼為可幾及而日孳孶也又豈是才不迨者是未見得便知才不堪可乎孟子曰大匠不為拙工改廢繩墨羿不為拙射變其彀率君子引而不發躍如也中道而立能者従之又曰聖人只是引得他只顔子便㑹此意謂夫子循循然善誘人也東萊吕氏曰前軰嘗敎少年母輕議人母輕説事惟退而自修可也學記曰㓜者聽而弗問皆使人自修不敢輕發養成徳器也衣服之制飲食之度字畫之别以至音聲笑語之髙下行步進趨之遲速當一以古人為法古之善敎人者必以此為本所以養誠閑邪而反人道之正也若於此數事少有舛異若不能自克久久之間必至喪志失身朱子曰聖人敎人大槩只是説孝弟忠信日用常行底話人能就上面做将去則心之放者自收性之昏者自著如心性等字到子思孟子方説得詳聖人敎人有定本舜使契為司徒敎以人倫父子有親君臣有義夫婦有别長㓜有序朋友有信夫子對顔淵曰克己復禮為仁非禮勿視非禮勿聽非禮勿言非禮勿動皆是定本自昔聖賢敎人之法莫不使之以孝弟忠信荘敬存養為下學之本而後博觀衆理近思宻察因踐履之實以致其知其發端啟要又皆簡易明白初若無難解者而及其至也則有學者終身思勉而不能至焉盖非思慮揣度之難而躬行黙契之不易故曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也夫聖門之學所以従容積累涵養成就随其淺深無非實學者其以此與聖賢敎人下學上達循循有序故従事其間者博而有要約而不孤無妄意凌躐之弊今之言學者類多反此故其髙者淪於空幻卑者溺於見聞倀倀然未知其将安所歸宿也聖門敎學循循有序無有先求頓悟之理但要持守省察漸久漸熟自然貫通周禮師氏之官以三徳敎國子一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡至徳云者誠意正心端本清源之事道則天人性命之理事物當然之則修身齊家治國平天下之術也敏徳云者彊志力行崇徳廣業之事行則理之所當為日可見之跡也孝徳云者尊祖愛親不㤀其所由生之事知逆惡則以得於己者䔍實深固有以真知彼之逆惡而自不忍為也凡此三者雖曰各以其才品之髙下資質之所宜而敎之然亦未有専務其一而可以為成人者也是以别而言之以見其相須為用而不可偏廢之意盖不知至徳則敏徳者散漫無統固不免乎䔍學力行而不知道之譏然不務敏徳而一於至則又無以廣業而有空虚之弊不知敏徳則孝徳者僅為匹夫之行而不足以通乎神明然不務孝徳而一於敏則又無以立本而有悖徳之累是以兼陳備舉而無所遺此先王之敎所以本末相資精粗兩盡而不倚於一偏也其又曰敎三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長盖徳也者得於心而無所勉者也行則其所行之法而已盖不本之以其徳則無所自得而行不能以自修不實之以其行則無所持循而徳不能以自進是以既敎之以三徳而必以三行繼之則雖其至末至粗亦無不盡而徳之修也不自覺矣然是三者似皆孝徳之行而己至於至徳敏徳則無與焉盖二者之行本無常師必協於一然後有以獨見而自得之固非敎者所得而預言也唯孝徳則其事為可指故又推其類而兼為友順之目以詳敎之以為學者雖或未得於心而事亦可得而勉使其行之不已而得於心焉則進乎徳而無待於勉矣况其又能即是而充之以周於事而沂其源則孰謂至徳敏徳之不可至哉或曰三徳之敎大學之學也三行之敎小學之學也鄉三物之為敎也亦然周人以鄉三物敎萬民而賔興之其徳六曰智仁聖義中和其行六曰孝友睦婣任恤其藝六曰禮樂射御書數是於學者日用起居飲食之間既無事而非學於其羣居蔵修游息之地亦無學而非事至於所以開發其聰明成就其徳業者又皆交相為用而無所偏廢孟子敎人多言理義大體孔子則就切實做工夫處教人學者議論工夫當因其人而示以用功之實不必費辭使人知所適従以入於坦易明白之域可也若泛為端緒使人迫切而自求之適恐資學者之病博文約禮博文功夫雖頭項多然於其中尋将去自将有箇約處聖人敎人有序未有不先於博者孔門三千人顔子固不須説只曽子子貢得聞一貫之誨謂其餘人不善學固可罪然夫子亦不呌來罵一頓敎便省悟則夫子於其門人告之亦不忠矣是夫子亦不善敎人致使宰我冉求之徒後來狼狽也要之無此理只得且待他事事理㑹得了方可就其上欠闕處告語之如子貢事亦不是許多時只教他多學使他枉做功夫直到後來方傳以此秘妙正是待他多學之功到了方可以言此耳敎𨗳後進須是嚴毅然亦須有以興起開發之方得只恁嚴徒拘束之亦不濟事某嘗喜那鈍底人他若是做得工夫透徹時極好却煩惱那敏底只是畧綽㸔過不曽深去思量當下説也理㑹得只是無滋味工夫不耐久敏底人又却用做那鈍底工夫方得南軒之敎人必使之先有以察乎義利之間而後明理居敬以造其極其剖析精明傾倒切至必竭兩端而後已籍溪敎諸生於功課餘暇以片紙書古人懿行或詩文銘賛之有補於人者粘置壁間俾往來誦之咸令精熟學者之志固不可不以逺大自期然觀孔門之敎則其所従言之者至為卑近不過孝弟忠信持守誦習之間而於所謂學問之全體初不察察言之也若其髙苐弟子多亦僅得其一體夫以夫子之聖諸子之賢其於道之全體豈不能一言盡之以相授納而頋為是拘拘者以狹道之傳畫人之志何哉盖所謂道之全體雖髙且大而其實未嘗不貫乎日用細微切近之間茍悦其髙而忽於近慕其大而畧於細則無漸次經由之實而徒有懸相跂望之勞亦終不能以自達矣故聖人之敎循循有序不過使人反而求之至近至小之中博之以文以開其講學之端約之以禮以嚴其踐履之實使之得寸則守其寸得尺則守其尺如是久之日滋月益然後道之全體乃有所鄉望而漸可識有所循習而漸可能自是而往俛焉孳孳斃而後已而其所造之淺深所就之廣狹亦非可以必詣而預期也故夫子嘗謂先難後獲為仁又以先事後得為崇徳盖於此小差則心失其正雖有鑚堅仰髙之志而反為謀利計功之私矣仁何自而得徳何自而崇哉因學者少寛舒意曰公讀書恁地縝宻固是好但恁地逼截成一團此氣象最不好這是偏處如一項人恁地不子細固是不成道理若一向蹙宻下梢却展拓不去明道一見謝顯道曰此秀才展拓得開下梢可望又曰於詞氣間亦見得人氣象如明道語言固無甚激昻㸔來便見寛舒意思龜山人只道恁地寛㸔來不是寛只是不解理㑹得不能理㑹得范純夫語解比諸公説理最平淺但自有寛舒氣象儘好賢軰但知有營營逐物之心不知有真心故識慮皆昏觀書察理皆草草不精眼前易曉者亦㸔不見皆由此心雜而不一故也所以前軰語初學者必以敬曰未有致知而不在敬者今未知反求諸心而胸中方且叢雜錯亂未知所守持此雜亂之心以觀書察理故凡工夫皆従一偏一角做去何緣㑹見得全理某以為諸公莫且收歛身心盡掃雜慮令其光明洞逹方能作得主宰方能見理不然亦終嵗而無成耳天下道理自平易簡直人於其間只是為剖析人欲以復天理敎明白洞達如此而已今不於明白處求却求之於偏旁處縦得些理其能幾何某煞有話要與諸公説只是覺次序未到而今只是面前小小文義尚如此理㑹不透如何説得到其他事這個事須是四方上下小大本末一齊貫穿在這裡一齊理㑹過其操存踐履處固是𦂳要不可間斷至於道理之大原固要理㑹纎悉委曲處也要理㑹制度文為處也要理㑹古今治亂處也要理㑹精粗大小無不當理㑹四邉一切合起工夫無些罅漏東邉見不得西邉須見得這下見不得那下須見得既見得一處則其他處亦可類推而今只従一處去攻擊他又不曽着力濟得甚事這箇須是勇猛奮厲直前不頋做去四方上下一齊著到方有箇入頭孔子曰仁逺乎哉我欲仁斯仁至矣這箇全要人自去做孟子所謂奕秋只是争些子一箇進前要做一箇不把當事某八九嵗時讀孟子到此未嘗不慨然奮發以為為學須如此做工夫當初便有這箇意思如此只是未知得那碁是如何著是如何做工夫自後便不肯休一向要去做工夫今學者不見有奮發意思只是如此悠悠地過今日見他是如此明日見他亦是如此學者悠悠是大病今覺諸公都是進寸退尺每日理㑹些小文義都是輕地拂過不曽動得皮毛上這箇道理規模大體面濶須是四面去包括方無走處今只従一面去又不曽著力如何可得且如曽㸃漆雕開兩處漆雕開事言語少難理㑹曽㸃底須子細㸔他是樂箇甚底是如何地樂不只是聖人説箇事可樂便信著他須是自見得箇可樂底依人口説不得又曰而今持守便打疊敎浄潔㸔文字須着意思索應接事物都要是當四面去討他自有一面通處聖門之教下學上達自平易處講究討論積慮潜心優柔饜飫久而漸有得焉則日見其髙深逺大而不可窮矣程夫子所謂善學者求言必自近易於近者非知言者也亦謂此耳答葉賀孫書曰學者須是理㑹到十分是始得是底直是是非底直是非少間做出便㑹是若依希底也喚作是便了下梢只是非須是要做苐一等人若决是要做苐一等人若才力不逮也只做得苐四五等人今合下便要做苐四五等人説道就他才地如此下梢成甚麽物事又曰須是先理㑹本領端正其餘事物漸漸理㑹到上面若不理㑹本領了假令一你百靈百㑹若有些子私意便粉碎了只是這私意如何卒急除得如顔子天資如此孔子也只敎他克己復禮其餘弟子雖告之不同莫不以此意望之公書所説冉求仲由當初他是只要做到如此聖人敎由求之徒莫不以曽顔望之無奈何他才質只做到這裏如可使治其賦可使為之宰他當初也不止是要恁地又曰胡氏開治道齋亦非獨只理㑹這些如所謂頭容直足容重手容恭許多説話都是本原又曰人須是理㑹身心如一片地相似須是用力子細開墾未能如此只管説種東種西其實種得甚麽物事又曰公今且收拾這心下勿為事物所勝且如一日全不得去講明道理不得讀書只去應事也須使這心常常在這裏若不先去理㑹得這本領只要去就事上理㑹雖是理㑹得許多骨董只是添得許多雜亂只是添得許多驕吝某這説的定是恁地雖孔子復生不能易其説這道理只一而已學問者理㑹文字又却昏了若不去㸔恐又無路可入曰便是難且去㸔聖賢氣象識他一箇規模若欲盡窮天下之理亦甚難且随自家規模大小做去若是迫切求益亦害事豈不是私意今人所以懶未必是真箇怯弱自是先有畏事之心纔見一事便料其難而不為緣先有個畏縮之心所以習成怯弱而不能有所為也問其平生自覺血氣弱日用功夫多只㨂易底事做或尚論人物亦只取其與已力量相近者學之自覺難處進歩不得也曰便當因這易處而益求其所謂難因這近處而益求其所謂遠不可只守這箇而不求進步縦自家力量到那難處不得然不可不勉慕而求之今人都是未到那做不得處便先自懶怯了雖是怯弱然豈可不向前求其難者逺者但求之無有不得若真箇著力求而不得則無如之何也今人做一件沒𦂳要底事也著心去做方始㑹成如何悠悠㑹做得事且如好冩字底人念念在此則所見之物無非是冩字底道理又如賈島學作詩只思推敲兩字在驢上坐把手作推敲勢大尹出有許多車馬人従渠更不見不覺犯了莭只此推敲二字計甚利害他直得恁地用力所以後來做得詩來極是精髙今吾人學問是大小大事却全悠悠若存若亡更不着𦂳用力反不如他人做沒要𦂳底事可謂倒置學如不及猶恐失之此君子所以孜孜焉愛日不倦而競尺寸之隂也今或聞諸生晨起入學未及日中而已散去此豈愛日之意也哉夫學者所以為己而士者或患貧賤勢不得學與無所於學而已勢得學又不為無所於學而猶不勉是亦未嘗有志於學而已矣然此非士之罪也敎不素明而學不素講也今之世父所以詔其子兄所以勉其弟師所以敎其弟子弟子之所以學舎科舉之業則無為也使古人之學止於如此則凡可以得志於科舉斯已耳所以孜孜焉愛日不倦以至乎死而後己果何為而然哉今之士唯不知此以為茍足以應有司之求矣則無事乎汲汲為也是以至於隋遊而不知反終身不能有志於學而君子以為非士之罪也使敎素明於上而學素講於下則士者固将有以用其力而豈有不勉之患哉古之學者八嵗而入小學學六甲五方書記之事十五而入大學學先聖之禮樂焉非獨敎之固将有以養之也盖理義以養其心聲音以養其耳采色以養其目舞蹈降登疾徐俯仰以養其血脈以至於左右起居盤盂几杖有銘有戒其所以養之之具可謂備至爾矣夫如是故學者有成材而庠序有實用此先王之敎所以為盛也自學絶而道喪至今千有餘年學校之官有敎養之名而無敎之養之之實學者挾䇿而相與嬉其間其傑然者乃知以干禄蹈利為事至於語聖賢之餘㫖究學問之本源則㒺乎莫知所以用其心者其規為動息舉無以異於凡民而有甚焉者嗚呼此敎者過也而豈學者之罪哉然君子以為是亦有罪焉耳何則今所以異於古者特聲音采色之盛舞蹈降登疾徐俯仰之容左右起居盤盂几杖之戒有所不及為至推其本則理義之所以養其心者固在也諸君日相與誦而傳之頋不察耳然則此之不為而彼之久為又豈非學者之罪哉君子之學以誠其身非直為觀聽之羙而已古之君子以是行之其身而推之以敎其子弟莫不由此此其風俗所以淳厚而徳業所以崇髙也近世之俗不然自父母所以敎其子弟固已使之假手程文以欺㒺有司矣新學小生自為兒童時習見其父兄之誨如此因恬不為愧而安受其空虚無實之名内以傲其父兄外以驕其閭里終身不知自力以至卒就小人之歸者未必不由此也故為今之父兄有愛其子弟之心者當為求明師良友使之究義理之指歸而習為孝弟馴謹之行以誠其身而已爵禄之不至名譽之不聞非所憂也何必汲汲使之俯心下首務欲因人成事以幸一朝之得而貽終身之羞哉與長子受之書曰早晩受業請益随衆例不得怠慢日間思索有疑用册子随手劄記候見質問不得放過所聞誨語歸安下處思省要切之言逐日劄記歸日要㸔見好文字亦録取歸來不得自擅出入與人往還初到問先生有合見者見之不令見則不必往人來相見亦啟禀然後往報之此外不得出入一步居處須是恭敬不得倨肆惰慢言語須要諦當不得戱笑諠譁凡事謙恭不得尚氣凌人自取耻辱不得飲酒荒思廢業亦恐言語差錯失已忤人尤當深戒不可言人過惡及説人家長短是非有來告者亦勿酧荅於先生之前尤不可説同學之短交游之間尤當審擇雖是同學亦不可無親踈之辨此皆當請於先生聽其所敎大凡敦厚忠信能攻吾過者益友也其謟諛輕薄傲慢䙝狎𨗳人為惡者損友也推此求之亦自合見得五七分更問以審之百無所失矣但恐志趣卑凡不能克己従善則益者不期疏而日逺損者不期近而日親此須痛加檢㸃而矯革之不可荏苒漸習自趍小人之域如此則雖有賢師長亦無救㧞自家處矣見人嘉言善行則敬慕而紀録之見人好文字勝己者則借來熟㸔或傳録之而咨問之思與之齊而後已不拘長少惟善是取以上數條切宜謹守其所未及亦可據此推廣大抵只是勤謹二字循之而上有無限好事吾雖未敢言而竊為汝碩之反之而下有無限不好事吾雖不欲言而未免為汝憂之也盖汝若好學在家足可讀書作文講明義理不待逺離膝下千里従師汝既不能如此即是自不好學已無可望之理然今遣汝者恐汝在家汩於俗務不得専意又父子之間不欲晝夜督責及無朋友聞見故令汝一行汝若到彼能奮然勇為力改故習一味勤謹則吾猶有望不然則徒勞費只與在家一般他日歸來又只是舊時伎倆人物不知汝将何面目歸見父母親戚鄉黨故舊耶念之念之夙興夜寐無添爾所生在此一行千萬努力白鹿洞規父子有親君臣有義夫婦有别長㓜有序朋友有信右五敎之目堯舜使契為司徒敬敷五敎即此是也學者學此而已而其所以學之之序亦有五焉其别如此慱學之審問之慎思之明辨之篤行之右為學之序學問思辨四者所以窮理也若夫䔍行之事則自修身以至於處事接物亦各有要其别如左言忠信行䔍敬懲忿窒慾遷善改過右修身之要正其義不謀其利明其道不計其功右處事之要已所不欲勿施於人行有不得反求諸已右接物之要熹竊觀古昔聖賢所以敎人為學之意莫非使之講明義理以修其身然後推以及人非徒欲務記覽為詞章以釣聲名取利禄而已也今人之為學者則既反是矣然聖賢所以敎人之法具存於經有志之士固當熟讀深思而問辨之茍知其理之當然而責其身以必然則夫規矩禁防之具豈待他人設之而後有所持循哉近世於學有規其待學者為已淺矣而其為法又未必古人之意也故今不復以施於此堂而特取凡聖賢所以敎人為學之大端條列如右而揭之楣間諸君其相與講明遵守而責之於身焉則夫思慮云為之際其所以戒謹而恐懼者必有嚴於彼者矣其有不然而或出於此言之所棄則彼可謂規者必将取之固不得而畧也諸君其亦念之哉増損吕氏鄉約凡鄉之約四一曰徳業相勸二曰過失相規三曰禮俗相交四曰患難相恤衆推一人有齒徳者為都約正有學行者二人副之約中月輪一人為直月都副正不與之置三籍凡碩入約者書於一籍徳業可觀者書於一籍過失可規者書於一藉直月掌之月終則以告於約正而授於其次徳業相勸徳謂見善必行聞過必改能治其身能治其家能事父兄能敎子弟能御童僕能肅政教能事長上能睦親故能擇交遊能守㢘介能廣施恵能受寄託能救患難能導人為善能規人過失能為人謀事能為衆集事能解鬭争能决是非能興利除害能居官舉職業謂居家則事父兄敎子弟待妻妾在外則事長上接朋友敎後生御童僕至於讀書治田營家濟物畏法令謹租賦好禮樂射御書數之類皆可為之非此之類皆為無益右件徳業同約之人各自進修互相勸勉㑹集之日相與推舉其能者書於籍以警其不能者過失相規過失謂犯義之過六犯約之過四不修之過五犯義之過一曰酗博鬬訟酗謂縦酒喧競博謂賭博財物鬬謂闘敺罵詈訟謂告人罪惡意在害人誣賴争訴得已不已若事于負累及為人侵損而訴之者非二曰行止踰違踰禮違法衆惡皆是三曰行不恭遜侮慢齒徳者持人短長者恃強凌人者知過不改聞諫愈甚者四曰言不忠信或為人謀事䧟人於惡或與人要約退即背之或妄説事端熒惑衆聴者五曰造言誣毁誣人過惡以無為有以小為大面是背非或作嘲咏匿名文書及發揚人之私隠無状可求及喜談人之舊過者六曰營私太甚與人交易傷於掊克者専務進取不恤餘事者無故而好干求假貸者受人寄託而有所欺者犯約之過一曰徳業不相勸二曰過失不相規三曰禮俗不相成四曰患難不相恤不修之過一曰交非其人所交不限士庶但凶惡及游惰無行衆所不齒者而已朝夕與之游處則為交非其人若不得己而暫往還者非二曰游戯怠惰游謂無故出入及謁見人止務閑適者戲謂游笑無度及意在侵侮或馳馬擊鞠而不賭財物者怠惰謂不修事業及家事不治門庭不潔者三曰動作無儀謂進退太踈野及不恭者不當言而言及當言而不言者衣冠太華飾及全不完整者不衣冠而入街市者四曰臨事不恪主事廢忘期㑹後時臨事怠慢者五曰用度不莭謂不計有無過為多費者不能安貧非道營求者右件過失同約之人各自省察互相規戒小則宻規之大則衆戒之不聽則㑹集之日直月以告於約正約正以義理誨諭之謝過請改則書籍於俟其争辨不服與終不能改者皆聽其出約以禮俗相交禮俗之交一曰尊㓜軰行三曰造請拜揖三曰請召送迎四曰慶弔贈遺尊㓜軰行凡五等曰尊者謂長已己三十嵗以上在父母者曰長者謂長於已十嵗以上在兄行者曰敵者謂年上下不滿十嵗者長者謂稍長㓜者謂稍㓜曰少者謂少於已十嵗以下者曰㓜者謂少於已二十嵗以下者造請拜揖凡三條曰凡少者㓜者於尊者長者嵗首冬至四孟月朔辭見賀謝皆為禮見皆具門状用幞頭公服腰帯龍笏無官具名紙用幞頭襴衫腰帶繫鞋唯四孟通用帽子皂衫腰帯凡當行禮而有恙故皆先使人白之或遇雨雪則尊長先使人來喻止來者此外候問起居質疑白事及赴請召皆為燕見深衣涼衫皆可尊長令免即去之尊長受謁不報嵗首冬至具已名榜子令子弟報之如其服長者嵗首冬至具榜子報之如其服餘令子弟以已名榜子代行凡敵者嵗首冬至辭見賀謝相往還門狀名紙同上唯止服㡌子凡尊者長者無事而至少者㓜者之家唯所服深衣涼衫道服背子可也敵者燕見亦然曰凡見尊者長者門外下馬俟於外次乃通名凡往見人入門必問主人食否有他客否有他幹否度無所妨乃命展刺有妨則少俟或且退後皆放此主人使将命者先出迎客客趨入至廡間主人出降階客趨進主人揖之升堂禮見四拜而後坐燕見不拜旅見則旅拜少者㓜者自為一列幼者拜則跪而扶之少者拜則跪扶而荅其半若尊者長者齒徳殊絶則少者幼者堅請納拜尊者許則立而受之長者許則跪而扶之拜訖則揖而退主人命之坐則致謝訖揖而坐退凡相見主人語終不更端則告退或主人有倦色或方幹事而有所俟者皆告退可也後皆倣此則主人送於廡下若命之上馬則三辭許則揖而退出大門乃上馬不許則従其命凡見敵者門外下馬使人通名俟於廡下或㕔側禮見則再拜稍少者先拜旅見則特拜退則主人請就階上馬徒行則主人逆於門外凡少者以下則先遣人通名主人具衣冠以俟客入門下馬則趨出迎揖升堂來報禮則再拜謝客止之則止退則就階上馬客徒行則迎於大門之外送亦如之仍隨其行數歩揖之則止望其行逺乃入曰凡遇尊長於道皆徒行則趨進揖尊長與之言則對不則立於道側以俟尊長已過乃揖而行或皆乘馬於尊者則回避之於長者則立馬道側揖之俟過乃揖而行若已徒行而尊長乘馬則回避之凡徒行遇所識乘馬皆倣此若已乘馬而尊長徒行望見則下馬前揖已避亦然過既逺乃上馬若尊長令上馬則固辭遇敵者皆乘馬則分道相揖而過彼徒行而不及避則下馬揖之過則上馬遇少者以下皆乘馬彼不及避則揖之而過彼徒行不及避則下馬揖之於幼者則不必下可也請召迎送凡四條曰凡請尊長飲食親往投書禮薄則不必書專召他客則不可兼召尊長既來赴明日親往謝之召敵者以書簡明日交使相謝召少者用客目明日客親往謝曰凡聚㑹皆鄉人則坐以齒非士類則不若有親則别序若有他客有爵者則坐以爵不相妨者猶以齒若有異爵者雖鄉人亦不以齒異爵謂命士大夫以上今陞朝官是若特請召或迎勞出餞皆以専召者為上客如婚禮則姻家為上客皆不以齒爵為序曰凡燕集初坐别設卓子於兩楹間置大盃於其上主人降序立於卓東西向上客亦降序立於卓西東向主人取盃親洗上客辭主人置盃卓子上親執酒斟之以器授執事者遂執盃以獻上客上客辭之復置卓子上主人西向再拜上客東向再拜興取酒東向跪祭遂飲以盃授賛者遂拜主人答拜者少者以下為客飲畢而拜則主人跪受如常上客酢主人如前儀主人乃獻衆賔如前儀唯獻酒不拜若衆賔中有齒爵者則特獻如上客之儀不酢若婚㑹姻家為上客則雖少亦答其拜曰凡有逺出逺歸者則送迎之少者幼者不過五里敵者不過三里各期㑹於一處拜揖如禮有飲食則就飲食之少者以下俟其既歸又至其家省之慶弔贈遺凡四條曰凡同約有吉事則慶之冠子生子預薦登第進官之屬皆可賀婚禮雖曰不賀然禮有曰賀娶妻者葢但以物助其賔容之費而已有凶事則弔之䘮𦵏水火之類每家只家長一人與同約者俱往其書問亦如之若家長有故或與所慶弔者不相接則其次者當之曰凡慶禮如常儀有贈物用幣帛酒食果實之屬衆議量力定數多不過三五千少至一二百如情分厚薄不同則從其厚薄或其家力有不足則同約為之借助器用及為營幹曰凡弔禮聞其初䘮聞䘮同未易服則率約者深衣而往哭弔之凡弔尊者則為首者致辭而旅拜敵以下則不拜主人拜則荅之少者以下則扶之不識生者則不弔不識死者則不哭且助其凡百經營之事主人既成服則相率素幞頭素襴衫素帯皆以白生紗絹為之具酒果食物而往奠之死者是敵以上則拜而奠以下則奠而不拜主人雖不易服則亦不易服主人不哭則亦不哭情重則主人不變不哭亦變而哭之賻禮用錢帛衆議其數如慶禮及𦵏又相率致賵俟發引則素服而送之賵如賻禮或以酒食犒具役夫及為之幹事及卒哭及小祥及大祥皆常服弔之曰凡䘮家不可具酒果衣服以待弔客弔客亦不可受曰凡聞所知之喪或逺不能往則遣使致奠就外次衣弔服再拜哭而送之唯至親䔍友為然過期年則不哭情重則哭其墓右禮俗相交之事直月主之有期日者為之期日當紏集者督其違慢凡不如約者以告於約正而詰之且書於籍患難相恤患難之事七一曰水火小則遣人救之甚則親往多率人救且弔之二曰盗賊近者同力追捕有力者為告之官司其家貧則為之助出募賞三曰疾病小則遣人問之甚則為訪醫藥貧則助其養疾之費四曰死䘮闕人則助其幹辦乏財則賻贈借貸五曰孤弱孤逍無依者若能自贍則為之區處稽其出入或聞於官司或擇人教之及為求婚姻貧者協力濟之無令失所若有侵欺之者衆人力為之辨理若稍長而放逸不檢亦防察約束之無令䧟之於不義六曰誣枉有為人誣枉過惡不能自仲者勢可以聞於官府則為言之有方畧可以解救則為解之或其家因而失所者衆共以財濟之七曰貧乏冇安貧守分而生計大不足者衆以財濟之或為之假貸置産以嵗月償之右患難相恤之事凡當救恤者者其家告於約長急則同約之近者為之告約正命直月徧告之且為之紏集而程督之凡同約者財物器用車馬人僕皆有無相假若不急之用及有所妨者則不必借可借者不借及踰期不還及損壊借物者論如犯約之過書於籍隣里或有緩急雖非同約而先聞知者亦當救助或不能救助則為之告於同約而謀之有能如此者則亦書其善於籍以告鄉人以上鄉約四條本出藍田吕氏今取其他書及附已意稍増損之以通於今而又為月旦集㑹讀約之禮如左方曰凡預約者月朔皆㑹朔日有故則前期三日别定一日直月報㑹者所居逺者唯赴孟朔又逺者嵗一再至可也直月率錢具食每人不過一二百孟朔其酒果三行麵飯一㑹餘月則去酒果或直設飯可也㑹日夙興約正副正直月本家行禮若㑹族罷皆深衣俟於鄉校設先聖先師之像於北壁下無鄉校則别擇一寛閑處先以長少序拜於東序凡拜尊者跪而扶之長者跪而荅其半稍長者俟其俯伏而荅之同約者如其服而至有故則先一日使人告於直月同約之家子弟雖未能入籍亦許隨衆序拜未能序拜亦許侍立觀禮但不與飲食之㑹或别率錢畧設㸃心於他處俟於外次既集以齒為序立於門外東向北上約正以下出門西向南上約正與齒最尊者正相向揖迎入門至庭中北面皆再拜約正升堂上香降與在位者皆再拜約正升降皆自阼階揖分東西向立如門外之立約正三揖客三讓約正先升客従之約正以下升自阼階餘人升自西階皆北面立約正以下西上餘人東上約正少進西向立副正直月次其右少退直月引尊者東向南上長者西向南上皆以約正之年推之後放此西向者其位在約正之右少進餘人如故約正再拜凡在位者皆再拜此拜尊者尊者受禮如儀唯以約正之年為受禮之莭退北壁下南向東上立直月引長者東靣如初禮退則立於尊者之西東上此拜長者拜時唯尊者不拜直月又引稍長者東向南上約正與在位者皆再拜稍長者荅拜退立於西序東向北上此拜稍長者拜時尊者長者不拜直月又引稍少者東面北上拜約正約正答之稍少者退立於稍長者之南直月以次引少者東北向西北上拜約正約正受禮如儀拜者復位又引幼者亦如之既畢揖各就次同列未講禮者拜於西序如初頃之約正揖就坐約正坐堂東南向約中年最尊者坐堂西南向副正直月次約正之東南向西上餘人以齒為序東西相向以北為主若有異爵者則坐于尊者之西東向東上直月抗聲讀約一過副正推説其意未達者許其質問於是約中有善者衆推之有過者直月糾之約正詢其實状於衆無異辭乃命直月書之直月遂讀記羙一過命執事以記過籍徧呈在坐各黙觀一過既畢乃食食畢少休復㑹於堂上或説書或習射講論従容講論須有益之事不得輙道神怪邪僻悖亂之言及私議朝廷州縣政事得失及揚人過惡違者直月糾而書之至晡方退南軒張氏曰二程先生所以敎學者不越於居敬窮理二事取其書反覆讀之則可以見盖居敬有力則其所窮者愈精窮理浸明則其所居者益有地二者實互相發也謂學者曰謹飭則有餘且放敎胸襟開闊又曰不要強自開闊只涵泳義理便自然開闊去勉齋黄氏曰孔孟之敎人曰守死善道曰舎生取義夫死生亦大矣至於道義之可樂則生不足戀而死不足頋生不足戀而死不足頋則於聖賢之道如飢者不㤀食渴者不㤀飲行者不忘歸病者不㤀起猶未足以諭其意也讀書且摸得心路直方有商量每學者來且敎他磨勵了箇心歸去譬如入持一箇鑿石錐來如何鑚得入且寄他兩面磨得恁地十分尖利㸔去甚處都破開了他便自㑹去尋揣得不恁地見聞儘多也不濟事學者初且令識得性情部伍認得虚靈體面庶幾於讀書存養不至全無著落然學者之患在於志卑氣弱度量淺狹規模𥚹陋則雖與之細講恐終無任道之意故須是有大規模又有細工夫方且成箇人物故常以此提撕之恐中庸所謂髙明中庸廣大精微亦此意也問明道以記誦博識為玩物䘮志謝顯道聞之不服是邪非邪潜室陳氏曰明道是明睿内照故書無不記却不是記問上做工夫此語正欲㸃化顯道惜其為記問所障領㑹不去西山真氏曰孔子答門人問仁孝皆是隨其資質而成就之聖人之敎人猶化工之生物因材而䔍於此可見魯齋許氏曰聖人是因人心固有良知良能上扶接将去他人心本有如此意思愛親敬兄藹然四端隨感而見聖人只是與發達推廣就他元有的本領上進将去不是将人心上元無的強安排與他後世却将良知良能去斵喪了却将人性上元無的強去安排裁接如雕蟲小技以此學校廢壊壊却天下人才及去做官於世事人情殊不知逺近不知何者為天理民彛似此民何由嚮方如何養得成風俗他於風化人倫本不曽學他家本性己自壊了如何化得人稱人之善宜就迩上言議人之失宜就心上言盖人之初心本自無惡特以利欲驅之故失正理其始甚微其終至於不可救仁人雖惡其去道之逺然亦未嘗不愍其昏暗無知誤至此極也故議之必従始失之地言之使其人聞之足以自新而無怨而吾之言亦自為長厚切要之言善迹既著即従而羙之不必更求隠微主為一定之論在人聞則樂於自勉在我則為有實驗而又無他日之弊也善惡消長善少惡多則長其善而不敢攻其惡善多惡少然後敢攻治病亦然痼病之人且當扶䕶元氣至於聖人於門弟子敎養之際亦如此敎人使人必先使有耻無耻則無所不為既知此又湏養䕶其知恥之心督責之使有所畏榮耀之使有所慕督責榮耀皆非所以為敎也到無所畏不知慕時都行将不去性理大全書卷五十一

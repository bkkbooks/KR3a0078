front:
  text: 御製性理大全序
  hash: sha256:bb199bdee8839906e27fad8378cc282422fc10e19cefd6218f434fd359486e22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0078_WYG_000-1a, image: WYG0710/WYG0710-0001a.png}
body:
  text: 朕惟古昔聖王所以繼天立極而君師萬民者不徒在乎治法之明備而在乎心法道法之精微也執中之訓肇自唐虞帝王之學莫不由之言心則曰人心惟危道心惟微言性則曰若有恆性克綏厥猷惟后盖天性同然之理人心固有之良萬善所從出焉本之以建皇極則為天德王道之純以牖下民則為一道同風之治欲修身而登上理舎斯道何由哉朕荷太祖太宗積累之休纘承世祖章皇帝鴻業夙夜祗懼嘉與海内期登隆平每思二帝三王之治本於道二帝三王之道本於心辨析心性之理而羽翼六經發揮聖道者莫詳於有宋諸儒迨明永樂間命儒臣纂集性理大全一書朕常加繙閲見其窮天地隂陽之藴明性命仁義之旨揭主敬存誠之要微而律數之精意顯而道統之源流以至君德聖學政教紀綱靡不大小兼該而表裏咸貫洵道學之淵藪致治之凖繩也嵗月既久版籍殘缺特命禮臣重加補訂以備觀覽爰製序於卷端朕方精思格言探討緒論以遐稽乎古帝王心法道法之微亦欲天下臣民究心兹編思降衷之理安物則之恆庻幾咸盡其性以復臻乎唐虞三代熙皥之治云爾康熙十二年四月初九日性理大全書一先儒姓氏周子惇頤茂叔濂溪程子顥頤伯淳正叔明道伊川邵子雍夫堯康節張子載厚横渠子安定胡氏瑗之翼涑水司馬氏光實温公君眉山蘓氏軾轍子瞻子由東坡頴濱山谷黄氏庭堅魯直滎陽吕氏希哲原明嵩山晁氏以道説之王氏巖叟元城劉氏良世器之廣平㳺氏酢夫定上蔡謝氏良佐顯道鎦氏質夫李氏端伯藍田吕氏大忠大臨進伯與叔京兆吕氏大鈞和叔蘓氏昞明季范氏育龜山楊氏時立中河東侯氏仲良師聖壽安張氏繹叔思和靖尹氏焞明彦華陽范氏祖禹淳夫河間劉氏立之安禮永嘉劉氏安節元承河南朱氏校庭光東平馬氏伸邵氏伯温河間邢氏恕叔和武夷胡氏安國康侯文定致堂胡氏寅仲明五峯胡氏宏仲仁陳氏恬易叔陳氏淵馮氏忠恕祁氏寛吕氏稽中吕氏堅中吕氏本中章氏憲張氏崏歐陽氏棐豫章羅氏仲素延平李氏侗中愿韋齋朱氏松年喬屛山劉氏子翬朱子熹晦晦菴元樂菴李氏衡平多南軒張氏栻夫敬象山陸氏九淵子静黙齋㳺氏九言東萊吕氏祖謙伯恭勉齋黄氏榦卿直三山陳氏祥道雲莊劉氏爚伯晦西山蔡氏元定季通節齋蔡氏淵静伯九峯蔡氏沈黙仲觀物張氏行成文饒北溪陳氏淳卿安果齋李氏方子正叔潛室陳氏填之器盤澗李氏銖重叔北山陳氏孔碩膚仲范陽張氏九成子韻廖氏子晦呉氏夀昌山陽度氏正善性慈湖楊氏簡仲敬西山真氏德秀景元鶴山魏氏華父了翁平菴項氏安世平甫彭山長庚祝氏涇進齋徐氏幾與子思齋翁氏泳叔永覺軒蔡氏模覺仲萍鄉胡氏安之叔器天台謝氏無楙平巖葉氏采圭仲雙峯饒氏魯元仲楊氏復李氏士英建安熊氏剛大勿軒臧氏格孟氏康魯齋彭氏習軒呉氏庸齋許氏仲翔長樂陳氏櫟鍾氏過黄氏巖孫黄氏瑞節謝氏方叔魯齋許氏衡仲平玉齋胡氏方平董氏訒呉郡李氏韶陳氏協雙湖胡氏一桂庭芳髙氏鄭氏周氏坦劉氏垓孫劉氏璋臨川呉氏澄清幼草廬李氏希濂牧菴姚氏燧元氏明善邵菴虞氏集生伯揭氏徯斯古洲馬氏耶律氏有尚圭齋歐陽氏𤣥功元陳氏剛黃氏溍卿晉性理大全書目錄卷一太極圗卷二通書一卷三通書二卷四西銘卷五正䝉一卷六正蒙二卷七皇極經世書一卷八皇極經世書二卷九皇極經世書三卷十皇極經世書四卷十一皇極經世書五卷十二皇極經世書六卷十三皇極經世書七卷十四易學啟䝉一卷十五易學啟䝉二卷十六易學啟蒙三卷十七易學啟䝉四卷十八家禮一卷十九家禮二卷二十家禮三卷二十一家禮四卷二十二律吕新書一卷二十三律吕新書二卷二十四洪範皇極内篇一卷二十五洪範皇極内篇二卷二十六理氣一總論太極天地天度厯法附卷二十七理氣二天文日月星辰雷電風雨雪雹霜露陰陽五行時令地理潮汐附卷二十八鬼神總論論在人鬼神兼精神魂魄論祭祀祖考神祗論祭祀神祗論生死卷二十九性理一性命性人物之性卷三十性理二氣質之性卷三十一性理三氣質之性命才附卷三十二性理四心卷三十三性理五心性情定性情意志氣志意思慮附卷三十四性理六道理徳卷三十五性理七仁卷三十六性理八仁義仁義禮智卷三十七性理九仁義禮智信誠忠信忠恕恭敬卷三十八道統聖賢總論孔子顔子曾子子思孟子孔孟門人卷三十九諸儒一周子二程子張子邵子卷四十諸儒二程子門人羅從彦李侗胡安國子寅宏附卷四十一諸儒三朱子張栻卷四十二諸儒四吕祖謙陸九淵朱子門人眞德秀魏華父許衡呉澄卷四十三學一小學總論為學之方卷四十四學二總論為學之方卷四十五學三總論為學之方卷四十六學四存養持敬附卷四十七學五存養持敬静省察卷四十八學六知行言行附致知卷四十九學七力行克巳改過雜論處心立事附卷五十學八力行理欲義利君子小人之辨論出處卷五十一學九敎人卷五十二學十人倫師友附卷五十三學十一讀書法卷五十四學十二讀書法讀諸經法論解經讀史附卷五十五學十三史學字學科舉之學卷五十六學十四論詩論文卷五十七諸子一老子列子莊子墨子管子孫子孔叢子申韓荀子董子卷五十八諸子二揚子文中子韓子歐陽子蘇子王安石附卷五十九歴代一唐虞三代春秋戰國秦卷六十歴代二西漢卷六十一歴代三西漢卷六十二歴代四東漢三國卷六十三歴代五晉唐卷六十四歴代六五代宋卷六十五君道君徳聖學儲嗣君臣臣道卷六十六治道一總論禮樂宗廟卷六十七治道二宗法謚法封建學校用人卷六十八治道三人才求賢論官莅政附諫諍法令賞罰卷六十
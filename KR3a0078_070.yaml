body:
  text: 性理大全書卷七十詩古選乾坤吟邵子用九見羣龍首能出庶物用六利永貞因乾以為利四象以九成遂為三十六四象以六成遂成二十四如何九與六能盡人間事皇極經世一元吟天地如蓋軫覆載何髙極日月如磨蟻往來無休息上下之歲年其數難窺測且以一元言其理尚可識一十有二萬九千餘六百中間三千年迄今之陳迹治亂與廢興著見於方䇿吾能一貫之皆如身所歷觀物詩地以靜而方天以動而圓既正方圓體還明動靜權靜久必成潤動極遂成然潤則水體具然則火用全水體以器受火用以薪傳體在天地後用起天地先熊氏剛大曰此用字妙用之用如所謂沖漠無朕萬象森然已具也此篇論隂陽動靜之理偶得吟日為萬象精人為萬物靈萬象與萬物由天然後生言由人而信月由日而明由人與由日何嘗不太平心安吟心安身自安身安空自寬心與身俱安何事能相干誰謂一身小其安若泰山誰謂一室小寬如天地間答人書意仲尼言正性子輿言踐形二者能自得殆不為虛生所交若以道所感若以誠雖三軍在前而莫得之凌此日不再得示學者龜山楊氏此日不再得頺波注扶桑熊氏剛大曰此言光隂之易過也蹮蹮黃小羣唐食貨志云人始生為黃四嵗為小毛髮忽已蒼願言媚學子共惜此日光術業貴及時勉之在青陽行矣慎所之戒哉畏迷方舜跖善利間所差亦毫芒富貴如浮雲茍得非所臧貧賤豈吾羞逐物乃自戕胼胝奏艱食一瓢甘糟粳所逄義適然未殊行與藏熊氏剛大曰道行則為禹不行則為顔所異者時不異者理斯人已云沒簡編有遺芳晞顔亦顔徒要在用心剛譬猶千里馬駕言勿倣徨驅馬日云逺誰謂阻且長末流學多岐倚門誦韓莊出入四寸間雕鐫事辭章學成欲何用奔趨利名場挾䇿博簺遊異趣均亡羊熊氏剛大曰挾簡䇿以讀書志在圖名之人與博奕為事以圖利之人其志趣雖不同均為失其所守言臧榖二人牧羊臧貪書榖貪博俱亡其羊我懶心意衰撫事多遺忘念子方妙齡壯圖宜自強至寶在髙深不憚勤梯航熊氏剛大曰天理髙深須強力以求之也芒芒定何求所得安能常萬物偹吾身求得舍即亡雞犬猶知尋自棄良可傷欲為君子儒勿謂豫言狂熊氏剛大曰此篇論為學當在少年能擇向方送元晦南軒張氏君侯起南服豪氣蓋九州頃登文石陛忠言動宸旒坐令聲利場縮頸仍包羞却來卧衡門無愧自日休盡收湖海氣仰希洙泗遊不逺關山阻為我再月留遺經得紬繹心事兩綢繆超然會太極眼底無全牛惟兹斷金友出處寧殊謀南山對床語匪為林壑幽白雲正在望歸𬒮風颼颼朝來出别語已抱離索憂妙質貴強矯精微更窮搜毫釐有不察體用豈周流驅車萬里道中途可停輈勉哉共無斁邈矣追前修熊氏剛大曰此篇述朋友相得之情感興二十首朱子昆侖大無外磅礴下深廣隂陽無停機寒暑互來往皇羲古聖神妙契一俯仰不待窺馬圖人文已宣朗渾然一理貫昭晰非象罔珍重無極翁為我重指掌熊氏剛大曰此篇論天地隂陽寒署運行之氣有理融貫其間以為之王吾觀隂陽化升降八紘中前瞻既無始後際那有終至理諒斯存萬世與今同誰言混沌死幻語驚盲聾熊氏剛大曰此篇論隂陽一太極人心妙不測出入乘氣機凝冰亦焦火淵淪復天飛至人秉元化動靜體無違珠藏澤自媚玊韞山含輝神光燭九垓玄思徹萬微塵編今寥落歎息將安歸熊氏剛大曰此篇論人心出入之機靜觀靈臺妙萬化從此出云胡自蕪穢反受衆形役厚味分朵頥熊氏剛大曰朵垂貌頥口旁也言欲食妍姿坐傾國崩奔不自悟馳騖靡終日君看穆天子萬里窮轍迹不有祈招詩徐方御宸極熊氏剛大曰此篇論人心陷溺之過所舉穆天子之事特借此以喻人心之馳騖流蕩若不知止則心失主宰而物欲反據而為之主矣此六經之比也涇舟膠楚澤熊氏剛大曰此言周室衰替之由蓋由昭王無道南遊於楚濟漢船人惡之即涇水之舟膠合以進至中流而膠液遂沉沒於楚江焉周綱己陵夷况復王風降故宫黍離離玄聖作春秋哀傷實在兹祥麟一以踣反袂空漣洏漂淪又百年僣侯荷爵圭王章久矣喪何復嗟嘆為馬公述孔業託始有餘悲拳拳信忠厚無乃迷先機熊氏剛大曰此篇論周室君臣之失東京失其御刑臣弄天綱西園植姦穢五族沉忠良青青千里草乘時起陸梁當途轉凶悖炎精遂無光桓桓左將軍仗鉞西南強伏龍一奮躍鳯雛亦飛翔祀漢配彼天出師驚四方天意竟莫回王圖不偏昌晉史自帝魏後賢盍更張世無魯連子千載徒悲傷熊氏剛大曰此萹論漢室君臣之失秉史筆者不能黜魏而尊蜀晉陽啓唐祚王明紹巢封垂統己如此繼體宜昏風塵聚瀆天倫牝晨司禍凶乾綱一以墜天樞復崇崇淫毒穢宸極虐熖燔蒼穹向非狄張徒誰辦取日功云何歐陽子秉筆迷至公唐經亂周紀凡例孰豈容侃侃范太史受説伊川翁春秋二三策萬古開羣蒙熊氏剛大曰此萹論唐室君臣之失秉史筆者不能黜武后而尊唐朱光遍炎宇微隂眇重淵寒威閉九野陽德昭窮泉文明昧謹獨昏迷有開先幾微諒難忽善端本綿綿掩身事齋戒及此防未然閉關息商旅絶彼柔道牽熊氏剛大曰此萹論姤乃隂之始復乃陽之始微月墜西嶺爛然衆星光明河斜未落斗柄低復昂感此南北極樞軸遙相當太一有常居仰瞻獨煌煌中天照萬國三宸環侍旁人心要如此寂感無邉方熊氏剛大曰此萹論天之北極則人心之太極放勳始欽明南面亦恭已大哉精一傳萬世立人紀猗歟嘆日躋穆穆歌敬止戒獒光武烈待旦起周禮恭惟千載心秋月照寒水魯叟何常師刪述存聖軌熊氏剛大曰此萹言堯舜禹湯文武周公傳心之法在乎敬吾聞庖羲氏爰初闢乾坤乾行配天德坤布協地文仰觀玄渾周一息萬里奔俯察方儀靜頺然千古存悟彼立象意契此入德門勤行當不息敬守思彌敦熊氏剛大曰此萹論易首乾坤庖羲畫此以示後世君子當體乾坤以進德大易圖象隱詩書簡編訛禮樂矧交喪春秋魚魯多瑶琴空寶匣絃絶將如何興言理餘韻龍門有遺歌熊氏剛大曰此萹論六經散失已久千載之下惟有程伊川能繼孔子六經之絶學顔生躬四勿會子日三省中庸首謹獨衣錦思尚絅偉哉鄒孟氏雄辨極馳騁操存一言要為爾挈裘領丹青著明訓今古垂煥炳何事千載餘無人踐斯境熊氏剛大曰此萹論顔曾思孟傳孔子之道亦惟能潛其心又重嘆後人之不能元亨播羣品利貞固靈根非誠諒無有五性實斯存世人逞私見鑿智道彌昏未若林居子幽探萬化原熊氏剛大曰此篇言異端詞章之學害道妨教故先發此以明吾道之本原也飄飄學仙侣遺世在雲間盜啓玄命祕竊當生死關金鼎蟠龍虎三年飬神丹刀圭一入口白日生羽翰我欲往從之脫屣諒非難但恐逆天理倫生詎能安熊氏剛大曰此萹論仙學之失西方論緣業卑卑喻羣愚流傳世代久梯接凌空虛顧瞻指心性名言超有無捷徑一以開靡然世爭趨號空不踐實躓彼荆榛塗誰哉繼三聖為我焚其書熊氏剛大曰此篇論佛學之非聖人司教化黌序育羣材因心有明訓善端得深培天序既昭陳人文亦褰開云何百代下學絶教養乖羣居競葩藻爭先冠倫魁淳風久淪喪擾擾胡為哉熊氏剛大曰此萹論大學之教蓋道者文之本文者道之末古人當於本者加意故設學教育惟以天理人倫為重文藝之間特餘力遊意云耳後世於末者用工故設學教育惟以文詞葩藻為尚天理人倫曾不講明此朱子所以深嘆也童蒙貴養正遜弟乃其方雞鳴咸盥櫛問訊謹暄涼奉水勤播灑擁篲周室堂進趨極虔恭退息常端莊劬書劇嗜炙見惡逾探湯庸言戒粗誕時行必安詳聖途雖云逺發軔且勿忙十五志於學及時起髙翔熊氏剛大曰此萹論小學之教哀哉牛山木斧斤日相尋豈無萌蘖生牛羊復來侵恭惟皇上帝降此仁義心物欲互攻奪孤根孰能任反躬艮其背肅容正冠襟保養方自此何年秀穹林熊氏剛大曰此萹借牛山之木形容仁義之心所當保養玄天幽且默仲尼欲無言動植各生遂德容自清溫彼哉夸毗子呫囁徒啾喧但騁言辭好豈知神鑒昏曰豫昧前訓坐此枝葉繁發憤永刋落竒功收一原熊氏剛大曰此萹論天道不言聖人無言後世多言之弊酬南軒昔我抱冰炭從君識乾坤始知太極藴要眇難名論謂有寧有迹謂無復何存惟應酬酢處特達見本根萬化自此流千聖同兹源曠然逺莫禦愓若初不煩云何學力微未勝物欲昏涓涓始欲達已被黃流吞豈知一寸膠救此千丈渾勉哉共無斁此語期相敦熊氏剛大曰此篇論太極之理萬化自出觀物二首魯齋許氏物産天地間精粗據兩偏兩偏互倚伏一氣常周旋善善不可緩安安貴能遷人心喻此意自當心乾乾事物形雖同中間勢各異推遷無寧期倐忽幾易位智者識幾微安焉處平昜人生貴無私莫使聞見纍律復卦詩邵子冬至子之半天心無改移一陽方動處萬物未生時玄酒味方淡大音聲正希此言如不信更請問庖犧熊氏剛大曰此萹論隂剝於坤陽萌於復坤復中間為無極天之心尚未變動天道吟天道不難知人情未易窺雖聞言語處更看作為時隱几功夫大揮戈事業卑春秋賴乘興出用小車兒為善吟人之為善事善事義當為金石猶能動鬼神其可欺事須安義命言必道肝脾莫問身之外人知與不知間吟忽忽間拈筆時時樂性靈何嘗無對景未始便忘情句會飄然得詩因偶爾成天機難狀處一點自分明觀物萬物偹吾身身貧道未貧觀時見物理主敬得天真心爽星辰夜情欣草木春自憐斫喪後能作太平人仁術在昔賢君子存心每欲仁求端從有術及物豈無因惻隱求何自虛明覺處真擴充從此念福澤遍斯民入井愴惶際牽牛觳觫辰向來看楚越今日偹吾身聞善決江河大舜深山日靈襟保太和一言分善利萬里決江河可欲非由外惟聰不在他勇如爭赴壑進豈待盈科學海功難並防川患益多何人親祖述耳順肯同波秋日程子間來無事不從容睡覺東窗日已紅萬物靜觀皆自得四時佳興與人同道通天地有形外思入風雲變態中富貴不淫貧賤樂男兒到此是豪雄熊氏剛大曰此萹形容心體廣大超乎天地萬物之上外物不足為纍和堯夫打乖吟打乖非是要安身道大方能混世塵陋巷一生顔氏樂清風千古伯夷貧客求墨妙多攜卷天為詩豪剩借春儘把笑談親俗子德言猶足畏鄉人熊氏剛大曰此萹形容堯夫居貧樂道雖混處塵俗而至德之容自使人畏和堯夫首尾吟先生非是愛吟詩為要形容至樂時醉裏乾坤都寓物間來風月更輸誰死生有命人何與消長隨時我不悲直到希夷無事處先生非是愛吟詩龍門道中邵子物理人情自可明何嘗戚戚向平生卷舒在我有成算用舍隨時無定名滿目雲山俱是樂一毫榮辱不須驚侯門見説深如海三十年前掉臂行熊氏剛大曰此篇言觀物逹理泰然自處是非榮辱不足為吾纍天意天意無他只自然自然之外更無天不欺誰怕居暗室絶利須求在一源未喫力時猶有説到收功處更何言熊氏剛大曰此乃無聲無臭底意聖人能事人難繼無價明珠止在淵熊氏剛大曰此篇言天道自然人當絶利欲之心以求造聖人之極致極論下有黃泉上有天人人許住百來年還知虛過死萬遍却似不曾生一般要識明珠須巨海如求良玊必名山熊氏剛大曰此言欲求衆理當求之此心先能了盡世間事熊氏剛大曰此即三綱五常四端萬善也然後方言出世間熊氏剛大曰此篇言人生天地間只有百年必須反己以求至貴而為出人之事觀易一物其來有一身一身還有一乾坤能知萬物偹於我肯把三才别立根天向一中分造化熊氏剛大曰一即太極人於心上起經綸熊氏剛大曰一與心即上文所謂立根也天人焉有兩般義道不虛行只在人熊氏剛大曰此篇言天以一為太極人以心為太極天人之理則一當充而廣之觀物耳目聰明男子身洪鈞賦豫不為貧須探月屈方知物未躡天根豈識人乾遇巽時為月屈地逄雷處見天根天根月屈間來往三十六宫都是春熊氏剛大曰三十六宫乾一兌二則三宫也離三震四合三與四則為七則以三乘七十宫也巽五坎六合五與六為十一以十乘十一則二十一宫也艮七坤八合七與八則十五以二十一乘十五則三十六宫也三十六宮此就先天八卦圖看以八卦圓圖言之乾三畫坤六畫則數九也震坎艮各五畫則數十五也巽離兌各四畫則數十二也合之為三十六此篇言垢復隂陽及八卦之數首尾吟三首堯夫非是愛吟詩詩是堯夫可愛時寶鑑造形難隱髮鸞刀迎刃豈容絲風埃若不來侵路塵土何由上得衣欲論誠明是難事堯夫非是愛吟詩熊氏剛大曰此篇借物形容本體清明纎毫人欲不能惑堯夫非是愛吟詩詩是堯夫不強時事到強為須涉迹人能知止是先機靣前自有好田地天下豈無平路岐省力事多人不做堯夫非是愛吟詩熊氏剛大曰此篇言凡事不可強為當知所止况吾身自有寬平田地天下亦有平坦路岐正不消如此堯夫非是愛吟詩詩是堯夫喜老時明著衣冠為士子髙談仁義作男兒敢於世上明開眼肯向人間浪皺眉六十七年無事客堯夫非是愛吟詩熊氏剛大曰此篇言其平生修身窮理所見髙所處泰不為物欲昏撓先天吟示邢和叔一片先天號太虛當其無事見真腴胸中美物肯自衒天下英才敢厚誣理順是言皆可放義安何地不能居直從宇泰收功後始信人間有丈夫仁者吟仁者難逄思有常平居慎勿恃無傷爭先徑路機關惡近後語言滋味長爽口物多須作疾快心事過必為殃與其病後能求藥不若病前能自防安樂窩中自貽物如善得終為美事到巧圖安有公不作風波於世上自無冰炭到胸中災殃秋葉霜前墜冨貴春花雨後紅造化分明人莫會枯榮消得幾何功次十掌書落成白鹿佳句朱子重營舊館喜初成要共羣賢聼鹿鳴三爵何妨奠蘋藻一編詎敢議明誠深源定自間中得妙用元從樂處生莫問無窮菴外事此心聊與此山盟白鹿講會次卜丈韻宫墻蕪沒幾經年秖有寒煙鎖澗泉結屋幸容追舊觀題名未許續遺編青雲白石聊同趣霽月風光更别傳珍重箇中無限樂諸郎莫苦羡騰騫蒼蒼吟寄答曹州李審言龍圖邵子一般顔色正蒼蒼今古人曾望斷腸日月往來無以異陽舒隂慘不相妨迅雷震後山川裂甘露零時草木香幽暗巖崖生鬼魅清平郊野見鸞凰千花爛為三春雨萬木凋因一夜霜此意分明難理會直須賢者入消詳絶句書舂陵門扉周子有風還自掩無事晝常關開闔從方便乾坤在此間月到梧桐上吟邵子月到梧桐上風來楊柳邉院深人復靜此景共誰言熊氏剛大曰此篇借物形容聖人清溫之德蓋月到梧桐天光瑩也風來楊柳天氣溫也必聖人德性昭融方足語此故末復云此景共誰言厥有旨哉清夜吟月到天心處風來水面時一般清意味料得少人知熊氏剛大曰此篇借物形容聖人本體清明人欲淨盡蓋月到天心則雲翳盡掃風來水面則波濤不興此正人欲淨盡天理流行時也安分吟安分身無辱知機心自間雖居人世上却是出人間熊氏剛大曰此篇論安分知機乃是出人之事天聼吟天聼寂無音蒼蒼何處尋非髙亦非逺都只在人心熊氏剛大曰此篇論上天之道只是人心之理感事吟芝蘭種不榮荆棘剪不去二者無奈何徘徊歲將暮熊氏剛大曰此篇言善根難培惡習難克因循荏苒老捋至矣堯夫詠此以警後學也至靈吟至靈之謂人至貴之謂君明則有日月幽則有鬼神人鬼吟既不能事人又焉能事鬼人鬼雖不同其理何嘗異仁聖吟盡道之謂聖如天之謂仁如何仁與聖天下莫敢倫心耳吟意亦心所至言須耳所聞誰云天地外别有好乾坤偶成程子雲淡輕風近午天熊氏剛大曰此篇陽明勝隂濁消之時也傍花隨柳過前川熊氏剛大曰取其生意春融與己一也時人不識豫心樂將來偷間學少年熊氏剛大曰此篇借物形容陽勝隂消生意春融謝王佺寄丹至誠通聖藥通靈逺寄衰翁濟病身我亦有丹君信否熊氏剛大曰此指儒道言也用時還解壽斯民熊氏剛大曰此篇言丹藥之丹不如吾道之丹能夀一也酬韓資政湖上獨酌見贈對花酌酒公能樂飯糗羹藜我自貧若語至誠無內外却因分别更迷真恍惚吟邵子恍惚隂陽初變化氤氲天地乍回旋中間些子好光景安得功夫入語言誠明吟孔子生知非假習孟軻先覺亦須修誠明本屬吾家事自是今人好外求暮春吟林下居常睡起遲那堪車馬近來稀春深晝永簾垂地熊氏剛大曰此可見其靜定氣象庭院無風花自飛熊氏剛大曰此可見其天理行流從容灑落氣象芭蕉芭蕉心盡展新枝熊氏剛大曰猶人之為學已有新益矣新卷新心暗已隨熊氏剛大曰猶人心之義理無窮方其得新益之時又有新益存於其間也願學新心養新德旋隨新葉起新知熊氏剛大曰此篇借物形容人心生生之理無窮細玩此四句上兩句是狀物下兩句是體物新心養新德尊德性功夫也新葉起新知道問學功夫也橫渠先生觀物性之生生不窮以明義理之源源無盡學者當深味之毋徒以詩句觀也和陳瑩中了齋自警五首龜山楊氏畫前有易方知易厯上求玄恐未玄白首紛如成底事蠧魚徒自老青編八荒同宇混車書一視那知更有渠憑軾自應由砥道徑蹊無處問歸愚行藏須信執中難時措應容道屢遷一目全牛無肯綮驍然投刃用方安聖門事業學須強俚耳從來笑折楊詭遇得禽非我事但知無有是吾鄊盈科日進幾時休到海方能止衆流只恐達多狂未歇坐馳還愛鏡中頭水口行舟昨夜扁舟雨一蓑滿江風浪夜如何今朝試揭孤蓬看依舊青山緑樹多熊氏剛大曰此篇形容人欲之波自在泛溢天理常常昭著詠開忩昨夜土墻當面立今朝竹牖向陽開此心若道無通塞明暗如何有去來熊氏剛大曰此篇詠塞者既去明者自來克己寶鑑當年照膽寒向來埋沒太無端秖今垢盡明全見還得當年寶鑑看觀書有感二首半畝方塘一鑑開天光雲影共徘徊問渠那得清如許為有源頭活水來昨夜江邉春水生蒙衝巨艦一毛輕向來枉費推移力此日中流自在行公濟和詩見閔耽書勉以教外之樂以詩請問二首至理無言絶淺深塵塵剎剎不相侵如云教外傳真的却是瞿曇有兩心未必瞿曇有兩心莫將此意擾儒林欲知陋巷憂時樂只向韋編絶處尋石子重兄示詩留别次韻為謝三首此道知君著意深不嫌枯淡苦難禁更須涵養鑽研力強矯無忘此日心克己功夫日用間知君此意久晞顔摛文妄意輸朋益何以書紳有訂頑喜見薰成百里春更慚謙誨極諄諄願言勉盡精微藴風俗期君使再淳送林熙之二首仁體難明君所疑欲求直截轉支離聖言妙藴無窮意涵泳從容只自知天理生生本不窮要從知覺驗流通若知體用元無間始笑前來説異同春日勝日尋芳泗水濱無邉光景一時新等間識得東風靣萬紫千紅總是春春日偶成聞道西園春色深急穿芒屩去登臨千葩萬蕊爭紅紫誰識乾坤造化心敬義堂髙臺巨榜意何如住此知非小丈夫浩氣擴充無內外肯誇心月夜同孤答袁機仲論啓蒙忽然半夜一聲雷萬古千門次第開若識無心含有象許君親見伏羲來易二首立卦生爻事有因兩儀四象已前陳須知三絶韋編者不是尋行數墨人潛心雖出重爻後著眼何妨未畫前識得兩儀根太極此時方好絶韋編文贊原象贊朱子太一肇判隂降陽升陽一以施隂兩而承惟皇昊羲仰觀俯察竒耦既陳兩儀斯設既幹乃支一各生兩隂陽交錯以立四象竒加以竒曰陽之陽竒而加耦隂陽以章耦而加竒隂內陽外耦復加耦隂與隂會兩一既分一復生兩三才在目八卦指掌竒竒而竒初一曰乾竒竒而耦兑次二焉竒耦而竒次三曰離竒耦而耦四震以隨耦竒而竒巽居次五耦竒而耦坎六斯睹耦耦而竒艮居次七耦耦而耦八坤以畢初畫為儀中畫為象上畫成卦人文斯朗因而重之一貞八悔六十四卦由內逹外交易為體往此來彼變易為用時靜而動降帝而王傳夏厯商有占無文民用弗彰文王繫彖用公繫爻視此八卦二純六交乃乾斯父乃坤斯母震坎艮男巽離兑女離南坎北震東兑西乾坤艮巽位以四維建官立師命曰周易孔聖傳之是為十翼遭秦弗燼及宋而明邵傳羲畫程演周經象陳數列言盡理得彌億萬年永著常式述旨贊昔在上古世質民淳是非莫判利害不分風氣既開乃生聖人聰明睿知出類超羣仰觀俯察始畫竒耦教之卜筮以斷可否作為君師開鑿户牖民用不迷以有常守降及中古世變風移淳澆質喪民偽日滋穆穆文王身蒙大難安土樂天惟世之患乃本卦義繫此彖辭爰及周公六爻是資因事設教丁寧詳密必中必正乃亨乃吉語子惟孝語臣則忠鈎深闡微如日之中爰暨末流淫於術數僂句成欺黃裳亦誤大哉孔子晚好是書韋編既絶八索以袪乃作彖象十翼之篇専用義理發揮經言居省象辭動察變占存亡進退陟降飛潛曰毫曰釐匪差匪謬假我數年庶無大咎恭惟三古四聖一心垂象炳明千載是臨惟是學者不本其初文辭象數或肆或拘嗟豫小子既微且陋鑽仰沒身奚測奚究匪警滋荒匪識滋陋維用存疑敢曰垂後明筮贊倚數之元參天兩地衍而極之五十乃偹是曰大衍虛一無為其為用者四十九蓍信手平分置右於几取右一蓍挂左小指乃以右手揲左之策四四之餘歸之於扐初扐左手旡名指間右䇿左揲將指是安再扐之竒通挂之算不五則九是謂一變置此挂扐再用存䇿分挂揲歸復凖前式三亦如之竒皆四八三變既備數斯可察數之可察其辨伊何四五為少八九為多三少為九是曰老陽三多為六老隂是當一少兩多少陽之七孰八少隂少兩多一既得初爻復合前蓍四十有九如前之為三變一爻通十八變六爻揮發卦體可見老極而變少守其常六爻皆守彖辭是當變視其爻兩兼首尾變及三爻占兩卦體或四或五視彼所存四二五一二分一専皆變而化新成舊毁消息盈虛舍此視彼乾占用九坤占用六泰愕匪人姤喜來復稽類贊八卦之象説卦已全考之於經其用弗專彖以情言象以像告惟是之求斯得其要乾健天行坤順地從震動為雷巽入木風坎險水泉亦雲亦雨離麗文明電日而火艮止為山兑説為澤以是舉之其要斯得凡卦六虛竒耦殊位竒陽耦隂各以其類得位為正二五為中二臣五君初始上終貞悔體分爻以位應隂陽相求乃得其正凡陽斯淑君子居之凡隂斯慝小人是為常可類求變非例測非常曷變謹此為則警學贊以上易五贊讀易之法先正其心肅容端席有翼其臨於卦於爻如筮斯得假彼象辭為我儀則字從其訓句逆其情事因其理意適其平曰否曰臧如目斯見曰止曰行如足斯踐毋寬以略毋密以窮毋固而可毋必而通平易從容自表而裏及其貫之萬事一理理定既實事來尚虛用應始有體該本無稽實待虛存體應用執古御今由靜制動潔靜精微是之謂易體之在我動有常吉在昔程氏繼周紹孔奧旨宏綱星陳極拱惟斯未啓以俟後人小子狂簡敢述而申復卦贊萬物職職其生不窮孰其尸之造化為工隂闔陽開一靜一動於穆無疆全體妙用奚獨於斯潛陽壯隂而曰昭哉此天地心蓋翕無餘斯闢之始生意闖然具此全美其在於人曰性之仁斂藏方寸包括無垠有茁其萌有惻其隱於以充之四海其凖曰惟兹今眇綿之間是用齋戒掩身閉關仰止羲圖稽經協傳敢贊一辭以詔無倦復卦義贊天地之心其體則微於動之端斯以見之其端伊何維以生生羣物是資而以日亨其在於人純是惻隱動匪以斯則匪天命曰義理智位雖不同揆厥所基脈絡該通曷其保之日乾夕惕斯須不存生道或息養而無害敬立義集是為復亨出入無疾心經贊西山真氏舜禹授受十有六言萬世心學此其淵源人心伊何生於形氣有好有樂有忿有􅓰惟欲易流是之謂危須臾或放衆慝從之道心伊何根於性命曰義曰仁曰中曰正惟是無形是之謂微毫芒或失其存幾希二者之間曾弗容隙察之必精如辨白黑知及仁守相為始終惟精惟一惟一故中聖賢迭興體姚法姒持綱挈維昭示來世戒懼謹獨間邪存誠曰忿曰欲必窒必懲上帝實臨其敢或二屋漏雖隱寧使有愧四非當克如敵斯攻四端既發皆廣而充意必之萌雲捲席撤子諒之生春噓物茁雞犬之放欲知其求牛羊之牧濯濯是憂一指肩背孰貴孰賤簞食萬鍾辭受必辨克治存養交致其功舜何人哉期與之同維此道心萬善之主天之與我此其大者斂之方寸太極在躬散之萬事其用弗窮若寶靈龜若奉拱璧念兹在兹其可弗力相古先民以敬相傳操約施博孰此為先我來作州茅塞是懼爰輯格言以滌肺腑明窗棐几清晝爐薰開卷肅然事我天君針敬齋針朱子正其衣冠尊其瞻視潛心以居對越上帝足容必重手容必恭擇地而蹈折旋蟻封出門如賔承事如祭戰戰兢兢罔敢或易守口如瓶防意如城洞洞屬屬毋敢或輕不東以西不南以北當事而存靡他其適勿二以二勿參以三惟精惟一萬變是監從事於斯是曰持敬動靜弗違表裏交正須臾有間私欲萬端不火而熱不冰而寒毫釐有差天壤易處三綱既淪九法亦斁於乎小子念哉敬哉墨卿司戒敢告靈臺主一針南軒張氏人稟天性其生也直克慎厥彛則靡有忒事物之感紛綸朝夕動而無莭生道或息惟學有要持敬勿失驗厥操舍乃知出入曷為其敬妙在主一曷為其一惟以無適居無越思事靡他及􅉼泳於中匪忘匪亟斯須造次是保是積既久而精乃會於極勉哉勿倦聖賢可則勿齋針西山真氏天命之性得之者人人之有心其孰不仁人而不仁曰為物役耳蕩於聲目眩於色以言則肆以動則輕人欲放紛天理晦冥於焉有道禮以為凖惟禮是由匪禮勿徇曰禮伊何理之當然不雜以人一循乎天勿之為言如防止水孰其尸之曰心而己聖言十六一字其機機牙既幹鈞石必隨我乘我車駟馬交驟孰範其驅維轡在手是以君子必正其心翼翼兢兢不顯亦臨萬夫之純一將之令霆鍧飈馳孰敢干命衆形役之統於心官外止弗流內守愈安其道伊何所主者敬表裏相維動靜俱正莠盡苖長醅化醴醇方寸盎然無物不春惟勿一言萬善自出念兹在兹其永無斁思誠齋針誠者天道本乎自然誠之者人以人合天曰天與人其本則一云胡差殊蓋纍於物心為物誘性逐情移天理之真其存幾希豈惟與天邈不相似形雖人斯實則物只皇皇上帝命我以人我顧物之抑何弗仁維子思子深憫斯世指其本源袪俗之蔽學問辨行統之以思擇善固執惟日孜孜狂聖本同其忍自棄人十已千弗止弗已雲披霧卷太虛湛然塵掃鏡空清光自全曰人與天既判復合渾然一真諸妄弗作孟氏繼之命曰思誠更兩巨賢其指益明大哉思乎作聖之本歸而求之實近非遠夜氣針子盍觀夫冬之為氣乎木歸其根蟄坯其封凝然寂然不見兆朕而造化發育之妙實胚胎乎其中蓋闔者闢之基正者元之本而艮所以為物之始終夫一晝一夜者三百六旬之積故冬四時之分而夜乃一日之冬天壤之間羣動俱閴窈乎如未判之鴻濛維人之身嚮晦宴息亦當以造物而為宗必齋其心必肅其躬不敢弛然自放於牀簀之上使慢易非辟得以賊吾之衷雖終日乾乾靡容一息之間斷而昏冥易忽之際尤當致戒謹之功蓋安其身所以為朝聼晝訪之地而夜氣深厚則仁義之心亦浩乎其不窮本既立矣而又致察於事物周旋之頃敬義夾持動靜交養則人欲無隙之可入天理皎乎其昭融然知及之而仁弗能守之亦空言其奚庸爰作針以自砭常凛凛瘝恫理一針或問豫天豫對曰理隂陽五行化生萬類其用至神然特氣爾必先有理而後有氣蒼蒼蓋髙包含無際其體至大然特形只形氣之凝理實主是無聲無臭於穆不已天之為天斯其為至分而言之名則有異乾其性情天其形體妙用曰神主宰曰帝以其功用曰神曰鬼專而言之曰理而已大哉至哉理之一言天以此理位上為天物資以始是謂乾元地以此理而位下焉物資以生實承乎乾人生其間眇然有己乃位乎中而參天地惟其理一所以如此天地與人理固一矣人之與物抑又豈二天地人物萬殊一實其分雖殊其理則一天地無情純乎一真至誠不息終古常新曰天地人理則惟鈞或不相似以人有身氣質不齊私欲相因惟聖無欲與天地參理渾然一形肖而三下聖一等于時保之未能樂天畏天之威畏天伊何無終日違及其至也與聖同歸一者謂誠惟天惟聖希聖之賢主一持敬敬而戒懼弗聞弗見敬而謹獨莫見莫顯敬而窮理則明乎善如臨如履心常戰戰一而無適有失者鮮如或不爾禽獸不逺人物之初理同一原人靈於物曷為其然形氣之稟物得其偏是以於理不通其全人得其正固非物比全體貫通性為最貴最貴之中又有不同氣有清濁質有美惡曰聖賢愚其品殊途濁者惡者愚不肖也其清其美則為賢知得美之美得清之清無過不及純粹靈明天理渾然無所虧喪斯為聖人至誠無妄聖性而安賢學而行愚而能學雖愚必明愚而不學是自暴棄下愚不移正此之謂乾父坤母民胞物與四而實一窮亘今古四者之內物為最賤天地與人則無少間胡世之人多間以私上不化贊下甘物為上智下愚學知困知就人而論亦分四岐理焉本一人自為四下愚之人蓋不足齒困知可賢聖可學能奈何為人不求踐形理在兩間一本殊分散為百行别為四端或謂之道或謂之誠千言萬語一之異名萬事萬物胥此焉出理一之義周遍詳密理萬而一心為主宰心一而萬理之宗會在天曰理在人曰心理一曰實心一曰欽銘東銘戲言出於思也戲動作於謀也發於聲見乎四支謂非己心不明也欲人無已疑不能也過言非心也過動非誠也失於聲謬迷其四體謂巳當然自誣也欲他人己從誣人也或者謂出於心者歸咎於己戲失於思者自誣謂己誠不知戒其出汝者反歸咎其不出汝者長敖且遂非不知孰甚焉顔樂亭銘天之生民是為物則非學非師孰覺孰誠聖賢之分古難其明有孔之遇有顔之生聖以道化賢以學行萬世心目破昏為醒周爰闕里惟顔舊止巷汙以榛井湮而圯鄉閭蚩蚩弗視弗履有卓其誰師門之嗣追古念今有惻其心良價善諭發帑出金巷治以闢井泄而深清泉澤物佳木成隂載基載落亭曰顔樂昔人有心豫忖豫度千載之上顔惟孔樂百世之下顔居孔作盛德彌光風流日長道之無疆古今所常水不忍廢地不忍荒嗚呼正學其何可忘克己銘藍田吕氏凡厥有生均氣同體胡為不仁我則有己立己與物私為町畦勝心橫生擾擾不齊大人存誠心見帝則初無吝驕作我蟊賊志以為帥氣為卒徒奉辭於天誰敢侮豫且戰且徠勝私窒欲昔焉寇讎今則臣僕方其未克窘我室廬婦姑勃溪安取其餘亦既克之皇皇四逹洞然八荒皆在我闥孰曰天下不歸吾仁癢痾疾痛舉切吾身一日至之莫非吾事顔何人哉睎之則是敬恕齋銘朱子出門如賔承事如祭以是存之敢有失墜已所不欲勿施於人以是行之與物皆春胡世之人恣已窮物惟我所便謂彼奚恤孰能反是斂焉厥躬於墻於羮仲尼子弓內順於家外同於鄰無小無大罔時怨恫為仁之功曰此其極敬哉恕哉永永無斁學古齋銘相古先民學以為己今也不然為人而已為己之學先誠其身君臣之義父子之仁聚辨居行無怠無忽至足之餘澤及萬物為人之學燁然春華誦數是力纂組是誇結駟懷金煌煌煒煒世俗之榮君子之鄙維是二者其端則微眇綿不察胡越其歸卓哉周侯克承先志日新此齋以迪來裔此齋何有有圖有書厥裔伊何衣冠進趨夜思書行咨詢謀度絶今不為惟古是學先難後獲匪亟匪徐我則銘之以警厥初求放心齋銘天地變化其心孔仁成之在我則主於身其主伊何神明不測發揮萬變立此人極晷刻放之千里其奔非誠曷有非敬曷存孰放孰求孰亡孰有屈伸在臂反覆惟手防微慎獨兹守之常切問近思曰惟以相尊德性齋銘維皇上帝降此下民何以豫之曰義曰仁雖義與仁維帝之則欽斯承斯猶懼弗克孰昏且狂茍賤汚卑淫視傾聼惰其四肢褻天之明慢人之紀甘此下流衆惡之委我其監此祇栗厥心有幽其室有赫其靈執玊奉盈須臾顚沛任重道悠其敢或怠志道齋銘曰趨而挹者孰履而持曰飢而寒者誰食而衣故道也者不可須臾離子不志於道獨罔罔其何之據德齋銘語道術則無往而不通談性命則疑獨而難窮惟其厚於外而薄於內故無地以崇之依仁齋銘舉之莫能勝行之莫能至雖欲依之安得而依之為仁由己而由人乎哉雖欲違之安得而違之遊藝齋銘禮云樂云御射書數俯仰自得心安體舒是之謂遊以遊以居嗚呼遊乎非有得於內孰能如此其從容而有餘乎崇德齋銘尊我德性希聖學兮玩心神明蛻汚濁兮廣業齋銘樂莭禮樂道中庸兮克勤小物奏膚公兮居仁齋銘勝己之私復天理兮宅此廣居純不已兮由義齋銘羞惡爾汝勉擴充兮遵彼大路行無窮兮蒙齋銘物盈兩間有萬其數天理流行無一不具維象之顯理寓乎中反而求之皆切吾躬觀天之行其敢遑息察地之勢亦厚於德天人一體物我一源驗之羲經厥旨昭然卦之有蒙內險外止止莫如山險莫如水曷不曰水而謂之泉濫觴之初厥流涓涓其生之微若未易逹其行之果則不可遏有崇兹山潤澤所鍾維靜而正出乃不窮始焉一勺終則萬里問奚以然有本如是是以君子法取於斯維義所在必勇於為維行有本繄德焉出是滋是培其體乃立靜而養源澄然一心動而敏行萬善畢陳厚化川流初豈二致漙博淵泉其用弗匱於惟簡肅冝有此孫揭名齋扉目擊道存養正於蒙奚必童稚終身由之作聖之地敬義齋銘惟坤六二其德直方君子體之為道有常內而立心曰直是貴惟敬則直不偏以陂外而制事曰方是冝惟義則方各當其施曰敬伊何惟主乎一凛然自持神明在側曰義伊何惟理是循利害之私罔汩其真靜而存養中則有主動而酬酢莫不中矩大哉敬乎一心之方至哉義乎萬事之綱敬義夾持不二不忒表裏洞然上逹天德昔有哲王師保是詢丹書有訓西靣以陳敬與怠分義與欲對一長一消禍福斯在怠心之萌闒焉昏沉欲心之熾蕩乎狂奔惟此二端敗德之賊必壯乃猶如敵斯克怠欲既泯敬義斯存直方以大協德於坤一念小差胝此齋扁嚴師在前永詔無倦克齋銘南軒張氏惟人之生父乾母坤允受其中天命則存血氣之萌物欲斯誘日削月朘噫鮮能久越其云為匪我之自營營四馳擾擾萬事聖有謨訓克己是冝其克伊何本乎致知其致伊何格物是期動靜以察晨夕以思良知固有匪緣事物卓然獨見我心皎日物格知至萬事可窮請事克己日新其功莫險於人欲我其平之莫危於人心我其安之我視我聼勿蔽勿流我言我動是出是由涵濡泳遊不競不絿允蹈彛則靡息厥修逮夫既克曰人而天悠久無疆匪然而然為仁之功於斯其至我稽古人其惟顔氏於穆聖學具有始終循循不舍與天同功請先致知以事克己仁逺乎哉勉旃吾子敬齊銘天生斯人良心則存聖愚曷異敬肆是分事有萬變統乎心君一頺其綱泯焉絲棼自昔先民修己以敬克持其身順保常性敬匪有加惟主乎是履薄臨深不昧厥理事至理形其應若響而實卓然不與俱往動靜不違體用無忒惟敬之功協乎天德嗟爾君子敬之敬之用力之久其惟自知勿憚其艱而或怠遑亦勿迫切而以不常毋忽事物必精吾思察其所發以會於微忿欲之萌則杜其源有過斯改見善則遷是則天命不遏於躬魚躍鳶飛仁在其中於焉有得學則不窮知至而至知終而終嗟爾君子勉哉敬止成已成物匪曰二致任重道逺其端伊邇毫釐有差繆則千里惟建安公自立古義我作銘詩以諗同志敦復齋銘惟聖作易研幾極深惟卦有復於昭天心六爻之義各隨所乘其在於五敦復是明其敦如何篤志允蹈順保其中而以自考我觀爻義厥有戒辭君子體之敬戒是資人欲易萌天理難存毫釐之間消長所分凡百君子奈何不敬祇於夙夜以若天命惟積惟久匪俟乎外敢曰無悔庶幾寡悔恕齋銘刑成不變君子盡心明動麗止象著羲經所存曷先其恕之云自盡於己以察其情意有所先則弗敢成見雖云獨亦靡敢輕幽隱之枉是逹是由毫釐之疑是析是明俾爾寡弱無有或困於爾強慝靡訹靡遁及得其情又以勿喜古人於此恕有餘地我名於齋意實在兹嗟嗟來者尚克念之主一齋銘人之心一何危紛百慮走千岐惟君子克自持正衣冠攝威儀淡以整儼若思主於一復何之事物來審其幾應以專匪可移理在我寧彼隨積之久昭厥微靜不偏動靡違嗟勉哉自邇卑惟勿替日在兹敬銘維人之心易於放逸操存舍亡或入或出敬之一字其義精密學者所當服膺弗失收斂方寸不容一物如入靈祠如奉軍律整齊嚴肅端莊靜一戒慎恐懼兢業戰栗如見大賔罔敢輕率如承大祭罔敢慢忽視聼言動非禮則勿忠信傳習省身者悉把捉於中精神心術檢束於外形骸肌骨常令惺惺又新日日敢以此語鏤於虗室和銘和而不流訓在中庸顔之豈弟孔之溫恭孔顔往矣孰繼遐蹤卓彼先覺元公淳公元氣之會淳德之鍾瑞日祥雲霽月光風庭草不除意思沖沖天地生物氣象融融萬物靜觀境與天通四時佳興樂與人同泯若圭角春然心胸如玊之潤如酒之醲晬靣盎背辭色雍容待人接物德量含洪和粹之氣涵養之功敢以此語佩於厥躬自新銘齒本白一朝不潄其汚已積面本白一旦不頮其垢己黑體本白一日不浴其形己墨齒雖汚潄之則即無面雖垢頮之則即不體雖墨其形浴之則瑩然如玉潔且清是知齒本無汚其汚也實自吾靣本無垢其垢也實自取體本潔且清其形之墨也實自成齒本白而我自汚誰之辜靣本白而我自垢誰之咎體本白而我自墨誰之慝幸而一朝潄其齒白者復爾一旦頮其靣白者復見一日潔其體而浴白者復如玊盍曰向也吾身白者己塵今焉澡雪舊染維新而今而後殆不可復士子守己當如女子文人治身當如武人女子居室必無一毫點汚介然自守如此是謂守己如女武人殺敵必須直前不顧勇於自治如此是謂治身如武女不女易所謂不有躬也武不武傳所謂我非夫者身之白者渾全而未壞貴常以不女之女為戒身之白者既壞而求全謹無若不武之武人然自修銘養天性治天情正天官盡天倫奚而養奚而治奚而正奚而盡未知之則究之既知之則踐之究者何窮其理踐者何履其事若何而為仁義理智之道若何而為喜怒哀懼愛惡之莭若何而為耳目鼻口手足四支之則若何而為君臣父子夫婦長幼朋友之常探其所以然求其所當然是之謂窮其理存之於心則如此見之於事則如此行之於身則又如此內而施之於家則如此外而推之於人則如此大而措之於天下則又如此躬行之焉力踐之焉是之謂履其事然則其先如之何曰立誠而居敬消人欲銘人欲之極惟色與食食能殞軀色能傾國紾兄摟子食色乃得將紾將摟不亦大惑必也謀道必也好德而勿謀食而勿好色飲食男女大欲存焉不為欲流乃可聖賢我思古人以理制欲常戒以懼惟慎其獨賢賢易色好善不足何暇色耽恣情悅目食無求飽志學惟篤何暇食求以極其腹如或不然是人其天貪淫蠱惑有愧格言好色是欲德未見好惡食是恥未足議道嗚呼食色今其戒兹戒之如何剛以治之長天理銘天理之至惟仁與義仁只在孝義只在弟茍孝於親是能為子茍弟於兄是能為弟能為子弟他不外是此之不能何况他事盡乎人倫堯舜為至然其為道孝弟而已知斯二者即所謂知節斯二者即所謂禮實有二者即信之謂安行二者樂則生矣五常百行不離斯二窮神知化亦由此始如或不然流入佛氏名為周遍實外倫理事親從兄豈不甚易人非不能特不為耳嗚呼仁義為之由己尚勉之哉毋自暴棄克己銘去病非難當拔其根己私既克天理復還克他未得但加裁抑固不猖獗終尚潛匿克者伊何譬如破敵戰而勝之是之謂克二者異情學者當明人欲如敵入據吾城被吾戰勝逺屏退聼不敢復來攻城犯命或敵在內驅之城外閉門固拒控守要害雖不得入禍胎猶在守備一疏又被攻壞一戰有功敵自服從區區固守敵敢力鬬一日克己隨即復禮天下歸仁其效如此克伐怨欲茍徒力制而使不行仁則猶未去惡之道如農去草既已芟夷復藴崇之絶其本根勿使能殖則善者信無復蟊賊不能勝敵其何能國為學亦然其可弗力以士希賢顔真凖的力到功深優入聖域賦拙賦巧者言拙者默巧者勞拙者逸巧者賊拙者德巧者凶拙者吉嗚呼天下拙刑政徹上安下順風清弊絶白鹿洞賦朱子承后皇之嘉惠宅廬阜之南疆閔原田之告病惕農扈之非良粵冬孟之既望夙余駕乎山之塘徑北原以東騖陡李氏之崇岡揆厥號之所繇得頽址於榛荒曰昔山人之隱處至今永久而流芳自升元之有土始變孰而為庠儼衣冠而弦誦紛濟濟而洋洋在叔季之且然矧休明之景運皇穆穆以當天一軌文而來混念篤敦於化原乃搜剔乎遺遁肹黃卷以置郵廣青襟之疑問樂菁莪之長育拔雋髦而登進逮繼照於咸平又增修而罔倦旋鍚冕以華其歸琛以肯堂而詒孫悵茂草於熙寧尚兹今其奚論天既啓豫以堂壇友又訂豫以册書謂此前修之逸迹復關我聖之宏撫亦既震於余𠂻乃謀度而咨諏尹悉心以綱紀吏竭蹙而奔趨士釋經而敦事工殫巧而獻圖會日月之幾何屹厦屋之渠渠山蔥瓏而繞舍水汩㶁而循除諒昔人之樂此羌異世而同符偉章甫之峩峩抱遺經而來集豈顓眺之為娛實宫墻之可入愧余修之不敏何子望之能續矧道體之無窮又豈一言之可緝請姑誦其昔聞庶有開於時習曰明誠其兩進抑敬義其偕立允莘摯之所懷謹巷顔之攸執彼青紫之勢榮亦何心於俯拾亂曰澗水觸石鏘鳴珍兮山木苯䔿枝相樛兮彼藏以修息且遊兮德崇業茂聖澤流兮往者弗及余心憂兮來者有繼兮我將焉求兮遂初堂賦皇降衷於下民兮粵惟其常猗歟穆而難名兮維生之良翕衆美而具存兮不顯其光彼孩提而知愛親兮豈外鑠繄中藏年燁燁而寢長兮紛事物之交相非元聖之生知兮懼日逺而日忘緣氣稟之所偏兮橫流始夫濫觴感以動兮不止乃厥初之或戕既志帥之莫御氣決驟以翺翔六情放而曷禦百骸馳而莫強自青陽而逆旅暨黃髮以茫茫儻矍然於中道盍反求於厥初厥初伊何夫豈遠歟彼匍匐以向井我惻隱之拳如驗端倪之所發識大體之權輿如寐而聰如迷而途如睨視之匪遐乃本心之不渝嗚呼豫既知其然兮豫惟以遂之若火始然而泉始達兮惟不息以終之豫視兮毋流豫聼兮毋從豫言兮毋易豫動兮以躬惟日反兮於理兹日新兮不窮逮克實而輝光信天資而本同極存神而過化亘萬古而常通鳴呼此羲文之所謂復而顔氏之所謂為萬世道學之宗歟太極賦黃溍厥初馮翼以瞢暗兮維玄黃其孰分爰揭揭於中立兮配天地以為人曩既學而有志兮紛遑遑其求索曰道不可名兮孰無徴而有獲繄皇羲之神聖兮感龍馬之負圖得妙契於俯仰兮何有畫而無書豈至道之玄逺兮非名言之可摹懿尼丘之降神兮廓人文以宣朗揭日月於中天兮啓羣昏之罔象指道妙於難名兮曰以一而生兩是謂太極兮非虛無與惚恍髙下以位兮天尊地卑燥濕以類兮五行順施南乾北坤兮西坎東離物錯綜兮殊巨細與妍蚩孰主張是兮兹一本之所為厯兩都而江左兮胡論説之霏霏豈清言之弗美兮去道逺而偉先哲之獨詣兮重指掌於無極揭座右以為圖兮開盲聾於千億謂斯道之匪他兮在夫人而曰誠幾善惡猶隂陽兮兹吉凶之所生嗟竒論之後出兮穴墻垣為户牖析同異於一言兮或曰無而曰有蕕終不可使薰兮堊終不可使黝道惟辨而愈明兮貽話言於不朽昔聖門之多賢兮繽入室而升堂端木氏之頴悟兮謹有覩其文章雖亞聖之挺生兮猶嘆其前後之無方疇敢索無聲於窅默兮孰能求無形於渺茫惟下學而上逹兮炳聖謨之洋洋嗟諸生之貿貿兮方鈎深而摘隱探賜也之未聞兮誇神竒而捷敏持空言於繫影兮會不滿夫一哂曰豫未有知兮何太極之敢言秉思誠之遺訓兮矢顛沛而弗諼庶返觀而有得兮明萬理之一原申誦言以自詔兮聊抒意於斯文性理大全書卷七十

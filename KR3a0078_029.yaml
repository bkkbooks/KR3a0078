body:
  text: 性理大全書卷二十九性理一性命程子曰在天曰命在人曰性循性曰道性也命也道也各有所當天所賦為命物所受為性天之付與之謂命稟之在我之謂性見於事物之謂理理也性也命也三者未嘗有異窮理則盡性盡性則知天命矣天命猶天道也以其用而言之則謂之命命者造化之謂也張子曰天授於人則為命人受於天則為性龜山楊氏曰性天命也命天理也道則性命之理而已孟子道性善蓋原於此華陽范氏曰性者天所賦於人命者人所受於天朱子曰理者天之體命者理之用性是人之所受情是性之用命猶誥勑性猶職事情猶施設心則其人也天所賦為命物所受為性賦者命也所賦者氣也受者性也所受者理也聖賢說性命皆是就實事上說如言盡性便是盡得此君臣父子三綱五常之道而無餘言養性便是養得此道而不害至微之理至著之事一以貫之略無餘缺非虛語也問性命曰氣不可謂之性命但性命因此而立耳故論天地之性則專指理言論氣質之性則以理與氣雜而言之非以氣為性命也問天與命性與理四者之别天則就其自然者言之命則就其流行而賦於物者言之性則就其全體而萬物所得以為生者言之理則就其事事物物各有其則者言之到得合而言之則天即理也命即性也性即理也是如此否曰然問看道理須尋根原來處只是就性上看否曰如何曰天命之性萬理完具總其大目則仁義禮智其中遂分别成許多萬善大綱只如此然就其中須件件要徹曰固是如此又須看性所因是如何曰當初天地間元有這箇渾然道理人生稟得便是性曰性只是理萬理之總名此理亦只是天地間公共之理稟得來便為我所有天之所命如朝廷指揮差除人去做官性如官職官便有職事北溪陳氏曰性即理也何以不謂之理而謂之性蓋理是泛言天地間人物公共之理性是在我之理只這道理受於天而為我所有故謂之性性字從生從心是人生來具是理於心方名之曰性其大目只是仁義禮智四者而已得天命之元在我謂之仁得天命之亨在我謂之禮得天命之利在我謂之義得天命之貞在我謂之智性與命本非二物在天謂之命在人謂之性故程子曰天所賦為命人所受為性文公曰元亨利貞天道之常仁義禮智人性之綱命一字有二義有以理言者有以氣言者其實理不外乎氣蓋二氣流行萬古生生不息不成只是箇空氣必有主宰之者曰理是也理在其中為之樞紐故大化流行生生未嘗止息所謂以理言者非有離乎氣只是就氣上指出箇理不雜乎氣而為言耳如天命之謂性五十知天命窮理盡性至於命此等命字皆是專指理而言天命即天道之流行而賦豫於物者就元亨利貞之理而言則謂之天道即此道之流行賦豫於物者而言則謂之天命如就氣說却亦有兩般一般說貧冨貴賤夀夭禍福如所謂死生有命與莫非命也之命是乃就受氣之短長厚薄不齊上論是命分之命又一般如孟子所謂仁之於父子義之於君臣命也之命是又就禀氣之清濁不齊上論是說人之智愚賢否若就造化上論則天命之大目只是元亨利貞此四者就氣上論也得就理上論也得就氣上論則物之初生處為元於時為春物之發達處為亨於時為夏物之成遂處為利於時為秋物之斂藏處為貞於時為冬貞者正而固也自其生意之已定者而言故謂之正自其斂藏者而言故謂之固就理上論則元者生理之始亨者生理之通利者生理之遂貞者生理之固命猶令也天無言做如何命只是大化流行氣到這物便生這物氣到那物又生那物便是分付命令他一般魯齊許氏曰凡言性者便有命凡言命者便有性臨川吳氏曰夫善者天之道也人之德也天之道孰為善元亨利貞流行四時而謂之命者也人之德孰為善仁義禮智備具一心而謂之性者也是善也天所付於人人所受於天也天之付於人者公而無私人之受於天也同而不異雖或氣質之不齊而其善則一也不必皆自誠而明之聖也不必皆自明而誠之賢也夫所生之民無不有是則人所秉之彞無不好是德也人之善也猶水之下人之樂於為善猶水之樂於就下也無他順其自然而已矣性程子曰民受天地之中以生天命之謂性也孟子言性之善是性之本孔子言性相近謂其禀受處不相逺也人性皆善所以善者於四端之情可見人之性果惡耶則聖人何為能反其性以至於斯也稱性之善謂之道道與性一也以性之善如此故謂之性善性之本謂之命性之自然者謂之天自性之有形者謂之心自性之有動者謂之情凡此數者皆一也聖人因事以制名故不同若此而後之學者隨文析義求竒異之說而去聖人之意逺矣自性而行皆善也聖人因其善也則為仁義禮智信以名之以其施之不同也故為五者以别之合而言之皆道别而言之亦皆道也舍此而行是悖其性也是悖其道也而世人皆言性也道也與五者異其亦弗學歟其亦未體其性也歟其亦不知道之所存歟或曰某欲以金作器比性成形曰金可以比氣不可以比性邵子曰性者道之形體也道妙而無形性則仁義禮智具而體著矣延平李氏曰動靜真僞善惡皆對而言之是世之所謂動靜真僞善惡非性之所謂動靜真僞善惡也惟求靜於未始有動之先而性之靜可見矣求真於未始有僞之先而性之真可見矣求善於未始有惡之先而性之善可見矣天下之理無異道也天下之人無異性也性惟不可見孟子始以善形之惟能自性而觀則其致可求茍自善而觀則理一而見二朱子性圖朱子曰性即理也在心喚做性在事喚做理生之理謂性性則純是善底性是天生成許多道理散在處為性性是實理仁義禮智皆具性天理也理之所具便是天德在人識而體之爾問性固是理然性之得名是就人生稟得言之否曰繼之者善成之者性這箇理在天地間時只是善無有不善者生物得來方始名曰性只是這理問先生謂性是未發善是已發何也曰才成箇人影子許多道理便都在那人上其惻隱便是仁之善羞惡便是義之善到動極復靜處依舊只是理曰這善也是性中道理到此方見否曰這須就那地頭看繼之者善也成之者性也在天地言則善在先性在後是發出來方生人物發出來是善生人物便成箇性在人言則性在先善在後或舉孟子道性善曰此則性字重善字輕非對言也問性既無形復言以理理又不可見曰父子有父子之理君臣有君臣之理世間只是這箇道理譬如晝日當空一念之間合著這道理則皎然明白更無纎毫窒礙故曰天命之謂性不只是這處有處處皆有只是尋時先從自家身上尋起所以說性者道之形體也此一句最好蓋是天下道理尋討將去那裏不可體驗只是就自家身上體驗一性之內便是道之全體千人萬人一切萬物無不是這道理不特自家有他也有不特甲有乙也有天下事都恁地性者道之形體心者性之郛郭康節這數句極好蓋道即理也如父子有親君臣有義是也然非性何以見理之所在故曰性者道之形體仁義禮智性也理也而具此性者心也故曰心者性之郛郭問性者道之形體曰性者人所禀受之實道者事物當然之理也事物之理固具於性但以道言則冲漠散殊而莫見其實惟求之於性然後見其所以為道之實初不外乎此也中庸所謂率性之謂道亦以此而言耳因言性如何是道之形體陳淳曰道是性中之理曰道是泛言性是就自家身上說道在事物之間如何見得只就這裏驗之一作反身而求性之所有則道之所在也道是在物之理性是在己之理然物之理都在我此理之中道之骨子便是性劉砥問性物我皆有恐不可分在己在物否曰道雖無所不在須是就己驗之而後見如父子有親君臣有義若不就已驗之如何知得是本有天叙有典典是天底自我驗之方知得五典五惇天秩有禮禮是天底自我驗之方知得五禮有庸陳淳問心是郛郭便包了性否曰是也如橫渠心統性情一句乃不易之論孟子說心許多皆未有似此語端的子細看便見其他諸子等書皆無依稀似此問所謂道之形體如何曰諸先生說這道理却不似邵子說得最著實這箇道理才說出只是虛空更無形影惟是說性者道之形體却見得實有不須談空說逺只反諸吾身求之是實有這箇道理還是無這箇道理故嘗曰欲知此道之實有者當求之吾性分之內邵子忽地自說出幾句最說得好又曰天之付與其理本不可見其總要却在此蓋人得之於天地元無缺闕只是其理却無形象不於性上體認如何知得程子謂其體謂之道其用謂之神而其理屬之人則謂之性其體屬之人則謂之心其用屬之人則謂之情又曰道是發用處見於行者方謂之道性是那道骨子性是體道是用如云率性之謂道亦此意答張敬夫曰性不可以善惡名蓋善者無惡之名夫其所以有好有惡者特以好善而惡惡耳初安有不善哉然則名之以善又何不可之有答胡廣仲曰天命之性只以仁義禮智四字言之最為端的率性之道便是率此之性無非是道亦離此四字不得如程子所謂仁性也孝弟是用也性中只有仁義禮智而已曷嘗有孝弟來此語亦可見矣蓋父子之親兄弟之受固性之所有然在性中只謂之仁而不謂之父子兄弟之道也君臣之分朋友之交亦性之所有然在性中只謂之義而不謂之君臣朋友之道也推此言之曰禮曰智無不然者又曰伊川云天地儲精得五行之秀者為人其本也真而靜其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動於中矣其中動而七情出焉曰喜恕哀樂愛惡欲情既熾而益蕩其性鑿矣詳味此數語與樂說之說指意不殊所謂靜者亦指未感時言耳當此之時心之所存渾是天理未有人欲之僞故曰天之性及其感物而動則是非真妄自此分矣然非性則亦無自而發故曰性之欲動字與中庸發字無異而其是非真妄特決於有節與無節中節與不中節之間耳來教所謂正要此處識得真妄是也至謂靜字所以形容天性之妙不可以動靜真妄言却有疑焉蓋性無不該動靜之理具焉若專以靜字形容則反偏却性字矣既以靜為天性只謂未感物之前私欲未萌渾是天理耳不必以靜字為性之妙也真妄又與動靜不同性之為性天下莫不具焉但無妄耳今乃欲并與其真而無之此韓公道無真假之言所以見譏於明道也伊川所謂其本真而靜者真靜兩字亦自不同蓋真則指本體而言靜但言其初未感乎物明道云人生而靜之上不容說才說性時便已不是性矣蓋人生而靜只是靜之未發但於此可見天性之全非真以靜狀性也書藁後復補其意曰如廣仲之言既以靜為天地之妙又論性不可以真妄動靜言是知言所謂歎美之善而不與惡對者云爾應之宜曰善惡也真妄也動靜也一先一後一彼一此皆以對待而得名者也不與惡對則不名為善不與動對則不名為靜矣既非妄又非真則亦無物之可指矣今不知性之善而未始有惡也真而未始有妄也主乎靜而涵乎動也顧曰善惡真妄動靜凡有對待皆可以言性而對待之外别有無對之善與靜焉然後可以形容天性之妙不亦異乎當時酬對既不出此而他所自言亦多曠闕如論性無不該不可專以靜言此固是也然其說當云性之分雖屬乎靜而其蘊則該動靜而不偏故樂記以靜言性則可如廣仲遂以靜字形容天性之妙則不可如此則語意圓矣如論程子真靜之說以真為本體靜為未感此亦是也然當云下文所謂未發即靜之謂也所謂五性即真之謂也然則仁義禮智信云者乃所謂未發之蘊而性之真也歟如此則文義備矣人生而靜天之性者言人生之初未有感時便是渾然天理也感物而動性之欲者言及其有感便是此理之發也人生而靜天之性未嘗不善感物而動性之欲此亦未是不善至於物至知知然後好惡形焉好惡無節於內知誘於外不能反躬天理滅矣方是惡故聖賢說得惡字煞遲答林擇之曰靜字乃指未感本然言蓋人生之初未感於物一性之真湛然而已豈非當體本然未嘗不靜乎惟感於物是以有動然所感既息則未有不復其常者故嘗以為靜者性之真也諸儒論性不同非是於善惡上不明乃性字安頓不著聖人只是識得性百家紛紛只是不識性字揚子鶻鶻突突荀子又所謂隔靴爬癢韓子說所以為性者五而今之言性者皆雜佛老而言之所以不能不異在諸子中最為近理蓋如吾儒之言則性之本體便只是仁義禮智之實如老佛之言則先有箇虛空底性後方旋生此四者出來不然亦說性是一箇虛空底物裏面包得四者今人却為不曾曉得自家道理只見得他說得熟故如此不能無疑又才見說四者為性之體便疑實有此四塊之物磊塊其間皆是錯看了也須知性之為體不離此四者而四者又非有形象方所可撮可摩也但於渾然一理之中識得箇意思情狀似有界限而實亦非有墻壁遮欄分别處也然此處極難言故孟子亦只於發處言之如言四端又言乃若其情則可以為善之類是於發處教人識取不是本體中元來有此如何用處發得此物出來但本體無著摸處故只可於用處看便省力耳南軒張氏答胡伯逄曰性善之說詳程子之言謂人生而靜以上更不容說才說性時便已不是性繼之曰凡人說性只是說繼之者善也孟子言人性善是也但請詳味此語意自可見大抵性固難言而惟善可得而名之此孟子之言所以為有根底也但所謂善者要人能明之耳若曰難言而遂不可言曰不容說而遂不可說却恐渺茫而無所止也東萊吕氏曰惟皇上帝降衷于下民天命之謂性也若有恆性率性之謂道也或問性中具仁義禮智道德如何潛室陳氏曰行是四者即為道得是四者即為德北溪陳氏曰孟子道性善從何而來孔子繫辭曰一隂一陽之謂道繼之者善也成之者性也所以一隂一陽之理者為道此是統說箇太極之本體繼此者為善乃是就其間說造化流行生育賦豫更無别物只是箇善而已此是太極之動而陽時所謂善者以實理言即道之方行者也到成此者為性是說人物受得此善底道理去各成箇性耳是太極之靜而隂時此性字與善字相對是即所謂善而理之已定者也繼成字與隂陽字相應是指氣而言性善字與道字相應是指理而言此夫子所謂善是就人物未生之前造化原頭處說善乃重字為實物若孟子所謂性善則是就成之者性處說是人生以後事善乃輕字言此性之純粹至善耳其實由造化原頭處有是繼之者善然後成之者性時方能如是之善則孟子之所謂善實淵源於夫子所謂善者而來而非有二本也易三言周子通書及程子說已明備矣至明道又謂孟子所謂性善者只是說繼之者善也此又是借易語移就人分上說是指四端之發處言之而非易之本㫖也西山真氏曰仁義禮智信之性古人謂之五常君臣父子夫婦昆弟朋友之道古人亦謂之五常以性之體而言則曰仁義禮智信以性之用而言則曰君臣之義父子之仁夫婦之别長幼之序朋友之信其實則一而已天下豈有性外之理哉人物之性程子曰天降之謂性率性之謂道者天降是於下萬物流形各正性命是所謂性也各正性命而不失是所謂道也此亦通人物而言循性者馬則為馬之性又不做牛底性牛則為牛之性又不為馬底性此所謂率性也人在天地之間與萬物同流天幾時分别出是人是物無妄天性也萬物各得其性一毫不加損矣禽獸與人絶相似只是不能推然禽獸之性却自然不待學不待教如營巢養子之類是也人雖是靈却斫喪處極多只有一件嬰兒飲乳是自然非學也其他皆誘之也孟子言性當隨文看不以告子生之謂性為不然者此亦性也被命受生之後謂之性爾故不同繼之以犬之性猶牛之性牛之性猶人之性歟然不害為一若乃孟子之言善者乃極本窮源之性鉛鐡性殊㸃化為金則不辨鉛鐡之性人之於性猶器之受光於日日本不動之物張子曰天下凡謂之性者如言金性剛火性熱牛之性馬之性也莫非固有凡物莫不有是性由通蔽開塞所以有人物之别由蔽有厚薄故有智愚之别塞者牢不可開厚者可以開而開之也難薄者開之也易開則逹于天道與聖人一藍田吕氏曰人受天地之中其生也具有天地之德柔强昏明之質雖異其心之所然者皆同特蔽有淺深故别而為昏明禀有多寡故分而為强柔至於理之所同然雖聖愚有所不異盡己之性則天下之性皆然故能盡人之性蔽有淺深故為昏明蔽有開塞故為人物禀有多寡故為强柔禀有偏正故為人物故物之性與人異者幾希惟塞而不開故知不若人之明偏而不正故才不若人之美然人有近物之性者物有近人之性者亦繫乎此於人之性開塞偏正無所不盡則物之性未有不能盡也己也人也物也莫不盡其性則天地之化成矣河東侯氏曰萬物資始於天天所賦與者為命命天之所命也物受命於天者為性性物之自有也草木之不齊飛走之異禀然而動者動植者植天機自完豈非性乎馬之性健而健牛之性順而順犬吠盜雞司晨不待教而知之豈非率性乎朱子曰天之生物也一物與一無妄天下無無性之物蓋有此物則有此性無此物則無此性問性具仁義禮智曰此猶是說成之者性上面更有一隂一陽繼之者善只一隂一陽之道未知做人做物已具是四者雖尋常昆蟲之類皆有之只偏而不全濁氣間隔人物之生其賦形偏正固自合下不同然隨其偏正之中又自有清濁昏明之異性者物之所受言物生則有性而各具是道也物物運動蠢然若與人無異而人之仁義禮智之粹然者物則無也當時所記改人之之字為性字姑兩存之問人物之性一源何以有異曰人之性論明暗物之性只是偏塞暗者可使之明也偏塞者不可使之通也橫渠言凡物莫不有是性由通蔽開塞所以有人物之别而卒謂塞者牢不可開厚者可以開而開之也難薄者開之也易是也又問人之習為不善其溺已深者終不可復反矣曰勢極重者不可反亦在乎識之淺深與其用力之多寡耳論萬物之一原則理同而氣異觀萬物之異體則氣猶相近而理絶不同或問理同而氣異此一句是說方付與萬物之初以其天命流行只是一般故理同以其二五之氣有清濁純駁故氣異下句是就萬物已得之後說以其雖有清濁之不同而同此二五之氣故氣相近以其昏明開塞之甚逺故理絶不同中庸是論其方付之初集注是看其已得之後曰氣相近如知寒暖識飢飽好生惡死趨利避害人與物都一般理不同如蜂蟻之君臣只是他義上有一㸃子明虎狼之父子只是他仁上有一㸃子明其他更推不去恰似鏡子其他處都暗了中間只有一兩㸃子光大凡物事禀得一邊重便占了其他底如慈愛底人少斷制斷制之人多殘忍蓋仁多便遮了義義多便遮了那仁問所以婦人臨事多怕亦是氣偏了曰婦人之仁只流從愛上去問人物皆禀天地之理以為性皆受天地之氣以為形若人品之不同固是氣有昏明厚薄之異若在物言之不知是所禀之理便有不全耶亦是緣氣禀之昏蔽故如此耶曰惟其所受之氣只有許多故其理亦只有許多如犬馬他這形氣如此故只㑹得如此事又問物物具一太極則是理無不全也曰謂之全亦可謂之偏亦可以理言之則無不全以氣言之一作以不能推言之則不能無偏故吕與叔謂物之性有近人之性者如猫相乳之類人之性有近物之性者如世上昏愚人問性為萬物之一源曰所謂性者人物之所同得非惟已有是而人亦有是非惟人有是而物亦有是問吕與叔云性一也流形之分有剛柔昏明者非性也有三人焉皆一目而别乎色一居乎密室一居乎帷箔之下一居乎廣廷之中三人所見昏明各異豈目不同乎隨其所居蔽有厚薄爾竊謂此言分别得性氣甚明若移此語以喻人物之性亦好頃嘗以日為喻以為大明當天萬物咸覩亦此日耳蔀屋之下容光必照亦此日耳日之全體未嘗有小大只為隨其所居而小大不同耳不知亦可如此喻人物之性否曰亦善問氣質有昏濁不同則天命之性有偏全否曰非有偏全謂如日月之光若在露地則盡見之若在蔀屋之下有所蔽塞有見有不見昏濁者是氣昏濁了故自蔽塞如在蔀屋之下然在人則蔽塞有可通之理至於禽獸亦是此性只被他形體所拘生得蔽隔之甚無可通處至於虎狼之仁豺獺之祭蜂蟻之義却只通這些子譬如一隙之光至於獼猴形狀類人便最靈於他物只不㑹說話而已到得夷狄便在人與禽獸之間所以終難改性如日光人物所受之不同如隙竅之受光有大小也人物被形質局定了也是難得開廣如螻蟻如此小便只知得君臣之分而已或說人物性同曰人物性本同只氣禀異如水無有不清傾放白碗中是一般色及放黑碗中又是一般色放青碗中又是一般色又曰性最難說要說同亦得要說異亦得如隙中之日隙之長短大小自是不同然却只是此日人物之生天賦之以此理未嘗不同但人物之禀受自有異耳如一江水你將杓去取只得一杓將碗去取只得一碗至於一桶一缸各自隨器量不同故理亦隨以異問人則能推物則不能推曰謂物無此理不得只是氣昏一似都無了或問人物之性有所謂同者又有所謂異者知其所以同又知其所以異然後可以論性矣夫太極動而二氣形二氣形而萬化生人與物俱本乎此則是其所謂同者而二氣五行絪縕交感萬變不齊則是其所謂異者同者其理也異者其氣也必得是理而後有以為人物之性則其所謂同然者固不得而異也必得是氣而後有以為人物之形則所謂異者亦不得而同也是以先生於大學或問因謂以其理而言之則萬物一原固無人物貴賤之殊以其氣而言之則得其正且通者為人得其偏且塞者為物是以或貴或賤而有所不能齊者蓋以此也然其氣雖有不齊而得之以有生者在人物莫不皆有理雖有所謂同而得之以為性者人則獨異於物故為知覺為運動者此氣也為仁義為禮智者此理也知覺運動人能之物亦能之而仁義禮智則物固有之而豈能全之乎告子乃欲指其氣而遺其理梏於其同者而不知其所謂異者此所以見闢於孟子而先生於集注則亦以為以氣言之則知覺運動人物若不異以理言之則仁義禮智之禀非物之所能全也於此則言氣同而理異者所以見人之為貴非物之所能並於彼則言理同而氣異者所以見太極之無虧缺而非有我之所得私也以是觀之尚何疑哉有以集注或問異同為疑者答之如此未知是否曰此論得甚分明且有條理二氣五行交感萬變故人物之生有精粗之不同自一氣而言之則人物皆受是氣而生自精粗而言則人得其氣之正且通者物得其氣之偏且塞者惟人得其正故是理通而無所塞物得其偏故是理塞而無所知且如人頭圓象天足方象地平正端直以其受天地之正氣所以識道理有知識物受天地之偏氣所以禽獸橫生草木頭生向下尾反在上物之間有知者不過只通得一路如烏之知孝獺之知祭犬但能守禦牛但能耕而已人則無不知無不能人所以與物異者所爭者此耳問虎狼之父子蜂蟻之君臣豺獺之報本雎鳩之有别物雖得其一偏然徹頭徹尾得義理之正人合下具此天命之全體乃為物欲氣禀所昏反不能如物之能通其一處而全盡何也曰物只有這一處通便却專人却事事理㑹得些便却泛泛所以易昏問人與物以氣禀之偏全而不同不知草木如何曰草木之氣又别他都無知了或問通蔽開塞張橫渠吕與叔說孰為親切曰與叔倒分明似橫渠之說看來塞中也有通處如猿狙之性即靈猪則全然蠢了便是通蔽不同處本乎天者親上本乎地者親下如人頭向上所以最靈草木頭向下所以最無知禽獸之頭橫了所以無知猿狙稍靈為他頭有時也似人故稍向得上問程子云人與物共有此理只是氣昏推不得此莫只是大綱言其本同出若論其得此理莫己不同而曰同曰既同則以分人物之性者却是於通塞上别如人雖氣禀異而終可同物則終不可同然則謂之理同則可謂之性同則不可曰固然但隨其光明發見處可見如螻蟻君臣之類但其禀形既别則無復與人通之理如獼猴形與人略似則便有能解野狐能人立故能為怪如猪則極昏如草木之類荔枝牡丹乃發出許多精英此最難曉一草一木皆天地和平之氣答徐子融曰程子言性即理也此一句自古無人敢如此道心則知覺之在人而具此理者也張子又言由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名其名義亦甚密皆不易之至論也蓋天之生物其理固無差别但人物所禀形氣不同故其心有明暗之殊而往有全不全之異耳若所謂仁則是性中四德之首非在性外别為一物而與性並行也然唯人心至靈故能全此四德而發為四端物則氣偏駁而心昏蔽固有所不能全矣然其父子之相親君臣之相統間亦有僅存而不昧者然欲其克己復禮以為仁善善惡惡以為義則有所不能矣然不可謂無是性也若生物之無知覺者則又其形氣偏中之偏者故理之在是物者亦隨其形氣而自為一物之理雖若不可復論仁義禮智之倣佛然亦不可謂無是性也此理甚明無難曉者又謂枯槁之物只有氣質之性而無本然之性此語猶可笑若果如此則是物只有一性而人却有兩性矣此語非常醜差蓋由不知氣質之性只是此性墮在氣質之中故隨氣質而自為一性正周子所謂各一其性者向使元無本然之性則此氣質之性又從何處得來耶况亦非獨周程張子之言為然如孔子言成之者性又言各正性命何嘗分别某物是有性底某物是無性底孟子言山之性水之性山水何嘗有知覺耶若於此看得通透即知天下無無性之物除是無物方無此性若有此物即如來喻木燒為灰灰隂為土亦有此灰土之氣既有灰土之氣即有灰土之性安得謂枯槁無性也徐子融謂枯槁之中有性有氣故附子熱大黃寒此性是氣質之性陳才卿謂即是本然之性曰子融認知覺為性故以此為氣質之性性即是理有性即有氣是他禀得許多氣故亦只有許多理才卿謂有性無仁此說亦是是他元不曾禀得此道理惟人則得其全如動物則又近人之性矣故吕與叔云物有近人之性人有近物之性蓋人亦有昏愚之甚者然動物雖有知覺才死其形骸便腐壞植物雖無知覺然其質却堅久難壞問曾見答徐方叔書以為枯槁有理不知枯槁瓦礫如何有理曰且如大黃附子亦是枯槁然大黃不可為附子附子不可為大黃問枯槁之物亦有性是如何曰是他合下有此理故云天下無性外之物因行街云階磚便有磚之理因坐云竹椅便有竹椅之理枯槁之物謂之無生意則可謂之無生理則不可如朽木無所用止可付之㸑竈是無生意矣然燒甚麼木則是甚麼氣亦各不同這是理元如此問竊謂仁義禮智信元是一本而仁為統體故天下之物有生氣則五者自然完具無生氣則五者一不存焉只是說及本然之性先生以為枯槁之物亦皆有性有氣此又是以氣質之性廣而備之使之兼體洞照而不偏耳曰天之生物有有血氣知覺者人獸是也有無血氣知覺而但有生氣者草木是也有生氣已絶而但有形質臭味者枯槁是也是雖其分之殊而其理則未嘗不同但以其分之殊則其理之在是者不能不異故人為最靈而備有五常之性禽獸則昏而不能備草木枯槁則又并與其知覺者而亡焉但其所以為是物之理則未嘗不具耳若如所謂才無生氣便無此理則是天下乃有無性之物而理之在天下乃有空闕不滿之處也而可乎問理是人物同得於天者如物之無情者亦有理否曰固是有理如舟只可行之於水車只可行之於陸草木都是得隂氣走飛都是得陽氣各分之草是得隂氣木是得陽氣木堅走獸是得隂氣飛鳥是得陽氣故獸伏草而鳥棲木然獸又有得陽氣者如猿猴之類是也鳥又有得隂氣者如雉鵰之類是也唯草木都是得隂氣然却有隂中陽陽中隂者問動物有知植物無知何也曰動物有血氣故能知植物雖不可言知然一般生意亦可默見若戕賊之便枯悴不復悅懌他本作澤亦似有知者嘗觀一般花樹朝日照耀之時欣欣向榮有這生意皮包不住自迸出來若枯枝老葉便覺憔悴蓋氣行已過也問此處見得仁意否曰只看戕賊之便雕悴亦是義底意思看茄子內一粒是一生性樂庵李氏曰天地之性人為貴宇宙之間一切所有之物皆具天地之性虎狼有父子之仁螻蟻有君臣之義雎鳩有夫婦之别鴻鴈有兄弟之序鶬鶊有朋友之情若此者豈非天地之性而人獨為貴者何哉物得其偏人得其全也南軒張氏曰太極動而二氣形二氣形而萬物化生人與物俱本乎此者也原物之始亦豈有不善者哉其善者天地之性也而孟子道性善獨歸之人者何哉蓋人禀二氣之正而物則其繁氣也人之性善非被命受生之後而其性旋有是善也性本善而人禀夫氣之正初不隔其全然者耳若物則為氣所昏而不能以自通也惟人全夫天地之性故有所主宰而為人之心所以異乎庶物者獨在於此也北溪陳氏曰人物之生不出乎隂陽五行之氣本只是一氣分來有隂陽隂陽又分來為五行二與五則管分合運行便有參差不齊有清有濁有厚有薄且以人物合論同是一氣但人得氣之正物得氣之偏人得氣之通物得氣之塞且如人形骸却與天地相應頭圓居上象天足方居下象地北極為天中央却在北故人百㑹穴在頂心却向後日月來往只在天之南故人之兩眼皆在前海鹹水所歸在南之下故人之小便亦在前下此所以為得氣之正如物則禽獸頭橫植物頭向下枝葉却在上此皆得氣之偏處人氣通明物氣壅塞人得五行之秀故為萬物之靈物氣塞而不通如火煙鬱在裏許所以理義皆不通性命只是一箇道理不分看則不分曉只管分看不合看又離了不相干涉須是就渾然一理中看得有界分不相亂所以謂之命謂之性者何故大抵性只是理然人之生不成只空得箇理須有箇形骸方載得此理其實理不外乎氣得天地之氣成這形得天地之理成這性所以橫渠張子曰天地之塞吾其體天地之帥吾其性塞字只就孟子浩然之氣塞乎天地句掇一字來說氣帥字只就孟子志氣之帥句掇一字來說理人與物同得天地之氣以生天地之氣只一般因人物受去各不同人得五行之秀正而通所以仁義禮智粹然都與物異物得氣之偏為形骸所拘所以其理閉塞而不通人物所以為理只一般只是氣有偏正故理隨之而有通塞耳性理大全書卷二十九

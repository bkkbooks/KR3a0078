body:
  text: 性理大全書卷一太極圖朱子曰太極圖者濓溪先生之所作也先生姓周氏名惇寔字茂叔後避英宗舊名改惇頤家世道州營道縣濓溪之上博學力行聞道甚早遇事剛果有古人風為政精宻嚴恕務盡道理嘗作太極圖通書易通數十篇襟懷飄灑雅有髙趣尤樂佳山水廬山之麓有溪焉先生濯纓而樂之因寓以濓溪之號而築書堂於其上又曰先生之學其妙具於太極一圖通書之言亦皆此圖之藴而程先生兄弟語及性命之際亦未嘗不因其説觀通書之誠動静理性命等章及程氏書李仲通銘程邵公志顔子好學論等篇則可見矣潘清逸誌先生之墓敘所著書特以作太極圖為稱首然則此圖當為先生書首不疑也然先生既手以授二程本因附書後𫝊者見其如此遂誤以圖為書之卒章不復釐正使先生立象盡意之微指暗而不明而驟讀通書者亦復不知有所縂攝此則諸本之失也又嘗讀朱内翰振進易説表謂此圖之𫝊自陳摶种放穆修而來而五峯胡氏作序又以為先生非止為种穆之學者此特其學之一師耳非其至者也夫以先生之學之妙不出此圖以為得之於人則决非种穆所及以為非其至者則先生之學何以加於此圖哉是以竊嘗疑之及得誌文考之然後知其果先生所自作而非有受於人者二公蓋有未嘗見此誌而云云耳此所謂無極而太極也所以動而陽靜而隂之本體也然非有以離乎陰陽也即隂陽而指其本體不雜乎隂陽而為言耳此之動而陽靜而陰也中者其本體也者陽之動也之用所以行也者陰之靜也之體所以立也者之根也者之根也此陽變隂合而生水火木金土也者陽之變也者陰之合也陰盛故居右陽盛故居左陽穉故次火隂穉故次水冲氣故居中而水火之交系乎上隂根陽陽根陰也水而木木而火火而土土而金金而復水如環無端五氣布四時行也五行一陰陽五殊二實無餘欠也陰陽一太極精粗本末無彼此也太極本無極上天之載無聲臭也五行之生各一其性氣殊質異各一其無假借也此無極二五所以妙合而無間也乾男坤女以氣化者言也各一其性而男女一太極也萬物化生以形化者言也各一其性而萬物一太極也此以上引説解剝圖體此以下據圖推盡説意惟人也得其秀而最靈則所謂人者於是乎在矣然形之為也神之發也五性之徳也善惡男女之分也萬事萬物之象也此天下之動所以紛綸交錯而吉凶悔吝所由以生也惟聖人者又得夫秀之精一而有以全乎之體用者也是以一動一靜各臻其極而天下之故常感通乎寂然不動之中蓋中也仁也感也所謂也之用所以行也正也義也寂也所謂也之體所以立也中正仁義渾然全體而靜者常為主焉則人於是乎立而天地日月四時鬼神有所不能違矣君子之戒愼恐懼所以修此而吉也小人之放僻邪侈所以悖此而凶也天地人之道各一也陽也剛也仁也所謂也物之始也陰也柔也義也所謂也物之終也此所謂易也而三極之道立焉實則一也故曰易有太極之謂也朱子曰太極圖只是一箇寔理一以貫之太極一圏便是一畫只是撒開了引敎長一畫無極而太極上一圈則是太極但挑出在上無極而太極此五字添減一字不得無極而太極不是太極之外别有無極無中自有此理無極而太極此而字輕無次序故也無極而太極只是説無形而有理所謂太極者只二氣五行之理非别有物為太極也以理言之則不可謂之有以物言之則不可謂之無無極而太極正謂無此形狀而有此道理耳無極而太極正恐人將太極做一箇有形象底看故乂説無極言只是此理也無極而太極只是一句如沖漠無朕畢竟是上面無形象然却寔有此理圖上自分曉問無極且得做無形無象説曰雖無形却有理又問無極太極只是一物日本是一物被他恁地説却似両物無極是有理而無形如性何嘗有形太極是五行陰陽之理皆有不是空底物事若是空時如釋氏説性相似極是道理之極至總天地萬物之理便是太極問無極而太極固是一物有積漸否曰無積漸曰上言無極下言太極竊疑上言無窮無極下言至此方極曰無極者無形太極者有理也周子恐人把作一物㸔故云無極曰太極既無形氣象如何曰只是理太極只是極至更無去處了至髙至妙至精至神是没去處濓溪恐人道太極有形故曰無極而太極是無之中有箇極至之理問無極而太極因而字故生陸氏議論曰而字自分明下云動而生陽静而生陰説一生字便見其自太極來今曰而則只是一理老子之言有無以有無為二周子之言有無以有無為一謂之無極正以其無方所形狀以為在無物之前而未嘗不立於有物之後以為在陰陽之外而未嘗不行於陰陽之中以為通貫全體無乎不在則又初無聲臭影響之可言也不言無極則太極同於一物而不足為萬化之根不言太極則無極淪於空寂而不能為萬物之根只此一句便見其下語精宻微妙無窮而向下所説許多道理條貫脈絡井井不亂只今便在目前而亘古亘今攧撲不破天地之間只有動靜両端循環不已更無餘事此之謂易而其動其静則必有所以動靜之理是則所謂太極者也無極而太極人都想像有箇光明閃爍㡳物在那裏却不知本是説無這物事只是有箇理能如此動靜而已動静非太極而所以動靜者乃太極也故謂非動静外别有太極則可謂動靜便是太極之道則不可問太極動而生陽是有這動之理便能動而生陽否曰有這動之理便是動而生陽有這靜之理便是靜而生陰既動則理又在動之中既静則理又在靜之中曰動靜是氣也有這理為氣之主氣便能如此否曰是也既有理便有氣則理又在乎氣之中太極生陰陽理生氣也陰陽既生則太極在其中理復在氣之内也在所謂太極者便只在陰陽裏所謂陰陽者便只太極裏今人説是陰陽上别有一箇無形無影底是太極非也太極是箇藏頭物事動時屬陽而未動時又屬陰了太極無方所無形體無地位可頓放若以未發時言之未發却只是靜動靜陰陽皆只是形而下者然動亦太極之動靜亦太極之靜但動靜非太極耳故周子以無極言之謂太極含動靜以本體而言也謂太極有動靜以流行而言也若謂太極便是動靜則是形而上下者不可分而易有太極之言亦贅矣問太極分開只是両箇陰陽括盡了天下物事陰陽便是太極否曰某解圖云然非有以離乎陰陽也即陰陽而指其本體不雜乎陰陽而為言耳此句當仔細㸔今於某觧説句尚未通如何論太極問即陰陽而指其本體不雜乎陰陽而言之是於道有定位處指之否曰然一陰一陽之謂道亦是此意性猶太極也心猶陰陽也太極只在陰陽之中非能離陰陽也然至論太極則太極自有太極陰陽自是陰陽惟性與心亦然所謂一而二二而一也纔説太極便帶著陰陽纔説性便帶著氣不帶著陰陽與氣太極與性那裏收附然要得分明又不可不拆開問孟子言性與伊川如何曰孟子是剔出言性之本伊川是兼氣質而言要之不可離也所以程子云論性不論氣不備論氣不論性不明而某於太極圖觧亦云所謂太極者不離乎陰陽而為言亦不雜乎陰陽而為言無極只是無形狀太極只是至理理不外乎氣若説截然在陰陽五行之先及在陰陽五行之中便是理與氣判為二物矣両邉生者即是陰根陽陽根隂這箇有對從中出者無對問太極兼動靜而言曰不是太極兼動靜太極有動靜也問動靜是太極動靜是陰陽動靜曰是理動靜曰如此則太極有模様曰無問南軒云太極之體至靜如何曰不是問又云所至靜者貫乎已發未發而言如何曰如此却成一不正當尖斜太極問太極理也理如何動静有形則有動静太極無形恐不可以動靜言曰理有動靜故氣有動靜若理無動静則氣何自而有動靜乎未發者太極之静已發者太極之動未發之前太極之靜而陰也已發之後太極之動而陽也其未發也敬為之主而義已具其已發也必主於義而敬行焉則何間㫁之有哉太極只是天地萬物之理未有天地之先畢竞先有此理而生陽亦只是理静而生陰亦只是理無極者只是説這道理當初元無一物只是有此理而已此箇道理便㑹動而生陽靜而生陰問先有理抑先有氣日理未嘗離乎氣然理形而上者氣形而下者自形而上下言豈無先後理無形氣便有渣滓問理在先氣在後曰理與氣本無先後之可言但推上去時却如理在先氣在後相似又問理在氣中發見處如何曰如陰陽五行錯綜不失端緒便是理若氣不結聚時理亦無所附著問太極動而生陽靜而生陰見得理先而氣後曰二者有則俱有又問未有一物之時如何曰是有天下公共之理未有一物所具之理動而生陽靜而生陰動即太極之動靜即太極之靜動而後生陽靜而後生陰生此陰陽之氣謂之動而生靜而生則有漸次也太極動而生陽靜而生陰不是動後方生陽蓋纔動便属陽纔靜便属陰動而生陽其初本是靜靜之上又須動矣所謂動靜無端今且自動而生陽處㸔去問動然後生陽則是以動為主矣曰纔動便生陽不是動了而後生陽箇只得且從動上説起其實此之所以動又生於靜上面之靜又生於動此理只循環生去太極只是涵動靜之理却不可以動靜分體用葢靜即太極之體也動即太極之用也太極未動之前便是陰陰靜之中自有陽之根陽動之中又有陰之根動之所以必靜者根乎陰故也靜之所以必動者根乎陽故也陰陽只是一氣陰氣流行即為陽陽氣凝聚即陰非真有二物相對也此理甚明問陽何以言變陰何以言合曰陽動而陰隨之故言變合陽變陰合初生水火水火氣也流動閃爍其體尚虚其成形猶未定次生木金則確然而定形矣水火初是自生木金則資於土五行之属皆從土中旋生出來天地生物先其輕清以及重濁天一生水地二生火二物在五行中最輕清金木又重於水火土又重於金木就原頭定體上説則未分五行時只謂之陰陽未分五性時只謂之健順及分而言之則陽為木火陽為金水徤為仁禮順為義智問陰盛何以居右陽盛何以居左曰左右但以陰陽之分耳又問木陽樨故次火金陰樨故次水豈以水生木土生金耶四以四時之序推之可見水質陰而性本陽火質陽而性本陰水外暗而内明以其根於陽也火外明而内暗以其根於陰也太極圖陽動之中有黑底陰盡之中有白底是也横渠言陰陽之靜亙藏其宅正此意也火中有黑陽中陰也水外黑而中却明者陰中陽也故水謂之陽亦得火謂之陰亦得陰陽氣也生此五行之質天地生物五行獨先地即是土土便包容許多金木之類天地之間何事而非五行五行陰陽七者衮合便是生物底材料五氣順布四時生焉金木水火分屬春夏秋冬土則寄旺四季如春属木而清明後十八日即是寄土旺之時毎季寄旺十八日共七十二日惟夏季十八日土為氣最旺故能生秋金也以圖象攷之木生火金生水之類各有小畫相牽聨而火生土土生金獨穿乎土之内餘則從旁而過為可見矣五行之生非有先後如數一二三四五自然有先後次序陰總而言之只是陰陽分而言之有五五行一陽也舎五行無别討陰陽處如甲乙属木甲便是陽乙便是陰丙丁属火丙便是陽丁便是陰不須更説陰陽而陰陽在其中矣自見在事物而觀之則陰陽函大極推原其本則太極生陰陽問既曰太極又有箇無極如何曰太極本無極要去就中看得這意出方見得五行一陰陽陰陽一太極則非太極之後别生二五而二五之上先有太極也無極而太極太極本無極則非無極之後别生太極而太極之上先有無極也五行一陰陽也陰陽一太極也太極本無極也此當思無有陰陽而無太極底時節若以為止是陰陽陰陽却是形而下者若専以理言則太極又不曾與陰陽相離正當沉潜玩索將圖象意思抽開細看又復合而觀之某觧此云非有離乎陰陽也即陰陽而指其本體不雜乎陰陽而為言也此句自有三節意思更宜深攷通書云靜而無動動而無靜物也動而無動靜而無靜神也當即此兼看太極云者合天地萬物之理而一名之耳以其無器與形而天地萬物之理無不在是故曰無極而太極以其具天地萬物之物而無器與形故曰太極本無極是豈離乎生民日用之常而自為一物哉問無極太極本非二物曰無極而太極而無極中萬象森列不可謂之無矣太極本無極則太極之體冲漠無朕不可謂之有矣問先生答書言陰陽五行之為性各是一氣所禀而性則一也両性字同否曰一般又曰同者理也不同者氣也又曰他所以道五行之生各一其性又問莫是木自是木火自是火而其理則一曰且如這光也有在硯葢上底也有在墨上底其光則一也纔生五行便被氣質拘定各為一物亦各有一性而太極無不在也問五行之生各一其性理同否曰同而氣質異曰既説氣質異則理不相通曰固然仁作義不得義作仁不得問五行之生各一其性五性感動而善惡分此性字是兼氣禀言之否曰性離氣禀不得有氣禀性方存在裏面無氣禀性便無所寄搭了禀得氣清者性便在清氣之中這清氣不隔蔽那善禀得氣濁者性又在濁氣之中為濁氣所蔽五行之生各一其性這又隨物各具去了金木水火土雖曰五行各一其性然一物又各具五行之理不可不知康節曾細推來問五行均得太極否曰均曰人具五行物只得一行曰物亦具有五行只是得五行之徧者耳氣是那初禀底質是成這模様子底氣質之性只是此理墮在氣質之中故随氣質而自為一性周子所謂各一其性者向使元無本然之性則氣質之性從何處得來問氣之所聚理亦聚焉然理終為主此即所謂妙合也曰然成男成女萬物化生而無極之妙未嘗不在是焉問萬物化生一太極此是以理言以氣言曰以理言太極非是别為一物即陰陽而在陰陽即五行而在五行即萬物而在萬物只是一箇理而已因其極至故名曰太極問太極便是人心之至理曰事事物物皆有箇極是道理之極至或曰如君之仁臣之敬便是極曰此是一事一物之極總天地萬物之理便是太極太極只是箇極好至善底道理人人有一太極物物有一太極周子所謂太極是天地人物萬善至好底表徳問自太極以至萬物化生只是一箇圏何嘗有異曰人物本同氣禀有異故不同問靈處是心抑是性曰靈處只是心不是性性只是理知覺是心之靈形既生矣形體陰之為也神發知矣神知陽之為也蓋陰主翕凡歛聚成就者陰為之也陽主闢凡發暢揮散者皆陽為之也在天只是陰陽五行在人得之只是剛柔五常之性而其氣便是春夏秋冬其物便是金木水火土其理便是仁義禮智信仁義禮智信之性即水火金木土之理木仁金義火禮水智各有所主獨土無位又為四行之實故信亦無位而為四徳之實也問仁義禮智之四徳又添信字謂之五性如何曰信是誠實此四者實有此仁實有此義與禮智皆然如五行之有土非土則不足以載四者又如土於四時各寄王十八日或謂王於戊巳然季夏乃土之本宫故尤王夏末月令載中央土者以此故也天地之間陰陽而已以人分之則男女也以事言之則善惡也何適而不得其類哉或以為善惡為男女之分或以為陰陽之事凡此両件相對説者無非陰陽之理分陰陽而言之或説善惡或説男女看他如何使故善惡可以言陰陽亦可以言男女吉凶相對而悔吝在其中悔自凶而趨吉吝自吉以向凶人之所禀又有昏明清濁之異故上知生知之資是氣清明純粹而無一毫昏濁所以生知安行不待學而能如堯舜是也聖人之生其禀受渾然氣質清明純粹全是此理更不待脩為而與天為一聖人表裏精粗無不昭徹其形骸雖是人只是一團天理問周子言仁義中正亦甚大今乃自偏言止是属扵陽動陰靜曰不可如此看反覆皆可問仁義禮智體用之别曰自陰陽看下來仁禮属陽義智属陰仁禮是用義智是體春夏冬是陽秋冬是陰只將仁義説則春作夏長秋歛蔵義也若將仁義禮智説則春仁也夏禮也秋義也冬智也仁禮是敷施出來底義是肅殺果斷底智便是收蔵底中正仁義分属動靜而聖人則主於靜盖正所以能中義所以能仁克己復禮義也義故能仁易言利貞者性情也元亨是發動處必至於利貞乃見乾之寔體萬物到秋冬收歛成寔方見得他本質故曰性情此亦主靜之説也主靜云者以其相資之勢言之則動有資於靜而靜無資於動如乾不専一則不能直遂坤不翕聚則不能發散龍蛇不蟄則無以奮尺蠖不屈則無以伸亦天理之必然也太極首言性命之源用力處却在修吉悖㓙其本則主於靜小而言之飢食渴飲出作入息大而言之君臣父子夫婦朋友無非是天地之事只是這一箇道理所以君子修之便吉小人悖之便㓙這物事機闗一下發轉後便攔它不住如水車相似才踏發這機便住不得所以聖賢一日二日萬機兢兢業業如臨深淵履薄氷只是大化恁地流行随得是便好随得不便是遏他不住存心養性所以事天也夭夀不萬貳修身以俟之所以立命也太極只是天地物之理在天地則天地中有太極在萬物則萬物中各有一太極問仁是柔如何属剛義是剛如何却属柔曰仁剛陽是一様意思義柔陰是一様意思盖仁本是柔物事發出却剛但看萬物發生時便恁地奮迅出来有剛底意思義夲是剛底物事發出来却柔但看萬物肅殺時便恁他收歛憔悴有柔底意思又問楊子云於仁也剛於義也柔如何曰仁體柔而用剛義體剛而用柔曰此豈所謂陽根陰陰根陽耶曰然極至也三極天地人之至理三才各一太極也易者陰陽之變太極者其理也易有太極者象数未形而其理已具之稱形器既具而其理無朕之目太極之義正謂理之極致耳有是理即有是物無先後次第之可言故曰易有太極則是太極乃在陰陽之中而非在陰陽之外也周子説太極和陰陽衮説易中便擡起説周子言太極動而生陽靜而生陰動時便是陽之太極靜時便是陰之太極盖太極即在陰陽裏如易有太極是生兩儀則先從寔理處説若論其生則俱生太極依舊在陰陽裏但言其次序須有這寔理方始有陰陽也其理則一易有太極便是下面両儀四象八卦自三百八十四爻總為六十四自六十四總為八卦自八卦總為四象自四象總為両儀自両儀總為太極以物論之易之有太極如木之根浮圖之頂是有形之極太極却不是一物無方所頓放是無形之極故周子曰無極而太極是他説得有功處夫太極之所以為太極却不離乎両儀四象八卦如一陰一陽之謂道指一陰一陽為道則不可而道則不離乎陰陽也易變易也兼指一動一靜已發未發而言之也太極者性情之妙也乃一動一靜未發已發之理也故曰易有太極言即其動靜闔闢而皆有此理也或問太極曰未發便是理已發便是情如動而生陽便是情勉齋黃氏曰極之得名以屋之脊棟為一屋之中居髙處盡為衆木之總㑹四方之尊仰而舉一屋之木莫能加焉故極之義雖訓為至而實則以有方所形狀而指名也如北極皇極爾極民極之䫫皆取諸此然皆以物之有方所形狀適似於極而具極之義故以極明之以物喻物蓋無難曉惟大𫝊以易之至理在易之中為衆理之總㑹萬化之本原而舉天下之理莫能加焉其義莫可得名而有類於極於是取極名之而係以太則其尊而無對又非它極之比也然則太極者特假是物以名是理雖因其有方所形狀以名而非有方所神狀之可求雖與他書所用極字取義略同而以實喻虚以有喻無所喻在於言外其意則異周子有見於此恐夫人以它書閑字之例求之則或未免滯於方所形狀而失聖人取喻之意故為之言曰無極而太極盖其措辭之法猶曰無形而至形無方而太方欲人知夫非有極是極而謂之太極亦特托於極以明理耳又曰太本無極也盖謂之極則有方所形狀矣故又反而言之謂無極云耳本非有極之寔欲人不以方所形狀求而當以意㑹於此其反覆推本聖人所以言太極之意最為明白後之讀者字義不明而以中訓極已為失之然又不知極字但為取喻而遽以理言故不惟理不可無於周子無極之語有所難通且太極之為至理其辭已足而加以無極則誠似於贅者矣因見象山論無極書正應不能察此而輒似於麤辨為之竊歎故著其説如此云未有五行只得喚做陰陽既有五行則陰陽在五行之中矣太極只是極至之理不可形容聖賢只説到一陰一陽處住只是箇一陰一陽底道理所以天地寒暑晝夜生死千變萬化都只是一様分而言之則一物各具一陰陽合而言之則萬物總具一陰陽耳不北溪陳氏曰所謂無極而太極而字只輕接過可就此句中間截作両截看無極只是説理無形狀無方體正猶言無聲無臭之類太之為言甚也太極是極至之甚無可得而形容故以太名之太極之所以為極至者言此理至中至正至精至粹至神至妙至矣盡矣不可以復加矣故強名之曰極未有天地萬物先有此理然此理不是懸空在那裏纔有天地萬物之理便有天地萬物之氣纔有天地萬物之氣則此理便全在天地萬物之中周子所謂太極動而生陽靜而生陰是有這動之理便能動而生陽纔動而生陽則是理便已具於陽動之中有這靜之理便能靜而生陰纔靜而生陰則是理便已具於陰靜之中然則纔有理便有氣纔有氣則理便全在這氣裏面那相接處全無些小縫罅如何分得孰為先孰為後所謂動靜無端陰陽無始分别得先後便偏去一邊非渾淪極至之物分而為五非有欠合而為一非有餘言太極渾淪之妙用自無而入於有自有而𣸪於無又只是渾淪一無極也五者謂之五常亦謂之五性然造化推原来只是五行之徳仁在五行為木之神在人性為仁義在五行為金之神在人性為義禮在五行為火之神在人性為禮智在五行為水之神在人性為智人性中只有仁義禮智四位却無信位如五行木位東金位西火位南水位北而土無定位只寄處於四位之中水属春火属夏金属秋水属冬而土無専氣只分王於四季之間四行無土便都無所該載猶仁義禮智無信便都不實了則仁義禮智之寔理便是信信却易曉仁義禮智須逐件㸔得分明又要合聚㸔得脈絡不亂問智是知得確定在五行何以属水曰水清明可鑒似智又是造化之根本凡天地間萬物皆得水方生只看地下泉脈滋潤何物不資之以生亦猶萬事非智不可須知得確定方能成此水於萬物所以成始而成終而智亦萬事之所以成終而成始也聖人一心渾淪太極之全體而酬酢萬變無非太極流行之用學問功夫須從萬事萬物中串過湊合成一渾淪大本中散為萬事萬物使無少窒礙然後實體得渾淪至極者在我而大用不差矣太極只是渾淪極至之理非可以氣形言古經書説太極惟見於易繫辭𫝊曰易有太極易只是陰陽變化其所以為陰陽變化之理則太極也三極之道三極云者只是三才極至之理其謂之三極者以是三才之中各具一太極而太極之妙無不流行於三才之中也外此百家諸子都説属氣形去差了如漢志謂太極函三為一乃是指做天地人三箇氣形已具而渾淪未判底物老子説有物混成先天地生此正是指太極莊子謂道在太極之先所謂太極亦是指三才未判渾淪底物而道又别是一箇懸空底物在太極之先則道與太極分為二矣不知道即是太極道是以理之通行者而言太極是以理之極至者而言何嘗有二理耶萍鄉胡氏曰先師文公有云無極即是無形太極即是有理今雖多為之詞無以易此言矣然則邵子所謂道為太極心為太極何耶曰先師所釋以名義言之也邵子道為太極以流行者言之也心為太極以統㑹者言之也流行者萬物各具一理統㑹者萬理同出一原不知統㑹無以操存不識流行無以處物節齋蔡氏曰易有太極易變易也夫子所謂無體之易也太極至極也言變易無體而有至極之理也先儒皆以太極二字便為萬化之原而於易之一字但目為易書故周子太極圖説特以無極而太極發明易有太極之㫖其所謂無極而太極者蓋亦言其無體之易而有至極之理也是其無極之真寔有得於夫子之一言而或以為周子妄加者繆也夫子言有者主易而為言也周子言無者主太極而為言也主易則易無體故曰有主太極則太極有朕故曰無曰有曰無由所主不同耳然其理未嘗不同也或曰夫子何為主易而周子何為主太極曰夫子賛易則當主易周子作太極圖則當主太極又何疑焉西山真氏曰無極而太極豈太極之上别有所謂無極哉不過謂無形無象而至理存焉耳蓋極者至極之理也窮天下之物可尊可貴孰有加於此者故曰太極也世之人以北辰為天極以屋脊為屋極此皆有形而可見者周子恐人亦以太極為一物故以無極二字加於其上猶言本無一物只有此理也自陰陽以下則麗乎形氣矣陰陽未動之前則是此理豈有物之可名耶即吾一心而觀之方喜怒哀樂之未發也渾然一性而已無形無象之中萬理畢具非所謂無極而太極乎陰黃氏巖孫曰通書云水陰根陽火陽根陰注水也而生於一則本乎陽火陽也而生於二則本乎陰正圖書相表裏之意又云五殊二實亦當與此参觀無極而太極上天之載無聲無臭而實造化之樞紐品彚之根柢也故曰無極而太極非太極之外復有無極也問太極解引上天之載無聲無臭此上天之載只是太極否朱子曰蒼蒼者是上天理在載字上原極之所以得名葢取樞極之義聖人謂之太極者所以指夫天地萬物之根也周子因之而又謂之無極者所以著夫無聲無臭之妙也問明道言人生而靜以上不容説則周子之所謂無極也不可容言也若太極則性之謂也太極固純是善自無極而言則只可謂之繼明道之言所以發明周子之意也曰周子所謂無極而太極非謂太極之上别有無極也但言太極非有物耳如云上天之載無聲無臭故下文云無極之真二五之精既言無極則不復别舉太極也若如今説則此處豈不欠一太極字耶問無極而太極何如曰仔細看便見得問先生之意莫正是以無極太極為理曰此非某之説他道理自如此著自家私意不得太極無形象只是理他自有這箇道理自家私著一字不得問無極而太極極是極至無餘之謂無極是無之至至無之中乃至有存焉故云無極而太極曰本只是太極只為這本來都無物事故説無極而太極如公説無極恁他説却好但太極説不去曰有字便是太字地位曰將有字訓太字不得太極只是箇理曰至無之中乃萬理之至有也曰亦得問既曰易有太極則不可謂之無濓溪乃有無極之説何也曰有太極是有此理無極是無形器方體可求両儀有象太極則無象問邵先生説無極之前無極如何説前曰邵子就圖上説循環之意自垢至坤是陰含陽自復至乾是陽分陰復坤之間乃無極自坤反垢是無極之前凡大讀書不要般涉但温尋舊底不妨不可將新底來攙無極而太極不是説有箇物事光輝地在那裏只是説這裏當中皆無一物只有此理而已既有此理便有此氣既有此氣便分陰陽以此生許多物事惟其理有許多故物亦有許多上天之載無聲無臭是就有中説無無極而太極是就無中説有若實見得説有説無或先或後都無妨礙南軒張氏曰必曰無極而太極者所以明動靜之本著天地之根兼有無貫顯微該體用者也必有見乎此而後知太極之妙不可以方所求也其義深矣勉齋黃氏曰太極圖説云無極而太極妄意謂無極而太極者非老氏之出無入有與佛之所謂空也乃斯道之本體萬化之領㑹而子思所謂天命之性而孟子所謂生之為性也通書統論之曰誠者聖人之本也大哉乾元萬物資始誠之源也乾道變化各正性命誠斯立焉純粹至善者也此所以發明無極而太極原始而要其終也既又引易之繫辭而明之曰一陰一陽之謂道繼之者善也成之者性也元亨誠之通利貞誠之復大哉性命之源乎盖沖漠無朕之中萬象森然已具而無所虧欠天之所以覆地之所以載日月之所以照鬼神之所以幽風雷之所以變江河之所以流性命之所以正倫理之所以著人之所以為聖人本末上下貫乎一理其實然而不可易者歟北溪陳氏曰無極之説始於誰乎桞子曰無極之極康節先天圖説亦曰無極之前陰含陽也有極之後陽分陰也是周子以前已有無極之説矣但其主意各不同桞子康節是以氣言周子則専以理言之耳理雖無形狀方體萬化無不以為之根柢樞紐以其渾淪極至之甚故謂之太極文公解此句所謂上天之載無聲無臭是解無極二字所謂萬化之樞紐品彚之根柢是解太極二字又結以非太極之外復有無極也多少是分明無聲臭只是無形狀若少有聲臭便涉形狀落方體不得謂之無極矣文公解用無聲臭語是説二字之大義詞不廹切而其理自曉或問所謂無極而太極者亦可得而聞其説之詳乎雙峯饒氏曰難言也姑以名義推之所謂太極者蓋天理之尊號云爾極者至極之義樞紐根柢之名世之常言所謂樞極根極是也聖人以陰陽五行闔闢不窮而此理為闔闢之主如户之有樞紐男女萬物生生不息而此理為生生之本如木之有根柢至其在人則萬善之所以生萬事之所以定者亦莫非此理為之根柢為之樞紐焉是故謂之極大者大無以加之稱言其為天下之大樞紐大根柢也然凡謂之極者如南極北極屋極商邑四方之極之類皆有形狀之可見方所之可指而此極獨無形狀無方所故周子復加無極二字以明之以其無樞紐根柢之形而實為天下之大樞紐大根柢也故曰無極而太極以其為天下之大樞紐大根柢而初非有樞紐根柢之形也故曰太極本無極也此雖名義之粗然先儒嘗云讀書之法當先曉其文義文義既通然後可以求其意學者茍知此義而於日用之間端莊靜一以養之於未發之時而驗之於已發之際則是理之妙或者亦可以黙識矣太極動而生陽動極而靜靜而生隂静極復動一動一靜互為其根分陰分陽兩儀立焉太極之有動靜是天命之流行也所謂一陰一陽之謂道誠者聖人之本物之始終而命之道也其動也誠之通也繼之者善萬物之所資以始也其靜也誠之復也成之者性萬物各正其性命也動極而靜靜極復動一動一靜互為其根命之所以流行而不已也動而生陽靜而生陰分陰分陽兩儀立焉分之所以一定而不移也葢太極者本然之妙也動靜者所乘之機也太極形而上之道也陰陽形而下之器也是以自其著者而觀之則動靜不同時陰陽不同位而太極無不在焉自其微者而觀之則沖漠無朕而動靜陰陽之理已悉具於其中矣雖然推之於前而不見其始之合引之於後而不見其終之離也故程子動靜無端陰陽無始非知道者孰能識之朱子問太極動而生陽延平李氏曰此只是理做已發看不得又問既言動而生陽即與復卦一陽生而見天地之心何異竊恐動而生陽即天地之喜怒哀樂發處於此即見天地之心二氣交感化生萬物即人物之喜怒哀樂發處於此即見人物之心如此做兩節看不知得否曰太極動而生陽至理之源只是動靜闔闢至於終萬物始萬物亦只是此理一貫也到得二氣交感化生萬物時又就人物上推亦只是此理中庸以喜怒哀樂未發已發言之又就人身上推㝷只於見得大本達道處又衮同只是此理此理就人身上推尋若不於未發已發處看即何緣知之葢就天地之本源與人物上推來不得不異此所以於動而生陽難以為喜怒哀樂已發言之在天地只是理也今欲作両節看切恐差了復卦見天地之心先儒以為靜見天地之心伊川先生以為動乃見此恐便是動而生陽之理然於復卦發出此一段示人又於初爻以顔子不遠復為之此只要示人無間斷之意人與天理一也就此理上皆收攝來與天地合其徳與日月合其明與四時合其序與鬼神合其吉㓙皆其度内耳朱子曰靜者性之所以立也動者命之所以行也然其實則静亦動之息爾故一動一靜皆命之行而行乎動靜者乃性之真也故曰天命之謂性隂陽迭運者氣也其理則所謂道問一陰一陽之謂道是太極否曰陰陽只是陰陽道是太極葢所以一陰一陽者也問一陰一陽之謂道陰陽氣也所以陰陽道也道也者陰陽之理也曰此説得之陰陽何以謂之道當離合看一陰一陽之謂道則陰陽是氣不是道所以為陰陽者乃道也若只言陰陽之謂道則陰陽是道今曰一陰一陽則是一陰了又一陽往來循環不已者乃道也大傳既曰形而上者謂之道矣而又曰一陰一陽之謂道此豈直以陰陽為形而上者哉正所以見一陰一陽雖属形器然其所以一陰而一陽者是乃道體之所為也故語道體之至極則謂之太極語太極之流行則謂之道雖有二名初無両體以理言之則天地之間至實而無一息之妄故自古至今無一物之不實而一物之中自始至終皆實理之所為也以心言之而聖人之心亦至實而無一息之妄故從生至死無一事之不實而一事之中自始至終皆實心之所為也此所謂誠者物之終始者然也問誠者聖人之本曰此言本領之本聖人之所以聖者誠而已問誠者物之終始而命之道也曰誠是實理徹上徹下只是這箇生物都從那上做來萬物流形天地之間都是那底做有此理則有此物徹頭徹尾皆是此理所謂未有無此理而有此物也太極如一本生上分而為枝幹又分而生花生葉生生不窮到得成果子裏面又有生生無窮之理生將出去又是無限箇太極更無停息只是到成果寔時又却畧少歇也不是生到這裏自合少止所謂終始萬物莫盛於艮艮止是生息之意誠者物之終始却是事物之實理始終無有間斷自開闢以來以至人物消盡只是如此在人之心茍誠實無偽則徹頭徹尾無非此理一有間斷處即非誠矣凡有一物則其誠也必有所始其壞也必有所終而其所以始者實理之至而向於有也其所以終者寔理之盡而向於無也此誠所以為物之終始誠之通是造化流行未有成立之初所謂繼之者善誠之復是萬物已得此理而皆有所歸藏之時所謂成之者性在人則感而遂通者誠之通寂然不動者誠之復流行造化處是善凝成於我處是性繼是接續綿綿之意成是凝成有主之意繼之者善繼之為義接續之意言既有此道理其接續此道理以生萬物者莫非善而物之成形即各具此理而為性也繼字便是動之頭若只一開一闢而無繼便是闔殺了問繼是動靜之間否曰是靜之終動之始也且如四時到得冬月萬物都歸窠了若不㑹生來年便都息了葢是貞復生元無窮如此只是這一箇物事所以萬物到秋冬時各自收歛閉藏忽然一下春來各自發越條暢這只是一氣一箇消一箇息只如人相似方其嘿時便是靜及其語時便是動那箇滿山青黃碧綠無非是這太極所以仁者見之謂之仁智者見之謂之智百姓日用而不知是那一陰一陽之謂道繼之者善也成之者性也繼之者善是動處成之者性是靜處繼之者善是流行出來成之者性則各自成箇物事繼善便是元亨成性便是利貞及至成之者性各自成箇物事恰似造化都無可做了及至春來又流行出來又是繼之者善譬如禾穀則秋歛冬藏千條萬檖各自成一箇物事及至春又各自發生出以至人物以至禽獸皆是如此且人如方在胞胎中受父母之氣則是繼之者善及其生出又自成一箇物事則是成之者性也既成其性又自繼善只是這一箇物事今年一生了明年又生一副當物事來又繼之者善又成之者性只是這一箇物事衮將去所以仁者見之謂之仁只是見那發生處智者見之謂之智只是見那收斂處百姓日用而不知便是不知所謂發生亦不知所謂收斂醉生夢死而已周先生太極通書只是衮這幾句易之為義也只是如此只是陰陽交錯千變萬化皆從此出太極動而生陽元未有物且是如此動盪所謂化育流行也便是繼之者善靜而生陰陰主凝結然後萬物各正性命方是成之者性問繼之者善也成之者性也竊謂妙合之始便是繼乾道成男坤道成女便是成曰動而生陽之時便有繼底意及至靜而生陰方是成六十四卦之序至復而繼問太極圖解曰動而生陽誠之通也繼之者善萬物之所以資始也靜而生陰誠之復也成之者性萬物各正其性命也夫無極之真誠也動而生陽靜而生陰動靜不息而萬物繼此以出與因此以成者皆誠之著固無有不善者亦無非性也似不可分陰陽而為辭如以資始為繫於陽以正性命為繫於陰則若有獨陽而生獨陰而成者矣詳究先生之意必謂陽根於陰陰根於陽陰陽元不相離如此而非得於言表者不能喻此也曰繼善成性分属陰陽乃通書首章之意但􅍄讀之自可見矣葢天地變化不為無陰然物之未形則属乎陽物正其性不為無陽然形器已定則属乎陽嘗謂張忠定公語云公事未著字以前属陽著字以後属陰似亦窺見其意問繼之者善之時此所謂性善至成之者性然後氣質各異方説得善惡曰既謂之性則終是未可分善惡問太極解何以先動而後靜先體而後用先感而後寂曰在陰陽言則用在陽而體在陰然動靜無端陰陽無始不可分先後今此只是就起處言之畢竟動前又是靜用前又是體感前又是寂陽前又是陰而寂前又是感靜前又是動將何者為先後不可只道今日動便為始而昨日靜更不説也如鼻息言呼吸則辭順不可道吸呼畢竟呼前又是吸吸前又是呼動極復靜靜極復動還當把那箇做劈初頭始得今説太極動而生陽是且把眼前即今箇動斬截便説起其實那動以前又是靜靜以前又是動如今日一晝過了便是夜夜過了又只是明日晝即今晝以前又有夜了昨夜以前又有晝了即今要説時日起也只是把今日建子説起其實這箇子以前豈是無子當初元無一物只有此理有此理便㑹動而生陽静而生陰靜極復動動極復靜循環流轉其實理無窮氣亦與之無窮自有天地便有這物事在這裏流轉一日有一日之運一衮月有一月之運一嵗有一嵗之運只是這箇物事衮將出如水車相似一箇起一箇倒一箇上一箇下其動也便是仁是中其靜也便是正是義不動則動不靜則動如人不語則嘿不嘿則語中間更無空缺處問太極始於陽動乎曰陰靜是太極之本然陰靜又自陽動而生一動一靜便是一箇闔闢之大者推而上之更無窮極不可以本始言問理與氣曰有此理便有此氣但理是本而今且從理上説起如云太極動而生陽動極而靜靜而生陰不成動以前便是靜了程子曰動靜無端此亦且是自那動處説起若論著動以前又有靜靜以前又有動問太極主靜之説是先靜後動否曰動靜無端陰陽無始雖是合下靜靜而後動若細推時未靜時須先動來所謂如環無端互為其根謂如在人人之動作及其成就却只在靜便如渾淪未判之時亦須曽明盛一畨来只是這道理層層流轉不可窮詰太極圖中盡之動極生靜亦非是又别有一箇靜來繼此動但動極則自然靜靜極則自動推而上之没理㑹處問太極之有動靜是靜先動後否曰一動一靜循環無端無靜不成動無動不成靜譬如鼻息無時不嘘無時不吸嘘盡則生吸吸盡則生嘘理自如此太極動而生陽靜而生陰非是動而後有陽靜而後有陰截然為両段先有此而後有彼也只太極之動便是陽靜便是陰方其動時則不見靜方其靜時則不見動然動而生陽亦只是且從此説起陽動以上更有在程子所謂動靜無端陰陽無始於此可見陰隂陽本無始但以陽動陰靜相對言則陽為先陰為後陽為始陰為終猶一嵗以正月為更端其實姑始於此耳嵗首以前非截然别為一段事則是其循環錯綜不可以先後始終言亦可見矣動靜無端陰陽無始本不可以先後言然就中間截斷言之則不得不言其有先後也如太極動而生陽則其未動之前固已嘗靜矣靜極復動則已靜之後有必有動矣就此看又有先後也太極動而生陽只是如一長物不免就中間截㫁説其實動之前未嘗無靜靜之前又未嘗無動如繼之者善也亦是就此説起譬之俗語謂今日為頭已前底更不受理意思一動一靜互為其根動而靜静而動闔闢往來更無休息分陰分陽兩儀立焉兩儀是天地與畫卦兩儀意思又别動靜如晝夜陰陽如東西南北分從四方去一動一靜以時言分陰分陽以位言方渾淪未判陰陽之氣混合幽暗及其既分中間放得寛濶光朗而兩儀始立邵康節以十二萬九千六百年為一元則是十二萬九千六百年之前又是一箇大闔闢更以上亦復如此直是動靜無端陰陽無始小者大之影只晝夜便可見五峯所謂一氣大息震蕩無垠海宇變動山渤川湮人物消盡舊跡大滅是謂洪荒之世嘗見髙山有螺蚌殼或生石中此石即舊日之土螺蚌即水中之物下者却變而為髙柔者却變而為剛此事思之至深有可驗者陰陽有箇流行底有箇定位底一動一靜互為其根是流行底寒暑往來是也分陰分陽兩儀立焉是定位底天地四方是也易有兩義一曰變易便是流行底一曰交易便是對峙底隂陽若論流行底則只是一箇對峙底則兩箇陰陽作一箇看亦得做兩箇看亦得若論流行底則只一箇消長而已如一動一靜互為其根是也若對峙底則有兩箇分陰分陽兩儀立焉是也若論對立底無一物無陰陽如至微之物也有箇背面若説流行處却只是一氣問必至於互為其根方分陰陽曰從動靜便分問分隂分陽是帶上句曰然問太極動而生陽靜而生陰靜極復動則動復生陽靜復生陰不知分陰陽以立両儀在靜極復動之前為復在後曰動而生陽靜而生陰則陰陽分而兩儀立焉靜極復動以後所以明混闢不窮之妙程子所謂無截然為陰為陽之理即周子所謂互為其根也程子所謂升降生殺之大分即周子所謂分陰分陽也二句相須其義始備問太極圖兩儀中有地五行中又有土如何分别曰地言其大槩土是地之形質問分陰分陽兩儀立焉分之所以一定而不可移也不知名分之分性分之分曰分猶定位耳問如何是所乘之機曰理搭於氣而行問有此理然後有此氣曰此本無先後之可言然必推其所從來則須説先有此理然理又非别為一物即存乎是氣之中無是氣則是理亦無掛搭處圖解云動靜者所乘之機識者謂此語最精葢太極是理陰陽是氣理無形而氣有迹氣既有動靜則所載之理亦安得無動靜問太極只是理理不可以動靜言惟動而生陽靜而生陰理寓於氣不能無動靜所乘之機乘如乘載之乘其動靜者乃乘載在氣上不覺動了靜静了又動曰然太極理也動靜氣也氣行則理亦行二者常相依而未嘗相離也陽動陰靜非太極動靜只是理有動靜理不可見因陰陽而後知理搭在陰陽上如人跨馬相似馬所以載人人所以乘馬馬之一出一入人亦與之一出一入蓋一動一靜而太極之妙未嘗不在焉此所謂所乘之機無極二五所以妙合而凝也問動靜者所乘之機曰機氣機也又曰機是闗捩子踏著動底機便挑撥得那靜底踏著靜底機便挑撥得那動底某向以太極為體動靜為用其言固有病後已改之曰太極者本然之妙也動靜者所乘之機也此則庶幾近之天地之間有理有氣理也者形而上之道也生物之本也氣也者形而下之器也生物之具也問太極一陰一陽曰一陰一陽道也陰陽噐也問陰陽氣也何以謂形而下者曰既曰氣便是有箇物事此謂形而下者問形而上下如何以形言曰此言最的當設若以有形無形言之便是物與理相間斷了所以程子謂欄截得分明者只是上下之間分别得一箇界止分明器亦無道道亦器有分别而不相離也形而上者無形影是理形而下者有形有狀是器然有此器即有此理有此理則有此器未嘗相離却不是於形氣之外别有所謂理形而上底虚渾是道理形而下底實便是器這箇分别得精切明道説惟此語截得上下分明問明道云陰陽亦形而下者而曰道只此両句截得上下分明截字莫作斷字誤曰正是截字形而上形而下只就形處離合分明此正是界至處若止説作在上在下便成両截矣問伊川言形而上者謂之道形而下者謂之器須著如此説曰這是伊川見得分明故云須著如此説形而上者是理形而下者是物如此開説方見分明如此了方説得道不離乎器器不遠乎道處如人君須止於仁為人臣止於敬為人子止於孝為人父止於慈這是道理合如此今人不解恁他説更不索性兩邊説怎生説得通可見底是器不可見底是道理是道物是器器亦道道亦器也道未嘗離乎器只是器之理如這人身是器語言動作便是人之理理只在器上理與器未嘗相離形而上者謂之道形而下者謂之器這箇在人看始得推器為道固不得離器於道亦不得且如此火是器自有道在裏理則一而已矣其形者則謂之器然而道非器不形器非道不立葢陰陽亦器也而所以陰陽者道也是以陰陽往來不息而聖人指是以明道之全體也此一陰一陽之謂道之説也問道理也陰陽氣也何故以陰陽為道曰形而上者謂之道形而下者謂之氣明道以為須著如此説然道亦器器亦道也道未嘗離乎器道只是器之理如這交椅是器可坐便是交椅之理如這人身是器言語動作便是人之理理只是器理與器未嘗相離所以一陰一陽之謂道曰何謂一曰道如一闔一闢謂之變只是一陰了又一陽此便是道寒了又暑暑了又寒這道理循環不已維天之命於穆不已萬古只如此道是道理事事物物皆有箇道理器是形迹事事物物亦皆有箇形迹有道須有器有器須有道物必有則形而上者指理而言形而下者指事物而言事事物物皆有其理事物可見而其理難知即事即物便要見此理大學之道不曰窮理而曰格物只是使人就寔處究竟天地形而下者乾坤形而上者天地纔乾坤之形殻乾坤天地之性情形而者是理有作用便是形而下者問陰陽如何是形而下者曰一物便有陰陽寒暖生殺皆見得事物雖大是形而下者理雖小是形而上者凡有形有象者皆器也其所以為是器之理者則道也所謂始終晦明竒耦之屬皆陰陽所為之器獨其所以為是器之理如目之明耳之聰父之慈子之孝乃為道耳動靜無端陰陽無始説道有有無底在前説道無有有底在前是循環物事動靜無端陰陽無始今以太極觀之雖曰動而生陽畢竟未動之前須靜靜之前又須動推而上之何自而見其端與始問動靜無端陰陽無始那箇動又從上面靜生下上面靜又從上面動生來今姑把這箇説起曰然曰太極動而生陽靜而生陰未動以前是如何曰只是理曰固是理只不當對動言曰未動即是静未静又即是動未動又即是静伊川云動静無端陰陽無始惟知道者識之問動靜無端陰陽無始曰這不可説道有箇始他那有始之前畢竟是箇甚麽動之前有靜靜之前又有動推而上之其始無端推而下之以至未來之際其卒無終動靜無端陰陽無始看來是一箇寔理氣無始無終且從元處説起元之前又是貞了如子時是今日子之前又是昨日之亥無空缺時仁為四端之首而智則能成終成始猶元雖四徳之長然元不生於元而生於貞葢天地之化不翕聚則不能發散理固然也仁智交際之間乃萬化之機軸此理循環不窮脗合無間程子所謂動静無端陰陽無始者此也動靜無端陰陽無始天道也始於陽成於陰本於靜流於動人道也然陽復本於陰静復根於動其動靜亦無端其陰陽亦無始則人蓋未始離乎天而天亦未始離乎人也勉齋黄氏曰太極動而生陽不成太極在一處陰陽在一處生動靜底便是陰陽陰陽都是這氣拍塞即無些子空缺處人愚見天在上地在下便道中間有空缺處不知天地間逼拶都實吾身之外都是氣如脱了衣服便覺寒冷是這氣襲入舊嘗寓一間屋两頭都垂簾掲起這一箇那一箇也掣動這是氣拶岀横渠云知虚空即氣無只是如此又云所以致中和使天地位萬物育只是如此太極動而生陽靜而生陰太極不是㑹動靜底物動靜陰陽也所以圖解云動靜者所乘之機也所乘之機四字最難看舊蔡季通對朱先生問所乘之機如何下得恁地好先生微笑大抵只看太極乘著什麽機乘著動機便動乘著靜機便靜那太極却不自㑹動靜既是陰陽如何又説生陰生陽曰生陰生陽亦猶陽生陰生太極隨陰陽而為動靜隂陽則於動靜而見其生不是太極在這邊動陽在那邊生譬如蟻在磨盤上一般磨動則蟻随他動磨止則蟻随他止蟻随磨轉而因蟻之動靜可以見磨之動靜天道是理陰陽五行是氣合而言之氣即是理一陰一陽之謂道也分而言之理自為理氣自為氣形而上下是也一陰便是靜一陽便是動道是太極誠是太極其動也其静也二条上合動靜説此分動静説動極而靜以下又換形了一箇説流行底一箇説定分底葢太極而下上文解圖周匝此下文又衮説箇太極與陰陽自其著而觀之著是陰陽自其微而觀之微是太極問既太極陰陽不是二物如何又有微有著曰須看觀字是我去他裏面折看却非他有兩箇頭面又曰所乘之機一句最妙又曰此既言氣與理合雖然以下言雖是恁地却那裏見他入頭處所以不見他合不見他離正以其動靜無端陰陽無始下面若有縫這太極也須漏出了太極動而生陽動極而靜靜而生陰靜極復動一動一靜互為其根分陰分陽兩儀立焉妄意謂此非老氏有生於無與佛氏之所謂妄也一必有兩體必有用動必有靜動靜迭興而分陰陽變化之所由生也即通書之言析而求之若曰元亨誠之通利貞誠之復葢元者始而亨者也太極之動也利貞者性情也動極而靜靜極復動也又曰聖人之道仁義中正而已矣又曰動而正曰道用而和曰徳觸類而長之其此之謂乎太極本體難以形容緣氣察理遡流求源則可知矣一靜一動靜動初終此氣之流也是孰為之哉理也天其運乎地其處也日月其爭於其所乎孰主張是孰綱維是主張綱維理之謂乎有是理故有是氣理如此則氣亦如此此體用所以一源顯微所以無間也嗚呼深哉北溪陳氏曰以造化言之如天地間生成萬物自古及今無一物之不實散殊上下自古有是到今亦有是非古有而今無皆是實理之所為大而觀之自太始而至萬古莫不皆然若就物觀之其徹始徹終亦只是一實理如此姑以一株花論來春氣流注到則萌蘖生花春氣盡則花亦盡又單就一花蘂論氣實行到此則花便開氣消則花便謝亦盡了方其花萌蘖此實理之初也至到謝而盡處此寔理之終也誠者本就天道論維天之命於穆不已只是一箇誠天道流自古及今無一毫之妄暑往則寒來日往則月來春生了便夏長秋殺了便冬藏元亨利貞終始循環萬古常如此皆是真實道理為之主宰如天行一日一夜一周而又過一度與日月星辰之運行躔度萬古不差皆是真實道理如此又就果木觀之甜者萬古甜苦者萬古苦青者萬古常青白者萬古常白紅者萬古常紅紫者萬古常紫圓者萬古常圓缺者萬古常缺一花一葉文縷相等對萬古常然無一毫差錯便待人力十分安排撰作来終不相似都是真實道理自然而然道只是人事之理耳形而上者謂之道形而下者謂之器自有形而上者言之其隱然不可見底則謂之道自有形而下者言之其顯然可見底則謂之器其實道不離乎器道只是器之理人事有形狀處都謂之器人事中之理便是道道無形狀可見所以明道曰道亦器也器亦道也須著如此説乃截得上下分明道非是外事物有箇空虚底其實不離乎物若離物則無所謂道且如君臣有義義底是道君臣是器若要看義底道理須就君臣上看不成脫了君臣之外别有所謂義父子有親親底是道父子是器若要看親底道理須就父子上看不成脱了父子之外别有所謂親即夫婦而夫婦在所别即長㓜而長㓜在所序即朋友而朋友在所信非外夫婦長㓜朋友而有所謂别序與信聖門之學無一不寔老氏清虚厭事佛氏屏棄人事都是把道理做事物頂頭𤣥妙底物看把人事做下面粗底便都要擺脱去了理不外乎氣若説截然在陰陽五行之先及在陰陽五行之中便成理與氣為二物矣節齋蔡氏曰形謂動而可見之時自此而無體故以道名之自此而下有體故以器名之前謂太極形而上之道也陰陽形而下之器也此分道器而言也後謂動靜不同時陰陽不同位而太極無不在焉此乃所謂器即道也又謂沖漠無朕而動靜陰陽之理已悉具於中矣此乃所謂道即器也葢不分上下則恐人惟以可見者為始不合道器則恐人䧟老氏精粗之謬故須著如此説耳程子之意恐亦不過如此茍惟以為太極只在陰陽中而已則器亦道也一句已足又何必重複耶主太極而言則太極在陰陽之先主陰陽而言則太極在陰陽之内葢自陰陽未生之時而言則所謂太極者其理已具自陰陽既生之時而言則所謂太極者即在乎陰陽之中也謂陰陽之上别有太極常為陰陽主者固為䧟於列子不生不化之謬而獨執夫太極只在陰陽之中之説者則又失其根柢樞之所為而大本有所不識其害有不可勝言者西山真氏曰凡天地之物有形有狀者皆器也其理便在其中大而天地亦形而下者乾坤乃形而下者日月星辰風雨霜露亦形而下者其理即形而上者以身言之身之形體皆形而下者曰性曰心之理乃形而上者至於一物一器莫不皆然如燈燭者器也其所以能照物形而上之理也且如椅卓器也而其用理也天下未嘗有無理之器無器之理即器以求之則理在其中即如天地則有健順之理即形體則有性情之理精粗本末初不相離若舎器而求理未有不蹈於空虚之境非吾儒之實學也平巖葉氏曰動而生陽動極而靜靜而生陰靜極復動者言太極流行之妙相推於無窮也一動一靜互為其根分陰分陽両儀立焉者言二氣對待之體一定而不易也邵子云用起天地先體立天地後是也然詳而分之則動而生陽静而生陰者是流行之中定分未嘗亂也一動一靜互為其根者是對待之中妙用實相流通也黄氏巖孫曰程子云離了陰陽便無道陰陽氣也所以陰陽者是道也氣是形而下者道是形而上者又云道非隂陽也所以一陰一陽者道也如一闔一闢謂之變又云陰陽形而下者而曰道者惟此語截得工下最分明元來只是此道要在人默而識之也又云形而上為道形而下為器須著如此説器亦道道亦器但得道在不繫今與後已與人又云誠者物之終始猶俗語徹頭徹尾胡氏云誠者命之道乎此言誠者即所謂太極也臨川呉氏曰太極無動靜動靜者氣機也氣機一動則太極亦動氣機一靜則太極亦靜故朱子釋太極圖曰太極之有動靜是天命之流行也此是為周子分解太極不當言動靜以天命之有流行故只得以動靜言也又曰太極者本然之妙也動靜者所乘之機也機猶弩牙弩弦乘此機如乘馬之乘機動則弦發機靜則弦不發氣動則太極亦動氣靜則太極亦靜太極之乘此氣猶弩弦之乘機也故曰動靜者所乘之機謂其所乘之氣機有動靜而太極本然之妙無動靜也然弩弦與弩機却是両物太極與此氣非有両物只是主宰此氣者便是非别有一物在氣中而主宰之也機字是借物為喻不可以辭害意陽變陰合而生水火木金土五氣順布四時行焉有太極則一動一靜而兩儀分有陰陽則一變一合而五行具然五行者質具於地而氣行於天者也以質而語其生之序則曰水火木金土而水木陽也火金陰也以氣而語其行之序則曰木火土金水而木火陽也金水陰也又統而言之則氣陽而質陰也又錯而言之則動陽而靜陰也葢五行之變至於不可窮然無適而非陰陽之道至其所以為陰陽者則又無適而非太極之本然也夫豈有所虧欠間隔哉朱子曰一片底便是分作両片底兩便底便是分作五片底做這萬物四時五行只是從那太極中來太極只是一箇理迤邐分作兩箇氣裏面動底是陽靜底是隂又分做五氣又㪚為萬物問以質而語其生之序此豈就圖而指其序耶而水木何以謂之陽火金何以謂之陰曰天一生水地二生火天三生木地四生金一三陽也二四陰也問以氣而語其行之序則木火土金水此豈即其運用處而言之耶而木火何以謂之陽金水何以謂之陰曰此以四時而言春夏為陽秋冬為陰問以質而語其生之序不是相生否只是陽變而助陰故生水陰合而陽盛故生火木金各從其類故在左右曰水陰根陽火陽根陰錯綜而生其端是天一生水地二生火天三生木地四生金到得運行處便水生木木生火火生土土生金金又生水水又生木循環相生又如甲乙丙丁戊巳庚辛壬癸都是這箇物事陰陽二氣更無停息如金木水火土是五行分了又三属陽二属陰然而各又有一陰一陽如甲便是木之陽乙便是木之陰丙便是火之陽丁便是火之陰只是這箇陰陽更無休息形質属陰其氣属陽金銀坑有金礦銀礦便是陰其光氣為陽統言陰陽只有両端而陰中自分陰陽陽中亦有陰陽乾道成男坤道成女男雖属陽而不可謂其無陰女雖属陰亦不可謂其無陽人身氣属陽而氣有陰陽血属陰而血有陰陽至如五行天一生水陽生隂也而壬癸属水壬是陽癸是隂地二生火隂生陽也而丙丁属火丙是陽丁是隂隂陽靜動以大體言而春夏是動属陽秋冬是靜属陰就一日言之晝陽而動夜隂而盡就一時一刻言之無時而不動靜無時而不陰陽曰陰陽無處無之横看竪看皆可見横看則左陽而右陰竪看則上陽而下陰仰手為陽覆手則為陰向明處為陽背明處則為陰正䝉云陰陽之氣循環迭至聚散相盪升降相求絪緼相揉相兼相制欲一之不能蓋謂是也陰陽雖是両字然只是一氣之消息一進一退一消一長進處便是陽退處便是隂長處便是陽消處便是隂只是這一氣之消長做出古今天地間無限事所以隂陽做一箇説亦得做兩箇説亦得問聖人所以因陰陽説出許多道理而所説之理皆不離不隂陽者葢緣所以為隂陽者元本於實然之理曰隂陽是氣纔有此理便有此氣纔有此氣便有此理天下萬事萬物何者不出於此理何者不出於陰陽南軒張氏曰新安朱熹云太極立則陽動隂靜而兩儀分兩儀分則陽變隂合而五行具五行者質具於地而氣行乎天者也語至於是則造化之㓛用無餘藴矣然此亦推本其所自來非以為至此而始具也勉齋黄氏曰陽變隂合而生水火木金土五氣順布四時行焉妄意謂隂陽分両儀立矣陽中之陽隂中之隂變合相得而五位成質横渠先生云水火氣也故炎上潤下與隂陽相為升降土不得而制焉木金者土之華實其性有水火之雜故木之為物水漬而得生火然而不離葢得土之浮華於水火之交也金之為物得火之精於土之燥得水之精於土之濡故水火相得而不相害鑠之則反流而不耗葢得土之精華於水火之際也土者物之所以成始成終者也地之質也化之終也水火之所以升降物兼體而不遺者也即是而參之五行之生一陰陽之所為也木之氣盛於東於時為春火之氣盛於南於時為夏土之氣盛於中央而寄旺於四時之戊巳而獨盛於季夏之時金之氣盛於西而於時為秋水之氣盛於北而於時為冬春夏秋冬而氣以成此五物者同出而異名者也四時之行即五氣之流通五氣之流通即一氣之妙用非截然一彼一此也通書云動而無靜靜而無動物也動而無動靜而無靜神也動而無動靜而無靜非不動不靜也物則不通神妙萬物此以明太極動而生陽以至四時行焉無非神之所為也又云水隂根陽火陽根隂五行隂陽隂陽太極四時運行萬物終始混兮闢兮其無窮兮以明五行之生四時之行百物之産一太極而已矣其然乎豈其然乎問陽變隂合而生水火木金土次序如何曰水與火對生木與金對生因云這裏有兩項看如作建寅看時則木火是陽金水是隂此以行之序論如作建子看時則水木是陽火金是隂此以生之序論大槩冬春夏可以謂之陽夏秋冬可以謂之隂因云太極圖解有一處可疑圖以水隂盛故居右火陽盛故居左金隂穉故次水木陽穉故次火此是説生之序下文却説水木陽也火金隂也却以此為陽彼為隂論來物之初生自是㓜嫩如陽始生為水尚柔弱到生木已強盛隂始生火尚微到生金已成質如此則水為陽穉木為陽盛火為隂穉金為隂盛不知圖解所指是如何後請問云圖解所分恐是解剝圖體言其居左居石之位次否晦庵先生云舊之也如此看只是水而木木而火以下畢竟是説行序這畢竟是説生之序畢竟是可疑五行之序以質之所生而言則水本是陽之濕氣以其初動為隂所䧟而不得遂故水隂盛火本是隂之燥氣以其初動為陽所揜而不得達故火陽勝葢生之者微成之者盛生之者形之始成之者形之終也然各以偏勝也故雖有形而未成質以氣升降土不得而制焉木則陽之濕氣寖多以感於隂而舒故發而為木其質柔其性煖金則隂之燥氣寖多以感於陽而縮故結而為金其質剛其性柔土則隂陽之氣各盛相交相摶凝而成質以氣之行而言則一隂一陽往來相代木火金水云者各就其中而分老少耳故其序各由少而老土則分旺四季而位居中者也此五者序若參差而造化所以為發育之具實並行而不相悖葢質則隂陽交錯凝合而成氣則陰陽両端循環不已質曰水火木金葢以隂陽相間言猶曰東西南北所謂對待者也氣曰木火金水葢以隂陽相因言猶曰東南西北所謂流行者也質雖一定而不易氣則變化而無窮所謂易也五行生之序則曰水火木金土行之序則曰木火土金水何故造物却有此兩様看來只是一理生之序便是行之序元初只是一箇水水煖後便成火此両箇是母木者水之子金者火之子冬是太隂春是少陽夏是太陽秋是少隂從冬起來故水木火金自成次序以水生木以火生金故生之序便是行之序也孔子言精氣為物精便是水氣便是火子產曰物生始化曰魄陽曰魂魄便是精之靈魂便是氣之靈水便生木火便生金在人一身初只是生腎水又生心火腎水上生木肝心火上生肺金造化只是如此何嘗有両様來天一生水地二生火天三生木地四生金此便是造化本原其後流行亦只如此四時之序不過二天二地而已所以洪範亦只説水木火金土謂之五行則行之序亦是如此也以此可見造化之端倪物本生之始五行有生數有行數不知何故初生是一様流行又是一様其為物不二則其生物不測易簡之義恐不如此故嘗疑其只是一様及以造化之本原參之人物之生育初無両様只是水木火金土便是次序古人欲分别隂陽造化之殊故以水火木金土為言耳自一至十之數特言竒耦多寡耳非謂次第如此也葢積實之數非次第之數也天得竒而為水故曰一生水一之極而為三故曰三生木一極為三以一運之圓而生三故一而為三也地得耦而為火故曰二生火二之極而為四故曰四生金二極為四以二周之方而為四故二而為四也水者初生之陽木者極盛之陽火者初生之隂金者極盛之隂陽極而生隂隂極而生陽故但當以水木火金土為次序也自初生至流行皆是如此若要看隂陽竒耦一初一盛則當曰水火木金土非謂次序如此也今以為第一生水第二生火第三生木第四生金以為次序則誤矣水木火金土五行之序也水火木金土分其竒耦初盛而為言也以此觀之只是一様初無両様也所謂一二三四但言一多一少多之極少之極也初非以次序而言猶人言一文兩之非謂苐一名第二名也果以次序而言之則一生水而未成水必至五行俱足猶待苐六而後成水二生火而未成火必待五行俱足又成就了水然後第七而後成火也如此則全不成造化亦不成義理矣六之成水也猶坎之為卦也一陽居中天一生水也地六包於外陽少隂多而水始成七之成火也猶離之為卦也一隂居中天七包於外隂少陽多而火始成坎属陽而離為隂以其在内者為生在外者成之也若以次序言全不成義理矣又曰五行之序某欲作三句㫁之曰論得數竒耦多寡則曰水火木金土論始生之序則曰水木火金土論相生之序則曰木火土金水如此其庶幾乎太極不可名狀因隂陽而後見一動一靜一晝一夜以至於一生一死一呼一吸無往而非二也因隂陽之二而反以求之太極之所以為隂陽者亦不出乎二也非其本體之二何以使末流無往而不二哉然二也各有本末各有終始故故三分為四而五行立矣葢一陽分而為木火一隂分而為金水木者火之始火者木之終金者水之始水者金之終物名有終始未有有始而無終有終而無始者二各有終始則二分為四矣知二之無不四也則知其所以為是四者亦道之本體非其本體之四何以使􅀈之無不四哉故二與四天下之物無不然則一亦以見道體之本然也雖為太極不可名狀此亦可以見其端倪矣體用一原顯微無闇要當以是觀之塞天地貫古今無往不然仁義禮智特就人心而立名耳北溪陳氏曰本只是一氣分來有隂陽又分來有五行二與五只管分合運行去萬古生生不息不止是箇氣必有主宰之者曰理是也理在其中為之樞紐故大化流行生生未嘗止息平巖葉氏曰水火木金土者隂陽生五行之序也木火土金水者五行自相生之序也問五行之生與五行之相生其序不同何也曰五行之生也葢二氣之交變合而各成天一生水地二生火天三生木地四生金天五生土所謂陽變隂合而生水火木金土是也五行之相生也葢一氣之推循環相因木生火火生土土生金金生水水復生木所謂五氣順布四時行焉是也曰其所以有是二端何也曰二氣變合而生者原於對待之體也一氣循環而生者本於流行之用也黃氏巖孫曰程子云凡有氣莫非天凡有形莫非地五行一陰陽也陰陽一太極也太極本無極也五行之生也各一其性五行具則造化發育之具無不備矣故又即此而推本之以明其渾然一體莫非無極之妙而無極之妙亦未嘗不各具於一物之中也葢五行異質四時異氣而皆不能外乎隂陽隂陽異位動靜異時而皆不能離乎太極至於所以為太極者又初無聲臭之可言是性之本體然也天下豈有性外之物哉然五行之生隨其氣質而所稟不同所謂各一其性也各一其性則渾然太極之全體無不各具於一物之中而性之無所不在又可見矣朱子曰太極隂陽五行只將元亨利貞看甚好太極是元亨利貞都在上面隂陽是利貞是隂元亨是陽五行是元是木亨是火利是金貞是水隂陽是氣五行是質有這質所以做得物事出來五行雖是質他又有五行之氣做這物事方自然却是隂陽二氣截做這五箇不是隂陽外别有五行問太極圖所謂太極莫便是性否曰然此即理也天下無性外之物有此物即有此性無此物則無此性問程先生説道天下無性外之物曰如云天地間只是箇感應又如云誠者物之終始問枯槁之物亦有性是如何曰惟是他合下有此理故云天下無性外之物問各一其性固是指五行之氣質然水之潤下火之炎上木之曲直金之從革土之稼穡此但可見其氣質之性所禀不同却如何見得太極之全體無不各具於一物之中而性之無不在也曰氣質是隂陽五行所為性即太極之全體但論氣質之性則此全體堕在氣質之中非别為一性也又問反復思之誠非别有一性然觀聖賢説性有是指義理而言者有是指氣禀而言者却不容無分别敬謹誨語謂隂陽五行所為性即太極之全體始悟周子所謂各一其性専是主理而言葢五行之氣質不同人所共知也而太極之理無乎不具人所未必知也今𫝊文云五行之生隨其氣質而所禀不同所謂各一其性也這性字當指氣而言各一其性則渾然太極之全體無不具於一物之中而性之無所不在又可見矣這性字當指理而言一段之間文義頗相合恐讀者莫知所適從曰隂陽五行之為性各是一氣所禀而性則一也南軒張氏曰五行生質雖有不同然太極之理未嘗不存也故曰各一其性五行各一其性則為仁義禮智信之理而五行各専其一焉性之本一而已矣而其流行發見則人物所禀有萬不同焉葢何莫而不由於太極亦何莫而不具於太極是其本之一也然有太極則有二氣五行絪縕交感其變不齊故其發見於人物者未嘗不各具於其氣禀之内故原其性之本一而察其流行之各異知其流行之各異而本之一者初未嘗不究也而後可與論性矣故程子曰論性不論氣不備論氣不論性不明蓋論性而不及氣則昩夫人物之分而太極之用不行矣論氣而不及性則迷夫大本之一而太極之體不立矣勉齋黄氏曰五行一隂陽也隂陽一太極也太極本無極也妄意謂此三者者即所謂混兮闢兮也懼學者支離其説故又舉而言之前之言原始而要其終今之言遡流而窮其源五行隂陽同一太極而不相妨也北溪陳氏曰天下豈有性外之物而不統於吾心是理之中也哉理之所在大極於無際而無不通細入於無倫而無不貫前後乎萬古而無不徹平巖葉氏曰此圖即繫辭易有太極是生両儀両儀生四象之義而推明之也但易以卦爻言圖以造化言卦爻固所以擬造化也無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉夫天下無性外之物而性無不在此無極二五所以混融而無間者也所謂妙合者也眞以理言無妄之謂也精以氣言不二之名也凝者聚也氣聚而成形也蓋性為之主而隂陽五行為之經緯錯綜又各以類凝聚而成形焉陽而徤者成男則父之道也隂而順者成女則母之道也是人物之始以氣化而生者也氣聚成形則形交氣感遂以形化而人物生生變化無窮矣自男女而觀之則男女各一其性而男女一太極也自萬物而觀之則萬物各一其性而萬物一太極也葢合而言之萬物統體一太極也分而言之一物各具一太極也所謂天下無性外之物而性無不在者於此尤可以見其全矣子思子曰君子語大天下莫能載焉語小天下莫能破焉此之謂也問周子言無極之真却又不言太極如何朱子曰無極之真已該得太極在其中真字便是太極無極之眞二五之精妙合而凝此數句甚妙是氣與理合而成性也問太極圖曰以人身言之呼吸之氣便是隂陽軀體血肉便是五行其性便是理眞者理也精者氣也理與氣合故能成形天道流行發育萬物其所以為造化者隂陽五行而已而其所謂隂陽五行者又必有是理而後有是氣及其生物則又因是氣之聚而後有是形故人物之生必得是理然後可以為徤順仁義禮智之性必得是氣然後有以為魂魄五藏百骸之身周子所謂二五之精妙合而凝正謂是也無極是理二五是氣無極之理便是性性為之主而二氣五行經緯錯綜於其間也凝只是此氣結聚自然生物若不如此結聚亦何由造化得萬物出來先有理後有氣先有氣後有理皆不可得而推究以意度之則疑此氣是依傍這理行及此氣之聚則理亦在焉葢氣則能凝造作理却是情意無計度無造作即此氣凝聚處理便在其中天以隂陽五行化生萬物氣以成形而理亦賦焉氣化是當初一箇人無種後自生出來底形化却是有此一箇人後乃生生不窮底問氣化形化男女之生在氣化否曰凝結成男女因甚得如此都是隂陽無物不是隂陽問易言有萬物然後有男女此圖却先言乾成男坤成女方始萬物化生如何曰太極所説乃生物之初隂陽之精自凝結成両箇葢是氣化而生如蝨子自然暴出來既有此両箇一牝一牡後來却從種子漸漸生去便是以形化萬物皆然故曰二五之精妙合而凝乾道成男坤道成女通人物言之在物如牝牡之類在植物亦有男女如有牝麻及竹有雌雄之類皆離隂陽剛柔不得問氣化形化曰此是總言人物物自有牝牡只是人不能察耳天地之初如何討箇種自是氣蒸結成兩箇人後方生許多物事所以先説乾道成男坤道成女後方説化生萬物當初若無那兩箇人如今如何有許多人那兩箇人便似而今人身上蝨自然變化出來天地生氣其序固如此遺書言氣化處可見天下莫能載是無外天下莫能破是無内謂如物有至小而可破作兩者是中著得一物在若云無内則是至小更不容破了南軒張氏曰朱元晦云有是性則有隂陽五行有隂陽五行則有人物生生而無窮焉凡此皆無極之具者也隂陽五行經緯錯混融無間其妙合矣於是隂陽又各以類凝結而成象焉陽而徤者父之道五行之所以布其氣也隂而順者母之道五行之所以成其質也是乃天地所以施生之本男女所以為男女者非指男女之身而言也男女雖分然貫一太極而已於是二氣交感陽施隂生而萬物各隨氣質以正性命隂陽五行之類有萬不同其本亦一太極而已勉齋黃氏曰夫所謂五行之生各一其性者言五行之成質雖其别有五而各具一太極也無極之眞二五之精妙合而凝者無極之實理具於二氣五行之精相摩相盪而妙合凝聚也乾道成男坤道成女二氣交感化生萬物者言無極之眞二五之精既妙合凝聚則男女之象已分而二氣交感化生萬物如易所謂天地絪緼萬物化醇男女搆精萬物化生也繼之曰萬物生生而變化無窮焉言天命流行而不息萬物形化而無窮也葢生生不窮之理沖漠於太極之先成象成形於化生之際而無一毫之間斷也通書云二氣五行化生萬物五殊二實二本則一是萬為一一實萬分萬一各正小大有定其此之謂乎氣虚而形實虚者聚而後實者成如人氣嘘呵而後成水也北溪陳氏曰總而言之只是渾淪一箇理是一箇太極分而言之則天地萬物各具此理是各各有一太極又都渾淪無欠缺處自其分而言成許多此道理似散了就萬物上總論則萬物體統渾淪又只是一箇太極人得此理聚於吾心則心為太極所以邵子曰道為太極又曰心為太極謂道為太極者言道即太極無二理也謂心為太極者只是萬理總㑹於吾心此心渾淪是一箇理爾只這道理流行出而應事接物千條萬緒各得其理之當然則是又各一太極就萬物總言其實依舊只是一理是渾淪一太極也譬如一大塊水銀恁地圓散而為萬萬小塊箇箇皆圓合萬萬小塊復為一大塊依舊又恁地圓陳幾叟月落萬川處處皆圓之譬亦正如此此太極所以立乎天地萬物之表而行乎天地萬物之中在萬古無極之前而貫於萬古無極之後自萬古而上極萬古而下看來又只是渾淪一箇理總為一太極耳此理流行處處皆圓無一處欠缺纔有一處欠缺便偏了不得謂之太極太極本體本自圓也潜室陳氏曰氣化謂未有種類之初以隂陽之氣合而生形化謂既有種類之後以牝牡之形合而生皆兼人物言之西山真氏曰萬物各具一理萬理同出一原所謂萬里一原者太極也太極者乃萬理總㑹之名有理即有氣分而二則為隂陽分而五則為五行萬事萬物皆原於此人與物得之則為性性者即太極也仁義即隂陽仁義禮智信即五行也萬物各具一理是物物一太極也萬理同出一原是萬物統體一太極也平巖葉氏曰繫辭天地絪緼萬化化醇氣化也男女搆精萬物化生形化也圖説葢本諸此黄氏巖孫曰程子云隕石無種種於氣麟亦無種亦氣化厥初生民亦如是至如海濵露出沙灘便有百蟲禽獸草木無種而生此猶是人所見若海中島嶼稍大人不及者安知其無種之人不生於其間若已有人類則必無氣化之人或問人初生時還以氣化否曰此必燭理當徐論之且如海上忽露出一沙島便有草木生有土而生草木不足怪既有草木自然禽獸生焉問先生語錄中云焉知海島無氣化之人如何曰是近人處固無須是極遠處有不可知曰今天下未有無父母之人古有氣化今無氣化何也曰有兩般有全是氣化而生者若腐草化為螢是也既是氣化到合化時自化有氣化生之後而種生者且如人身上著新衣服過幾日便有蟣蝨生其間此氣化也氣既化後更不化便以種生去此理甚明又云萬物之始氣化而已既形氣相禪則形化長而氣化消惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事出矣此言衆人具動靜之理而常失之於動也葢人物之生莫不有太極之道焉然隂陽五行氣質交運而人之所禀獨得其秀故其心為最靈而有以不失其性之全所謂天地之心而人之極也然形生於隂神發於陽五常之性感物而動而陽善隂惡又以類分而五性之殊散為萬事葢二氣五行化生萬物其在人者又如此自非聖人全體太極有以定之則欲動情勝利害相攻人極不立而違禽獸不遠矣朱子曰得五行之秀者為人只説五行而不言隂陽者盖做這人須是五行方做得成然隂陽便在五行中所以周子云五行一隂陽也舎五行無别討隂陽處如甲乙属木甲便是陽乙便是隂丙丁属火丙便是陽丁便是隂不須更説隂陽而隂陽在其中矣或曰如言四時而不言寒暑耳曰然問自太極一動而為隂陽以至於為五行為萬物無有不善在人則纔動便差是如何曰造化亦有差處如冬熱夏寒所生人有厚薄有善惡不知自甚處差將來便没理㑹了又問惟人纔動便有差故聖人主靜以立人極歟曰然二氣五行交感萬變故人物之生有精粗之不同自一氣而言則人皆受是氣而生自精粗而言則人得其氣之正且精者物得其氣之偏且塞者惟人得其正故是理通而無所塞物得其偏故是理塞而無所知且如人頭圓象天足方象地平正端直以其受天地之正氣所以識道理有知識物受天地之偏氣所以禽獸横生草木頭生向下尾反在土物之間有知者不過只通得一路如烏之知孝獺之知祭犬但能守禦牛但能耕而已人則無不知無不能人所以與物異者所爭者此耳問先生云論萬物之一原則理同而氣異觀萬物之異體則氣猶相近而理絶不同曰氣相近如知寒知煖識飢識飽好生惡死趍則避害人與物都一般理不同如蜂蟻之君臣只是他義上有一㸃子明虎狠之父子只是他仁上有一㸃子明其他便推不去問人物皆禀天地之理以為性皆受天地之氣以為形若人禀之不同固是氣有昏明厚薄之異若在物言之不知是所禀之理便有不全耶亦是緣氣禀之昏蔽故如此耶曰惟其所受之氣只有許多故其理亦只有許多如犬馬形氣如此故只會得如此事又問物物各一太極則是理無不全也曰以理言之則無不全以氣言之則不能無偏得其氣之精英者為人得其渣滓者為物生氣流行一滚而出初不道付其全氣與人減下一等與物也但稟受隨其所得物既昏塞矣而昏塞之中亦有輕重昏塞尤甚者於氣之查滓中又復禀得查滓之甚者耳只一箇隂陽五行之氣衮在天地中精英者為人查滓者為物精英之中又精英者為聖為賢精英之中查滓者為愚不肖有有血氣知覺者人獸是也有無血氣知覺而但有生氣者草木是也有生氣已絶而但有形質臭味者枯槁是也是雖其分之殊而其理則未嘗不同但以其分之殊則其理之在是者不能不異故人為最靈而備有五常之性禽獸則昏而不能備草木枯槁則又并與其知覺者而無焉但其所以為是物之理則未嘗不具耳以氣言之則知覺運動人與物若不異也以理言之則仁義禮智之稟豈物之所得而與哉此人之性所以無不善而為萬物之靈也草木之生自有一箇神他自不能生在人則心便是所謂形既生矣神發知矣是也金木水火土各一其性則為仁義禮智信之理五行各専其一人則兼備北性而無不善及其感動則中節者為善不中節者為不善也問通書多説幾太極圖却無此意曰五性感動善惡未分處便是在隂陽有以動靜言者有以善惡言者此箇通理人如何看問五性感動而善惡分曰天地之性是理也纔到有隂陽五行處便有氣質之性於是便有昏明厚薄之殊得其秀而最靈乃氣質以後之事問隂陽都將做好説也得以陽為善隂為惡亦得曰陽善隂惡聖賢如此説處極多以隂陽善惡論之則隂陽之正皆善也其沴皆惡也以象類言之則陽善而隂惡問孟子言乃若其情則可以為善而周子有五性感動而善惡分以善惡於動處並言不同如何曰情未必皆善然本則可以為善而不可以為惡惟反其情故為惡孟子言其正周子則兼其正與反者而言也太極便是性動靜隂陽是心金木水火土是仁義禮智信化生萬物是萬物或問有隂陽便有善惡曰隂陽五行皆善又曰隂陽之理皆善又曰合下只有善惡是後一截事又曰竪起看皆善横看後一截方有惡又曰氣有善惡理却皆善孟子云人之所以異於禽獸者幾希人物之所以異只是爭些子若更不能存得則與禽獸無異矣以氣質有蔽之心接乎事物無窮之變則其目之欲色耳之欲聲口之欲味鼻之欲臭四肢之欲安佚所以害乎其徳者又豈可勝言者哉二者相因反覆深固是以此徳之明日益昏昧而此心之靈其所知者不過情欲利害之私而已則是雖曰有人之形而實何以遠於禽獸南軒張氏曰人之性不能不感物而動感物而動固性之常然而善惡自此分萬事自此出矣五性感動動而心不宰則情流而不知止性以䧟溺矣所以為惡也譬之水發而無泥滓之雜則固水之本然者泥滓或參焉則汩之矣雖汩之而水之本然者自在也故貴於澄之以復其初而已人雖流於惡其本然亦豈遂忘乎此聖人所以有敎也太極渾淪生化之根闔闢二氣樞杻群動惟物由乎其間而莫之知惟人則能知之矣人之所以能知者以其為天地之心太極之動發見周流備乎已也然則心體不既廣大矣乎北溪陳氏曰太極只是理理本圓故太極之理本渾淪理無形狀無界限間隔故萬物無不各具得太極而太極之本體各各無不渾淪惟人氣正且通為萬物之靈能通得渾淪之體物氣偏且塞不如人之靈雖有渾淪之體不能通耳然人類中亦惟聖人大賢然後真能通得渾淪之體一種下愚之人其昏頑却與物無異則又正中之偏通中之塞者一種靈禽仁獸其性與人甚相近則有偏中之正塞中之通者細推之有不能以言盡問感物而動或發於理義之公或發於血氣之私這裏便分善惡曰非發於血氣之私便為惡乃發後流而為惡耳若就人品類論則上天所付皆一般而人隨所值又各有清濁厚薄之不齊如聖人禀氣至清所以合下便能生知賦質至粹所以合下便能安行如堯舜既得其至清至粹為聰明神聖又得氣之清髙而寛厚者所以貴為天子富有四海至於享國皆百餘嵗是又得氣之最長者如夫子亦得至清至粹合下便生知安行然天地之氣到那時已衰微所以夫子禀得不髙不厚止栖栖為一旅人而所得之氣亦不甚長僅得中夀七十餘嵗不如堯舜之髙自聖人而下各有分數顔子亦清明純粹亞於聖人只緣禀氣得不長所以夭死太抵得氣之清者不隔蔽那理義便露呈昭著如銀盞中滿貯清水自然透見盞底銀花甚分明若未嘗有水然賢人得清氣多濁氣少清中微有些查滓在未嘗能昏蔽得他所以聰明也易開發自大賢以下或清濁相半或清底少濁底多昏蔽得厚了如盞底銀花子看不見欲見得須十分加澄治之功若能力學者觧變化氣質轉昏為明有一般人禀氣清明於理義上儘看得出而行為不篤不能乘載得道理多雜詭譎是又賦質不粹此如井泉甚清停在銀盞裏面亦透底清徹但泉脈從淤土惡木根中穿過來味不純甘以之煮白米則成赤飯煎白水則成赤湯煎茶則酸澀是有惡味夾雜了又有一般人生下來於世味一切簡淡所為甚純正但與説到道理處全發不來是又賦質純粹而禀氣不清此如井泉脈味純甘絶佳而有泥土渾濁了終不透瑩如温公恭儉力行篤信好古是甚次第正大資質只緣少那至清之氣識見不髙明二程屢將理義發他一向偏執固滯更發不上甚為二程所不滿又有一般甚好説道理只是執拗自立一家意見是禀氣清中被箇一條戾來衝拗了如泉脈出來甚清却被一條别水橫衝破了及或遭巉岩石頭横截衝激不帖順了又成險惡之流看來人生氣禀是有多少般様或相倍蓗或相千萬不可以一律齊畢竟清明純粹恰好底極為難得所以聖聖賢少而愚不肖者多聖人定之以中正仁義聖人之道仁義中正而已矣而主靜無欲故靜立人極焉故聖人與天地合其徳日月合其明四時合其序鬼神合其吉凶此言聖人全動靜之徳而常本之於靜也葢人禀隂陽五行之秀氣以生而聖人之生又得其秀之秀者是以其行之也中其處之也正其發之也仁其裁之也義葢一動一靜莫不有以全夫太極之道而無所虧焉則向之所謂欲動情勝利害相攻者於此乎定矣然靜者誠之復而性之貞也茍非此心寂然無欲而靜則又何以酬酢事物之變而一天下之動哉故聖人中正仁義動靜周流而其動也必主乎靜此其所以成位乎中而天地日月四時鬼神有所不能違也葢必體立而後用有以行若程子論乾坤動靜而曰不専一則不能直遂不翕聚則不能發散亦此意爾問聖人定之以仁義中正而主静朱子曰此是聖人修道之謂敎處人雖不能不動而立人極者必主乎靜惟主乎靜則其著於動也無不中節而不失其本然之體矣性之分雖属乎靜而其藴則該動靜而不偏故樂記以靜言性則可遂以靜字形容天地之妙則不可人性雖同禀氣不能無偏重有得木氣重者則惻隱之心常多羞惡辭譲是非之心為其所塞而不發有得金氣重者則羞惡之心常多而惻隱辭譲是非之心為其所塞而不發水火亦然唯隂陽合徳五性全備然後中正而為聖人也聖人立人極不説仁義禮智却説仁義中正中正即禮智中正尤親切中是禮之得宜處正是智之正當處自氣化一節以下又節節應前靣圖説仁義中正應五行也問周子不言禮智而言中正如何曰禮智説得猶寛中正則切而實矣且謂之禮尚或有不中節處若謂之中則無過不及無非禮之禮乃節文恰好處也謂之智尚或有正不正若謂之正則是非端的分明乃智之實也問何以不言禮智而言中正莫是此圖本為發明易道故但言中正是否曰亦不知是如何但中正二字較有力問中正即禮智何以不直言禮智而曰中正曰禮智字不似中正字却實且定中者禮之極正者智之體正是智親切處智於四徳属貞伊川解貞字謂正而固也一正字未盡必兼固字所謂智之實知斯二者弗去是也知即端的真知如此便是正弗去便是固所以正字較親切問智與正何以相契曰只是真見得是非便是正不正便不喚做智字又問只是真見得是真見得非若以是為非以非為是便不是正否曰是問處之也正裁之也義處與裁兩字義頗相近曰然處是居之裁是就事上裁度又曰處字作居字即分曉動則此理行此動中之太極也靜則此理存此靜中之太極也問聖人定之以仁義中正而主靜是聖人自定是定天下之人曰此承上文惟人也得其秀而最靈言之形生神發五性感動而善惡分故定之以中正仁義而主靜以立人極元亨神之通動也利貞誠之復靜也元者動之端也本乎靜貞者靜之質也著乎動一動一靜循環無端而貞也者萬物之所以成終而成始也問無欲故靜曰欲動情勝則不能靜問中正仁義而主靜中仁是動正義是靜如先生觧曰非此心無欲而靜則何以酬酢事物之變而一天下之動哉今於此心寂然無欲而靜處欲見所謂正義者何以見曰見禮之定體便是衆人所以失之者以其不能全得仁義中正之極而聖人全體太極無所虧缺故其定之也乃所以一天下之動而為之敎化制其情慾使之有以撿押相率而趍於善也問聖人定之以中正仁義而主靜曰中正仁義皆謂發用處正者中之質義者仁之斷中則無過不及随時以取中正則當然之定理仁則惻隱慈愛之處義則裁制㫁决之事主靜者主正與義也正義便是利貞中是亨仁是元問聖人定之以中正仁義曰本無先後此四字配金木水火而言中有禮底道理正有智底道理如乾之元亨利貞元即仁亨即中利即義貞即正皆是此理至於主靜是以正與義為體中與仁為用聖人只是主靜自有動底道理譬如人説話也須是沉黙然後可以説話葢沉黙中便有箇言語底意思周子之言主靜乃就中正仁義而言以正對中則中為重以義配仁則仁為本非四者之外别有主靜一段事也中正仁義這四箇物事常在這裏流轉然常靠著箇靜底做辟若無夜則此晝不分曉無秋冬則做得春秋不長茂且如人終日應接歸來歇霎時却出去則便分外精神如春夏生長若一向恁地去却有甚了期元氣也須解竭所謂復其見天地之心乎又曰中仁是動正義是靜通書都是恁地説如云禮先而樂後之類皆是主靜看夜氣一章可見問聖人定之以中正仁義所以主靜者以其本靜靜極而動動極復靜静也者物之終始也萬物始乎靜終乎靜故聖人主靜曰若如此則倚於一偏矣伊川云動靜無端隂陽無始動靜理均但靜字勢重耳更宜深玩之問太極動而生陽是陽先動也今觧云必體立而後用有以行如何曰體自先有下言靜而生隂只是説相生無窮耳中正仁義而已矣言生之序以配水火木金也又曰仁義中正而已矣以聖人之心言之猶孟子言仁義禮智也問仁義中正竊謂仁義指實徳而言中正指體段而言然嘗疑性之徳有四端而聖賢多獨舉仁義不及禮智何也曰中正即是禮智問自太極之動言之則仁為剛義為柔自一物中隂陽言之則仁之用柔義之用剛不知如此説得否曰也是如此仁便有箇流動發越之意然其用則慈柔義便有箇商量從宜之義然其用則决裂主靜二字乃言聖人之事葢承上文定之以中正仁義而言以明四者之中又自有賔主耳觀此則學者用功固自有次序須先有箇立脚處方可省察就此進歩非謂靜處全不用力但須如是方可用得力耳大凡人須是沉靜周先生所以有主靜之説如蒙艮二卦皆有靜止之體或説江西所説主靜看其語是要不消主這靜只我這裏動也靜靜也靜曰若如其言天自春了夏夏了秋秋了冬自然如此也不須要輔相裁成始得或問知者動仁者靜如太極圖説則智為靜仁為動如何曰且自體當到不相礙處方是良久曰這物事直看一様横看一様子貢説學不厭為智敎不倦為仁子思却言成已為仁成物為智仁固有安靜意思然施行却有運動之意又曰智是潜伏淵深底道理至發出則有運動然至於運用各當其理而不可易處又不専於動南軒張氏曰天地之徳日月之所以明四時之所以序鬼神之所以吉凶皆是理也聖人得太極之道而備諸躬則其合也豈在外乎葢其理不越乎此而已學聖者盍亦勉夫修道之敎乎修之之要其惟敬乎太極之妙不可以臆度而力致也惟當一本於敬以涵飬之既發之際則因其端而致夫察之之功未發之時則即其體而不失其存之之妙則其所以省察者乃所以著存養之理而其所以存養者厚則其省察者益明矣此敬之功也所謂主靜者也問聖人定之以中正仁義而主靜觧云正義是靜正義如何謂之静勉齋黄氏曰是向這裏裁一裁便住又問此是聖人主静工夫學者要主靜時豈是向事物上各得箇當然之則便是主靜否曰主靜下小注云無欲故靜須就裏面下工夫今人終日紛擾心不定疊也須著片時去那裏靜坐收這心不専一則不能直遂不翕聚則不能發散但看天地之間冬間纔温燠陽氣發洩得盡了来嵗生物必不十分暢茂也多有疫癘之氣若是凝肅藏閉大寒極凍方藏得許多氣一發出便自充塞萬物自是箇箇長茂人亦如此孟子言夜氣亦是如此日間固不可不存若於早晨清明未接物時纔存養得日間也自别北溪陳氏曰禮者心之敬而天理之節文也仁中有箇敬油然自生便是理見於應接便自然有箇節文節則無太過文則無不及如作事太質無文采是失之不及末節繁文大盛是流於太過天理之節乃恰好處恰好處便是合當如此更無太過更無不及當然而然便即是中故太極圖説仁義中正以中字代禮字尤見親切圖説中正仁義而注脚又言仁義中正互而言之以見此理之循環無端不可執定以孰為先孰為後也亦猶四時之春夏秋冬或言秋冬春夏以此見氣之動靜無端隂陽無始也果齋李氏曰人生而靜性之本體湛然無欲斯能主靜此立極之要領也西山真氏曰大凡有體而後有用如天地造化發生於春夏而斂藏於秋冬發生生用斂藏是體自十月純坤陽氣既盡不知者謂氣已熄不知斂藏者乃所以為發生之根自此霜雪凝固草木凋落蟲蛇伏藏微陽雖生於下隱而未露一年造化實基於此惟冬問斂藏凝固然後春来發生有力所以冬暖無霜雪則來嵗五穀不登正以陽氣發洩之故也人之一心亦是如此須是平居湛然虚靜如秋冬之祕藏皆不發露渾然一理無所偏倚然後應事方不錯差如春夏之發生物物得所若静時先已紛擾則動時豈能中節故周子以主靜為本程子以主敬為本皆此理也問周子不言禮智而言中正何也平巖葉氏曰此圖辭義悉出於易易本隂陽而推之人事其徳曰仁義其用曰中正要不越隂陽之両端而已仁義而匪中正則仁為姑息義為忍刻之類故易尤重中正或問定之以仁義中正而主靜䨇峯饒氏曰中正仁義性之四徳中即理正即智也然不曰禮智而曰中正者葢仁義禮智専以性之未發者言如孟子之所云而中正仁義則以性之周流乎動靜者言若乾坤之元亨利貞也以未發者言則四者各専一徳而其發也為四端以周流動靜者言則名雖有四而實則一太極之流行也故中者動而無過不及之名極之用也正者靜而不偏不倚之謂極之體也中見於事正主乎中確乎其不可移易若户之有樞車之有管轄天之有南北極也定萬事以立人極莫先乎此仁者主於生育所以流通乎物我而發揮其功用故由靜而應於動由體而通於用者仁之事也義者主於收斂所以裁成夫事物而斷割乎彼我故動極而歸於靜用畢而反其體者義之事也二者中正之機括而極之妙用也四者之在吾心動靜周流如環無端亦猶天地之五氣順布而四時行也然是極之理根於所性其體本真而靜茍有一毫之私欲雜乎其中則利害相攻思慮錯擾而本然之體已失其正則何以能汎應曲當而使用之各得其中哉唯聖人之心天理渾然無少私欲故能寂然不動以為感而遂通之本此定之以中正仁義而主靜之説也學者不學聖人則已欲學聖人可不於此而用力哉隂陽而五行具男女交而萬物生而太極之理無乎不在及乎形神感而五性動善惡分而萬事出非聖人定之以中正仁義則人極有所不立矣何則葢立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義隂陽氣也剛柔質也形而下者也仁義性也形而上者也故自天地言之則器即道道即器本無精粗之間善惡之殊而隂陽五行之運男女萬物之生隨其氣質之所在莫不各一太極至於人則禀氣有昏明賦質有淑慝而人欲之私或得以害其天理之正茍非有盡性者出乎其間以為天下之標的而使凡氣質之不齊者有所取則焉則人欲勝而天理滅矣此人極之立所以惟盡其性以盡人之性者能之而氣質有所不與歟元公周先生生於聖道不𫝊千五百年之後一旦建圖属書剖發幽秘直指無極太極以明道體而天地之所以運化人物之所以生育者莫不森然畢具於其中至於人極之立則蔽之以中正仁義而主靜之一言而天下之動亦得以貞夫一此其發明三極之藴以上繼洙泗之絶下啓河洛之𫝊使天下後世復見天地萬物之大全復聞聖賢修已治人之心法者幾於伏羲始畫八卦同功可謂盛矣黄氏巖孫曰程子云乾陽也不動則不剛其靜也専其動也直不専一則不能直遂坤隂也不靜則不柔其靜也翕其動也闢不翕聚則不能發散君子修之吉小人悖之凶聖人太極之全體一動一靜無適而非中正仁義之極葢不假修為而自然也未至此而修之君子之所以吉也不知此而悖之小人之所以凶也修之悖之亦在乎敬肆之間而已矣敬則欲寡而理明寡之又寡以至於無則靜虚動直而聖可學矣朱子曰以事言之則有動有靜以心言之則周流貫徹其工夫初無間斷也但以靜為本耳周子所謂主靜者亦是此意但言靜則偏故程子只説敬濓溪言主靜靜字只好作敬字看故又言無欲故靜若以為虚靜則恐入釋老去南軒張氏曰君子修之吉者順理之謂吉也小人悖之凶者逆理之謂凶也順理則平直坦易而無悔非吉乎逆理則艱難險阻而有礙非凶乎西山真氏曰朱子嘗謂聖人定之以中正仁義而主靜要人静定其心自作主宰程子又恐只管靜去與事物不相交渉却説箇敬有問周先生説靜與程先生説敬義同而意異否曰程子是怕人不得他靜字意便似入禪坐定周子之説只是無欲故靜其意大抵以靜為主朱子發明二先生意如此至其為論有云明道敎人靜坐李先生亦敎人靜坐須靜坐始能收斂又云始學工夫須是靜坐則本原定又云心於未遇事時須是靜臨事方用便有氣力如當靜時不靜思慮散亂及至臨事已先倦了伊川觧靜専處云不専一則不能直遂閑時須是收斂做事便有精神又云心要精一方靜時便湛然在此不得困頓如鏡様遇事時方好又云為學工夫須要靜靜多不妨才靜事都見得然總是一箇敬又云主靜所以養其動又云靜者養動之根又云主靜夜氣一章可見以上數條葢祖周子主靜之説也至其門人以靜坐工夫與役役應接不同為問則答之云不必如此反成坐馳但收斂勿令放逸到窮理精後自然思量不至妄動凡所云為莫非至理亦何必兀然靜坐然後為持敬又云明道説靜坐可以為學上蔡亦言多著靜不妨此説終是少偏才偏便做病道理自有動時自有靜時學者只是敬以直内義以方外見得世間無處不是道理不必専於靜處求所以伊川謂只用敬不用靜便説得平又云不可特地將靜坐做一件工夫但著一敬字通貫動靜則於二者之間自無間㫁處又云存養之功不専在靜坐時須於日用動靜之間無處不下工夫乃無間㫁爾又云無事靜坐有事應酬随時随處無非自己身心運用但常自提撕勿與俱往便是工夫事物之來豈以漠然不應為是耶其答南軒書云來敎謂言靜則溺於虚無然此二字如佛老之論則誠有此患若以天理觀之則動之不能無静猶静之不能無動也静之不可不養猶動之不可察也但見得一動一靜互為其根敬義夾持不容間斷之意則雖下靜字元非死物至靜之中自有動之端焉是乃所以見天地之心者而先王之所以至日閉闗葢當此之時則安靜以養乎此爾固非遠事絶物閉目兀坐而偏於靜之謂但未接物時便有敬以主乎其中則事至物來善端昭著所以察之者益精明爾來教又謂某言以靜為本不若遂言以敬為本此固然也然敬字工夫通貫動靜而必以靜為本今若遂易為敬雖若完全然却不見敬之所施有先有後則亦未得為的當也至於來敎所謂要須靜以涵動之所本察夫動以見靜之所存動靜相須體用不離而後為無滲漏也此數言卓然意語俱到謹以書之左席出入觀省以上數條則又本程子主敬之説而不專主於靜也故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰原始反終故知死生之説隂陽成象天道之所以立也剛柔成質地道之所以立也仁義成徳人道之所以立也道一而已隨事著見故有三才之别而於其中又各有體用之分焉其實則一太極也陽也剛也仁也物之始也陰也柔也義也物之終也能原其始而知所以生則反其終而知所以死矣此天地之間綱紀造化流行古今不言之妙聖人作易其大意葢不出此故引之以證其説朱子曰立天之道曰隂與陽是以氣言立地之道曰柔與剛是以質言立人之道曰仁與義是以理言隂陽以氣言剛柔則有形質可見矣至仁與義則又合氣與形而理具焉然亦一而已矣葢隂陽者陽中之隂陽剛柔者隂中之隂陽也仁義者隂陽合氣剛柔成質而是理始為人道之極也然仁為陽剛義為隂柔仁主發生義主收斂故其分属如此或問楊子雲云君子於仁也柔於義也剛葢取其相濟而相為用之意曰仁體剛而用柔義體柔而用剛問立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義則仁當属隂曰仁何嘗属隂袁機仲力爭要以仁属隂引楊子之言為證殊不知仁之定體自是属陽至論君子所學則又就那地位上説如何拘得如易中説立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義解者多以仁為柔義為剛非也却是以仁為剛義為柔葢仁是箇發出來底便硬而強義便為收歛向裏底外面見之便是柔隂陽剛柔仁義看來當曰義與仁而以仁對陽仁若不是陽剛如何做得許多造化義雖剛却主收斂仁却主發舒這是陽中之隂隂中之陽互為其根之意且如今日用賞罰到賜予人自是無疑便做將去若是形殺時便遲疑不肯果决做這見得陽舒隂斂仁属陽義属隂處仁義禮智四者之中仁義是箇對立底闗鍵葢仁仁也而禮則仁之著義義也而知則義之藏猶春夏秋冬雖為四時然春夏皆陽之属也秋冬皆隂之属也故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義是知天地之道不兩則不能以立故端雖有四而立之者則両耳陽主進而隂主退陽主息而隂主消進而息者其氣強退而消者其氣弱此隂陽之所以為柔剛也陽剛温厚居東南主春夏而以作長為事隂柔嚴凝居西北主秋冬而以歛藏為事作長為生斂藏為殺此剛柔之所以為仁義也以此觀之則隂陽剛柔仁義之位豈不曉然而彼楊子所謂於仁也柔於義也剛者乃自其用處未流言之葢亦所謂陽中之隂隂中之陽固不妨自為一義但不可離乎此而論之耳問仁為用義為體若以體統論之仁却是用曰是仁為體義為用大抵仁義中又各有體用仁存諸心性之所以為體也義制乎事性之所以為用也然又有説焉以其性而言之則皆體也以其情而言之則皆用也以隂陽言之則義體而仁用也以存心制事言之則仁體而義用也錯綜交羅惟其所當而莫不各有條理存焉問原始反終故知死生之説曰人未死如何知得死之説只其原其始之理將後面摺轉來㸔便見得以此之有知彼之無問原始反終之反曰反如摺轉來謂方推原其始却摺轉來看其終原字反字皆就人説反如回頭之意且如造化周流未著形質便是形而上者属陽才麗於形質為人物為金木水火土便轉動不得便是形而下者属隂若是陽時自有多少流行變動在及至成物一成而不返謂如人之初生属陽只管有長及至長成便只有衰此氣逐漸衰減至於衰盡則死矣周子所謂原始反終只是衰盡處可見反終之理周子太極之書如易六十四卦一一有定理毫髪不差自首至尾不出隂陽二端而已始處是有生之初終處是已定之理始有處説生已定處説死不復變動矣問天地之化雖則生生不窮然而有聚必有散有生必有死能原始而知其聚而生則必知其後必散而死能知其生也得於氣化之自然初無精神寄寓於太虚之中則知其死也無氣而俱散無復更有形象尚留於㝠漠之内曰死便是都散無了南軒張氏曰天之隂陽地之柔剛人之仁義皆太極之藴然也人而居仁由義則人道立而天道流行矣夫萬物本乎五行五行本乎隂陽隂陽本乎太極而太極本無極也則原始之義其趣味豈有窮乎始終一理也知始則知終矣古今死生晝夜語黙無不然也非謂死生之説别為一事也只此理而已勉齋黄氏曰天之道不外乎隂陽寒暑往來之類是也地之道不外乎柔剛山川流峙之類是也人之道不外乎仁義事親從兄之類是也隂陽以氣言柔剛以質言仁義以理言雖若有所不同然仁者陽剛之理也義者隂柔之理也其實則一而已天地亦大矣人以藐然之身乃與天地立為三至其為道又與天地混然而無間其可不知所以自立哉非陽剛隂柔雖天地不能以自立不仁不義則亦不可謂之人矣不謂之人則與禽獸希異哉由仁義則與天地並立而無間由不仁不義則無以自别於禽獸學者其亦知所擇矣惟人也得其秀而最靈形既生矣神知發矣五性感動而善惡分萬事出矣此即人而明太極之理與前之言一致也葢盈天地之間者惟萬物而人居萬物之一物之感人人之應物無時不然其擴充運用正三綱明五敎序萬事窮理盡性以至於命致中和賛化育參天地而相為無窮者聖人也故繼之曰聖人定之以仁義中正而主靜立人極焉又引易之辭以明之曰故聖人與天地合其徳日月合其明四時合其序鬼神合其吉凶以此見聖人與太極為一也而其所以然之妙則原於主靜焉聖人立極固不假修為而後能然推本其經綸之所自因其用以言其體則有在乎是也主靜云者非不動也猶易所謂君子敬以直内義以方外敬義立而徳不孤敬義固未嘗相逆也而敬為之體也中庸曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本和也者天下之達道中和固未嘗相違也而中為之體也是亦無極而太極之意初非自先後次序也又懼夫學者指為聖人之事髙遠㣲妙而不可及則又繼之曰君子修之吉小人悖之凶庶乎其不自暴自棄改過遷善而趍吉避凶主一無適而克己復禮眞積力久行著習察忽不自知其自至於貫通處則是亦聖人矣吉孰大焉茍惟拘之以不信絶之以不為窮人欲滅天理其禍可勝言哉玩吉凶之二辭何其為天下後世憂之深言之切如是乎又引繫辭以明三才之本曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義於以見此理之所寓雖有隂陽柔剛仁義之名而其立處無以異也原始要終故知生死之説此申無極而太極太極本無極之理使人知生死本非二事而老氏謂長生久視佛氏謂輪廻不息能脱是則無生滅者皆誕也横渠曰物之初生氣日至而滋息物之既盈氣日反而㳺散至之謂神以其伸也反之謂鬼以其歸也此之謂夫北溪陳氏曰人生得天地之氣以為體得天地之理以為性原其始而知所以生則要其終而知所以死古人謂得正而斃謂朝聞道而夕死可矣只緣受得許多道理須知得盡得便自無愧到死時亦只是這二五之氣聼其自消化而已所謂安死順生與天地同其變化這箇便是與造物為徒纔有私慾有私愛割捨不斷便與大化相咈平巖葉氏曰一隂一陽之謂道道即太極也在天以氣言曰隂陽在地以形言曰柔剛在人以徳言曰仁義此太極之體所以立也死生者物之終始也知死生之説則盡二氣流行之妙矣此太極之用所以行也凡此二端發明太極之全體大用故引以結證一圖之義黄氏巖孫曰程子云原始則足以知其終反終則足以知其始死生之説如是而已矣故以春為始而原之其必有冬為終而反之其必有春死生者其與是類也又云但窮得則自知死生之説不須將死生别做一箇道理求又云人能原始知得生理便能要終知得死理若不明得便雖千萬般安排著亦不濟事又云近取諸身百理皆其屈伸往來之義只於鼻息之間見之屈伸往來只是理不必將既屈之氣復為方伸之氣生生之理自然不息如復言七日來復其間元不斷續陽已復生物極必返其理須如此有生便有死有始便有終又云若謂既返之氣復將為方伸之氣必資於此則殊與天地之化不相似天地之化自然生生不窮更何復資於既斃之形既返之氣以為造化近取諸身其開闔往來見之鼻息然不必須假吸復入以為呼氣則自然生人氣之生生於真元天之氣亦自然生生不窮至如海水因陽盛而涸及隂盛而生亦不是將已涸之氣却生水自然能生往来屈伸只此理也盛則便有衰晝則便有夜往則便有來天地間如洪罏何物不銷鑠了又答或問鬼神之理云理㑹得精氣為物㳺魂為變與原始要終之説便能知也須是於原字上用工夫大哉易也斯其至矣易之為書廣大悉備然語其至極則此圖盡之其指豈不深哉抑嘗聞之程子昆弟之學於周子也周子手是圖以授之程子之言性與天道多出於此然卒未嘗明以此圖示人是則必有㣲意焉學者亦不可以不知也朱子曰太極圖明易中大概綱領意思而已大哉易也只是言隂陽剛柔仁義及言原始反終故知死生之説而止人之生死亦只隂陽之氣屈伸往來耳問太極圖周先生手授二程先生者也今二程先生之所講論答問獨未嘗及此圖何耶曰二程先生雖不及此圖然其説固多本之矣試嘗攷之當自可見也問伊川因何而見道曰他説求之六經而得但也是於濓溪處見得箇大道理占地位了太極圖説隂陽五行之變不齊二程因此始推出氣質之性周子太極圖却有氣質底意思程子之論又自太極圖中見出來也問明道濓溪俱髙不如伊川精切曰明道説話超邁不如伊川説得的確濓溪也精宻不知其他書如何但今説這些子無一字差錯或言二程之於濓溪亦若横渠之於范文正耳先覺相傳之秘非後學所能窺測誦其詩讀其書則周范之造詣固殊而程張之契悟亦異如曰仲尼顔子所樂吟風詠月以歸皆是當時口傳心授的當親切處後来二先生舉似後學亦不將作苐二義看然則行狀所謂反求之六經然後得之者特語夫功用之大全耳至其入處則自濓溪不可誣也若橫渠之於文正則異於是葢當時粗發其端而已受學乃先生自言此豈自誣者耶汪端明嘗言二程之學非全資於周先生葢通書人多忽畧不曾考究今觀通書皆是發明太極書雖不多而統紀已盡二程葢得其傳但二程之業廣耳問明道之學後來固别但其本自濓溪發之只是此理進廣之耳但不如後来程門受業之多曰當時既未有人知無人往復只得如此節齋蔡氏曰圖説皆本於易生隂生陽即兩儀之義也五行之用即天地數五之義也二氣之化萬物之生聖人與合之事三才立道之數始終生死之説無非取於易者論曰愚既為此説讀者病其分裂已甚辨詰紛然苦於酬應之不給也故總而論之大抵難者或謂不當以繼善成性分隂陽或謂不當以太極隂陽分道器或謂不當以仁義中正分體用或謂不當言一物各具一太極又有謂體用一源不可言體立而後用行者又有謂仁為統體不可偏指為陽動者又有謂仁義中正之分不當反其類者是數者之説亦皆有理然惜其於聖賢之意皆得其一而遺其二也夫道體之全渾然一致而精粗本末内外賔主之分粲然於其中有不可以毫釐差者此聖賢之言所以或離或合或異或同而乃所以為道體之全也今徒知所謂渾然者之為大而樂言之而不知夫所謂粲然者之未始相離也是以信同疑異喜合惡離其論毎䧟於一偏卒為無星之稱無寸之尺而已豈不誤哉夫善之與性不可謂有二物明矣然繼之者善自其隂陽變化而言也成之者性自夫人物禀受而言也隂陽變化流行而未始有窮陽之動也人物禀受一定而不可復易隂之靜也以此辨之則亦安得無二者之分哉然性善形而上者也隂陽形而下者也周子之意亦豈直指善為陽而性為隂哉但語其分則以為當属之此耳隂陽太極不可謂有二理必矣然太極無象而隂陽有氣則亦安得而無上下之殊哉此其所以為道器之别也故程子曰形而上為道形而下為器須著如此説然器亦道也道亦器也得此意而推之則庶乎其不偏矣仁義中正同乎一理者也而析為體用誠若有未安者然仁者善之長也中者嘉之㑹也義者利之宜也正者貞之體也而元亨者誠之通也利貞者誠之復也是則安得為無體用之分哉萬物之生同一太極者也而謂其各具則亦有可疑者然一物之中天理完具不相假借不相陵奪此統之所以有宗㑹之所以有元也是則安得不曰各具一理哉若夫所謂體用一源者程子之言葢已宻矣其曰體用一源者以至微之理言之則沖漠無朕而萬象昭然已具也其曰顯微無間者以至著之象言之則即事即物而此理無乎不在也言理則先體而後用葢舉體而用之理已具是所以為一源也言事則先顯而後微蓋即事而理之體可見是所以為無間也然則所謂一源者是豈漫無精粗先後之可言哉况既曰體立而後用行則亦不嫌於先有此而後有彼矣所謂仁為統體者則程子所謂専言之而包四者是也然其言蓋曰四徳之元猶五常之仁偏言則一事專言則包四者則是仁之所以包夫四者固未嘗離夫偏言之一事亦未有不識天偏言之一事而可以驟語夫專言之統體者也况此圖以仁配義而復以中正參焉又與隂陽剛柔為類則亦不得為專言之矣安得遽以夫統體者言之而昧夫隂陽動靜之别哉至於中之為用則以無過不及者言之而非指所謂未發之中也仁不為體則亦以偏言一事者言之而非指所謂專言之仁也對此而言則正者所以為中之榦而義者所以為仁之質又可知矣其為體用亦豈為無説哉大抵周子之為是書語意峻潔而混成條理精宻而疎暢讀者誠能虚心一意反復潜玩而毋以先入之説亂焉則庶幾其有得乎周子之心而無疑於紛紛之説矣問以太極之動為誠之通麗乎陽而繼之者善属焉靜為誠之復麗乎隂而成之者性属焉其説本乎通書而或者又疑周子之言本無分𨽻之意朱子曰此義但虚心味之久當自見若以先入為主則辨説紛拏無時可通矣仁義自分體用是一般説仁義中正分體用又是一般説偏言専言者只説仁便是體再説義便是用就中分出一箇道理如人家有兄弟只説户頭止言兄足矣再説弟便更别有一人仁義中正只属五行為其配元亨利貞也元是亨之始亨是元之盡利是貞之始貞是利之盡故曰元亨誠之通利貞誠之復問中也寂也仁也感也所謂陽者太極之用所以行正也義也所謂隂者太極之體所以立或疑如此分配漸至於支離穿鑿曰但虚心味之久當自見中仁言用正義言體義便有裁㫁一定之體中正仁義之説若謂四者皆有動靜則周子於此更列四者之目為剩語矣熟玩四字指意自有動靜其於道理極是分明葢此四字便是元亨利貞一通一復豈得為無動靜乎近日深玩此理覺得一語一嘿起居無非太極之理正不須以分别為嫌也體用一源者自理而觀則理為體象為用而理中有象是一源也顯微無間者自象而觀則象為顯理為㣲而象中有理是無間也且既曰有理而後有象則理象便非一物故伊川但言其一源與無間耳其寔體用顯微之分則不能無也體用是両物而不相離故可以言一源一心之中仁義禮智各有界限而其性情體用又自各有分别須是見得分明然後就此四者之中又見得仁義兩字是箇大界限如天地造化四序流行而其實不過一隂一陽而已於此見得分明然後就此又見得仁字是箇生底意思通貫周流於四者之中仁固是仁之本體也義固是仁之㫁制也禮則仁之節文也智則仁之分别也正如春之生氣貫徹四時春則生之生也夏則生之長也秋則生之斂也冬則生之藏也故程子謂四徳之元猶五常之仁偏言則一事専言則包四者正謂此也孔子只言仁以其專言者言之也故但言仁而義禮智皆在其中孟子兼言義以其偏言者言之也然亦不是於孔子所言之外添入一箇義字但於一理之中分别出來耳其又兼言智禮亦是如此蓋禮是仁之著智是義之藏而仁之一字未嘗不流行乎四者之中也太極本無極要去就中看這箇意出方得今只要去討他不是處與他鬭而今只管去檢㸃古人不是處道自家底是便是識見不長問要得理明不得不如此曰且可去放開胷懐讀書看淂道理明徹自然無歉吝之病無物我之私自然快活西山真氏曰大率此理自文公盡發其秘已洞然無疑所慮學者欲自立一等新竒之論而於文公之言反致疑焉不知此老先生是用幾年之功沉潜反覆參貫融液然後發出以示人今讀其書未能究竟底藴已先疑其説之未盡所以愈惑亂而無所明也黄氏巖孫曰尹和靖問易𫝊序云至微者理也至著者象也體用一源顯微無間莫太洩露天機否程子曰如此分明説破猶自人不解悟又朱子云沖漠無朕萬象森然已具未應不是先已應不是後正説體用一源之意熹既為此説嘗録以寄廣漢張敬夫敬夫以書來曰二先生所與門人講論問答之言見於書者詳矣其於西銘蓋屢言之至此圖則未嘗一言及也謂其必有微意是則固然然所謂微意者果何謂耶熹竊謂以為此圖立象盡意剖析幽微周子蓋不得已而作也觀其手授之意蓋以為惟程子為能當之至程子而不言則疑其未有能受之者爾夫既未能黙識於言意之表則馳心空妙入耳出口其弊必有不勝言者近年已覺頗有此弊矣觀其答張閎中論易傳成書深患無受之者及東見錄中論横渠清虚一大之説使人向别處走不若且只道敬則其意亦可見矣若西銘則推人以之天即近以明遠於學者日用最為親切非若此書詳於性命之原而畧於進為之目有不可以驟而語者也孔子雅言詩書執禮而於易則鮮及焉其意亦猶此耳韓子曰堯舜之利民也大禹之慮民也深熹於周子程子亦云既以復於敬夫因記其説於此乾道癸巳四月既望熹謹書問先生謂程子不以太極圖授門人蓋以未有能受之者然而孔門亦未嘗以此語顔曽是如何朱子曰焉知其不曽説曰顔曽做工夫處只是切己做將去曰此亦何嘗不切己皆非在外乃我所固有也曰言此恐徒長人億度私想之見曰理㑹不得者固如此若理㑹得者莫非在我便可受用何億度之有問程氏未嘗明以此圖示人今乃處為之説以傳之是豈先生之意也曰當時此書未行固可隱今日流布已廣若不説破却令後生枉生疑惑故不得已而為之説爾太極圖未嘗隱於人然人之識太極者只是於禪學中認得箇昭昭靈靈能作用底便謂此是太極而不知所謂太極乃天地萬物自然之理亘古亘今攧撲不破者禮也學者雖看易聖人不曾教學者看易詩書執皆以為教獨不及易於假我數年卒以學易乃是聖人自説非學者事葢易是箇極難理㑹底物事非他書比如古者先王順詩書禮樂以造士只是以此亦不及於易易是箇無形影底物不如且先讀詩書禮却𦂳要子所雅言詩書執禮未始及易夫子常所敎人只是如此今人便先為一種𤣥妙之説黄氏巖孫曰張閎中以書問程伊川先生易傳不傳先生答云易傳未傳自量精力未衰尚冀有少進爾然亦不必直待身後覺老耄則傳矣書雖未出學未嘗不傳也第患無受之者爾又吕與叔東見程先生先生語之日横渠教人本只是謂世學膠固故説一箇清虚一大只圖得人稍損得没去就道理來然而人又更别處走今日且只道敬太極圖附錄總論朱子曰伏羲作易自一畫以下文王演易自乾元以下皆未嘗言太極也而孔子言之孔子贊易自太極以下未嘗言無極也而周子言之先聖後聖豈不同條而共貫哉無極二字乃周子灼見道體迥出常情勇往直前說出人不敢説底道理令後之學者曉然見得太極之妙不属有無不落方體真得千聖以來不傳之秘先生之精因圖以示先生之藴因圖以發而其所謂無極而太極云者又一圖之綱領所以明夫道之未始有物而實為萬物之根柢也夫豈以為太極之上復有所謂無極哉近世讀者不足以識此而或妄議之既以為先生病史氏之𫝊先生者乃增其語曰自無極而為太極則又無所依据而重以病夫先生戊申六月在玉山邂逅洪景盧内翰借得所修國史中有濓溪程張等𫝊盡載太極圖説蓋濓溪於是始得立傳作史者於此為有功矣然此説本語首句但云無極而太極不知其何所据而增此自為二字也夫以本文之意親切渾全明白如此而淺見之士猶或妄有譏議若增此字其為前修之累啓後學之疑益以甚矣謂當請而改之而或者以為不可昔蘓子容特以為父辯謗之故請刋國史所記草頭木脚之語神祖猶俯從之况此乃百世道術淵源之所繫耶正當援此為例則無不可改之理矣濓溪太極圖首尾相因脈絡貫通首言隂陽變化之原其後即以人所禀受明之自惟人也得其秀而最靈純粹至善之性也是所謂太極也形生神發則隂動陽靜之為也五性感動則陽變隂合而生水火木金土之性也善惡分則成男成女之象也萬事出則萬物化生之象也至聖人定之以仁義中正而主靜立人極焉則又有得乎太極之全體而與天地混合無間矣故下文只言天地日月四時鬼神四者無不合也太極之㫖周子立象於前為説於後互相發明平正洞達絶無毫髪可疑而舊𫝊圖説皆有謬誤幸其失於此者猶或有存於彼是以向來得以參互考證改而正之凡所更改皆有據依非出於已意之私也周子喫𦂳為人特著太極之書以明道體之極致而其所説用工夫處只説定之以中正仁義而主靜君子修之吉而已未嘗使人日用之間必求見此無極之真而固守之也蓋原此理之所自來雖極微妙萬事萬化皆自此中流出而實無形象之可指故曰無極耳若論工夫則只中正仁義便是理㑹此事處非是别有一段根原工夫又在講學應事之外也凡看道理要見大頭腦處分明下面節節只是此理散為萬殊如孔子敎人雖是逐事説箇道理未嘗説出大頭腦處然四方八面合聚湊來也自見得箇大頭腦若孟子便已指出教人周子説出太極又是大段分明指出矣且如惻隱之端從此處推將去則是此心之仁仁即四徳之元元即太極之動處如此節節推將去亦自見得大頭腦處若㸔得太極處分明則盡見得天下許多道理條件皆自此出事事物物上皆有此箇道理元無虧欠也太極圖某若不分明别出許多節次出來如何㸔得但未知後人果能如此行細去㸔否周子太極圖經許多人不與他思量出自某逐一與他思索方得他如此精宻今人多疑濓溪之學出於希夷某曰濓溪書具存如太極圖希夷如何有此説南軒張氏曰先生崛起千載之後獨得微指於殘編斷簡之中推本太極以及乎隂陽五行之流布人物之所以生化於是知人之為至靈而性之為至善萬物有其宗萬事循其則舉而措之可見先王之所以為治者非私知之所出孔孟之意于以復明山陽度氏曰正始讀晦庵先生所釋太極圖説莫得其義然時時覽而思之不敢廢其後十有餘年讀之既久然後始知所謂上之一圏者太極本然之妙也及其動靜既分隂陽既形而其所謂上之一圏者常在乎其中葢本然之妙未始相離也至於隂陽變合而生五行水火木金土各具一圈者所謂分而言之一物一太極也水而木木而火火而土土而金復㑹於一圏者所謂合而言之五行一太極也然其指五行之合也總水火木金而不及土者葢土行四氣舉是四者以該之兩儀生四象之義也其下一圈為乾男坤女者所謂男女一太極也又其下之一圈為萬物化生者所謂萬物一太極也以見太極之妙流行於天地之間者無乎不在而無物不然也然太極本然之妙初無方所之可名無聲臭之可議學者之求之其將何以求之哉亦求之此心而已矣學者誠能自識其心反而求之日用之間則將有可得而言者夫寂然不動喜怒哀樂之未發者此心之體而太極本然之妙於是乎在也感而遂通喜怒哀樂之既發者此心之用而太極本然之妙於是而流行也然已發者可見而未發者不可見已發者可聞而未發者不可聞學者於此深體而黙識之因其可見以推其不可見因其可聞以推其不可聞庶乎融㑹貫通太極本然之妙可求而心極亦庶乎可立矣或者不知致察乎此而於所謂無極云者真以為無而以為周子立言之病失之遠矣先生嘗語正曰萬物生於五行五行生於隂陽隂陽生於太極其理至此而極正當時聞之心中釋然若有以見夫理之所以然名之所以立者先生又曰乾道成男坤道成女何也此程子所謂海上無人之境而人忽生乎其間者此天地生物之始禮家所謂感生之道也又曰生天生地成鬼成帝即太極動靜生隂陽之義蓋先生晚年表裏洞然事理俱融凡諸子百家一言一行之合於道者亦無不察况聖門之要㫖哉遂寧傅耆伯成未第時嘗從周子逰而接其議論先生聞之嘗令正訪其子孫而求其遺文焉在吾鄉時傅嘗有書謝其所寄姤説其後在永州又有書謝其所寄改定同人説但傅之書藁無恙而周子之易説則不可復見耳聞之先生今之通書本名易通則六十四卦疑皆有其説今考其書獨有乾損益家人睽復無妄䝉艮等説而亦無所謂姤説同人説者則其書之散逸亦多矣可不惜哉夫太極者所以發明此心之妙用也通書者又所以發明太極之妙用也然其言辭之髙深義理之微宻有非後學可以驟而窺者今先生既已反復論辯究極其説章通句解無復可疑者其所以望於後之學者至矣正也輒不自量併以其聞之先生者附之於此學者其亦熟復而深味之哉謝氏方叔曰道之大原出於天而具於人心其大無外其小無内葢混然一太極也自伏羲繼天立極因河圖以畫八卦天地定位而乾坤列山澤通氣而艮兌列雷風相薄而震巽列水火不相射而坎離列自震而乾為數往自巽而坤為知來八倍為十六十六倍為三十二三十二倍為六十四天地鬼神之奥萬事萬物之理森然畢備此伏羲先天之易所以為萬古斯文之鼻祖也神農氏之取益噬嗑者以是黄帝堯舜之取乾坤至夬者以是夏連山商歸藏亦以是雖其作用不同其實同一太極也降及中古文王繫卦周公繫爻易於是乎有辭孔子生於周末晚作十翼先天後天互相發明其紀載於詩書其發揮於禮樂其筆削於春秋大本大原曾不外此去聖浸遠世之諸儒或汩於訓詁詞章之末或溺於權謀功利之習甚至薄蝕於虚無寂滅之敎其斵喪天理滋甚更千百年至我國朝天啟斯道始有濓溪周先生獨𫝊千載不傳之秘上祖先天之易著太極一圖所謂太極云者葢本於易有太極而隂陽五行人物由此而生即太極生兩儀兩儀生四象四象生八卦之謂也自太極分隂陽隂陽分五行五行分四時皆指太極之在造化者自無極二五之妙合而推萬物之化生自人物之并生而别人心之最靈自五性之感動而明聖人之立極此皆指太極之在品彚者自其在造化者言之則即天地可以推太極動靜之妙故曰立天之道曰隂與陽立地之道曰柔與剛自其在品彚者言之惟聖人㑹太極動靜之全故曰立人之道曰仁與義終始不窮流行今古此所謂六爻之動三極之道也六爻之中五上為天三四為人初二為地統而言之三極同一太極析而言之三極各一太極故周子於圖説之終斷之曰大哉易也斯其至矣此周子作圖之本意也至於易通之書則又與此圖相為表裏伊洛道喪傳者多失其真中興以來復有考亭朱先生上接聖賢相傳之道統著書立言私淑後學其本義啓蒙諸書皆所以闡揚乎太極之理言造化之樞紐所以明隂陽五行一太極言品彚之根柢所以明男女萬物一太極其曰上天之載無聲無臭則周子無極而太極之意非駕空鑿虚之説也又曰非太極之外復有無極則周子本太極無極之意非叠牀架屋之説也太極得朱子表章而益明可謂有大造於萬世學者矣黄氏瑞節曰朱子於書無不緒正而周子二書解在乾道九年已脱藁至淳熙十五日始出以授學者慶元五年三月將終之前五日猶為諸生講太極圖至夜分則其於是書葢終身焉然與陸氏兄弟往復爭辯以此與林侍郎栗論不合得劾以此最後臺臣排擊偽學有張貴謨者指論太極圖説之非遂决去以終其身亦以此嗚呼先生講授一意分更分漏開示學者惟恐一毫之不明且盡也而人之好異亦可畏哉後之讀是書者其知先生苦心云論太極圖與諸書同異朱子曰伏羲畫卦只就隂陽以下孔子又就隂陽上發出太極康節又道須信畫前元有易濓溪太極圖又有許多詳備問太極自一而二自二而五即推至於萬物易則自一而二自二而四自四而八自八而十六自十六而三十二自三十二而六十四然後萬物之理備西銘則止言隂陽洪範則止言五行或略或詳皆不同何也曰理一也人所見有詳略耳然道理亦未始不相値也問先天太極二圖曰先天乃伏羲本圖非康節所自作雖無言語而所該甚廣凡今易中一字一義無不自其中流出者太極却是濓溪自作發明易中大象綱領意思而已故論其格局則太極不如先天之大而詳論其義理則先天不如太極之精而約葢合下規模不同而太極終在先天範圍之内又不若彼之自然不假思慮安排也若以數言之則先天之數自一而二自二而四自四而八以為八卦太極之數亦自一而二剛柔自二而四剛善剛惡柔善柔惡遂加其一中以為五行而遂下及於萬物葢物理本同而象數亦無二致但推得有大小詳略耳先天之説亦是太極散為六十四卦三百八十四爻而一卦一爻莫不具一太極其各具一太極處又有許多道理須虚心平氣就事觀理不可只就圖想像思惟也問劉子所謂天地之中即周子所謂太極否曰只一般但名不同中只是恰好處書惟皇上帝降𠂻于下民亦只是恰好處極不是中極之為物只是在中如這燭臺中央簪處便是極從這裏比到那裏也恰好不曾加些從那裏比到這裏也恰好不曾減些問濓溪作太極圖發明造化之原横渠作西銘揭示進為之方然二先生之學不知所造為孰深曰此未易窺測然亦非學者所當輕議也問近思録載横渠論氣二章其説與太極動靜隂陽之説相出入然横渠立論不一而足似不若周子之言有本末次第也曰横渠論氣與西銘太極各是發明一事不可以此而廢彼優劣亦不當輕議也問横渠太虚之説本是説無極却只説得無字曰無極是該虚實清濁而言無極字落在中間太虚字落在一邊了便是難説聖人熟了説出便恁地平正而今把意思去形容他却有時偏了太極是箇大底物事四方上下曰宇古往今來曰宙無一箇物似宇様大四方去無極上下去無極是多少大無一箇物似宙様長遠亘古亘今往來不窮自家心下須常認得這意思問此是誰語曰此是古今語象山常要説此語但他説便只是這箇又不用裏面許多節拍却只守得箇空蕩蕩底公更看横渠西銘初看有許多節拍却似狹充其量是甚麽様大問康節所謂一陽初動處萬物未生時曰某嘗謂康節之學與周子程子所説小有不同康節與那隂陽相接處看得分曉故多舉此處為説不似周子説無極而太極與五行一隂陽隂陽一太極如此周遍若如周子程子之説則康節所説在其中矣康節是指貞元之間言之不似周子程子説得活體用一原顯微無間性理大全書卷之一

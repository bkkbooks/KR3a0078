body:
  text: 性理大全書卷六十九治道四王伯程子曰得天理之正極人倫之至者堯舜之道也用其私心依仁義之偏者伯者之事也王道如砥本乎人情出乎禮義若履大路而行無復囬曲伯者﨑嶇反側於曲徑之中而卒不可與入堯舜之道故誠心而王則王矣假之而伯則伯矣二者其道不同在審其初而已易所謂差若毫釐繆以千里者其初不可不審也故治天下者必先立其志志先立則邪説不能移異端不能惑故力進於道而莫之禦也茍以伯王之心而求王道之成是衒石以為玉也故仲尼之徒無道桓文之事而曽西耻比管仲者義所不由也况下於伯者乎王道奉若天道動無非天者故稱天王命則天命也討則天討也盖天道者王道也後世以智力持天下者伯道也涑水司馬氏曰合天下而君之之謂王王者必立三公二公分天下而治之曰二伯一公處乎内皆王官也周衰二伯之職廢齊桓晉文紏合諸侯以尊天子天子因命之為侯伯修舊職也伯之語轉而為覇覇之名自是興問如管仲之才使孔子得志行乎天下還用之否龜山楊氏曰管仲髙才自不應廢但綱紀法度不出自他儘有用處曰若不使他自為或不肯退聼時如何曰如此則聖人廢之不問其才又曰王道本於誠意觀管仲亦有是處但其意别耳如伐楚事責之以包茅不貢其言則是若其意豈為楚不勤王然後加兵但欲楚尊齊耳尊齊而不尊周管仲亦莫之詰也若實尊周專封之事仲豈宜為之故孟子曰五伯假之也盖言其不以誠為之也又曰自孟子後人不敢小管仲只為見他不破近世儒者如荆公雖知卑管仲其實亦識他未盡况於餘人人若知王良羞與嬖奚比比而得禽獸雖若丘陵弗為之意則管仲自然不足道又曰管仲只為行詐故與王者别若王者純用公道而已問或謂衞於王室為近懿公為狄所滅齊桓公攘戎狄而封之當是時戎狄横而中國微桓公獨能如此故孔子曰微管仲吾其被髮左祍矣為其功如此也觀晉室之亂胡羯猖獗於中原當是時只為無一管仲故顛沛如此然則管仲之功後世信難及也曰若以後世論之其功不可謂不大自王道觀之則不可以為大也今人只為見管仲有此故莫敢輕議不知孔孟有為規模自别見得孔孟作處則管仲自小曰孔孟如何曰必也以天保以上治内以采薇以下治外雖有夷狄安得遽至中原乎如小雅盡廢則政事所以自治者俱亡四夷安得而不交侵中國安得而不微方是時縱能救之於已亂雖使中國之人不至被髮左祍盖猶賢乎周衰之列國耳何足道哉如孟子所以敢輕鄙之者盖以非王道不行故也曰然則孔子何為深取之曰聖人之於人雖有毫末之善必録之而况於仲乎若使孔子得君如管仲則管仲之事盖不暇為矣問管仲之功孔子與之其曰如其仁何也和靖尹氏曰如似也與其功而不與其仁問何故不與其仁曰只為大本錯了問如何是大本錯曰且如初相子糾其錯亦大矣問如何是錯曰觀春秋所書莊公九年夏公伐齊納子糾齊小白入於齊九月齊人取子糾殺之可見也管仲功髙豈可補過但只是忍耻能就其功故孔子與其功也其於仁也何有若夫舎王道而行伯道以富國强兵為本則更不待論也如責包茅不入昭王不返亦謂假仁以行其伯孟子雖説乆假而不歸然怎生謂之假並能乆而不歸若到得不歸處時則是假之以成功也然桓公尚在五伯中為盛者也孟子責管仲功烈如此其卑者以其不能行王道以至於仁也孔子謂九合諸侯一正天下以其功也孔孟之意則同舎此皆穿鑿也問孔孟羞稱五伯何也曰七十子之徒皆未必能作得管仲之功然所以羞稱者只為錯了大本不知學者也學者不可不知此也五峯胡氏曰三王正名興利者也故其利大而流長五伯假名争利者也故其利小而流近豫章羅氏曰王者富民伯者富國富民三代之世是也富國齊晉是也至漢文帝行王者之道欲富民而告戒不嚴民反至於奢武帝行伯者之道欲富國而費用無節國反至於耗南軒張氏曰學者要須先明王伯之辨而後可論治體王伯之辨莫明於孟子大抵王者之政皆無所為而為之伯者則莫非有為而然也無所為者天理義之公也有所為者人欲利之私也考左氏所載齊桓晉文之事其間豈無可喜者要莫非有所為而然考其迹而其心術之所存固不可掩也問王伯如何分别潜室陳氏曰司馬温公無王伯之辨要之源頭至是王伯兩字以其為天下王故謂之王以其為方伯故謂之伯以王天下言之謂之王猶伯之為伯也未見其羙玉碔砆之辨後来制字有不備故伯字有覇字王字只是王字㸃發為之然伯字亦無詐力之意故言三王以其王天下也言五伯以其伯諸侯也自其有三王之至公有五伯之智力而後有王伯是非誠偽之分故今之言王伯之分者當以孟子徳行仁力假仁為正西山真氏曰義信禮為國之本不可一日離古之王者動必由之非有所為而為之也子犯之為晉文公謀必曰示之義示之信示之禮則皆有為而為之矣王伯粹駁之異其不以此哉田賦或問井田今可行否程子曰豈古可行而今不可行者或謂今人多地少不然譬諸草木山上著得許多便生許多天地生物常相稱豈有人多地少之理問古者百畝今四十一畝餘若以土地計之所收似不足以供九人之食曰百畝九人固不足通天下計之則亦可家有九人只十六已别受田其餘皆老少也故可供有不足者又有補助之政又有鄉黨賙捄之義故亦可足又嘗與張子厚論井田曰地形不必寛平可以畫方只可用算法折計地畝以授民子厚謂必先正經界經界不正則法終不定地有坳垤不管只觀四標竿中間地雖不平饒與民無害就一夫之間所争亦不多又側峻處田亦不甚羙又經界必湏正南北假使地形有寛狭尖斜經界則不避山河之曲其田則就井田處為井不能就成處或五七或四三或一夫其實四数則在又或就不成一夫處亦可計百畝之数而授之無不可行者如此則經界随山随河皆不害於畫之也茍如此畫定雖便使暴君汚吏亦数百年壊不得經界之壊亦非專在秦時其来亦逺漸有壊矣又曰井田令取民田使貧富均則願者衆不願者寡正叔言亦未可言民情怨怒正論可不可爾湏使上下都無怨怒方可行藍田吕氏曰古之取民貢助徹三法而已較数嵗之中以為常是為貢一井之地八家八家皆私百畝同治公田百畝是為助不為公田俟嵗之成通以十一之法取於百畝是為徹龜山楊氏曰先王為比閭族黨州鄉以立軍政居則為力耕之農出則為敵愾之士盖當是時天下無不受田之夫故均無貧焉而人知食力而已㳺惰姦凶不軌之民無所容於其間也五峯胡氏曰仁心立政之本也均田為政之先也田里不均雖有仁心而民不被其澤矣井田者聖人均田之要法也㤙義聫属姦宄不容少而不散多而不亂農賦既定軍制亦明矣三王之所以王者以其能制天下之田里政立仁施雖匹夫匹婦一衣一食如觧衣充之如推食食之其於萬物誠有調燮之法以佐賛乾坤化育之功華陽范氏曰自井田廢而貧富不均後世未有能制民之産使之養生送死而無憾者也立法者未嘗不欲抑富而或益助之不知富者所以能兼并由貧者不能自立也貧者不能自立也貧者賦斂重而力役繁也為國者必曰財用不足故賦役不可以省盍亦反其本矣昔哀公以年饑用不足問於有若有若曰盍徹乎夫徹非所以裕用然欲百姓與君皆足必徹而後可也後之為治者三代之治雖未能復唯省其力役薄其賦斂務本抑末尚儉去奢占田有限困窮有養使貧者足以自立而富者不得兼之此均天下之本也不然雖有法令徒文具而已何益於治哉問横渠為世之病井田難行者以亟奪富人之田為辭然處之有術期以數年不刑一人而可復不審井議之行於今果何如朱子曰講學時且恁講若欲行之湏有機㑹經大亂之後天下無人田盡歸官方可給與民如唐口分世業是從魏晉積亂之極至元魏及北齊後周乗此機方做得荀悦漢紀一叚正説此意甚好若平世誠為難行東莱吕氏曰孔子言王道曰道千乗之國敬事而信節用而愛人使民以時孟子言王道湏説百畝之田八口之家及材木不可勝用之類何故湏説許多以此見得春秋時井田尚在戰國時已自大廢故湏要人整頓如史記説決裂阡陌以靜天下之業又以此見得井田亦不易廢理財龜山楊氏曰古之制國用者量入以為出故以九賦斂之而後以九式均節之使用財無偏重不足之處所謂均節也取之有藝用之有節然後足以服邦國致其用先王所謂理財者亦均節之使當理而已周官泉府之官以市之征布斂市之不售貨之滯於民用以其價買之物掲而書之以待不時而買者夫物貨之有無民用之贏乏常相因而至也不售者有以斂之盖将使行者無滯貨非以其賤故買之也不時買者有以待之盖将使居者無乏用非以其貴故賣之盖所以阜通貨賄也此商賈所以願藏於王之市而有無贏乏皆濟矣先王所謂理財者非盡籠天下之利而有之也取之以道用之有節各當於義之謂也取之不以其道用之不以其節而不當於義則非理矣故周官以九職任之而後以九賦斂之其取之可謂有道矣九賦之入各有所待如闗市之賦以待王者之膳服邦中之賦以待賔客之類是也邦之大用内府待之邦之小用外府受焉有司不得而侵紊之也冢宰以九式均節之下至工事芻秣之微匪頒好用皆有式焉雖人主不得而逾之也所謂惟王及后世子不㑹特膳服之類而已有不如式雖有司不㑹冢宰得以式論之矣什一天下之中制自堯舜以来未之有改也取其所當取則利即義矣故曰國不以利為利以義為利則義利初無二致焉朱子曰古者荒嵗方鑄錢周禮所謂國凶荒札䘮則市無征而作布既可因此以養饑民又可以權物之重輕盖古人錢闕方鑄錢以益之節儉程子曰仁宗一日問折米折㡬分曰折六分怪其太甚也有㫖只令折五分次供進偶覺藏府痛曰習使然也却令如舊又一日思生荔枝有司言已供盡近侍曰有鬻者請買之上曰不可令買来嵗必増上供之數流禍百姓無窮又一日夜中甚饑思燒羊頭近侍乞宣取上曰不可今次取之後必常備日殺三羊暴殄無窮竟夕不食元城劉氏曰仁宗恭儉出于天性故四十二年如一日也易所謂有始有卒者世以明皇初節儉後奢侈疑相去遼絶此説非也此正是一個見識耳夫錦繡珠玉世之所有也已不好之則不用何至焚之焚之必於前殿是欲人知之此好名之弊也夫恭儉不出於天性而出於好名好名之心衰則其奢侈必甚此必至之理也故當時識者見其焚珠玉知其必有末年之弊若仁宗則不然若非大臣問疾則無由見其黄絁被漆唾壺五峯胡氏曰上侈靡而細民皆衣帛食肉此饑寒之所由生盗賊之所由作也天下如是上不知禁又益甚焉然而不亡者未之有也朱子曰先聖之言治國而有節用愛人之説盖國家財用皆出於民如有不節而用度有闕則横賦暴斂必将有及於民者雖有愛人之心而民不被其澤矣是以将愛人者必先節用此不易之理也東莱吕氏曰古人自奉簡約類非後人所能及如飲食髙下自有制度諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕此猶是極盛時制度也大抵古人得食肉者至少如食肉之禄氷皆與焉肉食者謀之肉食無墨此言貴者方得肉食也比之後人簡約甚矣魯齋許氏曰地力之生物有大數人力之生物有大限取之有度用之有節則常足取之無度用之無節則常不足生物之豐歉由天用物之多少由人天地間為人為物皆有分限分限之外不可過求亦不得過用暴殄天物得罪於天賑恤元城劉氏曰昔堯有九年之水湯遇七年之旱而國無捐瘠之民者盖備之有素而已聖王為國必有九年之蓄故雖遇旱乾水溢之災民無菜色今嵗一不登人且狼狽若有司不度事勢拘執故常必俟春夏之交方行祈禱之理民已艱食旋為賑貸之計所謂大寒而後索衣裘亦無及矣龜山楊氏曰先王之時三年耕有一年之積故凶年饑嵗民免於死亡以其豫備故也不知為政乃欲髠其人而取其資以為賑饑之術正孟子所謂雖得禽獸若丘陵弗為也朱子曰夫先王之世使民三年耕者必有一年之蓄故積之三十年則有十年之蓄而民不病於凶饑此可謂萬世之良法矣其次則漢之所謂常平者其法亦未嘗不善也救荒之政蠲除賑貸盖當汲汲於其始而撫存休養尤在謹之於始終譬如傷寒大病之人方其病時湯劑砭炙固不可以少緩而其既愈之後飲食起居之間所以将䕶節宣少失其宜則勞復之證百死一生尤不可以不深畏也自古救荒自有兩説第一是感召和氣以致豐穰其次只有儲蓄之計若待他餓時理㑹更有何䇿或説救荒賑濟之意固善而取出之數不節不可黄直卿云制度雖只是這箇制度用之亦在其人如糴米賑饑此固是但非其人則做這事亦将有不及事之患曰然嘗謂為政者當順五行修五事以安百姓若曰賑濟於凶荒之餘縱饒措置得善所惠者淺終不濟事賑饑無竒䇿不如講求水利到賑濟時成甚事象山陸氏曰社倉固為農之利然年常豐田常熟則是利可乆茍非常熟之田一遇歉嵗則有散而無斂来嵗闕種糧時乃無以賑之莫若兼置平糴一倉豐時糴之使無價賤傷農之患闕時糴之以摧富民閉廪騰價之計析所糴為二每存其一以備歉嵗代社倉之匱實為長利也禎異程子曰隂陽運動有常而無忒凡失其度皆人為感之也故春秋災異必書漢儒傳其説而不得其理是以所言多矣或問鳯鳥不至河不出圖不知符瑞之事果有之否曰有之國家将興必有禎祥人有喜事氣見靣目聖人不貴祥瑞者盖因災異而修徳則無損因祥瑞而自恃則有害也問五代多祥瑞何也曰亦有此理譬如盛冬時發出一花相似和氣致祥乖氣致異此常理也然出不以時則是異也如麟是太平和氣所生然後世有以麟駕車者却是怪也譬如水中物生於陸陸中物生於水豈非異乎又問漢文多災異漢宣多祥瑞何也曰且譬如小人多行不義人却不説至君子未有一事便生議論此是一理也至白者易汚此是一理也詩中言幽王大惡為小惡宣王小惡為大惡此是一理又問日食有常數何治世少而亂世多豈人事乎曰理㑹此到極處煞燭理明也天人之際甚微宜更思索曰莫是天數人事看那邉勝否曰似之然未易言也又問魚躍于王舟火復于王室流為烏有之否曰魚與火則不可知若兆朕之先應亦有之或問東海殺孝婦而旱豈國人寃之所致也曰國人寃固是然一人之意自足以感動天地不可道殺孝婦不能致旱也或曰殺姑而雨是衆人寃釋否曰固是衆人寃釋然孝婦寃亦釋也其人雖亡然寃之之意自在不可道殺姑不能釋婦寃而致雨也五峯胡氏曰變異見於天者理極而通數窮而更勢盡而反氣滋而息興者将廢成者将敗人君者天命之主所宜盡心也徳動於氣吉者成凶者敗大者興小者廢夫豈有心于彼此哉謂之譴告者人君覩是宜以自省也若以天命為恃遇災不懼肆淫心而出暴政未有不亡者也朱子曰商中宗時有桑榖並生於朝一莫大拱中宗能用巫咸之言恐懼修徳不敢荒寧而商道復興享國長乆至于七十有五年髙宗祭于成湯之廟有飛雉升鼎耳而鳴髙宗能用祖已之言克正厥事不敢荒寧而商用嘉靖享國亦乆至于五十有九年古之聖王遇災而懼修徳正事故能變災為祥其效如此象山陸氏曰昔之言災異者多矣如劉向董仲舒李尋京房翼奉之徒皆通乎隂陽之理而陳于當時者非一事矣然君子無取焉者為其著事應之説也孔子書災異於春秋以為後王戒而君子有取焉者為其不著事應之故也夫旁引物情曲指事類不能無偶然而合者然一有不合人君将忽焉而不懼孔子于春秋著災異不著事應者實欲人君無所不謹以荅天戒而已西山真氏曰祥多而恃未必不危異衆而戒未必不安顧人主應之者何如耳魯齋許氏曰三代而下稱盛治者無若漢之文景然考之當時天象數變如日食地震山崩水潰長星彗星孛星之類未易遽數前此後此凡若是者小則有水旱之應大則有亂亡之應未有徒然而已者獨文景克承天心消弭變異使四十年間海内殷富黎民樂業猗歟偉歟未見其比也秦之苦天下乆矣加以椘漢之戰生民糜滅户不過萬文帝承諸吕變故之餘入繼正統專以養民為務其憂也不以已之憂為憂而以天下之憂為憂其樂也不以已之樂為樂而以天下之樂為樂今年下詔勸農桑也恐民生之不遂明年下詔减租税也慮民用之或乏懇愛如此宜其民心得而和氣應也或問天變曰胡氏一説好如父母嗔怒或是子婦有所觸凟而怒亦有父母别生憂惱時為子者皆當恐懼修省此言殊有理論兵程子曰兵以正為本動衆以毒天下而不以正則民不從而怨敵生亂亡之道也是以聖王重焉東征西怨義正故也又曰行師之道以號令節制行師無法幸而不敗且勝者時有之矣聖人之所戒也用兵以能聚散為上兵陣湏先立定家計然後以㳺騎旋旋量力分外靣與敵人合此便是合内外之道若㳺騎太逺則却歸不得至如聼金鼓聲亦不忘却自家如何如符堅一敗使不可支持無本故也技擊不足以當節制節制不足以當仁義使人人有子弟衛父兄之心則制挺以撻秦楚之兵矣韓信多多益辦分數明而已管轄人亦湏有法徒嚴不濟事今帥千人能使千人依時及節得飯喫只如此者能有㡬人嘗謂軍中夜驚亞夫堅卧不起不起善矣然猶夜驚何也亦是未盡善善兵者有二萬人未必死彼十萬人亦以未必能勝二萬人古者以少擊衆而取勝者多盖兵多亦不足恃昔者袁紹以十萬阻官渡而曺操只以萬卒取之王莽百萬之衆而光武昆陽之衆有八千仍有在城中者然則只是數千人取之符堅下淮百萬而謝𤣥纔二萬人一麾而亂以此觀之兵衆則易老適足以資敵人一敗不支則自相蹂踐至如聞風聲鶴唳皆以為晉軍之至則是自相殘也譬之一人軀榦極大一人輕㨗兩人相當則擁腫者遲鈍為輕㨗者出入左右之則必困矣餽運之術雖自古亦無不煩民不動摇而足者然于古則有兵車其中載糗糧百人破二十五人然古者行兵在中國又不逺敵若是深入逺處則决無省力且如秦運海隅之粟以饋邉率三十鍾而致一石是二百倍以来今日行師一兵行一夫饋只可供七日其餘日必俱乏食也且計之湏三夫而助一兵仍湏十五日便回一日不回則一日乏食以此校之無善術故兵也者古人必不得已而後用者知此耳龜山楊氏曰自黄帝立丘乗之法以寓軍政歴世因之未之有改也至周為尤詳居則為比閭族黨州鄉出則為伍兩軍師之制使之相保相愛刑罰慶賞相及用一律也天子無事嵗三田以供祭祀賔客充君之庖而已其事宜若緩而不切也而王執路鼓親臨之教以坐作進退有不用命者則刑戮随之其教習之嚴如此故六鄉之兵出則無不勝以其威令素行故也丘井之廢乆矣兵農不可以復合而伍兩軍師之制不可不講無事之時使之相保相愛刑罰慶賞相及用矣於有事之際則申之以卒伍之令督之旌旗指揮之節臨難而不相敵見敵而不用命必戮無赦使士卒畏我而不畏敵然後可用若夫伍法不修雖有百萬之師如養驕子不可用也傳曰秦之鋭士不可當齊晉之節制齊晉之節制不可以當湯武之仁義某竊謂雖有仁義之兵茍無節制亦不可以取勝甘誓曰左不攻于左汝不恭命右不攻于右汝不恭命弗用命則孥戮之牧誓曰不愆于六歩七歩乃止齊焉不愆于四伐五伐六伐乃止齊焉其節制之嚴蓋如此故聖人著之於經以為後世法也故諸葛孔明曰有制之兵無能之将不可以敗無制之兵有能之将不可以勝此之謂也韓信用兵在楚漢之間則為善矣考之五伯自己不及以無節制故也如信之軍修武髙祖即其臥内奪之印易置諸将信尚未知此與棘門覇上之軍何異但信用兵能以術驅人使自為戰當時亦無有以節制之兵當之者故信數得以取勝也王者之兵未嘗以術勝人然亦不可以計敗後世惟諸葛亮李靖為知兵如諸葛亮已死司馬仲逹觀其行營軍壘不覺歎服而李靖惟以正出竒此為得法制之意而不務僥倖者也古人未嘗不知兵如周官之法雖坐作進退之末莫不有節若平時不學一旦緩急何以應敵如此則學者於行師御衆戰陣營壘之事不可不講或問今之為将帥者不必用狙詐固是乃兵官武人之有智畧者莫非狙詐之流若無狙詐如何使人曰君子無所徃而不以誠但至誠惻怛則人自感動曰至誠惻怛可也然今之置帥朝除暮易若以至誠為務湏是積乆上下相諳其效方見卒然施之未必有補曰誠動於此物應於彼速於影響豈必在乆如郭子儀守河陽李光弼代之一號令而金鼓旗幟為之精明此特其號令各有體耳華陽范氏曰古之明王天下有不順者必諄諄而告戒之至于再至于三告之不可然後征之則其民知罪而用兵有辭矣朱子曰先王之制内有六鄉六遂都鄙之兵外有方伯連帥之兵内外相維緩急相制本强則精神折衝不强則招殃致凶兵法以能分合為變不獨一陣之間有分合天下之兵皆然兵之勝負全在勇怯又曰用兵之要敵勢急則自家當委曲以纒繞之敵勢緩則自家當勁直以衝突之厮殺無巧妙只是死中求生兩軍相拄一邉立得脚住不退即贏矣湏是死中求生方勝也晝戰聼金皷夜戰看火侯嘗疑夜間不解戰蓋只是設火侯防備敵来刼寨之属古人屯營其中盡如井形于巷道十字處置火侯如有間諜一處舉火則盡舉更走不得管仲内政士鄉十五乃戰士也所以教之孝悌忠信尊君親上之義夫子曰以不教民戰是謂棄之故雖伯者之道亦必如此五代時兵甚驕矣周世宗髙平一戰既敗却忽然誅不用命者七十餘人三軍大振遂復合而克之故凡事都要人有志或言古人之兵當如子弟之衛父兄而孫吳之徒必曰與士卒同甘苦而後可是子弟必待父兄施恩而後報也曰巡而拊之三軍之士皆如挟纊此意也少不得陣者定也八陣圖中有竒正前靣雖未整猝然遇敵次列便已成正軍矣或問史記所書髙祖垓下之戰季通以為正合八陣之法曰此亦後人好竒之論大凡有兵湏有陣不成有許多兵馬相戰鬬只袞作一團又只排作一行必湏左右前後部伍行陣各有條理方得今且以數人相撲言之亦湏擺布得所而後相角今人但見史記所書甚詳漢書則畧之便以司馬遷為曉兵法班固為不曉此皆好竒之論不知班固以為行陣乃用兵之常故畧之從省文爾看古来許多陣法遇征戰亦未必用得所以張巡用兵未嘗倣古兵法不過使兵識将意将識士情蓋未論臨機應變方畧不同只如地圓則湏布圓陣地方則湏布方陣亦豈容槩論也又曰常見老将説大要臨陣又在畨休逓上分一軍為數替将戰則食第一替人既飽遣之入陣便食第二替人覺第一替人力将困即調發第二替人徃代第三替人亦如之只管如此更畨則士常飽徤而不至困乏問選擇将帥之術曰當無事之時欲識得将湏是具大眼力如蕭何識韓信方得南軒張氏曰君子於天下之事無所不當究况於兵者世之興廢生民之大本存焉其可忽而不講哉夫兵政之本在於仁義其為教根乎三綱然至於法度紀律機謀權變其條不可紊其端為無窮非素考索烏能極其用一有所未極則於酬酢之際其失将有間不容髮者可不畏哉東莱吕氏曰後世用兵者以為黄石一書無與比者不知黄石公未出之前三代之兵一舉而無敵於天下兵書何在黄石公有一秘法在人間人自不識三代得天下亦不過此道唯仁一字爾西山真氏曰古之用武者不急於治兵而急於擇将将之勇怯兵實係焉故天下無必勝之兵而有不可敗之将昔人未嘗不用民兵也然既募之後則有紀律焉馬燧之練戍精卒是也方募之始則有差擇焉馬隆之立標㨂試是也鶴山魏氏曰余少讀書於十三卦制作之象見所謂門析以待暴客􅋃矢以威天下每嘆風氣既開人情昜動雖黄帝堯舜有不容不先事而為慮者及觀古制之詳莫備於周有井牧之田有伍兩之兵有溝樹之固有郊闗之限有巡鼜之警有壼柝之守不得已而用民也則鄉遂三邑三等采地以次召發不止則諸侯又不止也則有遍境出之法乃知古人雖以禮義亷耻為域民固國之道然未嘗不設險用師以輔之也論刑龜山楊氏曰文帝之去肉刑其用志固善也夫紂作炮烙之刑其甚至於刳剔孕婦則雖秦之用刑不慘於是矣而啇之頑民亦非素教不聞周繼之而廢肉刑也豈武王周公皆忍人哉若文帝之承秦蓋亦務為厚養而素教之耳不思所以教養之而去肉刑是以圖其末也則王通謂其傷於義恐未為過論及夫廢之已久而崔鄭之徒乃驟議復之則其不知本末也甚矣或曰特㫖乃人君威福之權不可無也曰不然古者用刑王三宥之若案法定罪而不敢赦則在有司夫惟有司守法而不移故人主得以養其仁心今也法不應誅而人主必以特㫖誅之是有司之法不必守而使人主失仁心矣因論特㫖曰此非先王之道先王只是好生故書曰好生之徳洽于民心為天子豈應以殺人為己任孟子曰國人皆曰可殺然後殺之故曰國人殺之也謂國人殺之則殺之者非一人之私意不得已也古者司寇以獄之成告于王王命三公參聴之三公以獄之成告于王三宥然後致刑夫宥之者天子之徳而刑之者有司之公天子以好生為徳有司以執法為公則刑不濫矣若罪不當刑而天子必刑之寧免於濫乎然此事其漸有因非獨人主之過使法官得其人則此弊可去矣舜為天子若瞽䏂殺人皋陶得而執之舜猶不能禁也且法者天下之公豈宜徇一人之私意嘗怪張釋之渭橋犯蹕事謂宜罰金文帝怒釋之對曰法者天子所與天下公共也今法如是更重之是法不信於民也此説甚好然而曰方其時使人誅之則己以謂為後世人主開殺人之端者必此言也夫既曰法天子與天下公共則得罪者天子必付之有司安得擅殺使當時可使人誅之今雖下廷尉越法而誅之亦可也五峯胡氏曰生刑輕則易犯是教民以無耻也死刑重則難悔是絶民自新之路也死刑生刑輕重不相懸然後民知所避而風化可興矣豫章羅氏曰朝廷立法不可不嚴有司行法不可不恕不嚴則不足以禁天下之惡不恕則不足以通天下之情漢之張䆁之唐之徐有功以恕求情者也常袞一切用法四方奏請莫有獲者彼庸人哉天下後世典獄之官當以有功為法以袞為戒朱子曰昔者帝舜以百姓不親五品不避而使契為司徒之官教以人倫父子有親君臣有義夫婦有别長幼有序朋友有信又慮其教之或不從也則命皋陶作士明五刑以弼五教而期于無刑焉葢三綱五常天理民彞之大節而治道之本根也故聖人之治為之教以明之為之刑以弼之雖其所施或先或後或緩或急而其丁寕深切之意未嘗不在乎此也乃若三代王者之制則亦有之曰凡聴五刑之訟必原父子之親立君臣之義以權之葢必如此然後輕重之序可得而論淺深之量可得而測而所以悉其聰明致其忠愛者亦始得其所施而不悖此先王之義刑義殺所以雖或傷民之肌膚殘民之軀命然刑一人而天下之人聳然不敢肆意于為惡則是乃所以正直輔翼而若其有常之性也後世之論刑者不知出此其陷于申啇之刻薄者既無足論矣至於鄙儒姑息之論異端報應之説俗吏便文自營之計則又以輕刑為事然刑愈輕而愈不足以厚民之俗往往反以長其悖逆作亂之心而使獄訟之愈繁則不講乎先王之法之過也以舜命皋陶之辭考之士官所掌惟象流二法而已鞭扑以下官府學校随事施行不領於士官事之宜也其曰惟明克允則或刑或宥亦惟其當而無以加矣又豈一於宥而無刑哉今必曰堯舜之世有宥而無刑則是殺人者不死而傷人者不刑也是聖人之心不忍於元惡大憝而反忍於銜寃抱痛之良民也是所謂怙終賊刑刑故無小者皆為空言以誤後世也其必不然也亦明矣夫刑雖非先王所恃以為治然以刑弼教禁民為非則所謂傷肌膚以懲惡者亦既竭心思而繼之以不忍人之政之一端也今徒流之法既不足以止穿窬滛放之姦而其過於重者則又有不當死而死如强暴贓滿之䫫者茍采陳羣之議一以宫剕之辟當之則雖殘其支體而實全其軀命且絶其為亂之本而使後無以肆焉豈不仰合先王之意而下適當世之宜哉况君子得志而有為則養之之術亦必随力之所至而汲汲焉固不應因循茍且直以不養不教為當然而熟視其争奪相殺於前也獄事人命所繫尤當盡心近世流俗或於隂徳之論多以縱出有罪為能而不思善良之無告此最弊事不可不戒然哀矜勿喜之心則不可無也今人説輕刑者只見所犯之人為可憫而不知被傷之人尤可念也如刼盗殺人者人多為之求生殊不念死者之為無辜是知為盗賊計而不為良民計也若如飢荒竊盗之類猶可以情原其輕重大小而處之今人獄事只管理㑹要從厚不知不問是非善惡只務從厚豈不長姦惠惡大凡事付之無心因其所犯考其實情輕重厚薄付之當然可也若從薄者固不是只云我只要從厚則此病所係亦不輕今之法家惑於罪福報應之説多喜出人罪以求福報夫使無罪者不得直而有罪者得倖免是乃所以為惡耳何福報之有書曰欽哉欽哉惟刑之恤哉所謂欽恤者欲其詳慎曲直令有罪者不得免而無罪者不得濫刑也今之法官惑於欽恤之説以為當寛人之罪而出其死故凡罪之當殺者必多為可出之塗以俟奏裁則率多减等當斬者配當配者徒當徒者杖當杖者笞是乃賣㺯條貫舞法而受賕者耳何欽恤之有罪之疑者從輕功之疑者從重所謂疑者非法令之所能决則罪從輕而功從重惟此一條為然耳非謂凡罪皆可以從輕而凡功皆可以從重也南軒張氏曰治獄所以多不得其平者蓋有數説吏與利為市固所不論而或矜智巧以為聰明持姑息以為恵姦慝上則視大官之趨向而輕重其手下則惑胥吏之浮言而二三其心不盡其情而一以威怵之不原其初而一以法䋲之如是而不得其平者抑多矣無是數者之患郵罰麗於事而深存哀矜勿喜之意其庶矣乎在上者又當端其一心勿以喜怒好惡一毫先之聴獄之成而審度其中隐於吾心竭忠愛之誠明教化之端以期無訟為本則非性可以臻政平訟理之效而收輯人心感召和氣其於邦本所助豈淺也哉象山陸氏曰獄訟惟得情為難唐虞之朝惟皋陶見道甚明羣聖所宗舜乃使之為士周書亦曰司宼蘓公式敬爾由獄賁象亦曰君子以明庶政無敢折獄賁乃山下有火火為至明然猶言無敢折獄此事正是學者用工處噬嗑離在上則曰利用獄豐離在下則曰折獄致刑蓋貴其明也夫五刑五用古人豈樂施此於人哉天討有罪不得不然耳是故大舜有四裔之罰孔子有兩觀之誅善觀大舜孔子寛仁之實者於四裔兩觀之間而見之矣近時之言寛仁者則異於是葢不究夫寛仁之實而徒欲為容姦廋慝之地殆所謂以不禁姦邪為寛大縱釋有罪為不苛者也罪疑惟輕罪而有疑固疑惟輕與其殺不辜寕失不經謂罪疑者也使其不輕甚明而不疑則天討所不容釋豈可失也宥過無大刑固無小使在趋走使令之間簿書期㑹之際偶有過誤宥之可也若其貪黷姦宄出於其心而至於傷民蠧國則何以宥為於其所不可失而失之於其所不可宥而宥之則為傷善為長惡為悖理為不順天殆非先王之政也夷狄或問蠻狄猾夏處之若何而後宜程子曰諸侯方伯明大義以攘却之義也其餘列國謹固封疆可也若與之和好以茍免侵暴則亂華之道也是故春秋謹華夷之辨元城劉氏曰中國與夷狄為隣正如富人與貧人為隣居待之以禮結之以恩髙其墻垣威以刑法待之以禮則國家每有使命徃来有立定條貫禮數束縛之也結之以恩則嵗時嘗以遺餘之物厭飽之也髙其墻垣則平日講和而不失邉備也威以刑法待其先犯邉然後當用兵也龜山楊氏曰邉事之興多出於饕功幸利之人黷武玩㓂不以朝廷大計為念視生靈荼毒若非己事恬不以為戚夫蠻獠猖獗自古然也緩之則豺噬豨勇干紀而不受命急之則鳥驚魚散依限以自匿葢其常態也不務撫馴之使恩威兩行乃欲幸其有事草薙而獸獮之以求有功一有失律則敗衂不支上貽朝廷憂此邉吏之大弊也觀戰國用兵中原之戰也若今之用兵禦夷狄耳力可以戰則戰勢利于守則守来則拒之去則勿追則邉鄙自然無事葢夷狄之戰與中原之戰異夷狄難與較曲直是非惟恃力耳但以禽獸待之可也以禽獸待之如前所為是矣五峯胡氏曰中原無中原之道然後夷狄入中原也中原復行中原之道則夷狄歸其地矣制井田所以制國也制侯國所以制王畿也王畿安彊萬國親附所以保衛中原禁禦四夷也先王建萬國親諸侯髙城深池徧天下四夷雖虎猛狼貪安得肆其欲而逞其志乎此三王為後世慮禦四夷之上䇿也王公設險以守其國孔子之所以書於習坎之彖也城郭溝池以為固孔子之所以答言偃之問也朱子曰益之戒舜曰儆戒無虞罔失法度罔㳺于逸罔淫于樂任賢勿貳去邪勿疑而終之曰無怠無荒四夷来王周之文武亦以天保以上治内采薇以下治外始於憂勤終於逸樂其後中微小雅盡廢四夷交侵中國衰削宣王承之側身修行任賢使能内修政事外攘夷狄而周道粲然復興某嘗以是觀之然後知古先聖王所以制禦夷狄之道其本不在乎威彊而在乎徳業其備不在乎邉境而在乎朝廷其具不在乎兵食而在乎紀綱葢决然矣西山真氏曰為國者當示人以難犯之意不可示人以昜窺之形昔春秋時晉師入齊齊使國佐求盟于晉其勢亟矣一聞齊之封内盡東其畝之言雖僨軍之餘不肯茍從以紓一旦之禍葢敵國之相與有以折其謀則為和也昜有以啟其嫚則為和也難况戎狄豺狼變詐百端又非可以中國常理待之乎中國有道夷狄雖盛不足憂内治未修夷狄雖微有足畏葢昔者五胡之紛擾與單于争立之事同而拓拔氏之東西與匈奴之分南北亦無以異然宣帝因呼韓之朝而益彊其國劉石符姚之變晉迄不能以成寸功光武因南單于之歸拓地千里而侯景内附適以兆蕭梁之釁所遇畧同而成敗以異者豈固有幸不幸哉葢光武之政修而晉梁之政失也魯齋許氏曰天下事當是兩件相勝負從古至今如此大抵只是隂陽剛柔相勝前人謂如兩人角力相拒彼勝則此負此勝則彼負但勝者不能止于其分必過其分然後止負者必極甚然後復各不得其分所以相報復到今不已如中國與夷狄中國勝窮兵四逹臣伏戎夷夷狄勝必潰裂中原極其惨酷如此報復何時能已三代盛時分别中夏夷狄君子小人各安其分所以大治後世不能及也且如周成康漢文景世所謂大治者然土宇廣狹可見彼四君者未嘗事逺畧也治吾所當治者而已不取其勝夷狄也故亦不至為夷狄所敗性理大全書卷六十九

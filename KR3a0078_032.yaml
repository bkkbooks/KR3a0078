body:
  text: 性理大全書三十二性理四心程子曰心一也有指體而言者寂然不動是也有指用而言者感而遂通天下之故是也惟觀其所見何如耳一人之心即天地之心問仁與心何異曰於所主曰心名其德曰仁曰謂仁者心之用乎曰不可曰然則猶五榖之種待陽氣而生乎曰陽氣所發猶之情也心猶種焉其生之德是謂仁也心生道也有是心斯具是形以生惻隱之心人之生道也雖桀跖不得無是以生但戕賊之以滅天耳始則不知愛物俄而至於忍安之以至于殺充之以至於好殺豈人理也哉理與心一而人不能㑹之為一問心有限量乎曰天下無性外之物以有限量之形氣用之不以其道安得廣大其心也心則性也在天為命在人為性所主為心實一道也通乎道則何限量之有必曰有限量是性外有物乎耳目能視聽而不能逺者氣有限也心無逺近問心有善惡否曰在天為命在義為理在人為性主於身為心其實一也心本善發於思慮則有善有不善若既發則可謂之情不可謂之心譬如水至於流而為派或行於東或行於西却謂之流也問捨則亡心有亡何也曰否此只是說心無形體才主著事時便在這裏才過了便不見如出入無時莫知其鄉此句亦須人理㑹心豈有出入亦以操捨而言也放心謂本善而流流於不善是放也問雜說中以赤子之心為已發是否曰已發而去道未逺也曰大人不失赤子之心若何曰取其純一近道也曰赤子之心與聖人之心若何曰聖人之心明鏡止水聖人之心未嘗有在亦無不在蓋其道合內外體萬物體㑹必以心謂體㑹非心於是有心小性大之說聖人之心與天為一或者滯心於智識之間故自見其小耳有主則虛無主則實必有所事人之身有形體未必能為主若有人為係虜將去隨其所處已有不得與也唯心則三軍之衆不可奪也若并心做主不得則更有甚或問多怒多驚何也曰主心不定也人心作主不定正如一箇翻車流轉動搖無須㬰停所感萬端又如懸鏡空中無物不入其中有甚定形不學則却都不察及有所學便覺察得是為害著一箇意思則與人成就得箇甚好見識心若不做一箇主怎生奈何張天祺昔常言自約數年自上著牀便不得思量事後須强把他這心來制縳亦須寄寓在一箇形象皆非自然司馬君實自謂吾得術矣只管念箇中字此則又為中繫縳且中字亦何形象若愚夫不思虞冥然無知此又過與不及之分也有人胸中常若有兩人焉欲為善如有惡以為之間欲為不善又若有羞惡之心者本無二人此正交戰之驗也持其志使氣不能亂此大可驗心定者其言重以舒不定者其言輕以疾人心必有所止無止則聽於物惟物之聽何所往而不妄也或曰心在我既已入於妄矣將誰使之曰心實使之人心不得有所繫人心常要活則周流無窮而不滯於一隅人必有仁義之心然後仁與義之氣睟然達於外故不得於心勿求於氣可也嘗喻以心知天猶居京師往長安但知出西門便可到長安此猶是言作兩處若要誠實只在京師便是到長安更不可别求長安只心便是天盡之便知性知性便知天一作性便是天當處便認取更不可外求心具天德心有不盡處便是天德處未能盡何緣知性知天盡己心則能盡人盡物與天地參贊化育贊則直飬之而已有人說無心曰無心便不是只當云無私心心要在腔子裏張子曰虛心然後能盡心又曰虛心則無外以為纍心既虛則公平公平則是非較然易見當為不當為之事自知心大則百物皆通心小則百物皆病心清時常少亂時常多其清時即視明聽聰四體不待羈束而自然恭謹其亂時反是如此者何也蓋用心未熟客慮多而常心少也習俗之心未去而實心未全也有時如失者只為心生若熟後自不然心不可勞當存其大者存之熟後小者可略上蔡謝氏曰心本一支離而去者乃意爾和靖尹氏曰橫渠云由知覺有心之名蓋由其知覺强名曰心又曰寂然不動感而遂通天下之故若只寂然不動與木石等也只為感而遂通便是知覺知覺即心也至於搖扇得凉是知覺也譬如睡中人喚己名則矍然而起呼他人名則不應是知覺也藍田吕氏曰赤子之心良心也天之所以降衷民之所以受天地之中也寂然不動虛明純一與天地相似與神明為一傳曰喜怒哀樂之未發謂之中其謂此歟此心自正不待人而後正而賢者能勿喪不為物欲之所遷動如衡之平不加以物如鑑之明不蔽以垢乃所謂正也惟先立乎大者則小者不能奪如使忿懥恐懼好惡憂患一奪其良心則視聽食息從而失守欲區區修身以正其外難矣我心所同然即天理天德孟子言同然者恐人有私意蔽之茍無私意我心即天心延平李氏曰虛一而靜心方實則物乘之物乘之則動心方動則氣乘之氣乘之則惑惑斯不一矣則喜怒哀樂皆不中節矣朱子曰惟心無對心者氣之精爽心之理是太極心之動靜是隂陽趙致道謂心為太極林正卿謂心具太極致道舉以為問曰這般處極細難說看來心有動靜其體則謂之昜其理則謂之道其用則謂之神葉賀孫問其體則謂之昜體是如何曰體不是體用之體恰似說體質之體猶云其質則謂之昜理即是性這般所在當活看如心字各有地頭說如孟子云仁人心也仁便是人心這說心是合理說如說顔子其心三月不違仁是心為主而不違乎理就地頭看始得問五行在人為五臟然心却具得五行之理以心虛靈之故否曰心屬火緣是箇光明發動底物所以具得許得道理問人心形而上下如何曰如肺肝五臟之心却是實有一物若今學者所論操舍存亡之心則自是神明不測故五臟之心受病則可用藥補之這箇心則非菖蒲茯苓所可補也問如此則心之理乃是形而上否曰心比性則微有迹比氣則自然又靈問先生嘗言心不是這一塊某竊謂滿體皆心也此特其樞紐耳曰不然此非心也乃心之神明升降之舍人有病心者乃其舍不寧也凡五臟皆然豈無運用須常在軀殼之內問靈處是心抑是性曰靈處只是心不是性性只是理虛靈自是心之本體非我所能虛也耳目之視聽所以視聽者即其心也豈有形象然有耳目以視聽之則猶有形象也若心之虛靈何嘗有物心官至靈藏往知來問先生前日以揮扇是氣某後思之心之所思耳之所聽目之所視手之持足之履似非氣之所能到氣之所運必有以主之者曰氣中自有箇靈底物事問知覺是心之靈固如此抑氣之為邪曰不專是氣是先有知覺之理理未知覺氣聚成形理與氣合便能知覺譬如這燭火是因得這脂膏便有許多光𦦨問心之發處是氣否曰也只是知覺又曰所知覺者是理理不離知覺知覺不離理問心是知覺性是理心與理如何得貫通為一曰不須去貫通本來貫通問如何本來貫通曰理無心則無著處所覺者心之理也能覺者氣之靈也人心但以形氣所感者而言爾具形氣謂之人合義理謂之道有知覺謂之心又曰知覺便是心之德答遊誠之曰心一而已所謂覺者亦心也今以覺求心以覺用心紛拏迫切恐其為病不但揠苖而已不若日用之間以敬為主而勿忘焉則自然本心不昧隨物感通不待致覺而無不覺矣故孔子只言克己復禮而不言致覺用敬孟子只言操存舍亡而不言覺存昧亡謝先生雖喜以覺言仁然亦曰心有知覺而不言知覺此心也請推此以驗之所論得失自可見矣問覺是人之本心不容泯沒故乘間發見之時直是昭著不與物雜於此而自識則本心之體即得其真矣上蔡謂人須是識其真心竊恐謂此然此恐亦隨在而有蓋此心或昭著於燕閒靜一之時如孟子言平旦之氣或發見於事物感動之際如孟子言人乍見孺子將入井皆有怵惕惻隱之心或求之文字而怡然有得如伊川先生所謂有讀論語了後其中得一兩句喜者或索之講論而恍然有悟如夷子聞孟子極論一本之說遂憮然為間而受命凡此恐皆是覺處若素未有覺之前但以為己有是心而求以存之恐昏隔在此不知實為何物必至覺時方始識其所以為心者既嘗識之則恐不肯甘心以其虛明不昧之體迷溺於卑汙苟賤之中此所以汲汲求明益不能已而其心路已開亦自有可進步處與夫茫然未識指趣者大不侔矣故某竊疑覺為小學大學相承之機不知是否曰所論甚精但覺似少渾厚之意答王子合曰心猶鏡也但無塵垢之蔽則本體自明物來能照今欲自識此心是猶欲以鏡自照而見夫鏡也既無此理則非别以一心又識一心而何心字一言以蔽之曰生而已天地之大德曰生人受天地之氣而生故此心必仁仁則生矣心須兼廣大流行底意看又須兼生意看且如程先生言仁者天地生物之心只天地便廣大生物便流行生生不窮問生物之心我與那物同便㑹相感曰這生物之心只是我底觸物便自然感非是因那物有此心我方有此心且赤子不入井牛不觳觫時此心何之須常粧箇赤子入井牛觳觫在面前方有此惻隱之心無那物時便無此心乎問程子云心生道也人有是心斯具是形以生惻隱之心生道也如何曰天地生物之心是仁人之禀賦接得此天地之心方能有生故惻隱之心在人亦為生道也又曰惻隱之心乃是得天之心以生生物便是天之心問心生道也一段上面心生道莫是指天地生物之心下面惻隱之心人之生道莫是指人所得天地之心以為心蓋在天只有此理若無那形質則此理無安頓處故曰有是心斯具是形以生上面猶言繼善下面猶言成性曰上面心生道也全然做天底也不得蓋理只是一箇渾然底人與天地渾合無間有是心斯具是形以生是心乃屬天地未屬我底此乃是衆人者至下面各正性命則方是我底故又曰惻隱之心人之生道也仁者天地生物之心而人物之所得以為心人未得之此理亦未嘗不在天地之間只是人有是心便自具是理以生又不可道有心了却討一物來安頓放裏面似恁地處難看須自體認得問程子謂有主則虛又謂有主則實曰有主於中外邪不能入便是虛有主於中理義甚實便是實中有主則實實則外患不能入此重在主字上有主則虛虛則外邪不能入重在敬字上言敬則自虛靜故邪不得而奸之也問有主則實又曰有主則虛如何分别曰只是有主於中外邪不能入自其有主於中言之則謂之實自其外邪不入言之則謂之虛又曰若無主於中則目之欲也從這裏入耳之欲也從這裏入鼻之欲也從這裏入大凡有所欲皆入這裏便滿了如何得虛一云皆入這裏來這裏面便滿了以手指心曰如何得虛因舉林擇之作主一銘云有主則虛神守其都無主則實鬼闞其室又曰有主則實既言有主便已是實了却似多了一實字看來這箇實字謂中有主則外物不能入矣問有主則實謂人具此實然之理故實無主則實謂人心無主私欲為主故實曰心虗則理實心實則理虛有主則實此實字是好蓋指理而言也無主則實此實字是不好蓋指私欲而言也以理為主則此心虛明一毫私意著不得譬如一泓清水有少許砂土便見人心活則周流無偏係即活憂患樂好皆偏係也心要活活是生活之活對著死說活是天理死是人欲一云天理在則活人欲用則死周流無窮活便能如此問人心要活則周流無窮而不滯於一隅如何是活曰心無私便可推行活者不死之謂人心之動變態不一所謂五分天理五分人欲者特以其善惡交戰而言爾有先發於天理者有先發於人欲者蓋不可以一端盡也與張敬夫曰某謂感於物者心也其動者情也情根乎性而宰乎心心為之宰則其動也無不中節矣何人欲之有惟心不宰而情自動是以流於人欲而每不得其正也然則天理人欲之判中節不中節之分特在乎心之宰與不宰而非情能病之亦已明矣蓋雖曰中節然是亦情也但其所以中節者乃心爾今夫乍見孺子入井此心之感也必有怵愓惻𨼆之心此情之動也內交要譽惡其聲者心不宰而情之失其正也怵愓惻隱乃仁之端又可以其情之動而遽謂之人欲乎大抵未感物時心雖為已發然苖裔發見却未嘗不在動處凡舍是而别求却恐無下功處也問心有善惡否曰心是動底物事自然有善惡且如惻隱是善也見孺子入井而無惻隱之心便是惡矣離著善便是惡然心之本體未嘗不善又却不可說惡全不是心若不是心是甚麼做出來古人學問便要窮理致知直是下工夫消磨惡去善自然漸次可復操存是後面事不是善惡時事心無間於已發未發徹頭徹尾都是那處截做已發未發如放僻邪侈此心亦在不可謂非心問形體之動與心相關否曰豈不相關自是心使他動曰喜怒哀樂未發之前形體亦有運動耳目亦有視聽此是心已發抑未發曰喜怒哀樂未發又是一般然視聽行動亦是心向那裏若形體之行動心都不知便是心不在行動都沒理㑹了說甚未發未發不是漠然全不省亦常醒在這裏不恁地困問惻隱羞惡喜怒哀樂固是心之發曉然易見處如未惻隱羞惡喜怒哀樂之前便是寂然靜時然豈得塊然如槁木其耳目亦必有自然之聞見其手足亦必有自然之舉動不審此時喚作如何曰喜怒哀樂未發只是這心未發耳其手足運動自是形體如此問人心是箇靈底物如日間未應接之前固是寂然未發於未發中固常恁地惺不恁瞑然不省若夜間有夢之時亦是此心之己動猶晝之有思如其不夢未覺正當大寐之時此時謂之寂然未發則全沉沉瞑瞑萬事不知不省與木石蓋無異與死相去亦無幾不可謂寂然未發不知此時心體何所安存所謂靈底何所寄寓聖人與常人於此時所以異者如何而學者工夫此時又何以為驗也曰寤寐者心之動靜也有思無思者又動中之動靜也有夢無夢者又靜中之動靜也但寤陽而寐隂寤清而寐濁寤有主而寐無主故寂然感通之妙必於寤而言之又問竊謂人生具有隂陽之氣神發於陽魄根於隂心也者則麗隂陽而乘其氣無間於動靜即神之所㑹而為魄之主也晝則隂伏藏而陽用事陽主動故神運魄隨而為寤夜則陽伏藏而隂用事隂主靜故魄定神蟄而為寐神之運故虛靈知覺之體燁然呈露有苗裔之可尋如一陽復後萬物之有春意焉此心之寂感所以為有主神之蟄故虗靈知覺之體沉然潛𨼆悄無蹤跡如純坤之月萬物之生性不可窺其朕焉此心之寂感所以不若寤之妙而於寐也為無主然其中實未嘗泯而有不可測者存呼之則應驚之則覺則是亦未嘗無主而未嘗不妙也故自其大分言之寤陽而寐隂而心之所以為動靜也細而言之寤之有思者又動中之動而為陽之陽也無思者又動中之靜而為陽之隂也寐之有夢者又靜中之動而為隂之陽也無夢者又靜中之靜而為隂之隂也又錯而言之則思之有善與惡者又動中之動陽明隂濁也無思而善應與妄應者又動中之靜陽明隂濁也夢中有正與邪者又靜中之動陽明隂濁也無夢而易覺與難覺者又靜中之靜陽明隂濁也一動一靜循環交錯聖人與衆人則同而所以為陽明隂濁則異聖人於動靜無不一於清明純粹之主而衆人則雜焉而不齊然則人之學力所係於此亦可以驗矣曰得之問覺得間嘗心存時神氣清爽是時視必明聽必聰言則有倫動則有序有思慮則必專一若身無所事則一身之內如鼻息出入之粗細緩急血脉流行間或凝滯者而有纎微疾癢之處無不分明覺得當時别是一般精神如醉醒寐覺不知可以言心存否曰理固如此然亦不可如此屑屑計功效也問遺書云心本善發於思慮則有善不善如何曰疑此段微有未穩處蓋凡事莫非心之所為雖放僻邪侈亦是心之為也善惡但如反覆手耳翻一轉便是惡止安頓不著也便是不善如當惻隱而羞惡當羞惡而惻隱便不是又問心之用雖有不善亦不可謂之非心否曰然問心本善發於思慮則有善不善程子之意是指心之本體有善而無惡及其發處則不能無善惡也胡五峯云人有不仁心無不仁先生以為下句有病如顔子其心三月不違仁是心之仁也至三月之外未免少有私欲心便不仁豈可直以為心無不仁乎某近以先生之意推之莫是五峰不曾分别得體與發處言之否曰只為他說得不備若云人有不仁心無不仁心有不仁心之本體無不仁則意方足耳問心既發則可謂之情不可謂之心如何曰心是貫徹上下不可只於一處看既發則可謂之情不可謂之心此句亦未穩問程子云心一也有指體而言者有指用而言者曰此語與橫渠心統性情相似心主于身其所以為體者性也所以為用者情也是以貫乎動靜而無不在焉心體固本靜然亦不能不動其用固本善然亦能流而入於不善夫其動而流於不善者固不可謂心體之本然然亦不可不謂之心也但其誘於物而然耳故先聖只說操則存存則靜而其動也無不善矣舍則亡於是乎有動而流於不善者出入無時莫知其鄉出者亡也入者存也本無一定之時亦無一定之處持係於人之操舍如何耳只此四句說得心之體用始終真妄邪正無所不備又見得此心不操即舍不出即入别無間處可安䪺之意胡文定公所謂不起不滅心之體方起方滅心之用能常操而有則雖一日之間百起百滅而心固自若者自是好語但讀者當知所謂不起不滅者非是塊然不動無所知覺也又非百起百滅之中别有一物不起不滅也但此心瑩然全無私意是則寂然不動之本體其順理而起順理而滅斯乃所以感而遂通天下之故者云耳問心該誠神備體用故能寂而感感而寂其寂然不動者誠也體也感而遂通者神也用也體用一源顯微無間唯心之謂歟曰此說甚善問心無私主有感皆通曰無私主也不是慏悻沒理㑹只是公善則好之惡則惡之善則賞之惡則刑之此是聖人至公至神之化心無私主如天地一般寒則遍天下皆寒熱則遍天下皆熱便是有感皆通又問心無私主最難曰亦是克去己私心便無私主心有私主只是相契者便應不相契者便不應如好讀書人見書便愛不好讀書人見書便不愛問大學或問中論心處每每言虛言靈或言虛明或言神明孟子盡心注云心人之神明竊以為此等專指心之本體而言又見孟子舉心之存亡出入集注以為心之神明不測竊以為此兼言心之體用而盡其始終反覆變態之全夫其本體之通靈如此而其變態之神妙又如此則所以為是物者必不囿於形體而非粗淺血氣之為竊疑是人之一身神氣所聚所以謂之神舍人而無此則身與偶人相似必有此而後有精神知覺做得箇活物恐心又是身上精靈底物事不知可以如此看否又嘗求所以存是心者竊見伊川言人心作主不定如破屋中禦冦又云如一箇翻車每每教學者做箇主或云立箇心又云人心須要定使他思時方思乃是明道云人有四病四病皆不由自家則是心須教由自家以此似見得心雖是活物神明不測然是自家身上物事所主在我收住後放去放去後又復收回自家可以自作主宰但患不自做主若自家主張著便在不主張著便走去及才尋求著又在故學者須自為之主使此心常有管攝方得又嘗求所以為主之實竊見伊川論如何為主敬而已矣又似見得要自做主宰須是敬蓋敬便收束得來謹密正是著力做主處不敬便掉放踈散不復做主了某於存心工夫又粗見如此不知是否曰理固如此然須用其力不可只做好話說過又當有以培飬之然後積漸純熟向上有進步處問心具衆理心雖昏蔽而所具之理未嘗不在但當其蔽隔之時心自為心理自為理不相贅屬如一物未格便覺此一物之理與心不相入似為心外之理而吾心邈然無之及既格之便覺彼物之理為吾心素有之物夫理在吾心不以未知而無不以既知而有然則所以若內若外者豈其見之異耶抑亦本無此事而某所見之謬耶曰極是心與理一不是理在面前為一物理便在心之中心包蓄不住隨事而發恰似那藏相似除了經函裏面㸃燈四方八面皆如此光明燦爛但今人亦少能看得如此問心之為物衆理具足所發之善固出於心至所發不善皆氣禀物欲之私亦出於心否曰固非心之本體然亦是出於心也又問此所謂人心否曰是問人心亦兼善惡否曰亦兼說問程子以心使心之說竊謂此二心字只以人心道心判之自明白蓋上心字即是道心專以理義言之也下心字即是人心而以形氣言之也以心使心則是道心為一身之主而人心其聽命也不審是否曰亦是如此然觀程先生之意只是說自作主宰耳自人心而收之則是道心自道心而放之便是人心人心如卒徒道心如將飢欲食渴欲飲者人心也得飲食之正者道心也須是一心只在道上少間那人心自降伏得不見了人心與道心為一恰似無了那人心相似只是要得道心純一道心都發見在那人心上問人心道心如飲食男女之欲出於其正即道心矣又如何分别曰這箇畢竟是生於血氣心定者其言重以舒言發於心心定則言必審故的確而舒遲不定則內必紛擾有不待思而發故淺易而急迫此亦志動氣之驗也心大則百物皆通通只是透得那道理去病則是窒礙了問如何是心小則百物皆病曰此言狹隘則事有窒礙不行如仁則流於姑息義則入於殘暴皆見此不見彼問橫渠云心要洪放又曰心大則百物皆通心小則百物皆病孫思邈云膽欲大而心欲小竊謂橫渠之說是言心之體思邈之說是言心之用未知是否曰心自有合要大處有合要小處若只著題目斷了則便無可思量矣問心如何能通以道使無限量曰心不是橫門硬迸教大得須是去物欲之蔽則清明而無不知窮事物之理則脫然有貫通處橫渠曰不以聞見梏其心大其心則能體天下之物所謂通之以道便是脫然有貫通處若只守聞見便自然狹窄了橫渠所謂立得心只是作得主底意思問橫渠說客慮多而常心少習俗之心勝而實心未完所謂客慮與習俗之心有分别否曰也有分别客慮是泛泛底思慮習俗之心便是從來習染偏勝底心實心是義理底心問某嘗著心說云維天之命於穆不已所以為生物之主者天之心也人受天命而生因全得夫天之所以生我者以為一身之主渾然在中虛靈知覺常昭昭而不昧生生而不可已是乃所謂人之心其體則即所謂元亨利貞之道具而為仁義禮智之性其用則即所謂春夏秋冬之氣發而為測隱羞惡辭讓是非之情故體雖具於方寸之間而其所以為體則實與天地同其大萬物蓋無所不備而無一物出乎是理之外用雖發乎方寸之間而其所以為用則實與天地相流通萬事蓋無所不貫而無一理不行乎事之中此心之所以為妙貫動靜一顯微徹表裏始終無間者也人惟拘於隂陽五行所值之不純而又重以耳目口鼻四肢之欲為之纍於是此心始梏於形器之小不能廓然大同無我而其靈亦無以主於心矣人之所以欲全體此心而常為一身之主者必致知之力到而主敬之功專使胸中光明瑩淨超然於氣禀物欲之上而吾本然之體所與天地同大者皆有以周遍昭晣而無一理之不明本然之用與天地流通者皆無所隔絶間斷而無一息之不生是以方其物之未感也則此心澄然惺惺如鑑之虛如衡之平蓋真對越乎上帝而萬理皆有定於其中矣及夫物之既感也則妍􅑦髙下之應皆因彼之自爾而是理固周流該貫莫不各止其所如乾道變化各正性命自無分數之差而亦未嘗與之俱往矣靜而天地之體存一本而萬殊動而天地之用逹萬殊而一貫體常涵用用不離體體用渾淪純是天理日常呈露於動靜間夫然後向之所以全得於天者在我真有以復其本而維天於穆之命亦與之為不已矣此人之所以存夫心之大略也所謂體與天地同其大者以理言之耳蓋通天地間惟一實然之理而已為造化之樞紐古今人物之所同得但人為物之靈極是體而全得之總㑹於吾心即所謂性雖㑹在吾之心為我之性而與天固未嘗間此心之所謂仁即天之元此心之所謂禮即天之亨此心之所謂義即天之利此心之所謂智即天之貞其實一致非引而譬之也天道無外此心之理亦無外天道無限量此心之理亦無限量天道無一物之不體而萬物無一之非天此心之理亦無一物之不體而萬物無一之非吾心那箇不是心做那箇道理不具於心天下豈有性外之物而不統於吾心是理之中也哉但以理言則為天地公共不見其切於己謂之吾心之體則即理之在我有統屬主宰而其端可尋也此心所以至靈至妙凡理之所至其思隨之無所不至大極於無際而無不通細入於無倫而無不貫前乎上古後乎萬世而無不徹近在跬步逺在萬里而無不同雖至於位天地育萬物亦不過充吾心體之本然而非外為者此張子所謂有外之心不足以合天心者也所謂用與天地相流通者以是理之流行言之耳蓋是理在天地間流行圓轉無一息之停凡萬物萬事小大精粗無一非天理流行吾心全得是理而天理之在吾心亦本無一息不生生而不與天地相流行人惟欲淨情逹不隔其所流行然後常與天地流通耳且如惻隱一端近而發於親親之間親之所以當親是天命流行者然也吾但與之流行而不虧其所親者耳一或少有虧焉則天理隔絶於親親之間而不流行矣次而及於仁民之際如老者之所以當安少者之所以當懷入井者之所以當怵惕亦皆天命流行者然也吾但與之流行而不失其所懷所安所怵惕者耳一或少有失焉則天理便隔絶於仁民之際而不流行矣又逺而及於愛物之際如方長之所以不折胎之所以不殺夭之所以不夭亦皆天命流行者然也吾但與之流行而不害其所長所胎所夭者耳一或少有害焉則天理便隔絶於愛物之際而不流行矣凡日用間四端所應皆然但一事不到則天理便隔絶於一事之下一刻不貫則天理便隔絶於一刻之中惟其千條萬緒皆隨彼天則之自爾而心為之周流貫通無人欲之間焉然後與元亨利貞流行乎天地之間者同一用矣此程子所以指天地變化草木蕃以形容恕心充擴得去之氣象也然亦必有是天地同大之體然後有是天地流通之用亦必有是天地流通之用然後有是天地同大之體則其實又非兩截事也或謂天命性心雖不可謂異物然各有界分不可誣也今且當論心體便一向與性與天衮同說去何往而不可若見得脫灑一言半句亦自可見更宜涵飬體察某思之體與天地同大用與天地流通自原頭處論竊恐亦是如此然一向如此則又涉於過髙而有不切身之弊不若且只就此身日用見定言渾然在中者為體感而應者為用為切實也又覺聖賢說話如平常然曰此說甚善更寬著意思涵泳則愈見精密矣然又不可一向如此向無形影處追尋更宜於日用事物經書指意史傳得失上做工夫即精粗表裏融㑹貫通而無一理之不盡矣問心存時也有邪處故有人心道心如佛氏所謂作用是性也常常心存曰人心是箇無揀擇底心道心是箇有揀擇底心佛氏也不可謂之邪只是箇無揀擇的心到心存時已無大段不是處了南軒張氏曰人受天地之中以生有是心也天命之謂性精微深奧非言所可窮極而妙其藴者心也象山陸氏曰人心至靈此理至明人皆有是心心皆具是理勉齊黃氏曰古人以心配火此義最精說虛靈知覺便是理固不可說虛靈知覺與理是兩項亦不可須當說虛靈知覺上見得許多道理且如孩提之童知愛其親長而知敬其兄愛敬處便是道理知愛知敬便是知覺雖然如此說若看不分明又錯看成兩項不若只將怵惕惻隱一句看為尤切蓋怵惕惻隱因情以見理也能怵惕惻隱則知覺也心之能為性情之主宰者以其虛靈知覺也此心之理炯然不昧亦以其虛靈知覺也自當隨其所指各自體認其淺深各自不同心能主宰則如謝氏常惺惺之謂此只是能持敬則便能如此若此心之理炯然不昧如大學所謂明德須是物格知至方能如此正不須安排併合也人惟有一心虛靈知覺者是也心不可無歸藏故有血肉之心血肉之心不可無歸藏故有此身體身體不可無所蔽故須裘葛不可無所寄故須棟宇其主則在心而已今人於屋宇身體衣服反切切求過人而心上却全不理㑹北溪陳氏曰心者一身之主宰也人之四肢運動手持足履與夫飢思食渴思飲夏思葛冬思裘皆是此心為之主宰如今心恙底人只是此心為邪氣所乘內無主宰所以日用飲食動作失其常度與平人異理義都喪了只空有箇氣往來於脈息之間未絶耳大抵人得天地之理為性得天地之氣為體理與氣合方成箇心有箇虛靈知覺便是身之所以為主宰處然這虛靈知覺有從理而發者有從氣而發者又各不同也心只似箇器一般裏面貯底物便是性康節謂心者性之郛郭說雖粗而意極切蓋郛郭者心也郛郭中許多人煙便是心中所具之理相似所具之理便是性即這所具的便是心之本體理具於心便有許多妙用知覺從理上發來便是仁義禮智之心便是道心若知覺從形氣上發來便是人心便易與理相違人只有一箇心非有兩箇知覺只是所以為知覺者不同且如飢而思食渴而思飲此是人心至於食所當食飲所當飲便是道心如有飢餓濵死而蹴爾嗟來等食皆不肯受這心從何處發來便是就裏面道理上發來然其嗟也可去其謝也可食此等處禮義又隱微難曉須是識見十分明徹方辨别得心有體有用具衆理者其體應萬事者其用寂然不動者其體感而遂通者其用體即所謂性以其靜者言也用即所謂情以其動者言也聖賢存飬工夫至到方其靜而未發也全體卓然如鑑之空如衡之平常定在這裏及其動而應物也大用流行姸媸髙下各因物之自爾而未嘗有絲毫銖兩之差而所謂鑑空衡平之體亦嘗自若而未嘗與之俱往也性只是理全是善而無惡心含理與氣理固全是善氣尚含兩頭在未便全是善底物才動便易從不善上去心是箇活物不是帖靜死定在這裏常愛動心之動是乘氣動故文公感興詩曰人心妙不測出入乘氣機正謂此也心之活處是因氣成便㑹活其靈處是因理與氣合便㑹靈所謂妙者非是言至好是言其不可測忽然出忽然入無有定時忽在此忽在彼亦無定處操之便存在此舍之便亡失了故孟子曰操則存舍則亡出入無時莫知其鄉者惟心之謂與存便是入亡便是出然出非是裏面本體走出外去只是邪念感物逐他去而本然之正體遂不見了入非是自外面已放底牽入來只一念提撕警覺便在此人須是有操存涵飬之功然後本體常卓然在中為此身主宰而無亡失之患所貴於學問者為此也故孟子曰學問之道無他求其放心而已矣此意極為人深切心雖不過方寸大然萬化皆從此出正是原頭處故子思以未發之中為天下之大本已發之和為天下之逹道仁者心之生道也敬者心之所以生也此心之量極大萬理無所不包萬事無所不統古人每言學必欲其博孔子所以學不厭者皆所以極盡乎此心無窮之量也孟子所謂盡心者須是盡得箇極大無窮之量無一理一物之或遺方是真能盡得心然孟子於諸侯之禮未之學豈非爵祿法制之未詳聞畢竟是於此心無窮之量終有所缺缺未盡處心至靈至妙可以為堯舜參天地格鬼神雖萬里之逺一念便到雖千古人情事變之祕一照便知雖金石至堅可貫雖物類至幽至微可通橫渠曰合虛與氣有性之名合性與知覺有心之名虛是以理言理與氣合遂生人物受得去成這性於是乎方有性之名性從理來不離氣知覺從氣來不離理合性與知覺遂成這心於是乎方有心之名潛室陳氏曰人心如鏡物來則應物去依舊自在不曾迎物之來亦不曾送物之去只是定而應應而定問明道言中有主則實實則外患不能入伊川云心有主則虛虛則邪不能入無主則實實則物來奪之所主不同何也曰有主則實謂有主人在內先實其屋外客不能入故謂之實有主則虛謂外客不能入只有主人自在故又謂之虛知惟實故虛蓋心既誠敬則自然虛明問伊川說心本善發於思慮則有善有不善思慮從心生心若善思慮因何有不善曰思慮以交物而蔽故有不善問赤子之心與未發之中同否曰赤子之心只是真實無僞然喜怒哀樂已是倚向一邉去了如生下時便有嗜欲不如其意便要號啼雖是真實已是有所倚著若未發之中却渾然寂然喜怒哀樂都未形見只有一片空明鏡界未有倚靠此時只可謂之中要之赤子之心不用機巧未發之中乃存飬所致二者實有異義西山真氏曰北辰常不移故能為列宿之宗人心常不動故能應萬物之變不動非無所運用之謂也順理而應不隨物而遷雖動猶靜也收之使入者大本之所以立推之使出者逹道之所以行不收是謂無體不推是謂無用太極之有動靜人心之有寂感一而已矣大舜十六字開萬世心學之源後之聖賢更相授受雖若不同然大抵教人守道心之正而遏人心之流耳孟子於仁義之心則欲其存而不放本心欲其勿喪赤子之心欲其不失凡此皆所謂守道心之正也易言懲忿窒欲孔子言克己大學言好樂憂患則不得其正孟子言寡欲以小體之飬為戒以飢渴之害為喻凡此皆所謂遏人心之流也心一而已爾由義理而發無以害之可使與天地參由形氣而發無以檢之至於違禽獸不逺始也特毫毛之間終焉有霄壤之隔此精一之功所以為理學之要歟鶴山魏氏曰人之一心至近而逺至小而大至微而著所以包括神明管攝性情者也臨川吳氏曰心學之妙自周子程子發其祕學者始有所悟以致其存存之功周子云無欲故靜程子云有主則虗此二言者萬世心學之綱要也不為外物所動之謂靜不為外物所實之謂虛靜者其本虛者其效也性理大全書卷三十二

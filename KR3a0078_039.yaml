body:
  text: 性理大全書卷三十九諸儒一周子名惇頥字茂叔號濂溪山谷黃氏曰茂叔人品甚高胸中灑落如光風霽月好讀書雅意林壑初不為人窘束短於取名而惠於求志薄於徼福而厚於得民菲於奉身而燕及􅑱嫠陋於希世而尚友千古程子曰自再見茂叔後吟風弄月以歸有吾與㸃也之意又曰茂叔窗前草不除問之云與自家意思一般延平李氏曰黃山谷謂周子灑落如光風霽月此善形容有道者氣象朱子曰山谷謂周子灑落者只是形容一箇不疑所行清明高逺之意若有一毫私吝心何處更有此等氣象耶只如此有道者胸懷表裏亦自可見先生在當時人見其政事精絶則以為宦業過人見其有山林之志則以為襟懷灑落有仙風道氣無有知其學者惟程太中知之宜其生兩程夫子也先生博學力行聞道甚早遇事剛果有古人風為政精密嚴恕務盡道理先生信古好義以名節自砥礪奉己甚約俸祿盡以周宗族奉賔友家無百錢之儲襟懷飄灑雅有髙趣尤樂佳山水遇適意處或徜徉終日廬山之麓有溪焉發源於蓮華峯下潔清紺寒下合於湓江先生濯纓而樂之因寓以濂溪之號濂溪清和季通云其學精慤深密孔經甫嘗祭以文曰公年壯盛玉色金聲從容和毅一府皆傾墓碑亦謂其精密嚴恕氣象可想矣周子看得這理熟縱橫妙用只是這數箇字都括盡了周子從理處看邵子從數處看都只是這理劉砥曰畢竟理較精粹曰從理上看則用處大數自是細碎問周子是從上靣先得曰也未見得是恁地否但是周先生天資高想見下靣工夫也不大故費力今人多疑濂溪出於希夷鄭可學曰濂溪書具存如太極圖希夷如何有此說曰張忠定公嘗云公事有隂陽此說全與濂溪同忠定見希夷蓋亦有些來歷但當時諸公知濂溪者未嘗言其有道曰此無足怪程太中獨知之曰然又問明道之學後來故别但其本自濂溪發之只是此理推廣之耳但不如後來程門授業之多曰當時既未有人知無人往復只得如此秦漢以來天下之士莫知所以為學是以天理不明而人欲熾道學不傳而異端起人挾其私智以馳騖一世宋興有濂溪者作然後天理明而道學之傳復續蓋以闡夫太極隂陽五行之奧而天下之為中正仁義者得以知其所自來言聖學之有要而下學者知勝私復禮之可以馴致於上逹明天下之有本而言治者知誠心端緒之可以舉而措之於天下其所以上接洙泗千載之統下啓河洛百世之傳者脉絡分明而規模亦宏逺矣先生之學性諸天誠諸己而合乎前聖授受之統又得二程以傳之而其流遂及於天下非有爵賞之勸刑辟之威而天下學士靡然鄉之贊先生像曰道喪千載聖逺言堙不有先覺孰開我人書不盡言圖不盡意風月無邉庭草交翠南軒張氏曰濂溪始學陳希夷後來自有所見其學問如此而舉世不知為南安獄掾日惟程太中始知之可見無分毫矜誇此方是朴實頭下工夫底人自孟子沒聖學失傳歷世久逺其間儒者非不知尊敬孔孟而講習六經至考其所得則不越於詁訓文義之間而止矣於所謂聖人之心所以本諸天地而措諸天下與來世者蓋鮮克涉其藩而况睹其大全者哉惟周先生出乎千載之後而有得於太極之妙今其圖與書具存道學有傳實在乎此自秦漢以來言治者汩於五伯功利之習求道者淪於異端空虛之說故言治者若無預於學而求道者反不涉於事孔孟之書僅傳而學者莫得其門而入生民不克睹乎三代之盛可勝歎哉惟濂溪先生崛起於千載之後獨得微㫖於殘編斷簡之中推本太極以及乎隂陽五行之流布人物之所以生化於是知人之為至靈而性之為至善萬理有其宗萬事循其則舉而措之則可見先王之所以為治者皆非私智之所出孔孟之意于以復明先生之學淵源精粹實自得於其心而其妙乃在太極一圖窮二氣之所根極萬物之所行而明主靜之為本以見聖人之所以立人極而君子之所當修為者故其所養內充暗然而日章雖不得大施於時而蒞官所至如春風和氣隨時發見被飾萬物百世之下聞其風者猶將咨嗟興起之不暇去古益逺儒學陵夷先生起於逺方乃超然有所自得於其心本乎易之太極中庸之誠以極乎天地萬物之變化其教人使之志伊尹之志學顔子之學推之於治先王之禮樂刑政可舉而行如指諸掌於是河南二程先生兄弟從而得其說推明究極之廣大精微殆無餘藴學可以至於聖治不可以不本於學而道德性命初不外乎日用之實而詖淫邪遁之說皆無以自隱其形可謂盛矣然則先生發端之功顧不大哉北山陳氏曰昔夫子之道其精微在易而所以語門人者皆日用常道未嘗及易也夫子殁門人各以所聞傳道于四方者其流或少差獨曽子子思之傳得其正子思復以其學授孟軻氏斯時也百氏之說昌矣孟軻氏殁又曠千載而泯不傳濂溪周子出始發明孔子易道之藴提其要以授哲人既又手為圖筆為書然後孔氏之傳復續凡今之學知有孔氏大易之藴大學中庸七篇之㫖歸者皆自先生發之先生之功在後學深長且逺者以此也鶴山魏氏曰周子奮自南服超然獨得以上承孔孟氏垂絶之緒河南二程子神交心契相與疏瀹闡明而聖道復著曰誠曰仁曰太極曰性命曰隂陽曰鬼神曰義利綱條彪列分限曉然學者始有所凖的於是知身之貴果可以位天地育萬物果可以為堯舜為周公仲尼而其求端用力又不出乎暗室屋漏之隱躬行日用之近亦非若異端之虛寂百氏之支離也濂溪奪乎百世之下始探造化之至賾建圖著書闡發幽祕即斯人日用常行之際示學者窮理盡性之歸使誦其遺言者始得以曉然於洙泗之正傳而知世之所謂學者非滯於俗師則淪於異端蓋有不足學者於是二程親得其傳而聖學益以大振雖三人於時皆不及大用而嗣往聖開來哲發天理正人心使孔孟絶學獨盛於宋朝而超出乎百代功用所關誠為不小臧氏格曰先生所得之奧不俟師傳匪由知索神交心契固已得其本流不然嗜溪流之紺寒愛庭草之交翠體夫子之無言窮顔淵之所以樂是果何味而獨嚅嚌之耶故能發前聖之所未發覺斯人之所未覺使高逺者不墮於荒忽循守者不淪於滯固私意小智何所容其巧詭經僻說何所肆其誣功用豈不偉哉程子名皓字伯淳號明道伊川序先生行實曰先生資禀既異而充養有道純粹如精金溫潤如良玉寬而有制和而不流忠誠貫於金石孝弟通於神明視其色其接物也如春陽之溫聽其言其入人也如時雨之潤胸懷洞然徹視無間測其藴則浩乎若滄溟之無際極其德美言蓋不足以形容其行已內主於敬而行之以恕見善若出諸己不欲弗施於人居廣居而行大道言有物而動有常自十五六時聞汝南周茂叔論道遂厭科舉之業慨然有求道之志未知其要泛濫於諸家出入於老釋者幾十年反求諸六經而後得之明於庶物察於人倫知盡性至命必本於孝悌窮神知化由通於禮樂辨異端似是之非開百代未明之惑秦漢而下未有臻斯理也謂孟子沒而聖學不傳以興起斯文為己任其言曰道之不明異端害之也昔之害近而易知今之害深而難辨昔之惑人也乘其迷暗今之入人也因其高明自謂之窮神知化而不足以開物成務言為無不周遍實則外於倫理窮深極微而不可入堯舜之道天下之學非淺陋固滯則必入於此自道之不明也邪誕妖異之說競起塗生民之耳目溺天下於汚濁雖髙才明智膠於見聞醉生夢死不自覺也是皆正路之蓁蕪聖門之蔽塞闢之而後可以入道先生進將覺斯人退將明之書不幸早世皆未及也其言平易易知賢愚皆獲其益如群飲於河各充其量其教人自致知至於知止誠意至於平天下灑掃應對至於窮理盡性循循有序其接物辨而不間感而能通教人而人易從怒人而人不怨賢愚善惡咸得其心狡僞者獻其誠暴慢者致其恭聞風者誠服覿德者心醉藍田吕氏曰先生負特立之才知大學之要博聞強記躬行力究察倫明物極其所止渙然心釋洞見道體其造於約也雖事變之感不一應之以是心而無窮雖天下之理至衆知反之吾身而自足其致於一也異端並立而不能移聖人復起而不與易其養之成也和氣充浹見于聲容然望之崇深不敢慢也遇事優為從容不迫然誠心懇惻弗之措也其自任之重也寧學聖人而未至不欲以一善成名寧以一物不被澤為己病不欲以一時之利為己功其自信之䔍也吾志可行不茍潔其去就吾義所安小官有所不屑也廣平游氏曰時有同明道先生在臺列者志未必同然心慕其為人嘗語人曰他人之賢者猶可得而議也乃若伯淳則如美玉然反覆視之表裏洞徹莫見疵瑕或曰中心安仁者天下一人而已如伯淳莫將做天下一人看龜山楊氏曰固是上蔡謝氏曰先生坐如泥塑人接人則渾是一團和氣學者須是胸懷擺脫得開始得有見先生在鄠縣作簿時詩云雲淡風輕近午天傍花隨栁過前川旁人不識豫心樂將謂偷間學少年看他胸懷直是好與曾㸃底事一般又詩云間來無事不從容睡覺東窗日已紅萬物靜觀皆自得四時佳興與人同道通天地有形外思入風雲變態中富貴不淫貧賤樂男兒到此是豪雄明道門擺脫得開為他所過者化華陽范氏曰先生以獨智自得去聖人千有餘嵗發其關鍵直覩堂奧一天地之理盡事物之變故其貌肅而氣和志定而言厲望之可畏即之可親叩之者無窮從容以應之其出愈新真學者之師也河間劉氏曰先生德性充完粹和之氣盎於靣背樂易多恕終日怡恱未嘗見其忿厲之容河南朱氏曰先生之學以誠為本仰觀乎天清明穹窿日月之運行隂陽之變化所以然者誠而已俯察乎地廣博持載山川之融結草木之蕃殖所以然者誠而已人居天地之中參合無間純亦不已者其在兹乎先生得聖人之誠者也才周萬物而不自以為髙學濟三才而不自以為足行貫神明而不自以為異識照古今而不自以為得至於六經之奧義百家之異說研窮搜抉判然胸中天下之事雖萬變交於前而燭之不失毫釐權之不失輕重凡貧賤富貴死生皆不足以動其心非所得之深所養之厚能至是歟蓋其所知上極堯舜三代帝王之治其所以包涵博大悠逺纎悉上下與天地同流下至行師用兵戰陳之法皆造其極外之夷狄情狀山川道路之險易邊鄙防戍厈堠控帶之要靡不究知其吏事操決文法簿書又皆精密詳練而所有不試其萬一河間邢氏曰先生德性絶人外和內剛眉目清峻語聲鏗然恕早從先生之弟學初見先生於磁州其氣貌清明夷粹其接人和以有容其斷義剛而不犯其思索妙造精義其言近而測之益逺恕蓋始恍然自失而知天下有成德君子所謂完人者若先生是已武夷胡氏曰聖人志在天下國家與常人志在功名全别孟子傳聖人之道故曰豫豈若是小丈夫哉諫於其君而不受則悻悻然見於其靣去則窮日之力且看聖人氣象則别明道却是如此元豐中有詔起吕申公司馬溫公溫公不起明道作詩送申公又詩寄溫公其意直是眷眷在天下國家雖然如此於去就又却分明不放過一步范陽張氏曰明道書窗前有草茂覆砌或勸之芟明道曰不可欲常見造物生意又置盆池畜小魚數尾時時觀之或問其故曰欲觀萬物自得意草之與魚人所共見惟明道見草則知生意見魚則知自得意此豈流俗之見可同日而語陳恬贊曰賢哉先生始於孝弟孝䔍於親弟友其弟推以治人不為而化民靡有爭揖讓于野移之事君讜言忠謨姦邪之言感動欷歔舉以教人粹然王道天下英材躬服允蹈本以正身惟德溫溫如冬之日如夏之雲終其默識洞暢今古鈎深窮微該世之務賢哉先生超然絶倫大用甚邇胡奪之年先生之道不在其弟方其初起天下咸喜今其西矣天下懷矣誰為有力進之君矣俾行其道覺斯民矣朱子曰明道說話渾淪煞髙學者難看明道說底話恁地動彈流轉贊先生像曰揚休山立玉色金聲元氣之㑹渾然天成瑞日祥雲和風甘雨龍德正中厥施斯普程子名頥字正叔號伊川司馬光吕公著嘗言於朝曰程頥之為人言必忠信動遵禮義實儒者之髙蹈聖世之逸民又曰頥道德純備學問淵博有經天緯地之才有制禮作樂之具實天民之先覺聖代之真儒也公著又言曰程頥年三十四有特力之操出群之姿洞明經術通古今治亂之要實有經世濟物之才非同拘士曲儒徒有偏長使在朝廷必為國器王巖叟嘗言於朝曰程頥學極聖人之精微行全君子之純粹與其兄皓俱以德名顯於時又曰頥抱道養德之日久而濳神積纍之功深靜而閲天下之義理者多必有嘉言以新聖聽明道嘗曰異日能尊師道是吾弟若接引後學隨人才而成就之則不敢讓或謂自秦漢以下卓乎天下之習不能蔽也程正叔而已觀正叔所言未嘗務脫流俗只是一箇是底道理自然不墮流俗中龜山楊氏曰然觀其論婦人不再適人以謂寧餓死若不是見得道理分明如何敢說這樣話邵氏伯溫曰先生嘗渡漢中中流船幾覆舟中人皆懼先生獨正襟安坐如常問之曰心存誠敬爾河南朱氏曰伊川先生以言乎道則貫徹三才而無一毫之為間以言乎德則并包衆美而無一善之或遺以言乎學則博通古今而無一物之不知以言乎才則開物成務而無一理之不總胡安國言於朝曰程頥修身行法規矩凖繩獨出諸儒之表雖崇寧間曲加防禁學者私相傳習其後門人稍稍進用傳者浸廣士大夫爭相淬勵而其間志利祿者託其說以自售分黨相排衆論洶洶深誚其徒而乃上及於頥竊以為過矣夫聖人之道所以垂訓萬世無非中庸然中庸之義不明久矣自頥兄弟始發明之然後其義可思而得也不然則或謂高明所以處已中庸所以應事接物本末上下析為二途而其義不明矣士學宜師孔孟此其至論也然孔孟之道不傳久矣自頥兄弟始發明之而後其道可學而至也不然則或以六經語孟之書資口耳取世資以干祿愈不得其門而入矣今欲使學者蹈中庸師孔孟而禁使不得從頥之學是入室而不由户也不亦誤乎范陽張氏曰伊川之學自踐履中入故能深識聖賢氣象如曰孔子元氣也顔子景星慶雲也孟子有泰山巖巖氣象自非以心體之安能别白如此朱子曰先生遊太學時胡翼之方主教導嘗以顔子所好何學論試諸生得先生所試大驚即延見處以學職吕希哲與先生鄰齊首以師禮事焉既而四方之士從游者日益衆先生年十八上書闕下勸仁宗以王道為心生靈為念黜世俗之論期非常之功問前輩多言伊川似孟子曰不然伊川謹嚴雖大故以天下自任其實不似孟子問程先生當初進說只以聖人之說為可必信先王之道為可必行不狃滯於近規不遷惑於衆口必期致天下如三代之世何也曰也不得不恁地說如今說與學者也只得教他依聖人言語恁地做去待他就裏面做工夫有見處便自知得聖人底是確然恁地有咎伊川著書不以示門人者再三誦之先生不以為然也因坐復嘆曰公恨伊川著書不以示人某獨恨當時提撕也不緊故當時門人弟子布在海內炳如日星自今觀之皆不滿人意只今易傳一書散滿天下家置而人有之且道誰曾看得他箇果有得其意者否果曽有行得他箇否問伊川臨終時或曰平生學底正要今日用伊川開目曰說要用便不是此是如何曰說要用便是兩心書伊川帖曰近世學者閲理不精正坐讀書太草草耳况春秋大義數十炳若日星固已見於傳序而所謂不容遺忘者又非先生决不能道也夫三綱五常大倫大法有識以上即能言之而臨小利害輒以失其所守正以學不足以全其本心之正是以無所根著而忘之耳既有以自信其不容遺忘又不覺因事而形於筆札之間非先生之德盛仁熟左右逢原能及是耶贊先生像曰規圓矩方繩直凖平允矣君子展也大成布帛之文菽粟之味知德者希孰識其貴張子曰昔嘗謂伯淳優於正叔今見之果然其救世之志甚誠切亦於今日天下之事儘記得熟以下總論二程學者不可謂少年自緩便是四十五十二程從十四嵗時便鋭然欲學聖人今盡及四十未能及顔閔之徒伊川可如顔子然恐未如顔子之無我榮陽吕氏曰二程之學以聖人為必可學而至而已必欲學而至於聖人嵩山朝氏曰伊川嘗謂明道云吾兄弟近日說話太多明道云使見吕晦叔則不得不少見司馬君實則不得不多武夷胡氏曰程氏之文於易則因理以明象而知體用之一源於春秋則見諸行事而知聖人之大用於諸經語孟則發其微指而知求仁之方入德之序程氏之行其行已接物則忠誠動於州里其事親從兄則孝悌顯於家庭其辝受取舍非其道義則一介不以取與諸人雖祿之千鍾不顧也昔嘗見鄒志完論近世人物因問程明道如何志完曰此人得志使萬物各得其所又問伊川如何曰却不得比明道又問何以不得比曰為有不通處曰伊川不通處必有言行可證願聞之志完色動徐曰有一二事恐門人或失其傅後來在長沙再論二先生學術志完却曰伊川見處極髙因問何以言之曰昔鮮于侁曾問顔子在陋巷不改其樂不知所樂者何事伊川却問曰尋常道顔子所樂者何侁曰不過是說顔子所樂者道伊川曰若說有道可樂便不是顔子以此知伊川見處極髙五峯胡氏曰二程倡久絶之學於今日其功比於孔子作春秋孟子闢楊墨馮氏忠恕曰王霖言明道伊川隨侍太中知漢州宿一僧寺明道入門而右從者皆隨之伊川入門而左獨行至法堂上相㑹伊川自謂此是頥不及家兄處蓋明道和易人皆親近伊川嚴重人不敢近也朱子曰明道伊川先生之學以大學論語孟子中庸為標指而達於六經使人讀書窮理以誠其意正其心修其身而自家而國以及於天下其道坦而明其說簡而通其行端而實是蓋將有以振百代之沉迷而內之聖賢之域其視一時之事業詞章論議氣節所繫孰為輕重所施孰為短長當有能辨之者明道德性寬大規模廣濶伊川氣質剛方文理密察其道雖同而造德各異故明道嘗為條例司官不以為凂而伊川所作行狀乃獨不載其事明道猶謂青苗可且放過而伊川乃於西監一狀較計如此此可謂不同矣然明道之放過乃孔子之獵較為兆而伊川之一一理㑹乃孟子之不見諸侯也此亦何害其為同耶但明道所處是大賢以上事學者未至而輕議之恐失所守伊川所處雖髙然實中人皆可跂及學者只當以此為法則庶乎寡過矣然又當觀用之淺深事之大小裁酌其意難執一意此君子所以貴窮理也濂溪在當時無有知其學者惟程太中獨知之明道當初想明得煞容易便無那查滓只一再見濂溪當時又不似而今有許多言語出來不是他天資髙見得易如何便明得或問遺書中載明道語便自然灑落明快曰自是他見得容易伊川易傳却只管修改晚年方出其書若是明道作想無許多事嘗見門人有祭明道文云先生欲著樂書有志未就不知其書要如何作問明道濂溪俱髙不如伊川精切曰明道說話超邁不如伊川說得的確濂溪也精密不知其他書如何但今所說這些子無一字差錯明道之言發明極致通透灑落善開發人伊川之言即事明理質慤精深尤耐咀嚼然明道之言一見便好久看愈好所以賢愚皆獲其益伊川之言乍見未好久看方好故非久於玩索者不能識其味此其自任所以有成人材尊師道之不同明道渾然天成不犯人力伊川功夫造極可奪天巧明道語宏大伊川語親切明道所見甚俊偉故說得較快初看時便好子細看亦好明道言語儘寬平伊川言語初難看細讀有滋味某說大處自與伊川合小處却時有意見不同問明道曽看釋老書伊川則莊列亦不曽看曰後來須著看不看無緣知他道理伊川好學論十八時作明道十四五便學聖人二十及第出去做官一向長進定性書是二十二三時作是時遊山許多詩甚好問明道可比顔子伊川可比孟子否曰明道可比顔子孟子才髙恐伊川未到孟子處然伊川收束檢制處孟子却不能到問明道到處響應伊川入朝成許多事此亦可見二人用處曰明道從容伊川都挨不行問伊川做時似孟子否曰孟子較活絡問孟子做似伊川否先生首肯或謂二程之於濂溪亦若橫渠之於范文正公耳曰先覺相𫝊之祕非後學所能窺測誦其詩讀其書則周范之造詣固殊而程張之契悟亦異如曰仲尼顔子所樂吟風弄月以歸皆是當時口傳心授的當親切處後來二先生舉似後學亦不將作第二義看然則行狀所謂反求之六經然後得之者特語夫功用之大全耳至其入處則自濓溪不可誣也若橫渠之於文正則異於是蓋當時粗發其端而已受學乃先生自言此豈自誣者耶大抵近世諸公知濓溪甚淺如吕氏童䝉訓記其嘗著通書而曰用意髙逺夫通書太極之說所以明天理之根源究萬物之終始豈用意而為之又何髙下逺近之可道哉問學於明道恐易開發學於伊川恐易成就曰在人用力若不用力恐於伊川無向傍處明道却有悟人處聞伯夷栁下惠之風者頑亷薄敦皆有興起此孟子之善想象者也孔子元氣也顔子和風慶雲也孟子泰山巖嚴之氣象也此程夫子之善想象者也今之想象大程夫子者當識其明快中和處小程夫子者當識其初年之嚴毅晚年又濟以寬平處豈徒想象而已哉必還以驗之吾身者如何也若言論風㫖則誦其詩讀其書字字而訂之句句而議之非惟求以得其所言之深㫖將併與其風範氣象皆得之矣某自十四五時讀程張書至今四十餘年但覺其義之深指之逺而近世紛紛所謂文章議論者殆不足復過眼信乎孟氏以來一人而已然非用力之深者亦無以自信其必然也南軒張氏曰二程先生始嘗受學于周先生而其自得之深充養之至精粹純密更益光大聖門之大全至是發明無遺憾矣讀諸先生之書惟覺二程先生完全精粹愈讀愈無窮不可不詳味也二先生所以教學者不越於居敬窮理二事取其書反覆讀之則可以見蓋居敬有力則其所窮者愈精窮理浸明則其所居益有地二者蓋互相發也二先生其猶一氣之周流乎何其理之該而不偏辭之平而有味也讀遺書易傅他書真難讀也張子名載字子厚號橫渠程子曰子厚以禮教學者最善使學者先有所據守某接人治一作談經論道者亦甚多肯言及治體者誠未有如子厚子厚才髙其學更先從雜博中過來問子厚立言得無有幾於迫切者乎曰子厚之為人謹且嚴是以其言似之方之孟子則寬宏舒泰有不及也然孟子猶有英氣存焉是以未若顔子之懿渾然無圭角之可見也某接人多矣不雜者三人張子厚邵堯夫司馬君實子厚之氣似明道答橫渠書曰所論大槩有苦心極力之象而無寬裕溫柔之氣非明睿所照而考索至此故意屢偏而言多窒小出入時有之明睿所照者如目所睹纎微盡識之矣考索至者如揣料於物約見倣佛耳能無差乎更望完養思慮涵泳義理他日自當條暢吕晦叔薦先生于朝曰張載學有本原西方之學者皆宗之神宗即命召見問治道皆以復三代為對他日見執政執政語之曰新政之更懼不能任事求助於子何如先生曰朝廷將大有為天下士願與下風若與人為善則孰敢不盡如教玉人追琢則人亦故有不能執政默然藍田吕氏曰先生志氣不群少孤自立無所不學與邠人焦寅游寅喜談兵先生說其言當康定用兵時年十八慨然以功名自許上書謁范文正公公一見知其逺器欲成就之乃責之曰儒者自有名教何事於兵因勸讀中庸先生讀其書雖愛之猶未以為足也於是又訪諸釋老之書纍年盡究其說知無所得反而求之六經嘉祐初見洛陽程伯淳正叔昆弟于京師共語道學之要先生渙然自信曰吾道自足何事旁求乃盡棄異學淳如也間起從仕日益久學益明方未第時文潞公以故相判長安聞先生名行之美聘以束帛延之學宫異其禮際士子矜式焉晚自崇文移疾西歸終日危坐一室左右簡編俯而讀仰而思有得則識之或終夜起坐取燭以書其志道精思未始須㬰息亦未嘗須㬰忘也學者有問多告以知禮成性變化氣質之道學必如聖人而後已聞者莫不動心有進而自得之者窮神知化一天人立大本斥異學自孟子以來未之有也先生氣質剛毅德盛貌嚴然與人居久而日親其治家接物大要正己以感人人未之信反躬自治不以語人雖有未喻安行而無悔故識與不識聞風而畏聞人之善喜見顔色答問學者雖多不倦有不能者未嘗不開其端有可語者必丁寧以誨之惟恐其成就之晚廣平游氏曰子厚學成德尊與孟子比然猶祕其學明道曰處今之時當隨其資教之雖識有明暗亦各有得焉子厚用其言故關中學者躬行之多與洛人並或論橫渠龜山楊氏曰正叔先生亦自不許他曰先生嘗言自孟子之後無他見識何也曰如彼見識秦漢以來何人到此和靖尹氏曰橫渠昔在京坐虎皮說周易聽從甚衆一夕二程先生至論易次日撤去虎皮曰吾平日與諸公說者皆亂道有二程近到深明易道吾所弗及汝輩可師之乃歸陜西或問橫渠言十五年學恭而安不成明道曰可知是學不成有多少病在莫是如伊川說若不知得只是覷却堯學他行事無堯許多聰明睿知怎生得似他動容周旋中禮朱子曰也是如此更有多少病良久曰人便是被一箇氣質局定變得些子了又有些子變得些子又更有些子問橫渠只是硬把捉故不安否曰他只是學箇恭自驗見不曽熟不是學箇恭又學箇安橫渠云吾學既得於心則修其辭命辭無差然後斷事斷事無失吾乃沛然看來理㑹道理須是說得出一字不穩便無下落所以橫渠中夜便筆之於紙只要有下落而今理㑹得有下落底臨事尚腳忙手亂况不曽理㑹得下落橫渠如此若論道理他却未熟然他地位却要如此髙明底則不必如此橫渠之學是苦心得之乃是致曲與伊川異以孔子為非生知渠蓋執好古敏以求之故有此說不知好古敏以求之非孔子做不得問橫渠之教以禮為先某恐謂之禮則有品節每遇事須用稱停當禮方可遵守初學者或未嘗識禮恐無下手處敬則有一念之肅便已改容更貌不費安排事事上見得此意如何曰古人自幼入小學便教以禮及長自然在規矩之中橫渠却是以官法教人禮也易學今人乍見往往以為難某嘗要取三禮編成一書事多蹉過若有朋友只兩年工夫可成橫渠教人道夜間自不合睡只為無可應接他人皆睡了己不得不睡他做正䝉時或夜裏默坐徹曉他直是恁地勇方做得因舉曽子任重道逺一假曰子思曽子直恁地方被他打得透問程張之門於六經多指說道之精微學之要領與夫下手處雖甚精切易見然被他開了四至便覺規模狹了曰橫渠最親切程氏規模廣大學者少有能如橫渠輩用功者近看得橫渠用工最親切直是可畏問橫渠似孟子否曰橫渠嚴密孟子宏闊又問孟子平正橫渠高處太高僻處太僻曰是又曰橫渠之於程子猶伯夷伊尹之於孔子或云諸先生說話皆不及小程先生雖大程亦不及曰不然明道說話儘高邵張說得端的處儘好且如伊川說仁者天下之公善之本也大假寬而不切如橫渠說心統性情這般所在說得的當又如伊川謂鬼神者造化之迹却不如橫渠所謂二氣之良能也明道之學從容涵泳之味洽橫渠之學苦心力索之功深曾子剛毅立得墻壁在而後可傳之子思孟子伊川橫渠甚嚴游楊之門倒塌了若天資大假高則學明道若不及明道則且學伊川橫渠贊先生像曰早恱孫吳晚逃佛老勇撒臯比一變至道精思力踐妙契疾書訂頑之訓示我廣居西山真氏曰張子有言為天地立心為生民立極為前聖繼絶學為萬世開太平又曰此道自孟子後千有餘嵗若天不欲此道復明則不使今人有知者既使人有知者則必有復明之理此皆先生以道自任之意邵子名雍字堯夫號康節程子曰邵堯夫先生始學於百原堅苦刻厲冬不爐夏不扇夜不就席者數年衛人賢之先生歎曰昔人尚友於古而吾未嘗及四方遽可已乎於是走吳適楚過齊魯客梁晉久之而歸曰道其在是矣蓋始有定居之意先生少時自雄其材慷慨有大志既學力慕髙逺謂先王之事為可必致及其學益老德益邵玩心髙明觀於天地之運化隂陽之消長以達乎萬物之變然後頺然其順浩然其歸在洛幾三十年始至蓬蓽環堵不蔽風雨躬㸑以養其父母居之裕如講學於家未嘗强以語人而就問者日衆鄉里化之逺近尊之士人之道洛者有不之公府而必之先生之廬先生德氣粹然望之可知其賢然不事表暴不設防畛正而不諒通而不汙清明坦夷洞徹中外接人無貴賤親疏之間群居燕飲笑語終日不敢甚異於人顧吾所樂何如耳病畏寒暑常以春秋時行遊城中士大夫家聽其車音倒屣迎致雖兒童奴𨽻皆知歡喜尊奉其與人言必依於孝弟忠信樂道人之善而未嘗及其惡故賢者恱其德不賢者服其化所以厚風俗成人材者先生之功多矣又曰先生之學得之於李挺之挺之得之於穆伯長推其源流逺有端緒今穆李之言及其行事槩可見矣而先生純一不雜汪洋浩大乃其所自得者多矣謂周純明曰吾從堯夫先生游聽其議論振古之豪傑也惜其無所用於世周曰所言何如曰內聖外王之道也堯夫襟懷放曠如空中樓閣四通八達也堯夫於物理上儘說得亦大假漏泄他天機堯夫詩雪月風花未品題他便把這些事便與堯舜三代一般此等語自孟子後無人曽敢如此言來直是無端又如言須信畫前元有易自從刪後更無詩這箇意思元古未有人道來堯夫詩云梧桐月向懷中照楊栁風來面上吹真風流人豪也又詩云頻頻到口微成醉拍拍滿懷都是春不止風月言皆有理萬事皆出於理自以為皆有理故要得從心妄行總不妨堯夫又得詩云聖人喫緊些兒事其言太急迫此道理平鋪地放著裏何必如此世之博文强識者衆矣其終未有不入於禪學者特立不惑子厚堯夫而已然其說之流亦未免於有弊也子厚堯夫之學善自開大者也堯夫細行或不謹而其卷舒運用亦熟矣邵堯夫病革且言試與觀化一遭子厚言觀化他人便觀得自家自家又如何觀得化嘗觀堯夫詩意才做得識道理却於儒術未見所得上蔡謝氏曰邵堯夫直是豪才嘗有詩云當年志氣欲橫秋今日看來甚可羞事到強為終屑屑道非心得竟悠悠鼎中龍虎忘看守碁上山河廢講求又有詩云斟有淺深存燮理飲無多少繫經綸卷舒萬古興亡手出入千重雲水身此人在風塵時節偏是偏霸手假學須是天人合一始得又有詩云萬物之中有一身一身中有一乾坤能知造化備於我肯把天人别立根天向一中分體用人於心上起經綸天人安有兩般義道不虛行只在人問此詩如何曰說得大體亦是但不免有病不合說一中分體用又問曰此句何故有病曰昔富彥國問堯夫云一從甚處起曰公道從甚處起富曰一起於震邵曰一起於乾問兩說如何曰兩說都得震謂發生乾探本也若㑹得天理更說甚一二問堯夫所學如何曰與聖門却不同問何故却不同曰他也只要見物理到逼真處不下工夫便差却問何故却不著工夫曰為他見得天地進退萬物消長之理便敢做大於聖門下學上逹底事更不施功堯夫精易之數事物之成敗始終人之禍福修短算得來無毫髮差錯如指此屋便知起於何時至某年月日而壞無不如其言然二程不貴其術堯夫喫不過一日問伊川曰今歲雷從甚處起伊川曰起處起如堯夫必用推算某更無許多事邵即默然和靖尹氏曰康節之學本是經世之學今人但知其明易數知未來事却小了他學問如陳叔易贊云先生之學志在經綸最為盡之吕氏家孰記曰邵堯夫先生居洛四十年安貧樂道自云未嘗皺眉所居寢息處為安樂窩自號安樂先生又為甕牖讀書燕居其下旦則焚香獨坐晡時飲酒三四甌微醺便止不使至醉也中間州府以更法不餉餽寓賔乃為薄粥以代之好事者或載酒以濟其乏嘗有詩曰莫道山翁拙於用也能康濟自家身喜吟詩作大字書然遇興則為之不牽強也大寒暑則不出每出乘小車用一人挽之為詩以自詠曰花似錦時高閣望草如茵處小車行司馬公贈以詩曰林間髙閣望已久花外小車猶未來隨意所之遇主人喜客則留三五宿又之一家亦如之或經月忘返雖性高潔而接人無賢不肖貴賤皆歡然如親嘗自言若至大病自不能支其遇小疾得有客對話不自覺疾之去體也學者來從之問經義精深浩博應對不窮思致幽逺妙極道數間與相知之深者開口論天下事雖久存心世務者不能及也張氏岫曰先生少受學於北海李之才挺之又游河汾之曲以至淮海之濵涉於濟汶逹於梁宋茍有逹者必訪以道無常師焉乃退居共城廬於百原之上大覃思於易經夜不設寢日不再食三年而學以大成大名王豫天恱慱逹之士尤長於易聞先生之篤志愛而欲教之既與之語三日得所未聞始大驚服卒捨其學而學焉北面而尊師之衛人乃知先生之為有道也年三十餘來游于洛以為洛邑天下之中可以觀四方之士乃定居焉先生清而不激和而不流遇人無貴賤賢不肖一接以誠長者事之少者友之善者與之不善者矜之故洛人久而益尊信之四方之學者與大夫之過洛者莫不慕其風而造其廬先生之教人必隨其才分之髙下不驟語而强益之或聞其言若不適其意先生亦不屑也故來者多而從者少見之者衆而知之者尚寡及接之久察其所處無不中於理叩其所有愈久而愈新則皆心恱而誠服先生未嘗有求於人或餽之以禮者亦不苟辭洛人為買宅丞相富公為買園以居之年六十始為隱者之服隆寒盛暑閉門不出曰非退者之宜也其於書無所不讀諸子百家之學皆究其本原而釋老技術之說一無所惑其志晚尤喜為詩平易而造於理歐陽氏曰康節邵先生嘗以為學者之患在於好惡先成乎心而挾其私智以求於道則敝於所好而不得其真故求之至於四方萬里之逺天地隂陽屈伸消長之變無所不可而必折衷於聖人雖深於象數先見默識未嘗以自名也其學純一而不雜居之而安行之而成平夷渾大不見圭角其自得深矣朱子曰康節本是要出來有為底人然又不肯深犯手做凡事直待可做處方試為之才覺難便拽身退正張子房之流康節學於李挺之請曰願先生微開其端毋竟其說此意極好學者當然須是自理㑹出來便好伊川之學於大體上瑩徹於小小節目上猶有疏處康節能盡得事物之變却於大體上有未瑩處劉用之云康節善談易見得透徹曰然伊川又輕之嘗有簡與橫渠云堯夫說易好聽今夜試來聽他說看某嘗說此便是伊川不及孔子處只觀孔子便不如此程邵之學固不同然二程所以推尊康節者至矣蓋以其信道不惑不雜異端班於溫公橫渠之間則亦未可以其道不同而遽貶之也又曰康節之學抉摘窈微與佛老之言豈無一二相似而卓然自信無所汚染此其所見必有端的處比之溫公欲護名教而不言者又有間矣或言康節心胸如此快活如此廣大如何得似他曰他是甚麼樣做工夫問近日學者有厭拘檢樂舒放惡精詳喜簡便者皆欲慕邵堯夫之為人曰邵子這道理豈易及哉他腹裏有這箇學能包括宇宙終始古今如何不做得大放得下今人却恃箇甚後敢如此因誦其詩云日月星辰髙照曜皇王帝伯大鋪舒可謂人豪矣康節之學其骨髓在皇極經世其花草便是詩黃直卿云其詩多說間靜樂的意思大煞把箇事了曰這箇未說聖人只顔子之樂亦不恁地看他詩篇篇只管說樂次第樂得來厭了聖人得底如喫飲相似只飽而已他却如喫酒又曰他都是有箇自私自利底意所以明道有要之不可以治天下國家之說康節詩儘好看楊道夫問舊張無垢引心贊云廓然心境大無倫盡此規模有幾人我性即天天即性莫於微處起經綸不知如何曰是殆非康節之詩也林少𨽻云朱內翰作問何以辨曰若是真實見得必不恁地張皇道夫曰舊看此意似與性為萬物之一原而心不可以為限量同曰固是但只是摸空說無著實處如康節云天向一中分造化人從心上起經綸多少平易實見得者自别又問一中分造化曰本是一箇而消息盈虛便生隂陽事事物物皆恁地有消便有息問康節之嘗有莊老之說如何曰便是他有些子這箇曰如此莫於道體有異否曰他嘗說老子得易之體孟子得易之用體用自分作兩截曰他又說經綸如何曰看他只是以術去處得這事恰好無過如張子房相似他所以極口稱贊子房也二程謂其粹而不雜以今觀之亦不可謂不雜曰他說風花雪月莫是曽㸃意思否曰也是見得眼前這箇好曰意其有與自家意思一般之意曰也是他有這些子若不是却淺陋了邵堯夫詩雪月風花未品題此言事物皆有造化邵堯夫六十嵗作首尾吟百三十餘篇至六七年間終渠詩玩侮一世只是一箇四時行焉百物生焉之意或問康節詩曰施為欲似千鈞弩磨礪當如百鍊金問千鈞弩如何曰只是不妄發如子房在漢謾說一句當時承當者者便須百碎康節詩云幽暗巖崖生鬼魅清平郊野見鸞凰聖人道其常也只是就那光明處理㑹說與人那幽暗處知得有多少怪異康節以品題風月自負然實强似皇極經世書問先生須得邵堯夫先知之術先生久之曰吾之所知者惠迪吉從逆凶滿招損謙受益若是明日晴後日雨吾又安能知耶贊先生像曰天挺人豪英邁蓋世駕風鞭霆厯覽無際手探月窟足躡天根間中今古醉裏乾坤性理大全書卷三十九

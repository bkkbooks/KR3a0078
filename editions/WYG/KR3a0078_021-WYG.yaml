body:
  text: 性理大全書卷二十一家禮四喪禮虞祭𦵏之日日中而虞或墓逺則但不出是日可也若去家經宿之上則初虞於所館行之鄭氏曰骨肉歸於土䰟氣則無所不之孝子為其彷徨三祭以安之朱子曰未𦵏時奠而不祭但酌酒陳饌再拜虞始用祭禮卒哭謂之吉祭主人以下皆沐浴或已晚不暇即畧自澡潔可也執事者陳器具饌盥盆帨巾各二於西階西南上東盆有臺巾有架西者無之凢喪禮皆放此酒瓶并架一於靈座東南置卓子於其東設注子及盤盞於其上火爐湯瓶於靈座西南置卓子於西設祝版於其上設蔬果盤盞於靈座前卓上匕筯居内當中酒盞在其西醋楪居其東果居外蔬果居内實酒于瓶設香案居堂中炷火于香爐束茅聚沙於香案前具饌如朝奠陳於堂門外之東祝出神主于座主人以下皆入哭主人及兄弟倚杖於室外及與祭者皆入哭于靈座前其位皆北面以服為列重者居前輕者居後尊長坐卑㓜立丈夫處東西上婦人處西東上逐行各以長㓜為序侍者在後降神祝止哭者主人降自西階盥手帨手詣靈座前焚香再拜執事者皆盥帨一人開酒盤實於注西面跪以注授主人主人跪受一人奉卓上盞東面跪於主人之左主人斟酒於盞以注授執事者左手取盤右手執盞酹之茅上以盤盞授執事者俛伏興少退再拜復位祝進饌執事者佐之其設之叙如朝奠初獻主人進詣注子卓前執注北向立執事者一人取靈座前盤盞立于主人之左主人斟跪酒反注于卓子上與執事者俱詣靈座前北向立主人執事者亦跪進盤盞主人受盞三祭於茅束上俛伏興執事者受盞奉詣靈座前奠於故處祝執版出於主人之右西向跪讀之前同但云日月不居奄及初虞夙興夜處哀慕不寧謹以潔牲柔毛粢盛醴齊哀薦祫事尚饗祝興主人哭再拜復位哭止牲用豕則曰剛鬛不用牲則曰清酌庶羞祫合也欲其合於先祖也亞獻主婦為之禮如初但不讀祝四拜終獻親賓一人或男或女為之禮如亞獻侑食執事者執注就添盞中酒主人以下皆出祝闔門主人立于門東西向卑㓜丈夫在其後重行北上主婦主于門西東向卑㓜婦女亦如之尊長休於他所如食間楊氏復曰士虞禮無尸者祝闔牖户如食間詳見後四時祭禮祝啟門主人以下入哭辭神祝進當門北向噫歆告啟門三乃啟門主人以下入就位執事者㸃茶祝立于主人之右西向告利成歛主匣之置故處主人以下哭再拜盡哀止出就次執事者徹祝埋魂帛祝取䰟帛帥執事者埋于屏處潔地罷朝夕奠朝夕哭哀至哭如初遇柔日再虞乙丁巳辛癸為柔日其禮如初虞惟前期一日陳器具饌厥明夙興設蔬果酒饌質明行事祝出神主于座祝詞改初虞為再虞祫事為虞事為異若墓逺途中遇柔日則亦於所館行之遇剛日三虞甲丙戊庚壬為剛日其禮如再虞惟改再虞為三虞虞事為成事若墓逺亦途中遇剛日且闕之湏至家乃可行此祭卒哭檀弓曰卒哭曰成事是日也以吉祭易喪祭故此祭漸用吉禮三虞後遇剛日卒哭前期一日陳器具饌並同虞祭惟更設𤣥酒瓶一於酒瓶之西厥明夙興設蔬果酒饌並同虞祭惟更取井花水充𤣥酒質明祝出主同再虞主人以下皆入哭降神並同虞祭主人主婦進饌主人奉魚肉主婦􅏕悦奉麺米食主人奉羮主婦奉飯以進如虞祭之設初獻並同虞祭惟祝執版出于主人之左東向跪讀為異詞並同虞祭但改三虞為卒哭哀薦成事下云来日隮祔于祖考某官府君尚饗亡按此云祖考謂者之祖考也朱子曰温公以虞祭讀祝於主人之右卒哭讀祝於主人之左蓋得禮意楊氏復曰髙氏禮記進讀祝文曰日月不居奄及卒哭叩地號天五情糜潰謹以清酌庶羞哀薦成事尚饗亞獻終獻侑食闔門啟門辭神並同虞祭惟祝西階上東面告利成自是朝夕之間哀至不哭猶朝夕哭主人兄弟䟽食水飲不食菜果寢席枕木楊氏復曰按古者既虞卒哭有受服綀祥禫皆有受服蓋服以表哀哀漸殺則服漸輕然受服數更近於文繁今世俗無受服自始死至大祥其哀無變非古也書儀家禮從俗而不泥古所以從簡祔檀弓曰殷既綀而祔周卒哭而祔孔子善殷註曰期而神之人情然殷禮既亡其本末不可考今三虞卒哭皆用周禮次第則此不得獨從殷禮卒哭明日而祔卒哭之祭既徹即陳器具饌器如卒惟陳之於祠堂堂狹即扵㕔事隨便設亡者祖考妣於中南向西上設亡者位扵其東南西向母喪則不設祖考位酒瓶𤣥酒瓶於阼階上火爐湯瓶於西階上具饌如卒哭而三分母喪則兩分祖妣二人以上則以親者雜記曰男子袝于王父則配女子祔于王母則不配註有事於尊者可以及卑有事於卑者不敢援尊也髙氏曰若祔妣則設祖妣及妣之位更不設祖考位若父在而祔妣則不可遞遷祖妣宜别立室以藏其主待考同祔若考妣同祔則並設祖考及祖妣之位胡氏泳曰髙氏别室藏主之設恐未然先生内子之喪主只祔于祖妣之傍此當為㨿楊復曰父在祔妣則父為主乃是夫祔妻于祖妣三年喪畢未遷尚祔于祖妣待父他日三年喪畢遞遷祖考妣始考妣同遷也髙氏父在不可遞遷祖妣之説亦是但别室蔵主説則非也厥明夙興設蔬果酒饌並同卒哭質明主人以下哭於靈座前主人兄弟皆倚杖于階下入哭盡哀止用按此謂繼祖宗子之喪其世嫡當為後者主喪乃此禮若喪主非宗子則皆以亡者繼祖之宗主此祔祭禮註云祔于祖廟宜使尊者主之詣祠堂奉神主出置於座祝軸簾啟櫝奉所祔祖考之主置於座内執事者奉祖妣之主置於座西上若在他所則置於西階上卓子上然後啟櫝祖若喪主非宗子而與繼祖之宗異居則宗子為告於而設虚位以祭祭訖除之還奉新主入祠堂置於座主人以下還詣靈座所哭祝奉主櫝詣祠堂西階上卓子上主人以下哭從如從柩之叙至門止哭祝啟櫝出主如前儀若喪主非宗子則惟喪主主婦以下還迎叙立若宗子自為喪主則叙立如虞祭之儀若喪主非宗子則宗子主婦分立兩階之下喪主在宗子之右喪主婦在宗子婦之左長則居前少則居後餘亦如虞祭之儀參神在位者皆再拜參祖考妣降神若宗子自為喪主則喪主行之若喪主非宗子則宗子行之並同卒哭祝進饌並同虞祭初獻若宗子自為喪主則喪主行之若喪主非宗子則宗主行之並同卒哭但酌獻先詣祖考妣前日子前同卒哭祝版但云孝子某謹以潔牲柔毛粢盛醴齊適於某考某官府君隮祔孫某官尚饗皆不哭内喪則云某妣某封某氏隮祔孫婦某封某氏次詣亡者前若宗子自為喪主則祝版同前但云薦祔事于先考某官府君適于某考某官府君尚饗若喪主非宗子則隨宗子所稱餘儀同若亡者於宗子為卑㓜則宗子不拜亞獻終獻若宗子自為喪主則主婦為亞獻親賓為終獻若喪主非宗子則喪主為亞獻主婦為終獻並同卒哭及初獻儀惟不讀祝侑食闔門啟門辭神並同卒哭但不哭祝奉主各還故處祝先納祖考妣神主于龕中匣之次納亡者神主西階卓子上匣之奉之反于靈座出門主人以下哭從如来儀盡哀止若喪主非宗子則哭而先行宗子亦哭送之盡哀止若祭于他所則考妣之主亦如新主納之程子曰喪須三年而祔若卒哭而祔則二年却都無事禮卒哭猶存朝夕哭無主在寝哭于何處朱子曰古者廟有昭穆之次昭常為昭穆常為穆故祔新老者于其祖父之廟則為告其祖父以當遷他廟而告新死者以當入此廟之漸也今公私之廟皆為同堂異室以西為上之制而無復左昭右穆之次一有遞遷則羣室皆遷而新死者當入于其禰之故室矣此乃禮之大節與古不同而為禮者猶執祔于祖父之文似無意義然欲遂變而祔于禰廟則又非變禮存羊意楊氏復曰司馬禮家禮並是既祔之後主復於寝所謂奉主各還故處也小祥鄭氏云祥吉也朞而小祥自喪至此不計閏凡十三月古者卜日而祭今止用初忌以從簡易大祥倣此前期一日主人以下沭浴陳器具饌主人率衆丈夫灑掃滌濯主婦率衆婦人滌釡鼎具祭饌他皆如卒哭之禮設次陳練服丈夫婦人各設次於别所置練服於其中男子以練服為冠去首經負版辟領衰婦人截長裙不令曵地應服期者改吉服然猶盡其月不服金珠錦繡紅紫惟為妻者猶服禫盡十五月而除楊氏復曰按儀禮喪服記載喪負版辟領之制甚詳但有闕文不言衰負版辟領何時而除司馬公書儀云既練男子去首絰負版辟領衰故家禮㨿書儀云小祥去首絰負版辟領衰但禮經既練男子除首經婦人除腰帶家禮於婦人成服時並無婦人經帶之文此為踈略故既綀亦不言婦人除帶當以禮經為正厥明夙興設蔬果酒饌並同卒哭質明祝出主主人以下入哭皆如卒哭但主人倚杖于門外與期親各服其服而入若已除服者来預祭亦釋去華盛之服皆哭盡哀止乃出就次易服復入哭祝止之降神如卒哭三獻如卒哭之儀祝版同前但云日月不居奄及小祥夙興夜處小心畏忌不惰其身哀慕不寧敢用潔牲柔毛粢盛醴齊薦此常事尚饗侑食闔門啟門辭神皆如卒哭之儀止朝夕哭惟朔望未除服者㑹哭其遭喪以来親戚之未嘗相見者相見雖已除服猶哭盡哀然後叙拜始食菜果問妻喪踰期主祭朱子曰此未有考但司馬氏大小祥祭已除服者皆與祭則主祭雖已除服亦何害於於與祭乎但不可純用吉服須如吊服及忌日之服可也大祥再朞而大祥自喪至此不計閏凡二十五月亦止用第二忌日祭前期一日沐浴陳器具饌皆如小祥設次陳禫服司馬温公曰丈夫垂脚黲紗幞頭黲布衫布裏角帶未大祥間暇以出謁者婦人冠梳假髻以鵞黄青碧皁白為衣履其金珠紅繡皆不可用問子為母大祥及禫夫已無服其祭當如何朱子曰今禮几筵必三年而除則小祥大祥之祭皆夫主之但小祥之後夫即除服大祥之祭夫亦恐湏素服如巾服可也但改其祝詞不必言為子而祭也告遷於祠堂以酒果告如朔日之儀若無親盡之祖則祝版云云告畢改題神主如加贈之儀遞遷而西虚東一龕以俟新主若有親盡之祖而其别子也則祝版云云告畢而遷於墓所不埋其支子也而族人有親未盡者則祝版云云告畢遷於最長之房使主其祭其餘改題遞遷如前若親皆已盡則祝版云云告畢埋于兩階之間其餘改題遞遷如前厥明行事皆如小祥之儀惟祝版改小祥曰大祥常事曰祥事畢祝奉神主入于祠堂主人以下哭從如祔之叙至祠堂前哭止徹靈座斷杖棄之屏處奉遷主埋于墓側始飲酒食肉而復寢問祧主朱子曰天子諸侯有太廟夾室則祧主藏于其中今士子無此祧主無可置處禮記説藏于兩階間今不得已只埋于墓所版李繼善問曰納主之儀禮經未見書儀但言遷祠匣於影堂别無祭告之禮周舜㢸以為昧然歸匣恐未為得先生前云諸侯三年喪畢皆有祭但其禮亡而大夫以下又不可考然則今當何所㨿耶曰横渠說三年後祫祭于太廟因其告祭畢還主之時遂奉祧主歸于夹室遷主新主皆歸於其廟此似為得禮鄭氏周禮註大宗伯享先王處似亦有此意而舜㢸所疑與熹所謂三年喪畢有祭者似亦暗與之合但既祥而徹几筵其主且當祔于祖父之廟俟祫畢然後遷耳楊氏復曰家禮祔與遷皆祥祭一時之事前期一日以酒果告訖改題遞遷而西虚東一龕以俟新主厥明祥祭畢奉神主入于祠堂又按先生與學者書則祔與遷是兩項事既祥而徹几筵其主且當祔于祖父之廟俟三年喪畢合祭而後遷蓋世次迭遷昭穆繼序其事至重豈可無祭告禮但以酒果告􅑈行迭遷乎在禮喪三年不祭故横渠説三年喪畢祫祭于太廟因其祭畢還主之時迭遷神主用意婉轉此為得禮而先生從之或者又以大祥除喪而新主未得祔廟為疑竊嘗思之新主所以未遷廟者正為體亡者尊敬祖考之意祖考未有祭告豈敢􅑈遷也况禮辨昭穆孫必祔祖凡合祭時孫尚祔祖今以新主且祔于祖父之廟有何所疑當俟告祭前一夕以薦告遷主畢乃題神主厥明合祭畢奉神主埋于墓所奉遷主新主各歸于廟故並述其説以俟恭考嵗髙氏告祔遷祝文曰年月日孝曽孫某罪積不滅及免喪世次迭遷昭穆繼序先王制禮不敢不至禫鄭氏曰澹澹然平安之意大祥之後中月而禫間一月也自喪至此不計閏凡二十七月司馬温公曰士虞禮中月而禫鄭註云中猶間也禫祭名也白喪至此凡二十七月按魯人有朝祥而暮歌者子路笑之夫子曰踰月則其善也孔子既祥五日弹琴而不成聲十日而成笙歌檀弓曰祥而縞註縞冠素紕也又曰禫徒月樂三年問曰三年之喪三十五月而畢然則所謂中月而禫者蓋禫祭在祥月之中也歴代多從鄭説今律勅三年之喪皆二十七月而除不可違也朱子曰二十五月祥後便禫看来當如王肅之説於是月禫徙月樂之説為順而今從鄭氏之説雖是禮宜從厚然未為當前一月下旬卜日下旬之首擇来月三旬各一日或丁或亥設卓子于祠堂門外置香爐香盒杯珓盤子于其上西向主人禫服西向衆主人次之人少退北上子孫在其後重行北上執事者北向東上主炷香熏珓命以上旬之日曰某將以来月某日祗薦禆事于先考某官府君尚饗即以珓擲于盤以一俯一仰為吉不吉更命中旬之日乂不吉則用下旬之日主人乃入祠堂木龕前再拜在位者皆再拜主人焚香祝執辭于主人之左跪告曰孝子某將以来月某日祗薦禫事于先考某官府君卜既得吉敢告主人再拜降與在位者皆再拜祝闕門退若不得吉則不用卜既得吉一句前期一日沐浴設位陳器具饌設神位于靈座故處他如大祥之儀厥明行事皆如大祥之儀但主人以下詣祠堂祝奉主櫝置于西階卓子上出主置于座主人以下皆哭盡哀三獻不哭改祝版大祥為禫祭祥事為禫事至辭神乃哭盡哀送神主至祠堂不哭朱子曰薦新告朔吉凶相襲似不可行未𦵏可廢既葬則使輕服或已除者入廟行禮可也四時大祭既葬亦不可行如韓魏公所謂節祠者則如薦新行之可也又曰家間頃年居喪於四時正祭則不敢舉而俗節薦享則以墨衰行之蓋正祭三獻受胙非居喪又所可行而俗節則惟普同一獻不讀祝不受胙也曰喪三年不祭但古人居喪衰麻之衣不釋于身哭泣之聲不絶于口其出入居處言語飲食皆與平日絶異故宗廟之祭雖廢而幽明之間兩無憾焉今人居喪與古人異卒哭之後遂墨其衰凡出入居處言語餘食與平日之所為皆不廢也而獨廢此一事恐亦有所未安竊謂欲處此義者但當自省所以居喪之禮果能始卒一一合於曲禮即廢祭無可疑若他時不免墨衰出入或其他有所未合者尚多即卒哭之前不得已準禮且廢卒哭之後可以畧做左傳杜註之説遇四時祭日以衰服特祀于几筵用墨衰常把於家廟可也用楊氏復曰先生以子喪不舉盛祭就祠堂内致薦深衣幅巾祭畢反喪服哭奠子則至慟居喪雜儀檀弓曰始死充充如有窮既殯瞿瞿如有求而弗得既𦵏皇皇如有望而弗至練而慨然祥而廓然顔丁善居喪始死皇皇如有求而弗得及殯望望焉如有從而弗及既𦵏慨然如不及其反而息雜記孔子曰少連大連善居喪三日不怠三月不觧期悲哀三年憂喪服四制曰仁者可以觀其愛焉知者可以觀其理焉彊者可以觀其志焉禮以治之義以正之孝子弟弟貞婦皆可得而察焉曲禮曰居喪未𦵏讀喪禮既𦵏讀祭禮喪復常讀樂章檀弓曰大功廢業或曰大功誦可也今居喪但勿讀樂章可也雜記三年之喪言而不語對而不問言言已事也為人説為語喪大記父母之喪非喪事不言既𦵏與人立君言王事不言國事大夫士言公事不言家事檀弓髙子臯執親之喪未嘗見齒言笑之微雜記䟽衰之喪既𦵏人請見之則見不請見人小功請見人可也又凡喪小功以上非虞祔練祥無沐浴曲禮頭有創則沐身有瘍則浴喪服四制百官偹百物具不言而事行者扶而起言而後事行者杖而起身自執事而後行者面垢而已凡此皆古禮今之賢孝君子必有能盡之者自餘相時量力而行之可也致賻奠狀具位姓某某物若干右謹專送上某人靈几聊偹賻儀香茶酒食云奠儀伏惟歆納謹狀年月日具位姓某狀封皮狀上某官靈筵具位姓某謹封劉氏璋曰司馬公書儀云亡者官尊其儀乃如此若平交及降等即狀内無年封皮上用面簽題曰某人靈筵下云狀謹封謝狀三年之喪未卒哭只令子侄發謝書具位姓某某物若干右伏䝉尊慈以某發書者名某親違世大官云薨沒特賜賻儀襚奠隨事下誠平交不用此二字不任哀感之至謹具狀上謝謹狀餘並同前但封皮不用靈筵二字劉氏璋曰司馬公云此與所尊敬之儀如平交則狀内改尊慈為仁私賜為貺去下誠字後云謹奉狀陳謝謹狀無年封皮上用面簽題云某人下云狀謹封慰人父母亡䟽慰嫡孫承重者同某頓首再拜言降等止云頓首平交但云頓首言不意凶變亡者官尊云邦國不不幸後皆放此先某位無官即云先府君有契即加幾丈於某位府君之上母云先某封無封即云先夫人祖承重則云尊祖考某位尊妣某封餘並同奄棄榮飬亡者官尊即云奄捐館舍或云奄忽薨逝母封至夫人者亦云薨逝若生者無官即云奄違色養承訃驚怛不能己己伏惟平交云恭惟降等云緬惟孝心純至思慕號絶何可堪居日月流邁􅑈踰旬朔經時即云已忽經時已𦵏即云􅑈經襄奉卒哭小祥大祥禫除各隨其時哀痛奈何罔極奈何不審自罹荼毒父在母亡即云憂苦氣力何如平交云何似伏乞平交云伏願降等云惟强加􅊡粥已𦵏則云䟽食俯從禮制某役事所縻在官即云職業有守未由奔慰其於憂戀無任下誠平交已下但云未由奉慰悲係增深謹奉䟽平交云狀伏惟鍳察平交以下去此四字不備謹䟽平交云不宣謹狀月日具位降等用郡望姓某䟽上平交云某官大孝苫前母亡即云至孝平交以下云苫次封皮䟽上某官大孝苫前具位姓某謹封降等即用面簽云某官大孝苫次郡望姓名狀謹封若慰人母亡即云至孝劉氏璋曰裴儀云父母亡日月逺云哀前平交以下云哀次劉儀云百日内云苫次百日外服次如尊則稱苫前服前今從劉儀重封䟽上平交云狀某官具位姓某謹封父母亡答人慰䟽嫡孫承重者同某稽顙再拜言降等云叩首去言字劉氏璋曰劉儀某叩首泣血言按稽顙而後拜以頭觸地曰稽顙三年之禮也雖于平交降等者亦如此但去言字何則古禮受弔必拜之不問㓜賤故也某罪逆深重不自死滅禍延先考母云先妣承重則祖父云先祖考祖母云先祖妣攀號擗踊五内分崩叩地呌天無所逮及日月不居奄踰旬朔隨時同前酷罰罪苦父在母亡即云偏罰罪深父先亡則母與父同無望生全即日䝉恩平交以下去此四字祗奉几筵茍存視息伏䝉尊慈俯賜慰問哀感之至無任下誠平交云仰承仁恩俯垂慰問其為哀感但切下懐降等云特承慰問哀感良深相司馬温公曰凡遭父母喪知舊不以書来弔問是無恤之心於禮不當先發書不得已須至先發即刪此四句未由號訴不勝隕絶謹奉䟽降等云狀荒迷不次謹䟽降等云狀月日孤子母喪稱哀子俱亡即稱孤哀子承重者稱孤孫哀孫孤哀孫姓名䟽上某位座前謹空二平交以下去此字朱子曰父喪稱孤子母喪稱哀子温公所稱蓋因今俗以别父母不欲混并之也且從之亦無害封皮重封並同前但改具位為孤子慰人祖父母亡啟狀謂非承重者伯叔父母姑兄姊弟妹妻子姪孫同某啟不意凶變子孫不用此句尊祖考某位奄忽違世祖母曰尊祖妣某封無官封有契巳見上賢伯叔父母姑即加尊字兄姊弟妹加令字降等皆加字若彼一等之親有数人即加行第云幾某位無官云幾府君有契即加幾大幾令兄扵某位府君之上姑姊妹則稱以夫姓云某宅尊姑姊妹令妻則云賢閤某封無封則但云賢閤官子即云伏承子幾某位姪孫並同降等則曰賢無者稱秀才承訃驚怛不能巳已妻改怛為愕子孫但云不勝驚怛伏惟恭惟緬惟見前孝心純至哀慟摧裂何可勝任伯叔父母姑云親愛加隆哀慟沉痛何可堪勝兄姊弟妹則云友愛加隆隆妻則云伉儷義重悲悼沉痛子姪孫則云慈愛深悲慟沉痛餘與伯叔父母姑同孟春猶寒寒温隨時不審尊體何似稍尊云動止何如降等云所履何似伏乞平交以下如前深自寛抑以慰慈念其人無父母即但云逺誠連書不上平某事役所縻在官如前未由趨慰其於憂想無任下誠平交以下如前謹奉狀伏惟鑒察平交如前不備平交如前謹狀月日具位姓名狀上某位服前平交云服次封皮重封同前祖父母亡答人啟狀謂非承重者伯叔父母姑兄姊弟妹妻子姪孫同某啟家門凶禍伯叔父母姑兄姊弟妹云家門不幸幸妻云私家不幸子姪孫云私門不先祖考祖母云先祖妣兄伯叔父母云幾伯叔父母妹姑云幾家姑姊云幾家兄幾家姊弟云幾舍弟幾舍妹子妻云室人㓜子云小子某姪云從某孫云孫某奄忽棄背兄弟以下云喪逝子子姪孫云􅑈爾天折痛苦摧裂不自勝堪伯叔父母姑兄姊弟妹云摧痛酸苦不自堪忍孫妻改催痛為悲悼子姪改悲悼為悲念伏䝉尊慈特賜慰問哀感之至不任下誠平交降等如前孟春猶寒寒温隨時伏惟恭惟緬惟如前某位尊體起居萬福平交不用起居䧏等但云動止萬福某即日侍奉無父母即不用此句幸免他苦未由面訴徒増哽塞謹奉狀上平交云陳謝不備平交如前謹狀月日某郡姓名狀上某位座前謹空平交如前封皮重封如前劉氏璋曰司馬公云自伯叔父母以下今人多只用平時徃來啟狀止于小簡中言之雖亦可行但裴儀􅃇有此式古人風義敦篤當如此不敢輙刪祭禮四時祭司馬温公曰王制大夫士有田則祭無田則薦註祭以酋時薦以仲月髙氏曰何休云有牲曰祭無牲曰薦大夫牲用羔士牲持豚庶人無常牲春薦韭夏薦麥秋薦黍冬薦稻韭以邯麥以魚黍以豚稲以雁取其新物相宜几庶羞不踰牲若祭以羊則不以牛為羞也今人鮮用牲惟設庶羞而已時祭用仲月前旬卜日孟春下旬之首擇仲月二旬各一日或丁或亥主人盛服立於祠堂中門外西向兄弟立于主人之南少退北上子孫立于主人之後重行西向北上置卓子于主人之前設香爐香盒杯珓及盤于其上主人搢笏焚香熏珓而命以上旬之日曰某将以来月某日諏此歲時適其祖考尚饗即以珓擲于盤以一俯一仰為吉不吉更卜中旬之日又不吉則不復卜而直用下旬之日既得日祝開中門主人以下北向立如朔望之位皆再拜主人升焚香再拜祝執詞跪于主人之左讀曰孝孫某將以来月某日祗薦歳事于祖考卜既得吉敢告用下旬日則不言卜既得吉主人再拜降復位與在位者皆再拜祝闔門主人以下復西向位執事者立于門西皆東面北上祝主于主人之右命執事者曰孝孫某將以来月某日祗薦嵗事于祖考有司還具脩執事者應曰諾乃司馬温公曰孟詵家祭儀用二至二分然今仕宦者職業既繁但時至事暇可以祭則卜筮亦不必亥日及分至也若不暇卜日則止依孟儀用分至于事亦便也問舊當収得先生一本祭儀時祭皆用卜日今問却用二至二分祭是如何朱子曰卜日無定慮有不虔司馬公云只用分至亦可前期三日齊戒前期三日主人帥衆丈人致齊于外主婦帥衆婦女致齊于内沐浴更衣飲酒不得至亂食肉不得茹葷不吊喪不聼樂凡凶穢之事皆不得預司馬温公曰主婦主人之妻也禮舅沒則姑老不與扵祭主人主婦必使長男長婦為之若或自欲與祭則特位于主婦之前叅神畢升立于酒壺之北監視禮儀或老疾不能乆立則休於他所俟受胙復來受胙辭神而已其劉氏璋曰祭義云齊之日思其居處思其笑語思志意思其所樂思其所嗜齊三日乃見其所以為齊者專致思于祭祀也前一日設位陳器主人帥衆丈夫深衣及執事灑掃正寢洗拭椅卓務令蠲潔設髙祖考妣位于西堂北壁下南向考西妣東各用一倚一皁而合之曽祖考妣祖考妣考妣以次而東皆如髙祖之位世各為位不屬祔位皆于東序西向北上或兩序相向其尊者居西妻以下則于階下設香案于堂中置香爐香盦于其上束茅聚沙于香案前及逐位前地上設酒架于東階上别置卓子于其東設酒注一酹酒盞一盤一受胙盤一七一巾一茶盒茶筅茶盞托鹽楪醋瓶于其上火爐湯瓶香匙火筯於西階上别置卓子於其西設祝版於其上設盥盆帨巾各二於阼階下之束其西者有臺架又設陳饌大牀于其東問今人不祭髙祖如何程子曰髙祖自有服不祭甚非某家却祭髙祖又曰自天子至于庶人五服未嘗有異皆至髙祖服既如是祭祀亦須如是祭朱子曰考諸程子之言則以為髙祖有服不可不雖七廟五廟亦止于髙祖雖三廟一廟以至祭寢亦必及於髙祖但有䟽數之不同耳疑此最為得祭祀之本意今以祭法考之雖未見祭必及髙祖之文然有月祭享嘗之别則古者祭祀以逺近為䟽數亦可見矣禮家又言大夫有事省於其君于祫及其髙祖此則可為立三廟而祭及髙祖之驗古人宗子承家主祭仕不出鄉故廟無虚主而祭必於廟惟宗子越在他國則不得祭而庻子居者代之祝曰孝子某使介子某執其常事然猶不敢入廟特望墓為壇以祭蓋其尊祖敬宗之嚴如此今人主祭者逰宦四方或貴仕於朝又非古人越在他國之比則以其田祿脩其薦享尤不可闕不得以身去國而使支子代之也泥古則闇于事情徇俗則無所品節必欲酌其中制適古不今之宜則宗子所在奉二主以從之於事為宜蓋上失萃聚祖考精神之義二主常相從則精神不分矣下使宗子得以田祿薦享祖宗處禮之變而不失其中所謂禮雖先王未之有可以義起者蓋如此但支子所得自主之祭則當留以奉祀不得隨宗子而徙也或謂留影於家奉祀版而行恐精神分散非鬼神所安而支子私祭上及髙曽又非所以嚴大宗之正也兄弟異居廟初不異只合兄祭而弟與執事或以物助之為宜而相去逺者則兄家設主弟不立主只於祭時旋設位以紙榜標記逐位祭畢焚之如此是亦得禮之變也省牲滌器具饌主人帥衆丈夫深衣省牲莅殺主婦帥衆婦女背子滌濯祭器潔釡鼎具祭饌每位果六品蔬菜及脯醢各三品肉魚饅頭糕各一盤羮飯各一碗肝各一串肉各二串務令精潔未祭之前勿令人先食及為猫犬蟲鼠所汚朱子嘗書戒子塾曰吾不孝為先公棄捐不及供飬事先妣四十年然愚無識知所以承顔順色甚有乖戾至今思之常以為終天之痛無以自贖惟有歳時享祀致其謹潔猶是可著力處汝軰及新婦等切宜謹戒凡祭肉臠割之餘及皮毛之屬皆當存之勿令殘穢䙝慢以重吾不孝劉氏璋曰徃者士大夫家婦女皆親滌祭器造祭饌以供祭祀近来婦女驕倨不肯親入庖厨雖家有使令之人效役亦須身親監視務令精潔按古禮有省牲陳祭器等儀今人祭其先祖未必皆殺牲司馬公祭儀用時蔬時果各五品膾生肉炙乾肉羮炒肉殽骨頭軒音獻白肉脯乾脯醢肉醬庶羞珎異之味麫食餅饅頭之􅁼米食糍糕之類共不過十五品今先生品饌異同者蓋恐一時不能辦集或家貧則隨鄉土所有惟蔬果肉麫米食數品亦可祭器簠簋籩豆鼎爼壘洗之類豈私家所有但宜用平日飲食之器滌濯􅃊潔竭其孝敬之心亦足矣厥明夙興設蔬果酒饌主人以下深衣及執事者俱詣祭所盥手設果楪於逐位卓子南端蔬菜脯醢相間次之設盞盤醋于北端盞西楪取東匙筯居中設𤣥酒及酒各一瓶於架上𤣥酒其日井花水充在酒之西熾炭于爐實水于瓶主婦背子炊煖祭饌皆令極􅉯以金盛出置東階下大牀上質明奉主就位主人以下各盛服盥手帨手詣祠堂前衆大夫叙立如告日之儀主婦西階下北向立主人有母則特位于主婦之前諸伯叔母諸姑繼之嫂及弟婦姊妹在主婦之左其長于主母主婦者皆少進子孫婦女内執事者在主婦之後重行皆北向東上立定主人升自阼階搢笏焚香出笏告曰孝孫某今以仲春之月有事于髙祖考某官府君髙祖妣某封某氏曽祖考某官府君曽祖妣某封某氏祖考某官府君祖妣某封某氏考某官府君妣某封某氏以某親某官府君某親某封某氏祔食敢請神主出就正􅃦恭伸奠獻告辭仲夏秋冬各隨其時祖考有無官爵封謚皆如題主之文祔食謂旁親無後者及早逝先亡者無即不言告訖搢笏歛櫝正位祔位各置一笥各以執事者一人捧之主人出笏前道主婦從後卑㓜在後至正􅃦置于西階卓子上主人搢笏啟櫝奉諸考神主出就位主婦盥帨升奉諸妣神主亦如之其祔位則子弟一人奉之既畢主人以下皆降復位參神主人以下叙位如祠堂之儀立定再拜若尊長老疾者休于他所司馬温公曰古之祭者不知神之所在故灌用鬰鬯臭隂逹于淵衆蕭合黍稷臭陽逹于墻屋所以廣求神也今此禮既難行于士民之家故但焚香酹酒以代之北溪陳氏曰廖子晦廣州所刋本降神在參神之前不若臨漳傳本降神在參神之後為得之蓋既奉主于其位則不可虚視其主而必拜而肅之故參神宜居于前至灌則又所以為将獻而親饗其神之始也故降神宜居于後然始祖先祖之祭只設虚位而無主則又當先降而後參亦不容以是為拘降神主人升搢笏焚香出笏少退立執事者一人聞酒取巾拭瓶口實酒于注一人取東階卓子上盤盞立於主人之左一人執注立於主人之右主人搢笏跪奉盤盞者亦跪進盤盞主人受之執注者亦跪斟酒于盞主人左手執盤右手執盞灌于茅上以盤盞授執事者出笏俛伏興再拜降復位問既奠之酒何以置之程子曰古者灌以降神故以茅縮酌謂求神于隂陽有無之間故酒必灌于地若謂奠酒則安置在此今人以澆在地上甚非也既獻則徹去可也張子曰奠酒奠安置也若言奠摯奠枕是也謂注之于地非也天朱子曰酹酒有兩説一用鬰鬯灌地以降神則惟子諸侯有之一是祭酒葢古者飲食必祭今以鬼神自不能祭故代之祭也今人雖存其禮而失其義不可不知問酹酒是少傾是盡傾曰降神是盡傾當楊氏復曰此四條降神酹酒是盡傾三獻奠酒不澆之于地家禮初獻取髙祖妣盞祭之茅上者代神祭也禮祭酒少傾于地祭食于豆間皆代神祭也進饌主人升主婦從之執事者一人以盤奉魚肉一人以盤奉米麫食一人以盤奉羮飯從升至髙祖位前主人搢笏奉肉奠于盤盞之南主婦奉麫食奠于肉西主人奉魚奠于醋楪之南主婦奉米食奠于魚東主人奉羮奠于醋楪之東主婦奉飯奠于盤盞之西主人出笏以次設諸正位使諸子弟婦女各設祔位皆畢主人以下皆降復位初獻主人升詣髙祖位前執事者一人執酒注立于其右冬月即先煖之主人搢笏奉髙祖考盤盞位前東向立執事者西向斟酒于盞主人奉之奠于故處次奉髙祖妣盤盞亦如之出笏位前北向立執事者二人奉髙祖考妣盤盞立于主人之左右主人搢笏跪執事者亦跪主人受髙祖考盤盞右手取盞祭之茅上以盤盞授執事者反之故處受髙祖妣盤盞亦如之出笏俛伏興少退立執事者炙肝于爐以楪盛之兄弟之長一人奉之奠于髙祖考妣前匙筯之南祝取版立于主人之左跪讀曰維年嵗月朔日子孝𤣥孫某官某敢昭告于髙祖考某官府君髙祖妣某封某氏氣序流易時維仲春追感嵗時不勝永慕敢以潔牲柔毛牲用彘則曰剛鬛粢盛醴齊祗薦嵗事以某親某官府君某親某封某氏祔食尚饗畢興主人再拜退詣諸位獻祝如初每逐位讀祝畢即兄弟衆男之不為亞終獻者以次分詣本位所祔之位酌獻如儀但不讀祝獻畢皆降復位執事者以他器徹酒及肝置盞故處罔曽祖前稱孝曾孫考前稱孝子故不勝永慕爲昊天極祔凡祔者伯叔祖父祔于髙祖伯叔父祔于曽祖兄弟于祖子孫祔于考餘皆倣此如本位無即不言以某親祔食字祖考無宫及改夏秋冬皆已見上楊氏復曰司馬公書儀主人升自阼階詣酒注所西向立執事一人左手奉曽祖考酒盞右手奉曽祖妣酒盞一人奉祖考妣酒盞一人奉考妣酒盞皆如髙祖考妣之次就主人所主人搢笏執注以次斟酒執事者奉之徐行反置故處主人出笏詣曽祖考妣神座前北向執事者一人奉曽祖考酒盞立于主人之左一人奉曽祖妣酒盞立于主人之右主人搢笏跪取曽祖考妣酒酹之授執事者盞反故處乃讀祝此其禮與虞禮同家禮則主人升詣神位前主人奉祖考妣盤盞一人執注立于其右斟酒此則與虞禮異窃詳虞禮神位維一時祭則神位多家禮主人升詣神位前奉盤盞位前東向立執事者斟酒主人奉之奠于故處次奉祖妣盤盞亦如之如此則禮嚴而意専若書儀則時祭與虞祭同主人詣酒注卓子前執事者左右手奉兩盤盞則其禮不嚴主人執注盡斟諸神位酒則其意不専此家禮所以不用書儀之禮而又以義起之也亞獻主婦為之諸婦女奉炙肉及分獻如初獻儀但不讀祝朱子曰祭禮主人作初獻未有主婦則弟得為亞獻弟婦為終獻楊氏復曰按亞獻如初儀潮州所刋家禮云惟不祭酒于茅潮本所云不祭酒于茅是乎曰所謂祭酒于茅者為神祭也古者飲食必祭及祭祖考祭外神亦為神祭少牢饋食禮主人初獻尸尸祭酒而後啐酒卒爵主婦亞獻尸尸祭酒而後卒爵賔長三獻尸尸祭酒而後卒爵士虞特牲禮亦然凡三獻尸皆祭酒為神祭也郷射大射獲者獻侯先右箇次中次左箇皆祭酒為侯祭也以此觀之三獻皆當祭酒扵茅潮本葢或者以意改之故與他本不同失之矣終獻兄弟之長或長男或親賓為之衆子弟奉炙肉反分獻如亞獻儀侑食主人升搢笏執注就斟諸位之酒皆滿立于香案之東南主婦升扱匙飯中西柄正筯立于香案之西南皆北向再拜降復位闔門主人以下皆出祝闔門無門處即降簾可也主人立于門東西向衆丈夫在其後主婦立于門西束向衆婦女在其後如有尊長則少休于他所此所謂獻也楊氏復曰士虞禮無尸者祝闔牖户如食間註如尸一食九飯之傾也又曰祝聲三啟户註聲者噫歆也今祭即無尸故須設此儀啓門祝聲三噫歆乃啟門主人以下皆入其尊長先休于他所者亦入就位主人主婦奉茶分進于考妣之前祔位使諸子弟婦女進之受胙執事者設席于香案前主人就席北面祝詣髙祖考前舉酒盤盞詣主人之右主人跪祝亦跪主人搢笏受盤盞祭酒啐酒祝取匙并盤抄取諸位之飯各少許奉以詣主人之左嘏于主人曰祖考命工祝承致多福于汝孝孫來汝孝孫使汝受祿于天宜稼于田眉夀永年勿替引之主人置酒于席前出笏俛㐲興再拜搢笏跪受飯嘗之實于左袂掛袂于季指取酒卒飲執事者受盞自右置注旁受飯自左亦如之主人執笏俛伏興立于東階上西向祝立于東階上東向告利成降復位與在位者皆再拜主人不拜降復位劉氏璋曰韓魏公家祭云凡祭飲福受胙之禮久已不行今但以祭餘酒饌命親屬長幼分飲食之可也辭神主人以下皆再拜納主主人主婦皆升各奉主納于櫝主人以笥歛櫝奉歸祠堂如來儀徹主婦還監徹酒之在盞注他器中者皆入于瓶緘封之所謂福酒果蔬肉食並傳于燕器主婦監滌祭器而藏之餕是日主人監分祭胙品取少許置于盒并酒皆封之遣僕執書歸胙于親友遂設席男女異處尊行自為一列南面自堂中東西分首若止一人則當中而坐其餘以次相對分東西向尊者一人先就生衆男敘立世為一行以東為上皆再拜子弟以長者一人少進立執事者一人執注立于其右一人執盤盞立于其左獻者搢笏跪弟獻則尊者起立子姪則坐受注斟酒反注受盞祝曰祀事既成祖考嘉饗伏願某親備膺五福保族宜家授執盞者置于尊者之前長者出笏尊者舉酒畢長者俛伏興退復位與衆男皆再拜尊者命取注及長者之盞置于前自斟之祝曰祀事既成五福之慶與汝曹共之命執事者以次就位斟酒皆徧長者進跪受飲畢俛伏興退立衆男進揖退立飲長者與衆男皆再拜諸婦女獻女尊長於内如衆男之儀但不跪既畢乃就坐薦肉食諸婦女詣堂前獻男尊長夀男尊長酢之如儀衆男詣中堂獻女尊長夀女尊長酢之如儀乃就坐薦麫食内外執事者各獻内外尊長夀如儀而不酢遂就斟在坐者徧俟皆舉乃再拜退遂薦米食然後泛行酒間以祭饌酒饌不足則以他酒他饌益之将罷主人頒胙于外僕主婦頒胙于内執事者徧及微賤其日皆盡受者皆再拜乃徹席楊氏復曰司馬温公書儀曰禮祭事既畢兄弟及賓迭相獻酬有無筭爵所以因其接㑹使之交恩定好優勸之今亦取此儀凡祭主於盡愛敬之誠而已貧則稱家之有無疾則量筋力而行之財力可及者自當如儀初祖惟繼始祖之宗得祭問始祖之祭朱子曰古無此伊川先生以義起某當初也祭後來覺得似僭今不敢祭始祖之祭似禘先祖之祭似祫今皆不敢祭冬至祭始祖程子曰此厥初生民之祖也冬至一陽之始故象其類而祭之前期三日齋戒如時祭之儀前期一日設位主人衆丈夫深衣帥執事者灑掃祠堂滌濯器具設神位于堂中間北壁下設屏風于其後食牀于其前陳器設火爐于堂中設炊烹之具于束階下盥東炙具在其南束茅以下並同時祭主婦衆婦女背子帥執事者滌濯祭器潔釡鼎具果楪六盤三杅六小盤三盞盤匙筯各二脂盤一酒注酹酒盤盞一受胙盤匙一以按比本合用古祭器今恐私家或不能辦且用今器從簡便神位用薄薦加草席皆有縁或用紫褥皆長五尺濶二尺有半屏風如枕屏之制足以圍席三面食牀以版為面長五尺闊三尺餘四圍亦以版髙一尺二寸二寸之下乃施版面皆黑漆具饌晡時殺牲主人親割毛血為一盤首心肝肺為一盤脂雜以蒿為一盤皆腥之左胖不用右胖前足為三段脊為三段脅為三條後足為三段去近竅一節不用凡十二體飯米一杅置于一盤蔬果各六品均肝一小盤切肉一小盤厥明夙興設蔬果酒饌主人深衣帥執事者設𤣥酒瓶於架上酒注酹酒盤盞受胙盤匙各一于東階桌子上祝版及脂盤于西階卓子上匙筯各一于食牀北端之東西相去二尺五寸盤盞各一于筯西果在食牀南端蔬在其北毛血腥盤切肝肉皆陳于階下饌牀上米實階下炊具中十二體實烹具中以火㸑而熟之盤一杅六置于饌牀上質明盛服就位如時祭儀降神叅神主人盥升奉脂盤詣堂中爐前跪告曰孝孫某今以冬至有事于始祖考始祖妣敢請尊靈降居神位恭伸奠獻遂燎脂于爐炭上俛伏興少退立再拜執事者開酒主人跪酹酒于茅上如時祭之儀劉氏璋曰茅盤用甆匾盂廣一尺餘或黑漆小盤截茅八寸餘作束束以紅立于盤内進饌主人升詣神位前執事奉毛血腥肉以進主人受設之於蔬北西上執事者出熟肉置于盤奉之以進主人受設之腥盤之東執事者以杅二盛飯杅二盛肉湆不和者又以杅二盛肉湆以菜者奉以進主人受設之飯在盞西大羮在盞東鉶羮在大羮東皆降復位初獻如時祭之儀但主人既俛伏興兄弟炙肝加鹽實于小盤以從祝詞曰維年嵗月朔日子孝孫姓名敢昭告于初祖考初祖妣今以仲冬陽至之始追惟報本禮不敢忘謹以潔牲柔毛粢盛醴齊祇薦嵗事尚饗亞獻如時祭之儀但衆婦炙肉加鹽以從終獻如時祭及上儀侑食闔門啓門受胙辭神徹餕並如時祭之儀先祖繼始祖髙祖之宗得祭繼始祖之宗則自初祖而下繼髙祖之宗則自先祖而下立春祭先祖程子曰初祖以下髙祖以上之祖也立春生物之始故象其類而祭之前三日齋戒如祭始祖之儀前一日設位陳器如祭初祖之儀但設祖考神位于堂中之西祖妣神位于堂中之東蔬果楪各十二大盤六小盤六餘並同問祭禮立春云祭髙祖而上只設二位若古人祫祭須是逐位祭朱子曰本是一氣若祠堂中各有牌子則不可春諸侯有四時之祫畢竟是祭有不及處方如此如秋有事于太廟太廟便是羣祧之主皆在其中具饌如祭初祖之儀但毛血為一盤首心為一盤肝肺為一盤脂蒿為一盤切肝兩小盤切肉四小盤餘並同厥明夙興設蔬果酒饌如祭初祖之儀但每位匙筯各一盤盞各二置階下饌牀上餘並同質明盛服就位降神叅神如祭始祖之儀但告詞改始為先餘並同進饌如祭初祖之儀但先詣祖考位瘞毛血奉首心前足上二節脊三節後足上一節次詣祭妣位奉肝肺前足一節脅三節後足下一節餘並同初獻如祭初祖之儀但獻兩位各俛伏興當中少位兄弟炙肝兩小盤以從祝詞改初為先仲冬陽至為立春生物餘並同亞獻終獻初祭祖祖之儀但從炙肉各二小盤侑食闔門啓門受胙辭神徹餕並如祭初祖儀禰繼禰之宗以上皆得祭惟支子不祭季秋祭禰程子曰季秋成物之始亦象其類而祭之前一月下旬卜日如時祭之儀惟告辭改孝孫為孝子又改祖考妣為考妣若母在則只云考而告于本龕之前餘並同前三日齋戒前一日設位陳器如時祭之儀但止于正寢合設兩位于堂中兩上香案以下並同具饌如時祭之儀二分厥眀夙興設蔬果酒饌如時祭之儀質眀盛服詣祠堂奉神主出就正寢如時祭扵正寝之儀但告詞云孝子某今以季秋成物之始有事于考某官府君妣某封某氏叅神降神進饌初獻如時祭之儀但祝辭云孝子某官某敢昭告扵考某官府君妣某封某氏今以季秋成物之始感時追慕昊天㒺極餘並同亞獻終獻侑食闔門啟門受胙辭神納主徹餕並如時祭之儀朱子曰某家舊時時祭外有冬至立春季秋三祭後以冬至立春二祭以僭覺得不安遂已之季秋依舊祭禰而用某生日祭之適值某生日在季秋忌日前一日齋戒如祭禰之儀設位如祭禰之儀但止設一位陳器如祭禰之儀具饌如祭禰之饌一分厥眀夙興設蔬果酒饌如祭禰之儀質眀主人以下變服禰則主人兄弟黪紗幞頭黪布衫布裏角帶祖以上則黪紗衫旁親則皁紗衫主婦特髻去飾白大衣淡黄帔餘人皆去華盛之服問忌日何服朱子曰某只著白絹涼衫黪巾問黪巾以何為之曰紗絹皆可某以紗又問黪巾之制曰如帕複相似有四隻帶若當幞頭然然楊氏復曰先生母夫人忌日著黪墨布衫其巾亦問今日服色何謂曰豈不聞君子有終身之喪詣祠堂奉神主出就正寢如祭禰之儀但告辭云今以某親某官府君逺諱之辰敢請神主出就正寢恭伸追慕餘並同叅神降神進饌初獻如祭禰之儀但祝辭云嵗序遷易諱日復臨追逺感時不勝永慕考妣改不勝永慕為天㒺極旁親云諱日復臨不勝感愴若考妣則祝興主人以下哭則盡哀餘並同亞獻終獻侑食闔門啟門並如祭禰之儀但不受胙辭神納主徹並如祭禰之儀但不器是日不飲酒不食肉不聴樂黲巾素服素帶以居夕寢于外墓祭三月上旬擇日前一日齋戒如家祭之儀饌墓上毎分如時祭之品更設魚肉米麺食各一大盤以祭后土之神厥明洒掃主人深衣帥執事者詣墓所再拜奉行塋域内外環繞哀省三周其有草棘即用刀斧鋤斬蒦夷洒掃訖復位再拜又除地于墓左以祭后土布席陳饌用新潔席陳于墓前設饌如家祭之儀叅神降神初獻如家祭之儀但祝辭云某親某官府君之墓氣序流易雨露既濡瞻掃封塋不勝感慕餘並同亞獻終獻並以子弟親朋薦之辭神乃徹遂祭后土布席陳饌四盤于席南端設盤盞匙筋于其北餘並同上降神參神三獻同上但祝辭云某官某名敢昭告于后土氏之神某恭修嵗事于某親某官府君之墓惟時保佑實頼神休敢以酒饌敬伸奠獻尚饗辭神乃徹而退朱子曰祭儀以墓祭莭祠為不可然先正皆言墓祭不害義理又莭物所尚古人未有故止于時祭今人時莭随俗燕飲各以其物祖考生存之日盖嘗用之今子孫不廢此而能恝然于祖宗乎改塟須告廟而後告墓方啟墓以塟塟畢奠而歸又告廟哭而後畢事方穏當行塟更不必出主祭告時却出主于寢力祭祀之禮亦只得依本子做誠敬之外别未有著䖏也籩豆簠簋之器乃古人所用故當時祭享皆用之今以燕器代祭器常饌代俎肉楮錢代幣帛是亦以平生所用是謂從宜也嘗書戒子云比見墓祭土神之禮全然滅裂吾甚懼焉既為先公託體山林而祀其主者豈可如此今後可與墓前一様菜果鮓脯飯茶湯各一器以盡吾寧親事神之意勿令其有隆殺劉氏璋曰周元陽祭録曰唐開元勑許寒食上墓同拜掃禮若拜掃非寒食則先期卜日古者宗子去他國庶子無廟孔子許望墓為壇以時祭祀即今之寒食上墓義或有慿依不卜日耳今或覊宦寓于他邦不及此時拜掃松檟則寒食在家亦可祠祭慕夫人死之後塟形于原野之中與世隔純孝子追之心何有限極當寒暑變移之際益用増感是宜省謁墳墓以寓時思之敬今寒食上墓之祭雖禮經無文世代相𫝊寖以成俗上自萬乗有上陵之禮下逮庶人有上墓之祭田野道路士友徧滿皁𨽻庸丐之徒皆得以登父母丘壠馬醫夏畦之鬼無有不受子孫追養者凡祭祀品味亦稱人家貧富不貴豐腆貴在修潔罄極誠慤而已事亡如事存祭祀之時此心致敬常在乎祖宗而祖宗洋洋如在安得不格我之誠而歆我之祀乎黄氏瑞莭曰南軒張氏次司馬公張子程子三家之書為冠昏䘮祭禮五卷家禮盖叅三家之説酌古今之宜而大意隠然以宗法為主不可以弗講也然禮書之備有儀禮經傳集解亦朱子所輯次云性理大全書卷二十一

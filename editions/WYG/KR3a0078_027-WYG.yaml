body:
  text: 性理大全書卷二十七理氣二天文日月程子曰日月之為物隂陽發見之尤盛者也日月之在天猶人之有目目無背見日月無背照也天地日月一也月受日光而日不為之虧然月之光乃日之光也日月薄蝕而旋復者不能奪其常也或問日月有定形還自氣散别有聚否曰此理甚難曉究其極則此二說歸于一也問月有定魄而日逺於月月受日光以人所見為有盈虧然否曰日月一也豈有日髙於月之理月若無盈虧何以成嵗葢月一分光則是魄虧一分也問日蝕有常數者也然治世少而亂世多豈人事乎曰天人之理甚微非燭理明其孰能識之曰無乃天數人事交相勝負有多寡之應耶曰似之未易言也朱子曰月體常圓無闕但常受日光為明初三四是日在下照月西邊明人在這邊望只見在弦光十五六則日在地下其光由地四邊而射出月被其光而明月中是地影月古今人皆言有闕惟沈存中云無闕月無盈闕人看得有盈闕葢晦日則月與日相疊了至初三方漸漸離開去人在下面側看見則其光闕至朢日則月與日正相對人在中間正看見則其光方圓程子謂日月只是氣到寅上則寅上自光氣到卯上則卯上自光者亦未必然旣曰日月則自是各有一物方始各有一名星光亦受於日但其體微爾五星之色各異觀其色則金木水火之名可辨衆星光芒閃爍五星獨不如此衆星亦皆左旋唯北辰不動在北極五星之傍一小星是也葢此星獨居天軸四面如輪盤環繞旋轉此獨為天之樞紐是也日月薄蝕只是二者交㑹處二者緊合所以其光掩没在朔則為日蝕在朢則為月蝕卲康節謂日太陽也月太隂也星少陽也辰少隂也辰非星也又曰辰弗集於房房者舎也故十二辰亦謂之十二舎上辰字謂日月也所謂三辰北斗去辰爭十二來度日蝕是日月㑹合處月合在日之下或反在上故蝕月蝕是日月正相照伊川謂月不受日光意亦相近葢隂盛亢陽而不少讓陽故也又曰日月㑹合故初一初二月全無光初三漸開方微有弦上光是哉生明也開後漸有光至朢則相對故圓此後復漸相近至晦則復合故暗月之所以虧盈者此也厯家舊說月朔則去日漸逺故魄死而明生旣朢則去日漸近故魄生而明死至晦而朔則又逺日而明復生所謂死而復育也此說誤矣若果如此則未朢之前西近東逺而始生之明當在月東旣朢之後東近西逺而未死之明却在月西矣安得未朢載魄於西旣朢終魄於東而遡日以為明乎故唯近世沈括之說乃為得之葢括之言曰月本無光猶一銀丸日耀之乃光耳光之初生日在其傍故光側而所見纔如鈎日漸逺則斜照而光稍滿大抵如一彈丸以粉塗其半側視之則粉處如鈎對視之則正圓也近嵗王普又補其說月生明之夕但見其一鈎至日月相朢而人處其中方得見其全明必有神人能凌倒景傍日月而往參其間則雖弦晦之時亦復見其全明而與朢夕無異耳以此觀之則知月光常滿但自人所立處視之有偏有正故見其光有盈有虧非旣死而復生也若顧兔在腹之間則世俗桂樹蛙兔之𫝊其惑久矣或者以為日月在天如兩鏡相照而地居其中四傍皆空水也故月中微黒之處乃鏡中大地之影略有形似而非真有是物也斯言有理足破千古之疑矣或問弦朢之義曰上弦是月盈及一半如弓之上弦下弦是月虧了一半如弓之下弦又問是四分取半否曰如二分二至也是四分取半因說厯家謂紓前縮後近一逺三以天之圍言之上弦與下弦時日月相看皆四分天之一問月本無光受日而有光蔡季通云日在地中月行天上所以光者以日氣從地四傍周圍空處迸出故月受其光曰若不如此月何緣受得日光方合朔時日在上月在下則月面向天者有光向地者無光故人不見及至朢時月面向人者有光故見其圓滿若至弦時所為近一逺三只合有許多光又曰月常有一半光月似水日照之則水面光倒射壁上乃月照也問月中黒影是地影否曰前軰有此說看來理或有之然非地影乃是地形倒去遮了他光耳如鏡子中被一物遮住其光故不甚見也葢日以其光加月之魄中間地是一塊實底物事故光照不透而有此黒暈也問日光從四邊射入月光何預地事而礙其光曰終是被這一塊實底物事隔住故微有礙耳問月受日光只是得一邊光曰日月相㑹時日在月上不是無光光都載在上面一邊故地上無光到得日月漸漸相逺時漸擦挫月光漸漸見於下到得朢時月光渾在下面一邊朢後又漸漸光向上去日蝕是為月所掩月蝕是與日爭敵月饒日些子方好無蝕厯家謂日光以朢時遥奪月光故月蝕日月交㑹日為月掩則日蝕然聖人不言月蝕日而以有蝕為文者闕於所不見問日月隂陽之精氣所謂終古不易與光景常新者其判别如何非以今日已昳之光復為來日將升之光固可略見大化無息而不資於已散之氣也然竊嘗觀之日月虧蝕隨所蝕分數則光没而魄存是魄常在而光有聚散也所謂魄者在天豈有形質耶或乃氣之所聚而所謂終古不易者耶曰日月之說沈存中筆談中說得好日蝕時亦非光散但為物掩耳若論其實須以終古不易者為體但其光氣常新耳然亦非但一日一箇葢頃刻不停也問自古以日月之蝕為災異如今厯家却自預先算得是如何曰只大約可算亦自有不合處厯家有以為當蝕而不蝕者有以為不當蝕而蝕者問月蝕如何曰至明中有暗虚其暗至微朢之時月與之正對無分毫相差月為暗虚所射故蝕雖是陽勝隂畢竟不好若隂有退避之意則不相敵而不蝕矣或問日蝕之變精於數者皆於數十年之前知之以為人事之所感召則天象亦當與時盈虧潛室陳氏曰日月交㑹日為月掩則日蝕日月相望月與日亢則月蝕自是行度分道到此交加去處應當如是厯家推算專以此定踈宻本不足為變異但天文才遇此際亦為隂陽厄會於人事上必有災戻故聖人畏之側身修行庶幾可弭災戻也西山眞氏曰月太隂也本有質而無光其盈虧也以受日光之多少月之朔也始與日合越三日而明生八日而上弦其光半十五日而朢其光滿此所謂三五而盈也旣朢而漸虧二十三日而下弦其虧半三十日而晦其光盡此所謂三五而闕也方其晦也是謂純隂故魄存而光泯至日月合朔而明復生焉魯齋許氏曰天地隂陽精氣為日月星辰日月不是有輪郭生成只是至精之氣到處便如此光明隂精無光故逺近隨日所照日月行有度數人身血氣周流亦有度數天地六氣運轉亦如是到東方便是春到南方便是夏行到處便主一時日行十二時亦然萬物都隨他轉過去便不屬他臨川呉氏曰古今人率謂月盈虧葢以人目之所覩者言而非月之體然也月之體如彈丸其遡日者常明常明則常盈而無虧之時當其朢也日在月之下而月之明向下是以下之人見其體之盈及其弦也日在月之側自下而觀者僅得見其明之半於是以弦之月為半虧及其晦也日在月之上而月之明亦向上自下而觀者悉不見其明之全於是以晦之月為全虧儻能飛步太虚傍觀于側則弦之月如朢乗凌倒景俯視于上則晦之月亦如朢月之體常盈而人之目有所不見以目所不見而遂以為月體之虧可乎知在天有常盈之月則知人之曰盈曰虧皆就所見而言爾曾何損於月哉星辰程子曰北辰不動只不動便是為氣之主故為星之最尊者張子曰五緯五行之精氣也所以知者以天之星辰獨此五星動以色言之又有驗以心取之亦有此理朱子曰帝坐惟在紫微者據北極七十二度常見不隠之中故有北辰之號而常居其所葢天形運轉晝夜不息而此為之樞如輪之轂如磑之臍雖欲動而不可得非有意於不動也若太微之在翼天市之在尾攝提之在亢其南距赤道也皆近其北距天極也皆逺則固不容於不動而不免與二十八宿同其運行矣故其或東或西或隠或見各有定數仰而觀之葢無晷刻之或停也今曰是與在紫微者皆居其所而為不動者四則是一天而四樞一輪而四轂一磑而四臍也分寸一移則其輻裂而瓦碎也無日矣若之何而能為運轉之無窮哉此星家淺事不足深辨然或𫝊冩之誤則不可以不正也緯星是隂中之陽經星是陽中之隂葢五星皆是地上木火土金水之氣上結而成却受日光經星却是陽氣之餘凝結者疑得也受日光但經星則閃爍開闔其光不定緯星則不然縱有芒角其本體之光亦自不動細視之可見水星貼著日行故半月日見天道左旋日月星並左旋星不是貼天天是隂陽之氣在上面下人看見星隨天去耳星有墮地其光燭天而散者有變為石者横渠言日月五星亦隨天轉如二十八宿隨天而定皆有光芒五星逆行而動無光芒問星辰有形質否曰無只是氣之精英凝聚者或云如燈光否曰然問極星只在天中而東西南北皆取正於極而極星皆在其上何也曰只是極星便是北而天則無定位南極上下七十二度常隠不見唐書說有人至海上見南極下有數大星甚明此亦在七十二度之内或問北辰曰北辰是天之樞紐中間些子不動處緣人要取此為極不可無箇記認所以就其傍取一小星謂之極星天之樞紐如門簨子相似又似箇輪藏心藏在外面動心却不動又問極星動不動曰極星也動只是他近那辰故雖動而不覺如射糖盤子様北辰便是中心樁子極星便是樁底㸃子雖是也隨盤轉緣近樁子便轉得不覺向來人說北極便是北辰皆只說北極不動至本朝人方推得是北極只在北辰邊頭而極星依舊動雷電程子曰電者隂陽相軋雷者隂陽相擊也問人有死於雷霆者無乃素積不善常歉然於其心忽然聞震則懼而死乎曰非也雷震之也然則雷孰使之曰夫為不善者惡氣也赫然而震者天地之怒氣也相感而相遇故也曰雷電相因何也曰動極則陽形也是故鑚木戞竹皆可以得火夫二物者未嘗有火也以動而取之故也擊石火出亦然惟金不可以得火至隂之精也然軋磨旣極則亦能熱矣陽未嘗無也或問雷霆何為而然者有形耶有神耶致堂胡氏曰古人未之言也然先達大儒亦嘗明其理矣葢天地之間無非隂陽聚散闔闢之所為也可以神言不可以形論非如異端所謂龍車石斧鬼鼓火鞭怪誕之難信也故其言曰隂氣凝聚陽在内而不得出則奮擊而為雷霆雖聖人復起不能易矣凡聲陽也光亦陽也光發而聲隨之陽氣奮擊欲出之勢也電緩小則震亦緩小電迅大則震亦迅大震電交至則必有雨震而不電電而不震則無雨由隂氣凝聚之有疎緩迅密也曰世人所得雷斧者何物也曰此猶星隕而為石也本乎天者氣而非形偶隕于地則成形矣然而不盡然也曰雷之破山壊廟折樹殺人者何也曰先儒以為隂陽之怒氣也氣鬱而怒方爾奮擊偶或值之則遭震矣然而不盡然也曰電之閃爍激疾如金蛇飛騰之状何謂也曰光之發也惟光耳適映雲際則如是不當乎雲之際而在同雲之中則無是矣凡天地造化之迹茍不以理推之必入于幻怪偽誕之說而終不能明故君子窮理之為要也朱子曰雷如今之爆杖葢鬱積之極而迸散者也雷雖只是氣但有氣便有形如蝃蝀本只是薄雨為日所照成影然亦有形能吸水吸酒人家有此或為妖或為祥或問程子謂雷電只是氣相摩軋是否曰然或以為有神物曰氣聚則須有然纔過便散如雷斧之類亦是氣聚而成者但已有查滓便散不得此亦屬成之者性張子云其來也㡬微易簡其究也廣大堅固即此理也問十月雷鳴曰恐發動了陽氣所以大雪為豐年之兆者雪非豐年葢為凝結得陽氣在地來年發達生長萬物問雷者隂陽擊搏之氣然有時而擊人是豈氣之所為乎且擊人之時有所謂石與火又有書背字曰某人有此惡者豈其氣又有神物主之耶南軒張氏曰横渠有言陽在内者為隂氣所䝉而不得出則震擊而為雷霆葢雷霆是天地間義氣人為不善又適與之感㑹則雷震之有所謂火者氣之擊搏自有火生也有所謂石斧者氣之墜則為石星隕亦然若所謂書字則無是理曰神物主之者繆悠之說也問雷者隂陽二氣相摩而成聲春秋有所謂震夷伯之廟不知隂陽二氣亦能震物也耶潛室陳氏曰雷震固是隂陽相搏而成聲然以隂陽之怒氣與沴氣適相值故震要之此等隂陽自虚而有自氣而形自聲而發皆摩盪之甚也故人或見其形或拾其物此二氣極摩盪處小而言之則人間之灼火大而言之則虹霓之氣化若蛟龍之生物皆無而為有也西山真氏曰雷霆雖威初非為殺物設也易稱鼓萬物者莫疾乎雷其與日之烜雨之潤風之散同於生物而已世人惡戻之氣適與之㑹而震死者有之非雷霆求以殺之也風雨雪雹霜露程子曰長安西風而雨終未曉此理須是自東自北而風則雨自南自西則不雨何者自東自北皆屬陽坎卦本陽陽唱而隂和故雨自西自南隂也隂唱則陽不和蝃蝀之詩曰朝隮于西崇朝其雨是陽來唱也故雨易言密雲不雨自我西郊言自西則是隂先唱也故雲雖密而不雨今西風而雨恐是山勢使然雹者隂陽相搏之氣葢沴氣也聖人在上無雹雖有不為災朱子曰風只如天相似不住旋轉今此處無風葢或旋在那邊或旋在上面都不可知如夏多南風冬多北風此亦可見雨如飯甑有葢其氣蒸鬱而汗下淋漓則為雨如飯甑不葢其氣散而不收則為霧龍水物也其出而與陽氣交蒸故能成雨但尋常雨自是隂陽氣蒸鬱而成非必龍之為也密雲不雨尚往也葢止是下氣上升所以未能雨必是上氣蔽葢無發洩處方能有雨横渠正蒙論風雷雲雨之說最分曉虹非能止雨也而雨氣至是已薄亦是日色射散雨氣了雪花所以必六出者葢只是霰下被猛風拍開故成六出如人擲一團爛泥於地泥必䟎開成稜瓣也又六者隂數大隂𤣥精石亦六稜葢天地自然之數伊川說世間人說電是蜥蜴做初恐無是理看來亦有之只謂之全是蜥蜴做則不可耳自有是上面結作成底也有是蜥蜴做底昔聞王參議云嘗登五臺山見蜥蜴含水吐之為雹及夷堅志載劉法師嘗在隆興府西山見多蜥蜴如手臂大一日無限入井中飲水皆盡即吐為電葢蜥蜴形狀亦如龍是隂屬是這氣相感應使作得他如此正是隂陽交争之時所以下雹時必寒今雹之兩頭皆尖有稜疑得初間圓上面隂陽交争打得如此碎了雹字從雨從包是這氣包住所以為雹也霜只是露結成雪只是雨結成古人說露是星月之氣不然今髙山頂上雖晴亦無露露只是自下蒸上人言極西髙山上亦無雨雪髙山無霜露却有雪某甞登雲谷晨起穿林薄中並無露水沾衣但見煙霞在下茫然如大洋海衆山僅露峯尖煙雲環繞往來山如移動天下之竒觀也或問髙山無霜露其理如何曰上面氣漸清風漸緊雖微有霧氣都吹散了所以不結若雪則只是雨遇寒而凝故髙寒處雪先結也或問伊川云露是金之氣如何曰露自是有清肅之氣古語云露結為霜今觀之誠是然露氣與霜氣不同露能滋物而霜殺物也雪霜亦有異霜能殺物而雪不殺物也雨與露不同雨氣昏而露氣清也露與霧不同露氣肅而霧氣昏也天氣降而地氣不接則為霧地氣升而天氣不接則為雺勉齋黄氏曰隂陽和則雨澤作詩不云乎習習谷風以隂以雨亦以隂陽和而雨春之所以雨多者以當春之時地氣上騰天氣下降故蒸滃而成雨秋亦然夏則陽亢冬則隂過是以多晴隂陽程子曰隂陽之氣有常存而不散者日月是也有消長而無窮者寒暑是也老氏言虚能生氣非也隂陽之開闔相因無有先也無有後也可謂今日有陽而後明日有隂則亦可謂今日有形而後明日有影也隂陽於天地間無截然為隂為陽之理須去參錯然一箇升降生殺之分不可無也冬至一陽生却須􅈝寒正如欲曉而反暗也隂陽之際亦不可截然不相接厮侵過便是道理天地之間如是者極多艮之為義終萬物始萬物此理最妙須玩索這箇理潛室陳氏曰大率隂陽消長之理一氣不頓消不頓長欲消之氣却侵帶些在初長之中初長之氣却侵帶些在欲消之中大凡寒暑晦明之交接頭處須兩下侵帶些所以艮居八卦之中宜只是止萬物然分於東北之間一頭接坎之殺氣固是終萬物一頭接震之生氣又為始萬物葢震豈能頓生惟於殺氣未盡之時已是侵帶些子氣了故至震方發生也早梅冬至已前發方一陽未生然則發生者何也其榮其枯此萬物一箇隂陽升降大節也然逐枝自有一箇榮枯分限不齊此各有一乾坤也各自有箇消長只是箇消息惟其消息此所以不窮至如松柏亦不是不彫只是後彫彫得不覺怎少得消息方夏生長時却有夏枯者則冬寒之際有發生之物何足怪也問張子云隂陽之精互藏其宅然乎曰此言甚有味由人如何看水離物不得故水有離之象火能入物故火有坎之象五峯胡氏曰觀日月之盈虚知隂陽之消息觀隂陽之消息知聖人之進退延平李氏曰隂陽之精散而萬物得之凡麗于天附于地列于天地之兩間聚有類分有群生者形者色者莫不分繫於隂陽陽以燥為性以竒為數以剛為體其為氣炎其為形圓浮而明動而吐皆物於陽者也隂以濕為性以耦為數以柔為體其為氣􅈵其為形方沈而晦静而翕皆物於隂者也朱子曰隂陽是氣五行是質有這質所以做得物事出來五行雖是質他又有五行之氣做這物事方得然却是隂陽二氣截做這五箇不是隂陽外别有五行如十千甲乙甲便是陽乙便是隂五行相為隂陽又各自為隂陽天地統是一箇大隂陽一年又有一年之隂陽一月又有一月之隂陽一日一時皆然隂陽只是一氣陽之退便是隂之生不是陽退了又别有箇隂生隂陽做一箇看亦得做兩箇看亦得做兩箇看是分隂分陽兩儀立焉做一箇看只是一箇消長隂陽各有清濁偏正隂陽之理有㑹處有偏處隂陽只是一氣隂氣流行即為陽陽氣凝聚即為隂非直有二物相對也隂陽生殺固無間斷而亦不容並行天地間無兩立之理非隂勝陽即陽勝隂無物不然無時不然寒暑晝夜君子小人天理人欲隂陽不可分先後說陽氣只是六層只管上去上盡後下面空闕處便是隂方其有陽那裏知道有隂天地間只是一箇氣自今年冬至到明年冬至是他一氣周布把來切做兩截時前面底便是陽後面底便是隂又切做四截也如此便是四時天地間只有六層陽氣到地面上時地下便冷了只是這六位陽長到那第六位時極了無去處上面只是漸次消了上面消了些箇時下面便生了些箇那便是隂這只是箇嘘吸嘘是陽吸是隂喚做一氣固是如此然看他日月男女牝牡處方見得無一物無隂陽如至微之物也有箇背面若說流行處却只是一氣盈天地之間所以為造化者隂陽二氣之終始盛衰而已陽生於北長於東而盛於南隂始於南中於西而終於北故陽常居左而以生育長養為功其類則為剛為明為公為義而凡君子之道屬焉隂常居右而以夷傷慘殺為事其類則為柔為暗為私為利而凡小人之道屬焉以隂陽善惡論之則隂陽之正皆善也其沴皆惡也以象類言則陽善而隂惡以動静言則陽客而隂主又曰天地之間隂陽而已以人分之則男女也以事言之則善惡也何適而不得其類哉隂陽有相對言者如夫婦男女東西南北是也有錯綜言者晝夜春夏秋冬弦朢晦朔一箇間一箇輥去是也問自十一月至正月方三陽是陽氣自地上而升否曰然只是陽氣既升之後看看欲絶便有隂生隂氣将盡便有陽生其已升之氣便散矣所謂消息之理其來無窮又問雷出地奮豫之後六陽一半在地上一半在地下是天與地平分否曰若謂平分則天却包著地在此不必論魯齋許氏曰萬物皆本於隂陽要去一件去不得天依地地附天如君臣父子夫婦皆然臨川呉氏曰陽本實隂本虚也陽為氣隂為精陽成象隂成形陽主用隂主體則陽反似虚隂反似實是不然天之積氣雖似虚然其氣急勁如鼓皮物之大莫能禦故曰健曰剛曰静專曰動直則實莫實於天地之成形雖似實然其形疎通如肺氣升降出入其中故曰順曰柔曰静翕曰動闢則虚莫虚於地然則陽實隂虛者正說也陽虚隂實者偏説也五行周子曰五行之序以質之所生而言則水本是陽之濕氣以其初動為隂所䧟而不得遂故水隂勝火本是隂之燥氣以其初動為陽所揜而不得達故火陽勝葢生之者微成之者盛生之者形之始成之者形之終也然各以偏勝也故雖有形而未成質以氣升降土不得而制焉木則陽之濕氣浸多以感於隂而舒故發而為木其質柔其性暖金則隂之燥氣浸多以感於陽而縮故結而為金其質剛其性寒土則隂陽之氣各盛相交相搏凝而成質以氣之行而言則一隂一陽往來相代木火金水云者各就其中而分老少耳故其序各由少而老土則分旺四季而位居中者也此五者序若參差而造化所以為發育之具實並行而不相悖葢質則隂陽交錯凝合而成氣則隂陽兩端循環不已質曰水火木金葢以隂陽相間言猶曰東西南北所謂對待者也氣曰木火金水葢以隂陽相因言猶曰東南西北所謂流行者也質雖一定而不易氣則變化而無窮所謂易也程子曰動静者隂陽之本也五氣之運則參差不齊矣或曰五行一氣也其本一物耳曰五物也五物備然後生猶五常一道也無五則亦無道然而既曰五矣則不可混而為一也朱子曰氣之精英者為神金木水火土非神所以為金木水火土者是神在人則為理所以為仁義禮智信者是也金木水火土雖曰五行各一其性然一物又各具五行之理天一自是生水地二自是生火生水只是合下便具得濕底意思木便是生出得一箇輭底金便是生出得一箇硬底五行之說正蒙中說得好又曰木者土之精華也又記曰水火不出於土正䝉一叚說得最好不胡亂下一字水火清金木濁土又濁五行之序木為之始水為之終而土為之中以河圖洛書之數言之則水一木三而土五皆陽之生數而不可易者也故得以更迭為主而為五行之綱以徳言之則木為發生之性水為貞静之體而土又包育之母也故木之包五行也以其流通貫徹而無不在也水之包五行也以其歸根反本而藏於此也若夫土則水火之所寄金木之所資居中而應四方一體而載萬類者也故孔子賛乾之四德而以貞元舉其終始孟子論人之四端而不敢以信者列序於其間葢以為無適而非此也隂以陽為質陽以隂為質水内明而外暗火内暗而外明清明内影濁明外影清明金水濁明火日火中有黒陽中隂也外黒洞洞地而中却明者隂中之陽也故水謂之陽火謂之隂亦得得五行之秀者為人只說五行而不言隂陽者葢做這人須是五行方做得成然隂陽便在五行中所以周子云五行一隂陽也舎五行無别討隂陽處如甲乙屬木甲便是陽乙便是隂丙丁屬火丙便是陽丁便是隂不須更說隂陽而隂陽在其中矣或曰如言四時而不言寒暑爾曰然或問隂陽五行之為性各是一氣所稟而性則一也兩性字同否曰一般又曰同者理也不同者氣也復問這箇莫是木自是木火自是火而其理則一曰且如這箇光也有在硯葢上底也有在墨上底其光則一也問金木水火體質屬土曰横渠說得好只說金與木之體質屬土水與火則不屬土問火附木而生莫亦屬土曰火自是箇虚空中物事問只温暖之氣便是火否曰然正䝉云本曰曲直能旣屈而返伸也金曰從革一從革而不能自返也水火氣也故炎上潤下與隂陽升降土不得而制焉木金者土之華實也其性有水火之雜故木之為物水漬則生火然而不離也葢得土之浮華於水火之交也金之為物得火之精於土之燥得水之精於土之濡故水火相待而不相害爍之反流而不耗也葢得土之精實於水火之際也土也者物之所以成始而成終也地之質也化之終也水火之所以升降物兼體而不遺者也問以質而語其生之序不是相生否只是陽變而助隂故生水隂合而陽盛故生火木金各從其類故在左右曰水隂根陽火陽根隂錯綜而生其端是天一生水地二生火天三生木地四生金到得運行處便水生木木生火火生土土生金金又生水水又生木循環相生又如甲乙丙丁戊己庚辛壬癸都是這箇物事以氣而語其行之序則木火土金水而木火陽也金水隂也此豈即其運用處而言之耶而木火何以謂之陽金水何以謂之隂曰此以四時而言春夏為陽秋冬為隂問木之神為仁火之神為禮如何見得曰神字猶云意思也且如一枝柴却如何見得他是仁只是他意思却是仁火那裏見得他是禮却是他意思是禮問二氣五行造化萬物一闔一闢萬變是生所謂五行之氣即雷風水火之運耶又即二氣之參差散殊者耶先儒謂物物皆具則人之氣禀有偏重者謂之皆具可乎或謂雖物皆具而就五行之中有得其多者有得其少者於此思之殊茫然未曉曰五行之氣如温涼寒暑燥濕剛柔之類盈天地之間者皆是舉一物無不具此五者但其間有多少分數耳隂陽播而為五行五行中各有隂陽甲乙木丙丁火春屬木夏屬火年月日時無有非五行之氣甲乙丙丁又屬隂屬陽只是二五之氣人之生適遇其氣有得清者有得濁者貴賤夀夭皆然故有參差不齊如此李氏希濓曰近見勉齋黄氏論五行多所未解其曰生之序便是行之序而以太極圖解氣質之說為不然以洪範五行一曰二曰為非有次第但言其得數之多寡以夏後繼以秋為火能生金惟其能生是以能尅夫五行一也而以為有生與行之異則誠若近於支離者然天地之間未有不以兩而化成者也以二氣言則互為其根者氣也分隂分陽者質也以五行言則有形體而分峙於昭昭之間者其質也無形體而黙運於㝠㝠之表者其氣也夫豈混然而無别哉故就質而原其生出之始則水火以隂陽之盛而居先木金以隂陽之穉而居後此質之序然也就氣而探其運行之常則木火以陽而居先金水以隂而居後此氣之序然也質雖以氣而成然其體一定而不可易氣雖行乎質之内而其用則循環而不可窮二者相須以成造化今必混而一之則是天地之間不過輪一死局而無經緯錯綜之妙其為造化亦小矣此其一也五行之生同出於隂陽有則俱有誠若不可以次第言然水火者隂陽變合之初氣之至精且盛者也故為五行之先水隂而根於陽火陽而根於隂故水又為火之先也有水火而木金生焉木華而疏金寔而固故木金次於水火而木又為金之先也土則四者之所成終而成始也故次五焉易大𫝊自天一至地十以為五位相得而各有合正指五行生成之數而言按之河圖可見而洪範五行亦以是為次此河圖洛書所以相為經緯也今必削其次第而但以得多寡為說則是以五行之質水木皆陽之所為而無與乎隂火金皆隂之所為而無與乎陽旣乖生成之序復戻變合之㫖所謂五行一隂陽者皆為虚語矣然勉齋亦云初只是一箇水水暖後便是火此兩箇是母木是水之子金是火之子是四者之序亦未嘗無但所謂水暖後便是火與金是火之子亦未詳其義而恐其未安耳按水暖是火葢取旣生魄陽曰䰟之意但二者恐自不同此其二也若火生金之說則尤不可曉若以相生為序則曰木火土金水若以相尅為序則當曰水火金木土未有其四以生相受而其一獨以尅相生也禮運曰播五行於四時周子亦曰五氣順布四時行焉是四時之内固備五行之氣也惟土無定位寄旺於四季辰未戌丑之月土之所旺也土旺則皆可以生金矣然辰未陽也戌丑隂也陽則生隂則成辰未固皆陽也春木之氣盛則土為之傷夏火之氣盛則土為之息故季夏本土旺之月而又加之以火則為尤旺故能生金而為秋此其相生之序豈不瞭然甚明也哉按五行家金生於己葢辰之所生也但孕育方微必至季夏然後成體而為壯耳今但見夏之後便繼以秋思而不得其說遽斷之曰火能生金竊恐其為疎矣月令以中央土繼於季夏之後素問於四時之外以長夏屬土皆是此意與十干之序脗合自炎黄以迄于今未之有改周子朱子葢皆取之今一旦創立孤論以行其獨見愚恐其不合乎造化本然之體也或問氣行於天質具於地則是有氣便有是質氣如是質便如是以氣而語其行之序則木火土金水以質而言其生之序則水火木金土氣之序如此質之序如此潛室陳氏曰五行始生謂太極流行之後自氣而成質自柔而成剛水最柔故居一火差剛故居次至木至金至土則浸堅剛故洪範與易言所生之序皆如是氣則成四時之序即五行之序也臨川呉氏曰十幹十二支之名立而相配為六十不知其所始世𫝊黄帝命大撓作甲子或然也漢之時術家以六十之四十八配周易八純卦之六爻謂之渾天納甲不過以寅卯二支為木巳午二支為火申酉二支為金亥子二支為水辰戌丑未四攴為土而已後世所謂納音者每支五行備而每行周乎十二支幹則否壬癸各二水而四金四木丙丁各二火而四土四水戊己各二土而四木四火庚辛各二金而四木四土甲乙不為木而四火四水四金焉予嘗謂納甲之五行猶先天之卦納音之五行猶後天之卦也且納音始于誰乎五行之上曰某水某火某土某金某木者又始於誰乎疑末世術家猥𤨏之所為也四時朱子曰天有春夏秋冬地有金木水火人有仁義禮智皆以四者相為用也春為感夏為應秋為感冬為應若統論春夏為感秋冬為應明歳春夏又為感只是一箇道理界破看以一歳言之有春夏秋冬以乾言之有元亨利貞以一月言之有晦朔弦朢以一日言之有旦晝暮夜天地只是一箇春氣發生之初為春氣長得過便為夏收歛便為秋消縮盡便為冬明年又復從春處起渾然只是一箇發生之氣魯齋許氏曰長生長春如何長得春夏秋冬寒暑代謝天之道也如春可長亦不足貴矣南北東西是定體相對春夏秋冬是流行運用却便相循環一體一用臨川呉氏曰風木冬春之交北東之維艮震也君火春夏之交東南之維震㢲也相火正夏之時正南之方離也濕土夏秋之交南西之維坤兊也燥金秋冬之交西北之維兊乾也寒水正冬之時正北之方坎也此主氣之定布者也地初正氣子中而丑中震也地後間氣丑中而卯中離也天前間氣卯中而巳中兊也天中正氣巳中而未中乾㢲也天後間氣未中而酉中坎也地前間氣酉中而亥中艮也地終正氣亥中而子中坤也此客氣之加臨者也主氣土居二火之後客氣土行二火之間終艮始艮後天卦位也始震終坤先天卦序也世以歳氣起大寒者似協後天終艮始艮之文然而非也楊子建以嵗氣起冬至者冥契先天始震終坤之義子午歳之冬至起燥金而生丑中之寒水丑未歲之冬至起寒水而生丑中之風木寅申歲起風木卯酉歲起君火辰戌歲起濕土己亥歲起相火皆肇端於子半六氣相生循環不窮豈嵗嵗間斷於𫝊承之際哉然則終始乎艮者可以分主氣所居之位而非可以論客氣所行之序也天地隂陽之運往過來續木火土金水始終終始如環斯循六氣相生之序也歲氣起於子中盡於子中故曰冬至子之半天心無改移子午之嵗始冬至燥金三十日然後襌於寒水以至相火日各六十者五而小雪以後其日三十復終於燥金丑未之嵗始冬至寒水三十日然後禪於風木以至燥金日各六十者五而小雪以後其日三十復終於寒水寅申以下皆然如是六十年至千萬年氣序相生而無間非小寒之末無所於授大寒之初無所於承隔越一氣不相接續而截自大寒為次年初氣之首也此造化之妙内經秘而未發啟元子闕而未言近代楊子建昉推而得之地理潮汐附朱子曰山河大地初生時須尚輭在河圖言崐崘者地之中也素問曰天不足西北地不滿東南註云中原地形西北髙東南下今百川滿湊東之滄海則東西南北髙下可知矣水經云崐崘去嵩山五萬里看來不會如此逺葢中國至于闐二萬里于闐去崐崘無縁更有三萬里文昌雜録記于闐遣使來貢獻使者自言其西千三百餘里即崑崙山今中國在崐崘之東南而天竺諸國在其正南大抵地形如饅頭其撚尖則崐崘也冀都是正天地中間好箇風水山脉從雲中發來雲中正髙脊處自脊以西之水則西流入于龍門西河自脊以東之水則東流入于海前面一條黄河環繞右畔是華山聳立為虎自華來至中為嵩山是為前案遂過去為泰山聳于左是為龍淮南諸山是第二重案江南諸山及五嶺又為第三四重案堯都中原風水極佳左河東太行諸山相繞海島諸山亦皆相向右河南繞直至太山湊海第二重自蜀中出湖南出廬山諸山第三重自五嶺至明越又黑水之類自北纒繞至南海河東地形極好乃堯舜禹故都今晉州河中府是也左右多山黄河繞之嵩華列其前河東河北皆繞太行山堯舜禹所都皆在太行下太行山一千里河北諸州皆旋其趾潞州上黨在山脊最髙處過河時便見太行在半天如黒雲然上黨即今潞州春秋赤狄潞氏即其地也以其地極髙與天為黨故曰上黨上黨太行山之極髙處平陽晉州蒲坂山之盡頭堯舜之所都也河東河北諸州如太原晉陽等處皆在山之兩邊窠中山極髙濶伊川云太行千里一塊石山後是忻代諸州泰山却是太行之虎山或問平陽蒲坂自堯舜後何故無人建都曰其地磽瘠不生物人民朴陋儉嗇故惟堯舜能都之後世侈泰如何都得前代所以都關中者以黄河左右旋繞所謂臨不測之淵是也近東獨有函谷關一路通山東故可據以為險又關中之山皆自蜀漢而來至長安而盡他錄作關中之山皆自西而東若横山之險乃山之極髙處横山皆黄石山不生草木東南論都所以必要都建康者以建康正諸方水道所湊一望則諸要害地都在面前有相應處臨安如入屋角房中坐視外面殊不相應武昌亦不及建康然今之武昌非昔之武昌呉都武昌乃今武昌縣地勢廹窄只恃前一水為險耳鄂州正今之武昌亦是好形勢上可以通關陜中可以向許洛下可以通山東若臨安進只可通得山東及淮北而已天下之山西北最髙自關中一支生下函谷以至嵩少東盡泰山此是一支又自嶓冡漢水之北生下一支至揚州而盡江南諸山則又自岷山分一支以盡乎兩浙閩廣大凡兩山夾行中間必有水兩水夾行中間必有山江出岷山岷山夾江兩岸而行那邊一支去為江北許多去處這邊一支為湖南又一支為建康又一支為福建二廣岷山之脈其一支為衡山者已盡於九江之西其一支又南而東度桂嶺者則包湘源而北經袁潭之境以盡於廬阜其一支又南而東度庾嶺者則包彭蠡之源以北盡於建康其一支則又東包淛江之源而北其首以盡㑹稽南其尾以盡乎閩粤也仙霞嶺在信州分水之右其脊脈發去為臨安又發去為建康江西山皆自五嶺贑上來自南而北故皆逆閩中却是自北而南故皆順閩中之山多自北來水皆東南流江淛之山多自南來水多北流故江淛冬寒夏熱荆襄山川平曠得天地之中有中原氣象為東南交㑹處耆舊人物多最好卜居但有變則正是兵交之衝蔡伯靖言山本同而末異水本異而末同西北地至髙地之髙處又不在天之中地有絶處唐太宗收至骨利幹置堅昆都督府其地夜易曉夜亦不甚暗葢當地絶處日影所射也其人髪皆赤至鐵勒則又北矣極北之地人甚少所傳有二千里松木禁人斫伐此外龍蛇交雜不可去通鑑說有人適外國夜熟一羊胛而天明此是地之角尖處日入地下而此處無所遮蔽故常光明及從東出而為曉其所經遮蔽處亦不多耳自古無人窮至北海想北海只挨著天殻邊過緣北邊地長其勢北海不甚濶地之下與地之四邊皆海水周流地浮在水上與天接天包水與地海那岸便與天接或疑百川赴海而海不溢曰葢是乾了有人見海邊作旋渦吸水下去者海水無邊那邊只是氣蓄得在海水未甞溢者莊周所謂沃焦土是也栁子云歸墟之泄非出之天地之外也但水入於東而復繞於西又滲縮而升乃復出於髙原而下流於東耳此其說亦近似矣然以理驗之則天地之化往者消而來者息非以往者之消復為來者之息也水流東極氣盡而散如沃焦釜無有遺餘故歸墟尾閭亦有沃焦之號非如未盡之水山澤通氣而流注不窮也女真起處有鴨綠江𫝊云天下有三處大水曰黄河曰長江并鴨綠是也若以浚儀與潁川為中則今之襄漢淮西等處為近中問周公定豫州為天地之中東西南北各五千里今北邊無極而南方交趾便際海道里長短敻殊何以云各五千里曰此但以中國地段四方相去言之未說到極邊與際海處南邊雖近海然地形則未盡如海外有島夷諸國則地猶連屬彼處海猶有底至海無底處地形方盡周公以土圭測天地之中則豫州為中而南北東西際天各逺許多至於北逺而南近則地形有偏爾所謂地不滿東南也禹貢言東西南北各二千五百里不知周公何以言五千里今視中國四方相去無五千里想他周公且恁大說教好看如堯舜所都冀州之地去北方甚近是時中國土地甚狹想只是略覊縻至夏商已後漸漸開闢如三苖只在今洞庭彭蠡湖湘之間彼時中國已不能到三苗所以也負固不服東萊吕氏曰關中是形勢之地洛是都㑹之中欲據形勢須都關中欲施政令須都洛問阻三面而守之以一面東制諸候此關中之形勢然漢髙道南陽過酈祈以叩武關而關中無擊柝之限旣而從山東之師稍益以關中之士固守謹關而項羽破圍入之及其領漢蜀之封地形少痿矣乃由故道以定三秦之壤夫以天險不可升之勢而楚漢分争之始或自東南而入武關或自西南而抵陳倉或自東方而越殽函何耶潛室陳氏曰自古入關有三道一自河北入為正道項羽漢光武安禄山一自河南入為間道漢髙祖桓温檀道濟劉裕一自蜀入為險道漢髙祖關中由中道入巴蜀為漢王已而又從此路出定關中諸葛亮亦從此出師關中雖號天險豈無可入之道第不比他戰場可長驅而進耳聞巴蜀四塞非進取之地惟一江陵然諸葛亮不勸先主都之及關羽之危又不聞救之何也曰江陵屬荆州武侯首陳取荆州之䇿先主不能用其後争之於呉而不得呉止分數郡以與之至關羽之敗并數郡而失之况得而都之邪况荆襄為南北咽喉在三國為必争之地乃戎馬之場非帝之都也九峯蔡氏曰河北諸山根本脊脈皆自代北寰武嵐憲諸州乘髙而來其脊以西之水則西流以入龍門西河之上流其脊以東之水則東流而為桑乾幽冀以入于海其西一支為壺口太岳次一支包汾晉之源而南出以為析城王屋而又西折以為雷首又次一支乃為太行又次一支乃為恒山此大河北境之山也其江漢南境之山則岷山之脈其北一支為衡山而盡於洞庭之西其南一支度桂嶺北經袁筠之地至徳安之敷淺原二支之間湘水間斷衡山在湘水西南敷淺原在湘水東北孔氏以為衡山之脈連延而為敷淺原者非也臨川呉氏曰天下之山脈起於崐崘山脈之所起即水原之所發也水之發自崐崘者其原為最逺惟中國之河為然漢之發原於嶓冡江之發原於岷山以西視他水亦可謂逺而非極於山脈初起之處則不得與河原並也故天下有原之水河為第一古人祭川先河後海重其原也程子曰今夫海水潮日出則水涸是潮退也其涸者已無也月出則潮水復生却不是將已涸之水為潮水自然能生也以下論潮汐邵子曰海潮者地之喘息也所以應月者從其類也朱子曰潮汐之說余襄公言之尤詳大抵天地之間東西為緯南北為經故子午卯酉為四方之正位而潮之進退以月至此位為節耳以氣之消息言之則子者隂之極而陽之始午者陽之極而隂之始卯為陽中酉為隂中也余襄公安道曰潮之漲退海非增減葢月之所臨則水往從之日月右轉而天左轉一日一周臨於四極故月臨卯酉則水漲乎東西月臨子午則潮平乎南北彼竭此盈往來不絶皆繫於月何以知其然乎夫晝夜之運日東行一度月行十三度有竒故太隂西没之期常緩於日三刻有竒潮之日緩其期率亦如是自朔至朢常緩一夜潮自朢而晦復緩一晝潮朔朢前後月行差疾故晦前三日潮勢長朔後三日潮勢大朢亦如之月弦之際其行差遲故潮之去來亦合沓不盡盈虚消息一之於月隂陽之所以分也夫春夏晝潮常大秋冬夜潮常大葢春為陽中秋為隂中歲之有春秋猶月之有朔朢也故潮之極漲常在春秋之中潮之極大常在朔朢之後此又天地之常數也潮之遲速大小自有常舊見明州人說月加子午則潮長自有此理沈存中筆談說亦如此謂月在地子午之方初一卯十五酉問晦翁謂月加子午則潮長未識其說潛室陳氏曰此說不可曉今海居者但云月上潮長月落潮退誠驗其言是乃月加卯酉方位非子午也朔日之潮可驗朔日月與日會日才出卯方即潮長才入酉方即潮又長是月與日相隨出没古洲馬氏曰禮祀日曰朝致月曰夕江海之水朝生為潮夕至為汐日太陽也厯一次而成月月太隂也合於日以起朔隂陽消息晦朔弦朢潮汐應焉由朔至朢明生而為息自朢及晦魄見而為消水隂物也而生於陽潮汐依日而滋長隨月而漸移日起於朔月盈於朢一朔一朢天西運一周有竒月東行迎日之所次月合於地下之中則日之所次也故潮平于地下之中而㑹於月潮於寅則汐於申潮於巳則汐於亥兩辰而盈兩辰而縮日百刻刻為三分時得八刻三分刻之一周天三百六十五度四分度之一分十二次次得三十度八十分度之三十五日行一度月行十三度有竒漸逺於日故潮汐之期浸移日後六刻三分刻之一一朝夕而再至故一晦朔而再周朔後三日明生而潮壯朢後三日魄見而汐湧每歳仲春月落水生而汐微仲秋月明水落而潮倍減於大寒極隂而凝弱於大暑畏陽而縮隂陽消長不失其時故曰潮信性理大全書卷二十七

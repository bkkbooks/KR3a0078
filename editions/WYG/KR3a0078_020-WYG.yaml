body:
  text: 性理大全書卷二十家禮三喪禮初終疾病遷居正寢凡疾病遷居正寝内外安静以俟氣絶男子不絶於婦人之手婦人不絶於男子之手既絶乃哭司馬温公曰疾病謂疾甚時也近世孫宣公臨薨遷于外寝葢君子謹終不得不爾也髙氏曰廢牀寝於地注人始生在地故廢牀寝於地庻其生氣之復也本出儀禮及禮記喪大記劉氏璋曰凡人病危篤氣㣲難節乃屬纊以俟氣絶纊乃今之新綿易為搖動置口鼻之上以為候也復侍者一人以死者之上服嘗經衣者左執領右執要自前榮升屋中雷北靣招以衣三呼曰某人復畢卷衣降覆尸上男女哭擗無數䄂上服謂有官則公服無官則襕衫皂衫深衣婦人大背子呼某人者從生時之號司馬温公曰士喪禮復者一人升自前東榮中屋北靣招以衣曰皋某復三注皋長聲也今升屋而號慮其驚衆但就寝庭之南男子稱名婦人稱字或稱官封或依常時所稱髙氏曰今淮南風俗民有暴死則使數人升其居室及於路傍遍呼之亦有蘓活者豈復之餘意歟劉氏璋曰喪大記曰凡復男子稱名女人稱字復聲必三者禮成於三也立喪主凡主人謂長子無則長孫承重以奉饋奠其與賓客為禮則同居之親且尊者主之司馬温公曰奔喪曰凡喪父在父為主註與賓客為禮宜使尊者父没兄弟同居各主其喪註各為妻子之喪為主也者親同長者主之註昆弟之喪宗子主之不同親主之註從父昆弟之喪也雜記曰姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親弗主夫若無族矣則前後家東西家無有則里尹主之喪大記曰喪有無後無無主若子孫有喪而祖父主之子孫執喪祖父拜賓主婦謂亡者之妻無則主喪者之妻䕶喪以子弟知禮能幹者為之凡喪事皆禀之司書司貨以子弟或吏僕為之乃易服不食妻子婦妾皆去冠及上服被髪男子扱上衽徒跣餘有服者皆去華餙為人後者為本生父母及女子已嫁者皆不被髪徒跣諸子三日不食期九月之喪三不食五月三月之喪再不食親戚隣里為糜粥以食之尊長强之少食可也扱上衽謂揷衣前襟之帶華餙謂錦繡紅紫金玉珠翠之類治棺䕶喪命匠擇木為棺油杉為上栢次之土杉為下其制方直頭大足小僅取容身勿令髙大及為虚簷髙足内外皆用灰漆内仍用瀝加青溶㵼厚半寸以上以煉熟秫米灰鋪其㡳厚四寸許七星板底四隅各釘大鐵環動則以大索貫而舉之必司馬温公曰棺欲厚然太厚則重而難以致逺又不髙大占地使壙中寛易致催毁宜深戒之椁雖聖人所制自古用之然板木嵗乆終歸腐爛徒使壙中寛大不能牢固不若不用之為愈也孔子𦵏鯉有棺而無椁又者許貧者還𦵏而無椁今不欲用非為貧也乃欲保安亡爾之程子曰雜書有松脂入地千年為茯苓萬年為琥珀説葢物莫乆於此故以塗棺古人已有用之者髙氏曰伊川先生謂棺之合縫以松脂塗之則縫固而木堅註云松脂與木性相入而又利水葢今人所謂瀝青者是也湏以少蚌粉黄蠟清油合煎之乃可用不然則裂矣其棺椁之間亦宜以此灌之胡氏泳曰松脂塗縫之説未然先生𦵏時蔡氏兄弟主用松脂嘗問用黄蠟麻油否答云用油蠟則松脂不得全其性矣此言有理但彭止堂作訓䝉云灌以松脂宜於北方江南用之適為蟻房彭必有攷更詳之劉氏璋曰凡送死之道唯棺與椁為親身之物孝子所宜盡之初喪之日擇木為棺恐倉卒未得其木灰漆亦未能堅完或值署月尸難久留古者國君即位而為稗蒲力切歳一漆之今人亦有生時自為夀器者此乃猶行其道非豫凶事也其木油杉及栢為上母事髙大以圖羙觀惟棺周於身椁周於棺足矣棺内外皆用布裘漆務令堅實余嘗見前人塟墓掩壙之後即以松脂溶化灌於棺外其厚尺餘後為人侵掘松脂歲久凝結愈堅斧斤不能加得免大患今有𦵏者用之可謂宜矣訃告于親戚僚友䕶喪司書為之發書若無則主人自訃親戚不訃僚友自餘書問悉停以書來弔者並須卒哭後答之沐浴襲奠為位飯含執事者設幃及牀遷尸掘坎執事者以韓障卧内侍者設牀於尸牀前縦置之施簀去薦設席枕遷尸其上南首覆以衾掘坎于屏處潔地陳襲衣以桌子陳于堂前東壁下西領南上幅巾一充耳二用白纊如棗核大所以塞耳者也幎目帛方尺二寸所以覆面者也握手用帛長尺二寸廣五寸所以裹手者也深衣一大帶一履二袍襖汗衫袴襪勒帛裹肚之類隨所用之多少楊氏復曰儀禮士喪襲三稱衣單複其曰稱三稱者爵弁服皮弁服禒衣設冐櫜之註云冐韜尸者制如直囊上曰質下曰殺其用之先以殺韜足而上後以質韜首而下齊手君錦冐黼殺綴旁七大夫玄冐黼殺綴旁五士緇冐經殺綴旁三凡冐質長與手齊殺三尺劉氏璋曰古者人死不冠但以帛裹其首謂之掩士喪禮掩練帛廣終幅五尺析其末註掩裹首也析其末為將結於頥下又還結於項中葢以襲歛主於保庇肌體貴於柔軟緊實冠則磊嵬難安况今幞頭以鐵為脚長三四尺帽用漆紗為之上有虛簷置於棺中何由安帖莫若襲以常服上加幅巾深衣大帶及履既合於古又便於事幅巾所以當掩也其制如今之暖㡌深衣帶履自有制度若無深衣帶履止用衫勒帛鞋亦可其幞頭腰帶靴笏俟葬時安於棺上可也之幎日用緇方尺二寸充之以絮四角有繫於後結握手用𤣥纁長尺二寸廣五寸令裏親膚據從手内置之長尺二寸中掩之手纔相對也兩端各有繫先以一端統掔一匝還從上自貫又以一端向上鉤中指反與繞掔者結於掌後節也沐浴飯含之具以桌子陳于堂前西壁下南上錢三實於小箱米二升以新水浙令精實於盌櫛一沭巾一浴巾二上下體各用其一也乃沐浴侍者以湯入主人以下皆出帷外北面侍者沐髪櫛之晞以巾撮為髻抗衾而浴拭以巾剪爪其沐浴餘水并巾櫛棄于坎而埋之襲侍者别設襲牀於幃外施薦席褥枕先置大帶深衣袍襖汗衫袴襪勒帛裹肚之類於其上遂舉以入置浴牀之西遷尸於其上悉去病時衣及復衣易以新衣但未著幅巾深衣履徙尸牀置堂中間卑㓜則各於室中間餘言在堂者放此乃設奠執事者以桌子置脯醢升自阼階祝盥手洗盞斟酒奠於尸東當肩巾之祝以親戚為之劉氏璋曰士喪禮復者降禊齒綴足即奠脯醢與酒於尸東鄭註鬼神無象設奠以慿依之開元禮五品以上如士喪禮六品以下襲而後奠今不以官品髙下沐浴正尸然後設奠於事為宜奠謂斟酒奉至桌上而不酹主人虞祭然後親奠酹巾者以辟塵蠅也主人以下為位而哭主人坐於牀東奠北衆男應服三年者坐其下皆藉以槀同姓期功以下各以服次坐於其後皆西向南上尊行以長㓜坐於牀東北壁下南向西上藉以席薦主婦衆婦女坐於牀西藉以槀同姓婦女以服為次坐於其後皆東向南上尊行以長㓜坐於牀西北壁下南向東上藉以席薦妾婢立於婦女之後别設幃以障内外異姓之親丈夫坐於幃外之東北向西上婦人坐於帷外之西北向東上皆藉以席以服為行無服在後異若内喪則同姓丈夫尊卑坐于幃外之東北向西上姓丈夫坐於帷外之西北向東上薦三年之喪夜則寝於尸旁藉稾枕塊羸病者藉以草可也期以下寢於側近男女異室外親歸家可也乃飯含主人哭盡哀左袒自前扱於腰之右盥手執箱以入侍者一人揷匙於米盌執以從置於尸西徹枕以幎巾入覆面主人就尸東由足而西牀上坐東面舉巾以匙抄米實於尸口之右并實一錢又於左於中亦如之主人襲所袒衣復位侍者卒襲覆以衾加幅巾充耳設幎目納履乃襲深衣結大帶設握手乃覆以衾司馬温公曰古者死之明日小歛又明日大歛顛倒衣裳使之正方束以絞紟韜以衾冐皆所以保其肌體也今世俗有襲而無大小歛所闕多矣然古者士襲衣三稱大夫五稱諸候七稱公九稱小歛尊卑通用十九稱大歛士三十稱大夫五十稱君百稱此非貧者所辦也今從簡易襲用衣一稱小大歛則據死者所有之衣及親友所禭之衣隨宜用之若衣多不必盡用也高氏曰禮士襲衣三稱而子羔之襲也衣三稱孔子之喪公西赤掌殯葬焉襲衣十一稱加朝服一雜記曰士襲九稱葢襲數之不同如此大抵衣衾惟欲其厚耳衣衾之所以厚者豈徒以設餙哉葢人死斯惡之矣聖人不忍言也但制為典禮使厚其衣衾而已今世之襲者不知此意或止用單祫一稱雖富貴之家衣衾畢偹皆不以襲歛又不能謹藏古人遺衣裳必置於靈座既而藏於廟中乃或相與分之甚至輒計直貿易以充喪費徒加功於無用擯財於無謂而所以附其身者曾不之慮嗚呼又孰若用以襲歛而使亡者獲厚芘於九泉之下哉楊氏復曰按高氏一用禮絰而襲歛用衣之多故襲有胃小歛有布絞大歛有布絞布紟所以保其肌體者固矣司馬公欲從簡易而襲歛用衣之少故小歛雖有布絞而襲則無冐大歛則無絞紟此為踈略先生初述家禮皆取司馬公書儀後與學者論禮以高氏喪禮為最善遺命治喪俾用儀禮此可以見其去取折衷之意矣况夫古者襲歛用衣之多故古有禭禮衣服曰禭士喪禮親者禭庻兄弟禭朋友禭又君使人禭今世俗冇襲而無大小歛故禭禮亦從而廢惜哉然欲悉從高氏之説則誠非貧者所能辦冇如司馬公之所慮者但當量其力之所及可也愚故於襲小斂大斂之下悉述儀禮并髙氏之説以備参考靈座魂帛銘旌置靈座設魂帛設􅀈於尸南覆以帕置椅卓其前結白絹為魂帛置倚上設香爐合盞注酒果於卓子上侍者朝夕設櫛頮奉飬之具皆如平生之司馬温公曰古者鑿木為重以主其神今令式亦有然士民之家未嘗識也故用束帛依神謂之魂帛亦古禮之遺意也世俗皆畫影置於魂帛之後男子生時有畫像用之猶無所謂至於婦人生時深居䦌門出則乗輜軿擁蔽其面既死豈可使畫工直入深室揭掩面之帛執筆訾相畫其容貌此殊為非禮又世俗或用冠㡌衣履裝餙如人狀此尤鄙俚不可從也問重朱子曰三禮圖冇畫像可攷然且如司馬公之説亦自合時之宜不必􅂈泥於古也楊氏復曰禮大夫無主者束帛依神司馬公用魂帛葢取束帛依神之意高氏曰古人遺衣裳必置於靈座既而藏於廟中恐當從此説以遺衣裳置於靈座而加魂帛於其上可也立銘旌以絳帛為銘旌廣終幅三品以上九尺五品以下八尺六品以下七尺書曰某官某公之柩無官即隨其生時所稱以竹為杠如其長倚於靈座之右司馬温公曰銘旌設跗立於殯東註跗杠足也其制如傘架不作佛事司馬温公曰世俗信浮屠誑誘於始死及七七日百日朞年再朞除喪飯僧設道塲或作水陸大㑹寫經造像修建塔廟云為死者滅彌天罪惡必生天堂受種種快樂不為者必入地獄剉燒舂磨受無邉波吒之苦殊不知人生含氣血知痛飬或剪𤓰剃髪從而燒斫之已不知苦况扵死者形神相離形則入於黄壤朽腐消滅與木石等神則飄若風火不知何之借使剉燒舂磨豈復知之且浮屠所謂天堂地獄者計亦以勸善而懲惡也茍不以至公行之雖鬼可得而治乎是以唐廬州刺史李舟與妹書曰天堂無則已有則君子登地獄無則已冇則小人入世人親死而禱浮屠是不以其親為君子而為積惡有罪之小人也何待其親之不厚哉就使其親實積惡有罪豈賂浮屠所能免乎此則中智所共知而舉世滔滔信奉之何其易惑而難曉也甚者至有傾家破産然後已與其如此曷若早賣田營墓而葬之乎彼天堂地獄若果有之當與天地俱生自佛法未入中國之前人死而復生者亦有之矣何故無一人誤入地獄見閻羅等十王者耶不學者固不足與言讀書知古者亦可以少悟矣執友親厚之人至是入哭可也主人未成服而來哭者當服深衣臨尸哭盡哀出拜靈座上香再拜遂弔主人相向哭盡哀主人以哭對無辭小歛袒括髪免髽奠代哭厥明謂死之明日執事者陳小歛衣衾以卓子陳於堂東壁下據死者所有之衣隨宜用之若多則不必盡用也衾用複者絞横者三縱者一皆以細布或綵一幅而析其两端為三横者取足以周身相結縱者取足以掩首至足而結於身中髙氏曰襲衣所以衣尸歛衣則包之而已此襲歛之辨也小歛衣尚少但用全幅細布析其末而用之凡歛欲方半在尸下半在尸上故㪚衣有倒者惟祭服不倒凡鋪歛衣皆以絞紟為先小歛美者在内故次布㪚衣後布祭服大歛羙者在外故次布祭服後布㪚衣也歛以衣為主小歛之衣必以十九稱大歛之衣多至五十稱夫既襲之後而歛衣若此之多故非絞以束之則不能以堅實矣凡物束練緊急則細小而堅實夫然故衣衾足以朽肉而形體深秘可以使人之勿惡也今之喪者衣歛既薄絞冐不施懼夫形體之露也遽納之於棺乃以入棺為小歛葢棺為大歛入棺既在始襲之時葢棺又在成服之日則是小歛大歛之禮皆廢矣一楊氏復曰按儀禮士喪小歛衣十九稱絞横三縮廣終幅析其末注云絞所以收束衣服為堅急也以布為之縮縱也横者三幅縱者一幅析其末令可結也設奠設卓子于阼階東南置奠饌及盞注於其上巾之設盥盆帨巾各二于饌東其東有臺者祝所盥也其西無臺者執事者所盥也别以卓子設潔滌盆新拭巾於其東所以洗盞拭盞也此一節至遣並同具括髪麻免布髽麻括髪謂麻䋲撮髻又以布為頭􅔮也免謂裂布或縫絹廣寸自項向前交於額上卻遶髻如著掠頭也髽亦用麻繩撮髻竹木為簮也設之皆於别室設小歛牀布絞衾衣設小歛牀施薦席褥于西階之西鋪絞衾衣舉之升自西階置於尸南先布絞之横者三於下以備周身相結乃布縱者一於上以備掩肯及足也衣或顛或倒但取正方唯上衣不倒乃遷襲奠執事者遷置靈座西南俟設新奠乃去之後凡奠皆放此遂小歛侍者盥手畢尸男女共扶助之遷於小歛牀上先去衴而舒絹疊衣以藉其首仍卷兩端以𥙷兩肩空處又巻衣夾其兩脛取其正方然後以餘衣掩尸左祍不紐裹之以衾而未結以絞未掩其面葢孝子猶俟其復生欲時見其面故也歛畢别覆以衾主人主婦憑尸哭擗主人西向憑尸哭擗主婦束向亦如之凡子於父母憑之父母於子夫於妻執之婦於舅姑奉之舅於婦撫之於昆弟執之凡憑尸父母先妻子後袒括髪免髽於别室男子斬衰者袒括髪齊衰以下至同五世祖者皆袒免於别室婦人髽於别室司馬温公曰古禮袒者皆當肉袒免者皆當露髪今袒者止袒上衣免者惟主人不冠齊衰以下去㡌著頭中加免於其上亦可也婦人髽也當去冠梳髪楊氏復曰小仲變服斬衰者祖括髪今人無袒括一節何也緣世俗以襲為小歛故失此變服一節在禮聞喪奔喪入門詣柩前再拜哭盡哀乃就束方去冠及上服被髮徒跣如始喪之儀詣殯東面坐哭盡哀乃就東方祖括髪又哭盡哀如小歛之儀明日後日朝夕哭猶祖括髪至家四日乃成服夫奔喪禮之變也猶謹其序而况處禮之常可欠小歛一節又無袒括髪乎此則孝子知禮者所當謹而不可忽也還遷尸牀於堂中執事者徹襲牀遷尸其處哭者復位尊長坐卑㓜立乃奠祝帥執事者盥手舉饌升自阼階至靈座前祝焚香洗盞斟酒奠之卑㓜者皆再拜侍者巾之主人以下哭盡哀乃代哭不絶聲大歛厥明小歛之明日死之第三日也日司馬温公曰禮曰三日而歛者俟其復生也三而不生則亦不生矣故以三日為之禮也今貧者喪具或未辦或漆棺未乾雖􅂈三日亦無傷也世俗以隂陽拘忌擇日而歛盛暑之際至有汁出蟲流豈不悖哉執事者陳大歛衣衾以卓子陳於堂東壁下衣無常數衾用有綿者髙氏曰大歛之絞縮者三葢取一幅布裂為三片也横者五葢取布二幅裂為六片而用五也以大歛衣多故每幅三析用之以為堅之急也衾凡二一覆之一藉之楊氏復曰儀禮士喪大歛衣三十稱紟不在筭不必盡用注云紟單被也小歛衣數自天子逹大歛則異矣大歛布絞縮者三横者五設奠具如小歛之儀舉棺入置於堂中少西執事者先遷靈座及小歛奠於旁側役者舉棺以入置於牀西承以兩凳若卑紉則於别室役者出侍者先置衾於棺中垂其裔於四外司馬温公曰周人殯於西階之上今堂室異制或狹小故但於堂中少西而已今世俗多殯於僧舍無人守視徃徃以年月未利踰數十年不葬或為盗賊所發或為僧所棄不孝之罪孰大於此乃大歛侍者與子孫婦女俱盥手掩首結絞共舉尸納於棺中實生時所落齒髪及所剪爪於棺角又揣其空缺處卷衣塞之務令充實不可揺動謹勿以金玉珍玩置棺中啟盗賊心收衾先掩足次掩首次掩左次掩右令棺中平滿主人主婦憑哭盡哀婦人退入幕中乃召匠加葢下釘徹牀覆柩以衣祝取銘旌設跗於柩東復設靈座於故處留婦人兩人守之當司馬温公曰凡動尸舉棺哭擗無算然殯歛之際亦輟哭臨視務令安固不可但哭而已棺按古者大歛而殯既大歛則累􅜘􅂗之今或漆未乾又南方土多螻蟻不可􅂗殯故從其便設靈牀於柩東牀帳薦席屛枕衣被之屬皆如平生時乃設奠如小歛之儀主人以下各歸喪次中門之外擇樸陋之室為大夫喪次斬衰寢苫枕塊不脱經帶不輿人坐焉非時見父母也不及中門齊衰寝席大功以下異居者既殯而歸居宿於外三月而復寝婦人次於中門之内别室或居殯側去帷帳衾褥之華麗者不得輒至男子喪次止代哭者成服厥明大歛之明日死之第四日也五服之人各服其服入就位然後朝哭相弔如儀楊氏復曰三日大歛可以成服矣必四日而後成服何也大歛雖畢人子不忍死其親故不忍據成服必四日而後成服也禮生與來日死與徃日取此義也其服之制一曰斬衰三年斬不緝也衣裳皆用極粗生布旁及下際皆不緝也衣縫向外裳前三幅後四幅縫内向前後不連毎幅作三㡇㡇謂屈其兩邉相著而空其中也衣長􅂈腰足以掩裳上際縫外向背有負版用布方尺八寸綴於領下垂之前當心有衰用布長六寸廣四寸綴於左衿之前左右有辟領各用布方八寸屈其兩頭相著為廣四寸綴於領下在負版兩旁各攙負版一寸兩腋之下有衽各用布三尺五寸上下各留一尺正方一尺之外上於左旁裁入六寸下於右旁裁入六寸便於盡處相望斜裁却以兩方左右相沓綴於衣兩旁垂之向下状如燕尾以掩裳旁際也冠比衣裳用布稍細紙糊為材廣三寸長足跨頂前後裹以布為三㡇皆向右縱縫之用麻䋲一條從額上約之至項後交過前各至耳結之以為武屈冠兩頭入武内向外反出之縫於武武之餘䋲垂下為纓結於頥下首經以有子麻為之其圍九寸麻本在左從額前向右圍之從頂過後以其未加於本上又以繩為纓以固之如冠之制腰經大七寸有餘兩股相交兩頭結之各存麻本㪚垂三尺其交結處兩旁各綴細繩繫之絞帶用有子麻繩一條大半腰經中屈之為兩股各一尺條乃合之其大如絰圍腰從左過後至前乃以其右端穿兩股間而反揷於右在絰之下苴杖用竹髙齊心本在下屨亦粗麻為之婦人則用極粗生布為大䄂長裙葢頭皆不緝布頭􅔮竹釵麻屨衆妾則以背子代大袖凡婦人皆不杖其正服則子為父也其加服則嫡孫父卒為祖若曽髙祖承重者也父為嫡子當為後者也其義服則婦為舅也夫承重則從服也為人後者為所後父也為所後祖承重也夫為人後則妻從服也妻為夫也妾為君也問周制有大宗之禮立嫡以為後故父為長子三年今大宗之禮廢無立嫡之法而子各得以為後則長子少子不異庶子不得為長子三年不必然也父為長子三年亦不可以嫡庻論也朱子曰宗法雖未能立然服制自當從古是亦愛禮存羊之意不可妄有改易也如漢時宗子法已廢然其詔令猶云賜民當為父後者爵一級是此禮猶在也豈可謂宗法廢而庻子皆得為父後者乎楊氏復曰喪服制度惟辟領一節沿襲差誤自通典始按喪服記云衣二尺有二寸葢指衣身自領至腰之長而言之也用布八尺八寸中斷以分左右為四尺四寸者二又取四尺四寸者二中摺以分前後為二尺二寸者四此即尋常度衣身之常法也合二尺二寸者四疊為四重從一角當領處四寸下取方裁入四寸乃記所謂適慱四寸註䟽所謂辟領四寸是也按鄭注云適辟領也則兩物即一物也今記曰適注䟽又曰辟領何為而異其名也辟猶開也從一角當領處取方裁開入四寸故曰辟領以此辟領四寸反摺向外加兩肩上以為左右適故曰適乃䟽所謂兩相向外各四寸是也辟領四寸既反摺向外加兩肩上以為左右適故後之左右各有四寸虚處當脊而相並謂之闊中前之左右各有四寸虛處當肩而相對亦謂之闊中乃䟽所謂闊中八寸是也此則衣身所用布之處與裁之之法也注又云加辟領八寸而又倍之者謂别用布一尺六寸以塞前後之闊中也布一條縱長一尺六寸横闊八寸又縱摺而中分之其下一半裁斷左右兩端各四寸除去不用只留中間八寸以加後之闊中元裁辟領各四寸處而塞其缺當脊之相並處此所謂加辟領八寸是也其上一半全一尺六寸不裁以布之中間從項上分左右對摺向前垂下以加於前之闊中與元裁斷處當肩相對處相接以為左右領也夫下一半加於後之闊中者用布八寸而上一半從頃而下以加前之闊中也又倍之而為一尺六寸焉此所謂而又倍之者是也此則衣領所用之布與裁之之法也古者衣服吉凶異制故衰服領與吉服領不同而其制如此也注又云凡用布一丈四寸者衣身八尺八寸衣領一尺六寸合為一丈四寸也此是用布正數又當少寛其布以為針縫之用然此即衣身與衣領之數若負衰帶下及兩衽又在此數之外矣但領必有祫此布何從出乎曰衣領用布闊八寸而長一尺六寸古者布幅闊二尺二寸除衣領用布闊八寸之外更餘闊一尺四寸而長一尺六寸可以分作三條施於祫而適足無餘欠也通典以辟領為適本用注䟽又自謂喪服記文難曉而用臆説以參之既别用布以為辟領又不言制領所用何布又不計衣身衣領用布之數失之矣但知衣身八尺八寸之外又别用布一尺六寸以為領凡用布共一丈四寸則文義不待辨而自明矣又按喪服記及注云袂二尺二寸縁衣身二尺二寸故左右兩袂亦二尺二寸欲使縱横皆正方也喪服記又云祛尺二寸祛者袖口也袂二尺二寸縱合其下一尺留上一尺二寸以為䄂口也又按喪服記云衣帶下尺縁古者上衣下裳分别上下不相侵越衣身二尺二寸僅至腰而止無以掩裳上際故於衣帶之下用縱布一尺上屬於衣横繞於腰則以腰之闊狹為凖所以掩裳上際而後綴兩衽於其旁也度用指尺中指中節為寸首絰腰絰圍九寸七寸之類亦同恐菅屨儀禮注菅屨非履也家禮云屨以粗麻為之當從儀禮為正髽儀禮妻為夫妾為君女子子在室為父布總箭笄衰三年以家禮參攷之儀禮小歛婦人髽於室以麻為髽家禮小歛婦人用麻繩撮髻為髽其制同儀禮婦人成服布總六寸謂出紒後所垂者六寸箭筓長尺家禮婦人成服布頭􅔮竹釵所謂布頭􅔮即儀禮之布總也所謂竹釵即儀禮之箭笄也凡喪服上曰衰下曰裳儀禮婦人但言衰不言裳者衽婦人不殊裳衰如男子衰下如深衣無帶下尺無夫衰如男子衰未知備負版辟領之制與否下如深衣未知裳用十二幅與否此雖無文可明但衣身必二尺二寸袂必屬幅裳必上屬於衣裳旁兩幅必相連屬此所以衣不用帶下尺裳旁不用衽也今攷家禮則不用此制婦人用大䄂長裙葢頭男子衰服純用古制而婦人不用古制此則未詳儀禮婦人有經帶絰首絰也帶腰帶也圍之大小無明文大約與男子同卒哭丈夫去麻帶服葛帶而首絰不變婦人以葛為首絰而麻帶不變既練男子除絰婦人除帶其謹於絰帶變除之節若此家禮婦人並無絰帶之文當以禮經為正以喪服斬衰傳曰童子何以不杖不能病也婦人何不杖不能病也䟽曰童子不杖此庻童子也問喪云童子當室則免而杖矣謂適子也婦人不杖亦謂童子婦人若成人婦人正杖喪大記云二日子夫人杖五日大夫世婦杖諸經皆有婦人杖又如姑在為夫杖母為長子杖按喪服小記云女子子在室為父母其主喪者不杖則子一人杖鄭云女子子在室亦童子也無男昆弟使同姓為攝主不杖則子一人杖謂長女也許嫁及二十而笄笄為成人成人正杖也是其童女為喪主則亦杖矣愚按家禮用書儀服制婦人皆不杖與問喪喪大記喪服小記不同恨未得質正劉氏璋曰衰服之制前言已載惟裳制則未之詳按司馬温公曰古者五服皆用布以升數為别其以八十縷為一升又衰裳記曰凡衰外削幅裳内削幅幅三袧䟽曰衰外削幅者謂縫之邊幅向外裳内削幅者謂縫之邊幅向内有幅三袧者據裳而言用布七幅幅二尺二寸兩畔各去一寸為削幅則二七十四丈四尺若不辟積其腰中則束身不得就故一幅布凡三處屬之又禮惟斬衰不緝餘衰皆緝之緝必外向所以别其吉服也又杖屨一節按三家禮云斬衰苴杖竹也為父所以杖用竹者父是子之天竹圖亦象天内外有節象子為父亦有内外之痛又貫四時而不變子之為父亦經寒温而不改故用之也菅屨謂以菅草為屨毛𫝊云野菅也已漚為菅又云菅菲外納則周公時謂之屨子夏時謂菲外納者外其餙向外編之也黄氏瑞節曰先生長子塾卒以斷體服斬衰禮謂之加服俗謂之報服也二曰齊衰三年齊緝也其衣裳冠制並如斬衰但用次等麄生布緝其旁及下際冠以布為武及纓首絰以無子麻為之大七寸餘本在右末繫本下布纓腰絰大五寸餘絞帶以布為之而屈其右端尺餘杖以桐為之上圓下方婦人服同斬衰但布用次等為異後皆倣此其正服則子為母也士之庻子為其母同而為父後則降也其加服則嫡孫父卒為祖母若曽髙祖母承重者也母為嫡子當為後者也其義服則婦為姑也夫承重則從服也為繼母也為慈母謂庻子無母而父命他妾之無子者慈已也繼母為長子也妾為君之長子也楊氏復曰按儀禮補服條當增祖父卒而後為祖母後者也為所後者之妻若子也劉氏璋曰齊衰削杖桐也為母按三家禮云桐者言同也取内心悲痛同於父也以外無節象家無二尊外屈於天削之使下方者取母象於地也䟽屨者粗屨也䟽讀如不熟之䟽草也斬衰重而言菅以見草體舉其惡貎齊衰輕而言䟽舉草之總稱也不杖章言麻屨齊衰三月與大功同繩屨小功緦麻輕又没其屨號麻屨注云不用草各凡言杖者皆下本順其性也髙下齊其心其大小如腰絰杖期服制同上但又用次等生布其正服則嫡孫父卒祖在為祖母也其降服則為嫁母出母也其義服則為父卒繼母嫁而已從之者也夫為妻也子為父後則為出母嫁母無服繼母出則無服也楊氏復曰按齊衰杖期恐當添為所後者之妻若子也祖父在嫡孫為祖母也据先生儀禮經傳補服條脩首一條已具齊衰三年下不杖期服制同上但不杖又用次等生布其正服則為祖父母女雖適人不降也庻子之子為父之母而為祖後則不服也為伯叔父也為兄弟也為衆子男女也為兄弟之子也為姑姊妹女在室及適人而無夫與子者也婦人無夫與子者為其兄弟姊妹及兄弟之子也妾為其子也其加服則為嫡孫若曽𤣥孫當為後者也女適人者為兄弟之為父後者也其降服則嫁母出母為其子子雖為父後猶服也妾為其父母也其義服則繼母嫁母為前夫之子從已者也為伯叔母也為夫兄弟之子也繼父同居父子皆無大功之親者也妾為女君也妾為君之衆子也舅姑為嫡婦也楊氏復曰按不杖期注正服當添一條姊妹既嫁相為服也其義服當添一條父母在則為妻不杖也按為人後者為其父母報女子子適人者為其父母此是不杖期大節目何以不書也葢此條在後凡男為人後者與女適人者為其私親皆降一等中故不見於此五月服制同上其正服則為曽祖父母女適人者不降也三月服制同上其正服則為髙祖父母女適人者不降也其義服則繼父不同居者謂先同今異或雖同居而繼父有子已有大功以上親者也其元不同居者則不服楊氏復曰按儀禮補服條當增為所後者之祖父母若子也三曰大功九月服制同上但用稍粗熟布無負版衰辟領首絰五寸餘腰絰四寸餘其正服則為從父兄弟姊妹謂伯叔父之子也為衆孫男女也其義服則為衆子婦也為兄弟子之婦也為夫之祖父母伯叔父母兄弟子之婦也夫為人後者其妻為本生舅姑也楊氏復曰儀禮注云前有衰後有負版左右有辟領孝子哀戚之心無所不在䟽云衰者孝子有哀摧之志負者負其悲哀適者指適縁於父母不念餘事用又按注䟽釋衰負版辟領三者之義惟子為父母之旁親則不用也家禮至大功乃無衰負版辟領者葢家禮乃初年本也後先生之家所行之禮旁親皆無衰負版辟領若此之類皆從後來議論之定者為正大功九月恐當添為同母異父之昆弟也或曰為外祖母也据先生儀禮經傳補服條脩同母異父之昆弟本子游答公叔木之問以同父同母則服期今但同母而是親者血屬故降一等葢㤙繼於母不繼於父若子夏答狄儀以為齊衰則過矣故注䟽家以大功為是外祖母只据魯莊公為齊王􅁎服大功檀弓或曰外祖母也今家禮以外祖父母為小功正服則當以家禮為正以劉氏垓孫曰沈存中説喪服中曽祖齊衰服曾祖上皆謂之曾祖恐是如此如此則皆合有齊衰三月服㸔來髙祖死豈有不為服之禮須合行齊衰三月也伊川頃言祖父母喪須是不赴舉後來不曽行今法令雖無明文㸔來為士者為祖父母期服内不當赴舉今人齊衰用布大細又大功小功皆用苧布恐皆非禮大功須用市中所賣火麻布稍細者或熟麻布亦可小功須用䖍布之屬古者布帛精粗皆用升數所以説布帛精粗不中數不鬻於市今更無此制聼民之所為所以倉卒難得中度者只得買來自以意擇製之耳四曰小功五月服制同上但用稍熟細布冠左縫首絰四寸餘腰絰三寸餘其正服則為從祖祖父從祖祖姑謂祖之兄弟姊妹也為兄弟之孫為從祖父從祖姑謂從祖祖父之子父之從父兄弟姊妹也為從父兄弟之子也為從祖兄弟姊妹謂從祖父之子所謂再從兄弟姊妹者也為外祖父母謂母之父母也為舅謂母之兄弟也為甥也謂姊妹之子也為從母謂從母之姊妹也為同母異父之兄弟姊妹也其義服則為祖祖母也為夫兄弟之孫也為從祖母也為夫從兄弟之子也為夫之姑姊妹適人者不降也女為兄弟姪之妻已適人亦不降也為娣姒婦謂兄弟之妻相名長婦謂次婦曰娣婦娣婦謂長婦曰姒婦也庻子為嫡母之父母兄弟姊妹嫡母死則不服也母出則為繼母之父母兄弟姊妹也為庻母慈巳者謂庻母之乳養己者也為嫡孫若曽𤣥孫之當為後者之婦其姑在則否也為兄弟之妻也為夫之兄弟也楊氏復曰按儀禮補服條當增為所後者妻之父母若子也姑為適婦不為舅後者也諸候為適孫之婦也五曰緦麻三月服制同上但用極細熟布首絰三寸腰絰二寸並用熟麻纓亦如之其正服則為族曾祖父族曾祖姑謂曾祖之兄弟姊妹也為兄弟之曾孫也為族祖父族祖姑謂族曾祖父之子也為從父兄弟之孫也為族父族姑謂族祖父之子也為從祖兄弟之子也為族兄弟姊妹謂族父之子所謂三從兄弟姊妹也為曾孫𤣥孫也為外孫也為從母兄弟姊妹謂從母之子也為外兄弟謂姑之子也為内兄弟謂舅之子也其降服則庻子為父後者為其母而為其母之父母兄弟姊妹則無服也其義服則為族曽祖母也為夫兄弟之曽孫也為族祖母也為夫從兄弟之孫也為族母也為夫從祖兄弟之子也為庻孫之婦也士為庻母謂父妾之有子者也為乳母也為壻也為妻之父母妻亡而别娶亦同即妻之親母雖嫁出猶服也為夫之曾祖髙祖也為夫之從祖祖父母也為兄弟孫之婦也為夫兄弟孫之婦也為夫之從祖父母也為從父兄弟子之婦也為夫從兄弟子之婦也為夫從父兄弟之妻也為夫之從父姊妹適人者不降也為夫之外祖父母也為夫之從母及舅也為外孫婦也女為姊妹之子婦也為甥婦也楊氏復曰當增為同㸑也為朋友也為改𦵏也大夫為貴妾也士為妾有子也按通典漢戴徳云以朋友有同道之恩故加麻三月晉曹述初問有仁人義士矜㓜携養積年為之制服當無疑耶徐邈答曰禮縁情耳同㸑緦朋友麻又按儀禮補服條同㸑謂以同居生於禮可許既同㸑而食合有緦麻之親改葬謂墳墓以他故崩壊将亡失尸柩也言改葬者明棺物毁敗改設之如葬時也此臣為君也子為父也妻為夫也餘無服必服緦者親見尸柩不可以無服緦三月而除之謂𦵏時服之又按通典戴德云制緦麻具而𦵏𦵏而除謂子為父妻妾為夫臣為君孫為祖後者也其餘親皆弔服魏王肅云非父母無服無服則弔服加麻士妾有子而為之緦無子則已謂士卑妾無男女則不服不别貴賤也大夫貴妾雖無子猶服之故大夫為貴妾緦是别貴賤也古劉氏垓孫曰司馬公書儀斬衰古制而功緦又不制此却可疑葢古者五服皆用麻但布有差等皆用冠絰但功緦之絰小耳今人吉服不古而凶服古亦無意思今俗䘮服之制下用横布作襕惟斬衰用不得凡為殤服以次降一等凡年十九至十六為長殤十五至十二為中殤十一至八歲為下殤應服期者長殤降服大功九月中殤七月下殤小功五月應服大功以下以次降等不滿八歲為無服之殤哭之以日易月生未三月則不哭也男子已娶女子許嫁皆不為殤凡男為人後女適人者為其私親皆降一等私親之為之也亦然女適人者降服未滿被出則服其本服已除則不復服也則凡婦服夫黨當䘮而出則除之凡妾為其私親如衆人司馬温公曰喪服小記云為父母喪未練而出則三年既練而出則已未綀而返則期既綀而返則遂之成服之日主人及兄弟始食粥諸子食粥妻妾及期九月䟽食水飲不食菜果五月三月者飲酒食肉不與宴樂自是無故不出若以喪事及不得已而出入則乗樸馬布鞍素轎布簾凡重喪未除而遭輕喪則制其服而哭之月朔設位服其服而哭之既畢返重服其除之也亦服輕服若除重喪而輕服未除則服輕服以終其餘日問從母之夫舅之妻皆無服何也朱子曰先王制禮父族四故由父而上為從曾祖服緦麻姑之子姊妹之子女子之子皆有服皆由父而推之故也母族三母之父母之母母之兄弟恩止於舅故從母之夫舅之妻皆不為服推不去故也妻族二妻之父妻之母乍㸔時似乎雜亂無紀子細㸔則皆有義存焉又言吕與叔集中一婦人墓誌凡遇功緦之喪皆蔬食終其月此可為法問喪禮衣服之類逐時換去如葬後換葛衫小祥後換練布之類今之墨縗可便於出入而不合於禮經如何曰若能不出則不服之亦好但要出外治事則只得服之勉問居喪為尊長强之以酒當如何曰若不得辭則徇其意亦無害但不可至沾醉食已復初可也問坐客有歌唱者如之何曰當起避楊氏復曰心喪三年按儀禮父在為母期注子於母雖為父屈而期心喪猶三年唐前上元元年武后上表請父在為母終三年之喪禮記師心喪三年三今服制令庻子為後者為其母緦亦觧官申心喪年母出及嫁為父後者雖不服申心喪三年喪三年為人後者為其父母不杖期亦觧官申心嫡孫祖在為祖母齊衰杖期雖期除仍心喪三年先生曰喪禮須從儀禮為正如父在為母期非是薄於母只為尊在其父不可復尊在母然亦須心喪三年這般處皆是大項事不是小節目後來都失了而今國家法為所生父母皆心喪三年此意甚好嘗又按先生此書雖自儀禮中出其於國家之法未遺也前章所論為所生父母心喪㮣可見矣五服年月之制既已備載則式假一條恐亦當補入今喪葬假寕格非在職遭喪期三十日大功二十日小功十五日緦麻七日降而絶服三日無服之殤期五日日大功三日小功二日緦麻一日葬期五日大功三小功二日緦麻一日除服期三日大功二日小功緦麻一日在職遭䘮期七日大功五日小功緦麻三日降而絶服之殤一日本宗及同居無服之親之䘮一日改葬期以下親一日私忌在職非在職祖父母父母並一日建事髙曽同朝夕哭奠上食朝奠每日晨起主人以下皆服其服入就位尊長坐哭卑者立哭侍者設盥櫛之具于靈牀側奉魂帛出就靈座然後朝奠執事者設蔬果脯醢祝盥手焚香斟酒主人以下再拜哭盡哀劉氏璋曰凡奠用脯醢者葢古人家常有之如無别具饌數器亦可夫朝夕奠者謂隂陽交接之時思其親也朝奠将至然後徹夕奠夕奠将至然後徹朝奠各用罩子若暑月恐臭敗則設饌如食頃去之止留茶酒果屬仍罩之食時上食如朝奠儀夕奠如朝奠儀畢主人以下奉魂帛入就靈座哭盡哀哭無時朝夕之間哀至則哭於䘮次朔日則於朝奠設饌饌用肉魚麫米食羮飯各一器禮如朝奠之儀問母䘮朔祭子為主朱子曰凡喪父在父為主則父在子無主喪之禮也又曰父没兄弟同居各主其喪注云各為妻子之喪為主也則是凡妻之䘮夫自為主也今以子為喪主似未安髙氏曰若遇朔望節序則具盛饌其品物比朝夕奠差衆禮䟽曰士則月望不盛奠唯朔奠而已楊氏復曰按初喪立䘮主條凡主人謂長子無則長孫承重以奉饋奠今乃謂父在父為主父在子無主喪之禮二説不同何也葢長子主喪以奉饋奠以子為母喪恩重服重故也朔奠則父為主者朔殷奠以尊者為主也喪服小記曰婦之喪虞卒哭其夫若子主之虞卒哭皆是殷祭故其夫主之亦謂父在父為主也朔祭父為主義與虞卒哭同有新物則薦之如上食儀劉氏璋曰孝子之心事死如事生斯湏不忘其親也如遇五榖百果一應新熟之物必以薦之如上奠儀凡靈座之間除金銀酒器之外盡用素器不用金銀錢餙以主人有哀素之心故也弔奠賻凡弔皆素服幞頭衫帶皆以白生絹為之問今弔人用横烏此禮如何朱子曰此是玄冠以弔正與孔子所謂羔裘玄冠不以弔者相反奠用香茶燭酒果有状或用食物即别為文賻用錢帛有状惟親友分厚者有之司馬温公曰東漢徐穉每為諸公所辟雖不就有死喪負笈赴弔嘗於家豫炙雞一隻以一兩綿絮漬酒中暴乾以裹雞徑到所赴家隧外以水漬絮使有酒氣汁米飯白茅為藉以雞置前醊酒畢留謁則去不見喪主然則奠貴哀誠酒食不必豊腆也具刺通名賔主皆有官則具門狀否則名紙題其隂面先使人通之與禮物俱入入哭奠訖乃弔而退既通名喪家炷火燃燭布席皆哭以俟䕶喪出迎賔賔入至㕔事進揖曰竊聞某人傾背不勝驚怛敢請入酹并伸慰禮䕶喪引賔入至靈座前哭盡哀再拜焚香跪酹茶酒俛伏興䕶喪止哭者祝跪讀祭文奠賻状於賔之右畢興賔主皆哭盡哀賔再拜主人哭出西向稽顙再拜賔亦哭東向答拜進曰不意凶變某親某官奄忽傾背伏惟哀慕何以堪處主人對曰某罪逆深重禍延某親伏蒙奠酹并賜臨慰不勝哀感又再拜賔答拜又相向哭盡哀賔先止賔慰主人曰脩短有數痛毒奈何願抑孝思俯從禮制乃揖而出主人哭而入䕶喪送至㕔事茶湯而退主人以下止哭若七者官尊即云薨逝稍尊即云捐館生者官尊則云奄棄榮養存亡俱無官即云色養若尊長拜賔禮亦同此惟其辭各如啟狀之式見卷末司馬温公曰凡弔人者必昜去華盛之服有哀戚之容若賔與亡者為執友則入酹婦人非親戚與其子為執友嘗升堂拜母者則不入酹凡弔及送喪者問其所乏分導營辦貧者為之執綍負土之類母擾及其飲食財貨可也承髙氏曰既謂之奠而乃燒香酹酒則非奠矣世俗習久矣非禮也又曰喪禮賔不答拜凡非弔喪無不答拜者胡先生書儀曰若弔人是平交則落一膝展手䇿之以表半答若孝子尊弔人卑則側身避位候孝子伏次卑者即跪還湏詳緩去就無令跪伏與孝子齊楊氏復曰按程子張子與朱先生後來之説奠謂安置也奠酒則安置於神座前既獻則徹去奠而有酹者初酌酒則傾少酒於茅代神祭也今人直以奠為酹而盡傾之於地非也髙氏之説亦然與此條所謂入酹跪酹似相牴牾葢家禮乃初年本當以後來已定之説為正詳見祭禮降神條又曰按弔禮主人拜賔賔不答拜此何義也葢弔賔來有哭拜或奠禮主人拜賔以謝之此賔所以不答拜也故髙氏書有半答跪還之禮凡禮必有義不可茍也書儀家禮從俗有賔答拜之文亦是主人拜賔賔不敢當乃答拜今世俗弔賔來見几筵哭拜主人亦拜謂代亡者答拜非禮也既而賔弔主人又相與交拜亦非禮也聞喪奔喪治葬始聞親喪哭親謂父母也以哭答使者又哭盡哀問故易服裂布為四脚白布衫繩帶麻屨遂行日行百里不以夜行雖哀戚猶辟害也道中哀至則哭哭避市邑喧繁之處司馬温公曰今人奔喪及從柩行者遇城邑則哭過則止是飾詐之道也望其州境其縣境其城其家皆哭家不在城望其鄉哭入門詣柩前再拜再變服就位哭初變服如初喪柩東西向坐哭盡哀又變服如大小歛亦如之後四日成服與家人相弔賔至拜之如初若未得行則為位不奠設椅子十枚以代尸柩左右前後設位哭如儀但不設奠若喪側無子孫則此中設奠如儀變服亦以聞後之第四日在道至家皆如上儀若喪側無子孫則在道朝夕為位設奠至家但不變服其相弔拜賔如儀若既𦵏則先之墓哭拜之墓者望墓哭至墓哭拜如在家之儀未成服者變服於墓歸家詣靈座前哭拜四日成服如儀已成服者亦然但不變服齊衰以下聞喪為位而哭尊長於正堂卑㓜於别室喪司馬温公曰今人皆擇日舉哀凡悲哀之至在初聞即當哭之何暇擇日但法令有不得於州縣公廨舉哀之文則在官者當哭於僧舍其他皆哭於本家可也若奔喪則至家成服奔喪者釋去華盛之服装辦即行既至齊衰望鄉而哭大功望門而哭小功以下至門而哭入門詣柩前哭再拜或服就位哭弔如儀若不奔喪則四日成服不奔喪者齊衰三日中朝夕為位㑹哭四日之朝成服亦如之大功以下始聞喪為位㑹哭四日成服亦如之皆毎月朔為位㑹哭月數既滿次月之朔乃為位㑹哭而除之其間哀至則哭可也三月而葬前期擇地之可葬者司馬温公曰古者天子七月諸候五月大夫三月士踰月而葬今五服年月敕王公以下皆三月而葬然世俗信葬師之説既擇年月日時又擇山水形勢以為子孫貧富貴賤賢愚夀夭盡繫於此而其為術又多不同爭論紛紜無時可决至有終身不𦵏或累世不𦵏或子孫衰替忘失處所遂棄捐不𦵏者正使殯𦵏實能致人禍福為子孫者亦豈忍使其親􅆨腐暴露而自求其利邪悖禮傷義無遇於此然孝子之心慮患深逺恐淺則為人所抇音骨深則濕潤速朽故必求土厚水深之地而𦵏之所以不可不擇也或問家貧鄉逺不能歸𦵏則如之何公曰子㳺問喪具夫子曰稱家之有無子游曰有無惡音烏乎齊子細切夫子曰有母過禮茍無矣歛手足形還𦵏懸棺而􅉎彼歛切人豈有非之者哉昔亷范千里負喪郭平自賣營基豈待豐富然後𦵏其親哉在禮未𦵏不變服食粥居廬寝苫枕塊葢閔親之未有所歸故寢食不安奈何􅃕之出游食稻衣錦不知其何以為心哉世人又有遊宦没於逺方子孫火焚其柩收燼歸𦵏者夫孝子愛親之肌體故歛而藏之殘毁他人之尸在律猶􅃊况子孫乃悖謬如此其始葢出於羗夷之俗浸染中華行之既乆習以為常見者恬然曽莫之怪豈不哀哉延陵季子適齊其子死𦵏於嬴慱之間孔子以為合禮必也不能歸𦵏𦵏於其地可也豈不猶愈於焚之哉程子曰卜其宅兆卜其地之羙惡也非隂陽家所謂禍福者也地之羙則其神靈安其子孫盛若培壅其根而枝葉茂理固然矣地之惡者則反是然則曷謂地之羙者土色之光潤草木之茂盛乃其驗也父祖子孫同氣彼安則此安彼危則此危亦其理也而拘忌者惑以擇地之方位决日之吉凶不亦泥乎甚者不以奉先為計而專以利後為慮尤非孝子安厝之用心也惟五患者不得不謹須使他日不為道路不為城郭不為溝池不為貴勢所奪不為耕犂所及也一本云所謂五患者溝渠道路避村落逺井窑俗按古者𦵏地𦵏日皆决於卜筮今人不曉占法且從擇之可也擇日開塋域祠后土主人既朝哭帥執事者於所得地掘穴四隅外其壤掘中南其壤各立一標當南門立兩標擇逺親或賔客一人告后土氏祝帥執事者設位於中標之左南向設盞注酒果脯醢於其前又設盥盆帨巾二於其東南其束有䑓架告者所盥其西無者執事者所盥也告者吉服入立於神位之前北向執事者在其後東上皆再拜告者與執事者皆盥帨執事者一人取酒注西向跪一人取盞東向跪告者斟酒反注取盞酹于神位前俛伏興少退立祝執版立於告者之左東向跪讀之曰維某年歲月朔日子某官姓名敢告於后土氏之神今為某官姓名營建宅兆神其保佑俾無後艱謹以清酌脯醢祗薦於神尚饗訖復位告者再拜祝及執事者皆再拜徹出主人若歸則靈座前哭再拜後倣此司馬温公曰莅卜或命筮者擇逺親或賔客為之及祝執事者皆吉冠素服注云非純吉亦非純凶素服者但徹去華采珠金之飾而已遂穿壙司馬温公曰今人𦵏有二法有穿地直下為壙而懸棺以窆者冇鑿隧道旁穿土室而擸柩於其中者按古者唯天子得為隧道其他皆直下為壙而懸棺以窆今當以此為法其穿地宜狹而深狹則不崩損深則盗難近也問合𦵏夫妻之位朱子曰某初𦵏亡室時只存東畔一位亦不曾考禮是如何陳安卿云地道以右為尊恐男當居右曰祭時以西為上則𦵏時亦當如此方是人家墓壙棺槨切不可太大當使壙僅能容槨槨僅能容棺乃善去年此間陳家墳墓遭發掘者皆縁壙中太濶其不能發者皆是壙中狹小無著脚手處此不可不知也此問墳墓山脚低卸故盜易入問墳與墓何别曰墓想是塋域墳即封土隆起者光武紀云為墳但取其稍髙四邊能走水足矣古人墳極髙大壙中容得人行也没意思今法令一品以上墳得髙一丈二尺亦自儘髙矣李守約云墳墓所以遭發掘者亦隂陽家之説有以啓之葢凡發掘者皆以𦵏淺之故若深一二丈自無此患古禮𦵏亦許深曰不然深𦵏有水嘗見興化漳泉間墳墓甚髙問之則曰棺只浮在土上深者僅有一半入地半在地上所以不得不髙其封後來見福州人舉移舊墓稍深者無不有水方知興化漳泉淺𦵏者葢防水爾北方地土深厚深𦵏不妨豈可同也作灰隔穿壙既畢先布灰末於壙底築實厚二三寸然後布石灰細沙黄土拌匀者於其上灰三分二者各一可也築實厚二三尺别用薄板為灰隔如椁之狀内以􅅹青塗之厚三寸許中取容棺墻髙於棺四寸許置於灰上乃於四旁旋下四物亦以薄极隔之炭末居外三物居内如底之厚築之既實則旋抽其板近上復下炭灰等而築之及墻之平而止葢既不用椁則無以容瀝青故為此制又炭禦木根辟水蟻石灰得沙而實得土而黏歲久結而為全石螻蟻盗賊皆不得進也程子曰古人之𦵏欲比化者不使土親膚今竒玩之物尚保藏固宻以防損汙况親之遺骨當何如哉世俗淺識惟欲不見而已又冇求速化之説者是豈知必誠必信之義且非欲求其不化也未化之間保藏當如是爾問槨外可用灰雜沙土否朱子曰只純用炭末置之槨外槨内實以和沙石灰或曰可純用灰否曰純灰恐不實須雜以篩過細沙久之灰沙相乳入其堅如石槨外四圍上下一切實以炭末約厚七八寸許既辟濕氣免水患又截樹根不入樹根遇炭皆生轉去以此見炭灰之妙葢炭是死物無情故樹根不入也抱朴子曰炭入地千年不變問范家用黄泥拌石灰實槨外如何曰不可黄泥久之亦能引樹根又問古人用瀝青恐地氣蒸熱瀝青溶化棺有偏陷却不便曰不曾親見用瀝青利害但書傳間多言用者不知如何以禮壙中用生體之屬久之必潰爛却引蠱蟻非所為亡者慮久逺也古人壙中置物甚多以某觀之禮文之意大備則防患之意反不足要之只當防慮久逺母使土親膚而已其他禮文皆可略也又如古者棺不釘不用漆粘而今灰漆如此堅密猶有蟻子入去何况不使釘漆此皆不可行楊氏復曰先生答廖子晦曰所問𦵏法後來講究木槨瀝青似亦無益但於穴底先鋪炭屑築之厚一寸許其上即鋪沙灰四傍即用炭屑側厚一寸許下與先所鋪者相接築之既平然後安石槨於其上四傍又下三物如前槨底及棺四傍上面復用沙灰實之俟滿加葢復布沙灰而加炭屑於其上然後以土築之盈坎而止葢沙灰以隔螻蟻愈厚愈佳項嘗見籍溪先生説嘗見用灰𦵏者後因遷𦵏則見灰已化為石矣炭屑則以隔木根之自外至者亦里人改𦵏所親見故須令常在沙灰之外四面周密都無縫罅然後可以為固但法中不許用石槨故此不敢用全石只以數片合成庻幾不戾法意耳刻誌石用石二片其一為葢刻云某官某公之墓無官則書其字曰某君某甫其一為底刻云某官某公諱某字某某州某縣人考諱某某官母氏某封某年月日生叙歴官遷次某年月日終某年月日𦵏於某鄉某里某處娶某氏某人之女子男某某官女適某官某人婦人夫在則葢云某官姓名某封某氏之墓無封則云妻夫無官則書夫之姓名夫亡則云某官某公某封某氏夫無官則云某君某甫妻某氏其底叙年若干適某氏因夫子致封號無則否𦵏之日以二石字面相向而以鐵束束之埋之壙前近地面三四尺間葢慮異時陵谷變遷或誤為人所動而此石先見則人有知其姓名者庻能為掩之也造明器刻木為車馬僕從侍女各執奉養之物象平生而小准令五品六品三十事七品八品二十事非陞朝官十五事下帳謂牀帳茵席椅卓之類亦象平生而小苞竹掩一以盛遣奠餘脯劉氏璋曰既夕禮苞二所以裹奠羊豕之肉注云用便昜者謂茅長難用裁取三尺一道編之筲竹器五以盛五穀司馬温公曰今但以小甕貯五榖各五升可也皆劉氏璋曰既夕禮筲三容與簋同盛黍稷麥其實瀹注云皆湛之以湯神之所享不用食道所以為敬甖甆器三以盛酒醯醢穿司馬温公曰自明器以下俟實土及半乃於其旁便房以貯之按此雖古人不忍死其親之意然實非有用之物且脯肉腐敗生蠱娶蟻尤為非便雖不用可也大轝古者桞車制度甚詳今不能然但從俗為之取其牢固平穏而已其法用兩長杠杠上加伏兎附杠處為圓鑿别作小方床以載柩足高二寸旁立兩柱柱外施圓柄令入鑿中長出其外柄鑿之間湏極圓滑以膏塗之使其上下之際柩常適平兩柱近上更為方鑿加横扄扄兩頭出柱外者更加小扄杠兩頭施横杠横杠上施短杠短杠上或更加小杠仍多作新麻大索以備扎縛此皆切要實用不可闕者但如此制而以衣覆棺亦足以少華道路或更欲加飾則以竹為之格以綵結之上如撮蕉亭施帷幔四角垂流蘇而已然亦不可太高恐多罣礙不湏大華徒為觀羙若道路逺决不可為此虚飾但多用油單裹柩以防雨水而已朱子曰某舊為先人飾棺考制度作帷㡛延平先生以為不切而今禮文覺繁多使人難行後聖有作必是裁減了方始行得翣以木為筐如扇而方兩角高廣二尺高二尺四寸衣以白布柄長五尺黼翣畫黼黻翣畫黻畫翣畫雲氣其縁皆為雲氣皆畫以紫准格作主程子曰作主用栗跌方四寸厚一寸二分鑿之洞底以受主身身高一尺二寸博三寸厚寸二分剡上五分為圓首寸之下勒前為頷而判之四分居前八分居後頷下陷中長六寸廣一寸深四分合之植於跌下齊竅其旁以通中圓徑四分居三寸六分之下下距趺面七寸二分以粉塗其前面将司馬温公曰府君夫人共為一櫝按吉者虞主用桑練而後易之以栗今於此便作栗主以從簡便或無栗止用木之堅者櫝用黑漆且容一主夫婦俱入祠堂乃如司馬氏之制程子曰庻母亦當為主但不可入廟子當祀於私室主之制庻則一葢冇法象不可益損益損則不成矣當朱子曰伊川制士庻不用主只用牌子㸔來牌子如古制只不消二片相合及竅其旁以通中且如今人未仕只用牌子到任後不中換了若是士人只用主亦無大利害主式乃伊川先生所制初非朝廷立法固無官品之限萬一繼世無官亦難遽易但繼此不當作耳牌子亦無定制竊意亦湏似主之大小髙下但不為判合陷中可也凡此皆是後賢義起之制今復以意斟酌於古禮未有考也今詳伊川主式書屬稱本注屬謂髙曽祖考稱謂官或號行如處士秀才幾郎幾公之類如此則士庻可通用周尺當省尺七寸五分弱程集與書儀誤注五寸五分弱温公圖以謂三司布帛尺即省尺程沙隨尺即布帛尺今以周尺校之布帛尺正是七寸五分弱然非有聲律髙下之差亦不必屑屑然也得一書為據足矣遷柩朝祖奠賻陳器祖奠發引前一日因朝奠以遷柩告設饌如朝奠祝斟酒訖北面跪告曰今以吉辰遷柩敢告俛伏興主人以下哭盡哀再拜葢古有啓殯之奠今既不塗殯則其禮無所施又不可全無節文故為此禮也楊氏復曰古禮自啓殯至卒哭更有兩變服之節啓殯斬衰男子括髪婦人髽葢小歛括髪髽今啓殯亦見尸柩故變同小歛之節也此是一節今既不塗殯則亦不啓雖不變服可也古禮啓殯之後斬衰男子免至虞卒哭皆􅇠此又是一節開元禮主人及諸子皆去冠絰以斜布巾帕頭亦放古意家禮今皆不用何也司馬公曰自啓殯至於卒哭日數甚多若使五服之親皆不冠而袒免恐其驚俗故但各服其服而已奉柩朝於祖將遷柩役者入婦人退避主人及衆主人輯杖立視祝以箱奉魂帛前行詣祠堂前執事者奉奠及椅卓次之銘旌次之役者舉柩次之主人以下從哭男子由右婦人由左重服在前輕服在後服各為叙侍者在末無服之親男居男右女居女左皆次主人主婦之後婦人皆葢頭至祠堂前執事者先布席役者致柩於其上北首而出婦人去葢頭祝帥執事者設靈座及奠于柩西東向主人以下就位立哭盡哀止此禮蓋象平生将出必辭尊者也楊氏復曰按儀禮朝祖正柩之後遂匠始納載柩之車于階間即家禮所謂大轝也方其朝祖時又别冇輁軸注云輁軸狀如長牀夫輁狀如長牀則僅可承棺轉之以軸輔之以人故得以朝祖既正柩則用夷牀葢朝祖時載柩則有輁軸正柩則有夷牀後世皆闕之今但使役者舉柩柩既重大如何可舉恐非謹之重之之意若但魂帛朝于祖亦失遷柩朝祖之本意恐當從儀禮别制輁軸以朝祖至祠堂前正柩用夷牀北首祝帥執事者設靈座及奠于柩西東向主人以下就位立哭盡哀止輯歛也謂舉之不以拄地也設既夕禮遷于祖正柩于兩楹問席升設于柩西奠如初注奠設如初東面也不統於柩神不西面也不設柩東東非神位也遂遷於㕔事執事者設帷於㕔事役者入婦人退避祝奉魂帛導柩右旋主人以下男女哭從如前詣㕔事執事者布席役者置柩于席上南首而出祝設靈座及奠于柩前南向主人以下就位坐哭藉以薦席乃代哭如未歛之前以至發引親賔致奠賻知初喪儀陳哭方相在前役夫為之冠服如道士執戈揚盾四品以上四目為方相以下兩目為魌頭次明器下帳苞筲甖以牀舁之次銘旌去跗執之次靈車以奉魂帛香火次大轝轝旁有翣使人執之劉氏璋曰司馬温公喪禮陳器篇内於下帳之下有曰上服二字者注云有官則公服靴笏幞頭無官則襕衫鞋履之類又大轝旁有翣貴賤有數庻人無之今書雖不曽載姑附此亦備引用日晡時設祖奠饌如朝奠祝斟酒訖北向跪告曰永遷之禮靈辰不留今奉柩車式遵祖道俛伏興餘如朝夕奠儀而司馬温公曰若柩自他所歸𦵏則行日但設朝奠哭行至𦵏乃備此及下遣奠禮遺奠厥明遷柩就轝轝夫納大轝扵中庭脱柱上横扄執事者徹祖奠祝北向跪告曰今遷柩就轝敢告遂遷靈座置傍側婦人退避召役夫遷柩就轝乃載施肩加楔以索維之令極牢實主人從柩哭降視載婦人哭於帷中載畢祝帥執事者遷靈座于柩前南向司馬温公曰啓殯之日備布三尺以盥濯灰治之布為之祝御柩執此以指麾役者劉氏璋曰儀禮云啇祝拂柩用功布幠火呉切用侇衾注曰啇祝祝習啇禮者啇人教之以敬於接神功布拂去棺上塵土幠覆之為其形露也侇之言尸也侇衾覆尸之衾也乃設遣奠饌如朝奠有脯惟婦人不在奠畢執事者徹脯納苞中置舁牀上遂徹奠楊氏復曰髙氏禮祝跪告曰靈輀既駕徃即幽宅載陳遣禮永訣終天載謂升柩於轝也以新組左右束柩於轝乃以横木楔柩足兩旁使不動揺祝奉魂帛升車焚香别以箱盛主置帛後至是婦人乃葢頭出帷降階立哭守舍者哭辭盡哀再拜而歸尊長則不拜發引柩行方相等前導如陳器之叙主人以下男女哭歩從如朝祖之叙出門則以白幕夾障之尊長次之無服之親又次之賔客又次之皆乗車馬親賔或先待於墓所或出郭哭拜辭歸親賔設幄於郭外道旁駐柩而奠如在家之儀塗中遇哀則哭若墓逺則毎舍設靈座於柩前朝夕哭奠食時上食夜則主人兄弟皆宿柩旁親戚共守衛之及墓下棺祠后土題木主成墳未至執事者先設靈幄在墓道西南向有椅卓親賔次在靈幄前十數歩男東女西次北與靈幄相直皆南向婦人幄在靈幄後壙西方相至以戈擊壙四隅明器等至陳於壙東南北上靈車至祝奉魂帛就幄座主箱亦置帛後遂設奠而退酒果脯醢柩至執事者先布席於壙南柩至脱載置席上北首執事者取銘旌去杠置柩上主人男女各就位哭主人諸丈夫立於壙東西向主婦諸婦女立於壙西幄内東向皆北上如在塗之儀賔客拜辭而歸主人拜之賔答拜乃窆先用木杠横於灰隔之上乃用索四條穿柩底鐶不結而下之至杠上則抽索去之别摺細布若生絹兜柩底而下之更不抽出但截其餘棄之若柩無鐶即用索兜柩底兩頭放下至杠上乃去索用布如前大凡下柩最須詳審用力不可誤有傾墜動揺主人兄弟宜輟哭親臨視之已下再整柩衣銘旌令平正主人贈玄六纁四各長丈八尺主人奉置柩旁再拜稽顙在位者皆哭盡哀家貧或不能具此數則玄纁各一可也其餘金玉寶玩並不得入壙以為亡者之累加灰隔内外葢先度灰隔大小制薄板一片旁距四墻取令脗合至是加於柩上更以油灰彌之然後旋旋少灌瀝靑於其上令其速凝即不透板約已厚二寸許乃加外葢實以灰三物拌勻者居下炭末居上各倍於底及四旁之厚以酒灑而躡實之恐震柩中故未敢築但多用之以俟其實耳乃實土而漸築之下土每尺許即輕手築之勿令震動柩中祠后土於墓左如前儀祝版同前但云今為某官封謚窆兹幽宅神其後同劉氏璋曰為父母形體在此故禮其神以安之藏明器等實土及半乃藏明器下帳苞筲甖扵便房以版塞其門下誌石墓在平地則於壙内近南先布磚一重置石其上又以磚四圍之而覆其上若墓在山側峻處則於壙南數尺間掘地深四五尺依此法埋之復實以土而堅築之下土亦以尺許為凖但須密杵堅築題主執事者設卓子於靈座東南西向置硯筆墨對卓置盥盆帨巾如前主人立於其前北向祝盥手出主卧置卓上使善書者盥手西向立先題陷中父則曰故某官某公諱某字某第幾神主粉面曰考某官封謚府君神主其下左旁曰孝子某奉祀母則曰故某封某氏諱某字某第幾神主粉面曰妣某封某氏神主旁亦如之無官封則以生時所稱為號題畢祝奉置靈座而藏魂帛於箱中以置其後炷香斟酒執版出於主人之右跪讀之日子同前但云孤子某敢昭告于考某官封謚府君形歸窀穸神返室堂神主既成伏惟尊靈舍舊從新是慿是依畢懷之興復位主人再拜哭盡哀止母喪稱哀子後放此凡有封謚皆稱之後皆放此問夫在妻之神主宜書何人奉祀朱子曰旁注施於所尊以下則不必書也高氏曰觀木主之制旁題主祀之名而知宗子之法不可廢也宗子承家主祭有君之道諸子不得而抗焉故禮支子不祭祭必告於宗子宗子為士庶子為大夫則以上牲祭於宗子之家其祝詞曰孝子某為介子某薦其常事若宗子居于他國庶子無廟則望墓為壇以祭其祝詞曰孝子某使介子某執其常事若宗子死則稱名不稱孝葢古人重宗如此自宗子之法壊而人不知所自來以至流轉四方徃徃親未絶而有不相識者是豈教人尊祖收族之道哉祝奉神主升車魂帛箱在其後執事者徹靈座遂行主人以下哭從如來儀出墓門尊長乗車馬去墓百歩許卑㓜亦乗車馬但留子弟一人監視實土以至成墳墳髙四尺立小石碑於其前亦髙四尺趺髙尺許司馬温公曰按令式墳碑石獸大小多寡雖各有品數然𦵏者當為無窮之規後世見此等物安知其中不多藏金玉邪是皆無益於亡者而反有害故令式又有貴得同賤賤不得同貴之文然則不若不用之為愈也今按孔子防墓之封其崇四尺故取以為法用司馬公説别立小碑但石湏闊尺以上其厚居三之二圭首而刻其面如誌之葢乃略述其世系名字行實而刻於其左轉及後右而周焉婦人則俟夫𦵏乃立面如夫亡誌葢之刻云司馬温公曰古人有大勲徳勒銘鍾鼎藏之宗廟其𦵏則有豐碑以下棺耳秦漢以來始命文士褒賛功徳刻之於石亦謂之碑降及南朝復有銘誌埋之墓中使其人果大賢邪則名聞昭顯衆所稱頌流播終古不可掩蔽豈待碑誌始為人知若其不賢也雖以巧言麗詞强加采飾功侔吕望徳比仲尼徒取譏笑其誰肯信碑猶立於墓道人得見之誌乃藏於壙中自非開發莫之睹也隋文帝子秦王俊薨府僚請立碑帝曰欲求名一卷史書足矣何用碑為徒與人作鎮石耳此實語也今既不能免依其誌文但可直叙鄉里世家官簿始終而已季札墓前有石世稱孔子所篆云嗚呼有呉延陵季子之墓豈在多言然後人知其賢也今但刻姓名於墓前人自知之耳反哭主人以下奉靈車在塗徐行哭其反如疑為親在彼哀至則哭至家哭望門即哭祝奉神主入置於靈座執事者先設靈座于故處祝奉神主入就位櫝之并出魂帛箱置主後主人以下哭於㕔事主人以下及門哭入升自西階哭于㕔事婦人先入哭于堂朱子曰反哭升堂反諸其所作也主婦入于室反諸其所養也湏知得這意思則所謂踐其位行其禮等事行之自安方見得繼志述事之事其楊氏復曰按先生此言葢謂古者反哭于廟反諸所作謂親所行禮之處反諸其所養謂親所饋食之處皆指反哭于廟而言也先生家禮反哭于㕔事婦人先入哭于堂又與古異者後世廟制不立祠堂狹隘所謂㕔事者乃祭祀之地主婦饋食亦在此堂也遂詣靈座前哭盡哀止有弔者拜之如初謂賔客之親宻者既歸待反哭而復予檀弓曰反哭之弔也哀之至也反而亡焉失之矣於是為甚期九月之喪者飲酒食肉不與宴樂小功以下大功異居者可以歸性理大全書卷二十

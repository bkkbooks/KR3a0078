body:
  text: 性理大全書卷六十八治道三人才程子曰善言治者必以成就人才為急務人才不足雖有良法無與行之矣欲成就人才者不患其禀質之不美患夫師學之不明也師學不明雖有美質無由成之矣作新人才難變化人才易今諸人之才皆可用且人豈肯甘為小人在君相變化如何爾若宰相用之為君子孰不為君子才高者多過過則一出焉一入焉才卑者多不及不及者殆且弛矣元城劉氏曰所謂長養成就人才非如今學校之類也但於人才愛惜保全之爾譬如富家養山林不旦旦伐之乃可為棟梁之具若非理摧折之及至造屋無材可用也是愛惜人才乃人主自為社稷計耳龜山楊氏曰當先王之盛禮義之澤漸摩浸灌天下亹亹向風承徳敦厚而成俗於斯時也士游乎校庠術序之間攬六藝之英華而充飫乎道徳之實凡耳目之所習聞者皆足以廸已而勵行優游自得不見異物而遷焉此三代之士所以彬彬多全徳也陵夷至于戰國暴君汙吏各逞其私欲磨牙搖毒相吞噬者天下相環也機會之變間不容髮故從人合之以效其謀衡人離之以攻其後掉三寸之舌鬭天下之諸侯斂為已功由是靡靡日入於亂也漢興襲秦遺俗而高皇帝起於布衣户伍之中一呼而有天下慢而侮人尤不喜儒士故一時貪利頑頓無恥者多歸之雖秉國鈞衡為一代宗臣者猶且囚拘縲絏而不知去况其餘人乎光武中興尤旌節義之士而依違附逆之臣多見戮辱故宏儒逺智累行高舉激揚風流者方軌而出及其衰也懐濟時之志則以觸權而嬰禍謝事丘壑則以黨錮而陷刑雖輿敗輹脱猶不忍改轍一犯清議則蹈鼎伏鑕而不悔東漢之社稷僅如垂髮而不絶者亦衆君子之力也東晉之興士懲前軌皆遺世絶俗視天下治亂恝然如秦人視越人之肥瘠也而晉從而亡此氣俗之不同然亦興衰治亂之所繫也故戰國之士務奇謀而不徇正道西漢之士喜功名而不務奇節東漢之士貴節義而不通時變東晉之士樂恬曠而不孚實用是皆為世變所移而昧夫中行者也惟古之聖賢則不然不以世治而堅其操世亂而改其度雖變故日更而吾之所守自若也周之士也貴秦之士也賤周之士非獨上之人貴之也士亦知自貴焉秦之士非獨上之人賤之也士亦輕且賤焉自秦而來迄于今千有餘嵗士之知自貴者何其少而輕自賤者何多耶蓋古之士雖一介之賤厠於編户齊民之間短褐不完含菽飲水裕然有餘而不知王公之為尊與夫膏粱文繡之為美也三旌之位非其道也有弗屑焉萬金之餽非其義也有弗受焉夫如是上之人雖欲挾貴自尊以輕天下之士其可得乎後世之士顛㝠利欲而不知有貴於己者故守道循理之志薄而偷合茍得之行多伺候公卿之門奔走形勢之塗脅肩謟笑以取容悦其自處如是而欲人貴之其可得乎故愚竊謂士之貴賤雖視勢盛衰然其所以貴賤者皆其自取也朱子曰世間有才底人若能損那有餘勉其不足時節却做得事却出來擔當得事與那小㢘曲謹底不同東萊呂氏曰不離莘野而割烹之鼎已調不離傅巖而濟川之舟已具不離磻溪而牧野之陣已成彼為伊傅太公者曷嘗徒勞州縣屈首簿書然後知之哉殊不知有非常之才而後有非常之舉也魯齋許氏曰大聖大賢本末具舉極其規模之大盡其節目之詳先勤小物而後盡於大事降此一等亦豪傑之士然舉其大則遺其細盡其小則惛於大材具稍大便不謹細行所以有材大便踈之語謹於細小者多不識大體不能謀大事用人者宜知之後世功名之士到禮樂制度便進不去蓋到此稍細宻亦精力有所不及故須别用一般人物傳記中人才傑然可觀以道理觀之只是偏才聖人則圓融渾全百理皆具古今人才多是血氣用事故多偏聖人純是徳性用事只明明徳便自能圓成不偏求賢程子曰古之聖王所以能致天下之治無他術也朝廷至於天下公卿大夫百職羣吏皆稱其任而已何以得稱其任賢者在位能者在職而已何以得賢能而任之求之有道而已雖天下常用易得之物未有不求而得者也金生於山木生於林非匠者採伐不登於用况賢能之士傑出羣類非若山林之物廣生而無極也非人君搜擇之有道其可得而用乎自昔邦家張官置吏未嘗不取士也顧取之之道如何爾歴觀前史自古以來稱治之君有不以求賢為事者乎有規規守常以資任人而能致大治者乎有國家之興不由得人者乎由此言之用賢之驗不其甚明若曰非不欲賢也病求之之難也竊以為不然夫以人主之勢心之所嚮天下風靡景從設若珍禽異獸瓌寳奇玩之物雖遐方殊域之所有深山大海之所生志所欲者無不可致蓋上心所好奉之以天下之力也若使存好賢之心如是則何巖穴之幽不可求何山林之深不可致所患好之不篤爾龜山楊氏曰三代兩漢人才之盛風俗之美後世莫能及者取士以行不專以言故也今雖詔内外官舉經明行修之士中第之日優其恩典不獨取之以言又本其行庶乎近古然徒使舉之而不由鄉里之選又無考察之實與斯舉者隨衆牒試於有司糊名謄録校一日之長不惟士失自重之義且於課試之際無以别異於衆人則所謂本其行者亦徒虚文而已謂宜别立一科稍倣三代兩漢取士官人之法因今之宜斟酌損益要之無失古意而已至於投牒乞試糊名謄録之類非古制者一切罷之待遇恩數盡居詞賦經義等科之上庶使學者尊經術惇行義人人篤於自修則人才不盛風俗不美未之有也明道在鄠邑政聲流聞當路欲薦之朝而問其所欲對曰夫薦士者皆才之所堪不問志之所欲五峯胡氏曰人君聨屬天下以成其身者也内選於九族之親禮其賢者表而用之以聯屬其親外選於五方之人禮其英傑引而進之以聯屬其民是故賢者衆之表君之輔也不進其親之賢者是自賊其心腹也不進其人之賢者是自殘其四肢也古者舉士於鄉自十年出就外傅學於家塾州序其學者何事也曰六禮也七教也八政也書其資性近道才行合理鄉老鄉吏會合鄉人於春秋之祭祀鬼神而書之者也三嵗大比鄉老鄉吏及鄉大夫審其性之不悖於道也行之不反於理也質其書之先後無變也乃入其書於司徒謂之選士選士學於鄉校其書之如州序三嵗大比鄉大夫及司徒審之如初乃入其書於樂正謂之俊士俊士入國學春秋教以禮樂冬夏教以詩書以上觀古道樂正官屬以時校其業之精否而勉勵之三嵗大比樂正升其精者於王謂之進士王命冢宰㑹天下之進士論其資性才行學業某可以為卿歟某可以為大夫歟某可以為士歟卿闕則以可以為卿者補之大夫闕則以可以為大夫者補之士有闕則以可以為士者補之三年一考其績三考黜其不職陟其有功者是故朝無幸官野無遺賢毁譽不行善惡不眩徳之大小當其位才之髙下當其職人務自脩而不僥倖於上人知自守而不冐昧求進人知自重而不輕用其身人能有恥而不茍役於利此所以仕路清政事治風俗美天下安寧四夷慕義而疆場不聳也朱子曰徳行之於人大矣然其實則皆人性所固有人道所當為以其得之於心故謂之徳以其行之於身故謂之行非固有所作為增益而欲為觀聽之美也士誠知用力於此則不唯可以脩身而推之可以治人又可以及夫天下國家故古之教者莫不以是為先若舜之命司徒以敷五教命典樂以教胄子皆此意也至於成周而法始大備故其人才之盛風俗之美後世莫能及之漢室之初尚有遺法其選舉之目必以敬長上順鄉里肅政教出入不悖所聞為稱首魏晉以來雖不及古然其九品中正之法猶為近之及至隋唐遂專以文詞取士而尚徳之舉不復見矣夫古之人教民以徳行道藝而興其賢者能者其法備而意深矣今之為法不然其教之之詳取之之審反復澄汰至于再三而其具不越乎無用之空言而已深求其意雖或亦將有賴於其用然彼知但為無用之空言而便足以要吾之爵禄則又何暇復思吾之所以取彼者其意為何如哉古之大臣以其一身任天下之重非以其一耳目之聰明一手足之勤力為能周天下之事也其所賴以共正君心同斷國論必有待於衆賢之助焉是以君子將以其身任此責者必咨詢訪問取之於無事之時而參伍校量用之於有事之日蓋方其責之必加於已而未及也無旦暮倉卒之頃則其觀之得以久無利害紛拏之惑則其察之得以精誠心素著則其得之多嵗引月長則其蓄之富自重者無所嫌而敢進則無幽隠之不盡欲進者無所為而不來則無巧偽之亂真久且精故有以知其短長之實而不差多且富故有以使其更迭為用而不竭幽隠畢達則讜言日聞而吾徳修取舍不眩則望實日隆而士心附此古之君子所以成尊主庇民之功於一時而其遺風餘韻猶有稱思於後世者也天下之事决非一人之聰明才力所能獨運是以古之君子雖其徳業智謀足以有為而未嘗不博求人才以自裨益方其未用而收寘門牆勸奨成就已不勝其衆是以至於當用之日推挽成就布之列位而無事之不成也古之君子有志於天下者莫不以致天下之賢為急而其所以急於求賢者非欲使之綴緝言語譽道功徳以為一時觀聽之美而已蓋將以廣其見聞之所不及思慮之所不至且慮夫處已接物之間或有未盡善者而將使之有以正之也是以其求之不得不博其禮之不得不厚其待之不得不誠必使天下之賢識與不識莫不樂自致於吾前以輔吾過然後吾之徳業得以無媿乎隠微而寖極乎光大耳朝廷設官求賢故在上者不當以請託而薦人士人當有禮義㢘恥故在下者不當自衒鬻而求薦東萊呂氏曰井田之制士與兵國之重事皆取於農工商不與古者取士於田野取其民之秀者以其質朴故也臨川呉氏曰古之為士者茍可以住則選於里舉於鄉而長治其鄉里之民在公得以行已志在私得以資禄養此古之士所以自安於内而無願外之想也後世取士之法不一雖存選舉之名而實與古不同何也所取不于其可用之實能而于其不可用之虚伎可以仕者或不得仕而不可以仕者乃或得仕時之多失人士之多失志往往由是論官蒞政附程子曰古者使以徳爵以功世禄而不世官故賢才衆而庶績成及周之衰公卿大夫皆世官政由是敗矣三代之時人君必有師傅保之官師道之教訓傅傅之徳義保保其身體後世作事無本知求治而不知正君知規過而不知養徳傅徳義之道固已踈矣保身體之法無復聞焉古之時分羲和以職天道以正四時遂司其方主其時政在堯謂之四岳周乃六卿之任統天下之治者也後世學其法者不復知其道故星歴為一技之事而與政分矣禮院關天下之事得其人則凡舉事可以考古而立制非其人未免隨俗而已或曰治獄之官不可為曰茍能充其職則一郡無寃民矣四海之利病係於斯民之休戚斯民之休戚係於守令之賢否然而監司者守令之綱也朝廷者監司之本也欲斯民之皆得其所本原之地亦在乎朝廷而已元城劉氏曰左右之史紀人主之言動職清地要他官莫比非器識端方上下所信才學優贍中外所推者不虛授也華陽范氏曰夫天地之有四時如百官之有六職天下萬事備盡於此如網之在綱裘之挈領雖百世不可易也人君如欲稽古以正名茍不於周官未見其可也朱子曰宰相擇監司吏部擇郡守如此則朝廷亦可無事又何患其不得人臨川呉氏曰予聞居思天下之治法以為禹稷伊尹之志茍得一縣亦可小試何也縣之於民最近令之福惠所及最速莫若縣官也而舉世瞀瞀孰知其任之為不輕專務已肥遑恤民瘠壅閼吾君之徳使不得下達愁怨之氣瀰漫兩間以至上干隂陽之和者十而八九也聚羣羊而牧之以一狼恣其啖食何辜斯民而至斯極於斯之時倐有人焉慰愜其蘇息之朢則民之愛之也焉得不如子之愛其父母哉世固有㢘者矣其見不明則為吏所蔽雖㢘何補亦有㢘而且明者矣其心不仁則自謂無取於民不眩於事而深刻嚴酷又縱其下漁獵躪躒略無惻隠之意或其心雖仁而短於剸裁徒有仁心而民不被澤仁而不能故也或其才雖能而意之所向不無少偏終亦不免於小疵能而未公故也全此五善難矣哉程子曰談經論道則有之少有及治體者如有用我者正心以正身正身以正家正家以正朝廷百官至于天下此其序也其間則又係用之淺深臨時裁酌而應之難執一意也以下論蒞政斟酌去取古今恐未易言須尺度權衡在胷中無疑乃可處之無差古者鄉田同井而民之出入相友故無爭鬬之獄今之郡邑之訟往往出於愚民以戾氣相搆善為政者勿聽焉可也又時取强暴而好譏侮者痛懲之則柔良者安鬬訟可息矣韓持國常患在下者多欺曰欺有三有為利而欺者則固可罪有畏罪而欺者在所恕事有類欺者在所察問臨政無所用心求於恕如何曰推此心行恕可也用心求恕非也恕已所固有不待求而後得舉此加彼而已呂進明使河東伊川問之曰為政何先對曰莫要於守法曰拘於法而不得有為者舉世皆是也若某之意謂猶有可遷就不害於法而可以有為者也昔明道為邑凡及民之事多衆人所謂於法有礙焉者然明道為之未嘗大戾於法人亦不以為駭也謂之得伸其志則不可求小補焉則過之與今為政逺矣人雖異之不至指為狂也至謂之狂則心大駭盡誠為之不容而後去之又何嫌之有或問為官僚而言事於長理直而不見從也則如之何曰亦權其輕重而已事重於去則當去事輕於去則當留事大於爭則當爭事小於爭則當已雖然今之仕於官其有能去者必有之矣而吾未之見也一命之士茍存心於愛物於人必有所濟問臨民曰使民各得輸其情問御吏曰正已格物人有語及為政者和靖尹氏曰子張問政子曰居之無倦倦最害事若能無倦推而行之為尉為邑為郡以至為宰相皆可了若倦則雖居家至小事也不能了五峯胡氏曰事有大變時有大宜通其變然後可為也務其宜然後有功也朱子曰作縣固非易事然盡心力而為之必無不濟今人多是自放懶了所以一綱弛而衆目紊也仕宦只是㢘勤自守進退遲速自有時節切不可起妄念也大扺守官只要律已公㢘執事勤謹晝夜孜孜如臨淵谷便自無他患害纔是有所依倚便使人怠惰放縱不知不覺錯做了事也大率天下事循理守法平心處之便是正當如賊盗入獄而加以桎梏箠楚乃是正理今欲廢此以誘其心欲其歸恩於我便是挾私任術不行衆人公共道理况恩既歸已怨必歸於他人彼亦安得無忿疾於我耶事變無窮幾㑹易失酬酢之間蓋有未及省察而謬以千里者是以君子貴明理務果斷則異端不能惑流俗不能亂而徳可久業可大矣問班朝治軍莅官行法非禮威嚴不行禱祠祭祀非禮不誠不莊先生謂古人以誠莊對威嚴蓋為政以嚴為本寛以濟嚴之太過也某竊謂居上以寛為本寛則得衆嚴以濟寛之不及耳若一意任威其弊將有至於法令如牛毛者然先王為政之本寛嚴先後之異施者不敢不講曰為政以寛為本者謂其大體規模意思當如此耳古人察理精宻持身整肅無偷惰戯豫之時故其政不待作威而自嚴但其意則以愛人為本耳及其施之於政事便須有綱紀文章關防禁約截然而不可犯然後吾之所謂寛者得以隨事及人而無頺敝不舉之處人之䝉惠於我亦得以通達明白實受其賜而無間隔欺蔽之患聖人説政以寛為本而今反欲其嚴正如古樂以和為主而周子反欲其淡蓋今之所謂寛者乃縱弛所謂和者乃哇淫非古之所謂寛與和者故必以是矯之乃得其平耳如其不然則雖有愛人之心而事無統紀緩急先後可否與奪之權皆不在已於是姦豪得志而善良之民反不被其澤矣此事利害只在目前不必引書傳考古今然後知也但為政必有規矩使姦民猾吏不得行其私然後刑罰可省賦斂可薄所謂以寛為本體仁長人孰有大於此者乎平易近民為政之本南軒張氏曰為政須是先平其心不平其心雖好事亦錯如抑强扶弱豈不是好事往往只這裏便錯須是如明鏡然妍者自妍醜者自醜何預我事若是先以其人為醜則相次見此人無往而非醜矣問趙徳莊知建寧府問於晦庵為政寛則是猛則是晦庵云若教公寛一尚猛一尚則如發瘧子相似以某之意御善良以寛治强暴以嚴此語如何曰若胷中著一寛字寛必有弊著一猛字猛必有弊吾徒處事當如持衡髙者下之低者平之若聖人之秤則常平矣東萊呂氏官箴曰凡治事有渉權貴須平心看理之所在若其有理固不可避嫌故使之無理直須平心看若有一毫畏禍自恕之心則五分有理便看作十分有理若其無理亦不可畏禍曲使之有理政使見得無理只須作尋常公事看斷過後不須拈出説尋常犯權貴取禍者多是張大其事邀不畏强禦之名所以彼不能平若處得平穏妥帖彼雖不樂視前則有間矣然所以不欲拈出者本非以避禍蓋此乃職分之常若特然看做一件事則發處已自不是矣當官之法唯有三事曰清曰慎曰勤知此三者則知所以持身矣然世之仕者臨財當事不能自克常自以為必不敗持必不敗之意則無不為矣然事常至於敗而不能自已故設心處事戒之在初不可不察借使役用權智百端補治幸而得免所損已多不若初不為之為愈也司馬子微坐忘論云與其巧持於末孰若拙戒於初此天下之要言當官處事之大法用力寡而見功多無如此言者人能思之豈復有悔吝耶事君如事親事官長如事兄與同僚如家人待羣吏如奴僕愛百姓如妻子處官事如家事然後為能盡吾之心如有毫末不至皆吾心有所不盡也故事親孝故忠可移於君事兄弟故順可移於長居家治故事可移於官豈有二理哉當官處事常思有以及人如科率之行既不能免便就其間求所以使民省力不使重為民患其益多矣當官者難事勿辭而深避嫌疑以至誠遇人而深避文法如此則可免前軰嘗言小人之性專務茍且明日有事今日得休且休當官者不可徇其私意忽而不治諺有之曰勞心不如勞力此實要言也當官既自㢘潔又須關防小人如文字歴引之類皆須明白以防中傷不可不至謹不可不詳知也當官者凡異色人皆不宜與之相接巫祝尼媼之類尤宜疎絶要以清心省事為本後生少年乍到官守多為猾吏所餌不自省察所得毫末而一任之間不復敢舉動大抵作官嗜利所得甚少而吏人所盜不貲矣以此被重譴良可惜也當官者先以暴怒為戒事有不可當詳處之必無不中若先暴怒只能自害豈能害人前軰嘗言凡事只怕待待者詳處之謂也葢詳處之則思慮自出人不能中傷也嘗見前輩作州縣或獄官每一公事難决者必沉思静慮累日忽然若有得者則是非判矣是道也唯不茍者能之處事者不以聰明為先而以盡心為急不以集事為急而以方便為上畏避文法固是常情然世人自私者率以文法難事委之於人殊不知人之自私亦猶已之自私也以此處事其能有濟乎當官大要直不犯禍和不害義在人消詳斟酌之爾然求合於道理本非私心專為已也當官處事但務著實如塗擦文書追改日月重易押字萬一敗露得罪反重亦非所以養誠心事君不欺之道也百種姦偽不如一實反復變詐不如慎始防人疑衆不如自慎智數周宻不如省事不易之道也事有當死不死其詬有甚於死者後亦未必免死當去不去其禍有甚於去者後亦未必得安世人至此多惑亂失常皆不知義命輕重之分也此理非平居熟講臨事必不能自立不可不預思古之欲委質事人其父兄日夜先以此教之矣中材以下豈臨事一朝一夕所能至哉教之有素其心安焉所謂有所養也忍之一字衆妙之門當官處事尤是先務若能清慎勤之外更行一忍何事不辦書曰必有忍其乃有濟此處事之本也諺有之曰忍事敵災星少陵詩云忍過事堪喜此皆切於事理為世大法非空言也王沂公嘗説喫得三斗釅醋方做得宰相蓋言忍受得事也居官臨事外有齟齬必内有窒礙蓋内外相應毫髪不差只有反已兩字更無别法也魯齋許氏曰恐害於已者必思所以害人也豈知利人則未有不利於已者也至於推勘公事已得大情適當其法不旁求深入是亦利人之一端也彼俗吏不達此理專以出罪為心謂之隂徳子曰不然履正奉公嫉惡舉善人臣之道也有違于此則惡者當害之而反利之善者當利之而反害之顯不能逃其刑責幽不能欺於神明顧隂徳何有焉每臨事且勿令人見喜既令見喜必是偏於一處隨後便有弊蓋喜悦非久長之理既不令人喜亦不令人怒便是得中諫諍程子曰有翦桐之戲則隨事箴規違養生之戒則即時諫止人臣以忠信善道事其君者須體納約自牖之意必違其所蔽而皆其所明乃能入矣雖有所蔽亦有所明未有㝠然而皆蔽者也古之善諫者必因君心所明而後見約是故訐直強果者其説多忤温厚明辯者其説多行愛戚姬将易嫡庶是其所蔽也素重四老人之賢而不能致是其所明也四老人之力孰與夫公卿及天下之心其言之切孰與周昌叔孫通也髙祖不從彼而從此者留侯不攻其蔽而就其明也趙王太后愛其少子長安君不使為質於齊是其蔽也愛之欲其富貴久長於齊是其所明也左師觸龍所以導之者亦因其明爾故其受命如響夫教人者亦如此而已元城劉氏曰嘗讀國語以謂天子聴政使公卿至於列士獻詩瞽獻曲史獻書師箴瞍賦矇誦百工諫庶人傳語近臣盡規親戚補察瞽史教誨耆艾修之而後王斟酌焉是三代之前上則公卿大夫朝夕得以納忠下則百工庶民猶執藝事以諫故忠言嘉謀日聞於上而天下之情無幽不燭無逺不通所為必成所舉必當者諫諍之効也後世之士不務獻納於君而多為自全之謀正論逺猷鮮有入告於是設員置職而責之以諫矣夫進言者日益少而聽言者不加勤此天下之治所以終愧於先王之盛時也華陽范氏曰人臣諫而不聽則當去位茍不能彊諫而視其君之過舉至於天下咸怨其臣則曰非我不諫君不能用我也始則擇利以處其身終則引謗以歸於君此不忠之大者也國之将興必賞諫臣國之将亡必殺諫臣故諫而受賞者興之祥也諫而被殺者亡之兆也天下如人之一身夫身必氣血周流無所壅底而後能存焉諫者使下情得以上通上意得以下達如氣血之周流於一身也故言路開則治言路塞則亂治亂者繫乎言路而已五峯胡氏曰事物之情以成則難以毁則易足之行也亦然升髙難就卑易舟之行也亦然沂流難順流易是故雅言難入而淫言易聽正道難從而小道易用伊尹之訓太甲曰有言逆于汝心必求諸道有言遜于汝志必求諸非道蓋本天下事物之情而戒之耳非謂太甲質凡而故吿之以如是也英明之君能以是自戒則徳業日新可以配天矣朱子曰内自臣工外及甿庶有能開寤聖心指陳闕政者無間疎賤使咸得以自通然後差擇近臣之通明正直者一二人使各引其所知有識敢言之士三數人寓直殿門凡四方之言有來上者悉令省閱舉其盡忠不隠者日以聞于聰聴則夫天人之際將有粲然畢陳於前者然後兼總條貫稱制臨決畫為科品以次施行問淵源録折栁事程伊川在經筵一日講罷未退哲宗忽起憑楹戲折栁枝進曰方春發生無故不可摧折曰有無不可知但劉公非妄語人而春秋有傳疑之法不應遽削之也且伊川之諫其至誠惻怛防微慮逺既發乎愛君之誠其涵養善端培植治本又合乎吿君之道皆可以為後世法而於輔導少主尤所當知至其餘味之無窮則善學者雖以自養可也南軒張氏曰某每登對必先自盟其心曰切不可見上喜便隨順将去恐一時隨順後來收拾不得上嘗曰伏節死義之臣難得某對曰陛下未得所以求之之道上曰何如曰當於犯顔敢諫中求則臨事可以得伏節死義之士矣若平時不能犯顔敢諫他日安能望其伏節死義乎武昭儀稱制長孫無忌欲諫褚遂良曰公國之元舅諫而得罪使上有殺元舅之名不如遂良先諫諫而不從公却繼之遂諫至於棄笏此非不美也然費了多少氣力終亦不成事孰若髙宗初幸尼寺取才人入宫之時大臣一言可去矣大凡事豈可不辨於幾微小處放過却來大處旋爭無益矣東萊吕氏曰自古進言於君者必以責難為恭蓋宴安之適聲色之娯瓌麗之玩畋游之佚實為治之大蠧其樂難捨其惑難移忠臣義士乃冒萬死而欲奪其君之所嗜此自古及今所共謂之責難也大凡為人須識綱目辭氣是綱言事是目言事雖正辭氣不和亦無益自古亂亡之國非無敢言之臣既殺其身國亦從之政坐此耳諫之道有三難焉曰逺曰疎曰驟逺則勢不接疎則情不通驟則理不究其言之不行也固也彼周設師氏之官淵乎其用意之深乎師氏之官實居虎門之左而詔王以媺者也其勢近其情親其言漸若江海之浸膏澤之潤日加益而不知焉周公之設官三百六十官必掌一事事必寓一意而師氏獨列地官之屬實周公致意之深者想夫成周之隆出入起居同歸於欽發號施令同歸於臧者師氏抑有助焉昔周太史辛甲命百官箴王闕而虞人之箴獨傳竊意師氏之所獻必反復紬繹辭順意篤足以為百代箴規之法然求之於蠧書漆簡之中雖斷章片辭邈不可得是可歎已西山真氏曰天下之務至廣也軍國之機至要也雖明主聽斷賢相謀議思慮之失亦不能免一失則為害不細必藉忠良之士諫正夫忠良之士論治體補國事乃其志爾能宻有所助則亦志伸而道行豈必彰君過而取髙名哉當君相議事之際使諫官預聞得以闗説或有闗失從而正之天下但覩朝政之得宜不知諫者之何言上下誠通國體豈不美乎况大臣論事以諫官規正於人君之前安有不公之議兹亦制御大臣使之無過之術爾若以諫官小臣不可預聞國議必衆知闕失方許諫正事或已行而不可救過或已彰而不可言故剛直之臣有激訐不顧以争之者君從之猶掩其過君或不從則君之過大臣之罪愈大矣君子小人之分義利而已矣君子之心純乎為義故其得位也将以行其道小人之心純乎為利故其得位也將以濟其欲二者操術不同故所以道其君者亦異夫為人君者受諫則明拒諫則昏明則君子得以自盡昏則小人得以為欺故為君子者惟恐其君之不受諫為小人者惟恐其君之不拒諫彼小人者豈以受諫為不美哉葢正論勝則邪説不容公道行則私意莫逞故其術不得不出諸此欲諫其君者必先能受人之諫儻在已則知盡言以諫君而於人則不欲盡言以諫我是以善責君而未嘗以善責已也其可乎哉故為大臣必以羣下有言為救已之過而不以為形已之短以為愛已而不以為輕已以為助已而不以為異已然後可稱宰相之度矣魯齋許氏曰後世臣子謀於君只説利害有如此以利害相恐動則利害不應時都不信了或者於君前説旱災可畏税課害人為害不細後皆無損再有便難説後來雖因此壊了天下也説不得唐懿宗為諫驪山事曰彼叩頭何足信此其驗也人只當言義理可與不可當與不當且如天道福善禍淫有時而差是禍福亦不足信也人只得當於義理而已利害一切不恤也法令程子曰三王之法各是一王之法故三代損益文質隨時之宜若孔子所立之法乃通萬世不易之法孔子於他處亦不見説獨答顔回云行夏之時乘殷之輅服周之冕樂則韶舞此是於四代中舉這一箇法式其詳細雖不可見而孔子但亦言其大法使後人就上修之二千年來亦無一人識者居今之時不安今之法令非義也若論為治不為則已如復為之須於今之法度内處得其當方為合義若須更改而後為則何義之有古之人重改作變政易法人心始以為疑者有之矣久而必信乃其改作之善者也始既疑之終復不信而能善治者未之有也為政必立善法俾可以垂久而傳逺若後世變之則末如之何矣龜山楊氏曰立法要使人易避而難犯至於有犯則必行而無赦此法之所以行也元城劉氏曰嘗考載籍以推先王之道雖禮樂刑政號為治具而所以行之者特在於命令而已昔之善觀人之國者不視其勢之盛衰而先察其令之弛張未論其政之醇疵而先審其令之繁簡惟其慮之既熟謀之已臧發之不妄而持以必行則堅如金石信如四時敷天之下莫不傾耳承聴聳動厭服此聖人所恃以鼓舞萬民之術也書曰慎乃出令令出惟行弗惟反易曰渙汗其大號傳曰令重則君尊又曰國之安危在出令凡此皆聖人慎重之意也人君命令雖在必行苟處之得其理則執之不可變惟其不合衆望違咈人情闗天下之盛衰繫朝廷之輕重所宜擇善何憚改為五峯胡氏曰荀子云有治人無治法竊譬之欲撥亂反之正者如越江湖法則舟也人則操舟者也若舟破楫壊雖有若神之技人人知其弗能濟矣故乘大亂之時必變法法不變而能成治功者未之有也法制者道徳之顯爾道徳者法制之隠爾天地之心生生不窮者也必有春秋冬夏之節風雨霜露之變然後生物之功遂有道徳結於民心而無法制者為無用無用者亡劉虞之類有法制縶於民身而無道徳者為無體無體者滅暴秦之類是故法立制定茍非其人亦不可行也朱子曰古人立法只是大綱下之人得自為後世法皆詳宻下之人只是守法法之所在上之人亦進退下之人不得朝廷紀綱尤所當嚴上自人主以下至於百執事各有職業不可相侵葢君雖以制命為職然必謀之大臣參之給舍使之熟議以求公議之所在然後揚于王庭明出命令而公行之是以朝廷尊嚴命令詳審雖有不當天下亦皆曉然知其謬之出於某人而人主不至獨任其責臣下欲議之者亦得以極意盡言而無所憚此古今之常理也賞罰程子曰聖人所知宜無不至也聖人所行宜無不盡也然而書稱堯舜不曰刑必當罪賞必當功而曰罪疑惟輕功疑惟重與其殺不辜寧失不經異乎後世刻核之論矣萬物皆只是一箇天理已何與焉至如言天討有罪五刑五用哉天命有徳五服五章哉此都只是天理自然當如此人幾時與與則便是私意有善有惡善則理當喜如五服自有一箇次第以章顯之惡則理當惡彼自絶於理故五刑五用曷嘗容心喜怒於其間哉舜舉十六相堯豈不知只以他善未著故不自舉舜誅四凶堯豈不察只為他惡未著那誅得他舉與誅曷嘗有毫髪厠於其間哉只有一箇義理義之與比元城劉氏曰人主所以鼓動天下制馭臣民之柄莫大於賞罰使賞必及於有功罰必加於有罪則四海之内竦然向風而無不心服者矣惟其無功者虚受有罪者幸免遂容僣濫而其弊將至於無所勸懲然則為天下者安可不以至公而慎用之乎華陽范氏曰人君賞一人而天下莫不勸罰一人而天下莫不懼豈其力足以勝億兆之衆哉處之中理而能服其心也用一不肖而四方莫不解體殺一無罪而百姓莫不怨怒豈必人人而害之哉處之不中理而不能服其心也武夷胡氏曰人主以天下為度者也所好當遵王道不可以私勞行賞所惡當遵王路不可以私怨用刑其喜怒則當發必中節和氣絪緼而育萬物也吕氏本中曰賞必賞功罰必當罪刻核之論也罪疑惟輕功疑惟重君子長者之心也以君子長者之心為心則自無刻核之論如君子不盡人之􅂬不竭人之忠去其臣也必可使復仕去其妻也必可使復嫁如此等論上下薰蒸則太平之功可立致也芝草生甘露降醴泉出皆是此等和氣薰蒸所生朱子曰古之欲為平者必稱其物之大小髙下而為其施之多寡厚薄然後乃得其平若不問其是非曲直而待之如一則是善者常不得伸而惡者反幸而免以此為平是乃所以為大不平也故雖堯舜之治既舉元凱必放共兠此又易象所謂遏惡揚善順天休命者也蓋善者天理之本然惡者人欲之邪妄是以天之為道既福善而禍淫又以賞罰之權寄之司牧使之有以補助其禍福之所不及然則為人君者可不謹執其柄而務有以奉承之哉性理大全書卷六十八

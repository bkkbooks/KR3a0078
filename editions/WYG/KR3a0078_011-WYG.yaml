body:
  text: 性理大全書卷十一皇極經世書五觀物外篇上邵伯温曰康節先君既捐館門弟子記其平生之言合二卷雖以次筆授不能無小失然足以發明成書者為多故名之曰觀物外篇張氏崏曰先生觀物有内外篇内篇先生所著之書也外篇門弟子所記先生之言也内篇理深而數畧外篇數詳而理顯學先天者當自外篇始天數五地數五合而為十數之全也天以一而變四地以一而變四四者有體也而其一者無體也是謂有無之極也天之體數四而用者三不用者一也地之體數四而用者三不用者一也是故無體之一以况自然也不用之一以况道也用之者三以况天地人也體者八變用者六變是以八卦之象不易者四反易者二以六卦變而成八也重卦之象不易者八反易者二十八以三十六變而成六十四也故爻止于六卦盡于八䇿窮于三十六而重卦極于六十四也卦成于八重于六十四爻成于六䇿窮于三十六而重于三百八十四也天有四時一時四月一月四十日四四十六而各去其一是以一時三月一月三十日也四時體數也三月三十日用數也體雖具四而其一常不用也故用者止于三而極于九也體數常偶故有四有十二用數常竒故有三有九大數不足而小數常盈者何也以其大者不可見而小者可見也故時止乎四月止乎三而日盈乎十也是以人之支體有四而指有十也天見乎南而潛乎北極于六而餘于七是以人知其前昧其後而畧其左右也天體數四而用三地體數四而用三天尅地地尅天而尅者在地猶晝之餘分在夜也是以天三而地四天有三辰地有四行也然地之大且見且隐其餘分之謂耶天有二正地有二正而共用二變以成八卦也天有四正地有四正共用二十八變以成六十四卦也是以小成之卦正者四變者二共六卦也大成之卦正者八變者二十八共三十六卦也乾坤離坎為三十六卦之祖也兑震巽艮為二十八卦之祖也乾七子兑六子離五子震四子巽三子坎二子艮一子坤全隂故無子乾七子坤六子兑五子艮四子離三子坎二子震一子巽剛故無子乾坤七變是以晝夜之極不過七分也兑艮六變是以月止于六共為十二也離坎五變是以日止于五共為十也震巽四變是以體止于四共為八也卦之正變共三十六而爻又有二百一十六則用數之䇿也三十六去四則三十二也又去四則二十八也又去四則二十四也故卦數三十二位去四而言之也天數二十八位去八而言之也地數二十四位去十二而言之也四者乾坤離坎也八者并頤孚大小過也十二者兑震泰既濟也日有八位而用止于七去乾而言之也月有八位用止于六去兑而言之也星有八位用止于五去離而言之也辰有八位用止于四去震而言之也日有八位而數止于七去泰而言之月自兑起者月不能反日之數也故十二月常餘十二日也陽無十故不足于後隂無一故不足于首乾陽中陽不可變故一年止舉十二月也震隂中隂不可變故一日止十二時不可見也兑陽中隂離隂中陽皆可變故日月之數可分也是隂數以十二起陽數以三十起常存二六也舉年見月舉月見日舉日見時陽統隂也是天四變含地四變日之變含月與星辰之變也是以一卦含四卦也日一位月一位星一位辰一位日有四位月有四位星有四位辰有四位四四有十六位此一變而日月之數窮矣天有四變地有四變變有長也有消也十有六變而天地之數窮矣日起於一月起於二星起於三辰起於四引而伸之陽數常六隂數常二而大小之運窮三百六十變為十二萬九千六百十二萬九千六百變為一百六十七億九千六百一十六萬一百六十七億九千六百一十六萬變為二萬八千二百一十一兆九百九十萬七千四百五十六億以三百六十為時以一十二萬九千六百為日以一百六十七億九千六百一十六萬為月以二萬八千二百一十一兆九百九十萬七千四百五十六億為年則大小運之數立矣二萬八千二百一十一兆九百九十萬七千四百五十六億分而為十二前六為長後六為消以當一年十二月之數而進退三百六十日矣一百六十七億九千六百一十六萬分而為十以當一月十日之數隨大運之消長而進退六十日矣十二萬九千六百分而為十二以當一日十二時之數而進退六日矣三百六十以當一時之數隨小運之進退以當晝夜之時也十六變之數去其交數取其用數得二萬八千二百一十一兆九百九十一萬七千四百五十六億二萬八千二百一十一兆九百九十一萬七千四百五十六億分而為十二限前六限為長後六限為消每限得二十億九千九百六十八萬之一百六十七億九千六百一十六萬每一百六十七億九千六百一十六萬年開一分進六十日也六限開六分進三百六十日也猶有餘分之一故開七分進二百六十六日也其退亦若是矣十二萬九千六百去其三者交數也取其七者用數也用數三而成于六加餘分故有七也七之得九萬七百二十年半之得四萬五千三百六十年以進六日也日有晝夜數有朓胸以成十有二日也每三千六百年進一日凡四萬三千二百年進十有二日也餘二千一百六十年以進餘分之六合交數之二千一百六十年共進十有二分以為閏也故小運之變凡六十而成三百六十有六日也乾為一乾之五爻而為大有以當三百六十之數也乾之四爻分而為小畜以當十二萬九千六百之數也乾之三爻分而為履以當一百六十七億九千六百一十六萬之數也乾之二爻分而為同人以當二萬八千二百一十一兆九百九十萬七千四百五十六億之數也乾之初爻分而為姤以當七秭九千五百八十六萬六千一百一十垓九千九百四十六萬四千八京八千四百三十九萬一千九百三十六兆之數也是謂分數也分大為小皆自上而下故以陽數當之如一分為十二十二分為三百六十也天統乎體故八變而終于十六地分乎用故六變而終于十二天起扵一而終于七秭九千五百八十六萬六千一百一十垓九千九百四十六萬四千八京八千四百三十九萬一千九百三十六兆地起於十二而終于二百四秭六千九百八十萬七千三百八十一垓五千四百九十一萬八千四百九十九兆七百二十萬億也一生二為夬當十二之數也二生四為大壯當四千三百二十之數也四生八為泰當五億五千九百八十七萬二千之數也八生十六為臨當九百四十四兆三千六百九十九萬六千九百一十五億二千萬之數也十六生三十二為復當二千六百五十二萬八千八百七十垓三千六百六十四萬八千八百京二千九百四十七萬九千七百三十一兆二千萬億之數也三十二生六十四為坤當無極之數也是謂長數也長小為大皆自下而上故以隂數當之有地然後有二有二然後有晝夜二三以變錯綜而成故易以二而生數以十二而變而一非數也非數而數以之成也天行不急未嘗有晝夜人居地上以為晝夜故以地上之數為人之用也天自臨以上地自師以上運數也天自同人以下地自剥以下年數也運數則在天者也年數則在地者也天自賁以上地自艮以上用數也天自明夷以下地自否以下交數也天自震以上地自晉以上有數也天自益以下地自豫以下無數也天之有數起乾而止震餘入于無者天辰不見也地去一而起十二者地火常潛也故天以體為基而常隱其基地以用為本而常藏其用也一時止于三月一月止于三十日皆去其辰數也是以八八之卦六十四而不變者八可變者七七八五十六其義亦由此矣陽爻晝數也隂爻夜數也天地相銜隂陽相交故晝夜相離剛柔相錯春夏陽也故晝數多夜數少秋冬隂也故晝數少夜數多體數之䇿三百八十四去乾坤離坎之䇿為用數三百六十體數之用二百七十去乾與離坎之䇿為用數之用二百五十二也體數之用二百七十其一百五十六為陽一百一十四為隂去離之䇿得一百五十二陽一百一十二隂為實用之數也葢陽去離而用乾隂去坤而用坎也是以天之陽䇿一百一十二去其隂也地之隂䇿一百一十二陽䇿四十去其南北之陽也極南大暑極北大寒物不能生是以去之也其四十為天之餘分也陽侵隂晝侵夜是以在地也合之為一百五十二陽一百一十二隂也陽去乾之䇿隂去坎之䇿得一百四十四陽一百八隂為用數之用也陽三十六三之為一百八隂三十六三之為一百八三陽三隂隂陽各半也陽有餘分之一為三十六合之為一百四十四陽一百八隂也故體數之用二百七十而實用者二百六十四用數之用二百五十二也卦有六十四而用止于三十六爻有三百八十四而用止于二百一十有六也六十四分而為二百五十六是以一卦去其初上之爻亦二百五十六也此生物之數也故離坎為生物之主以離四陽坎四隂故生物者必四也陽一百一十二隂一百一十二去其離坎之爻則二百一十六也隂陽之四十共為二百五十六也是以八卦用六爻乾坤主之也六爻用四位離坎主之也故天之昬曉不生物而日中生物地之南北不生物而中央生物也體數何為者也生物者也用數何為者也運行者也運行者天也生物者地也天以獨運故以用數自相乗而以用數之用為生物之時也地耦而生故以體數之用陽乗隂為生物之數也天數三故六六而又六之是以乾之䇿二百一十六地數六故十二而十二之是以坤之䇿百四十有四也乾用九數三其八為二十四而九之亦二百一十有六兩其八為十六而九之亦百四十有四也坤用六故三其十二為三十六而六之亦二百一十有六也兩其十二為二十四而六之亦百四十有四也坤以十二之二十四六之六之一與半為乾之餘分則乾得一百五十二坤得一百八也陽四卦十二爻八陽四隂以三十六乗其陽以二十四乗其隂則三百八十四也卦之反對皆六陽六隂也在易則六陽六隂者十有二對也去四正者八陽四隂八隂四陽者各六對也十陽二隂十隂二陽者各三對也體有三百八十四而用止於三百六十何也以乾坤坎離之不用也乾坤離坎之不用何也乾坤離坎之不用所以成三百六十之用也故萬物變易而四者不變也夫惟不變是以能變也用止於三百六十而有三百六十六何也數之贏也數之贏則何用也乾之全用也乾坤不用則離坎用半也乾全用者何也陽主贏也乾坤不用者何也獨陽不生專隂不成也離坎用半何也離東坎西當隂陽之半為春秋晝夜之門也或用乾或用離坎何也主陽而言之故用乾也主贏分而言之則陽侵隂晝侵夜故用離坎也陽主贏故乾全用也隂主虛故坤全不用也陽侵隂隂侵陽故離坎用半也是以天之南全見而北全不見東西各半見也離坎隂陽之限也故離當寅坎當申而數常踰之者盖隂陽之溢也然用數不過乎寅爻數不過乎申或離當夘坎當酉乾四十八而四分之一分為隂所尅坤四十八而四分之一分為所尅之陽也故乾得三十六而坤得十二也陽主進是以進之為三百六十日隂主消是以十二月消十二日也順數之乾一兑二離三震四巽五坎六艮七坤八逆數之震一離兑二乾三巽四坎艮五坤六也乾四十八兑三十離二十四震十坤十二艮二十坎三十六巽四十乾三十六坤十二離兑巽二十八坎艮震二十兑離巽宜更思之圓數有一方數有二竒耦之義也六即一也十二即二也天圓而地方圓之數起一而積六方之數起一而積八變之則起四而積十二也六者常以六變八者常以八變而十二者亦以八變自然之道也八者天地之體也六者天之用也十二者地之用也天變方為圓而常存其一地分一為四而常執其方天變其體而不變其用也地變其用而不變其體也六者并其一而為七十二者并其四而為十六也陽主進故天并其一而為七隂主退故地去其四而止於十二也是陽常存一而隂常晦一也故天地之體止於八而天之用極於七地之用止於十二也圓者刓方以為用故一變四四去其一則三也三變九九去其三則六也方者引圓以為體故一變三并之四也四變十二并之十六也故用數成於二而極於六體數成於四而極於十六也是以圓者徑一而圍三起一而積六方者分一而為四分四而為十六皆自然之道也一役二以生三三去其一則二也三生九九去其一則八也去其三則六也故一役三三復役二也三役九九復役八與六也是以二生四八生十六六生十二也三并一則為四九并三則為十二十二又并四則為十六故四以一為本三為用十二以三為本九為用十六以四為本十二為用更思之陽尊而神尊故役物神故藏用是以道生天地萬物而不自見也天地萬物亦取法乎道矣陽者道之用隂者道之體陽用隂隂用陽以陽為用則尊隂以隂為用則尊陽也隂㡬於道故以况道也六變而三十六矣八變而成六十四矣十二變而成三百八十四矣六六而變之八八六十四變而成三百八十四矣八八而變之七七四十九變而成三百八十四矣圓者六變六六而進之故六十變而三百六十矣方者八變故八八而成六十四矣陽主進是以進之為六十也圓者星也厯紀之數其肇於此乎方者土也畫州井地之法其倣於此乎盖圓者河圗之數方者洛書之文故羲文因之而造易禹箕敘之而作範也蓍數不以六而以七何也并其餘分也去其餘分則六故䇿數三十六也是以五十者六十四卦閏嵗之䇿也其用四十有九六十四卦一嵗之䇿也歸竒卦一猶一嵗之閏也卦直去四者何也天變而地効之是以蓍去一則卦去四也圓者徑一圍三重之則六方者徑一圍四重之則八也裁方而為圓天之所以運行分大而為小地之所以生化故天用六變地用四變也一八為九裁為七八裁為六十六裁為十二二十四裁為十八三十二裁為二十四四十裁為三十四十八裁為三十六五十六裁為四十二六十四裁為四十八也一分為四八分為三十二十六分為六十四以至九十六分為三百八十四分一生六六生十二十二生十八十八生二十四二十四生三十三十生三十六引而伸之六十變而生三百六十矣此運行之數也四生十二十二生二十二十生二十八二十八生三十六此生物之數也故乾之陽䇿三十六兑離巽之陽䇿二十八震坎艮之陽䇿二十坤之陽䇿十二也圓者一變則生六去一則五也二變則生十二去二則十也三變則生十八去三則十五也四變則二十四去四則二十也五變則三十去五則二十五也六變則三十六去六則三十也是以存之則六六去之則五五也五則四而存一也四則三而存一也二則一而存一也故一生二去一則一也二生三去一則二也三生四去一則三也四生五去一則四也是故二以一為本三以二為本四以三為本五以四為本六以五為本也更思之方者一變而為四四生八并四而為十二八生十二并八而為二十十二生十六并十二而為二十八十六生二十并十六而為三十六也一生三并而為四也十二生二十并而為三十二也二十八生三十六并而為六十四也更思之易之大衍何數也聖人之倚數也天數二十五合之為五十地數三十合之為六十故曰五位相得而各有合也五十者蓍之數也六十者卦數也五者蓍之小衍也故五十為大衍也八者卦之小成則六十四為大成也蓍徳圓以况天之數故七七四十九也五十者存一而言之也卦徳方以况地之數故八八六十四也六十者去四而言之也蓍者用數也卦者體數也用以體為基故存一也體以用為本故去四也圓者本一方者本四故蓍存一而卦去四也蓍之用數七并其餘分亦存一之義也卦其一亦去一之義也蓍之用數掛一以象三其餘四十八則一卦之䇿也四其十二為四十八也十二去三而用九四三十二所去之䇿也四九三十六所用之䇿也以當乾之三十六陽爻也十二去五而用七四五二十所去之䇿也四七二十八所用之䇿也以當兑離之二十八陽爻也十二去六而用六四六二十四所去之䇿也四六二十四所用之䇿也以當坤之半二十四陰爻也十二去四而用八四四十六所去之䇿也四八三十二所用之䇿也以當艮坎之二十四爻并上卦之八陰為三十二爻也是故七九為陽六八為隂也九者陽之極數六者隂之極數數極則反故為卦之變也震巽無䇿者以當不用之數天以剛為徳故柔者不見地以柔為體故剛者不生是震巽不用也或先艮離後兑離乾用九故其䇿九也四之者以應四時一時九十日也坤用六故其䇿亦六也竒數四有一有二有三有四也䇿數四有六有七有八有九合而為八數以應方數之八變也歸竒合掛之數有六謂五與四四也九與八八也五與四八也九與四八也五與八八也九與四四也以應圓數之六變也竒數極於四而五不用䇿數極於九而十不用五則一也十則二也故去五十而用四十九也竒不用五䇿不用十有無之極也以况自然之數也卦有六十四而用止六十者何也六十卦者三百六十爻也故甲子止于六十也六甲而天道窮矣是以䇿數應之三十六與二十四合之則六十也三十二與二十八合之亦六十也乾四十八坤十二震二十巽四十離兑三十二坎艮二十八合之為六十蓍之數全故陽䇿三十六與二十八合之為六十四也卦數去其四故隂䇿二十四與三十二合之為五十六也九進之為三十六皆陽數也故為陽中之陽七進之為二十八先陽而後隂也故為陽中之隂六進之為二十四皆隂數也故為隂中之隂八進之為三十二先隂而後陽也故為隂中之陽蓍四進之則百卦四進之則百二十百則十也百二十則十二也歸竒合掛之數得五與四四則䇿數四九也得九與八八則䇿數四六也得五與八八得九與四八則䇿數皆四七也得九與四四得五與四八則䇿數皆四八也為九者一變以應乾也為六者一變以應坤也為七者二變以應兑與離也為八者二變以應艮與坎也五與四四去掛一之數則四八三十二也九與八八去掛一之數則四六二十四也五與八八九與四八去掛一之數則四五二十也九與四四五與四八去掛一之數則四四十六也故去其三四五六之數以成九八七六之䇿也天一地二天三地四天五地六天七地八天九地十參伍以變錯綜其數也如天地之相銜晝夜之相交也一者數之始而非數也故二二為四三三為九四四為十六五五為二十五六六為三十六七七為四十九八八為六十四九九為八十一而一不可變也百則十也十則一也亦不可變也是故數去其一而極于九皆用其變者也五五二十五天數也六六三十六乾之䇿數也七七四十九大衍之用數也八八六十四卦數也九九八十一𤣥範之數也大衍之數其算法之源乎是以算數之起不過乎方圓曲直也隂無一陽無十乗數生數也除數消數也算法雖多不出乎此矣陽得隂而生隂得陽而成故蓍數四而九卦數四而十也猶幹支之相錯幹以六終而支以五終也三四十二也二六亦十二也二其十二二十四也三八亦二十四也四六亦二十四也三其十二三十六也四九亦三十六也六六亦三十六也四其十二四十八也三其十六亦四十八也六八亦四十八也五其十二六十也三其二十亦六十也六其十亦六十也皆自然之相符也此盖隂數分其陽數耳是以相應也如月初一全作十二也二十四氣七十二候之數亦可因以明之四九三十六也六六三十六也陽六而又兼隂六之半是以九也故以數言之隂陽各三也以三爻言之天地人各三也隂陽之中各有天地人天地人之中各有隂陽故參天兩地而倚數也太極既分兩儀立矣陽下交於隂隂上交於陽四象生矣陽交於隂隂交於陽而生天之四象剛交於柔柔交於剛而生地之四象於是八卦成矣八卦相錯然後萬物生焉是故一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四故曰分隂分陽迭用柔剛易六位而成章也十分為百百分為千千分為萬猶根之有幹幹之有枝枝之有葉愈大則愈小愈細則愈繁合之斯為一衍之斯為萬是故乾以分之坤以翕之震以長之巽以消之長則分分則消消則分也乾坤定位也震巽一交也兑離坎艮再交也故震陽少而隂尚多也巽隂少而陽尚多也兑離陽浸多也坎艮隂浸多也是以辰與火不見也一氣分而為隂陽判得陽之多者為天判得隂之多者為地是故隂陽半而形質具焉隂陽偏而性情分焉形質又分則多陽者為剛也多隂者為柔也性情又分則多陽者陽之極也多隂者隂之極也兑離巽得陽之多者也艮坎震得隂之多者也是以為天地用也乾陽極坤隂極是以不用也乾四分取一以與坤坤四分取一以奉乾乾坤合而生六子三男皆陽也三女皆隂也兑分一陽以與艮坎分一隂以奉離震巽以二相易合而言之隂陽各半是以水火相生而相尅然後既成萬物也乾坤之名位不可易也坎離名可易而位不可易也震巽位可易而名不可易也兑艮名與位皆可易也離肖乾坎肖坤中孚肖乾頤肖離小過肖坤大過肖坎是以乾坤離坎中孚頤大過小過皆不可易者也離在天而當夜故陽中有隂也坎在地而當晝故隂中有陽也震始交隂而陽生巽始消陽而隂生兑陽長也艮隂長也震兑在天之隂也巽艮在地之陽也故震兑上隂而下陽巽艮上陽而下隂天以始生言之故隂上而陽下交泰之義也地以既成言之故陽上而隂下尊卑之位也乾坤定上下之位離坎列左右之門天地之所闔闢日月之所出入是以春夏秋冬晦朔弦望晝夜長短行度盈縮莫不由乎此矣無極之前隂含陽也有象之後陽分隂也隂為陽之母陽為隂之父故母孕長男而為復父生長女而為姤是以陽始於復隂始於姤也性非體不成體非性不生陽以隂為體隂以陽為體動者性也静者體也在天則陽動而隂静在地則陽静而隂動性得體而静體隨性而動是以陽舒而隂疾也更詳之陽不能獨立必得隂而後立故陽以隂為基隂不能自見必待陽而後見故隂以陽為唱陽知其始而享其成隂効其法而終其勞陽能知而隂不能知陽能見而隂不能見也能知能見者為有故陽性有而隂性無也陽有所不偏而隂無所不偏也陽有去而隂常居也無不徧而常居者為實故陽體虚而隂體實也自下而上謂之升自上而下謂之降升者生也降者消也故陽生於下而隂生於上是以萬物皆反生隂生陽陽生隂隂復生陽陽復生隂是以循環而無窮也天地之本其起於中乎是以乾坤交變而不離乎中人居天地之中心居人之中日中則盛月中則盈故君子貴中也本一氣也生則為陽消則為隂故二者一而已矣六者三而已矣八者四而已矣是以言天而不言地言君而不言臣言父而不言子言夫而不言婦也然天得地而萬物生君得臣而萬化行父得子夫得婦而家道成故有一則有二有二則有四有三則有六有四則有八隂陽生而分二儀二儀交而生四象四象交而成八卦八卦交而生萬物故二儀生天地之類四象定天地之體四象生八卦之類八卦定日月之體八卦生萬物之類重卦定萬物之體類者生之序也體者象之交也推類者必本乎生觀體者必由乎象生則未来而逆推象則既成而順觀是故日月一類也同出而異處也異處而同象也推此以往物曷逃哉天變時而地應物時則隂變而陽應物則陽變而隂應故時可逆知物必順成則是以陽迎而隂隨隂逆而陽順語其體則天分而為地地分而為萬物而道不可分也其終則萬物歸地地歸天天歸道是以君子貴道也有變則必有應也故變於内者應于外變于外者應于内變于下者應于上變於上者應于下也天變而日應之故變者從天而應者法日也是以日紀乎星月㑹於辰水生於土火潛於石飛者棲木走者依草心肺之相聫肝膽之相屬無他變應之道也本乎天者親上本乎地者親下故變之與應常反對也陽交於隂而生蹄角之類也剛交扵柔而生根核之類也隂交於陽而生羽翼之類也柔交於剛而生枝榦之類也天交於地地交於天故有羽而走者足而騰者草中有木木中有草也各以類而推之則生物之類不逃數矣走者便於下飛者利於上從其類也陸中之物水中必具者猶影象也陸多走水多飛者交也是故巨于陸者必細于水巨于水者必細于陸也虎豹之毛猶草也鷹鸇之羽猶木也木者星之子是以果實象之葉陰也華實陽也枝葉軟而根榦堅也人之骨巨而體繁木之榦巨而葉繁應天地之數也動者體横植者體縱人宜横而反縱也飛者有翅走者有趾人之兩手翅也兩足趾也飛者食木走者食草人皆兼之而又食飛走也故最貴於萬物也體必交而後生故陽與剛交而生心肺陽與柔交而生肝膽柔與陰交而生腎與膀胱剛與陰交而生脾胃心生目膽生耳脾生鼻腎生口肺生骨肝生肉胃生髓膀胱生血故乾為心兌為脾離為膽震為腎坤為血艮為肉坎為體巽為骨泰為目中孚為鼻既濟為耳頥為口大過為肺未濟為胃小過為肝否為膀胱天地有八象人有十六象何也合天地而生人合父母而生子故有十六象也心居肺膽居肝何也言性者必歸之天言體者必歸之地地中有天石中有火是以心膽象之也心膽之倒懸何也草木者地之本體也人與草木反生是以倒懸也口目横而鼻縱何也體必交也故動者宜縱而反横植者宜横而反縱皆交也天有四時地有四方人有四支是以指節可以觀天掌文可以察地天地之理具乎指掌矣可不貴之哉神統於心氣統於腎形統於首形氣交而神主乎其中三才之道也人之四肢各有脉也一脉三部一部三候以應天數也心蔵神腎蔵精脾蔵魂膽蔵魄胃受物而化之傳氣於肺傳血於肝而傳水穀於脬腸矣天圓而地方天南髙而北下是以望之如倚盖焉地東南下西北髙是以東南多水西北多山也天覆地地載天天地相函故天上有地地上有天天渾渾於上而不可測也故觀斗數以占天也斗之所建天之行也魁建子杓建寅星以寅為晝也斗有七星是以晝不過乎十分也更詳之天行所以為晝夜日行所以為寒暑夏淺冬深天地之交也左旋右行天日之交也日朝在東夕在西隨天之行也夏在北冬在南隨天之交也天一周而超一星應日之行也春酉正夏午正秋夘正冬子正應日之交也日以遲為進月以疾為退日月一㑹而加半日减半日是以為閏餘也日一大運而進六日月一大運而退六日是以為閏差也日行陽度則贏行隂度則縮賔主之道也月去日則明生而遲近日則魄生而疾君臣之義也陽消則生陰故日下而月西出也隂盛則敵陽故日朢而月東出也天為父日為子故天左旋日右行日為夫月為婦故日東出月西生也日月相食數之交也日朢月則月食月掩日則日食猶水火之相尅也是以君子用智小人用力日随天而轉月随日而行星随月而見故星法月月法日日法天天半明半晦日半贏半縮月半盈半虧星半動半静隂陽之義也天晝夜常見日見於晝月見於夜而半不見星半見於夜貴賤之等也月晝可見也故為陽中之隂星夜可見也故為陰中之陽天竒而地耦是以占天文者觀星而已察地理者觀山水而已觀星而天體見矣觀山水而地體見矣天體容物地體負物是故體歸於道也極南大暑極北大寒故南融而北結萬物之死地也夏則日隨斗而北冬則日随斗而南故天地交而寒暑和寒暑和而物乃生也天以剛為隂故柔者不見地以柔為體故剛者不生是以震巽天之陽也地隂也有陽而隂效之故至隂者辰也至陽者日也皆在乎天而地則水火而已是以地上皆有質之物隂伏陽而形質生陽伏隂而性情生是以陽生隂隂生陽陽尅隂隂尅陽陽之不可伏者不見於地隂之不可尅者不見於天伏陽之少者其體必柔是以畏陽而為陽所用伏陽之多者其體必剛是以禦陽而為隂所用故水火動而随陽土石静而随隂也一説云隂效陽而能㐲是以辰在天而地之四物皆有所主也陽生隂故水先成隂生陽故火後成隂陽相生也體性相須也是以陽去則隂竭隂盡則陽滅金火相守則流火木相得則然從其類也水遇寒則結遇火則竭從其所勝也陽得隂而為雨隂得陽而為風剛得柔而為雲柔得剛而為雷無隂則不能為雨無陽則不能為雷雨柔也而屬隂隂不能獨立故待陽而後興雷剛也屬體體不能自用必待陽而後發也有意必有言有言必有象有象必有數數立則象生象生則言著言著則意顯象數則筌蹄也言意則魚兔也得魚兔而謂必由筌蹄可也舍筌蹄而求魚兔則未見其得也天變而人效之故元亨利貞易之變也人行而天應之故吉凶悔吝易之應也以元亨為變則利貞為應以吉凶為應則悔吝為變元則吉吉則利應之亨則凶凶則應之以貞悔則吉吝則凶是以變中有應應中有變也變中之應天道也故元為變則亨應之利為變則應之以貞應中之變人事也故變則凶應則吉變則吝應則悔也悔者吉之先而吝者凶之本是以君子從天不從人元者春也仁也春者時之始仁者徳之長時則未盛而徳足以長人故言徳而不言時亨者夏也禮也夏者時之盛禮者徳之文盛則必衰而文不足救之故言時而不言徳故曰大哉乾元而上九有悔也利者秋也義也秋者時之成義者徳之方萬物方成而獲利義者不通於利故言時而不言徳也貞者冬也智也冬者時之末智者徳之衰正則吉不正則凶故言徳而不言時也故曰利貞者性情也至哉文王之作易也其得天地之用乎故乾坤交而為泰坎離交而為既濟也乾生於子坤生於午坎終於寅離終於申以應天之時也置乾於西北退坤於西南長子用事而長女代母坎離得位兌艮為耦以應地之方也王者之法其盡於是矣乾坤天地之本離坎天地之用是以易始於乾坤中於離坎終於既未濟而泰否為上經之中咸恒為下經之首皆言乎其用也坤統三女於西南乾統三男於東北上經起於三下經終於四皆交泰之義也故易者用也乾用九坤用六大衍用四十九而潛龍勿用也大哉用乎吾於此見聖人之心矣道生天天生地及其功成而身退故子繼父禪是以乾退一位也乾坤交而為泰變而為雜卦也乾坤坎離為上篇之用兌艮巽震為下篇之用也頥中孚大過小過為二篇之正也易者一陰一陽之謂也震兌始交者也故當朝夕之位離坎交之極者也故當子午之位巽艮雖不交而隂陽猶雜也故當用中之偏位乾坤純隂陽也故當不用之位乾坤縱而六子横易之本也震兌横而六卦縱易之用也象起於形數起於質名起於言意起於用天下之數出於理違乎理則入於術世人以數而入術故失於理也天下之事皆以道致之則休戚不能致矣天之陽在南而隂在北地之隂在南而陽在北人之陽在上而隂在下既交則陽下而隂上天以理盡而不可以形盡渾天之術以形盡天可乎辰數十二日月交㑹謂之辰辰天之體也天之體無物之氣也精義入神以致用也不精義則不能入神不能入神則不能致用也為治之道必通其變不可以膠柱猶春之時不可行冬之令也陽數一衍之為十十干之類是也隂數二衍之為十二十二支十二月之類是也元亨利貞之徳各包吉凶悔吝之事雖行乎徳若違于時亦或凶矣初與上同然上亢不及初之進也二與五同然二之隂中不及五之陽中也三與四同然三處下卦之上不若四之近君也天之陽在南故日處之地之剛在北故山處之所以地髙西北天髙東南也天之神棲乎日人之神發乎目人之神寤則棲心寐則棲腎所以象天也晝夜之道也雲行雨施電發雷震亦各從其類也吹噴嘘呵風雨雲霧雷言相類也萬物各有太極兩儀四象八卦之次亦有古今之象雲有水火土石之異他類亦然二至相去東西之度凡一百八十南北之度凡六十冬至之月所行如夏至之日夏至之月所行如冬至之日四正者乾坤坎離也觀其象無反覆之變所以為正也陽在隂中陽逆行隂在陽中隂逆行陽在陽中隂在隂中則皆順行此真至之理按圖可見之矣自然而然不得而更者内象外數也他皆外象外數也草類之細入於坤五行之木萬物之類也五行之金出乎石也故火水土石不及金木金木生其間也得天氣者動得地氣者静陽之類圓成形則方隂之類方成形則圓天道之變王道之權也夫卦各有性有體然皆不離乾坤之門如萬物受性于天而各為其性也在人則為人之性在禽獸則為禽獸之性在草木則為草木之性天以氣為主體為次地以體為主氣為次在天在地者亦如之氣則養性性則乗氣故氣存則性存性動則氣動也堯之前先天也堯之後後天也後天乃效法耳天之象數則可得而推如其神用則不可得而測也木之支榦土石之所成所以不易葉花水火之所成故變而易也自然而然者天也唯聖人能索之效法者人也若時行時止雖人也亦天生者性天也成者形地也日入地中搆精之象也體四而變六兼神與氣也氣變必六故三百六十也凡事為之極㡬十之七則可止矣盖夏至之日止于六十兼之以晨昏分可辨色矣庻㡬乎十之七也東赤南白西黄北黒此正色也騐之于曉午暮夜之時可見之矣圖雖無文先天圗也吾終日言而未嘗離乎是盖天地萬物之理盡在其中矣冬至之子中隂之極春分之夘中陽之中夏至之午中陽之極秋分之酉中隂之中凡三百六十中分之則一百八十此二至二分相去之數也陽中有隂隂中有陽天之道也陽中之陽日也暑之道也陽中之隂月也以其陽之類故能見于晝隂中之陽星也所以見于夜隂中之隂辰也天壤也氣一而已主之者乾也神亦一而已乗氣而變化能出入于有無死生之間無方而不測者也干者幹之義陽也支者枝之義隂也干十而支十二是陽數中有隂隂數中有陽也不知乾無以知性命之理時然後言乃應變而言言不在我也仁配天地謂之人唯仁者真可謂之人矣生而成成而生易之道也氣者神之宅也體者氣之宅也魚者水之族也蟲者風之族也天六地四天以氣為質而以神為神地以質為質而以氣為神唯人兼乎萬物而為萬物之靈如禽獸之聲以其類而各能得其一無所不能者人也推之他事亦莫不然唯人得天地日月交之用他類則不能也人之生真可謂之貴矣天地與其貴而不自貴是悖天地之理不祥莫大焉目口舌也凸而耳鼻竅竅者受臭嗅氣物或不能閉之凸者視色别味物則能閉之也四者雖象于一而各備其四矣燈之明暗之境日月之象也月者日之影也情者性之影也心性而膽情性神而情鬼水者火之地火者水之氣黒者白之地寒者暑之地心為太極又曰道為太極形可分神不可分草伏之獸毛如草之莖林棲之鳥羽如林之葉類使之然也隂事太半盖陽一而隂二也冬至之後為呼夏至之後為吸此天地一嵗之呼吸也木結實而種之又成是木而結是實木非舊木也此木之神不二也此實生生之理也性理大全書卷十一

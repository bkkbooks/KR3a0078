body:
  text: 性理大全書卷四十七學五存養持敬靜附南軒張氏曰持敬乃是切要工夫然要將箇敬來治心則不可葢主一之所謂敬敬是敬此也只敬便在此若謂敬為一物將一物治一物非惟無益而反有害乃孟子所謂必有事焉而正之卒為助長之病以下論持敬誠者天之道敬者人事之本敬道之成則誠而天矣然則君子之學始終乎敬者也人之有是心也其知素具也意亂而欲汩之紛擾臬兀不得湏臾以寧而正理益以蔽塞萬事失其統矣於此有道焉其惟敬而已乎伊川先生曰主一之謂敬又曰無適之謂一夫所謂一者豈有可玩而執者哉無適乃一也盖不越乎此而已嘗試於平居暇日深體其所謂無適者則庶乎可識於意言之表矣故儼若思雖非敬之道而於此時可以體敬焉即是而存之由是以察之則事事物物不得遁焉涵泳不舍思慮將日以清明而其知不蔽矣知不蔽則敬之意味無窮而功用日新矣天地之心其在兹與學者舍是而求入聖賢之門難矣哉至於所進有淺深則存乎其人用力敏勇與緩急之不同耳答潘叔昌曰所謂思慮時擾之患此最是合理㑹䖏其要莫若主一遺書中論此䖏甚多湏反復玩味據目下看底意思用工譬如汲井漸汲漸清如所謂未應事前此事先在既應之後此事尚存正緣主一工夫未到之故湏是思此事時只思此事做此事時只做此事莫教别底交互出来久久自别看時似乎淺近做時極難又曰所諭收歛則失於拘迫從容則失於悠緩此學者之通患於是二者之間必有事焉其惟敬乎拘迫則非敬也悠緩則非敬也但當常存乎此本原深厚則發見必多而發見之際察之亦必精矣若謂先識所謂一者而後可以用力則用力未篤所謂一者只是想象何由意味深長乎勉齋黄氏曰敬是束得箇虚靈如覺住如火炬束得𦂳時那燄頭直上不束則散滅了主敬致知兩事互為經緯但言敬而不能有所見者恐亦於此有所未思耳持守之方無出主敬前輩所謂常惺惺法已是將持敬人心胸内事摸寫出了更要去上靣生支節只恐支離無緣脱灑問前輩說主一無適是説得已發時敬如惺惺收歛是説得未發時敬曰未湏要辨未發已發且就自家心一息之間幾畨已發未發雖數千萬變豈無可辨認且如一箇大鏡相似恁地光皎在這裏人來照着便随他賦形人過去後這光皎者自若敬是人之本體人惟胡思亂想便失了夲然之體恐懼警畏正欲收拾他依元恁地人禀隂陽五行之氣以生其為是氣也莫不各有是理人得是氣以為體則亦具是理以為性又必有虚靈如覺者存乎其間以為心事物未接思慮未萌虚靈知覺者感而遂通一寂一感而是理亦為之寂感焉使夫虚靈知覺者常肅然而不亂炯然而不昏則寂而理之體無不存感而理之用無不行矣惟夫虚靈知覺既不能不囿於氣而又不能不動於欲也則將為氣所昬為欲所亂而理之體用亦随之而昏且亂矣此敬之說所由以立也虚靈如覺我所有也吾惟慢怠而無以檢之則為氣所昏為欲所亂矣惕然悚然常若鬼神父師之臨其上常若深淵薄氷之䖏其下則虚靈知覺者自不容於昬且亂矣故嘗聞之先師曰敬字之説惟畏為近之誠能以所謂畏者驗之則不昬不亂可見矣曰然則諸説之不同何也曰惺惺者不昬之謂也主於一而不容一物撓亂之謂也整齊嚴肅則制於外以飬其中也是皆可以體夫敬之意矣然而不昬不亂者必先敬而後能如此制於外以養其中者必如此而後能敬以之體敬之義必欲真見夫所謂敬者惟畏為近之也葢畏即敬也能敬則能整齊嚴肅整齊嚴肅則能敬能敬則不昏不亂矣此朱子不得不取夫諸説以明夫敬而又以畏字為最近也北溪陳氏曰程子謂主一之謂敬無適之謂一文公合而言之曰主一無適之謂敬尤分曉敬一字從前經書説䖏儘多只把做閑慢説過到二程方拈出来就學者做工夫䖏説見得這道理尤𦂳切所闗㝡大敬字本是箇虚字與畏懼等字相似今把做實工夫主意重了似箇實物一般人心妙不可測出入無時莫知其鄉惟敬便存在這裏所謂敬者無他只是此心常存在這裏不赱作不散漫常恁地惺惺便是敬上蔡所謂常惺惺却是就心地上做工夫䖏說得亦親切盖心常醒在這裏便常惺惺恁地活若不在便死了心纔在這裏則萬理森然於其中古人謂敬徳之聚正如此禮謂執虚如執盈入虚如有人只就此二句體認持敬底工夫意象最親切且如人捧箇至盈底物心若不在這上纔移一歩便傾了惟執之拳拳心常在這上雖行到那裏也不傾倒入虚如有人雖無人境界此心常嚴肅如對大賓然此便是主一無適底意格物致知也湏敬正心誠意也湏敬齊家治國平天下也湏敬敬者一心之主宰萬事之根本程子説人心做工夫䖏特注意此字盖以此道理貫動靜徹表裏一始終本無界限閑靜無事時也用敬應事接物時也用敬心在裏靣也如此動出外來做事也如此初頭做事也如此做到末稍也如此此心常無間斷纔間斷便不敬西山真氏曰伊川先生言主一之謂敬又恐人未曉一字之義又曰無適之謂一適往也主於此事則不移於他事是之謂無適也主者存主之義伊川又云主一之謂敬一者之謂誠主則有意在學者用功湏當主於一主者念念守此而不離之意也及其涵飬既熟此心湛然自然無二無雜則不待主而自一矣不待主而自一即所謂誠也敬是人事之本學者用功之要至於誠則達乎天道矣此又誠敬之分也所謂主一者靜時要一動時亦要一平居暇日未有作為此心亦要主於一此是靜時敬應事接物有所作為此心亦要主於一此是動時敬靜時能敬則無思慮紛紜之患動時能敬則無舉措煩擾之患如此則夲心常存而不失為學之要莫先於此端莊靜一乃存飬工夫端莊主容貎而言靜一主心而言葢表裏交正之功合而言之則敬而已秦漢以下諸儒皆不知敬為學問之本自程子始指以示人而朱子又發明之極其切至二先生有功於聖門此其㝡大者也往昔百聖相傳敬之一言實其心法盖天下之理惟中為至正惟誠為至極然敬所以中不敬則無中也敬而後能誠非敬則無以為誠也氣之决驟軼於奔駟敬則其衘轡也情之横放甚於潰川敬則其隄防也故周子主靜之言程子主一之訓皆其為人㝡切者而子朱子又丁寧反復之學者倘於是而知勉焉戒於思慮之未萌恭於事物之既接無少間斷則徳全而欲冺矣鶴山魏氏答張大監曰敬字之義甚大孔門説仁䖏大抵多有敬意如四勿二如之類是也左傳敬徳之聚能敬必有徳此義極精自聖學不傳人多以擎跽曲拳正坐拱嘿之類為敬至周程以後如誠字敬字仁字方得聖賢本指其所謂主一無適之謂敬此㝡精切魯齋許氏曰聖人之心如明鏡止水物來不亂物去不留用工夫主一也主一是持敬也東萊嘗云南軒言心在焉則謂之敬且如方對客談論而他有所思雖思之善亦不敬也才有間斷便是不敬臨川呉氏曰易書詩禮之言敬者非一及夫子答子路之問則其辭重以専而子路莫之悟也再問三問意若有所不􅁕聖人語以堯舜猶病雖能已其問而子路猶未悟也嗚呼子路聖門髙第弟子也果於從人勇於治己當時許其升堂後人尊之為百世之師親承修己以敬之誨於夫子而未能心受也况後聖人千數百載而掇拾其遺言者乎伊洛大儒嗣聖傳於己絶提敬之一字為作聖之梯階漢唐諸儒所不得而聞也新安大儒繼之直指此為一心之主宰萬事之根本其示學者切矣夫人之一身心為之主人之一心敬為之主主於敬則心常虚虚者物不入也主於敬則心常實實者我不出也敬也者當若何而用力耶必有事焉非但守此一言而可得也仁義禮智之得於天者謂之徳是徳也雖同得於有生之初而或失於有生之後能得其所得而不失者君子也盖徳具於心者也欲不失其心豈有他術哉敬以持之而已矣昔子路問君子夫子以修己以敬為荅敬也者所以成君子之徳也堯舜禹之欽即敬也傳之於湯為日躋之敬傳之於文王為緝熙之敬夫子修己以敬之言傳自堯舜禹湯文王而傳之於顔曽子思孟子者也至於程子遂以敬字該聖功之始終敬之法主一無適也學者遽聞主一無適之說儻未之能且當由謹畏入事事知所謹而於所不當為者有不肯為念念知所畏而於所不當為者有不敢為充不肯為不敢為之心而進退焉凡事主於一而不二乎彼凡念無所適而専在乎此程子敬字之法不過如是敬則心存心存而一靜一動皆出於正仁義禮智之得於心者庶其得於心而不失矣乎程子曰惟靜者可以為學以下論静學者患心慮紛亂不能寧靜此則天下公病學者只要立箇心此上頭儘有商量尹和靖孟敦夫張思叔侍坐伊川指靣前水盆語曰清靜中一物不可著纔著物便揺動張子曰靜有言得大䖏有小䖏如仁者靜大也靜而能慮則小也始學者亦要靜以入徳至成徳亦只是靜上蔡謝氏曰近道莫如靜齋戒以神明其徳天下之至靜也延平李氏答朱晦翁書曰某曩時從羅先生學問終日相對靜坐只説文字未嘗及一雜語先生極好靜坐某時未有知退入室中亦只靜坐而已先生令靜中看喜怒哀樂未發之謂中未發時作何氣象此意不唯於進學有力兼亦是飬心之要朱子曰明道教人靜坐李先生亦教人靜坐盖精神不定則道理無湊泊䖏又云湏是靜坐方能收歛靜坐無閑雜思慮則養得来便條暢或問不拘靜坐與應事皆要専一否曰靜坐非是要如坐禪入定斷絶思慮只收歛此心莫令赱作閑思慮則此心湛然無事自然専一及其有事則随事而應事已則復湛然矣不要因一事而惹出三件兩件如此則雜然無頭項何以得他専一只觀文王雝雝在宫肅肅在廟不顯亦臨無射亦保便可見敬只是如此古人自少小時便做了這工夫故方其洒掃時加帚之禮至於學詩學樂舞學弦誦皆要専一且如學射時心若不在何以能中學御時心若不在何以使得他馬書數皆然今既自小不曽做得不奈何湏著從今做去方得若不做這工夫却要讀書看義理恰似要立屋無基地且無安頓屋柱䖏今且説那營營底心㑹與道理相入否㑹與聖賢之心相契否今求此心正為要立箇基址得此心光明有箇存主䖏然後為學便有歸著不錯若心雜然昏亂自無頭當却學從那頭去又何䖏是收功䖏故程先生湏令就敬字上做工夫正為此也人也有靜坐無思念底時節也有思量道理底時莭豈可畫為兩途説靜坐時與讀書時工夫迥然不同當靜坐涵飬時正要體察思繹道理只此便是涵飬不是説喚醒提撕將道理去却那邪思妄念只自家思量道理時自然邪念不作言忠信行篤敬立則見其參扵前在輿則見其倚於衡只是常常見這忠信篤敬在眼前自然邪妄無自而入非是要存這忠信篤敬去除那不忠不敬底心今人之病正在於靜坐讀書時二者工夫不一所以差問存養多用靜否曰不必然孔子却都就用處教人做工夫今雖説主靜然亦非棄事物以求靜既為人自然用事君親交朋友撫妻子御僮僕不成捐棄了只閉門靜坐事物之来且曰候我存養又不可只茫茫随他事物中走二者湏有箇思量倒斷始得頃之復曰動時靜便在這裏動時也有靜順理而應則雖動亦靜也故曰知止而后有定定而后能靜事物之来若不順理而應則雖塊然不交於物以求靜心亦不能得靜惟動時能順理則無事時能靜靜時能存則動時得力湏是動時也做工夫靜時也做工夫兩莫相靠使工夫無間斷始得若無間斷靜時固靜動時心亦不動動亦靜也若無工夫則動時固動靜時雖欲求靜亦不可得而靜靜亦動也動靜如船之在水潮至則動潮退則止有事則動無事則靜一云事来則動事過了靜如潮頭髙船也髙潮頭下船也下雖然動靜無端亦無截然為動為靜之理如人之氣吸則靜嘘則動又問答之際答則動也止則靜矣凡事皆然且如涵飬致知亦何所始但學者湏自截􅀙一䖏做去程子謂學莫先於致知是知在先又曰未有致知而不在敬者則敬也在先從此推去只管恁地心於未遇事時湏是靜及至臨事方用便有氣力如當靜時不靜思慮散亂及至臨事先已倦了伊川解靜専䖏云不専一則不能直遂閑時湏是收歛定做得事便有精神心要精一方靜時湏湛然在此不得困頓如鏡様明遇事時方好心要收拾得𦂳如顔子請事斯語便直下承當及犯而不校却别靜便定熟便透靜為主動為客靜如家舍動如道路靜中動起念時動中靜是物各付物人身只有箇動靜靜者飬動之根動者所以行其靜動中有靜如發而皆中節䖏便是動中之靜問動靜兩字人日間靜時煞少動時常多曰若聖人動時亦未嘗不靜至衆人動時却是攪擾亂了如今人欲為一事未嘗能専此一事䖏之􅀙容不亂其思慮之發既欲為此又欲為彼此是動時却無那靜也為人君止於仁為人臣止於敬止於仁敬者靜也要止於仁與敬者便是動只􅃹是一動一靜循環無端所以謂動極復靜靜極復動如人嘘吸若嘘而不吸則湏絶吸而不嘘亦必壅滯著不得嘘者所以為吸之基尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也大凡這箇都是一屈一信一消一息一往一来一闔一闢大底有大底闔闢消息小底有小底闔闢消息皆只是這道理問伊川常教人靜坐如何曰亦是他見人要多思慮且以此教人收拾此心耳若初學者亦當如此主敬存飬雖說必有事焉然未有思慮作為亦靜而已所謂靜者固非槁木死灰之謂而所謂必有事者亦豈求中之謂哉答呉伯豐書曰學問臨事不得力固是靜中欠却工夫然欲舍動求靜又無此理盖人之身心動靜二字循環反覆無時不然但常存此心勿令忘失則随動随靜無䖏不是用力䖏矣明道在扶溝時謝游諸公皆在彼問學明道一日曰諸公在此只是學某説話何不去力行二公云某等無可行者明道曰無可行時且去靜坐盖靜坐時便涵飬得夲原稍定雖是不免逐物及自覺而收歛歸来也有箇着落譬如人出外去才歸家時便自有箇着身䖏若是不曽存飬得箇本原茫茫然逐物在外便要收歛歸来也無箇着身䖏也伊川見人靜坐如何便歎其善學曰這却是一箇總要䖏問而今看道理不出只是心不虚靜否曰也是不曽去看㑹看底就看䖏自虚靜這箇互相發問汪長孺所讀何書長孺誦大學所疑曰只是輕率公不惟讀聖賢之書如此凡說話及論人物亦如此只是不敬又云長孺氣粗故不子細為今工夫湏要靜靜多不妨今人只是動多了靜靜亦自有説話程子曰為學湏是靜又曰靜多不妨才靜事都見得然總亦只是一箇敬問初學精神易散靜坐如何曰此亦好但不専在靜䖏做工夫動作亦當體驗聖賢教人豈専在打坐上要是随䖏着力如讀書如待人䖏事若動若靜若語若黙皆當存此無事時只合靜心息念且未説做他事只自家心如何令把捉不定恣其散亂赱作何有於學孟子謂學問之道無他求其放心而已矣不然精神不收拾則讀書無滋味應事多齟齬豈能求益乎問伯羽如何用功曰且學靜坐痛抑思慮曰痛抑也不得只是放退可也若全閉眼而坐却有思慮矣又言也不可全無思慮無邪思耳問滕徳粹近作何工夫徳粹云靜坐而已曰横渠云言有教動有法晝有為宵有得息有飬瞬有存此語極好君子終日乾乾不可食息閑亦不必終日讀書或靜坐存飬亦是天地之生物以四時運動春生夏長固是不息及至秋冬凋落亦只藏於其中故明年復生若使至秋冬已絶則來春無緣復有生意學者常喚令此心不死則日有進問武侯寧靜致逺之説曰靜便養得根本深固自可致逺問宋傑尋常覺得資質昬愚但持敬則此心虚靜覺得好若敬心稍不存則裏靣固是昬雜而發於外亦鶻突所以専於敬而無失上用功曰這裏未消說敬與不敬在葢敬是第二節事而今便把来夾雜説則鶻突了愈難理㑹且只要識得那一是一二是二便是虚靜也要識得這物事不虚靜也要識得這物事如未識得這物事時則所謂虚靜亦是箇黒底虚靜不是白底虚靜而今湏是要打破那黒底虚靜換做箇白淨底虚靜則八窓玲瓏無不融通不然則守定那裏底虚靜終身黑淬淬地莫之通曉也問每日暇時畧靜坐以飬心但覺意自然紛起要靜越不靜曰程子謂心自是活底物事如何窒定教他不思只是不可胡亂思纔着箇要靜底意思便是添了多少思慮且不要恁地拘迫他湏自有寧息時又曰要靜便是先獲便是助長便是正問延平先生靜坐之説如何曰這事難説靜坐理㑹道理自不妨只是討要靜坐則不可理㑹得道理明透自然是靜今人都是討靜坐以省事則不可盖心下熱閙如何看得道理出湏是靜方看得出所謂靜坐只是打疊得心下無事則道理始出道理既出則心下愈明靜矣勉齋黄氏曰寂然不動心之體也事物未接思慮未萌湛然純一如水之止如衡之平則其夲靜矣蔽交於前其中則遷情慾熾而益蕩感物而動者既失其節寂然不動者亦且紛紜膠擾而不能以頃刻寧動靜相因展轉迷亂天理日微人欲日肆矣故主靜者所以制乎動無欲者所以全乎靜此周子之意而亦有所自来也艮其背不獲其身行其庭不見其人主乎靜也旦晝之梏亡則夜氣不􅁕以存無欲則靜也問程子云靜後見萬物皆有春意如何此還是指聖賢而言否潛室陳氏曰觀物内㑹靜者能之固是聖賢如此吾人胷次豈可不見此境界靜却不分聖賢省察程子曰人為不善於幽隱之中者謂人莫已知也而天理不可欺何顯如之或曰是猶楊震所謂四知者乎曰幾之矣然人我知之猶有分也天地則無二知也尸居却龍見淵黙却雷聲妄動由有欲妄動而得者其必妄動而失一失也其得之必失之二失也况有㐫咎随之乎是故妄得之福災亦随焉妄得之得失亦繼焉苟或知此亦庶幾乎不由欲而動矣學始於不欺闇室張子曰求養之道心只求是而已盖心𢎞則是不𢎞則不是心大則百物皆通心小則百物皆病悟後心常𢎞觸理皆在吾術内覩一物又敲㸃着此心臨一事又記着此心常不為物所牽引去視燈燭亦足以警道大率因一事長一智只為持得術博凡物常不能出博大之中慎喜怒此只矯其末而不知治其夲宜矯輕警惰廣平游氏曰曽子云三省其身若夫學者之所省又不止此事親有不􅁕於孝事長有不足於敬歟行或愧於心而言或浮於行歟慾有所未窒而忿有所未懲歟推是類而日省之則曽子之誠身庶乎可以跂及矣人所不睹可謂隱矣而心獨見之不亦見乎人所不聞可謂微矣而心獨聞之不亦顯乎知莫見乎隱莫顯乎微而不能慎獨是自欺也其離道逺矣和靖尹氏曰莫大之禍起於湏臾之不忍不可不謹延平李氏曰凡蹈危者慮深而獲全居安者患生於所忽此人之常情也朱子曰要知天之與我者只如孟子説無惻隱之心非人也無羞惡之心非人也無是非之心非人也無辭讓之心非人也今人非無惻隱羞惡是非辭讓發見䖏只是不省察了若於日用間試省察此四端者分明迸賛出来就此便操存涵飬將去便是下手䖏只為􅀙前不省察了此端纔見又被物欲汩了所以秉彛不可磨滅䖏雖在而終不能光明正大如其本然就日用間實下持敬工夫求取放心然後却看自家本性元是善與不善自家與堯舜元是同與不同若信得及意思自然開明持守亦不費力矣道體流行初無間斷是以無所不致其戒懼非謂獨戒懼乎隱微而忽畧其顯著也天下之事非艱難多事之可憂而宴安酖毒之可畏政使功成事定無一事之可為尚當朝兢夕惕居安慮危而不可以少怠審微於未形御變於將来非知道者孰能人不自知其病者是未嘗去體察警省也古人瞽史誦詩之類是規戒警誨之意有時不然便被他恁地炒自是使人住不着大抵學問湏是警省今説求放心吾輩却要得此心主宰得定方賴此做事業如中庸說天命之謂性即此心也率性之謂道亦此心也修道之謂教亦此心也以至於致中和賛化育亦只此心也致知即心致也格物即心格也克己即心克也非禮勿視聴言動勿與不勿只爭毫髪地爾所以明道説聖賢千言萬語只是欲人將已放之心收拾入身来自能尋向上去今且湏就心上做得主定方驗得聖賢之言有歸着自然有契如中庸所謂尊徳性致廣大極髙明盖此心本自如此廣大但為物欲隔塞故其廣大有虧本自髙明但為物欲係累故於髙明有蔽若能常自省察警覺則髙明廣大者常自若非有所増損之也其道問學盡精微道中庸等工夫皆自此做儘有商量也若此心上工夫則不待啇量睹當即今見得如此則更無閑時行時坐時讀書時應事接物時皆有着力䖏大抵只要見得收之甚易而不難也學者湏是求放心然後識得此性之善人性無不善只緣自放其心遂流於惡天命之謂性即天命在人便無不善䖏發而中節亦是善不中節便是惡人之一性完然具􅁕二氣五行之所禀賦何嘗有不善人自不向善上去兹其所以為惡爾韓愈論孟子之後不得其傳只為後世學者不去心上理㑹堯舜相傳不過論人心道心精一執中而已天下只是善惡兩端譬如陰陽在天地間風和日暖萬物發生此是善底意思及羣陰用事則萬物彫瘁惡之在人亦然天地之理固是抑遏陰氣勿使常勝學者之於善惡亦要於兩夾岸䖏攔截分曉勿使纎惡間絶善端動靜日用時加體察持飬久之自然成熟許多言語雖随䖏説得有淺深大小然而下工夫只一般如存其心與持其志亦不甚爭存其心語雖大却寛持其志語雖小却𦂳只持其志便收歛只持其志便内外肅然又曰持其志是心之方漲䖏便持着問存心曰非是别將事物存心一云非是活捉一物来存着孔子曰居處恭執事敬與人忠便是存心之法如説話覺得不是便莫説做事覺得不是便莫做亦是飬心之法靜中私意横生此學者之通患能自省察至此甚不易得此當以敬為主而深察私意之萌多為何事就其重䖏痛加懲窒久之純熟自當見效不可計功於旦暮而多為説以亂之也文字講説得行而意味未深者正要本源上加功湏是持敬持敬以靜為主此意湏要於不做工夫時頻頻體察久而自熟但是着實自做工夫不干别人事為仁由己而由人乎哉此語的當更看有何病痛知有此病必去其病此便是療之之藥如覺言語多便用簡黙意思踈闊便加細宻覺得輕浮淺易便湏深沉重厚程先生所謂矯輕警惰盖如此人有此心便知有此身人昏昧不知有此心便如人困睡不知有此身人雖困睡得人喚覺則此身自在心亦如此方其昏蔽得人警覺則此心便在這裏學者工夫只在喚醒上問人放縱時自去收歛便是喚醒否曰放縦只為昏昧之故能喚醒則自不昏昧不昏昧則自不放縦矣心只是一箇心非是以一箇心治一箇心所謂存所謂收只是喚醒人心常炯炯在此則四體不待覊束而自入規矩只為人心有散緩時故立許多規矩来維持之但常常提警教身入規矩内則此心不放逸而炯然在矣心既常惺惺又以規矩繩檢之此内外交相飬之道也心不専靜純一故思慮不精明要湏飬得此心令虚明専靜使道理従裏靣流出便好問何以能如此莫只在靜坐否曰自去檢㸃且一日間試看此㡬箇時在内㡬箇時在外小説中載趙公以黒白豆記善惡之起此是古人做工夫䖏如此檢㸃則自見矣李先生嘗云人之念慮若是於顯然過惡萌動此却易見易除却怕於匹似閑底事爆起来纒繞思念將去不能除此尤害事某向来亦是如此問凡人之心不存則亡而無不存不亡之時故一息之頃不加提省之力則淪於亡而不自覺天下之事不是則非而無不是不非之䖏故一事之微不加精察之功則䧟扵惡而不自知近見如此不知如何曰道理固是如此然初學後亦未􅀎便如此也問進徳之方曰大率要修身窮理若修身上未有工夫亦無窮理䖏又問修身如何曰且先收放心如心不在無下手䖏要去體察你平日用心是為己為人若讀書計較利禄便是為人問發於思慮則有善不善看来不善之發有二有自思慮上不知不覺自發出来者有因外誘然後引動此思慮者閑邪之道當無所不用其力於思慮上發時便加省察更不使形於事為於物誘之際又當於視聴言動上理㑹取然其要又只在持敬惟敬則身心内外肅然交致其功則自無二者之病曰謂發䖏有兩端固是然畢竟􅀙思慮上發者也只是外来底天理渾是一箇只不善便是不從天理出来不従天理出来便是出外底了視聴言動該貫内外亦不可謂専是外靣功夫若以為在内自有一件功夫在外又有一件功夫則内外支離無此道理湏是誠之於思守之於為内外交致其功可也問人之手動足履湏還是都覺得始得看来不是䖏都是心不在後挫過了曰湏是見得他合當是恁地問立則見其參於前在輿則見其倚於衡只是熟後自然見得否曰也只是随䖏見得那忠信篤敬是合當如此又問舊見敬齋箴中云擇地而蹈折旋蟻封遂欲如行歩時要歩歩覺得他移動要之無此道理只是常常提撕曰這箇病痛湏一一識得方得且如事父母方在那奉飬時又自著注脚解説道這箇是孝如事兄長方在那順承時又自著注脚解説道這箇是弟便是兩箇了問只是如事父母當勞苦有倦心之際却湏自省覺説這箇是當然曰是如此問居常苦私意紛擾雖即覺悟而痛抑之然竟不􅀎得潔靜不起曰惟其此心無主宰故為私意所勝若常加省察使良心常在見破了這私意只是從外靣入縱饒有所發動只是以主待客以逸待勞自家這裏亦容他不得此事湏是平日著工夫若待他起後方省察殊不濟事問不敬之念非出扵心如忿慾之萌學者固當自克雖聖賢亦無如之何至於思慮妄發欲制之而不能曰纔覺恁地自家便挈起了但莫先去防他然此只是自家見理不透做主不定所以如此大學曰物格而后知至如至而后意誠纔意誠則自然無此病問橫渠先生謂范巽之云吾輩不及古人病源何在巽之請問横渠云此非難悟設此語者盖欲學者存意之不妄庶游心浸熟有一日脱然如大寐之得醒耳曰横渠先生之意正要學者將此題目時時省察使之積久貫熟而自得之耳非謂只要如此説殺也或曰毎常䖏事或思慮之發覺得發之正者心常安其不正者心常不安然義理不􅁕以勝私欲之心少間安者却容忍不安者却依舊被私欲牽將去及至事過又却悔悔時依舊是本心發䖏否曰然只那安不安䖏便是本心之徳孔子曰志士仁人無求生以害仁有殺身以成仁求生如何便害仁殺身如何便成仁只是箇安與不安而已又曰不待接事時方流入於私欲只那未接物時此心已自流了湏是未接物時也常剔抉此心教他分明少間接事便不至於流上蔡觧為人謀而不忠云為人謀而忠非特臨事而謀至於平居靜慮思所以䖏人者一有不盡則非忠矣此雖於本文說得來太過然却如此今人未到為人謀時方不忠只平居靜慮閑思念時便自懷一箇利便於己將不好處推與人之心矣湏是於此䖏常常照管得分明方得問於私欲未能無之但此意萌動時却知用力克除覺方寸累省頗勝前日更當如何曰此只是強自降伏若未得天理純熟一旦失覺察病痛出來不可知也問五峯所謂天理人欲同行異情莫湏這裏要分别否曰同行異情只如飢食渇飲等事在聖賢無非天理在小人無非私慾所謂同行異情者如此此事若不曽尋著本領只是説得他名義而已説得明義儘分曉畢竟無與我事湏就自家身上實見得私欲萌動時如何天理發見時如何其間正有好用功夫處盖天理在人亘古今而不冺選甚如何蔽錮而天理常自若無時不自私意中發出但人不自覺正如明珠大貝混雜沙礫中零零星星逐時出来但只於這箇道理發見處當下認取打合零星漸成片段到得自家好底意思日長月益則天理自然純固向之所謂私欲者自然消磨退散久之不復萌動矣若専務克治私欲而不能充長善端則吾心所謂私欲者日相闘敵縦一時按伏得下又當復作矣初不道隔去私欲後别尋一箇道理主執而行纔如此又只是自家私意只如一件事見得如此為是如此為非便從是䖏行將去不可只恁休誤了一事必湏知悔只這知悔䖏便是天理孟子説牛山之木既曰若此其濯濯也又曰萌蘖生焉既曰旦晝梏亡又曰夜氣所存如説求放心心既放了如何又求得只為這些道理根於一性者渾然至善故發於日用者多是善底道理只要人自識得雖至惡人亦只患他頑然不知省悟若心裏稍知不穩便從這裏改過亦豈不可做好人孟子曰人之所以異於禽獸者幾希庶民去之君子存之去只是去著這些子存只是存得這些子學者所當深戒也呉晦叔言省克二字不可廢南軒張氏曰然纔省了便克既克了又省當如循環然范陽張氏曰一念之善則天神地祗祥風和氣皆在於此一念之惡則妖星癘鬼凶荒札瘥皆在於此是以君子慎其獨象山陸氏曰人之資禀不同有沉滯者有輕揚者古人有韋弦之義固當自覺不待人言但有恣縱而不􅀎自克者有能自克而用功不深者念慮之正不正在頃刻之間念慮之不正者頃刻而知之即可以正念慮之正者頃刻而失之即是不正此事皆在其心書曰惟聖㒺念作狂惟狂克念作聖勉齋黄氏曰理義之精微心術之隱奥所差甚微而天理人欲之分君子小人之判自此而决不可不察也魯齋許氏曰凡事一一省察不要逐物去了雖在千萬人中常知有已此持敬大畧也日用間若不自加提策則怠惰之心生焉怠惰心生不止於悠悠無所成而放僻邪侈随至矣耳目聞見與心之所發各以類應如有種焉今日之所出者即前日之所入也同聲相應同氣相求未嘗少差不可不慎也庸人之目見利而不見害見得而不見失以縱情極欲為益已以存心飬性為桎梏不䘮徳殞身而不已惟君子為能見微而知著遏人欲於將萌臨川呉氏曰夫易以溺人汚人者色與貨也非禮非義之事雖甚不良之人往往畏人之知而不敢肆苟人所不知之地一時不勝其利欲之私則於所不當為能保其不為之乎若顔叔子之達旦秉燭若楊伯起之暮夜却金若司馬君實趙閲道之所為無一不可與人言無一不可與天知真能慎獨者也性理大全書卷四十七

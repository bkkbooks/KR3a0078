body:
  text: 厯代四東漢光武南軒張氏曰光武之不任功臣為三公蓋鑒髙帝之弊而欲保全之前史莫不以為美談以予觀之光武之保全功臣使皆得以福禄終身是固美矣然於用人之道則有未盡也蓋用人之道先以一説横於胷中則為私意非立賢無方之義矣髙帝之待功臣誠非也如韓彭黥布之徒雖有大功要皆天資小人在易之師開國承家小人勿用蓋於用師既終成功之後但當寵之以富貴而不可使之有國家而為政也髙帝正犯此義是以不能保功臣之終為光武者要當察吾大臣有如韓彭之徒者乎則當以是待之若光武之功臣則異於是至冦鄧賈復則又識明而行脩量洪而器逺以光武時所用之大臣論之若三子者類過之逺甚與共圖政豈不可乎顧乃執一槩之嫌廢大公之義是反為私意而已矣抑光武之所責於大臣者特為吏事大臣之職顧如是乎惟其不知大臣所當任之職故不知用大臣之道而獨以吏事之督責為憂抑亦末矣方當亂定之後正冝登用賢才與共圖紀綱以為垂世長乆之計而但知吏事責三公其貽謀之不競亦冝矣東萊吕氏曰光武治天下規模不及髙帝其禮嚴光用卓茂所以養得後來許多名節光武罷郡縣材官等事其識見與秦皇相去不逺或問光武之失正在攬權而史乃稱其總攬權綱舉無過事何耶潜室陳氏曰光武再造於僵仆之後如何不總攬權綱但末流之弊至不任三公乃矯枉過正非謂全不是和帝致堂胡氏曰和帝㓜冲能誅竇憲自是威權不失無大過舉尊信儒術友愛兄弟禮賢納諌中國乂安方之章帝實過之矣鄧禹呉漢朱子曰古人年三十時都理㑹得了便受用行将去如鄧禹十三嵗學於京師已識光武為非常人後來杖䇿謁軍門只以數年定天下大計古之名将能立功名者皆是謹重周宻乃能有成如呉漢朱然終日欽欽常如對陳湏學這様底方可如劉琨恃才傲物驕恣奢侈卒至父母妻子皆為人所屠今人率以才自負自待以英雄以至恃氣傲物不能謹嚴以此臨事卒至於敗而已要做大功名底人越要𦂳宻未聞粗魯闊略而能有成者嚴光南軒張氏曰嘗怪嚴子陵竟不為帝少屈何邪攷子陵之言論風㫖亦非素隠行怪必欲長徃而不反者彼與光武少而相從知其心度為㝡詳也以謂光武欲為當時之治則當時之人才固足辦之而無待乎己若欲進乎兩漢之事則又懼有未能信從者不然徒受其髙位饗其尊禮之虚名則非子陵之本心也故寧不就之然而以子陵為光武之故人名髙一世而竟髙卧不屈光武亦不敢屈之其所以激頑起懦扶植風化助成東京風俗之美人才之盛其為力固亦多矣豈不美哉黄憲龜山楊氏曰黄叔度學充其徳雖顔子可至矣或問黄憲不得似顔子朱子曰畢竟是資禀好又問若得聖人為之依歸想是煞好曰又不知他志向如何顔子不是一箇衰善底人看他多少聰明便敢問為邦孔子便告以四代禮樂李固杜喬南軒張氏曰李杜二公精忠勁節不憚殺身百世之下凛乎猶有生氣其視胡廣趙戒軰真不翅如糞土也但恨於幾㑹節目之間處之未盡要是於春秋提綱之法講之不素耳李固方舉於朝即就梁商之辟商雖未有顯過然如固之志業其進也将以正邦殆不可以茍也一為之屬即渉梁氏賔客事必有牽制者矣此其失之於前也方質帝之弑也固為首相又質帝忍死有語之以被毒之事則任是責者非固而誰質帝既不幸固便當召尚書發冀姦正大義顯言于朝則忠臣義士孰不應固冀雖勢盛然名其為賊逆順理殊蓋可誅也此間不容髪之時而固昧夫大幾獨推究侍醫等舉動迂緩使冀得以措手大義不白人心日以懈㢮其幾既失固身據大位當大權持大義而反聴命受制於賊豈不惜哉此其失之於後也夫以冀之悖逆而固且奏記與議所立固豈不知冀心之所存哉失太阿之柄而陵遲至此耳度固之不白發冀罪非黨梁氏也恐事之不成無益故欲隠忍以待清河王之立庻幾可扶社稷而不知天下大變已為冢宰理當明義以正之事之成與不成蓋非所問况如前所論逆順之理冀决無以逭死邪固之隠忍乃所以成冀姦謀殺身不足道而社稷重受害矣若固者盡其忠國之心而無克亂之才可勝惜哉杜喬在九卿中若懐是見必賛固為之矣及繼固為相已制命於冀矣相與就死嗚呼悲夫朱穆龜山楊氏曰蔡邕謂朱穆貞而孤有羔羊之節觀其立朝論議有足稱者然乃從梁冀之辟何也孟子曰觀近臣以其所為主觀逺臣以其所主以穆之賢而主梁冀烏在其為貞孤哉然邕之從董卓無異於梁冀冝其不以朱穆為過也荀淑朱子曰近㸔温公論東漢名節處覺得有未盡處但知黨錮諸賢趨死不避為光武明章之烈而不知建安以後中州士大夫只知有曹氏不知有漢室却是黨錮殺戮之禍有以敺之也且以荀氏一門論之則荀淑正言於梁氏用事之日而其子爽已濡跡於董卓専命之朝及其孫彧則遂為唐衡之壻曹操之臣而不知以為非蓋剛大直方之氣折於凶虐之餘而漸圖所以全身就事之計故不覺其淪胥而至此耳想其當時父兄師友之間亦自有一種議論文飾蓋覆使驟而聴之者不覺其為非而真以為是必有深謀竒計可以活國救民於萬分有一之中也邪説横流所以甚於洪水猛獸之害孟子豈欺予哉陳寔勉齋黄氏曰陳太丘送張讓父之䘮人以為善類頼以全活者甚衆前軰亦以為太丘道廣嘗竊疑之如此則枉尺直尋而可為歟士君子行己立身自有法度有義有命豈冝以此為法天地如此其廣古今如此其逺人物如此其衆便使東漢善類盡為宦官所殺世亦曷嘗無善類哉若使是真丈夫又豈畏宦官之禍而藉太丘如此之屈辱以全其身哉吾人於此等處直湏見得分明不然未有不墮坑落塹者也竇武何進陳蕃龜山楊氏曰桓靈之間昬弱相仍女后臨朝權移近習乆矣王甫曹節以臺厮之賤便嬖寵昵之私竊弄神器固天下之所同疾也竇武倚元舅之親操國重柄招集天下名儒碩徳布在王庭相與仗義恊謀勦絶凶類正猶因迅風之勢以揚稃粃耳豈不易哉然而身敗功頽貽國後患者幾事不宻而禍成於猶豫也方武之不受詔馳入歩軍營召㑹北軍五校士數千人勢猶足以有為也張奂北州人豪素非中人之黨可以義動也不能乗機决䇿収為己用而乃遲囘逹旦使逆賊得與奂等合豈不惜哉何進親見竇氏之敗而不用陳琳鄭公業之諫躬蹈覆轍引姦凶而授之柄卒成移鼎之禍進實兆之也范􅁮乃引天廢商之言豈不謬哉朱子曰東漢誅宦官事前軰多論之然嘗細考其事恐禍根不除終無可安之理後人據紙上語指㸃前人甚易為力不知事到手頭實要處㫁毫髪之間便有成敗不是容易事若使陳竇只誅得首惡一二人後來未必不取王允五王之禍也南軒張氏曰竇武陳蕃雖據權處位而事當至難主弱一也政在房闥二也宦者盤錯其勢已成三也武等雖漸引類於朝而植根未固上則太后之心未明禍亂之原下則中外之情未識朝廷之尊而武等之謀但欲速决為誅小人之計夫當時宦者雖有罪然豈無輕重先後之倫乃一槩欲施之舉動草草今日誅數軰明日誅數軰輕重失其權先後失其序非天討矣且使之人人自疑反締其黨與而速其姦謀善處大事者顧如是邪觀朱瑀所謂中官放縱者自可誅耳我曹何罪而當盡族滅使蕃武施之有道行之有序則雖此曹蓋亦有心服者矣殱厥渠魁脅從罔治此待盗與小人之法而亦天心也况其所自處者又自有失方是時非衆志允從其何以濟事宦者竊柄已乆人知有此曹而已為大臣者要當深自刻苦至誠惻怛舉動無失而後人有以孚信而趨向於我人心向信則勢立而形成然後可以消弭禍亂而武於靈帝踐位之初一門三侯妄自封殖如此其誰心服乎故王甫後來亦得以藉口則可見此曹平日之所竊議而衆志之所不平者矣及難之作雖曰忠義而無或應之以張奂之賢猶且被紿而莫知逆順之所在則以武平日所為未有以慰士大夫故也蕃雖亂爵而不能力止武之封是亦潔身之為耳任天下之重顧止如是哉然予每讀蕃辭爵之踈未嘗不三覆歎息其辭逹其義正東京之文若此者蓋鮮亦足以見其忠義之氣也可勝惜哉趙苞程子曰東漢趙苞為邊郡守虜奪其母招以城降苞遽戰而殺其母非也以君城降而求生其母固不可然亦當求所以生母之方奈何遽戰乎不得已身降之可也王陵母在楚而使楚質以招陵陵降可也徐庻得之矣臧洪龜山楊氏曰􅆇洪初為張超功曹後遇袁紹以為青州刺史二人之遇洪其義均矣而洪之報二人者何其異哉方曹公圍超於雍丘也洪欲赴難而請兵於紹袁曹方睦而紹之與超素無一日之觀則雍丘之圍非切於己也欲其背好用師以濟不切之難則紹之不聴未為過而洪之絶紹豈亦不重彼已歟其不屈而死也蓋亦匹夫匹婦之為諒也已總論或有問寗武子邦有道則智邦無道則愚其智可及其愚不可及初理㑹不得武子當衞成公無道失國之時周旋其間盡心竭力而不去及成公囚京師武子求掌槖饘賂醫薄酖免衞侯於死終以復國及元咺之訟武子又獨以忠而獲免其能保身以濟其君如此雖謂之知可也而夫子曰其愚不可及又嘗曰君子哉蘧伯玉邦有道則仕邦無道則可卷而懐之以伯玉之事責武子雖謂之愚不識時亦可也然惓惓忠君不避險艱能為人所不能為抑亦難矣故謂之愚蓋閔之也其稱南容曰邦有道則仕邦無道則免於刑戮武子之免亦幸矣然武子仕衞两世其君信任之義不可棄之而去其幾於東漢王允乎允又不免被害伊尹以天下為己任治亦進亂亦進使成湯不興聘幣不至雖五就桀其志曷施陳蕃漢代人豪驅馳險阨之中與刑人腐夫同朝争衡屢退而不去者以仁為己任非人倫莫相䘏也卒以謀踈見殺亦昧於夫子免刑戮之戒然陳蕃王允猶是當時朝廷倚任身居鼎軸義當與國存亡故程子曰亦有不當愚者比干是也若無言責官守則如東漢逄萌當先漢之亂憤三綱之既絶挂冠東都門浮海而去惟恐其或緩也君子之道詎可不識時幾朱子曰所疑寗武子事大槩得之但為蘧伯玉南容之愚則易為武子之愚則難所以聖人有不可及之歎陳蕃王允固不得為伯玉南容之愚然蕃事未成而謀已泄允功未就而志已驕則又不能為寗武子之愚此其所以取禍也然為逄萌則甚易為二公則甚難又不可以彼而責此但當問其時義之如何與其所處之當否可也南軒張氏曰髙祖洪模大畧非光武所及也髙祖起匹夫提三尺取天下光武則以帝室之胄因人心之思漢而復舊業其難易固有間矣而髙祖之對乃項籍亦蓋世之豪也光武所與周旋者獨張歩隗囂公孫述軰其去籍蓋萬萬相逺矣至於韓信彭越之徒皆如泛駕之馬實難駕御而盡在髙祖掌握之中指麾使令無不如意使光武有臣如此未必能用也然而創業之難光武固不及髙祖而至於光武之善守則復非髙祖所及也大抵髙祖天資極髙所不足者學爾即位之後所以維持經理者類皆疎畧雄傑之氣不能自歛卒至平城之辱一時功臣處之不得其道類皆赤族此則由其學不足之故也光武天資雖不逮髙祖而自其少時從諸生講儒學謹行義故天下既定則知兵之不可不戢審黄石存包桑閉玉闗以謝西域之質安南定北以為單于乆逺之計處置功臣假以爵寵而不使之任事卒保全其始終凡此皆思處縝宻要自儒學中來至於尊禮隠逸褒崇風節以振起士氣後之人君尤未易及此非特髙祖也嗟乎以髙祖之天資使之知學為當務則湯武之聖亦豈不可至哉是尤可歎息也名節之稱起於衰世昔之儒者學問素克其施於用随時著見不蘄於立節而其節不可奪不蘄乎徇名而其名随之在己初無一毫加意也至於世衰道微於陵遲委靡之中而其能㧞然自立者則世以名節歸之而士君子道學未至則亦以此自負吁亦小矣然而名節之稱雖起於衰世而於衰世之中實亦有頼乎此使併與是焉而俱亡則亦無以為國矣西漢之儒者予甚病之蓋自董相申公數人之外其餘徃徃以佔畢詁訓為儒無復氣象上焉既不能推尋問學之源流而其次又不能以名節立於衰世其亦何所貴於儒也考其所自亦由上之人有以致之自髙帝鄙薄儒生文景則尚黄老武帝雖號為表章然徇其文而不究其實適足以為害至宣帝則又明示所以不崇尚之意矣則其挫抑摧沮之餘不復自振固宜然儒者之學豈必為一時貴向而後勉邪待文王而後興者凡民也漢之儒者自叔孫通師弟子固皆以利禄為事至於公孫丞相取相印封侯學士皆歆慕之其流如夏侯勝之剛果猶有明經取青紫之言况他人乎蓋其習俗胥靡之陋一至於此冝乎王莽簒竊之日貢符獻瑞一朝成羣而能自潔者班班僅有見於史也故光武中興力矯斯弊尊徳義貴隠逸以變其風而中世以後人才軰出雖視昔之儒者有愧然在衰世之中守義不變蓋有足尚者矣至於桓靈之後國勢奄奄羣狡並起睥睨神器未敢即取者亦一時君子維持之力也然則名節之稱在君子則為未盡而於國家亦何負哉蓋不可不思也人言東漢之亡黨錮趣之也曽不知東漢若無數君子其亡也尤速譬如羸病者之服丹一旦死則歸罪於丹不知其所以能延數日之命者丹之力使其不服丹則其死必速矣東京黨錮諸君子蓋嘉其志氣之美而惜其所處之未盡重其天資之髙而歎其於學有所未足也方是時乾綱觧紐隂邪得路天下之勢日入於頽敗矣而諸君子曽不少貶以徇於世慷慨所激視死如歸至於患難得䘮寜復肯顧其志氣可謂美矣雖然昔之君子其出處屈伸之際蓋各有義故當困之時則有居困之道當屯之時則有亨屯之法時不我用則晦處自脩危行而言遜其進不可茍也若乃居位則思其艱而慮其周扶持根本漸以圖濟其為不可驟也黨錮諸君子在下則嘘枯吹生自為題榜圭角眩露昧夫處困之道矣及其有位於朝不過奮袂正色搏擊毫强數軰以為事業在是矣又進而居髙位則果於有為直欲一施之而不復顧身死非所問而國勢愈傾是又失亨屯之法矣是豈非有所未盡為可恨歟若諸君子之不為死生禍福易操其間如李膺杜宻陳蕃軰卓然一時其天資可謂剛特不羣矣然惟其未知從事於聖門也故所行雖正立節雖嚴未免發於意氣之所動而非循乎義理之安出於惡其聲之所感而未盡夫惻隠之實處之有未盡固其冝也豈非於學有不足歟使其在聖門則當入於仲由之科聖人抑揚矯揉之其必有道矣或以為陳太丘之事為得其中以予觀之太丘在諸君子之中持心最平蓋天資又加美焉耳而其所處張讓之事亦非中節在當時隠迹自晦豈無其方何至送宦者之葬此又為矯失之過以此免禍君子亦不貴也不然則郭有道乎識髙而量洪才優而處逺足為當時人物之領䄂然収歛之功猶未之盡要亦於學有欠也不然則黄叔度乎言論風㫖雖不盡見然其氣象温厚圭角渾然見之者有所感於心其為最髙乎使在聖門作成之當居顔氏之科矣或問髙帝不免韓彭之誅而光武乃能全功臣之世何耶潜室陳氏曰此大有説一則逐鹿之勢外相臣服事定難制一則髙祖之業名位素定事已相安一則草昧功臣豪傑難収一則中興功臣謹守規矩一則大度中有嫚罵之失人心素疑一則大度中能動如節度人心素定一則定其死力封爵過度不計後患一則赤心在人監戒覆轍務在保全問髙帝只因請苑事便疑蕭何欲置之辟光武於馮異或譛其威權太重百姓歸心而帝信之愈篤何髙帝之介介於其小而光武乃釋然於其大曰髙帝因諸将而疑元臣光武鑒徃事而全功臣三國漢昭烈或云昭烈知有權而不知有正朱子曰先主見幾不明經權諸失當劉琮迎降之際不能取荆州烏在其知權耶至於狼狽失據乃不得已而出於盗竊之計善用權者正不如此若聲罪致討以義取之乃是用權之善蓋權不離正正自有權二者初非二物也劉備之敗於陸遜雖言不合輕敵亦是自不合連營七百餘里先自做了敗形是時孔明在成都督運餉後云法孝直若在不使主上有此行孔明先不知曽諫止與否今皆不可考但孔明雖正然盆去聲法孝直輕快必有術以止之先主不忍取荆州不得已而為劉璋之圖若取荆州雖不為當然劉表之後君弱勢孤必為他人所取較之取劉璋不若得荆州之為愈也學者皆知曹氏為漢賊而不知孫權之為漢賊也若孫權有意興復漢室自當與先主協力并謀同正曹氏之罪如何先主纔整頓得起時便與壊倒如襲取闗羽之類是也權自知與操同是竊據漢土之人若先主事成必滅曺氏且復滅呉矣權之姦謀蓋不可掩平時所與先主交通姑為自全計爾或曰孔明與先主俱留益州獨令闗羽在外遂為陸遜所襲當時只先主在内孔明在外如何曰正當經理西向宛洛孔明如何可出此特闗羽恃才踈鹵自取其敗據當時處置如此若無意外齟齬曺氏不足平两路進兵何可當也此亦漢室不可復興天命不可再續而已深可惜哉或問蜀先主以國委孔明無言不聴伐呉之役先主誠失計也而孔明曽不以為非及其既敗乃曰法孝直若在必能制主上東行何孔明不能諫於知己之主而猶有待於孝直也潜室陳氏曰只縁孔明規模在據荆益方成伯業以荆州為必争之地争而不得後方悔耳魏曹操呉孫權元城劉氏謂馬永卿曰温公退居洛一日語某曰昨夕㸔三國志識破一事因令取三國志及文選示某乃理㑹武帝遺令也公曰遺令之意如何某曰曹公平生姦至此盡矣故臨死諄諄作此令也公曰不然此乃操之微意也遺令者世所謂遺囑也必擇𦂳要言語付囑子孫至若纎細不𦂳要之事則或不暇矣且操身後之事有大於禪代者乎令操之遺令諄諄百年下至分香賣履之事家人婢妾無不處置詳盡無一語語及禪代之事其意若曰禪代之事自是子孫所為吾未嘗教為之是實以天下遺子孫而身享漢臣之名此遺令之意厯千百年無人識得昨夕偶窺破之公似有喜色且戒某曰非有識之士不足以語之或云非温公識髙不能至此曰此無他也乃一誠字爾惟以誠意讀之且誠之至者可以開金石况此虚偽之事一看即觧散也某因此厯觀曹操平生之事無不如此夜卧枕圓枕噉野葛至尺許飲鴆酒至一盞皆此意也操之負人多矣恐人報已故先揚此聲以誑時人使人無害己意也然則遺令之意亦揚此聲以誑後世耳或論三國形勢朱子曰曹操合下便知據河北可以為取天下之資既被袁紹先説了他又不成出他下故為大言以誑之胡致堂説史臣後來代為文辭以欺後世看來只是一時無説了大言耳此著被袁紹先下了後來﨑嶇萬状尋得箇獻帝來為挾天子令諸侯之舉此亦是第二大著若孫權據江南劉備據蜀皆非取天下之勢僅足以自保耳曹操用兵煞有那幸而不敗處却極能料如征烏桓便能料得劉表不從其後來孫權與劉備同禦曹操亦是其勢不得不合孫權若不與劉備即當迎降於操然此两人終非好相識到利害處便不相顧劉備纔得荆州權便遣吕䝉去擒闗羽人謂曹操父子為漢賊以某觀之孫權真漢賊耳先主孔明正做得好時被孫權來戰两陣到這裏便難向前了權又結托曹氏父子權之為人正如偷去劉氏一物知劉氏之興必來取此物不若結托曹氏以賊托賊使曹氏勝我不害守得一隅曹氏亡則吾亦初無利害諸葛亮程子曰孔明有王佐之心道則未盡王者如天地之無私心焉行一不義而得天下不為孔明必求有成而取劉璋聖人寜無成耳此不可為也若劉表子琮将為曹公所并取而興劉則可也孔明不死三年可以取魏且宣王有英氣乆不得伸必沮死不乆也孔明營五丈原宣王言無能為此偽言安三軍耳兵自髙地來可勝先主嘗自觀五丈原曰此地不可據英雄欺人不可盡信問文中子謂諸葛亮無死禮樂其有興乎諸葛亮可以當此否曰禮樂則未敢望他只是諸葛亮已近王佐又問如取劉璋事如何曰只有這一事大不是便是計較利害當時只為不得此則無以為資然豈有人特地出迎他却於座上執之大叚害事只是箇為利君子則不然只一箇義不可便休豈可茍為又問如湯兼弱攻昧如何曰弱者兼之非謂并兼取他只為助他與之相兼也昧者乃攻亂者乃取亡者乃侮諸葛亮近王佐之才或問亮果王佐才何為僻守一蜀而不能有為於天下曰孔明固言明年欲取魏幾年定天下其不及而死則命也某嘗謂孫覺曰諸葛武侯有儒者氣象孫覺曰不然聖賢行一不義殺一不辜雖得天下不為武侯區區保完一國不知殺了多少人邪某謂之曰行一不義殺一不辜以利一己則不可若以天下之力誅天下之賊殺戮雖多亦何害陳恒弑君孔子請討孔子豈保得討陳恒時不殺一人耶蓋誅天下之賊則有所不得顧爾曰三國之興孰為正曰蜀志在興復漢室則正也元城劉氏曰淮隂武侯二人不同若論人品則淮隂不及孔明逺甚若論功業而武候何寥寥也馬永卿曰西南者漢始終之地也故漢起於西南而卒終於此而淮隂當漢之初興故能卓卓如此而武侯之時火将燼矣故無所成也曰此固然矣然淮隂所以得便冝者以平日名太卑而武侯所以無成者以平日名太髙也淮隂有乞食胯下之辱也而武侯即隠於隆中而當時謂之卧龍此一事也又淮隂既從項梁又事項羽又歸漢而武侯則必待三顧而後起此又一事也又楚漢之時用兵者皆非淮隂之敵而嘗易之故淮隂能取勝也三國之時若司馬仲逹軰乃武侯等軰人也而又素畏孔明故武侯不能取勝也譬知奕碁有二國手一國手未有名而對之乃低碁不知其為國手而嘗易之故狼狽大敗有一國手已有名對局者亦國手而差弱焉謹以待之故勝敗未分也且淮隂既平魏趙而功業如此其卓犖也而龍且尚且輕之曰吾平生知韓信為人易與耳寄食於漂母無資身之䇿受辱於胯下無兼人之勇以淮隂平日名素卑也孔明與司馬宣王對壘不能取尺寸地宣王受其中幗之辱而不敢出兵至其已死按行軍壘猶曰天下竒材也故當時有死諸葛走生仲逹之嘲以孔明平日名素髙故也人品髙下不同而其功業反相去之逺者由此豫章羅氏曰西漢人才可與適道東漢人才可與立三國人才可與權杜欽谷永可與適道而不可與立故附王氏陳蕃竇武可與立而不可與權故困於宦官至於諸葛孔明然後可與權夫人才至可與權而不可以有加張良近太公之材畧諸葛近伊尹之出處然良佐髙祖論其時則冝語其徳則合亮處三國則材大任小惜哉朱子曰孔明天資甚美氣象宏大但所學不盡純正故亦不能盡善取劉璋一事或以為先主之謀未必是孔明之意然在當時多有不可盡曉處如先主東征之類不見孔明之語議論後來壊事却追恨法孝直若在則能制主上東行孔明得君如此猶有不能盡言者乎南軒言孔明體正大問學未至此語也好但孔明本不知學全是駁雜了然却有儒者氣象後世誠無他比程先生云孔明有王佐之心然其道則未盡其論極當魏延請從間道出闗中侯不聴侯意中原已是我底物事何必如此故不從不知先主當時只從孔明不知孔明如何取荆取蜀若更從魏延間道出闗中所守者只是庸人從此一出是甚聲勢如拉朽然後竟不肯為之問孔明出處曰當時只有蜀先主可與有為耳如劉表劉璋之徙皆了不得曹操自是賊既不可從孫權又是两間底人只有先主名分正故只得從之問孔明殺劉璋是如何曰這只是不是初間教先主殺劉璋先主不從到後來先主見事勢廹也打不過便從他計要知不當恁地行計殺了他若明大義聲罪致討不患不服㸔劉璋欲從先主之招傾城人民願留之那時郡國乆長能得人心如此孔明之事其於荆蜀亦合取當日草廬亦是商量凖擬在此但此時不當恁地若是恁地取時全不成舉措如二人視魏而不伐自合當取兼在是時捨此無以為資若能聲其罪用兵而取之却正但當時劉焉父子亦得人情恐亦未易取或問聖人處此合如何曰亦湏别有箇道理若是如此寜可事不成只為後世事欲茍成功欲茍就便有許多事孔明大綱却好只為如此便有班駁處義利之大分武侯知之有非他人所及者亦其天資有過人處若其細微之間則不能無未察處豈其學有未足故耶觀讀書之時他人務為精熟而已則獨觀大㫖此其大者固非人所及而不務精熟亦豈得無欠闕耶或論孔明事以為天民之未粹者此論甚當然以為畧數千户而歸不肯徙還乃常人之態而孔明於此亦未能免俗者則熹竊疑之夫孔明之出祁山三郡響應既不能守而歸則魏人復取三郡必齮齕首事者墳墓矣㧞衆而歸蓋所以全之非賊人諱空手之謂也近年南北交兵淮漢之間數有䧏附而吾力不能守虜騎復來則委而去之使忠義遺民為我死者肝腦塗地而莫之収省此則孔明之所不忍也故其言曰國家威力未舉使赤子困於豺狼之吻蓋傷此耳此見古人忠誠仁愛之心招徠懐附之畧恐未必如或者之論也孔明失三郡非不欲盡徙其民意其倉卒之際力之所及止是而已若其心則豈有窮哉以其所謂困於豺狼之吻者觀之則亦安知前日魏人之暴其邊境之民不若今之胡虜哉孔明非急近功見小利詭衆而自欺者徙民而歸殆亦昭烈不肯棄民之意歟問孔明興禮樂如何曰也不見得孔明都是禮樂中人也只是粗底禮樂孔明擇父正得醜女奉身調度人所不堪彼其正大之氣經綸之藴固已得於天資然竊意其智慮之所以日益精明威望之所以日益隆重者則寡欲養心之助與為多焉㸔史䇿自有該載不盡處如後人多説武侯不過子午谷路徃徃那時節必有重兵守這處不可過今只見子午谷易過而武侯自不過史只載魏延之計以為夏侯楙是曹操壻怯而無謀守長安甚不足畏這般所在只是該載不盡亮以為此危計不如安從坦道又揚聲曰斜谷又使人據箕谷此可見未易過問孔明出師每乏糧古人做事湏有道理湏先主些根本曰孔明是殺賊不得不急如人有箇大家被賊來占了趕出在外墻下住殺之豈可緩一纔緩人便一切都忘了孔明亦自言一年死了幾多人不得不急為之意司馬懿甚畏孔明便使得辛毗來遏令不出兵真實是不敢出也諸葛公是忠義的司馬懿司馬懿是無状底諸葛公劉禪備位而已南軒張氏曰諸葛武侯左右昭烈父子立國於蜀明討賊之義不以强弱利害一其心蓋凛凛乎三代之佐也侯之言曰漢賊不两立王業不偏安又曰臣鞠躬盡力死而後已至於成敗利鈍非臣之明所能逆睹嗟乎誦味斯言則侯之心可見矣雖不幸功業未究中道而殞然其扶皇極正人心挽囘先王仁義之風垂之萬世與日月同其光明可也夫有天地則有三綱中國之所以異於夷狄人類之所以别無庻物者以是故耳若汩於利害之中而亡夫天理之正則雖有天下不能一朝居此侯所以不敢斯湏而忘討賊之義盡其心力至死不悔者也方天下雲擾之初候獨髙卧昭烈以帝室之胄三顧其廬而後起從之則夫出處之際固已有大過人者其治國立經陳紀而不為近圖其用兵正義明律而不以詭計凡其所為悉本大公曽無纎毫姑息之意類皆非後世所可及至讀其将没自表之辭則知天下物欲舉不足以動之所養者深則所發者大理固然也曽子曰士不可以不𢎞毅若侯者其所謂𢎞且毅者歟孟子曰冨貴不能滛貧賤不能移威武不能屈此之謂大丈夫若侯者所謂大丈夫非耶問孔明不死能取中原否曰屯田渭上根本已固必能取中原司馬懿亦是能者常不敢與戰又問蒋琬特守常之才乎曰誠不可以應變馬謖議論與孔明畧相似其才非不可用但置之帷幄則可以之為将帥則違其才孔明使之領衆為前鋒於此小有差爾或問魯两生謂禮樂必百年可興文中子輕許孔明何也潜室陳氏曰叔孫通人物汚下故两生却之孔明人物正大故文中子許之問文中子曰諸葛亮而無死禮樂其有興乎近思録程子亦以此許之敢問孔明自比管樂使果能興復漢室恐未必便能興禮樂如三代曰孔明是天資帶得又從學問中攛出來據他用事行師調度若當升平之時做出必湏光明不止漢唐人物問巴蜀四塞非進取之地惟一江陵然諸葛亮不勸先主都之及闗羽之危又不聞救之何也曰江陵屬荆州武侯首陳取荆州之䇿先主不能用其後争之於呉而不得呉止分數郡以與之至闗羽之敗并數郡而失之况得而都之耶况荆襄為南北咽喉在三國為必争之地乃戎馬之塲非帝之都也魯齋許氏曰不問利害只求義理孔明見得真當時只有復漢討賊為當然至於成敗利鈍非臣之明所能逆睹歸之於天而已只得如此做便是聖賢之心常人則必計其成敗利害也臨川呉氏曰開誠心布公道集衆思廣忠益諸有忠慮於國但勤攻吾之闕漢丞相諸葛忠武侯語也可以為萬世相天下者之法矣孔明豈不知為相之體哉於主簿楊顒之諌也生既謝之死又哀之孔明豈不知其言之忠哉然而罰二十以上皆親覽食少事繁至為敵國所窺而慶幸其不乆孔明豈不知愛重其身哉其若是者何也嗚呼是未可以常情度淺識議也夫知相之體而未免自勞知言之忠而未見樂取知一身繫國之存亡而竟取敵國慶幸之計茍非甚愚者或有所不為而謂蓋世絶人之智者為之乎予故曰是未可以常情度淺識議也且當時事勢如何耶以一木支大厦之傾事君而致其身盡瘁於國遑恤其他夫豈可已而不已者楊顒之諫謂之愛孔明則可謂之知孔明則未也杜子美詩云三分割據紆籌䇿萬里雲霄一羽毛又云運移漢祚難恢復志决身殱軍務勞此詩字字有意細味之庻乎知孔明之心而豈常情淺識之所能測度擬議者哉荀彧龜山楊氏曰議者謂曹公非取天下於漢其説非也方曹公以强忍之資因亂假義挾主威以利諸侯其包蔵禍心天下庸人知之矣而荀彧間闗河冀擇其所歸卒從曹氏志欲扶義奮謀以舒倒懸之急迹其行事可謂勇智兼人矣乃獨不知曹氏之無君乎其拒董昭之議何也夫豈誠有忠貞之節歟抑欲以晩節蓋之歟由前則不智由後則不忠不智不忠而求免於亂臣冝乎其難矣嗚呼荀君安得無罪歟觀其臨大義㫁大謀操弄强敵於股掌之間輔成曹氏之霸業至其威加海内下陵上逼乃欲潜杜其不軌是猶揚瀾潰堤以成㴞天之勢而後徐以一葦障之尚可得乎而范􅁮猶謂彧有殺身成仁之美吾不知其説也東坡謂荀文若其才似子房其道似伯夷予以謂其才似子房則有之矣伯夷不事非君不立於惡人之朝寜忍事操乎以為其道似伯夷吾不知其説朱子曰荀彧之死胡文定引宋景文説以為劉穆之宋齊丘之比最為得其情状之實無復改評矣考其議論本末未見其有扶漢之心其死亦何足悲又據本傳彧乃唐衡之壻則彧之失其本心乆矣性理大全書卷六十二

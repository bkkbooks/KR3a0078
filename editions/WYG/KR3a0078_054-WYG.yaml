body:
  text: 性理大全書卷五十四學十二讀書法二朱子曰讀書先讀大學以定其規模次讀論語以立其根本次讀孟子以觀其發越次讀中庸以求古人之微妙處大學一篇有等級次第總作一處易曉宜先看論語却實但言語散見初看亦難孟子有感激興發人心處中庸亦難讀看三書後方宜讀之又曰中庸工夫密規模大讀書且從易曉易解處去讀四書道理粲然人只是不去看若理㑹得此四書何書不可讀何理不可究何事不可處學者於庸學論孟四書果然下工夫句句字字涵泳切已看得透徹一生受用不盡只怕人不下工雖多讀古人書無益書只是明得道理却要人做出書中所說聖賢工夫來若果看此數書他書可一見而决矣大學一篇乃入徳之門户學者當先講習知得為學次第規模乃可讀語孟中庸先見義理根源體用之大畧然後徐攷諸經以極其趣庶㡬有得盖諸經條制不同工夫浩博若不先讀大學論孟中庸令胷中開明自有主宰未易可遽求也為學之初尤當深以貪多躐等好髙尚異為戒耳然此猶是知見邉事若但入耳出口以資談說則亦何所用之既已知得便當謹守力行乃為學問之實耳論孟中庸待大學通貫浹洽無可得看後方看乃佳道學不明元來不是上面欠却工夫乃是下面元無根脚若信得及脚踏實地如此做去良心自然不放踐履自然純熟非但讀書一事也問初學當讀何書曰六經語孟皆聖賢遺書皆當讀但初學且須知緩急大學語孟最是聖賢為人切要處然語孟却是隨事答問難見要領唯大學是曽子述孔子說古人為學之大方門人又傳述以明其㫖體統都具玩味此書知得古人為學所鄉讀語孟便易入後面工夫雖多而大體已立矣為學須是先立大本其初甚約中間一節甚廣大到末梢又約孟子曰博學而詳說之将以反說約也故必先觀論孟大學中庸以考聖賢之意讀史以考存亡治亂之迹讀諸子百家以見其駁雜之病其節目自有次序不可踰越近日學者多喜從約而不於博求之不知不求於博何以考驗其約論孟中庸大學乃學問根本尤當專一致思以求其指意之所在今乃或此或彼泛然讀之此則尤非所以審思明辨而究聖學之淵源也此四書者當以序進每畢一書首尾通貫意味浹洽然後又易一書乃能有益其餘亦損其半然後可以研味從容深探其立言之㫖而無迫切泛濫之累矣某嘗說讀書之序須是且著力去看大學又著力去看論語又著力去看孟子看得三書了這中庸半截都了不用問人只略略恁看過不可掉了易底却先去攻那難底中庸多說無形影如鬼神如天地參等類說得髙說下學處少說上達處多若且理㑹文義則可矣程氏教人以論孟大學中庸為本學者須於此數書熟讀詳味有㑹心處方自見得如其未然讀之不厭熟講之不厭煩非如指理為障而兀然坐守無義之語以俟其僥倖而一得也看孟子與論語不同論語要冷看孟子要熟看論語逐文逐義各是一義故用子細静觀孟子成大段首尾通貫熟讀文義自見不可逐一句一字上理㑹也講學莫先於語孟而讀論孟者又須逐章熟讀切已深思不通然後考諸先儒之說以發明之如二程先生說得親切處直須看得爛熟與經文一般成誦在心乃可加省察之功盖與講學互相發明但日用應接思慮隠微之間每每加察其善端之發慊於吾心而合於聖賢之言則勉勵而力行之其邪志之萌愧於吾心而戾於聖賢之訓則果決而速去之大抵見善必為聞惡必去不使有頃刻悠悠意態則為學之本立矣異時漸有餘力然後以次漸讀諸書旁通當世之務盖亦未晚或問讀書之法其用力也奈何曰循序而漸進熟讀而精思可也曰然則敢問循序漸進之說曰以論孟二書言之則先論而後孟通一書而後及一書以一書言之其篇章文句首尾次第亦各有序而不可亂也量力所至約其程課而謹守之字求其訓句索其㫖未得乎前則不敢求其後未通乎此則不敢志乎彼如是循序而漸進焉則意定理明而無疎易凌躐之患矣不惟讀書之法是乃操心之要尤學者不可不知曰其熟讀精思者何耶曰論語一章不過數句易以成誦成誦之後反復玩味於燕閒静一之中以須其浹洽可也孟子每章或千百言反復論辨雖若不可涯者然其條理疎通語意明潔徐讀而以意隨之出入往來以十百數則其不可涯者将可以得於指掌間矣大抵觀書先須熟讀使其言皆若出於吾之口繼以精思使其意皆若出於吾之心然後可以有得至於文義有疑衆說分錯則亦虚心静慮勿遽取舎於其間先使一說自為一說而隨其意之所之以驗其通塞則其尤無義理者不待觀於他說而先自屈矣復以衆說互相詰難而求其理之所安以考其是非則似是而非者亦将奪於公論而無以立矣大抵徐行却立處静觀動如攻堅本先其易者而後其節目如解亂繩有所不通則姑置而徐理之此讀書之法也為學之序為已而後可以及人達理然後可以制事故程夫子教人先讀論孟次及諸經然後看史其序不可亂也若恐其徒務空言但當就論孟經書中教以躬行之意庶不相逺至於左氏奏疏之言則皆時事利害而非學者切身之急務也凡讀書須看上下文義是如何不可泥著一字如揚子於仁也柔於義也剛到易中又将剛來配仁柔來配義如論語學不厭智也教不倦仁也到中庸又謂成己仁也成物智也此等須是各隨本文意看便自不相礙凡看文字少看熟讀一也不要鑚研立説但要反復體驗二也埋頭理㑹不要求效三也三者學者所當守看文字傷太快看不子細須是理㑹得底更須将來看此不厭熟熟後更看方始滋味出看文字須是如猛将用兵直是鏖戰一陣如酷吏治獄直是推勘到底决是不恕他方得大凡文字有未曉處須下死工夫直要見得道理是自家底方佳看文字當如髙艤大艑順風張帆一日千里方得如今只纔離小港便著淺了濟甚事文字不當如此看問看文字為衆說雜亂如何曰且要虚心逐一說看去看得一說却又看一說看來看去是非長短皆自分明譬如人欲知一箇人是好人是惡人且隨他去看隨來隨去見他言語動作便自知他好惡凡人看文字初看時心尚要走作道理尚見得未定猶没奈他何到看得定時方入規矩又只是在印板上面說相似都不活不活則受用不得須是玩味反復到得熟後方始㑹活方始㑹動方有得受用處若只恁生記去這道理便死了看文字若便以為曉得則便住了須是曉得後更思量後面尚有也無且如今有人把一篇文字來看也未解盡知得他義况於義理前輩說得恁地雖是易曉但亦未解便得其意須是看了又看只管看只管有看文字有兩般病有一等性鈍底人向來未曽看看得生卒急看不出固是病又有一等敏鈍底人多不肯仔細易得有忽略之意不可不戒看文字須仔細雖是舊曽看過重温亦須子細每日可看三兩段不是於那疑處看正須於那無疑處看盖工夫都在那上看文字要急迫不得有疑處且漸漸思量若一下便要理㑹得也無此理看文字須是退步看方可見得若一向近前迫看反為所遮蔽轉不見矣看文字先有意見恐只是私意謂如粗厲者觀書必以勇果强毅為主柔善者觀書必以慈祥寛厚為主書中何所不有看文字不可過於疎亦不可過於密盖太謹密則少間看道理從那窮處去更揷不入不若且放下放開濶看看文字須逐字看得無去處譬如前後門塞定更去不得方始是文字大節目痛理㑹三五處後當迎刄而解學者所患在於輕浮不沈著痛快學者初看文字只見得箇渾淪物事久久看作三兩片以至於十數片方是長進如庖丁解牛目視無全牛是也看文字且自用工夫先己切至方可舉所疑與朋友講論假無朋友久之能自見得盖蓄積多者忽然爆開便自然通此所謂何天之衢亨也盖蓄極則通須是蓄之極則通問看文字只就本句固是見得古人本意然不推廣之則用處又易得不相浹如何曰須是本句透熟方可推若本句不透熟不惟推便錯於未推時已錯了凡看文字諸家說異同處最可觀某舊日看文字專看異同處如謝上蔡之說如彼楊龜山之說如此何者為得何者為失所以為得者是如何所以為失者是如何看文字須大段著精彩看聳起精神豎起筋骨不要困如有刀劒在後一般就一段中須要透擊其首則尾應擊其尾則首應方始是不可按冊子便在掩了冊子便忘却凡看文字專看細宻處而遺却緩急之間者固不可專看緩急之間而遺却細密者亦不可今日之看所以為他日之用須思量所以看者何為非只是空就言語上理㑹得多而已也須是切已用功使将來自得之於心則視言語誠如糟粕然今不可便視為糟粕也但當自期向到彼田地爾看文字不可落於偏僻須是周匝看得四通八達無些窒礙方有進益某解語孟訓詁皆存學者觀書不可只看𦂳要處閑慢處要都周匝今說求放心未問其他只此便是博學而篤志切問而近思仁在其中矣博學而篤志切問而近思方是讀書却說仁在其中盖此便是求放心也看文字且依本句不要添字那裏元有縫罅如合子相似自家只去抉開不是渾淪底物硬去鑿亦不可先立說牽古人意來湊看文字專要看做裏面去如何裏面也更無去處不著得許多言語這裏只主一無適敬以直内涵養去嘗謂文字寧是看得淺不可太深寧是低看不可太髙盖淺近雖未能到那切近處更就上面推尋却有見時節若太深逺更無回頭時凡看文字先須曉其文義然後可求其意未有文義不曉而見意者也某嘗說文字不難看只是讀者心自嶢崎了看不出若大著意思反復熟看那正當道理自湧出來不要将那小意智私見識去間亂他如此無縁看得出如千軍萬馬從這一條大路去行伍紀律自是不亂若撥數千人從一小路去空攪亂了正當底行陣無益於事凡看文字須看古人下字意思是如何且如前輩作文一篇中須看他用意在那裏如杜子羙詩云更覺良工用心苦一般人看畫只見得是畫一般識底人看便見得他精神妙處知得他用心苦也看注解時不可遺了𦂳要字盖解中有極散緩者有緩急之間者有極𦂳要者某下一字時直是稱輕等重方敢寫出讀書須是将本文熟讀字字咀嚼教有味若有理㑹不得處深思之又不得然後却将註脚看方有意味如人飢而後食渇而後飲方有味不飢不渇而强飲食之終無益也又曰某所集註論語至於訓詁皆仔細者葢要人字字與某着意看字字思索到莫要只作等閑看過了凡人讀書若窮得到道理透處心中也替他一本作潜他快活若有疑處須是參諸家解熟看看得有差互時此一段終是不穏在心頭不要放過前輩解說恐後學難曉故集註盡撮其要已說盡了不須更去註脚外又添一段說話只把這箇熟看自然曉得莫枉費心去外面思量看講解不可專徇他說不求是非便道前賢言語皆的當如遺書中語豈無過當失實處亦有說不及處又云初看時便先斷以己意前聖之說皆不可入此正當今學者之病不可不知聖人言語本自明白不須解說只為學者看不見所以做出註解與學者省一半力若註解上更看不出却如何看得聖人意出又曰凡看文字端坐熟讀久久於正文邉自有細字註解迸出來方是自家見得只於外面捉摸箇影子說終不濟事問明道說話曰最難看須是輕輕地挨傍他描摸他意思方得若将來解解不得須是看得道理大段熟方可看東萊吕氏曰讀書有思索人往往不茍不曽讀書與曾讀書識理趣者觀其所為便可見凡讀書必務精熟若或記性遲鈍則多誦遍數自然精熟記得堅固若是遍數不多只務强記今日成誦來日便忘其與不曽讀誦何異凡為學之道必先至誠不誠未有能至焉者也何以見其誠居處齊荘志意凝定不妄言不茍笑開卷伏讀必起恭敬如對聖賢掩卷沉思必根義理以閑邪僻行之悠久習與性成便有聖賢前輩氣象為學之本莫先於讀書讀書之法須令日有課程句讀有未曉大義有未通不惜與人商確不惜就人授讀凡人多以此為恥曽不知不如是則有終身之耻也後學讀書未曽識得目前大略便要說性命此極是害事為學自有等級後生學問聰明强記不足畏惟思索尋究者為可畏耳象山陸氏曰大抵讀書訓詁既通之後但平心讀之不必勉加揣量則無非浸灌培益鞭䇿磨勵之功或有未通曉處姑缺之無害且以其明白昭晰者日加涵泳則自然日充日明後日本原深厚則向來未曉者将亦有渙然冰釋者矣讀書作文亦是吾人事但讀書本不為作文作文其末也有其本必有其末未聞有本盛而末不茂者若本末倒置則所謂文者亦可知矣勉齋黄氏曰平居當以敬自持令心慮寧静至於讀書則平心定氣端荘儼肅須以吾心黙觀聖賢之語常使聖賢之意自入於吾心如以鏡照物妍醜自見鏡何心哉今人所以不善讀書非是聖賢之意難明乃是吾心紛擾反以汩亂聖賢之意讀書只是沉静精密則自然見得分明切不可萌輕易自喜之心便解得六經通徹亦何足自喜亦豈敢輕易纔如此便不足以任重後生且收歛静退慊然常若不足方能有進觀書者最怕氣不平且如公冶長一章謝上蔡則謂聖人擇婿驚人如此楊龜山則謂聖人所以求於人者薄可免於刑戮而不累其家皆可妻也上蔡氣髙者也龜山氣弱者也故所見各别如此要之當隨文平看方見得聖人之本意此觀書之大法北溪陳氏曰讀四書之法毋過求毋巧鑿毋旁搜毋曲引亦惟平心以玩其㫖歸而切己以察其實用而已爾果能於是四者融㑹貫通而義理昭明胸襟灑落則在我有權衡尺度由是而稽諸經與凡讀天下之書論天下之事皆莫不冰融湅釋而輕重長短截然一定自不復有錙銖分寸之或紊矣范陽張氏曰朋友講習固天下樂事不幸獨學則當尚友古人可也故讀論語如對孔門聖賢讀孟子如對孟子讀杜子羙詩蘓文則又凝神静慮如目擊二公如此用心雖生千載之下可以見千載人矣程子曰凡看書各有門庭詩易春秋不可逐句看尚書論語可以逐句看以下讀諸經法六經之言在含蓄中黙識心通精義為本讀書者當觀聖人所以作經之意與聖人所以為聖人而吾之所以未至者求聖人之心而吾之所以未得焉者晝誦而味之中夜而思之平其心易其氣闕其疑其必有見矣古之學者皆有傳授如聖人作經本欲明道今人若不先明義理不可治經盖不得傳授之意云爾如繫辭本欲明易若不先求卦義則看繫辭不得聖人之道如河圖洛書其始止於畫上便出義後之人既重卦又繫辭求之未必得其理至如春秋是其所是非其所非不過只是當年數人而已學者不觀他書只觀春秋亦可盡道卦爻始立義既具即聖人别起義以錯綜之如春秋已前既已立例到近後來書得全别一般事便書得别有意思若依前例觀之殊失之也蘓季明嘗以治經為傳道居業之實居常講習只是空言無益質之兩先生伯淳先生曰脩辭立其誠不可不子細理㑹言能脩省言辭便是要立誠若只是脩飾言辭為心只是為偽也若脩其言辭正為立己之誠意乃是體當自家敬以直内義以方外之實事道之浩浩何處下手惟立誠纔有可居之處有可居之處則可以脩業也終日乾乾大小之事却只是忠信所以進徳為實下手處脩辭立其誠為實脩業處正叔先生曰治經實學也譬諸草木區以别矣道之在經大小逺近髙下精粗森列於其中譬如日月在上有人不見者一人指之不如衆人指之自見也如中庸一卷書自至理便推之於事如國家有九經及厯代聖人之迹莫非實學也如登九層之臺自下而上者為是人患居常講習空言無實者盖不自得也為學治經最好茍不自得則盡治五經亦是空也今有人心得識達所得多矣雖亦好讀書却患在空虚者未免此弊張子曰經籍亦須記得雖有舜禹之智吟而不言不如聾盲之指麾故記得便說得便行得故始學亦不可無誦數龜山楊氏因言秦漢以下事曰亦須是一一識别得過欲識别得過須用著意六經六經不可容易看了今人多言要作事須看史史固不可不看然六經先王經世之迹在焉是亦足用矣必待觀史未有史書以前人以何為據盖孔子不存史而作春秋春秋所以正史之失得也今人自是不留意六經故就史求道理是以學愈博而道愈逺若經術明自無工夫及之使有工夫及之則取次提起一事便須斷遣處置得行何患不能識别朱子曰讀六經時只如未有六經只就自家身上討道理其理便易曉人惟有私意聖賢所以留千言萬語以掃滌人私意使人人全得惻隠羞惡之心六經不作可也裏面著一㸃私意不得看經書與看史書不同史是皮外物事没𦂳要可以劄記問人若是經書有疑這箇是切己病痛如人負痛在身欲斯須忘去而不可得豈可比之看史遇有疑則記之紙邪問為學只是看六經語孟其他史書雜學皆不必看如何曰如此即不見古今成敗便是荆公之學書那有不可讀者只怕無許多心力讀得六經是三代以上之書曾經聖人手全是天理三代以下文字有得失然而天理却在這邉自若也要有主覷得破皆是學看經傳有不可曉處且要旁通待其浹洽則當觸類而可通矣治經者必因先儒已成之說而推之借曰未必盡是亦當究其所以得失之故而後可以反求諸心而正其繆此漢之諸儒所以專門名家各守師說而不敢輕有變焉者也但其守之太拘而不能精思明辨以求真是則為病耳然以此之故當時風俗終是淳厚近年以來習俗茍偷學無宗主治經者不復讀其經之本文與夫先儒之傳註但近近時科舉中選之文諷誦摹倣擇取經中可為題目之句以意扭揑妄作主張明知不是經意但取便於行文不暇恤也大抵所讀經史切要反復精詳方能漸見㫖趣誦之宜舒緩不迫令字字分明更須端荘正坐如對聖賢則心定而義理易究不可貪多務廣涉獵鹵莽纔看過了便為已通小有疑處即便思索思索不通即置小冊子逐日抄記以時省閲俟後日逐一理㑹切不可含糊䕶短恥於資問而終身受此黯暗以自欺也今之談經者往往有四者之病本卑也而抗之使髙本淺也而鑿之使深本近也而推之使逺本明也而必使至於晦此今日談經之大患也六經浩渺乍難盡曉且見得路逕後各自立得一箇門庭問如何是門庭曰是讀書之法如讀此一書須知此書當如何讀伊川教人看易以王輔嗣胡翼之王介父三人易解看此便是讀書之門庭縁當時諸經都未有成說學者乍難捉摸故教人如此或問如詩是吟詠情性讀詩者便當以此求之否曰然讀書只就一直道理看剖析自分曉不必去偏曲處看易有箇隂陽詩有箇邪正書有箇治亂皆是一直路逕可見别無嶢﨑學者只是要熟工夫純一而已讀時熟看時熟玩味時熟如孟子詩書全在讀時工夫孟子每章說了又自解了盖他直要說得盡方住其言一大片故後來老蘓亦拖他來做文章說須熟讀之便得其味今觀詩既未寫得傳且除了小序而讀之亦不要将做好底看亦不要将做惡底看只認本文語意亦須得八九聖人作經以詔後世将使讀者誦其文思其義有以知事理之當然見道義之全體而身力行之以入聖賢之域也其言雖約而天下之故幽明巨細靡不該焉欲求道以入徳者舎此為無所用其心矣然去聖既逺講誦失傳自其象數名物訓詁凡例之間老師宿儒尚有不能知者况於新學小生驟而讀之是亦安能遽有以得其大指要歸也哉故河南程夫子之教人必先使之用力乎大學論語中庸孟子之書然後及乎六經盖其難易逺近大小之序固如此而不可亂也問看易曰未好看易自難看易本因卜筮而設推原隂陽消長之理吉凶悔吝之道先儒講解失聖人意處多待用心力去求是費多少時光不如且先讀論語又問讀詩曰詩固可以興然亦自難先儒之說亦多失之某枉費許多年工夫近來於詩易略得聖人之意今學者不如且看大學語孟中庸四書且就見成道理精心細求自應有得待讀此四書精透然後去讀他經却易為力問近看胡氏春秋初無定例止說歸忠孝處便為經義不知果得孔子意否曰某嘗說詩書是隔一重兩重說易春秋是隔三重四重說春秋義例易爻象雖是聖人立下今說者用之各信已見然於人倫大綱皆通但未知曽得聖人當初本意否且不如讓渠如此說且存取大意得三綱五常不至廢墜足矣今欲直得聖人本意不差未須理㑹經先須於論語孟子中庸意看他切不可忙虚心觀之不須先自立見識徐徐以俟之莫立課程問左傳疑義曰公不求之於六經語孟之中而用功於左傳且左傳有甚麽道理只看聖人所説無不是這箇大本如云天髙地下萬物散殊而禮制行矣流而不息合同而化而樂興焉不然子思何故説箇天命之謂性率性之謂道修道之謂教此三句是怎如此説是乃天地萬物之大本大根萬化皆從此出人若能體察得方見得聖賢所説道理皆從自己胸襟流出不假他求又曰人須是於大原本上看得透自然心胷開濶見世間事皆𤨏𤨏不足道矣又曰每日開眼便見這四箇字在面前仁義禮智這四箇字若看得熟於世間道理沛然若决江河而下莫之能禦矣若看得道理透方見得每日所看經書無一句一字一㸃一畫不是此理之流行見天下事無大無小無一名一件不是此理之發見如此方見得這箇道理渾淪周遍不偏枯方見得所謂天命之謂性底全體今人只是隨所見而言或見得一二分或見得二三分都不曽見那全體不曽到那極處所以不濟事學者觀書先須讀得正文記得註解成誦精熟註中訓釋文意事物名義發明經指相穿紐處一一認得如自己做出來底一般方能玩味反復向上有透處若不如此只是虚設議論如舉業一般非為己之學也曾見汪端明說沈元用問和靖伊川易傳何處是切要尹云體用一源顯微無間此是切要處後舉似李先生先生曰尹說固好然湏是看得六十四卦三百八十四爻都有下落方始說得此話若學者未曽子細理㑹便與他如此說豈不誤他某聞之悚然始知前日空言無實不濟事自此讀書益加詳細云魯齋許氏曰講究經㫖須是且将正本反復誦讀求聖人立言指意務於經内自有所得若反復讀誦至於二三十遍以至五六十遍求其意義不得然後以古註證之古註訓釋不明未可通曉方攷諸家解義擇其當者取一家之說以為定論不可汎汎莫知所適從也誦經習史須是專志屏棄外物非有父母師長之命不得因他而輟程子曰凡解文字但易其心自見理理只是義理甚分明如一條平坦底道路且如隨卦言君子向晦入宴息解者多作遵養時晦之晦或問作甚晦字曰此只是隨時之大者向晦則宴息也更别無甚義或曰聖人之言恐不可以淺近看他曰聖人之言自有近處自有深處如近處怎生强要鑿教深逺得以下論解經漢儒之談經也以三萬餘言明堯典二字可謂知要乎惟毛公董相有儒者氣象東京士人尚名節加之以明禮義則皆賢人之徳業矣朱子曰經之有解所以通經經既通自無事於解借經以通乎理耳理得則無俟乎經今意思只滯在此則何時得脫然㑹通也且所貴乎簡者非謂欲語言之少也乃在中與不中爾若句句親切雖多何害若不親切愈少愈不達矣某嘗說讀書須細看得意思通融後都不見註解但見有正經幾箇字在方好聖經字若箇主人解者猶若奴僕今人不識主人且因奴僕通名方識得主人畢竟不如經字也解經當如破的經書有不可解處只得闕若一向去解便有不通而謬處後世之解經者有三一儒者之經一文人之經東坡陳少南輩是也一禪者之經張子韶輩是也解經須先還他成句次還他文義添無𦂳要字却不妨添重字不得今人新添者恰是重字某解書如訓詁一二字等處多有不必解處只是解書之法如此亦要教人知得看文字不可忽略問解經有異於程子説者如何曰程子説或一句自有兩三説其間必有一説是兩説不是理一而已安有兩三説皆是之理盖其説或後嘗改之今所以與之異安知不曽經他改來盖一章而衆説叢然若不平心明白自有主張斷入一説則必無衆説皆是之理程先生經解理皆在解語内某集註論語只是發明其辭使人玩味經文理皆在經文内易傳不看本文亦自成一書杜預左傳解不看傳經文亦自成一書鄭箋不識經大㫖故多隨句解解經不必做文字止合解釋得義文通則理自明意自足今多去上做文字少間説來説去只説得他自一片道理經意却蹉過了要之經之於理亦猶傳之於經傳所以解經也既通其經則傳亦可無經所以明理也若曉得理則經雖無亦可解經已是不得已若只就註解上説将來何濟如畫那人一般畫底却識那人别人不識須因這畫去求那人始得今便以畫喚做那人不得凡學者解書切不可與他看本看本則心死在本子上只教他恁地説則他心便活亦且不解失忘了程子曰某每讀史到一半便掩卷思量料其成敗然後却看有不合處又更精思其間多有幸而成不幸而敗今人只見成者便以為是敗者便以為非不知成者煞有不是敗者煞有是底以下讀史讀史須見聖賢所存治亂之機賢人君子出處進退便是格物今人只将他見成底事便做是使不知煞有誤人處凡讀史不徒要記事跡須要識治亂安危興廢存亡之理且如讀髙帝一紀便須識得漢家四百年終始治亂當如何是亦學也朱子曰今人讀書未多義理未至融㑹處若便去看史書攷古今治亂理㑹制度典章譬如作陂塘以溉田須是陂塘中水已滿然後決之則可以流注滋殖田中禾稼若是陂塘中水方有一勺之多遽決之以溉田則非徒無益於田而一勺之水亦復無有矣讀書既多義理已融㑹胷中尺度一一已分明而不看史書攷治亂理㑹制度典章則是猶陂塘之水已滿而不決以溉田若是讀書未多義理未有融㑹處而汲汲焉以看史為先務是猶決陂塘一勺之水以溉田也其涸也可立而待也讀史當觀大倫理大機㑹大治亂得失凡觀書史只有箇是與不是觀其是求其不是觀其不是求其是然後便見得義理史且如此看讀去待知首尾稍熟後却下手理㑹讀書皆然讀書有不可曉處劄出待去問人便且讀過有時讀别處撞著有文義與此相闗便自曉得先看語孟中庸更看一經却看史方易看先讀史記史記與左傳相包次看左傳次看通鑑有餘力則看全史只是看史不如今之看史有許多嶢崎看治亂如此成敗如此與治同道罔不興與亂同事罔不亡知得次第凡讀書先讀語孟然後觀史則如明鑑在此而妍醜不可逃若未讀徹語孟中庸大學便去看史胸中無一箇權衡多為所惑讀史之法先讀史記及左氏却看西漢東漢及三國志次看通鑑温公初作編年起於威烈王後又添至共和後又作稽古錄始自上古然共和以上之年已不能推矣獨邵康節却推至堯元年皇極經世書中可見温公又作大事記若欲看本朝事當看長編若精力不及其次則當看國紀國紀只有長編十分之二耳史亦不可不看看通鑑固好然須看正史一部却看通鑑一代帝紀更逐件大事立箇綱目其間節目疏之于下恐可記得通鑑難看不如看史記漢書史記漢書事多貫穿紀裏也有傳裏也有表裏也有志裏也有通鑑是逐年事逐年過了更無討頭處一云更無蹤跡問通鑑厯代具偹看得大槩且未免求速耳曰求速却依舊不曽看得須用大段有記性者方可且如東晉以後有多少小國夷狄姓名頭項最多若是看正史後却看通鑑見他姓名却便知得他是某國人某舊讀通鑑亦是如此且草草看正史一遍然後却來看他觀史只是以自家義理斷之大槩自漢以來只是私意其間有偶合處爾只如此看他已得大槩范唐鑑亦是此法然稍疎更看得密如他尤好然得似他亦得了問陳芝史書記得熟否蘓丞相頌看史都在手上輪得他那資性直是㑹記芝曰亦緣多忘曰正縁如此也須大約記得某年有甚麽事某年有甚麽事纔記不起無縁㑹得浹洽芝曰正縁是不浹洽曰合看兩件且看一件若兩件是四百字且看二百字有何不可人讀史書節目處須要背得始得如讀漢書髙祖辭沛公處義帝遣沛公入闗去韓信初説漢王處與史賛過秦論之類皆用背得方是若只是略踔看過心下似有似無濟得甚事讀一件書須心心念念只在這書上令徹首徹尾讀教精熟這説是如何那説是如何這説同處是如何不同處是如何安有不長進楊至之患讀史無記性須三五遍方記得而後又忘了曰只是一遍讀時須用功作相别計止此更不再讀便記得有一士人讀周禮疏讀第一板訖則焚了讀第二板則又焚了便作焚舟計若初且草讀一遍準擬三四遍讀便記不牢士居平世處下位視天下之事意若無足為者及居大位遭事㑹便覺無下手處信乎義理之難窮而學問之不可已也病中信手亂抽得通鑑一兩卷看正值難處置處不覺骨寒毛聳心膽墮地向來只作文字看過却全不自覺真是枉讀了他古人書也匡衡傳司馬温公史論稽古録范唐鑑不可不讀南軒張氏曰觀史工夫要當考其治亂興壞之所以然察其人之是非邪正至於幾微節目與夫疑似取舎之間尤當三復也若以博聞見助文辭抑末矣于定國為廷尉天下無寃民史氏将誰欺趙盖韓楊之死皆在定國之手寃莫大焉大凡看史不可被史官謾過張釋之為廷尉有驚乗輿馬者上欲誅之釋之以為當罰金且曰法者天下之公共也且方其時上使誅之則已今已下廷尉廷尉天下之平也釋之知廷尉為天下之平而不知人君為天下之平問讀通鑑之法曰治亂得失源流人才邪正是非財賦本末用兵法制嘉言善行皆當熟究之東萊吕氏曰觀史先自書始然後次及左氏通鑑欲其體統源流相承接耳范陽張氏曰如看唐朝事則身若預其中人主情性如何所命相如何當時在朝士大夫孰為君子孰為小人其處事孰為當孰為否皆令胸次曉然可以口講而指畫則機㑹圓熟他日臨事必過人矣凡前古可喜可愕之事皆當蓄之於心以此發之筆下則文章不為空言矣魯齋許氏曰閲子史必須有所折衷六經語孟乃子史之折衷也譬如法家之有律令格式賞功罰罪合於律令格式者為當不合於律令格式者為不當諸子百家之言合於六經語孟者為是不合於六經語孟者為非以此夷考古之人而去取之鮮有失矣閲史必且專意於一家其餘悉屏去候閲一史畢厯厯黙記然後别取一史而閲之如此有常不數年諸史可以偹記茍閲一史未了雜以他史紛然交錯於前則皓首不能通一史矣惟是讀三傳當叅以史記讀史記當叅以前漢文辭繁要亦各有法不可不知看史書當先看其人之大節然後看其細行善則效之惡則以為戒焉所以為吾躬行之益徒記其事而誦其書非所謂學也性理大全書卷五十四

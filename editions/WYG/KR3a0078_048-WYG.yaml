body:
  text: 性理大全書卷四十八學六知行言行附程子曰須是識在所行之先譬如行路須得光照力行先須要知非特行難知亦難也君子以識為本行次之今有人焉力能行之而識不足以知之則有異端者出彼将流蕩而不知反内不知好惡外不知是非雖有尾生之信吾弗貴矣如眼前諸人要特立獨行煞不難得只是要一箇知見難人只被這箇知見不通透人謂要力行亦只是淺近語人既能知見豈有不能行一切事皆所當為不必待著意做纔著意做便是有箇私心這一㸃意氣能得㡬時了始於致知智之事也行所知而極其至聖之事也古人言知之非艱者吾謂知之亦未易也今有人欲之京師必知所出之門所由之道然後可往未甞知也雖有欲往之心其能進乎後世非無美材能力行者然鮮能明道盖知之者難也未有知之而不能行者謂知之而未能行是知之未至也能明善斯可謂明也己能守善斯可謂誠也己學者識得仁體實有諸己只要義理栽培如求經義皆栽培之意問學者於聖人之門非願其有異也惟其不能知之是以流於不同敢問持正之道曰知之而後可守無知則何所守也故學莫先乎致知窮理格物則知無不盡知之既盡則守無不固問致知力行其功並進乎曰人謂非禮勿為則必強勉而從之至於言穿窬不可為不必強勉而後能也故知有淺深則行有逺近此進學之效也循理而至於樂則己與理一殆非勉強之可能也張子曰尊其所聞則髙明行其所知則光大凡未理㑹至實處如空中立終不曾踏著實地盡得天下之物方要窮理窮得理又須要實到孟子曰萬物皆偹於我矣反身而誠樂莫大焉實到其間方可言知未知者方且言識之而已既知之又行之惟艱萬物皆偹於我矣又却要強恕而行求仁為近和靖尹氏曰觀理須要通㑹得一件便與行一件朱子曰學之之博未若知之之要知之之要未若行之之實知行常相須如目無足不行足無目不見論先後知為先論輕重行為重論知之與行曰方其知之而行未及之則知尚淺既親厯其域則知之益明非前日之意味聖賢説知便説行大學說如切如磋道學也便說如琢如磨自脩也中庸說學問思辨便說篤行顔子說博我以文謂致知格物約我以禮謂克己復禮致知力行用功不可偏偏過一邊則一邊受病如程子云涵養須用敬進學則在致知分明自作兩脚說問須是先知後行否曰不成未明理便都不持守了且如曾㸃與曾子便是兩箇様子曾㸃便是理㑹得底而行有不揜曾子便是合下持守旋旋明理到一唯處聖賢千言萬語只是要知得守得學者以玩索踐履為先又曰操存與窮格不解一上做了如窮格工夫亦須銖積寸累工夫到後自然貫通若操存工夫豈便能常操其始也操得一霎旋旋到一食時或有走作亦無如之何能常常警覺久久自能常存自然光明矣操存涵養則不可不緊進學致知則不可不寛涵養中自有窮理工夫窮其所養之理窮理中自有涵養工夫養其所窮之理兩項都不相離纔見成兩處便不得思索義理涵養本原所謂窮理大底也窮小底也窮少間都成一箇物事所謂持守者人不能不牽於物欲纔覺得便收將來久之自然成熟非謂截然今日為始也人之為學如今雨下相似雨既下後到處濕潤其氣易得蒸鬰纔略晴被日頭畧照又䒱得雨来前日亢旱時只緣久無雨下四面乾枯縦有些少都滋潤不得故更不能蒸鬰得成人之於義理若見得後又有涵養底工夫日日在這裏面便意思自好理義也容易得見正如雨蒸鬰得成後底意思若是都不去用力日間只恁悠悠都不曾有涵養工夫設或理㑹得些小道理也滋潤他不得少間私欲起来又間㫁去正如亢旱不能得雨相似也學者工夫唯在居敬窮理此二事互相發能窮理則居敬工夫日益進能居敬則窮理工夫日益宻譬如人之兩足左足行則右足止右足行則左足止又如一物懸空中右抑則左昂左抑則右昂其實只是一事人須做工夫方有礙初做工夫時欲做此一事又礙彼一事只如居敬窮理兩事居敬是箇收歛執持底道理窮理是箇推尋究竟底道理此二者便是相妨若是熱時則自不相礙矣持敬是窮理之本窮得理明又是養心之助學者若不窮理又見不得道理然去窮理不持敬又不得不持敬看道理便都散不聚在這裏致知敬克己此三事以一家譬之敬是守門户之人克己則是拒盗致知却是去推察自家與外来底事伊川言涵養須用敬進學則在致知不言克己盖敬勝百邪便自有克如誠則便不消言閑邪之意猶善守門户則與拒盗便是一等事不消更言别有拒盗底若以涵養對克己言之則各作一事亦可涵養則譬將息克己則譬如服藥去病盖將息不到然後服藥將息到則自無病何消服藥能純於敬則自無邪僻何用克己若有邪僻只是敬心不純只可責敬故敬則無己可克乃敬之效若初學則須是工夫都到無所不用其極見不可謂之虚見見無虚實行有虚實見只是見見了後却有行有不行若不見後只要硬做便所成者窄狹士患不知學知學矣而知所擇之為難能擇矣而勇足以行之内不顧於私己外不牽於俗習此又難也程子言學者識得仁體實有諸己只要義理栽培識得與實有湏做兩句看識得是知之也實有是得之也若只識得只是知有此物却須實有諸己方是己物也問大抵學便要踐履如何曰固然是易云學以聚之問以辨之既探討得是當又且放頓寛大田地待觸類自然有㑹合處故曰寛以居之何甞便説仁以行之答吴晦叔書曰夫泛論知行之理而就一事之中以觀之則知之為先行之為後無可疑者如孟子所謂知皆擴而充之程子所謂譬如行路湏得光照及易文言所謂知至至之知終終之之類是也然合夫知之淺深行之大小而言則非有以先成乎其小亦將何以馴致乎其大者哉如子夏教人以洒掃應對進退為先程子謂未有致知而不在敬者又易文言知至知至知終皆在忠信脩辭之後之類是也盖古人之教自其孩幼而教之以孝弟誠敬之實及其少長而博之以詩書禮樂之文皆所以使之即夫一事一物之間各有以知其義理之所在而致涵養踐履之功也此小學之事知之淺而行之小者也及其十五成童學於大學則其洒掃應對之間禮樂射御之際所以涵養踐履之者畧己小成矣於是不離乎此而教之以格物以致其知焉致知云者因其所己知者推而致之以及其所未知者而極其至也是必至於舉天地萬物之理而一以貫之然後為知之至而所謂誠意正心脩身齊家治國平天下者至是而無所不盡其道焉此大學之道知之深而行之大者也今就其一事之中而論之則先知後行固各有其序矣誠欲因夫小學之成以進夫大學之始則非涵養踐履之有素亦豈能居然以去雜亂紛糾之心而格物以致其知哉且易之所謂忠信修辭者聖學之實事貫始終而言者也以其淺而小者言之則自其常視毋誑男唯女俞之時固己知而能之矣知至至之則由行此而又知其所至也此知之深者也知終終之則由知至而又進以終之也此行之大者也故大學之物雖以格物致知為用力之始然非謂初不涵養履踐而直􅀙事於此也又非謂物未格知未至則意可以不誠心可以不正身可以不脩家不以不齊也但以為必知之至然後所以治己治人者始有以盡其道耳若曰必俟知至而後可行則夫事親􅀙兄承上接下乃人生之所不能一日廢者豈可謂吾知未至而暫輟以俟其至而後行哉抑聖賢所謂知者雖有淺深然不過如前所論二端而已但至廓然貫通則内外精粗自無二致也荅程允夫書曰窮理之要不必深求此語有大病殊駭聞聴行得即是固為至論然窮理不深則安知所行之可否哉宰予以短喪為安是以不可為可也子路以正名為迂是以可為不可也彼親見聖人日聞善誘猶有是失况於餘人恐但不如此而已窮理既明則理之所在動必由之無論髙而不可行之理但世俗以茍且淺近之見謂之不可行耳如行不由徑固世俗之所謂迂不行私謁固世俗之所謂矯又豈知理之所在言之雖若甚髙而未甞不可行哉理之所在即是中道惟窮之不深則無所凖則而有過不及之患未有窮理既深而反有此患也易曰精義入神以致用也盖惟如此然後可以應務未至於此則凡所作為皆出於私意之鑿㝠行而已問致知後湏持養方力行曰如是則今日致知明日持養後日力行只持養便是行正心誠意豈不是行但行有逺近治國平天下則行之逺耳程子言涵養湏用敬進學則在致知下須字在字便是皆要齊頭著力不可道知得了方始行有一般人儘聦明知得而行不及是資質弱又有一般人儘行得而知不得問南軒云致知力行互相發曰未湏理㑹相發且各項做将去若知有未至則就知上理㑹行有未至則就行上理㑹少間自是互相發未能博學便要約禮窮理處不曾用功守約處豈免有差若差之毫忽便有不可勝言之弊南軒張氏曰致知力行互相發也然知常在先博學審問慎思明辨皆致知之道學者要當據所知便體而行之由粗而至精由著而至微也荅吴晦叔書曰所謂知之在先此固不可易之論但只一箇知字用處不同盖有輕重也如云知有是事則用得輕匹夫匹婦可以與知之類是也如説知底事則用得重知至至之之知是也在未識大體者且當據所與知者為之則漸有進歩處工夫若到則知至知至矣當至之知終矣當終之則工夫愈有所施而無窮矣所示有云譬如行路須識路頭誠是也然要識路頭親去路口尋求方得只端坐于室想象跂而曰曰吾識之矣則無是理也元晦所論知字乃是謂知至之知要之此非躬行實踐則莫有至但所謂躬行實踐者先湏隨所見端確為之此謂之知常在先則可也知有精粗行有淺深然知常在先固有知之而不能行者矣未有不知而能行者也語所謂知及之仁不能守之是知而不能行者也所謂知之者不如好之者好之者不如樂之者是不知則無由能好而樂也且以孝於親一事論之自其粗者知有冬温夏凊昏定晨省則當行温清定省行之而又知其有進於此者則又從而行之知之進則行愈有所施行之力則知愈有所進以至於聖人人倫之至其等級固逺其曲折固多然亦必由是而循循可至焉耳盖致知力行此兩者工夫互相發也尋常與朋友講論欲其據所知者而行之行而思之庶㡬所踐之實而思慮之開明不然貪髙慕逺莫能有之果何為哉然有所謂知之至者則其行自不能已然湏致知力行工夫至到而後及此如顔子是也彼所謂欲罷不能者知之至而自不能以己也若學者以想象臆度或一知半解為知道而曰知之則無不能行是妄而已曾晳詠歸之語亦可謂見道體矣而孟子猶以其行不掩為狂而况下此者哉問吕伯恭說近日士人只務聞見不務踐履湏是去踐履上做工夫曰此言雖好只是少精神湏是致知力行互相發明始得若不致知将人欲做天理亦不可知安知所謂私而去之湏是知而後能行行而後有所知互相發明方可問聖門當學誰曰學顔子為有凖的顔子為人聖人教之不過博文約禮博文所謂致知也約禮所謂力行也又問向上一節如何曰只恐不能致知力行耳果能致知力行久而不息當自知之譬如登山只説得從此處去至此山上則在人努力耳如真箇到山上則許多景致自見得不待先説也致知力行要湏自近歩歩踏實地乃有所進不然貪慕髙逺終恐無益勉齋黄氏曰盖甞求其所以為學之綱領者曰致知曰力行而已大學曰物格而後知至知至而後意誠意誠而後心正心正而後身修物格知至者知之事也意誠心正者行之事也中庸曰博學之審問之慎思之明辨之篤行之學問思辨者知之事篤行者行之事也書之所謂惟精惟一易之所謂知崇禮卑論語之所謂知及仁守孟子所謂始終條理無非始之以致知終之以力行盖始之以致知則天下之理洞然於吾心而無所蔽終之以力行則天下之理渾然於吾身而無所虧知之不至則如擿埴索塗而有可南可北之疑行之不力則如弊車羸馬而有中道而廢之患然則有志於聖賢之域者致知力行之外無他道也學問之道知與行而已自昔聖人繼天立極不曰知而曰精不曰行而曰一知不精行不一猶不知不行也聖賢相傳唘悟後學言知必曰知至言意必曰意誠至則事物之理無不通誠則念慮之發無不實曰至與誠其精一之謂歟知與行者學之塗轍至與誠者學之歸宿有志於道者可不孳孳求止於是歟聖賢一言一字皆可師法􅀙之則吉違之則凶緊要一著只要信得篤行得力耳魯齋許氏曰二程子以格物致知為學朱子亦然此所以度越諸子大學孔氏之遺書也其要在此凡行之所以不力只為知之不真果能真知行之安有不力者乎博學之審問之慎思之明辨之只是一箇知得真然後道篤行之一句聖人教人只是兩字􅀙學而時習為始便只是說知與行兩字不惑知命耳順是箇知字只是精粗淺深之别耳耳順是並無逆於心者到此則何思何慮不思而得也従心不踰矩則不勉而中程子曰聖人之言冲一作中和之氣貫徹上下以下論言行聖人之言逺如天近如地其逺也若不可得而及其近也亦可得而行揚子曰聖人之言逺如天賢人之言近如地非也有有徳之言有造道之言有迷事之言有徳者止言已分事造道之言如顔子言孔子孟子言堯舜止是造道之深所見如是問人言語緊急莫是氣不定否曰此亦當習習到言語自然緩時便是氣質變也學至氣質變方是有功徳盛者言傳文盛者言亦傳凡立言欲涵蓄意思不使知徳者厭無徳者惑言愈多於道未必明故言以簡為貴言而不行自欺孰甚焉言行不足以動人臨事而倦且怠皆誠不至也行踐其言而人不信者有矣未有不踐言而人信之者凡諫說於君論辨於人理勝則事明氣忿則招拂張子曰天地之道要一言而道盡亦可有終日善言而只在一物者當識其要總其大體一言而乃盡爾涑水司馬氏曰言不可不重也子不見鐘鼓乎夫鐘鼓叩之然後鳴鏗訇鏜鞳人不以為異也若不叩自鳴人孰不謂之妖邪可以言而不言猶叩之而不鳴也亦為廢鐘鼓矣言而無益不若勿言為而無益不若勿為余久知之病未能行也五峯胡氏曰先道而後言故無不信之言先義而後行故無不果之行行慎則能堅其志言慎則能崇其徳延平李氏曰古之徳人言句皆自胷襟流出非􅀙頷頰拾来如人平居談話不慮而發後之學者譬如鸚鵡學人語言所不學者則不能耳朱子曰夫子云不學詩無以言先儒以為心平氣和則能言易繫辭曰易其心然後語謂平易其心而後語也明道先生曰凡為人言者理勝則事明氣忿則招拂告子云不得於言勿求於心孟子以為不可孟子之意以言有不順理不自得處即是心有不順理不自得處故不得於言湏求之於心就心上理㑹也心氣和則言順理矣然亦湏就言上做工夫始得伊川曰發禁躁妄内斯静専是也内外表裏照管無少空闕始得相應臨川吴氏曰言心聲也故知言者觀言以知其心世亦有巧偽之言險也而言易躁也而言澹貪戀也而言閑適意其言之可以欺人也然人觀其易澹閑適之言而洞照其險躁貪戀之心則人不可欺也而言豈可偽哉致知程子曰致知則有知有知則能擇知者吾之所固有然不致則不能得之而致之必有道故曰致知在格物問人之學非原有差只為不知之故遂流於不同不知如何持守曰且未說到持守持守甚事湏先在致知致知盡知也窮理格物便是致知問今有志於學而知識蒙蔽力不能勝其任則如之何曰致知則明明則無不勝其任者在勉強而已問學者多流於釋氏之説何也曰不致知也知之既至孰得而移之知玉之為寳則人不能以石亂之矣知醴之為甘則人不能以糵亂之矣知聖人之為大中至正則釋氏不能以説惑之矣無物無理惟格物可以盡理人要明理若止一物上明之亦未濟事湏是集衆理然後脱然自有悟處閱天下之事至於無可疑亦足樂矣凡人於事有少自快則其喜懌之意猶浹洽於心而發見於外至於窮理切切焉而不得其所可悦者則亦何以養心也多識於鳥獸草木之名所以明理也至顯者莫如事至微者莫如理而事理一致微顯一源古之君子所以善學者以其能通於此而已世之人務窮天地萬物之理不知反之一身五臟六腑毛髮筋骨之所存鮮或知之善學者取諸身而已自一身以觀天地問格物是外物是性分中物曰不拘凡眼前無非是物物物皆有理如火之所以熱水之所以寒至於君臣父子間皆是理又問只窮一物見此一物便還見得諸理否曰湏是徧求雖顔子亦只能聞一知十若到後来逹理了雖億萬亦可通造道深處雖聞常人語言淺近事莫非義理張子曰知徳斯知言己甞自知其徳然後能識言也人雖言之已未甞知其徳豈識其言湏知已知是徳然後能識是言猶曰知孝之徳則知孝之言也窮理亦當有漸見物多窮理多如此可盡物之性上蔡謝氏曰聞見之知非真知也知水火自然不蹈真知故也真知自然行之不難不真知而行未免有意意有盡時學者湏是且窮理物物皆有理窮理則能知天之所為知天之所為則與天為一與天為一無往而非理也窮理則是尋箇是處問天下多少事如何見得是處曰窮理便見得事不勝窮理則一也所謂有知識湏是窮物理只如黄金天下至寳先湏辨認得他體性始得不然被人将鍮石来喚作黄金辨認不過便生疑惑便執不定故經曰物格而後知至知至而後意誠龜山楊氏曰學者以致知格物為先知之未至雖欲擇善而固執之未必當於道也夫鼎鑊陷阱之不可蹈人皆知之也世之人未有蹈鼎鑊䧟阱者以其知之審故也致身下流天下之惡皆歸焉固無異於鼎鑊陷阱也而士或蹈之而莫之避以其未甞真知故也使其真知為不善如蹈鼎鑊陷阱則人孰有為不善耶若夫物格而知至則目無全牛游刃自有餘地矣致堂胡氏曰君子之知貴乎至知之至者如知水之濕知火之熱知美色之可愛知惡臭之可惡雖不幸瞽而瞶此知不可亂也知之不至者猶士而言學言善言道言中言誠言性言仁言恕言鬼神得其形影之似而已㫁學以記誦㫁善以柔弱㫁道以𤣥妙㫁中以隨俗㫁誠以椎撲斷性以静㫁仁以愛㫁恕以寛宥㫁鬼神以幽㝠是皆形影之似而非其至也窮理不至則在我者有蔽而不盡在我者有蔽而不盡在人者安能洞達而無惑乎朱子曰為學先要知得分曉致知格物只是一事非是今日格物明日又致知格物以理言致知以心言致知工夫亦既且據所己知者玩索推廣将去且於心者本自無不足也問致知涵養先後曰湏先致知而後涵養問伊川言未有致知而不在敬如何曰此是大綱説要窮理湏是著意不著意如何會理㑹得分曉學聚問辯明善擇善盡心知性此皆是知皆始學之功也人為學湏是要知箇是處千定萬定知得這箇徹底是那箇徹底不是方是見得徹見得是則這心裏方有所主且如人學射若志在紅心上少間有時只射得那帖上志在帖上少間有時只射得那垜上志在垜上少間都射在别處去了只争箇知與不知争箇知得切與不切且如人要做好事到得見不好事也似乎可做方要做好事又似乎有箇做不好事底心從後面牽轉去這只是知不切學者湏常存此心漸将義理只管去灌溉若卒乍未有進即且把見成在底道理将去看認認来認去更莫放著便只是自家底縁這道理不是外来物事只是自家本来合有底只是常常要㸃檢聖賢教人雖以恭敬持守為先而於其中又必使之即事即物考古騐今體㑹推尋内外叅合盖必如此然後見得此心之真此理之正而於世間萬事一切言語無不洞然了其黑白大學所謂知至意誠孟子所謂知言養氣正謂此也問窮理莫如隨事致察以求其當然之則曰是如此問人固有非意於為過而終䧟於過者此則不知之失然當不知之時正私意物欲方蔽固切恐雖欲致察而不得其真曰却恁地兩相擔閣不得湏是察問程子所謂涵養湏用敬進學則在致知不可除一句曰如此方始是又曰知與敬是先立底根脚問窮理集義孰先曰窮理為先然亦不是截然有先後曰窮是窮在物之理集是集處物之義否曰是萬事皆在窮理後經不正理不明看如何地持守也只是空痛理㑹一番如血戰相似然後涵養将去因自云某如今雖便静坐道理自見得未能識得涵養箇甚問或有只教人踐履者曰義理不明如何踐履曰他說行得便見得曰如人行路不見便如何行今人多教人踐履皆是自立標致去教人自有一般資質好底人便不湏窮理格物致知聖人作箇大學便使人齊入於聖賢之域若講得道理明時自是事親不得不孝事兄不得不弟交朋友不得不信心包萬理萬理具於一心不能存得心不能窮得理不能窮得理不能盡得心窮理以虛心静慮為本而今看道理不見不是不知只是為物塞了而今粗法湏是打疊了胷中許多惡雜方可張子云義理有疑則濯去舊見以来新意人多是被那箇舊見戀不肯舍除是大故聦明見得不是便翻了理不是在面前别為一物即在吾心人湏是體察得此物誠實在我方可譬如修養家所謂鈆汞龍虎皆是我身内之物非在外也問窮事物之理還當窮究箇緫㑹處如何曰不消説總㑹凡是眼前底都是事物只管恁地逐段窮教到極至處漸漸多自貫通然為之總㑹者心也今之學者自是不知為學之要只要窮得這道理便是天理雖聖人不作這天理自在天地間天髙地下萬物散殊流而不息合同而化天地間只是這箇道理流行周徧不應說道聖人不言這道理便不在這道理自是常在天地間只借聖人来説一遍過且如易只是一箇隂陽之理而已伏羲始畫只是畫此理文王孔子皆是發明此理吉凶悔吝亦是従此推出孔子言之則曰君子居其室出其言善則千里之外應之出其言不善則千里之外違之言行君子之樞機樞機之發榮辱之至也言行君子之所以動天地也可不慎乎聖人只要人如此且如書載堯舜禹許多事業與夫都俞吁咈之言無非是至理這道理若見得到只是合當如此如穿牛鼻絡馬首這也是天理合當如此若絡牛首穿馬鼻定是不得如説克己伊川只説箇敬今人也知道敬只是不常如此常常如此少間自見得是非道理分明若心下有些子不安穏便不做到得更有一項心下習熟底事却自以為安外来卒未相入底却有不安這便著将前賢所説道理做様子看教心下是非分明心熟後自然有見理處熟則心精㣲不見理只縁是心粗學者理㑹道理當深沉潜思不可去名上理㑹湏求其所以然義理儘無窮前人恁地説亦未必盡湏是自把来横看豎看儘入深儘有在道理既知縫罅但當窮而又窮不可安於小成而遽止也大凡義理積得多後貫通了自然見效不是今日理㑹得一件便要做一件用譬如富人積財積得多了自無不如意又如人學作文亦湏廣看多後自然成文可觀不是讀得這一件却将来排湊做韓昌黎論為文便也要讀書涵咏多後自然好栁子厚云本之於六經之意便是要将這一件做那一件便不及韓大著心胷不可因一説相礙看教平闊四方八面都見理㑹道理到紛然處却好定著精神看一看看道理湏是見得實方是有功効處若於上面添些𤣥妙竒特便是見他實理未透今之學者不曾親切見得而臆度揣摸為説皆助長之病也道理止平看意思自見不湏先立説看義理難又要寛著心又要緊著心這心不寛則不足以見其規模之大不緊則不足以察其文理一作義之細宻若拘滯於文義少間又不見他大規模處以聖賢之意觀聖賢之書以天下之理觀天下之事人多以私見自去求理只是你自家所見去聖賢之心尚逺在自家既有此身必有主宰理㑹得主宰然後隨自家力量窮理格物而合做底事不可放過些子因引程子言如行兵當先做活計思索譬如穿井不解便得清水先亦湏是濁漸漸刮将去却自㑹清只是見不透所以千言萬語費盡心力終不得聖人之意大學説格物都只是要人見得透且如楊氏為我墨氏兼愛他欲以此教人他豈知道是不是只是見不透此學所以貴窮理也務反求者以博觀為外馳務博觀者以内省為狭隘墮於一偏此皆學者之大病也窮理者欲知事物之所以然與其所當然而已知其所以然故志不惑知其所當然故行不謬非謂取彼之理而歸諸此也程子所謂物我一理纔明彼即曉此湏是事事􅀙心上理㑹起舉止動歩事事有箇道理一豪不然便是欠闕了他道理固是天下事無不當理㑹只是有先後緩急之序湏先立其本方以次推及其餘世上萬般皆下品若見得這道理髙見世間萬般皆低故這一段緊要處只在先明諸心上盖先明諸心了方知得聖之可學有下手處方就這裏做工夫若不就此如何地做明諸心知所徃窮理之事也力行求至踐履之事也窮理非是要専明在外之理如何而為孝弟如何而為忠信推此類通之求處至當即窮理之事也問所謂窮理不知是反己求之於心惟復逐物而求於物曰不是如此事事物物皆有箇道理窮得十分盡方是格物不是此心如何去窮理不成物自有箇道理心又有箇道理枯槁其心全與物不接却使此理自見萬無是事不用自家心如何别白物上求一般道理不知物上道理誰去窮得窮理就事物上看窮得這箇道理到底了又却窮那箇道理如此積之以久窮理益多自然貫通窮理湏是窮得到底方始是問莫致知在格物否曰固是大學論治國平天下許多事却歸在格物上凡事事物物各有一箇道理若能窮得道理則施之事物莫不各當其位如人君止於仁人臣止於敬之類各有一至極道理又曰凡萬物莫不各有一道理若窮理則萬物之理皆不出此問此是萬物皆備於我曰極是未甞隨事以觀理故天下之理多所未察未甞即理以應事故天下之事多所未明無事時此理存有事時此理亡無他只是把事作等閑湏是於事上窮理方可理於事本無二今見事来别把做一般看自然錯了凡看道理湏要求箇根源来處如為人父如何便止於慈為人子如何便止於孝為人君為人臣如何便止於仁止於敬如論孝湏窮箇孝根源来處慈湏窮箇慈根源来處仁敬亦然凡道理皆􅀙根源来處窮究方見得確定不可只道我操守踐履便了又曰道理要見得真湏是表裏首末極其透徹無有不盡真見得是如此决然不可移易始得不可只窺見一斑半㸃便以為是如為人父湏真知是决然止於慈而不可易為人子湏真知是决然止於孝而不可易善湏真見得是善方始决然必做惡湏真見得是惡方始决然必不做如看不好底文字固是不好湏自家真見得是不好好底文字固是好湏自家真見得是好聖賢言語湏是真看得十分透徹如􅀙他肚裏穿過一字或輕或重移易不得始是看理徹則我與理一然一下未能徹湏是浹洽始得這道理甚活其體渾然而其中粲然上下數千年真是昭昭在天地間前聖後聖相傳所以㫁然而不疑夫子之所教者教乎此也顔子之所樂者樂乎此也圓轉處儘圓轉直截處儘直截先知所以覺後知先覺所以覺後覺問顔子之樂只是天地間至富至貴底道理樂去樂可求之否曰非也此一下未可便知湏是窮究萬理要令極徹程子謂将這身来放在萬物中一例看大小大快活又謂人於天地間湏是直窮到底至纎至悉十分透徹無所不盡則與萬物為一無所窒礙胷中泰然豈有不樂看道理若只恁地説過一遍則都不濟事湏是常常把来思量始得看過了後無時無候又把起来思量一遍十分思量不透又且放下待意思好時又把起来看恁地将久自然解透徹延平先生甞言道理湏是日中理㑹夜裏却去静處坐地思量方始有得某依此説去做真個是不同這道理湏是見得是如此了騐之於物又如此騐之吾身又如此以至見天下道理皆端的如此了方得知某所見所言又非自㑹説出来亦是當初聖賢與二程所説推之而又騐之於己見得真實如此窮理亦無他法只日間讀書應事處毎事理㑹便是雖若無大頭段増益然亦只是積累久後不覺自浹洽貫通正欲速不得也答王欽之書曰所謂窮理不必泥古人言句固是也然亦豈可盡捨古人言句哉程夫子曰窮理亦多端或讀書講明道理或論古今人物别其是非或應事接物求其當否皆窮理也夫講道明理别是非而察之於應接事物之際以克去己私求乎天理循循而進無廹切陵節之弊則亦何患夫與古人背馳也若欲盡舍古人言句道理之不明是非之不别泛然無所决擇雖欲惟出處語黙之察譬之適越者不知東西南北之殊而僕僕然奔走於途其不北入燕則東入齊西入秦耳道理無形影唯因事物言語乃可見得是非理極子細即道理極精微古人所謂物格知至者不過是就此下工夫近日學者説得太髙了意思都不確實不曾見理㑹得一書一事徹頭徹尾東邊綽得㡬句西邊綽得㡬句都不曾貫穿浹洽此是大病有志之士尤不可以不深戒也問以類而推之説曰是􅀙己理會得處推将去如此便不隔越若逺去尋討則不切於己問程子言覺悟便是信如何曰未覺悟時不能無疑便半信半不信己覺悟了别無所疑即是信聖賢所謂博學無所不學也自吾身所謂大經大本以至天下之事事物物甚而一字半字之義莫不在所當窮而未始有不消理㑹者雖曰不能盡究然亦只得隨吾聰明力量理㑹将去久久湏有所至豈不勝全不理㑹者乎若截然不理㑹者雖物過乎前不識其名彼亦不管豈窮理之學哉象山陸氏曰凡人之病患不能知若真知之病自去矣亦不待費力驅除真知之却知説得勿忘兩字所以要講論者乃是辨明其未知處耳勉齋黄氏曰致知乃入道之方而致知非易事要湏黙認實體方見端的不然則只是講論文字終日譊譊而真實體段元不曾識故其説易差而其見不實動静表裏有未能合一則雖曰為善而卒不免於自欺也問伊川謂致知在所養養知莫過於寡慾二字徃徃寡慾則知無不盡如何潜室陳氏曰程子以持敬為入徳之門盖欲格物致知湏是心常存在方可所以有寡慾之説恐引出心向外去也問伊川言窮理非必盡窮天下之理又謂非窮得一理便到又云格物者非必謂欲盡格天下之物但於一物上窮得盡其他可以類推如何曰只格一物便是致知雖曾顔不敢如此道晦翁云日格一物積久自有豁然貫通處此道儘著玩索日格一物豈是只格一物積久貫通到此境界即明睿洞照不待物物盡窮矣問窮理至於天下之物必有所以然之故與其所當然之則所謂理也魯齋許氏曰博學審問慎思明辨此解説箇窮字其所以然與其所當然此説箇理字所以然者是本原也所當然者是末流也所以然者是命也所當然者是義也毎一事毎一物湏有所以然與所當然臨川吴氏曰夫見聞者所以致其知也夫子曰多聞闕疑多見闕殆又曰多聞擇其善者而従之多見而識之盖聞見雖得於外而所聞所見之理則具於心故外之物格則内之知至此儒者内外合一之學故非如記誦之徒博覽於外而無得於内亦非如釋氏之徒専求於内而無事於外也性理大全書卷四十八

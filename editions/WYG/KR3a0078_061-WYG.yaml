body:
  text: 性理大全書卷六十一歴代三西漢陳平或問陳平當王諸吕時何不諫程子曰王陵廷爭不從則去其位平自意復諫者未必不激吕氏之怒也夫漢初君臣徒以智力相勝勝者為君其臣之者非心説而臣事之也當王諸吕時而責平等以死節庸肯茍死乎陳平只是幸而成功當時順却諸吕亦只是畏死漢之君臣當恁時豈有樸實頭為社稷者使後來少主在事變那時他也則隨却如令周勃先入北軍陳平亦不是推功讓能底人只是占便宜令周勃先試難也其謀甚拙其後成功亦幸如人臣之義當以王陵為正陳平雖不知道亦知學如對文帝以宰相之職非知學安能此龜山楊氏曰吕后問宰相髙祖曰陳平智有餘難以獨任王陵少戇可以佐之則髙祖固有疑平之心矣然終其世不見其隙蓋天下初定國家多故諸候内叛夷狄外陵平為䕶軍常從征代不據重兵不親國柄故能免也然髙祖謂平難獨任王陵可以佐之而陵終以戇見踈無益於國其後平專為丞相天下無間言卒以功名終不其反歟知人惟帝難之信矣夫或問文帝問陳平錢榖刑獄之數而平不對乃述所謂宰相之職或以為錢榖刑獄一得其理則隂陽和萬物遂而斯民得其所矣宰相之職莫大於是惜乎平之不知此也朱子曰平之所言乃宰相之體此之所論亦是一説但欲執此以廢彼則非也要之相得其人則百官各得其職擇一戸部尚書則錢榖何患不治而刑部得人則獄事亦清平矣或問良平漢之功臣也十八侯之次良平何以不與髙后四年差次功臣其位愈下何歟潛室陳氏曰漢封功臣其誓盟之辭曰非軍功不侯於軍功中又三事最重一曰從起豐沛二曰從入闗中破秦三曰從定三秦十八侯位次全論此三事良平皆後附良雖從沛公但其時自有故君韓氏所以不在此數又良平皆帷幄謀議不履行陣所以諸軍功者率在先王陵或問王陵周勃陳平處吕后之事如何南軒張氏曰夫以吕氏之凶暴欲王諸吕其誰扼之獨問此三人者蓋亦有所憚也非特憚此三人蓋實憚髙帝之餘威流澤之在天下也陵引髙帝白馬之盟以對其言明切固足以折其姦心如砥柱之遏横流也使二子者對復如陵吾知吕氏將悚焉若髙帝臨之在上且懼天下之變或縮而不敢未可知也彼二子者乃唯然從之反有以安其邪志而遂其凶謀既分王諸吕而吕氏羽翼成就氣燄增長然則吕氏之欲簒漢二子實助之予謂二子方對吕氏時其心特畏死耳未有安漢之謀也退而聞王陵之責顧髙帝之眷思天下後世之議於是而不遑則有卒安社稷之言耳雖然使二子未及施計先吕氏而死則是乃畔漢輔吕不忠之臣尚何道哉抑二子安劉氏之計亦踈矣不遏之於爪牙未就之初而捄之於搏擊磔裂之後觀其間居深念與刼麗寄入北軍等事亦可謂窘迫僥倖之甚夫豈全謀哉麗寄不可刼北軍不可入吕􅎐之謀行則亦殆矣忠於人國者固如是哉人臣之立朝徇義而已利害所不當顧也功業之成不必蘄出於吾身也義理茍存則國家可存矣借使王陵以正對平勃又以正對吕氏一日而尸三子於朝三子雖死而大義固已皎然如白日轟然如震霆天下之義士將不旋踵四面並起而亡吕氏矣安劉氏者豈獨三子為能哉使人臣當變故之際畏死貪生不知徇義而曰吾欲用權以濟事于後此則國家何所頼焉亂臣賊子所以接踵於後世也其弊至於如荀彧馮道之徒而論者猶或賢之豈不哀哉夫所貴乎權者謂其委曲以行其正也若狄仁傑是已其始終之論皆以母子天性為言拳拳然日以復廬陵王為事然其所以紆餘曲折而卒成其志者則用功深矣潛授五龍夾日以飛仁傑豈必功業於其身者哉人臣之義當以王陵為正濟大事者當以狄仁傑為法叔孫通朱子曰叔孫通為綿蕝之儀其效至於群臣震恐無敢喧譁失禮者比之三代燕享群臣氣象更大不同蓋只是秦人尊君卑臣之法魯二生之不至亦是見得如此未必能傳孔孟之道只是他深知叔孫通之為人不肯從他耳或問叔孫通定禮樂召兩生不至曰禮樂積徳百年而後可興漢初朝廷無禮群臣㧞劒擊柱若從兩生無救於目前從叔孫則又因陋就簡揚子雲獨以大臣許兩生如何潛室陳氏曰人有所不為也而後可以有為叔孫通盜儒稍有節操人便不因之而進兩生不是欲待百年但以叔孫通非興禮樂之人故設辭以拒之耳子雲以其自重難進有所不為故以大臣許之蓋因其出處之間可卜其事業也四皓朱子曰漢之四皓元稹嘗有詩譏之意謂楚漢分爭却不出只為吕氏以幣招之便出來只定得一箇惠帝結裹小了然觀四皓恐不是儒者只是智謀之士問四皓是如何人品曰是時人材都没理㑹學術權謀混為一區如安期生蒯通蓋公之徒皆合做一處四皓想只是箇權謀之士觀其對髙祖言語重如願為太子死亦脅之之意又問髙祖欲易太子想亦是知惠帝人才不能負荷曰固是然便立如意亦了不得蓋題目不正諸將大臣不心服到後來吕氏横做了八年人心方憤悶不平故大臣誅諸吕之際因得以誅少帝少帝但非張后子或是後宫所出亦不可知史謂大臣隂謀以少帝非惠帝子意亦可見少帝畢竟是吕氏黨不容不誅耳杜牧之詩云南軍不袒左邊袖四老安劉是滅劉趙堯季布劉章張蒼酈寄龜山楊氏曰予讀漢史至吕戚之事未嘗不為之廢卷太息也以髙帝之明惓惓於趙王其念深矣然卒用趙堯之䇿可謂以金注也且吕后以堅忍之資濟之以深怨積怒其於趙王也欲得而甘心焉乆矣雖韓彭之强有弗利於己去之猶發􅂪耳一貴强相何足以重趙哉善為髙皇計者盍亦反諸己而已不以衽席燕好之私亂嫡妾之分使貴者不陵賤者不逼夫夫婦婦而家道正矣是將化天下以婦道如闗雎之詩豈特無母禍而已哉桓公殺公子紏召忽死之管仲不死孔子稱其仁管仲之不死繩以春秋之法則其義固有在矣世莫有能窺之者方季布髠鉗奴辱於朱家非有深計遠慮也期以免死而已班固謂賢者誠重其死夫死非其所固賢者所重也然君子固有舎生而取義者固之為此説豈非以管仲之事與之乎是皆未明春秋之法也揚子曰明哲不終事項其義得之矣予讀髙五王傳至劉章言田事及誅諸吕一人亡酒者未嘗不為之寒心也方髙后欲强諸吕雖大臣平勃等皆俛首取容而已其志非忘漢也觀王陵之事則可鑑矣使章以才見忌不得宿衛禁中則後雖欲有為也尚何及哉張蒼吹律調樂定律令若百工作程品其有意乎推本之也當是時漢廷公卿皆武夫軍吏無能知書者惟蒼自秦時為柱下史明習天下圖書尤邃於律歴有所建明宜無不從也然其術學踈陋猶以漢當水徳之盛正朔宜因秦弗革卒以此絀惜夫諸吕之王非漢約天下莫與也産禄擅兵欲危劉氏忠臣所共切齒而酈寄固與之友善而商亦莫之禁何也其謀吕禄也刼之而後從則商寄之罪均矣雖絳侯頼之以入北軍功不足以贖其罪也使商不就刼而吕氏得志則寄之父子得無非望乎其賣友非其本心也張釋之龜山楊氏曰君子欲訥於言而敏於行利口㨗給古人賤之若上林尉居其位不知其任至十餘問不能對是謂不任職非訥於言者也張釋之以絳侯張相如方之過矣文帝問絳侯天下一歳决獄幾何絳候不能對又問天下錢榖一歳出入幾何又不能對帝以問陳平平條析甚辨文帝善之絳候愧汗洽背自以其能不及平遠甚若是以絳候為賢平為喋喋可乎予謂上林尉真亡頼而虎圏嗇夫雖口對響應亡窮然上所問乃其職事非利口㨗給也豈足深過之歟或問張釋之為廷尉天下無寃民于定國為廷尉民自以不寃二者何以異東萊吕氏曰以史氏之辭論之則民自以為不寃者勝於天下無寃民蓋天下無寃民者所斷皆當其罪罪人未必皆心服也然以實攷之則定國實不勝釋之或問張釋之為廷尉天下無寃民于定國為廷尉民自以不寃若趙蓋韓楊之死謂之不寃可乎或者説宣帝時廷尉不獨一于定國雖不獨在定國而定國坐視四子之死亦不能效張釋之之守法如何潛室陳氏曰漢卿有罪未必悉下廷尉自有詔獄多丞相御史大夫治之或下中二千石雜議廷尉所謂平者非必皆寛縦之謂剛不吐柔不茹者平也趙蓋韓楊之死今作文人但浪説耳周亞夫五峰胡氏曰周亞夫霍光不學不知道能進不能退殺身亡宗是功名富貴誤之也知道者屈伸通變與天地相似功名富貴何足以病之張子房進於是矣或問周亞夫軍中聞將軍令不聞天子詔不知是否朱子曰此軍法又問大凡為將之道首當使軍中尊君親上若徒知有將而不知有君則將皆亞夫固無害也設有姦將一萌非意則軍中之人豈容不知有君曰若説到反時更無説凡天子命將既付以一軍只當守法賈誼或問賈誼程子曰誼之言曰非有孔子墨翟之賢孔與墨一言之其識末矣其亦不善學矣龜山楊氏曰賈誼以少年英鋭之資抱負其器頗見識拔慨然遂以身任天下而絳灌之徒出於織薄販繒之武夫先王之典章文物彼烏足與議哉髙帝所與平天下定法令又皆其身親見之也誼以踈逖晚進之人欲一日悉更奏之彼其心豈能恝然耶此纔釁之所由起也古之君子自重其身常若不得已而後進非固要君也蓋天下重器不可易為之王業之大必遲乆而後成故人君非有至誠不惓之心則不足以有為也其尊徳樂義一有不至則引而去之萬鍾於我何加焉非忘天下道固然也誼之草具儀法與夫三表吾鉺其術固踈矣當是時人君方且謙讓未遑也誼身非宰輔及汲汲然自進其説蓋亦不自重矣在我者不重故人聽之也輕及夫以才見忌不容於朝出為王傅其論國事猶曰陛下曾不與如臣者議之則是欲嬰撫在廷之臣而出其上也豈不召禍歟孔子曰為國以禮其言不讓於誼有之漢之儒者若賈誼用力亦勤矣其文宏妙殆非後儒能造其域然稽其道學淵源論篤者終莫之與也朱子曰賈誼之學雜他本是戰國縦横之學只是較近道理不至如儀秦蔡范之甚爾他於這邉道理見得分數稍多所以説得較好然終是有縱横之習縁他根脚只是從戰國中來故也漢儒惟董仲舒純粹其學甚正非諸人比只是困苦無精彩極好處也只有正義明道兩句下此諸子皆無足道如張良諸葛亮固正只是太麄南軒張氏曰賈生英俊之才若董相則知學者也治安之䇿可謂通逹當世之務然未免乎有激發暴露之氣其才則然也天人之對雖若緩而不切然反復誦味淵源純粹蓋有餘意以其自學問涵養中來也讀其奏篇則二子氣象如在目中而其平生出處語黙亦可驗於是矣以武帝好大喜功多欲之心使其聽仲舒之言則天下蒙其福矣孰謂緩而不㘦也耶或問賈誼陳冶安䇿論民俗奢侈盗賊乗時而發夫文帝躬修𤣥黙移風易俗以誼言觀之所謂移風易俗者安在潛室陳氏曰誼煞有踈密太過處惟文帝能受盡言史臣謂誼之言亦略施行文帝風俗好處誼不為無助袁盎賈山馮唐鄒陽枚乗龜山楊氏曰淮南王之驕恣其荏禍乆矣然徴之即至則反形未具以檻車遷之是將置之必死也不早辨之養成其禍卒至乎敗國亡身文帝不無罪也鄭共叔不義得衆詩人以刺莊公而春秋交譏之正謂此也然則人君不幸有弟如淮南者冝奈何若舜之於象放之有庳可也袁盎不能明義以正其君乃以無稽之言謂之不亦過乎若七國之反聞晁錯之欲治已也反以竒禍中之此戰國䇿士之常也然二人之相賊其志一也特繫其發之先後耳不念國家之大計乃欲因禍以釋一己之私怨若二人又何足誅哉而班固謂盎仁心為質誤矣孝文之恭儉仁慈而賈山乃借秦為喻盛言其侈靡貪狠暴虐冝若過矣然君臣儆戒正在無虞之時故舜之臣猶以丹朱戒其君則山之借秦不為過也後世驕君諛臣恃天下無虞而不知儆戒有聞斯言必以為訕矣其取禍敗不亦冝乎馮唐謂文帝不能用頗牧其言雖有激然亦深中其病也夫李牧之為趙將也軍市之租皆自用賞賜皆决於外不從中覆故能有成功魏尚守雲中上功首虜差六級文吏即以法繩之以是較之文帝不能用李牧信矣揚雄謂文帝親詘帝尊以信亞夫之軍􅂚為不能用頗牧夫孫武斬吳王之寵姫穰苴斬齊君之寵臣與其使者僕車之左駙馬之左驂皆在軍不受君令也古之為將者皆然豈獨亞夫乎然則文帝未嘗詘而亞夫之軍未嘗信也謂之有激云爾則得矣呉王怨望隂有邪謀鄒陽枚乗之徒不能明義以導其君而區區以利説之宜乎其無益也及呉兵西嚮而枚乗猶以民之輕重國之大小為言則是使吳重大而漢輕小則呉兵可得而進也吳亡乗不及禍而卒以取重於世幸矣夫田叔龜山楊氏曰班固謂田叔隨張敖赴死如歸彼誠知所處予謂田叔之隨王雖以身死之何益於趙此與婢妾賤人感慨自殺者何以異哉烏在其為知所處孟舒為雲中守而士爭臨城死敵此誠長者而田叔乃以隨張王事首稱之斯言豈特為舒而發抑亦自賢耳夫譽人以自賢是豈長者之言乎五峯胡氏曰田叔悉燒梁獄詞空手來見可謂善處人子母兄弟之間者也漢景忌刻之君也而能賢田叔有過人之聰明越人之度量者何歟以太后在上不敢肆故也天理存亡在敬肆之間耳孔子作春秋必記災異警乎人君萬世不死也晁錯龜山楊氏曰晁錯云人君必知術數又云五帝神聖其臣莫能及而自親事操是説蓋未嘗知治體也夫天下大器非智力所能勝也舜之惇五典庸五禮用五刑皆因天而已未嘗自為也雖股肱耳目付之臣而不自用况以術數而自親事乎使後世懐謟者誤其君挾術以自用必資是言也其為禍豈淺哉若吳楚之反不在錯天下戸知之矣景帝用䜛邪之謀以誅錯其失計不已甚乎當是時兵之勝負國之安危未可知也而誅其謀首豈不殆哉而在廷之臣無一人為錯言者蓋變起倉卒各欲僥倖於無事而莫敢以身任之也然而錯亦有以取之矣夫漢之有七國未若魯之三家也孔子墮三都之城而三家無敢不受命者則其處之必有道矣孟子曰子以為有王者作則魯在所損乎在所益乎使孟子而得志固將損之也錯無碩徳重望以鎮服其心而强為之謀其召亂而取禍蓋無足怪者武帝時淮南王欲反獨畏汲黯之節義視公孫𢎞軰如發䝉耳則天下果非智力可為也以一汲黯猶足以寢淮南之謀况不為黯者乎南軒張氏曰晁錯在當時只合使居論思獻納之職觀其言之是者行之不是者置之而使之為御史大夫則過其才矣至如馬謖不是孔明錯看他亦是用過其才謖平生㕘軍事煞有籌畫一但使之自將兵所以敗耳使㕘謀為都綂如何做得竇嬰灌夫田蚡龜山楊氏曰景帝燕兄弟欲以天位傳梁王竇嬰以漢約直之忤大后㫖可謂不阿矣及為丞相推轂士類尊用儒術雖籍福之辨不能遷惑其所守直己以徃不撓權貴其節義有足稱者至晩節末路失位不得志而與灌夫相為引重二人者並位公侯顯名當世其平生意氣何其壯哉田蚡以外戚進顯滛奢無度尊己以下人壯夫義士宜恥出其門而二人者乃幸其臨况以為名髙其志慕又何其汙也蓋騖勢榮者勢窮則辱而氣隨以奪其理然矣若灌夫者勇悍不遜有死之道焉終以一朝之忿亡其身非自取歟竇嬰區區復鋭於為救果何益哉故卒與俱滅是亦不知量也田蚡規利賣國其不族幸矣卜式潛室陳氏曰漢方事匈奴而卜式願輸助邉方事南越而式願父子俱死天下方事匿財而式猶欲就助公家之費凡式之所樂為者皆衆人之所難為而武帝之所欲為者式輒揣其意而逆為之故天下因式獲罪者十室而九而式之褒寵眷遇自以為有用於天下及武帝當封禪而式獨以不習文章見棄式乎式乎何不先衆人而為之乎公孫𢎞程子曰觀武帝問賢良禹湯水旱厥咎何由公孫𢎞曰堯遭洪水不聞禹世之有洪水也而不對所由姦人也元城劉氏曰公孫𢎞姦詐人也亦有長處諫罷西南夷不用卜式郭解是也且武帝之好征伐天下皆欲諫而止之而式身為庶人乃願以家財助邉以迎合人主其後又欲父子死南越帝由是移怒列侯不肯從軍坐酎金失侯者百六人實式激其怒也故𢎞以式為非人情不軌之臣不可以為化而亂法且郭解以匹夫而奪人主死生之權且聖人之作五刑固有輕重今一言不中意而立殺之此何理也考其唱此悖亂之風解實為之魁故𢎞之言解布衣為任俠行權以睚眦殺人解不知此罪甚於解知此二事得大臣之體張湯涑水司馬氏曰或稱張湯矯偽刻薄而後嗣顯榮七葉不絶意者積善餘慶積惡餘殃近虚語耶應之曰不然所謂積者繼世相因之謂也故傳稱八元八凱世濟其美饕餮三族世濟其凶此非積善積惡之謂耶欒書有惠於晉晉人思之黶雖剛愎猶得保其宗廟至盈無徳卿族遂亡然則黶之所以存書之餘慶也盈之所以亡黶之餘殃也祖父有徳子孫為不善未免禍敗慶何有焉祖父不善而子孫有徳福禄將集殃何有焉祖父為不善而子孫又無徳以蓋前人之愆則餘殃被之是以堯舜雖至徳朱均不能免其災瞽鯀雖大惡舜禹無所虧其聖若張湯者雖險詖人也而有子安世保輔漢室寔有大功子孫嗣之率皆忠格信厚恭儉周密邦有道不廢邦無道免於刑戮以是光顯於後彌歴永世固其宜矣又何異焉霍光朱子曰霍光臨大節亦有大虧欠處問君臣之變不可不講且如霍光廢昌邑正與伊尹同然尹能使太甲自怨自艾而卒復辟光當時被昌邑説天子有爭臣七人兩句後他更無轉側萬一被他更咆勃時也惡模様曰到這裏也不解恤得惡模様了又問光畢竟是做得未宛轉曰做到這裏也不解得宛轉了良乆又曰人臣也莫願有此萬一有此時也十分使那宛轉不得問霍光小心謹厚而許后之事不可以為不知馬援戒諸子以口過而裹屍之禍乃口過之所致二人之編在小學無亦取其一節耶曰采葑采菲無遺下體取人之善為己師法正不當如此論也南軒張氏曰霍光天資重厚如朝謁進止常不差尺寸似乎知學者後人徃徃輕加詆毁使之當大事必不能然立君豈易事吕氏之難或言齊王可立大臣以為王舅駟鈞虎而冠即立齊王復為吕氏矣遂定議立文帝須謹擇於其初至如昌邑王在國素狂縱光不能察知而輕立之豈得無罪其後幸而能立宣帝劉元城謂取其無黨此則未然霍光天資重厚故可以當大事而其所以失則由於不學之故也人臣之功至於周公無以加矣而詩人形容其盛徳則曰公孫碩膚赤舄几几夫何其温恭謙厚也是則雖以天子叔父之尊處人臣之極位有蓋世之功業而玩其氣象豈有一毫權勢之居而人之視之也但見其道徳之可尊而亦豈覺權勢之可憚哉孟子曰事親若曾子可也而後之君子亦曰事君若周公可也如曾子之事親適為人子之能盡其分者耳非有加也如周公之事君亦然蓋在其身所當為者而何一毫有於己也周公惟無一毫有於己也是故徳盛而愈恭事業為無窮也光之所建立想負於其身横於其心而不能以弭忘惟其不能以弭忘故其氣燄不可掩威勢日以盛權利之途人爭趨之非惟家人子弟門生故吏馴習驕縱而不可戢光之身亦不自知其安且肆矣此凶于乃國敗于乃家之原也可不畏哉故其一時用舎進退例出於私意以蘇武之忠節進不由己僅得典屬國而大司馬長史雖如楊敞之庸謬亦得為宰相至於如魏相蕭望之之才皆擯不用田千秋小不當意則其壻即論死作威作福蓋如此隂妻之邪謀未論其不能白發於後使其妻邪謀至此而人敢為之助而無復言其姦則履霜堅氷馴致其道夫豈一日之故哉光至此亦無全理矣原其始皆由於其心以寵利居成功不知為人臣之分故曰不學之過也雖然後之儒生如班固軰蓋知以不學病光矣然使其當小利害僅如毫髪鮮不䘮其所守望其如光凛然當大事屹如山嶽其可得哉然則光雖有不學之病而其自得於天資者蓋有不可及後之儒生雖自號為學者譏議前人而反無以自立則亦何貴乎學哉子謂人才如光軰學者要當觀其大節先取其所長而後議其所蔽反身而察焉則庶幾為蓄徳之要不然所論雖似髙亦為虚言而已矣或問周勃霍光在漢均有擁立之功優劣如何潛室陳氏曰霍光仗忠義舉動光明平勃任智術蹤跡踈昧汲黯龜山楊氏曰周勃起布衣蓋椎朴鄙人以其重厚故可屬大事則天下重任固非狷忿褊迫者所能勝也武帝時淮南王欲反獨畏汲黯之節義至論公孫𢎞軰若發䝉爾夫汲黯之直為天下敬憚如此予獨疑其狷忿􅄶迫臨大事不能無輕重輕重則失事機難與成功故武帝謂古有社稷臣黯近之矣其有得於此乎䟽廣受或論二䟽不合徒享爵位而去又不合不薦引剛直之士代已輔導太子朱子曰䟽廣父子亦不必苛責之雖未盡出處之正然在當時親見元帝懦弱不可輔導他只得去亦是避禍而已觀渠自云不去懼貽後悔亦自是省事恬退底世間自有此等人他性自恬退又見得如此只得去若不去蕭望之便是様子望之即剛直之士魏相趙充國南軒張氏曰魏相所存不得為正觀其有許史之累則可見矣夫欲其説之行而假許史以為重此詭遇獲禽之心君子不道也然其為相亦有可取者四方有異聞或有逆賊災變輙奏言之此誠宰相事也其諫伐匈奴書有曰今郡國守相多不實選風俗猶薄水旱不時按今年子弟殺父兄妻殺夫者凡二百二十二人臣愚以此非小變也凡此在他人不知為憂者而相獨知憂之亦槩乎有聞矣故予甚惜其進之不能以正也進不以正則牽制徇從之事必多而感格正捄之風或鮮矣漢將誠當以趙充國為最凡將之病患於勇而不詳也充國蓋更軍事多矣及聞西羗之事則不敢以遽而曰兵難遥度願馳至金城圖上方略其不敢忽如此蓋思慮之深經歴之多孔子所謂臨事而懼好謀而成者也將之病在於急近功也充國則圖其萬全陳屯田十二利持乆而為不可動之計其規模與孔明渭上之師何以異哉將之病在果於殺而不恤百姓也充國任閫外之寄而為國家根本之慮要使百姓安邊圉彊而西戎坐消焉此殆三代之將非戰國以來摧鋒折敵者所可班也反覆究其規模味其風㫖逺大周密拔出倫軰予謂充國在宣帝時且不獨為賢將殆可相也使其為相必能為國家圖回制度為後世慮安養百姓為邦本計如魏相軰皆當在其下風耳丙吉涑水司馬氏曰丙吉為丞相出逢群盗格鬬死傷横道過之不問見牛喘而問之以為詰禁盗賊守令之事隂陽不調此乃宰相職耳談者羙之愚竊以為不然夫宰相所以治隂陽者豈拱手端冕無所施設而隂陽自調蓋亦佐人主治庶政安四海使和氣洋洋薄於宇宙旁暢周逹浸潤滲漉明則百姓洽幽則鬼神諧然後寒暑時至萬物阜安雖古昔聖人之治天下至於隂陽和寒暑時而至治極矣豈庸人所能致哉當丙吉為政之時政治之不得刑罰之失中不肖之未去忠賢之未進可勝紀哉釋此不慮而慮於牛喘以求隂陽不亦踈乎且京邑之内盗賊縱横政之不行孰甚於此詩云商邑翼翼四方之極近不能正如遠人何若曰守令之職守令不賢當責何人非執政者之過而又誰歟昔士㑹為政晉國之盗逃奔於秦子産為政桃李垂於街者莫援若盗賊不禁而曰長安令之職風俗不和而曰三老之職刑罰不當而曰廷尉之職衣食不足而曰司農之職推而演之天下之事各有其官則宰相居於其間悉無所與而曰主調隂陽隂陽固可坐而調耶愚以為丙吉自知居其位而無益於世飾智譎問以揜其迹抑亦自欺而已矣南軒張氏曰丙吉深厚不伐在他人亦無所難者其徳厚可稱也其為相若寛緩者雖天資則然意亦以宣帝之政尚猛而有矯之之意歟然抑亦太甚矣至於韓延壽楊惲之死則亦莫能救也吉見謂不親小事知大體二卿之死夫豈事之小者耶濫刑若是其於大體何有若語其才識蓋不逮魏相逺矣黄覇象山陸氏曰黄覇為頴川守鰥寡孤獨死無以葬者覇為區處曰某所木可為棺某亭猪可以祭吏徃皆如其言遣吏司察事既還而勞其食於道傍為烏所攫肉事毎得實人無敢欺皆以為神史家載其得之之由以為語次尋繹問他隂伏以相㕘考後世儒者乃以為鈎距而鄙之此在黄覇雖未盡善而後儒非之者猶為無知蓋不論其本而論其末不觀其心而遽議其行事則皆不足以論人原覇之心本欲免人之欺求事之實而已匡衡朱子曰嘗見一人云匡衡做得相業全然不是只是所上䟽議論甚好恐是收得好懐挾又云如答淮陽王求史遷書其詞甚好又曰如宣元間詔令及戒諸侯王詔令皆好不知是何人做漢初時却無此議論漢初却未曾講貫得恁地又曰匡衡説詩闗雎等處甚好亦是有所師授講究得到劉向蕭望之龜山楊氏曰漢武元鼎元封之間燕齊之士爭言神仙祭祀致福之術者以萬數故滛祠於漢世為多雖當時名儒碩徳繼登宰輔莫有能是正之者元成之際衡譚用事始奮然欲盡去滛祠正以古義又幸世主從之其志行矣未㡬以劉向一言而廢祠復興豈不惜哉蓋人情狃於禍福而易動鬼神隠於無形而難知以易動之情稽難知之理而欲正百年之謬宜乎其難矣以劉向之賢猶溺於習見况餘人乎自孟子没王道不傳故世無王佐之才既無王佐之才故其治效終不如古若要行道纔説做計較要行便不是何故自家先負一箇不誠了安得事成劉向多少忠於漢只為做計較大甚纔被見破手足俱露是甚模様初孝宣循武帝故事招置名儒劉更生以通逹善屬文與選中可謂遇主矣其後上復興神仙方術之士而更生得淮南枕中鴻寳秘書獻之言黄金可成其所為未免長君之過也豈其逢世希合而為之歟抑年少學猶未能無惑於異端歟其後與望之堪猛軰並立于朝為羣小側目更生乃令外親上變事其義安在哉夫君子小人相為盛衰蓋天地之大義也消息盈虚天地且不能不以其漸况於人乎且許史恭顯之於漢也憑藉私昵寵嬖之恩非一日矣其培根深其滋蔓逺非所以朝升而暮罷而君子之去小人又非智謀之足恃也亦有吾之仁義而已彼方欲肆欺以罔吾之信為數以敗吾之義而吾且欲决而去之而自為不信其見乗也不亦宜乎子讀更生傳見其惓惓於其君未嘗不為之歎息也惜其不知義命之歸故一蹶而不振悲夫南軒張氏曰蕭望之劉更生輔元帝初政以元帝天資之弱而外有史髙總朝廷之事内有恭顯制樞機之權二子居其間可謂孤弱之勢危疑之時矣所以處之之道要當艱深其慮正固其守誠意懇惻以廣上心人才兼收以彊國勢謹其為勿使有差密其機勿使或露積之以乆上心開明人才衆多群心歸而理勢順庶幾有可為者此在易屯膏小貞之義也而二子處之蓋甚踈矣其綢繆經理未嘗有一日之功也遽白罷中書宦官其機蓋已盡露而無餘䇿既不䝉信用而中外小人並起而乗之身之死逐不足道而當時之事遂不可復救甚矣二子之踈也况其所為自多不正用人要當公天下之選而二子者不惟其賢惟其附己不知小人迎合於外者詎可保耶故以鄭朋之傾邪而使之待詔至於華龍之汙穢亦欲入其黨彼蓋有以召之也在易有之君子以逺小人不惡而嚴所謂嚴者嚴其在我者也二子處群小之間而不嚴如是其可得乎袁安任隗當梁冀强横之時非惟不能加害而卒能去之以安隗所處之嚴故也故史稱安隗素行髙冀未有以害之斯言誠有味也二子曾不知此耶至於使外親上變事與子上書則又其甚矣子觀二子所執雖正然懇誠之心不篤勢利之念相交以天下之公義而行之以一己之私蓋不知學之弊也吁可惜哉然而昔人未可以一失斷其平生若更生經歴憂患晩歳氣象殊勝於前處王氏之際庶幾為憂國敦篤者矣龔勝涑水司馬氏曰王莽慕龔君賔之名訹以尊爵厚禄刼以滛威重勢而必致之君賔不勝逼迫絶食而死班固以薰膏之語譏焉未聞有為辨之者也可不大哀歟昔者紂為不道毒痡四海武王不忍天下困窮而征之斯則有道天子誅一亂正之匹夫爾於何不可而伯夷叔齊深非之義不食周粟而餓死狷隘如此仲尼猶稱之曰仁以為不殞其節而已况於王莽憑漢累世之恩因其繼嗣衰絶飾詐偽而盗之又欲誣洿清士以其臭腐之爵禄甘言諛禮期於必致不可以智免不可以義攘則志行之士舎死何以全其道哉或者謂其不能黜芳棄明保其天年然則虎豹之鞹何以異於犬羊之鞹庸人之行孰不如此又責其不詭辭曲對若薛方然然則將未免於謟豈曰能賢故君賔遭遇無道及此窮矣失節之徒排毁忠正以遂已非不察者又從而和之太史公稱伯夷叔齊不有孔子則西山之餓夫誰識知之信矣哉王莽潛室陳氏曰莽拔於族屬繼四父而輔政時人未之信也於是刻心厲行以著其節禮賢下士以釣其名分布黨與以承其意謟事母后以市其權延見吏民以致其恩意上下之勢既成而人皆知有莽矣於是力為險異之行以焜耀當時封邑不受位號不居視天下爵禄若將凂焉天下之人見其苦心如此遂以其無他而謂伊周復出故其避丁傅也莫不稱其賢其罷歸也天下莫不訟其寃一辭采女而詣闕上書者千數辭益封而吏民上書者八千人辭新野田而前後上書者至四十八萬蓋當時惟恐莽之一日去漢舉國以授之惟恐其不受夫莽斗筲之才賈孺之智兒曹之恩妾婦之行徒以驅委庸人籠絡小孺媚事婦人女子可也而乃掩竊大物豈非厄會然歟總論朱子曰漢興之初人未甚繁氣象剗地較好到武宣極盛時便有衰底意思周人繁密秦人盡掃了所以賈誼謂秦專用茍簡自恣之行秦又太茍簡自恣不曾竭其心思太史公董仲舒論漢事皆欲用夏之忠不知漢初承秦掃去許多繁文已是質了董仲舒才不及陸宣公而學問過之張子房近黄老而隠晦不露南軒張氏曰西漢末世風節不競居位大臣號為有正論者不過王嘉何武師丹耳在波蕩風靡之中誠亦可取比之光禹則甚有間矣然西漢末年正如病者元氣先敗几疾皆得以入之而皆得以亡之為當時大臣者要當力陳國勢根本之已蹶勸人主以自强於徳多求賢才以自輔庶可以扶助元氣消靡沉痼若不循其本而姑因一事之謬一人之進而指陳之縱使一事之正一人之去亦將有繼其後者終無益也故哀帝之末董賢雖去而王氏即起遂以亡漢矣自成帝以來受病之痼且大者乃在王氏如丁傅董賢之徒又特一時乗間之疾耳在位者當深以王氏為慮以王氏為慮當如予所言先勸人主以自强於徳自强於徳則不冝少有差失顧反尊傅氏寵董賢以重失天下之心是益自削而增助王氏之勢耳故莽得以拱手而乗其後惜當時論者皆不知及此也可勝歎哉性理大全書卷六十一

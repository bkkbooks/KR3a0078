body:
  text: 性理大全書卷二十四洪範皇極内篇一九峯蔡氏自序曰體天地之撰者易之象紀天地之撰者範之數數者始於一象者成於二一者奇二者偶也奇者數之所以行偶者象之所以立故二而四四而八八者八卦之象也一而三三而九九者九疇之數也由是重之八而六十四六十四而四千九十六而象備矣九而八十一八十一而六千五百六十一而數周矣易更四聖而象已著範錫神禹而數不𫝊後之作者昩象數之原窒變通之妙或即象而為數或反數而擬象洞極用書潛虚用圖非無作也而牽合附㑹自然之數益晦蝕焉嗟夫天地之所以肇者數也人物之所以生者數也萬事之所以失得者亦數也數之體著於形數之用妙乎理非窮神知化獨立物表者曷足以與此哉然數之與象若異用也而本則一若殊途也而歸則同不明乎數不足以語象不明乎象不足與語數二者可以相有不可以相無也先君子曰洛書者數之原也余讀洪範而有感焉上稽天文下察地理中參人物古今之變窮義理之精微究興亡之徴兆微顯闡幽彛倫所叙秩然有天地萬物各得其所之妙嵗月侵尋粗述所見辭雖未備而義則著矣其果有益於世教否乎皆所不敢知也雖然余所樂而玩者理也余所言而𫝊者數也若其所以數之妙則在乎人之自得焉爾黄氏瑞節曰易更四聖而象已著範錫神禹而數不𫝊九峯蔡氏撰皇極内篇數為一書於是有範數圖有八十一章六千五百六十一變西山真氏云蔡氏範數與三聖之易同功者是也九九行數圖一一冬至一二一三一四一五一六一七一八一九二一二二立春二三二四二五二六二七二八二九三一三二三三春分三四三五三六三七三八三九四一四二四三四四立夏四五四六四七四八四九五一五二五三五四五五夏至五六五七五八五九六一六二六三六四六五六六立秋六七六八六九七一七二七三七四七五七六七七秋分七八七九八一八二八三八四八五八六八七八八立冬八九九一九二九三九四九五九六九七九八九九冬至洪範皇極内篇上造化之為造化者幽明屈信而已天者明而信者也地者幽而屈者也暑者明而信者也寒者幽而屈者也晝者明而信者也夜者幽而屈者也天地也寒暑也晝夜也幽明屈信以成變化者也是故陽者吐氣隂者含氣吐氣者施含氣者化陽施隂化而人道立矣萬物繁矣陽薄隂則繞而為風隂囚陽則奮而為雷陽和隂則為雨為露隂和陽則為霜為雪隂陽不和則為戻氣沖漠無眹萬象具矣動静無端後則先矣器根於道道著器矣一實萬分萬復一矣混兮闢兮其無窮矣是故數者計乎此者也疇者等乎此者也行者運乎此者也微而顯費而幽神應不測所以妙乎此者也有理斯有氣有氣斯有形形生氣化而生生之理無窮焉天地絪緼萬物化醇男女搆精萬物化生化生者塞化醇者􅄨覆土之陵積水之澤草木魚蟲孰形孰色無極之真二五之精妙合而凝化化生生莫測其神莫知其能理之所始數之所起微乎微乎其小無形昭乎昭乎其大無垠微者昭之原小者大之根有先有後孰離孰分成性存存道義之門老氏為虚釋氏為無刑名失實隂陽多拘異端曲學烏乎不渝哉有理斯有氣氣著而理隠有氣斯有形形著而氣隠人知形之數而不知氣之數人知氣之數而不知理之數知理之數則㡬矣動静可求其端隂陽可求其始天地可求其初萬物可求其紀鬼神知其所幽禮樂知其所著生知所来死知所去易曰窮神知化徳之盛也智者君子所以成徳之終始也是故欲知道不可以不知仁欲知仁不可以不知義欲知義不可以不知禮欲知禮不可以不知數數者禮之序也分於至微等於至著聖人之道知序則㡬矣人非無知也而真知為難人非無見也而真見為難義之質人所知也而犯義者多禮之文人所見也而越禮者衆以其知之非真知見之非真見爾真者精之極精則明明則誠誠則為其所為不為其所不為如水之寒火之熱亦性之而已矣物窒而理虚暗窒而明虚萬物生於虚明而死於窒暗也萬事善於虚明而惡於窒暗也虚明則神神則聖聖者數之通也窒暗則惑惑則愚愚者數之塞也隂陽五行其體而用用而體者耶渾渾淪淪而出入異門繩繩井井而形色俱泯合之而知其異析之而知其同微之而知其顯充之而知其不可窮者其庶矣哉隂陽相為首尾者耶是故陽順而隂逆陽長而隂消陽進而隂退順者吉而逆者凶耶長者盛而消者衰耶進者利而退者鈍耶周流不窮道之體失得相形事之紀也隂陽非可一言盡也以清濁言則清陽而濁隂以動静言則動陽而静隂以升降言則升陽而降隂以奇偶言則奇陽而偶隂小大髙卑左右後先向背進退逆順醜妍靡物不爾無時不然愈析愈微愈窮愈廵音沿隂陽之精互藏之營隂陽之氣循環迭至隂陽之質縱横曲直莫或使之莫或禦之變者化之漸化者變之成變化者隂陽之消長屈伸也非二則不能久非一則不能神昔者天錫禹洪範九疇也初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三徳次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極無形者理也有形者物也隂陽五行其物也歟所以隂陽五行其理也歟無形之中而具有形之實有形之實而體無形之妙故君子語上而不墮於虚無語下而不泥於形器中立而不倚旁行而不流樂天知命而不憂形氣之元極實先焉極無不中也氣或偏矣形又偏矣中無不善偏不善矣氣之善者十之五形之善者十之三三五之中又有至焉有不至焉純乎極者一而已矣漸偏則漸駁氣使然也形使然也氣有方形有體故中者少而偏者多也此天下善惡之所由出失得之所由分吉凶禍福之所由著歟理其至妙矣乎氣之未形物之未生理無不具焉氣之既形物之既生理無不在焉渾然一體而不見其有餘物各賦命而不見其不足無形影可度也無聲臭可聞也主萬化妙萬物人知其神而不知其所以神邵子曰性者道之形體也道妙而無形性則仁義禮智具而體著矣程子曰天運而不已日徃則月来寒往則暑来水流而不息物生而不窮皆與道為體者也非性無以見道非不息亦無以見道是以君子盡性而自強不息焉朱子曰太極者本然之妙也動静者所乘之機也太極形而上之道也隂陽形而下之器也自形而下者觀之則動静不同時隂陽不同位而太極無不在焉自形而上者觀之則沖漠無眹而動静隂陽之理已悉具於其中矣雖然推之於前而不見其始之合引之於後而不見其終之離也程子曰動静無端隂陽無始非知道者孰能識之張子曰鬼神者二氣之良能也神者氣之伸陽之動也鬼者氣之屈隂之静也静不能以不動動則萬物之所從生動不能以不静静則萬物之所由復一往一復其機蓋有不能自己者焉非一則不能成兩非兩則不能致一兩者可知而一者難知也兩者可見而一者難見也可知可見者體乎難知難見者微乎仁義禮智信者義理之公也人之所固有視聽言貌思者形氣之私也我之所自生公者千萬人之所同私者一人之所獨是以君子貴同而賤獨極建則大本立極明則大用著以之齊家而家無不齊以之治國而國無不治以之平天下而天下無不平若是者天地其合鬼神其依龜筮其從立百世之下等百世之上而莫能違也立百世之上俟百世之下而亦莫能違也天地之位也四時之運也隂陽感而五行播矣五行隂陽也隂陽五行也數始㝠㝠妙於無形非體非用非静非動動實其幾用因以隨動極而静清濁體正天施地生品彚咸亨各正性命小大以定斯數之令既明而神是曰聖人人心至靈也虚明之頃事物之来是是非非無不明也少則昏矣久則怠矣又久則棄之矣無他形氣之私溺之也人能超乎形氣抜乎物欲逹其初心則天下之理得矣天下之理動者奇而静者偶行者奇而止者偶得友者致一而生物者不二也數者彛倫之叙也無叙則彜倫斁矣其如禮樂何哉人心動静情性具焉性者理之形體情者性之發動善其本然惡其過不及也存心莫善於敬進學莫善於知二者不可廢一也人之一心實為身主其體則有仁義禮智之性其用則有惻隠羞惡辭遜是非之情方其寂也渾然在中無所偏倚與天地同體雖鬼神不能窺其幽及其感也隨觸隨應範圍造化曲成萬物雖天地不得與其能天地之大人猶有憾故君子語大天下莫能載焉語小天下莫能破焉至小無内至大無外無内不可分也孰分之歟無外不可窮也孰窮之歟斯之斯之式顯其微度之度之莫或其遺匪神之為而妙於斯程子曰天地之常以其心普萬物而無心聖人之常以其情順萬事而無情常之時義大矣哉禮義交際其萬化所入之門耶東北萬物之所出也出則育神西南萬物之所入也入則復命其出也順而生其入也拂而遂不觀其初無以知物之育不觀其入無以知物之復火之克金水之生木出入循環生克嗣續老彭得之以養身君子得之以養民聖人得之而天下和平周子曰厥彰厥微匪靈弗瑩剛善剛惡柔亦如之中焉止矣二氣五行化生萬物五殊二實二本則一一實萬分萬一各正小大有定明禮而後可與適道守禮而後可與治民逹禮而後可與言數非禮之道老佛之道也非禮之治荒唐之説也非禮之數京房郭璞之技也君子所不由不為不言也至一而精至虚而靈有動有静動直静凝静已而動動已而静一静一動為屈為伸為鬼為神人心至妙萬物之窌動静之徼天地之化不翕聚則不能發散仁智交際萬化之機軸也氣之消息也以漸氣之息也形之生也氣之消也形之毁也潤萬物者莫澤乎水化萬物者莫疾於火水火者未離乎氣者也數運無形而著有形智者一之愚者二焉數之方生化育流行數之已定物正性命圓行方止為物終始隨之而無其端也迎之而無其原也渾之惟一析之無極惟其無極是以惟一二氣之初理妙於無無極而太極也五運迭至理藏於智或為之先大本其原或為之後復往之間大本太始復往無已二者不同一而已矣二氣之神隂精陽明消息變化有立有行立則形具行則氣著上下其儀先後其施一行一立為闢為翕何千萬年無終窮焉洪範皇極内篇中河圖體圓而用方聖人以之而畫卦洛書體方而用圓聖人以之而叙疇卦者隂陽之象也疇者五行之數也象非耦不立數非奇不行奇耦之分象數之始也是故以數為象則奇零而無用太𤣥是也以象為數則多耦而難通經世書是也隂陽五行固非二體八卦九疇亦非二致理一用殊非深於造化者孰能識之河圖非無奇也而用則存乎耦洛書非無耦也而用則存乎奇耦者隂陽之對待乎奇者五行之迭運乎對待者不能孤迭運者不可窮天地之形四時之成人物之生萬化之凝其妙矣乎象以耦為用者也有應則吉數以奇為用者也有對則凶上下相應之位也隂陽相求之理也中五特立而當時者獨盛也是故天地定位山澤通氣木盛而金衰水寒而火囚理有相須而物不兩大也數者動而之乎静者也象者静而之乎動者也動者用之所以行静者體之所以立清濁未判用實先焉天地巳位體斯立焉用既為體體復為用體用相仍此天地萬物所以生化而無窮也流行者其陽乎成性者其隂乎陽者數之生也隂者象之成也陽以三至隂以倍乘生生不窮各以序升自然而然有不容已非智與仁曷究終始言天下之静者存乎正言天下之動者存乎時正者道之常也時者因之綱也是故君子立正以俟時數者所以順性命之理也一為水而腎其徳智也二為火而心其徳禮也三為木而肝其徳仁也四為金而肺其徳義也五為土而脾其徳信也一者九之祖也九者八十一之宗也圓之而天方之而地行之而四時天所以覆物也地所以載物也四時所以成物也散之無外卷之無内體諸造化而不可遺者乎一數之周一嵗之運也九數之重八節之分也一一陽之始也五五隂之萌也三三陽之中也七七隂之中也二二者陽之長四四者陽之壯五則陽極矣六六者隂之長八八者隂之壯九則隂極矣一九首尾為一者一歲首尾於冬至也蓋冬至二而餘則一也一者數之始也九者數之終也一者不變而九者盡變也三五七者變而少者也二四六八者變而偶者也變之偶者不能以及乎竒變之少者不能以該乎物奇偶相參多寡相函其惟九數乎順數則知物之所始逆數則知物之所終數與物非二體也始與終非二致也大而天地小而毫末明而禮樂幽而鬼神知數即知物也知始即知終也數與物無窮其誰始而誰終數始于一參於三究於九成於八十一備於六千五百六十一八十一者數之小成也六千五百六十一者數之大成也天地之變化人事之始終古今之因革莫不於是著焉是故一九而九九九而八十一八十一而七百二十九二九十八十八而百六十二百六十二而一千四百五十八三九二十七二十七而二百四十三二百四十三而二千一百八十七四九三十六三十六而三百二十四三百二十四而二千九百一十六五九四十五四十五而四百有五四百有五而三千六百四十五六九五十四五十四而四百八十六四百八十六而四千三百七十四七九六十三六十三而五百六十七五百六十七而五千一百有三八九七十二七十二而六百四十八六百四十八而五千八百三十二九九八十一八十一而七百二十九七百二十九而六千五百六十一列而次之自一而九自九而一一逆一順一九二八三七四六互相變通五則常中有吉無凶禍亡而福隆君子之所為宫是故一變始之始二變始之中三變始之終四變中之始五變中之中六變中之終七變終之始八變終之中九變終之終數以事立亦以事終酬酢無常與時偕通中者天下之大本乎自一而九自九而一雖厯萬變而五常中焉洛書數九而用十何也十者數之成也數成而五行備也非九不生非十不成九以通之十以節之九以行之十以止之九者變通之機十者五行之叙也方隅對待中五含五而十數已具於九數之中矣以見其體用之不相離而圖書所以相為經緯也九者生數也十者成數也生者方發而未形成者已具而有體未形而有形者變化見也有體而無體者其用藏也是故雨以潤之暘以熯之寒以歛之燠以散之風以動之其生物也不測其成物也不忒生居物先成居物後故能為奇故能為耦天下之數九而究矣十者一之變也百者十之變也千者百之變也萬者千之變也十百千萬皆一也先子曰天數中於五地數中於六天有隂陽故二其五為一十合三與七一與九亦十也地有柔剛故二其六為十二合四與八二與十亦十二也十為干十二為支十干者五行有隂陽也十二支者六氣有柔剛也十干實五行也十二支實六氣也五行六氣實一氣也清濁未判乃天地之所以立上下定位又萬物之所以生故自體言之則對待而不可缺自用言之則徃来而不可窮盖造化之幾微聖人之能事也物有其則數者盡天下之物則也事有其理數者盡天下之事理也得乎數則物之則事之理無不在焉不明乎數不明乎善也不誠乎數不誠乎身也故静則察乎數之常而天下之故無不通動則逹乎數之變而天下之幾無不獲正數者天地之正氣也其吉凶也確間數者天地之間氣也其吉凶也雜其進退消長之道歟數由人興數由人成萬物皆備於我咸自取之也中人以上達於數者也中人以下囿於數者也聖人因理以著數天下因數以明理然則數者聖人所以敎天下後世者也國家将興必有禎祥國家将亡必有妖孽善必先知之不善必先知之因天下之疑定天下之志去惡而就善舍凶而趨吉謁焉而無不告也求焉而無不獲也利民而不費濟世而不窮神化而不測數之用其大矣哉禮儀三百威儀三千皆天道之流行也箕子曰皇建其有極歛時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極凡厥庶民無有淫朋人無有比徳惟皇作極無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直㑹其有極歸其有極上焉者安於數者也其次守焉其下悖焉安焉者謂之聖守焉者謂之賢悖之者愚而已矣是故厯數在躬不思而得不勉而中聖人也體數之常不易其方順時而行賢人也逆數越理亂天之紀小人之無忌憚也義之所當為而不為者非數之所能知也義之所不當為而為者亦非數之所能知也非義不占非疑不占非疑而占謂之侮非義而占謂之欺虚其心和其志平其氣一其聽有不占也而事無不應有不謀也而用無不成誠之至焉神亦至焉是謂動之以天敬者聖學始終之要未知則敬以知之已知則敬以行之不敬則心無管攝顛倒眩瞀安能有所知有所行乎義利不可不明也不明則以利為義心雖公亦私耳天下正理若大路然一而已旁蹊曲徑皆私意也故曰遵王之道無有黨偏偏陂反側云命之流行而不已者道也道於天其陽乎道於地其隂乎道於人其仁義乎人者兼天地而參之者也是故天覆地承非聖人不形天施地生非聖人不成天神地靈非聖人而誰為貞父子有親君臣有義夫婦有别長幼有序朋友有信五品遜而大和合皇極之世也堯舜父子之衰也湯武君臣之缺也伏羲神農日之中乎堯舜三代時之中乎五行在天則為五氣雨𤾉燠寒風也在地則為五質水火木金土也天之五氣雨𤾉質也地之五質水火氣也天交於地而雨𤾉為質地交於天而水火為氣二變而三不變者二得隂陽之正而三得隂陽之雜也故二能變而三不能變也五行二氣之分也二氣交感絪緼雜揉開闔動盪相生則水木火土金相克則水火金木土出明入幽千變萬化四時之運生克著焉自隂而陽也順自陽而隂也逆木之盛也水實生之金之成也火實制之水之潤下火之炎上木之曲直其徳以順而成金之從革其徳因制而成自然之理也順而生者易知逆而克者難見曰伏焉厯書曰庚伏曰伐焉律書曰罰伐土居其中因時致旺四序成功而無名稱焉其至徳矣夫月令増置土行雖曰中央土然繫於夏月之後是以土生於火矣三季皆一行而夏之三月獨二行也近代以一朞之日而五分之行各七十有二日以辰戌丑未為上寄旺之月之方似矣然猶未免刻舟之固是豈足語造化之微也哉善養生者以氣而理形以理而理氣理順則氣和氣和則形和形和則天地萬物無不和矣不善養生者反是理昏於氣氣梏於形耳目口鼻徇而私慾勝好惡哀樂淫而天理亡其能茍生者禽歟而已矣耳目口鼻手足之用皆五也或曰支指五矣耳目口鼻何有焉曰耳聽五聲目辨五色口甞五味鼻别五臭不具於此何有於彼手足以形用耳目口鼻以神用形用者易知而神用者難識也原者氣之始也冲者形之始也中者治之極也用者物之窒也終者事之畢也原者仁之先也用者義之端也公者禮之閑也戎者智之刓也中者信之完也原者近乎中也伏者逺乎中也近者進而逺者退也近者息而逺者消也原始反終故知死生之説也原元吉㡬君子有終數曰原誠之源也㡬繼而善也君子見㡬有終吉也潛勿用有攸往正静吉數曰潛藏也勿用有攸往陽微也正静吉正而静所以吉也君子藏器於身待時而動故無不利也原之一一曰君子見幾不俟終日數曰知至至之可與幾也中之五五曰㑹其有極歸其有極數曰各正性命合太和也終之九九曰君子令終萬福攸降數曰知終終之可與存義也原之一一者繼之善也原之九九者逆而凶也當時者盛夫時者窮也厥相休囚以類従也君子時之為貴時止時行時晦時明萬夫之望數終而復乎一其生生而不窮者也隂之終陽之始也夜之終晝之始也嵗之終春之始也萬物之終萬物之始也是故入乎幽者所以出乎明極乎静者所以根乎動前天地之終其後天地之始乎一者以乘數終而言九九八十一也八十一其八十一而六千五百六十一也六千五百六十一其六千五百六十一而四千三百四萬六千七百二二十一也餘倣此一者數之原也九者數之究也十者行之隂陽也十二者氣之柔剛也原其所始究其所終隂陽柔剛分合錯綜粲然於天地之間矣洪範皇極内篇下溟漠之間兆眹之先數之原也有儀有象判一而兩數之分也日月星辰垂於上山嶽川澤奠于下數之著也四時迭運而不窮五氣以序而流通風雷不測雨露之澤萬物形色數之化也聖人繼世經天緯地立兹人極稱物平施父子以親君臣以義夫婦以别長幼以序朋友以信數之教也分天為九野中央曰鈞天其星曰北極上規七十二度東方曰蒼天其星亢氐房心尾東北曰旻天其星箕斗北方曰𤣥天其星牛女虚危室西北曰幽天其星壁奎婁西方曰昊天其星胃􅄧畢西南曰朱天其星觜參井南方曰炎天其星鬼栁星張翼東南曰陽天其星翼軫角皆四十有五度半彊别地為九州東南曰揚州其山鎮曰㑹稽其澤藪曰具區其川三江其浸五湖其利金錫竹箭其民二男五女其畜宜鳥獸其榖宜稻正南曰荆州其山鎮曰衡山其澤藪曰雲夢其川江漢其浸潁湛其利丹銀齒革其民一男二女其畜宜鳥獸其榖宜稻河南曰豫州其山鎮曰嶽山其澤藪曰圃田其川滎雒其浸波溠其利林漆絲枲其民二男三女其畜宜六擾其榖宜五種正東曰青州其山鎮曰沂山其澤藪曰望諸其川淮泗其浸沂沐其利蒲魚其民二男二女其畜宜雞狗其穀宜稻麥河東曰兖州其山鎮曰岱山其澤藪曰大野其川河泲其浸盧維其利蒲魚其民二男三女其蓄宜六擾其穀宜四種正西曰雍州其山鎮曰華山其澤藪曰弦蒲其川涇汭其利玉石其民三男二女其畜宜牛馬其榖宜􅁰稷東北方曰幽州其山鎮曰醫無閭其澤藪曰貕飬其川河泲其浸菑時其利魚鹽其民一男三女其畜宜四擾其穀宜三種河内曰冀州其山鎮曰霍山其澤藪曰楊紆其川漳其浸汾潞其利松栢其民五男三女其畜宜牛羊其榖宜黍稷正北曰并州其山鎮曰恒山其澤藪曰昭餘祁其川滹沱嘔夷其浸淶易其利布帛其民三男二女其畜宜五擾其榖宜五種制人為九行臯陶謨曰亦行有九徳亦言其人有徳寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而㢘剛而塞強而義彰厥有常吉哉日宣三徳夙夜浚明有家曰嚴祇敬六徳亮采有邦翕受敷施九徳咸事九品任官正一品從正二品從正三品從正四品從正五品從正六品從正七品從正八品從正九品從從並同外官各降一等内外文武官自一品以下並給職田京官諸司及郡縣又給公廨田並有差九井均田經土地而并牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡税歛之事九族睦俗九族髙祖至𤣥孫之親舉近以該逺五服之外異姓之親亦在其中也九禮辨分冠昏喪祭朝宗軍賔學九變成樂凡樂圜鐘為宫黄鐘為角大簇為徴姑洗為羽靁鼔靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂八變天神皆䧏可得而禮矣凡樂函鐘為宫大簇為角姑洗為徴南宫為羽靈鼓靈鼗絲竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黄鐘為宫大吕為角大簇為徴應鐘為羽路鼔路鼗隂竹之管龍門之琴瑟九徳之歌九磬之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣八陣制兵八陣四為正四為竒餘奇為握竒或總稱之先出遊軍定兩端天有衡地有軸前後有衝風附於天雲附於地衡有重列各四隊前後之衝各二隊風居四維故有圓軸有單列各三隊前後之衝各三隊雲居四角故有方天居兩端地居中間總為八陣陣訖逰軍從後躡敵或驚其左或驚其右聽音望麾以出四竒天地之前衝為虎翼風為蛇蟠圍繞之義也虎居於中張翼以進蛇居兩端向敵而蟠以應之天地之後衝為飛龍雲為鳥翔突擊之義也龍居於中張翼以進鳥掖兩端向敵而翔以應之虚實二壘皆逐天文氣候山川向背利害隨時而行以正合以奇勝黄帝立井田之法因以制兵以八為法八八六十四而軍制備矣用八而不用九所以藏其用也九刑禁姦九刑曰大辟曰宫曰剕曰劓曰墨曰流曰鞭曰扑曰贖九寸為律黄鐘長九寸空圍九分積八百一十分子一丑三寅九卯二十七辰八十一巳二百四十三午七百二十九未二千一百八十七申六千五百六十一酉一萬九千六百八十三戌五萬九千四十九亥一十七萬七千一百四十七蓋黄鐘九寸以三分為損益故以三厯十二辰得一十七萬七千一百四十七為鐘之實其十二辰所得之數在子寅辰午申戌六陽辰為黄鐘寸分釐毫絲之數在亥酉未巳卯丑六隂辰為黄鐘寸分釐毫絲之法其寸分釐毫絲之法皆用九數九分造厯以律起厯故統元日法八十一盖元始黄初九自乘一龠之數得日法九筮稽疑一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶九章命算一曰方田以御田疇界域二曰粟米以御交質變易三曰衰分以御貴賤禀稅四曰少廣以御積羃方圓五曰商功以御功程積實六曰均輸以御逺近勞費七曰盈朏以御隠雜互見八曰方程以御錯正負九曰勾股以御髙深廣逺九職任萬民一曰三農生九榖二曰園圃毓草木三曰虞衡作山澤之材四曰藪牧飬蕃鳥獸五曰百工飭化八材六曰商賈阜通貨賄七曰嬪婦化治絲枲八曰臣妾聚斂䟽材九曰間民無常職轉移執事九賦斂財賄一曰邦中之賦二曰四郊之賦三曰邦甸之賦四曰家削之賦五曰邦縣之賦六曰邦都之賦七曰關市之賦八曰山澤之賦九曰幣餘之賦九式節財用一曰祭祀之式二曰賔客之式三曰喪荒之式四曰羞服之式五曰工事之式六曰幣帛之式七曰芻秣之式八曰匪頒之式九曰好用之式九府立圜法太府王府内府外府京府天府職内職金職幣圜者謂均而通也九服辨邦國王畿之外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰藩服九命位邦國一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯九儀命邦國上公之禮執桓圭九寸繅藉九寸冕服九章建常九斿樊纓九就貳車九乘介九人禮九牢其朝位賔主之間九十步立當車軹擯者五人廟中将幣三享王禮再祼而酢享禮九獻食禮九舉出入五積三問三勞諸侯之禮執信圭七寸繅藉七寸冕服七章建常七斿樊纓七就貳車七乘介七人禮七牢朝位賔主之間七十歩立當前疾擯者四人廟中将幣三享王禮一祼而酢享禮七獻食禮七舉出入四積再問再勞諸伯執躬圭其他皆如諸侯之禮諸子執榖璧五寸繅藉五寸冕服五章建常五斿樊纓五就貳車五乘介五人禮五牢朝位賔主之間五十歩立當車衡擯者三人廟中将幣三享王禮一祼不酢享禮五獻食禮五舉出入二積一問一勞諸男執蒲璧其他皆如諸子之禮九法平邦國制畿封國以正邦國設儀辨位以等邦國進賢興功以作邦國建牧立監以維邦國制軍詰禁以糾邦國施貢分職以任邦國簡稽鄉民以用邦國均守平則以安邦國比小事大以和邦國九伐正邦國馮弱犯寡則𤯝之賊賢害民則伐之暴内陵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之外内亂禽獸行則滅之九貢致邦國之用一曰祀貢二曰嬪貢三曰器貢四曰幣貢五曰財貢六曰貨貢七曰服貢八曰斿貢九曰物貢九兩繫邦國之民一曰牧以地得民二曰長以貴得民三曰師以賢得民四曰儒以道得民五曰宗以族得民六曰主以吏得民七曰吏以治得民八曰友以任得民九曰藪以富得民營國九里制城九雉九階九室九經九緯匠人營國方九里旁三門國中九經九緯經塗九軌左祖右社面朝後市市朝一夫夏后氏世室堂脩二七廣四脩一五室三四歩四三尺九階四旁兩夾窻白盛門堂三之二室三之一殷人重屋堂脩七尋堂崇三尺四阿重屋周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵室中度以几堂中度以筵宫中度以尋野度以歩涂度以軌廟門容火扄七个闈門容小扄三个路門不容乘車之五个應門二徹三个内有九室九嬪居之外有九室九卿朝焉九分其國以為九分九卿治之正宫門阿之制五雉宫隅之制七雉城隅之制九雉經涂九軌環涂七軌野涂五軌門阿之制以為都城之制宫隅之制以為諸侯之城制環涂以為諸侯經涂野涂以為都經涂數之度也孔子曰為天下國家有九經曰脩身也尊賢也親親也敬大臣也體羣臣也子庶民也来百工也柔逺人也懷諸侯也脩身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體羣臣則士之報禮重子庶民則百姓勸来百工財財用足柔逺人則四方歸之懐諸侯則天下畏之齊明盛服非禮不動所以脩身也去讒逺色賤貨而貴徳所以勸賢也尊其位重其祿同其好惡所以勸親親也官盛任使所以勸大臣也忠信重禄所以勸士也時使薄斂所以勸百姓也日省月試既廪稱事所以勸百工也送往迎来嘉善而矜不能所以柔逺人也繼絶世舉廢國治亂持危朝聘以時厚徃而薄来所以懐諸侯也凡為天下國家有九經所以行之者一也昔黄帝使伶倫自大夏之西昆侖之隂取竹之解谷生其竅厚均者㫁兩節吹之以為黄鐘之宫制十二筩以聽鳯之鳴其雄鳴為六雌鳴亦六比黄鐘之宫而皆可以生之是為律本度其長以子榖秬黍中者九十枚度之一為一分十分為寸十寸為尺十尺為文十文為引審其容以千二百黍實之合龠為合十合為升十升為斗十斗為斛權其重百黍為一銖千二百黍為十二銖二十四銖為兩十六兩為斤三十斤為鈞四鈞為石書曰同律度量衡𫝊曰黄鐘為萬事根本也昔者聖人之原數也以決天下之疑以成天下之務以順性命之理析事辨物彰往察来是故天數五地數六五六者天地之中和也五為五行六為六氣陽性隂質五行之性曰木曰火曰土曰金曰水六氣之質曰胎曰生曰壯曰老曰死曰化木之質也曰楊栁曰梅李曰松栢曰竹葦曰禾麥曰蕈火之質也曰木火曰石火曰雷火曰水火曰蟲火曰粼土之質也曰砂曰石曰玉曰土曰壤曰泥金之質也曰汞曰銀曰金曰銅曰鐵曰鉛水之質也曰澗水曰井水曰雨水曰溝渠曰陂澤曰湖海木之物也曰鯪鯉曰蛇曰龍曰鯉魴曰小魚曰鰍火之物也曰雞曰雉曰鳳曰鷹隼曰燕雀曰蠛蠓土之物也曰蟾蜍曰蠶曰人曰蜘蛛曰蚓曰鰻金之物也曰鹿曰馬曰麟曰虎曰獺曰毛蟲水之物也曰蠏曰黌曰龜曰蝦曰蚌曰蠣木之器也曰䟽器門窻曰琴瑟曰規曰筭篩曰耒耜曰網罟火之器也曰登器梯棚曰文書曰繩曰冠冕曰臺棹曰履蹋土之器也曰腹器筐筥曰圭璧曰量曰舟車曰盤盂曰棺槨金之器也曰方器斧鉞曰印節曰矩曰弓矢曰簡冊曰械校水之器也曰平器權衡曰輪磨曰準曰鏡匳曰研椎曰厠圂逆順者事之幾也吉凶者事之著也順而吉者木為徴召為科名為赦恩為婚姻為産孕為財帛火為燕集為朝覲為文書為言語為歌舞為燈燭土為工役為循常為盟約為田宅為福夀為墳墓金為賜予為按察為更革為軍旅為錢貨為刑法水為交易為遷移為征行為酒食為田獵為祭祀逆而凶者木為􅑾杌為驚憂為醜惡為壓墜為夭折為産死火為公訟為顛狂為口舌為炙灸為災焚為震燬土為反覆為欺詐為離散為貧窮為疾病為死亡金為征役為罷免為責降為争闘為傷損為殺戮水為盗賊為囚獄為徒流為淫亂為呪咀為浸溺筮者神之所為乎其蓍五十虚一分二掛一以三揲之左右手歸餘於扐兩竒為一初揲三一再揲三三兩偶為二初揲二二再揲四二奇偶為三初揲四三再揲二一初揲綱也再揲目也綱一函三以虚待目目一為一以實從綱兩揲而九數具八操而六千五百六十一之數備矣分合變化如環無端天命人事由是較焉吉凶禍福由是彰焉大人得之而申福小人得之而避禍君子曰筮者神之所為乎大事用年其次用月其次用日其次用時十二木徑九分厚一分陽刻一隂刻二者四陽刻二隂刻三者四陽刻三陽刻一者四雜取其八自上而下自左而右縦二横四縦者九也横者一十百千也餘四不用者不用之用也前後相乘而數備矣數者理之時也辭者數之義也吉凶者辭之㫁也恵迪從逆者吉凶之決也氣有醇漓故數有失得一成于數天地不能易之能易之者人也一吉而九凶三祥而七災八休而二咎四吝而六悔八數周流推類而求五中則平四害不親厥或是攖雜而不純承平之世視主廢置凶咎災吝有命不摯性理大全書卷二十四

body:
  text: 性理大全書卷三十七性理九仁義禮智信程子曰仁者公也人此者也義者宜也權量輕重之極也禮者别也智者知也信者有此者也萬物皆有性此五常性也仁義禮智信於性上要言此五事湏要分别出仁則固一一所以為仁惻隐則屬愛乃情也非性也恕者入仁之門而恕非仁也因其惻隠之心知其有仁惟四者有端而信無端只有不信更無信如東西南北已有定體更不用信若以東為西以南為北則有不可信如東即東西即西則無信仁載此四事由行而宜之謂義履此之謂禮知此之謂智誠此之謂信仁義禮智信五者性也仁者全體四者四支仁體也義宜也禮别也智知也信實也凡有血氣之類皆具五常但不知充而已矣張子曰仁不得義則不行不得禮則不立不得智則不知不得信則不能守此致一之道也朱子曰在天只是陰陽五行在人得之只是剛柔五常之徳或問仁義禮智性之四徳又添箇信字謂之五性如何曰信是誠實此四者實有是仁實有是義禮智皆然如五行之有土非土不足以載四者仁只是一箇渾然天理義字如一横劍一利刃相似凡事物到前便兩分去胷中許多勞勞攘攘到此一齊割斷了君子義以為質義以為上義不食也義弗乘也精義入神以致用也此是義十分精熟用便見也禮者節文也智主含蔵分别有知覺無運用信是義理之全體本質不可得而分析者故明道言四端不言信得此生意以有生然後有禮智義信以先後言之則仁為先以大小言之則仁為大問䝉喻仁意思云義禮智信上著不得又湏見義禮智上上少不得方見得仁統五常之意今以樹為喻夫樹之根固有生氣然貫徹首尾豈可謂榦與枝花與葉無生氣也曰固然只如四時春為仁有箇生意在夏則見其有箇亨通意在秋則見其有箇成實意在冬則見其有箇貞固意在夏秋冬生意何嘗息本雖凋零生意則常存大抵天地間只一理隨其到處分許多名字出來四者於五行各有配惟信配土以見仁義禮智實有此理不是虚説又如乾四徳元最重其次貞亦重以明始終之義非元則無以生非貞則無以終非終則無以為始不始則不能成終矣如此循環無窮也或問人之所以為性者五而獨舉仁義何也曰天地之所以生物者不過乎陰陽五行而五行實一陰陽也故人之所以為性者雖有仁義禮智信之殊然其曰仁義則其大端已舉矣葢以陰陽五行而言則木火皆陽金水皆陰而土無不在以性而言則禮者仁之餘知者義之歸而信亦無不在也人禀五行之秀以生故木神曰仁則愛之理也而其發為惻隠火神曰禮則敬之理也而其發為恭遜金神曰義則宜之理也而其發為羞惡水神曰智則别之理也而其發為是非土神曰信則實有之理也而其發為忠信是皆天理之固然人心之所以為妙也答袁機仲曰所論仁義禮智分屬五行四時葢天地之間一氣而已分陰分陽便是兩物故陽為仁而陰為義然陰陽又各分而為二故陽之初為木為春為仁陽之盛為火為夏為禮陰之初為金為秋為義陰之極為水為冬為智葢仁之惻隠方自中出而禮之恭敬則已盡發於外義之羞惡方自外入而智之是非則已全伏於中故其象類如此非是假合附㑹若能黙㑹於心便自可見元亨利貞其理亦然五行之中四者既各有所屬而土居中宫為四行之地四時之主在人則為信為真實之義而為四徳之地衆善之主也五聲五色五臭五味五蔵五蟲其分倣此葢天人一物内外一理一通貫徹初無間隔若不見得則雖生於天地間而不知所以為天地之理雖有人之形貌而亦不知其所以為人之理矣程珙問論語多是説仁孟子却兼説仁義意者夫子説元氣孟子説陰陽仁恐是體義恐是用先生嘗曰孔孟之言有同有異固所當講然今且當理㑹何者為仁何者為義如何説箇仁義二字底道理大凡天之生物各付一性性非有物只是一箇道理之在我者耳故性之所以為體只是仁義禮智信五字天下道理不出於此韓文公云人之所以為性者五其説最為得之却為後世之言性者多雜所以將性字作知覺心意看了非聖賢所説性字本指也五者之中所謂信者是箇真實無妄底道理如仁義禮智皆真實而無妄者也故信字更不湏説只仁義禮智四字於中各有分别不可不辯葢仁則是箇温和慈愛底道理義則是箇斷制裁割底道理禮則是箇恭敬撙節底道理智則是箇分别是非底道理凡此四者具於人心是乃性之本體方其未發漠然無形象之可見及其發而為用則仁者為惻𨼆義者為羞惡禮者為恭敬智者為是非隨事發見各有苗脈不相殽亂所謂情也故孟子曰惻隠之心仁之端也羞惡之心義之端也恭敬之心禮之端也是非之心智之端也謂之端者猶有物在中而不可見必因其端緒發見於外然後可得而尋也葢一心之中仁義禮智各有界限而其性情體用又自各有分别湏是見得分明然後就此四者之中又自見得仁義兩字是箇大界限如天地造化四序流行而其實不過於一陰一陽而已於此見得分明然後就此又自見得仁字是箇生底意思通貫周流於四者之中仁固仁之本體也義則仁之斷制也禮則仁之節文也智則仁之分别也正如春之生氣貫徹四時春則生之生也夏則生之長也秋則生之收也冬則生之蔵也故程子謂四徳之元猶五常之仁偏言則一事專言則包四者正謂此也孔子只言仁以其専言者言之也故但言仁而仁義禮智皆在其中孟子兼言義以其偏言者言之也然亦不是於孔子所言之外添入一箇義字但於一理之中分别出來耳其又兼言禮智亦是如此葢禮又是仁之著智又是義之蔵而仁之一字未嘗不流行乎四者之中也若論體用亦有兩説葢以仁存於心而義形於外言之則曰仁人心也義人路也而以仁義相為體用若以仁對惻隠義對羞惡而言則就其一理之中又以未發已發相為體用若認得熟看得透則玲瓏穿穴縱横顚倒無處不通而日用之間行著習察無不是著工夫處矣曰孔門方説仁字則是列聖相傳到此方漸次説親切處爾夫子所以賢於堯舜於此亦可見其一端也或問仁義禮智信有本耶曰亦孝弟而已矣但以愛親而言則為仁之本也其順乎親則為義之本也敬乎親則為禮之本也其知此者則為智之本其誠此者則為信之本也葢人之所以為五常百行之本無不在此孟子之論仁義禮智樂之實者正為是爾此其所以為至徳要道也歟北溪陳氏曰仁者心之全徳兼統四者義禮智信無仁不得葢仁是心中箇生理常流行生生不息徹終始無間斷茍無這生理則心便死了其待人接賔恭敬何自而發必無所謂禮處事之際必不解裁制而無所謂義其於是非也亦頑然無所知覺而無所謂智既無是四者又烏有所謂實理哉就事物言父子有親便是仁君臣有義便是義夫婦有别便是禮長㓜有序便是智朋友有信便是信此是竪觀底意若横而觀之以仁言則所謂親義别序信皆莫非此心天理流行又是仁以義言則只那合當親合當義合當别合當序合當信底皆各當乎理之宜又是義以禮言則所以行乎親義别序信中之節文又是禮以智言則所以知是五者當然而不昩又是智以信言則所以實是五者誠然而不妄又是信若又錯而言之親親仁也所以愛親之誠則仁之仁也所以誎乎親則仁之義也所以温凊定省之節文則仁之禮也自良知無不知是愛則仁之智也所以為事親之實則仁之信也從兄義也所以愛兄之誠則義之仁也所以常敬在兄則義之義也所以徐行後長之節文則義之禮也自良知無不知是敬則義之智也所以為從兄之實則義之信也敬賔禮也所以懇惻於中則禮之仁也所以接待之宜則禮之義也所以周旋之節文則禮之禮也所以酬酢而不亂則禮之智也所以為敬賔之實則禮之信也察物智也是是非非之懇惻則智之仁也是是非非之得宜則智之義也是是非非之中節則智之禮也是是非非之一定則智之智也所以為是非之實則智之信也復言信也由乎天理之公則信之仁也發而皆天理之宜則信之義也出而中節則信之禮也所以有條而不紊則信之智也所以為是言之實則信之信也仁義禮智信五者謂之五常亦謂之五性就造化上推原來只是五行之徳仁在五行為木之神在人性為仁義在五行為金之神在人性為義禮在五行為火之神在人性為禮智在五行為水之神在人性為智人性中只有仁義禮智四位却無信位如五行木位東金位西火位南水位北而土無定位只寄處於四位之中木屬春火屬夏金屬秋水屬冬土無專氣只分寄旺於四季之間四行無土便都無所該載猶仁義禮智無信便都不實了只仁義禮智之實理便是信信却易曉仁義禮智湏逐件看得分明乂要合聚看得脈絡都不亂四者端緒日用間常常發見只是人看理不明故茫然不知得且如一事到面前便自有箇是有箇非湏是知得此便是智若是也不知非也不知便是心中頑愚無知覺了既知得是非已明便湏判斷只當如此做不當如彼做有可否從違便是義若要做此又不能割捨得彼只管半間不界便是心中頑鈍而無義既斷定了只如此做便看此事如何是太過如何是不及做得正中恰好有箇節文無過無不及此便是禮做事既得中更無些子私意夾雜其間便都純是天理流行此便是仁事做成了從頭至尾皆此心真實所為便是信此是從下説上去若從上説下來且如與箇賔客相接初問纔聞之便自有箇懇惻之心怛然動於中是仁此心既怛然動於中便肅然起敬去接見他是禮既接見畢便湏合作如何待輕重厚薄處之合宜便是義或輕或重或厚或薄明白一定是智從首至末皆真實是信此道理循環無端若見得熟則大用小用皆宜横説䜿説皆通程子論心譬如榖種生之性便是仁此一語説得極親切只按此為凖去看更兼所謂仁是性愛是情及仁不可訓覺與公而以人體之故為仁等數語相叅照體認出來則主意不差而仁可得矣義就心上論則是心之裁制决斷處宜字乃裁斷後事裁斷當理然後得宜凡事到面前便湏有剖判是可是否文公謂義之在心如利刃然物來觸之便成兩片若可否都不能剖判便是此心頑鈍無義了且如有一人來邀我同出去便湏能剖判當出不當出若要出又不要出於中遲疑不能决斷更何義之有此等處湏是自㸔得破如韓文公以行而宜之之謂義則是就外面説成義外去了禮者天理之節文而人事之儀則朱子以此兩句對言之何也蓋天理只是人事中之理而具於心者也天理在中而著見於事人事在外而根於中天理其體而人事其用也儀謂容儀而形見於外者有粲然可象底意與文字相應則謂法則凖則是箇骨子所以存於中者乃確然不易底意與節字相應文而後儀節而後則必有天理之節文而後人人事之儀則禮者心之敬而天理之節文也心中有箇敬油然自生便是禮見於應接便自有箇節文節則無太過文則無不及如做事太質無文彩是失之不及末節繁文太盛是流於太過天理之節文乃其恰好處便是理合當如此更無太過更無不及當然而然便即是中智只是心中一箇知覺處知得是是非非恁地確定是智孟子謂知斯二者弗去是也知是知識弗去便是確定不易之意信在性只是四者都實底道理及發出來便為忠信之信由内面有此信故發出來方有忠信之信忠信只是一物而判作二者便是信之端緒是就外面應接事物發原處説魯齊許氏曰五常性也天命之性性分中之所固有君臣父子夫婦長㓜朋友所行之道也率性之道職分之所當然誠程子曰無妄之謂誠不欺其次也一本云李邦直云不欺之謂誠便以不欺為誠徐仲車云不息之謂誠中庸言至誠無息非以無息解誠也或以問先生先生遂云然勤以天為無妄動以人欲則妄矣無妄者至誠也至誠者天之道也信不足以盡誠猶愛不足以盡仁閑邪則誠自存不是外面捉一箇誠將來存著不誠則有累誠則無累誠則無不敬未至於誠則敬然後誠主一者謂之敬一者謂之誠誠之為言實而已矣張子曰誠則實也太虚者天之實也萬物取足於太虚人亦出於太虚太虚者心之實也誠者虚中求出實藍田吕氏曰誠者理之實然一而不可易者也實理不二則其體無雜其體不雜則其行無間故至誠無息上蔡謝氏曰誠是實理非專一也朱子曰誠者實有此理誠實理也亦誠慤也由漢以來専以誠慤言誠至程子乃以實理言後學皆棄誠慤之説不觀中庸亦有言實理為誠處亦有言誠慤為誠處不可只以實為誠而以誠慤為非誠也問無妄之謂誠不欺其次也曰非無妄故能誠無妄便是誠無妄是四方八面都去得不欺猶是兩箇物事相對無妄是兼天地萬物所同得底渾淪道理不欺是就一邉人身説問無妄誠之道不欺則所以求誠否曰無妄者聖人也謂聖人為無妄則可謂聖人為不欺則不可又問此正所謂誠者天之道思誠者人之道否曰然無妄是自然之誠不欺是著力去做底無妄自是我無妄故誠不欺者對物而言之故次之上蔡云誠是實理不是専説是理後人便只於理上説不於心上説未是問誠與信如何分曰誠是箇自然之實信是箇人所為之實中庸説誠者天之道也便是誠若誠之者人之道也便是信上是下不是誠是自然底實信是人做底實故曰誠者天之道這是聖人之信若衆人之信只可喚做信故信未可喚做誠誠是自然無妄之謂如水只是水火只是火仁徹底是仁義徹底是義誠者實有之理自然如此忠信以人言之湏是人體出來方見得誠字以心之全體而言忠字以其應事接物而言此義理之本名也至曾子所言忠恕則是聖人之事故其忠與誠仁與恕得通言之問性誠曰性是實誠是虚性是理底名誠是好處的名性譬如這扇子誠譬則這扇子做得好又曰五峯云誠者命之道乎中者性之道乎仁者心之道乎此語分得輕重虚實處却好某以為道字不若改做徳字更親切問誠是體仁是用否曰理一也以其實有故謂之誠以其體言則有仁義理智之實以其用言則有惻隠羞惡恭敬是非之實故曰五常百行非誠非也葢無其實矣又安得有是名乎問一心之謂誠盡心之謂忠其分如何又謂忠天道也其與盡心之義同否曰一心之謂誠專以體言盡心之謂忠是當體之用忠天道也對恕推己而言正指盡心之義誠字在道則為實有之理在人則為實然之心而其維持主宰全在敬字今但實然用力於敬則日用工夫自然有總㑹處而道體之中名實異同先後本末皆不相礙若不以敬為事而徒曰誠則所謂誠者不知其將何所錯且五常百行無非可願雜然心目之間又将何所擇而可乎問誠敬二字如何看輔廣云先敬然後誠曰且莫理㑹先後敬是如何誠是如何廣曰敬是把捉工夫誠則到自然處曰敬也有把捉時也有自然時誠也有勉為誠時亦有自然誠時且説此二字義敬只是箇收歛畏懼不縱放誠只是箇朴直慤實不欺誑初時湏著如此不縱放不欺誑到得工夫到時則自然不縱放不欺誑矣誠是不欺妄底意思敬是不放肆底意思妄誕欺詐為不誠怠惰放肆為不敬此誠敬之别勉齋黄氏曰無妄之謂誠不欺其次矣無妄便是誠者天之道不欺便是誠之者人之道誠字也隨人看如説誠自不妄語入不妄語只是不欺裏面一路未及躬行底話假如天下雷行物與無妄天地這一副當道理與你都恁實剥剥地仁便實是仁義便實是義更無一㸃虚乂如周天三百六十五度循環不已曷嘗有些子挫過今年冬至一陽來復明年冬至亦一陽來復這是真實無妄人體這實理便莫以欺偽存心所為不欺是外面為事裏面湏實是如此纔有七分為善更有兩三分為不善底意便是不實如顔子三月不違仁是三月間無不實三月之後未免有之即是有些不實便屏去了北溪陳氏曰誠字後世都説差了到伊川方云無妄之謂誠字義始明至晦翁又增兩字曰真實無妄之謂誠道理分曉易明後世説至誠兩字動不動輒加諸人只成箇謙恭敬謹底意思不知誠者真實無妄之謂至誠乃是真實極至而無一毫之不盡惟聖人可以當之如何可容易以加諸人誠字本就天道論維天之命於穆不已只是一箇誠天道流行自古及今無一毫之妄暑往則寒來日往則月來春生了便夏長秋殺了便冬蔵元亨利貞終始循環萬古常如此皆是真實道理為之主宰如天行一日一夜一周而又過一度與日月星辰之運行躔度萬古不差皆是誠實道理如此又就果木觀之甜者萬古甜苦者萬古苦靑者萬古常青白者萬古常白紅者萬古常紅紫者萬古常紫圓者萬古常圓缺者萬古常缺一花一葉文縷相等對萬古常然無一毫差錯便待人力十分安排撰造來終不相似都是真實道理自然而然此中庸所以謂其為物不貳其生物不測而五峯亦曰誠者命之道乎皆形容得親切就人論則只是這實理流行付與於人自然發見出來底未説到做工夫處且誠之一字不成受生之初便具這理到賦形之後未死之前這道理便無了在吾身日用常常流行發見但人之不察耳如孩提之童無不知愛親敬兄都是這實理發見出來乃良知良能不待安排又如乍見孺子將入井便有怵惕之心至行道乞人饑餓瀕死而蹴爾嗟來等食乃不屑就此皆是降𠂻秉彞真實道理自然發見出來雖極惡之人物慾昏蔽之甚及其稍息則良心之實自然發見終有不可殄滅者此皆天理自然流行真實處雖曰見於在人而亦天之道也及就人做工夫處論則又是慤實不欺之理是乃人事之當然此人之道也故存心全體慤實固誠也若一言之實亦誠也一行之實亦誠也誠與信相對論則誠是自然信是用力誠是理信是心誠是天道信是人道誠是以命言信是以性言誠是以道言信是以徳言西山真氏曰唐虞之時未有誠字舜典所謂允塞即誠之義也至伊尹告太甲乃曰鬼神無常享享于克誠誠字始見於此臨川呉氏曰誠者中之實也純乎天理之實為誠徇人欲則妄矣忠信程子曰盡己無歉為忠體物無違為信表裏之義也盡己為忠盡物為信極言之盡己者盡己之性也盡物者盡物之性也信者無偽而已於天性有所損益則為偽矣易無妄曰天下雷行物與無妄動以天理故也忠信者以人言之要之則實理也朱子曰盡己之謂忠盡物之謂信只是一理但忠是盡己信却是於人無所不盡猶曰忠信内外也忠自裏靣發出信是就事上説忠是要盡自家這箇心信是要盡自家這箇道理信者忠之驗忠只是盡己因見於事而為信又見得忠如此忠信只是一事但自我而觀謂之忠自彼而觀謂之信此程子所以有盡己為忠盡物為信之論也忠信只是一理自中心發出來便是忠著實便是信謂與人説話時説到底見得恁地了若説一半不肯盡説便是不忠有這事説這事無這事便説無便是信只是一箇理自其發於心謂之忠驗於事謂之信問發己自盡為忠循物無違為信所謂發己莫是奮發自揚之意否循物無違未曉其義曰發己自盡但謂凡出於己者必自竭盡而不使其有茍簡不盡之意耳非奮發之謂也循物無違謂言語之發循其物之真實而無所背戾如大則言大小則言小言循於物而無所違耳問明道云發己自盡為忠循物無違為信表裏之謂也又曰盡己之謂忠以實之謂信忠信内外也葢因其理之有定當其可而無違是之謂忠信忠信本無二致自其發於内而言之之謂忠自其因物應之之謂信故曰表裏之謂也明道以此釋曾子之言曰為人謀而不忠與朋友交而不信為人謀則謀在我是亦發於中之意與朋友交則朋友在外是亦遇事而應之之意明道論忠信内外大槩如此否南軒張氏曰盡於己為忠形於物為信忠信可以内外言亦可以體用言也要之形於物者即其盡於己者也玩程子之辭意義葢包涵矣北溪陳氏曰忠信二字從古未有人解得分曉諸家説忠都只以事君不欺而言夫忠固能不欺而以不欺名忠則不可如此則忠之一字只事君方使得説信又只以不疑而言信固能不疑而以不疑解信則不可如此則所謂不疑者不疑何事説字骨不出直至程子曰盡已之謂忠以實之謂信方説得確定盡己是盡自家心裏面以所存主者而言湏是無一毫不盡方是忠如十分底話只説得七八分猶留兩三分便是不盡不得謂之忠以實是就言上説有話只據此實物説無便曰無有便曰有若以無為有以有為無便是不以實不得為之信忠信非判然二物從内面發出無一不盡是忠發出外來皆以實是信明道發得又明暢曰發已自盡為忠循物無違為信從己心中發出無一不盡是忠循物之實而言無些子違背他如是便曰是不與是底相背非便曰非不與非底相背便是信伊川説得簡要確實明道説得發越條暢信有就言上説是發言之實有就事上説是做事之實有以實理言有以實心言忠信兩字近誠字忠信只是實誠也只是實但誠是自然實的忠信是做工夫實底誠是就本然天賦真實道理上立字忠信是就人做工夫上立字問忠信之信與五常之信如何分别曰五常之信以心之實理而言忠信之信以言之實理而言湏是逐一㸔得透徹古人言語有就忠信之信言者有就五常之信言者不可執一看若泥著則不通聖人分上忠信便只是誠是天道賢人分上忠信只是思誠是人道誠與忠信對則誠天道忠信人道忠與信對則忠天道信人道孔子云主忠信主與賔相對賔是外人出入無常主人是吾家之主常在這屋裏以忠信為吾心之主是心中常要忠信葢無時而不在是也心中所主者忠信則其中許多道理便都實在這裏若無忠信則一切道理都虚了主字下得極有力忠信等字骨看得透則無往而不通如事君之忠亦只是盡己之心以事君為人謀之忠亦只是盡己之心以為人謀耳忠信是就人用工夫上立字大抵性中只有仁義禮智四位萬善皆從此而生四位實為萬善之總括如忠信如孝弟等類皆在萬善之中孝弟便只是仁之實但到那事親事兄處方始目之曰孝弟忠信便只是五常實理之發但到那接物發言處方始名之曰忠信忠恕上蔡謝氏曰昔人有問明道先生云如何斯可謂之恕心明道曰充廣得去則為恕心如何是充廣得去底氣象曰天地變化草木蕃充廣不去時如何曰天地閉賢人隠察此可以見盡不盡矣忠恕猶形影也無忠做恕不出來河東侯氏曰無恕不見得忠無忠做不出恕來誠有是心之謂忠見於功用之謂恕朱子曰主於内為忠見於外為恕忠是無一毫自欺處恕是稱物平施處忠因恕見恕由忠出忠只是一箇忠做出百千萬箇恕來忠恕只是體用便是一箇物事猶形影要除一箇除不得若未曉且看過去却時復潛玩忠與恕不可相離一歩忠是本根恕是枝葉非是别有枝葉乃是本根中發出枝葉枝葉即是本根忠恕猶曰中庸不可偏舉人謂盡己之謂忠盡物之謂恕盡己之謂忠固是盡物之謂恕則未盡推己之謂恕盡物之謂信忠者天下大公之道恕所以行之也忠言其體天道也恕言其用人道也維天之命於穆不已不其忠乎天地變化草木蕃不其恕乎問忠恕之别曰猶形影也無忠則不能為恕矣忠恕両字在聖人有聖人之用在學者有學者之用又曰就聖人身上説忠者天之天恕者天之人就學者身上説忠者人之天恕者人之人要之只是箇小徳川流大徳敦化意思問程子言如心為恕如心之義如何曰萬物之心便如天地之心天下之心便如聖人之心天地之生萬物一箇物裏面便有一箇天地之心聖人於天下一箇人裏面便有一箇聖人之心聖人之心自然無所不到此便是乾道變化各正性命聖人之忠恕也如己所不欲勿施於人便是推己之心求到那物上賢者之忠恕也又曰恕只是推得去推不去底人只要理㑹自己不管别人别人底事便説不闗我事今如此人便為州為縣亦只理㑹自己百姓盡不管他直是推不去又問恕字恁地闊曰所以道一言而可以終身行之者其恕乎又曰也湏是忠無忠把甚麽推出來忠者盡己之心無少偽妄以其必於此而本焉故曰道之體恕者推己及物各得所欲以其必由是而之焉故曰道之用問孔子言恕必兼忠如何對子貢只言恕曰不得忠時不成恕説恕時忠在裏面南軒張氏曰忠體也恕用也體立而用未嘗不存其中用之所形體亦無乎不具也北溪陳氏曰忠信是以忠對信而論忠恕又是以忠對恕而論伊川謂盡己之謂忠推己之謂恕忠是就心説是盡己之心無不真實者恕是就待人接物處説只是推己心之所真實者以及人物而已字義中心為忠是盡己之中心無不實故為忠如心為恕是推己心以及人要如己心之所欲者便是恕夫子謂己所不欲勿施於人只是就一邉論其實不止是勿施己所不欲者凡己之所欲者湏要施於人方可如己欲孝人亦欲孝己欲弟人亦欲弟必推己之所欲孝欲弟者以及人使人亦得以遂其欲孝欲弟之心己欲立人亦欲立己欲達人亦欲達必推己之所欲立欲達者以及人使人亦得以遂其欲立欲達之心便是恕只是己心流底去到那那而已然恕道理甚大在士人只一門之内應接無㡬其所推者有限就有位者而言則所推者大而所及者甚廣茍中天下而立則其所推者愈大如吾欲以天下養其親却使天下之人父母凍餓不得以遂其孝吾欲長吾長㓜吾㓜却使天下之人兄弟妻子離㪚不得以安其處吾欲享四海之富却使海内困窮無告者不得以遂其生生之樂如此便是全不推己便是不恕大槩忠恕只是一物就中截作兩片則為二物上蔡謂忠恕猶形影説得好葢存諸中者既忠則發出外來便是恕應事接物不恕則在我者必不十分真實故發出忠底心便是恕底事做成恕底事便是忠底心有天地之忠恕至誠無息而萬物各得其所是也有聖人之忠恕吾道一以貫之是也有學者之忠恕己所不欲勿論於人是也皆理一而分殊聖人本無私意此心豁然大公物來而順應何待於推學者未免有私意錮於其中視物未能無爾汝之間湏是用力推去方能及到那物上既推得去則亦豁然大公矣所以子貢問一言可以終身行之者其恕乎葢學者湏是著力推己以及物則私意無所容而仁可得矣自漢以來恕字義甚不明至有謂善恕己量主者而范忠宣公亦謂以恕己之心恕人不知恕之一字就己上著不得據他説恕字只是箇饒人底意思如此則是己有過且自恕己人有過又并恕人是相率為不肖之歸豈古人推己如心之義乎故忠宣公謂以責人之心責己一句説得是以恕己之心恕人一句説得不是其所謂恕恰似今人説且恕不輕之意字義不明為害非輕西山真氏曰忠之為義先儒以為中心釋之又以盡己言之葢本諸心而無偽者忠也發乎已而必盡者亦忠也然未有本諸心而不盡於己盡乎己而不本諸心者其亦一而已爾聖賢之言忠不顓於事君也為人謀必忠也於朋友必告告也事親必忠養也至於以善教人以利教民無適而非忠也平居有一之可媿而能盡忠其君無是道也恕者如心之謂非寛厚之謂也如我能為善亦欲他人如我之善我無惡亦欲人如我之無惡我欲立亦欲人之立我欲達亦欲人之達大槩是視人如己推己及物之謂忠者盡己之心也恕者推己之心以及人也忠盡乎内者也恕形於外者也己之心既無一毫之不盡則形之於外亦無一毫之不當如事親當孝事兄當悌處朋友當信事事物物各盡其所以當然之理以處之即是恕也有忠而後有恕忠者形也恕者影也如有形而後有影也在聖人則曰誠在學者則曰忠誠是自然而然忠是湏用著力在聖人則不必言恕在學者則當言恕葢聖人不待乎推學者先盡己而後能及人故有待乎推也然學若能於忠恕二字上著力於盡己盡人之間無不極其至久之亦可以到至誠地位恭敬程子曰發於外者謂之恭有諸中者謂之敬朱子嘗因言恭敬二字如忠信或云敬主於中者也恭發於外者也曰凡言發於外比似主於中者較大葢必充積盛滿而後發於外則發於外者豈不如主於中者然主於中者却是本不可不知恭主容敬主事有事著心做不易其心而為之是敬恭形於外敬主於中自誠身而言則恭較緊自行事而言則敬為切初學則不如敬之切成徳則不如恭之安敬是主事然專言則又如修己以敬敬以直内只偏言是主事恭是容貌上説問恭敬二字恭在外工夫猶淺敬在内工夫大段細宻曰二字不可以深淺論恭敬猶忠信兩字問恭即是敬之發見曰本領雖在敬上若論那大處恭反大於敬若不是裏靣積盛無縁發出來做得恭問恭敬二字語孟之言多矣如敬而無失與人恭而有禮居處恭執事敬行已也恭事上也敬責難於君謂之恭陳善閉邪謂之敬伊川先生言發於外者謂之恭有諸中者謂之敬葢恭敬只一理曰恭主容敬主事自學者而言則恭不如敬之力自成徳而言則敬不如恭之安問恭與敬如何曰恭是主容貌而言貌曰恭手容恭敬是主事而言執事敬事思敬問敬如何是主事而言曰而今做一件事湏是專心在上面方得不道是不好事而今若讀論語心又在孟子上如何理㑹得若做這一件事心又在那事永做不得又曰敬是畏底意思又曰敬是就心上説恭是對人而言又曰若有事時則此心便即專在這一事上無事則此心湛然又曰恭是謹敬是畏荘是嚴嚴威儼恪非所以事親是荘於這處使不得若以臨下則湏是荘臨之以荘則敬不荘以蒞之則民不敬人常恭敬則心常光明北溪陳氏曰恭有嚴底意敬字較實身體嚴整容貎端荘此是恭底意但恭是敬之見於外者敬是恭之存於中者敬與恭不是二物如形影然未有内無敬而外能恭者亦未有外能恭而内無敬者此與忠信忠恕相闗一般坐如尸立如齊便是敬之容正其衣冠尊其瞻視儼然人望而畏之便是恭之容敬工夫細宻恭氣象闊大且如恭敬古人皆如此著力如堯之欽明舜之温恭湯之聖敬日躋文王之緝熈敬止都是如此做工夫誠與敬字不相闗恭與敬字却相闗性理大全書卷三十七

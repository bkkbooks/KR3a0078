body:
  text: 性理大全書卷十三皇極經世書七外書漁樵問對嵩山晁氏曰邵雍堯夫設為問答以論隂陽化育之端性命道徳之奥云漁者垂鈎于伊水之上樵者過之弛檐息肩坐于磐石之上而問于漁者曰魚可鈎取乎曰然曰鈎非餌可乎曰否曰非鈎也餌也魚利食而見害人利魚而䝉利其利同也其害異也敢問何故曰子樵者也與吾異治安得侵吾事乎然亦可以為子試言之彼之利猶此之利也彼之害亦猶此之害也子知其小未知其大魚之利食吾亦利乎食也魚之害食吾亦害乎食也子知魚終日得食為利又安知魚終日不得食不為害如是則食之害也重而鈎之害也輕子知吾終日得魚為利又安知吾終日不得魚不為害也如是則吾之害也重魚之害也輕以魚之一身當人之一食則魚之害多矣以人之一身當魚之一食則人之害亦多矣又安知鈎乎大江大海則無異地之患焉魚利乎水人利乎陸水與陸異其利一也魚害乎餌人害乎財餌與財異其害一也又何必分乎彼此哉子之言體也獨不知用爾樵者又問曰魚可生食乎曰烹之可也曰必吾薪濟子之魚乎曰然曰吾知有用乎子矣曰然則子知子之薪能濟吾之魚不知子之薪所以能濟吾之魚也薪之能濟魚久矣不待子而後知茍世未知火之能用薪則子之薪雖積丘山獨且奈何哉樵者曰願聞其方曰火生于動水生于静動静之相生水火之相息水火用草木體也用生于利體生于害利害見乎情體用隠乎性一性一情聖人成能子之薪猶吾之魚微火則皆為腐臭朽壊而無所用矣又安能養人七尺之軀哉樵者曰火之功大於薪固已知之矣敢問善灼物何必待薪而後傳漁者曰薪火之體也火薪之用也火無體待薪然後為體薪無用待火而後為用是故凡有體之物皆可焚之矣曰水有體乎曰然曰火能焚水乎曰火之性能迎而不能隨故滅水之體能隨而不能迎故熱是故有温泉而無寒火相息之謂也曰火之道生於用亦有體乎曰火以用為本以體為末故動水以體為本以用為末故靜是火亦有體火亦有用也故能相濟又能相息非獨水火則然天下之事皆然在乎用之何如爾樵者曰用可得聞乎曰可以意得者物之性也可以言傳者物之情也可以象求者物之形也可以數取者物之體也用也者妙萬物為言者也可以意得而不可以言傳曰不可以言傳則子惡得而知之乎曰吾所以得而知之者固不能言傳非獨吾不能傳之以言聖人亦不能傳之以言也曰聖人既不能傳之以言則六經非言也耶曰時然後言何言之有樵者賛曰天地之道備於人萬物之道備於身衆妙之道備於神天下之能事畢矣又何思何慮吾而今而後知事心踐形之為大不及子之門幾至於殆矣乃析薪烹魚而食之飫而論易漁者與樵者遊於伊水之上漁者歎曰熈熈乎萬物之多未始有雜吾知遊乎天地之間萬物皆可以無心而致之矣非子則吾孰與歸焉樵者曰敢問無心致天地萬物之方漁者曰無心者無意之謂也無意之意不我物也不我物然後能物物曰何謂我何謂物曰以我徇物則我亦物也以物徇我則物亦我也我物皆致意由是明天地亦萬物也何天地之有焉萬物亦天地也何萬物之有焉萬物亦我也何萬物之有焉我亦萬物也何我之有焉何物不我何我不物如是則可以宰天地可以司鬼神而况於人乎况於物乎樵者問漁者曰天何依曰依乎地地何附曰附乎天曰然則天地何依何附曰自相依附天依形地附氣其形也有涯其氣也無涯有無之相生形氣之相息終則有始終始之間天地之所存乎天以用為本以體為末地以體為本以用為末利用出入之謂神名體有無之謂聖唯神與聖能叅乎天地者也小人則日用而不知故有害生實䘮之患也夫名也者實之客也利也者害之主也名生於不足利䘮於有餘害生扵有餘實䘮扵不足此理之常也養身者必以利貪夫則以身徇利故有害生焉立身必以名衆人則以身徇名故有實䘮焉竊人之財謂之盗其始取之也唯恐其不多也及其敗露也唯恐其多矣夫賄之與􅂍一物也而两名者利與害故也竊人之羙謂之徼其始取之唯恐其不多也及其敗露也唯恐其多矣夫譽與毁一事也而两名者名與實故也凡言朝者萃名之所也市者聚利之地也能不以爭處乎其間雖一日九遷一貨十倍何害生實䘮之有耶是知爭也者取利之端也譲也者趨名之本也利至則害生名興則實䘮利至名興而無害生實䘮之患唯有徳者能之天依地地附天豈相逺哉漁者謂樵者曰天下將治則人必尚行也天下將亂則人必尚言也尚行則篤實之風行焉尚言則詭譎之風行焉天下將治則人必尚義也天下將亂則人必尚利也尚義則謙譲之風行焉尚利則攘奪之風行焉三王尚行者也五覇尚言者也尚行者必入於義尚言者必入於利也義利之相去一何如是之遠耶是知言之于口不若行之于身行之于身不若盡之于心言之于口人得而聞之行之于身人得而見之盡之于心神得而知之人之聰明猶不可欺况神之聰明乎是知無愧于口不若無愧于身無愧于身不若無愧于心無口過易無身過難無身過易無心過難既無心過何難之有吁安得無心過之人與之語心哉漁者謂樵者曰子知觀天地萬物之道乎樵者曰未也願聞其方漁者曰夫所以謂之觀物者非以目觀之也非觀之以目而觀之以心也非觀之以心而觀之以理也天下之物莫不有理焉莫不有性焉莫不有命焉所以謂之理者窮之而後可知也所以謂之性者盡之而後可知也所以謂之命者至之而後可知也此三知者天下之眞知也雖聖人無以過之也而過之者非所以謂之聖人也夫鑑之所以能為明者謂其能不隠萬物之形也雖然鑑之能不隠萬物之形未若水之能一萬物之形也雖然水之能一萬物之形又未若聖人之能一萬物之情也聖人之所以能一萬物之情者謂其聖人之能反觀也所以謂之反觀者不以我觀物也不以我觀物者以物觀物之謂也既能以物觀物又安有我於其間哉是知我亦人也人亦我也我與人皆物也此所以能用天下之目為己之目其目無所不觀矣用天下之耳為己之耳其耳無所不聽矣用天下之口為己之口其口無所不言矣用天下之心為己之心其心無所不謀矣夫天下之觀其于見也不亦廣乎天下之聼其于聞也不亦逺乎天下之言其于論也不亦高乎天下之謀其于樂也不亦大乎夫其見至廣其聞至逺其論至高其樂至大能為至廣至逺至高至大之事而中無一為焉豈不謂至神至聖者乎非唯吾謂之至神至聖者乎而天下謂之至神至聖者乎非唯一時之天下謂之至神至聖者乎而千萬世之天下謂之至神至聖者乎過此以徃未之或知也已樵者問漁者曰子以何道而得魚曰吾以六物具而得魚曰六物具也豈由天乎曰具六物而得魚者人也具六物而所以得魚者非人也樵者未逹請問其方漁者曰六物者竿也綸也浮也沉也鈎也餌也一不具則魚不可得然而六物具而不得魚者非人也六物具而不得魚者有焉未有六物不具而得魚者也是知具六物者人也得魚與不得魚者天也六物不具而不得魚者非天也人也樵者曰人有禱鬼神而求福者福可禱而求耶求之而可得耶敢問其所以曰語善惡者人也祸福者天也天道福善而祸淫鬼神其能違天乎自作之咎固難逃已天降之災禳之奚益修徳積善君子常分安有餘事於其間哉樵者曰有為善而遇祸有為惡而獲福者何也漁者曰有幸與不幸也幸不幸命也當不當分也一命一分人其逃乎曰何謂分何謂命曰小人之遇福非分也有命也當祸分也非命也君子之遇祸非分也有命也當福分也非命也漁者謂樵者曰人之所謂親莫如父子也人之所謂踈莫如路人也利害在心則父子過路人逺矣父子之道天性也利害猶或奪之况非天性者乎夫利害之移人如是之深也可不愼乎路人之相逢則過之固無相害之心焉無利害在前故也有利害在前則路人與父子又奚擇焉路人之能相交以義又何况父子之親乎夫義者讓之本也利者爭之端也讓則有仁爭則有害仁與害何相去之逺也堯舜亦人也桀紂亦人也人與人同而仁與害異爾仁因義而起害因利而生利不以義則臣弑其君者有焉子弑其父者有焉豈若路人之相逢一日而交􅃑于中逹者哉樵者謂漁者曰吾嘗負薪矣舉百斤而無傷吾之身加十斤則遂傷吾之身敢問何故漁者曰樵則吾不知之矣以吾之事觀之則易地皆然吾嘗鈎而得大魚與吾交戰欲棄之則不能捨欲取之則未能勝終日而後獲幾有没溺之患矣非直有身傷之患耶魚與薪則異也其貪而為傷則一也百斤力分之内者也十斤力分之外者也力分之外雖一毫猶且為害而况十斤乎吾之貪魚亦何以異子之貪薪乎樵者歎曰吾而今而後知量力而動者智矣哉樵者謂漁者曰子可謂知易之道矣吾敢問易有太極太極何物也曰無為之本也太極生两儀两儀天地之謂乎曰两儀天地之祖也非止為天地而已也太極分而為二先得一為一後得一為二一二謂両儀曰两儀生四象四象何物也曰大象謂隂陽剛柔有隂陽然後可以生天有剛柔然後可以生地立功之本於斯為極曰四象生八卦八卦何謂也曰謂乾坤離坎兑艮震巽之謂也迭相盛衰終始於其間矣因而重之則六十四由是而生也而易之道始備矣樵者問漁者曰復何以見天地之心乎曰先陽已盡後陽始生則天地始生之際中則當日月始周之際末則當星辰終始之際萬物死生寒暑代謝晝夜遷變非此無以見之當天地窮極之所必變變則通通則久故象言先王以至日閉闗商旅不行后不省方順天故也樵者謂漁者曰无妄災也敢問其故曰妄則欺也得之必有祸欺有妄也順天而動有禍及者非禍也災也猶農有思豊而不勤稼穡者其荒也不亦禍乎農有勤稼穡而復敗諸水旱者其荒也不亦災乎故象言先王以茂對時育萬物貴不妄也樵者問曰姤何也曰姤遇也柔遇剛也與夬正反夬始逼壯姤始遇壯隂始遇陽故稱姤焉觀其姤天地之心亦可見矣聖人以徳化及此罔有不昌故象言施命誥四方履霜之愼其在此也漁者謂樵者曰春為陽始夏為陽極秋為隂始冬為隂極陽始則温陽極則熱隂始則凉隂極則寒温則生物熱則長物凉則収物寒則殺物皆一氣其别而為四焉其生萬物也亦然樵者問漁者曰人之所以能靈于萬物者何以知其然耶漁者對曰謂其目能収萬物之色耳能収萬物之聲鼻能収萬物之氣口能収萬物之味聲色氣味者萬物之體也目耳鼻口者萬人之用也體無定用惟變是用用無定體惟化是體體用交而人物之道於是乎備矣然則人亦物也聖人亦人也有一物之物有十物之物有百物之物有千物之物有萬物之物有億物之物有兆物之物生一一之物當兆物之物者豈非人乎有一人之人有十人之人有百人之人有千人之人有萬人之人有億人之人有兆人之人生一一之人當兆人之人者豈非聖乎是知人也者物之至者也聖人者人之至者也物之至者始得謂之物之物也人之至者始得謂之人之人也夫物之至者至物之謂也而人之至者至人之謂也以一至物而當一至人則非聖而何人謂之不聖則吾不信也何哉謂其能以一心觀萬心一身觀萬身一物觀萬物一世觀萬世者焉又謂其能以心代天意口代天言手代天工身代天事者焉又謂其能以上識天時下盡地理中盡物情通照人事者焉又謂其能以彌綸天地出入造化進退今古表裏人物者焉噫聖人者非世世而效聖焉吾不得而目見之也雖然吾不得而目見之察其心觀其迹探其體潜其用雖億萬年亦可以理知之也人或告我曰天地之外别有天地萬物異乎此天地萬物則吾不得而知已非唯吾不得而知己也聖人亦不得而知之也凡言知者謂其心得而知之也言之者謂其口得而言之也既心尚不得而知之口又惡得而言之乎以心不可得知而知之是謂妄知也以口不可得言而言之是謂妄言也吾又安能從妄人而行妄知妄言者乎漁者謂樵者曰仲尼有言曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也夫如是則何止千百世而已哉億千萬世皆可得而知之也人皆知仲尼之為仲尼不知仲尼之所以為仲尼不欲知仲尼之所以為仲尼則已如其必欲知仲尼之所以為仲尼則捨天地將奚之焉人皆知天地之為天地不知天地之所以為天地不欲知天地之所以為天地則已如其必欲知天地之所以為天地則捨動靜將奚之焉夫一動一靜者天地之至妙者與夫一動一靜之間者天地人之至妙至妙者與是知仲尼之所以盡三才之道者謂其行無轍跡也故有言曰予欲無言又曰天何言哉四時行焉百物生焉其此之謂與漁者謂樵者曰大哉權之與變乎非聖人無以盡之變然後知天地之消長權然後知天地之輕重消長時也輕重事也時有否㤗事有損益聖人不知隨時否㤗之道奚由知變之所為乎聖人不知隨時損益之道奚由知權之所為乎運消長者變也處輕重者權也是知權之與變聖人之一道耳樵者謂漁者曰人謂死而有知有諸曰有之曰何以知其然曰以人知之曰何者謂之人曰目耳鼻口心膽脾脤之氣全謂之人心之靈曰神膽之靈曰魄脾之靈曰魂脤之靈曰精心之神發乎目則謂之視脤之精發乎耳則謂之聼脾之魂發乎鼻則謂之臭膽之魄發乎口則謂之言八者具備然後謂之人夫人者天地萬物之秀氣也然而亦有不中者各求其類也若全得人類則謂之曰全人之人夫全類者天地萬物之中氣也謂之曰全徳之人也全徳之人者人之人者也夫人之人者仁人之謂也唯全人然後能當之人之生也謂其氣行人之死也謂其形返氣行則神魂交形返則精魄存神魂行于天精魄返于地行于天則謂之曰陽行返于地則謂之曰隂返陽行則晝見而夜伏者也隂返則夜見而晝伏者也是故知日者月之形也月者日之影也陽者隂之形也隂者陽之影也人者鬼之形也鬼者人之影也人謂鬼無形而無知者吾不信也漁者問樵者曰小人可絶乎曰不可君子禀陽正氣而生小人禀隂邪氣而生無隂則陽不成無小人則君子亦不成唯以盛衰乎其間也陽六分則隂四分隂六分則陽四分隂陽相半則各五分矣由是知君子小人之時有盛衰也治世則君子六分君子六分則小人四分小人固不勝君子矣亂世則反是君君臣臣父父子子兄兄弟弟夫夫婦婦謂各安其分也君不君臣不臣父不父子不子兄不兄弟不弟夫不夫婦不婦謂各失其分也此則由世治世亂使之然也君子常行勝言小人常言勝行故世治則篤實之士多世亂則縁飾之士衆篤實鮮不成事縁飾鮮不敗事成多國興敗多國亡家亦由是而興亡也夫興家興國之人與亡國亡家之人相去一何逺哉樵者問漁者曰人所謂才者有利焉有害焉者何也漁者曰才一也利害二也有才之正者有才之不正者才之正者利乎人而及乎身者也才之不正者利乎身而害乎人者也曰不正則安得謂之才曰人所不能而能之安得不謂之才聖人所以惜乎才之難者謂其能成天下之事而歸之正者寡也若不能歸之以正才則才矣難乎語其仁也譬猶藥之療疾也毒藥亦有時而用也可一而不可再也疾愈則速已不已則殺人矣平藥則常日而用之可也重疾非所以能治也能驅重疾而無害人之毒者古今人所謂良藥也易曰大君有命開國承家小人勿用如是則小人亦有時而用之時平治定用之則否詩云它山之石可以攻玉其小人之才乎樵者謂漁者曰國家之興亡與夫才之邪正則固得聞命矣然則何不擇其人而用之漁者曰擇臣者君也擇君者臣也賢愚各從其類而為奈何有堯舜之君必有堯舜之臣有桀紂之君必有桀紂之臣堯舜之臣生乎桀紂之世猶桀紂之臣生乎堯舜之世必非其所用也雖欲為禍為福其能行乎夫上之所好下必好之其若影響豈待驅率而然耶上好義則下必好義而不義者遠矣上好利則下必好利而不利者逺矣好利者衆則天下日削矣好義者衆則天下日盛矣日盛則昌日削則亡盛之與削昌之與亡豈其逺乎在上之所好耳夫治世何嘗無小人亂世何嘗無君子不用則善惡何由而行也樵者曰善人常寡而不善人常衆治世常少而亂世常多何以知其然耶曰觀之於物何物不然譬諸五榖耘之而不苖者有矣蓬莠不耘而猶生耘之而求其盡也亦末如之何矣由是知君子小人之道有自來矣君子見善則喜之見不善則逺之小人見善則疾之見不善則喜之善惡各從其類也君子見善則就之見不善則違之小人見善則違之見不善則就之君子見義則遷見利則止小人見義則止見利則遷遷義則利人遷利則害人利人與害人相去一何逺耶家與國一也其興也君子常多而小人常鮮其亡也小人常多而君子常鮮君子多而去之者小人也小人多而去之者君子也君子好生小人好殺好生則世治好殺則世亂君子好義小人好利治世則好義亂世則好利其理一也釣者談已樵者曰吾聞古有伏羲今日如覩其靣焉拜而謝之及旦而去無名公傳無名公生于冀方老于豫方終于豫方年十嵗求學扵里人遂盡里人之情已之滓十去其一二矣年二十求學于鄉人遂盡鄉人之情已之滓十去其三四矣年三十求學于國人遂盡國人之情已之滓十去其五六矣年四十求學于古人遂盡古人一作今之情已之滓十去其七八矣年五十求學于天地遂盡天地之情欲求已之滓無得而去矣始則里人疑其僻問于鄉人鄉人曰斯人善與人羣安得謂之僻既而鄉人疑其泛問于國人國人曰斯人不妄與人交安得謂之泛既而國人疑其陋問于四方之人四方之人曰斯人不一有能字噐安得謂之陋既而四方之人又疑之質之于古今之人古今之人終始無可與同者又問之于天地天地不對當是之時四方之人迷亂不復得知因號為無名公夫無名者不可得而名也凡物有形則可噐可噐斯可名然則斯人無體乎曰有體有體而無迹者也斯人無用乎曰有用有用而無心者也夫有迹有心者斯可得而知也無心無迹者雖鬼神亦不可得而知不可得而名况於人乎故其詩曰思慮未起鬼神莫知不由乎我更由乎誰能造萬物者天地也能造天地者太極也太極者其可得而名乎可得而知乎故強名之曰太極太極者其無名之謂乎故嘗自為之賛曰借爾靣貎假爾形骸弄丸餘暇丸謂太極閒徃閒來人告之以脩福對曰未嘗為不善人告之以禳災對曰未嘗妄祭故其詩曰禍如許免人須謟福若待求天可量乂曰中孚起信寕須禱旡妄生災未易禳性喜飲酒嘗命之曰太和湯所飲不多㣲醺而罷不喜過醉故其詩曰性喜飲酒飲喜㣲酡飲未㣲酡口先吟哦吟哦不足遂及浩歌浩歌不足無可奈何所寢之室謂之安樂窩不求過羙惟求冬燠夏凉遇有睡思則就枕故其詩曰墻高于肩室大于斗布被暖餘藜􅅅飽後氣吐胷中充塞宇宙其與人交雖賤必洽終身無甘壊未嘗作皺眉事故人皆得其歡心見貴人未嘗曲奉見不善人未嘗急去見善人未之知也未嘗急合故其詩曰風月情懐江湖性氣色斯其舉翔而後至無賤無貧無富無貴無將無迎無拘無忌聞人之謗未嘗怒聞人之譽未嘗喜聞人言人之惡未嘗和聞人言人之善則就而和之又從而喜之故其詩曰樂見善人樂聞善事樂道善言樂行善意聞人之惡如負芒刺聞人之善如佩蘭蕙家貧未嘗求于人人饋之雖寡必受故其詩曰窘未嘗憂飲不至醉収天下春歸之肝肺朝廷授之官雖不強免亦不強起晩有二子教之以仁義授之以六經舉世尚虚談未嘗掛一言舉世尚竒事未嘗立異行故其詩曰不倿禪伯不諛方士不出户庭直游天地家素業儒口未嘗不道儒言身未嘗不行儒行故其詩曰心無妄思足無妄走人無妄交物無妄受炎炎論之甘處其陋綽綽言之無出其右羲軒之書未嘗去手堯舜之談未嘗離口當中和天同樂易友吟自在詩飲歡喜酒百年升平不為不偶七十康強不為不夀此其無名公之行乎附録程子曰昔七十子學於仲尼其傳可見者惟曽子所以告子思而子思所以授孟子者耳其餘門人各以其材之所宜者為學雖同尊聖人所因而入者門户則衆矣况後此千餘嵗師道不立學者莫知適從獨康節先生之學為有傳也先生得之李挺之挺之得之穆伯長推其源流逺有端緒今穆李之言及其行事㮣可見矣而先生淳一不雜汪洋浩大乃其所自得多矣然而名其學者豈所謂門户之衆各有所因而而入者歟語成徳者昔難其居若先生之道就其至而論之可謂安且成矣先生有書六十卷命曰皇極經世上蔡謝氏曰堯夫易數甚精自來推長厯者至久必差惟堯夫不然指一二近事當靣可騐明道云欲要傳與某兄弟某兄弟那得功夫要學須是二十年功夫明道聞説甚熟一日因監試無事以其説推筭之皆合出謂堯夫曰堯夫之數只是加一倍法以此知太元都不濟事堯夫驚撫其背曰大哥你恁聰明伊川謂堯夫知易數為知天知易理為知天堯夫云須還知易理為知天因説今年雷起甚處伊川云堯夫怎知某便知又問甚處起伊川云起處起堯夫愕然它日伊川問明道曰加倍之數如何曰都忘之矣因歎其心無偏繫如此張氏㟭曰康節先生治易書春秋之學窮意言象數之藴皇帝王霸之道著書十餘萬言研精極思三十年觀天地之消長推日月之盈縮考隂陽之度數察剛柔之形體故經之以元紀之以㑹始之以運終之以世又㫁自唐虞訖于五代本諸天道質以人事興廢治亂靡所不載其辭約其義廣其書著其㫖𨼆嗚呼羙矣至矣天下之能事畢矣龜山楊氏曰皇極之書皆孔子之所未言者然其論古今治亂成敗之變若合符節故不敢略之恨未得其門而入耳康節先天之學不傳於世非妙天地之心不足以知此某盖嘗翫之而陋識淺聞未足以叩其闗鍵八卦有定位而先天以乾巽居南坤震居北離兑居東坎艮居西又以十數分配八卦獨艮坎同為三數此必有説也以爻當期其原出於繫辭而以星日氣候分布諸爻易未有也其流詳於緯書世傳稽覧圖是也揚子草元盖用此耳卦氣起於中孚冬至卦也太元以中凖之其次復卦太元以周凖之升大寒卦也大厯以干凖之今之厯書亦然則自漢迄今同用此説也而先生以復為冬至噬嗑為大寒又謂八卦與文王異若此類皆莫能曉也康節之學䆒極天人之藴翫味之久未能窺其端倪况敢議其是非耶朱子曰皇極經世之書乃一元統十二㑹一㑹統三十運一運統十二世一世統三十年一年統十二月一月統三十日一日統十二辰是十二與三十迭為用也故季通以十二萬九千六百之數為日分問易與經世書同異曰易是卜筮經世是推歩是一分為二二分為四四分為八八分為十六十六分為三十二又從裏面細推去問經世書水火土石石是金否曰它分天地間物事皆是四如日月星辰水火土石雨風露雷皆是相配又問金生水如石中出水是否曰金是堅凝之物到這􅂻堅實後自拶得水出來又問伯温解經世書如何曰它也只是説将去那裡靣曲折精㣲也未必曉得康節當時只説與王某不曽説與伯温模様皇極經世紀年甚有法史家多言秦廢太后逐穰侯經世書只言秦奪宣太后權伯恭極取之盖實不曾廢康節之書固自是好而季通推得來又甚縝宻若見於用不知果如何恐當絶勝諸家也問康節數學曰且未須理㑹數自是有此理有生便有死有盛必有衰且如一朶花含蘂時是將開略放時是正盛爛熳時是衰謝又如看人即其氣之盛衰便可以知其生死盖其學本於明理故明道謂其觀天地之運化然後頺乎其順浩然其歸若曰渠能知未來事則與世間占覆之術何異其去道逺矣其知康節者末矣盖他玩得此理熟了事物到靣前便見更不待思量康節以四起數疊疊推去自易以後無人做得一物如此整齊包括得盡想它毎見一物便成四片了但才到二分以上便怕乾卦方終便知有箇垢卦來盖縁它於起處推將來至交接處看得分曉輔廣云先生前日説康節之學與周子程子少異處莫正在此否若是聖人則處乾時自有箇處乾底道理處垢時自有箇處垢底道理否曰然又問先生説卲堯夫看天下物皆成四片如此則聖人看天下物皆成两片也曰也是如此只是隂陽而已問康節云道為太極又云心為太極道指天地萬物自然之理而言心指人得是理以為一身之主而言曰固是但太極只是箇一而無對者康節云一動一靜者天地之妙也一動一靜之間者天地人之妙也盖天只是動地只是靜到得人便兼動靜是妙於天地處故曰人者天地之心論人之形雖只是噐言其運用處却是道理康節云無極之前隂含陽也有象之後陽分隂也陽占却隂分數康節云思慮未起鬼神莫知不由乎我更由乎誰此間有術者人來問事心下黙念則它説相應有人故意思别事不念及此則其説便不應問姓幾畫口中黙數則它説便著不數者説不著問康節學到不感處否曰康節又别是一般聖人知天命以理它只是以術然到得術之精處亦非術之所能盡然其初只術耳康節數學源流於陳希夷康節天資極高其學只是術數學後人有聰明能筭亦可以推建陽舊有一村僧宗元一日走上徑山住得七八十日悟禪而歸其人聰明能筭法看經世書皆略略領㑹得康節看這人須極㑹處置事被它神間氣定不動聲氣須處置得分明它氣質本來清明又養得來純厚又不曽枉用了心它用那心時都在𦂳要上用被它靜極了看得天下之事理精明嘗於百原深山中闢書齋獨處其中王勝之常乗月訪之必見其燈下正襟危坐雖夜深亦如之若不是養得至靜之極如何見得道理如此精明只是它做得出來須差異季通嘗云康節若做定是四公八辟十六侯三十二卿六十四大夫都是加倍法想得是如此想見它看見天下之事才上手來便成四截了其先後緩急莫不有定動中機㑹事到靣前承處置得下矣康節甚喜張子房以為子房善藏其用以老子為得易之體以孟子為得易之用合二者而用之想見善處事問不知眞箇用時如何曰先時説了須差異須有些機權術數也康節之學似揚子雲太元擬易方州部家皆自三數推之元為之首一以生三為三方三生九為九州九生二十七部九九乗之斯為八十一家首之以八十一所以凖六十四卦賛之以七百二十有九所以凖三百八十四爻無非以三數推之康節之數則是加倍之法康節其初想只是看得太極生两儀两儀生四象心只管在那上靣轉久之理透想得一舉眼便成四片其法之之外又有四焉凡物才過到二之半時便煩惱了盖已漸趨於衰也謂如見花方蓓蕾則知其將盛既開則知其將衰其理不過如此謂如今日戌時從此推上去至未有天地之始從此推下去至人消物盡之時盖理在數内數又在理内康節是它見得一箇盛衰消長之理故能知之若只説它知得甚事如歐陽叔弼定謚之類此知康節之淺陋者也程先生有一柬説先天圖甚有理可試徃聼它説看觀其意甚不把當事然自有易以來只有康節説一箇物事如此齊整如揚子雲太元便令星補凑得可笑若不補又却欠四分之一補得來又却多四分之三如潜虚之數用五只似如今筭位一般其直一畫則五也下横一畫則為六横二畫則為七盖亦補凑之書也鶴山魏氏曰邵子平生之書其心術之精㣲在皇極經世其宣寄情意在擊壌集凡歴乎吾前皇王帝霸之興替春秋冬夏之代謝隂陽五行之運化風雲月露之霽曀山川草木之榮悴惟意所驅周流貫徹融夜擺落盖左右逢源略無毫髪凝滯倚著之意鳴呼眞所謂風流人豪者與或曰揆以聖人之中若弗合也天何言哉四時行焉百物生焉聖人之動靜語黙無非至教雖常以示人而平易坦明不若是之多言也老者安之朋友信之少者懐之聖人之心量直與天地萬物上下同流雖無時不樂而寛舒和平不若是之多言也曰是則然矣宇宙之間飛潛動植晦明流峙夫孰非吾事若有以察之叅前倚衡造次顚沛觸處呈露凡皆精義妙道之發焉者脱斯湏之不在則芸芸並驅日夜雜揉相代乎前顧於吾何有焉若邵子者使猶從從游於舞雩之下浴沂詠歸毋寕使曽晳獨見稱於聖人也與洙泗已矣秦漢以來諸儒無此氣象讀者當自得之黄氏瑞節曰邵子於揚氏太元嘗謂其見天地之心而其書逺過太元之上䆒而言之皆原於易書中引而不發邵伯温云古今之數皆始於一而皇極之數實本於伏羲之先天得之矣西山先生始終以易䟽其説於是㣲顯闡幽其説大著學者由蔡氏而知經世由經世而知易黙而通之可也性理大全書卷十三

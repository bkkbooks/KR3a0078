body:
  text: 性理大全書卷五十五學十三史家程子曰古者諸侯之國各有史記故其善惡皆見於後世自秦罷侯置守令則史亦從而廢矣其後自非傑然有功徳者或記之循吏與夫凶忍殘殺之極者以酷見傳其餘則泯然無聞矣如漢唐之有天下皆數百年其間郡縣之政可書者宜亦多矣然其見書者率纔數十人使賢者之政不幸而無傳其不肖者復幸而得葢其惡斯與古史之意異矣司馬遷為近古書中多有前人格言如作紀本尚書但其間有曉不得書意有錯用却處李嘉仲問項籍作紀如何曰紀只是有天下方可作又問班固嘗議遷之失如何曰後人議前人固甚易史遷云天與善人伯夷善人非也此以私意度天道也必曰顔何為而天跖何為而夀指一人而較之非知天者也君實修資治通鑑至唐事正叔問曰敢與太宗肅宗正簒名乎曰然又曰敢辨魏徵之罪乎曰何罪魏徵事皇太子太子死遂㤀戴天之讎而反事之此王法所當誅後世特以其後来立朝風節而掩其罪有善有惡安得相掩曰管仲不死子糾之難而事桓公孔子稱其能不死曰豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也與徵何異曰管仲之事與徵異齊侯死公子皆出小白長而當立子糾少亦欲立管仲奉子糾奔魯小白入齊既立仲納子糾以抗小白以少犯長又所不當立義已不順既而小白殺子糾管仲以所事言之則可死以義言之則未可死故春秋書齊小白入于齊以國繫齊明當立也又書公伐齊納糾糾去子明不當立也至齊人取子糾殺之此復係子者罪齊大夫既盟而殺之也與徵之事全異客有見伊川者凡案間無他書惟印行唐鑑一部曰近方見此書三代以後無此議論涑水司馬氏曰李延夀之書亦近世之佳史也雖於機祥詼嘲小事無所不載然叙事簡徑比於南北正史無煩冗蕪穢之辭竊謂陳夀之後唯延夀可以亞之但恨延夀不作志使數代制度沿革皆没不見耳和靖尹氏曰太史公不明理只是多聞如伯夷序傳引盗跖是也若孔子雖顔子之夭只説不幸短命死則知盗跖乃㒺之生也幸而免者也元城劉氏問馬永卿近讀何書對曰讀西漢到酷吏傳曰班氏特恕杜張何也曰太史公時湯周之後未顯至班氏獨以為有子孫以贖父罪故入列傳曰孟子云名之曰幽厲雖孝子慈孫百世不能改也而班氏固輙沒其酷吏之名何也曰世之論者以謂二人皆有意太史公之意欲以敎後世人臣之忠班氏之意欲以教後世人子之孝曰此固然也然班固於此極有深意張湯之後至後漢猶盛有恭侯純者雖王莽時亦不失爵至建武中厯位至大司空故班固不使入酷吏傳以張純之故也曰是時杜氏之絶已乆而亦不入酷吏傳何也曰杜張一等人也若獨令張湯入列傳則世得以議已故并貸杜周此子産立公孫洩之義也永卿退而檢左氏鄭卿良霄字伯有既死為厲國人大懼子産以謂鬼有所歸乃不為厲乃立公孫洩良止以止之公孫洩子孔之子也良止良霄之子也鄭殺子孔子孔雖不為厲故亦立之且伯有以罪死立後非義也恐惑民故立洩使若自以大義存誅絶之後不因其為厲也新唐書叙事好簡畧其辭故其事多鬱而不明此作史之弊也且文章豈有繁簡也意必欲多則冗長而不足讀必欲其簡則僻澁令人不喜讀假令新唐書載卓文君事不過止曰少嘗竊卓氏以逃如此而已班固載此事乃近五百字讀之不覺其繁也且文君之事亦何補於天下後世哉然作史之法不得不如是故可謂之文如風行水上出於自然也若不出於自然而有意於繁簡則失之矣唐書進表云其事則増於前其文則省於舊且新唐書所以不及兩漢文章者其病正在此兩句也又反以為工何哉然新唐書史各有長短未易優劣也朱子曰司馬遷才髙識亦髙但粗率太史公書疎爽班固書宻塞或謂五帝紀所取多古文尚書及大戴禮為主為知所考信者然伏羲神農見易大傳乃孔聖之言而八卦列於六經為萬世文字之祖不知史遷何故乃獨遺而不録遂使史記一書如人有身而無首此尚為知所考信耶司馬子長動以孔子為證不知是見得亦且是如此説所以吕伯恭發明得非細只恐子長不敢承領耳史記亦疑當時不曾得刪改脱藳髙祖紀記迎太公處稱髙祖此様處甚多髙帝未崩安得髙祖之號漢書盡改之矣左傳只有一處云陳桓公有寵於王或謂史遷不可謂不知孔子然亦知孔子之粗耳厯代世變即六國表序是其極致乃是俗人之論知孔子者固如是耶正朔服色乃當時論者所共言如賈生公孫臣新垣平之徒皆言之豈獨遷也問伯夷傳得孔子而名益彰曰伯夷當初何嘗指望孔子出来發揮他又問黄屋左纛朝以十月𦵏長陵此是大事所以書在後曰某嘗謂史記恐是箇未成底文字故記載無次序有疎濶不接續處如此等是也伯夷傳辨許由事固善然其論伯夷之心正與求仁得仁者相反其視蘇氏之古史孰為能考信於孔子之言耶或以史遷能貶卜式與桑𢎞羊為伍又能不與管仲李克為深知功利之為害不知六國表所謂世異變成功大議卑易行不必上古貨值傳譏長貧賤而好語仁義為可羞者又何謂耶或謂遷言公孫𢎞以儒顯為譏𢎞之不足為儒不知果有此意否彼固謂儒者博而寡要勞而少功是以其事難盡從然則彼所謂儒者其意果何如耶班固作漢書不合要添改史記字行文亦有不識當時意思處如七國之反史記所載甚疎畧却都是漢道理班固所載雖詳便却不見此意思吕東莱甚不取班固如載文帝建儲詔云楚王季父也春秋髙閱天下之義理多矣明於國家之大體吳王於朕兄也恵仁以好徳淮南王弟也秉徳以陪朕豈不為豫哉固遂節了吳王一段只於淮南王下添皆字云皆秉徳以陪朕葢陪字訓貳以此言弟則可言兄可乎今史記中却載全文又曰屏山却云固作漢紀有學春秋之意其叙傳云為春秋考紀又曰遷史所載皆是随所得者載入正如今人草藳如酈食其踞洗前面已載一段末後又載與前説不同葢是兩處説已寫入了又據所得寫入一段耳漢書有秀才做底文章有婦人做底文字亦有載當時獄辭者秀才文章便易曉當時文字多碎句難讀尚書便有如此底周官只如今文字太齊整了孔明治蜀不曽立史官陳夀檢拾而為蜀志故甚畧孔明極是子細者亦恐是當時經理王業之急有不暇及此晉書皆為許敬宗胡寫入小説又多改壊了東坡言孟嘉傳陶淵明之自然今改云使然更有一二處一作此類甚多東坡此文亦不曽見包揚因問晉書説得晉人風流處好曰世説所載説得較好今皆改之矣載記所紀夷狄祖先之類特甚此恐其故臣追記而過譽之問班史通鑑二氏之學如何曰讀其書自可見又曰温公不取孟子取揚子至謂王伯無異道夫王伯之不侔猶碔砆之於美玉故荀卿謂粹而王駁而伯孟子與齊梁之君力判其是非者以其有異也史記功臣表與漢史功臣表其户數先後及姓名多有不同二史各有是非當以傳實證之不當全以史記所傳為非真也如淮隂為連敖典客漢史作票客顔師古謂其票疾而以賔客之禮禮之夫淮隂之亡以其不見禮於漢也蕭何追之而薦於漢王始為大将若已以賔禮禮之淮隂何為而亡哉此則史記之所載為是三代表是其疎謬處無可疑者葢他説行不得若以為堯舜俱出黄帝是為同姓之人堯固不當以二女嬪于虞舜亦豈容受堯二女而安於同姓之無别又以為湯與王季同世由湯至紂凡十六傳王季至武王纔再世爾是文王以十五世之祖事十五世孫紂武王以十四世祖而伐之豈不甚謬戾耶通鑑先後之不同者却不必疑史家叙事或因時而記之或因事而見之田和遷康公通鑑載於安王十一年是因時而紀之也史記載於安王十六年是因事而見之也何疑之有只有伐燕一節史記以為湣王通鑑以為宣王史記却是攷他源流来通鑑只是凴信孟子温公平生不喜孟子到此又却信之不知其意如何張敬夫説通鑑有未盡處似此一節亦是可疑遷固之史大槩只是計較利害范􅁮更低只主張做賊底後来他自做却敗温公通鑑凡涉智數險詐底事往往不載却不見得當時風俗如陳平説髙祖間楚事亦不載上一段不若全載了可以見當時事情却於其下論乃佳佳又如亞夫得劇孟事通鑑亦節去意謂得劇孟不足道不知當時風俗事勢劇孟輩亦係輕重如周休且能一夜得三萬人只縁呉王敗後各自散去其事無成温公於此事却不知不覺載之葢以周休名不甚顯不若劇孟耳想温公平日尀耐劇孟不知温公為将設遇此人奈得他何否又如論唐太宗事亦殊未是吕氏大事記周赧後添繫秦亦未當當如記楚漢事並書之項籍死後方可専書漢也通鑑文字有自改易者仍皆不用漢書上古字皆以今字代之南北史除了通鑑所取者其餘只是一部好笑底小説胡明仲看節通鑑文定問當是温公節否明仲云豫讓好處是不以死生二其心故簡子云真義士也今節去之是無見識必非温公節也通鑑例毎一年或數次改年號者只取後一號故石晉冬始簒而以此年繫之曽問吕丈吕丈曰到此亦湏悔然多了不能改得某只以甲子繫年下面注所改年號或謂温公舊例年號皆以後改者為正此殊未安如漢建安二十五年之初漢尚未亡今便作魏黄初元年奪漢太速與魏太遽大非春秋存陳之意恐不可以為法此類尚一二條不知前賢之意果何如爾問温公論才徳如何曰他便専把朴者為徳殊不知聰明果敢正直中和亦是才亦是徳才有好底有不好底徳有好底有不好底徳者得之於己才者能有所為如温公所言才是不好底既才是不好底又言才徳兼全謂之聖人則聖人一半是不好底温公之言多説得偏謂之不是則不可問温公言聰察彊毅之謂才聰明恐只是才不是徳曰温公之言便是有病堯舜皆曰聰明又曰欽明又曰文明豈可只謂之才如今人不聰明更将何者喚作徳也問温公以正直中和為徳聰明彊毅為才曰皆是徳也聖人以仁智勇為徳聰察便是智彊毅便是勇問諸儒才徳之説曰合下語自不同如説才難湏是那有徳底才髙陽氏才子八人這湏是有徳而有才底若是将才對徳説則如周公之才之美様便有是才更要徳這箇合下説得自不同又問智伯五賢曰如説射御足力之類也可謂之才通鑑告姦者與斬敵首同賞不告姦者與降敵同罰史記商君議更法首便有斬敵首降敵兩條賞罰後面方有此兩句比類之法其實秦人上戰功故以此二條為更法之首温公却節去之只存後兩句比類之法遂使讀之者不見来厯温公修書凡與己意不合者即節去之不知他人之意不如此通鑑此類多矣問温公通鑑不信四皓輔太子事謂只是叔孫通諌得行意謂子房如此則是脅其父曰子房平生之術只是如此唐太宗從諌亦只是識利害非誠實髙祖只是識事機明利害故見四人者輔太子便知是得人心可以為之矣叔孫通嫡庶之説如何動得他又謂髙祖平生立大功業過人只是不殺人温公乃謂髙祖殺四人甚異事見攷異其後一處所在又却載四人又不信劇孟事意謂劇孟何以為輕重然又載周休其人極無行自請於吳去呼召得數萬人助吳如子房劇孟皆温公好惡所在然著其事而立論以明之可也豈可以有無其事為褒貶温公此様處議論極純因論章惇言温公義理不透曰温公大處占得多章小㸃何足以知大處胡致堂云通鑑久未成書或言温公利餐錢故遲遲温公遂急結末了故唐五代多繁冗見管見後唐莊宗六月甲午條下温公之言如桑麻穀粟且如稽古錄極好看常思量教太子諸王恐通鑑難看且看一部稽古録人家子弟若先看得此便是一部古今在肚裏了稽古録有不備者當以通鑑補之温公作此書想在忙裏做成原無義例稽古録一書可備講筵官僚進讀小兒讀六經了令接續讀去亦好末後一表其言如蓍龜一一皆騐宋莒公厯年通譜與此書相似但不如温公之有法也唐鑑欠處多看底辨得出時好唐鑑多説得散開無收殺如姚崇論擇十道使患未得人他自説得意好不知范氏何故却貶其説或謂史賛唐太宗止言其功烈之盛至於功徳兼隆則傷夫自古未之有曰恐不然史臣正賛其功徳之美無貶他意其意亦謂除隋之亂是功致治之美是徳自道學不明故言功徳者如此分别以聖門言之則此兩事不過是功未可謂之徳范唐鑑首一段専是論太宗本原然亦未盡太宗後来做處儘好只為本領不是與三代便别問歐陽以除隋之亂比迹湯武致治之美庶㡬成康贊之無乃太過曰只為歐公一輩人尋常亦不曽理㑹本領處故其言如此范氏以武王釋箕子封比干事比太宗誅髙徳儒此亦據他眼前好處恁地比並也未論到他本原處似此様且寛看若一一責以全則後世之君不復有一事可言范唐鑑第一段論守臣節處不圓要做一書補之不曽做得范此文草草之甚其人資質渾厚説得都如此平正只是疎多不入理終守臣節處於此亦湏有些處置豈可便如此休了如此議論豈不為英雄所笑唐鑑白馬之禍歐公論不及此唐鑑意正有疎處孫之翰唐論精練説利害如身處親厯之但理不及唐鑑耳吕伯恭晩年謂人曰孫之翰唐論勝唐鑑要之也是切於事情只是大綱却不正了唐鑑也有緩而不精確處如言租庸調及楊炎二税之法説得都無收殺只云在於得人不在乎法有這般茍且處審如是則古之聖賢徒法云爾他也是見熙寧間詳於制度故有激而言要之只那有激便不平正五代舊史温公通鑑用之歐公葢以此作文因有失實處如宦者張居翰當時但言緩取一日則一日固二日則二日固歐公直将作大忠説得太好了致堂管見方是議論唐鑑議論弱又有不相應處前面説一項事末又説别處去子由古史舜紀所論三事其一許由者是已然當全載史遷本語以該卞随務光之流不當但斥一許由而已也然太史公又言箕山之上有許由冢則又明其實有是人亦當世之髙士但無堯讓之事耳此其曲折之意蘇子亦有所未及也其一瞽象殺舜葢不知其有無今但當知舜之負罪引慝號泣怨慕象憂亦憂象喜亦喜與夫小杖則受大杖則走父母欲使之未嘗不在側欲求殺之則不可得而已爾不必深辨瞽象殺舜之有無也其一舜禹避丹朱商均而天下歸之則蘇子慮其避之足以致天下之逆至益避啓而天下歸啓則蘇子又譏其避之為不度而無耻於是凡孟子史遷之所傳者皆以為誕妄而不之信今固未暇質其有無然蘇子之所以為説者類皆以世俗不誠之心度聖賢則不可以不之辨也聖賢之心淡然無欲豈有取天下之意哉顧辭讓之發則有根於所性而不能已者茍非所據則雖巵酒豆肉猶知避之况乎秉權據重而天下有歸已之勢則亦安能無所惕然於中而不逺引以避之哉避之而彼不吾釋則不獲已而受之何病於逆避之而幸其見舎則固得吾本心之所欲而又何耻焉唯不避而强取之乃為逆偃然當之而彼不吾歸乃可耻耳如蘇子之言則是凡世之為辭讓者皆隂欲取之而陽為遜避是以其言反於事實至於如此則不自知其非也舜禹之事世固不以為疑今不復論至益之事則亦有不能無惑於其説者殊不知若太甲賢而伊尹告歸成王冠而周公還政宣王有志而共和罷此類多矣當行而行當止而止而又何耻焉蘇子葢賢共和而尚何疑於益哉若曰受人之寄則當遂有之而不可歸歸之則為不度而無耻則是王莽曺操司馬懿父子之心而楊堅夫婦所謂騎虎之勢也乃欲以是而語聖賢之事其亦誤矣古史言馬遷淺陋而不學疎畧而輕信此二句最中馬遷之失吕伯恭極惡之古史序云古之帝王其必為善如火之必熱水之必寒其不為不善如騶虞之不殺竊脂之不穀此語最好某嘗問伯恭此豈馬遷所能及然子由此語雖好又自有病處如云帝王之道以無為為宗之類他只説得箇頭勢大下面工夫又皆空踈亦猶馬遷禮書云大哉禮樂之道洋洋乎鼓舞萬物役使羣動説得頭勢甚大然下面亦空疎却引荀子諸説以足之又如諸侯年表盛言形勢之利有國者不可無末却云形勢雖强要以仁義為本他上文本意主張形勢而其末却如此説者葢他也知仁義是箇好底物事不得不説且説教好看如禮書所云亦此意也伯恭極喜渠此等説以為遷知行夏之時乗殷之輅服周之冕為得聖人為邦之法非漢儒所及此亦衆所共知何必馬遷然遷嘗從董仲舒游史記中有余聞之董生云此等語言亦有所自来也遷之學也説仁義也説詐力也用權謀也用功利然其本意却只在於權謀功利孔子説伯夷求仁得仁又何怨他一傳中首尾皆是怨辭盡説壊了伯夷子由古史皆刪去之盡用孔子之語作傳豈可以子由為非馬遷為是聖賢以六經垂訓炳若丹青無非仁義道徳之説今求義理不於六經而反取疎畧淺陋之子長亦惑之甚矣温公通鑑以魏為主故書蜀丞相亮宼何地從魏志也其理都錯某所作綱目以蜀為主後劉聰石勒諸人皆晉之故臣故東晉以君臨之至宋後魏諸國則兩朝平書之不主一邉年號只書甲子問正統之説自三代以下如漢書亦未純乎正統乃變中之正者如秦西晉隋則統而不正者如蜀東晉則正而不統者曰何必恁地論只天下為一諸侯朝覲獄訟皆歸便是得正統其有正有不正是随他做如何恁地論有始不得正統而後方得者是正統之始有始得正統而後不得者是正統之餘如秦初猶未得正統及始皇并天下方始得正統晉初亦未得正統自㤗康以後方始得正統隋初亦未得正統自滅陳後方得正統如本朝至太宗并了太原方是得正統又有無統時如三國南北五代皆天下分裂不能相君臣皆不得正統一作此時便是無統某嘗作通鑑綱目有無統之説此書今未及修後之君子必有取焉温公只要編年號相續此等處湏把一箇書帝書崩而餘書主書殂既不是他臣子又不是他史官只如旁人立看一般何故作此尊奉之態此等處合只書甲子而附註年號於其下如魏黄初㡬年蜀章武㡬年吳青龍㡬年之類方為是又問南軒謂漢後當以蜀漢年號繼之此説如何曰如此亦得他亦以蜀漢是正統之餘如東晉亦是正統之餘也又問東周如何曰畢竟周是天子又問唐後来多藩鎮割據一云唐末天子不能有其土地亦可謂正統之餘否則如何曰唐之天下甚濶所不服者只河北數鎮之地而已一云安得謂不能有其土地問宋齊梁陳正統如何書曰自古亦有無統時如周亡之後秦未帝之前自是無所統屬底道理南北亦只是並書又問東晉如何書曰宋齊如何比得東晉又問三國如何書曰以蜀為正蜀亡之後無多年便是西晉中國亦權以魏為正又問後唐亦可以繼唐否曰如何繼得問綱目主意曰主在正統問何以主在正統曰三國當以蜀漢為正而温公乃云某年某月諸葛亮入宼是冠屨倒置何以示訓縁此遂欲起意成書推此意修正處極多若成書當亦不下通鑑許多文字但恐精力不逮未必能成耳若度不能成則湏焚之綱目無正統處並書之不相主客通鑑於無統處湏立一箇為主某又㕘取史法之善者如權臣擅命多書以某人為某主某公范􅁮即書曹操自立為魏公綱目亦用此例揚雄荀彧二事按温公舊例凡莽臣皆書死如太師王舜之類獨於揚雄匿其所受莽朝官稱而以卒書似涉曲筆不免却按本例書之曰莽大夫揚雄死以為足以警夫畏死失節之流而初亦未改温公直筆之正例也荀彧却是漢侍中光禄大夫而㕘丞相軍事其死乃是自殺故但據實書之曰某官某人自殺而系於曺操擊孫權至濡湏之下非故以彧為漢臣也然悉書其官亦見其實漢天子近臣而附賊不忠之罪非與其為漢臣也此等處當時極費區處不審竟得免於後世之公論否胡氏論彧為操謀臣而刼遷九錫二事皆為董昭先發故欲少緩九錫之議以俟他日徐自發之其不遂而自殺乃劉穆之之類而宋齊丘於南唐事亦相似此論竊謂得彧之情因説通鑑提綱例凡逆臣之死皆書曰死至狄仁傑則甚疑之李氏之復雖出於仁傑然畢竟是死於周之大臣不奈何也教相随入死例書云某年月日狄仁傑死也伯恭大事記辨司馬遷班固異同處最好渠一日記一年渠大抵謙退不敢任作書之意故通鑑左傳已載者皆不載其載者皆左傳通鑑所無者耳有太纎巧處如指出公孫張湯姦狡處皆説得羞愧人伯恭少時被人説他不曉事故其論事多指出人之情偽云我亦知得有此意思不好東莱吕氏曰史官者萬世是非之權衡也禹不能褒鯀管蔡不能貶周公趙盾不能改董􅈢之書崔氏不能奪南史之簡公是公非舉天下莫之能移焉自古有國家者皆設史官典司言動凡出入起居發號施令必九思三省奠而後發兢兢慄慄恐播於汗簡貽萬世之譏是豈以王者之利勢而下制於一臣哉亦以公議所在不得不畏耳漢紹堯運置太史令以紀信書而司馬氏仍父子纂其軄軼材博識為史臣首遷述黄帝以来至于麟止勒成一家世號實錄武帝乃惡其直筆刋落其書嗚呼亦惑矣公議之在天下抑則揚塞則决窮則通縱能削一史官之書安能盡柅天下之筆乎問馬遷既漢武時人必能詳記武帝故實及觀武紀止言封禪禱祠神仙方士等事他全不及至八書中固有畧及武帝者然封禪書不過又述武紀所言平準書又何獨詳述武帝生財法至律書言兵又言文帝而不及武帝遷謂夫子春秋於定哀也則微亦湏畧舉宏綱而或詳載或不載既自不同若武紀猶可疑者潛室陳氏曰史記不専為漢史乃厯代之史故其紀漢事畧於漢書而紀武帝事獨詳若封禪平準二書雖謂之南史家風可也問漢史上自天文地理下至溝洫刑法皆為立志而選士之法最為近古何乃不為立志曰漢書缺典處兵無志選舉無志為太史公未作得此書故孟堅因陋就簡問太史公作史記上自唐虞而八書之作止言漢事班孟堅作漢史合紀漢一代事而乃作古今人表何耶曰八書未必皆言漢事獨平準書専言武帝其賛却説古今漢志雖為一代作然皆自古初述起獨古今人表専説古而不説今自悖其名先輩嘗譏之中間科等分别人物又煞有可議此却班史之贊畫蛇添足字學程子曰某寫字時甚敬非是要字好只此是學問張旭學草書見檐夫與公主争道及公孫大娘舞劒而後悟筆法莫是心常思念至此而感發否曰然湏是思方有感悟處若不思怎生得如此然可惜張旭留心於道若移此心於道何所不至張子曰草書不必近代有之必自筆劄已来便有之但寫得不謹便成草書其傳已久只是法備於右軍附以己書為説既有草書則經中之字傳寫失其真者多矣以此詩書之中字儘有不可通者問蒼頡作字亦非細人朱子曰此亦非自撰出自是理如此如心性等字未有時如何撰得只是有此理自流出二王書某曉不得看著只見俗了今有箇人書得如此好俗法帖上王帖中亦有寫唐人文字底亦有一釋名底此皆偽者字被蘇黄胡亂寫壊了近見蔡君謨一帖字字有法度如端人正士方是字山谷不甚理㑹得字故所論皆虚米老理㑹得故所論皆實嘉祐前前輩如此厚重胡安定於義理不分明然是甚氣象南海諸蕃書煞有好者字畫遒勁如古鐘鼎欵識諸國各不同風氣初開時此等事到處皆有開其先者不獨中國也或問古今字畫多寡之異曰古人篆籕筆畫雖多然無一筆可减今字如此簡約然亦不可多添一筆便是世變自然如此問何謂書窮八法曰只一㸃一畫皆有法度人言永字體具八法蔡行夫問張于湖字何故人皆重之曰也是好但是不把持愛放縱本朝如蔡忠恵以前皆有典則及至米元章黄魯直諸人出来便不肯恁地要之這便是世態衰下其為人亦然問明道先生云某寫字時甚敬非是要字好只此是學意謂此正在勿㤀勿助之間也今作字怱怱則不復成字是㤀也或作意令好則愈不能好是助也以此知持敬者正勿㤀勿助之間也曰若如此説則只是要字好矣非明道先生之意也問禮樂射御書數書莫只是字法否曰此類有數法如日月字是象其形也江河字是諧其聲也考老字是假其類也如此數法若理㑹得則天下之字皆可通矣臨川呉氏曰聲音用三十六字毋尚矣俗本傳訛而莫或正也羣當易以芹非當易以威知徹牀娘四字宜廢圭缺羣威四字宜増樂安陳晉翁以指掌圖為之節要卷首有切韻湏知於照穿牀娘下註曰已見某字母下於經堅輕牽檠䖍外别出扄涓傾圏瓊拳則宜廢宜増葢已瞭然矣倉頡字世謂之古文其别出者謂之古文竒字自黄帝以来至于周宣王二千年間中國所通行之字惟此而已史籕始畧變古法謂之大篆李斯又畧變籕法謂之小篆小篆大篆古文名則三實則小異而大同今世字書惟許氏説文最先然所纂皆秦小篆爾古文大篆僅存一二宋薛氏集古鐘鼎之文為五聲韻雖其所據有可信者有不可信者然使學者因是頗見三代以前之遺文其功實多秦丞相斯燔滅聖經負罪萬世而能損益倉史二家文字為篆書至今與日月相昺煥是固不可以罪掩其功也斯誅之後工其書以名世者誰歟七八百年僅見唐李陽氷又二百年僅見宋初徐鉉而已宋人能者多於唐而表表者不一二噫何其孤也哉葢亦有其故矣秦人茍簡煩碎峻迫以為治壹惟刀筆吏是任至以衡石程其書厭篆書繁難省徑為𨽻以便官府人惟便之趨則孰肯背時所向而甘心繁難者哉篆學之孤殆其勢之所必至噫篆之興繇於秦而篆之廢實亦繇於秦推所從来任吏之過也自𨽻興於秦而篆廢於漢其初不過圖簡便以適己而已漢𨽻之流為晉𨽻則又専務姿媚以悦人妍巧千状見者無不愛學者竭其精力以模擬之而患不似也夫字者所以傳經載道述史記事治百官察萬民貫通三才其為用大矣縮之以簡便華之以姿媚偏旁㸃畫浸浸失真弗省弗顧惟以悦目為姝何其小用之哉漢晉而後若唐若宋聲明文物之盛各三百年頗有肯尋斯籕之緒上追科斗鳥迹之遺者視漢晉為優然亦間見爾不易得也就二代而論唐之能者超於宋宋之能者多於唐科舉之學程子曰漢䇿賢良猶是人舉之如公孫𢎞者猶强起之乃就對至如後世賢良乃自求舉耳若果有曰我心只望廷對欲直言天下事則亦可尚矣若志在富貴則得志便驕縱失志則便放曠與悲愁而已人有習他經既而舎之習戴記問其故曰决科之利也某曰汝之是心已不可入於堯舜之道矣夫子貢之髙識何嘗規規於貨利哉特於豐約之間不能無留情耳且貧富有命彼乃留情於其間多見其不信道也故聖人謂之不受命有志於道者要當去此心而後可語也一云明道知扶溝縣事伊川侍行謝顯道将歸應舉伊川曰何不止試於太學顯道對曰蔡人尠習禮記决科之利也先生因云顯道乃止人多説某不教人習舉業某何嘗不教人習舉業也人若不習舉業而望及第却是責天理而不修人事但舉業既可以及第即已若更去上面盡力求必得之道是惑也或謂科舉事業奪人之功是不然且一月之中十日為舉業餘日即可為學然人不志於此必志於彼故科舉之事不患妨功惟患奪志龜山楊氏曰試教授宏辭科乃是以文字自售古人行己似不如此今之進士使豪傑者出必不肯就然以謂舎此則仕進無路故為不得已之計或是為貧或欲縁是少試其才既得官矣又以僥求榮達此何義哉朱子曰今来専去理㑹時文少間身已全做不是這是一項人又有一項人不理㑹時文去理㑹道理少間所做底事却與所學不相闗又有依本分就所見定是要躬行也不湏去講學這箇少間只是做得㑹差亦不至大狼狽只是如今這般人已是大段好了義理人心之所同然人去講求却易為力舉業乃分外事倒是難做可惜舉業壊了多少人士人先要分别科舉與讀書兩件孰輕孰重若讀書上有七分志科舉上有三分猶自可若科舉七分讀書三分将来必被他勝却况此志全是科舉所以到老全使不著葢不闗為己也聖人教人只是為己或以不安科舉之業請教曰道二仁與不仁而已二者不能兩立知其所不安則反其所不安以就吾安爾聖賢千言萬語只是敎人做人而已前日科舉之習葢未嘗不談孝弟忠信但用之非爾若舉而反之於身見於日用則安矣専做時文底人他説底都是聖賢説話且如説亷他且㑹説得好説義他也㑹説得好待他身做處只自不廉只自不義縁他将許多話只是就紙上説廉是題目上合説廉義是題目上合説義都不闗自家身已些子事告或人曰看今人心下自成兩様如何却専向功名利禄底心去却全背了這箇心不向道理邉来公今赴科舉是㡬年公文字想不為不精以公之専一理㑹做時文宜若一舉便中髙科登顯仕都了到今又却不得亦可自見得失不可必如此若只管没溺在裏面都出頭不得下梢只管衰塌若将這箇自在一邉湏要去理㑹道理是要緊待去取功名却未必不得専一做舉業工夫不待不得後枉了氣力便使能竭力去做又得到状元時亦自輸却這邉工夫了人於此事從来只是强勉不能捨命去做正似今人强勉来學義理然某平生窮理惟不敢自以為是士人亦有畧知向者然那下重掉不得如何知此下事如今凝神静慮積日累月如此尚只今日見得一件明日見得一件未有廓然貫通處况彼千頭萬緒支離其心未嘗一日用其力於此者耶科舉累人不淺人多為此所奪但有父母在仰事俯育不得不資於此故不可不勉爾其實甚奪人志以科舉為為親而不為為己之學只是無志以舉業為妨實學不知曾妨飲食否只是無志也或以科舉作舘廢學自咎者曰不然只是志不立不曽做工夫爾孔子曰不怨天不尤人自是不當怨尤要你做甚耶伊川曰學者為氣所勝習所奪只可責志正為此也若志立則無處無工夫而何貧賤患難與夫夷狄之間哉舉業亦不害為學前輩何嘗不應舉只縁今人把心不定所以有害纔以得失為心理㑹文字意思都别了嘗論科舉云非是科舉累人自是人累科舉若髙見逺識之士讀聖賢之書據吾所見而為文以應之得失利害置之度外雖日日應舉亦不累也居今之世使孔子復生也不免應舉然豈能累孔子耶自有天資不累於物不湏多用力以治之者某於科舉自小便見得輕初亦非有所見而輕之也正如人天資有不好啖酒者見酒自惡非知酒之為害如何也又有人天資不好色者亦非是有見如何自是他天資上看見那物事無緊要若此者省得工夫去治此一項今或未能如此湏用力勝治方可問許叔重太貪作科舉文字曰既是家貧親老未免應舉亦當好與他做舉業舉業做不妨只是先以得失横置胷中却害道或問科舉之學曰做舉業不妨只是把格式櫽括自家道理都無那追逐時好回避忌諱底意思便好北溪陳氏曰聖賢學問未嘗有妨於科舉之文理義明則文字議論益有精神光采躬行心得者有素則形之商訂時事敷陳治體莫非溢中肆外之餘自有以當人情中物理藹然仁義道徳之言一一皆可用之實也潛室陳氏曰應舉求合程度此乃道理當爾乃若不合程度而萌僥倖之心不守尺寸而起冒為之念此則妄矣應舉何害義理但克去此等妄念方是真實舉子雙峯饒氏曰義理與舉業初無相妨若一日之間上半日将經傳討論義理下半日理㑹舉業亦何不可况舉業之文未有不自義理中出者若講明得義理通透則識見髙人行文條暢舉業當益精若不通義理則識見凡下議論淺近言語陋俗文字中十病九痛不自知覺何縁做得好舉業雖没世窮年從事於此亦無益也性理大全書卷五十五

body:
  text: 性理大全書卷三十五性理七仁程子曰天地之大徳曰生天地絪緼萬物化醇生之謂性萬物之生意最可觀此元者善之長也斯所謂仁也又曰非仁則無以見天地仁者以天地萬物為一體莫非我也如其皆我何所不盡不能有諸己則其與天地萬物豈特相去千萬而已哉自古不曾有人解仁字之義須是道與他分别出五常若只是兼體却只有四也且譬一身仁頭也其他四端手足也至如易雖言元者善之長然亦須通四徳以言之問仁曰此在諸公自思之将聖賢所言仁處類聚觀之體認出来孟子曰惻隠之心仁也後人遂以愛為仁惻隠固是愛也愛自是情仁自是性豈可專以愛為仁孟子言惻隠為仁盖為前已言惻隠之心仁之端也既曰仁之端則不可便謂之仁退之言博愛之謂仁非也仁者固博愛然便以博愛為仁則不可仁者必愛指愛為仁則不可不仁者無所知覺指知覺為仁則不可觀物於静中皆有春意切脉最可體仁觀雞雛此可觀仁仁之道要之只消道一公字公只是仁之理不可将公便喚做仁公而以人體之故為仁只為公則物我兼照故仁所以能恕所以能愛恕則仁之施愛則仁之用也人之一肢病不知痛癢謂之不仁人之不仁亦猶是也盖不知人道之在己也知仁道之在己而由之乃仁也視聴言動一於禮謂之仁仁則一不仁則二大率把捉不定皆是不仁去不仁則仁存學者識得仁體實有諸己只要義理栽培如求經義皆栽培之意仁者渾然與物同體義禮智信皆仁也識得此理以誠敬存之而已至仁則天地為一身而天地之間品物萬形為四肢百體夫人豈有視四肢百體而不愛者哉聖人仁之至也獨能體是心而已曷嘗支離多端而求之自外乎故能近取譬者仲尼所以示子貢以為仁之方也醫書有以手足風頑謂之四體不仁為其疾痛不以累其心故也夫手足在我而疾痛不與知焉非不仁而何世之忍心無恩者其自棄亦若是而已孟子云仁也者人也合而言之道也中庸所謂率性之謂道是也仁者人此者也敬以直内義以方外仁也若以敬直内則便不直矣行仁義豈有直乎必有事焉而勿正則直也夫能敬以直内義以方外則與物同矣故曰敬義立而徳不孤是以仁者無對放之東海而凖放之西海而凖放之南海而凖放之北海而凖醫家言四體不仁最能體仁之名也張子曰虚者仁之原禮義者仁之用虚則生仁仁在理以成之敦厚虚静仁之本敬和接物仁之用龜山楊氏曰論語言仁處皆仁之方也若正所謂仁則未之甞言也故曰子罕言利與命與仁要道得親切惟孟子言仁人心也最為親切李似祖問何以知仁曰孟子以惻隠之心為仁之端平居但以此體究乆乆自見因問似祖尋常如何説隠似祖云如有隠憂勤恤民隠皆疾痛之謂也曰孺子将入井而人見之者必有惻隠之心疾痛非在己也而為之疾痛何也似祖曰出於自然不可已也曰安得自然如此若體究此理知其所從来則仁之道不逺矣上蔡謝氏曰心者何也仁是已仁者何也活者為仁死者為不仁今人身體麻痺不知痛癢謂之不仁桃杏之核可種而生者謂之桃仁杏仁言有生之意推此仁可見矣問一日静坐見一切事平等皆在我和氣中此是仁否曰此只是静中工夫只是心虚氣平也須是應事時有此氣象方好仁者天之理非杜撰也故哭死而哀非為生也經徳不回非干祿也言語必信非正行也天理當然而已矣當然而為之是為天之所為也聖門學者大要以克己為本克己復禮無私心焉則天矣和靖尹氏曰鮑某嘗問伊川仁者愛人便是仁乎伊川云愛人仁之事耳焞時侍坐歸因取論語中説仁事致思乆之忽有所得遂見伊川請益曰某以仁惟公可盡之伊川沉思乆之云思而至此學者所難及也天心所以至仁者惟公爾人能至公便是仁謝收嘗問學於伊川伊川云學之大無如仁汝謂仁是如何謝乆之無入處一日再問愛人是仁否伊川云愛人乃仁之端非仁也謝收去焞因曰某謂仁者公而已伊川云何謂也焞曰能好人能惡人伊川云善涵養不易見得到此延平李氏答朱元晦書曰仁字難説論語一部只是説與門弟子求仁之方知所以用心庶㡬私欲沈天理見則知仁矣如顔子仲弓之問聖人所以答之之語皆其切要用力處也孟子曰仁人心也心體通有無貫幽明無不包括與人指示於發用處求之也又曰仁者人也人之一體便是天理無所不備具若合而言之人與仁之名亡則渾是道理也来諭以謂仁是心之正理能發能用底一箇端緒如胎育包涵其中生氣無不純備而流動發生自然之機又無頃刻停息憤盈發洩觸處貫通體用相循初無間㫁此説推擴得甚好但又云人之所以為人而異乎禽獸者以是而已若犬之性牛之性則不得而與焉若如此説恐有礙盖天地中所生物本源則一雖禽獸草木生理亦無頃刻停息間㫁者但人得其秀而最靈五常中和之氣所聚禽獸得其偏而已此其所以異也若謂流動發生自然之機與夫無頃刻停息間㫁即禽獸之體亦自如此若以為此理唯人獨得之即恐推測體認處未精於他處便有差也又云須體認到此純一不雜處方見渾然與物同體氣象一段語却無病又云從此推出分殊合宜處便是義以下數句莫不由此而仁一以貫之盖五常百行無往而非仁也此説大槩是然細推之却似不曾體認得伊川所謂理一分殊龜山云知其理一所以為仁知其分殊所以為義之意盖全在知字上用着力也謝上蔡語錄云不仁便是死漢不識痛癢了仁字只是有知覺了了之體段若於此不下工夫令透徹即何縁見得本源毫髪之分殊哉若於此不了了即體用不能兼舉矣此正是本源體用兼舉處人道之立正在於此仁之一字正如四徳之元而仁義二字正如立天道之隂陽立地道之柔剛皆包攝在此二字爾大抵學者多為私欲所昏故用力不精不見其效若欲於此進步須把㫁諸路頭静坐黙識使之泥滓漸漸消去方可不然亦只是説也更熟思之朱子曰天地以生物為心者也而人物之生又各得夫天地之心以為心者也故語心之徳雖其總攝貫通無所不備然一言以蔽之則曰仁而已矣盖天地之心其徳有四曰元亨利貞而元無不統其運行焉則為春夏秋冬之序而春生之氣無所不通故人之為心其徳亦有四曰仁義禮智而仁無不包其發用焉則為愛恭宜别之情而惻隠之心無所不貫故論天地之心者則曰乾元坤元則四徳之體用不待悉數而足論人心之妙者則曰仁人心也則四徳之體用亦不待遍舉而該盖仁之為道乃天地生物之心即物而在情之未發而此體已具情之既發而其用不窮誠能體而存之則衆善之源百行之本莫不在此此孔門之教所以必使學者汲汲於求仁也其言有曰克己復禮為仁言能克去己私復乎天理則此心之體無不在而此心之用無不行也又曰居處恭執事敬與人忠則亦所以存此心也又曰事親孝事兄弟及物恕則亦所以行此心也又曰求仁得仁則以讓國而逃諫伐而餓為能不失乎此心也又曰殺身成仁則以欲甚於生惡甚於死為能不害乎此心也此心何心也在天地則坱然生物之心在人則温然愛人利物之心包四徳而貫四端者也或曰若子之言則程子所謂愛情仁性不可以愛為仁者非歟曰不然程子之所謂以愛之發而名仁者也吾之所論以愛之理而名仁者也盖所謂情性者雖其分域之不同然其脉絡之通各有攸属者則曷嘗判然離絶而不相管哉吾方病夫學者誦程子之言而不求其意遂至於判然離愛而言仁故特論此以發明其遺意而子顧以為異乎程子之説不亦誤哉或曰程氏之徒言仁多矣盖有謂愛非仁而以萬物與我為一為仁之體者矣陳淵問楊龜山曰萬物與我為一其仁之體乎曰然亦有謂愛非仁而以心有知覺釋仁之名者矣上蔡謝氏曰心有所覺謂之仁仁則心與事為一草木五榖之實謂之仁取名于生也生則有所覺矣四體之偏痺謂之不仁取名于不知覺也不知覺則死矣事有感而隨之以喜怒哀樂應之以酬酢萬變者非知覺不能也身與事接而心漠然不省者與四體不仁無異也然則不仁者雖生無以異于死雖有心亦鄰于無心雖有四體亦弗為吾用也故視而弗見聴而弗聞食而不知其味此善學者所以急急于求仁也今子之言若是然則彼皆非歟曰彼謂物我為一者可以見仁之無不愛矣而非仁之所以為體之真也彼謂心有知覺者可以見仁之包乎智矣而非仁之所以得名之實也觀孔子答子貢博施濟衆之問與程子所謂覺不可以訓仁者則可見矣予尚安得復以此而論仁哉抑泛言同體者使人含糊昏緩而無警切之功其弊或至於認物為己者有之矣専言知覺者使人張皇迫躁而無沉潜之味其弊或至於認欲為理者有之矣一忘一助二者盖胥失之而知覺之云者於聖門所云樂山能守之氣象尤不相似予尚安得復以此而論仁哉因并記其語作仁説問仁者天地生物之心曰天地之心只是箇生凡物皆是生方有此物如草木之萌芽枝葉條榦皆是生方有之人物所以生生不窮者以其生也才不生便乾枯死了這箇是統論一箇仁之體仁也者天地所以生物之心而人物之所得以為心者也惟其得夫天地生物之心以為心是以未發之前四徳具焉曰仁義禮智而仁無不統已發之際四端著焉曰惻隠羞惡辭遜是非而惻隠之心無所不通此仁之體用所以涵育渾全周流貫徹專一心之妙而為衆善之長也問四徳之元猶五常之仁偏言則一事專言則包四者曰須先識得元與仁是箇甚物事更就自家身上看甚麽是仁甚麽是義禮智既識得這箇便見得這一箇能包得那數箇元只是初底便是如木之萌如草之芽其在人如惻然有隠初来底意思便是所以程子謂看雞雛可以觀仁為是那嫩小底便是仁底意思在楊道夫曰如先生之言正是程子説復其見天地之心復之初爻便是天地生物之心也曰今只將公所見看所謂心譬如榖種生之性便是仁陽氣發處乃情也觀之便見問仁者心之徳愛之理曰仁者心之徳猶言潤者水之徳燥者火之徳愛之理猶言水之根木之源試以此意思之仁者愛之理理是根愛是苗仁之愛如糖之甜醋之酸愛是那滋味仁是根愛是苗不可便喚苗做根然而這箇苗却定是從那根上来愛是惻隠惻隠是情其理則謂之仁心之徳徳又只是愛謂之心之徳却是愛之本柄心之徳是統言愛之理是就仁義禮智上分説如義便是宜之理禮便是别之理智便是知之理但理㑹得愛之理便理㑹得心之徳又曰愛雖是情愛之理是仁也仁者愛之理愛者仁之事仁者愛之體愛者仁之用愛是箇動物事理是箇静物事理便是性緣裏面有這愛之理所以發出来無不愛程子曰心如榖種其生之性乃仁也生之性便是愛之理問渾然無私便是愛之理行仁而有得於己便是心之徳否曰如此解釋文義亦可但恐本領上未透徹爾又問一性禀於天而萬善皆具仁義禮智所以分統萬善而合為一性者也方寂然不動此理完然是為性之本體及因事感發而見於中節之時則一事所形一理隨著一理之當一善之所由得仁固性也而見於事親從兄之際莫非仁之發也有子謂孝弟行仁之本説者於是以愛言仁而愛不足以盡之以心喻仁而心實宰之必曰仁者愛之理然後仁之體明曰仁者心之徳然後仁之用顯學者識是愛之理而後可以全此心之徳如何曰大意固如此然説得未明只看文字意脉不接續處便是見得未親切曰莫是不合分體用言之否曰然只是一箇心便自具了仁之體用喜怒哀樂未發處是體發於惻隠處便却是情因舉天地萬物同體之意極問其理曰須是近裏著身推究未干天地萬物事也須知所謂心之徳者即程先生榖種之説所謂愛之理者則正謂仁是未發之愛愛是已發之仁爾只以此意推之不須外邊添入道理若於此處認得仁字即不妨與天地萬物同體若不㑹得便将天地萬物同體為仁却轉無交涉矣孔門之教説許多仁却未曾正定説出盖此理直是難言若立下一箇定説便該括不盡且只於自家身分上體究乆之自然通達程子謂四徳之元猶五常之仁偏言則一事専言則􅊶四者須是統看仁如何却包得數者又却分看義禮智信如何亦謂之仁大抵於仁上見得盡須知發於剛果處亦是仁發於辭遜是非亦是仁且欵曲研究識盡全體正猶觀山所謂横看成嶺直看成峰若自家見他不盡初謂只是一嶺及少時又見一峯出来便是未曾盡見全山到底無定據也問仁者以天地萬物為一體此即人物初生時騐之可見人物均受天地之氣而生所以同一體如人兄弟異形而皆出父母胞胎所以皆當愛故推老老之心則及人之老推幼幼之心則及人之幼惟仁者其心公溥實見此理故能以天地萬物為一體否曰人與萬物均受此氣均受此理所以皆當愛便是不如此愛字不在同體上説自不属同體事他那物事自是愛這箇是説那無所不愛了方能得同體若愛則是自然愛不是同體了方愛惟其同體所以無所不愛所以愛者以其有此心也所以無所不愛者以其同體也仁者愛之理只是愛之道理猶言生之性愛則是理之見於用者也盖仁性也性只是理而已愛是情情則發於用性者指其未發故曰仁者愛之理情則已發故曰愛者仁之用問仁者愛之理曰這一句只将心性情看便分明一身之中渾然自有箇主宰者心也有仁義禮智則是性發為惻隠羞惡辭遜是非則是情惻隠愛也仁之端也仁是體愛是用又曰愛之理愛自仁出也然亦不可離了愛去説仁問韓愈博愛之謂仁曰是指情為性了問周子説愛曰仁與博愛之説如何曰愛曰仁猶曰惻隠之心仁之端也是就愛處指出仁若博愛之謂仁之謂便是把博愛做仁了終不同以生字説仁生自是上一節事當来天地生我底意我而今須要自體認得試自看一箇物堅硬如頑石成甚物事此便是不仁藹乎若春陽之温汎乎若醴酒之醇此是形容仁底意思仁是根惻隠是萌芽親親仁民愛物便是推廣到枝葉處問伊川云萬物之生意最可觀曰物之初生其夲未逺固好㸔及榦成葉茂便不好看如赤子入井時惻隠怵惕之心只些子仁見得時却好看到得發政施仁其仁固廣便看不見得何處是仁萬物之生天命流行自始至終無非此理但初生之際淳粹未散尤易見爾只如元亨利貞皆是善而元則為善之長亨利貞皆是那裏来仁義禮智亦皆善也而仁則為萬善之首義禮智皆從這裏出爾仁自是箇和柔底物事譬如物之初生自較和柔及至夏間長茂方始稍堅硬秋則収結成實冬則斂藏然四時生氣無不該貫如程子説生意處非是説以生意為仁只是説生物皆能發動死物則都不能譬如榖種蒸殺則不能生也又曰以糓種譬之一粒糓春則發生夏則成苗秋則結實冬則収藏生意依舊包在裏面每箇榖子裏有一箇生意藏在裏面種而後生也仁義禮智亦然又曰仁與禮自是有箇發生底意思義與智自是有箇收斂底意思或問仁有生意如何曰只此生意心是活物必有此心乃能知辭遜必有此心乃能知羞惡必有此心乃能知是非此心不生又烏能辭遜羞惡是非且如春之生物也至於夏之長則是生者長秋之遂亦是生者遂冬之成亦是生者成也百榖之熟方及七八分若斬㫁其根則生者䘮矣其榖亦只得七八分若生者不䘮須及十分収而藏之生者似息矣只明年種之又復有生問曩者論仁包四者䝉教以初底意思看仁昨觀孟子四端處似頗認得此意曰如何曰仁者生之理而動之機也惟其運轉流通無所間㫁故謂之仁故能貫通四者曰這自是難説他自活今若恁地看得来只見得他用處不見他體了問生之理便是體否曰若要見得分明只看程先生説心譬如榖種生之性便是仁便分明若更要真實識得仁之體只看夫子所謂克己復禮克去己私如何便喚得做仁曰若如此看則程子所謂公字愈覺親切曰公也只是仁底殻子盡他未得在畢竟裏面是箇甚物事生之性也只是状得仁之體問仁包四徳如元者善之長從四時生物意思觀之則隂陽都偏了曰如此則秋冬都無生物氣象但生生之意至此退了到得退未盡處則陽氣依舊在問周子牕前草不除去即是謂生意與自家一般曰他也只是偶然見與自家意思相契又問横渠驢鳴是天機自動意思曰固是他也是偶然見他如此如謂草與自家意一般木葉便不與自家意思一般乎如驢鳴與自家呼喚一般馬鳴便不與自家一般乎問程子觀天地生物氣象也是如此曰他也只是偶然見如此便説出来示人而今不成只管去守看生物氣象問程子謂切脉可以體仁莫是心誠求之之意否曰還是切脉底是仁那脉是仁曰切脉是仁曰若如此則當切脉時又用着箇意思去體仁復問童蜚卿曰切脉體仁又如何曰脉是那血氣周流切脉則便可以見仁曰然恐只是恁地脉理貫通乎一身仁之理亦是恁地又問雞雛如何是仁楊道夫曰先生嘗謂初與嫩底便是曰如此㸔較分明盖當是時飲啄自如未有所謂争鬪侵凌之患者只此便是仁也問觀雞雛此可觀仁何也曰凡物皆可觀此偶見雞雛而言耳小小之物生理悉具問聖賢言仁有專指體而言者有包體用而言者曰仁對義禮智言之則為體専言之則兼體用孔子説仁多説體孟子説仁多説用如克己復禮惻隠之心之類以心之徳而專言之則未發是體已發是用以愛之理而偏言之則仁便是體惻𨼆是用問程子云仁道難言唯公近之非以公訓仁當公之時仁之氣象於此固可嘿識然學者之於仁非徒欲識之而已仁是愛底道理公是仁底道理故公則仁仁則愛公却是仁發處無公則仁行不得公之為仁公不可與仁比並看公只是無私纔無私這仁便流行程先生云唯公為近之却不是近似之近纔公仁便在此故云近猶云知所先後則近道矣不是道在先後上只知先後便近於道如去其壅塞則水自流通水之流通却不是去壅塞底物事做出來水自是元有只被塞了纔除了塞便流仁自是元有只被私意隔了纔克去己私做底便是仁葉賀孫問公是仁之體仁是理曰不用恁地説徒然不分曉只公是無私無私則理無或蔽今人喜也是私喜怒也是私怒哀也是私哀懼也是私懼愛也是私愛惡也是私惡欲也是私欲茍能克去己私擴然大公則喜是公喜怒是公怒哀懼愛惡欲莫非公矣此處煞係利害顔子所授於夫子只是克己復禮為仁或問仁與公之别曰仁在内公在外又曰惟仁然後能公又曰仁是夲有之理公是克己工夫極至處故惟仁然後能公理甚分明故程子曰公而以人體之則是克盡己私之後只就自身上看便見得仁也公而以人體之故為仁盖公猶無塵也人猶鏡也仁則猶鏡之光明也鏡無纎塵則光明人能無一毫之私欲則仁然鏡之明非自外求也只是鏡元来自有這光明今不為塵所昏耳人之仁亦非自外得也只是人心元来自有這仁今不為私欲所蔽耳故人無私欲則心之體用廣大流行而無時不仁所以能愛能恕仁之道只消道一公字非以公為仁須是公而以人體之伊川自曰不可以公為仁世有以公為心而􅆭刻不恤者須公而有惻隠之心此功夫却在人字上盖人體之以公方是仁若以私欲則不仁矣仁是人心所固有之理公則仁私則不仁未可便以公為仁須是體之以人方是仁公恕愛皆所以言仁者也公在仁之前恕與愛在仁之後公則能仁仁則能愛能恕故也問公而以人體之故為仁竊謂此段之意人字只是指吾此身而言與中庸言仁者人也之人自不同不必重看緊要却在體字上盖仁者心之徳主性情宰萬事本是吾身至親至切底物公只是仁之理専言公則只虚空説著理而不見其切於己故必以身體之然後我與理合而謂之仁亦猶孟子合而言之道也然公果如之何而體如之何而謂之仁亦不過克盡己私至於此心豁然瑩净光潔徹表裏純是天理之公生生無間㫁則天地生物之意常存故其寂而未發惺惺不昧如一元之徳昭融於地中之復無一事一物不涵在吾生理之中其隨感而動也惻然有隠如春陽發達於地上之豫無一事非此理之貫無一物非此生意之所被矣此體公之所以為仁所以能恕所以能愛雖或為義為禮為智為信無所往而不通也不審是否曰此説得之問公所以能恕所以能愛恕則仁之施愛則仁之用愛是仁之發處恕是推其愛之之心以及物否曰如公所言亦非不是只是自是凑合不著都無滋味又問莫是帶那上文公字説否曰然恕與愛本皆出於仁然非公則安能恕安能愛又問愛只是合下發處便愛未有以及物在恕則方能推己以及物否曰仁之發處自是愛恕是推那愛底愛是恕之所推者若不是恕去推那愛也不能及物也不能親親仁民愛物只是自愛而已若裏面元無那愛又只推箇甚麽如開􅗂相似是裏面元有這水所以開着便有水來若裏面元無此水如何㑹開着便有水若不是去開溝縱有此水也如何得他流出来愛水也開之者恕也又問若不是推其愛以及物縱有此愛也無可得及物否曰不是無可得及物若不能推則不能及物或問恕則仁之施愛則仁之用施與用如何分别曰恕之所施施其愛爾不恕則雖有愛而不能及人也又曰施是從這裏流出用是就事説推己為恕恕是從己流出去及那物愛是才調恁地愛如水恕如水之流又問先生謂愛如水恕如水之流退而思有所未合竊謂仁如水愛如水之潤恕如水之流不審如何曰説得好昨日説過了又曰恕是分俵那愛底如一桶水愛是水恕是分俵此水何處一杓故謂之施愛是仁之用恕所以施愛者又曰施用两字移動全不得這般處惟有孔孟能如此下自荀楊諸人便不能便不移易者昔有言盡己之謂忠盡物之謂恕伊川言盡物只可言信推己之謂恕盖恕是推己只可言施如此等處極當細看上蔡以知覺言仁只知覺得那應事接物底如何便喚做仁須是知覺那裏方是且如一件事是合做與不合做覺得這箇方是仁喚着便應抉着便痛這是心之流注在血氣上底覺得那理之是非這方是流注在理上底喚着不應抉着不痛這固是死人固是不仁喚得應抉着痛只這便是仁則誰箇不㑹如此須是分作三截看那不聞痛癢底是不仁只覺得痛癢不覺得理底雖㑹那一等也不便是仁須是覺這理方是或問謝上蔡以覺言仁是如何曰覺者是要覺得箇道理須是分毫不差方能全得此心之徳這便是仁若但知得箇痛癢則凡人皆覺得豈盡是仁者耶醫者以頑痺為不仁以其不覺故謂之不仁不覺固是不仁然便謂覺是仁則不可問程門以知覺言仁克齋記乃不取何也曰仁離愛不得上蔡諸公不把愛做仁他見伊川言博愛非仁也仁是性愛是情伊川也不是道愛不是仁若當初有人㑹問必説道愛是仁之情仁是愛之性如此方分曉惜門人只領那意便專以知覺言之於愛之説若将凂焉遂蹉過仁地位去説将仁更無安䪺處見孺子匍匐将入井皆有怵惕惻隠之心這處見得親切聖賢言仁皆從這處説又問知覺亦有生意曰固是将知覺説来冷了覺在知上却多些小搭在仁邉仁是和底意然添一句又成一重須自㸔得便都理㑹得答張敬夫書曰胡廣仲引孟子先知先覺以明上蔡心有知覺之説己自不倫其謂知此覺此亦未知指何為説要之大本既差勿論可也今觀所示乃直以此為仁則是以知此覺此為知仁覺仁也仁本吾心之徳又将誰使知之而覺之邪若據孟子本文則程子釋之已詳矣曰知是知此事知此事當如此也覺是覺此理知此事之所以當如此之理也意已分明不必更求𤣥妙且其意與上蔡之意亦初無干涉也上蔡所謂知覺正謂知寒暖飽飢之類耳推而至於酬酢佑神亦只是此知覺無别物也但所用有小大爾然此亦只是智之發用處但惟仁者為能兼之故謂仁者心有知覺則可謂心有知覺謂之仁則不可盖仁者心有知覺乃以仁包四者之用而言猶云仁者知所羞惡辭讓云爾若曰心有知覺謂之仁則仁之所以得名初不為此也今不究其所以得名之故乃指其所兼者便為仁體正如言仁者必有勇有徳者必有言豈可遂以勇為仁言為徳哉又答曰来教云夫其所以與天地萬物一體者以夫天地之心之所有是乃生生之藴人與物所公共所謂愛之理也熹詳此數句似頗未安盖仁只是愛之理人皆有之然人或不公則於其所當愛者反有所不愛惟公則視天地萬物皆為一體而無所不愛矣若愛之理則是自然本有之理不必為天地萬物同體而後有也熹向所呈似仁説其間不免尚有此意方欲改之而未暇来教以為不如克齋之云是也然於此却有所未察竊謂莫若将公字與仁字且各作一字㸔得分明然後却看中間两字相近處之為親切也若遽混而言之乃是程子所以訶以公便為仁之失此毫釐間正當子細也又㸔仁字當并義禮智字看然後界限分明見得端的今舍彼三者而獨論仁字所以多説而易差也又謂體用一源内外一致為仁之妙此亦未安盖義之有羞惡禮之有恭敬智之有是非皆内外一致非獨仁為然也南軒張氏與朱子書曰仁之為説推原其本人與天地萬物一體也是以其愛無所不至猶人之身無分寸之膚而不貫通則無分寸之膚不爱也故以惟公近之之語形容仁體最為親切欲人體夫所以愛者言仁然爱字只是明得其用必曰仁者愛之理乃更親切夫其所以與天地一體者以夫天地之心之所存是乃生生之藴人與物所公共所謂愛之理者此也故探其本則未發之前愛之理存乎性是乃仁之體察其動則已發之際愛之施被乎物是乃仁之用體用一源内外一致此仁之所以為妙也又答曰程子言仁本末甚備今撮其大要不過數言盖曰仁者生之性也而愛其情也孝悌其用也公者所以體仁猶言克己復禮為仁也學者於前三言者可以識仁之名義於後一言者可以知其用力之方矣今不深考其本末指意之所在但見其分别性情之異便謂愛之與仁了無干涉見其以公為近仁便謂直指仁體最為深切殊不知仁乃性之徳而愛之本因其性之有仁是以其情能愛但或蔽於有我之私則不能盡其體用之妙惟克己復禮廓然大公然後此體渾全此用昭著動静本末血脉貫通爾程子之言意盖如此非謂愛之與仁了無干涉也此説前書言之已詳今請復以两言决之如熹之説則性發為情情根於性未有無性之情無情之性各為一物而不相管攝二説得失此亦可見非謂公之一字便是直指仁體也細觀来喻所謂公天下而無物我之私則其愛無不溥矣不知此两句甚處是直指仁體處若以愛無不溥為仁之體則陷於以情為性之失髙明之見必不至此若以公天下而無物我之私便為仁體則恐所謂公者漠然無情但如虚空木石雖其同體之物尚不能有以相愛况能無所不溥乎然則此两句中初未嘗有一字説着仁體須知仁是夲有之性生物之心惟公為能體之非因公而後有也故曰公而以人體之故為仁細㸔此語却是人字裏面帶得仁字過来由漢以来以愛言仁之弊正為不察性情之辨而遂以情為性爾今欲矯其弊反使仁字汎然無所歸宿而性情遂至於不相管可謂矯枉過直是亦枉而已矣其弊将使學者終日言仁而實未嘗識其名義且又并與天地之心性情之徳而昧焉竊謂程子之意必不如此南軒書云仁説如天地以生物為心之語平㸔雖不妨然不若只云天地生物之心人得之為人之心似完全仁道難明惟公近之然不可便以公為仁又曰公而以人體之故為仁此意指仁之體極為深切愛只是情盖公天下而無物我之私焉則其愛無不溥矣如此看乃可由漢以来言仁者盖未嘗不以愛為言也問愛之理實具于心心之徳發而為愛否曰解釋文義則可實下工夫當如何曰據其已發之愛則知其為心之徳指其未發之仁則知其為愛之理曰某記少時與人講論此等道理見得未真又不敢㫁定觸處問人自為疑惑皆是臆度所致至今思之可笑須是就自己實做工夫處分明見得這箇道理意味自别如克己復禮則如何為仁居處恭執事敬與出門如見大賓之類亦然克己復禮本非仁却須從克己復禮中尋究仁在何處親切貼身體驗出来不須向外處求周謨曰平居持養只克去己私便是本心之徳流行發見無非愛而已曰此語近正如䟽導溝渠初為物所壅蔽才䟽導得通則水自流行克己復禮便是䟽導意思流行處便是仁問敦厚虚静者仁之本曰敦厚虚静是為仁之本又問虛者仁之原曰虚只是無欲故虚虚明無欲此仁之所由生也又問此虚字與一大清虚之虚如何曰這虚也只是無欲渠便将這箇喚做道體然虚對實而言却不似形而上者程子云大率把捉不定皆是不仁問心之本體湛然虚明無一毫私欲之累則心徳未嘗不存矣把捉不定則為私欲所亂是心外馳而其徳亡矣曰如公所言則是把捉不定故謂之不仁今此但曰皆是不仁乃是言惟其不仁所以致把捉不定也余正叔謂無私欲是仁曰謂之無私欲然後仁則可謂無私便是仁則不可盖惟無私欲而後仁始見如無所壅底而後水方行方叔曰與天地萬物為一體是仁曰無私是仁之前事與天地萬物為一體是仁之後事唯無私然後仁惟仁然後與天地萬物為一體要在二者之間識得畢竟仁是甚模様欲曉得仁名義須并義禮智三字看欲真箇見得仁底模様須是從克己復禮做工夫去今人説仁如糖皆道是甜不曾喫着不知甜是甚滋味聖人都不説破在學者以身體之而已矣問程子云敬以直内義以方外仁也如何以此便謂之仁曰亦是仁也若能到私欲净盡天理流行處皆可謂之仁問存得此心便是仁曰且要存得此心不為私欲所勝遇事每每着精神照管不可隨物流去須要緊緊守着若常存得此心應事接物雖不中不逺思慮紛擾于中都是不能存此心此心不存合視處也不知視合聴處也不知聴或問莫在於敬否曰敬非别是一事常喚醒此心便是人每日只鶻鶻突突過了心都不曾収拾得在裏面又曰仁雖似有剛直意畢竟本是箇温和之物但出来發用時有許多般須得是非辭遜㫁制三者方成仁之事及至事定三者各退仁仍舊温和緣是他本性如此人但見有是非節文㫁制却謂都是仁之本意則非也春本温和故能生物所以説仁如春問求仁曰看來仁字只是箇渾淪底道理如大學致知格物所以求仁也中庸博學審問謹思明辨力行亦所以求仁也學者須是求仁所謂求仁者不放此心聖人亦只教人求仁盖仁義禮智四者仁足以包之若是存得仁自然頭頭做着不用逐事安排故曰茍志於仁矣無惡也今看大學亦要識此意所謂顧諟天之明命無他求其放心而已前軰教人求仁只説是淵深温粹義理飽足問仁曰聖賢説話有説自然道理處如仁人心是也有説做工夫處如克己復禮是也二程先生之前學者全不知有仁字凡聖賢説仁處不過只作愛字看了自二先生以來學者始知理㑹仁字不敢只作愛説然其流復不免有弊者盖専務説仁而於􅋵存涵泳之功不免有所忽略故無復優柔厭飫之味克己復禮之實不但其蔽也愚而已而又一向離了愛字懸空揣摸既無真實見處故其為説恍惚驚怪弊病百端殆反不若全不知有仁字而只作愛字看却之為愈也某竊嘗謂若實欲求仁固莫若力行之近但不學以明之則有摘埴㝠行之患故其蔽愚若主敬致知交相為助則自無此蔽矣若且欲曉得仁之名義則又不若且將愛字推求若見得仁之所以愛而愛之所以不能盡仁則仁之名義意思瞭然在目矣初不必求之於恍惚有無之間也南軒張氏曰仁者天下之正理此言仁乃天下之正理也天下之正理而體之於人所謂仁也若一毫之偏則失其正理而為不仁矣勉齋黄氏曰仁包四者包字須看得出嘗記朱先生云未發則有仁義禮智之性而仁則包四徳已發則有惻隠羞惡恭敬是非之情而惻隠則貫四端貫字如一箇物串在四箇物裏面過包字如四箇物都合在一箇物裏面北溪陳氏曰仁道甚廣大精微可以用處只為愛而發見之端為惻𨼆又曰仁是此心生理全處常生生不息故其端緒方從心中萌動發出來自然惻然有隠由惻隠而充及到那物上遂成愛故仁乃是愛之根而惻𨼆則根之萌芽而愛則又萌芽之長茂已成者也觀此則仁者愛之理愛者仁之用自可見得脉絡相闗處矣孔門教人求仁為大只専言仁以仁包萬善能仁則萬善在其中矣至孟子乃兼仁義對言之猶四時之隂陽也自孔門後人都不識仁漢人只把做恩愛説是又太泥了愛又就上起樓起閣将仁看得全粗了故韓子遂以博愛為仁至程子始分别得明白謂仁是性愛是情然自程子此言一出門人又将愛全掉了一向求髙逺去不知仁是愛之性愛是仁之情愛雖不可以正名仁而仁亦豈能離得愛上蔡遂専以知覺言仁夫仁者固能知覺謂知覺為仁則不可若轉一步看只知覺純是理便是仁也龜山又以萬物與我為一為仁體夫仁者固能與萬物為一謂與萬物為一為仁則不可此乃是仁之量若能轉来看只於與物為一之前徹表裏純是天理流行無間便是仁也吕氏克己銘又欲克去有己須與物合為一體方為仁認得仁都曠蕩在外了於我都無統攝必已與物對時方下得克己工夫若平居獨處不與物對時工夫便無可下手處可謂踈濶之甚據其實已如何得與物合一洞然八方如何得皆在我闥之内此不過只是箇想像仁中大底氣象如此耳仁實何在焉殊失向来孔顔傳授心法本㫖其他門人又淺皆無有説得親切者仁有以理言者有以心言者有以事言者以理言則只是此心全體天理之公如文公所謂心之徳愛之理此是以理言者也心之徳乃専言而其體也愛之理乃偏言而其用也程子曰仁者天下之公善之本也亦以理言者也以心言則知此心純是天理之公而絶無一毫人欲之私以間之也如夫子稱回心三月不違仁程子謂只是無􅊏毫私欲少有私欲便是不仁及雍也不知其仁等類皆是以心言者也以事言則只是當理而無私心之謂如夷齊求仁而得仁殷有三仁及子文之忠文子之清皆未知焉得仁等類是也若以用工言則只是去人欲復天理以全其本心之徳而已矣如夫子當時荅羣弟子問仁雖各隨其才質病痛之不同而其㫖意所歸大槩不越乎此問明道謂學者能識仁體實有諸己只要義理栽培如講求經義皆栽培之意若仁之在人心一耳不學之人獨無仁乎潜室陳氏曰識得仁體謂滿腔子是惻隠之心既體認得分明無私意夹雜又須讀書涵泳義理以灌溉滋養之問周子曰愛曰仁程子云愛自是情仁自是性豈可専以愛為仁程子學周子者也何故議論迥别曰善言性者必有騐於情故孟子以惻隠為仁之端周子以愛言仁皆是借情以明性若便以愛為仁則是指情作性語死不圓矣韓子博愛之仁是問仁者有知覺知覺何可以盡仁哉仁者特有之耳竊以為纔言知覺已入智中来曰程子雖有以覺言仁然不専主此説其他話頭甚多上蔡專主此説所以晦翁絶口不言只説愛之理心之徳此一轉語亦含知覺在中可更思求問仁者偏言之只一事兼言之則包四端四端皆心之徳頭面逈異仁既是愛之理則義禮智亦當謂之理四者皆當用工夫然孔門大率多去仁上着力何邪曰所謂愛之理是偏言之将四端分作四去看截然界限不可相侵心之徳是兼言之將四端只作仁字看仁為善之長猶家之嫡長子包貫得諸子故獨以理言以心徳言須見移在諸位上用不同方是詣理問晦翁説仁為愛之理心之徳如何曰愛是情理是性心統情性者也单説愛字與心字猶是就情上看必曰愛之理心之徳方和性在裏面是愛之所以為愛而心之所以為心者也是之謂仁前軰謂心為榖種能生處即是他所以為榖種處故桃杏之核皆曰仁孔門不曾正説仁之體段只説求仁為仁之方孟子方説怵惕惻隠處以状仁之體段又説仁人心也須認得仁為人心方見仁着落所以不仁之人全無人心既無人心問他恁麽羞惡恭敬是非仁包四端即此可見心如榖種所以生處是性生許多枝葉處便是情心亦是有形影底物事情亦是有形影底物事獨性無形影問程子云把捉不定皆是不仁者曰仁人心也心走作不在腔子裏則人形雖具而所以為形者死矣故謂之不仁西山真氏曰仁之一字從古無訓且如義訓宜禮訓理又訓履智訓知皆可以一字名其義惟仁不可以一字訓孟子曰仁者人也亦只是言仁者乃人之所以為人之理亦不是以人訓仁盖縁仁之道大包五常貫萬善所以不可以一言盡之自漢以後儒者只将愛字説仁殊不知仁固主乎愛然愛不足以盡仁孟子曰惻隠之心仁之端也惻隠者此心惻然有隠即所謂愛也然只是仁之發端而已韓文公言博愛之謂仁程先生非之以為仁自是性愛自是情以愛為仁是以情為性也至哉言乎朱文公先生始以愛之理心之徳六字形容之所謂愛之理者言仁非止乎愛乃愛之理也盖以體言之則仁之道大無所不包發而為用則主乎愛仁者愛之體也愛者仁之用也愛者如見赤子入井而惻然欲有以救之以至矜憐憫惜慈祥恩恵愛之謂也性中既有仁發出来便是愛如根上發出苗以苗為出於根則可以苗便為根則不可以愛出於仁則可以愛便作仁則不可故文公以愛之理三字言之方説得盡又曰心之徳何也盖心者此身之主而其理則得於天仁義禮智皆此心之徳而仁又為五常之本如元亨利貞皆乾之徳而元獨為四徳之長天之元即人之仁也元為天之全徳故仁亦為人心之全徳然仁之所以為心之徳者正以主乎愛故也仁所以能愛者盖天地以生物為心而人得之以為心是以主乎愛也愛之理心之徳六字之義乃先儒所未發而朱文公始發之其有功於學者至矣豈可不深味之乎自非聖人未有不由恕而至仁者故孟氏亦曰強恕而行求仁莫近焉恕以強言盖明用力之難學者當以強矯自厲云爾夫恕之所以難者何也道心惟㣲物欲易錮私見一立人已異觀天理之公於是遏絶而不行矣有志扵仁者當知穹壤之間與吾並生莫非同體體同則性同性同則情同公其心平其施必均齊而無偏吝必方正而無頗邪帥是以往將無一物不獲者所以謂絜矩之道也然大學既言絜矩而繼以義利者豈異指哉利則惟己是營義則與人同欲世之君子平居論説孰不以平物我公好惡為當然而私意横生莫能自克者以利焉爾利也者其本心之螟蟊正塗之榛莽歟大學丁寧扵絶簡孟子懇激扵首章聖賢深切為人未有先乎此者然則士之求仁當自絜矩始而推其端又自明義利之分始凡天下至㣲之物皆有箇心發生皆從此出縁是禀受之初皆得天地發生之心以為心故其心無不能發生者一物有一心自心中發出生意又成無限物且如蓮實之中有所謂么荷者便儼然如一根之荷他物亦莫不如是故上蔡先生論仁以桃仁杏仁比之謂其中有生意纔種便生故也惟人受天地之中以生全具天地之理故其為心又最靈於物故其所藴生意纔發出則近而親親推而仁民又推而愛物無所不可以至於覆冐四海恵利百世亦自此而推之爾此人心之大所以與天地同量也然一為利祿所汩則私意横生遂流而為殘忍為刻薄則生意消亡頑如鐵石便與禽獸相去不逺豈不可畏也哉今為學須要常存此心平居省察覺得胷中盎然有慈祥惻怛之意無忮忍刻害之私此即所謂本心即所謂仁也便當存之養之使之不失則萬善皆從此而生人得天地生物之心以為心其心本無不仁只因有私欲便有違仁之時能克去私欲則心常仁矣心者指知覺而言也仁者指心所具之理而言也盖圓外竅中者是心之體謂形質也此乃血肉之心虚靈知覺者是心之靈靈謂精爽也言其妙則謂神明不測仁義禮智信是心之理理即性也知覺屬氣凡能識痛癢識利害識義理者皆是也此所謂人心若仁義禮智信則純是義理此所謂道心人能克去私欲則所知覺者皆義理不能克去私欲則所知覺者物我利害之私而已純是理即是不違仁雜以私欲便是違仁手足不仁者非曰手足自不仁也盖手足本吾一體緣風痺之人血氣不貫於手足便與不屬己相似人與物亦本吾一體縁頑忍之人此心不貫於人物亦與不屬已相似風痺之人不仁於手足頑忍之人不仁於民物皆以其不屬已故也殊不知天地吾之父母與人雖有彼我之異與物亦有貴賤之殊要本同一體只緣私意一生天理冺絶便以人己為二致亦如手足本是吾身之物只縁風邪所中血氣隔塞遂以手足為外物手足民物之比也風邪私意之比也人無私意之害則民物之休戚自然相闗一見赤子入井則此心為之怵惕無風邪之病則手足之痒痾亦自然相闗雖小小疾苦此心亦為之痛楚當如此玩味方曉程子痿痺不仁之意魯齋許氏曰仁為四徳之長元者善之長前人訓元為廣大直是有理心胷不廣大安能愛敬安能教思容保民無疆仁與元俱包四徳而俱列並稱所謂合之不渾離之不散仁者性之至而愛之理也愛者情之發而仁之用也公者人之所以為仁之道也元者天之所以為仁之至也仁者人心之所固有而私或蔽之以陷於不仁故仁者必克己克己則公公則仁仁則愛未至於仁則愛不可以充體若夫知覺則知之用而仁者之所兼也元者四徳之長故兼亨利貞仁者五常之長故兼義禮智信此二者所以必有知覺不可便以知覺名仁也臨川吴氏曰天之為天也元而已人之為人也仁而已四序一元也五常一仁也人之有仁如木之有本木有本枝榦所由生也人有仁萬善所由出也人而賊其仁猶木戕其本也木無本則其枝瘁而榦枯人不仁則其心死而身雖生也奚取仁者夀非聖人之言乎天地生物之心曰仁惟天地之夀最乆聖人之仁如天地亦惟上古聖人之夀最乆人所禀受有萬不齊豈能人人如聖人之仁哉夫人全徳固未易全然禮儀三百威儀三千無一而非仁者得三百三千之一亦可謂仁則亦可以得夀矣予嘗執此觀天下之人凡氣之温和者夀質之慈良者夀量之寛洪者夀貌之重厚者夀言之簡黙者夀盖温和也慈良也寛洪也重厚也簡黙也皆仁之一端其夀之長决非猛厲殘忍褊狹輕薄淺躁者之所能及也夫東南西北地之四方也而東為先元亨利貞天之四徳也而元為長地之東天之元時之春人之仁也易曰體仁足以長人仁者何人之心也茍能體此則有我之私纎芥不留及物之春洞徹無間真足為人之長矣不然失其本心沒於下流而不能自㧞也又奚長之云性理大全書卷三十五

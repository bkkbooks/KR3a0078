body:
  text: 性理大全書卷三十三性理五心性情定性情意志氣志意思慮附程子曰自性之有形者謂之心自性之有動者謂之情問喜怒出於性否曰固是纔有生識便有性有性便有情無性安得有情問喜怒出於外如何曰非出於外感於外而發于中也問性之有喜怒猶水之有波否曰然湛然平靜如鏡者水之性也及遇沙石地勢不平便有湍激或風行其上便為波濤洶洶此豈水之性也哉人性中只有四端人豈有許多不善底事然無水安得波浪無性安得情也問性善而情不善乎曰情者性之動也要歸之於正而已亦何得以不善名之張子曰心統性情者也有形則有體有性則有情發于性則見於情發於情則見於色以類而應也龜山楊氏曰六經不言無心惟佛氏言之亦不言修性惟楊雄言之心不可無性不假修故易止言洗心盡性記言正心尊德性孟子言存心飬性河東候氏曰性之動便是情主宰處便是心五峯胡氏曰探視聴言動無息之本可以知性察視聴言動不息之際可以㑹情視聴言動道義明著孰知其為此心視聴言動物欲引取孰知其為人欲是故誠成天下之性性立天下之有情效天下之動心妙性情之徳性情之徳庸人與聖人同聖人妙而庸人之所以不妙者拘滯於有形而不能通爾今欲通之非致知何適哉氣之流行性為之主性之流行心為之主朱子曰性猶太極也心猶隂陽也太極只在陰陽之中非能離隂陽也然至論太極自是太極隂陽自是隂陽惟性與心亦然所謂一而二二而一也仁義禮智性也惻隐羞惡辭讓是非情也以仁愛以義惡以禮讓以智知者心也性者心之理也情者性之動也心者性情之主也未動為性已動為情心則貫乎動静而無不在焉性對情言心對性情言合如此是性動處是情主宰是心大抵心與性似一而二似二而一此處最當體認在天為命禀於人為性既發為情此其脈理甚實仍更分明易曉惟心乃虚明洞徹統前後而為言耳據性上說寂然不動處是心亦得據情上説感而遂通處是心亦得故孟子説盡其心者知其性也文義可見性則具仁義禮智之端實而易察知此實理則心無不盡盡亦只是盡曉得耳如云盡曉得此心者由知其性也問心性之别曰這箇極難説且是難為譬喻如伊川以水喻性其説本好却使曉不得者生病心大槩似箇官人天命便是君之命性便如職事一般此亦大槩如此要自理㑹得如邵子云性者道之形體葢道只是合當如此性則有一箇根苖生出君臣之義父子之仁性雖虚都是實理心雖是一物却虚故能包含萬理這箇要人自體察始得又曰性是心之道理心是主宰於身者四端便是情是心之發見處四者之萌皆出于心而其所以然者則是此性之理所在也問未發之前心性之别曰心有體用未發之前是心之體已發之際乃心之用如何指定説得葢主宰運用底便是心性便是㑹恁地做底理性則一定在這裏到主宰運用却在心情只是㡬箇路子隨這路子恁地做去底却又是心問靜是性動是情曰大扺都主於心性字從心從生情字從心從青性是有此理且如天命之謂性要須天命箇心了方是性人多說性方説心看來當先説心古人制字亦先制得心字性與情皆從心以人之生言之固是先得這道理然纔生這許多道理却都具在心裏且如仁義自是性孟子則曰仁義之心惻隐羞惡自是情孟子則曰惻隠之心羞惡之心葢性即心之理情即性之用今先說一箇心便教人識得箇情性底總腦教人知得箇道理存著處若先説性却似性中别有一箇心横渠心統性情語極好顛倒不破問心性情曰孟子説惻隐之心仁之端也一叚極分曉惻隐羞惡是非辭讓是情之發仁義禮智是性之體性中只有仁義禮智發之為惻隐羞惡辭讓是非乃性之情也問性情心仁曰性無不善心所發為情或有不善説不善非是心亦不得却是心之本體本無不善其流為不善者情之遷於物而然也性是理之總名仁義禮智皆性中一理之名惻隐羞惡辭讓是非是情之所發之名此情之出於性而善者也其端所發其㣲皆從此心出故曰心統性情者也性不是别有一物在心裏心具此性情心失其主却有時不善如我欲仁斯仁至我欲不仁斯失其仁矣回也三月不違仁言不違仁是心有時乎違仁也出入無時莫知其鄉存養主一使之不失仁乃善性情心惟孟子横渠説得好仁是性惻隐是情須從心上發出來心統性情者也性只是合如此底只是理非有箇物事若是有底物事則既有善亦必有惡惟其無此物只是理故無不善心統性情者也寂然不動而仁義禮智之理具焉動處更是情有言静處是性動處是心如此則是將一物分作兩處了心與性不可以動静言凡物有心而其中必虚如鷄心猪心之屬切開可見人心亦然只這些虚處便包蔵許多道理彌綸天地該括古今推廣得來葢天葢地莫不由此此所以為人心之妙歟理在人心是之謂性性如心之田地充此中虚莫非是理而已心是神明之舍為一身之主宰性便是許多道理得之於天而具於心者發于智識念慮處皆是情故曰心統性情者也問明道云禀於天為性感為情動為心伊川則又云自性之有形者謂之心自性之有動者謂之情如二程説則情與心皆自夫一性之所發彼問性而對以情與心則不可謂不切所問者然明道以動為心伊川以動為情自不相侔不知今以動為心是耶以動為情是耶㦯曰情對性言静者為性動者為情是説固然也今若以動為情是則明道何得却云感為情動為心哉横渠云心統性情者也既是心統性情伊川何得却云自性之有形者謂之心自性之有動者謂之情耶如伊川所云却是性統心情者也不知以心統性情為是耶性統心情為是耶此性情心三者未有至當之論也曰近思録中一叚云心一也有指體而言者注云寂然不動是也有指用而言者注云感而遂通天下之故是也夫寂然不動是性感而遂通是情故横渠云心包性情者也此説最為穏當如前二程先生說話恐是記録者誤耳如明道感為情動為心感與動如何分得若伊川云自性之有形者謂之心某直理㑹他說不得以此知是門人記録之誤也問人當無事時其中虚明不昧此自氣自然動處便是性曰虚明不昧便是心此理具足於中無少欠缺便是性感物而動便是情横渠説得好由太虚有天之名由氣化有道之名此是總説合虚與氣有性之名合性與知覺有心之名是就人物上説看横渠心統性情之說乃知此話大有功始尋得箇情字著落與孟子説一般孟子言惻隐之心仁之端也仁性也惻隐情也此是情上見得心又曰仁義禮智根於心此是性上見得心葢心便是包得那性情性是體情是用五峯云心妙性情之徳妙是主宰運用之意五峯此説不是曽去研窮深體如何直見得恁地問論性有已發之性有未發之性曰性纔發便是情情有善惡性則全善心又是一箇包總性情底大抵言性便須見得是元受命於天其所禀賦自有本根非若心可以一概言也却是漢儒解天命之謂性云木神仁金神義等語却有意思非茍言者學者要體㑹親切又曰若不用明破只恁涵養自有到處亦自省力性是未動情是已動心包得已動未動葢心之未動則為性已動則為情所謂心統性情者也欲是情發出來底心如水性猶水之静情則水之流欲則水之波瀾但波瀾有好底有不好底欲好底如我欲仁之類不好底則一向奔馳出去若波濤翻浪大叚不好底欲則滅却天理如水之壅决無所不害孟子謂情可以為善是說那情之正從性中流出來者元無不好也心主宰之謂也動静皆主宰非是静時無所用及至動時方有主宰也言主宰則混然體統自在其中心統攝性情非儱侗與性情為一物而不分别也心者主乎性而行乎情故喜怒哀樂未發則謂之中發而皆中節則謂之和心是做工夫處心之全體湛然虚明萬理具足無一毫私欲之間其流行該徧貫乎動静而妙用又無不在焉故以其未發而全體者言之則性也以其已發而妙用者言之則情也然心統性情只就渾淪一物之中指其已發未發而為言耳非是性是一箇地頭心是一箇地頭情又是一箇地頭如此懸隔也問心性情之辨曰程子云心譬如榖種其仁具生之理是性陽氣發生處是情推而論之物物皆然性具許多道理昭昭然者屬性未發理具已發理應則屬心發動則情所以存其心則養其性心該備通貫主宰運用吕云未發時心體昭昭程云有指體而言者有指用而言者李先生云心者貫幽明通有無心性指其寂然不動處情指其發動處有是形則有是心而心之所得乎天之理則謂之性仁義禮智是也性之所感於物而動則謂之情惻隐羞惡辭讓是非是也是三者人皆有之不以聖凡為有無也但聖人則氣清而心正故性全而情不亂耳學者則當存心以養性而節其情也今以聖人為無心而遂以為心不可以須臾有事然則天之所以與我者何為而獨有此贅物乎性只是理情是流出運用處心之知覺即所以具此理而行此情者也以智言之所以知是非之理則智也性也所以知是非而是非之者情也具此理而覺其為是非者心也此處分别只在毫釐之間精以察之乃可見耳問横渠言由太虚有天之名由氣化有道之名合虚與氣有性之名合性與知覺有心之名所謂性者恐兼天地之性氣質之性而言否所謂心者併人心道心言否曰非氣無形無形則性善無所賦故凡言性者皆因氣質而言但其中自有所賦之理耳人心道心亦非有兩物也性是理心是包含該載敷施發用底康節云性者道之形體心者性之郛郭身者心之區宇此語雖說得粗畢竟大概好問心之動性之動曰動處是心動底是性又問先生謂動處是心動底是性竊推此二句只在底處兩字上如糓種然生處便是糓生底却是那裏面些子曰若以糓譬之榖便是心那為粟為菽為禾為稻底便是性康節所謂心者性之郛郭是也包裹底是心發出不同底是性心以性為體心將性做饀子模様葢心之所以具是理者以有性故也心有善惡性無不善若論氣質之性亦有不善心性理拈著一箇則都貫穿惟觀其所指處輕重如何如養心莫善於寡欲雖有不存焉者寡矣存雖指理言然心自在其中操則存此存雖指心言然理自在其中問人之生禀乎天之理以為性其氣清則為知覺而心又不可以知覺言當如何曰難說以天命之謂性觀之則命是性天是心心有主宰之義然不可無分别亦不可太説開成兩箇當熟玩而黙識其主宰之意可也有這性便發出這情因這情便見得這性因今日有這情便見得本來有這性性不可言所以言性善者只看他惻隐辭讓四端之善則可以見其性之善如見水流之清則知源頭必清矣四端情也性則理也發者情也其本則性也如見影知形之意性不可説情却可説所以告子問性孟子却答他情葢謂情可為善則性無有不善所謂四端者皆情也仁是性惻隠是情惻隠是仁發出來底端芽如一箇榖種相似榖之生是性發為萌芽是情所謂性只是那仁義禮智四者而已四件無不善發出來則有不善何故殘忍便是那惻隠反底冐昧便是那羞惡反底仁義者天理之目而慈愛羞惡者天理之施於此看得分明則性情之分可見北溪陳氏曰情與性相對情者性之動也在心裏面未發動底是性事物觸著便發動出來底是情寂然不動是性感而遂通是情這動底只是就性中發出來不是别物其大目則為喜怒哀懼愛惡欲七者中庸只説喜怒哀樂四箇孟子又指惻隠羞惡辭讓是非四端而言大抵都是情性中有仁動出為惻隠性中有義動出為羞惡性中有禮智動出為辭讓是非端是端緒裏面有這物其端緒便發從外靣來若内無仁義禮智則其發也安得有許四端大概心是箇物貯此性發出底便是情孟子曰惻隠之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也惻𨼆羞惡等以情言仁義等以性言必又言心在其中者所以統情性而為之主也問明道云在人為性主於身為心心發於思慮謂之情如此則性乃心情之本而横渠則以為心統性情如何潛室陳氏曰心居性情之間向裏即是性向外即是情心居二者之間而統之所以聖賢工夫只在心裏著到一舉而兼得之横渠此語大有功西山真氏曰誠者真實無妄之理天之命於人人之受于天性此而已故曰誠成天下之性凡天下所有之理莫不具于一性之中故曰性立天下之有情者性之動也效如爻者效也之效天下之理不能無變動卦之有爻所以像之性之有情亦猶是也未發則理具于性既發則理著於情情之動須因乎物所以不能無動則理也故曰情效天下之動仁義禮智性之徳惻隠以下情之徳性情之徳雖具而發揮運用則在此心而已故中庸論大本達道必以戒懼慎獨為主葢該寂感貫動静者心也心得其正然後性之本然者全而情之發亦中節矣故曰心妙性情之徳張子問定性未能不動猶累於外物何如程子曰所謂定者動亦定静亦定無將迎無内外茍以外物為外牽已而從之是以己性為有内外也且以性為隨物于外則當其在外時何者為在内是有意於絶外誘而不知性之無内外也既以内外為二本則又烏可遽語定哉夫天地之常以其心普萬物而無心聖人之常以其情順萬事而無情故君子之學莫若廓然而大公物來而順應易曰貞吉悔亡憧憧徃來朋從爾思茍規規於外誘之除將見滅於東而生於西也非惟日之不足顧其端無窮不可得而除也人之情各有所蔽故不能適道大率患在於自私而用智自私則不能以有為為應迹用智則不能以明覺為自然今以惡外物之心而求照無物之地是反鑑而索照也易曰艮其背不獲其身行其庭不見其人孟氏亦曰所惡於智者為其鑿也與其非外而是内不若内外之兩忘也兩忘則澄然無事矣無事則定定則明明則尚何應物之為累哉聖人之喜以物之當喜聖人之怒以物之當怒是聖人之喜怒不繫於心而繫於物也是則聖人豈不應於物哉烏得以從外者為非而更求在内者為是也今以自私用智之喜怒而視聖人喜怒之正為如何哉夫人之情易發而難制者惟怒為甚第能於怒時遽忘其怒而觀理之是非亦可見外誘之不足惡而於道亦思過半矣已下論性問定性書也難理㑹朱子曰也不難定性字説得也詫異此性字是箇心字意明道言語甚圓轉初讀未曉得都沒理㑹子細看却成叚相應此書在鄠時作年甚少明道定性書自胷中瀉出如有物在後面逼逐他相似皆寫不辦黄直卿曰此正所謂有造道之言曰然只是一篇之中都不見一箇下手處童蜚卿曰廓然而大公物來而順應這莫是下工處否曰這是説已成處且如今人私欲萬端紛紛擾擾無可奈何如何得他大公所見與理皆是背馳如何便得他順應楊道夫曰這便是先生前日所謂也須存得這箇在曰也不由你存此心紛擾者著甚方法也不能得他住這須是見得須是知得天下之理都著一毫私意不得方是所謂知止而後有定也不然只見得他如生龍活虎相似更把捉不得定性一章明道言不惡事物亦不逐事物今人惡則全絶之逐則又為物引將去惟不拒不流泛應曲當則善矣葢横渠有意於絶外物而定其内明道意以為須是内外合一動亦定靜亦定則應物之際自然不累於物茍只静時能定則動時恐却被物誘去矣問聖人動亦定静亦定所謂定者是體否曰是曰此是惡物來感時定抑善惡來皆定曰惡物來不感這裏自不接曰善物則如何曰當應便應有許多分數來便有許多分數應這裏自定曰子哭之慟而何以見其為定曰此是當應也須是廓然而大公物來而順應再三誦此語以為説得圓問聖人定處未詳曰知止而後有定只看此一句便了得萬物各有當止之所知得則此心自不為物動曰舜號泣於旻天象憂亦憂象喜亦喜當此時何以見其為定曰此是當應而應當應而應便是定若不當應而應便是亂了當應而不應則又是死了問天地之常以其心普萬物而無心聖人之常以其情順萬事而無情故君子之學莫若廓然而大公物來而順應學者卒未到此奈何曰雖未到此規模也是恁地廓然大公只是除却私意事物之來順他道理應之且如有一事自家見得道理是恁地却有箇偏曲底意思要為那人便是不公便逆了這道理不能順應聖人自有聖人大公賢人自有賢人大公學者自有學者大公又問聖賢大公固未敢請學者之心當如何曰也只要存得這箇在克去私意這兩句是有頭有尾説話大公是包說順應是就裏面細説公是忠便是維天之命於穆不已順應便是乾道變化各正性命廓然而大公是寂然不動物來而順應是感而遂通問定性書云大率患在於自私而用智自私則不能以有為為應迹用智則不能以明覺為自然曰此一書首尾只此兩頃伊川文字叚數分明明道多只恁成片説將去初看似無統子細理㑹中間自有路脈貫串將去君子之學莫若廓然而大公物來而順應自後許多説話都只是此二句意艮其背不獲其身行其庭不見其人此是説廓然而大公孟子曰所惡於智者為其鑿也此是説物來而順應第能於怒時遽忘其怒而觀理之是非是應物來而順應這須子細去看方始得問自私則不能以有為為應迹用智則不能以明覺為自然所謂天地之常以其心普萬物而無心聖人之常以其情順萬事而無情所謂普萬物順萬事者即廓然而大公之謂無心無情者即物來而順應之謂自私則不能廓然而大公所以不能以有為為應迹用智則不能物來而順應所以不能以明覺為自然曰然明道云不能以有為為應迹應迹謂應事物之迹若心則未嘗動也問定性書所論固是不可有意於除外誘然此地位高者之事在初學恐亦不得不然否曰初學也不解如此外誘如何除得有當應者亦只得順他便看理如何理當應便應不當應便不應此篇大綱只在廓然而大公物來而順應兩句其他引昜孟子皆是如此末謂第能於怒時遽忘其怒而觀理之是非一篇著力𦂳要只在此一句遽忘其怒便是廓然大公觀理之是非便是物來順應明道言語渾淪子細看節節有條理曰内外兩忘是内不自私外應不鑿否曰是大抵不可以在内者為是而在外者為非只得隨理順應人情易發而難制者惟怒為甚惟能於怒時遽忘其怒而觀理之是非舊時謂觀理之是非纔見已是而人非則其争愈力後來看不如此如孟子所謂我必不仁也其自反而仁矣其横逆由是也則曰此亦妄人而已矣人情易發而難制明道云人能於怒時遽忘其怒亦可見外誘之不足畏而於道亦思過半矣此語可見然有一説若知其理之曲直不必校却好若見其直而又怒則愈甚大抵理只是此理不在外求若於外復有一理時却難為只有此理故問聖人恐無怒容否曰怎生無怒容合當怒時必亦形於色如要去治那人之罪自為笑容則不可曰如此則恐涉忿厲之氣否曰天之怒雷霆亦震舜誅四凶當其時亦須怒但當怒而怒便中節事過便消了更不積問定性書是正心誠意工夫否曰正心誠意以後事定性者存養之功至而得性之本然也性定則動静如一而内外無間矣天地之所以為天地聖人之所以為聖人不以其定乎君子之學亦以求定而已矣故廓然而大公者仁之所以為體也物來而順應者義之所以為用也仁立義行則性定而天下之動一矣所謂貞也夫豈急於外誘之除而反為是憧憧哉然常人之所以不定者非其性之本然也自私以賊夫仁用智以害夫義是以情有所蔽而憧憧耳不知自反以去其所蔽顧以惡外物為心而反求照於無物之地亦見其用力愈勞而燭理愈昧益以憧憧而不自知也艮其背則不自私矣行無事則不用知矣内外兩忘非忘也一循於理不是内而非外也不是内而非外則大公而順應尚何事物之為累哉聖人之喜怒大公而順應天理之極也衆人之喜怒自私而用知人欲之盛也忘怒則公觀理則順二者所以為自反而去蔽之方也夫張子之於道固非後學所敢議然意其强探力取之意多涵養之功少故不能無疑於此程子以是發之其㫖深哉勉齋黄氏曰定性字當作定心看若以心有内外則不惟未可語定亦且不識心矣問天地之常至而順應是第二段此書大意不過此二句而已廓然大公是不絶乎物物來順應是不累乎物曰固是如此然自心普萬物情順萬事便是不絶乎物無情無心便是不累乎物只是此兩意貫了一篇又曰自易曰貞吉悔亡至而除也是第三段此乃引易以結上段之意貞吉則虚中無我不絶乎物而亦不累乎物也憧憧則累乎物矣自人之情至索照也是第四段只是與前二段意相反自私便是求絶乎物不能以明覺為自然故反累乎物自易曰艮其背至應物為累哉是第五段亦引易以結上文艮不獲其身則無我無我則不自私用智而鑿則不以明覺為自然故不若内外之兩忘也自聖人之喜至為如何哉是第六段以聖人喜怒明其廓然大公物來順應也後靣是第七叚未嘗無怒而觀理是非則未至於聖人而於道思過半矣以此讀之則自粲然明白矣又曰未一叚専説順應一邊然未嘗不怒則是大公朱文公舊説亦兼大公順應而言葢以遽忘其怒為大公也西山真氏曰定性者理定於中而事不能惑也理定於中則當静之時固定也動之時亦未嘗不定也不隨物而徃不先物而動故曰無將迎理自内出而周於事事自外來而應以理理即事也事即理也故曰無内外夫能定能應有寂有感皆心之妙也所以然者性也若以定與寂為是而應與感為非則是以性為有内外也事物之來以理應之猶鑑懸於此而形不能遁也鑑未嘗隨物而照性其可謂隨物而在外乎故事物未接如鑑之本空者性也事物既接如鑑之有形者亦性也内外曷嘗有二本哉如此則知事物不能累吾之性雖酬酢萬變未嘗不定也䨇峯饒氏曰君子之學惟其知性之無内外也故其存於中者常豁然而大公知應事接物各有當然之理莫非吾性之理也故其感於外者常因事物之來而順理以應之此其所以能定也衆人惟其不知此理故不能豁然大公而常梏於自私不能物來順應而每事常鑿智以為用此其所以不能定也問意是心之運用處是發處朱子曰運用是發了問情亦是發處何以别曰情是性之發情是發出恁地意是主張要恁地如愛那物是情所以去愛那物是意情如舟車意如人去使那舟車一般已下論情意心意猶有痕跡如性則全無兆朕只是許多道理在這裏問意是心之所發又説有心而後有意則是發處依舊是心主之到私意盛時心也隨去曰固然問情意之别曰情是㑹做底意是去百般計較做底意因有是情而後用問情意如何體認曰性情則一性是不動情是動處意則有主向如好惡是情好好色惡惡臭便是意未動而能動者理也未動而欲動者意也北溪陳氏曰意者心之所發也有思量運用之義大扺情者性之動意者心之發情是就心裏靣自然發動改頭換面出來底正與性相對意是心上發起一念思量運用要恁地底情動是就全體上論意是就一念處論合數者而觀纔應接事物時便都呈露在靣前且如一件事物來接著在内主宰者是心動出來或喜或怒是情裏靣有箇物能動出來底是性運用商量要喜那人要怒那人是意心向那所喜所怒之人是志喜怒之中節處又是性中道理流出來即其當然之則處是理其所以當然之根原處是命一下許多物事都在靣前未嘗相離亦粲然不相紊亂以意比心則心大意小以全體言意是就全體上發起一念慮處毋意之意是就私意説誠意之意是就好底意説人常言意思去聲思者思平聲也思慮念慮之類皆意之屬程子曰志御氣則治氣役志則亂人忿慾勝志者有矣以義理勝氣者鮮矣已下論志氣志意問人有少而勇老而怯少而亷老而貪何為其然也曰志不立為氣所使故也志勝氣則一定而不可變也曽子易簀之際其氣微可知也惟其志既堅定則雖死生之際亦不為之動也况老少之異乎問志意之别曰志自所存主言之發則意也發而當理也發而不當私也朱子曰性者即天理也萬物禀而受之無一理之不具心者一身之主宰意者心之所發情者心之所動志者心之所之比於情意尤重氣者即吾之血氣而充乎體者也比於他則有形噐而較粗者也心之所之謂之志日之所之謂之時志字從之從心時字從之從日志是心之所之一直去底意又是志之經營往來底是那志底脚凡營為謀度往來皆意也所以横渠云志公而意私問意志曰横渠云以意志兩字言則志公而意私志剛而意柔志陽而意陰志是公然主張要做事底意是私地潛行間發處志如伐意如侵北溪陳氏曰志者心之所之之猶向也謂心之正面全向那裏去如志於道是心全向於道志於學是心全向於學一直去求討要必得那箇物事便是志若中間有作輟或退轉底意便不得謂之志志有趣向期必之意趣向那裏去期料要恁他决然必欲得之便是志人若不立志只泛泛地同流合汙便做成甚人須是立志以聖賢自期便能卓然拔出於流俗之中不至隨波逐浪為碌碌庸軰之歸若甘心於自暴自棄便是不能立志立志須是髙明正大人多有好資質純粹静淡甚近道却甘心為卑陋之歸不肯志於道只是不能立志孟子曰士尚志立志要髙不要卑論語曰博學而篤志立志要定不要雜要堅不要緩如顔了曰舜何人也予何人也有為者亦若是若曰文王我師也周公豈欺我哉皆以聖人自期皆是能立志孟子曰舜為法於天下可傳於後世我猶未免為鄉人也是則可憂也憂之如何如舜而已矣孟子以舜自期亦是能立志西山真氏曰志者心之用也心無不正而其用則有正邪之分志者進徳之基若聖若賢莫不發軔乎此志之所趨無逺不達穹山窮海不能限也志之所向無堅不入鋭兵精甲不能禦也善惡二途惟道與利而已志乎道則理義為之主而物欲不能移志乎利則物欲為之主而理義不能入堯桀舜蹠之所繇以異也可不謹乎魯齋許氏曰雲從龍風從虎氣從志龍虎所在而風雲從之志之所在而氣從之程子曰思慮不得至於苦已下論思慮要息思慮便是不自思慮不深思則不能造於道不深思而得者其得易失欲知得與不得於心氣上驗之思慮有得中心悦豫沛然有裕者實得也思慮有得心氣勞耗者實未得也强揣度耳人多思慮不能自寧只是做他心主不定未有不能體道而能無思者故坐忘則坐馳有忘之心是則思而已矣泛乎其思不若約之可守也思則來舎則去思之不熱也吕與叔嘗言患思慮多不能驅除曰此正如破屋中禦㓂東靣一人來未逐得西面又一人至矣左右前後驅逐不暇葢其四面空疎盗固易入無縁作得主定又如虚器入水水自然入若以一器實之以水置之水中水何能入來葢中有主則實實則入患不能入自然無事問思可去否上蔡謝氏曰思如何去思曰睿睿作聖思豈可去問遇事出言毎思而發是否曰雖不中不逺矣問程子云要息思慮便是不息思慮朱子曰思慮息不得只敬便都沒了問思慮紛擾曰公不思慮時不識箇心是何物須是思慮時知道這心如此紛擾漸漸見得却有下工夫處問知與思於人身最𦂳要曰然二者也只是一事知如手相似思是教這手去做事也思所以用夫知也人心無不思慮之理若當思而思自不當苦苦排抑却反成不静也魯齋許氏曰慎思視之所見聴之所聞一切要箇思字君子有九思思曰睿是也要思無邪目望見山便謂之青可乎惟知故能思或問心中思慮多奈何曰不知所思慮者何事果求所當知雖千思萬慮可也若人欲之萌即當斬去在自知之耳人心虚靈無槁木死灰不思之理要當精於可思慮處臨川呉氏曰常人非無思而不見其有得何也不思其則是謂妄思惡有妄思而可以有得者哉思必于其則而後為思之正則必于其得而後為思之成則也者帝之衷民之彛性分所固有事理之當然也稽諸夫子之言則無邪其綱九思其目也無邪者心之則曰明曰聰曰温曰恭曰忠曰敬者視聴色貎言事之則也思之思之其有不得之者乎性理大全書卷三十三

body:
  text: 性理大全書卷五十八諸子二揚子程子曰林希嘗謂揚雄為祿隐揚雄後人只為見他著書便須要做他是怎生做得是因問如劇秦文莫不當作曰或云非是美之乃譏之也然王莽将來族誅之亦未足道又何足譏譏之濟得甚事或云且以免死然己自不知明哲煌煌之義何足以保身作太𤣥本要明易却尤晦如易其實無益真屋下架屋牀上疊牀他只是於易中得一數為之於厯法雖有合只是無益太𤣥中首中陽氣潜萌於黄宫信無不在乎中養首一蔵心于淵美厥靈根測曰蔵心于淵神不外也揚子雲之學蓋嘗至此地位也問太𤣥之作如何曰是亦贅矣必欲撰𤣥不如明易邵堯夫之數似𤣥而不同數只是一般但看人如何用之雖作十𤣥亦可况一𤣥乎漢儒之中吾必以揚子雲為賢然於出處之際不能無過也其言曰明哲煌煌旁燭無疆孫于不虞以保天命孫于不虞則有之旁燭無疆則未也光武之興使雄不死能免誅乎觀于朱泚之事可見矣古之所謂言遜者迫不得已如劇秦美新之類非得已者乎揚子雲云明哲煌煌旁燭無疆悔其蹈亂無先知之明也其曰孫于不虞以保天命欲以茍容為全身之道也使彼知聖賢見㡬而作其及是乎世之議子雲者多疑其投閣之事以法言觀之蓋未必有又天祿閣世傳以為高百尺宜不可投然子雲之罪特不在此黽勉於莽賢之間畏死而不敢去是安得為大丈夫哉揚子謂老子言道徳則有取至如搥提仁義絶滅禮樂則無取若以剖斗折衡聖人不死大盜不止為救時反本之言為可取却尚可恕如言失道而後徳失徳而後仁失仁而後義失義而後禮則自不識道已不成言語却言其言道徳有取此自是揚子不見道處又謂學行之上也名譽以崇之皆揚子之失龜山楊氏曰揚雄云多聞則守之以約多見則守之以卓其言終有病不如孟子言博學而詳説之将以反説約也為無病蓋博學詳説所以趨約至於約則其道得矣謂之守以約卓於多聞多見之中将何守見得此理分明然後知孟子之後其道不傳知孟子所謂天下可運於掌為不妄揚子雲作太𤣥只據他立名便不是既定却三方九州二十七部八十一家不知如何相錯得八卦所以可變而為六十四者只為可相錯故可變耳惟相錯則其變出於自然也朱子曰揚子雲出處非是當時善去亦何不可問揚子避礙通諸理之説是否曰大槩也似只是言語有病問莫是避字有病否曰然少間處事不看道理當如何便先有箇依違閃避之心矣學之為王者事不與上文屬只是言人君不可不學底道理所以下文云堯舜禹湯文武汲汲仲尼皇皇以數聖人之盛徳猶且如此問仲尼皇皇如何曰夫子雖無王者之位而有王者之徳故作一處稱揚徳隆則晷星星隆則晷徳晷影也猶影之随形也蓋徳隆則星随徳而見星隆則人事反随星而應揚子云月未朢則載魄于西既朢則終魄于東其遡於日乎載者加載之義如老子云載營魄左氏云從之載正是這箇載字諸家都亂説只有古注解云月未朢則光始生於西面以漸東滿既望則光消虧於西面以漸東盡此兩句略通而未盡此兩句盡在其遡於日乎一句上蓋以日為主月之光也日載之光之終也日終之載猶加載之載又訓上如今人上光上采色之上蓋初一二間時日落於酉月是時同在彼至初八九日落在酉則月已在午至十五日相對日落於酉而月在夘此未朢而載魄于西蓋月在東而日在西日載之光也及日與月相去逾逺則光漸消而魄生少間月與日相蹉過日却在東月却在西故光漸至東盡則魄漸復也當改古注云日加魄於西面以漸東滿日復魄於西面以漸東盡其載也日載之其終也日終之皆繫於日又説秦周之士貴賤拘肆皆繫于上之人猶月之載魄終魄皆繫於日也故曰其遡於日乎其載其終皆向日也温公云當改載魄之魄作朏都是曉其説不得雄之學似出於老子如太𤣥曰潜心于淵美厥靈根測曰潜心于淵神不昧也乃老氏説話問太𤣥分賛於三百六十六日下不足者乃益以踦贏固不是如易中卦氣如何曰此出於京房亦難曉如太𤣥中推之蓋有氣而無朔矣問伊川亦取雄太𤣥中語如何曰不是取他言他地位至此耳問太𤣥如何曰聖人説天一地二天三地四天五地六天七地八天九地十甚簡易今太𤣥説得却支離太𤣥如他立八十一首却是分隂陽中間一首半是隂半是陽若看了易後去看那𤣥不成物事又問揚雄也是學焦延夀推卦氣曰焦延夀易也不成物事今人説焦延夀卦氣不好是取太𤣥不知太𤣥却是學他天地間只有隂陽二者而已便㑹有消長今太𤣥有三箇了如冬至是天元到三月便是地元七月便是人元夏至却在地元之中都不成物事太𤣥甚拙嵗是方底物他以一數乗之皆算不著太𤣥紀日而不紀月無弦朢晦朔太𤣥中高處只是黄老故其言曰老子之言道徳吾有取焉太𤣥之説只是老莊康節深取之者以其書亦挨傍隂陽消長來説道理或問易與太𤣥數有何不同潛室陳氏曰易是加一倍法太𤣥加三倍法易卦六十四太𤣥卦八十一太𤣥模放周易只起數不同耳先儒謂将易變作十部太𤣥亦得但無用耳西山真氏曰揚子黙而好深湛之思故其言如此潛之一字最宜玩味天惟神明故照知四方惟精粹故萬物作類人心之神明精粹本亦如此惟不能潜故神明者昏而精粹者雜不能燭理而應物也臨川吴氏曰揚子雲擬易以作太𤣥易自一而二二而四四而八八而十六十六而三十二三十二而六十四太𤣥則自一而三三而九九而二十七二十七而八十一易之數乃天地造化之自然一毫知力無所與於其間也異世而同符惟邵子皇極經世一書而已至若焦延夀易林魏伯陽参同契之屬雖流而入於伎術尚不能外乎易之為數子雲太𤣥名為擬易而實則非易矣其起數之法既非天地之正又强求合於厯之日每首九賛二賛當一晝夜合八十一首之賛凡七百二十九僅足以當三百六十四日有半外増一踦賛以當半日又立一贏賛以當四分日之一吁亦勞且拙矣文中子程子曰文中子本是一隐君子世人往往得其議論傅㑹成書其間極有格言荀楊道不到處又有一件事半截好半截不好如魏徴問聖人有憂乎曰天下皆憂吾獨得不憂問疑曰天下皆疑吾獨得不疑徴退謂董常曰樂天知命吾何憂窮理盡性吾何疑此言極好下半截却云徴所問者迹也吾告女者心也心迹之判乆矣便亂道王通當時有些言語後來被人傅㑹若續經之類皆非其作文中子續經甚謬恐無此如續書始於漢自漢以來制詔又何足記續詩之備六代如晉宋後魏北齊後周隋之詩又何足采問文中子云圓者動方者静曰此正倒説了静體圓動體方文中子言古之學者聚道不知道如何聚得朱子曰文中子他當時要為伊周事業見道不行急急地要做孔子他要學伊周其志甚不卑但不能勝其好高自大欲速之心反有所累二帝三王却不去學却要學兩漢此是他亂道處問文中子好處與不好處曰見得道理透後從高視下一目瞭然今要去揣摩不得文中子其間有見處也即是老氏又其間被人夾雜今也難分别但不合有許多事全似孔子孔子有荷蕢等人他也有許多人便是粧㸃出來其間論文史及時事世變煞好文中子中説被人亂了説治亂處與其他好處極多但向上事只是老釋問過法言否曰大過之文中子論時事及文史處儘有可觀於文取陸機史取陳夀曽将陸機文來看也是平正房杜於河汾之學後來多有議論且如中説只是王氏子孫自記亦不應當時開國文武大臣盡其學者何故盡無一語言及其師兼記其家世事攷之傳記無一合者文中子看其書忒裝㸃所以使人難信如説諸名卿大臣多是隋末所未見有者兼是他言論大綱雜伯凡事都要硬做如説禮樂治體之類都不消得從正心誠意做出又如説安我所以安天下存我所以厚蒼生都是為自張本做雜伯鎡基問續書天子之義制詔志䇿有四大臣之義命訓對讃議誡諫有七如何曰這般所在極膚淺中間説話大綱如此但看世俗所稱道便喚做好都不識如云晁董公孫之對據道理看只有董仲舒為得如公孫已是不好晁錯是説箇甚麽又如自叙許多説話盡是夸張考其年數與唐煞遠如何唐初諸名卿皆與説話若果與諸名卿相處一箇人恁地自標致史傳中如何都不見説文中子議論多是中間暗了一段無分明其間弟子問答姓名多是唐輔相恐亦不然蓋諸人更無一語及其師人以為王通與長孫無忌不足故諸人懼無忌而不敢言亦無此理如鄭公豈畏人者哉七制之主亦不知其何故以七制名之此必因其續書中曽採七君事迹以為書而名之曰七制如二典體例今無可攷大率多是依倣而作如以董常為顔子則是以孔子自居謂諸公可為輔相之類皆是撰成要安排七制之君為他之堯舜考其事迹亦多不合劉禹錫作歙池江州觀察王公墓碑乃仲淹四代祖碑中載祖諱多不同及阮逸所注幷載闗朗等事亦多不實王通大業中死自不同時如推説十七代祖亦不應遼遠如此唐李翺已自論中説可比太公家教則其書之出亦已乆矣伊川謂文中子有些格言被後人添入壊了看來必是阮逸諸公増益張大復借顯顯者以為重耳問文中子之學曰他有箇意思以為堯舜三代也只與後世一般也只是偶然做得著問他續詩續書意是如此因舉答賈瓊數處説曰近日陳同父便是這般説話他便忌程先生説帝王以道治天下後世只是以智力把持天下正緣這話説得他病處問元經尤可疑只緣獻公奔北便以為天命已歸之遂帝魏曰今之注本是阮逸注龔鼎臣别有一本注後面叙他祖都與文中子所説不同説他先已仕魏不是後來方奔去又問他説權義舉而皇極立如何曰説權義不是義是活物權是稱錘義是稱星義所以用權今似他説却是以權為嫂溺援之之義以義為授受不親之禮問義便有随時底意思曰固是問他只緣以元經帝魏生此説曰便是他大本領處不曽理㑹縱有一二言語可取但偶然耳其續經猶小兒竪瓦屋然世儒既無高明廣大之見因遂尊崇其書問文中子説動静見天地之心説得似不然曰他意思以方圓為形動静為理然亦無意思而今自家若見箇道理了見他這説話都似不曽説一般天下皆憂吾獨得不憂天下皆疑吾獨得不疑又曰樂天知命吾何憂窮理盡性吾何疑蓋有當憂疑者有不當憂疑者然皆心也文中子以為有心迹之判故伊川非之又曰惟其無一己之憂疑故能憂疑以天下惟其憂以天下疑以天下故無一己之憂疑道之在天下未嘗亡而其明晦通塞之不同則如晝夜寒暑之相反故二帝三王之治詩書六藝之文後世莫能及之蓋非功效語言之不類乃其本心事實之不侔也雖然維天之命於穆不已彼所謂道者則固未嘗亡矣而大學之教所謂明徳新民止於至善者又已具有明法若可階而升焉後之讀其書攷其事者誠能深思熟講以探其本謹守力行以踐其實至於一旦豁然而晦者明塞者通則古人之不可及者固已倐然而在我矣夫豈患其終不及哉茍為不然而但為模放假竊之計則不惟精粗懸絶終無可似之理政使似之然於其道亦何足以有所發明此有志為己之士所以不屑而有所不暇為也王仲淹生乎百世之下讀古聖賢之書而粗識其用則於道之未嘗亡者蓋有意焉而於明徳新民之學亦不可謂無其志矣然未嘗深探其本而盡力於其實以求必得夫至善者而止之顧乃挟其窺覘想像之彷彿而謂聖之所以聖賢之所以賢與其所以修身所以治人而及夫天下國家者舉皆不越乎此是以一見隋文而陳十二䇿則既不自量其力之不足以為伊周又不知其君之不可以為湯武且不待其招而往不待其問而告則又輕其道以求售焉及其不遇而歸其年蓋亦未為晚也若能於此反之於身以益求其所未至使明徳之方新民之具皆足以得其至善而止之則異時得君行道安知其卒不逮於古人政使不幸終無所遇至於甚不得已而筆之於書亦必有以發經言之餘藴而開後學於無窮顧乃不知出此而不勝其好名欲速之心汲汲乎日以著書立言為己任則其用心為己外矣及其無以自託乃復捃拾兩漢以來文字言語之陋功名事業之卑而求其天資之偶合與其竊取而近似者依倣六經次第采輯因以牽挽其人强而躋之二帝三王之列今其遺編雖不可見然考之中説而得其規模之大略則彼之賛易是豈足以知先天後天之相為體用而高文武宣之制是豈有精一執中之傳曹劉沈謝之詩是豈有物則秉彛之訓叔孫通公孫述曹褒荀朂之禮樂又孰與伯夷后䕫周公之懿至於宋魏以來一南一北校功度徳蓋未有以相君臣也則其天命人心之向背統緒繼承之偏正亦何足論而欲攘臂其間奪彼予此以自列於孔子之春秋哉蓋既不自知其學之不足以為周孔又不知兩漢之不足以為三王而徒欲以是區區者比而效之於形似影響之間傲然自謂足以承千聖而詔百王矣而不知其初不足以供兒童之一戲又適以是而自納於吴楚僣王之誅使夫後世知道之君子雖或有取於其言而終不能無恨於此是亦可悲也已至於假卜筮象論語而强引唐初文武名臣以為弟子是乃福郊福畤之所為而非仲淹之雅意然推原本始乃其平日好高自大之心有以啟之則亦不得為無罪矣或曰然則仲淹之學固不得為孟子之倫矣其視荀楊韓氏亦有可得而優劣者耶曰荀卿之學雜於申商子雲之學本於黄老而其著書之意蓋亦姑託空文以自見耳非如仲淹之學頗近於正而粗有可用之實也至於退之原道諸篇則於道之大原若有非荀楊仲淹之所及者然考其平生意鄉之所在終不免文士浮華放浪之習時俗富貴利達之求而其覽觀古人之變将以措諸事業者恐亦未若仲淹之致懇惻而有條理也是以予於仲淹獨深惜之而有所不暇於三子是亦春秋責備賢者之遺意也可勝歎哉王通也有好處只是也無本原工夫却要将秦漢以下文飾做箇三代他便自要比孔子不知如何比得他那斤兩輕重自定你如何文飾得如續詩續書元經之作盡要學箇孔子重做一箇三代如何做得如續書要載漢以來詔令他那詔令便載得發明得甚麽義理發明得甚麽政事只有高帝時三詔令稍好然已不純如曰肯從我㳺者吾能尊顯之此豈所以待天下之士哉都不足錄三代之書誥詔令皆是根源學問發明義理所以粲然可為後世法如秦漢以下詔令濟得甚事緣他都不曽将心子細去讀聖人之書只是要依他箇模子見聖人作六經我也學他作六經只是将前人腔子自做言語填放他腔中便説我這箇可以比並聖人聖人做箇論語我便做中説如揚雄太𤣥法言亦然不知怎生比並問王氏續經説荀卿固不足以望之若房杜輩觀其書則固嘗往來于王氏之門其後來相業還亦有得於王氏之道否曰房杜如何敢望文中子之萬一其規模事業無文中子髣髴某常説房杜只是箇村宰相文中子不干事他那制度規模誠有非後人之所及者韓子總論荀揚王韓附程子曰古之君子修徳而已徳成而言則不期於文而自文矣退之乃因學為文章力求其所未至以至於有得也其曰軻死不得其傳非卓然見其所傳者語不及此韓愈道他不知又不得其言曰易竒而法詩正而葩春秋謹嚴左氏浮誇其名理皆善韓退之頌伯夷甚好然只説得伯夷介處要知伯夷之心須是聖人語曰不念舊惡怨是用希此甚説得伯夷心也原道之作其言雖未盡善然孟子之後識道之所傳者非誠有所見不能㫁然言之如是其明也其識大矣韓愈亦近世豪傑之士如原道中言語雖有病然自孟子而後能将許大見識㝷求者纔見此人至如㫁曰孟子醇乎醇又曰荀與揚擇焉而不精語焉而不詳若不是他見得豈千餘年後便能㫁得如此分明也朱子曰韓退之却有些本領非歐公比原道其言雖不精然皆實大綱是問博愛之謂仁曰程先生之説最分明只是不子細看要之仁便是愛之體愛便是仁之用後段云以之為人則愛而公愛公二字却甚有義問原道起頭四句恐説得差且如博愛之謂仁愛如何便盡得仁曰只為他説得用又遺了體問由是而之焉之謂道曰此是説行底非是説道體問足乎已無待於外之謂徳曰此是説行道而有得於身者非是説自然得之於天者問仁與義為定名道與徳為虚位虚位之義如何曰亦説得通蓋仁義禮智是實此道徳字是通上下説却虚如有仁之道義之道仁之徳義之徳此道徳只隨仁義上説是虚位他又自説道有君子小人徳有凶有吉謂吉人則為吉徳凶人則為凶徳君子行之為君子之道小人行之為小人之道如道二仁與不仁君子道長小人道消之類若是志於道據於徳方是好底方是道徳之正自古罕有人説得端的惟退之原道庶㡬近之却説見大體程子謂能作許大識見㝷求真箇如此他資才甚高原性人多忽之却不見他好處如言所以為性者五曰仁義禮智信此語甚實問韓文公説人之所以為性者五是他實見得到後如此説邪為復是偶然説得著曰看他文集中説多是閒過日月初不見他做工夫處想只是才高偶然見得如此及至説到精微處又却差了問原性三品之説是否曰退之説性只将仁義禮智來説便是識見高處如論三品亦是但以某觀人之性豈獨三品須有百千萬品退之所論却少了一氣字程子曰論性不論氣不備論氣不論性不明此皆前所未發如夫子言性相近若無習相遠一句便説不行如人生而静静固是性只着一生字便是帶着氣質言了但未嘗明説着氣字惟周子太極圗却有氣質底意思程子之論又自太極圗中見出來也原鬼不知鬼神之本只是在外説箇影子問讀墨篇言孔子尚同兼愛與墨子同曰未論孔墨之同異只此大小便不相敵不可以對待言也以此而論則退之全未知孔子所以為孔子者問孟子謂楊墨之道不息孔子之道不著韓文公推尊孟氏闢楊墨之功以為不在禹下而讀墨一篇却謂孔子必用墨子墨子必用孔子者何也曰韓文公第一義是去學文字第二義方去窮究道理所以看得不親切如云其行己不敢有愧於道他本只是學文其行己但不敢有愧於道爾把這箇做第二義似此様處甚多問觀昌黎與孟簡書其從大顛是當時已有議論而與之分解不審有崇信之意否曰真箇是有崇信底意他是貶從那潮州去無聊後被他説轉了黄義剛曰韓公雖有心學問但於利禄之念甚重曰他也是不曽去做工夫他於外面皮殻子上都見得安排位次是恁地如原道中所謂寒然後為之衣飢然後為之食為宫室為城郭等皆説得好只是不曽向裏面省察不曽就身上細宻做工夫只從麄處去不見得原頭來處如一港水他只見得是水却不見那源頭來處是如何把那道别做一件事道是可以行於世我今只是恁地去行故立朝議論風采亦有可觀却不是從裏面流出平日只以做文吟詩飲酒博戲為事及貶潮州寂寥無人共吟詩無人共飲酒又無人共博戲見一箇僧説道理便為之動如云所示廣大深逈非造次可喻不知大顛與他説箇什麽得恁地傾心信向韓公所説底大顛未必曉得大顛所説底韓公亦見不破但是他説得恁地好後便被他動了陳安卿曰博愛之謂仁等説亦可見其無原頭處曰以博愛為仁則未有博愛之前不成是無仁黄義剛曰他説明明徳却不及致知格物緣其不格物所以恁地曰他也不曉那明明徳若能明明徳便是識原頭來處了又曰孟子後荀楊淺不濟得事只有箇王通韓愈好又不全安卿曰他也只是見不得十分不能止於至善也曰也是問韓子稱孟子醇乎醇荀與楊大醇而小疵程子謂韓子稱孟子甚善竊謂韓子既以失大本不識性者為大醇則其稱孟氏醇乎醇亦只是説得到未必真見得到曰韓子説荀楊大醇是泛説與田騈慎到申不害韓非之徒觀之則荀楊為大醇韓子只説那一邊湊不着這一邊若是㑹説底説那一邊亦自湊着這一邊程子説荀子極偏駮楊子雖少過此等語皆是就分金秤上説下來今若不曽看荀子楊子則所謂偏駮雖少過等處亦見不得問昌黎學者莫是李翺最識道理否曰也只是從佛中來問渠有去佛齋文闢佛甚堅曰只是麄迹至説道理却類佛又問退之見得不甚分明曰他於大節目處又却不錯亦未易議問莫是説傳道是否曰亦不止此他氣象大抵大又歐陽只説韓李不曽説韓栁韓退之著書立言觝排佛老不遺餘力然讀其謝潮州表答孟簡書及張籍侑奠之詞則其所以處於禍福死生之際有愧於異學之流者多矣其不能有以深服其心也宜哉韓退之歐陽永叔所謂扶持正道不雜釋老者也然到得𦂳要處更處置不行更説不去便説得來也拙不分曉緣他不曽去窮理只是學作文所以如此韓退之及歐蘇諸公議論不過是主於文詞少間却是邊頭帶説得些道理其本意終自可見北溪陳氏曰韓公學無原頭處如原道一篇鋪叙許多節目亦可謂見得道之大用流行於天下底分曉但不知其體本具於吾身故於反身内省處殊無細宻工夫只是與張籍輩吟詩飲酒度日其中自無所執守致得後來潮陽之貶寂寞無聊中遂不覺為大顛説道理動了故俛首與之從逰而忘其平昔排佛老之説西山真氏曰唐史韓愈本傳云其原道原性師説等數十篇皆奥衍閎深與孟軻楊雄相表裏而佐佑六經云又曰自晉迄隋老佛顯行諸儒倚天下正議助為恠神愈獨喟然引聖争四代之惑雖䝉訕笑跲而復奮始若未之信卒大顯于時昔孟軻拒楊墨去孔子才二百年愈排二家乃去千載餘撥衰反正功與齊而力倍之所以過况雄為不少矣自愈没其言大行學者仰之如泰山北斗云史氏之稱愈者如此而程朱二先生議論乃或是非相半蓋史氏存乎奨善而二先生講學明道則雖毫釐必致其察此所以不同歟又曰昔者聖人言道必及器言器必及道盡性至命而非虚也灑掃應對而非末也自清静寂滅之教行乃始以日用為粃糠天倫為疣贅韓子憂之於是原道諸篇相繼而作其語道徳也必本於仁義而其分不離父子君臣之間其法不過禮樂刑政之際飲食裘葛即正理所存斗斛權衡亦至教所寓道之大用粲然復明者韓子之功也程子曰荀楊性已不識更説甚道已下總論荀楊王韓荀卿才高學陋以禮為偽以性為惡不見聖賢雖曰尊子弓然而時相去甚遠聖人之道至卿不傳楊子雲仕莽謂之旁燭無疆可乎隐可也仕不可也荀卿才高其過多楊雄才短其過少韓子稱其大醇非也若二子可謂大駮矣然韓子責人甚恕楊子無自得者也故其言蔓衍而不㫁優柔而不决其論性則曰人之性也善惡混修其善則為善人修其惡則為惡人荀子悖聖人者也故列孟子於十二子而謂人之性惡朱子曰荀子儘有好處勝似楊子然亦難看諸子百家書亦有説得好處如荀子曰君子大心則天而道小心則畏義而節此二句説得好問荀子資質也是箇剛明底人曰只是麄他那物事皆未成箇模様便将來説問楊子工夫比之荀子恐却細膩曰楊子説到深處止是走入老莊窠窟裏去如清静寂寞之説皆是也又如𤣥中所説靈根之説之類亦只是老莊意思止是説那養生底工夫爾問東坡言三子言性孟子已道性善荀子不得不言性惡固不是然人之一性無自而見荀子乃言其惡他莫只是要人修身故立此説曰不須理㑹荀卿且理㑹孟子性善渠分明不識道理如天下之物有黒有白此是黒彼是白又何須辯荀楊不惟説性不是從頭到底皆不識當時未有明道之士被他説用於世千餘年韓退之謂荀楊大醇而小疵伊川曰韓子責人甚恕自今觀之他不是責人恕乃是看人不破今且於自已上作工夫立得本本立則條理分明不待辯問楊子與韓文公優劣如何曰各自有長處韓文公見得大意已分明但不曽去子細理㑹如原道之類不易得也楊子雲為人深沉㑹去思索如隂陽消長之妙他直是去推求然而如太𤣥之類亦是拙底工夫道理不是如此蓋天地間只有箇竒耦竒是陽耦是隂春是少陽夏是太陽秋是少隂冬是太隂自二而四自四而八只恁推去都走不得而楊子却添兩作三謂之天地人事事要分作三截又且有氣而無朔有日星而無月恐不是道理亦如孟子既説性善荀子既説性惡他無可得説只得説箇善惡混若有箇三底道理聖人想自説了不待後人説矣看他裏面推得辛苦却就上面説些道理亦不透徹看來其學似本於老氏如惟清惟静惟淵惟黙之語皆是老子意思韓文公於仁義道徳上看得分明其綱領已正却無他這箇近於老子底説話又問文中子如何曰文中子之書恐多是後來人添入真偽難見然好處甚多但一一似聖人恐不應恰限有許多事相湊得好如見其荷蓧隐者之類不知如何得恰限有這人若道他都是粧㸃來又恐粧㸃不得許多然就其中惟是論世變因革處説得極好又問程子謂楊子之學實韓子之學華是如何曰只緣韓子做閒雜言語多故謂之華若楊子雖亦有之不如韓子之多楊子雲韓退之二人也難説優劣但子雲所見處多得之老氏在漢末年難得人似他亦如荀子言語亦多病但就彼時亦難得一人如此子雲所見多老氏者往往蜀人有嚴君平源流問温公最喜太𤣥曰温公全無見處若作太𤣥何似作厯老泉嘗非太𤣥之數亦説得是又問與康節如何曰子雲何敢望康節康節見得高又超然自得退之却見得大綱有七八分見識如原道中説得仁義道徳煞好但是他不去踐履玩味故見得不精微細宻伊川謂其學華者只謂愛作文章如作詩説許多閒言語皆是華也看得來退之勝似子雲問程子言近世豪傑楊子雲豈得如愈如何曰只以言性論之則楊子善惡混之説所見僅足以比告子若退之見得到處却甚峻絶性分三品正是説氣質之性至程門説破氣字方有去著此退之所以不易及也嘗令學者論董仲舒楊子雲王仲淹韓退之四子優劣曰董仲舒自是好人楊子雲不足道這兩人不須説只有文中子韓退之這兩人疑似學者多主退之曰看文中子根脚淺然却是以天下為心分明是要見諸事業天下事他都一齊入思慮來雖是卑淺然却是循規蹈矩要做事業底人其心却公如韓退之雖是見得箇道之大用是如此然却無實用功處他當初本只是要討官職做始終只是這心他只是要做得言語似六經便以為傳道至其每日工夫只是做詩博奕酣飲取樂而已觀其詩便可見都襯貼那原道不起至其做官臨政也不是要為國做事也無甚可稱其實只是要討官職而已問荀楊王韓四子曰凡人著書須自有箇規模自有箇作用處或流於申韓或歸於黄老或有體而無用或有用而無體不可一律觀且如王通這人於世務變故人情物態施為作用處極見得分曉只是於這作用曉得處却有病韓退之則於大體處見得而於作用施為處却不曉如原道一篇自孟子後無人似他見得郊焉而天神格廟焉而人鬼享以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當説得極無疵只是空見得箇本原如此下面工夫都空疎更無物事撑柱襯簟所以於用處不甚可人意如論文章云自屈原荀卿孟軻司馬遷相如楊雄之徒却把孟軻與數子同論可見無見識荀卿則全是申韓觀成相一篇可見他見當時庸君暗主戰鬬不息憤悶惻怛深欲提耳而誨之故作此篇然其要卒歸於明法制執賞罰而已他那做處粗如何望得王通楊雄則全是黄老某嘗説揚雄最無用真是一腐儒他到急處只是投黄老如反離騷幷老子道徳之言可見這人更無足説自身命也奈何不下如何理㑹得别事如法言一卷議論不明快不予决如其為人荀楊二人自不可與王韓同日語問王通病處如何曰這人於作用處曉得急欲見之於用故便要做周公底事業便去上書要興太平及知時勢之不可為做周公事業不得則急退而續詩續書元經又要做孔子底事業殊不知孔子之時接乎三代有許多典謨訓誥之文有許多禮樂法度名物度數數聖人之典章皆在於是取而纘述方做得這箇家具成王通之時有甚麽典謨訓誥有甚麽禮樂法度乃欲取漢魏以下者為之書則欲以七制命議之屬為續書詩則欲取曹劉沈謝者為續詩續得這般詩書廢明得箇甚麽道理自漢以來詔令之稍可觀者不過數箇如高帝求賢詔雖好已自不純文帝勸農武帝薦賢制䇿輪臺之悔只有此數詔略好此外盡無那一篇比得典謨訓誥便求一篇如君牙冏命秦誓也無曺劉沈謝之詩又那得一篇如鹿鳴四牡大明文王闗雎鵲巢亦有學為四句古詩者但多稱頌之詞言皆過實不足取信樂如何有雲英咸韶濩武之樂禮又如何有伯夷周公制作之禮他只是急要做箇孔子又無佐證故裝㸃㡬箇人來做堯舜湯武皆經我刪述便顯得我是聖人如中説一書都是要學孔子論語説泰伯三以天下讓他便説陳思王善讓論語説殷有三仁他便説荀氏有二仁又捉㡬箇公卿大夫來相答問便比當時門人弟子正如梅聖俞説歐陽永叔他自要做韓退之却将我來比孟郊王通便是如此便胡亂捉别人來為聖為賢殊不知秦漢以下君臣人物斤兩已定你如何能加重中説一書固是後人假託非王通自著然畢竟是王通平生好自夸大續詩續書紛紛述作所以起後人假託之過後世子孫見他學周公孔子學不成都冷淡了故又取一時公卿大夫之顯者纉緝附㑹以成之畢竟是王通有這様意思在雖非他之過亦他有以啟之也如世人説坑焚之禍起於荀卿荀卿著書立言何嘗教人焚書坑儒只是觀他無所顧藉敢為異論則其末流便有坑焚之理然王通比荀楊又夐别王通極開爽説得廣闊緣他於事上講究得精故於世變興亡人情物態更革沿襲施為作用先後次第都曉得識得箇仁義禮樂都有用處若用於世必有可觀只可惜不曽向上透一著於大體處有所欠闕所以如此若更曉得高處一著那裏得來只細看他書便見他極有好處非特荀楊道不到雖韓退之也道不到然王通所以如此者其病亦只在於不曽子細讀書若是子細讀書知聖人所説義理之無窮自然無工夫閑做他死時只三十餘嵗他却火速要做許多事問若少假之年必有可觀曰不然他氣象局促只如此了他做許多書時方只二十餘嵗孔子七十嵗方繫易作春秋而王通未三十皆做了聖人許多事業氣象去不得了又曰中説一書如子弟記他言行也煞有好處雖云其書是後人假託不㑹假得許多須真有箇人坯模如此方裝㸃得成假使懸􅆰白撰得一人如此則能撰之人亦自大有見識非凡人矣歐陽子蘇氏軾曰自漢以來道術不出於孔氏而亂天下者多矣晉以老莊敗梁以佛亡莫或正之五百餘年而後得韓愈學者以配孟氏蓋庶㡬焉愈之後三百有餘年而後得歐陽子其學推韓愈孟子以達於孔氏故天下翕然師尊之曰歐陽子今之韓愈也宋興七十餘年民不知兵富而教之至天聖景祐極矣而斯文終有愧於古士亦因陋守舊論卑而氣弱自歐陽氏一出天下争自濯磨以通經學古為高以救時行道為賢以犯顔納諫為忠長育成就至嘉祐末號稱多士歐陽子之功為多蘇氏轍曰公權知貢舉是時進士為文以詭異相高號太學體文體大壊公患之所取率以詞義近古為貴比之險恠知名者黜去殆盡牓出怨議紛然乆之乃服然文章自是變而復古龜山楊氏曰孟子一部書只是要正人心教人存心養性收其放心至論仁義禮智則以惻隐羞惡辭讓是非之心為之端論邪説之害則曰生於其心害於其政論事君則欲格君心之非千變萬化只説從心上來人能正心則事無足為者矣大學之脩身齊家治國平天下其本只是正心誠意而已心得其正然後知性之善孟子遇人便道性善永叔却言聖人之教人性非所先永叔論别是非利害文字上儘去得但於性分之内全無見處更説不行人性上不可添一物堯舜所以為萬世法亦只率性而已所謂率性循天理是也外邊用計用數假饒立得功業只是人欲之私與聖賢作處天地懸隔問歐公如何朱子曰淺乆之又曰大槩皆以文人自立平時讀書只把做考究古今治亂興衰底事要做文章都不曽向身上做工夫平日只是以吟詩飲酒戲謔度日歐公文字大綱好處多晚年筆力亦衰言行錄曰公於古文得之自然非學所至超然獨騖衆莫能及譬夫天地之妙造化萬物動者植者無細與大不見痕迹自極其工蘇子王安石附朱子曰嘗聞之師云二蘇聰明過人所説語孟儘有好處蓋天地間道理不過如此有時便見得到皆聰明之發也但見到處却有病若欲窮理不可不論也蘇氏之學以雄深敏妙之文煽其傾危變幻之習以故被其毒者淪肌浹髓而不自知今日正當拔本塞源以一學者之聽庶乎其可以障狂瀾而東之若方且懲之而又遽有取其所長之意竊恐學者未知所擇一取一舍之間又将與之俱化而無以自還或謂蘇學以為世人讀之止取文章之妙初不於此求道則其失自可置之夫學者之求道固不於蘇氏之文矣然既取其文則文之所述有邪有正有是有非是亦皆有道焉固求道者之所不可不講也講去其非以存其是則道固於此乎在矣而何不可之有若曰惟其文之取而不復議其理之是非則是道自道文自文也道外有物固不足以為道且文而無理又安足以為文乎蓋道無適而不存者也故即文以講道則文與道兩得而一以貫之否則亦将兩失之矣中無主外無擇其不為浮誇險詖所入而亂其如思也者㡬希况彼之所以自任者不但曰文章而已既亡以考其得失則其肆然而談道徳於天下夫亦孰能禦之答汪尚書書曰蘇學邪正之辨終不能無疑於心蓋熹前日所陳乃論其學儒不至而流於詖滛邪遁之域竊味來教乃病其學佛未精而滯於智慮言語之間此所以多言而愈不合也夫其始之闢禪學也豈能明天人之藴推性命之原以破其荒誕浮虚之説而反之正哉如大悲閣中和院記之屬直掠彼之粗以角其精據彼之外以攻其内是乃率子弟以攻父母信枝葉而疑本根亦安得不為之詘哉近世攻釋氏者如韓歐孫石之正龜山猶以為一杯水救一車薪之火况如蘇氏以邪攻邪是束緼灌膏而往赴之也直以身為燼而後已耳來教又以為蘇氏乃習氣之弊雖不知道而無邪心非若王氏之穿鑿附㑹以濟其私邪之學也熹竊謂學以知道為本知道則學純而心正見於行事發於言語亦無往而不得其正焉如王氏者其始學也蓋欲陵跨揚韓掩迹顔孟初亦豈遽有邪心哉特以不能知道故其學不純而設心造事遂流入於邪又自以為是而大為穿鑿附㑹以文之此其所以重得罪於聖人之門也蘇氏之學雖與王氏若有不同者然其不知道而自以為是則均焉學不知道其心固無所取則以為正又自以為是而肆言之其不為王氏者特天下未被其禍而已其穿鑿附㑹之巧如來教所稱論成佛説老子之屬蓋非王氏所及而其心之不正至乃謂湯武簒弑而盛稱荀彧以為聖人之徒凡若此類皆逞其私邪無復忌憚不在王氏之下借曰不然而原情以差其罪則亦不過稍從末減之科而已豈可以是為當然而莫之禁乎書曰天討有罪五刑五用哉此刑法之本意也若天理不明無所準則而屑屑焉惟原情之為務則無乃徇情廢法而縱惡以啓姦乎楊朱學為義者也而偏於為我墨翟學為仁者也而流於兼愛本其設心豈有邪哉皆以善而為之耳特於本原之際微有毫釐之差是以孟子推言其禍以為無父無君而陷於禽獸辭而闢之不少假借孟子亦豈不原其情而過為是刻核之論哉誠以其賊天理害人心於㡬微之間使人陷溺而不自知非若刑名狙詐之術其禍淺切而易見也是以拔本塞源不得不如是之力書曰予畏上帝不敢不正又曰予弗順天厥罪惟均孟子之心亦若是而已爾以此論之今日之事王氏僅足為申韓儀衍而蘇氏學不正而言成理又非楊墨之比愚恐孟子復生則其取舍先後必将有在矣答程允夫書曰來書謂熹之言乃論蘇氏之粗者不知如何而論乃得蘇氏之精者此在吾弟必更有説然熹則以為道一而已正則表裏皆正譎則表裏皆譎豈可以析精粗為二致此正不知道之過也又謂洗垢索瘢則孟子以下皆有可論此非獨不見蘇氏之失又幷孟子而不知也夫蘇氏之失著矣知道愈明見之愈切雖欲為之覆藏而不可得何待洗垢而索之耶若孟子則如青天白日無垢可洗無瘢可索今欲掩蘇氏之疵而援以為比豈不適所以彰之耶黄門比之乃兄似稍簡静然謂簡静為有道則與子張之指清忠為仁何以異第深考孔子所答之意則知簡静之與有道蓋有間矣况蘇公雖名簡静而實隂險元祐末年規取相位力引小人楊畏使傾范忠宣公而以己代之既不效矣則誦其彈文於坐以動范公此豈有道君子所為哉此非熹之言前輩固己筆之於書矣吾弟乃謂其躬行不後二程何其考之不詳而言之之易也二程之學始焉未得其要是以出入於佛老及其反求而得諸六經也則豈固以佛老為是哉如蘇氏之學則方其年少氣豪固嘗妄觝禪學及其中嵗流落不耦鬱鬱失志然後匍匐而歸焉始終迷惑進退無據以比程氏正傷子先病後瘳先瘳後病之説吾弟比而同之是又欲洗垢而索孟子之瘢也又謂程氏於佛老之言皆陽抑而隂用之夫竊人之財猶謂之盜况程氏之學以誠為宗今乃隂竊異端之説而公排之以蓋其跡不亦盜憎主人之意乎必若是言則所謂誠者安在而吾弟之所以裁抑之意果何謂也挟天子以令諸侯乃權臣䟦扈借資以取重於天下豈真尊主者哉若儒者論道而以是為心則亦非真尊六經者此其心跡之間反覆畔援去道已不啻百千萬里之遠方且自為邪説詖行之不暇又何暇攻百氏而望其服於己也凡此皆蘇氏心術之蔽故其吐辭立論出於此者十而八九吾弟讀之愛其文辭之工而不察其義理之悖日往月來遂與之化如入鮑魚之肆乆則不聞其臭矣而此道之傳無聲色臭味之可娯非若侈麗閎衍之辭縱横捭闔之辨有以眩世俗之耳目而蠱其心自非真能洗心滌慮以入其中真積力乆卓然自見道體之不二不容復有毫髪邪妄雜於其間則豈肯遽然舍其平生之所尊敬向慕者而信此一夫之口哉故伊川為明道墓表曰學者於道知所向然後見斯人之為功知所至然後見斯名之稱情蓋為此也然世衰道微邪偽交熾士溺於見聞之陋各自是其所是若非痛加剖析使邪正真偽判然有歸則學者将何所適從以知所向况欲望其至之乎又曰蘇氏文辭偉麗近世無匹若欲作文自不妨模範但其辭意矜豪譎詭亦有非知道君子所欲聞是以平時每讀之雖未嘗不喜然既喜未嘗不厭往往不能終帙而罷非故欲絶之也理勢自然蓋不可曉然則彼醉於其説者欲入吾道之門豈不猶吾之讀彼書也哉亦無恠其一胡一越而終不合矣又曰東坡善議論有氣節蘇子由云學聖人不如學道他認道與聖人做兩箇物事不知道便是無軀殻底聖人聖人便是有軀殻底道學道便是學聖人學聖人便是學道如何将做兩箇物事看或謂蘇程之學二家當時自相排斥蘇氏以程氏為姦程氏以蘇氏為縱横以某觀之只有荆公脩仁宗實錄言老蘇之書大抵皆縱横者流程子未嘗言也如遺書賢良一段繼之以得志不得志之説却恐是説他坡公在黄州猖狂放恣不得志之説恐指此而言楊道夫問坡公苦與伊洛相排不知何故曰他好放肆見端人正士以禮自将却恐他來檢㸃故恁詆訾道夫曰坡公氣節有餘然過處亦自此來曰固是又云老蘇辨姦初間只是私意如此後來荆公做不著遂中他説然荆公氣習自是一箇要遺形骸離世俗底模様喫物不知飢飽嘗記一書載公於飲食絶無所嗜唯近者必盡左右疑其為好也明日易以他物而置此品於遠則不食矣往往於食未嘗知味也至如食釣餌當時以為詐其實自不知了近世吕伯恭亦然面垢身汙似所不䘏飲食亦不知多寡要之即此便是放心辨姦以此等為姦恐不然也老蘇之出當時甚敬崇之惟荆公不以為然故其父子皆切齒之然老蘇詩云老態盡從愁裏過壯心偏旁醉中來如此無所守豈不為他荆公所笑如上韓公書求官職如此所為又豈不為他荆公所薄至如坡公著述當時使得盡行所學則事亦未可知從其逰者皆一時輕薄輩無少行檢就中如秦少㳺則其最也諸公見他説得去更不契勘當時若使盡聚朝廷之上則天下何由得平更是坡公首為無稽游從者從而和之豈不害事但其用之不乆故他許多敗壊之事未出兼是後來羣小用事又費力似他故覺得他箇好又曰蘇黄門謂之近世名卿則可以顔子方之某不得不論也大抵學者貴於知道蘇公早拾蘇張之緒餘晚醉佛老之糟粕謂之知道可乎古史中論黄帝堯舜禹益子路管仲曽子子思孟子老聃之屬皆不中理未易槩舉但其辯足以文之世之學者窮理不深因為所眩耳某數年前亦嘗惑焉近嵗始覺其繆問荆公與坡公之學曰二公之學皆不正但東坡之徳行那裏得似荆公東坡初年若得用未必其患不甚於荆公但東坡後來見得荆公狼狽所以都自改了初年論甚生財後來見青苖之法行得狼狽便不言生財初年論甚用兵如曰用臣之言雖北取契丹可也後來見荆公用兵用得狼狽更不復言兵他分明有兩截底議論性理大全書卷五十八

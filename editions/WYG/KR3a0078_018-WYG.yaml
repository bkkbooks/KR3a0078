body:
  text: 劉氏垓孫曰呂汲公家祭儀曰古者小宗有四有繼禰之宗繼祖之宗繼曾祖之宗繼髙祖之宗所以主祭祀而統族人後世宗法既廢散無所統祭祀之禮家自行之支子不能不祭祭不必告於宗子今宗法雖未易復而宗子主祭之義略可舉行宗子為士庶子為大夫以上牲祭於宗子之家故今議家廟雖因支子而立亦宗子主其祭而用其支子命數所得之禮可合禮意先生曰祭祀須是用宗子法方不亂不然前面必有不可處置者父在主祭子出仕宦不得祭父没宗子主祭庶子出仕宦祭時其禮亦合減殺不得同宗子宗子只得立適雖庶長立不得若無適子則亦立庶子所謂世子之同母弟世子是適若世子死則立世子之親弟亦是次適也是庶子不得立也大宗法既立不得亦當立小宗法祭自髙祖以下親盡則請出髙祖就伯叔位服未盡者祭之嫂則别處後其子私祭之今世禮全亂了性理大全書卷十八

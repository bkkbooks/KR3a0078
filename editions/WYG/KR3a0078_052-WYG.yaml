body:
  text: 性理大全書卷五十二學十入倫師友附問盡其道謂之孝弟夫以一身推之則身者資父母血氣以生者也盡其道者則能敬其身敬其身者則能敬其父母矣不盡其道則不敬其身不敬其身則不敬父母其斯之謂歟程子曰今士大夫受職於君期盡其職受身於父母安可不盡其道問第五倫視其子之疾與兄子之疾不同自謂之私如何曰不特安寢與不安寢只不起與十起便是私也父子之愛本是公纔著些心做便是私也又問視已子與兄子有間否曰聖人立法曰兄弟之子猶子也是欲視之猶子也又問天性自有輕重疑若有間然曰只為今人以私心看了孔子曰父子之道天性也此只就孝上説故言父子天性若君臣兄弟賓主朋友之類亦豈不是天性只為今人小看却不推其本所由來故爾已之子與兄之子所争幾何是同出於父者也只為兄弟異形故以兄弟為手足人多以異形故親已之子異於兄弟之子甚不是也問人子事親學醫如何曰最是大事今有璞玉於此必使玉人雕琢之葢百工之事不可使一人兼之故使玉人雕琢之也若更有珍寳物須是自看却必不肯任其自為也今人視父母疾乃一任醫者之手豈不害事必須識醫藥之道理别病是如何藥當如何故可任醫者也或曰己未能盡醫者之術或偏見不到適足害事奈何曰且如識圗畫人未必畫得如畫工然他却識别得工拙如自己曾學令醫者説道理便自見得或已有所見亦要説與他啇量君臣朋友之際其合不正未有乆而不離者故賢者順理而安行智者知幾而固守問妻可出乎曰妻不賢出之何害如子思亦嘗出妻今世俗乃以出妻為醜行遂不敢為古人不如此妻有不善便當出也只為今人將此作一件大事隠忍不敢發或有隠惡為其陰持之以至縱恣養成不善豈不害事人修身刑家最急纔修身便到刑家上也又問古人出妻有以對姑叱狗藜蒸不熟者亦無甚惡而遽出之何也曰此古人忠厚之道也古之人交絶不出惡聲君子不忍以大惡出其妻而以微罪去之以此見其忠厚之至也且如叱狗於親前者亦有甚大故不是處只為他平日有故因此一事出之爾或曰彼以此細故見逐安能無辭兼他人不知是與不是則如之何曰彼必自知其罪但自己理直可矣何必教他人知然有識者當自知之也如必待彰暴其妻之不善使他人知之是亦淺丈夫而已君子不如此大凡人説話多欲令彼曲我直若君子自有一箇含容意思或曰古語有之出妻令其可嫁絶友令其可交乃此意否曰是也問再娶皆不合禮否曰大夫以上無再娶禮凡人為夫婦時豈有一人先死一人再娶一人再嫁之約只約終身夫婦也但自大夫以下有不得已再娶者葢縁奉公姑或主内事爾如大夫以上至諸侯天子自有嬪妃可以供祀禮所以不許再娶也世人多慎於擇壻而忽於擇婦其實壻易見婦難知所繫甚重可忽哉問事兄盡禮不得兄之歡心奈何曰但當起敬起孝盡至誠不求伸已可也曰接弟之道如何曰盡友愛之道而已周公之於兄舜之於弟皆一類觀其用心為何如哉推此心以待人亦只如此然有差等耳涑水司馬氏曰某事親無以踰於人能不欺而已矣其事君亦然受人恩而不忍負者其為子必孝為臣必忠滎陽吕氏曰孝子事親須事事躬親不可委之使令也嘗觀穀梁言天子親耕以供粢盛王后親蠶以供祭服國非無良農工女也以為人之所盡事其祖禰不若以已所自親者也此説最盡事親之道又説為人子者視於無形聼於無聲未嘗頃刻離親也事親如天頃刻離親則有時而違天天不可得而違也藍田吕氏曰君子之道莫大乎孝孝之本莫大乎順親故仁人孝子欲順乎親必先乎妻子不失其好兄弟不失其和室家宜之妻孥樂之致家道成然後可以養父母之志而無違也故身不行道不行於妻子文王刑於寡妻至于兄弟則治家之道必自妻子始豫章羅氏曰君明君之福臣忠臣之福君明臣忠則朝廷治安得不謂之福乎父慈父之福子孝子之福父慈子孝則家道隆盛得不謂之福乎俗人以富貴為福陋哉韋齋朱氏曰父子主恩君臣主義是為天下之大戒無所逃於天地之間如人食息呼吸於元氣之中一息之不屬理必至於斃是以自昔聖賢立法垂訓所以維持防範於其間者未嘗一日而少忘朱子曰聖人之於天地猶子之於父母人之所以有此身者受形於母而資始於父雖有強暴之人見子則憐至於襁褓之兒見父則笑果何為而然哉初無所為而然此父子之道所以為天性而不可解也然父子之間或有不盡其道者是豈為父而天性有不足於慈亦豈為子而天性有不足於孝者哉人心本明天理素具但為物欲所昏利害所蔽故小則傷恩害義而不可開大則滅天亂倫而不可救也君臣父子之大倫天之經地之義而所謂民彛也故臣之於君子之於父生則敬養之歿則哀送之所以致其忠孝之誠者無所不用其極而非虚加之也以為不如是則吾以盡吾心云爾父子欲其親君臣欲其敬非是欲其如此葢有父子則便自然有親有君臣則便自然有敬問父母之於子有無窮之憐愛其聰明欲其成立此之謂誠心邪曰父母愛其子正也愛之無窮而必欲其如此則邪矣此天理人欲之間正當審决問人不幸處繼母異兄弟不相容當如何曰從古來自有這樣子只看舜如何後來此様事多有只是為人子止於孝問妻有七出此却是正當道理非權也曰然葉賀孫問朋友之義自天子至於庶人皆須友以成而陳安卿只説以類聚莫未該朋友之義否曰此亦只説本來如此自天子至于庶人未有不須友以成乃是後來事説朋友功效如此人自與人同類相求牛羊亦各以類相從朋友乃彛倫之一今人不知有朋友之義者只縁但知有四箇要𦂳而不知朋友亦不可闕又曰朋友之於人倫所關至重問與朋友交後知其不善欲絶則傷恩不與之絶則又似慝怨而友其人曰此非慝怨之謂也心有怨於人而外與之交則為慝怨若朋友之不善情意自是當疏但疏之以漸若無大故則不必峻絶之所謂親者毋失其為親故者毋失其為故者也人之大倫其别有五自昔聖賢皆以為天之所叙而非人之所能為也然以今考之則惟父子兄弟為為天而以人合者居其三馬是則若有可疑者然夫婦者天屬之所由以續者也君臣者天屬之所頼以全者也朋友者天屬之所頼以正者也是則所以紀綱人道建立人極不可一日而偏廢雖或以人而合其實皆天理之自然有不得不合者此其所以為天之所叙而非人之所能為者也然是三者之於人或能具其形矣而不能保其生或能保其生矣而不能存其理必欲君臣父子兄弟夫婦之間交盡其道而無悖焉非有朋友以責其善輔其仁其孰能使之然哉故朋友之於人倫其勢若輕而所繫為甚重其分若疏而所闗為至親其名若小而所職為甚大此古之聖人修道立教所以必重乎此而不敢忽也然自世敎不明君臣父子兄弟夫婦之間既皆莫有盡其道者而朋友之倫廢闕為尤甚世之君子雖或深病其然未必深知其所以然也予嘗思之父子也兄弟也天屬之親也非其乖離之極固不能輕以相棄而夫婦君臣之際又有雜出于物情事勢而不能自己者以故雖或不盡其道猶得以相牽聨比合而不至於盡壊至於朋友則其親不足以相維其情不足以相固其勢不足以相攝而為之者初未嘗知其理之所從職之所任其重有如此也且其於君臣父子兄弟夫婦之間猶或未嘗求盡其道則固無所藉於責善輔仁之益此其所以恩踈而義薄輕合而易離亦無恠其相視漠然如行路之人也夫人倫有五而其理則一朋友者又所藉以維持是理而不使悖焉者也由夫四者之不求盡道而朋友以無用廢然則朋友之道盡廢而責善輔仁之職不舉彼夫四者又安得獨立而乆存哉南軒張氏曰天地位而人生乎其中其所以為人之道者以其有父子之親長㓜之序夫婦之别而又有君臣之義朋友之交也是五者天之所命而非人之所能為有是性則具是道初不為聖愚而加損也聖人能盡其性故為人倫之至衆人則有所蔽奪而淪失之耳然聖人有教焉所以化其欲而反其初也舜之命契曰敬敷五教在寛寛云者漸濡涵養之使其所固有者自發也而咎繇亦曰天叙有典敕我五典五惇哉敕云者所以正其綱而惇云者所以厚其性也降及三代庠序之教尤詳故孟子曰學則三代共之皆所以明人倫也明云者講明之而使之識其性之所以然也然則人之所以為聖賢與夫聖賢之教人舍是五者其何以哉勉齋黄氏曰五典者天叙之常理人道之大端也析而言之則君臣夫婦朋友者人之屬而天屬之親惟父子兄弟為然其四肢百體皆一氣之所生其入孝出弟為萬善之根本則兄弟之義可不謂重乎朋友者人類之中志同而道合者也故曰天叙有典豈人力也哉君臣父子夫婦長㓜一失其序則天典不立人道化為夷狄矣朋友道絶則此四者雖欲各居其分不可得也善而莫予告也過而莫予規也觀感廢而怠心生講習疏而實理晦則五常百行顛倒錯繆而不可勝救矣然則朋友者列於人倫而又所以紀綱人倫者也所可重者若此而世莫之重焉可不為之屢歎也邪西山真氏曰夫之道在敬身以帥其婦婦之道在敬身以承其夫故父之醮子必曰勉帥以敬親之送女必曰敬之戒之夫婦之道盡於此矣魯齋許氏曰學則三代共之皆所以明人倫也人倫明於上則小民親於下舜明於庶物察於人倫後世君臣父子兄弟夫婦朋友此五者禍亂相尋只是人倫不明故致如此且如大舜處頑嚚傲三者之間孜孜如此只是人之大倫合如此故無怨尤愛之則喜而弗忘惡之則勞而弗怨人只於此處明得然後盡得人道事親大節目是養體養志致愛致敬四事中致愛敬尤急所以孝只是愛親敬親兩事耳天子之孝推愛敬之心以及天下亦惟此二事為能刑於四海固結人心舍此則法術矣其效與聖人不相似父母在不逺遊為子者恃血氣何所不往但父母思念之心宜深體當以父母之心為心父子之親君臣之義與夫夫婦長㓜朋友亦莫不各有當然之則此天倫也茍無學問以明之則違逺人道與禽獸殆無少異自古及今天下國家唯有箇三綱五常君知君道臣知臣道則君臣各得其所矣父知父道子知子道則父子各得其所矣夫知夫道婦知婦道則夫婦各得其所矣三者既正則他事皆可為之此或未正則其變故不可測知者又奚暇他為也正倫理篤恩義家人之道也人之處家在骨肉父子之間大抵以情勝理以恩奪義惟剛立之人則能不以私愛失其正理故家人卦大要以剛為善兄弟同受父母一氣所生骨肉之至親者也今人不明理義悖逆天性生雖同胞情同吴越居雖同室迹如路人以至計分毫之利而棄絶至恩信妻子之言而結為死怨豈知兄弟之義哉程子曰學者必求其師記問文章不足以為人師以所學者外也故求師不可不慎所謂師者何也曰理也義也以下兼論師友古之人得其師傳故因經以明道後世失其師傳故非明道不能以知經朋友講習更莫如相觀而善工夫多人之於朋友修身誠意以待之踈戚在人而已不巧言令色曲從茍合以求人之與已也雖鄉黨親戚亦然孔子弟子自孔子沒後各自離散只有曽子便别如子夏子張欲以所事孔子事有若獨曽子便道不可自子貢以上必皆不肯某自涪陵歸見門人皆已支離不知他日身後又如何也但得箇信時便自有長進處孔子弟子甚多亦不能皆合於孔子如子路言子之迂也又曰末之也已及其退思終合於孔子只為他信便自然思量到也問某與人居視其有過而不告則於心有所不安告之而人不受則奈何曰與之處而不告其過非忠也要使誠意之交通在於未言之前則言出而人信矣不信誠不至也張子曰師不立服不可立也當以情之厚薄事之大小處之如顔閔於孔子雖斬衰三年可也其成已之功與君父並其次各有淺深稱其情而已下至曲藝莫不有師豈可一槩制服聖人不制師之服師無定體如何是師見彼之善而已效之便是師也故有得其一言一義如朋友者有相親炙而如兄弟者有成就已身而恩如天地父母者豈可一概服之故聖人不制其服心喪之可也孔子死弔服加麻亦是服也却不得謂無服也華陽范氏曰與賢於已者處則自以為不足與不如已者處則自以為有餘自以為不足則日益自以為有餘則日損藍田吕氏曰古者憲老而不乞言憲者儀刑其徳而已無所事於問也其次則有問有答問答之間然猶不憤則不啓不悱則不發又其次則有講有聼講者不待問也聼者不致問也學至於有講有聼則師益勤而道益輕學者之功益不進矣又其次則有講而未必聼學至於有講而未必聼則無聼可矣人之患在好為人師故舍我而去者不追呼之使來有教無類故從我而來者不拒逆之使去但能以此求道之心至則受而教之論語稱互鄉難與言童子見門人惑子曰與其進也不與其退也人潔己以進與其潔也不保其往也故聖賢在下其所以取人茍有向善之心皆取之亦以進人為善不為異日之不保而廢其今日與人為善之意上蔡謝氏曰申顔自謂不可一日無侯無可或問其故曰無可能攻人之過一日不見則吾不得聞吾過矣廣平游氏曰孟子之論尚友也以一鄉之善士為未足而求之一國以一國之善士為未足而求之天下以天下之善士為未足而求之古人無友不如已者尚友之道也求得賢者尚而友之則聞其所不聞見其所不見而徳日起矣此仲尼所以期子夏之日進也龜山楊氏曰古之人其道足以師世範俗惟孔孟足以當之東漢而下師道益嚴然稽其所知所行皆不足以勝其任也唐之韓愈固嘗欲以師道自居矣其視李翺張籍輩皆謂從吾㳺今翺籍之文具在考其言未嘗以弟子自列則師果可好為乎茍其道未足以成徳達財雖欲為之而人不與也愈且如是况其下者乎和靖尹氏曰學問雖是要從師然頼朋友相成處甚多師只是開其大端又體貌嚴重若於從容閑暇之際委曲論難須是朋友便發明得子細河東侯氏曰朱公掞來見明道於汝歸謂人曰光庭在春風中坐了一箇月游楊初見伊川伊川瞑目而坐二子侍立既覺顧謂曰賢輩尚在此乎今既晩且休矣及出門門外之雪深一尺五峯胡氏曰能攻人實病者至難也能受人實攻者為尤難人能攻我實病我能受人實攻朋友之義其庶幾乎不然其不相䧟而為小人者幾希矣延平李氏曰某聞之天下有三本焉父生之師教之君治之闕其一則本不立古之聖賢莫不有師其肄業之勤惰涉道之淺深求益之先後若存若亡其詳不可得而考惟洙泗之間七十二弟子之徒議論問答具在方冊有足稽焉是得夫子而益明也孟子之後道失其傳枝分派别自立門户天下真儒不復見於世其聚徒成羣所以相傳授者句讀文義而已耳謂之熄焉可也夫巫醫樂師百工之人其術淺其能小猶且莫不有師儒者之道可以善一身可以理天下可以配神明而參造化一失其傳而無所師可不謂之大哀邪大率今人與古人學殊不同如孔門弟子羣居終日相切磨又有夫子為之依歸日用間相觀感而化者甚多恐於融釋而脱落處非言説可及也不然子貢何以謂夫子之言性與天道不可得而聞邪朱子曰夫道雖若大路然非上知生知之質亦豈能不藉師友而獨得之哉要當有以發其端倪然後有餘師者可得而求耳朋友之交責善所以盡吾誠取善所以益吾徳非以相為賜也然各盡其道而無所茍焉則麗澤之益自有不能已者問人倫不及師曰師與朋友同類而勢分等於君父唯其所在則致死焉或云如在君旁則為君死在父旁則為父死曰也是如此如在君雖父有罪不能為父死又曰人倫不及師者朋友多而師少以其多者言之問服中不及師何也曰正是難處若論其服則當與君父等故禮謂若喪父而無服又曰平居則絰東萊吕氏曰歐陽修有云古之學者必嚴其師師嚴然後道尊道尊然後篤敬篤敬然後能自守能自守然後果於用果於用然後不畏而不遷三代之衰學校廢至兩漢師道尚存故其學者各守其經以自用是以漢之政理文章與其當時之事後世莫及者其所從來深矣後世師法漸壊而今世無師學者不尊嚴故自輕其道輕之則不能至不至則不能篤信信不篤則不知所守守不固則有所畏而物可移是故學者惟俯仰徇時以希禄利為急至於忘本趨末流而不返夫以不信不固之心守不至之學雖欲果於自用莫知其所以用之之道又况有祿利之誘刑禍之懼以遷之哉象山陸氏曰人生而不知學學而不求師其可乎哉秦漢以來學絶道喪世不復有師以至於唐曰師曰弟子云者反以為笑韓退之桞子厚猶為之屢歎惟本朝理學逺過漢唐始復有師道雖然學者不求師與求而不能虚心不能退聼此固學者之罪學者知求師矣能退聼矣所以導之者乃非其道此則師之罪也吾嘗謂楊子雲韓退之雖未知道而識度非常人所及其言時有所到而不可易者楊子雲謂務學不如務求師師者人之模範也模不模範不範為不少矣韓退之謂古之學者必有師師者所以傳道授業解惑也人非生而知之孰能無惑惑而不求師其為惑也終不解矣近世諸儒反不及此然後知二公之識不易及也吾亦謂論學不如論師得師而不能虚心委己則又不可以罪師天下若無著實師友不是各執己見便是恣情縱欲道廣大學之無窮古人親師求友之心亦無有窮已以夫子之聖猶曰學不厭况在常人其求師友之心豈可不汲汲也然師友㑹聚不可必得有如未得㑹聚則隨己知識隨己力量親書冊就事物豈皆蒙然懵然畧無毫髪開明處曽子曰尊其所聞則髙明行其所知則光大非欺人也勉齋黄氏曰斯道之顯晦係於人物之盛衰葢義理以講習而明徳性以相觀而善孑然獨立而無與為侣則學問廢而識見淺繩約弛而怠慢生古之人所以重朋來之樂者豈不以此歟雙峯饒氏曰師道立則天下之不善者皆可變而為善天下之不中者皆可化而為中而善人豈不衆哉善人衆則國家之用隨取隨足上焉可以格君心中焉可以立政事下焉可以移風俗而朝廷豈有不正天下豈有不治者哉若昔唐虞五典之敷掌之於契寛栗直温之教典之於䕫至于成周順先王詩書禮樂以造士而教之中和者亦惟擇有道有徳者主之皆所以立師道也是以天下後世稱人才之盛美治功之盛者必曰唐虞成周及周之衰則學校之政不修而師道闕矣於是洙泗之間有吾夫子者出而任其責焉一時及門之士如顔曽冉閔之流固已如時雨之化矣故其徳行政事言語文學莫不卓然皆有可稱使夫子而得時行道引其類而進之則唐虞成周之治有不難致者夫子既沒而得其道者或以傳授於來嗣或以友教於諸侯隨其大小亦皆於世道有所補焉後世師道不立學者無復講明道義磨礲氣質之益矣至本朝安定胡公首倡體用之學以淑其徒使學者明於經義講於時務篤於踐履而不為口耳之習故一時賢士大夫多出其門而散在四方者亦皆循循雅飭師道之立葢昉乎此是後周子復得孔孟不傳之道於遺經建圗屬書以覺來學而程子兄弟實紹其傳於是益推古者大學教人之法以淑諸人以傳諸後而我文公先生又從而光大之淵源所漸徧及海内有志之士探討服行而推其所得以正主庇民者不絶于時能使大義既乖而復正公道乆屈而復伸者皆夫人之力也師道之立於是為盛魯齋許氏曰凡取友必須趨向正當切磋琢磨有益於已者若乃邪僻卑汚與夫柔佞不情相誘為非者謹勿近之凡在朋儕中切戒自滿惟虚故能受滿則無所容人不我告則止於此爾不能日益也故一人之見不足以兼十人我能取之十人是兼十人之能矣取之不已至於百人千人則在我者可量也哉凡求益之道在於能受盡言或議論經旨有見不到或撰文字有所未工以至凡在已者或有未善人能為我盡言之我則致㳟盡禮虚心而納之果有可從則終身服膺而不失其或不可從則退而自省也性理大全書卷五十二

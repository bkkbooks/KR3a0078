body:
  text: 性理大全書卷四十諸儒二程子門人程子曰吕與叔閑居中某嘗窺之必見其儼然危坐可謂敦篤矣學者湏恭敬但不可令拘廹拘廹則難乆也吕和叔任道擔當其風力甚勁然深潜縝密有所不逮於與叔游酢非昔日之游酢也固是頴然資質温厚讀西銘已能不逆於心言語外立得箇意思便道中庸矣楊時雖不逮酢然煞頴悟游酢楊時是學得靈利髙才也楊時於新學極精今日一有所問能盡知其短而持之介甫之學大抵支離某甞與楊時讀了數篇其後盡能推類以通之林大節雖差魯然所問便能躬行劉質夫乆於其事自小來便在此聖學不傳乆矣吾生百世之後將明斯道興斯學於既絶力小任重而懼其難者亦有冀矣以謂茍能使知之者廣則用力者衆何難之不易也游吾門者衆矣而信之篤得之多行之果守之固若質夫者幾希他人之學敏則有矣未易保也質夫之至吾無疑焉李端伯相聚雖不乆未見他操履然才識頴悟自是不能已也吕進伯可愛老而好學理㑹直是到底邢明叔明辦有才氣其於世務練習蓋美材也晩溺於佛所謂日月至焉而已者豈不可惜哉范淳夫色温而氣和其人如玉尤可以開陳是非導人主之意謝顯道為切問近思之學其才能充而廣之者也吾道有望矣謝良佐因論求舉於方州與就試於大學得失無以異遂不復計較明且勇矣謝良佐記問甚博曰賢却記得許多可謂玩物䘮志良佐身汗面赤曰此便是惻隠之心與范巽之語聞而多礙者先入也與吕與叔語宜礙而信者致誠也尹焞魯張繹俊俊恐過之魯者終有守也楊應之在交游中英氣偉度過絶於人未見其比可望以託吾道者吕氏大忠曰蘇季明徳性純茂强學篤志龜山楊氏曰游定夫與兄醇俱以文行知名於時所交皆天下豪英定夫雖少而一時老師宿儒咸推先之伊川以事至京師一見謂其資可適道時明道知扶溝縣兄弟方以倡明道學為己任設庠序聚邑人子弟教之召定夫来職學事定夫欣然徃從之得其微言於是盡棄其學學焉伊川稱游定夫徳宇睟然問學日進政事亦絶人逺甚於師門見稱如此其所造可知矣定夫筮任之初縣有疑獄十餘年不决公攝邑事一問得其情而釋之精練如素官者人服其明定夫自幼不羣讀書一過目輙成誦比壯益自力心傳目到不為世儒之習誠於中形諸外儀容辭令燦然有文望而知為成徳君子也其事親無違交朋友有信蒞官遇僚吏有恩意人樂於自盡而無敢慢其令者恵政在民戴之如父母故去則見思愈乆而不忘若其道學足以覺斯人餘潤足以澤天下遭時清明不究所用士論共惜之河東侯氏曰明道先生謂謝子雖少魯直是誠篤理㑹事有不透其顙有泚其憤悱如此明道先生平和簡易惟劉絢庶幾似之上蔡謝氏曰昔在二程先生門下明道最愛中立伊川最愛定夫觀二人氣象亦相似和靖尹氏曰謝顯道習舉業已知名徃扶溝見明道先生受學志甚篤明道一日謂之曰爾輩在此相從只是學某言語故其學心口不相應盍若行之請問焉曰且静坐伊川每見人静坐便嘆其善學周恭叔未三十見伊川持身嚴苦塊然一室未嘗窺牗㓜議母黨之女登科後其女雙瞽遂娶焉愛過常人伊川曰頥未三十時亦做不得此事馮忠恕問陳叔易言伊川嘗許良佐有王佐才有諸曰無此語先生晩年顯道来見留十餘日先生謂焞如見顯道試問此來所得如何焞即徃問焉謝曰良佐每常聞先生語多疑惑今次見先生聞語判然無疑所得如此焞具以告先生曰某見得他也是如此不聞有此語爾華陽范氏曰吕與叔修身好學行如古人朱光庭初受學於安定先生告以為學之本主於忠信既終身力行之及見二程先生而聞格物致知為進道之門正心誠意為入徳之方服行其教造次不忘甞謂百世以俟聖人而不惑者惟孔孟為然故力排異端以扶聖道武夷胡氏曰河南二程先生得孟子不傳之學於遺經以倡天下而升堂覩奥號稱髙弟在南方則廣平游定夫上蔡謝顯道龜山楊中立三人是也龜山天資夷曠濟以問學充養有道徳噐早成積於中者純粹而宏深見於外者簡易而平澹閒居和樂色笑可親臨事裁處不動聲氣與之游者雖羣居終日嗒然不語飲人以和而鄙薄之態自不形也推本孟子性善之説發明中庸大學之道有欲知方者為指其攸趣無所隠也當時公卿大夫之賢者莫不尊信之又曰先生造養深逺燭理甚明混迹同塵知之者鮮知之者知其文學而已不知者以為蔡氏所引此公無求於人蔡氏焉能凂之行年八十志氣未衰精力少年殆不能及朝廷方嚮意儒學日新聖徳延禮此老置之經席朝夕咨訪禆補必多至於裁决危疑經理世務若燭照數計而龜卜也侯師聖安於覊苦守節不移固所未有至於講論經術則通貫不窮商確時事則纎微皆察陳氏淵曰明道在頴昌時龜山先生因徃從學明道甚喜毎言曰楊君最㑹得容易及歸送之出門謂坐客曰吾道南矣又曰謝顯道為人誠實但聰悟不及先生明道每言楊君聰明謝君如水投石然亦未甞不稱其善伊川自涪歸見學者凋落多從佛學獨先生與謝文不變因歎曰學者皆流於夷狄矣惟有楊謝二君長進馮氏忠恕曰和靖言甞侍坐伊川問曰張繹每聞先生語徃徃言下觧悟焞聞先生語湏再三尋思或更請問然後觧悟然他日持守恐繹不及焞伊川以為然伊川殁未幾思叔亦殁和靖被召嘗曰思叔若在到今自當召用必能有為於世祁氏寛曰張思叔三十歳方見伊川後伊川一年卒初以文聞於鄉曲後来作文字甚少伊川每云張繹朴茂吕氏稽中曰尹和靖應進士舉䇿問議誅元祐貴人和靖曰噫尚可以干禄乎哉不對而出告於程子曰吾不復應進士舉矣程子曰子有母在和靖歸告其母母曰吾知汝以為善養不知汝以禄養於是退不復就舉程子聞之曰賢哉母也大觀中新學日興有言者曰程頥倡為異端尹焞張繹為之左右和靖遂不欲仕而聲聞益盛徳益成同門之士皆尊畏之伊川曰我死而不失其正尹氏子也吕氏本中曰龜山天資仁厚寛大能容物又不見其涯涘不為崖異絶俗之行以求世俗名譽與人交終始如一性至孝㓜喪母哀毁如成人事繼母尤謹熈寕中既舉進士得官聞河南兩程先生之道即徃從學既歸閑居累年沉浸經書推廣師說窮探力索務極其趣涵蓄廣大而不敢輕自肆也本中嘗聞於先輩長者以為明道先生温然純粹終身無疾言遽色先生實似之章氏憲曰龜山先生嘗云程門後来成就莫踰王信伯胡安國嘗薦其學有師承識通世務使司獻納必有補於聖時朱子曰吕與叔惜乎壽不永如天假之年必所見又别程子稱其深潛縝密可見他資質好又能㴠養某若只如吕年亦不見得到此田地矣與叔本是箇剛底氣質涵養得到所以如此故聖人以剛之徳為君子柔為小人若有其剛矣湏除去那剛之病全其為剛之徳相次可以為學若不剛終是不能成問與叔論選舉狀立士規以養徳厲行更學制以量才進藝定貢法以取賢歛才立試法以試用養才立辟法以興能備用立舉法以覆實得人立考法以責任考功曰其論甚高使其不死必有可用與叔後来亦㸔佛書朋友以書責之吕云某只是要看他道理如何其文集上雜記亦多不純想後来見二程了却好游定夫清徳重望皎如日星雖奴𨽻之賤皆知之其流風餘韻足以師世範俗定夫事業不得大施獨有中庸論孟說垂於世考其師友所稱味其話言所傳則夫造道之深流風之逺有可得而推者矣龜山天資高朴實簡易然所見一定更不湏窮究某甞謂這般人皆是天資出人非假學力龜山觧文字著述無綱要詩文説道理之類才說得有意思便無收殺包揚曰是道理不透否曰雖然亦是氣質弱問龜山晩年出處不可曉其召也以蔡京然在朝亦無大建明曰以今觀之則可以追咎當時無大建明若自家處之不知當時所當建明者何事或云不過擇將相為急曰也只好説擇將相固是急然不知當時有甚人可做當時將只説种師道相只説李伯紀然固皆嘗用之矣又况自家言之彼亦未便見聽據當時事勢亦無可為者不知有大聖賢之才如何爾問龜山當時何意出来曰龜山做人也茍且是時未免禄仕故胡亂就之茍可以少行其道龜山之志也然来得已不是及至又無可為者只是説得那没𦂳要底事當此之時茍有大力量咄嗟間眞能轉移天下之事来得也不枉既不能然又只是隨衆鶻突又曰他當時一出追奪荆公王爵罷配享夫子且欲毁劈三經板士子不樂遂相與聚問三經有何不可輙欲毁之當時龜山亦謹避而已問或者疑龜山此出為無補於事徒爾紛紛或以為大賢出處不可以此議如何曰龜山此行固是有病但只後人又何曾夢到他地位在惟胡文定以柳下恵援而止之而止比之極好龜山之出人多議之惟胡文定之言曰當時若能聽用决湏救得一半此語最公上蔡為人英果明决强力不倦克己復禮日有課程所著論語説及門人所記遺語皆行於世如以生意論仁以實理論誠以常惺惺論敬以求是論窮理其命意皆精當而直指窮理居敬為入徳之門則又最得明道教人之綱領嘗宰徳安府之應城胡文定以典學使者行部過之不敢問以職事顧因介紹請以弟子禮見入門見吏卒植立庭中如土木偶人肅然起敬遂禀學焉其同時及門之士亦皆稱其言論閎肆善啟發人今讀其書尚可想見也某自少時妄意為學即頼先生之言以發其趣而平生所聞先生行事又皆高邁卓絶使人興起凛然常懼其一旦冺沒而無傳也上蔡語雖不能無過然都是確實做工夫来問人之病痛不一各隨所偏處去上蔡才高所以病痛盡在矜字曰此說是明道以上蔡記誦為玩物喪志蓋為其意不是理㑹道理只是誇多闘靡為能若明道㸔史不蹉一字則意思自别此正為己為人之分問上蔡説横渠以禮教人其門人下稍頭低只溺於刑名度數之間行得来困無所見處如何曰觀上蔡說得又自偏了這都㸔不得禮之大體所以都易得偏如上蔡説横渠之非以為欲得正容謹節這自是好如何廢這箇得如專去理㑹刑名度數固不得又全廢了這箇也不得尹彦明見伊川後半年方得大學西銘㸔此意思也好也有病蓋且養他氣質淘潠去了那許多不好底意思如學記所謂未卜禘不視學游其志也之意此意思固好然也有病者蓋天下有多少書若半年間都不教他看一字幾時讀得天下許多書所以彦明終竟後来工夫少了或曰想得當時大學亦未成倫緒難㸔在曰然彦明㸔得好想見煞著日月㸔臨了連格物也㸔錯了所以深不信伊川今日格一件明日格一件之説是㸔箇甚和靖持守有餘而格物未至故所見不精明無活法和靖在程門直是十分鈍底被他只就一箇敬字上做工夫終被他做得成自其上者言之有明未盡處自其下者言之有明得一半便謂只是如此尹氏亦只是明得一半便謂二程之教止此孔孟之道亦只是如此惟是中人之性常常要著力照管自家這心要常在湏是窮得透徹方是和靖只是一箇篤實守得定如涪州被召祭伊川文云不背其師則有之有益於世則未也因言學者只守得某言語已自不易少間又自轉移了和靖主一之功多而窮理之功少故説經雖簡約有益學者但推説不去不能大發明在經筵進講少開悟啟發之功紹興初入朝滿朝注想如待神明然亦無大開發處是時高宗好㸔山谷詩尹云不知此人詩有何好處陛下㸔他作什麽只説得此一言然只如此説亦何能開悟人主大抵觧經固要簡約若告人主湏有反覆開導推説處使人主自警省蓋人主不必學者可以令他去思量如孔子答哀公顔子好學之問與答季康子詳略不同此告君之法也和靖當經筵都說不出張魏公嘗問人有不為也而後可以有為此孟子至論和靖曰未是張曰何者為至和靖曰好善優於天下為至張初不喜伊洛之學此語極中其病然正好發明惜但此而止耳尹子之學有偏處渠初見伊川將朱公掞所抄語録去呈想是他為有㸔不透處故伊川云某在何必觀此書蓋謂不如當面與他説耳尹子後来遂云語録之類不必㸔不知伊川固云某在不必觀今伊川既不在如何不觀又如云易傳是伊川所自作者其他語録是學者所記故謂只當㸔易傳不當㸔語録然則夫子所自作者春秋而已論語亦門人所記也謂學夫子者只當㸔春秋不當㸔論語可乎朱公掞文字有幅尺是見得明也南軒云朱公掞奏狀說伊川不著曰不知如何方是説著大意只要説得實便好如伊川説物便到四凶上及吕與叔中庸皆説實話也范淳夫純粹精神短雖知尊敬程子而於講學處欠缺如唐鑑極好讀之亦不無憾又曰淳夫資質極平正㸃化得是甚次第李朴先之大槩是能尊尚道學但恐其氣剛亦未能遜志於學問問郭冲晦何如人曰西北人氣質重厚淳固但見識不及如兼山易中庸義多不可曉不知伊川晚年接人是如何問游楊諸公早見程子後来語孟中庸說猶踈略何也曰游楊諸公皆才髙又博洽略去二程處參較所疑及病敗處各能自去求雖其說有踈略處然皆通明不似兼山輩立論可駭也問伊川門人如此其衆不知何故後来更無一人見得親切或云游楊亦不乆親炙曰也是諸人無頭無尾不曾盡心在上面也各家去奔走仕宦所以不能理㑹得透如卲康節從頭到尾極終身之力而後得之雖其不能無偏然就他這道理所謂成而安矣如茂叔先生資禀便較髙他也去仕宦只他這所學自是從合下直到後来所以有成某㸔来這道理若不是拚生盡死去理㑹終不觧得又曰吕與叔髙於諸公大叚有筋骨惜其早死若不早死却湏理㑹得到與叔文集煞有好處他文字極是實説得好處如千兵萬馬飽滿伉壯上蔡雖有過當處亦自是説得透龜山文字却怯弱似是合下㑹得易游楊謝諸公當時已與其師不相似却似别立一家謝氏發明得較精彩然多不穏貼和靖語却實然意短不似謝氏發越龜山語録與自作文又不相似其文大叚照管不到前面説如此後面又都反了縁他只依傍語句去皆是不透龜山年髙與叔年四十七他文字大綱立得脚来健多有處説得好又切若有夀必煞進游定夫學無人傳無語録學者氣質上病最難救如程門謝氏便如師也過游與楊便如商也不及皆是氣質上病上蔡之學初見其無礙甚喜之後細觀之終不離禪底見觧如灑掃應對處此只是小子之始學程先生因發明雖始學然其終之大者亦不離乎此上蔡於此類處便說得大了道理自是有小有大有初有終若如此説時便是不安於其小者初者必知其中有所謂大者方安為之如曾子三省處皆只是實道理上蔡於小處説得亦大了如游楊觧書之類多使聖人語来反正如觧不亦樂乎便云學之不講為憂有朋友講習豈不樂乎之類亦不自在大率諸公雖親見伊川皆不得其師之説上蔡多説過了龜山巧又别是一般巧得又不好范諫議説得不巧然亦好和靖又忒不巧然意思好伊川之門上蔡自禪門来其說亦有差張思叔最後進然深惜其早世使天予之年殆不可量其他門人多出仕宦四方研磨亦少龜山最老其所得亦深思叔持守不及和靖乃伊川語非特為品藻二人蓋有深意和靖舉以語人亦非自是乃欲人識得先生意耳若以其自是之嫌而不言則大不是將無處不窒礙矣問上蔡議論莫太過曰上蔡好於事上理㑹理却有過處又問和靖專於主敬集義處少曰和靖主敬把得定亦多近傍理龜山說話頗淺狹范淳夫雖平正而亦淺又問嘗見震澤記善錄彼親見伊川何故如此之差曰彼只見伊川面耳問和靖立朝議論曰和靖不觀他書只是持守得好他語録中説涵養持守處分外親切有些朝廷文字多是吕稽中輩代作問龜山立朝却有議多議論曰龜山雜博是讀多少文字龜山少年未見伊川時先去㸔莊列等文字後来雖見伊川然而此念熟了不覺時發出来游定夫尤甚羅仲素時復亦有此意一日論伊川門人云多流入釋氏陳文蔚曰只是游定夫如此恐龜山輩不如此曰只論語序便可見㸔道理不可不子細程門高弟如謝上蔡游定夫楊龜山輩下梢皆入禪學去必是程先生當初説得髙了他門只晫見上一截少下面著實工夫故流弊至此問程門誰真得其傳曰也不盡見得如劉質夫朱公掞劉思叔輩又不見他文字㸔程門諸公力量見識比之康節横渠皆趕不上韓退之云孔子之道大而能博門弟子不能徧觀而盡識也故學焉而皆得其性之所近此説甚好㸔来資質定了其為學也只就他資質所尚處添得些小好而已所以學貴公聽並觀求一個是當處不貴徒執已自用今觀孔子諸弟子只除了曾顔之外其他説話便皆有病程子諸門人上蔡有上蔡之病龜山有龜山之病和靖有和靖之病無有無病者問也是後来做工夫不到故如此曰也是合下見得不周徧差了又曰而今假令親見聖人説話盡傳得聖人之言不差一字若不得聖人之心依舊差了何况猶不得其言若能得聖人之心則雖言語各别不害其為同如曾子説話比之孔子又自不同子思傳曾子之學比之曾子其言語亦自不同孟子比之子思又自不同然自孔子以後得孔子之心者惟曾子子思孟子而已後来非無能言之士如楊子雲法言模倣論語王仲淹中說亦模倣論語言愈似而去道亦逺及至程子方略明得四五十年為得聖人之心然一傳之門人則已皆失其眞矣其終卒歸於擇善固執明善誠身博文約禮而已只是要人自去理㑹南軒張氏曰磨而不磷湼而不緇湏還孔子吾人只當學子路如龜山晚年一出不是道要官職當時意思亦是要去其間救正直到後来圍城不知救正得如何磨不磷湼不緇是聖人事龜山自處地位太高爾吳晦叔言上蔡自見二先生為克己之學有一研平生極愛惜遂去之然猶徃来於心其天資最高尚且如此以見克己之難也程裿因言上蔡自謂後来於噐物之類置之只為合要用卻無健羡心此工夫極至處可謂勇矣曰上蔡偏處雖多惟其勇故工夫亦極至龜山天資粹美矯厲之工少而涵養之工多問游先生如何曰亞於二公覺軒蔡氏近思後録曰楊應之勁挺不屈自為布衣以至官於朝未嘗有求於人亦未嘗假人以言色篤信好學至死不變劉質夫氣和而體莊持論不茍合跬歩不忘學李端伯胷中閎肆開發與人交洞照其情和而不流時靡有爭遇事如控轡逐曲舞交屈折如意吕和叔明善志學性之所得者盡之於心心之所知者踐之於身妻子刑之朋友信之鄉黨宗之可謂至誠敏徳矣和叔與人語必因其可及而喻諸義治經説得於身踐而心解其文章不作於無用楊遵道孝友和易中外無間言平居無喜愠色與人辨論綱振條析發微指極氷觧的破聞者欽聳退而察其私言若不能出諸口蓋度不身踐不茍言也劉安節貎温望之知其有容過人無貴賤小大一以誠雖忤己者未嘗見其怒色恚辭其與人遊常引其所長而隂覆其不及張思叔因讀孟子志士不忘在溝壑勇士不忘䘮其元始有得處後更窮理造微少能及之者馬時中天資重厚雖勇於為義而恥以釣名居朝凡所建明輙削其藁故人少知者西山眞氏讀書記曰吕希哲從安定胡先生於太學與程先生並舎察程先生學問淵源非他人比首以師禮事之由是知見日益廣大然未嘗專主一說不私一門務略去枝葉一意涵養直截徑㨗以造聖人為說書二年日夕勸道人主以脩身為本脩身以正心誠意為主心正意誠天下自化不假他術身不能脩左右之人且不能喻况天下乎其行已務自省察校量以自進益晩年甞言十餘年前在楚州橋壞墮水中時覺心動數年前大病已稍勝前今次疾病全不動矣其自力如此甞曰攻其惡無攻人之惡蓋自攻其惡日夜且自㸃檢絲毫不盡則慊於心矣豈有工夫㸃檢他人耶范淳夫甞與伊川論唐事及為唐鑑盡用先生之意先生謂門人曰淳夫乃能相信如此元祐中客有見伊川者几案無他書惟唐鑑一部先生謂客曰三代以来無此議論劉質夫自髫齓即事明道先生程氏兄弟受學焉所授有本末所知造淵微知所止矣孜孜焉不知其他也天性孝悌樂善而不為異端所惑故其履也安内日加重而無交戰之病故其行也果劉安節天資近道而敏於學問甞從當世賢而有道者游始以致知格物發其材沉涵熟復存心養性乆之於是有得常曰堯舜之道不過孝悌天下之理有一無二廼若異端則有間矣尹和靖莊正仁實不欺闇室其於聖人六經之言耳順心得如出諸己吕和叔為人質厚剛正以聖門事業為己任所知信而力可及則身遂行之不復疑畏故識者方之季路潛心玩理望聖賢之致尅期可到自身及家自家及鄉人旁及親戚朋友皆紀其行而述其事游定夫甞問謝顯道公於外物一切放得下否曰實在上面做工夫来人要富貴要他做甚必湏有用處尋討用處病根將来斬㫁便沒事平生未甞干人在書局亦不謁政府或勸之曰他安能陶鑄我自有命在馬伸時中崇寧中禁元祐學姦人用事出其黨為諸路學使專糾其事伊川之門學者無幾雖宿素從遊間以趨利叛去時中方自吏部求為西京司法曹事銳然為親依之計至則因張繹求見先生辭焉時中曰使伸得聞道雖死何憾况不至於死乎先生聞而歎曰此眞有志者遂引而進之自爾出入凡三年公暇雖風雨必一造焉靖康初為御史以論汪黄誤國貶濮州監酒死嘗曰志士不忘在溝壑勇士不忘䘮其元今日何時溝壑乃吾死所也故其臨事奮不顧身如此又甞曰志在行道使吾以富貴為心則為富貴所累使吾以妻子為念則為妻子所累是道不可行也羅從彦字仲素號豫章延平李氏曰羅先生少從審律先生吳國華學後見龜山廼知舊學之差三日驚汗浹背曰幾枉過了一生於是謹守龜山之學數年後方心廣體胖先生性明而脩行全而潔充之以廣大體之以仁恕精深微妙多極其至漢唐諸儒無近似者至於不言而飲人以和與人並立而使人化如春風發物蓋亦莫知其所以然也凡讀聖賢之書粗有見識者孰不願得授經門下以質所疑朱子曰龜山先生唱道東南士之游其門者甚衆然語其潛思力行任重詣極如羅公蓋一人而已羅先生嚴毅清苦殊可畏李先生言羅仲素春秋說不及文定蓋文定才大設張羅落者大楊道夫言羅先生教學者靜坐中㸔喜怒哀樂未發謂之中未發作何氣象李先生以為此意不惟於進學有力兼亦是養心之要而遺書有云既思則是已發昔甞疑其與前所舉有礙細㸔亦甚𦂳要不可以不攷黄直卿曰此問亦甚切但程先生剖析毫釐體用明白羅先生探索本原洞見道體二者皆有大功於世善觀之則亦並行而不相悖矣况羅先生於靜坐觀之乃其思慮未萌虚靈不昧自有以見其氣象則初無害於未發蘇季明以求字為問則求非思慮不可此伊川所以力辨其差也曰公雖是如此分觧羅先生説終恐做病如明道亦説靜坐可以為學謝上蔡亦言多著静不妨此説終是小偏才偏便做病道理自有動時自有静時學者只是敬以直内義以方外見得世間無處不是道理雖至微至小處亦有道理便以道理處之不可專要去靜處求所以伊川謂只用敬不用静便説得平也是他經歷多故見得恁地正而不偏若以世之大段紛擾人觀之若㑹静得固好若講學則不可有毫髪之偏也如天雄附子冷底人喫得也好如要通天下喫便不可陳氏恊曰先生可謂有徳有言之隠君子矣當徽廟時居鄉授徒守道尤篤而同郡李公侗傳其學厥後朱子又得李公之傳其道遂彰明於世學者仰之如㤗山北斗者其端皆自公發之公沒之後既無子孫及其遺言不多見於世嘉定七年郡守劉允濟始加搜訪得公所著遵堯録八卷進之於朝其書四萬言大要謂藝祖開基列聖繼統若舜禹遵堯而不變至元豐改制皆自王安石作俑創為功利之圗浸兆裔夷之侮是其畎畆不忘君之心豈若沮溺輩素隠行怪之比邪周氏坦曰先生不求聞逹於世胷次抱負不少槩見獨得其大者所謂道徳問學之淵源上承伊洛之正派下開中興以後諸儒之授受昭然不可冺也公受學龜山之門其潛思力行任重詣極同門皆推敬之義理之學正鬱於時一綫之緒頼是得以僅存觀其在羅浮山靜坐三年所以窮天地萬物之理切實若此著遵堯録一篇述皇朝相傳宏規懿範及名臣碩輔論建謨畫下及元豐功利之人紛更憲度貽患國家撮要提綱無非理亂安危之大者公之學其明體適用略可推矣李侗字愿中號延平朱子曰先生少遊鄉校有聲已而聞郡人羅仲素得河洛之學於龜山之門遂徃學焉羅公清介絶俗雖里人鮮克知之見先生從遊受業或頗非笑先生若不聞從之累年受春秋中庸語孟之説從容潜玩有㑹于心盡得其所傳之奥羅公少然可亟稱許焉於是退而屏居山里結茅水竹之間謝絶世故餘四十年簞瓢屢空怡然自適中間郡將學官聞其名而招致之或遣子弟從遊受學州郡士人有以矜式焉又曰先生從羅仲素學講誦之餘危坐終日以驗夫喜怒哀樂未發之前氣象為何如而求所謂中者若是者蓋乆之而知天下之大本眞有在乎是也蓋天下之理無不由是而出既得其本則凡出於此者雖品節萬殊曲折萬變莫不該攝洞貫以次融釋而各有條理如川流脈絡之不可亂大而天地之所以高厚細而品彚之所以化育以至於經訓之㣲言日用之小物折之於此無一不得其𠂻焉由是操存益固涵養益熟精明純一觸處洞然泛應曲酬發必中節又曰其接後學答問窮晝夜不倦隨人淺深誘人各不同而要以反身自得而可以入於聖賢之域先生喜黄太史稱濓溪胷中灑落如光風霽月為善形容有道者氣象甞諷誦之而顧謂學者曰存此於胷中庶幾遇事廓然而義少進矣先生姿禀勁時氣節豪邁而充養完粹無復圭角精純之氣逹於面目色温言厲神定氣和語黙動靜端詳閑泰自然之中若有成法平居恂恂於事若無甚可否及其酬酢事變㫁以義理則有截然不可犯者先生之道徳純備學術通明求之當世殆絶倫比然不求知於世而亦未甞輕以語人故上之人既莫之知而學者亦莫之識是以進不獲施之於時退未及傳之於後而先生方且玩其所安樂者於畎畝之中悠然不知老之將至蓋所謂依乎中庸遯世不見知而不悔者先生庶幾焉先君子吏部府君亦從羅公問學與先生為同門友雅敬重焉甞與沙縣鄧廸天啟語及先生鄧曰愿中如氷壺秋月瑩徹無瑕非吾曹所及先君子深以為知言亟稱道之先生終日危坐而神彩精明略無隤墮之氣問先生言行曰他却不曾著書充養得極好凡為學也不過是恁地涵養將去初無異義只是先生晬面盎背自然不可及先生初間也是豪邁底人到後来也是磨琢之功先生少年豪勇夜醉馳馬數里而歸後来養成徐緩雖行二三里路常委蛇緩歩如從容室中也問先生如何飬曰先生只是潛養思索他涵養得自是别眞所謂不為事物所勝者古人云終日無疾言遽色他眞個是如此尋常人去近處必徐行出逺處行必稍急先生出近處也如此出逺處亦只如此尋常人呌一人呌之一二聲不至則聲必厲先生呌之不至聲不加於前也又如坐處壁間有字某每常亦湏起頭一㸔若先生則不然方其坐時固不㸔也若是欲㸔則必起就壁下視之其不為事物所勝大率如此先生居處有常不作費力事所居狹隘屋宇卑小及弟子漸長逐間接起又接起㕔屋亦有小書室然甚整齊瀟灑安物皆有常處其制行不異於人亦嘗為任希純教授延入學作職事居常無甚異同頽如也眞得龜山法門先生説一歩是一歩如説仁者其言也訒某當時為之語云聖人如天覆萬物曰不要如是廣說湏窮其言也訒前頭如何要得一進歩處先生不要人强行湏有見得處方行所謂灑然處然猶有偏在灑落而行固好未到灑落處不成不行亦湏按本行之待其著察先生當時説學已有許多意思只為説敬字不分明所以許多時無捉摸處先生好㸔論語自明而已謂孟子早是説得好了使人愛㸔了他其居在山間亦殊無文字㸔讀辨正更愛㸔春秋左氏初學於仲素只㸔經後侯師聖来沙縣羅邀之至問伊川如何㸔云亦㸔左氏要見曲折故始㸔左氏先生有為只用蠱卦但有决烈處先生嘗云人之念慮若是於顯然過惡萌動此却易見易除却怕於匹似閑底事爆起来纒繞思念將去不能除此尤害事熹向来亦是如此問先生所作李先生行狀云終日危坐以驗夫喜怒哀樂之前氣象為如何而求所謂中者與伊川之說若不相似曰這處是舊日下得語太重今以伊川之語格之則其下工夫處亦是有些子偏只是被李先生靜得極了便自見得是有箇覺處不似别人今終日危坐只是且收歛在此勝如奔馳若一向如此又似坐禪入定問延平先生何故驗於喜怒哀樂未發之前而求所謂中曰只是要見氣象陳後之曰持守良乆亦可見未發氣象曰延平即是此意又問此與楊氏體驗於未發之前者異同如何曰這箇亦有些病那體驗字是有箇思量了便是已發若觀時恁著意㸔便也是已發問此體驗是著意觀只恁平常否曰此亦是以不觀觀之論李先生之學常在目前曰只是君子戒謹所不覩恐懼所不聞便自然常存顔子非禮勿視聽言動正是如此問延平静坐之説聞先生頗不以為然如何曰此亦難説靜坐理㑹道理自不妨只是討要静坐則不可若理㑹得道理明透自然是靜常見先生説舊見羅先生説春秋頗覺不甚好不知到羅浮極静後又理㑹得如何某心常疑之以今觀之是如此蓋心下熱閙如何㸔得道理出人若著些利害便不免開口告人却與不學之人何異向見李先生説若大段排遣不去只思古人所遭患難有大不可堪者持以自比則亦可以少安矣始者甚卑其説以為何至如此後来臨事却覺有得力處不可忽也舊見先生說少從師友幸有所聞中間無講習之助幾成廢墮然頼天之靈此箇道理時常在心目間未甞敢忘此可見其持守之功矣然則所見安得而不精所養安得而不熟耶某舊見先生時説得無限道理也曾去學禪先生云汝恁地懸空理㑹得許多面前事却又理㑹不得道亦無𤣥妙只在日用間著實做工夫處理㑹便自見得後来方曉得他說故今日不至無理㑹耳祭先生文曰道喪千載兩程勃興有的其緒龜山是承龜山之南道則與俱有覺其徒望門以趨惟時豫章傳得其宗一簞一瓢凛然髙風猗歟先生果自得師身世兩忘惟道是資精義造約窮深極微凍觧冰釋發於天機乾端坤倪鬼秘神彰風霆之變日月之光爰暨山川草木昆蟲人倫之正王道之中一以貫之其外無餘縷析毫差其分則殊體用渾圓隠顯昭融萬變並酬浮雲太空仁孝友弟灑落誠明清通和樂展也大成婆娑丘林世莫我知優哉游哉卒歳以嬉迨其季年徳盛道尊有来摳衣發其蔽昏侯伯聞風擁篲以迎大本大經是度是程税駕云初講議有端疾病乗之醫窮技殫嗚呼先生而止於斯命之不融誰實尸之合散屈伸消息滿虚廓然大公與化為徒古今一息曷計短長物我一身孰為窮通嗟惟聖學不絶如綫先生得之既厚以全進未獲施退未及傳殉身已歿孰云非天熹也小生丱角趨拜恭惟先君實共源派誾誾侃侃歛袵推先冰壺秋月謂公則然施及後人敢渝斯志從遊十年誘掖諄至春山朝榮秋堂夜空即事即理無幽不窮相期日深見勵彌切蹇歩方休鞭䋲以掣安車署行過我衡門返斾相遭凉秋已分熹於此時適有命召問所宜言反覆教詔最後有言吾子勉之凡茲衆理子所自知奉以周旋幸勿失墜歸裝朝嚴訃音夕至失聲長號淚落懸泉何意斯言而决終夭病不舉扶沒不飯含奔走後人死有餘憾儀刑永隔卒業無期墜緒茫茫孰知我悲伏哭柩前奉奠以贄不忘者存鍳此誠意胡安國字康侯諡文定峯子寅字明仲號致堂宏字仁仲號五附上蔡謝氏嘗語朱震曰胡康侯正如大冬嚴雪百草萎死而松柏挺然獨秀也使其困阨如此乃天將降大任焉耳河東侯氏曰視不義富貴如浮雲者當今天下胡康侯一人耳朱子曰公傳道伊洛志在春秋著書立言格君垂後所以明天理正人心扶三綱叙九法者深切著明體用該貫而其正色危言據經論事剛大正直之氣亦無所愧於古人問文定却是卓然有立所謂非文王猶興者曰固是資質好然在太學多聞先生師友之訓所以能然其學問多得頴昌靳裁之啟發又曰後来得之上蔡者多文定公傳家録議論極有力可以律貪起懦但以上功夫不到文定云知至故能知言意誠故能養氣此語好又云豈有見理已明而不能處事者此語亦好問文定之學與董仲舒如何曰文定却信得於己者可以施於人學於古者可以行於今其他人皆謂得於己者不可施於人學於古者不可行於今所以淺陋然文定比之仲舒較淺仲舒比似古人又淺文定大綱説得正微細處五峯尤精大綱却有病致堂議論英發人物偉然向甞侍之坐見其數盃後歌孔明出師表誦張才叔自靖人自獻于先王義陳了翁奏狀等可謂豪傑之士也讀史管見乃嶺表所作當時並無一冊文字隨行只是記憶所以其間有牴牾處致堂説道理無人及得他以他才氣甚麽事做不得只是不通檢㸃如何做得事成我欲做事事未起而人已檢㸃我矣五峯善思然思過處亦有之知言疑議大端有八性無善惡心為己發仁以用言心以用盡不事涵養先務知識氣象廹狹語論過髙問知言論中誠仁如何曰中者性之道言未發也誠者命之道言實理也仁者心之道言發動之端也問道字疑可改為徳字曰亦可一云但言其自然則謂之道言其實體則謂之徳徳字較𦂳然他是特地下此寛字伊川答吕與叔書亦云中者性之徳近之吕伯恭云知言勝正䝉似此等處誠然但不能純如此處爾又問中誠仁一而已何必别言曰理固未嘗不同但聖賢說一箇物字時且隨處説他那一箇意思自是他一箇字中便有箇正意義如此不可混説聖賢書初便不用許多了學者亦宜各隨他說處㸔之方得見他所説字本相如誠如中如仁若便只混㸔則下梢都㸔不出問誠者性之徳曰何者不是性之徳如仁義禮智皆是恁地説較不切不如胡氏誠者命之道乎説得較近傍問誠者物之終始而命之道曰誠是實理徹上徹下只是這箇生物都從那上做来萬物流形天地之間都是那底做誠者命之道中者性之道仁者心之道此數句說得密如何大本處却含糊了以性為無善惡天理人欲都混了故把做同體問同行語如何曰此却是只就事言之黄直卿曰他既以性無善惡何故云中者性之道曰他也把中做無善惡人有不仁心無不仁此語有病且如顔子其心三月不違仁若纔違仁其心便不仁矣豈可謂心無不仁伊川初嘗言曰凡言心者皆指已發而言後復曰此説未當五峯却守其前說以心為已發性為未發將心性二字對説知言中如此處甚多知言固有好處然亦大有差失如論性却曰不可以善惡辨不可以是非分既無善惡又無是非則是告子湍水之說爾如曰好惡性也君子好惡以道小人好惡以已則是以好惡説性而道在性外矣不知此理却從何而出問所謂探視聽言動無息之際可以㑹情此猶告子生之謂性之意否曰此語亦有病下文謂道義明著孰知其為此心物欲誘引孰知其為人欲便以道義對物欲却是性中本無道義逐旋扵此處攙入兩端則是性亦可以不善言矣如曰性也者天地鬼神之奥也善不足以名之况惡乎孟子説性善云者歎美之辭不與惡對其所謂天地鬼神之奥言語亦大故誇逞某嘗謂聖賢言語自是平易如孟子尚有些險處孔子則直是平實不與惡對之説本是龜山與總老相遇因論孟子説性曾有此言文定往往得之龜山故有是言然總考當時之語猶曰渾然至善不與惡對猶未甚失性善之意今去其渾然至善之語而獨以不與惡對為歎美之辭則其失逺矣如論齊王之愛牛此良心之苗裔因私欲而見者以答求放心之問然雞犬之放則固有去而不可收之理人之放心只知求之則良心在此矣何必等待天理發見扵物欲之間然後求之如此則中間空闕多少去處正如屋下失物直待去城外求也愛牛之事孟子只就齊王身上説若施之他人則不可况操存涵養皆是平日工夫豈有等待發見然後操存之理今胡氏子弟議論每每好髙要不在人下纔説心便不説用心以為心不可用至如易𫝊中有連使用心字處皆塗去用字某以為孟子所謂堯舜之治天下豈無所用其心哉何獨不可以用言也黄直卿言五峯説性云好惡性也本是要説得高不知却反説得低了曰依舊是氣質上説某常要與他改云所以好惡者性也好惡性也既有好即具善有惡即具惡若只云有好惡而善惡不定扵其中則是性中理不定也既曰天便有天命天討知言云凡人之生粹然天地之心道義全具無適無莫不可以善惡辨不可以是非分無過也無不及也此中之所以名也即告子性無善無不善之論也唯伊川性即理也一句甚切至問五峯言天命不囿扵善不可以人欲對曰天理固無對然有人欲則天理便不得不與人欲對為消長善亦本無對然既有惡則善便不得不與惡對為盛衰且謂天命不囿於物可也謂不囿扵善則不知天之所以為天矣謂惡不足以言性可也謂善不足以言性則不知善之所從來矣好善而惡惡人之性也為有善惡故有好惡善惡字重好惡字輕君子順其性小人拂其性五峯言好惡性也君子好惡以道小人好惡以欲是好人之所惡惡人之所好亦是性也而可乎問天理人欲同體異用之説如何曰當然之理人合恁地底便是體故仁義禮智為體如五峯之説則仁與不仁義與不義禮與不禮智與不智皆是性如此則性乃一箇大人欲窠子其説乃與東坡子由相似是大鑿脱非小失也同行異情一句却説得去又曰胡氏之病在扵説性無善惡體中只有天理無人欲謂之同體則非也同行異情蓋亦有之如口之於味目之於色耳之於聲鼻之於臭四肢之於安佚聖人與常人皆如此是同行也然聖人之情不溺於此所以與常人異耳問聖賢不視惡色不聼惡聲此則非同行者曰彼亦就其同行處説耳某謂聖賢立言處處皆通必不若胡氏之偏也龜山云天命之謂性人欲非性也胡氏不取其説是以人欲為性矣此其甚差者也又曰天理人欲如何同體得如此却是性可以為善亦可以為惡却是一團人欲窠子將甚麽做體却是韓愈説性自好言人之為性有五仁義禮智信是也指此五者為性却説得是性只是一箇至善道理萬善總名才有一毫不善自是情之流放處如何却與人欲同體今人全不去看人學當勉不可據見定盖道理無窮人之思慮有限若只守所得以為主則其所墮扵偏者不復能自明也如五峯只就其上成就所學亦只是忽而不詳細反復也明仲嘗畏五峯議論精確五峯亦嘗不有其兄嘗欲焚其論語解并讀史管見以今觀之殊不然如論語管見中雖有粗處亦多明白至五峯議論反以好高之過得一説便説其實與這物事都不相干渉便説得無着落五峯辨疑孟子之説周遮全不分曉若是恁地分䟽孟子剗地沈淪不能得出世明仲甚畏仁仲議論明仲亦自信不及盖人不可不遇敵己之人仁仲當時無有能當之者故恣其言説出來然今觀明仲説較平正南軒張氏曰文定雖不及河南之門然與㳺楊謝逰而講扵其説其自得之奥在於春秋被遇明時執經入侍正大之論竦動當世所以扶三綱明大義抑邪説正人心亦可謂有功於斯文矣五峯先生優游南山之下餘二十年玩心神明不捨晝夜力行所知親切至到析太極精㣲之旨窮皇王制作之原綜事物扵一原貫古今於一息指人欲之偏以見天理之全即形而下者而發無聲無臭之妙使學者驗端倪之不逺而造髙深之無極體用該備可舉而行先生之扵斯道可謂見之明而擴之至矣知言一書乃其平日之所自著其言約其義精誠道學之樞要制治之蓍龜也序五峯文集曰先生非有意於為文者也其一時歌咏之所發葢所以紓寫其性情而其他述作與夫問答往來之書又皆所以明道義而參異同非若世之為文者徒従事扵言語之間而已也粤自蚤嵗服膺文定公之教至于没齒惟其進徳之日新故其發見扵詞氣議論之間者亦月異而嵗不同雖然以先生之學而不得大施扵時又不幸僅得中夀其見扵文字間者復止扵此豈不甚可歎息至其所志之逺所造之深綱領之大義理之精後之人亦可以推而得焉性理大全書卷四十

body:
  text: 性理大全書卷二通書一通書者濓溪夫子之所作也夫子姓周氏名惇頥字茂叔自少即以學行有聞於世而莫或知其師傳之所自獨以河南兩程夫子嘗受學焉而得孔孟不傳之正統則其淵源因可槩見然所以指夫仲尼顔子之樂而發其吟風㺯月之趣者亦不可得而悉聞矣所著之書又多散失獨此一篇本號易通與太極圖説並出程氏以傳於世而其為説實相表裏大抵推一理二氣五行之分合以紀綱道體之精微決道義文辭利祿之取舍以振起俗學之卑陋至論所以入德之方經世之具又皆親切簡要不為空言顧其宏綱大用既非秦漢以來諸儒所及而其條理之密意味之深又非今世學者所能驟而窺也是以程氏既沒而傳者鮮焉其知之者不過以為用意髙逺而已熹自蚤嵗即幸得其遺編而伏讀之初蓋茫然不知其所謂而甚或不能以句壯嵗獲遊延平先生之門然後始得聞其説之一二比年以來潛玩既久乃若粗有得焉雖其宏綱大用所不敢知然於其章句文字之間則有以實見其條理之愈密意味之愈深而不我欺也顧自始讀以至于今嵗月幾何倐焉三紀慨前哲之益逺懼妙旨之無傳竊不自量輒為注釋雖知凡近不足以發夫子之精藴然創通大義以俟後之君子則萬一其庶幾焉淳熙丁未九月甲辰後學朱熹謹記誠上第一誠者聖人之本誠者至實而無妄之謂天所賦物所受之正理也人皆有之而聖人之所以聖者無他焉以其獨能全此而已此書與太極圖相表裏誠即所謂太極也朱子曰誠是實理自然不假修為者也誠自然然底實此言本領之本聖人所以聖者誠而已勉齋黃氏曰誠即是實如一箇物看頭透尾裏面充足無一毫空缺處北溪陳氏曰誠字後世都説差了到程子方云無妄之謂誠字義始明至朱子又增兩字曰真實無妄之謂誠尤見分曉大哉乾元萬物資始誠之源也此上二句引易以明之乾者純陽之卦其義為健乃天德之别名也元始也資取也言乾道之元萬物所取以為始者乃實理流出以賦於人之本如水之有源即圖之陽動也乾道變化各正性命誠斯立焉此上二句亦易文天所賦為命物所受為性言乾道變化而萬物各得受其所賦之正則實理於是而各為一物之主矣即圖之隂靜也朱子曰大哉乾元萬物資始乃繼之者善也乾道變化各正性命乃成之者性也這假是説天地生成萬物之意却不是説人性上事大哉乾元萬物資始誠之源也此統言一箇流行本源乾道變化各正性命誠之流行出來各自有箇安頓處如焉為人也是這箇誠為物也是這箇誠故曰誠斯立譬如水其出只是一源及其流出來千𣲖萬别也只是這箇水問朱先生謂此書與太極相表裏誠即所謂太極也大哉乾元萬物資始誠之源也即圖之陽動乾道變化各正性命誠斯立焉即圖之隂靜如何勉齋黃氏曰隂陽有以對待而言者一上一下一東一西此以對待言也有以流行言者一晝一夜一春一夏此以流行言也太極圖之言隂陽其以流行而言者歟故曰誠之源又曰圖之陽動曰誠斯立又曰圖之隂靜誠理也隂陽氣也理與氣未嘗相離故言誠而又言隂陽也問誠之源也是説誠之用誠斯立焉是説誠之體却先言用而後言體何也曰體用不可分先後自不相妨如一語一默一晝一夜春夏了方秋冬不成説秋冬了方説春夏今看箇物把隂做頭也不得他這話是看得易精貫後故説出許多道理純粹至善者也純不雜也粹無疵也此言天之所賦物之所受皆實理之本然無不善之雜也問純粹至善者也與繼之者善同否朱子曰此是繳上二句却與繼之者善不同如説純粹至善却是統言道理通繳上文問純粹至善者也至善二字與大學中至善同否曰純粹至善猶曰純粹而至善云耳至善與大學理同故曰一隂一陽之謂道繼之者善也成之者性也此亦易文隂陽氣也形而下者也所以一隂一陽理也形而上者也道即理之謂也繼之者氣之方出而未有所成之謂也善則理之方行而未有所立之名也陽之屬也誠之源也成則物之已成性則理之已立者也隂之屬也誠之立也問誠上篇舉一隂一陽之謂道三句是證上文否朱子曰固是一隂一陽之謂道一句通證誠之源誠斯立焉二節繼之者善又證誠之源一節成之者性又證誠斯立焉一節一隂一陽之謂道太極也繼之者善生生不已之意屬陽成之者性各正性命之意屬隂此書第一章可見問此篇舉易一隂一陽之謂道繼之者善也成之者性也三句曰繼成二字皆接那氣底意思説善性二字皆只説理但繼之者善方是天理流行處成之者性便是已成形有分假了問繼之者善屬陽成之者性屬隂曰方造化周流未著形質便是屬陽才麗形質為人物為金木水火土轉動不得便是屬隂若是陽時自有多少流行變動在及至成物一成而不返道具於隂而行於陽繼言其發也蓋謂化育之功陽之事也成言其具也性謂物之所一受言物生則有性而各具是道也隂之事也問一隂一陽之謂道繼之者善也成之者性也曰以一日言之則晝陽而夜隂以一月言之則望前為陽望後為隂以一嵗言之則春夏為陽秋冬為隂自古至今恁地袞將去只是這箇隂陽是孰使之然也乃道也從此句下又分兩腳此氣之動為人為物渾是一箇道理故未生人物以前此理本善所以謂繼之者善此則屬陽氣質既定為人為物所以謂成之者性此則屬隂問繼之者善成之者性注中何以分繼善成性為四截曰繼成屬氣善性屬理性已兼理氣善則専屬理理受於太極氣受於隂陽五行問繼善成性解云陽之屬隂之屬如何勉齋黃氏曰此言隂之分陽之分未説隂陽又問繼之者善是未有成立時於圖上見得否曰這裏本無時節只是要畫與人看便須如此其實動靜無端隂陽無始那裏有箇時節如一日之間晝是陽夜是隂如子時前四刻晝繼善後四刻是成性如陽前隂後少間又隂在前陽在後這箇變化無窮所以伊川云天地之間只有箇感與應更有甚事且如自家亦恁地而今見箇事自家起念去做時這是繼之者善少間做後十分結褁得他了這是成之者性人便即是天天體物而不遺猶仁體事而無不在體物是為物之骨子一箇物裏都有一箇天人之於事無一箇事裏無一箇仁天之所以成萬物仁之所以成萬事都一般問繼善成性朱先生以善者理之方行為陽之屬成則物之已成為隂之屬不知所謂曰但以四序觀之可見大哉乾元萬物資始春夏之謂也乾道變化各正性命秋冬之謂也春夏理之方生故為陽之屬秋冬物之已成故為隂之屬北溪陳氏曰孟子道性善從何而來夫子易繫曰一隂一陽之謂道繼之者善也成之者性也所以一隂一陽之理者為道止是統説箇太極之本體繼之者為善乃是就其間説造化流行生育賦豫更無别物只是箇善而已此是太極之動而陽時所謂善者以實理言即道之方行者也至成此者為性是説一物受得此善成道理去各成箇性耳是太極之靜而隂時此性字與善字相對是即所謂善而理之已定者也繼成字與隂陽字相應是指氣而言善性字與道字相應是指理而言此夫子所謂善是就一物未生之前造化原頭處説善乃重字為實物若孟子所謂性善則是就成之者性處説是生以後事善乃輕字言此性之純粹至善耳其實由造化原頭處有是繼之者善然後成之者性時方能如此之善則孟子之所謂善實淵源於夫子所謂善而非有二本也易二言周子此書及程子説已明備矣詳見太極圖解元亨誠之通利貞誠之復元始亨通利遂貞正乾之四德也通者方出而賦於物善之繼也復者各得而藏於巳性之成也此於圖已為五行之性矣問元亨誠之通便是陽動利貞誠之復便是隂靜隂注却云此已是五行之性如何朱子曰五行便是陽但此處已分作四繼之者善造化流行萬物方資以始而未實也成之者性物生已實造化與物各藏其用而無所為也在人則感物而動者通也寂然不動者復也以此推之圖象隱然不言而喻矣四德則隂陽各二而誠無不貫安得不謂五行之性乎陽動是元亨陰靜是利貞但五行在隂陽之下人物在五行之下如何説繼善成性曰隂陽流於五行之中而出五行無非隂陽誠之通是造化流行未有成立之初所謂繼之者善誠之復是萬物已得此理而皆有所歸藏之時所謂成之者性問元亨誠之通利貞誠之復元亨是春夏利貞是秋冬生氣既散何以謂之收斂曰其氣既散收斂者乃其理耳曰冬間地下氣暖便也是氣收斂在內曰上面氣自散了下面暖底乃自是生來却不是已散之氣復為生氣也繼之者善也元亨是氣之方行而未著於物也是上一截事成之者性也利貞是氣之能成一物也是下一截事元亨利貞理也有這四假氣也有這四假理便在氣中兩箇不曾相離若是説時則有那未涉於氣底四德要就於氣上看也得所以伊川説元者物之始亨者物之長利者物之實貞者物之成這雖是就氣上説然理便在其中伊川這説話改不得謂有是氣則理便具所以伊川只恁地説便可見得物裏面便有這理若要親切莫若只就自家身上看惻隱須有惻隱底根子羞惡須有羞所惡底根子這便是仁義禮智便是元亨利貞孟子以只得恁地説更無説處仁義禮智似一箇包子裏面合下都具了一理渾然非有先後元亨利貞便是如此不是道有元之時有亨之時乾元者始而亨是生出去利貞是收斂凝聚方見性情所以周子言元亨誠之通利貞誠之復元亨利貞無間斷處貞了又元今日子時前便是昨日亥時物有夏秋冬生底是到這裏方感得生氣他自有箇小小元亨利貞氣無始無終且從元處説起元之前又是貞了元字便是生物之仁到得亨便是彰著利便是結聚貞便是收斂既無形迹又須復生至如半夜子時此物雖存猶未動在到寅卯便生巳午便著申酉便結亥子丑便實及至寅又生也那箇只管運轉一嵗有一嵗之運一月有一月之運一日有一日之運一時有一時之運雖一息之微亦有四箇假子恁地運轉但元只是始初未至於著如所謂怵愓惻隱存於人心自恁惻惻地未至大假發出元亨利貞是一箇道理之大綱目須當時復將來仔細研究如濓溪此書只是反覆説這一箇道理蓋那裏雖千變萬化千條萬緒只是這一箇做將去元亨誠之通通即發用利貞誠之復復即本體也問利貞誠之復如先生注下言復如伏藏曰復只是回來這箇是周先生添這一句孔子只説乾道變化各正性命又曰這箇物事流行到這裏住著便立在這裏既立在這裏則又從這裏做起濓溪與伊川説復字差不同濓溪就歸處説如云利貞誠之復誠心復其不善之動而已矣皆是就歸處説伊川却正就動處説如元亨利貞濓溪就利貞上説復字伊川就元字頭説復字二説只是所指地頭不同道理只一般南軒張氏謂梁世榮曰看得此章如何世榮答以此又太極圖解之要旨也曰元亨誠之通利貞誠之復通復二字尤為緊要方其通也是這箇及其復也是這箇今之人其動也未嘗通其靜也未嘗復某只説得如此公自去推北溪陳氏曰若就造化上論則天命之大目只是元亨利貞此四者就氣上論也得就理上論也得就氣上論則物之初生處為元於時為春物之發達處為亨於時為夏物之成遂處為利於時為秋物之斂藏處為貞於時為冬貞者正而固也自其生意之已定而言故謂之正自其斂藏者而言故謂之固就理上論則元者生理之始亨者生理之通利者生理之遂貞者生理之固性之大目只是仁義禮智四者而已得天命之元在我謂之仁得天命之之亨在我謂之禮得天命之利在我謂之義得天命貞在我謂之智故文公云元亨利貞天道之常仁義禮智人性之綱臨川吳氏曰元亨誠之通者春生夏長之時陽之動也於此而見太極之用焉利貞誠之復者秋收冬藏之時隂之靜也於此而見太極之體焉此造化之體用動靜也至若朱子所謂本然未發者實理之體善應而不測者實理之用此則就人身上言與造化之動靜體用又不同蓋造化之運動極而靜靜極而動動靜互振嵗嵗有常萬古不易其動靜各有定時至若人心之或與物接或不與物接初無定時或動多而靜少或靜多而動少非如天地之動靜有常度也大哉易也性命之源乎易者交錯代換之名卦爻之立由是而已天地之間隂陽交錯而實理流行一賦一受於其中亦猶是也朱子曰易字有二義有變易有交易問交易變易之義如何曰交易是陽交於隂隂交於陽是卦圖上底如天地定位山澤通氣云云是也變易是陽變隂隂變陽老陽變為少隂老隂變為少陽如晝夜寒暑屈伸往來是也易有兩義一是變易便是流行底一是交易便是對待底問正義云易者變化之總號代換之殊稱乃隂陽二氣生生不息之理此數句亦説得好曰天地之間别有甚事只是隂與陽兩箇字看是甚麼物事都離不得只就身上體看才開眼不是隂便是陽不是仁便是義不是剛便是柔自家要做向前便是陽才收退便是隂意思才動便是陽才靜便是隂未消别看只一動一靜便是隂陽伏羲只因此畫卦示人説卦云窮理盡性以至於命言聖人作易窮天下之理盡人物之性而合於天道所以説性命之源誠者聖人之本言太極大哉乾元萬物資始誠之源言隂陽五行乾道變化各正性命誠斯立焉言氣化純粹至善者通繳上文故曰一隂一陽之謂道解誠者聖人之本繼之者善也解大哉乾元以下成之者性也解乾變變化以下元亨誠之通言流行處利貞誠之復言學者用力處大哉易也性命之源又通繳上文勉齋黃氏曰故曰以下三句是引易來説結上三節向後乃贊易之語又曰而今讀書須以身體之不可徒泥紙上語如此篇説誠只是實誠者聖人之本是言聖人之所以為聖以其全是實理而已下文又不説聖人只説箇實理大哉乾元以下只把春夏秋冬來看春夏之時萬物都有生意蕃育長茂這是那實理流行之源秋冬間萬物成實箇箇物裏面都是這實理各正性命是一箇物正一箇性命去如柑成柑橘成橘箇箇都實元亨誠之通是春夏生長意思利貞誠之復是秋冬成實意思一隂一陽之謂道隂便是秋冬陽便是春夏只這箇便是道隂陽流行道便在其中不成别有箇道繼之者善則是那誠之通未有成立只喚做善成之者性則是那誠之復已有成立方喚做性大哉易也性命之源乎易便是一隂一陽命則是繼之者性則是成之者看來繼善成性只是箇頭尾誠下第二聖誠而已矣聖人之所以聖不過全此實理而已即所謂太極者也朱子曰天無不實寒便是寒暑便是暑更不待使他恁地聖人仁便真箇是仁義便真箇是義無不實處誠之為言實也然經傳用之各有所指周子所謂誠者聖人之本蓋指實理而言之也所謂聖誠而已矣即中庸所謂唯天下至誠者指人之實有此理而言也聖人氣質清純渾然天理初無人欲之私以病之是以仁則表裏皆仁而無一毫之不仁義則表裏皆義而無一毫之不義西山真氏曰天之春而夏夏而秋秋而冬晝而夜夜而晝循環運轉一息不停以其誠也聖人之自壯至老自始而終無一息之懈亦以其誠也誠五常之本百行之源也五常仁義禮智信五行之性也百行孝悌忠信之屬萬物之象也實理全則五常不虧而百行修矣問誠是五常之本朱子曰誠是通體地盤問誠五常之本此實理於其中又分此五者之用曰然靜無而動有至正而明達也方靜而隂誠固未嘗無也以其未形而謂之無耳及動而陽誠非至此而後有也以其可見而謂之有耳靜無則至正而已動有然後明與達者可見也問心本是箇動物不審未發之前全是寂然而靜還是靜中有動意朱子曰不是靜中有動意周子謂靜無而動有不是無以其未形而謂之無非因動而後有以其可見而謂之有耳方其靜時動之理只在伊川謂當中時耳無聞目無見但見聞之理在始得及動時又只是這靜底耳某近看中庸鬼神一章切謂此章正是發明顯微無問只是一理處且如鬼神有甚形迹然人却自然有畏敬之心以承祭祀便如真有一物在上下左右此理亦有甚形迹然人却自然有秉彞之性才存主著這裏便自見得許多道理參前倚衡雖欲頃刻離而遁之而不可得只為至誠貫徹實有是理無端無方無二無雜方其未感寂然不動及其既感無所不通濓溪所謂靜無而動有至正而明達者於此亦可以見之人自有生即有知識事物交來應接不暇其間初無頃刻停息舉世皆然也然所謂未發之中寂然不動者豈以日用流行者為已發而指夫暫與休息不與事接為未發時耶嘗試求之泯然無覺之中似非虛明應物之體而幾微之際一有覺焉則又便為已發而非寂然不動之謂於是退而驗之日用之間凡感之而通觸之而覺蓋有渾然全體應物而不窮者是乃天命流行生生不已之機雖一日之間常起常滅是其寂然之本體則未嘗不寂然也所謂未發如是而已夫豈别有一物限於一時拘於一處而可以謂之中哉周子論至誠則曰靜無而動有亦足以驗大本之無所不在矣五常百行非誠非也邪暗塞也非誠則五常百行皆無其實所謂不誠無物者也靜而不正故邪動而不明不達故暗且塞朱子曰誠茍不存則非正而邪非明而暗非達而塞學聖希天惟在存誠誠存則五常百行皆自然無一不備也理一也以其實有故謂之誠以其體言則有仁義禮智之實以其用言則有惻隱羞惡恭敬是非之實故曰五常百行非誠非也蓋無其實矣又安得有是名乎故誠則無事矣誠則衆理自然無一不備不待思勉而從容中道矣北溪陳氏曰聖人純是天理合下無欠缺處渾然無變動徹內外本末皆是實無一毫之妄不待思而自得此生知也不待勉而自中此安行也且如人行路須是照管方行出路中不然則蹉向適去聖人如不看路自然在路中間行所謂從容無不中道此天道也至易而行難實理自然故易人偽奪之故難果而確無難焉果者陽之決確者隂之守決之勇守之固則人偽不能奪之矣朱子曰德輶如毛民鮮克舉之孔子所謂克己最難也周子亦曰至易而行難果而確無難焉蓋輕故易重故難知其易故行之必果知其難則守之宜確能果能確則又何難之有問果而確果者陽決確者隂守曰此是一事而首尾相應果而不確即無所守確而不果則無所決二者不可偏廢猶隂陽不可相無也又因論良心與私欲交戰須立定腳根戰退他因舉濓溪説果而確無難焉須是果敢勝得私欲方確然守得這道理不遷變故曰一日克己復禮天下歸仁焉克去己私復由天理天下之至難也然其機可一日而決其效至於天下歸仁果確之無難如此朱子曰克己復禮則事事皆是天下之人聞之見之莫不皆與其為仁也仁者本心之全德克勝也己謂身之私欲也復反也禮者天理之節文也為仁者所以全其心之德也蓋心之全德莫非天理而亦不能不壞於人欲故為仁者必有以勝私欲而復於禮則事皆天理而本心之德復全於我矣歸猶與也又言一日克己復禮則天下之人皆與其仁極言其效之甚速而至大也上章言太極隂陽五行下章言太極之在人者上章言也聖人之誠即天道之誠下章言思誠者人之道誠幾德第三誠無為實理自然何為之有即太極也幾善惡幾者動之微善惡之所由分也蓋動於人心之微則天理固當發見而人欲亦已萌乎其間矣此隂陽之象也問看此一段與太極圖相表裏朱子曰然周子一書都是説這道理問誠無為幾善惡如何曰誠是當然合有這道理所謂寂然不動者幾便是動了或向善或向惡誠無為誠實理也無為猶寂然不動也實理該貫動靜而其本體則無為也幾善惡幾者動之微動則有為而善惡形矣誠無為則善而已動而有為則有善有惡誠是實理無所作為便是天命之謂性喜怒哀樂未發之謂中幾者動之微微動之初是非善惡於此可見一念之生不是善便是惡誠無為只是常存得這箇道理在這裏方始見得幾方始識得善惡若此心放而不存一向反覆顛錯了如何别認得善惡濓溪言誠無為幾善惡才誠便行其所無事而幾有善惡之分於此之時宜常窮察識得是非其初乃毫忽之微至其窮察之久漸見充越之大天然有箇道理開裂在這裏此幾微之決善惡之分也若於此分明則物格而知至知至而意誠意誠而心正身修而家齊國治天下平如激湍水自已不得如田單火牛自止不住問既誠而無為則恐未有惡若學者之心其幾安得無惡曰當其未感五行具備豈有不善及其應事才有照管不到處這便是惡古之聖賢戰戰兢兢過了一生正謂此也顔子有不善未嘗不知亦是如此幾是動之微是欲動未動之間便有善惡須就這處理會若至於發著之甚則亦不濟事矣所以聖賢説戒慎乎其所不睹恐懼乎其所不聞又説慎其獨都是要就這處理會蓋幾微之際大是要切濓溪説得的當數數拈出幾字要當如此又曰幾是要得且於日用處省察善便存放這裏惡便去而不為便是自家切已處天理人欲之分只爭些子故周子只管説幾字然辨之又不可不早故橫渠每説豫字極力説箇幾字儘有警發人處近則公私邪正遠則廢興存亡只於此處看破便斡轉了此是日用第一親切功夫精粗隱顯一時穿透堯舜所謂惟精惟一孔子所謂克己復禮便是此事問注云動於人心之微則天理固當發見而人欲亦已萌天理便是道心人欲便是人心否曰然問周子曰誠無為幾善惡此明人心未發之體而指其未發之端蓋欲學者致察於萌動之微知所決擇而去取之以不失乎本心之體而已或疑以謂有類於胡子同體異用之云者遂妄以意揣量為圖如後善惡雖相對當分賓主天理人欲雖分泒必省宗孽自誠之動而之善則如木之自本而幹自幹而末上下相達則道心之發見天理之流行此心之本主而誠之正宗也其或旁榮側秀若寄生疣贅者此雖亦誠之動而人心之發見私欲之流行所謂惡也非心之固有蓋客寓也非誠之正宗蓋庶孽也茍辦之不早擇之不精則客或乘主孽或代宗矣學者能於萌動幾微之間而察其所發之向背凡其直出者為天理旁出者為人欲直出者為善旁出者為惡直出者固有旁出者橫生直出者有本旁出者無源直出者順旁出者逆直出者正旁出者邪而吾於直出者利導之旁出者遏絶之功力既至則此心之發自然出於一途而保有天命矣於此可以見未發之前有善無惡而程子所謂不是性中元有此兩物相對而生又云凡言善惡皆先善而後惡蓋謂此也若以善惡為東西相對彼此角立則天理人欲同出一源未發之前已具此兩端所謂天命之謂性亦甚汙雜矣此胡氏同體異用之意也曰此説得之或問誠無為幾善惡誠為太極幾之動為隂陽陽為善隂如何便是惡潛室陳氏曰陽大隂小陽貴隂賤陽明隂暗陽清隂濁有善惡之類焉周子此言是以人心説太極當其誠實無妄此實理即為太極才動便善惡生焉幾者動之微蓋欲於其萌動而蚤辨之使之有善而無惡也德愛曰仁宜曰義理曰禮通曰智守曰信道之得於心者謂之德其别有是五者之用而因以名其體焉即五行之性也問以誠配太極以善惡配隂陽以五常配五行此固然但陽變隂合而生水火木金土則五常必不可謂共出於善惡也此似只是説得善之一腳朱子曰此書從頭是配合但此處却不甚似如所謂剛善剛惡柔善柔惡則確然是也幾善惡便是心之所發處有箇善有箇惡了德便只是善底為聖為賢只是這材料做問誠無為至守曰信曰誠是實理無所作為便是天命之謂性喜怒哀樂未發謂之中幾者動之微微動之初是非善惡於此可見一念之生不是善便是惡孟子曰道二仁與不仁而已矣是也德者人之得於身有此五者而已仁義禮智信者德之體愛宜理通守者德之用理謂有條理通謂通達守謂確實此三句就人身而言誠信也幾情也德兼情性而言也當寂然不動時便是誠無為有感而動即有善惡幾是動處大凡人性不能不動但要䪺放得是於其所動處䪺放得是時便是德愛曰仁宜曰義䪺放得不是時便一切反是人性豈有不動但須於中分得天理人欲時方是元來誠幾德便是太極二五此老些子活許盡在裏許前後知他讀了幾過都不曽見此意思於此益知讀書之難也性焉安焉之謂聖性者獨得於天安者本全於已聖者大而化之之稱此不待學問勉強而誠無不立幾無不明德無不備者也復焉執焉之謂賢復者反而至之執者保而持之賢者才德過人之稱此思誠研幾以成其德而有以守之者也問性者獨得於天如何言獨得朱子曰此言聖人合下清明完具無所虧欠此是人所獨得者此對了復字説復者已失而反其初便與聖人獨得處不同安字對了執字説執是執持安是自然性此理而安焉者聖也復此理而執焉者賢也發微不可見充周不可窮之謂神發之微妙而不可見充之周遍而不可窮則聖人之妙用而不可知者也朱子曰發微不可見充周不可窮之謂神言其發也微妙而不可見其充也周遍而不可窮發字充字就人看如性焉安焉復焉執焉皆是人如此微不可見周不可窮却是理如此神只是聖之事非聖外又有一箇神别是箇地位也神即聖人之德妙而不可測者也非聖人之上復有所謂神人也發動也微幽也言其不疾而速一念方萌而言至理已具所以微而不可見也充廣也周遍也其行行而至蓋隨其所寓而理無不到所以周而不窮也此三句就人所到地位而言即盡夫上三句之理而所到有淺深也性焉安焉之謂聖是就聖人性分上説發微不可見充周不可窮之謂神是他人見其不可測也勉齋黃氏曰誠幾德此一假文理粲然只把體用二箇字來讀他便是誠是體幾是用仁義禮智信是體愛宜理通守是用誠幾只是德擘來做在誠為仁則在幾為愛在誠為義則在幾為宜性焉復焉發微不可見是體安焉執焉充周不可窮是用性如堯舜性之也復如湯武反之也是既失了却再復得安而行之不恁地辛苦執則是擇善而固執須恁地把捉發其源頭底充是流出底其發也微而不可見其充也周而不可窮是謂神指聖而不可知者也問誠者實然之理仁義禮智信五者皆實理也自然至善無所謂惡幾者動之微於是始有善惡之分善則得是五者之理惡則失是五者之理所謂德者是理之得於心者也以實理言之無聖賢衆人之異幾有善惡然後有聖賢衆人之分德者惟聖賢有之故於此下只説聖賢而不言衆人至於發之微充之周則又惟聖者能之故於此只言聖人之神而不及賢人也曰所説大槩得之但其間曲折更有合細講處誠性也未發也幾情也已發也仁義禮智信性也愛宜理通守情也曰者因情以明性性也復也發微也主性而言安也執也充周也主情而言聖賢體是德於性情之間淺深之分如此周子之言簡實精要非知道者孰能言之問周子言愛曰仁者愛情也仁性也情用也性體也此書解所謂因用以名其體也孟子既言惻隱之心仁之端也只此端字便見因用以明體謂之端則如木之有萌芽而已發也曰所解周子之意得之問誠幾德朱子解以誠無為比太極幾善惡配隂陽之象德則曰即五行之性如此觀之理却貫通答曰以誠幾德配太極隂陽五行此亦要看得活活則處處皆通不活則處處喚做不是不得喚做是亦不得在人自曉會耳問之謂聖之謂賢之謂神三句曰聖賢神三字自是就所到之地位而言若曰此聖人此賢人此神人也聖第四寂然不動者誠也感而遂通者神也動而未形有無之間者幾也本然而未發者實理之體善應而不測者實理之用動靜體用之間介然有頃之際則實理發見之端而衆事吉凶之兆也朱子曰寂然不動者誠也又曰大哉乾元萬物資始誠之源也須知此大哉乾元萬物資始以上更有寂然不動幾善惡者言衆人者也動而未形有無之間者言聖人毫釐發動處此理無不見寂然不動者誠也至其微動處即是幾幾在誠神之間問誠神幾在學者則當如何曰隨處做工夫然本在誠著力在幾存主處是誠發用處是神幾則在二者之間幾最緊要幾雖已感却是方感之初通則直到末梢皆是通也如推其極到協和萬邦黎民於變時雍亦只是通也幾只在起頭一些子問幾如何是動靜體用之間曰似有而未有之時在人識之爾勉齋黃民曰太極圖中只説動而生陽靜而生隂此又説箇幾此是動靜之間又有此一項誠精故明神應故妙幾微故幽清明在躬志氣如神精而明也不疾而速不行而至應而妙也理雖已萌事則未著微而幽也誠神幾曰聖人性焉安焉則精明應妙而有以洞其幽微矣問誠精故明先生引清明在躬志氣如神釋之却是自明而誠朱子曰便是看得文字粗踈周子説精字最好誠精者直是無些夾雜如一塊銀更無銅鉛便是通透好銀故只當以清明釋之志氣如神即是至誠之道可以前知之意問言神者五其義同否曰當隨所在看曰神只是以妙言之否曰是且説感而遂通者神也橫渠謂一故神兩在故不測曰指造化而言曰忽然在這裏又忽然在那裏便是神曰在人言之則如何曰知覺便是神觸其手則手知痛觸其足則足知痛便是神應故妙節齋蔡氏曰誠寂也靜也而具動靜之理神感也動也而妙動靜之機蓋誠為神本神為誠用本不動而用動故誠則靜意多神則動意多要其實則各兼動靜隂陽也幾者誠將發而為神之始也在靜無動有之間雖動而微亦未可見實為神之端也慎動第五動而正曰道動之所以正以其合乎衆所共由之道也用而和曰德用之所以和以其得道於身而無所待於外也朱子曰動而正曰道言動而必正曰道否則非也用而和曰德德有熟而不喫力之意問動而不正不可謂道用而不和不可謂德曰此兩句緊要在正字和字上問動而正曰道用而和曰德却是自動用言曰者猶言合也若看做道德題目却難通曰然是自人身上説正是理動而得其正理便是道若動而不正便不是道和亦只是順理用而和順便是得此理於身若用而不和順則不得此理於身故下云匪仁匪義匪禮匪智匪信悉邪也只是此理故又曰君子慎動匪仁匪義匪禮匪智匪信悉邪也所謂道者五常而已非此則其動也邪矣邪動辱也甚焉害也無得於道則其用不和矣故君子慎動動必以正則和在其中矣問動而正曰道用而和曰德匪仁匪義匪禮匪智匪信悉邪也以太極圖配之五常配五行則道德配隂陽德隂而道陽也朱子曰亦有此理勉齋黃氏曰主靜審幾慎動三者循環與孟子夜氣平旦之氣旦晝所為相似節齋蔡氏曰道即太極流行之道德即五性之德動而正即前所謂幾也用而和即後所謂中節也道第六聖人之道仁義中正而已矣中即禮正即智圖解備矣守之貴天德在我何貴如之行之利順理而行何往不利廓之配天地充其本然並立之全體而已矣豈不易簡豈為難知道體本然故易簡人所固有故易知不守不行不廓耳言為之則是而嘆學者自失其幾也師第七或問曰曷為天下善曰師曰何謂也曰性者剛柔善惡中而已矣此所謂性以氣稟而言也問性者剛柔善惡中而已朱子曰此性便是言氣質之性四者之中去却剛惡柔惡却於剛柔二善中擇中而主焉太極之數自一而二剛柔也自一而四剛善剛惡柔善柔惡也遂加其一中也以為五行所謂天命之謂性者是就人身中指出這箇是天命之性不雜氣稟者而言爾若才説性時便是夾氣稟而言所以程子云才説性時便已不是性也濓溪説性者剛柔善惡中而已矣濓溪説性只是此五者他又自有説仁義禮智底性時若論氣稟之性則不出五者然氣稟底性便只是那四端底性非别有一種性也所謂剛柔善惡中者天下之性固不出此五者然細推之極多般樣千般百種不可窮究但不離此五者爾問濓溪論性自氣稟言却是上面已説太極誠不妨如孔子云性相近習相遠不成是不識如荀楊便不可曰然他已説純粹至善人之氣稟有偏而所見亦不同如氣稟剛底人則見事剛處多而處事失之太剛柔底人見事柔處多而處事失之太柔須先克治氣稟偏處問惡是氣稟如何云亦不可不謂之性曰既是氣稟惡便牽引那性不好蓋性只是搭附在氣稟上性只是理然無那天地氣質則此理沒安頓處但得氣之清明則不蔽固此理順發出來蔽固少者發出來天理勝蔽固多者則私欲勝便見得本原之性無有不善只被氣質來昏濁則隔了學以反之則天地之性存矣故説性須兼氣質方備論天地之性則専指理而言論氣質之性則以理與氣雜而言之問天地之性既善則氣稟之性如何不善曰理固無不善才賦於氣質便有清濁偏正剛柔緩急之不同蓋氣強而理弱管攝他不得天地間只有一箇道理性便是理人之所以有善有惡只緣氣質之稟各有清濁問氣質之性曰性譬之水本皆清也以淨器盛之則清以汚濁之器盛之則臭濁然本然之清未嘗不在但既臭濁卒乍也難得他便清故雖愚必明雖柔必強也煞用氣力然後可至此問形而後有氣質之性其所以有善惡之不同何也勉齋黃氏曰氣有偏正則所受之理隨而偏正氣有昏明則所受之理隨而昏明木之氣盛則金之氣衰故仁常多而義常少金之氣盛則木之氣衰故義常多而仁常少若此者氣質之性有善惡也曰既言氣質之性有善惡則不復有天地之性矣子思子又有未發之中何也曰性固為氣質所雜矣然方其未發也此心湛然物欲不生則氣雖偏而理自正氣雖昏而理自明氣雖有贏乏而理則無勝負及其感物而動則或氣動而理隨之或理動而氣挾之由是至善之性聽命於氣善惡由之而判矣此未發之前天地之性純粹至善而子思之所謂中也記曰人生而靜天之性也程子曰其本也真而靜其未發也五性具焉則理固有寂感而靜則其本也動則有萬變之不同焉愚嘗以是質之先師矣答曰未發之前氣不用事所以有善而無惡至哉此言也北溪陳氏曰天所命於人以是理本有善而無惡故人所受以為性亦本善而無惡孟子道性善是専就大本上説來説得極親切只是不曾發出氣稟一假所以起後世紛紛之論蓋人之所以有萬殊不齊只緣氣稟不同這氣只是隂陽五行之氣如陽性剛隂性柔火性燥水性潤金性寒木性溫土性厚七者夾雜便是參差不齊所以人隨所值便有許多般樣然這氣運來運去參差不齊之時多真元會合之時少如一嵗之間極寒極暑隂晦之時多不寒不暑光風霽月之時少最難值好時節人生值此不齊之氣如有一等人非常剛烈是值陽氣多有一等人極是軟弱是值隂氣多有人躁暴忿戾又是值陽氣之惡者有人狡譎姦險此又值隂氣之惡者有人性圓一撥便轉也有一等極愚拗雖一句善言亦説不入都是氣稟如此陽氣中有善惡隂氣中亦有善惡如此書問剛善剛惡柔善柔惡之類不是隂陽氣本惡只是分合轉移齊不齊中便自然成粹駁善惡耳因氣有粹駁便有賢愚氣雖不齊而大本則一雖下愚亦可變而為善然工夫最難非百倍其功者不能故子思曰人一能之已百之人十能之已千之果能此道雖愚必明雖柔必強正為此耳西山真氏曰性之不能離乎氣猶水之不能離乎土也雖不雜乎氣而氣汩之則不能不惡矣雖不雜乎土而土汩之則不能不濁耳然清者其先而濁者其後也善者其先而惡者其後也先善者本然之性也後惡者形而後有者也故所謂善者超然於降哀之初而所謂惡者雜出於有形之後其非相對而並出也昭昭矣張子曰形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉程子曰性即理也天下之理原其所自來未有不善喜怒哀樂未發何嘗先不善發而皆中節則無往而不善凡言善惡皆善而後惡言吉凶皆先吉而後凶言是非皆先是而後非觀二先生之言則本然之性與氣質之性其先後主賓純駁之辨皆判然矣不達曰剛善為義為直為斷為嚴毅為幹固惡為猛為隘為強梁柔善為慈為順為巽惡為懦弱為無斷為邪佞剛柔固隂陽之大分而其中又各有隂陽以為善惡之分焉惡者固為非正而善者亦未必皆得乎中也朱子曰二氣五行始何嘗不正只衮來衮去便有不正如陽為剛躁隂為重濁之類問人有剛柔過於中如何曰只為見彼善於此剛果勝柔故一曰剛周子曰剛善為義為直為斷為嚴毅為幹固惡為猛為隘為強梁須如此别方可問何以制之使歸於善曰須於中求之自暴者便是剛惡之所為自棄者便是柔惡之所為惟中也者和也中節也天下之達道也聖人之事也此以得性之正而言也然其以和為中與中庸不合蓋就已發無過不及者而言之如書所謂允執厥中者也朱子曰中也者和也天下之達道也别人不敢恁地説君子而時中便是恁地看中庸之中是兼以其發而中節無過不及者得名故周子曰惟中也者和也中節也天下之達道也若不識得此理則周子之言更解不得所以程子謂中者天下之正道中庸章句以中庸之中實兼中和之義論語集注以中者不偏不倚無過不及之名皆此意也問注中字處引允執厥中曰此只是無過不及之中書傳中所言皆如此只有喜怒哀樂未發之中一處是以體言到中庸字亦非専言體便有無過不及之意或問子思子言中和如此而周子之言則曰中者和也中節也天下之達道也乃舉中而合之於和然則又將何以為天下之大本耶曰子思之所謂中以未發而言也周子之所謂中以時中而言也學者涵泳而别識之見其並行而不相悖焉者可也北溪陳氏曰中有二義有已發之中有未發之中未發是就性上説已發是就事上説已發之中當喜而喜當怒而怒那恰好處無過不及便是中此中即所謂和也所以周子亦曰中也者和也是指已發之中而言也故聖人立教俾人自易其惡自至其中而止矣易其惡則剛柔皆善有嚴毅慈順之德而無強梁懦弱之病矣至其中則其或為嚴毅或為慈順也又皆中節而無太過不及之偏矣朱子曰剛柔一假亦須看且先易其惡既易其惡則至其中在人人性本善然有生下來善底有生下來便惡底此是氣稟不同人之為學却是要變化那氣稟然極難變化如氣稟偏於剛則一向剛暴偏於柔則一向柔弱之類人一向推托道氣稟不好不向前又不得一向察這氣稟之害只昏昏地又不得須知氣稟之要害力去用功克治裁其勝而歸於中乃可問子路不能變化氣質曰言之非難政懼行之不易是以難輕言爾周子有言聖人立教使人自易其惡自至其中而止矣切意如子路者可謂能易其惡矣若至其中一節工夫則難雖夫子每每提撕未見其有用力處也所喻氣質過剛未能自克而欲求其所以轉移變化之道夫知其所偏而欲勝之在吾日用之間屢省而痛懲之耳故周子有自易其惡自至其中之説豈他人之所得而與於其間哉黃氏巖孫曰張子云為學大益在自求變化氣質程子曰學至氣質變方是有功皆此意也故先覺覺後覺暗者求於明而師道立矣師者所以攻人之惡正人之不中而已矣師道立則善人多善人多則朝廷正而天下治矣此所以為天下善也此章所言剛柔即易之兩儀各加善惡即易之四象易又加倍以為八卦而此書及圖則止於四象以為火水金木而即其中以為土蓋道體則一而人之所見詳略不同但於本體不差則並行而不悖矣問四象剛柔善惡皆是隂陽朱子曰然問解云剛柔即易之兩儀各加善惡即易之四象易又加倍以為八卦而此書及書則止於四象疑善惡二字是虛字如易八卦之吉凶也今先生解以善惡配四象如何曰凡物具兩端如此扇便有靣有背凡物皆然自一人之心言之則有善惡在其中便是兩物周子只説到五行住其理亦只消如此説自多説不得包括萬有舉歸於此康節却推到八卦太陽太隂少陽少隂太陽太隂各有一隂一陽少陽少隂亦有一隂一陽是分為八卦也觀此則此書所説可知矣前輩所見各異邵康節須是二四八周子只是二四中添一土為五行如剛柔添善惡又添中於其間是也問解云止於四象以為水火金木如何曰周子只推到五行如邵康節又從一分為二極推之至於八萬四千縱橫變動無所不可如漢儒將十二辟卦分十二月康節推又别幸第八人之生不幸不聞過大不幸無恥不聞過人不告也無恥我不仁也必有恥則可教聞過則可賢有恥則能發憤而受教聞過則知所改而為賢然不可教則雖聞過而未必能改矣以此見無恥之不幸為尤大也朱子曰人之生不幸不聞過大不幸無恥此兩句是一項事知恥是由內心以生聞過是得之於外人須知恥方能聞過而改故恥為重思第九洪範曰思曰睿睿作聖睿通也無思本也思通用也幾動於彼誠動於此無思而無不通為聖人無思誠也思通神也所謂誠神幾曰聖人也問無思本也思通用也無思而無不通為聖人不知聖人是有思耶無思耶朱子曰無思而無不通是聖人必思而後無不通是睿又問聖人寂然不動是無思才感便通特應之耳曰聖人也不是塊然由人撥後方動如莊子云推而行曳而止之類只是才思便動不待大故地思索耳又問如此則是無事時都無所思事至時才思而便通耳曰然不思則不能通微不睿則不能無不通是則無不通生於通微通微生於思通微睿也無不通聖也朱子曰睿只訓通對智而言智是體睿是深通處故思者聖功之本而吉凶之機也思之至可以作聖而無不通其次亦可以見幾通微而不陷於凶咎朱子曰幾是事之端緒有端緒方有討頭處這方是用得思易曰君子見幾而作不俟終日睿也又曰知幾其神乎聖也朱子曰思一章幾機二字無異義舉易一句者特斷章取義以解上文節齋蔡氏曰言學聖之事睿即通微也無思本也言聖人無思則自然幾動而至於神故曰本思通用也言學聖人者則當思誠然後知幾而至於神故曰用幾動於彼誠動於此無思而無不通為聖人言聖之幾自然而動不待思而無不通所謂神也通微幾也無不通神也此言君子思誠然後見幾幾動方能至神故思者作聖之功也言作聖之功全在幾神故學易合幾與神結之上兩句説幾字下一句説幾而神也舉易一句者特斷章取義以解上文志學章第十聖希天賢希聖士希賢希望也字本作晞問聖希天若論聖人自然與天相似了得非聖人未嘗自以為聖雖已至聖處而猶戒慎恐懼未嘗頃刻忘所法則否朱子曰天自是天人自是人人終是如何得似天自是用法天明王奉若天道無非法天者大事大法天小事小法天伊尹顔淵大賢也伊尹恥其君不為堯舜一夫不得其所若撻于市顔淵不遷怒不二過三月不違仁説見書及論語皆賢人之事也朱子曰遷移也二復也怒於甲者不移於乙過於前者不復於後顔子克己之功至於如此又曰三月言其久仁者心之德心不違仁者無私欲而其有德也志伊尹之所志學顔子之所學此言士希賢也問志伊尹之所志學顔子之所學所謂志者便是大志於行道否朱子曰志伊尹之所志不是志於私抵古人之學本是欲行伊尹耕於有莘之野樂堯舜之道凡所以治國平天下者無不理會但方處畎畝之時不敢言必於大用耳及三聘幡然便一向如此做去此是堯舜事業看二典之書堯舜所以卷舒作用直如此熟因問向曽説用之則行舍之則藏惟我與爾有是夫此非専為用舍行藏凡所謂治國平天下之具惟夫子顔子有之用之則抱持而往不用卷而懷之曰不敢如此説若如此説則是孔顔胸次無些灑落底氣象只是學得許多骨董將去治天下又如龜山説伊尹樂堯舜之道只是出作入息飢食渴飲而已即是伊尹在莘野時全無些能解及至伐夏救民遂旋呌喚起來皆説得一邉事今世又有一般人只是飽食暖衣無外慕便如此涵養去須是一一理會去問志伊尹之志乃是志於行曰只是不志於私今人仕宦只為祿伊尹却祿之天下弗顧繫馬千駟弗視也又曰雖志於行道看自家所學元未有本領如何便能舉而措之天下又須有那地位若身處貧賤又如何行然亦必自修身始修身齊家然後達之天下也又曰此箇道理緣為家家分得一分不是一人所獨得而專者經世濟物古人有這箇心若只是我自理會得自卷而懷之却是私志伊尹之所志學顔子之所學志固是要立得大然其中又有先後緩急之序致廣大而盡精微若曰未到伊尹田地做未得不成塊然都不思量天下之事若是見州郡所行事有不可人意或民遭酷虐自家寧不惻然動心若是朝夕憂慮以天下國家為念又那裏教你怎地來或曰聖賢憂世之志樂天之誠蓋有並行而不相悖者如此方得曰然今人若不塊然不以天下為志便又切切理會不干已事如世間一樣學問専理會典故世務便是如此古之欲明明德於天下者合下學便是學此事既曰欲明明德於天下不成只恁地空説裏面有幾多工夫問學顔子之所學一本作顔淵孰是曰顔淵底須是勉齋黃氏曰才説為學便以伊尹並言若非為己務實之論蓋人之心量自是有許多事不然則褊狹了然又不可不知輕重先後故伊尹則曰志顔子則曰學大學既言明德便言新民聖賢無一偏之學又曰顔子是明德伊尹是新民本非二事也過則聖及則賢不及則亦不失於令名三者隨其所用之淺深以為所至之近遠不失令名以其有為善之實也胡氏曰周子患人以發䇿決科榮身肥家希世取寵為事也故曰志伊尹之所志患人以廣聞見工文詞矜智能慕空寂為事也故曰學顔子之所學人能志此志而學此事則知此書之包括至大而其用無窮矣問過則聖及則賢若過於顔子則工夫又更純細此固易見不知過伊尹時如何説朱子曰只是更加些從容而已過之便似孔子伊尹終是有擔當底意思多順化第十一天以陽生萬物以隂成萬物生仁也成義也隂陽以氣言仁義以道言詳已見圖解矣朱子曰仁義如隂陽只是一氣陽是正長底氣隂是方消底氣仁便是方消底義義便是收回底仁問春作夏長仁也秋斂冬藏義也此亦所謂天道人道之立歟曰此即此書二氣五行之説舒而為陽慘而為隂孰非天地生物之心哉仁義之於人亦猶是已若仁義而有窮則是天道之隂陽亦有窮也而可乎故聖人在上以仁育萬物以義正萬民所謂定之以仁義天道行而萬物順聖德修而萬民化大順大化不見其迹莫知其然之謂神天地聖人其道一也故天下之衆本在一人道豈遠乎哉術豈多乎哉天下之本在君君之道在心心之術在仁義治第十二十室之邑人人提耳而教且不及況天下之廣兆民之衆哉曰純其心而已矣純者不雜之謂心謂人君之心北溪陳氏曰凡物一色謂之純仁義禮智四者動靜言貌視聽無違之謂純仁義禮智五行之德也動靜隂陽之用而言貌視聽五行之事也德不言信事不言思者欲其不違則固以思為主而必求是四者之實矣心純則賢才輔君取人以身臣道合而從也賢才輔則天下治衆賢各任其職則不待人人提耳而教矣純心要矣用賢急焉心不純則不能用賢不用賢則無以宣化禮樂第十三禮理也樂和也禮隂也樂陽也黃氏巖孫曰禮記云樂由陽來者也禮由隂作者也即此意隂陽理而後和君君臣臣父父子子兄兄弟弟夫夫婦婦萬物各得其理然後和故禮先而樂後此定之以中正仁義而主靜之意程子論敬則自然和樂亦此理也學者不知持敬而務為和樂鮮不流於慢者朱子曰禮樂必相須然所謂樂者亦不過胸中無事而自和樂爾非是著意放開一路欲其和樂也然欲胸中無事非敬不能故程子曰敬則自然和樂而周子亦以為禮先而樂後此可見也問周子禮樂説如何曰也須先是嚴敬方有和若直敬是盡得敬不會不和如臣子入朝自然極其恭也自和這不待勉強如此只是他情願如此便自和君君臣臣父父子子兄兄弟弟夫婦朋友各得其位這自然和若君失其所以為君臣失其所以為臣這如何會和如諸公在此坐都恁地收斂這便是和若退去自放肆或乖爭便是不和此章説得最好問禮之用和為貴解者多以和為樂某思以和為樂恐未穩須於禮中自求所謂和乃可因問之長上或設喻曰所謂禮者猶天尊地卑而乾坤定卑髙以陳而貴賤位截然甚嚴也及其用則天道下濟而光明地道卑而上行此豈非和乎亦恐只是影説畢竟禮中之和不可見如曲禮條目甚詳不知何者為和曰和固不可便指為樂然乃樂之所由生所設喻亦甚當如曲禮之目皆禮也然皆理義之所宜人情之所安行之而上下親踈各得其所豈非和乎又曰無禮之節則無樂之和惟有節而後有和也問周子以禮先於樂而樂記以樂為先與濓溪異曰他却將兩者分開了北溪陳氏曰禮樂不是判然兩物不相干涉禮只是箇序樂只是箇和才有序便順而和失序便乖戾而不和如父子君臣夫婦兄弟所以相戕相賊相怨相仇如彼其不和者都緣先無箇父子君臣兄弟夫婦之禮無親義序别便如此禮樂無所不在所謂明則有禮樂幽則有鬼神如何離得如盜賊至無道亦須上下有統屬此便是禮意才有統屬便自相聽從這便是樂底意又如行路人兩箇同行才存長少次序長先少後便相和順而無爭其所以有爭鬪處皆緣無箇少長之序於此却見禮先而樂後務實第十四實勝善也名勝恥也故君子進德修業孳孳不息務實勝也德業有未著則恐恐然畏人知遠恥也小人則偽而已故君子日休小人日憂實修而無名勝之恥故休名勝而無實修之善故憂程子曰學者須是務實不要近名有意近名則為偽也大本已失更學何事為名與為利清濁雖不同然其利心則一也又曰有實則有名名實一物也若夫好名者則徇名為虛矣如君子疾沒世而名不稱謂無善可稱耳非徇名也愛敬第十五有善不及設問人或有善而我不能及則如之何曰不及則學焉答言當學其善而已問曰有不善問人有不善則何以處之曰不善則告之不善且勸曰庶幾有改乎斯為君子答言人有不善則告之以不善而勸其改告之者恐其不知此事之為不善也勸之者恐其不知不善之可改而為善也有善一不善二則學其一而勸其二亦答詞也言人有善惡之雜則學其善而勸其惡有語曰斯人有是之不善非大惡也則曰孰無過焉知其不能改改則為君子矣不改為惡惡者天惡之彼豈無畏耶烏知其不能改此亦答言聞人有過雖不得見而告勸之亦當答之以此冀其或聞而自改也有心悖理謂之惡無心失理謂之過西山真氏曰過聖賢不能無知其為過而速改則無矣蓋無心而誤則謂之過有心而為則謂之惡不待别為不善方謂之惡只知過不改是有心便謂之惡故君子悉有衆善無弗愛且敬焉善無不學故悉有衆善惡無不勸故不棄一人於惡不棄一人於惡則無所不用其愛敬矣動靜第十六動而無靜靜而無動物也有形則滯於一偏動而無動靜而無靜神也神則不離於形而不囿於形矣動而無動靜而無靜非不動不靜也動中有靜靜中有動物則不通神妙萬物結上文起下意問動而無靜靜而無動物也靜而無靜動而無動神也所謂物者人在其中否朱子曰人在其中問所謂神者是天地之造化否曰神者即此理也問物則拘於有形人則動而有靜靜而有動如何却同萬物而言曰人固是靜中動動中靜亦謂之物凡言物者指形氣有定體而言然自有一箇變通底在其中須是知器即道道即器莫離道而言器可也凡物皆有此理且如這竹器固是一器到其適用處便有箇道在其中此章動而無靜靜而無動物也此言形而下之器也形而下者則不能通故方其動時則無了那靜方其靜時則無了那動如水只是水火只是火就人言之語則不默默則不語以物言之飛則不植植則不飛是也動而無靜靜而無動非不動不靜此言形而上之理也理則神而莫測方其動時未嘗不靜故曰無動方其靜時未嘗不動故曰無靜靜中有動動中有靜靜而能動動而能靜陽中有隂隂中有陽錯綜無窮是也下曰水隂根陽火陽根隂水隂火陽物也形而下者也所以根隂根陽理也形而上者也黃幹云兼兩意言之方備言理之動靜則靜中有動動中有靜其體也靜而能動動而能靜其用也言物之動靜則動者無靜靜者無動其體也動者則不能靜靜者則不動其用也問動而無動靜而而無靜神也此理如何曰此説動而生陽動極靜靜而生隂靜極復動此自有箇神在其間不屬隂不屬陽故曰隂陽不測之謂神且如晝動夜靜晝固是屬動然在晝間神不與之俱動夜固是屬靜然在夜間神不與之俱靜神又自是神神却管得晝夜晝夜却管不得那神蓋神妙萬物自是超然於形器之表貫動靜而言其體常如是而已矣如説水隂根陽火陽根隂已是有形象底是説粗底了所謂神者初不離乎物如天地物也天之收斂豈専乎動地之發生豈専乎靜此即神也動靜二字相對不能相無乃天理之自然非人力之所能為也若不與動對則不名為靜不與靜對亦不名為動矣但衆人之勤則流於動而無靜衆人之靜則淪於靜而無動此周子所謂物則不通也惟聖人無人欲之私而全乎天理是以其動也靜之理未嘗亡其靜也動之機未嘗息此周子所謂神妙萬物也水隂根陽火陽根隂水隂也而生於一則本乎陽也火陽也而生於二則本乎隂也所謂神妙萬物者如此或問神朱子曰神在天地間所以妙萬物者如水為隂則根陽火為陽則根隂五行隂陽隂陽太極此即所謂五行一隂陽隂陽一太極者以神妙萬物之體而言也一云承上文而言自五而一也四時運行萬物終始此即所謂五氣順布四時行焉無極二五妙合而凝者以神妙萬物之用而言也一云四時即五行也反上文而言自五而萬也朱子曰四時行焉萬物終始若道有箇物時又無形骸若道無箇物時又怎生會恁地混兮闢兮其無窮兮體本則一故曰混用散而殊故曰闢一動一靜其運如循環之無窮此兼舉其體用而言也一云混合也自五而一動而靜陽而隂也闢開也自五而萬靜而動隂而陽一合一開如循環之無端而天地之造化無窮矣此章發明圖意更宜參考朱子曰混言太極闢言為隂陽五行以後故末句曰其無窮兮既闢之後為隂陽五行以後為萬物無窮盡也或問周子之語言合胡不自萬而一言開胡不自一而萬勉齋黃氏曰周子之言造化至五行處是一關隔自五行而上屬乎造化自五行而下屬乎人物所以太極圖説到四時行焉却説轉從五行説太極又從五行之生説各一其性説出至變化無窮蓋天地造化分隂分陽至五行而止五行既具則由是而生人物也有太極便有隂陽有隂陽便有五行三者初無斷際至此若不説合却恐將作三件物事認了所以合而謂之妙合非昔開而今合莫之合而合也至於五行既凝而後有男女男女既交而後生萬物此却是有次第故有五行而下節節開説然其理氣未嘗有異則恐未嘗不合也樂上第十七古者聖制禮法修教化三綱正九疇敘百姓大和萬物咸若綱網上大繩也三綱者夫為妻綱父為子綱君為臣綱也疇類也九疇見洪範若順也此所謂理而後和也乃作樂以宣八風之氣以平天下之情八音以宣八方之風見國語宣所以達其理之分平所以節其和之流黃氏瑞節曰東北方條風東方明庶風東南方清明風南方景風西南方涼風西方閶闔風西北方不周風北方廣莫風故樂聲淡而不傷和而不淫入其耳感其心莫不淡且和焉淡則欲心平和則躁心釋淡者理之發和者和之為先淡後和亦主靜之意也然古聖賢之論樂曰和而已此所謂淡蓋以今樂形之而後見其本於莊正齊肅之意耳朱子曰欲於齊肅之意下添故希簡而寂寥六字優柔平中德之盛也天下化中治之至也是謂道配天地古之極也欲心平故平中躁心釋故優柔言聖人作樂功化之盛如此或云化中當化化成朱子曰優柔平中中字於動用上説明道云惟精惟一所以至之允執厥中所以行之即此意然只云於動用上説却覺未盡不若云於動用上該本體説後世禮法不修政刑苛紊縱欲敗度下民困苦謂古樂不足聽也代變新聲妖淫愁怨導欲增悲不能自止故有賊君棄父輕生敗倫不可禁者矣廢禮敗度故其聲不淡而妖淫政苛民困故其聲不和而愁怨妖淫故導欲而至於輕生敗倫愁怨故增悲而至於賊君棄父嗚呼樂者古以平心今以助欲古以宣化今以長怨古今之異淡與不淡和與不和而已朱子曰此章極可觀有條理只是淡與不淡和與不和前輩所見各異不復古禮不變今樂而欲至治者逺矣復古禮然後可以變今樂樂中第十八樂者本乎政也政善民安則天下之心和故聖人作樂以宣暢其和心達于天地天地之氣感而大和焉天地和則萬物順故神祗格鳥獸馴聖人之樂既非無因而強作而其制作之妙又能真得其聲氣之元故其志氣天人交相感動而其效至此問聲氣之元朱子曰律厯家最重這元聲元聲定向下都定元聲才差向下都差古人制度今皆無復存者只這些道理人尚説得去法度却杜撰不得且如樂今皆不可復考今人只會説得凡音之生由人心也人心之動物使之然也到得制度便説不去問注云制作之妙真有以得其聲氣之元不知今時尚可尋究否曰今所爭秪是黃鍾一宫耳這裏髙則都髙這裏低則都低蓋難得其中耳樂下第十九樂聲淡則聽心平樂辭善則歌者慕故風移而俗易矣妖聲豔辭之化也亦然朱子曰聖王為政以寬為本而今反欲其嚴正如古樂以和為主而周子反欲其淡蓋今之所謂寬者乃縱弛所謂和者乃哇淫非古之所謂寬與和者故必以是矯之乃得其平耳聖學第二十聖可學乎曰可曰有要乎曰有請聞焉曰一為要一者無欲也無欲則靜虛動直靜虛則明明則通動直則公公則溥明通公溥庶矣乎此章之指最為要切然其辭義明白不煩訓解學者能深玩而力行之則有以知無極之真兩儀四象之本皆不外乎此心而日月間自無别用力處矣朱子曰一即所謂太極靜虛即隂轉動直即陽動明通公漙便是五行大抵周子之書才説起便都貫串太極許多道理周子只説一者無欲也這話頭髙卒急難湊泊常人如何便得無欲故伊川只説箇敬字教人只就敬上睚去庶幾執捉得定有箇下手處問周子云一為要一者無欲也如何曰一者無欲一便是無欲今試看無欲之時心豈不一又問比程子主一之謂敬如何曰無欲與敬字一般比敬字分外分明要之持敬頗似費力不如無欲撇脫人只為有欲此心便千頭萬緒此章之言甚為切要問聖可學乎一為要曰這是分明底一不是鶻突底一問如何是鶻突底一曰須是理會得敬落著處若只塊然守一箇敬字便不成箇敬這箇亦只是説箇大槩明通在己也公漙接物也須是就靜虛中涵養始得明通方能公漙若便要公漙定不解得靜虛明通精義入神也動直公溥利用安身也問一是純一靜虛是心心如明鑑止水無一毫私欲填於中故其動也無非從天理流行無一毫私欲撓之靜虛是體動直是用曰也是如此靜虛易看動直難看靜虛只是伊川云中有主則虛虛則邪不能入是也若物來奪之則實實則暗暗則塞動直則是其動也更無所礙若少有私欲便礙便曲要恁地做又不恁地做便自有窒礙便不是直曲則私私則狹又曰無繫纍故虛無委曲故直問明通公漙於四象何所配曰只是春夏秋冬模樣曰明是配冬否曰似是就動虛説曰便是元否曰是然這處亦是偶然相合不是正恁地説問明通公溥庶矣乎舊見劉砥所記先生説以明配水通配木公配火溥配金漙何以配金曰溥如何以配金溥正是配木此四字只依春夏秋冬之序相配將去明配木仁元通配火禮亨公配金義利溥配水智貞想是他記錯了明通者靜而動公漙者動而靜在人言之則明是曉得事物通是透徹無窒礙公是正無偏陂漙是漙偏萬事又曰所謂誠立明通意又别彼處以明字為重立如三十而立通則不感知天命耳順也勉齋黃氏曰一為要一字有數樣如作左右看則一為純一之一如作前後看則一為専一之一此所謂一是純一不雜之謂也譬如一物恁地光潔更無些物塵汚了他但看下文言無欲是一靜虛虛也是一動直直也是一何謂無欲只是純然是箇天理無一點私欲此須作兩路看莫非欲也飲食男女人之大欲此不待説須看面前許多物茍有一念挂著底都是欲如一切嗜好之類此是一路又須識得欲不待沉溺其中而後謂之欲程子云才有所向便是欲這箇甚微才起念處便是欲譬如止水上打一動相似若到酒池肉林已狼當了無欲則自湛然一物不留故靜便虛未發時這虛靈知覺如明鏡止水恁地虛動便直做事時只有一路直出那裏有偏曲路徑才虛便明明則見道理透徹故通直便公公自是無物我故漙又曰通者明之極溥者公之極靜虛動直動字當就念慮之萌上看不可就視聽言動上看念慮之萌既直則視聽言動自無非禮今以視聽言動為動直則念慮之萌處有所略矣故動靜當以心言也虛直兩字亦當仔細體認虛者此心湛然外物不能入故虛直者循理而發外邪不能撓故直敬則靜虛亦能動直敬該動靜者也今但言靜虛則偏矣心在則動皆直心不在則動皆邪此兩句却得之北溪陳氏曰一者是表裏俱一純徹無二少有纎毫私欲便二矣內一則靜虛外一則動直而明通公漙則又無時不一矣一者此心渾然太極之體無欲者心體粹然無極之真靜虛者體之未發豁然絶無一物之纍隂之性也動直者用之流行坦然由中道而出陽之愔也性理大全書卷二

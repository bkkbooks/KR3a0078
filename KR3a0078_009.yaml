body:
  text: 性理大全書卷九皇極經世書三邵伯溫解觀物內篇之一物之大者無若天地然而亦有所盡也乾陽物也坤隂物也乾坤謂之物則天地亦物也天地有物之大者耳既謂之物則亦有所盡也然有所謂悠久無疆者固未嘗盡也天之大隂陽盡之矣地之大剛柔盡之矣立天之道曰隂與陽立地之道曰柔與剛天地之道不過隂陽剛柔而已隂陽盡而四時成焉剛柔盡而四維成焉夫四時四維者天地至大之謂也隂陽消長而為寒暑一寒一暑而四時成焉剛柔交錯而有夷險一夷一險而四維成焉四時者天之道四維者地之理也萬物由是而生由是而成也萬物由是而生由是而成斯所以為大者也凡言大者無得而過之也亦未始以大為自得故能成其大豈不謂至偉至偉者歟大哉乾元萬物資始至哉坤元萬物資生物之資始資生可謂大矣然不自以為大故能成其大也天生于動者也地生于靜者也一動一靜交而天地之道盡之矣動之始則陽生焉動之極則隂生焉一隂一陽交而天之用盡之矣靜之始則柔生焉靜之極則剛生焉一剛一柔交而地之用盡之矣天圓故主動地方故主靜動之始則陽生本乎動者也天雖主動動之極則隂生有時而靜矣靜之始則柔生本乎靜者也地雖主靜靜之極則剛生有時而動矣此所謂一動一靜交而天地之道盡之矣蓋言其體則天動而地靜言其用則天有隂陽隂靜而陽動也地有柔剛柔靜而剛動也是天地皆有動靜也此所謂一隂一陽交而天之用盡之矣一剛一柔交而地之用盡之矣動之大者謂之太陽動之小者謂之少陽靜之大者謂之太隂靜之小者謂之少隂統言之則曰隂陽剛柔隂陽剛柔又有小大則為太陽少陽太隂少隂太剛少剛太柔少柔也太陽為日日者至陽之精也故太陽為日在地則為火先天圗以乾為日乾之位在正南太隂為月月者至隂之精得日氣而有光故太隂為月在地則為水先天圗以兊為月兊之位在東南少陽為星星者日之餘有光而見故少陽為星在地則為石先天圗以離為星離之位在正東少隂為辰日月星辰交而天之體盡之矣辰者天之土不見而屬隂故少隂為辰在地則為土天圗以震為辰震之位在東北太柔為水水者天下至柔之物也其性潤下故太柔為水在天則為月先天圗以坤為水坤之位在正北太剛為火火者天下至剛之物也其性炎烈故太剛為火在天則為日先天圗以艮為火艮之位在西北少柔為土土之為物亦柔也其性軟緩故少柔為土在天則為辰先天圗以坎為土坎之位在正西少剛為石石亦剛物也其性堅故少剛為石在天則為星先天圗以巽為石巽之位在西南此圗繫辭所謂天地定位山澤通氣雷風相薄水火不相射是也此所謂伏羲八卦也或曰皇極經世舍金木水火土而用水火土石何也曰日月星辰天之四象也水火土石地之四體也金木水火土者五行也四象四體先天也五行後天也先天後天之所自出也水火土石五行之所自出也水火土石本體也金木水火土致用也以其致用故謂之五行行乎天地之間者也水火土石蓋五行在其間矣金出於石而木生於土有石而後有金有土然後有木金者從革而後成木者植物之一類也是豈舍五行而不用哉五行在其間者此之謂也皇極經世用水火土石以其本體也洪範用金木水火土以其致用也皆有所主其歸則一或曰先天圗八卦次序與所為之物與周易不同何也曰先天圗八卦次序始於乾而終於坤此先天也伏羲八卦也周易自帝出乎震至成言乎艮此文王八卦也非獨八卦如此六十四卦亦不同也伏羲易無文字獨有卦圗隂陽消長而已孔子於繫辭亦嘗言之矣聖人立法不同其道則相為先後終始而未嘗不同也此皆有至理在乎信道者詳考焉水火土石交而地之體盡之矣混成一體謂之太極太極既判初有儀形謂之兩儀兩儀又判而為隂陽剛柔謂之四象四象又判而為太陽少陽太隂少隂太剛少剛太柔少柔而成八卦太陽少陽太隂少隂成象于天而為日月星辰太剛少剛太柔少柔成形于地而為水火土石八者具備然後天地之體備矣天地之體備而後變化生成萬物也所謂八者亦本乎四而已在天成象日也在地成形火也陽燧取于日而得火火與日本乎一體也在天成象月也在地成形水也方諸取于月而得水水與月本乎一體也在天成象星也在地成形石也星隕而成石石與星本乎一體也在天成象辰也在地成形土也自日月星之外髙而蒼蒼者皆辰也自水火石之外廣而厚者皆土也辰與土本乎一體也天地之間猶形影聲響之相應象見乎上體必應乎下皆自然之理也蓋日月星辰猶人之有耳目口鼻水火土石猶人之有血氣骨肉故謂之天地之體隂陽剛柔則猶人之精神而所以主耳目口鼻血氣骨肉者也故謂之天地之用夫太極者在天地之先而不為先在天地之後而不為後終天地而未嘗終始天地而未嘗始與天地萬物圓融和會而未嘗有先後始終者也有太極則兩儀四象八卦以至於天地萬物固已備矣非謂今日有太極而明日方有兩儀後日乃有四象八卦也雖謂之曰太極生兩儀兩儀生四象四象生八卦其實一時具足如有形則有影有一則有二有三以至於無窮皆然是故知太極者有物之先本已混成有物之後未嘗虧損自古及今無時不存無時不在萬物無所不稟則謂之曰命萬物無所不本則謂之曰性萬物無所不主則謂之曰天萬物無所不生則謂之曰心其實一也古之聖人窮理盡性以至于命盡心知性以知天存心養性以事天皆本乎此也日為暑太陽為日暑亦至陽之氣也月為寒太隂為月寒亦至隂之氣也星為晝少陽為星晝亦屬陽辰為夜少隂為辰夜亦屬隂暑寒晝夜交而天之變盡之矣日月星辰交而後有暑寒晝夜之變有暑寒晝夜之變而後歲成焉水為雨雨者水氣之所化火為風風者火氣之所化土為露露者土氣之所化石為雷雷者石氣之所化然四者又交相化焉故雨有水雨有火雨有土雨有石雨水雨則為雱霈之雨火雨則為苦暴之雨土雨則為霡霂之雨石雨則為雹凍之雨所感之氣如此皆可以類推也雨風露雷交而地之化盡之矣水火土石交而後有雨風露雷之化有雨風露雷之化而後物生焉暑變物之性物之性屬陽故為暑之所變寒變物之情物之情屬隂故為寒之所變晝變物之形形可見故屬陽為晝之所變夜變物之體體有質故屬隂為夜之所變性情形體交而動植之感盡之矣性情形體交而後有動植之感感者唱也陽唱乎隂也雨化物之走雨潤下故走之類感雨而化風化物之飛風飄揚故飛之類感風而化露化物之草露濡潤故草之類感露而化雷化物之木雷奮迅而出故木之類感雷而化然飛走草木又更相交錯而化如木之類亦有木之木有木之草木之飛木之走其他皆可以類推也走飛草木交而動植之應盡之矣走飛草木交而後有動植之應應者和也隂和乎陽也性情形體本乎天者也飛走草木本乎地者也本乎天者有感焉本乎地者有應焉一感一應天地之道萬物之理也走感暑而變者性之走也感寒而變者情之走也感晝而變者形之走也感夜而變者體之走也飛感暑而變者性之飛也感寒而變者情之飛也感晝而變者形之飛也感夜而變者體之飛也草感暑而變者性之草也感寒而變者情之草也感晝而變者形之草也感夜而變者體之草也木感暑而變者性之木也感寒而變者情之木也感晝而變者形之木也感夜而變者體之木也性應雨而化者走之性也應風而化者飛之性也應露而化者草之性也應雷而化者木之性也情應雨而化者走之情也應風而化者飛之情也應露而化者草之情也應雷而化者木之情也形應雨而化者走之形也應風而化者飛之形也應露而化者草之形也應雷而化者木之形也體應雨而化者走之體也應風而化者飛之體也應露而化者草之體也應雷而化者木之體也天地之生物所以萬殊而不同者以感應之交錯也感應之交錯所以謂之變化也易曰方以類聚物以羣分此之謂也性之走善色情之走善聲形之走善氣體之走善味性之飛善色情之飛善聲形之飛善氣體之飛善味性之草善色情之草善聲形之草善氣體之草善味性之木善色情之木善聲形之木善氣體之木善味走之性善耳飛之性善目草之性善口木之性善鼻走之情善耳飛之情善目草之情善口木之情善鼻走之形善耳飛之形善目草之形善口木之形善鼻走之體善耳飛之體善目草之體善口木之體善鼻物有聲色氣味人有耳目口鼻此又言人物之有所合也天地之生物皆以其類而有所合焉夫人也者暑寒晝夜無不變雨風露雷無不化性情形體無不感飛走草木無不應所以目善萬物之色耳善萬物之聲鼻善萬物之氣口善萬物之味靈于萬物不亦宜乎暑寒晝夜無所不變雨風露雷無所不化性情形體無所不感飛走草木無所不應然後能生而為人故唯人為能目善萬物之色耳善萬物之聲鼻善萬物之氣口善萬物之味不獨耳目口鼻能善萬物之聲色氣味而心之官又能善萬物之理此所以靈于萬物也蓋天地巨物也分而為萬物萬物各得天地之一端能備天地兼萬物者人之謂也故能與天地並立而為三才孟子曰萬物皆備于我唯聖人然後能踐形能踐形則能反身而誠之求諸已而天下之理得矣衆人則日用而不知役于萬物而喪其良貴雖謂之人曽何異于物哉觀物內篇之二人之所以能靈于萬物者謂其目能收萬物之色耳能收萬物之聲鼻能收萬物之氣口能收萬物之味聲色氣味者萬物之體也目耳鼻口者萬人之用也人有耳目口鼻物有聲色氣味人之耳目口鼻能收物之聲色氣味者蓋以人之與物本乎天地之一氣同乎天地之一體也是故聖人盡已之性能盡人之性盡人之性能盡物之性已之與人人之與物本乎一道故也體無定用惟變是用用無定體惟化是體體用交而人物之道于是乎備矣體本無體故惟化是體用本無用故惟變是用體用變化天地之至妙者也自非聖人孰能與於此然則人亦物也聖亦人也有一物之物有十物之物有百物之物有千物之物有萬物之物有億物之物有兆物之物生一一之物當兆物之物者豈非人乎有一人之人有十人之人有百人之人有千人之人有萬人之人有億人之人有兆人之人生一一之人當兆人之人者豈非聖乎是知人也者物之至者也聖也者人之至者也物之至者始得謂之物之物也人之至者始得謂之人之人也夫物之物者至物之謂也人之人者至人之謂也以一至物而當一至人則非聖而何人謂之不聖則吾不信也物有巨細人有賢愚有一物之物有十物之物有百物之物有千物之物有萬物之物有億物之物有兆物之物物之巨細如此生一一之物能當兆物者人之謂也言人能兼兆物也有一人之人有十人之人有百人之人有千人之人有萬人之人有億人之人有兆人之人人之賢愚如此生一一之人能當兆人者聖人之謂也言聖人能兼兆人也聖人非徒能兼兆人又能兼兆物能兼兆物兆人又能兼天地者聖人之謂也兼兆物則謂之至物兼兆人則謂之至人至物者物之物也至人者人之人也以一至物當一至人則謂之聖人麒麟之于走獸鳯凰之于飛鳥物之至者也聖人之於人人之至者也天下之物或相倍蓰或相千萬物之不齊物之情也物之不齊如此唯聖人能盡之者以能兼兆物兼兆人又能兼天地故也何哉謂其能以一心觀萬心一身觀萬身一物觀萬物一世觀萬世者焉天下人之心一人之心是也故能以一心觀萬心天下人之身一人之身是也故能以一身觀萬身萬物之理一物之理是也故能以一物觀萬物萬世之事一世之事是也故能以一世觀萬世聖人能兼天地人物又能兼古今故能如此又謂其能以心代天意口代天言手代天工身代天事者焉聖人心合天意言行皆與天合故能以心代天意口代天言手代天工身代天事天地以無心為心天何所容心哉故唯能無心而後能代天意天何言哉四時行焉百物生焉天何言哉故唯能無言而後能代天言雲行雨施品物流行天何為哉故唯能無為而後能代天工天事焉又謂其能以上識天時下盡地理中盡物情通照人事者焉知隂陽消長之道故能上識天時知剛柔夷險之理故能下盡地理知巨細品類之别故能中盡物情達利害成敗之幾故能通照人事又謂其能以彌綸天地出入造化進退今古表裏人物者焉能與天地參故能彌綸天地能顯諸仁藏諸用故能出入造化能通乎晝夜之道故能進退古今能盡人之性以盡物之性故能表裏人物噫聖人者非世世而效聖焉吾不得而目見之也雖然吾不得而目見之察其心觀其迹探其體潛其用雖億萬千年亦可以理知之也聖人不世出也故曰非世世而效聖焉察心觀迹探體潛用先聖後聖其道一也或見而知之或聞而知之故雖億千萬年亦可以理知之猶旦暮之間也人或告我曰天地之外别有天地萬物異乎此天地萬物則吾不得而知之非唯吾不得而知之也聖人亦不得而知之也凡言知者謂其心得而知之也言言者謂其口得而言之也既心尚不得而知之口又惡得而言之乎以心不可得知而知之是謂妄知也以口不可得言而言之是謂妄言也吾又安能從妄人而行妄知妄言者乎天地萬物皆一本故雖萬殊理無異致乾坤之道簡易而已易簡而天下之理得矣妄言妄知者不知易簡之道奮私智肆邪說以滅天理孟子所謂惡夫鑿者也觀物內篇之三易曰窮理盡性以至於命所以謂之理者物之理也所以謂之性者天之性也所以謂之命者處理性者也所以能處理性者非道而何理性命皆一也至於命則理性之所處矣三者皆在於道故曰所以能處理性者非道而何是知道為天地之本道生天地故道為天地之本天地為萬物之本天地生萬物故天地為萬物之本以天地觀萬物則萬物為物以道觀天地則天地亦為萬物道生天地故道為天地之本以道觀天地則天地為道之物也天地生萬物故天地為萬物之本以天地觀萬物則萬物為天地之物也道則無有邉際天地則有盡有盡則所以為道之物也天地則無不覆載物則有窮有窮則所以為天地之物也道之道盡之于天矣有道然後有天天本乎道者也天之道盡之于地矣有天然後有地地本乎天者也天地之道盡之于物矣有天地然後有萬物物本乎天地者也天地萬物之道盡之于人矣人者天地五行之秀氣受天地之中以生為萬物之至靈而備天地萬物者也故能配天地而命萬物人能知其天地萬物之道所以盡于人者然後能盡民也唯聖人能知天地萬物之道皆備於我能知天地萬物之道皆備於我則能盡天下之理能盡天下之理則能盡民而後可以治民矣天之能盡物則謂之曰昊天天之於物無不發生故能盡物人之能盡民則謂之曰聖人聖人之於人也無不仁愛故能盡人謂昊天能異乎萬物則非所以謂之昊天也謂聖人能異乎萬民則非所以謂之聖人也萬民與萬物同則聖人固不異乎昊天者矣然則聖人與昊天為一道聖人與昊天為一道則萬民與萬物亦可以為一道也一世之萬民與一世之萬物既可以為一道則萬世之萬民與萬世之萬物亦可以為一道也眀矣昊天之與萬物同乎一道故不異乎萬物聖人之與萬民同乎一道故不異乎萬民萬民與萬物同乎一道則聖人與昊天亦同乎一道矣一世之萬物與一世之萬民同乎一道則萬世之萬物與萬世之萬民亦同乎一道矣天下無二道聖人無兩心物也民也聖人也天也其道一也故古之聖人以一心而推萬心以一物而觀萬物以一世而知萬世者蓋由斯道也夫昊天之盡物聖人之盡民皆有四府焉昊天之四府者春夏秋冬之謂也隂陽升降于其間矣聖人之四府者易書詩春秋之謂也禮樂汚隆于其間矣春為生物之府夏為長物之府秋為收物之府冬為藏物之府號物之庶謂之萬雖曰萬之又萬其庶能出此昊天之四府者乎易為生民之府書為長民之府詩為收民之府春秋為藏民之府號民之庶謂之萬雖曰萬之又萬其庶能出此聖人之四府者乎昊天之四府者時也聖人之四府者經也昊天以時授人聖人以經法天天人之事當如何哉昊天以四府盡物聖人以四府盡民天之四府時也聖人之四府經也天時聖經相因而成天時則隂陽升降而為春夏秋冬聖經則禮樂汚隆而為易書詩春秋春夏秋冬易書詩春秋皆有生長收藏之道其道更相為消長汚隆萬物萬民盡于其間矣故皆謂之曰四府觀物內篇之四觀春則知易之所存乎易者三皇之事業也三皇之時如春觀夏則知書之所存乎書者五帝之事業也五帝之時如夏觀秋則知詩之所存乎詩者三王之事業也三王之時如秋觀冬則知春秋之所存乎春秋者五伯之事業也五伯之時如冬易之易者生生之謂也易之書者生長之謂也易之詩者生收之謂也易之春秋者生藏之謂也書之易者長生之謂也書之書者長長之謂也書之詩者長收之謂也書之春秋者長藏之謂也詩之易者收生之謂也詩之書者收長之謂也詩之詩者收收之謂也詩之春秋者收藏之謂也春秋之易者藏生之謂也春秋之書者藏長之謂也春秋之詩者藏收之謂也春秋之春秋者藏藏之謂也天時迭為消長聖經更為汚隆其道如此可以意會不可以言求也生生者修夫意者也生長者修夫言者也生收者修夫象者也生藏者修夫數者也長生者修夫仁者也長長者修夫禮者也長收者修夫義者也長藏者修夫智者也收生者修夫性者也收長者修夫情者也收收者修夫形者也收藏者修夫體者也藏生者修夫聖者也藏長者修夫賢者也藏收者修夫才者也藏藏者修夫術者也意言象數言其本末仁義禮智言其先後性情形體言其大小聖賢才術言其優劣修夫意者三皇之謂也修夫言者五帝之謂也修夫象者三王之謂也修夫數者五伯之謂也皇帝王伯之道如此修夫仁者有虞之謂也修夫禮者有夏之謂也修夫義者有商之謂也修夫智者有周之謂也仁義禮智在人則與性俱生在時則有先後之序修夫性者文王之謂也修夫情者武王之謂也修夫形者周公之謂也修夫體者召公之謂也德有大小則化有淺深修夫聖者秦穆之謂也修夫賢者晉文之謂也修夫才者齊桓之謂也修夫術者楚莊之謂也秦穆改過自誓得聖之事而已皇帝王伯者易之體也虞夏商周者書之體也文武周召者詩之體也秦晉齊楚者春秋之體也易以道隂陽隂陽消長唯其時而已故皇帝王伯所以為易之體也書以道事帝王之迹存焉故虞夏商周所以為書之體也詩以道志始於二南而終於雅頌故文武周召所以為詩之體也春秋以道名分至於五伯名分亂矣仲尼以春秋正其名分春秋皆五伯之事也故秦晉齊楚者春秋之體也意言象數者易之用也仁義禮智者書之用也性情形體者詩之用也聖賢才術者春秋之用也三皇修夫意五帝修夫言三王修夫象五伯修夫數易具是四者故意言象數為易之用有虞修夫仁有夏修夫禮有商修夫義有周修夫智故仁義禮智為書之用文王修夫性武王修夫情周公修夫形召公修夫體故性情形體為詩之用秦穆修夫聖晉文修夫賢齊桓修夫才楚莊修夫術故聖賢才術所以為春秋之用也用也者心也體也者迹也心迹之間有權存焉者聖人之事也心無所在而無所不在故以用言迹有方所故以體言心迹體用之間有權存焉則所謂體無定用惟變是用用無定體唯化是體者也如是則心迹體用俱以泯矣文中子所謂適造者不知其殊也唯聖人為能盡之竊嘗論之心迹之義大矣哉聖人方其寂然不動則烏有所謂心迹者焉雖鬼神莫得而窺也及其酬酬應變吉凶與民同患則心迹於是乎判矣莊子所謂迹者人之所履豈其所履哉信斯言也徒徇聖人之迹而不達聖人之心是皆膠柱鼓瑟刻舟求劍者也蓋天下之理一涉于事物則必有迹有迹則有方所若聖人之心則無所在亦無所不在無方所者也古之善學聖人者求其心而不求其迹如曽子謂孔子言喪欲速貧死欲速朽有子獨以謂非君子之言有為而言之也茍直以其言為然而不知其所以言則失聖人之心矣是泥乎迹者也若有子可謂能知聖人之心者也古人有以不學柳下惠而學栁下惠者亦此之類也嗚呼不知聖人之心而徒徇聖人之迹則害於道害於道者楊墨之徒是也學者宜有以辨之竊聖人之迹而為姦為惡者則害於國家害於國家者莽卓之徒是也人君宜有以辨之學者不知辨則卒至於無父無君人君不知辨則至於竊國弒君嗚呼自非聖智其孰能辨之哉三皇同意而異化五帝同言而異教三王同象而異勸五伯同數而異率同意而異化者必以道以道化民者民亦以道歸之故尚自然夫自然者無為無有之謂也無為者非不為也不固為者也故能廣無有者非不有也不固有者也故能大廣大悉備而不固為固有者其惟三皇乎是故知能以道化天下者天下亦以道歸焉所以聖人有言曰我無為而民自化我無事而民自富我好靜而民自正我無欲而民自朴其斯之謂歟含容不顯之謂意意在理中未見乎迹者也任理則無為所以為三皇帝則有教有教則有言王則事功著故有象伯則任智力故曰同數而異率任理無為天何言哉以道化天下者也以道化天下故天下以道歸焉三皇同仁而異化五帝同禮而異教三王同義而異勸五伯同智而異率同禮而異教者必以德以德教民者民亦以德歸之故尚讓夫讓也者先人後己之謂也以天下授人而不為輕若素無之也受人之天下而不為重若素有之也若素無素有者謂不己無己有之也若己無己有則舉一毛以取與于人猶有貪鄙之心生焉而况天下者乎能知其天下之天下非己之天下者其惟五帝乎是故知能以德教天下者天下亦以德歸焉所以聖人有言曰垂衣裳而天下治蓋取諸乾坤其斯之謂歟并包遍覆之謂仁三皇之道也帝則有儀有物故曰同禮而異教王則有刑有政故曰同義而異勸伯則智力相尚故曰同智而異率有儀有物以德教天下者也故天下以德歸焉三皇同性而異化五帝同情而異教三王同形而異勸五伯同體而異率同形而異勸者必以功以功勸民者民亦以功歸之故尚政夫政也者正也以正正夫不正之謂也天下之正莫如利民焉天下之不正莫如害民焉能利民者正則謂之曰王矣能害民者不正則謂之曰賊矣以利除害安有去王耶以王去賊安有弒君耶是故知王者正也能以功正天下之不正者天下亦以功歸焉所以聖人有言曰天地革而四時成湯武革命順乎天而應乎人其斯之謂歟皇盡性而已帝則見於事矣故曰同情王則法度備故曰同形伯則威力窮極矣故曰同體法度備則形見于天下矣形見于天下以功勸天下者也以功勸天下故天下以功歸焉三皇同聖而異化五帝同賢而異教三王同才而異勸五伯同術而異率同術而異率者必以力以力率民者民亦以力歸之故尚爭夫爭也者爭夫利者也取與利不以義然後謂之爭小爭交以言大爭交以兵爭夫強弱者也猶借夫名焉者謂之曲直名也者命物正事之稱也利也者養人成務之具也名不以仁無以守業利不以義無以居功利不以功居名不以業守則亂矣民所以必爭之也五伯者借虛名以爭實利者也帝不足則王王不足則伯伯又不足則夷狄矣若然則五伯不不謂無功于中國語其王則未也過夷狄則逺矣周之東遷文武之功德于是乎盡矣猶能維持二十四君王室不絶如線夷狄不敢屠害中原者猶五伯借名之力也是故知能以力率天下者天下亦以力歸焉所以聖人有言曰眇能視跛能履履虎尾嘻人凶武人為于大君其斯之謂歟三皇之治不見形迹莫得而名焉故不言而民自化其道則同其所以為化則異故曰同聖而異化五帝則有言有教故曰同賢而異教五帝固聖矣而謂之同賢者其道則聖其事則己見乎迹方之於三皇之道則為賢也三王興事創業唯恐不及故曰同才而異勸五伯則詭譎相勝無所不至然猶假乎正也故曰同術而異率五伯以術以率則專用變詐威力矣故天下以力歸焉力有強弱故尚爭尚爭者爭乎利者也五伯爭利而猶假虛名者尚有所畏憚也然名不以仁利不以義此所以為伯也王者則唯仁義而己五伯雖不若王猶能有功于時過於夷狄逺矣周之東遷與滅亡無異尚能維持數百年者蓋由五伯有尊王室之名也能以力率天下有尊王室之名是猶眇能視跛能履履虎尾嘻人凶武人為于大君者也履之九三以剛處剛者也以剛處剛而不中故有武人為于大君之象伯者之事有類于此夫意也者盡物之性也言也者盡物之情也象也者盡物之形也數也者盡物之體也仁也者盡人之聖也禮也者盡人之賢也義也者盡人之才也智也者盡人之術也盡物之性者謂之道盡物之情者謂之德盡物之形者謂之功盡物之體者謂之力盡人之聖者謂之化盡人之賢者謂之教盡人之才者謂之勸盡人之術者謂之率意言象數性情形體仁義禮智聖賢才術道德功力化教勸率此皇帝王伯之事皆相因而成者也道德功力者存乎體者也化教勸率者存乎用者也體用之間有變存焉者聖人之業也夫變也者昊天生萬物之謂也權也者聖人生萬民之謂也非生物非生民而得謂之權變乎有道德功力而後有化教勸率道德功力不同故化教勸率有異時使之然也存乎體者言乎其體也存乎用者言乎其用也體用之間有權存焉者變以隨時也變以隨時者聖人之事也天道不變生成息矣聖人無權教化墮矣非生物非生民而謂之權變則一歸于詐而已矣惡孰大焉得謂之權變乎觀物內篇之五善化天下者止于盡道而已善教天下者止于盡德而已善勸天下者止于盡功而已善率天下者止于盡力而已以道德功力為化者乃謂之皇矣以道德功力為教者乃謂之帝矣以道德功力為勸者乃謂之王矣以道德功力為率者乃謂之伯矣化教勸率道德功力皇帝王伯之事也時異則人異人異則事異故不同如此以化教勸率為道者乃謂之易矣以化教勸率為德者乃謂之書矣以化教勸率為功者乃謂之詩矣以化教勸率為力者乃謂之春秋矣此四者天地始則始焉天地終則終焉始終隨乎天地者也皇帝王伯時也易書詩春秋經也天時聖經相為表裏皆相因而成也夫古今者在天地之間猶旦暮也以今觀今則謂之今矣以後觀今則今亦謂之古矣以今觀古則謂之古矣以古自觀則古亦謂之今矣是知古亦未必為古今亦未必為今皆自我而觀之也安知千古之前萬古之後其人不自我而觀之也有今故有古有古故有今以今觀今則謂之今以後觀今則今亦謂之古矣如是則今亦未必為今也以今觀古則謂之古矣以古自觀則古亦謂之今矣如是則古亦未必為古也古亦未必為古今亦未必為今皆自我而觀之也自我而觀之者觀之以道也以道觀之則何古今之有焉無古無今則古今猶旦暮之間也聖人通乎晝夜之道而知能通晝夜之道則能通古今能通古今則能通萬世故雖千古之前萬古之後皆可以自我而觀之也若然則皇帝王伯者聖人之時也易書詩春秋者聖人之經也天時聖經不異唯聖人為能知時作經以為民極時有消長經有因革時有消長否泰盡之矣經有因革損益盡之矣時有消長故有否泰經有因革故有損益非聖人不能體消長知損益否泰盡而體用分損益盡而心迹判體與用分心與迹判聖人之事業于是乎備時有否泰之異故體用於是乎分事有損益之異故心迹於是乎判聖人之事業在乎體用心迹之間體用心迹之間蓋有權與變存焉知權與變然後能盡體用心迹體用心迹一也因時而有所分判然未嘗分判也卒歸乎一而已矣所以自古當世之君天下者其命有四焉一曰正命二曰受命三曰改命四曰攝命正命者因而因者也受命者因而革者也改命者革而因者也攝命者革而革者也因而因者長而長者也因而革者長而消者也革而因者消而長者也革而革者消而消者也正命天命之也受命人授之也人授之者受之於人也如書所謂正月上日受終于文祖是也改命有所改革如易所謂湯武革命是也其事雖不同皆天也攝命者以臣行君之事者也此明皇帝王伯之事也因而因則無為而已因而革舜循堯道而有所變以隨時也革而因者武王伐商乃反商政政由舊是也革而革者時變之極則一切變矣長而長為春長而消為夏消而長為秋消而消為冬時之消長其變如此革而革者一世之事業也革而因者十世之事業也因而革者百世之事業也因而因者千世之事業也可以因則因可以革則革者萬世之事業也一世之事業者非五伯之道而何十世之事業者非三王之道而何百世之事業者非五帝之道而何千世之事業者非三皇之道而何萬世之事業者非仲尼之道而何是知皇帝王伯者命世之謂也仲尼者不世之謂也伯以力服人以力服人者止于其身故其事業一世而已王者以功及民以功及民者其效逺故其事業可以至于十世帝以德教民以德教民者得其心漸民也深故其事業可以至于百世皇以道化民道能久故其事業可以至于千世可因則因可革則革通萬世而無弊者孔子之事業也故孟子謂生民以來未有夫子也命世謂得位而在上者也不世謂不得位而在下者也雖然孔子不得位而在下其道實出帝王之上而能用乎皇帝王伯者也故孟子謂孔子集大成者也仲尼曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也夫如是則何止于百世而己哉億千萬世皆可得而知之也商周革命者也而亦有所因故商因於夏禮周因於商禮禹湯武王皆聖人也其道則同不得不因其時則異不得不革故皆有所損益唯聖人不茍同亦不茍異與時偕行知所損益以一世而知萬世故雖億千萬年皆可得而知之何止于百世可知而已所以可得而知之者豈有他哉以理知之故也人皆知仲尼之為仲尼不知仲尼之所以為仲尼不欲知仲尼之所以為仲尼則已如其必欲知仲尼之所以為仲尼則舍天地將奚之焉人皆知天地之為天地不知天地之所以為天地不欲知天地之所以為天地則已如其必欲知天地之所以為天地則舍動靜將奚之焉仲尼之道不異天地欲知仲尼觀天地則知仲尼矣天地之道不過動靜而已欲知天地觀動靜則知天地矣立天之道曰隂與陽立地之道曰柔與剛隂陽剛柔者動靜之本也然天地何嘗有心于動靜哉蓋時焉而已矣仲尼之不異天地亦時焉而已矣故孟子謂孔子聖之時者也夫一動一靜者天地至妙者歟夫一動一靜之間者天地人之至妙者歟是故知仲尼之所以能盡三才之道者謂其行無轍迹也故有言曰豫欲無言又曰天何言哉四時行焉百物生焉其斯之謂歟一動一靜者天地之妙用也一動一靜之間者天地人之妙用也陽闢而為動隂闔而為靜所謂一動一靜者也不役乎動不滯乎靜非動非靜而主乎動靜者一動一靜之間者也自靜而觀動自動而觀靜則有所謂動靜方靜而動方動而靜不拘于動靜則非動非靜者也易曰復其見天地之心乎天地之心蓋於動靜之間有以見之夫天地之心於此而見之聖人之心即天地之心也亦於此而見之雖顛沛造次未嘗離乎此也中庸曰道不可須臾離也可離非道也退藏於密則以此洗心焉吉凶與民同患則以此齊戒焉夫所謂密所謂齊戒者其在動靜之間乎此天地之至妙至妙者也聖人作易蓋本於此世儒昧於易本不見天地之心見其一陽初復遂以動為天地之心乃謂天地以生物為心噫天地之心何止於動而生物哉見其五隂在上遂以靜為天地之心乃謂動復則靜行復則止噫天地之心何止於靜而止哉為虛無之論者則曰天地以無心為心噫天地之心一歸于無則造化息矣蓋天地之心不可以有無言而未嘗有無亦未嘗離乎有無者也不可以動靜言而未嘗動靜亦未嘗離乎動靜者也故於動靜之間有以見之然動靜之間間不容髮豈有間乎唯其無間所以為動靜之間也獨楊子雲知易之本以作𤣥始于中首象中孚次以周首象復中者天下之大本所謂天地之心也故其首辭曰陽氣潛萌于黃鐘之宫信無不在其中天地之道可謂至信矣所謂信者有以見天地之心乎在人則誠也故天地聖人之心至信至誠悠久而不息所以為天地人之至妙至妙者也雖然天地之心所可見者亦不過乎因時順理而已因時順理所以謂之道也聖人由道而行豈有轍迹哉嗚呼所謂動靜之間者千聖之所歸萬生之所息能至此則可以知變化之道可以知死生之說不能至此則非所以謂之聖人也不能知此則非所以謂之賢人也外于此者皆邪說妄行也先君皇極經世書蓋本於此所以觀物篇首明天地動靜而此又眀動靜之間天地人之至妙至妙者焉學者欲求其至在乎默而識之不可以言傳也觀物內篇之六孔子贊易自羲軒而下序書自堯舜而下刪詩自文武而下修春秋自桓文而下自羲軒而下祖三皇也自堯舜而下宗五帝也自文武而下子三王也自桓文而下孫五伯也易書詩春秋皇帝王伯聖人之事業盡在于是矣仲尼祖三皇宗五帝子三王孫五伯其道大德尊如此中庸曰仲尼祖述堯舜而不曰三皇尊之而不可以言名也憲章文武而不及五伯卑之而有所不足道也此則兼舉之矣孫五伯可謂卑之也然聖人作春秋雖五伯猶或取之以其有功于一時也故曰桓公九合諸侯不以兵車管仲之力也微管仲吾其被髮左袵矣聖人之心公天下也如此春秋者聖人之刑賞也五伯雖得罪於聖人及其有功亦在所不掩也嗚呼治天下者賞善刑惡能如聖人之心以公天下則四海之內無思不服儻徇好惡之私則刑賞濫矣刑賞濫而天下未有不亂者也祖三皇尚賢也宗五帝亦尚賢也三皇尚賢以道五帝尚賢以德子三王尚親也孫五伯亦尚親也三王尚親以功五伯尚親以力三皇五帝之治皆尚賢者也而三皇以道五帝以德三王五伯之治皆尚親者也而三王以功五伯以力以道則為化以德則為教以功則為勸以力則為率道德則無親疏之間功力則有違從之異然而力率天下而親之則狹矣此皇帝王伯之所以分也嗚呼時之既往億千萬年時之未來亦億千萬年仲尼中間生而為人何祖宗之寡而子孫之多邪所以重贊堯舜至禹曰禹吾無間然矣時之既往時之未來皆有億萬之數所以為古今也仲尼在古今之間何祖宗之寡子孫之多謂治世少而亂世多聖君少而庸君多也三王方三皇五帝時雖不同然固已鮮矣後世不止雜乎伯而伯亦有所不足也仲尼贊堯則曰唯天為大唯堯則之贊舜則曰君哉舜也無為而治者其舜也歟至禹則曰菲飲食而致孝乎鬼神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫禹吾無間然矣文王則曰三分天下有其二以服事殷周之德可謂至德也己湯武則曰順乎天而應乎人嗚呼文王之德與舜禹並可謂至矣仲尼後禹千五百餘年今之後仲尼又千五百餘年雖不敢比仲尼上贊堯舜禹豈不敢比孟子上贊仲尼乎仲尼後禹千五百餘年今之後仲尼又千五百餘年蓋道之相傳無古今之異仲尼傳堯舜禹者也孟子傳仲尼者也吾先君子蓋學孔孟者也人謂仲尼惜乎無土吾獨以為不然獨夫以百畝為土大夫以百里為土諸侯以四境為土天子以九州為土仲尼以萬世為土若然則孟子言自生民以來未有如孔子也斯亦未為之過矣一夫之土百畝而已大夫之土百里而已諸侯之土四境而已天子之土九州而已皆有窮極者也仲尼之道通萬萬世而無弊萬世之所尊者也故曰仲尼以萬世為土非特萬世也亘古今窮天地一人而已故孟子曰自生民以來未有夫子也夫人不能自富必待天與其富然後能富人不能自貴必待天與其貴然後能貴若然則富貴在天也不在人也有求而得之者有求而不得者矣是繫乎天者也功德在人也不在天也可修而得之不修則不得是非繫乎天也繫乎人者也夫人之能求而得富貴者求其可得者也非其可得者非所以能求之也昧者不知求而得之則謂其已之能得也故矜之求而失之則謂其人之不與也故怨之如知其己之所以能得人之所以能與則天下安有不知量之人邪富貴在天不可求而得功德在人所可修而至不可求而得故必曰有命所可修而至故不可不勉世之人不務修其所可至而務求其所不可得惑之甚也故未得之則患得之既得之則患失之得之則矜誇失之則怨懟茍能知己得之人與之皆天也如是則安有不知量之人哉天下至富也天子至貴也豈可妄意求而得之也雖曰天命亦未始不由積功纍行聖君艱難以成之庸君暴虐以壞之是天歟是人歟是知人作之咎固難逃已天降之災禳之奚益積功纍行君子常分非有求而然也有求而然者所謂利乎仁者也君子安有餘事于其間哉然而有幸有不幸者始可以語命也已聖人之大寶曰位天實命之故堯命舜天之歷數在爾躬舜亦以此命禹天位豈容求而得者不可求而得况可以不道而取之邪此篇戒亂臣賊子使之知天命之可畏也積功纍行人之所當為君子豈有求而然必自積行纍功以得之不積行纍功以得之者或有之矣終亦必亡而已積行纍功而不得者亦有之矣君子乃謂之命也已夏禹以功有天下夏桀以虐失天下殷湯以功有天下殷紂以虐失天下周武以功有天下周幽以虐失天下三者雖時不同其成敗之形一也夏禹商湯周武其功德在民深矣其創法垂統至矣後世子孫雖中才之君能保惜其基業謹守其法度兢兢業業而勿失雖百世可也夏則太康已失邦而其後有桀商太甲巳不明而其後有紂周昭王已南征不返而其後有幽厲詩云赫赫宗周褎姒滅之蓋周至幽厲雖曰未亡其實亡矣獨以文武之澤未斬國之典刑尚存故至赧王而後失之其祖宗之艱難積纍以得之其後亡國敗家之人庸愚暴虐以失之若出一塗書曰為善不同同歸于治為惡不同同歸于亂此之謂也平王東遷無功以復王業赧王西走無虐以喪王室威令不逮一小國諸侯仰存于五伯而已此又奚足道哉平王東遷文武之業盡矣故無功以復王室赧王西走危亡之勢極矣故無虐以喪王室皆不足道也竊嘗論之桀紂幽厲皆暴君也自平王至赧皆庸君也庸暴雖殊皆足以亡其國然暴君身為不善其亡也速其為天下害也淺庸君未必能為大惡而天下之為惡者皆得以肆其惡其亡也緩其為天下害也深故桀紂身為不善湯武誅放而天下寧幽厲亦可謂暴矣獨以文武之澤未泯止亡其身而國之未亡幸也自平至赧無顯著之惡而其庸則甚矣其後有五伯有戰國有暴秦民墜塗炭五百餘年而天下受其害至漢而後始定考之歷代亦莫不然西漢自元成而下皆庸君也卒致新室之亂幸天下未厭漢光武中興東漢自桓靈而下皆庸君也卒致董卓之亂而後有三國有南北朝又分而為十六國羯胡腥羶瀆汚中原民墜塗炭又四百餘年而天下受其害至隋而後始定隋焬帝暴君也身為不善以亡其國不旋踵有唐以興而天下寧唐自肅宗而下多庸君也當時藩鎮固以暴橫于外宦豎又且擅權于內其後有五季又分而為十國皆得以肆其惡民墜塗炭又二百年至本朝而後大定則暴君之為天下害也淺庸君之為天下害也深槩可見矣但時無真王者出焉雖有虛名與杞宋其誰曰少異是時也春秋之作不亦宜乎當是時也天下無王矣孔子之作春秋所以明王道而存王者之禮法也使之得位則行之矣孟子告齊梁之君亦必以王道者以此也仲尼修經周平王之時書終于晉文侯詩列為王國風春秋始于魯隱公易盡于未濟卦孟子曰王者之迹熄而後詩亡詩亡然後春秋作周平之時王者之迹熄矣故春秋之所以作也書終於文侯之命周之東遷晉鄭焉依文侯猶知尊周有功于時故聖人取之始于典謨終之以文侯之命與秦誓則其時其事可知之矣王者之迹熄而雅頌不作周室之微不絶如線四郊之外皆非己有與一小國亦何以異所存獨王者之虗名耳故黍離之詩列于國風也春秋始于魯隱魯周公之國周公之禮樂典章具在于魯至隱公之世周公之業衰矣此春秋之所以始隱又當周平之時也易終于未濟卦一治一亂而未始有窮也豫非知仲尼者學為仲尼者也禮樂征伐自天子出而出自諸侯天子之重去矣宗周之功德自文武出而出自幽厲文武之基息矣由是犬戎得以侮中國周之諸侯非一獨晉能攘去戎狄徙王東都洛邑用存王國為天下伯者之倡秬鬯圭瓉之錫其能免乎聖人人倫之至能盡君君臣臣父父子子兄兄弟弟夫夫婦婦之道正心誠身以治天下國家此蓋孔子之志也禮樂征伐威福之大柄也臣下得而擅之則人君之權移于下矣蓋由君非其君臣非其臣欲不亂其可得乎周之幽厲小人而乘君子之器者也盜斯奪之矣故犬戎得以侮中國晉文侯獨能攘戎狄而遷周于洛知有君臣之義未同于夷狄其功亦可尚矣此書所以有文侯之命也傳稱子貢欲去魯告朔之餼羊孔子曰賜也爾愛其羊我愛其禮是知名存實亡者猶愈于名實俱亡者矣禮雖廢而羊存則後世安知有不復行禮者矣晉文王尊王雖用虗名猶能力使天下諸侯知有周天子而不敢以兵加之也及晉之衰也秦由是敢滅周斯愛禮之言信不誣矣孔子之時魯國告朔之禮廢已久矣而餼羊猶存子貢獨見其禮已久廢餼羊徒有虛名故欲去之聖人用心深逺以謂爾愛其羊我愛其禮禮雖廢而羊猶存後世安知不有因其羊而行禮循其名而求其實者乎豈不愈於羊禮俱廢名實皆亡者也故晉文公有尊王之名而尚能有功一時所以聖人亦取之矣孟子謂好名之人能讓千乘之國好名之人於道雖為未至己能讓千乘之國則與夫見利忘義貪取茍得無所顧藉者蓋有間矣或曰好名之人矯僞不情烏足貴哉愚獨不然矯僞為善豈不賢於矯僞為惡者乎竊嘗論之為人君者能知堯舜之名為可好則莫不願為堯舜好之而不已行之而彌久是亦堯舜而已為人臣者能知稷契之名為可好則莫不願為稷契好之而不已行之而彌久是亦稷契而已志於道者能知孔顔之名為可好好之而不己行之而彌久是亦孔顔而己嗚呼名者治世修身之具也烏可一日闕於天下但患人不知所以好之耳豈不貴哉齊景公嘗一日問政于孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸是時也諸侯僭天子陪臣執國命祿去公室政出私門景公自不能上奉周天子欲其臣下奉己不亦難乎厥後齊祚卒為田氏所移夫齊之有田氏者亦猶晉之有三家也亦猶周之有五伯也韓趙魏之于晉也既立其功又分其地既卑其主又專其國田氏之于齊也既得其祿又專其政既弒其君又移其祚其如天下之事豈無漸乎履霜之戒寧不思乎君臣父子天下之達道人之大倫所以維持天下者以此用之則治舍之則亂古今一也周之衰三綱五常絶矣篡君弒父無所不至以君臣父子之道不眀故也諸侯既僭天子矣大夫安得不僭諸侯大夫既僭諸侯矣陪臣安得不僭大夫故雖管仲邦君樹塞門管氏亦樹塞門邦君為兩君之好有反玷管氏亦有反玷管氏猶不知禮況其餘乎其甚則魯之三家以雍徹用八佾舞于庭是以陪臣僭天子也陪臣而僭天子況於執國命乎始於僭踰卒於攘奪勢必然也故田氏之於齊韓趙魏之於晉終逐其君而盜其國嚮使齊晉之君不敢僭周則所謂田氏與三大夫者其敢逐其君而盜其國乎上之所好下必有甚焉出乎爾者反乎爾不思之甚矣易曰履霜堅冰至君子方履霜之時固已知堅冰之必至宜辨之早也傳稱王者往也能往天下者可以王也周之衰也諸侯不朝天子久矣及楚預中國會盟仲尼始進爵為子其僭王也不亦陋乎楚蠻夷之國春秋書曰楚子而僭王僭之甚者也夫以力勝人者人亦以力勝之吳嘗破越而有輕楚之心及其破楚又有驕齊之志貪婪攻取不顧德義侵侮齊晉專以夷狄為事遂復為越所滅越又不監之其後復為楚所滅楚又不監之其後復為秦所滅秦又不監之其後復為漢所代恃強凌弱與虎豹何以異乎非所以謂之中國義理之師也吳楚秦越皆蠻夷之國恃強凌弱不顧德義方之齊晉有間矣宋之為國也爵髙而力卑者乎盟不度德會不量力區區與諸侯並驅中原恥居其後其于伯也不亦難乎宋襄公亦嘗主盟而衰弱無術不足道也周之同姓諸侯而克永世者獨有燕在焉燕處北陸之地去中原特逺茍不隨韓趙魏齊楚較利刃爭虛名則足以養德待時觀諸侯之變秦雖虎狼亦未易加害延十五六年後天下事未可知也燕居朔方固為強大與齊趙相抗茍不與諸國爭勝負而修召公之政以治其國有可以興王之理也而乃遣一刺客以入暴秦自取滅亡可哀也已中原之地方九千里古不加多而今不加少然而有祚長祚短地大地小者攻守異故也自三代以降漢唐為盛秦界于周漢之間矣秦始盛于穆公中于孝公終于始皇起于西夷遷于岐山徙于咸陽兵瀆宇內血流天下吞吐四海更革今古雖不能比德三代非晉隋可同年而語也其祚之不永得非用法太酷殺人之多乎所以仲尼序書終于秦誓一事其言不亦逺乎秦穆公能改過自誓伯之優者也故序書上自典誥下及秦誓聖人猶取之而不廢是亦不得中行而與之必也狂狷乎之義也王者不作近於王道者雖一善必録聖人之心如此然終于秦誓則世之盛衰道之汚隆可知之矣穆公有此一善可稱宜乎國以盛强其後始皇并吞海內而乃尚刑好殺止於二世以取滅亡蓋秦夷狄之國尚刑好殺乃其所習又況本以商鞅之法其貽謀慘刻少恩有自來矣夫好生者生之徒也好殺者死之徒也周之好生也以義漢之好生也亦以義秦之好殺也以利楚之好殺也亦以利周之好生也以義而漢且不及秦之好殺也以利而楚又過之天之道人之情又奚擇于周秦漢楚哉擇乎善惡而已是知善也者無敵于天下而天下共善之惡也者亦無敵于天下而天下亦共惡之天之道人之情又奚擇于周秦漢楚哉擇于善惡而已仁者好生不仁者好殺好生者王好死者亡好生者天祐之人愛之好殺者天怒之人惡之周漢以好生而興秦楚以好殺而廢天之興廢人之去就在乎仁與不仁而已性理大全書卷九

body:
  text: 性理大全書卷二十六理氣一總論程子曰有形總是氣無形只是道離隂陽則無道隂陽氣也形而下也道太虚也形而上也朱子曰天地之間有理有氣理也者形而上之道也生物之本也氣也者形而下之器也生物之具也是以人物之生必稟此理然後有性必稟此氣然後有形有是理後生是氣自一隂一陽之謂道推來此性自有仁義天下未有無理之氣亦未有無氣之理先有箇天理了却有氣氣積為質而性具焉人之所以為人其理則天地之理其氣則天地之氣理無迹不可見故於氣觀之問先有理抑先有氣曰理未甞離乎氣然理形而上者氣形而下者自形而上下言豈無先後理無形氣便粗有查滓理氣本無先後之可言然必欲推其所從來則須說先有是理然理又非别為一物即存乎是氣之中無是氣則是理亦無掛搭處氣則為金木水火理則為仁義禮智問理與氣曰伊川說得好曰理一分殊合天地萬物而言只是一箇理及在人則又各自有一箇理又曰有是理便有是氣但理是本而今且從理上說氣如云太極動而生陽動極而静静而生隂不成動已前便無静程子曰動静無端葢此亦是且自那動處說起若論著動以前又有静静以前又有動如云一隂一陽之為道繼之者善也這繼字便是動之端若只一開一闔而無繼便是闔殺了又問繼是動静之間否曰是静之終動之始也且如四時到得冬月萬物都歸窠了若不生來年便都息了葢是貞復生元無窮如此問有是理而後有是氣未有人時此理何在曰也只在這裏如一海水或取得一杓或取得一擔或取得一椀都是這海水但是他為主我為客他較長久我得之不久耳問理在氣中發見中如何曰如隂陽五行錯綜不失條緒便是理若氣不結聚時理亦無所附著問先有理後有氣之說曰不消如此說而今知得他合下是先有理後有氣邪後有理先有氣邪皆不可得而推究然以意度之則疑此氣是依傍這理行及此氣之聚則理亦在焉葢氣則能凝結造作理却無情意無計度無造作只此氣凝聚處理便在其中且如天地間人物草木禽獸其生也莫不有種定不會無種了白地生出一箇物事這箇都是氣若理則只是箇淨潔空闊底世界無形迹他却不會造作氣則能醖釀凝聚生物也問有是理便有是氣似不可分先後曰要之也先有理只不可說是今日有是理明日却有是氣也須有先後問未有天地之先畢竟是先有理如何曰未有天地之先畢竟也只是理有此理便有此天地若無此理便亦無天地無人無物都無該載了有理便有氣流行發育萬物曰發育是理發育之否曰有此理便有此氣流行發育理無形體曰所謂體者是強名否曰是曰理無極氣有極否曰論其極將那處做極所謂理與氣決是二物但在物上看則二物渾淪不可分開各在一處然不害而物之各為一物也若在理上看則雖未有物而已有物之理然亦但有其理而已未甞實有是物也問天地之間有理有氣理常不移而氣不常足大德必得名位夀理固如此然孔子無位顔子夭死豈非氣使之然耶竊疑氣雖不同然聖人在上以和召和則氣亦醇正而隨於理春秋戰國刑殺慘酷則氣亦隨之而變而理反不能勝此處亦當關於人事否曰雖是所感不同亦是元氣薄了問理氣先後曰有此理後方有此氣旣有此氣然後此理有安頓處大而天地細而螻蟻其生皆是如此又何慮天地之生無所付受耶要之理之一字不可以有無論未有天地之時便已如此了也勉齋黄氏曰天道是理隂陽五行是氣合而言之氣即是理一隂一陽之謂道也分而言之理自為理氣自為氣形而上下是也理無迹而氣有形理無際而氣有限理一本而氣萬殊故言理之當先乎氣深思之則無不通也天地生出人物如大芋頭生出小芋頭大底有理與氣一下生出無限小底却都𫝊與他去北溪陳氏曰二氣流行萬古生生不息不成只是箇空氣必有主宰之者曰理是也理在其中為之樞紐故大化流行生生未甞止息所謂以理言者非有離乎氣只是就氣上指出箇理不離乎氣而為言耳理不外乎氣若說截然在隂陽五行之先及在隂陽五行之中便成理與氣為二物矣太極朱子曰太極只是一箇理字問太極不是未有天地之先有箇渾成之物是天地萬物之理總名否曰太極只是天地萬物之理在天地言則天地中有太極在萬物言則萬物中各有太極未有天地之先畢竟是先有此理動而生陽亦只是理静而生隂亦只是理萬物四時五行只是從那太極中來太極只是一箇氣迤邐分做兩箇氣裏面動底是陽静底是隂又分做五氣又散為萬物問太極解何以先動後静先用而後體先感而後寂曰在隂陽言則用在陽而體在隂然動静無端隂陽無始不可分先後今只就起處言之畢竟動前又是静用前又是體感前又是寂陽前又是隂而寂前又是感静前又是動將何者為先後不可只道今日動便為始而昨日静更不說也如鼻息言呼吸則辭順不可道吸呼畢竟呼前又是吸吸前又是呼太極非是别為一物即隂陽而在隂陽即五行而在五行即萬物而在萬物只是一箇理而已因其極至故名曰太極若無太極便不翻了天地太極理也動静氣也氣行則理亦行二者常相依而未甞相離也當初元無一物只有此理有此理便會動而生陽静而生隂静極復動動極復静循環流轉其實理無窮氣亦與之無窮自有天地便是這物事在這裏流轉一日有一日之運一月有一月之運一歲有一歲之運只是這箇物事衮將去太極未動之前便是隂隂静之中自有陽之根陽動之中又有隂之根動之所以必静者根乎隂故也静之所以必動者根乎陽故也太極者象數未形而其理已具之稱形器已具而其理無眹之目太極自是函動静之理却不可以動静分體用葢静即太極之體也動即太極之用也太極之有動静是天命之流行也或疑静處如何流行曰惟是一動一静所以流行如秋冬之時謂之不流行可乎若謂不能流行何以謂之静而生隂也觀生之一字可見自太極至萬物化生只是一箇道理包括非是先有此而後有彼但統是一箇大原由體而達用從㣲而至著動静無端隂陽無始本不可以先後言然就中間截斷言之則亦不害其有先後也觀周子所言太極動而生陽則其未動之前固已甞静矣又言静極復動則己静之後固必有動矣如春秋冬夏元亨利貞固不能無先後然不冬則何以為春而不貞又何以為元就此看之又自有先後也節齋蔡氏曰主太極而言則太極在隂陽之先主隂陽而言則太極在隂陽之内時旣不同所主皆異不可執一而廢一也葢自隂陽未生之時而言則所謂太極者即在乎隂陽之中也西山真氏曰萬物各具一理萬理同出一原所謂萬物一原者太極也太極者乃萬理統會之名有理即有氣分而為二則為隂陽分而為五則為五行萬物萬事皆原於此人與物得之則為性性者即太極也仁義即隂陽也仁義禮智信即五行也萬物各具一理是物物一太極也萬理同出一原是萬物統體一太極也太極非有形有器之物只是理之至者故曰無極而太極北溪陳氏曰太極之所以為極至者言此理至中至正至精至粹至神至妙至矣盡矣不可以復加矣故強名曰極太極只是以理言也理緣何又謂之極極至也以其在中有樞極之義如皇極北極等皆有在中之義不可便訓極為中葢極之為物常在物之中四面到此都極至都去不得如屋脊梁謂之屋極者亦只是屋之衆材四面湊合到此處皆極其中就此處分出去布為衆材四面又皆停匀無偏剰偏欠之處如塔之尖處便是極如北極四面星宿皆運轉惟此不動所以為天之樞若太極云者乃是就理論天之所以萬古常運地之所以萬古常存人物之所以萬古生生不息不是各各自恁地都是理在其中為之主宰便自然如此就其為天地萬物主宰處論恁地渾淪極至故以太極名之葢總天地萬物之理到此湊合更無去處及散而為天地為人為物又皆一一停匀無少虧欠所以謂之太極太極只是總天地萬物之理而言不可離天地萬物之外而别為之論纔說離天地萬物而有箇理便成兩截去了未有天地萬物先有是理然此理不是懸空在那裏纔有天地萬物之理便有天地萬物之氣纔有天地萬物之氣則此理便全在天地萬物之中周子所謂太極動而生陽静而生隂是有這動之理便能動而生陽纔動而生陽則是理便已具於陽動之中有這静之理便能静而生隂纔静而生隂則是理便已具於隂静之中然則纔有理便有氣纔有氣理便全在這氣裏面那相接處全無些子縫罅如何分得孰為先孰為後所謂動静無端隂陽無始若分别得先後便偏在一邊非渾淪極至之物臨川呉氏曰太極本無體用之分其流行變化者皆氣機之闔闢有静時有動時當其静也太極在其中以其静也因以為太極之體及其動也太極亦在其中以其動也因以為太極之用太極之冲漠無朕聲臭泯然者無時而不然不以動静而有間而亦何體用之分哉開物之前渾沌太始混元之如此者太極為之也開物之後有天地有人物如此者太極為之也閉物之後人銷物盡天地又合為渾沌者亦太極為之也太極常常如此始終一般無增無減無分無合故以未判巳判言太極者不知道之言也此類詳見周子太極圖下天地程子曰凡有氣莫非天凡有形莫非地天地之中理必相直則四邊常有空闕處空闕處如何地之下豈無天今所謂地者特於一作為天中一物爾如雲氣之聚以其久而不散也故為對凡地動者只是氣動凡所指地者一作損闕處只是土土亦一物爾不可言地更須要知坤元承天是地之道也天地動静之理天圜則須轉地方則須安静南北之位豈可不定下所以定南北者在坎離也坎離又不是人安排得來莫非自然也天地之化一息不留疑其速也然寒暑之變甚漸冬至之前天地閉塞可謂静矣日月運行未甞息也則謂之不動可乎故曰動静不相離天只主施成之者地也天地生物之氣象可見而不可言善觀於此者必知道也道則自然生萬物今夫春生夏長了一畨皆是道之生後來生長不可道却將旣生之氣後來却要生長道則自然生生不息天理生生相續不息無為故也使竭智巧而為之未有能不息也地氣不上騰則天氣不下降天氣降而至於地地中生物者皆天氣也惟無成而代有終者地之道也萬物始生也鬱結未通則實塞於天地之間至於暢茂則塞意亡矣天之所以為天本何為哉蒼蒼焉耳矣其所以名之曰天葢自然之理也詩書中凡有箇主宰意思者皆言帝有一箇包函偏覆底意思則皆言天天地之化雖蕩然無窮然隂陽之度寒暑晝夜之變莫不有常久之道所以為中庸也天地所以不已有常久之道也人能常於可久之道則與天地合天地以虚為徳至善者虚也虚者天地之祖天地從虚中來或問天帝之異曰以形體謂之天以主宰謂之帝以至妙謂之神以功用謂之鬼神以性情謂之乾其實一而已所自而名之者異也夫天専言之則道也以氣明道氣亦形而下者耳萬物之始氣化而已旣形氣相禪則形化長而氣化消天地之化旣是二物必動已不齊譬之兩扇磨行便其齒齊不得齒齊旣動則物之出者何可得齊轉則齒更不復得齊從此參差萬變巧厯不能窮也氣之所鍾有偏正故有人物之殊有清濁故有智愚之等造化不窮葢生氣也近取諸身於出入息氣見闔闢往來之理呼氣旣往往則不反非吸旣往之氣而後為呼也凡物之散其氣遂盡無復歸本原之理天地間如紅鑪雖生物銷鑠亦盡况旣散之氣豈有復在天地造化又焉用此旣散之氣其造化者自是生氣此氣之終始開闢便是易一闔一闢謂之變時所以有古今風氣人物之異者何也氣有淳漓自然之理有盛則必有衰有終則必有始有晝則必有夜譬之一片地始開荒田則其收穀倍及其久也一嵗薄於一嵗氣有盛衰故也至如東西漢以來人才文章皆别所尚異也尚所以異亦由心所以為心所以然者只為生得來如此至如春夏秋冬所生之物各異其栽培澆灌之宜亦須各以其時不可一也只如均是春生之物春初生得又别春中又别春盡時所生又别西北與東南人才不同氣之厚薄異也問太古之時人物同生乎曰然純氣為人繁氣為物乎曰然其所生也無所從受則氣之所化乎曰然致堂胡氏曰夫天非若地之有形也自地而上無非天者昔人以積氣名其象以倚葢名其形皆非知天者莊周氏曰天之蒼蒼其正色邪言天無色也無色則無聲無臭皆舉之矣日月星辰之繫乎天非若山川草木之麗乎地也著明森列躔度行止皆氣機自運莫使之然而然者無所託也若其有託則是以形相屬一麗乎形能無壊乎朱子曰天地初間只是隂陽之氣這一箇氣運行磨來磨去磨得急了便拶許多查滓裏面無處出便結成箇地在中央氣之清者便為天為日月為星辰只在外常周環運轉地便只在中央不動不是在下天運不息晝夜輥轉故地𣙜在中間使天有一息之停則地須䧟下惟天運轉之急故凝結得許多查滓在中間地者氣之查滓所以道輕清者為天重濁者為地問天有形質否曰只是箇旋風下輭上堅道家謂之剛風人常說天有九重分九處為號非也只是旋有九耳但下面氣較濁而暗上面至髙處則至清至明耳天地始初混沌未分時想只有水火二者水之滓脚便成地今登髙而望群山皆為波浪之狀便是水泛如此只不知因甚麽時凝了初間極輭後來方凝得硬問想得如潮水湧起沙相似曰然水之極濁便成地火之極清便成風霆雷電日星乏屬問自開闢以來至今未萬年不知已前如何曰已前亦須如此一畨明白來又問天地會壊否曰不會壊只是相將人無道極了便一齊打合混沌一畨人物都盡又重新起又問生第一箇人時如何曰以氣化二五之精合而成形釋家謂之化生如今物之化生者甚多如虱然方渾淪未判隂陽之氣混合幽暗及其旣分中間放得寛闊光朗而兩儀始立邵康節以十二萬九千六百年為一元則是十二萬九千六百年之前又是一箇大闔闢更以上亦復如此直是動静無端隂陽無始小者大之影只晝夜便可見五峯所謂一氣大息震蕩無垠海宇變動山勃川湮人物消盡舊迹大滅是謂鴻荒之世嘗見髙山有螺蚌殻或生石中此石即舊日之土螺蚌即水中之物下者却變而為髙柔者却變而為剛此事思之至深有可驗者問天地未判時下面許多都已有否曰只是都有此理天地生物千萬年古今只不離許多物地却是有空缺處天却四方上下都周匝無空缺逼塞滿皆是天地之四向底下却靠著那天天包地其氣無不通恁地看來渾只是天了氣却從地中迸出又見地廣處天包乎地天之氣又行乎地之中故横渠云地對天不過問晉志論渾天以為天外是水所以浮天而載地是如何曰天外無水地下是水載問天地之所以髙深曰天只是氣非獨是髙只今人在地上便只見如此髙要之連地下亦是天又云世間無一箇物事大故地恁地大地只是氣之查滓故厚而深也天地但隂陽之一物依舊是隂陽之氣所生也康節言天依形地附氣所以重複而言不出此意者惟恐人於天地之外别尋去處故也天理無外所以其形有涯而其氣無涯也為其氣極𦂳故能扛得他住不然則墜矣氣外更須有軀殻甚厚所以固此氣也若夫地動只是一處動動亦不至逺也古今厯家只是推得箇隂陽消長界分爾如何得似康節說得那天依地地附天天地自相依附天依形地附氣底幾句問天依地地附氣曰恐人道下面有物天行急地閣在中問康節天地自相依附之說某以為此說與周子太極圖程子動静無端隂陽無始之義一致非厯家所能窺測曰康節之説大體固如是矣然厯家之說亦須考之方見其細密處如禮記月令疏及晉天文志皆不可不讀也天明則日月不明天無明夜半黒淬淬地天之正色天只是一箇大底物須是大著心腸看他始得以天運言之一日固是轉一匝然又有大轉底時候不可如此偏滯求也天轉也非自東而西也非旋環磨轉却是側轉伊川云測景以三萬里為準若有窮然有至一邊已及一萬五千里者而天地之運蓋如初也此言蓋誤所謂升降一萬五千里中者謂冬夏日行南陸北陸之間相去一萬五千里耳非謂周天只三萬里天之外無窮而其中央空處有限天左旋而星拱極仰觀可見四逰之說則未可知然厯家之說乃以算數得之非鑿空而言也若果有之亦與左旋拱北之說不相妨如虚空中一圓毬自内而觀之其坐向不動而常左旋自外而觀之則又一面四逰以薄四表而止也問康節論六合之外恐無外否曰理無内外六合之形須有内外日從東畔升西畔沉明日又從東畔升這上面許多下面亦許多豈不是六合之内厯家算氣只算得到日月星辰運行處上去更算不得安得是無内外問天地之心亦靈否還只是漠然無為曰天地之心不可道是不靈但不如人恁地思慮伊川曰天地無心而成化聖人有心而無為問天地之心天地之理理是道理心是主宰底意否曰心固是主宰底意然所謂主宰者即是理也不是心外别有箇理理外别有箇心又問此心字與帝字相似否曰人字似天字心字似帝字問天地無心仁便是天地之心若使其有心必有思慮有營為天地曷嘗有思慮來然其所以四時行百物生者蓋以其合當如此便如此不待思惟此所以為天地之道曰如此則易所謂復其見天地之心正大而天地之情可見又如何如所說祗說得他無心處耳若果無心則須牛生出馬桃樹上發李花他又却自定程子曰以主宰謂之帝以性情謂之乾他這名義自定心便是他箇主宰處所以謂天地以生物為心天地之間品物萬形各有所事惟天確然於上地隤然於下一無所為只以生物為事故易曰天地之大徳曰生而程子亦曰天只是以生為道其論復見天地之心又以動之端言之其理亦已明矣然所謂以生為道者亦非謂將生來做道也天地别無勾當只是以生物為心一元之氣運轉流通略無停間只是生出許多萬物而已問程子謂天地無心而成化聖人有心而無為曰這是說天地無心處且如四時行百物生天地何所容心至於聖人則順理而已復何為哉所以明道云天地之常以其心普萬物而無心聖人之常以其情順萬事而無情說得最好問普萬物莫是以心周徧而無私否曰天地以此心普及萬物人得之遂為人之心物得之遂為物之心草木禽獸接著遂為草木禽獸之心只是一箇天地之心爾今須要知得他有心處又要見得他無心處只恁定說不得萬物生長是天地無心時枯槁欲生是天地有心時造化之運如磨上面常轉而不止萬物之生似磨中撒出有粗有細自是不齊又曰天地之形如人以兩盌相合貯水於内以手常常掉開則水在内不出稍住手則水漏矣或問大鈞播物還是一去便休也還有去而復來之理曰一去便休耳豈有散而復聚之氣西山真氏曰按楊倞註荀子有曰天無實形地之上空虚者皆天也庸齋許氏曰天地之大乃隂陽自虚自實前無始後無終者也大槩有時而混沌有時而開闢耳伏羲之前吾不知其㡬混沌㡬開闢矣所為混沌而開闢者以隂陽之運有泰否隂陽之氣有通塞方其泰而通也天以清而浮於上地以凝而填於下人物生息繁滋於其中復有英君誼辟相繼為主而人極以立以兩間之開闢者如此宜不至於再為混沌矣然隂陽之運不能以常泰隂陽之氣不能以常通上下或厯千萬百年或厯數萬年泰者有時而否通者有時而塞至于否塞之極也則天之清以浮者濁而低地之凝以填者裂而洩人物之生息繁滋者亦歇滅而萎敗當此之時五行之用皆廢而水火之性獨悖逆焉火不為離虚之明而偏於沈伏水不為坎䧟之滿而偏於沸騰二者雖皆反常而成天地之混沌者水也前日之開闢者至此又成一混沌矣天地每成一混沌所不死者有元氣焉惟其元氣不死故隂陽之否者終以泰隂陽之塞者終以通或厯數百年或厯數千年天之低以濁者又復清而浮地之裂以洩者又復凝而填人物之歇滅萎敗者又復生息而繁滋此隂陽之運氣已泰而通則前日之混沌者復為之開闢矣然天地由開闢而混沌者固以其漸由混沌而開闢者亦以其漸方開闢之初又必有聰明神聖者繼天為主而人極以復立伏羲蓋當一開闢之初也魯齋許氏曰天道常於不足處行將去亦屈伸消長乘除對待之理天之道損有餘補不足人則不能合天道也天有寒暑晝夜物有生榮枯瘁人有富貴貧賤風雨露雷無非教也富貴福澤貧賤憂戚亦無非教也此天地所以造化萬物日新無敝者也天道二氣此一氣消縮彼一氣便發達此一氣來彼一氣便往無俱往並發之理隂氣方長陽便伏又嚴霜以肅之使陽氣必伏天度厯法附朱子曰天有三百六十度只是天行得過處為度天之過處便是日之退處日月會為辰天道與日月五星皆是左旋天道日一周天而常過一度日亦日一周天起度端終度端故比天道常不及一度月行不及十三度十九分度之七今人却云月行速日行遲此錯說也但厯家以右旋為說取其易見日月之度耳天行健一日一夜一周天過一度日稍遲一度月又遲十三度有竒耳因舉陳元滂云只似在圓地上走一人過急一步一人差不及一步又一人甚緩差數步也天行只管差過故厯法亦只管差堯時昏旦星中於午月令差於未漢晉以來又差今比堯時似差及四分之一古時冬至日在牽牛今却在斗辰天壤也每一辰各有㡬度謂如日月宿於角㡬度即所宿處為辰日月所㑹是謂辰注云一嵗日月十二會所會為辰十一月辰在星紀十二月辰在元枵之類是也然此獨在天之位耳若以地而言之則南面而立其前後左右亦有四方十二辰之位焉但在地之位一定不易而在天之象運轉不停惟天之鶉火加于地之午位乃與地合而得天運之正耳或問天道左旋自西而東日月右行則如何曰横渠說日月皆是左旋說得好蓋天行甚健一日一夜周三百六十五度四分度之一又進過一度日行速健次於天一日一夜周三百六十五度四分度之一正恰好比天進一度則日為退一度二日天進二度則日為退二度積至三百六十五日四分日之一則天所進過之度又恰周得本數而日所退之度亦恰退盡本數遂與天會而成一年月行遲一日一夜三百六十五度四分度之一行不盡比天為退了十三度有竒進數為順天而左退數為逆天而右厯家以進數難算只以退數算之故謂之右行且曰日行遲月行速然則日行却得其正問天道左旋日月星辰右轉曰自疏家有此說人皆守定某看天上日月星不曾右轉只是隨天轉天行健這箇物事極是轉得速且如今日日與月星都在這度上明日旋一轉天却過了一度日遲些便欠了一度月又遲些又欠了十三度如嵗星須一轉爭了三十度要看厯數子細只是璇璣玊衡數中載王蕃渾天說一叚極精密便是說一箇現成天地了其說曰天之形狀似鳥卵地居其中天包地外猶殻之裹黄圓如彈丸故曰渾天言其形體渾渾然也其術以為天半覆地上半在地下其天居地上見者一百八十二度半强地下亦然北極出地上三十六度南極入地下亦三十六度而嵩髙正當天之中極南五十五度當嵩髙之上又其南十二度為夏至之日道又其南二十四度為春秋分之日道又其南二十四度為冬至之日道南下去地三十一度而已是夏至日北去極六十七度春秋分去極九十一度冬至去極一百一十五度此其大率也南北極持其兩端其天與日月星宿斜而廻轉也問或以為天是一日一周日則不及一度非天過一度也曰此說不是若以為天是一日一周則四時中星如何解不同更是如此則日日一般却如何紀嵗把甚麽時節做定限若以為天不過而日不及一度則䟎來䟎去將次午時便打三更矣因取禮記月令疏指其中說早晚不同及更行一度兩處曰此說得甚分明其他厯書都不如此說蓋非不曉但習而不察更不去子細檢㸃而今若就天裏看時只是行得三百六十五度四分度之一若把天外來說則是一日過了一度蔡季通嘗有言論日月則在天裏論天則在太虚空裏若去太虚空裏觀那天自是日月衮得不在舊時處了天無體只二十八宿便是天體日月皆從角起天亦從角起日則一日運一周依舊只到那角上天則一周了又過角些子日日累上去則一年便與日會蔡仲黙天說亦云天體至圓周圍三百六十五度四分度之一繞地左旋常一日一周而過一度日麗天而少遲故日行一日亦繞地一周而在天為不及一度積三百六十五日九百四十分日之二百三十五而與天會是一嵗日行之數也月麗天而尤遲一日常不及天十三度十九分度之七積二十九日九百四十分日之四百九十九而與日會十二㑹得全日三百四十八餘分之積又五千九百八十八如日法九百四十而一得六不盡三百四十八通計得日三百五十四九百四十分日之三百四十八是一歲月行之數也嵗有十二月月有三十日三百六十日者一嵗之常數也故日與天會而多五日九百四十分日之二百三十五者為氣盈月與日會而少五日九百四十分日之五百九十二者為朔虚合氣盈朔虚而閏生焉故一嵗閏率則十日九百四十分日之八百二十七三嵗一閏則三十二日九百四十分日之六百單一五嵗再閏則五十四日九百四十分日之三百七十五十有九嵗七閏則氣分分齊是為一章也此說也分明問周天之度是自然之數是强分曰天左旋一晝一夜行一周而又過了一度以其行過處一日作一度三百六十五度四分度之一方是一周只將南北表看今日恁地看時有甚星在表邊明日恁時看這星又差逺或别是一星了問同度同道曰天有黄道有赤道天正如一圓匣相似赤道是那匣子相合縫處在天之中黄道一半在赤道之内一半在赤道之外東西兩處與赤道相交度却是將天横分為許多度數會時是日月在那黄道赤道十字路頭相交處厮撞著朢時是月與日正相向如一箇在子一箇在午皆同一度謂如月在畢十一度日亦在畢十一度雖同此一度却南北相向日所以蝕於朔者月常在下日常在上旣是相㑹被月在下面遮了日故日蝕朢時月蝕固是隂敢與陽敵然厯家又謂之暗虚蓋火日外影其中實暗到朢時恰當著其中暗虚故月蝕或言嵩山本不當天之中為是天形欹側遂當其中耳曰嵩山不是天之中乃是地之中黄道赤道皆在嵩山之北南極北極天之樞紐只有此處不動如磨臍然此是天之中至極處如人之臍帶也問天有黄赤二道沈存中云非天實有之特厯家設色以記日月之行耳夫日之所由謂之黄道史家又謂月有九行黒道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東并黄道而九如此即日月之行其道各異况陽用事則日進而北晝進而長隂用事則日退而南晝退而短月行則春東從青道夏南從赤道秋西從白道冬北從黒道日月之行其不同道又如此然每月合朔不知何以同度而會於所會之辰又有或蝕或不蝕及其行或髙而出黄道之上或低而出黄道之下或相近而偪或差逺而不相值則皆不蝕如何曰日月道之說所引皆是日之南北雖不同然皆隨黄道而行耳月道雖不同然亦常隨黄道而出其旁耳其合朔時日月同在一度其朢日則日月極逺而相對其上下弦則日月近一而逺三如日在午則月或在卯或在酉之類是也故合朔之時日月之東西雖同在一度而月道之南北或差逺於日則不蝕或南北雖亦相近而日在内月在外則不蝕此正如一人秉燭一人執扇相交而過一人自内觀之其兩人相去差逺則雖扇在内燭在外而扇不能掩燭或秉燭者内而而執扇者在外則雖近而扇亦不能掩燭以此推之大略可見問北辰之為天樞何也曰天圓而動包乎地外地方而静處乎天中故天之形半覆地上半繞地下而左旋不息其樞紐不動之處則為南北極謂之極者猶屋脊謂之屋極也然南極低入地三十六度故周圍七十二度常隠不見北極髙出地三十六度故周圍七十二度常見不隠北極之星正在常見不隠七十二度之中常居其所而不動其傍則諸星隨天左旋更迭隠見皆若環繞而歸向之知此則知天樞之說矣問經星左旋緯星與日月右旋是否曰今諸家是如此說横渠說天左旋日月亦左旋看來横渠之說極是只恐人不曉所以詩傳只載舊說或曰此亦易見如以一大輪在外一小輪載日月在内大輪轉急小輪轉慢雖都是左轉只有急有慢便覺日月似右轉了曰然但如此則厯家逆字皆著改做順字退字皆著改做進字象山陸氏曰書疏云周天三百六十有五度四分度之一天體圓如彈丸北髙南下北極出地上三十六度南極入地下三十六度南極去北極直徑一百八十二度强天體隆曲正當天之中央南北二極中等之處謂之赤道去南北極各九十一度春分日行赤道從此漸北夏至行赤道之北二十四度去北極六十七度去南極一百一十五度從夏至以後日漸南至秋分還行赤道與春分同冬至行赤道之南去南極六十七度去北極一百一十五度其日之行處謂之黄道又有月行之道與日相近交路而過半在日道之裏半在日道之表其當交則兩道相合去極逺處兩道相去六度此其日月行道之大略也黄道者日所行也冬至在斗出赤道南二十四度夏至在井出赤道北二十四度秋分交於角春分交於奎月有九道其出入黄道不過六度當交則合故曰交蝕交蝕者月道與黄道交也或問晦翁嘗疑日月右轉不是以為天行至健一日一夜一周却剰一度日一日一夜恰好月則不及十三度有竒與厯家所推大叚相反不知何所見而云爾潛室陳氏曰天行日剰一度出鄭康成日月俱左旋聞横渠有此語但厯家用簡㨗超徑法巧算須用作右旋却取他背後欠天零數起算故日只作行一度月作行十三度有竒庶乎簡㨗超徑易布算也臨川呉氏曰天與七政八者皆動今人只將天做硬盤却以七政之動在天盤上行古來厯家葢非不知七政亦左行但順行不可數只得將其逆退與天度相直處算之因此後遂謂日月五星逆行也譬如兩船使風皆趨北其一船行緩者見前船之快但覺自己之船如倒退南行然其實只是行緩赶前船不著故也今當以太虚中作一空盤却以八者之行較其遲速天行最速一日過了太虚空盤一度鎮星之行比天稍遲於太虚盤中雖略過了些子而不及於天積二十八箇月則不及天三十度嵗星之行比鎮星尤遲其不及於天積十二箇月與天争差三十度熒惑之行比嵗星更遲其不及於天積六十日争差三十度太陽之行比熒惑又遲但在太虚之盤中一日行一周匝無餘無欠比天之行一日不及天一度積一月則不及天三十度太白之行稍遲於太陽但有疾時遲疾相準則與太陽同辰星之行又稍遲於太白但有疾時遲速相準則與太白同太隂之行最遲一日所行比天為差十二三四度其行遲故退度最多今人不曉以為逆行則謂太隂之行最疾也今次其行之疾遲天一土二木三火四日五金六水七月八天土木火其行之速過於日金水月其行之遲又不及日此其大率也程子曰厯象之法大抵主於日日一事正則其他皆可推落下閎作厯言數百年後當差一日其差理必然何承天以其差遂立嵗差法其法以所差分數攤在所厯之年看一嵗差著㡬分其差後亦不定獨邵堯夫立差法冠絶古今却於日月交感之際以隂陽虧盈求之遂不差大抵隂常虧陽常盈故只於這一作漲裏差了厯上若是通理所通為多堯夫之學大抵似楊雄然亦不盡如之嘗窮味有二萬八千六百此非人所合和是自然也色有二萬八千六百又非人所染畫得亦是自然也獨聲之數只得一半數不行蓋聲陽也只是於日出地上數得到日入地下遂數不行此皆有理譬之有形斯有影不可謂今日之影却收以為來日之影此以下論厯法元城劉氏與馬永卿論厯法曰古今厯法各不同其閏法亦從而異秦用顓帝之厯水徳王天下以十月為嵗首故遇閏年即閏九月而謂之後九月蓋取左氏歸餘於終之意至於漢初因而不改永卿曰書云以閏月定四時成嵗謂之定四時則是四時之間有閏也曰非也蓋謂無閏月則以春為夏以夏為秋矣故曰定四時非謂四時之間有閏月也朱子曰古今厯家只推算得箇隂陽消長界分耳太史公厯書是說太初然却是顓頊分四厯劉歆作三統厯唐一行大衍厯最詳備五代王朴司天考亦簡嚴然一行王朴之厯皆止用之二三年即差王朴厯是七百二十加去蔡季通所用却依康節三百六十數今之造厯者無定法只是赶趂天之行度以求合或過則損不及則益所以多差因言古之鐘律細算寸分毫釐絲忽皆有定法如合符契皆自然而然莫知所起古之聖人其思之如是之巧然皆非私意撰為之也意古之厯書亦必有一定之法而今亡矣三代而下造厯者紛紛莫有定議愈精愈密而愈多差由不得古人一定之法也蔡季通嘗言天之運無常日月星辰積氣皆動物也其行度遲速或過不及自是不齊使我之法能運乎天而不為天之所運則其疎密遲速或過不及之間不出乎我此虛寛之大數縱有差忒皆可推而不失矣何者以我法之有定而律彼之無定自無差也季通言非是天運無定乃其行度如此其行之差處亦是常度但後之造厯者其為數窄狹而不足以包之爾閏餘生於朔不盡周天之氣周天之氣謂二十四氣也月有大小朔不得盡此氣而一嵗日子足矣故置閏中氣只在本月若䟎得中氣在月盡後月便當置閏厯法蔡季通說當先論天行次及七政此亦未善要當先論太虚以見三百六十五度四分度之一一一定位然後論天行以見天度加損虚度之嵗分嵗分旣定然後七政乃可齊耳或說厯四廢日曰只是言相勝者春是庚辛日秋是甲乙日温公潛虛亦是此意問厯所以數差古今豈無人考得精者曰便是無人考得精細而不易所以數差若考得精密有箇定數永不會差伊川說康節厯不會差或問康節何以不造厯曰他安肯為此古人厯法疎濶而差少今厯愈密而愈差因以兩手量卓邊云且如這許多闊分作四叚被他界限濶便有差不過只在一叚界限之内縱使極差出第二三叚亦只在此四界之内所以容易推測便有差容易見今之厯法於這四界内分作八界内又分作十六界界限愈密則差數愈逺何故以界限愈密而踰越多也其差則一而古今厯法疎密不同故爾看來都只是不曾推得定只是移來湊合天之運行所以當年合得不差明後年便差元不曾推得天運定只是旋將厯去合那天之行不及則添些過則減些以合之所以一二年又差如唐一行大衍厯當時最謂精密只一二年後便差只有季通說得好當初造厯便合併天運所蹉之度都算在裏㡬年後蹉㡬分㡬年後蹉㡬度將這蹉數都算在正數直推到盡頭如此庶㡬厯可以正而不差今人都不曾得箇大統正只管說天之運行有差造厯以求合乎天而厯愈差元不知天如何會有差自是天之運行合當如此此說極是不知當初因甚不曾算在裏但堯舜以耒厯至漢都喪失了不可考縁如今是這大總紀不正所以都無是處蔡季通算得康節厯康節厯十二萬九千六百分大故密今厯家所用只是萬分厯萬分厯已自是多了他如何肯用十二萬分只是今之厯家又說季通底用不得不知如何又曰一行大衍厯比以前厯他只是做得箇頭勢大敷衍得闊其實差數只一般正如百貫錢脩一料藥其不能治病一也問厯法何以推月之大小曰只是以毎月二十九日半九百四十分日之二十九計之觀其合朔為如何如前月大則後月初二日月生明前月小則後月初三日月生明象山陸氏曰厯家所謂朔虚氣盈者葢以三十日為準朔虚者自前合朔至後合朔不滿三十日其不滿之分曰朔虚氣盈者一節一氣共三十日有餘分而為中分中即氣也潛室陳氏曰左傳正義曰周天三百六十五度四分度之一日一日行一度月一日行十三度十九分度之七計二十七日有餘月已行天一周至二十九日過半即月法二十九日四百九十九分也又逐及日而與之㑹是為一月十二月而成嵗一嵗氣周有三百六十五日四分日之一今十二月惟三百五十四日是少十一日四分之一未得氣周細而言之一嵗正少十二日少弱所以然者一月有餘分二十九日法九百四十分四百七十分為半日今有四百九十九分是餘二十九分合十二月餘分三百四十八是一嵗旣得三百五十四日又餘三百四十八分一日九百四十分其二百三十五分為四分日之一今於餘分三百四十八内取二百三十五以當四分日之一仍有一百一十三其餘整日惟有十一日又以餘分一百一十三減之是一年正餘十日八百二十七分不成十一日故謂十一日少弱一年少十日八百二十七分積十九年少二百六日六百七十三分少弱足以當之古厯十九年為一章章有七閏入章三年閏九月六年閏六月九年閏三月十一年閏十一月十四年閏八月十七年閏四月十九年閏十二月此據元首初章若於後漸積餘分大率三十二月則置閏不必同初章日月運轉於天如人之行步故推厯謂之步厯步厯之始謂之上元必以日月全數為始於前更無餘分以此日為端首即十一月甲子夜半朔旦冬至也故言履端用始也分一周之日為十二月則每月當三十日餘以日月會為一月則毎月惟二十九日餘毎月㕘差氣漸不正但觀中氣所在以為此月之正取中氣以為正月閏前之月中氣在晦閏後之月中氣在朔無中氣則謂之閏月故言舉正於中也月朔之與月節每月剰一日有餘以所有餘日歸之於終積成一月則置閏故言歸餘於終也問漢武帝命唐都洛下閎推算星厯以為合於夏正改用太初厯按自黄帝以前調厯有上元太初等厯今以合夏正而用太初厯然則夏亦用太初厯乎否也曰厯家推上元太初謂四千六百十七嵗已盡都無絲髪餘重新起厯是時定十一月甲子朔旦夜半冬至日月如合璧五星如連珠乃新厯之第一日故謂之厯元漢元封七年適當其時故改秦厯用漢厯改秦正用夏正非謂夏亦然也性理大全書卷二十六

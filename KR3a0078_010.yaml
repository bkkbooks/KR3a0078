body:
  text: 性理大全書卷十皇極經世書四觀物内篇之七昔者孔子語堯舜則曰垂衣裳而天下治語湯武則曰順乎天而應乎人斯言可以該古今帝王受命之理也堯禪舜以徳舜禪禹以功以徳帝也以功亦帝也然而徳下一等則入于功矣湯伐桀以放武伐紂以殺以放王也以殺亦王也然而放下一等則入于殺矣是知時有消長事有因革前聖後聖非出於一途哉堯舜禪讓湯武征伐其事則異其道則同以徳以功以放以殺時之消長事之因革不同如此至於征伐放殺非聖人之所欲葢有不得已者焉聖人所同者心所異者跡故前聖後聖非出於一途而聖人求乎心之所同而不求乎跡之所同茍姑同乎跡而不同乎心則為姦為惡何所不至不可不辨也然所謂下一等者孔子序書贊堯舜禹亦有詳畧謂韶盡美矣又盡善也武盡美矣未盡善也聖人葢有深意焉天與人相為表裏天有隂陽人有邪正邪正之由繫乎上之所好也上好徳則民用正上好佞則民用邪邪正之由有自來矣雖聖君在上不能無小人是難其為小人雖庸君在上不能無君子是難其為君子自古聖君之盛未有如唐堯之世君子何其多邪時非無小人也是難其為小人也故君子多也所以雖有四凶不能肆其惡自古庸君之盛未有如殷紂之世小人何其多邪時非無君子也是難其為君子故小人多也所以雖有三仁不能遂其善是知君擇臣臣擇君者繫乎人者也君得臣臣得君者是非繫乎人也繫乎天者也天與人常相須而成者也天有隂陽人有邪正正為君子邪為小人君子小人相為盛衰猶隂陽之相為消長聖人之於易否㤗言之詳矣且治世非無小人也亂世非無君子也君子在内小人在外所以為㤗而天下治矣君子在外小人在内所以為否而天下亂矣君子小人無世無之在乎人君所好所用而已人君好徳則民用正而君子進小人退矣人君好佞則民用邪而小人進君子退矣唐堯之時非無小人也君子在内而衆小人在外而寡則小人不勝君子也故雖有四凶亦不能害君子商紂之世非無君子也君子在外而寡小人在内而衆則君子不能勝小人也故雖有三仁而不能去小人所謂内外者不獨在位在野而已但信而任之則為内疎而逺之則為外上好正而信任君子則小人逺矣不必待屏絶誅竄而後為外也上好邪而信任小人則君子逺矣不必待斥逐放棄而後為外也所謂小人者聖人亦未嘗疾之已甚也但使君子在上小人在下各得其所而已君子在上則足以制小人小人在下則順以從君子如是則天下未有不治者也若夫疾惡而不能去去惡而無其術者適所以致禍亂之道也嗚呼君子小人用與不用實繫上之所好上之所好實繫天下治亂可不慎哉賢愚人之本性利害民之常情虞舜陶于河濱傅説築于巖下天下皆知其賢而百執事不為之舉者利害使之然也吁利害叢于中而矛㦸森于外又安知有虞舜之聖而傅説之賢哉河濱非禪位之所巖下非求相之方昔也在億萬人之下而今也在億萬人之上相去一何逺之甚也然而必此云者貴有名者也唐堯之舉舜商宗之用説葢有素矣猶厯試諸艱稽之夢卜所以厭天下之心也雖舜之聖説之賢茍為利害所蔽人亦安知其聖賢哉故堯髙宗不得不如此貴乎有名也易曰坎有孚維心亨行有尚中正行險往且有功雖危無咎能自信故也伊尹以之是知古之人患名過實者有之矣其間有幸與不幸者雖聖人人力有不及者矣伊尹行冢宰居責成之地借使避放君之名豈曰不忠乎則天下之事去矣又安能正嗣君成終始之大忠者乎吁若委寄于匪人三年之間其如嗣君何則天下之事亦去矣又安有伊尹也坎有孚維心亨不亦近之乎有伊尹之位有伊尹之時有伊尹之徳有伊尹之心忠於社稷公於天下則可雖曰放君所不避也茍無其位無其時無其徳無其心不忠不公則為簒也烏可㢤故必如坎之維心亨行有尚而後可以濟乎坎也易曰由豫大有得勿疑朋盍簪剛健主豫動而有應羣疑乃亡能自彊故也周公以之是知聖人不能使人無謗能處謗者也周公居總已當任重之地借使避滅親之名豈曰不孝乎則天下之事去矣又安能保嗣君成終始之大孝者乎吁若委寄于匪人七年之間其如嗣君何則天下之事亦去矣又安有周公也由豫大有得勿疑朋盍簪不亦近之乎有周公之位有周公之時有周公之徳有周公之心忠於社稷公於天下則可雖曰誅兄放弟所不避也苟無其位無其時無其徳無其心不忠不公則是大惡也烏可哉故必如豫之大有得勿疑朋盍簮而後可以主豫也夫天下将治則人必尚行也天下将亂則人必尚言也尚行則篤實之風行焉尚言則詭譎之風行焉天下将治則人必尚義也天下将亂則人必尚利也尚義則謙讓之風行焉尚利則攘奪之風行焉治世務本故尚行亂世務末故尚言務本則君子之事也故篤實之風所以行也務末則小人之事也故譎詐之風所以行也治世樂與故尚義亂世樂取故尚利尚義則君子之事也故謙讓之風所以行也尚利則小人之事也故攘奪之風所以行也皆本乎上之所好與夫君子小人之進退而已三王尚行者也五伯尚言者也尚行者必入于義也尚言者必入于利也義利之相去一何逺之如是耶三王用忠信以行實事故尚行五伯用譎詐以假虚名故尚言所尚不同如此王伯之所以異也是知言之于口不若行之于身行之于身不若盡之于心言之於口人得而聞之行之于身人得而見之盡之于心神得而知之人之聰明猶不可欺况神之聰明乎是知無愧于口不若無愧于身無愧于身不若無愧于心無口過易無身過難無身過易無心過難既無心過何難之有吁安得無心過之人而與之語心哉是故知聖人所以能立于無過之地者謂其善事于心者也君子言之不出恥躬之不逮故徒言之不若躬行之行之者或安而行之或利而行之或勉强而行之安而行之者行之以無事盡于心者也孟子所謂舜由仁義行者是也利而行之勉强而行之者雖曰行之而心或有所未盡故不若盡心之為善也既能行之久而必有所至及其成功則一矣言之于口則人得而聞之行之于身則人得而見之盡之于心則神得而知之所謂盡之于心者黙而成之不言而信者也不言而信則神得而知之者也故君子不欺暗室不愧屋漏以神之聰明不可欺也無愧于口不若無愧于身無愧于身不若無愧于心謂之行于身不若盡之于心也無口過易能慎言語則無口過矣無身過難能踐履則無身過矣無身過易無心過難既無心過何難之有所謂心過者不必待見于事為之際思慮一萌茍離于道是為過矣既無心過何思何慮寂然不動感而而通何難之有也能無心過者其惟聖人乎聖人與天地合其徳與日月合其明與四時合其序與鬼神合其吉凶何過之有未至于聖人則未能無過故孔子謂顔淵為好學則曰不貳過又曰有不善未嘗不知知之未嘗復行始可以謂之無身過者也及其問仁則告之以非禮勿視非禮勿聴非禮勿言非禮勿動至於非禮勿動則使之進於無心過之地也故又曰回也其心三月不違仁夫心有一所動而在乎非禮則逺於仁矣顔子至於三月不違仁則幾于聖者也此道之妙不可以言傳學者當盡心焉觀物内篇之八仲尼曰韶盡美矣又盡善也武盡美矣未盡善也又曰管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髪左袵矣是知武王雖不逮舜之盡善盡美以其解天下之倒懸則下于舜一等耳桓公雖不逮武之應天順人以其霸諸侯一匡天下則髙于狄亦逺矣以武比舜則不能無過比桓則不能無功以桓比狄則不能無功比武則不能無過漢氏宜立乎桓武之間矣此言帝王之異霸之於王固逺然亦有功于時故聖人猶取之漢不純乎王而雜乎霸者也舜武皆聖人也所以異者時不同故也是時也非㑹天下民厭秦之暴且甚雖十劉季百子房其如人心未易何人君所恃以安者人心而已人心既去一夫而已故書謂之獨夫紂也且古今之時則異也而民好生惡死之心非異也自古殺人之多未有如秦之甚天下安有不厭之乎夫殺人之多不必以刃謂天下之人無生路可移也而又况以刃多殺天下之人乎得民心以仁失民心以不仁仁者好生不仁者好殺以虐政殺之以白刃殺之其殺一也然白刃之所殺猶有能免者虐政之所殺則無所逃矣故虐政甚於白刃也已殺之使人殺之其殺一也已殺之所殺猶寡使人殺之則所殺者衆也故使人殺之甚於已殺之也使人殺之謂以虐政殺之也以虐政殺之者謂天下之人無生路可趨也故虐政甚於白刃也又况既以虐政殺之而又加之以白刃殺之耶于是時也天下之生靈墜于塗炭可知之矣秦二世萬乗也求為黔首而不能得漢劉季匹夫也免為元首而不能己萬乗與匹夫相去有間矣然而有時而代之者謂其天下之利害有懸之耳利民則匹夫可以為元首害民則元首欲為匹夫而不能利害之間如此可不畏哉可不慎哉天之道非禍萬乗而福匹夫也謂其禍無道而福有道也人之情非去萬乗而就匹夫也謂其去無道而就有道也萬乗與匹夫相去有間矣然而有時而代之者謂其直以天下之利害有所懸之耳天之禍福視民之去就民之去就視君之仁與不仁君之仁與不仁在乎利民害民而已利民則天降之福害民則天降之禍人君始于利民害民而天之禍福卒及其身及其子孫可不畏哉可不慎哉日既沒矣月既望矣星不能不希矣非星之希是星難乎其為光矣能為其光者不亦希乎漢唐既創業矣吕武既擅權矣臣不能不希矣非臣之希是臣難乎其為忠矣能為其忠者不亦希乎忠臣之節見於危難故曰不亦希乎是知任天下事易死天下事難死天下事易成天下事難茍成之又何計乎死與生也如其不成雖死奚益况其有正與不正者乎與其死于不正孰若生于正與其生于不正孰若死于正在乎忠與智者之一擇焉死固可惜貴乎成天下之事也如其敗天下之事一死奚以塞責生固可愛貴乎成天下之事也如其敗天下之事一生何以收功任天下之事易於死天下之事死天下之事易於成天下之事故聖人貴成天下之事而不計乎死與生也生而敗天下之事生以奚益死而不能成天下之事死以奚益生也死也君子未嘗有所擇所擇者正與不正而已不正而死不若正而生不正而生不若正而死君子無求生以害仁不貴乎茍生以敗天下之事也有殺身以成仁貴乎成天下之事而死之以正也至于死則非君子之所得已不得已而死死而能有所成則死猶生也故君子必死之雖然唯聖人無死地無死地者不獨能知幾而又且見于未萌也所以能見於未萌者以明乎理故也如舜不為象所害孔子不為匡人桓魋所殺是也凡能為人所害所殺者謂之仁謂之難則可不可以謂之聖也然聖人非臨難茍免葢不至於苟免之地也茍不能見於未萌不幸而至于難權輕重而義有所在死其所當死亦聖人之所許也若子路之死於蒯聵可以死可以無死死傷勇者也故孔子謂柴也其來乎由乎其死矣孔子不以柴之來為非則知由之死未為是也方子路之未死孔子已謂若由也不得其死然則知子路之死聖人之所不取也子畏於匡顔淵後孔子曰吾以女為死矣顔淵曰子在回何敢死使孔子死於匡則顔淵必死之矣若顔淵可謂知所事知所死矣後世之人不明義理不擇所事而死於其難者有之矣是特犬馬之忠而已比之賣主以為利者固有間然皆不得其死者也嗚呼君子之出處所與所事實死生之所繫可不擇哉噫能成天下之事又能不失其正而生者非漢之留侯唐之梁公而何微斯二人則漢唐之祚或幾乎移矣豈若虚生虚死者焉夫虚生虚死者譬之蕭艾忠于智者不由乎其間矣留侯梁公於漢唐其功大矣古之成大事者不務為區區之小忠以投人之耳目志於逺者大者而已觀物内篇之九仲尼曰善人為邦百年亦可以勝殘去殺誠哉是言也自極亂至于極治必三變矣變極亂為極治亦必有漸故必至于三變也三皇之法無殺五伯之法無生伯一變至于王矣王一變至于帝矣帝一變至于皇矣其于生也非百年而何古者謂三十年為一世天時人事更一世則變變極治而為極亂變極亂而為極治皆有漸次世變至于三則幾百年也是知三皇之世如春五帝之世如夏三王之世如秋五伯之世如冬如春温如也如夏燠如也如秋凄如也如冬冽如也皇帝王伯春夏秋冬其時如此温燠凄冽其變如此春夏秋冬者昊天之時也易書詩春秋者聖人之經也天時不差則嵗功成矣聖經不忒則君徳成矣天時聖經其道一也嵗功君徳由此而成也天有常時聖有常經行之正則正矣行之邪則邪矣邪正之間有道在焉行之正則謂之正道行之邪則謂之邪道邪正由人乎由天乎君子則正小人則邪邪正在人而所以使邪正之得行則在天故曰由人乎由天乎君子小人正道邪道猶天之有消息盈虚消息盈虛莫非天也雖曰天亦由乎人也故聖人獨責於人盡人事而後可以言天也茍一切歸之於天則人事廢矣是猶未嘗播種耕耘而罪嵗者也天由道而生地由道而成物由道而形人由道而行天地人物則異也其于由道一也甞謂萬物莫不由之之謂道天地人物皆由乎道者也失道也者道也道無形行之則見于事矣如道路之道坦然使千億萬年行之人知其歸者也道無形跡故名之曰道以謂如道路之道名之曰道則已在乎形跡之間矣然則道果何在乎易曰一隂一陽之謂道孟子曰萬物莫不由之之謂道又曰道若大路然使天下之人由此而求之也聖人語道止可至此在學者潛心焉既由乎道則知所歸矣或曰君子道長則小人道消君子道消則小人道長長者是則消者非也消者是則長者非也何以知正道邪道之然乎吁賊夫人之論也有君子之道有小人之道君子小人之進退猶隂陽之消長也一隂一陽一消一長天之道也然聖人未嘗不助陽而抑隂進君子而退小人葢陽之與君子助而進之猶不足隂之與小人抑而退之猶不能人事不可以不盡人事既盡其成敗則繫乎天非人力之所及也故治亂天也君子不謂之天有人事存焉故也不曰君行君事臣行臣事父行父事子行子事夫行夫事妻行妻事君子行君子事小人行小人事中國行中國事夷狄行夷狄事謂之正道君行臣事臣行君事父行子事子行父事夫行妻事妻行夫事君子行小人事小人行君子事中國行夷狄事夷狄行中國事謂之邪道君行君事臣行臣事父行父事子行子事夫行夫事妻行妻事君子行君子事小人行小人事中國行中國事夷狄行夷狄事則上下各得其所而天下治矣故謂之正道反此則亂矣故謂之邪道至于三代之世治未有不治人倫之為道也三代之世亂未有不亂人倫之為道也後世之慕三代之治世者未有不正人倫者也後世之慕三代之亂世者未有不亂人倫者也所以謂之人倫者尊卑上下皆得其理而已得其理則治失其理則亂治則興亂則亡自古皆然也嗚呼人倫不明而欲治天下其可得乎堯以是傳之舜舜以是傳之禹三代之聖君莫不由此以治天下孔孟莫不以此垂教於萬世楊氏為我是無君也墨氏兼愛是無父也無父無君是禽獸也為我兼愛豈不美哉其弊則至於無父無君為天下之害也大矣自三代而下漢唐為盛未始不由治而興亂而亡况其不盛于漢唐者乎三代之盛王皆由明人倫而興其後世皆由廢人倫而亡漢唐不逮三代之盛其興也亦莫不由此而興其亡也亦莫不由此而亡如唐之太宗人倫已不甚明矣故其後世數致禍亂嗚呼有天下者人之大倫其可廢乎舍是則與禽獸夷狄奚擇夷狄之相殘禽獸之相食以無人倫也其興也又未始不由君道盛父道盛夫道盛君子之道盛中國之道盛其亡也又未始不由臣道盛子道盛妻道盛小人之道盛夷狄之道盛臣不尊君子不順父妻不從夫夷狄之凌中國小人之勝君子皆亂之道也噫二道對行何故治世少而亂世多邪君子少而小人多邪曰豈不知陽一而隂二乎亂世多而治世少小人多而君子少由天之隂陽陽數竒而隂數耦隂常多於陽而陽常少於隂故君子之進也常難而退也常易小人之進也常易而退也常難理如是也天地尚由是道而生况其人與物乎人者物之至靈者也物之靈未若人之靈尚由是道而生又况人靈于物者乎是知人亦物也以其至靈故特謂之人也天地人物皆由道而生人靈於物者也靈於物故能宰萬物觀物内篇之十日經天之元月經天之㑹星經天之運辰經天之世以日經日則元之元可知之矣以日經月則元之㑹可知之矣以日經星則元之運可知之矣以日經辰則元之世可知之矣以月經日則㑹之元可知之矣以月經月則㑹之㑹可知之矣以月經星則㑹之運可知之矣以月經辰則㑹之世可知之也以星經日則運之元可知之矣以星經月則運之㑹可知之矣以星經星則運之運可知之矣以星經辰則運之世可知之矣以辰經日則世之元可知之矣以辰經月則世之㑹可知之矣以辰經星則世之運可知之矣以辰經辰則世之世可知之矣皇極經世則日月星辰元㑹運世以相經而皆有數存焉元之元一元之㑹十二元之運三百六十元之世四千三百二十㑹之元十二㑹之㑹一百四十四㑹之運四千三百二十㑹之世五萬一千八百四十演運之元三百六十運之㑹四千三百二十運之運一十二萬九千六百運之世一百五十五萬五千二百世之元四千三百二十世之㑹五萬一千八百四十世之運一百五十五萬五千二百世之世一千八百六十六萬二千四百以日經日為元之元其數一日之數一故也以日經月為元之㑹其數十二月之數十二故也以日經星為元之運其數三百六十星之數三百六十故也以日經辰為元之世其數四千三百二十辰之數四千三百二十故也則是日為元月為㑹星為運辰為世此皇極經世一元之數也一元象一年十二㑹象十二月三百六十運象三百六十日四千三百二十世象四千三百二十時也葢一年有十二月三百六十日四千三百二十時故也經世一元十二㑹三百六十運四千三百二十世一世三十年是為一十二萬九千六百年是為皇極經世一元之數一元在大化之間猶一年也自元之元更相變而至于辰之元自元之辰更相變而至于辰之辰而後數窮矣窮則變變則生生而不窮也皇極經世但著一元之數使人引而伸之可至于終而復始也其法皆以十二三十相乗十二三十日月之數也其數見于前此不復詳其消息盈虧之説不著于書使人求而得之葢藏諸用也此易所謂天地之數也元之元以春行春之時也元之㑹以春行夏之時也元之運以春行秋之時也元之世以春行冬之時也㑹之元以夏行春之時也㑹之㑹以夏行夏之時也㑹之運以夏行秋之時也㑹之世以夏行冬之時也運之元以秋行春之時也運之㑹以秋行夏之時也運之運以秋行秋之時也運之世以秋行冬之時也世之元以冬行春之時也世之㑹以冬行夏之時也世之運以冬行秋之時也世之世以冬行冬之時也春夏秋冬一嵗之運其變如此在大運亦然不過乎隂陽消長而已皇之皇以道行道之事也皇之帝以道行徳之事也皇之王以道行功之事也皇之伯以道行力之事也帝之皇以徳行道之事也帝之帝以徳行徳之事也帝之王以徳行功之事也帝之伯以徳行力之事也王之皇以功行道之事也王之帝以功行徳之事也王之王以功行功之事也王之伯以功行力之事也伯之皇以力行道之事也伯之帝以力行徳之事也伯之王以力行功之事也伯之伯以力行力之事也皇帝王伯一世之事其道如此在萬世亦然不過乎因革而已時有消長事有因革非聖人無以盡之所以仲尼曰可與共學未可與適道可與適道未可與立可與立未可與權是知千萬世之時千萬世之經豈可畫地而輕言哉時有消長事有因革消長之有變因革之有權千萬世之時千萬世之事非變非權其孰能盡之能盡權變者其惟聖人乎賢人則猶有所未盡也小人而曰權變則詐而已矣三皇春也五帝夏也三王秋也五伯冬也七國冬之餘冽也漢王而不足晉伯而有餘三國伯之雄者也十六國伯之叢者也南五代伯之借乗也北五朝伯之傳舍也隋晉之子也唐漢之弟也隋季諸郡之伯江漢之餘波也唐季諸鎮之伯日月之餘光也後五代之伯日未出之星也三皇不言而化故於時為春五帝典章備矣故於時為夏三王法度成矣故於時為秋五伯刑殺尚矣故於時為冬得時之正者皇帝王伯而已漢雜乎伯故王而不足晉劣於漢故伯而有餘三國伯之盛強者也自十六國至于南北朝皆不足乎伯者也隋方之於晉猶父子也唐方之於漢猶兄弟也皆不足於王而雜乎伯者也隋季諸郡唐季諸鎮及乎五季皆不足道也故曰江漢之餘波日月之餘光日未出之星也自帝堯至于今上下三千餘年前後百有餘世書傳可明紀者四海之内九州之間或合或離或治或隳或强或羸或唱或隨未始有兼世而能一其風俗者吁古者謂三十年為一世豈徒然哉俟化之必洽教之必浹民之情始可以一變矣苟有命世之人繼世而興焉則雖民如夷狄三變而帝道可舉惜乎時無百年之世世無百年之人比其有代則賢之與不肖何止于相半也時之難不其然乎人之難不其然乎上論歴代之治此又論治世少亂世多葢自堯舜以來一治一亂興廢之間不過一二世而其風已衰矣自極亂而至極治俟化之必洽教之必浹天下始一變矣古者謂三十年為一世不獨天時之變如此在人事一變亦非三十年則不可茍有命世之人繼世而興雖民如夷狄三變而帝道可舉三變則百年矣故必百年而後功成治定也然時無百年之世世無百年之人比其有代子孫又未必皆賢而不克嗣述者多矣時之難如此人之難又如此則治世所以少而亂世所以多也觀物内篇之十一太陽之體數十太隂之體數十二少陽之體數十少隂之體數十二少剛之體數十少柔之體數十二太剛之體數十太柔之體數十二進太陽少陽太剛少剛之體數退太隂少隂太柔少柔之體數是謂太陽少陽太剛少剛之用數進太隂少隂太柔少柔之體數退太陽少陽太剛少剛之體數是謂太隂少隂太柔少柔之用數太陽少陽太剛少剛之體數一百六十太隂少隂太柔少柔之體數一百九十二太陽少陽太剛少剛之用數一百一十二太隂少隂太柔少柔之用數一百五十二以太陽少陽太剛少剛之用數唱太隂少隂太柔少柔之用數是日月星辰之變數以太隂少隂太柔少柔之用數和太陽少陽太剛少剛之用數是謂水火土石之化數日月星辰之變數一萬七千二十四謂之動數水火土石之化數一萬七千二十四謂之植數再唱和日月星辰水火土石之變化通數二萬八千九百八十一萬六千五百七十六謂之動植通數日為太陽其數十月為太隂其數十二星為少陽其數十辰為少隂其數十二石為少剛其數十土為少柔其數十二火為太剛其數十水為太柔其數十二太陽少陽太剛少剛之本數四十太隂少隂太柔少柔之本數四十有八以四因四十得一百六十以四因四十八得一百九十二是謂太陽少陽太隂少隂太剛少剛太柔少柔之體數一百六十數之内退四十八得一百一十二一百九十二數内退四十得一百五十二是謂太陽少陽太隂少隂太剛少剛太柔少柔之用數也隂陽剛柔互相進退去其體數而所存者謂之用數隂陽剛柔所以相進退者陽中有隂隂中有陽剛中有柔柔中有剛天地交際之道也以一百一百二因一百五十二得一萬一千二十四謂之水火土石之化數以一百五十二因一百一十二得一萬七千二十四謂之日月星辰之變數變數謂之動數化數謂之植數以一萬七千二十四因一萬七千二十四得二萬八千九百八十一萬六千五百七十六是謂動植之通數此易所謂萬物之數也或曰經世之數與大衍之數不同何也曰易用九六經世用十十二用十十二用極數也十去其一則九矣十二分而為二則六矣故日陽也止于十月隂也止于十二此之謂極數大衍經世皆本於四四者四家之數也故大衍四四因九得三十六是為乾一爻之策數四因六得二十四是為坤一爻之策數六因三十六得三百一十有六是為乾一卦之策數六因二十四得百四十有四是為坤一卦之策數乾坤之策凡三百六十也三十二因二百一十六得六千九百一十有二是為三十二陽卦之策數三十二因百四十有四得四千六百有八是為三十二隂卦之策數合二篇之策凡萬有一千三百二十也如太𤣥之數則用三數聖賢立法不同其所以為數則一也日月星辰者變乎暑寒晝夜者也水火土石者化乎雨風露雷者也暑寒晝夜者化乎性情形體者也雨風露雷者化乎走飛草木者也暑變飛走木草之性寒變飛走木草之情晝變飛走木草之形夜變飛走木草之體雨化性情形體之走風化性情形體之飛露化性情形體之草雷化性情形體之木有日月星辰則有暑寒晝夜葢日為暑月為寒星為晝辰為夜也有水火土石則有雨風露雷葢水為雨火為風土為露石為雷也有暑寒晝夜則有性情形體葢暑變物之性寒變物之情晝變物之形夜變物之體也有雨風露雷則有飛走木草葢雨化物之走風化物之飛露化物之草雷化物之木也暑寒晝夜雨風露雷又相交感而變化焉此萬物之所以生也性情形體者本乎天者也飛走木草者本乎地者也本乎天者分隂分陽之謂也本乎地者分柔分剛之謂也夫分隂分陽分柔分剛者天地萬物之謂也備天地萬物者人之謂也天地隂陽萬物由之以生人備天地萬物而靈于萬物者也觀物内篇之十二有日日之物者也有日月之物者也有日星之物者也有日辰之物者也有月日之物者也有月月之物者也有月星之物者也有月辰之物者也有星日之物者也有星月之物者也有星星之物者也有星辰之物者也有辰日之物者也有辰月之物者也有辰星之物者也有辰辰之物者也日日之物太陽之太陽者也日月之物太陽之太隂者也日星之物太陽之少陽者也日辰之物太陽之少隂者也月日之物太隂之太陽者也月月之物太隂之太隂者也月星之物太隂之少陽者也月辰之物太隂之少隂者也星日之物少陽之太陽者也星月之物少陽之太隂者也星星之物少陽之少陽者也星辰之物少陽之少隂者也辰日之物少隂之太陽者也辰月之物少隂之太隂者也辰星之物少隂之少陽者也辰辰之物少隂之少隂者也物之感化如此日日物者飛飛也日月物者飛走也日星物者飛木也日辰物者飛草也月日物者走飛也月月物者走走也月星物者走木也月辰物者走草也星日物者木飛也星月物者木走也星星物者木木也星辰物者木草也辰日物者草飛也辰月物者草走也辰星物者草木也辰辰物者草草也飛飛者飛之㨗者也飛走者飛而走者也飛木者飛而類乎木者也飛草者飛而類乎草者也走飛者走而飛者也走走者走而走者也走木者走而類乎木者也走草者走而類乎草者也木飛者木之類乎飛者也木走者木之類乎走者也木木者木之木者也木草者木之類乎草者也草飛者草之類乎飛者也草走者草之類乎走者也草木者草之類乎木者也草草者草之草者也物之氣類如此有皇皇之民者也有皇帝之民者也有皇王之民者也有皇伯之民者也有帝皇之民者也有帝帝之民者也有帝王之民者也有帝伯之民者也有王皇之民者也有王帝之民者也有王王之民者也有王伯之民者也有伯皇之民者也有伯帝之民者也有伯王之民者也有伯伯之民者也無為之謂皇尚徳之謂帝尚功之謂王尚力之謂伯皇皇之民者皇之皇者也皇帝之民者皇之帝者也皇王之民者皇之王者也皇伯之民者皇之伯者也帝皇之民者帝之皇者也帝帝之民者帝之帝者也帝王之民者帝之王者也帝伯之民者帝之伯者也王皇之民者王之皇者也王帝之民者王之帝者也王王之民者王之王者也王伯之民者王之伯者也伯皇之民者伯之皇者也伯帝之民者伯之帝者也伯王之民者伯之王者也伯伯之民者伯之伯者也均為皇也均為帝也均為王也均為伯也其世變汚隆不同如此皇皇民者士士也皇帝民者士農也皇王民者士工也皇伯民者士商也帝皇民者農士也帝帝民者農農也帝王民者農工也帝伯民者農商也王皇民者工士也王帝民者工農也王王民者工工也王伯民者工商也伯皇民者商士也伯帝民者商農也伯王民者商工也伯伯民者商商也由道之謂士務本之謂農興作之謂工趨利之謂商皇帝王伯世變不同如此故士農工商民俗之澆淳不同如此飛飛物者性性也飛走物者性情也飛木物者性形也飛草物者性體也走飛物者情性也走走物者情情也走木物者情形也走草物者情體也木飛物者形性也木走物者形情也木木物者形形也木草物者形體也草飛物者體性也草走物者體情也草木物者體形也草草物者體體也性情形體有同異所以物之有氣類也士士民者仁仁也士農民者仁禮也士工民者仁義也士商民者仁智也農士民者禮仁也農農民者禮禮也農工民者禮義也農商民者禮智也工士民者義仁也工農民者義禮也工工民者義義也工商民者義智也商士民者智仁也商農民者智禮也商工民者智義也商商民者智智也仁禮義智有等差民俗之所以不同也飛飛之物一之一飛走之物一之十飛木之物一之百飛草之物一之千走飛之物十之一走走之物十之十走木之物十之百走草之物十之千木飛之物百之一木走之物百之十木木之物百之百木草之物百之千草飛之物千之一草走之物千之十草木之物千之百草草之物千之千飛飛之物一之一謂為一物而兼兆物者也自此各有等差以至於草草之物物之極細者也故為千之千物之巨細如此士士之民一之一士農之民一之十士工之民一之百士商之民一之千農士之民十之一農農之民十之十農工之民十之百農商之民十之千工士之民百之一工農之民百之十工工之民百之百工商之民百之千商士之民千之一商農之民千之十商工之民千之百商商之民千之千士士之民一之一謂為一人而兼兆人者也自此各有等差以至於商商之民民之極細者也故為千之千人之賢愚如此一一之飛當兆物一十之飛當億物一百之飛當萬物一千之飛當千物十一之走當億物十十之走當萬物十百之走當千物十千之走當百物百一之木當萬物百十之木當千物百百之木當百物百千之木當十物千一之草當千物千十之草當百物千百之草當十物千千之草當一物此物之所以有巨細也一一之士當兆民一十之士當億民一百之士當萬民一千之士當千民十一之農當億民十十之農當萬民十百之農當千民十千之農當百民百一之工當萬民百十之工當千民百百之工當百民百千之工當十民千一之商當千民千十之商當百民千百之商當十民千千之商當一民此人之所以有賢愚也為一一之物能當兆物者非巨物而何為一一之民能當兆民者非巨民而何為千千之物能分一物者非細物而何為千千之民能分一民者非細民而何為一一之物能當兆物者謂以一物而可以兼兆物物之至者也為一一之民能當兆民者謂以一民而可以兼兆民人之至者也為千千之物而分一物者物之細者也為千千之民而分一民者人之細者也固知物有大小民有賢愚移昊天生兆物之徳而生兆民則豈不謂至神者乎移昊天養兆民之功而養兆民則豈不謂至聖者乎吾而今而後知踐跡為大非大聖大神之人豈有不負於天地者矣物有巨細民有賢愚皆由所禀而然萬物各得天地之一端萬物之中復有巨細人能兼萬物而亦有賢愚之異猶物之有巨細也聖人則既兼兆物矣又能兼兆民非獨兼人兼物也又能兼天地能兼天地故能彌綸天地能兼兆物故能曲成萬物能兼兆民故能通天下之志此所以能生兆物養兆民也人之一身實具天地萬物唯聖人則能反身而誠踐而履之如是則不負于天地矣夫所以謂之觀物者非以目觀之也非觀之以目而觀之以心也非觀之以心而觀之以理也以目觀物見物之形以心觀物見物之情以理觀物盡物之性天下之物莫不有理焉莫不有性焉莫不有命焉所以謂之理者窮之而後可知也所以謂之性者盡之而後可知也所以謂之命者至之而後可知也此三知者天下之真知也雖聖人無以過之也而過之者非所以謂之聖人也窮理盡性以至于命是謂真知聖人亦不過如是而已矣夫鑑之所以能為明者謂其能不隠萬物之形也雖然鑑之能不隠萬物之形未若水之能一萬物之形也雖然水之能一萬物之形又未若聖人能一萬物之情也聖人之所以能一萬物之情者謂其聖人之能反觀也鑑以金為之工出人手鎔冶模範有所不同則其明之照物有時乎差矣故不若水之為明出於自然也水能照表不能照裏微風過之清明動於上重濁亂于下則不得大形之正矣故不若聖人之明也聖人之明表裏洞照幽明必燭天下之物無出之者以其能反觀也能反觀者以萬物皆備於我自我而觀之也自我而觀物則能物物而不物於物不物於物故能以物觀物能以物觀物者能無我故也所以謂之反觀者不以我觀物也不以我觀物者以物觀物之謂也既能以物觀物又安有我於其間哉能明乎理則能反觀能反觀則能無我不以我觀物者能無我故也為天下之害者莫大乎有我有我則無自而可矣世之人所以至於以是為非以非為是以善為惡以惡為善以治為亂以亂為治以君子為小人以小人為君子顛倒錯亂無所不至者皆以我為之蔽也故君子之患在蔽於我衆人之患在蔽於物蔽於我蔽於物君子衆人雖不同其害道一也是知我亦人也人亦我也我與人皆物也人之生也同乎天地我之與人人之與物本乎一道故聖人盡己之性以盡人之性盡人之性以盡物之性親親而仁民仁民而愛物老吾老以及人之老㓜吾㓜以及人之㓜其趨利避害好生惡死之心我之與人人之與物未甞異也一有我於其間則責於己無所不恕責於人無所不備施於己無所不厚施於人無所不薄推是心以往則無所不至是皆聖人之罪人也此所以能用天下之目為己之目其目無所不觀矣用天下之耳為己之耳其耳無所不聽矣用天下之口為己之口其口無所不言矣用天下之心為己之心其心無所不謀矣夫天下之觀其於見也不亦廣乎天下之聽其于聞也不亦逺乎天下之言其于論也不亦髙乎天下之謀其于樂也不亦大乎聖人能同乎天能同乎天故能同乎人能同乎人故能用天下之目為己之目天下之耳為己之耳天下之口為己之口天下之心為己之心孟子曰大舜善與人同所以能明四目達四聰葢由斯道也夫其見至廣其聞至逺其論至髙其樂至大能為至廣至逺至髙至大之事而中無一為焉豈不謂至神至聖者乎非唯吾謂之至神至聖者乎而天下謂之至神至聖者乎非唯一時之天下謂之至神至聖者乎而千萬世之天下謂之至神至聖者乎過此以往未之或知也已此篇明觀物之大㫖所以謂之觀物者天地亦物也而况於己乎己亦物矣而况於人乎人亦物矣而况於物乎夫天地人物至於一己皆同乎物矣然後能觀物觀物之㫖不亦深乎天地之大有生之類皆物也物皆有理自非有道者其孰能觀之哉所以謂之觀物者非以目觀之而觀之以心也非觀之以心而觀之以理也以目觀物者見於前而忘其後得於近而遺於逺烏足以盡天下之物哉以心觀物者有所忿懥則不得其正有所恐懼則不得其正有所好樂則不得其正有所憂患則不得其正烏足以盡天下之物哉以理觀物則是是非非善善惡惡無逺無近無前無後無得而逃於吾之所觀矣無得而逃於吾之所觀則天下之理皆得矣天下之理皆得所以能窮理盡性以至於命也理者窮之而後知性者盡之而後知命者至之而後知此三知者聖人之真知也知是三者則其於天下之事何所不知矣夫鑑之能不隠萬物之形不若水之能一萬物之形水之能一萬物之形不若聖人之能一萬物之情聖人之能一萬物之情以其能反觀也所以謂之反觀者不以我觀物也不以我觀物者以物觀物之謂也如是則以身觀身以家觀家以國觀國以天下觀天下亦從而可知矣且我亦人也則烏有所謂我哉我與人皆物也則烏有所謂物哉無物無人無我矣然後能用天下之目為己之目用天下之耳為己之耳用天下之口為己之口用天下之心為己之心能合天下之耳目心口其於聞見謀論不亦廣大髙逺乎唯其用天下聞見謀論以為聞見謀論則夫何為哉無為而已矣故曰能為至廣至逺至髙至大之事而中無一為焉豈不謂至神至聖者乎如是則天下之能事畢矣故曰過此以往未之或知也性理大全書卷十

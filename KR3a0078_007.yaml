body:
  text: 性理大全書卷七皇極經世書一邵伯溫曰皇極經世書凡十二卷其一之二則總元㑹運世之數易所謂天地之數也三之四以㑹經運列世數與歲甲子下紀帝堯至于五代厯年表以見天下離合治亂之迹以天時而驗人事者也五之六以運經世列世數與歲甲子下紀自帝堯至于五代書傳所載興廢治亂得失邪正之迹以人事而驗天時者也自七之十則以隂陽剛柔之數窮律吕聲音之數以律吕聲音之數窮動植飛走之數易所謂萬物之數也其十一之十二則論皇極經世之所以為書窮日月星辰飛走動植之數以盡天地萬物之理𫐠皇帝王霸之事以明大中至正之道隂陽之消長古今之治亂較然可見矣故書謂之皇極經世篇謂之觀物焉西山蔡氏曰皇極經世之書康節先生以為先天之學其道一本於伏羲卦圖但其用字立文自為一家引經引義别為一說故學者多所疑惑要當且以康節之書反覆涵泳使倫類精熟脉絡通貫然後有得若其宗要則明道先生所謂加一倍法也是故由用而之體則自一而二自二而四自四而八自八而十六自十六而三十二自三十二而六十四即體而之用則自六十四而三十二自三十二而十六自十六而八自八而四自四而二自二而一一者太極也所謂一動一靜之間者也蓋嘗謂體天地之撰者至於易而止矣不可以有加矣楊氏之太玄八十一首關氏之洞極二十七象司馬氏之潜虛五十五行皆不知而作者也天竒地耦之畫陽九隂六之數四千九十有六之變萬有一千五百二十之䇿有以加乎此哉康節之學雖作用不同而其實則伏羲所畫之卦也故其書以日月星辰水火土石盡天地之體用以暑寒晝夜雨風露雷盡天地之變化以性情形體走飛草木盡萬物之感應以元㑹運世歲月日辰盡天地之終始以皇帝王霸易書詩春秋盡聖賢之事業自秦漢以來一人而已耳嵩山朝氏曰邵雍堯夫隱居慱學尤精於易能前知來物撰皇極經世書以元經㑹以運經世起於堯即位之元年甲辰終於周顯德五年己未編年紀興亡治亂以符其學世稱康節之易先天之嗣也有觀物內外篇內篇解則其子伯溫所著也趙氏震曰皇極經世書元㑹運世六卷凡三十四篇如易之上經聲音律吕四卷凡十六篇如易之下經觀物十二篇之文所以暢二數之義如易之有繫辭焉夫道不囿於數而數實該乎道昔之負才氣者雖使十年不仕而事於數康節殆未之許吁是豈易言也哉按本書六十二篇並門弟子所記外篇上下通六十有四篇其首三十四篇則以元㑹運世相經橫列甲子繫嵗紀事以驗夫天時人事之得失其次十六篇則以聲音律吕更唱迭和為圖三千八百四十以窮夫萬物之數其後內外十四篇之文則皆所以敷暢前二數之義也然前之二數邵伯溫氏嘗著一元消長等圖以括其要約後西山蔡氏因其圖而推衍之著為經世指要一書足以盡了五十篇之義而晦庵朱子謂其於康節之書推究縝密矣故今不復具載康節全書但取蔡氏指要諸圖增以諸家釋例纂為二卷列於內外十四篇之首庶幾觀者即圖以明其數因文以求其理則由約可以該博復以漁樵問答及無名公𫝊附於後者因其文意與是書有相發明故也纂圖指要上西山蔡氏曰龍馬負圖伏羲因之以畫八卦重之為六十四卦初未有文字但陽竒隂耦卦畫次序而已今世所𫝊伏羲八卦圖以圓函方者是也康節曰上古聖人皆有易但作用不同今之易文王之易也故謂之周易若然則所謂三易者皆本於伏羲之圖而取象繫辭以定吉凶者名不同耳連山首艮歸藏首坤周易首乾連山歸藏雖不傳意其作用必與周易大異然作用雖異其為道則同一太極也皇極經世之書命數定象自為一家古所未有學者所未見然亦皆出於伏羲卦畫竒耦之序其為道亦同一太極也今以伏羲卦圖列之於前而以皇極經世疏之於後則大略可見矣西山蔡氏曰大𫝊曰易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業其法自一而二自二而四自四而八實則太極判而為隂陽隂陽之中又有隂陽出於自然不待智營而力索也其叙首乾而尾坤者以隂陽先後為數也邵伯溫曰先君云天地定位乾與坤對也山澤通氣艮與兌對也雷風相薄震與巽對也水火不相射離與坎對也此伏羲之易也乾之初交於坤之初得震故為長男坤之初交與乾之初得巽故為長女乾之二交於坤之二得坎故為中男坤之二交於乾之二得離故為中女乾之上交於坤之上得艮為少男坤之上交於乾之上得兌為少女乾坤大父母也故能生八卦復姤小父母也故能生六十四卦復之初九交於姤之初六得一陽姤之初六交於復之初九得一隂復之二交於姤之二得二陽姤之二交於復之二得二隂復之三交於姤之三得四陽姤之三交於復之三得四隂復之四交於姤之四得八陽姤之四交於復之四得八隂復之五交於姤之五得十六陽姤之五交於復之五得十六隂復之上交於姤之上得三十二陽姤之上交於復之上得三十二隂隂陽男女皆得順行此所以生六十四卦也西山蔡氏曰大𫝊曰天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也其法自子中至午中為陽初四爻皆陽中前二爻皆隂後二爻皆陽上一爻為隂二爻為陽三爻為隂四爻為陽自午中至子中為隂初四爻皆隂中前二爻為陽後二爻為隂上一爻為陽二爻為隂三爻為陽四爻為隂在陽中上二爻則先隂而後陽陽生於隂也在隂中上二爻則先陽而後隂隂生於陽也其叙始震終坤者以隂陽消息為數也坤西山蔡氏曰八卦重而為六十四卦一卦之上各有八卦也實則自八而十六自十六而三十二自三十二而六十四也大𫝊曰因而重之爻在其中矣者是也此隂陽流行之數前三十二卦為陽後三十二卦為隂古往今來者也邵伯溫曰先君曰上世聖人皆有易作用不同其道一也今之易經文王之易也故謂之曰周易伏羲之易無文字語言獨有卦畫次序而已孔子於繫辭實述之矣圓者為天方者為地天地之理皆在是也西山蔡氏曰六十四卦圓布者乾盡午中坤盡子中離盡卯中坎盡酉中陽生於子中極於午中隂生於午中極於子中其陽在南其隂在北方布者乾始於西北坤盡於東南其陽在北其隂在南此二者隂陽對待之數圓於外者為陽方於中者為隂圓者動而為天方者靜而為地者也陽九隂六用數圖老陽用九數老隂用六數四因九得三十有六是為老陽之數四因六得二十有四是為老隂之數六因三十有六得二百一十有六是為乾卦之數六因二十有四得一百四十有四是為坤卦之數以二百一十有六合一百四十有四得三百六十為一朞之數月日時同陽爻一百九十二以三十二因二百一十有六得六千九百一十有二之數隂爻一百九十二以三十二因一百四十有四得四千六百有八之數六十四卦中三百八十四爻隂陽各居其半故用三十二因之以六千九百一十有二合四千六百有八得萬有一千五百二十是為萬物之數少陽數七少隂數八四因七得二十有八是為少陽之數四因八得三十有二是為少隂之數六因二十有八得一百六十有八是為乾卦之數六因三十有二得一百九十有二是為坤卦之數以一百六十有八合一百九十有二亦得三百六十是為一朞之數陽爻一百九十二以三十二因一百六十有八得五千三百七十有六之數隂爻一百九十二以三十二因一百九十有二得六千一百四十有四之數以五千三百七十有六合六千一百四十有四亦得萬有一千五百二十是為萬物之數聖人所以不書者以周易用九六而不用七八也朱子曰二篇之䇿當萬物之數者不是萬物盡於此數只是取象自一而萬以萬數來當萬物之數耳性理大全書卷七

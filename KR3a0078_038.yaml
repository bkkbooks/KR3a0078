body:
  text: 性理大全書卷三十八道統朱子曰道之在天下者未嘗亡惟其託於人者或絶或續故其行于世者有眀有晦是皆天命之所為非人智力之所能及也夫天髙地下而二氣五行紛紜錯糅升降往來於其間其造化發育品物散殊莫不有固然之理而其最大者則仁義禮智之性君臣父子昆弟夫婦朋友之倫是已而其周流充塞無所虧間夫豈以古今治亂為存亡者哉然氣之運也則有醇漓判合之不齊人之稟也則有清濁昏眀之或異是以道之所以託於人而行於世者惟天所畀乃得與焉河圗出而八卦畫洛書呈而九疇敘而孔子於斯文之興喪亦未嘗不推之于天自周衰孟軻氏沒而此道之傳不屬至宋受命五星集奎開文眀之運而周子出焉不由師傳默契道體建圗屬書根極領要當時見而知之有程氏者遂擴大而推明之而周公孔子孟氏之傳煥然復眀於時非天所畀其孰能與於此天不生仲尼萬古如長夜唐子西嘗於一郵亭梁間見此語蔡季通云天先生伏羲堯舜文王後不生孔子亦不得後又不生孟子亦不得二千年後又不生二程亦不得此道更前後聖賢其説始備自堯舜以下若不生箇孔子後人去何處討分曉孔子後若無箇孟子也未有分曉孟子後數千載乃始得程先生兄弟發明此理今看來漢唐以下諸儒説道理見在史策者直是説夢只有箇韓文公依稀説得略似耳自鄒孟氏沒而聖人之道不傳世俗所謂儒者之學內則局於章句文詞之習外則雜於老子釋氏之言而其所以修己治人者遂一出於私智人為之鑿淺陋乖離莫適主統使其君之德不得比於三代之隆民之俗不得躋于三代之盛若是者蓋已千有餘年於今矣濓溪周子奮乎百世之下乃始深探聖賢之奧疏觀造化之原而獨心得之立象著書闡發幽祕詞義雖約而天人性命之微修己治人之要莫不畢舉河南兩程先生既親見之而得其傳於是其學遂行於世士之講於其説者始得以脫於俗學之陋異端之惑而其所以修己治人之意亦往往有能卓然不惑於世俗利害之私而慨然有志於堯舜其君民者蓋三先生者其有功於當世於是為不小矣勉齋黃氏曰道原於天具於人心著於事物載於方策眀而行之存乎其人聖賢迭興體道經世三綱既正九疇既敘則安且治聖賢不作道術分裂邪説誣民充塞仁義則危且亂世之有聖賢其所關繫者甚大生而榮死而哀秉彛好德之良心所不能自已也堯舜禹湯文武周公生而道始行孔子孟子生而道始明孔孟之道周程張子繼之周程張子之道文公朱先生又繼之此道統之傳歷萬世而可考也有太極而隂陽分有隂陽而五行具太極二五妙合而人物生賦於人者秀而靈精氣凝而為形魂魄交而為神五常具而為性感於物而為情措諸用而為事物之生也雖偏且塞而亦莫非太極二五之所為此道原之出於天者然也聖人者又得其秀之秀而最靈者焉於是繼天立極而得道統之傳故能參天地贊化育而統理人倫使人各遂其生各全其性者其所以發明道統以示天下後世者皆可考也堯之命舜則曰允執厥中中者無所偏倚無過不及之名也存諸心而無偏倚措之事而無過不及則合乎太極矣此堯之得於天者舜之得統於堯也舜之命禹則曰人心惟危道心惟微惟精惟一允執厥中舜因堯之命而推其所以執中之由以為人心形氣之私也道心性命之正也精以察之一以守之則道心為主而人心聽命焉則存之心措之事信能執其中曰精曰一此又舜之得統於堯禹之得統於舜者也其在成湯則曰以義制事以禮制心此又因堯之中舜之精一而推其制之之法制心以禮制事以義則道心常存而中可執矣曰禮曰義此又湯之得統於禹者也其在文王則曰不顯亦臨無射亦保此湯之以禮制心也不聞亦式不諫亦入此湯之以義制事也此文王之得統於湯者也其在武王受丹書之戒則曰敬勝怠者吉義勝欲者從周公繫易爻之辭曰敬以直內義以方外曰敬者文王之所以制心也曰義者文王之所以制事也此武王周公之得統於文王者也至於夫子則曰博學於文約之以禮又曰文行忠信又曰克己復禮其著之大學曰格物致知誠意正心修身齊家治國平天下亦無非數聖人制心制事之意焉此又孔子得統於周公者也顔子得於博文約禮克己復禮之言曾子得之大學之義故其親受道統之傳者如此至於子思則先之以戒懼謹獨次之以知仁勇而終之以誠至於孟子則先之以求放心而次之以集義終之以擴充此又孟子得統於子思者然也及至周子則以誠為本以欲為戒此又周子繼孔孟不傳之緒者也至二程子則曰涵養須用敬進學則在致知又曰非眀則動無所之非動則明無所用而為四針以著克己之義焉此二程得統於周子者也先師文公之學見之四書而其要則尤以大學為入道之序蓋持敬也自格物致知誠意正心修身而見於齊家治國平天下外有以極其規模之大而內有以盡其節目之詳此又先師之得其統於二程者也聖賢相傳埀世立教粲然明白若天之埀象昭昭然而不可易也故嘗撮其要指而明之居敬以立其本窮理以致其知克己以滅其私存誠以致其實以是四者而存諸心則千聖萬賢所以傳道而教人者不越乎此矣北溪陳氏曰粵自羲皇作易首闡渾淪神農黃帝相與繼天立極而宗統之傳有自來矣堯舜禹湯文武更相授受中天地為三綱五常之主臯陶伊傅周召又相與輔相施諸天下為文明之治孔子不得行道之任乃集羣聖之法作六經為萬世師而回參伋軻實傳之上下數千年無二説也軻之後失其傳天下騖於俗學蓋千數百餘年昏昏冥冥醉生夢死不自覺也及濓溪先生與河南二程先生卓然以先知先覺之資相繼而出濓溪不由師傳獨得於天提綱啓鑰其妙具在太極一圗而通書四十章又以發圗之所未盡上與羲皇之易相表裏而下以振孔孟不傳之墜緒所謂再闢渾淪二程親受其旨又從而光大之故天理之微人倫之著事物之衆鬼神之幽與凡造道入德之方修己治人之術莫不秩然有條理備見於易傳遺書使斯世之英才志士得以探討服行而不失其所歸河洛之間斯文洋洋與洙泗並聞而知者有朱文公又即其遺言遺旨益精明而瑩白之上以達羣聖之心下以統百家而會於一蓋所謂集諸儒之大成而嗣周程之嫡統粹乎洙泗濓洛之淵源者也果齋李氏曰太極之妙立乎形氣未具之先而行乎氣形已具之內蓋造化之樞紐品彚之根柢也人之生也全而得之其體則有仁義禮智之性其用則有惻隱羞惡辭讓是非之情而心兼統焉以之應事接物莫不各有當然之則而自不容己者是則所謂道也斯道也無物不有大而至於天地之運小而至於一塵之微不能外也無時不然逺而至於古今之變近而至於一息之頃不能違也分而言之一物各具一太極也合而言之萬物體統一太極也是故自一而萬則體統燦然而不可亂自萬而一則根本渾然而未嘗離體用一源也隱顯無間也朱子之道之至其與太極為一者歟蓋自夫子設教洙泗以博文約禮授學者顔子子思孟子相與共守之未嘗失墜其後正學失傳士各以意為學其務於該洽者既以聞見積纍自矜而流於泛濫駁雜之歸其溺於徑約者又謂不立文字可以識心見性而陷於曠蕩空虛之域寥寥千載而後周程張子出焉歷時未久浸失其真朱子出而後合伊洛之正傳紹鄒魯之墜緒前賢後賢之道該遍全體其亦可謂盛矣蓋古者易更三古而混於八索詩書煩亂禮樂散亡而莫克正也夫子從而正之贊之定之刪之又作春秋六經始偹以為萬世道德之宗主秦火之餘六經既已爛脫諸儒各以己見妄穿鑿為説未嘗有知道者也周程張子其道眀矣然於經言未暇釐正一時從遊之士或殊其旨遁而入於異端者有矣朱子於是考訂訛謬探索深微總裁大典勒成一家之言仰包純古之載籍下採近世之文獻集其大成以定萬世之法然後斯道大明如日中天有目者皆可觀也夫子之經得先生而正夫子之道得先生而明起斯文於將墜覺來裔於無窮雖與天壤俱敝可也後世雖有作者其不可及也夫西山真氏曰道之大原出於天其用在天下其傳在聖賢此子思子之中庸所以有性道教之别也蓋性者智愚所同得道者古今所共由而明道闡教以覺斯人則非聖賢莫能與故自堯舜至於孔子率五百嵗而聖人出孔子既沒曾子子思與孟軻氏復先後而推明之百有餘年之間一聖三賢更相授受然後堯舜禹湯文武周公之所以開天常立人紀者粲然昭陳埀示罔極然則天之生聖賢也夫豈偶然哉不幸戰國嬴秦以後學術渙散無所統盟雖以董相韓文公之賢相望於漢唐而於淵源之正體用之全猶有未究其極者故僅能著衛道之功於一時而無以任傳道之責於萬世逮至我宋大儒繼出以主張斯文為己任蓋孔孟之道至周子而復明周子之道至二程子而益明二程之道至朱子而大明其視曾子子思鄒孟氏之傳若合符節豈人之所能為也哉天也臨川吳氏曰道之大原出於天羲農黃帝繼天立極是謂三皇道統之傳實始於此黃帝而後少皥顓帝髙辛繼之通堯舜謂之五帝堯舜禹臯君臣也而並生唐虞之際所以為盛也成湯伊尹生於商之初興而傅説生於商之中世文武周召生于周之盛際而孔子生于周之既衰夫子以來始不得位而聖人之道不行于是始教授弟子而惟顔曾得其傳顔子早死曽子傳之子思子思傳之孟子孟子沒而不得其傳焉至周子始有以接乎孟子之傳于千載之下二程子則師于周子而傳其學後又有朱子集周程之大成是皆得夫道統之傳者也聖賢繼作前後相承吾道正脈賴以不墜聖賢總論程子曰氣化之在人與在天一也聖人于其間有功用而已問楊子云觀乎天地則見聖人曰不然觀乎聖人則見天地聖人即天地也天地中善惡一切函容覆載故聖人之志止欲老者安之朋友信之少者懷之聖人天地之用也聖人之心如天地之造化生養萬物而不尸其功應物而見於彼復何存於此乎聖人一言即全體用不期然而然也因是人有可喜則喜之聖人之心本無喜也因是人有可怒則怒之聖人之心本無怒也聖人之德無所不盛古之稱聖人者自其尤盛而言之尤盛者見於於遇也而或以為聖人有能有不能非知聖人者也惟聖人善通變一行豈所以名聖人至於聖則自不可見何嘗道聖人孝聖人亷聖人濟物之心無窮而力或有所不及聖人之責人也常緩便見只欲事正無顯人過惡之意聖人無優劣有則非聖人也凡人有己必用才聖人忘己何才之足言聖人責已感處多責人應處少聖人之心未嘗有志亦無不在蓋其道合內外體萬物聖人之心雖當憂勞未嘗不安靜其在安靜亦有至憂而未嘗勞也元氣會則生賢聖體道少能體即賢盡能體即聖人多昏其心聖賢則去其昏或曰賢聖氣象何自而見之曰姑以其言觀之亦可也聖賢之處世莫不於大同之中有不同焉不能大同者是亂常拂理而已不能不同者是隨俗習汚而已學者必識聖賢之體聖人猶化工也賢人猶巧工也翦綵以為花設色以畫之非不宛然肖之而欲觀生意之自然則無之也聖人愈自卑而道自高賢人不髙則道不尊聖賢之分也合天人通義命此大賢以上事或謂賢者好貧賤而惡富貴是反人之情也所以異於人者以守義安命焉耳張子曰賢人當為天下知聖人當受命雖不受知不受命然為聖為賢乃吾性分當勉爾洪鐘未嘗有聲由扣乃有聲聖人未嘗有知由問乃有知或謂聖人無知則當不問之時其猶木石乎曰有不知則有知無不知則無知故曰聖人未嘗有知由問乃有知也聖人無私無我故功髙天下而無一介纍於其心蓋有一介存焉未免乎私己也五峰胡氏曰聖人之應事也如水由於地中未有可止而不止可行而不行者也窮則獨善其身達則兼善天下者大賢之分也達則兼善天下窮則兼善萬世者聖人之分也朱子曰聖人萬善皆備有一毫之失此不足為聖人聖人不知己是聖人問聖人憂世覺民之心終其身至死而不忘耶抑當憂世覺民非其時此意亦常在懷但不戚戚發露也若終其身常不忘則不見聖人胸中休休焉和樂處若時或恬然不戚戚發露則又不見聖人於斯人其心相關甚切處若憂世之心與和樂之心並行而不悖則二者氣象又為如何曰聖人之心樂天知命者其常也憂世之心則有感而後見爾聖賢之心正大光明洞然四達故能春生秋殺過化存神而莫知為之者學者須識得此氣象而求之庶無差失若如世俗常情支離巧曲瞻前顧後之不暇則又安能有此等氣象魯齋許氏曰聖人以中道公道應物而已無我無人無作為以天下才治天下事應之而已但精微之理聖人之能事也天運時刻不暫停聖人明睿所照見於無形非常人智慮所及者先賢言語皆格言然亦有一時一事有為而言者故或不可為後世法或行之便生弊唯聖人言語萬世無弊雖有為而言皆可通行無弊孔子周子曰道德高厚教化無窮實與天地參而四時同其惟孔子乎程子曰孔子之道著見於行如鄉黨之所載者自誠而眀也朱子曰孔子天地間甚事不理會過若非許大精神亦吞許多不得問孔子不是不欲仕只是時未可仕曰聖人無求仕之義君不見用只得且恁地做問孔子當衰周時可以有為否曰聖人無有不可為之事只恐權柄不入手若得權柄在手則兵隨印轉將逐符行近溫左氏傳見定哀時煞有可做的事問固是聖人無不可為之事聖人有不可為之時否曰便是聖人無不可為之時若時節變了聖人又自處之不同又問孔子當衰周豈不知時君必不能用已曰聖人却無此心豈有逆料人君能用我與否到得後來説吾不復夢見周公與鳳鳥不至河不出圗吾已矣夫時聖人亦自知其不可為矣但不知此等話是幾時説據陳恆弒其君孔子沐浴而朝請討之時是獲麟之年那時聖人猶欲有為也問看聖人汲汲皇皇不肯沒身逃世只是急于救世不能廢君臣之義至於可與不可臨時依舊裁之以義曰固是但未須説急於救世自不可不仕又問若據危邦不入亂邦不居有道則見無道則隱等語却似長沮桀溺之徒做得是曰此為學者言之聖人做作又自不同又問聖人亦明知世之不可為否曰也不是明知不可但天下無不可為之時茍可以仕則仕至不可處便止東萊呂氏曰禹稷思天下飢溺由己飢溺孔子歷聘諸國以至誨人不倦皆是合當做事自古聖人之於天下皆如此顔子程子曰聖人之德行固不可得而名狀若顔子底一箇氣象吾曹亦心知之欲學聖人且須學顔子學者要學得不錯須是學顔子有凖的問顔子如何學孔子到此深邃曰顔子所以大過人者只是得一善則拳拳服膺與能屢空耳問顔子勇乎曰孰勇於顔子觀其言曰舜何人也豫何人也有為者亦若是孰勇於顔子如有若無實若虛犯而不校之類抑可謂大勇矣孔子弟子少有會問者只顔子能問又却終日如愚顔子作得禹稷湯武事功若德則别論問陋巷貧賤之人亦有以自樂何獨顔子曰貧賤而在陋巷俄然處富貴則失其本心者衆矣顔子簞瓢由是萬鐘由是問顔子得淳和之氣何故天曰衰周天地和氣有限養得仲尼已是多也張子曰顔子知當至而至焉故見其進也不極善則不處焉故未見其止也知必至者如志於道致廣大極髙明此則儘逺大所處則直是精約極善者須以中道方謂極善蓋過則便非善不及亦非善此極善是顔子所求也所以瞻之在前忽焉在後夫子高逺處又要求精約處又要至顔子之分必是入神處又未能精義處又未至然顔子雅意則直要做聖人學不能推究事理只是心粗至如顔子未至於聖人處猶是心粗問顔子初時只是天資明睿而學力精敏於聖人之言皆深曉默識未是於天下之理廓然無所不通至於所謂卓爾之地乃是廓然貫通而知之至極與聖人生知意味相似矣不審是否朱子曰是如此問顔子之學莫是先於性情上著工夫否曰然問顔子比湯如何曰顔子只據見在事業未必及湯使其成就則湯又不得比顔子前輩説禹與顔子雖是同道禹比顔子又粗些顔子比孟子則孟子當粗看磨稜合縫猶有未盡處問先生舊云顔子優於湯武如何見得曰這般處説不得據自看覺得顔子渾渾無䀶迹南軒張氏曰顔子之所至亞於聖人孔門高弟莫得而班焉及考魯論師友之所稱有曰不遷怒不二過而已有曰以能問於不能以多問於寡有若無實若虛犯而不校而已自學者觀之疑若近而易識然而顔子之所以善學聖人者實在乎此則聖門之學其大略亦可見矣問張子云顔子未到聖人處猶是心粗如何潛室陳氏曰聖人心如百分稱體統光明查滓渾化故分毫處皆照顔子未到查滓渾化地位猶未免有暗處故謂之心粗曾子程子曰曾子傳聖人學其德後來不可測安知其不至聖人如言吾得正而斃且休理會文字只看他氣象極好被他所見處大後人雖有好言語只被氣象卑終不類道曾子傳聖人道只是一箇誠篤語曰參也魯如聖人之門子遊子夏之言語子貢子張之才辨聰明者甚多卒傳聖人之道者乃質魯之人人只要一箇誠實聖人説忠信處甚多曾子孔子在時甚少後來所學不可測且易簀之事非大賢以上作不得曽子之後有子思便可見曾子易簀之際志於正而已矣無所慮也與行一不義殺一不辜而得天下不為者同心朱子曰曾子之為人敦厚質實而其學專以躬行為主故其真積力久而得以聞乎一以貫之之妙然其所以自守而終身者則固未嘗離乎孝敬信讓之規而其制行立身又專以輕富貴守貧賤不求人知為大是以從之遊者所聞雖或甚淺亦不失為謹厚修潔之人所記雖或甚疏亦必有以切於日用躬行之實曾子説話盛水不漏曾子父子相反參合下不曾見得只從日用間應事接物上積纍做去及至透徹那小處都是自家的了點當下見得甚高做處却又欠闕曾子之學大抵力行之意多子思龜山楊氏曰孔子殁羣弟子離散分處諸侯之國雖各以所聞授弟子然得其傳者蓋寡故子夏之後有田子方子方之後為莊周其去本寖逺矣獨曾子之後子思孟子之傳得其宗子思之學中庸是也朱子曰曾子大抵偏於剛毅這終是有立腳處所以其他日諸子皆無傳惟曾子獨得其傳到子思也恁地剛毅孟子也恁地剛毅惟是有這般人方始湊合得著惟是這剛毅等人方始立得定子思别無可考只孟子所稱如摽使者出諸大門之外北靣再拜稽首而不受如云事之云乎豈曰友之云乎之類這是甚麼樣剛毅孟子程子曰孟子言己志有德之言也論聖人之事造道之言也張子曰孟子於聖人猶是粗者龜山楊氏曰道之不行久矣自周衰以來處士橫議儒墨異同之辨起而是非相勝非一日也孟子以睿智剛明之材出於道學陵夷之後非堯舜之道不陳於王前非孔子之行不行於身思以道援天下紹復先王之令緒其自任可謂至矣當是之時人不知存亡之理恃強威弱挾衆暴寡以謂久安之勢在此而已夫由其道則七十里而興不由其道雖天下而亡古今之常理也彼方恃強挾衆而驟以仁義之言誘之動逆其所順則不悟其理者宜其迂闊而不足用也故轍環於齊魯晉宋之郊而道終不行亦其勢然矣雖膏澤不下於民其志不施於事業而世之賴其力亦豈鮮哉方世衰道微使儒墨之辨息而姦言詖行不得逞其志無君無父之教不行於天下而民免於禽獸則其為功非小矣古人謂孟子之功不在禹下亦足為知言也和靖尹氏曰趙岐謂孟子通五經尤長於詩書岐未為知孟子者某謂孟子精通於易孟子踐履處皆是易也試讀易一遍然後看孟子便見楊子謂孟子知言之要知德之奧非茍知之亦允蹈之此最善論孟子者五峰胡氏曰孟子生世之大弊承道之至衰藴經綸之大業進退辭受執極而不變用極而不亂屹然獨立於橫流使天下後世曉然知強大威力之不可用士所以立身大夫所以立家諸侯所以立國天王所以保天下必本諸仁義也偉哉孟子云萬物皆偹於我矣反身而誠樂莫大焉自孟子而後天下之人能立身建功就事者其言其行豈不皆有合於道然求如孟子知性者不可得也朱子曰孟子比之孔門原憲謹守必不似他然他不足以及人不足以任道孟子便擔當得事孟子不甚細膩如大匠把得繩墨定千門萬户自在答林擇之曰近略整頓孟子説見得此老直是把得定但常放教到極險處方與一斡轉斡轉後便見天理人欲直是判然非有命世之才見道極分明不能如此然亦只此便是英氣害事處便是才高無可依據處學者亦不可不知也問孟子露其才蓋亦時然而已豈孟子亦有戰國之習否曰亦是戰國之習如三代人物自是一般氣象左氏所載春秋人物又是一般氣象戰國人物又是一般氣象答呂伯恭曰如孟子論愛牛制産本末雖殊然亦聲其説於立談之間大抵聖賢之言隨機應物初無理事精粗之别其所以格君心者自其精神力量有感動人處非為恐彼逆疑吾説之迂而姑論無事之理以嘗試之也若必如此則便是世俗較計利害之私何處更有聖賢氣象耶南軒張氏曰孟子在戰國多眷眷於齊宣王其去也又遲遲而不去只為齊宣王有好善之資難為棄之耳程子曰仲尼元氣也顔子春生也孟子并秋殺盡見仲尼無所不包顔子示不違如愚之學於後世有自然之和氣不言而化者也孟子則露其才時然而已仲尼天地也顔子和風慶雲也孟子泰山巖巖之氣象也觀其言皆可以見之矣仲尼無迹顔子微有迹孟子其迹著以下論孔顔曾思孟孔子儘是明快人顔子豈弟孟子儘雄辨或謂孔子尊周孟子欲齊王行王政何也曰譬如一樹有可栽培之理則栽培之不然須種聖賢何心視天命之改與未改爾魯衛齊梁之君不足與有為孔孟非不知也然自任以道則無不可為者也孔子為宰則為宰為陪臣則為陪臣皆能發明大道孟子必得賔師之位然後能明其道猶之有許大形象然後為泰山許多水然後為海以此未及孔子孔子沒曾子之道日益光大傳孔子之道者曾子而已曾子傳之子思子思傳之孟子孟子死不得其傳至孟子而聖人之道益尊孔孟之分只是要别箇聖人賢人如孟子若為孔子事業則儘做得只是難似聖人譬如翦綵以為花花則無不似處只是無他造化功綏斯來動斯和此是不可及處仲尼聖人其道大當定哀之時人莫不尊之後弟子各以其所學行異端遂起至孟子時不得不辨也問使孔孟同時將與孔子並駕其説于天下耶將學孔子耶曰安能並駕雖顔子亦未達一間耳顔孟雖無大優劣觀其立言孟子終未及顔子顔子默識曽子篤信得聖人之道者二人也顔回在陋巷淡然進德其聲氣若不可聞者有孔子在焉若孟子安得不以行道為己任哉孟子有功於道為萬世之師其才雄只見雄才便是不及孔子處人須當學顔子便入聖人氣象孟子之於道若溫淳淵懿未有如顔子者於聖人幾矣後世謂之亞聖容有取焉顔子具體顧微耳在充之而已孟子生而大全顧未粹耳在養之而已人有顔子之德則有孟子之事功孟子之事功與禹稷並傳經為難如聖人之後才百年傳之己差聖人之學若非子思孟子則幾乎息矣道何嘗息只是人不由之道非亡也幽厲不由也上蔡謝氏曰孔子曰天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何於天之將喪斯文下便言後死者不得與於斯文則是文之興喪在孔子與天為一矣蓋聖人德盛與天為一出此等語自不覺耳孟子地位未能到此故曰天未欲平治天下也如欲平治天下當今之世舍我其誰聽天所命未能合一孔子曰事君盡禮人以為諂當時諸國君相怎生當得他聖人恁地禮數是他只管行禮又不與你計較長短與上夫夫言便誾誾如也與下大夫言便侃侃如也冕者瞽者見之便作過之便趨蓋其德全盛自然到此不是勉強做出來氣象與孟子渾别孟子説大人則藐之勿視其巍巍然猶自參較彼我未有合一底氣象人之氣稟不同顔子似弱孟子似強顔子具體而微所謂具體者合下來有恁地氣象但未彰著耳微如易知微知彰微顯闡幽之微孟子強勇以身任道後車數十乘從者數百人所至王侯分庭抗禮壁立萬仞誰敢正覷著非孟子恁地手腳也撑拄此事不去雖然猶有大底氣象未能消磨得盡不然藐大人等語言不説出來所以見他未至聖人地位顔子充擴其學孟子能為其大孟子之才甚高顔子之學粹美或問古來誰好學和靖尹氏曰惟孔子好學曰孔子猶好學乎曰孔子言我非生而知之好古敏以求之又言十室之邑必有忠信如丘者焉不如丘之好學也豈不是惟孔子好學孔子又非妄言以欺天下後世者其次莫如顔子問朝以道謂以孔子賢於堯舜私孔子者也以孟子配孔子卑孔子也此語如何曰不須如此較優劣惟韓退之説得最好自堯舜相傳至孔子孟子軻死不得其傳便是五峰胡氏曰皇皇天命其無息也體之而不息者聖人也是故孔子學不厭教不倦顔子晞夫子欲罷而不能孟子承先聖周旋而不舍我知其久於仁矣學之道莫過乎繹孔子孟軻之遺文孔子定書刪詩繫易作春秋何區區於空言所以上承天意下憫斯人故丁寧反覆三四不倦使人知所以正心誠意修身齊家治國平天下之本也孟軻氏間先聖之道慨然憂世見齊梁之君開陳理義提世大綱一掃東周五霸之弊發興廢撥亂之心其傳聖人之道純乎純者也朱子曰觀聖賢代作未有孔子便無論語之書未有孟子便無孟子之書問顔子合下完具只是小要漸漸恢廓孟子合下大只是未粹要索學以克之此莫是才具有異曰然孟子覺有動蕩底意思問伊川云聖人與理為一無過不及中而已敢問顔子擇乎中庸未見其止嘆夫子瞻前忽後則過不及雖不見於言行而亦嘗動於心矣此亦是失否曰此一假説得好聖人只是一箇中底道理問若使曾子為邦比顔子如何曰想得不似顔子熟然曾子亦大故有力曾子子思孟子大略皆相似孔門弟子如子貢後來見識煞高然終不及曾子今人只見曾子唯一貫之旨遂得道統之傳此雖固然但曾子平日是箇剛毅有力量壁立千仞底人觀其所謂士不可以不𢎞毅可以託六尺之孤可以寄百里之命臨大節而不可奪晉楚之富不可及也彼以其富我以吾仁彼以其爵我以吾義吾何慊乎哉底言語可見雖是做工夫處比顔子覺粗然緣他資質剛毅先自把捉得定故得卒傳夫子之道後來有子思孟子其傳永逺孟子氣象尤可見曾子本是魯拙後既有所得故守得夫子規矩定其教人有法所以有傳若子貢則甚敏見得易然又雜往往教人亦不似曾子守定規矩故其後無傳問顔淵仲弓不同曰聖人之德自是無不備其次則自是易得不備如顔子已是煞周全了只比之聖人更有些未完如仲弓則偏於淳篤而少顔子剛明之意孔門只一箇顔子合下天資純粹到曾子便過於剛與孟子相似世衰道微人欲橫流不是剛徑有腳跟底人定立不住孟子才高學之無可依據為他元來見識自高顔子才雖未嘗不高然其學却細膩切實所以學者有用力處孟子終是粗伊川曰學者須是學顔子孟子説得粗不甚子細只是他才高自至那地位若學者學他或會錯認了他意思若顔子説話便可下手做孟子底更須解説方得問孟子無可依據學者當學顔子如養氣處豈得謂無可依據曰孟子皆是要用顔子曾就己做工夫所以學顔子則不錯問顔子春生孟子并秋殺盡見曰仲尼無不包顔子方露出春生之意如無伐善無施勞是也使此更不露便是孔子孟子便如秋殺都發出來露其才如所謂英氣是發用處都見孟子明則動矣未變也顔子動則變矣未化也潛室陳氏曰顔子一身渾是義理不知有人孟子見義理之無窮惟知反已顔子之量無涯孟子之言有迹問謝顯道謂顔子學得親切如孟子不知顔子所學甚處與孟子相似曰學顔子有依據孟子才高難學蓋顔子之學親切勝如孟子也雙峰饒氏曰顔孟均之為大賢也而一可學一難學者顔子如和風慶雲人皆可以即之孟子如泰山巖巖可望而不可攀其規模氣象之不同亦以氣稟之有異故也魯齋許氏曰陽貨以不仁不智劫聖人聖人應得甚間暇他人則或以卑遜取辱或以剛直取禍或不能禦其勃然之勢必不得停當聖人則辭遜而不卑道存而不亢或曰孟子遭此如何曰必露精神孔孟門人程子曰子貢之知亞於顔子知至而未能至之者也強者易抑子路是也弱者難強宰我是也或問孔子許子路升堂其品第甚高何以見龜山楊氏曰觀其死猶不忘結纓非其所養素定何能爾耶茍非其人則遑遽急迫之際方寸亂矣朱子曰曾點之志如鳯凰翔於千仞之上曾點見得事事物物上皆是天理流行良辰美景與幾箇好朋友行樂他看見日用之間莫非天理在在處處莫非可樂他自見得那春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸處此是可樂天理曾點見道無疑心不纍事其胸次灑落有非言語所能形容者曾點有康節的意思將那一箇物玩弄曾點開闊漆雕開深穩問曽點氣象曰曾點氣象固是從容灑落然須見得他因甚得如此始得若見得如此自然見得他做得堯舜事業處子路全義理孟子極尊敬子路夫子乘桴之嘆獨許子路之能從而子路聞之果以為喜且看此等處聖賢氣象是如何世間許多紛紛擾擾如百千蚊蚋鼓發狂閙何嘗入得他胸次耶若此等處放不下更説甚克己復禮直是無交涉也子路仕衛之失前輩論之多矣然却是見不到非知其非義而茍為也問孔門學者如子張全然務外不知如何地學却如此曰也干他學甚事他在聖門亦豈不曉得為學之要只是資質是箇務外的人所以終身只是這意思子路是箇好勇底人終身只是説出那勇底話而今學者間時都會説道理當如何只是臨事時依前只是他那本來底靣目出來都不如那間時所説者子張過高子夏窄狹子張是箇務外之人子遊是箇高簡虛曠不屑細務的人子夏是箇謹守規矩嚴毅底人子貢俊敏子夏謹嚴但將論語子夏之言看甚嚴毅孔子門人自顔曾而下惟二子後來想大故長進吳公言偃恱周公仲尼之道而北學於中國身通受業遂因文學以得聖人之一體豈不可謂豪傑之士哉今以論語考其話言類皆簡易疏通高暢宏達其曰本之則無者雖若見詘於子夏然要為知有本也則其所謂文學固宜有以異乎今世之文學矣既又考其行事則武城之政不小其邑而必以詩書禮樂為先務其視有勇足民之效蓋有不足為者至使聖師為之莞爾而笑則其與之之意豈淺淺哉及其取人則又以二事之細而得滅明之賢亦其意氣之感默有以相契者以故近世論者意其為人必當敏於聞道而不滯於形器豈所謂南方之學得其精華者乃自古而已然也耶問孟子恁地而公孫萬章之徒皆無所得曰他只是逐孟子上上下下不曾自去理會又曰孔子於門人恁地提撕警覺尚有多少病痛西山真氏曰閔子言行見於論語者唯四章合而言之見其躬至孝之行辭不義之祿氣和而正言謹而確此其所以亞於顔淵而與曾子並稱也歟性理大全書卷三十八

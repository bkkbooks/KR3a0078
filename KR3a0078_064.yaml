body:
  text: 性理大全書卷六十四厯代五代後唐明宗致堂胡氏曰明宗美善頗多過舉亦不至甚求於漢唐之間蓋亦賢主也其尤足稱者內無聲色外無遊畋不任宦官廢內藏庫賞亷吏治臧蠧若輔相得賢則其過舉當又損矣其焚香祝天之言發於誠心天既厭亂遂生聖人用是觀之天人交感之理不可誣矣後周世宗朱子曰周世宗規模雖大然性迫無甚寬大氣象做好事亦做教顯顯地都無些含洪之意亦是數短而然晉悼公幼年聰慧似周世宗只是世宗却得太祖接續他做將去雖不是一家人以公天下言之畢竟是得人接續所做許多規模不枉却且如周武帝一時也自做得好只是後嗣便如此弱了後來雖得一箇隋文帝終是不甚濟事周世宗亦可謂有天下之量才見元稹均田圖便慨然有意周世宗天資髙於人才中尋得箇王朴來用不數年間做了許多事業且如禮樂律厯等事想見他都會得故能用其説成其事馮道程子曰馮道更相數主皆其讐也安定以為當五代之季生民不至於肝腦塗地者道有力焉雖事讐無傷也荀彧佐曹操誅伐而卒死於操君實以為東漢之衰彧與攸視天下無足與安劉氏者惟操為可依故俯首從之方是時未知操有他志也君子曰在道為不忠在彧為不智如以為事固有輕重之權吾方以天下為心未暇恤人議己也則枉己者未有能直人者也涑水司馬氏曰忠臣不二君賢女不二夫䇿名委質有死無二天之制也彼馮道者存則何心以臨前代之民死則何面以見前代之君自古人臣不忠未有如此比者然而尊官重祿老以沒齒何哉夫為國家者明理義奬忠良褒義烈誅姦回以厲羣臣猶愛死而忘其君况相印將節以寵叛臣其不能永享天命宜矣然庸愚之人往往猶稱其智蓋五代披攘人主嵗昜羣臣失節比踵於朝因而譽之欲以自釋余恐後世以道所為為合於理君臣之道將大壞矣臣而不臣雖云其智安所用哉宋太祖元城劉氏司太祖極好讀書每夜於寢殿中看厯代史或至夜分但人不知及口不言耳至與大臣論事時出一語往往盡利害之實又曰太祖既平孟蜀而兩浙錢王入朝羣臣自趙普以下爭欲留之聖意不允一日趙相拉晉王於後殿奏事畢晉王從容言錢王事太祖曰我平生不曾欺善怕惡不容昜留住這漢候捉得河東薛王令納土於後數日錢王陛辭太祖封一軸文字與錢王曰到杭州開之錢王至杭會其下開視乃滿朝臣僚乞留錢王表劄君臣北靣再拜謝恩至太平興國四年河東已平乃令錢王納土太祖此意何也馬永卿對曰此所謂不欺善也曰此固然也錢氏久據兩浙李氏不能侵藉使錢王納土使大將鎮之未必能用其民須本朝兵去鎮服又未必能守兩浙必不敢附李氏李氏既平則兩浙安歸乎此聖模之宏逺也或言太祖受命盡除五代弊法用能昜亂為治朱子曰不然只是去其甚者其他法令條目多仍其舊大凡做事底人多是先其大綱其他節目可因則因此方是英雄手段問藝祖平定天下如破竹而河東獨難取何耶以為兵強則一時政事所為皆有敗亡之勢不知何故如此曰這却本是他家底郭威乘其主幼而奪之劉氏遂據有并州若使柴氏得天下則劉氏必不服所以太祖以書喻之謂本與他無讐隙渠答云不忍劉氏之不血食也此其意可見矣被他辭直理順了所以難取太宗真宗仁宗朱子曰太宗真宗之朝可以有為而不為太宗每日看太平廣記數卷若能推此心去講學那裏得來不過寫字作詩君臣之間以此度日而已真宗東封西祀糜費巨萬計不曾做得一事仁宗有意於為治不肯安於小成要做極治之事只是資質慈仁却不甚通曉用人驟進驟退終不曾做得一事然百姓戴之如父母契丹初陵中國後來却服仁宗之德也是慈仁之效緣他至誠惻怛故能動人如此神宗朱子曰神宗鋭意為治用人便一向傾信他初用富鄭公甚傾信及論兵鄭公曰願陛下二十年不可道著用兵二字神宗只要做鄭公只要不做説不合後來傾信王介甫終是坐此病只管好用兵用得又不著費了無限財穀殺了無限人殘民蠧物之政皆從此起神宗極聰明於天下事無不通曉真不世出之主只是頭頭做得不中節拍如王介甫為相亦是不世出之資只緣學術不正當遂悮天下使神宗得一真儒而用之那裏得來此亦氣數使然天地生此人便有所偏了欽宗朱子曰欽宗勤儉慈仁出於天資當時親出詔答所論事理皆是但於臣下賢否邪正辨别不分明又無剛健勇決之操才説著用兵便恐懼遂致播遷之禍言之使人痛心孝宗問或言孝宗於內殿置御屏書天下監司帥臣郡守姓名作揭帖於其上果否朱子曰有之孝宗是甚次第英武劉恭甫奏事便殿嘗見一馬在殿庭間不動疑之一日問王公明公明曰此刻木為之者上萬機之暇即御之以習據鞍騎射故也孝宗小年極鈍髙宗一日出對廷臣云夜來不得睡或問何故云看小兒讀書念不得甚以為憂某人進云帝王之學只要知興亡治亂初不在記誦上意方少解後來却恁地聰明寧宗寧宗即位踰月留揆以一二事忤旨特批逐之人方服其英斷朱子被召至上饒聞之有憂色曰人心昜驕如此某今方知可懼或問曰某人専恣當逐何懼之有曰大臣進退亦當存其體貌豈宜如此又問恐是廟堂諸公難其去故以此勸上逐之曰亦不可如此何不使其徒諭之以物論不佳恐丞相久勞機務或欲均佚俟其請去而後許之則善矣幼主新立豈可𨗳之以輕遂大臣耶向敏中王隨程子曰本朝向敏中號有度量至作相却與張齊賢爭取一妻為其有一萬囊槖故也王隨亦有德行仁宗嘗稱王隨德行李淑文章至作相肅端公欲得作三路運使及退隨語堂中人曰何不以溺自照看做得三路運使無皆量所動也今人何嘗不動只得綾寫一卷便動又干他身分甚事楊億朱子曰楊億工於纎麗浮巧之文已非知道者所為然資稟清介立朝獻替略有可觀而釋子特以為知道者以其有八角磨盤之句耳然既謂之知釋氏之道則於死生之際宜亦有過人者而方丁謂之逐萊公也以他事召億至中書億乃恐懼至於便液俱下靣無人色當此時也八角磨盤果安在哉范仲淹程子曰張橫渠謂范文正才氣老成朱子曰范文正傑出之才近得周益公書論吕范解仇事曰初范公在朝大臣多忌之及為開封府又為百官圖以獻因指其遷進遲速次序曰某為超遷某為左遷如是而為公如是而為私意頗在吕相吕不樂由是落職出知饒州未幾吕亦罷相後吕公再入元昊方犯邉乃以公經略西事公亦樂為之用嘗奏記吕公云相公有汾陽之才之德仲淹無臨淮之才之力後歐陽公為范公神道碑有歡然相得戳力平賊之語正謂是也公之子堯夫乃以為不然遂刋去此語前書今集中亦不載疑亦堯夫所刪他如叢談所記説得更乖某謂吕公方寸隱微雖未可測然其補過之功使天下實被其賜有不可得而掩者范文正公平日胸襟豁達毅然以天下國家為己任既為吕公而出豈復更有匿怨之意况公嘗自謂平生無怨惡於一人此言尤可驗忠宣固是賢者然其規模廣狹與乃翁不能無間意謂前日既排申公今日若與之解仇前後似不相應故諱言之却不知乃翁心事政不如此范文正公自做秀才時便以天下為己任無一事不理會過一旦仁宗大用之便做出許多事業今則所謂負剛大之氣者且先一筆勾斷稱停到第四五等人器宇厭厭布列臺諫如何得事成故某向謂姓名未出而內外已知其非天下第一流矣問范文正公振作士大夫之功為多不知使范公處韓公受顧命之時處事亦能如諱公否曰看范公才氣亦須做得又曰祖宗以來名相如李文靖王文正諸公只恁善亦不得至范文正時便大厲名節振作士氣故振作士大夫之功為多韓琦程子嘗與韓公范公泛舟於頴湖有屬吏求見韓公公既已見之退而不悅曰謂其以職事來也乃求薦舉耳程子曰公為州太守不能求之顧使人求君乎范公曰子之固每若是也夫今世之仕者求舉於其上蓋常事耳程子曰是何言也不有求者則遺而不及知也是以使之求之歟韓公無以語愧且悔者久之程子顧范公曰韓公可謂服義矣朱子曰韓魏公為相或謂公之德業無愧古人但文章有所不逮公曰某為相歐陽永叔為翰林學士天下之文章莫大於是韓魏公作相溫公在言路凡事頗不以魏公為然魏公甚被他激撓後來溫公作魏公祠堂記却説得魏公事分明見得魏公不可及處溫公方心服他記中所載魏公之言曰凡為臣者盡力以事君死生以之顧事之是非何如耳至於成敗天也豈可豫憂其不成遂輟不為哉公為此言時乃神宗之末英宗之初蓋朝廷多故之時也南軒張氏曰韓魏公登第時唱名未終大史奏五色雲見未幾色映殿庭此不偶然魏公後來果有大功於社稷司馬光程子曰司馬君實能受盡言故與之言必盡又曰能受盡言儘人忤逆終不怒便是好處君實之語自謂如人參甘草病未甚時可用也病甚則非所能及觀其自處必是有救之之術問司馬公辭副樞名冠一時天下無賢不肖浩然歸重吕申公亦以論新法不合罷歸熙寧末取公起知河陽先生以詩送行復為詩與溫公蓋恐其以不出為髙也及申公自河陽乞在京宫祠神宗大喜召登樞府人以二公出處為優劣曰吕公世臣不得不歸見上司馬公諍臣不得不退處朱子曰溫公可謂知仁勇他那活國救世處是甚次第其規模稍大又有學問其人嚴而正南軒張氏曰司馬溫公改新法或勸其防後患使他人答之必曰茍利社稷遑恤其他只如此説已自好使某答之亦不過如此溫公乃曰天若祚宋必無此事更不論一己利害想其平日所養故臨事發言能如是中理雖聖人不過如此説近於終條理者矣吕公著吕申公常薦處士常秩秩既起他日稍變其節申公謂知人實難以語程子且告之悔程子曰然不可以是而懈好賢之心也申公矍然謝之上蔡謝氏曰申公寡言在中書議事衆人議畢然後以一語去取之人亦不能昜其議至於用人於己分合除得若干人須教是當初自洛中上君道十篇不止可用於當時為君之道幾無出此王安石程子曰介甫之言道以文焉耳矣言道如此已則不能然是己與道二也夫有道者不矜於文學之門啓口容聲皆至德也或曰未有大臣如介甫得君者曰介甫自知之其求去自表於上曰忠不足取信事事待於自明使君臣之契果深而有是言乎王介甫當初只是要行己志恐天下有異同故只去上心上把得定他人不能搖以是拒絶言路進用柔侫之人使之奉行新法今則是他已去不知今日却留下害事洓水司馬氏曰介甫文章節義過人處甚多但性不曉事而喜遂非致忠直踈逺讒侫輻輳敗壞百度以至於此龜山楊氏曰神宗嘗問伯淳王安石如何人伯淳云安石博學多文則有之守約則未也又嘗問是聖人否伯淳云詩稱周公公孫碩膚赤舄几几聖人蓋如此若安石剛褊自任恐聖人不然荆公云利者陰也陰當隱伏義者陽也陽當宣著此説源流發於董仲舒然此正是王氏心術之蔽觀其所為雖名為義實為利以此觀王氏之學其治天下専講求法度如彼修身之潔宜足以化民矣然卒不逮王文正吕晦叔司馬君實諸人者以其所為無誠意故也明道嘗曰有關雎麟趾之意然後可以行周官之法度蓋深達乎此元城劉氏謂馬永卿曰金陵有三不足之説聞之乎永卿曰未聞曰金陵用事同朝起而攻之金陵闢衆論進言於上曰天變不足懼祖宗不足法人言不足恤此三句非獨為趙氏禍乃為萬世禍也司馬溫公嘗云人主之勢天下無能敵者或有過舉人臣欲回之必思有大於此者把攬庶幾可回也天子者天之子也今天變乃天怒也必有災禍或可回也今乃教人主使不畏天變不法祖宗不恤人言則何等事不可為也永卿曰此言為萬世禍或有術可以絶此言使不傳於後世乎曰安可絶也此言一出天下人皆聞之不若著論明辨之曰此乃禍天下後世之言雖聞之不可從也譬如毒藥不可絶而神農與厯代名醫言之曰此乃毒藥如何形色食之必殺人故後人見而識之必不食也今乃絶之不以告人既不能絶而人誤食之死矣樂菴李氏曰荆公長處甚多亦不易得方其執政時豈有意壞亂天下第所見有不到處故溫公曰介甫無他但執拗爾此言中荆公之病可謂公論或論荆公云他當時不合於法度上理會朱子曰法度如何不理會只是他所理會非三代法度耳問荆公節儉恬退素行亦好曰他當時作此事已不合中如孔子於飲食衣服之間亦豈務滅裂他當初便只苟簡要似一苦行然問王介甫其心本欲救民後來弄壞者乃過誤致然曰不然正如醫者治病其心豈不欲活人却將砒霜與人喫及病者死却云我心本欲救其病死非我之罪可乎介甫之心固欲救人然其術足以殺人豈可謂非其罪南軒張氏曰王介甫藝拗只是不曉事若是曉事言有當於吾心者當幡然而改矣范純仁程子曰范公堯夫之寬大也昔余過成都公時攝帥有言公於朝者朝廷遣中使降香峨眉實察之也公一日訪豫欵語豫問曰聞中使在此公何睱也公曰不爾則拘束已而中使果怒以鞭傷傳言者耳屬官喜謂公曰此一事足以塞其謗請聞於朝公既不折言者之為非又不奏中使之過其有量如此鄒浩或曰鄒浩以極諫得罪世疑其賣直也程子曰君子之於人當於有過中求無過不當於無過中求有過曾肇龜山楊氏曰曾子開不以顔色語言假借人其慎重為得大臣之體於今可以庶幾前輩風流者惟此一人耳宗澤李綱朱子曰宗澤守京城治兵禦戎以圖恢復之計無所不至上表乞回鑾數十表乞不南幸乞修二聖宫殿論不割地其所建論所謀畫是非利害昭然可觀觀其勢駸駸乎中興之基矣耿南仲沮之於南京時使不歸京城汪黃沮之淮甸時動相掣肘使不得一有所為惟天下之義莫大於君臣其所以纒綿固結而不可解者是皆生於人心之本然而非有所待於外也然而世哀俗薄學廢不講則雖其中心之所固有亦且淪胥陷溺而為全軀保妻子之計以後其君者往往接迹於當世有能奮然拔起於其間如李公之為人知有君父而不知有其身知天下之有安危而不知其身之有禍福雖以讒間竄斥屢瀕几死而其愛君憂國之志終有不可得而奪者是亦可謂一世之偉人矣汪伯彥黃潛朱子曰舜舉十六相誅四凶如此方恰好兩邉方停勻後世都不然惟小人得志耳方天下無事之時則端人正士行義謹飭之士為小人排擯不能一日安於朝廷遷竄貶謫及擾攘多故之秋所謂忠臣義士者犯水火蹈白刃以捐其軀而小人者平世固是他享富貴及亂世亦是他獨寬縱橫顛倒無非是他得志之日君子者常不幸而小人者常幸也如汪黃在髙宗初年為宰相後來竄廣中正中原多故之日却是好好送他去廣中避盜及事稍定依舊取他出來為官髙宗初啓中興而此等人為宰相如何有恢復之望在維揚時畨人兵矢簇在胸前了他猶自不管世間有此愚人趙鼎或問中興賢相皆推趙忠簡公如何朱子曰看他做來做去亦只是王茂洪規模當時廟論大槩亦主和議使當國久未必不出於和但就和上却須有些計較如嵗幣稱呼疆土之類不至一一聽命如秦檜之樣草草地和了後來秦沒意智乃以不合沮撓和議為詞貶之却十分送箇好題目與他問趙妨處何如曰意思好又孜孜汲引善類但其行事亦有不強人意處趙丞相中興名臣一人而已然當時不滿人意處亦多且如好伊洛之學又不大段理會得故皆為人以是欺之沈公雅言趙丞相鎮靜德量之懿而諳練事機則恐於秦公不逮張子恭以為不然且曰燾在都司日忠簡為相有建議者公必計曰如是則利在上而害在民如是則害在上而利在民今須如此行則利澤均而公私便至秦公則僚屬凡有關白默無一語而屬諸吏事出則皆吏輩所為而非復前日之所擬或問趙忠簡公南軒張氏曰人品甚髙如元祐黨籍至忠簡始除五峯云過江來如趙丞相做得五分宰相若充以學須做成十分洪皓西山真氏曰蘇武之還自胸奴也詔拜為典屬國賜錢百萬緡田宅副焉洪忠宣公之節亡愧蘇武而髙宗皇帝之所以寵錫者有過漢庭其褒表忠義皆可為後世法然武不幸見抑於霍光公亦不幸逢怒於秦檜武之見抑不過不為公卿爾而公方違陰山之壯復貶瘴海之南是公之不幸視子卿為甚而檜之罪又浮於博陸也張浚張俊韓世忠劉光世嶽飛朱子曰張魏公材力雖不逮而忠義之心雖婦人孺子亦皆知之故當時天下之人惟恐其不得用張魏公不與人共事有自為之意也是當時可共事之人少然亦不可如此天下事未有不與人共而能濟者問如張韓劉嶽之徒富貴已極如何責他死了宜其不可用若論數將之才則嶽飛為勝然飛亦橫只是他猶欲向前厮殺曰便是如此有才者又有些毛病然亦上靣人不能駕馭他若撞著周世宗趙太祖那裏怕他駕馭起皆是名將緣上之舉措無以服其心所謂得罪於巨室者也人問劉光世本無能然却軍心向他其裨將亦多可用者張魏公撫師淮上督劉光世進軍是時虜人正大舉入冦光世恐懼遂背後懇趙忠簡是時趙為相折彥質為樞密折助之請樞密院遂命劉光世退軍魏公聞之大怒遂趕回劉光世約束云如一人一馬渡江者皆斬光世遂不敢渡江便回淮上樞府一靣令退軍而宣撫令進軍淮上然終退怯魏公既還朝遂力言光世巽懦不堪用罷之而命吕安老董其軍及安老為瓊等所殺降劉豫魏公由是得罪而趙忠簡復相趙既相遂復舉劉光世為將都弄成私意魏公已自罷得劉光世好了雖吕安老敗事然復舉能者而任之亦足矣何必須光世哉此皆趙之私意以某觀之必竟魏公去得光世是而趙所為非豈有虜人方入你却欲掉了去一邉令進軍一邉令退軍如何作事因言諸將驕橫張與韓較與髙宗密故二人得全嶽飛較踈髙宗又忌之遂為秦所誅而諱世忠破膽矣只有韓世忠在大儀鎮算殺得虜人一陳好髙宗初遣魏良臣往虜中講和令韓世忠退師渡江韓聞魏將至知其欲講和也遂留之云某方在此措置得略好正抵當得虜人住大功埀成而主上乃令退還何也魏云主上方與大金講和以息兩國之民恐邉將生事敗盟故欲召公還慎勿違上意韓再三嘆息以為可惜又云既上意如此只得抽軍歸耳遂命士卒束裝即日為歸計魏遂渡淮兀术問以韓世忠已還否魏答以某來時韓世忠正治疊行即日起離矣兀术再三審之知其然遂稍弛偹世忠乘其懈回軍奮擊之兀术大敗魏良臣皇恐無地再三求哀云實見韓將回不知其紿已乃得免嶽飛恃才不自晦郭子儀晚節保身甚闒茸然當緊要處又不然單騎見虜是也飛作副樞便直是要去做張韓知其謀便只依違然便不做亦不免直是忠勇故也秦檜或問胡文定公與秦丞相厚善之故朱子曰秦會之嘗為密教翟公巽時知密州薦試宏詞遊定夫過密與之同飯於翟竒之後康侯問人才於定夫首以會之為對云其人類荀文若又云無事不會京城破虜欲立張邦昌執政而下無敢有異議惟會之抗疏以為不可康侯亦義其所為力言於張德逺諸公之前後會之自海上歸與聞國政康侯屬望尢切嘗有書疏往來講論國政康侯有詞掖講筵之召則會之薦也然其雅意堅不欲就是必已窺見其微隱有難處者故以老病辭後來會之做出大疏脫則康侯已謝世矣定夫之後及康侯諸子會之皆擢用之又曰此老當國却留意故家子弟往往被他牢籠出去多墜家聲獨胡明仲兄弟却有樹立終是不歸附他嘗問和仲先世遺文因曰先公議論好但只是行不得和仲曰聞之先人所以謂之好議論政以其可以措諸行事何故却行不得答曰公不知便是六經也有説得行不得處此是這老子由中之言看來聖賢説話他只將做一件好底物事安頓在那裏又曰此老千鬼百怪如不樂這人貶竄將去却與他通殷勤不絶一日忽招和仲飯意極拳拳比其還家則臺章已下又送白金為贐如欲論去之人章疏多是自為以授言者做得甚好傅安道諸公往往認得如見彈洪慶善章曰此秦老筆也秦老倡和議以誤國挾虜勢以邀君終使彞倫斁壞遺親後君此其罪之大者至於戮及元老賊害忠良攘人之功以為已有又不與也胡銓南軒張氏語門人曰胡淡庵大節極好曾見其諫書否門人對曰見之曰雖與日月爭光可也張九成李椿朱子曰張子韶人物甚偉髙廟時除講筵嘗有所奏陳上云朕是一箇至誠張奏云陛下對羣臣時如此退居禁中時不知如何云亦只是箇誠又問對宫嬪時如何上方經營答語間張便奏云只此便是不誠蓋髙宗容諫故臣下得以盡言直敷文閣李公椿莊重簡淡嶷然有守泊然無欲喜怒不形見於色故人不可得而親踈而中夷易平直亷不近名介不絶物應事存心悉主於厚平生未嘗失節於權幸然非有意以矯屬為髙也總論程子曰熙寧中洛陽以清德為朝廷尊禮者大臣曰富韓公侍從曰司馬溫公吕申公位卿監以清德早退者十餘人好學樂善有行義者幾二十人邵先生隱居謝聘皆相從忠厚之風聞於天下里中後生皆知畏亷恥欲行一事必曰無為不善恐司馬端明邵先生知嘗觀自三代而下本朝有超越古今者五事如百年無內亂四聖百年受命之日市不昜肆百年未嘗誅殺大臣至誠以待夷狄此皆大抵以忠厚亷恥為之綱紀故能如此蓋睿主開基規模自别武夷胡氏曰自熙寧元祐靖國間事變屢更當其時固有名蓋天下致位廟堂得行所學者然夷考其事猶有憾焉如張天祺朱光掞等可謂奮不顧身盡忠許國而議論亦多過矣乃知理未昜窮義未易精言未易知心未昜盡聖賢事業未昜到也臨川吳氏曰韓司徒張文成侯漢丞相諸葛忠武侯唐司空狄文惠公宋參知政事范文正公四人之功業不盡同而其為百代殊絶之人物則一文成身事漢而心在報韓讐文惠身事周而心在復唐祚常人莫能測知卒克遂其志故邵子稱其忠且智焉忠武扶漢於末造文正佐宋於盛際器局公平廣大設施精審詳密心事如青天白日遘時雖異易地則皆然故朱子稱其磊磊落落無纎芥之可疑也性理大全書卷六十四

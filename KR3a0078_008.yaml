正者耶人能正而復有待者耶知其説者從天地之道而不為私焉始可與言聲音者矣天有隂陽地有剛柔律有闢翕呂有唱和一隂一陽交而日月星辰備焉一柔一剛交而金木水火備焉一闢一翕交而平上去入備焉一唱一和交而開發收閉備焉日月星辰備而萬情生焉金木水火備而萬形成焉平上去入備而萬聲生焉開發收閉備而萬音生焉律隨天而變吕隨地而化闢隨陽而出翕隨隂而入唱隨剛而上和隨柔而下然後律吕隨音宫徴角羽之道各得其正矣陽生日隂生月剛生星柔生辰剛生金柔生土陽生火隂生水日月星辰金土火水而天地正焉是知律吕聲音之道可以行天地矣日生目月生耳星生鼻辰生口金生氣土生味火生色水生聲目耳鼻口氣味色聲正而人道數十正焉是知律吕聲音之道可以行人事矣目之體耳之體數十二鼻之體數十口之體數十二氣之體數十味之體數十二色之體數十聲之體數十二進目鼻氣色之體數退耳口味聲之體數是為正律之用數進耳口味聲之體數退目鼻氣色之骨體數是為正吕之用數以正律之用數協正吕之用數是謂正音之用數以正吕之用數和正律之用數是謂正聲之用數正律之用數一百一十二正吕之用數一百五十二正聲之用數萬有七千二十四正音之用數萬有七千二十四律感吕而聲生焉吕感律而音生焉律吕與天地同和聲音與律吕同順是故古之聖王見天地萬物之情暢然後作樂以崇之命工以和之以詩言志以歌永言以聲依永以律和聲此所謂八音克諧而百獸率舞人神以和而鳯凰來儀則是學也豈直言釋音文義而已哉祝氏涇曰宫商角徴羽分太少為十聲管以十千六律六吕合為十二音管以十二支攝之以聲音之字母二百六十四聲分平上去入分開發收閉鋪布悉備為圖三千八百四十圖各十六聲十六音總三萬四千四十八音聲蓋取天聲有字無字與無聲字一百六十位地音有字無字與無音字一百九十二位衍忒而成之聲之位去不用之四十八止百十二所以括唐韻之內外八轉而分平上去入也音之位去不用之四十止百五十二所以括切字母唇舌牙齒喉而分開發收閉也謂之無聲百六十位中有位而調不出者謂之無音百九十二位中有位而切不出者以聲音統攝萬物之變及於無聲無音則備矣其間有聲有音雖無字皆洪纎高下遂其生育者也若有聲而無音有音而無聲則天地不相唱和獨陽不生獨隂不成圖有其位實無其物也聲音字母二百六十四相交而互變始于一萬七千二十四極於二萬八千九百八十一萬六千五百七十六以取挂一之二百五十六卦以觀天地萬物之進退盈虛消長也上官氏萬里曰自胡僧了義以三十六字為翻切母奪造化之巧司馬公指掌圖為四聲等字蒙古韻以一聲該四聲皆不出了義區域蓋但欲為翻切用而未及於物理也惟皇極用聲音之法超越前古以聲起數以數合卦而萬物可得而推矣詳見祝氏鈴而祝氏又或與康節有異同處彭氏長庚曰鄭夾際云四聲為經七音為緯江左之儒為韻書知縱有四聲而不知衡有七音縱成經衡成緯經緯不交所以失立韻之源今考經世書聲為律音為吕律為唱吕為和一經一緯一縱一橫而聲音之全數具矣聲有十音有十二者如甲至癸十子至亥十二也於聲之用數中去音之體數四十八於音之用數中去聲之體數四十者如天數無十地數無一也以聲配音而切韻生焉翕闢清濁辨焉三萬四千四十八音聲在其中矣天下之聲既具而天下之色若臭若味皆在其中矣此所以為萬物之數也黃氏瑞節曰邵子之書伯溫略發其微至祝氏而其説詳其用異蔡氏蓋由博而之約也右四象體用圖取本書櫽括為凡例今以本書詳之日月星辰四象為聲日月星辰又自相加水火土石四象為音水火土石又自相加亦如八卦相加為六十四也其為圖凡三十二平上去入各聲為四圖共一十六圖開發收閉各音為四圖共一十六圖聲之數每圖一千六十四十六圖共一萬七千二十四音之數間有出入十六圖亦一萬七千二十四蓋平上去入開發收閉分布細推以得之也蔡氏取十聲為十圖取十二音為十二圖如第一聲圖多字平聲而可個舌上去入三聲隨之矣第一音圖古字開音而甲九癸發收閉三音隨之矣至於一萬七千二十四之數但以一百十二因一百五十二以一百五十二因一百十二而得之亦合此其所以為自然之妙也若夫以聲起數以數合卦則具祝氏鈴而邵子未言蔡氏未用云邵伯溫系述曰至大之謂皇至中之謂極至正之謂經至變之謂世大中至正應變無方之謂道以道明道道非可明以物明道道斯見矣物者道之形體也生於道而道之所成也道變而為物物化而為道由是知道亦物也物亦道也孰知其變哉故善觀道者必以物善觀物者必以道謂得道而忘物則可矣必欲遠物而求道不亦妄乎有物之大莫若天地然則天地安從生道生天地而太極者道之全體也太極生兩儀兩儀形之判也兩儀生四象四象生而後天地之道備焉立天之道曰隂與陽立地之道曰柔與剛隂陽變於上而日月星辰生焉剛柔化於下而水火土石成焉日月星辰成象於天水火土石成體於地象動於上而萬時生焉體交於下而萬物成焉時有消長盈虛物有動植飛走消長盈虛者時之變也動植飛走者物之類也時以變起物以類應時之與物有數存焉數者何也道之運也理之會也隂陽之度也萬物之紀也定於幽而驗於明藏於微而顯於著所以成變化而行鬼神者也道生一一為太極一生二二為兩儀二生四四為四象四生八八為八卦八卦生六十四六十四具而後天地萬物之道備矣天地萬物莫不以一為本原於一而衍之以為萬窮天下之數而復歸於一一者何也天地之心也造化之源也日為元元者氣之始也其數一月為會會者數之交也其數十二星為運運者時之行也其數三百六十辰為世世者變之終也其數四千三百二十觀一歲之數則一元之數覩矣以大運而觀一元則一元一嵗之大者也以一元而觀一歲則一嵗一元之小者也一元統十二會三百六十運四千三百二十世歲月日時各有數焉一嵗統十二月三百六十日四千三百二十時刻分毫釐絲忽眇沒亦有數焉皆統於元而宗於一終始往來而不窮在天則為消長盈虛在人則為治亂興廢皆不能逃乎數也太陽為日太隂為月少陽為星少隂為辰太剛為火太柔為水少剛為石少柔為土陽之數十隂之數十二剛之數十柔之數十二太陽少陽太剛少剛之本數凡四十太隂少隂太柔少柔之本數凡四十有八四而因之得一百有六十是謂太陽少陽太剛少剛之體數得一百九十有二是謂太隂少隂太柔少柔之體數以隂陽剛柔之體數互相進退是謂太陽少陽太剛少剛太隂少隂太柔少柔之用數太陽少陽太剛少剛之用數一百一十二太隂少隂太柔少柔之用數一百五十二以隂陽剛柔之用數更唱迭和各得萬有七千二十四是謂日月星辰水火土石變化之數日月星辰之變數水火土石之化數是謂動植之數以日月星辰水火土石變化之數再相唱和得二萬八千九百八十一萬六千五百七十六是謂動植之通數本數者數之始也體數者數之成也用數者數之變也致用則體數退矣體數退則本數藏矣體退而本藏則變化見矣故謂之變化之數變化者生生不窮之謂也萬物者動植之謂也故謂之動植之數萬物之數滋而生焉故謂之動植之通數有數則有物數盡則物窮矣有物則有數物窮則數盡矣然數無終盡數盡則復物無終窮物窮則變變故能通復故能久日月星辰變乎暑寒晝夜者也水火土石化乎雨風露雷者也暑寒晝夜天之變而唱乎地者也雨風露雷地之化而和乎天者也一唱一和而後物生焉暑寒晝夜變乎性情形體者也雨風露雷化乎走飛草木者也性情形體本乎天而感乎地者也走飛草木本乎地而應乎天者也一感一應而後物成焉一唱一和一感一應者天地之道萬物之情也天地之道萬物之情其唯誠之謂乎凡在天地之間蠻夷華夏皆人也動植飛走皆物也人各有品物各有類品類之間有理有數存焉推之於天地而後萬物之理昭焉賾之於隂陽而後萬物之數覩焉天氣下降地氣上騰陽唱於前隂和於後然後物生焉天地有至美隂陽有至精物之得者或粹或駮或淳或漓故萬物之類或巨或細或惡或良或正或邪或柔或剛咸其自取之耳至于聲色形氣各以其類而得焉可考而知聲音為甚聲者陽也而生於天音者隂也而出乎地知聲音之數而後萬物之數覩矣知聲音之理而後萬物之理得矣人之有類亦由物之有類也人類之數亦由物類之數也備天地兼萬物而合德于太極者其唯人乎日用而不知者百姓也反身而誠之者君子也因性而由之者聖人也故聖人以天地為一體萬物為一身善救而不棄曲成而不遺以成能其中焉生物之道天類屬陽地類屬隂陽為動隂為植陽之陽為飛隂之隂為走動而飛者親上走而植者親下天有至粹地有至精人類得之則為明哲飛類得之則為鸞鳯走類得之則為麒麟介類得之則為龜龍草類得之則為芝蘭木類得之則為松柏石類得之則為金玉萬物莫不以其類而有得者焉天有至戾地有至幽人類得之則為妖孽飛類得之則為梟鴆走類得之則為虎狼介類得之則為虺蜴草類得之則為至毒木類得之則為不材石類得之則為礓礫萬物亦莫不以其類而有得者焉天地氤氲萬物化醇言致一也感應之不一則氣不粹氣不粹則生物不美是故致治之世則賢人衆多龜龍遊於沼鳯鳥翔於庭天降甘露地出醴泉百榖用成庶草蕃廡順氣之應也衰亂之世則反此逆氣之應也逆順之應由人心之感焉故古之聖人自昭明德協和萬邦災害不生禍亂不作日月星辰不忒其序風雨晦暘不失其常山川鬼神以寧鳥獸魚鱉咸若天人之際安可忽哉大哉時之與事乎聖人所以極深而研幾也時者天也事者人也時動而事起天運而人從猶形行而影會聲發而響應歟時行而不留天運而不停違之則害逆之則凶故聖人與天並行而不逆與時俱逝而不違是以自天祐之吉無不利時不能違天物不能違時聖人不能違物時不能違天故天運而必變物不能違時故時變而必化聖人不能違物故物化而必順聖人唯不能違物故天亦不能違聖人是以先天而天弗違後天而奉天時天之時由人之事乎人之事由天之時乎故天有是時則人有是事人有是事則天有是時興事而應時者其惟人乎有其時而無其人則時不足以應有其人而無其時則事不足以興有其人而無其時則有之矣有其時而無其人蓋未之有也故消息虛虛者天之時也治亂興廢者人之事也有消長盈虛而後有春夏秋冬有治亂興廢而後有皇帝王伯唐虞者其中天而興乎堯舜者其應運而生乎何天時人事之相驗歟先之者則未之或至後之者則無以尚之其猶夏之將至日之向中乎故聖人刪書斷自唐虞時之盛也修經始於周平道之衰也故聖人懼之以二百四四十二年之事繫之以萬世之法法者何也君臣父子夫婦人道之大倫也性之者聖人也誠之者君子也違之者小人也亡之者禽獸也興之則為治廢之則為亂用之則為中國舍之則為夷狄五伯去王也逺矣不猶愈於狄乎當世之諸侯去伯也逺矣鄰於狄也不亦近乎微聖人之生春秋之作則天下後世之人其被髮左衽矣春秋有天道焉有地道焉有人道焉王者舉而用之則帝王之功豈難致哉性理大全書卷八

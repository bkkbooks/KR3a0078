body:
  text: 性理大全書卷八皇極經世書二纂圖指要下西山蔡氏曰一動一靜之間者易之所謂太極也動靜者易所謂兩儀也隂陽剛柔者易所謂四象也太陽太隂少陽少隂少剛少柔大剛太柔者易所謂八卦也太陽日暑性目元皇太隂月寒情耳會帝少陽星畫形鼻運王少隂辰夜體口世伯少剛石雷木色嵗易少柔土露草聲月書太剛火風飛氣日詩太柔水雨走味辰春秋西山蔡氏曰動者為天天有隂陽陽者動之始隂者動之極隂陽之中又各有隂陽故有太陽太隂少陽少隂太陽為日太隂為月少陽為星少隂為辰是為天之四象日為暑月為寒星為晝辰為夜四者天之所變也暑變物之性寒變物之情晝變物之形夜變物之體萬物之所以感於天之變也靜者為地地有柔剛柔者靜之始剛者靜之極剛柔之中又有剛柔故有太剛太柔少剛少柔太柔為水太剛為火少柔為土少剛為石是為地之四象水為雨火為風土為露石為雷四者地之所以化也雨化物之走風化物之飛露化物之草雷化物之木萬物之所以應於地之化也暑變走飛草木之性寒變走飛草木之情晝變走飛草木之形夜變走飛草木之體雨化性情形體之走風化性情形體之飛露化性情形體之草雷化性情形體之木天地變化參伍錯綜而生萬物也萬物之感於天地之變性者善目情者善耳形者善鼻體者善口萬物應於地之化飛者善色走者善聲木者善氣草者善味蓋其所感應有不同故其所善亦有異至於人則得天地之全暑寒晝夜無不變雨風露雷無不化性情形體無不感走飛草木無不應目善萬物之色耳善萬物之聲鼻善萬物之氣口善萬物之味蓋天地萬物皆隂陽剛柔之分人則兼備乎隂陽剛柔故靈於萬物而能與天地參也人而能與天地參故天地之變有元會運世而人事之變亦有皇帝王伯元會運世有春夏秋冬為生長收藏皇帝王伯有易書詩春秋為道德功力是故元會運世春夏秋冬生長收藏各相因而為十六皇帝王伯易書詩春秋道德功力亦各相因而為十六十六者四象相因之數也凡天地之變化萬物之感應古今之因革損益皆不出乎十六十六而天地之道畢矣故物之巨細人之聖愚亦以一十百千四者相因而為十六千千之物為細物千千之民為至愚一一之物為巨物一一之民為聖人蓋人者萬物之最靈聖人者又人倫之至也自天地觀萬物則萬物為萬物自太極觀天地則天地亦物也人而盡太極之道則能範圍天地曲成萬物而造化在我矣故其説曰一動一靜天地之至妙歟一動一靜之間天地人之至妙歟一動一靜之間者非動非靜而主乎動靜所謂太極也又曰思慮未起鬼神莫知不由乎我更由乎誰所謂範圍天地曲成萬物造化在我者也蓋超乎形氣非數之能及矣雖然是亦數也伊川先生曰數學至康節方及理康節之數先生未之學至其本原則亦不出乎先生之説矣邵伯溫曰陽一隂二故陽之生隂二而六之為十二隂之生陽三而十之為三十又曰以日經日為元之元其數一日之數一故也以日經月為元之會其數十二月之數十二故也以日經星為元之運其數三百六十星之數三百六十故也以日經辰為元之世其數四千三百二十辰之數四千三百二十故也西山蔡氏曰天地之數窮于八八故元會運世嵗月日辰之數極于六十四也陽數以三十起者一月有三十日一世有三十年也隂數以十二起者一日有十二辰一嵗有十二月也天地之數至于八八而遂窮乎曰窮則變變則生蓋生生而不窮者也元會運世即歲月日辰日月星辰即水火土石猶形影聲響也故經世舉元會運世而不及歲月日辰舉日月星辰而不及水火土石也黃氏瑞節曰經世天地始終之數以十二三十反覆乘之也元之元一元之會十二是以十二乘一也元之運三百六十是以三十乘十二也元之世四千三百二十是以十二乘三百六十也會之元以下放此經世之元會運世嵗月日辰即易之乾兊離震巽坎艮坤也元之元即乾之乾元之會即乾之兊元之運即乾之離元之世即乾之震元之嵗即乾之巽元之月即乾之坎元之日即乾之艮元之辰即乾之坤會之元以下放此邵伯溫曰乾之數一兌之數二離之數三震之數四巽之數五坎之數六艮之數七坤之數八交相重而為六十四焉乾兊離震在天為陽在地為剛在天則居東南在地則居西北巽坎艮坤在天為隂在地為柔在天則居西北在地則居東南隂陽相錯天文也剛柔相交地理也西山蔡氏曰八卦之數乾一兊二離三震四巽五坎六艮七坤八先天之序也一一為乾以至八八為坤參伍錯綜無不備也圓者為天方者為地一二三四為陽五六七八為隂即先天圖也一一起于南八八終于北者以少為息多為消也邵伯溫曰日為元元之數一月為會會之數十二星為運運之數三百六十辰為世世之數四千三百二十則是一元統十二會三百六十運四千三百二十世一世三十年則一十二萬九千六百年一十二萬九千六百年是為一元之數一元在大化之中猶一年也自元之元自辰之元自元之辰至辰之辰而後數窮矣窮則變變則生蓋生生而不窮也經世但著一元之數舉一隅而已引而伸之則窮天地之數可知矣日甲日之數一嵗一周月子至亥月之數十二嵗十二周也星三百六十隨天而轉日一周嵗三百六十周也一日十二辰積一嵗之辰則嵗四千三百二十辰也自子至巳作息自午至亥作消作息則陽進而隂退作消則隂進而陽退開物於月之寅星之巳七十有六閉物於月之戌星之戊三百一十有五月至巳之終當辰之二千一百六十為陽極隂陽之餘空各六月至亥之終當辰之四千三百二十為隂極隂陽之餘空各六凡二十有四以當易六十四卦三百八十四爻之數焉除四正卦凡六四六二十四三百八十有四去其二十有四則所存者三百六十也四正卦謂乾坤坎離居四方之正位反復不變故謂之四正經世一元之運數舉成數焉消息盈虧之法在其間矣所以藏諸用也唐堯起於月之巳星之癸一百八十辰之二千一百五十七推而上之堯得天地之中數也故孔子贊堯曰唯天為大唯堯則之蕩蕩乎民無得名焉巍巍乎其有成功煥乎其有文章楊雄亦謂法始乎伏羲而成乎堯蓋自極治之盛莫過乎堯先乎此者有所未至後乎此者有所不及考之厯數稽之天時質之人事若合符節嗚呼盛哉西山蔡氏曰一元之數即一嵗之數也一元有十二會三百六十運四千三百二十世猶一嵗十二月三百六十日四千三百二十辰也前六會為息後六會為消即一會之自子至巳為息自午至亥為消開物於星之七十六猶嵗之驚蟄也閉物於三百一十五猶嵗之立冬也一元有十二萬九千六百嵗一會有十二萬九千六百月一運有十二萬九千六百日一世有十二萬九千六百辰皆自然之數非有所牽合也或曰氣盈於三百六十六朔虛於三百五十四今經世之數槩以三百六十為率何也曰所以藏諸用也消息盈虛之法在其間矣唐堯始於星之癸一百八十辰之二千一百五十七何也曰以今日天地之運日月五星之形推而上之因以得之也嗟夫皇極一元之運始於日甲月子星甲辰子者豈特厯數之用而已哉一陽初動萬物未生是聖人所以見天地之心又以範圍天地曲成萬物者也非元氣之會聰明過人者其孰與此豈特厯數之用而已哉又曰元會運世之數大而不可見分釐絲毫之數小而不可察所可得而數者即日月星辰而知之也一世有三十嵗一月有三十日故嵗與日之數三十一嵗有十二月一日有十二辰故月與辰之數十二自嵗月日辰之數推而上之得元會運世之數推而下之得分釐絲毫之數三十與十二反覆相乘為三百六十故元會運世嵗月日辰八者之數皆三百六十以三百六十乘三百六十為十二萬九千六百故元有十二萬九千六百嵗會有十二萬九千六百月運有十二萬九千六百日世有十二萬九千六百辰嵗有十二萬九千六百分月有十二萬九千六百釐日有十二萬九千六百毫辰有十二萬九千六百絲皆天地自然非假智營力索而天地之運日月之行氣朔之盈虛五星之伏見朓朒屈伸交食淺深之數莫不由此由漢以來以厯數名家者惟太初大衍耳惟太初以四千六百一十七嵗為元以八十一為分大衍之厯乃以一百六十三億七千四百五十九萬五千二百為元三千四十為分皆附會牽合以此求天地之數安得無差朱子曰經世書以十二辟卦管十二會綳定時節却就中推吉凶消長堯時正是乾卦九五論十二卦則陽始於子而終於己隂始於午而終於亥論四時之氣則陽始於寅而終於未隂始於申而終於丑此二説者雖若小差而所爭不過二位蓋子位一陽雖生而未出乎地至寅位泰卦則三陽之生方出地上而溫厚之氣從此始焉己位乾卦六陽雖極而溫厚之氣未終故午位一隂雖生而未害於陽必至未位遁卦而後溫厚之氣始盡也其午位隂已生而嚴凝之氣及申方始亥位六隂雖極而嚴凝之氣至丑方盡義亦放此蓋地中之氣難見而地上之氣易識故周人以建子為正雖得天統而孔子之論為邦乃以夏時為正蓋取其隂陽始終之著明也按圖以推其説可見邵子皇極經世書以元統十二會為一元一萬八百年為一會初間一萬八百年而天始開又一萬八百年而地始成又一萬八百年而人始生邵子於寅天上方始注一開物字蓋初間未有物只是氣塞及開些子後便有一塊查滓在其中漸漸凝結而成地初則溶軟後漸堅實今山形自髙而下便如水漾沙之勢以此知必是先有天方有地有天地交感方始生出物來問天開於子地闢於丑人生於寅其説是如何曰此是邵子皇極經世中説今不可知他只是以數推得如此他説寅上生物是到其上方有人物也有一元十二會三十運十二世十二萬九千六百年為一元嵗月日時元會運世皆自十二而三十自三十而十二至堯時會在已午之間今漸及未矣至戌上説閉物到那裏則不復有人物矣問不知人物消磨盡時天地壞也不壞曰也須一場鶻突既有形氣如何得不壞但一箇壞了便有一箇生得來黃氏瑞節曰一元消長圖蓋以本書約之也今詳本書日甲一位為一元該十二萬九千六百年此一元總數也其所以得元之數者由十二會積之也月子一位為一會該一萬八百年至月亥十二位為十二會該十二萬九千六百年屬上日甲統之也其所以得十二會之數者由三十運積之也星甲一位為一運該三百六十年至三十位為三十運該一萬八百年屬上月子統之過此屬月丑統之其所以得三十運之數者由十二世積之也辰子一位為一世該三十年至辰亥十二位為十二世該三百六十年屬上星甲統之過此屬星乙統之蓋由世積而為運運積而為會會積而為元即由時積而為日日積而為月月積而為嵗也邵伯溫所謂一元之數在天地之間猶一年是已然卲子此數何從而知其始何從而知其終耶善乎西山先生之言曰以今日天地之運日月五星之行推而上之因以得之也故曰堯得天地之中數斯言何謂也蓋堯之時在日甲月巳星癸辰申當十二萬九千六百年之半以上為六萬四千八百年之已往以下為六萬四千八百年之方來是以謂中數也堯而後可遞而推矣元氏明善曰禹即位後八年得甲子初入午會前至元元年甲子初入午會第十一運從天開甲子至泰定甲子得六萬八千八百二十一年臨川吳氏曰一元凡十二萬九千六百嵗分為十二會一會計一萬八百嵗天地之運至戌會之中為閉物兩間人物俱無矣如是又五千四百年而戍會終自亥會始五千四百年當亥會之中而地之重濁凝結者悉皆融散與輕清之天混合為一故曰渾混清濁之混逐漸轉甚又五千四百年而亥會終昏暗極矣是天地之一終也貞下起元又肇一初為子會之始仍是混沌是謂太始言一元之始也是謂太一言清濁之氣混合為一而未分也自此逐漸開明又五千四百年當子會之中輕清之氣騰上有日有月有星有辰日月星辰四者成象而共為天又五千四百年當子會之終故曰天開於子濁氣雖搏在中間然未凝結堅實故未有地又五千四百年當丑會之終重濁之氣凝結者始堅實而成土石濕潤之氣為水流而不凝燥烈之氣為火顯而不隱水火土石四者成形而共為地故曰地闢於丑又五千四百年而丑會終又自寅會之始五千四百年當寅會之中兩間人物始生故曰人生於寅也經世四象體用之數圖萬物之數日日聲平闢水水音開清多良千刀妻古黑安夫卜東宫心乃走思日日聲七下唱地之用音水水音九上和天之用聲一百五十二是謂平聲闢一百一十二是謂開音清音平聲闢音一千六十四聲開音清聲一千八日月聲平之一闢水水音開之一清開音清和律一之一一音古字和一聲至十聲平聲闢唱呂一之一一音至十二音一聲多字唱一之二二音黑字和一聲至十聲一之二一音至十二音二聲良字唱一之三三音安字和一聲至十聲一之三一音至十二音三聲千字唱一之四四音夫字和一聲至十聲一之四一音至十二音四聲刀字唱一之五五音卜字和一聲至十聲一之五一音至十二音五聲妻字唱一之六六音東字和一聲至十聲一之六一音至十二音六聲宫字唱一之七七音乃字和一聲至十聲一之七一音至十二音七聲心字唱一之八八音走字和一聲至十聲一之八一音至十二音一之九九音思字和一聲至十聲一之九一音至十二音一之十一聲至十聲一之十一音至十二音一之十一一聲至十聲一之十二一聲至十聲日月聲平翕水火音開濁禾光元毛衰囗黃囗父步兊龍內自寺日月聲七下唱地之用音水火音九上和天之用聲一百五十二是謂平聲翕一百一十二是謂開音濁音平聲翕音一千六十四聲開音濁聲一千八日月聲平之二翕水火音開之二濁開音濁和律二之一一音囗字和一聲至十聲平聲翕唱吕二之一一音至十二音一聲禾字唱二之二二音黃字和二之二二聲光字唱二之三三音囗字和二之三三聲元字唱二之四四音父字和二之四四聲毛字唱二之五五音步字和二之五五聲衰字唱二之六立音兊字和二之六六聲龍字唱二之七七音內字和二之七七聲字唱二之八八音自字和二之八二之九九音寺字和二之九二之十二之十二之十一二之十二日星聲平闢水土音開清開丁臣牛坤五母武普土魚男老草囗日星聲七下唱地之用音水土音九上和天之用聲一百五十二是謂平聲闢一百一十二是謂開音清音平聲闢音一千六十四聲開音清聲一千八日星聲平之三闢水土音開之三清開音清和律三之一一音坤字和一聲至十聲三之一一音至十二音一聲開字唱三之二二音五字和三之二二聲丁字唱三之三三音母字和三之三三聲臣字唱三之四四音武字和三之四四聲牛字唱三之五五音普字和三之五五聲字唱三之六六音土字和三之六六聲魚字唱三之七七音老字和三之七七聲男字唱三之八八音草字和三之八三之九九音囗字和三之九三之十三之十三之十一三之十二日辰聲平翕水石音開濁回兄君龜口吾目文旁同烏鹿曹囗日辰聲七下唱地之用音水石音九上和天之用聲一百五十二是謂平聲翕一百一十二是謂開音濁音平聲翕音一千六十四聲開音濁聲一千八日辰聲平之四翕水石音開之四濁開音濁和律四之一一音囗字和一音至十聲平聲翕唱吕四之一一音至十二音一聲回字唱四之二二音吾字和四之二二聲兄字唱四之三三音目字和四之三三聲君字唱四之四四音文字和四之四四聲字唱四之五五音旁字和四之五五聲龜字唱四之六六音同字和四之六六聲烏字唱四之七七音鹿字和四之七七聲字唱四之八八音曹字和四之八四之九九音口字和四之九四之十四之十四之十一四之十二月日聲上闢水火音發清可兩典早子甲花亞法百丹孔審妳哉三山莊卓月日聲七下唱地之用音火水音十二上和天之用一百五十二是謂上聲闢聲一百一十二是謂發音音上聲闢音一千六十四清聲發音清聲一千三百月日聲上之一闢四十四發音清和律一之一一音甲字和一聲至十聲火水音發之一清一之二二音花字和上聲闢唱吕一之一一音至十二音一聲可字唱一之三三音亞字和一之二二聲兩字唱一之四四音法字和一之三三聲典字唱一之五五音百字和一之四四聲早字唱一之六六音丹字和一之五五聲子字唱一之七七音妳字和一之六六聲孔字唱一之八八音哉字和一之七七聲審字唱一之九九音三字和一之八一之十十音山字和一之九一之十一十一音莊字和一之十一之十二十二音卓字和月月聲上翕火火音發濁火廣犬實口華爻凡百大甬南在口士乍宅月月聲七下唱地之用音火火音十二上和天之用一百五十二是謂上聲翕聲一百一十二是謂發音音上聲翕音一千六十四濁聲發音濁聲一千三百月月聲上之二翕四十四發音濁和律二之一一音口字和一聲至十聲火火音發之二濁二之二二音華字和上聲翕唱吕二之一一音至十二音一聲火字唱二之三三音爻字和二之二二聲廣字唱三之四四音凡字和二之三三聲犬字唱二之五五音白字和二之四四聲寶字唱二之六六音大字和二之五五聲字唱二之七七音南字和二之六六聲甬字唱二之八八音在字和二之七七聲字唱二之九九音口字和二之八二之
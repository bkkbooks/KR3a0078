body:
  text: 性理大全書卷四十九學七力行克己改過雜論處心立事附程子曰居之以正行之以和言而不行是欺也君子欺乎哉不欺也知過而能改聞善而能用克己以從義其剛明者乎上蔡謝氏曰人須識其真心見孺子將入井時是真心也非思而得也非勉而中也豫嘗學射到一把處難去半把處尤難去則恁地放了底多昔有一人學射摸得鏃與把齊然後放學者才有些所得便住人多易住唯顔子善學故孔子有見其進未見其止之歎須是百尺竿頭更進始得和靖尹氏曰學貴力行不貴空言東平馬氏曰吾志在行道使吾以富貴為心則為富貴所纍使吾以妻子為念則為妻子所纍是道不可行也朱子曰善在那裏自家却去行他行之久則與自家為一為一則得之在我未能行善自善我自我凡日用之間動止語默皆是行處且須於行處警省須是戰戰兢兢方可若悠悠泛泛地過則又不可若不用躬行只是説得便了則七十子之從孔子只用兩日説便盡何用許多年隨著孔子不去不然則孔門諸子皆是呆無能底人矣恐不然也古人只是日夜皇皇汲汲去理會這箇身心到得做事業時只隨自家分量以應之如由之果賜之達冉求之藝只此便可以從政不用他求若是大底功業便用大聖賢做小底功業便用小底賢人做各隨他分量做出來如何強得人於道理不能行只是在我之道理有未盡耳不當咎其不可行當反而求盡其道為學就其偏處著工夫亦是其平正道理自在若一向矯枉過直又成偏去如人偏於柔自可見只就這裏用工須存平正底道理雖要致知然不可恃書曰知之非艱行之惟艱工夫全在行上嘗誨學者曰某此間講説時少踐履時多事事都用人自去理會自去體察自去涵養書用自去讀道理用自去究索某只是做得箇引路底人做得箇證明底人有疑難處同商量而已人所以易得流轉立不定者只是腳跟不點地點平聲問學如登塔逐一層登將去上面一層雖不問人亦自見得若不去實踏過却懸空妄想便和最下底層不曾理會得學問亦無箇一超直入之理直是銖積寸纍做將去某是如此喫辛苦從漸做來若要得知亦是喫辛苦了做不是可以坐談僥幸而得問向因子夏大德小德之説遂只知於事之大者致察而於小者茍且放過德之不修實此為病張子云纎惡必除善斯成性矣察惡未盡雖善必粗學者須是毫髮不得放過德乃可進曰若能如此善莫大焉以小惡為無傷是誠不可而今只理會得於做工夫處莫問他氣稟與習只是是底便做不是底莫做一直做將去任你氣稟物欲我只是不恁地如此則雖愚必明雖柔必強氣習不期變而變矣人之一身應事接物無非義理之所在人雖不能盡知然要在力行其所己知而勉求其所未至則自近及逺由粗至精循循有序而日有可見之功矣問力行如何説是淺近語曰不明道理只是硬行又問何以為淺近曰他只是見聖賢所為心下愛硬依他行這是私意不是當行若見得道理時皆是當恁地行學者實下工夫須是日日為之就事親從兄接物處事理會取其有未能益加勉行如此之久則日化而不自知遂只如常事做將去務實一事觀今日學者不能進步病痛全在此處但就是做工夫自然有得未須遽責效驗也東萊吕氏曰賢士大夫蓋有學甚正識甚明而其道終不能孚格逺近者只為實地欠夫夫耳南軒張氏曰學貴力行然所謂力行者煞有事聖門教人循循有序始終條理一毫潦草不得工夫蓋無窮也學者若能務實便有所得或問務實之説曰於踐履中求之仁之實事親是也義之實從兄是也日用常行之際無非實用象山陸氏曰聖人教人只是就人日用處開端如孟子言徐行後長者可為堯舜不成在長者後行便是堯舜怎生做得堯舜樣事須是就上面著工夫程子曰難勝莫如己私學者能克之非大勇乎以下論克己多驚多怒多憂只去一事所偏處自克克得一件其餘自正目畏尖物此事不得放過便與克下室中率置尖物須以理勝他尖必不刺人也何畏之有張子曰凡所當為一事意不過則推類如此善也一事意得過以為且休則百事廢其病常在謂之病者為其不虛心也病根不去隨所居所接而長人須一事事消了病則常勝故要克己克己下學也下學上達交相養蓋不行則成何德行哉人當平物我合內外如是以身鑒物便偏見以天理中鑒則人與己皆見猶持鏡在此但可鑒彼於己莫能見也以鏡居中則盡照只為天理常在身與物灼見則自不私己亦是一物人常脫去己身則自明然身與心常相隨不奈何有此身假以接物則舉措須要是今見人意我固必以為當絶於己乃不能絶即是私己是以大人正己而物正須待自已者皆是著見於人物自然而正以誠而明者既實而行之明也明則民斯信矣己未正而正人便是有意我固必鑒己與物皆見則自然心洪而公平意我固必只為有身便有此上蔡謝氏曰某與伊川别一年往見之伊川曰别又一年做得甚工夫曰也只是去箇矜字曰何故曰子細點檢得來病痛盡在這裏若按伏得這箇罪過方有向進處伊川點頭因語在坐同志者曰此人為學切問近思者也或問矜字罪過何故恁地大曰今人做事只管要誇耀别人耳目渾不關自家受用事有底人食前方丈便向人前喫只蔬食菜羹却户裏喫為甚恁地和靖尹氏曰克己唯在克其所好便是下手處然人未有不自知所好處而能克之者若不自知却克箇甚如好財即於財上克好酒即於酒上克今人只為事事皆好便沒下手處然須擇其偏好甚處先克五峰胡氏曰自反則裕責人則蔽君子不臨事而恕己然後有自反之功自反者修身之本也本得則用無不利朱子曰克己亦别無巧法譬如孤軍猝遇強敵只得盡力舍死向前而已尚何問哉克己固學者之急務亦須見得一切道理了了分明方見日用之間一言一動何者是正何者是邪便於此處立定腳跟凡是己私不是天命者便克將去問明道曰目畏尖物某未曉其説曰人有目畏尖物者明道先生教以室中率置尖物便見之熟而知尖之不刺人也則知畏者妄而不復畏矣問前輩説治懼室中率置尖物曰那箇本不能害人心下要恁地懼且習教不如此妄怕問習在危階上行底亦此意否曰那箇分明是危只教習教不怕著問習得不怕少間到危疑之際心亦不動否曰是如此問克己功夫要當自日月至焉推而上之至終食之間以至造次以至顚沛一節密一莭去庶幾持養純熟而三月不違可學而至不學則己欲學聖人則純亦不已如此做功夫可否曰下學之功誠當如此其資質之髙明者自應不在此限但我未之見耳問某欲克己而患未能曰此更無商量為仁由己而由人乎哉問每常遇事時也分明知得理之是非這是天理那是人欲然到做處又却為人欲引去及至做了又却悔此是如何曰此便是無克己工夫這樣處極要與他掃除打疊如一條大路又有一條小路自家也知得合行大路然被小路有箇事物引著不知不覺走從小路去及至前面荆棘蕪穢又却生悔此便是天理人欲交戰之機須是遇事時便欲克下不得茍且放過明理以先之勇猛以行之若是上智聖人底資質他不用著力自然循天命而行不流於人欲若賢人之資次於聖人者到得遇事時固不曽錯只是先也用分别教是而後行之若是中人之資須大假著無一時一刻不照管克治始得曽子曰仁以為己任不亦重乎死而後已不亦逺乎須是如此做工夫其言曰戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫小子直是恁地用功方得問子張云以心克己即是復性復性便是行仁義竊謂克己便是克去私心却云以心克己莫剩却以心兩字否曰克己便是此心克之公但看為仁由己而由人乎哉非心而何言忠信行篤敬立則見其參於前在輿則見其倚於衡這不是心是甚麼凡此等皆心所為但不必更著心字所以夫子不言心但只説在這裏教人做又問復性便是行仁義復是方復得此性如何便説行得曰既復得此性便恁地行才去得不仁不義則所行便是仁義那得一箇在不仁不義與仁義之中底物事不是人欲便是天理不是天理便是人欲所以謂欲知舜與跖之分者無他利與善之間也所隔甚不多但聖賢把得這界定爾南軒張氏曰克己之偏之難當用大壯之力然而力貴於壯而工夫貴於密若工夫不密雖勝於暫而終不能持於久而銷其端觀顔子沈潛積習之功為如何哉有不善未嘗不知知之未嘗復行非工夫篤至久且熟也其能若是乎魯齋許氏曰責得人深者必自恕責得己深者必薄責於人蓋亦不暇責人也自責以至於聖賢地面何暇有工夫責人見人有片善早去倣學他善不見其人之可責惟責己也顔子有之以衆人望人則皆可以聖賢望人則無完人矣子曰賜也賢乎哉夫我則不暇責己者可以成人之善責人者適以長己之惡喜怒哀樂愛惡欲一有動於心則氣便不平氣既不平則發言多失七者之中惟怒為難治又偏招患難須於盛怒時堅忍不動俟心氣平時審而應之庶幾無失忿氣劇炎火焚如徒自傷觸來勿與競事過心清涼程子曰凡夫之過多矣改改之者猶無過也惟格趣汙下之人其改之為最甚難故其過最以下論改過行之失莫甚於惡則亦改之而已矣事之失莫甚於亂則亦治之而已矣茍非自暴自棄者孰不可與為君子有過必改罪己是也改而已矣常有歉悔之意則反為心害罪己責躬不可無然亦不當長留在心胸為悔涑水司馬氏曰去惡而從善捨非而從是人或知之而不能徙以為如制駻馬如斡磻石之難也靜而思之在我而已如轉户樞何難之有朱子曰知得如此是病即便不如此是藥若更問何由得如此則是騎驢覔驢只成一場間説話矣答蔡季通書曰所謂一劒兩假者改過之勇固當如此改過貴勇而防患貴怯二者相須然後真可以修慝辨惑而成徙義崇義之功自今以往設使真能一劒兩假亦不可以此自恃而平居無事常存祗畏警懼之心以防其源則庶乎其可耳問氣質昏蒙作事多悔有當下便悔時有過後思量得不是方悔時或因久所為因事機觸得悔時方悔之際惘然自失此身若無所容有時恚恨至於成病不知何由可以免此曰既若悔時苐二次莫恁地便了不消得常常地放在心下那未見能見其過而內自訟底便是不悔底今若信意做去後蕩然不知悔固不得若既知悔後次便改了何必常常恁地悔又曰悔字難説既不可常存在胸中以為悔又不可不悔若只説不悔則今畨做錯且休明畨做錯又休不成説話問如何是著中底道理曰不得不悔但不可留滯既做錯此事他時更遇此事或與此事相類更須懲戒不可再做錯了南軒張氏曰著是去非改過遷善此經語也非不去安能著是過不改安能遷善不知其非安能去非不知其過安能改過自謂知非而不能去非是不知非也自謂知過而不能改過是不知過也真知非則無不能去真知過則無不能改人之患在不知其非不知其過而已所貴乎學者在致其知改其過也象山陸氏曰學者不長進只是好己勝出一言做一事便道全是豈有此理古人惟貴知過則改見善則遷今各自執是被人點破便愕然所以不如古人西山真氏曰過雖聖賢不能無蓋過者過誤之謂也真知為過而速改則無過矣故論語曰過而不改是謂過矣左傳曰人誰無過過而能改善莫大焉子貢曰君子之過如日月之食焉過也人皆見之更也人皆仰之孟子曰古之君子過則改之今之君子過則順之成湯之聖猶且改過不吝顔子之賢猶曰不二過以此可見雖聖賢必以改過為貴若知其為過不肯速改則是文過遂非而流於惡矣蓋無心而誤則謂之過有心而為則謂之惡不待别為不善方謂之惡只知過不改是有心便謂之惡易曰風雷益君子以見善則遷有過則改天下之至迅疾者莫如風雷故聖人以此為遷善改過之象即是過勿憚改之意也程子曰欲當大任須是篤實以下雜論處心立事有志之士不以天下萬物撓己巳立矣則運天下濟萬物必有餘裕厚責於吾所感薄責於人所應惟君子能之天下之事茍善處之雖悔可以成功不善處之雖利反以為害人當審己如何不必恤浮議志在浮議則心不在內不可應卒處事大凡利害禍福亦須致命始得致之為言直如人以力自致之謂也得之不得命固已定君子須知他命方得不知命無以為君子蓋命茍不知無所不至故君子於困窮之時須致命便遂得志其得禍得福皆以自致只要申其志而已人之於患難只有一箇處置盡人謀之後却須泰然處之有人遇一事則心心念念不肯捨畢竟何益若不會處置了放下便是無義無命也人莫不知命之不可遷也臨患難而能不懼處貧賤而能不變視富貴而能不慕者吾未見其人也處患難知其無可奈何遂放意而不反非安於義命者當為國之時既盡其防慮之道矣而猶不免則命也茍惟致其命安自然則危塞險難無足以動其心者行吾義而已斯可謂之君子儒者只合言人事不得言有數直到不得已處然後歸之于命可也或謂人莫知和柔寬緩然臨事則反至于暴厲曰只是志不勝氣氣反動其心也又曰事以急而反者十常七八君子不欲才過德不欲名過實不欲文過質才過德者不祥名過實者有殃文過質者莫與之長有實則有名名實一物也若夫好名者則徇名為虛矣如君子疾沒世而名不稱謂無善可稱耳非徇名也張子曰天下事大患只是畏人非笑不養車馬食粗衣惡居貧賤皆恐人非笑不知當生則生當死即死今日萬鐘明日棄之今日富貴明日飢飢亦不恤惟義所在欲事立須是心立心不敬則怠惰事無由立况聖人誠立故事無不立也道義之功甚大又極是尊貴之事某平生於公勇於私怯於公道有義真是無所懼大凡事不惟於法有不得更有義之不可尢所當避上蔡謝氏曰懷固蔽自欺之心長虛驕自大之氣皆好名之故龜山楊氏曰物有圭角多刺人眼目亦易玷缺故君子處世當渾然天成則人不厭棄矣士不患無名患實之不至和靖尹氏曰後世人臨事多錯只為不知事若知道了臨事安得錯人有避事欲不為者曰事當為者豈可不為廢事便是廢人道莊子猶曰匿而不可不為者事也五峯胡氏曰一身之利無謀也而利天下者則謀之一時之利無謀也而利萬物者則謀之處已有道則行艱難險危之中無所不利失其道則有不能堪而忿欲興矣是以君子貴有德也延平李氏曰受形天地各有定數治亂窮通斷非人力惟當守吾之正而已然而愛身明道修己俟時則不可一日忘於心此聖賢傳心之要法或者放肆自佚惟責之人不責之己非也朱子曰耳目口鼻之在人尚各有攸司况人在天地間自農啇工賈等而上之不知其幾階其所當盡者小大雖異界限截然本分當為者一事有關便廢天職居處恭執事敬與人忠推是心以盡其職者此固為不易之論但必知夫所處之職乃天職之自然而非出於人為則各司其職以辦其事不出於勉強不得已之意矣有是理方有這物事如草木有箇種子方生出草如人有此心去做這事方始成這事若無此心如何會成這事世事無緊要底不要做先去其粗却去其精磨去一重又磨一重天下事都是如此且如中庸説戒慎乎其所不睹恐懼乎其不聞先且就睹處與聞處做了然後就不睹不聞處用工方能細密而今人每每跳過一重做事睹處與聞處元不曽有工夫却便去不睹不聞處做不成可知是做不下梢一齊擔閣且如屋漏暗室中工夫如何便做得須從十目所視十手所指處做起方得且須立箇粗底根腳却正好著細處工夫今人於無義理底言語儘説了無義理底事儘做了是於粗底根腳猶未立却求深微縱理會得干己甚事人多是要求濟事而不知自身己不立事決不能成人自心若一毫私意未盡皆足以敗事如上有一毫差下便有尋丈差今若見得十分透徹待下梢遇事轉移也只做得五六分若今便只就第四五者理會下梢如何常先難而後易不然則難將至矣如樂毅用兵始常懼難乃心謹畏不敢忽易故戰則雖大國堅城無不破者及至勝則自驕膽大而恃兵強因去攻二城亦攻不下作事若顧利害其終未有不陷於害也古人臨事所以要回互時是一般國家大事係死生存亡之際有不可直情徑行處便要權其輕重而行之今則事事用此一向回互至於枉尋直尺而利亦可為與是甚意思問學者講明義理之外亦須理會時政凡事要一一講明使先有一定之説庶他日臨事不至墻面曰學者若得胸中義理明從此去量度事物自然泛應曲當人若有堯舜許多聰明自做得堯舜許得事業若要一一理會則事變無窮難以逆料隨機應變不可預定今世文人才士開口便説國家利害把筆便述時政得失終濟得甚事只是講明義理以淑人心使世間識義理之人多則何患政治之不舉耶其看人也須是剛雖則是偏然較之柔不同易以陽剛為君子隂柔為小人若是柔弱不剛之質少間都不會振奮只困倒了天下事亦要得危言者亦要得寬緩者皆不可少隨其人所見看其人議論如狄梁公辭雖緩意甚懇切如中邉皆緩則不可翕受敷施九德咸事聖人便如此做今人大抵皆先自立一箇意見若其性寬大便只管一向見得一箇寬大底路若性嚴毅底人便只管見得一箇亷介底路更不平其心看事物自有箇合寬大處合嚴毅處人最不可曉有人奉身儉嗇之甚充其操上食稿壤下飲黃泉底却只愛官職有人奉身清苦而好色他只緣私欲不能克臨事只見這箇重都不見别箇了或云似此等人分數勝已下底曰不得如此説才有病便不好更不可以分數論他只愛官職便弒父與君也敢古人尊貴奉之者愈備則其養德也愈善後之奉養備者賊之而已矣為血氣所使者只是客氣惟於性理説話涵泳自然臨事有别處須是慈祥和厚為本如勇決剛果雖不可無然用之有處所事至於過當便是偽學常要親細務莫令心粗問避嫌是否曰合避豈可不避如瓜田不納履李下不慗冠豈可不避如君不與同姓同車與異姓同車不同服皆是合避處問程子説避嫌之事賢者且不為况聖人乎若是有一項合委曲而不可以直遂者這不可以為避嫌曰自是道理合如此如避嫌者却是又怕人道如何這却是私意如十起與不起便是私這便是避嫌只是他見得這意思己是大假做工夫大假會省察了又如人遺之千里馬雖不受後來薦人未嘗忘之後亦竟不薦不薦自是好然於心終不忘便是喫他取奉意思不過這便是私意又如如今立朝明知這箇是好人當薦舉之却緣平日與自家有恩意往來遂避嫌不舉他又如有某人平日與自家有怨到得當官彼却有事當治却怕人説道因前怨治他遂休了如此等皆蹉過多了問人心不可狹小其待人接物胸中不可先分厚薄有所别異否曰唯君子為能通天下之志放令規模寬濶使人人各得盡其情多少快活問待人接物隨其情之厚薄輕重而為酬酢邪一切不問而待之以厚邪曰知所以處心持己之道則所以接人待物自有凖則事有不當耐者豈可全學耐事學耐事其弊至於茍賤不亷學者須要有亷隅牆壁便可擔負得大事去如子路世間病痛却沒了親其身為不善直是不入此大者立也恥有當忍者有不當忍者人須有亷恥孟子曰恥之於人大矣耻便是羞惡之心人有耻則能有所不為今有一樣人不能安貧其氣銷屈以至立腳不住不知亷耻亦何所不至因舉吕舍人詩云逢人即有求所以百事非如論語必先説富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也然後説君子去仁惡乎成名必先教取舍之際界限分明然後可做工夫不然則立腳不定安能有進又云學者不於富貴貧賤上立定則是入門便差了也人之所以戚戚於貧賤汲汲於富貴只緣不見這箇道理若見得這箇道理貧賤不能損得富貴不曽添得只要知這道理學者常常以志士不忘在溝壑為念則道義重而計較死生之心輕矣况衣食至微末事不得未必死亦何用犯義犯分役心役志營營以求之邪某觀今人因不能咬菜根而至於違其心者衆矣可不戒哉困厄有輕重力量有大小若能一日十二辰點檢自己念慮動作都是合宜仰不愧俯不怍如此而不幸填溝壑喪軀殞命有不暇恤只得成就一箇是處如此則方寸之間全是天理雖遇大困厄有致命遂志而已亦不知有人之是非向背惟其是而已問死生是大關莭處須是日用間雖小事亦不放過一一如此用工夫當死之時方打得透曰然以利害禍福言之此是至粗底此處人都信不及便講學得待如何亦要安頓處今人開口亦解説一飲一啄自有定分及遇小小利害便生趨避計較之心古人刀鋸在前鼎鑊在後視之如無物者蓋緣只見得這道理不見那刀鋸鼎鑊身勞而心安者為之利少而義多者為之惟君子然後知義理之所必當為與義理之必可恃利害得失既無所入於其心而其學又足以應事物之變是以氣勇謀明無所懾憚不幸蹉跌死生以之小人之心一切反是人有此身便有所以為人之理與生俱生乃天之所負而非人力之所能為也所以凡為人者只合講明此理而謹守之不可昏棄若乃身外之事榮悴休戚即當一切聽天所為而無容心焉問事有最難底奈何曰亦有數等或是外面阻遏做不得或是裏面紛亂處不去亦有一種紛拏時及纎毫委曲微細處難處全只在人自去理會大槩只是要見得道理分明逐事上自有一箇道理易曰採賾索隱賾處不是奧是紛亂時隱是隱奧也全在探索上紛亂是他自紛亂我若有一定之見安能紛亂得我問事來斷制不下當何以處之曰也只得隨力量做去又問事有至理理有至當十分處今己看得七八分待窮來窮去熟後自解到那分數足處曰雖未能從容只是熟後便自會只是熟只是熟問貧者舉事有費財之浩瀚者不能不計度繁約而為之裁處此與正義不謀利意相妨否竊恐謀利者是作這一事更不看道理合當如何只論利便於己與不利便於己得利便則為之不得則不為若貧而費財者只是目下恐口足不相應因斟酌裁處而歸之中其意自不同否曰當為而力不及者量宜處乃是義也力可為而計費吝惜則是謀利而非義矣問欲窮理而事物紛紜未能有灑落處近惟見得富貴果不可求貧賤果不可逃耳曰此是就命上理會須更就義上看當求與不當求當避與不當避更看自家分上所以求之避之之心是欲如何且其得喪榮辱與自家義理之得失利害孰為輕重則當有以處此矣大抵事只有一箇是非是非既定却揀一箇是處行將去必欲回互得人人道好豈有此理然事之是非久却自定時下須是在我者無慊仰不愧俯不怍别人道好道惡管他讀書則實究其理行己則實踐其邇念念鄉前不輕自恕則在我者雖甚孤髙然與他人元無干預亦何必私憂過計而陷於同流合汙之地乎南軒張氏曰義之所在君子蹈之如飢之必食渴之必飲不可改也若一毫私意亂之則顧藉牽滯而卒失其正矣論伊川説子貢貨殖便生計較才計較便是不受命只計較便不是因言人逐日自思量如何是計較處才有計較作為便不是若都不計較則是無所為如何應事接物要得不計較又要得應事接物於此可以涵泳本心東萊吕氏曰大凡人資質各有利鈍規模各有大小此難以一律齊要須常不失故家氣味所向者正凡聖賢輩學問操履我力雖未能為而心向慕之是謂所向者正若隨俗輕笑以為世法不須如此不當如此則所向者不正矣所存者實如已雖未免有過而不敢久飾遮藏又如處親戚朋友間不敢不用情之類信其所當信謂以聖賢語言前輩教戒為必可信而以世俗茍且便私之論為不可信耻其所當耻謂以學問操履不如前輩為耻而不以官職不如人服飾資用不如人巧詐小數不如人為耻持身謙遜而不敢虛驕遇事審細而不敢容易如此則雖難到或遠或近要是君子路上人也西山真氏曰一事有一事之理人能安定其心順其理以應之則事既得所心亦不勞苦擾擾焉以私心處之則事必不得其當而其心亦無須臾之寧人徒知為事之纍心不知乃心之纍事也魯齋許氏曰天地間當大著心不可拘於氣質局於一已貧賤憂戚不可過為隕穫貴為公相不可驕當知有天地國家以來多少聖賢在此位賤為匹夫不必恥當知古昔志士仁人多少屈伏甘於貧賤者無入而不自得也何欣戚之有凡事物之際有兩件有由自己的有不由自己的由自己的有義在不由自己的有命在歸於義命而已世人懷智挾詐而欲事之善豈有此理必盡去人偽忠厚純一然後可善其事至於死生禍福則一歸之天命而已人謀孔臧亦可以保天命人能攝生亦可以保神氣自暴自棄而有凶禍皆自取之也巧言令色人欲勝天理滅矣人但當修心自理不問與他人合與不合果能自修天下人皆能合若只以巧言令色求則其所合者可知矣汲汲焉毋欲速也循循焉毋敢惰也非止學問如此日用事為之間皆當如此乃能有成禍福榮辱死生貴賤如寒暑晝夜相代之理若以私意小智妄為迎避大不可也不聼父母命者則為不孝不聽君命者則為不敬其或不聽天命者獨無責耶君父之命或時可否之間設教者猶曰勿逆勿怠况乎天命大公至正無有不善何苦而不受命乎毁不可遽譽亦不可遽喜不可遽怒亦不可遽處人須要重厚待人須要久逺顧嵗晏何如耳一時一暫便動搖去從他做毁譽後假便難收拾有不虞之譽有求全之毁不虞之譽無故而致譽也無實而得譽可乎大譽則大毁至小譽則小毁至必然之理也惟聖賢得譽則無所可毁大名之下難處在聖賢則異於是無難處者無實而得名故難處名美器也造物者忌多取非忌多取忌夫無實而得名者性理大全書卷四十九

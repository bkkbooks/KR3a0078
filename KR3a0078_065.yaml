body:
  text: 性理大全書卷六十五君道程子曰君道以至誠仁愛為本又曰大要以正心窒欲求賢育材為先又曰人主當防未萌之欲君道以人心悦服為本君道稽古正學明善悪之歸辨忠邪之分曉然趋道之至正君志定而天下之治成矣夫義理不先定則多聴而易惑志意不先定則守善而或移必也以聖人之訓為先當従以先王之治為必可法不為後世駁雜之政所牽滯不為流俗因循之論所遷改信道極于䔍自知極于明去邪勿疑任賢勿貳必期致治如三代之隆而後已也然患常生于忽微而志亦戒乎漸習故古之人君雖従容燕閒必有誦訓箴諌左右前後罔匪正人輔成徳業誠能尊禮老成訪求儒學之士不必勞以官職俾日親便坐講論道義又博延俊彦陪侍法従朝夕延見講磨治體則睿智益明王猷允塞矣人君欲附天下當顯明其道誠意以待物恕已以及人發政施仁使四海䝉其恵澤可也若乃暴其小恵違道干譽欲致天下之親已則其道狹矣古之聖王所以能化姦宄為善良綏仇敵為臣子者由弗之絶也苟無含𢎞之道而與已異者一皆棄絶之不㡬于棄天下以讎君子乎故聖人無棄物王者重絶人涑水司馬氏曰夫道者萬世無弊夏商周之子孫苟能常守禹湯文武之法何衰亂之有乎故武王克商曰乃反商政政由舊然則雖周室亦用商之舊政也書曰無作聰明亂舊章詩曰不愆不忘率由舊章然則祖宗舊法何可廢也元城劉氏曰書稱堯之徳曰稽于衆舍已従人舜戒其臣曰予違汝弼汝無面従退後有言伊尹之告太甲曰有言逆于汝心必求諸道有言遜于汝志必求諸非道傅説之復于髙宗曰惟木従繩則正后従諌則聖然則古之聰明睿智之君所以能大過于人者未有不以求諌為先務也昔之聖人深居九重以謂竭其聰明猶不足以盡天下之聞見遂以耳目之任付之臺諌之官而臺諌之官每以天下之公議為主公議之所是臺諌必是之公議之所非臺諌必非之人君所以不出户庭而四海九州之逺物無遁情者用此道也龜山楊氏曰人君所以御其臣只有一箇名分不可易名分既正上下自定雖有幼冲之主在上而臣下不亂若以智籠臣下智有時乎困則彼不為用矣問或謂人主之權當自主持是否而不為臣下奪其威柄此固是也書稱湯曰用人惟已而孟子亦曰見賢焉然後用之則人君之權豈可為人所分然孟子之論用人去人殺人雖不聴左右諸大人之毁譽亦不聴國人之公因國人之公是非吾従而察之必有見焉而後行如此則權常在我矣若初無所見姑信已意為之亦必終為人所惑不能固執矣上蔡謝氏曰帝王之功聖人之餘事有内聖之徳必有外王之業其所以存心一言以蔽之曰公而已華陽范氏曰人君以一人之身而御四海之廣應萬務之衆茍不以至誠與賢而役其獨智以先天下則耳目心志之所及者其能㡬何是故人君必清心以涖之虚已以待之如鑑之明如水之止則物至而不能罔矣夫權衡設而不可欺以輕重者唯其平也繩墨設而不可欺以曲直者唯其正也我以其正彼以其邪我以其真彼以其偽何患乎邪之不察佞之不辨一為不誠則心且蔽矣邪正何能辨乎是故鑑垢則物不能察也水動則形不能見也已不明故也且待物以誠猶恐其不動也况不誠而能動物乎易曰天下之動貞夫一朝廷者四方之極也非至公無以絶天下之私非至正無以止天下之邪人君一不正其心則無以正萬事苟以術御下是自行詐也何以禁臣下之欺乎是術行而欺愈多智用而心愈勞盖以詐勝詐未有能相一者也禮曰王中心無為也以守至正夫惟正不可得而欺欺則不容于誅矣豈不約而易守㢤鼂錯有言五帝神聖其臣莫能及故自親事此本刑名之言也豈足以知帝王之道㢤然而後世或稽其説以諛人主至使為上者行有司之事宰相失職天下不治由其臣不學之過也夫人主任一相一相舉賢材賢者各引其類豈不易而有成功乎是故上不可代其下下不可勤其上若為上而親有司之事豈獨治天下不可為也一縣亦不可為也奚獨一縣也一家亦不可為也武夷胡氏曰君遇臣下恩禮雖一而崇髙嚴格常行于介胄𤓰牙之夫以折其驕悍難使之氣柔遜謙屈必施于林壑退蔵之士以礪其亷靖無求之莭乃能駕馭人才表正風俗威有所當加勢有所可屈加于所當加以立威則强屈于所可屈以忘勢則昌致堂胡氏曰夫以違拂對順従則有恭與不恭之似以恣肆對儆戒則有樂與不樂之殊惟聰明睿智之君則知違拂之為恭而順従之為大不恭也知儆戒之可樂而恣肆之有大不樂也五峰胡氏曰人皆生于父父道本乎天謂人皆天之子可乎曰不可天道至大至正者也王者至大至正奉行天道乃可謂之天之子也養天下而享天下之謂君先天下而後天下之謂臣反是者有國危國有天下危天下人君不可不知乾道不知乾道是不知君道也君道如何曰天行健人君不可頃刻忘其君天下之心也如天之行一息㦯不繼則天道壊矣天下有三大大本也大㡬也大法也大本一心也大㡬萬變也大法三綱也有大本然後可以有天下見大㡬然後可以取天下行大法然後可以理天下是故君克以天下自任則皇天上帝畀付以天下矣君以従上列聖之盛徳大業自期則天下仁人爭輔之矣君以保飬天下為事而不自奉飬則天下黎民趋戴之矣上得天心中得聖賢心下得兆民心夫是之謂一心心一天下一矣天下之變無窮也其大幾有四一曰救弊之幾二曰用人之幾三曰應敵之㡬四曰行師之幾幾之来也變動不測莫可先圖必寂然不動然後能應也其大法有三一曰君臣之法二曰父子之法三曰夫婦之法夫婦有法然後家道正父子有法然後人道乆君臣有法然後天地泰天地泰者禮樂之所以興也禮樂興然後賞罰中而庶民安矣人君盡下則聰明開而萬里之逺親于袵席偏信則昏亂而父子夫婦之間有逺于萬里者矣人君欲救偏信之禍莫先于窮理莫要于寡欲窮理寡欲交相發者矣天下有二難以道義服人難難在我也以勢力服人難難在人也由道義而不舍禁勢力而不行則人心服而天下安易詩春秋者聖人之道也聖人之道若何曰聖人者以一人理億兆人之徳性息其争奪遂其生飬者也天下之臣有三有好功名而輕爵禄之臣是人也名得功成而止矣有貪爵禄而昧功名之臣是人也必忘其性命矣鮮不及㢤有由道義而行之臣是人也爵禄功名得之不以為重失之不以為輕頋吾道義如何耳君天下臨百官是三臣者雜然並進為人君者烏乎知而進退之孟子曰君仁莫不仁義理群生之性也義行而理明則群生歸仰矣敬愛兆民之心也敬立而愛施則人心誠敬矣感應鬼神之情性也誠則能動而鬼神来格矣豫章羅氏曰祖宗法度不可廢徳澤不可恃廢法度則變亂之事起恃徳澤則驕佚之心生自古徳澤最厚則莫若周家之最明向使子孫世守則歴年至今猶存可也人君納諌之本先於虚已禹拜昌言故能納諫徳宗強明自任故能拒諫朱子曰天下之紀綱不能以自立必人主之心術公平正大無偏黨反側之私然後紀綱有所繫而立君心不能以自正必親賢臣逺小人講明義理之歸閉塞私邪之路然後乃可得而正天子至尊無上其居處則内有六寝六宫外有三朝五門其嬪御侍衛飲食衣服貨賄之官皆領于冢宰其冕弁車旗宗祝巫史卜筮瞽侑之官皆領于宗伯有師以道之教訓有傅以傅其徳義有保以保其身體有師氏以媺詔之有保氏以諌其悪前有疑後有丞左有輔右有弼其侍御僕従罔匪正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧在輿有旅賁之䂓旅賁勇士掌執戈楯夾車而趋位宁有官師之典門屏之間謂之宁倚几有訓誦之諌工師所誦之諫書之于几也居寝有􅉏御之箴􅉏近也臨事有瞽史之道宴居有工師之誦史為書太史君舉則書瞽為詩工誦箴諌大夫䂓誨士傳言庶人謗商旅于市旅陳也陳其貨物以示時所貴尚百工獻藝獻其技藝以俞政事動則左史書之言則右史書之其書春秋尚書有存者御瞽㡬聲之上下幾猶察其樂不幸而至于有過則又有争臣七人面折廷爭以正捄之盖所以飬之之備至于如此是以恭已南面中心無為以守至正而貌之恭足以作肅言之従足以作又視之明足以作哲聴之聰足以作謀思之睿足以作聖然後能以八柄馭群臣八統馭萬民而賞無不慶刑無不威逺無不至邇無不服傅説所謂奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民武王所謂亶聰明作元后元后作民父母所謂天降下民作之君作之師惟其克相上帝寵綏四方箕子所謂皇建其有極斂時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極董子所謂正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方者正謂此也天無私覆地無私載日月無私照故王者奉三無私以勞于天下則兼臨愽愛廓然大公而天下之人莫不心悦而誠服倘于其間復以新舊而為親疎則其偏黨之情褊狭之度固已使人􅍀然有不服之心而其好悪取舍又必不能中于義理而甚則至于沮謀敗國妨徳亂政而其害則不可勝言者天下之本在國國之本在家故人主之家齊則天下無不治人主之家不齊則未有能治其天下者也是以三代之盛聖賢之君能修其政者莫不本于齊家盖男正位乎外女正位乎内而夫婦之别嚴者家之齊也妻齊體于上妾承接于下而嫡庶之分定者家之齊也采有徳戒聲色近嚴敬逺技能者家之齊也内言不出外言不入苞苴不逹請謁不行者家之齊也然閨門之内恩常掩義是以雖以英雄之才尚有困于酒色溺于情愛而不能自克者苟非正心修身動由禮義使之有以服吾之徳而威吾之威則亦何以正其宫壼社其請託檢其姻戚而防禍亂之萌㢤書曰牝雞之晨惟家之索傳曰福之興莫不本乎室家道之衰莫不始乎閫内一念之萌則必謹而察之此為天理耶為人欲耶果天理也則敬以擴之而不使其少有壅閼果人欲也則敬以克之而不使其少有凝滯推而至于言語動作之間用人處事之際無不以是裁之知其為是而行之則行之惟恐其不力而不當憂其力之過也知其為非而去之則去之惟恐其不果而不當憂其果之甚也知其為賢而用之則任之惟恐其不専聚之惟恐其不衆而不當憂其為黨也知其為不肖而退之則退之惟恐其不速去之惟恐其不盡而不當憂其有偏也如此則聖心洞然中外融徹無一毫之私欲得以介乎其間而天下之事将惟所欲為無不如志矣古先聖王所以立師傅之官設賓友之位置諍諌之職凡以先後縦更左右維持惟恐此心頃刻之間或失其正而已原其所然者誠以天下之本在是一有不正則天下萬事将無一物得其正者故不得而不謹也天下之事千變萬化其端無窮而無一不本于人主之心者此自然之理也故人主之心正則天下之事無一不出于正人主之心不正則天下之事無一得由于正盖不惟其賞之所勸刑之所威各隨所向勢有不能已者而其觀感之間風動神速又有甚焉是以人主以眇然之身居深宫之中其心之邪正而其符騐之著于外者常若十目所視十手所指而不可揜此大舜所以有惟精惟一之戒孔子所以有克已復禮之云皆所以正吾此心而為天下萬事之本也此心既正則視明聴聰周旋中禮而身無不正是以所行無過不及而能執其中雖以天下之大而無一人不歸吾之仁者然邪正之騐著於外者莫先於家人而次及於左右然後有以達于朝廷而及于天下焉若宫闈之内端荘齊肅后妃有闗雎之徳後宫無盛色之譏貫魚順序而無一人敢恃恩私以亂典常納賄賂而行請謁此則家之正也退朝之後従容燕息貴戚近臣擕僕奄尹侍陪左右各恭其職而上憚不悪之嚴下謹覆盆之戒無一人敢通内外竊威福招權市寵以紊朝政此則左右之正也内自禁省外徹朝廷二者之間洞然無有毫髪私邪之間然後發號施令群聴不疑進賢退姦衆志咸服紀網得以振而無侵撓之患政事得以修而無阿私之失此所以朝廷百官六軍萬民無敢不出于正而治道畢也心一不正則是數者固無従而得其正是數者一有不正而曰心正則亦安有是理哉是以古先聖王兢兢業業持守此心雖在紛華波動之中幽獨得肆之地而所以精之一之克之復之如對神明如臨淵谷未嘗敢有須㬰之怠然猶恐其隐微之間或有差失而不自知也是以建師保之官以自開明列諌諍之職以自䂓正而凡其飲食酒漿衣服次舍器用財賄與夫宦官宫妾之政無一不領于冢宰之官使其左右前後一動一静無不制以有司之法而無纎芥之隙瞬息之頃得以隐其毫髪之私盖雖以一人之尊深居九重之邃而懔然常若立乎宗廟之中朝廷之上此先王之治所以由内及外自微至著精粹純白無少瑕翳而其遺風餘烈猶可以為後世法程也人主當務聰明之實而不當求聰明之名信任大臣日與圖事反覆辯論以求至當之歸此聰明之寔也偏聽左右輕信人言此聴明之名也務其寔者今雖未明乆必通悟務其名者或一時可以竦動觀聴然中寔未明愈乆而愈暗矣二者之間所差毫釐而其得失則有大相逺者講學所以明理而𨗳之于前定計所以飬氣而督之于後任賢所以修政而經緯乎其中天下之事無出乎此者矣問聖人兼三才而兩之曰上至天下至地中間是人塞乎兩間者無非此理雖是聖人出来左提右挈原始要終無非欲人有以全此理而不失其本然之性天佑下民作之君師之師只是為此道理所以作箇君師以輔相裁成左右民使各全其秉彞之良而不失其本然之善而已故聖人以其先得諸身者與民共之只是為這一箇道理南軒張氏曰人主尤不可孤立堯舜明四目達四聰通天下為一身若紂則為獨夫矣漢武謂多欲不宜君國子民此言極是既是多欲豈可使之君國子民武帝雖能言此他却亦是多欲然此言不可以人廢人主不可以蒼蒼者便為天當求諸視聴言動之間一念纔是便是上帝覽觀上帝臨汝簡在帝心一念纔不是便是上帝震怒西山真氏曰知父母之心者可以知天心知人君之道者可以知天道盖父母之于子也鞫育而遂字之仁也鞭扑而教戒之亦仁也君之于臣也爵賞以褒勸之仁也刑罰以聳礪之亦仁也天佑民而作之君其愛之深望之切無異親之于子君之于臣也故君徳無媿則天為之喜而祥瑞生焉君徳有闕則天示之譴而災異形焉災祥雖異所以勉其為善一也天之愛君如此為人君者其可不以天之心為心乎鶴山魏氏曰古之人君以天位為至艱至危如履虎尾如蹈春氷如痌瘝乃身是故師氏司朝僕臣正位太史奉諱工師誦詩御瞽幾聲巫史後先卜筮左右人主無一時可縦弛也虞賔在位三恪助祭夏士在庭􅎋士在廟讎民在甸夷隸在門人主無一事不戒懼也蟲飛而㑹盈日出而視朝日退而路寝聴政日中而考政夕而紏䖍天刑日入而絜奉粢盛然後即安人主無一刻可暇逸也后妃御見有度應門擊柝鼓人上堂女史授環彤管記過人主無一息可肆欲也夫以貴為天子富有四海之内而自朝至昃兢兢業業居内之日常少居外之日常多盖所以飬夀命之源保身而保民也豈惟可以保民雖子孫千億亦自此始自秦人蕩滅古制為人上者深居穆清而受事于婦寺出令于房闥四方文書非􅉏御之臣不得上聞千數百年以来相尋一轍于是宦官外戚女寵嬖倖代操政柄人主僅擁虚器以寄于民上其接士大夫不敢視朝數刻之外凡以傷生伐性者畢陳于前豈惟湮政事之原抑以傷夀命之本身不得康嗣不得蕃凡以是耳魯齋許氏曰民生有欲無主乃亂上天眷命作之君師必予之聰明剛㫁之資重厚包容之量使首出庶物表正萬邦此盖天以至難任之非予之可安之地而娛之也堯舜以来聖帝明王莫不兢兢業業小心畏慎日中不暇未明求衣誠知天之所畀至難之任初不可以易心處也知其為難而以難處則難或可易不知為難而以易處則他日之難有不可為者矣孔子曰人之言曰為君難為臣不易則其説所由来逺矣人君不患出言之難而患踐言之難知踐言之難則其出言不容不慎矣昔劉安世見司馬温公問盡心行已之要可以終身行之者公曰其誠乎劉公問行之何先公曰自不妄語始劉公初甚易之及退而自櫽括平日之所行與凡所言自相掣肘矛盾者多矣力行七年而後成自此言行一致表裏相應遇事坦然常有餘裕夫劉安世一士人也所交者一家之親一鄊之衆同列之臣不過數十百人而止耳然以言行相較猶有自相掣肘矛盾者况夫天下之大兆民之衆事有萬變日有萬幾而人君以一身一心酧酢之欲言之無失豈易能㢤故有昔之所言而今日不記者今之所命而後日自危者可否異同紛更變易紀綱不得布法度不得立臣下雖欲黽勉而無所持循徒汩沒于瑣碎之中卒于無補况因之為弊者又日新月盛而不可遏在下之人疑惑驚眩且議其無法無信一至于此也此無他至難之地不以難處而以易處之故也苟従古者大學之道以修身為本凡一事之來一言之彂必求其所以然與其所當然不牽于愛不蔽于憎不因于喜不激于怒虚心端意孰思而審處之雖有不中者盖鮮矣奈何為人上者多樂舒肆為人臣者多事容悦容悦本為私也私心盛則不畏人矣舒肆本為欲也欲心熾則不畏天矣以不畏天之心與不畏人之心感合無間則所務者皆快心事矣快心則口欲言而言身欲動而動又豈肯兢兢業業以修身為本一言一事熟思而審處之乎此人君踐言之難所以又難于天下之人也人君處億兆之上所操者予奪進退賞罰生殺之權不幸見欺以非為是以是為非其害可勝既耶人君惟無喜怒也則賛其喜以市恩鼓其怒以張勢人君惟無愛憎也有愛憎則假其愛以濟私藉其憎以復怨甚至本無喜也誑之使喜本無怒也激之使怒本不足愛也强譽之使愛本無可憎强短之使憎若是則進者未必為君子退者未必為小人予之者或無功而奪之者或有功也以至賞之罰之生之殺之鮮有得其正者人君不悟日在欺中方仗若曹擿發細隠以防天下之欺欺而至此欺尚可防耶大抵人君以知人為貴以用人為急用得其人則無事于防矣既不出此則所近者爭進之人耳好利之人耳無恥之人耳彼挟詐用術千蹊萬徑以蠱君心于此欲防其欺雖堯舜不能也為人君止于仁天地之心仁而已矣君徳程子曰為宗社生靈長乆之計惟是輔飬上徳而輔飬之道非徒渉書史覽古今而已要使跬步不離正人乃可以􅉼飬薫陶成就聖徳河東候氏曰君徳天徳也有此盛徳故能上順天理下達人情無一事之繆無一物之戾如天之徳如淵之深見而民莫不敬言而民莫不信行而民莫不悦其聲名之洋溢也無逺無近無内無外極天地之所覆載日月之所照臨霜露之所墜凡有血氣者無不尊親故曰配天聖人之事盡于是矣華陽范氏曰書曰自成湯至于帝乙成王畏相其稱中宗曰嚴恭寅畏大王王季曰克自抑畏詩曰維此文王小心翼翼夫為人君動必有所畏此盛徳也不然以一人肆于民上其何所不至㢤豫章羅氏曰仁義者人主之術也一于仁天下愛之而不知畏一于義天下畏之而不知愛三代之主仁義兼隆所以享國至于長乆自漢以来或得其偏如漢文帝過于仁宣帝過于義夫仁可過也義不可過也朱子曰修徳之寔在乎去人欲存天理人欲不必聲色貨利之娛宫室觀逰之侈也但存諸心者小失其正便是人欲必也存祗懼之心以畏天擴寛𢎞之度以盡下不敢自是而欲人必已同不循偏見而謂衆無足取不甘受佞人而外敬正士不狃于近利而昧于逺猷出入起居發號施令念兹在兹不敢忘怠而又擇端人正士剛明忠直能直言極諌者朝夕與居左右不使近習便利捷之人得以窺伺間隙承迊指意汚染氣習惑亂聰明務使此心虚明廣大平正中和表裏洞然無一毫私意之累然後為徳之修而上可以格天下可以感人凡所欲為無不如志西山真氏曰三代聖王以敬為修身立政之本故伊尹告太甲曰嗣王祗厥身念㢤又曰欽厥止率乃祖攸行周公之戒成王一則曰嚴恭寅畏天命自度二則曰治民祗懼不敢荒寧三則曰克自抑畏四則曰皇自敬徳而召公之誥一則曰嗚呼奈何弗敬二則曰王其疾敬徳三則曰王敬作所不可不敬徳四則曰惟不敬厥徳乃早墜厥命伊周召公皆古聖賢而所以啟廸其君者如出一口又考之書昏迷不恭侮慢自賢禹之所以征有苗也威侮五行怠棄三正啟之所以伐有扈也狎侮五常荒怠弗敬謂已有天命謂敬不足行武王之所以誅獨夫受也盖敬則為堯舜為禹湯為文武不敬則為有苗為有扈為獨夫受聖狂之所以分治亂之所由判未有不出乎此者先聖賛易于乾曰君子以自强不息謂其體天之剛健也于坤曰君子以厚徳載物謂其法地之博厚也不體乎乾無以宰萬物不法乎坤無以容萬物汎觀古昔凡過于剛者為亢為暴為强明自任偏于柔者為闇為懦為優柔不㫁雖其失不同而害治一也誠之為道可以參天地賛化育其功用大矣然求其用力之地不過曰無妄也不欺也悠乆不息也盡此三者而誠之體具矣何謂無妄就乎真寔而不雜以虚偽是也何謂不欺戒謹乎其所不睹恐懼乎其所不聞是也何謂不息終始惟一時乃日新是也此三者有一之未至焉則去聖逺矣姑舉其槩言之寔奢而文之以儉寔暴而掩之以仁所樂者諛佞而外為納諌之名所愛者姦邪而謬為敬賢之貎此妄也非誠也修飾于大庭廣衆之中而放肆于深宫燕閑之地矯柔于親近君子之際而發露于昵比小人之時此欺也非誠也敬畏未㡬而慢忽繼之儉約未幾而侈泰隨之勤怠之靡常而暴寒之不一凡此者皆非誠也易曰鳴鶴在陰其子和之言其應之速也詩曰鼓鐘于宫聲聞于外言其寔之易彰也茍意念少差則觀感立異豈不甚可畏㢤聖學程子曰人心廣大無垠萬善咸備盛徳大業由此而成故欲傳堯舜禹湯文武之道擴充是心焉爾帝王之學與儒士異尚儒生従事章句文義帝王務得其要措之事業盖聖人經世大法備在方冊苟得其要舉而行之無難也人主之學惟當務為急辭命非所先也古之人君守成業而致盛治者莫如周成王其所以盛徳則由乎周公周公之輔成王也幼而習之所見必正事所聞必正言左右前後必正人故習與智長化與心成今輔飬之道不可不至也所謂輔飬之道非謂告詔以言過而後諌也尤在􅉼飬薫陶之而已矣今夫一日之間接賢士大夫之時多親寺人官官之時少則氣質自化徳器自成謹選賢徳之士以待勸講講讀既罷常留以備訪問従容燕語不獨漸摩至于人情物態稼穡艱難日積既乆自然通達比之常處深宫為益多矣夫傳徳義者在乎防聞見之非莭嗜欲之過保身體者在乎適起居之宜存畏謹之心故左右近侍宜選老成厚重小心之人服飾器用皆須質朴之物俾華巧靡麗不至于前淺俗之言不入于耳凡動作言語必使講勸者知之庶幾隨物箴規應時諌正調䕶聖躬莫過于此矣人君居崇髙之位持威福之柄百官畏懼而莫敢仰視萬方崇奉而所欲必得苟非知道畏義所飬如此則中常之君無不驕肆英明之主自然滿假此古今同患治亂所由也所以周公告成王稱前王之徳以寅恭祗懼為首云歴觀前古成就幼主莫備于周公為萬世之法考之立政之書其言常伯常任之尊與綴衣虎賁之賤同以為戒要在得人以為知恤者鮮也終萹反覆惟此一事而已夫僕臣正厥后克正左右侍御僕従罔匪正人旦夕承弼然後起居出入無違禮也發號施令無不善也後世不復如此以謂人主就學所以涉書史覽古今也夫此一端而已茍曰如是而足則能文宫人可以備勸講知書内侍可以充輔𨗳又何必置官設職求賢徳之士哉自古帝王才質鮮不過人完徳有道之君至少其何故㢤皆輔飬不得其道而勢位使之然也華陽范氏曰人主學與不學擊天下之治亂如好學則天下之君子欣慕碩立于朝以直道事上輔助徳業而致太平矣如不好學則天下之小人皆動其心欲立于朝以邪謟事上竊取富貴而専權利矣龜山楊氏曰古之聖人固宜莫如舜也舜之在側微與木石居鹿豕逰固無異于深山之野人也是豈以文采過人邪伏羲畫八卦書㫁自堯典當是時六經盖未有也而舜之所以聖者果何自㢤然則聖人之所以為聖其學必有在矣武夷胡氏曰明君以務學為急聖學以正心為要心者事物之宗正心者揆事宰物之權也六經所載古訓不可不攷若夫分章析句牽文制義無益于心術者非帝王之業也心者身之本也正心之道先致其知而誠意故人主不可不學也盖戡定禍亂雖急于戎務必本于方寸不學以致知則方寸亂矣何以成帝王之業乎致堂胡氏曰古之人君既得賢材布之列位矣于是朝以聴政則公卿在前史在左右諌諍七人訓告教誨而無怠朝矣晝以訪問則監于成憲學于古訓多識前言往行與萬民之疾苦物情之幽隐而無怠晝矣夕以修令則思夫應違慮夫榮辱慎而後出奠而後發不敢苟也而無怠夕矣而又無淫于觀于逸于逰于畋于酒于樂而又盤有銘几有戒杖有詔器有箴圖有規藝有諌夫以以寅恭祗懼不使放心邪氣得溺焉者如此夜而寝息則又有雞鳴之賢妃卷耳之㳤女警戒相成不懐宴安昧爽丕顯坐以待旦此乃憂勤之事也憂勤如此乃可以端拱無為也是故勤勞者非衡石程書衛士𫝊餐之謂也無為者非遺棄萬務嘿然兀然之謂也稽無逸周公之言則人君之法具矣豫章羅氏曰人主讀經則師其意讀史則師其迹然讀經以尚書為先讀史以唐書為首盖尚書論人主善悪為多唐書論朝廷變故最盛朱子曰天下之事其本在于一身而一人之身其主在于一心故人主之心一正則天下之事無有不正人主之心一邪則天下之事無有不邪如表端則影直源濁則流汙其理有必然者是以古先哲王欲明其徳于天下者莫不一以正心為本然本心之善其體至微而利欲之攻不勝其衆甞試驗之一日之間聲色臭味㳺衍馳驅土木之華貨利之殖雜進于前日新月盛其間心體湛然善端呈露之時盖絶無而僅有也茍非講學之功有以開明其心而不迷于是非邪正之所在又必信其理之在我而不可以須㬰離焉則亦何以得此心之正勝利欲之私而應事物無窮之變乎然所謂學則又有邪正之别焉味聖賢之言求以義理之當察古今之變以驗得失之幾而必反之身以踐其寔者學之正也涉獵記誦而以雜博相髙割裂装綴而以華靡相勝反之身則無寔措之行則無當者學之邪也學之正而心有不正者鮮矣學之邪而心有不邪者亦鮮矣故講學雖所以為正心之要而學之邪正其擊于所行之得失而不可不審者又如此易曰正其本萬事理差之毫釐繆以千里舜之戒禹曰人心惟危道心惟微惟精惟一允執厥中而必繼之曰無稽之言勿聴弗詢之謀勿庸慎乃有位敬修其可碩四海困窮天祿永終孔子之告顔淵既曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎㢤而又申之曰非禮勿視非禮勿聴非禮勿言非禮勿動既告之以損益四代之禮樂而又申之曰放鄭聲逺佞人鄭聲淫佞人殆嗚呼此千聖相傳心法之要其所以極夫天理之全而察乎人欲之盡者可謂兼其本末巨細而舉之矣兩漢以来非無碩治之主而莫克有志于此是以雖或隨世以就功名而終不得以與乎帝王之盛其或耻為庸主而思用力于此道則又不免蔽于老子浮屠之説静則徒以虚無寂滅為樂而不知有所謂寔理之原動則徒以應縁無礙為達而不知有所謂善悪之幾是以日用之間内外乖離不相為用而反以害于政事盖所謂千聖相傳心法之要者于是不復講矣帝王之學雖與韋布不同經綸之業固與章句有異然其本末之序竊以為無二道也聖賢之言平鋪放著自有無窮之味于此従容玩黙識而心通焉則學之根本于是乎立而其用可得而推矣患在立説貴于新竒推類欲其廣博是以反失聖言平淡之真味而徒為學者口耳之末習至于人主能之則又適其所以為作聰明自賢聖之具不惟無益而害有甚焉人主所以制天下之事者本乎一心而心之所主又有天理人欲之異二者一分而公私邪正之塗判矣盖天理者此心之本然循之則其心公而且正人欲者此心之疾疢循之則其心私而且邪公而正者逸而日休私而邪者勞而日拙其效至于治亂安危有大相絶者而其端特在夫一念之間而已舜禹相傳所謂人心惟危道心惟㣲惟精惟一允執厥中者正此謂也人主之學當以明理為先是理既明則凡所當為而必為所不當為而必止莫非循天之理而非有意必固我之私也周武王之言惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母而孟子又曰堯舜性之湯武反之盖甞因此二説而深思之天地之大無不生育固為萬物之父母矣人于其間又獨得其氣之正而能保其性之全故為萬物之靈若元后者則于人類之中又獨得其正氣之盛而能保其全性之尤者是以能極天下之聰明而出乎人類之上以覆冒而子畜之是則所謂作民父母者也然以自古聖賢觀之惟帝堯大舜生而知之安而行之為能履此位當此責而無媿若成湯武王則其聰明之質固己不能如堯舜之全矣惟其能學而知能利而行能擇善而固執能克己而復禮是以有以復其徳性聰明之全體而卒亦造夫堯舜之域以為億兆之父母葢其生質雖若不及而其反之之至則未甞不同孔子所謂及其成功一也正此之謂也誠能于日用之間語黙動静必求放心以為之本而于玩經觀史親近儒學已用力處益用力焉數召大臣切劘治道俾陳要急之務至羣臣進對亦賜温顔反覆詢訪以求政事之得失民情之休戚而又因以察其人材之邪正短長庶于天下之事各得其理經厯詳盡浹洽貫通聰明日開志氣日强徳聲日聞治效日著四海之内瞻仰畏愛如親父母則是反之之至而堯舜湯武之盛不過如此勉齋黄氏曰帝王之學必先格物致知以極夫事物之變使義理所存纎悉畢照則自然意誠心正而可以應天下之務西山真氏曰惟學可以飬此心惟敬可以存此心惟親近君子可以維持此心盖義理之與物欲相為消長者也篤志于學則日與聖賢為徒而有自得之樂持身以敬則凛如神明在上而無非僻之侵親賢人君子之時多則䂓儆日聞謟邪不得而惑三者交致其力則聖心湛然如日之明如水之清義理為之主而物欲不能奪矣人主之學其要在于誠意正心修身齊家以為出治之本非徒琱鎪詞藝破析章句為書生之末技而已魯齋許氏曰凡人之情敬慎于憂危惰慢于暇豫惟聖人不如此堯舜只兢兢業業無已時憂危暇豫處之如一一日二日萬幾何得惰慢程子謂惟慎獨可以行王道初未然之徐而思之不如此不能行王道盖功夫有間㫁故也以太宗之英明猶于此不能進兩漢文帝光武敬慎終身然聖學不足以成就之惜哉儲嗣涑水司馬氏曰古之明王教飬太子為之擇方正敦良之士以為保傅師友朝夕與之逰處左右前後無非正人出入居處無非正道五峰胡氏曰養太子不可以不慎也望太子不可以不仁也大本正然後可以保國一天下朱子曰賈誼作保傅傳其言有曰天下之命擊于太子太子之善在于早教諭與選左右教得而左右正則太子正太子正而天下定矣此天下之至言萬世不可易之定論也至論所以教諭之方則必以孝仁禮義為本而其條目之詳則至於容貎詞氣之微衣服器用之細纎悉曲折皆有法度一有過失則史書之䇿宰撤其膳而又必有進善之旌誹謗之木敢諌之鼓瞽詩史書工誦箴諌士傳民語必使至于化與心成中道若性而猶不敢怠焉其選左右之法則有三公之尊有三少之親有道有充有弼有承上之必得周公太公召公史佚之流乃勝其任下之猶必取于孝弟博聞有道術者不幸一有邪人厠乎其間則必逐而去之是以太子朝夕所與居處出入左右前後無非正人而未嘗見一悪行此三代之君所以有道之長至于累數百年而不失其天下也當誼之時固己病于此法之不備然考孝昭之詔則猶知誦習誼之所言而有以不忘乎先王之意降而及于近世則帝王所以教子之法益疎畧矣盖其所以教不過記誦書札之工而未嘗開以仁孝禮義之習至于容貎詞氣衣服器用則雖極于邪侈而未甞有以裁之也寮属具員而無保傅之嚴講讀備禮而無箴規之益至于朝夕所與出入居處而親宻無間者則不過宦官近習掃除趋走之流而已夫以帝王之世當𫝊付之統上有宗廟社稷之重下有四海烝民之生前有祖宗垂創之艱後有子孫長乆之計而所以輔飬之具疎畧如此是猶家生明月之珠夜光之璧而委之衢路之側盜賊之衝也豈不危㢤魯齋許氏曰有家有國所以立適嗣無所争者出于無為而分定故也如走兎在野人競逐之積兎在市過而不頋此之謂分定君臣程子曰君貴明不貴察臣貴正不貴權華陽范氏曰書曰元首明㢤股肱良㢤庶事康㢤又曰元首叢脞㢤股肱惰㢤萬事墮㢤此舜皋陶所以賡歌而相戒也夫君以知人為明臣以任職為良君知人則賢者得行其所學臣任職則不賢不得苟容于朝此庶事所以康也若夫君行臣職則叢脞矣臣不任臣之事則惰矣此萬事所以墮也當舜之時禹平水土稷播百穀土穀之事舜不親也契敷五教皋陶明五刑教刑之事舜不治也伯夷典禮䕫典樂禮樂之事舜不與也益為虞垂為共工虞工之事舜不知也禹為一相總百官自稷以下分職以聴焉君人者如天運于上而四時寒暑各司其序則不勞而萬物生矣君不可以不逸所治者大所司者要也臣不可以不勞也所治者寡所職者詳也不明之君不能知人故務察而多疑欲以一人之身代百官之所為則雖聖智亦曰力不足矣故其臣下事無大小皆歸之君政有得失不任其患賢者不得行其志而持禄之士得以保其位此天下所以不治也五峰胡氏曰人君剛健中正純粹首出庶物者也人臣柔順利貞順承乎天而時行者也寡欲之君然後可與言王道無欲之臣然後可與言王佐自三代之道不行君臣之義不明君誘其臣以富貴臣干其君以文行夫君臣相與之際萬化之原也既汩于利矣未流其可禁乎此三代之治所以不復也朱子曰君臣之際權不可畧重纔重則無君且如漢末天下唯有曹氏而已魏末唯知有司馬氏而已魯荘僖之際也得箇季友整理一畨其後季氏遂執其權厯三四世魯君之勢全無了但有一季氏而已葉賀孫問也是合下君臣之間其識慮不逺曰然所以聖人垂戒謂臣弑君子弑父非一朝一夕之故其所由来者漸矣由辨之不早辨也這箇事體初問只爭些小到後来全然只有一邊聖人所以一日二日萬幾常常戒謹恐懼詩稱文王之盛于後便云殷之未喪師克配上帝宜鑒于􅎋駿命不易此處甚多問忠只是寔心人倫日用皆當用之何獨只于事君上説忠字曰父子兄弟夫婦皆是天理自然人皆莫不自知愛敬君臣雖亦是天理然是義合世之人便自易得苟且故湏于此説忠却是就不足處説如莊子説命也義也天下之大戒㸔這説君臣自有不得已意思問君臣父子同是天倫愛君之心終不如愛父何也曰離畔也只是庶民賢人君子便不如此韓退之云臣罪當誅兮天王聖明此語何故程子云是好文公豈不知紂之無道却如此説是非欺誑衆人直是有説須是有轉語方説得文王心出㸔来臣子無説君父底道理此便見得是君臣之義處荘子云天下之大戒二命也義也子之于父無適而非命也臣之于君無適而非義也無所逃于天地之間東莱吕氏曰畢公弼亮四世為周父師而康王之冊尚有罔曰弗克罔曰民寡之戒康王非敢少畢公盖䂓警勉飭此是君臣間常法初不以耆艾廢也臣道程子曰臣之于君竭其忠誠致其才力用否在君而已不可阿諛逢逢以求君之厚己也事君者知人主不當自聖則不為謟諛之言知人臣義無私交則不為阿黨之計君子之事君也不得其心則盡其誠以感發其志而已誠積而動則雖昏䝉可開也雖柔弱可輔也雖不正可正也古之人事庸君常主而克行其道者以已誠上達而其君信之之篤耳人臣身居大位功盖天下而民懐之則危疑之地也必也誠積於中動不違理威福不自已出人惟知君而已然後位極而無逼上之嫌勢重而無專權之過斯可謂明哲君子矣周公孔明其人也郭子儀有再造社稷之功威震人主而上不疑之也亦其次與臣賢於君則輔君以所不能伊尹之於太甲周公之於成王孔明之於劉禅是也臣不及君則賛助之而已剛健之臣事柔弱之君而不為矯飾之行者鮮矣夫上下之交不誠而以為也其能乆相有乎人臣之義位愈高而思所以報國者當愈勤飢則為用飽則飛去是以鷹犬自期也曾是之謂愛身乎問世傳成王幼周公攝政荀卿亦曰履天下之籍聴天下之㫁周公果踐天子之位行天子之事乎曰非也周公位冢宰百官總己以聴之而己安得踐天子之位又問君薨百官聴于冢宰者三年爾周公至于七年何也曰三年謂嗣王居憂之時也七年為成王幼故也又問賜周公以天子之禮樂當否曰始亂周公之法度者是賜也人臣安得用天子之禮樂㢤成王之賜伯禽之受皆不能無過記曰魯郊非禮也其周公之衰乎聖人嘗譏之矣説者乃曰周公有人臣不能為之功業因賜以人臣所不得用之禮樂則妄也人臣豈有不能為之功業㢤借使功業有大于周公亦是人臣所當為耳人臣而不當為其誰為之豈不見孟子言事親若曽子可也曾子孝亦大矣孟子纔言可也盖曰子之事父其孝雖過于曽子必竟是以父母之身做出来豈是分外事若曽子僅可免責爾臣之於君猶子之於父也臣之能立功業者以君之人民也以君之勢位也假如功業大于周公亦是以君之人民勢位做出来而謂人臣所不能為可乎使人臣恃功而懐怏怏之心者必此言矣張子曰近臣守和和平也和其心以備頋對不可徇其喜好悪龜山楊氏曰人臣之事君豈可佐以刑名之説如此是使人主失人心也人主失人心則不足以得人故人臣能使其君視民如傷則王道行矣問以匹夫一日而見天子天子問焉盡所懐而陳之則事必有窒礙者不盡則為不忠如何曰事亦須量深淺孔子曰信而後諌未信則以為謗已也易之恒曰浚恒凶此恒之初也故當以漸而不可以浚浚則凶矣假如問人臣之忠邪其親信者誰與遽與之辨别是非則有失身之悔君子于此但不可以忠為邪以邪為忠語言之間故無不委曲也至于論理則不然如恵王問孟子何以利吾國則當言何必曰利宣王問孟子卿不同則當以正對盖不直則道不見故也和靖尹氏毎赴經筵前夕必沐浴更衣衣皆薰香設香案以来日所當講書置案上朝服再拜拈香又再拜齊于燕室初夜乃寝次日入侍講筵學者問焉曰必欲以所言感悟君父安得不盡敬人君其尊如天必湏盡己之誠意又曰以吾所言得入則天下䝉其利不能入則反之安敢不盡誠敬致堂胡氏曰忠愛其君者必思納諸無過之地而不計一身之安危不忠不愛者惟其身之營使君荒怠昏亂而不恤也莫難强如怠心莫難制如慾心莫難降如驕心莫難平如怒心莫難抑如忌心莫難開如惑心莫難觧如疑心莫難正如偏心然皆放心也大人格君心之非者格此䓁也未至乎大人而當大人之任亦當勉勉焉思齊以事其君君心怠則强之慾則制之驕則降之怒則平之忌則抑之惑則開之疑則觧之偏則正之要使君心常収而不放則善日起悪日消治可立安可保矣夫水源濁則流汙源清則流潔古之人所以悪夫逢君之悪者為病其源也事功出于臣下效智謀輸才力及其有成必曰此君之徳非臣所能也君亦安然受之不㡬于偽乎盖道固當然非偽也在易坤之六三曰含章可貞或従王事無成有終謂有功徳則隐晦夫美而歸之于君不敢當其成然後下得恭順之道而上無忌悪之心也在師之九二曰在師中吉承天寵也為衆之主専制其事所以能吉者以受委于君非己無因而致者也是故智如良平不侍帷幄為謀主則滅秦臬羽之事何以效畧如英衞不授鈇鉞制閫外則征伐四克之績何以著故自古有成功而知此道者必謙虚退讓沖然而若無不然既非所以蓄徳又非所以全身也夫矜伐生于氣盈貪戀生于氣慊所以然者為利祿耳有大勲勞于天下孰若周公使周公以勲勞自居既以翦商受賞又以東征受賞又以踐奄受賞又以滅國五十受賞又以制禮樂頒度量受賞必見于詩書今可考者為太師位冢宰開國曲阜以候伯禽而已不聞賞而又賞也太師冢宰其所當為也俾侯于東衆建親賢非私于周公也然則周公有大勲勞而未甞取賞明矣故曰以周公之才之美使驕且吝其餘不足觀也已驕吝者盈而歉之謂歟忠賢之于事有所不可亦陳其正理開悟君心而已聴否雖仲尼孟子不能必其説之行也苟必其説之行将用智任術與小人無異矣故曰若夫成功則天也五峰胡氏曰守身以仁以守身之道正其君者大臣也漢唐之盛忠臣烈士攻其君之過禁其君之欲紏其君之謬彈其人之佞而已求其大正君心引之志于人者吾未之見也惟董生其庶幾乎豫章羅氏曰士之立朝要以正直忠厚為本正直則朝廷無過失忠厚則天下無嗟怨二者不可偏也一于正直而不忠厚則漸入于刻一于忠厚而不正直則流入于懦汲黯正直所以闢公孫𢎞之阿諛忠厚所以闢張湯之殘刻武帝享國五十五年其臣之賢獨此一人而已立朝之士當愛君如愛父愛國如愛家愛民如愛子然三者未甞不相賴也凡人愛君則必愛國愛國則必愛民未有以君為心而不以民為心者故范希文謂居廟堂之上則憂其民處江湖之逺則憂其君諒㢤士之立身要以名莭忠義為本有名莭則不枉道以求進有忠義則不固寵以欺君矣朱子曰古之君子居大臣之任者其于天下之事知之不惑任之有餘則汲汲乎其時而勇為之知有所未明力有所不足則咨訪講求以進其知扳援汲引以求其助如捄火追亡尤不敢以少緩上不敢愚其君以為不足與言仁義下不敢鄙其民以為不足以興教化中不敢薄其士大夫以為不足共成事功一日立乎其位則一日業乎其官一日不得乎其官則不敢一日立乎其位有所愛而不肯為者私也有所畏而不敢為者亦私也屹然中立無一毫私情之累而惟知其職之所當為者夫如是是以志足以行道道足以濟時而于大臣之責可以無愧臣子無愛身自佚之理今之仕官不能盡心盡職者是無那先其事而後其食底心誠以天下之事為己任則當自格君心之非始欲格君心則當自身始夫宰相以得士為功下士為難而士之所守乃以不自失為貴于天下之事有可否則㫁以公道而勿牽于内頋偏聴之私于天下之議有従違則開以誠心而勿誤以陽開陰闔之計則庶乎徳業盛大表裏光明中外逺邇心悦誠服南軒張氏曰伊尹云予弗克俾厥后惟堯舜其心愧耻若撻于市一夫不獲時予之辜君不堯舜心便愧恥民有不獲是為己辜真所謂任天下之重者存伊尹之心方得畢公以四朝元老方且克勤小物若在吾人則合當如此也古人未嘗不謙至周公方説謙盖周公以天子之叔父而又為宰相猶且自處以謙若在吾人則亦合當為者也謙之九三伊川専以指周公徳言盛禮言恭徳只要盛禮只要恭又曰某于世間無所愛慕亦無所享用惟有報君愛民之事在所當為耳象山陸氏曰古人所以不屑屑于間政適人而必務有以格君心者盖君心未格則一邪黜一邪登一弊去一弊興如循環然何以窮已及君心既格則䂓模趋鄉有若燕越邪正是非有若蒼素大明既升群陰畢伏是瑣瑣者亦何足汚人牙頬間㢤勉齋黄氏曰臣子于君父與生俱生而不可懈于心者也食人之祿者當任其事此亦不待智者而後知也西山真氏曰古今事業未甞無所本諸葛武侯平生所立事業竒偉然求其所以則開誠心布公道集衆思廣忠益而已盖此四者乃武侯事業之本而誠之與公又其本也忠臣之心常欲君身之强固君徳之清明故動以聲色逰畋為藥石之戒古之人有行之者周公是也姦臣之心則不然君身强固則必不倦于政機而威權在已君徳清明則必不謬于邪正而用舍合宜此正人君子之所深碩而憸夫壬人之所甚不便者也故必蠱之以逸欲導之以奢淫然後其君恣肆昏荒而惟己之聴後之人有行之者趙髙仇士良是也二人刀鋸之餘何至深罪而春秋名卿如管仲趙武者亦安視其君有六嬖四姬之惑而不能救焉彼其人非姦慝也其志非蠱媚也乃至于是者由不古人保傅之職而以强兵制敵為功故也有志愛君者其可不以周公為法以管仲趙武為戒㢤魯齋許氏曰君子執威權未有無禍者豈惟人事在天道也不許夫月陰魄也借日為光與日相逺則光盛猶臣逺于君則聲名大威權重與日相近則光微愈近愈微臣道陰道理當如此大臣在君側而擅權此危道也古人舉善薦賢不敢自名欲恩澤出于君也刑人亦然恩威豈可使出于己使人知恩威出于己是生多少怨敵其危亡可立待也故月星皆借日以為光及近日却失其光此理殊可玩索性理大全書卷六十五

body:
  text: 性理大全書卷二十五洪範皇極內篇二天台謝氏無楙曰圖出河書出洛圖為易書為範易以象範以數象以偶數以竒知有數竒而不知有象偶是有書而無圖池知是象偶而不知有數竒是有圖而無書也易更四聖其象已著範錫神禹其數不𫝊於是有以數為象而竒零無用矣於是有以象為數而多偶難通矣夫推其極則卦與疇象與數相因為用固也原其初則卦自卦疇自疇象自象數自數其可混而一之乎九峯先生廣西山之家學暢考亭之師𫝊著皇極內篇與大易並行嘗即之而求其數矣始於一參於三究於九成於八十一備於六千五百六十一散之無外卷之無內體諸造化而不可遺其變化無窮未易以綱舉而條列也然其吉凶其悔吝其災祥休咎莫不粲然具見於八十有一章大抵以性命為端以禮義為準因占設教即事示戒欲正而不欲邪欲中而不欲偏為君子謀而不為小人謀凡所以揭天理叙民彛袪世迷障人欲者雖不與易同象而未嘗不與易同歸也其言曰天地所以肇人物所以生萬事所以得失皆數也數之體著於形數之用妙乎理非窮神知化獨立物表者曷足以與此嗚呼窮神知化獨立物表未易言也九峯先生其幾是歟不然將不知而作為元包為洞極為潜虛程子謂有之無所補無之靡所闕矣其何以閘範數配易象補前古之闕文垂將來之大法乎享數弗遐輝數未備尚不能無俟於後之君子是則猶有遺恨焉耳皇極內篇數總名丨丨原丨潜丨守丨信丨直丅丨䝉丨間丨須丨厲丨成冲振祈常丅柔易親華丨見獲從交育壯興欣舒丨比開晉公益丅章盈錫靡丅庶决豫升中丅伏過疑寡丨丅飾丅戾丅虛丅昧丅損丅丅用丅卻丅翕丅逺丨迅懼除弱疾丅競分訟收丨實賓危堅革丅報止戎結丨養遇勝囚壬丅固移墮終今列八十一圖于后古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情易有太極是生兩儀兩儀生四象四象生八卦八卦定吉凶吉凶生大業天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也昔者天錫禹洪範九疇也彞倫攸叙初一曰五行次二曰敬用五事次三曰農用八政次四曰協用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徵次九曰嚮用五福威用六極冲漠無眹萬象具矣動靜無端後則先矣器根於道道著器矣一實萬分萬復一矣混兮闢兮其無窮矣是故數者計乎此者也疇者等乎此者也行者運乎此者也微而顯費而幽神應不測所以妙乎此者也一者九之祖也九者八十一之宗也圓之而天方之而地行之而四時天所以覆物也地所以載物也四時所以成物也散之無外卷之無內體諸造化而不可遺者乎性理大全書卷二十五

body:
  text: 性理大全書卷四十四學二總論為學之方朱子曰學問不只於一事一路上理㑹未有耳目狹而心廣者其說甚好學者若有本領相次千枝萬葉都來凑著這裏看也須易曉讀也須易記學問須嚴密理㑹銖分毫析又曰愈細密愈廣大愈謹確愈髙明開闊中又著細密寬緩中又著謹嚴如其窄狹則當涵泳廣大氣象頽惰則當涵泳振作氣象學者須養教氣宇開闊宏毅常使截斷嚴整之時多膠膠擾擾之時少方好易曰學以聚之問以辨之寬以居之仁以行之語曰執德不𢎞信道不篤焉能為有焉能為亡學問之後斷以寬居信道篤而又欲執德𢎞者人之為心不可促迫也人心須令著得一善又著一善善之來無窮而吾心受之有餘地方好若只著得一善第二般來又未便容得如此無緣心廣而道積也自家猶不能快自家意如何他人却能盡快我意要在虛心以從善虛心順理學者當守此四字聖人與理為一是恰好其它以心處這裏却是未熟要將此心處理今人言道理說要平易不知到那平易處極難被那舊習纒繞如何便擺脫得去譬如作文一般那箇新巧者易作要平淡便難然須還他新巧然後造於平淡又曰自髙險處移下平易處甚難學者當常令道理在胸中流轉今學者之於大道其未及者雖有遲鈍却須終有到時唯過之者便不肯復回來耳師友之功但能示之於始而正之於終耳若中間二十分工夫自用喫力去做既有以喻之於始又自勉之於中又其後得人啇量是正之則所益厚矣不爾則亦何補於事或論人之資質或長於此而短於彼曰只有長善救失或曰長善救失不特教者當如此人自為學亦當如此曰然凡言誠實都是合當做底事不是說道誠實好了方去做不誠實不好了方不做自是合當誠實有一分心向裏得一分力有兩分心向裏得兩分力世間萬事須㬰變滅皆不足置胸中惟有窮理修身為究竟法耳大凡人只合講明道理而謹守之以無愧於天之所與者若乃身外榮辱休戚當一切聼命而已聖人千言萬語只是要教人做人為學只要至誠耐久無有不得不須别生計較思前算後也為學之要只在著實操存密切體認自己身心上理㑹切忌輕自表襮引惹外人辨論枉費酬應分却向裏工夫人須打疊了心下間思雜慮如心中紛擾雖求得道理也沒頓處須打疊了後得一件方是一件兩件方是兩件人固有終身為善而自欺者不特外靣有心中欲為善而常有箇不肯底意思便是自欺也須是要打疊得盡蓋意誠而後心可正過得這一關後方可進學者須是培養今不做培養工夫如何窮得理程子言動容貌整思慮則自生敬敬只是主一也存此則自然天理明又曰整齊嚴肅則心便一一則自是無非僻之干此意但涵養久之則天理自然明今不曽做得此工夫胸中膠擾駁雜如何窮得理一如他人不讀書是不肯去窮理今要窮理又無持敬工夫從陸子靜學如揚敬仲輩持守得亦好若肯去窮理須窮得分明然他不肯讀書只任一已私見有似箇稊稗今若不做培養工夫便是五穀不熟又不如稊稗也為學之道更無他法但能熟讀精思久久自有見處尊所聞行所知則久久自有至處書不記熟讀可記義不精細思可精唯有志不立直是無著力處只如而今貪利祿而不貪道義要作貴人而不要作好人皆是志不立之病直須反復思量究見病痛起處勇猛奮躍不復作此等人一躍躍出見得聖賢所說千言萬語都無一字不是實語方始立得此志就此積纍工夫迤邐向上去大有事在為一之道無他只是要理㑹得目前許多道理世間事無大無小皆有道理如中庸所謂率性之謂道也只是這箇道理道不可須㬰離也只是這箇道理見得是自家合當做底便做將去不當做底斷不可做只是如此為學無許多事只是要持守身心研究道理分别得是非善惡直是如好好色如惡惡臭到這裏方是踏著實地自住不得為學當以存主為先而致知力行亦不可以偏廢縱使已有一長未可遽視以輕彼而長其驕吝克伐之私况其有無之實又初未可定乎凡日用之間此一病而欲去之則即此欲去之心便是能去之藥但當堅守常自警覺不必妄意推求必欲舍此拙法而必求妙解也為學之實固在踐履茍徒知而不行誠與不學無異然欲行而未明於理則所踐履者又未知其果何事也故大學之道雖以誠意正心為本而必以格物致知為先所謂格物致知亦曰窮盡物理使吾之知識無不精切而至到耳夫天下之物莫不有理而其精藴則已具於聖賢之書故必由是以求之然欲其簡而易知約而易守則莫若大學論語中庸孟子之篇也學必貴於知道而道非一聞可悟一超可入也循下學之則加窮理之工由淺而深由近而逺則庶乎其可矣自家既有此身必有主宰理㑹得主宰然後隨自家力量窮理格物而合做底事不可放過些子因引程子言如行兵當先做活計主敬者存心之要而致知者進學之功二者交相發焉則知日益明守日益固而舊習之非自將日改月化於冥冥之中矣講學貴於實見義理要在熟讀精思潛心玩味不可貪多務得搜獵敷衍便為究竟也為學之要先須持已然後分别義利兩字令趨向不差是大節目其他隨力所及為之務在精審而不貴於泛濫涉獵也聖賢之教不過博文約禮四字博文則須多求博取熟講而精擇之乃可以浹洽而通貫約禮則只敬之一字已是多了日用之間只以此兩端立定程課不令間斷則久之自有進步處矣問橫渠張氏云義理有疑即濯去舊見以來新意曰此說甚當最有理若不濯去舊見何處得新意來今學者有二種病一是主自家意思一是舊有先入之說雖欲擺脫亦被他自來相尋看道理須要就那大處看便前靣開濶不要就壁角裏地步窄一步便觸無去處了而今且要看天理人欲義利公私分别得明將自家日用底與他勘驗須漸漸有見處前頭漸漸開濶那箇大壇場不去上靣做不去上靣行只管在壁角裏縱理㑹得一句只是一句透道理小了如破斧詩須看那周公東征四國是皇見得周公用心始得天下無不可說底道理如為人謀而忠朋友交而信傳而習亦都是眼前事皆可說只有一箇熟處說不得除了熟之外無不可說者未熟時頓放這裏又不穩帖拈放那邊又不是然終不成住了也須從這裏更著力始得到那熟處頓放這邊也是頓放那邊也是七顛八倒無不是所謂居之安則資之深資之深則左右逢其原譬如梨柿生時酸澀喫不得到熟後自是一般甘美相去大逺只在熟與不熟之間書有合講處有不必講處如主一處定是如此了不用講只是便去下工夫不要放肆不要戲慢整齊嚴肅便是主一便是敬聖賢說話多方百靣須是如此說但是我恁他說他箇無形無狀去何處證驗只去切已理㑹此等事久自㑹得學則處事都是理不學則看理便不恁地周匝不恁地廣大不恁地細密然理亦不是外靣硬生道理只是自家固有之理堯舜性之此理元無失湯武反之已有些子失但復其舊底學只是復其舊底而已蓋向也交割得來今却失了可不汲汲自修而反之乎此其所以為急不學則只是硬隄防處事不見理一向任私意平時却也强勉去得到臨事變便亂了為學之道莫先於窮理窮理之要必在於讀書讀書之法莫貴於循序而致精而致精之本則又在於居敬而持志此不易之理也夫天下之事莫不有理為君臣者有君臣之理為父子者有父子之理為夫婦為兄弟為朋友以至於出入起居應事接物之際亦莫不各有理焉有以窮之則自君臣之大以至事物之微莫不知其所以然與其所當然而無纎芥之疑善則從之惡則去之而無毫髮之纍此為學所以莫先於窮理也至論天下之理則要妙精微各有攸當亘古亘今不可移易唯古之聖人為能盡之而其所行所言無不可為天下後世不易之大法其餘則順之者為君子而吉背之者為小人而凶吉之大者則能保四海而可以為法凶之甚者則不能保其身而可以為戒是其粲然之跡必然之效蓋莫不具於經訓史冊之中欲窮天下之理而不即是而求之則是正墻靣而立爾此窮理所以必在乎讀書也若夫讀書則其不好之者固怠忽間斷而無所成矣其好之者又不免乎貪多而務廣住往未啓其端而遽已欲探其終未究乎此而忽已志在乎彼是以雖復終日勤勞不得休息而意緒忽忽常若有所奔趨迫逐而無從容涵泳之樂是又安能深信自得常久不厭以異於彼之怠忽間斷而無所成者哉孔子所謂欲速則不逹孟子所謂進鋭者退速正謂此也誠能鍳此而有以反之則心潛於一久而不移而所讀之書文意接連血脉貫通自然漸漬浹洽心與理㑹而善之為勸者深惡之為戒者切矣此循序致精所以為讀書之法也若夫致精之本則在於心而心之為物至虛至靈神妙不測常為一身之主以提萬事之綱而不可有頃刻之不存者也一不自覺而馳騖飛揚以徇物欲於軀殼之外則一身無主萬事無綱雖其俯仰顧盼之間蓋已不自覺其身之所在而况能反覆聖言參考事物以求義理至當之歸乎孔子所謂君子不重則不威學則不固孟子所謂學問之道無他求其放心而已矣正謂此也誠能嚴恭寅畏常存此心使其終日儼然不為物欲之所侵亂則以之讀書以之觀理將無所往而不通以之應事以之接物將無所處而不當矣此居敬持志所以為讀書之本也生知之聖不待學而自至若非生知須要學問學問之先止是致知所知果至自然透徹不患不進問知得須要踐履曰不真知得如何踐履得若是真知自住不得不可似他們只把來說過了又問今之言學者滿天下家誦中庸大學語孟之書人習中庸大學語孟之說究觀其實不惟應事接物與所學不相似而其為人舉足動步全不類學者所為或做作些小氣象或自治一等議論専一欺人此豈其學使然歟抑踐履不至歟抑所學之非歟曰此何足以言學某與人說學問止是說得大槩要人自去下工譬如寶藏一般其中至寶之物何所不有某止能指與人說此處有寶若不下工夫自去討終不濟事今人為學多是為名不肯切已向見前輩有志於學而性猶豫者其內省甚深下問甚切然不肯沛然用力於日用間是以終身抱不決之疑此為可戒而不可為法也與東萊吕氏書曰承諭整頓收斂則入於著力從容游泳又墮於悠悠此正學者之通患然程子嘗曰亦須且自此去到德盛後自然左右逢其原今亦當且就整頓收斂處著力但不可用意安排等候即成病耳人看文字多有淺迫之病淺則於其文義多所不盡迫故於其文理亦或不暇周悉兼義理精微縱橫錯綜各有意脉今人多是見得一邊便欲就此執定盡廢他說此乃古人所謂執德不𢎞者非但讀書為然也要須識破此病隨事省庶幾可以深造而自得也橫渠未能立心惡思多之致疑此說甚好便見有次序處一云事固當考索然心未有主却泛然理㑹不得若是思慮紛然趨向未定未有箇主宰如何地講學問理有未窮且只持敬否曰不消恁地說持敬便只管持將去窮理便只管窮將去如說前靣萬一有持不得窮不得處又去别生計較這箇都是枉了思量然亦只是不曽真箇持敬窮理若是真箇曽持敬窮理豈有此說譬如出路要乘轎便乘轎要乘馬便乘馬要行便行都不消思量前靣去不得時又著如何但當勇猛堅決向前那裏要似公說居敬不得處又著如何窮理不得處又著如何古人所謂心堅石穿蓋未嘗有箇不得底事又曰聖人之言本是直截若裏靣有屈曲處聖人亦必說在上靣若上靣無底又何必思量從那屈曲處去都是枉了工夫問學者曰公今在此坐是主靜是窮理久之未對曰便是公不曽做工夫若不是主靜便是窮理只有此二者既不主靜又不窮理便是心無所用間坐而已如此做工夫豈有長進之理夫子嘗云造次必於是顛沛必於是須是如此做工夫方得公等每日只是間用心問間事說間話底時節多問要緊事究竟自己事底時節少若是真箇做工夫底人他自是無間工夫說間話問間事聖人言語有幾多緊要大節目都不曽理㑹小者固不可不理㑹然大者尤緊要日用之間隨事隨處提撕此心勿令放逸而於其中隨事觀理講求思索沈潛反復庶於聖賢之教漸有默相契處則自然見得天道性命真不外乎此身而吾之所謂學者舍是無有别用力處人無英氣固安於卑陋而不足以語上其或有之而無以制之則又反為所使而不肯遜志於學此學者之通患也所以古人設教自灑掃應對進退之莭禮樂射御書數之文必皆使之抑心下首以從事於其間而不敢忽然後可以消磨其飛揚倔强之氣而為入德之階今既皆無此矣則唯有讀書一事尚可以為攝伏身心之助然不循序而致謹焉則亦未有益也主一之功固須常切提撕不令間斷窮理之事又在細心耐煩將聖賢遺書從頭循序就平實明白處玩味不須貪多但要詳熟自然見得意緒讀書固不可廢然亦須以主敬立志為先方可就此田地上推尋義理見諸行事若平居泛然略無存養之功又無實踐之志而但欲曉解文義說得分明則雖盡通諸經不錯一字亦何所益况又未必能通而不誤乎學問根本在日用間持敬集義功夫直是要得念念省察讀書求義乃其間之一事耳近日學者之弊苦其說之太髙太多如此只見意緒叢雜都無玩味工夫不唯失却聖賢本意亦分却日用實功不可不戒也窮理涵養要當並進蓋非稍有所知無以致涵飬之功非深有所存無以盡義理之奧正當交相為用而各致其功耳今之學者不知古人為己之意不以讀書治已為先而急於聞道是以文勝其質言浮於行而終不知所底止也讀書須嚴立課程思慮亦不可過苦但虛心游意時時玩索久之當自見縫罅意味持守亦不必著意安排但亦只且如此從容才覺放慢即便提撕即自常在此矣學者須虛心涵泳未要生說却且就日用間實下持敬工夫求取放心然後却看自家本性元是善與不善自家與堯舜元是同與不同若信得及意思自然開明持守亦不費力矣問君子無終食之間違仁不但終食之間而已也雖造次必於是不但造次而已也雖顛沛必於是蓋欲此心無頃刻須㬰之間斷也及稱顔子則曰三月不違於衆人則曰日月至焉而已今學者於日月至焉且茫然不知其所謂況其上者乎克己工夫要當自日月至焉推而上之至終食之間以至造次至顛沛一莭密一莭去庶幾持養純熟而三月不違可學而至不學則已欲學聖人則純亦不已此其進步之階歟曰下學之功誠當如此其資質之髙明者自應不在此限但我未之見耳為學雖有階漸然合下立志亦須略見義理大槩規模於自己方寸間若有箇惕然愧懼奮然勇决之志然後可以加之討論玩索之功存飬省察之力而期於有得夫子所謂志學所謂發憤正為此也若但悠悠泛泛無箇發端下手處而便謂可以如此平做將去則恐所謂莊敬持飬必有事焉者亦且若存若亡徒勞把捉而無精明的確親切至到之效也人之為學當知其何所為而為學又知其何所事而可以為學然後循其次第勉勉而用力焉必使此心之外更無異念而舊習之能否世俗之毁譽身計之通塞自無一毫入於其心然後乃可幾耳道之體用雖極淵微而聖賢言之則甚明白學者誠能虛心靜慮而隨以求之日用躬行之實則其規模之廣大曲折之詳細固當有以得之燕閒靜一之中其味雖淡而實腴其㫖雖淺而實深矣然其所以求之者不難於求而難於養故程夫子之言曰學莫先於致知然未有能致知而不在敬者而邵康莭之告章子厚曰以君之材於吾之學頃刻可盡但須相從林下一二十年使塵慮銷散胸中豁豁無一事乃可相授正為此也為學工夫不在日用之外檢身則動靜語默居家則事親事長窮理則讀書講義大抵只要分别一箇是非而去彼取此耳無他𤣥妙之可言也論其至近至易則即今便可用力論其至急至切則即今便當用力莫更遲疑且隨深淺用一日之力便有一日之效致有疑處方好尋人啇量則其長進通逹不可量矣若即今全不下手必待他日逺求師友然後用力則目下蹉過却合做底親切工夫虛度了難得底少壯時莭正使他日得聖賢而師之亦無積纍憑藉之資可受鉗錘未必能真受益也夫義利之間所差毫末而舜跖之歸異焉是以在昔君子之為學也莊敬涵飬以立其本而講於義理以發明之則其口之所誦也有正業而心之所處也有常分矣至於希世取寵之事不惟有所愧而不敢實亦有所急而不暇焉問致知以明之持敬以飬之此學之要也不致知則難於持敬不持敬亦無以致知曰二者交相為用固如此然亦當各致其力不可恃此而責彼也大抵思索義理到紛亂窒塞處須是一切掃去放教胸中空蕩蕩地了却舉起一看便自覺得有下落處此說向見李先生曽說來今日方真實驗得如此非虛語也天下之物無一物不具夫理是以聖門之學下學之序始於格物以致其知不離乎日用事物之間别其是非審其可否由是精義入神以致其用其間曲折纎悉各有次序而一以貫通無分限無時莭無方所以為精也而不離乎粗以為末也而不離乎本必也優遊潛玩饜飫而自得之然後為至固不可以自畫而緩亦不可以欲速而急譬如草木自萌芽生長以至於枝葉華實不待其日至之時而揠焉以助之長豈不無益而反害之哉人之所以為學者以吾之心未若聖人之心故也心未能若聖人之心是以燭理未明無所凖則隨其所好髙者過卑者不及而不自知其為過且不及也若吾之心即與天地聖人之心無異矣則尚何學之為哉故學者必因先達之言以求聖人之意因聖人之意以逹天地之理求之自淺以及深至之自近而及逺循循有序而不可以欲速迫切之心求也夫如是是以浸漸經厯審熟詳明而無躐等空言之弊馴致其極然後吾心得正天地聖人之心不外是也非固欲畫於淺近而忘深逺舍吾心以求聖人之心棄吾說以徇先儒之說也鄉道之勤衛道之切不若求其所謂道者而修之於已之為本用力於文詞不若窮經觀史以求義理而措諸事業之為實也蓋人有是身則其秉彛之則初不在外與其鄉往於人孰若反求諸已與其以口舌馳說而欲其得行於世孰若得之於已而一聼其用舍於天耶至於文詞一小伎耳以言乎邇則不足以治已以言乎逺則無以治人是亦何所與於人心之存亡世道之隆替而校其利害勤懇反復至於連篇纍牘而不厭耶為學之序必先成已然後可以成物此心此理元無間斷虧缺聖賢遺訓具在方冊若果有意何用遲疑等待何用凖擬安排只從今日為始隨處提撕隨處收拾隨時體究隨事討論但使一日之間整頓得三五次理㑹得三五事則日積月纍自然純熟自然光明矣若只如此立得箇題目頓在靣前又却低徊前却不肯果决向前真實下手則悠悠嵗月豈肯待人恐不免但為自欺自誣之流而終無得力可恃之地也觀浮圖者仰首注視而髙談不若俯首厯階而漸進蓋觀於外者雖足以識其崇髙巨麗之為美孰若入於其中者能使真為我有而又可以深察其層纍結架之所由哉自今而言聖賢之言具在方冊其所以幸教天下後世者固已不遺餘力而近世一二先覺又為之指其門户表其梯級而後學者由是而之焉宜亦甚易而無難矣而有志焉者或不能以有所至病在一觀其外粗覘倣佛而便謂吾已見之遂無復入於其中以為真有而力究之計此所以驟而語之雖知可悅而無以深得其味遂至半途而廢而卒不能以有成耳問今之學者不是忘便是助長曰這只是見理不明耳理是自家固有底從中而出如何忘得使他見之之明如饑而必食渴而必飲則何忘之有如食而至於飽則止飲而至於滿腹則止又何助長之有此皆是見理不明之病問工夫有間斷亦是氣質之偏使然曰固是氣質然大患是不子細嘗謂今人讀書得如漢書亦好漢儒各專一家看得極子細今人才看這一件又要看那一件下梢都不曽理㑹得今須先正路頭明辨為己為人之别直見得透却旋旋下工夫則思慮自通知識自明踐履自正積日纍月漸漸熟漸漸自然若見不透路頭錯了則讀書雖多為文日工終做事不得自天降衷萬理皆具仁義禮智君臣父子兄弟朋友夫婦自家一身都擔在這裏須是理㑹了體認教一一周足略缺闕些子不得須要緩心直要理㑹教盡須是大作規模闊開其基廣闢其地少間到逐處即看逐處都有頓放處日用之間只在這許多道理裏靣轉更無些子空闕處堯舜湯武也只是這道理大凡學問不可只理㑹一端聖賢千言萬語看得雖似紛擾然却都是這一箇道理而今只就緊要處做固好然别箇也須一一理㑹凑得這一箇道理都一般方得天下事硬就一箇做終是做不成如莊子說風之疾也不厚則其負大翼也無力須是理㑹得多方始襯簟得起且如籩豆之事各有司存非是說籩豆之事置之度外不用理㑹動容貌三句亦只是三句是自家緊要合做底籩豆是付與有司做底其事為輕而今只理㑹三句籩豆之事都不理㑹萬一被有司喚籩做豆若不曽曉得便被他瞞所以中庸先說箇博學之孟子曰博學而詳說之且看孔子雖曰生知是事去問人若問禮問喪於老𥅆之類甚多只如官名不曉得莫也無害聖人亦汲汲去問郯子蓋是我不識底須是去問人始得因說南軒洙泗言仁編得亦未是聖人說仁處固是仁然不說處不成非仁天下只有箇道理聖人說許多說話都要理㑹豈可只去理㑹說仁處不說仁處便掉了不管問如古人詠歌舞蹈到動蕩血脉流通精神處今既無之専靠義理去研究恐難得悅樂不知如何曰只是看得未熟耳若熟看待浹洽則悅矣而今且放置間事不要間思量只専心去玩味義理便㑹心精心精便㑹熟涵飬當用敬進學則在致知無事時且存飬在這裏提撥警覺不要放肆到那講習應接便當思量義理用義理做將去無事時便著存飬收拾此心問為學工夫以何為先曰亦不過如前所說専在人自立志既知這道理辦得堅固心一味向前何患不進只患立志不堅只恁聼人言語看人文字終是無得於已或云須是做工夫方覺言語有益曰别人言語亦當子細窮究孟子說我知言我善飬吾浩然之氣知言便是窮理别人言語他自邪說何與我事被他謾過理㑹不得便有陷溺所謂生於其心害於其政作於其政害於其事蓋謂此也問講學須當志其逺者大者曰固是然細微處亦須研窮若細微處不研窮所謂逺者大者只是揣作一頭詭怪之語果何益須是知其大小測其淺深又别其輕重因問平時讀書因見先生說乃知只得一模樣耳曰模樣亦未易得恐只是識文句問未知學問知有人欲不知有天理既知學問則克已工夫有著力處然應事接物之際茍失存主則心不在焉及既知覺已為間斷故因天理發見而收合善端便成片假雖承見教如此而工夫最難曰此亦學者常理雖顔子亦不能無間斷正要常常檢㸃力加持守使動靜如一則工夫自然接續學問無賢愚無大小無貴賤自是人合理㑹底事且如聖賢不生無許多書冊無許多發眀不成不去理㑹也只當理㑹今有聖賢言語有許多文字却不去做師友只是發明得人若不自己前師友如何著得力問所觀書滕璘以讀告子篇對曰古人興於詩詩可以興又曰雖無文王猶興人須要奮發興起必為之心為學方有端緒古人以詩吟詠起發善心今既不能曉古詩某以為告子篇諸處讀之可以興發人善心者故勸人讀之且如理義之悅我心猶芻豢之悅我口讀此句須知義理可以悅我心否果如芻豢悅口否方是得璘謂義理悅心亦是臨事見得此事合理義自然悅懌曰今則終日無事不成便廢了理義便無悅處如讀古人書見其事合理義思量古人行事與吾今所思慮欲為之事才見得合理義則自悅才見不合理義自有羞愧憤悶之心不須一一臨事時看問程子云且省外事但明乎善唯進誠心只是教人鞭辟近裏切謂明善是致知誠心是誠意否曰知至即便意誠善才明誠心便進又問其文章雖不中不逺矣便是應那省外事一句否曰然外事所可省者即省之所不可省者亦强省不得善只是那每事之至理文章是威儀制度所守不約泛濫無功說得極切這般處只管將來玩味則道理自然都見問為學大端曰且如士人應舉是要做官故其工夫勇猛念念不忘竟能有成若為學須立箇標凖我要如何為學此志念念不忘工夫自進蓋人以眇然之身與天地並立而為三常思我以血氣之身如何配得天地且天地之所以與我者色色周備人自汚壞了因舉萬物皆備於我反身而誠樂莫大焉一章今之為學須是求復其初求全天之所以與我者始得若要全天之所以與我者便須以聖賢為標凖直做到聖賢地位方是全得本來之物而不失如此則工夫自然勇猛臨事觀書常有此意自然接續若無求復其初之志無必為聖賢之心只見因循荒廢了學問只要理㑹一箇道理天生蒸民有物有則有一箇物便有一箇道理所以大學之道教人去事物上逐一理㑹得箇道理若理㑹一件未得直須反復推究研窮行也思量坐也思量早上思量不得晚間又把出思量晚間思量不得明日又思量如此豈有不得底道理若只略略地思量思量不得便掉了如此千年也理㑹不得問人固欲事事物物理㑹然精力有限不解一一都理㑹得曰固有做不盡底但立一箇綱程不可先自放倒也須靜著心實著意沈潛反覆終久自曉得去問人之思慮有邪有正若是大假邪僻之思却容易制惟是許多無頭面不緊要底思慮不知何以制之曰此亦無他只是覺得不當思量底便莫要思便從腳下做將去久久純熟自然無此等思慮矣譬如人坐不定者兩腳常要行但才要行時便自省覺莫要行久久純熟亦自然不要行而坐得定矣前輩有欲澄治思慮者於坐處置兩器每起一善念則投白豆一粒於器中每起一惡念則投黑豆一粒於器中初時黑豆多白豆少後白豆多黑豆少後來遂不復有黑豆最後則雖白豆亦無之矣然此只是箇死法若更加以讀書窮理底工夫則去那般不正當底思慮何難之有又如人有喜做不要緊事如寫字作詩之屬初時念念要做更遏捺不得若能將聖賢言語來玩味見得義理分曉則漸漸覺得此重彼輕久久不知不覺自然剝落消殞去何必橫生一念要得别尋一捷徑盡去了意見然後能如此此皆是不奈煩去修治他一箇身心了作此見解譬如人做官則當至誠去做職業却不奈煩去做須要尋箇幸門去鑽道鑽得這裏透時便可以超等將去今欲去意見者皆是這箇心學者但當就意見上分真妄存其真者去其妄者而已若不問真妄盡欲除之所以游游蕩蕩虛度光隂都無下工夫處因舉中庸曰喜怒哀樂未發謂之中發而皆中莭謂之和中也者天下之大本和也者天下之達道致中和天地位焉萬物育焉只如喜怒哀樂皆人之所不能無者如何要去得只是要發而中莭爾所謂致中如孟子之求放心與存心養性是也所謂致和如孟子論平旦之氣與充廣其仁義之心是也今却不奈煩去做這樣工夫只管要求捷徑去意見只恐所謂去意見者正未免為意見也聖人教人如一條大路平平正正自此直去可以到聖賢地位只是要人做得徹做得徹時也不大驚小怪只是私意剝落淨盡純是天理融明爾又曰興於詩立於禮成於樂聖人做出這一件物事來使學者聞之自然歡喜情願上這一條路去四方八靣攛掇他去這路上行又曰所謂致中者非但只是在中而已才有些子偏倚不可須是常在那中心十字上立方是致中譬如射雖射中紅心然在紅心邊側亦未當須是正當紅心之中乃為中也輔廣云此非常存戒謹恐懼底工夫不可曰固是只是箇戒謹恐懼便是工夫又曰博我以文約我以禮聖門教人只是兩事須是互相發明約禮底工夫深則博文底工夫愈明博文底工夫至則約禮底工夫愈密學者最怕因循莫說道一下便要做成今日知得一事亦得行得一事亦得只不要間斷積纍之久自解做得徹去若有疑處且須自去思量不要倚靠人道待去問他若無人可問時不成便休也人若除得箇倚靠人底心學也須㑹進人說道頓假做工夫亦難得頓假工夫莫說道今日做未得且待來日做若做得一事便是一事工夫若理㑹得這些子便有這些子工夫若見處有積纍則見處自然貫通若存飬處有積纍則存養自然透徹問橫渠言得尺守尺得寸守寸先生却云須放寬地步如何曰只是且放寬看將去不要守殺了橫渠說自好但如今日所論却是大局促了問動容周旋未能中禮於應事接物之間未免有礙理處如何曰只此便是學但能於應酬之頃逐一㸃檢使一一合於理久久自能中禮也語萬人傑曰平日工夫須是做到極時四邊皆黑無路可入方是有長進處大疑則可大進若自覺有些長進便道我已到了是未足以為大進也顔子仰髙鑽堅瞻前忽後及至雖欲從之末由也已直是無去處了至此可以語進矣洪慶將歸先生召入與語曰此去且存養要這箇道理分明常在這裏久自有覺覺後自是此物洞然通貫圓轉乃舉孟子求放心操則存兩莭及明道語録中聖人教人千言萬語下學上逹一條云自古聖賢教人也就就這理上用工所謂放心者不是走作向别處去蓋一瞬目間便不見才覺得便又在面前不是苦難收拾公且自去撕撕便見得又曰如今要下工夫且須端莊存飬獨觀昭曠之原不須枉費工夫鑽紙上語待存飬得此中昭明洞逹自覺無許多窒礙恁時方取文字來看則自然有意味道理自然透徹遇事時自然迎刃而解皆無許多病痛此等語不欲對諸人說恐他不肯去看文字又不實了且教他看文字撞來撞去將來自有撞著去為學之道須先存得這箇道理方可講究若居處必恭執事必敬與人必忠要如顔子直須就視聼言動上警戒到復禮處仲弓出門如見大賓使民如承大祭是無時而不主敬如今亦不須較量顔子仲弓如何㑹如此只將他那事就自家切已處便做他底工夫然後有益又曰為學之道如人耕種一般先須辦了一片地在這裏了方可在上耕種今却就别人地上鋪排許多種作底物色這田地元不是我底又如人作啇亦須先安排許多財本方可運動若財本不贍則運動不得到論道處如說水只說是冷不能以不熱字說得如說湯只說是熱不能以不冷字說得又如飲食喫著酸底便知是酸底喫著鹹底便知是鹹底始得今學者不㑹看文字多是先立私意自主張己說只借聖人言語做起頭便自把已意接說將去病痛専在這上不可不戒問治心修身之要以為雖知事理之當為而念慮之間多與日間所講論者相違曰且旋恁地做去只是如今且說箇熟字這熟字如何便得到這地位到得熟地位自有忽然不可知處不是被你硬要得直是不知不覺得如此問學者忌先立標凖如何曰如必有事焉而勿正之謂而今雖道是要學聖人亦且從下頭做將去若日日恁地比較也不得雖則是曰舜何人也豫何人也若只管將來比較不去做工夫又何益性理大全書卷四十四

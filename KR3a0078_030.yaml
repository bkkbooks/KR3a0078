body:
  text: 性理大全書卷三十性理二氣質之性程子曰生之謂性性即氣氣即性生之謂也人生氣禀理有善惡然不是性中原有此兩物相對而生也有自㓜而善有自㓜而惡后稷之克岐克嶷揚食我始生人知其必滅若敖氏之類是氣禀有然也善固性也然惡亦不可不謂之性也蓋生之謂性人生而靜以上不容説纔説性時便已不是性也凡人説性只是説繼之者善也孟子言人性善是也夫所謂繼之者善也者猶水流而就下也皆水也有流而至海終無所汚此何煩人力之為也有流而未逺固已漸濁有出而甚逺方有所濁有濁之多者有濁之少者清濁雖不同然不可以濁者不為水也如此則人不可以不加澄治之功故用力敏勇則疾清用力緩怠則遲清及其清也則却只是元初水也亦不是將清來換却濁亦不是取出濁來置在一隅也水之清則性善之謂也固不是善與惡在性中為兩物相對各自出來此理天命也順而循之則道也循此而修之各得其分則教也自天命以至於教我無加損焉此舜有天下而不與焉者也問生之謂性與天命之謂性同乎曰性字不可一槩論生之謂性止訓所禀受也天命之謂性此言性之理也今人言天性柔緩天性剛急皆生來如此此訓所禀受也若性之理也則無不善曰天者自然之理也氣之所鍾有偏正故有人物之殊有清濁故有智愚之等形易則性易性非易也氣使之然也問人性本明其有蔽何也曰性無不善其偏蔽者由氣禀清濁之不齊也韓退之説叔向之毋聞揚食我之生知其必滅宗此無足怪其始便禀得惡氣便有滅宗之理所以聞其聲而知之也使其能學以勝其氣復其性可無此患廣平游氏曰氣之所值有全有偏有邪有正有粹有駁有厚有薄然後有上智下愚中人之不同也猶之大塊噫氣其名為風風之所出無異氣也而呼者吸者呌者號者其聲若是不同以其所託者物物殊形爾因其聲之不同而謂有異風可乎龜山楊氏曰人所資禀固有不同者若論其本則無不善然而善者其常也亦有時而惡矣猶人之生也氣得其和則為安樂人及其有疾也以氣不和而然也然氣不和非其常治之而使其和則反常矣其常者性也此孟子所以言性善也横渠説氣質之性亦云人之性有剛柔緩急强弱昏明而已非謂天地之性然也今夫水之清者其常然也至於湛濁則沙泥渾之矣沙泥既去其清者自若也是故君子於氣質之性必有以變之其澄濁而求清之義歟或問人有智愚之品不同何也上蔡謝氏曰氣禀異耳聖人不忿疾于頑者憫其所遇氣禀偏駁不足疾也然則可變歟曰其性本一安不可變之有朱子曰有天地之性有氣質之性天地之性則太極本然之妙萬殊之一本也氣質之性則二氣交運而生一本而萬殊也天命之謂性命便是誥劄之類性便是合當做底職事如主簿銷注縣尉巡捕心便是官人氣質便是官人所習尚或寛或猛情便是當㕔處斷事性只是仁義禮智所謂天命之與氣質亦相衮同才有天命便有氣質不能相離若闕一便生物不得既有天命湏是有此氣方能承當得此理若無此氣則此理如何頓放天命之性本未嘗偏但氣質所禀却有偏處氣有昏明厚薄之不同然仁義禮智亦無闕一之理但若惻隱多便流為始息柔懦若羞惡多便有羞惡其所不當羞惡者且如言光必有鏡然後有光必有水然後有光光便是性鏡水便是氣質若無鏡與水則光亦散矣謂如五色若頓在黑多處便都黑了入在紅多處便都紅了却看你稟得氣如何然此理却只是善既是此理如何得惡所謂惡者却是氣也天命之性若無氣質却無安頓處且如一勺水非有物盛之則水無歸著程子云論性不論氣不備論氣不論性不明二之則不是所以發明千古聖賢未盡之意甚為有功問天命之謂性只是主理言纔説命則氣亦在其間矣非氣則何以為人物理何所受曰是人之所以生理與氣合而已天理固浩浩不窮然非是氣則雖有是理而無所湊泊故必二氣交感凝結生聚然後是理有所附著凡人之能言語動作思慮營為皆氣也而理存焉故發而為孝弟忠信仁義禮智皆理也然就人之所稟而言又有昏明清濁之異故上智生知之資是氣清明純粹而無一毫昏濁所以生知安行不待學而能如堯舜是也其次則亞於生知必學而後知必行而後至又其次者資禀既偏又有所蔽湏是痛加工夫人一已百人十已千然後方能及亞於生知者及進而不已則成功一也性只是理然無那天地氣質則此理没安頓處但得氣之清明則不蔽固此理順發出來蔽固少者發出來天理勝蔽固多者則私欲勝便見得本原之性無有不善孟子所謂性善周子所謂純粹至善程子所謂性之本與夫反本窮源之性是也只被氣質有昏濁隔了故氣質之性君子有弗性者焉學以反之則天地之性存矣故説性湏兼氣質説方備又曰臯陶謨中所論寛而栗等九徳皆是論反氣質之意只不曾説破氣質耳或問寛而栗等而下一字便是工夫曰然性非氣質則無所寄氣非天性則無所成問氣質之性曰纔説性時便有些氣質在裏若無氣質則這性亦無安頓處所以繼之者只説得善到成之者便是性論天地之性則專主理言論氣質之性則以理與氣雜而言之未有此氣已有此性氣有不存而性却常在雖其方在氣中然氣自是氣性自是性亦不相夾雜至論其徧體於物無處不在則又不論氣之精粗莫不有是理若論本原既有理然後有氣若論禀賦則有是氣而後理隨以具故有是氣則有是理無是氣則無是理性即理也當然之理無有不善者故孟子之言性指性之本而言然必有所依而立故氣質之禀不能無淺深厚薄之别孔子曰性相近也兼氣質而言問天理變易無窮由一隂一陽生生不窮繼之者善全是天理安得不善孟子言性之本體以為善者是也二氣相軋相取相合相乖有平易處有傾側處自然有善有惡故禀氣形者有惡有善何足怪語其本則無不善也曰此却無過問人之徳性本無不備而氣禀所賦鮮有不偏將性對氣字看性即是此理理無不善者因堕在形氣中故有不同所謂氣質之性者是如此否曰固是但氣禀偏則理亦欠闕了氣質之性生而知者氣極清而理無蔽也學知以下則氣之清濁有多寡而理之全闕繫焉問氣質有清濁不同曰氣禀之殊其類不一非但清濁二字而已今人有聰明事事曉者其氣清矣而所為未必皆中於理則是其氣不醇也有謹厚忠信者其氣醇矣而所知未必皆達於理則是其氣不清也推此求之可見人所禀之氣雖皆是天地之正氣但衮來衮去便有昏明厚薄之異蓋氣是有形之物纔是有形之物便自有美有惡也問所謂美惡恐即通書所謂剛柔善惡竊疑清濁以氣言剛柔美惡以氣之為質言清濁恐屬天剛柔美惡恐屬地清濁屬知美惡屬才清濁分智愚美惡分賢不肖上智則清之純而無不美大賢則美之全而無不清上智恐以清言大賢恐以美言其實未嘗有偏若中庸稱舜智回賢是也下此則所謂智者是得清之多而或不足於美所謂賢者是得剛柔一偏之善而或不足於清於是始有賢智之偏故其智不得為上智其賢不得為大賢雖愚不肖恐亦自有差等蓋清濁美惡似為氣質中隂陽之分陽清隂濁陽善隂惡故其氣錯糅萬變而大要不過此四者但分數參互不齊遂有萬殊曰陳了翁云天氣而地質前軰已有此説矣又問氣之始有清無濁有美無惡濁者清之變惡者美之變以其本清本美故可易之以反其本然則所謂變化氣質者似亦所以復其初也曰氣之始固無不善然騰倒到今日則其雜也乆矣但其運行交錯則其善惡却各自有㑹處此上智下愚之所以分也氣升降無時止息理只附氣惟氣有昏濁理亦隨而間隔人之氣稟有清濁偏正之殊故天命之性亦有淺深厚薄之異要亦不可不謂之性問氣禀在於人身既復天理氣禀還去得否曰天理明則彼如何著得問理無不善則氣禀胡為有清濁之殊曰纔説著氣便自有寒有熱有香有臭氣質之性便只是天地之性只是這箇天地之性却從那裏過好底性如水氣質之性如著些醬與䀋便是一般滋味性譬之水本皆清也以淨器盛之則清以不淨器盛之則臭以汚泥之器盛之則濁本然之清未嘗不在但既臭濁猝難得便清故雖愚必明雖柔必强也煞用氣力然後能至有是理而後有是氣有是氣則必有是理但氣禀之清者為聖為賢如寳珠在清泠水中禀氣之濁者為愚為不肖如珠在濁水中所謂明明徳者是就濁水中揩拭此珠也物亦有是理又如寳珠落在至汚濁處然其所禀亦間有些明處就上面便自不昧問物之塞得甚者雖有那珠如在深泥裏面更取不出曰也是如此問性如日月氣濁者如雲霧曰然人性如一團火煨在灰裏撥開便明人性雖同禀氣不能無偏重有得木氣重者則惻隠之心常多而羞惡辭讓是非之心為其所塞而不發有得金氣重者則羞惡之心常多而惻隠辭讓是非之心為其所塞而不發水火亦然唯隂陽合徳五性全備然後中正而為聖人也問人有敏於外而内不敏又有敏於内而外不敏莫是禀氣强弱曰不然淮南子云金水内明日火外明氣偏於内故内明氣偏於外則外明氣禀所拘只通得一路極多様或厚於此而薄於彼或通於彼而塞於此有人能盡通天下利害而不識義理或工於百工技藝而不解讀書或知孝於親而薄於他人如明皇友愛諸弟長枕大被終身不變然而為君則殺其臣為父則殺其子為夫則殺其妻便是有所通有所蔽是他性中只通得一路故於他處皆礙也是氣禀也是利害昏了問以堯為父而有丹朱以鯀為父而有禹如何曰這箇又是二氣五行交際運行之際有清濁人適逢其㑹所以如此問天地之氣當其昏明駁雜之時則其理亦隨而昏明駁雜否曰理却只恁地只是氣自如此又問若氣如此理不如此則是理與氣相離矣曰氣雖是理之所生然既生出則理管他不得如這理寓於氣了日用間運用都由這箇氣只是氣强理弱理管攝他不得沈僴問或謂性所發時無有不善雖氣禀至惡者亦然但方發之時氣一乘之則有善有不善耳僴以為人心初發有善有惡所謂幾善惡也初發之時本善而流入於惡者此固有之然亦有氣禀昏愚之極而所發皆不善者如子越椒之類是也且以中人論之其所發之不善者固亦多矣安得謂之無不善邪曰不當如此説如此説得不是此只當以人品賢愚清濁論有合下發得善底也有發得不善底也有發得善而為物欲所奪流入於不善底極多般様今有一様人雖無事在這裏坐他心裏也只思量要做不好事如蛇虺相似只欲咬人他有甚麽發得善明道説水處最好皆水也有流而至海終無所汚有流而未遠固已漸濁有流而甚遠方有所濁有濁之多者濁之少者只可如此説人之性皆善然而有生下來善底有生下來便惡底此是氣禀不同且如天地之運萬端而無窮其可見者日月清明氣候和正之時人生而禀此氣則為清明渾厚之氣湏做箇好人若是日月昏暗寒暑反常皆是天地之戾氣人若禀此氣則為不好底人何疑人之為學却是要變化氣禀然極難變化如孟子道性善不言氣禀只言人皆可以為堯舜若勇猛直前氣禀之偏自消功夫自成故不言氣禀看來吾性既善何故不能為聖賢却是被這氣禀害如氣禀偏於剛則一向剛暴偏於柔則一向柔弱之類人一向推托道氣禀不好不向前又不得一向不察氣禀之害只昏昏地去又不得湏知氣禀之害要力去用功克治裁其勝而歸於中乃可濓溪云性者剛柔善惡中而已故聖人立教俾人自易其惡自至其中而止矣問蔡季通主張氣質太過曰形質也是重且如水之氣如何似長江大河有許多洪流金之氣如何似一塊鐡恁地硬形質也是重被此生壊了後理終是拗不轉來又曰孟子言人所以異於禽獸者幾希不知人何故與禽獸異又言犬之性猶牛之性牛之性猶人之性與不知人何故與犬羊異此兩處似欠中間一轉語湏著説是形氣不同故性亦少異始得恐孟子見得人性同處自是分曉直截却於這些子未甚察又曰陳了翁云氣質之用狹道學之功大與季通説正相反若論其至不可只靠一邉如了翁之説則何故自古只有許多聖賢如季通之説則人皆委之於生質更不修為湏是看人工夫多少如何若工夫未到則氣質之性不得不重若工夫至則氣質豈得不聽命於義理也湏著如此説方盡孔孟言性之異畧而論之則夫子雜乎氣質而言之孟子乃專言其性之理也雜乎氣質而言之故不曰同而曰近蓋以為不能無善惡之殊但未至如其所習之遠耳以理而言則上帝之降衷人心之秉彛初豈有二理哉但此理在人有難以指言者故孟子之告公都子但以其才與情者明之譬如欲觀水之必清而其源不可到則亦觀諸流之未逺者而源之必清可知矣此二義皆聖賢所罕言者而近世大儒如河南程先生横渠張先生嘗發明之其説甚詳問孟子言性與伊川如何曰不同孟子是剔出而言性之本伊川是兼氣質而言要之不可離也邵浩問曰趙書記嘗問浩如何是性浩對以伊川云孟子言性善是極本窮原之性孔子言性相近是氣質之性趙云安得有兩様只有中庸説天命之謂性自分明曰公當初不曾問他既謂之善固無兩般纔説相近湏有兩様便自説不得因問天命之謂性還是極本窮原之性抑氣質之性曰是極本窮原之性天之所以命只是一般縁氣質不同遂有差殊孟子分明是於人身上挑出天之所命者説與人要見得本原皆善孟子言性只説得本然底論才亦然荀楊韓諸人雖是論性其實只説得氣荀子只見得不好人底性便説做惡楊子見半善半惡底人便説善惡混韓子見天下有許多般人所以立為三品之説就三子中韓子説又較近他以仁義禮智為性以喜怒哀樂為情只是中間過接處少箇氣字問氣質之説起於何人曰此起於張程某以為極有功於聖門有補於後學讀之使人深有所感前此未曾有人説到此如韓退之原性中説三品説得也是但不曾分明説是氣質之性耳性那裏有三品來孟子説性善但説得本原處下靣却不曾説得氣質之性所以亦費分䟽諸子説性惡與善惡混使張程之説早出則這許多説話自不用紛爭故張程之説立則諸子之説泯矣因舉横渠形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉又舉明道云論性不論氣不備論氣不論性不明二之則不是且如只説箇仁義禮知是性世間却有生出來便無狀底是如何只是氣禀如此若不論那氣這道理便不周匝所以不備若只論氣禀這箇善這箇惡却不論那一原處只是這箇道理又却不明此自孔子曾子子思孟子理㑹得後都無人説這道理程子云生之謂性性即氣氣即性生之謂也蓋天之付與萬物者謂之命物之禀受於天者謂之性然天命流行必二氣五行交感凝聚然後能生物也性命形而上者也氣則形而下者也形而上者一理渾然無有不善形而下者則紛紜雜糅善惡有所分矣故人物既生則即此所禀以生之氣而天命之性有焉此程子所以發明告子生之謂性之説而以性即氣氣即性者言之也又曰生之謂性是生下來喚做性底便有氣禀夾雜便不是理底性了如椀盛水後人便以椀為水水却本清椀却有淨有不淨問生之謂性他這一句且是説禀受處否曰是性即氣氣即性他這且是衮説性便是理氣便是氣是未分别説其實理無氣亦無所附又問性即氣氣即性此言人生性與氣混合者曰有此氣為人則理具於身方可謂之性又曰性者渾然天理而已纔説性時則已帶氣矣所謂離了隂陽更無道此中最宜分别程子云人生氣禀理有善惡然不是性中元有此兩物相對而生也有自㓜而善有自㓜而惡是氣禀有然也善固性也然惡亦不可不謂之性也蓋所禀之氣所以必有善惡之殊者亦性之理也氣之流行性為之主以其氣之或純或駁而善惡分焉故非性中本有二物相對也然氣之惡者其性亦無不善故惡亦不可不謂之性也故先生嘗云善惡皆天理謂之惡者本非惡但或過或不及便如此蓋天下無性外之物本皆善而流於惡耳又曰人生氣禀理有善惡此理字不是説實理猶云理當如此只作合字看問善固性也固是若云惡亦不可不謂之性則此理本善因氣而鶻突雖是鶻突然亦是性也曰他原頭處都是善因氣偏這性便偏了然此處亦是性如人渾身都是惻隠而無羞惡都羞惡而無惻隠這箇便是惡徳這箇喚做性邪不是如墨子之心本是惻隠孟子推其弊到得無父處這箇便是惡亦不可不謂之性也又問惡是氣禀如何云亦不可不謂之性曰既是氣禀惡便牽引得那性不好蓋性只是搭附在氣禀上既是氣禀不好便和那性壊了又曰性本善而今乃惡亦是此性為惡所汩如水為泥沙所混不成不喚做水程子云蓋生之謂性人生而靜以上不容説纔説性時便已不是性也凡人説性只是説繼之者善也孟子言人性善是也夫所謂繼之者善也者猶水流而就下也蓋性則性而已矣何言語之可形容哉故善言性者不過即其發見之端而言之而性之韞因可黙識矣如孟子之論四端是也觀水之流而必下則水之性下可知觀性之發而必善則性之韞善亦可知也又曰人生而靜以上即是人物未生時人物未生時只可謂之理説性未得此所謂在天曰命也纔説性時便已不是性者言纔謂之性便是人生以後此理已堕在形氣之中不全是性之本體矣故曰便已不是性也此所謂在人曰性也大抵人有此形氣則是此理始具於形氣之中而謂之性纔是説性便已渉乎有生而兼乎氣質不得為性之本體也然性之本體亦未嘗雜要人就此上面見得其本體元未嘗離亦未嘗雜耳又曰性湏是箇氣質方説得箇性字若人生而靜以上只説得箇天道下性字不得所以子貢曰夫子之言性與天道不可得而聞也便是如此所謂天命之謂性者是就人身中指出這箇是天命之性不雜氣禀者而言爾若纔説性時則便是夾氣禀而言所以説時便已不是性也濓溪説性者剛柔善惡中而已矣濓溪説性只是此五者他又自有説仁義禮智底性時若論氣禀之性則不出此五者然氣禀底性便是那四端底性非别有一種性也然所謂剛柔善惡中者天下之性固不出此五者然細推之極多般様千般萬種不可窮究但不離此五者爾問人生而靜以上不容説人生而靜是説那初生時更説向上去便只是天命了曰所以大哉乾元萬物資始只説是誠之源也至乾道變化各正性命方是性在凡人説性只是説繼之者善也便兼氣質了問恐只是兼了情曰情便兼質了所以孟子答告子問性却説乃若其情則可以為善矣説仁義禮智却説惻𨼆羞惡恭敬是非去蓋性無形影情却有實事只得從情上説入去又曰夫所謂繼之者善也者猶水流而就下也此繼之者善指發處而言之也性之在人猶水之在山其清不可得而見也流出而見其清然後知其本清也所以孟子只就見孺子入井皆有怵惕惻隠之心處指以示人使知性之本善者也易所謂繼之者善也在性之先此所引繼之者善也在性之後蓋易以天道之流行者言此以人性之發見者言唯天道流行如此所以人性發見亦如此若水之就下處當時只是衮説了蓋水之就下便是喻性之善如孟子所謂過顙在山雖不是順水之性然不謂之水不得這便是前面惡亦不可不謂之性之説程子云皆水也有流而至海終無所汚此何煩人力之為也有流而未遠固已漸濁有出而甚遠方有所濁有濁之多者有濁之少者清濁雖不同然不可以濁者不為水也如此則人不可以不加澄治之功故用力敏勇則疾清用力緩怠則遲清及其清也則却只是元初水也亦不是將清來換却濁亦不是取出濁來置在一隅也水之清則性善之謂也固不是善與惡在性中為兩物相對各自出來此又以水之清濁譬之水之清者性之善也流至海而不汚者氣禀清明自㓜而善聖人性之而全其天者也流未遠而已濁者氣禀偏駁之甚自㓜而惡者也流既遠而方濁者長而見異物而遷焉失其赤子之心者也濁有多少氣之昏明純駁有淺深也不可以濁者不為水惡亦不可不謂之性也然則人雖為氣所昏流於不善而性未嘗不在其中特謂之性則非其本然謂之非性則初不離是以其如此故人不可以不加澄治之功惟能學以勝氣則知此性渾然初未嘗壊所謂元初水也雖濁而清者存固非將清來換濁既清則本無濁固非取濁置一隅也如此則其本善而已矣性中豈有兩物對立而並行也哉問以水喻性謂天道純然一理便是那水本來清隂陽五行交錯雜糅而有昏濁便是那水被泥汚了昏濁可以復清者只因他母子清曰然那下愚不移底人却是那臭穢底水問也湏可以澄治曰也減得些分數因言舊時人嘗裝惠山泉去京師或時臭了京師人會洗水將沙石在筧中上靣傾水從筧中下去如此十數畨便漸如故問物如此更推不去却是那臭泥相似曰是如此程子云此理天命也順而循之則道也循此而脩之各得其分則教也自天命以至於教我無加損焉此舜有天下而不與焉者也蓋此理天命也該始終本末而言也脩道雖以人事而言然其所以脩者莫非天命之本然非人私智所能為也然非聖人有不能盡故以舜明之問此理天命也他這處方提起以此理説則是純指上靣天理而言不雜氣説曰固是又曰理離氣不得而今講學用心著力却是用這氣去尋箇道理又問水之清則性善之謂也至於舜禹有天下而不與焉者也一節是言學者去求道不是外靣添聖人之教人亦不是强人分外做曰此理天命也一句亦可見又曰程子生之謂性一叚當作三節看其間有言天命者有言氣質者生之謂性是一節水流就下是一節清濁又是一節横渠云形而後有氣質之性善反之則天地之性存焉將此兩箇性字分别自生之謂性以下凡説性字者孰是天地之性孰是氣質之性則其理自明矣性理大全書卷三十

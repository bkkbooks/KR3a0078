body:
  text: 性理大全書卷五正蒙一問人范育序曰張夫子之為此書也有六經之所未載聖人之所未言蓋道一而已語上極乎高明語下涉乎形器語大至於無間語小入於無朕一有窒而不通則於理為妄正蒙之言高者抑之卑者舉之虛者實之礙者通之衆者一之合者散之要之立乎大中至正之矩天之所以運地之所以載日月之所以明鬼神之所以幽風雲之所以變江河之所以流物理以辨人倫以正造端者微成能者著知德者崇就業者廣本末上下貫乎一道過乎此者淫遁之狂言也不及乎此者邪詖之卑説也推而放諸有形而準推而放諸無形而準推而放諸至動而準推而放諸至靜而準無不包矣無不盡矣無大可過矣無細可遺矣言若是乎其極矣道若是乎其至矣聖人復起無有間乎斯言矣門人蘇昞序曰先生著正蒙書數萬言一日從容請曰敢以區别成誦何如先生曰吾之作是書也譬之枯株根本枝葉莫不悉備充榮之者其在人功而已又如晬盤示兒百物具在顧取者如何爾於是輒就其編會歸義例略效論語孟子篇次章句以類相從為十七篇吕汲公曰先生云此書吾積年致思之所得其言殆合於前聖與大要發端示人而已其觸廣之則有待於學者正如老木一株枝别固多所少者潤澤華葉爾程子曰橫渠之言誠有過者乃在正蒙子厚以清虛一大名天道是以器言非形而上者橫渠立清虛一大為萬物之源恐未安須兼清濁虛實乃可言神道體物不遺不應有方所龜山楊氏曰正蒙之書關中學者尊信之與論語等其徒未嘗輕以示人蓋恐未信者不惟無益徒增其鄙慢爾如西銘一篇伊川謂與孟子性善養氣之論同功皆前聖所未發也詳味之乃見其用意之深性命之説雖楊雄猶未能造其藩籬况他人乎而世儒易言之多見其妄也孔子曰五十而知天命以孔子之聖猶待五十而後知則所知蓋有未易言者非止如世儒之説也學者當求之聖人不當徒為空言而已五峯胡氏曰先生極天地隂陽之本窮神化一天人所以息邪説而正人心故自號其書曰正蒙其志大其慮深且逺矣朱子曰橫渠作正蒙時或夜裏默坐徹曉其勇如此故其書規模廣大欲盡窮萬物之理正蒙精深難窺測要其本原則不出六經語孟且熟讀語孟以程門諸公之説求之涵泳其間當自有得然後此等文字可循次而及方見好處如今不須雜博却不濟事無收拾也若果於此有味則世間一種無緊要文字皆是妄言綺語自無工夫看得矣正蒙所論道體覺得源頭有未是處故伊川云過處乃在正蒙答書之中云非明睿所照而考索至此蓋橫渠却只是一向苦思求將向前去却欠涵泳以待其義理自形見處如云由氣化有道之名説得是好終是生受辛苦聖賢便不如此説試教明道説便不同如以太虛太和為道體却只是説得形而下者皆是發而皆中節謂之和處正蒙説道體處如太和太虛虛空云者止是説氣説聚散處其流乃是箇大輪回蓋其思慮考索所至非性分自然之知若語道理惟是周子説無極而太極最好如由太虛有天之名由氣化有道之名合虗與氣有性之名合性與知覺有心之名亦説得有理由氣化有道之名如所謂率性之謂道是也然使明道形容此理必不如此説伊川所謂橫渠之言誠有過者乃在正蒙以清虛一大為萬物之原有未安等語槩可見矣黃瑞節曰朱子掇取周子張子程子之書為近思録凡六百一十二條自正蒙來者二十六條又於正蒙中表章西銘自為一書嘗述靜春劉氏之説曰宋有四篇文字太極圖西銘易傳序者秋傳序是也二序伊川程子之筆云太和篇第一太和所謂道中涵浮沉升降動靜相感之性是生絪縕相蕩勝負屈伸之始其來也幾微易簡其究也廣大堅固起知於易者乾乎效法於簡者坤乎散殊而可象為氣清通而不可象為神不如野馬絪縕不足謂之太和語道者知此謂之知道學易者見此謂之見易不如是雖周公才美其智不足稱也已朱子曰此以太和狀道體與發而中節之和無異太虛無形氣之本體其聚其散變化之客形爾至靜無感性之淵源有識有知物交之客感爾客感客形與無感無形惟盡性者一之朱子曰客感客形與無感無形未免分截作兩段事聖人不如此説只説形而上形而下而已天地之氣雖聚散攻取百塗然其為理也順而不妄氣之為物散入無形適得吾體聚為有象不失吾常太虛不能無氣氣不能不聚而為萬物萬物不能不散而為太虛循是出入是皆不得已而然也然則聖人盡道其間兼體而不纍者存神其至矣彼語寂滅者往而不反徇生執有者物而不化二者雖有間矣以言乎失道則均焉聚亦吾體散亦吾體知死之不亡者可與言性矣知虛空即氣則有無隱顯神化性命通一無二顧聚散出入形不形能推本所從來則深於易者也若謂虛能生氣則虛無窮氣有限體用殊絶入老氏有生於無自然之論不識所謂有無混一之常若謂萬象為太虛中所見之物則物與虛不相資形自形性自性形性天人不相待而有陷於浮屠以山河大地為見病之説此道不明正由懵者略知體虛空為性不知本天道為用反以人見之小因緣天地明有不盡則誣世界乾坤為幻化幽明不能舉其要遂躐等妄意而然不悟一隂一陽範圍天地通乎晝夜三極大中之矩遂使儒佛老莊混然一途語天道性命者不罔於恍惚夢幻則定以有生於無為窮高極微之論入德之途不知擇術而求多見其蔽於詖而陷於淫矣氣坱然太虛升降飛揚未嘗止息易所謂絪縕莊生所謂生物以息相吹野馬者歟此虛實動靜之機隂陽剛柔之始浮而上者陽之清降而下者隂之濁其感遇聚散為風雨為雪霜萬品之流形山川之融結糟粕煨燼無非教也朱子曰坱然太虛此張子所謂虛空即氣也蓋天在四畔地居其中減得一尺地遂有一尺氣但人不見耳此是未成形者及至浮而上降而下則己成形者若融結糟粕煨燼即是氣之查滓要之皆是示人以理升降飛揚所以生人物者未嘗止息但人不見耳問言機言始莫是説理否曰此本只是説氣理自在其中一動一靜便是機處問始字之義如何曰始是如生物底母子相似萬物都從這裏生出去升降飛揚便合這虛實動靜兩句所以虛實動靜隂陽剛柔者便是這升降飛揚者為之非兩般也無非教也教便是説理禮記中天道至教聖人至德與孔子豫欲無言天地與聖人都一般精底都從粗底上發見道理都從氣上流行雖至粗底物無非是道理發見天地與聖人皆然此等言語都是經煆煉底語須熟念細看氣聚則離明得施而有形氣不聚則離明不得施而無形方其聚也安得不謂之客方其散也安得遽謂之無故聖人仰觀俯察但云知幽明之故不云知有無之故盈天地之間者法象而已文理之察非離不相覩也方其形也有以知幽之因方其不形也有以知明之故或問朱子曰離明何謂也曰此説似難也有作日光説有作目説看來只是氣聚則目得而見不聚則不得而見易所謂離為目是也形之時其幽之因已在此不形之際其明之故已在此聚者散之因散者聚之故氣之聚散於太虛猶冰凝釋於水知太虛即氣則無無故聖人語性與天道之極盡於參伍之神變易而已諸子淺妄有有無之分非窮理之學也太虛為清清則無礙無礙故神反清為濁濁則礙礙則形程子曰神氣相極周而無餘謂氣外有神神外有氣是兩之也清者為神濁者何獨非神乎問太虛之説本是説無極却是説得無字朱子曰無極是該貫虛實清濁而言無極字落在中間太虛字落在一邊了便是難説聖人熟了説出便恁地平正而今把意思去形容他却有時偏了明道説氣外無神神外無氣謂清者為神則濁者非神乎後來亦有人與橫渠説橫渠却云清者可以該濁虛者可以該實却不知形而上者還他是理形而下者還他是氣既説是虛便是與實對了既説是清便是與濁對了凡氣清則通昏則壅清極則神故聚而有問則風行而聲聞具逹清之驗與不行而至通之極與由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名朱子曰本只是一箇太虛漸細分得密爾且太虛便是四者之總體而不離乎四者而言由氣化有道之名氣化是隂陽造化寒暑晝夜雨露霜雪山川木石金水火土皆是只此便是太虛但雜却氣化説雖雜氣化説而實不離乎太虛未説到人物各具當然之理處合虛與氣有性之名有這氣道理便隨在裏面無此氣則道理無安頓處如水中月須是有此水方映得月心之知覺只是那氣之虛靈底聰明視聽作為運用皆是有這知覺方運用得這道理所以張子説人能𢎞道是心能盡性非道𢎞人是性不知檢其心邵子説心者性之郛郭此等語皆秦漢以下人道不到由太虛有天之名都是箇自然底由氣化有道之名是虛底物在實上見無形底因有形而見氣有形而虛無迹以有形之氣具無迹之理故謂之性也由太虛有天之名合虛與氣有性之名是天命之謂性管此兩句由氣化有道之名是率性之謂道管此一句合性與知覺有心之名此又是天命之謂性這下管此一句濳室陳氏曰四者本是一理但所由之名異耳從太虛上看則謂之天天為太極是也從氣上看則謂之道一隂一陽之道是也從虛與氣合上看則謂之性天命之性是也從性與知覺合上看知覺是血氣動物則謂之心其實一理爾鬼神者二氣之良能也聖者至誠得天之謂神者太虛妙應之目凡天地法象皆神化之糟粕爾朱子曰伊川謂鬼神者造化之迹却不如橫渠所謂二氣之良能蓋程説固好但只渾淪在這裏張説分明便見有箇隂陽在問良能之義曰只是二氣之自然者耳屈伸往來是二氣自然能如此問伸是神屈是鬼否曰氣之方來皆屬陽是神氣之反皆屬隂是鬼午前是神午後是鬼初一以後是神十六以後是鬼草木方發生是神凋落是鬼人自少至壯是神衰老是鬼噓是神吸是鬼風雷鼓動是神收斂是鬼上蔡謝氏曰橫渠説得别這箇便是天地間妙用天道不窮寒暑已衆動不窮屈伸已鬼神之實不越二端而已矣兩不立則一不可見一不可見則兩之用息兩體者虛實也動靜也聚散也清濁也其究一而已感而後有通不有兩則無一故聖人以剛柔立本乾坤毁則無以見易遊氣紛擾合而成質者生人物之萬殊其隂陽兩端循環不已者立天地之大義朱子曰此一假專説氣未及言理遊氣紛擾此言氣到此已是查滓粗濁者去生人物蓋氣之用也動靜兩端説氣之本上章言坱然太虛一假亦是發明此意隂陽即氣也豈隂陽之外復有遊氣耶所謂遊氣者指其所以賦與萬物一物各得一箇性命便有一箇形質此皆氣合而成之也隂陽循環如磨遊氣紛擾如磨中出者易曰隂陽相摩八卦相蕩鼓之以雷霆潤之以風雨日月運行一寒一暑此隂陽之循環也乾道成男坤道成女此遊氣之紛擾也循環不已者乾道變化也合而成質者各正性命也晝夜運而無息便是隂陽之兩端其四邊散出紛擾者便是遊氣以生人物之萬殊如麵磨相似其四邊只管層層散出天地之氣運轉無巳只管層層生出人物其中有粗有細如人物有偏有正遊是散殊比如一箇水車一上一下兩邊只管衮轉這便是循環不已立天地之大義底一上一下只管衮轉中間帶得水灌溉得所在便是生人物之萬殊天地之間二氣只管運轉不知不覺生出一箇人不知不覺又生出一箇物即他這箇幹轉便是生物時節遊氣是氣之發散生物底氣遊亦流行之意紛擾者參錯不齊既生物便是遊氣若是生物常運行而不息者二氣初無增損也此固是一物但渠所説遊氣紛擾合而成質恰是指隂陽交會言之隂陽兩端循環不已却是指那分開底説蓋隂陽只管混了闢闢了混故周子云混兮闢兮其無窮兮遊氣是裏面底譬如一箇扇相似扇便是立天地之大義底扇出風來便是生人物底日月相推而明生寒暑相推而歲成神易無方體一隂一陽隂陽不測皆所謂通乎晝夜之道也晝夜者天之一息乎寒暑者天之晝夜乎天道春秋分而氣易猶人一寤寐而魂交魂交成夢百感紛紜對寤而言一身之晝夜也氣交為春萬物糅錯對秋而言天之晝夜也氣本之虛則湛本無形感而生則聚而有象有象斯有對對必反其為有反斯有仇仇必和而解故愛惡之情同出於太虛而卒歸於物欲倐而生忽而成不容有毫髮之間其神矣夫造化所成無一物相肖者以是知萬物雖多其實一物無無隂陽者以是知天地變化二端而已萬物形色神之糟粕性與天道云者易而已矣心所以萬殊者感外物為不一也天大無外其為感者絪緼二端而已物之所以相感者利用出入莫知其鄉一萬物之妙者與氣與志天與人有交勝之理聖人在上而下民咨氣一之動志也鳳凰儀志一之動氣也參兩篇第二地所以兩分剛柔男女而效之法也天所以參一太極兩儀而象之性也一物兩體氣也一故神兩在故不測兩故化推行於一此天之所以參也朱子曰此語極精一故神自注云兩在故不測只是這一物周行乎事物之間如隂陽屈伸往來上下以至於行乎十百千萬之中無非這一箇物事所以謂兩在故不測兩故化自注云推行於一凡天下之事一不能化惟兩而後能化且如一隂一陽始能化生萬物雖是兩要之亦惟行乎此一爾一是一箇道理却有兩端用處不同譬如隂陽隂中有陽陽中有隂陽極生隂隂極生陽所以神化無窮兩者隂陽消長進退非一則隂陽消長無自而見非隂陽消長則一不可得而見一故神譬之人身四體皆一物故觸之而無不覺不待心使至此而後覺也此所謂感而遂通不行而至不疾而速也發於心達於氣天地與吾身共只是一團物事所謂鬼神者只是自家氣自家心下思慮才動這氣即敷於外自然有所感通地純隂凝聚於中天浮陽運旋於外此天地之常體也恆星不動純繫乎天與浮陽運旋而不窮者也日月五星逆天而行并包乎地者也地在氣中雖順天左旋其所繫辰象隨之稍遲則反移徙而右爾間有緩速不齊者七政之性殊也月隂精反乎陽者也故其右行最速日為陽精然其質本隂故其右行雖緩亦不純繫乎天如恆星不動金水附日前後進退而行者其理精深存乎物感可知矣鎮星地類然根本五行雖其行最緩亦不純繫乎地也火者亦隂質為陽萃焉然其氣比日而微故其遲倍日惟木乃歲一盛衰故歲歷一辰辰者日月一交之次有歲之象也黃瑞節曰此假日月右行之説與後假異同未詳凡圜轉之物動必有機既謂之機則動非自外也古今謂天左旋此直至粗之論爾不考日月出沒恆星昏曉之變愚謂在天而運者惟七曜而已恆星所以為晝夜者直以地氣乘機左旋於中故使恆星河漢因一作回北為南日月因天隱見太虛無體則無以驗其遷動於外也天左旋處其中者順之少遲則反右矣或問朱子曰天道左旋日月右行如何曰自疏家有此説人皆守定張子説日月皆是左旋説得好蓋天行甚健一日一夜周三百六十五度四分度之一又進過一度日行速健次於天一日一夜周三百六十五度四分度之一起度端終度端無贏縮正恰好被天進一度則日為退一度二日天進二度則日為退二度趕天不上積至三百六十五日四分日之一則天所進過之度又恰周得本數而日所退之度亦恰退盡本數遂與天會而成一年月行遲一日一夜三百六十五度四分度之一行不盡比天為退了十三度十九分度之七至二十七日半強而一周天與初躔合又行二日有竒為二十九日半強與日會進數為順天而左退數為逆天而右曆家以進數難算只以退數算之此是截法故謂之右行取其易見日月之度爾乃云日行遲月行速此錯説也曆家若順算則算著那相去處度數多今以其相近處言故易算蔡季通云西域有九執曆是順算天無體二十八宿便是天體隨天而定日月與五星則皆隨天左轉而緩急各不同不隨天而定也橫渠少遲則反右之説極精如以一大輪在外一小輪載日月在內大輪轉急小輪轉慢雖都是左轉只有急有慢便覺日月似右轉了禮記月令疏云二十八宿及諸星皆循天左行一日一夜一周天一周天之外更行一度其説可證地物也天神也物無踰神之理顧有地斯有天若其配然爾朱子曰天包乎地天之氣又行乎地之中故橫渠云地對天不過地有升降日有修短地雖凝聚不散之物然二氣升降其間相從而不已也陽日上地日降而下者虛也陽日降地日進而上者盈也此一歲寒暑之候也至於一晝夜之盈虛升降則以海水潮汐驗之為信然間有小大之差則繫日月朔望其精相感邵子曰海潮者地之喘息也所以應月者從其類也朱子曰天地之間東西為緯南北為經故子午卯酉為四方之正位而潮之進退以月至此位為節爾黃瑞節曰此段地有升降日有修短及證以海水潮汐之候皆用舊説今考先儒皆謂地在天中水環地外四遊升降不越三萬里春遊過東方五千里其下降如其數秋遊過西方五千里其上升如其數夏遊在南故日在其上冬遊過北故日在其南此冬夏晝夜之長短因地有升降而然人處地上如在舟中但見岸之移而不知舟之轉也至於論潮則謂天包水水承地而一元之氣升降於太空之中地乘水力與元氣相為升降氣升而地沉則海水溢上而為潮氣降而地浮則海水縮而為汐一晝一夜隂陽之氣再升再降故一日之間潮汐皆再其説與地有四遊相為表裏然以渾天術觀之天形斜倚半在地上北極出地三十六度其南五十五度正當地之中又其南十二度為夏至之日道天在地上最高故晝長又其南二十四度為春秋分之日道天在地上稍低故晝夜平又其南二十四度為冬至之日道天在地上最低故晝短其南下入地才三十一度而已此晝夜長短乃天體高低自然之理非因地之升降也潮汐消長則惟余襄公海潮圖序最明蓋潮之消息皆繫於月月臨卯酉則潮漲乎東西月臨子午則潮平乎南北晝夜之運日行一度月行十三度有竒故太隂西沒之期常緩於太陽三刻有竒潮信之來率亦如是自朔至望常緩一夜潮自望至晦復緩一晝潮朔望前後月行差疾故晦前三日潮勢長朔後三日潮勢大望亦如之月弦之際月行差遲故潮之去來勢亦稍小一月則潮盛於朔望之後一歲則潮盛於春秋之中春夏晝潮常大秋冬夜潮常大蓋歲之有春秋猶月之有朔望天地之常數也此潮之消息乃繫乎月之進退亦非因地之浮沉也張子特用舊説而未之易耳因附見之日質本隂月質本陽故於朔望之際精魄反交則光為之食矣朱子曰曆家説天有五道而今先將黃赤道説天正如一圓匣相似赤道是那匣子相合縫處在天之中黃道一半在赤道之內一半在赤道之外東西兩處與赤道相交度却是將天橫分為許多度數會時是日月在黃道赤道十字路頭相交處相撞著望時是月與日正相向如一箇在子一箇在午日所以食於朔者月常在下日常在上既是相會被月在下面遮了日故日食望時月食謂之暗盧蓋火日外影其中實暗到望時恰當著其中暗處故月食至明中有暗虛其暗至微望時月與之正對無分毫相差月為暗虛所射故食黃瑞節曰春秋疏云日月同處則日被月映而形魄不見故食朔則交會故食必在朔然而每朔皆會應每月皆食杜預云日月動物雖行度有大量不能不小有盈縮故雖有交會而不食者或有頻交而食者又云日月異道交互相錯月之一周必半在日道裏從外而入內半在日道表從內而出外或六入七出或七入六出凡十三出入而與日會曆家謂之交道通而計之一百七十三日有餘而有一交唐一行日議云日行黃道月有九道其所行之道遇交則有薄蝕之變也至於合朔如合璧則不食其交不軌道則食也故驗日食者必以日躔月道之交驗之耳五代王朴云自古相傳皆謂近交則日月有食殊不知日月之相掩與暗虛之相射其理有異今據諸家之説所謂九道者青道二赤道二白道二黑道二與黃道而九也月不行黃道止行其餘八道但此八道皆斜出入於黃道之內外故謂之九道耳月一歲凡十三次經天則二十六次出入於黃道之內外一次經天則一次入一次出也或六次入七次出或七次入六次出各十三出入也此二十六次出入於黃道之時有二十四次皆不與日會惟有兩次輿日會故疏云通計一百七十三日有餘而有一交也於此時方有食然而有食有不食者或日月同道之際道有分數故食亦有分數或小有盈縮遂從邊而過故有不食也吕記詩記十月之交篇載孔疏之説亦然若以定法論之一歲兩交當兩食而春秋二百四十二年日食三十六唐二百九十年食百餘何也此杜預所謂有雖交會而不食者或有頻交而食者也朱子與王朴之説合日月之相掩與暗虛之所射是日月食之理也虧盈法月於人為近日遠在外故月受日光常在於外人視其終初如鈎之曲及其中天也如半璧然此虧盈之驗也朱子曰曆家舊説月朔則去日漸遠故魄死而明生既望則去日漸近故魄生而明死至晦而朔則又逺日而明復生所謂死而復育也此説誤矣若果如此則未望之前西近東逺而始生之明當在月東既望之後東近西逺而未死之明却在月西矣安得未望載魄於西既望終魄於東而遡日以為明乎故惟近世沈括之説得之蓋括之言曰月本無光猶一銀丸日擢之乃光耳光之初生日在其旁故光側而所見才如鈎日漸逺則斜照而光稍滿大抵如一彈丸以粉塗其半側視之則粉處如鈎對視之則正圓也近歲王普又申其説月生明之夕但見其一鈎至日月相望而人處其中方得見其全明必有神人能凌倒景旁日月而往參其問則雖弦晦之時亦復見其全明而與望夕無異耳以此觀之則知月光常滿但自人所立處視之有偏有正故見其光有盈有虧非既死而復生也古今皆言月有闕惟沈存中云無闕蓋晦日則與日相疊了或從上過或從下過皆不受光至初三方漸漸離開了人在下面側看見則其光闕至望日則月與日正相對人在中間正看見則其光方圓問月中影是地影否曰前章有此説日月在天如兩鏡相照而地居其中四旁皆空水也故月中微黑之處乃鏡中天地之影略有形似而非其有物也問弦之義曰上弦是月盈及一半如弓之上弦下弦是月虧了一半如弓之下弦又問是四分取半否曰二分二至亦是四分取半曆家謂紓前縮後近一逺三以天之圍言之上弦與下弦時月日相看皆四分天之一黃瑞節曰紓前縮後云者曆家謂春分月弦東井日在奎秋分月弦南斗日在角月在前日在後也近一逺三云者曆家以周天為四分近一分遠三分也月所位者陽故受日之光不受日之精相望中弦則光為之食精之不可以二也日月雖以形相物考其道則有施受健順之差焉星月金水受光於火日隂受而陽施也隂陽之精互藏其宅則各得其所安故日月之形萬古不變若隂陽之氣則循環迭至聚散相蕩升降相求絪緼相揉蓋相兼相制欲一之而不能此其所以屈伸無方運行不息莫或使之不曰性命之理謂之何哉或問程子曰隂陽之精互藏其宅然乎曰此言甚有味由人如何看水離物不得故水有離之象火能入物故火有坎之象日月得天得自然之理也非蒼蒼之形也閏餘生於朔不盡周天之氣而世傳交食法與閏異術蓋有不知而作者爾朱子曰周天之氣謂二十四氣也月有大小朔不得盡此氣而一歲曰子足矣故置閏天體至圓周圍三百六十五度四分度之一繞地左旋常一日一周而過一度日麗天而少遲一日繞地一周無餘而常不及天一度積三百六十五日九百四十分日之二百三十五而與天會是一歲日行之數也月麗天而尤遲一日常不及天十三度十九分度之七積二十九日九百四十分日之四百九十九而與日會十二會得全日三百四十八餘分之積五千九百八十八如日法九百四十而一得六不盡三百四十八通計得日三百五十四九百四十分日之三百四十八是一歲月行之數也歲有十二月月有三十日三百六十日歲之常數也故日行而多五日九百四十分日之二百三十五者為氣盈月行而少五日九百四十分日之五百九十二者為朔虛合氣盈朔虛而閏生焉一歲閏率則十日九百四十分日之八百二十七三歲一閏則三十二日九百四十分日之六百單一五歲再閏則五十四日九百四十分日之三百七十五十有九歲七閏則氣朔分齊是為一章黃瑞節曰曆家以一日為九百四十分所謂九百四十分日之二百三十五者是一日內二百三十五分也所謂餘分之積五千九百八十八者一會餘四百九十九十二會乘之得五千九百八十八也所謂如日法九百四十而一者如算日之法以九百四十分為一日也得六者得六日也不盡三百四十八者將餘分五千九百八十八除之六日外猶餘三百四十八分也日行積三百六十五日九百四十分日之二百三十五與天會是一歲三百六十日而日行多五日又二百二十五分也月行積三百五十四日九百四十分日之三百四十八為十二會是一歲三百六十日而月行少五日又五百九十二分也將日行所多五日又二百三十五分合月行所少五日又五百九十二分通得十日又八百二十七分一歲之閏率也三歲一閏合三歲之間日行所多月行所少通得三十二日又六百單一分也五歲再閏合五歲之間日行所多月行所少通得五十四日又三百七十五分也十九歲七閏合十九歲日行所多月行所少通得整日一百九十每歲餘分八百二十七以十九乘之得一萬五千七百一十三以日法九百四十分而一除之得十六日猶餘六百七十三分并一百九十日通二百單六日又六日七十三分也今為七閏月每月二十九日通二百單三日每月餘分四百九十九分以七乘之得三千四百九十二以日法九百四十分而一除之得三日猶餘六百七十三分并二百單三日通二百單六日又六百七十三分也所謂氣朔分齊者十九年合氣盈朔虛得二百單六日不盡六百七十三分七閏月亦二百單六日不盡六百七十三分氣之分與朔之分至十九年而皆齊此所謂氣朔分齊而為一章也陽之德主於遂隂之德主於閉隂性凝聚陽性發散隂聚之陽必散之其勢均散陽為隂纍則相持為雨而降隂為陽得則飄揚為雲而升故雲物班布太虛者隂為風驅斂聚而未散者也凡隂氣凝聚陽在內者不得出則奮擊而為雷霆陽在外者不得入則周旋不舍而為風其聚有遠近虛實故雷風有小大暴緩和而散則為霜雪雨露不和而散則為戾氣曀霾隂常散緩受交於陽則風雨調寒暑正朱子曰此一段見得隂陽之情陽氣正升忽遇隂氣則相持而下為雨蓋陽氣輕隂氣重故陽氣為隂氣壓墜而下也隂氣正升忽遇陽氣則助之飛騰而上為雲也陽氣伏於隂氣之內不得出故爆開而為雷也隂氣凝結於內陽氣欲入不得故旋繞其外不已而為風至吹散隂氣盡乃已也戾氣飛雹之類曀霾黃霧之類皆隂陽邪惡不正之氣所以雹氷穢濁或青黑色天象者陽中之隂風霆者隂中之陽雷霆感動雖速然其所由來亦漸爾能窮神化所從來德之盛者歟火日外光能直而施金水內光能闢而受受者隨材各得施者所應無窮神與形天與地之道歟木曰曲直能既曲而反申也金曰從革一從革而不能自反也水火氣也故炎上潤下與隂陽升降土不得而制焉木金者土之華實也其性有水火之雜故木之為物水漬則生火然而不離也蓋得土之浮華於水火之交也金之為物得火之精於土之燥得水之精於土之濡故水火相待而不相害鑠之反流而不耗蓋得土之精實於水火之際也土者物之所以成始而成終也地之質也化之終也水火之所以升降物兼體而不遺者也朱子曰五行之説正蒙一段説得最好不輕下一字問隂陽五行如何曰康節説得法密橫渠説得理透問金木水火體質屬土曰正蒙有一説好只金與木之體質屬土水與火却不屬土隂以陽為質陽以隂為質水內明而外暗火內暗而外明西山真氏曰日火外景金水內景本淮南子之説道家謂日火揚光於外故日有食火有滅金水潛光於內故無窮以此為養生之法收視反觀潛神不曜冰者隂凝而陽未勝也火者陽麗而隂未盡也火之炎人之蒸有影無形能散而不能受光者其氣陽也陽陷於隂為水附於隂為火天道篇第三天道四時行百物生無非至教聖人之動無非至德夫何言哉天體物不遺猶仁體事無不在也禮儀三百威儀三千無一物而非仁也昊天曰明及爾出王昊天曰旦及爾遊衍無一物之不體也朱子曰此數句從赤心片片説出來荀揚豈能到體物猶言為物之體也蓋物物有箇天理體事謂事事是仁做出來如禮儀三百威儀三千須得仁以為骨子凡言體便是做他那骨子本是言物以天為體事以仁為體緣須著從上説故如此下語體物為物之體猶言幹事為事之幹也出王之王音往言往來遊衍無非是理無一物之不體猶言無一物不將這箇做骨上天之載有感必通聖人之為得為而為之也天不言而四時行聖人神道設教而天下服誠於此動於彼神之道與成變化行鬼神成行隂陽之氣而已矣韓本有此一假天不言而信神不怒而威誠故信無私故威天之不測謂神神而有常謂天運於無形之謂道形而下者不足以言之鼓萬物而不與聖人同憂天道也聖不可知也無心之妙非有心所及也不見而章已誠而明也不動而變神而化也無為而誠為物不二也已誠而明故能不見而章不動而變無為而成富有廣大不禦之盛與日新悠久無疆之道與天之知物不以耳目心思然知之之理過於耳目心思天視聽以民明威以民故詩書所謂帝天之命主於民心而已焉或問朱子曰所謂帝天之命主於民心曰皆此理也民心之所向即天心之所存也化而裁之存乎變存四時之變則周歲之化可裁存晝夜之變則百刻之化可裁推而行之存乎通推四時而行則能存周歲之通推晝夜而行則能存百刻之通神而明之存乎其人不知上天之載當存文王默而成之存乎德行學者常存德性則自然默成而信矣存文王則知天載之神存衆人則知物性之神谷之神也有限故不能通天下之聲聖人之神惟天故能周萬物而知聖人有感無隱正猶天道之神形而上者得意斯得名得名斯得象不得名非得象者也故語道至於不能象則名言亡矣世人知道之自然未始識自然之為體爾有天德然後天地之道可一言而盡正明不為日月所眩正觀不為天地所遷神化篇第四神天德化天道德其體道其用一於氣而已神無方易無體大且一而已爾虛明一作靜照鑒神之明也無逺近幽深利用出入神之充塞無間也天下之動神鼓之也辭不鼓舞則不足以盡神鬼神往來屈伸之義故天曰神地曰示人曰鬼神示者歸之始歸往者來之終朱子曰説文示字以有所示為義故視字從示天之氣生而不息故曰神地之氣顯然示人故曰示一説一而大謂之天二而小謂之地二而小即示字也天曰神地曰示者蓋其氣未嘗或息也人鬼則其氣有所歸矣形而上者得辭斯得象矣神為不測故緩辭不足以盡神化為難知故急辭不足以體化朱子曰神自是急底物事緩辭如何形容之如隂陽不測之謂神神無方易無體皆是急辭化是漸漸而化若急辭以形容之則不可氣有隂陽推行有漸為化合一不測為神其在人也知義用利則神化之事備矣德盛者窮神則知不足道知化則義不足云天之化也運諸氣人之化也順夫時非氣非時則化之名何有化之實何施中庸曰至誠為能化孟子曰大而化之皆以其德合隂陽與天地同流而無不通也所謂氣也者非待其蒸鬱凝聚接於目而後知之茍健順動止浩然湛然之得言皆可名之象爾然則象若非氣指何為象時若非象指何為時世人取釋氏銷礙入空學者舍惡趨善以為化此直可為始學遣纍者薄乎云爾豈天道神化所同語也哉朱子曰神化二字雖程子説得亦不甚分明惟是橫渠推出來曰推行有漸為化合一不測為神又曰一故神兩在故不測言兩在者或在隂或在陽在隂時全體都是隂在陽時全體都是陽化是逐一挨將去底一日復一日一月復一月節節挨將去便成一年這是化問象若非氣指何為象時若非象指何為時曰且如天地日月若無這氣何以撑拄得成這象象無晦明何以别其為晝夜無寒暑何以别其為冬夏變則化由粗入精也化而裁之謂之變以著顯微也谷神不死故能微顯而不掩鬼神常不死故誠不可掩人有是心在隱微必乘間而見故君子雖處幽獨防亦不懈神化者天之良能非人能故大而位天德然後能窮神知化大可為也大而化不可為也在熟而已易謂窮神知化乃德盛仁熟之致非智力能強也大而化之能不勉而大也不已而天則不測而神矣先後天而不違順至理而推行知無不合也雖然得聖人之任者皆可勉而至猶不害於未化爾大幾聖矣化則位乎天德矣大則不驕化則不吝無我而後大大成性而後聖聖位天德不可致知謂神故神也者聖而不可知見幾則義明動而不括則用利屈伸順理則身安而德滋窮神知化與天為一豈有我所能勉哉乃德盛而自致爾精義入神事豫吾內求利吾外也利用安身素利吾外致養吾內也窮神知化乃養盛自致非思勉之能強故崇德而外君子未或致知也朱子曰精熟義理而造於神事素定乎內而乃所以求利乎外也通達其用而身得其安素利乎外而乃所以致養其內也蓋內外相應之理入神是入至於微妙處此却似向內做工夫非是作用於外然乃所以致用於外也故嘗謂門人曰吾學既得於心則修其辭命辭無差然後斷事斷事無失吾乃沛然精義入神者豫而已橫渠可謂精義入神神不可致思存焉可也化不可助長順焉可也存虛明久至德順變化達時中仁之至義之盡也知微知彰不舍而繼其善然後可以成之性矣聖不可知者乃天德良能立心求之則不可得而知之聖不可知謂神莊生繆妄又謂有神人焉惟神為能變化以其一天下之動也人能知變化之道其必知神之為也見易則神其幾矣知幾其神由經正以貫之則寧用終日斷可識矣幾者象見而未形也形則涉乎明不待神而後知也吉之先見云者順性命則所先皆吉也知神而後能饗帝饗親見易而後能知神是故不聞性與天道而能制禮作樂者末矣精義入神豫之至也徇物喪心人化物而滅天理者乎存神過化忘物纍而順性命者乎敦厚而不化有體而無用也化而自失焉徇物而喪已也大德敦化然後仁智一而聖人之事備性性為能存神物物為能過化西山真氏曰過化存神此四字本出孟子過化謂聖人凡所經歷處人皆化之存神謂其中所存神妙正意只是如此至橫渠先生乃謂性性為能存神物物為能過化下性字指本然者而言上性字是謂我能全其性而不為情所蕩而失其性則其所存者神妙而不可測下物字指事物而言上物字指我之應物而言謂物物各自有理我隨其理以應之物各付物不以己之私意參乎其間則事過弗留如冰之釋如風之休後來諸老先生多本其説獨文公不以為然者蓋孟子之意未説到如此深故也文公解經每務平實如此然橫渠先生之説亦不可不知也無我然後得正巳之盡存神然後妙應物之感範圍天地之化而不過過則溺於空淪於靜既不能存夫神又不能知夫化矣旁行不流圓神不倚也百姓日用而不知溺於流也義以反經為本經正則精仁以敦化為深化行則顯義入神動一靜也仁敦化靜一動也仁敦化則無體義入神則無方動物篇第五動物本諸天以呼吸為聚散之漸植物本諸地以隂陽升降為聚散之漸物之初生氣日至而滋息物生既盈氣日反而遊散至之謂神以其申也反之為鬼以其歸也朱子曰此息只是生息之息非止息之息孟子言日夜之所息程子謂息字有二義愚謂只是生息至之謂神反之謂鬼固是然雷風山澤亦有神今之綜廟貌亦謂之神亦以方伸之氣為言耳此處要錯周遍而觀之伸中有屈屈中有伸伸中有屈如人有魄是也屈中有伸如鬼有靈是也人死便是歸祖考來格便是神氣於人生而不離死而遊散者謂魂聚成形質雖死而不散者謂魄海水凝則冰浮則漚然冰之才漚之性其存其亡海不得而與焉推是足以究死生之説伊川程子改與為有有息者根於天不息者根於地根於天者不滯於用根於地者滯於方此動植之分也生有先後所以為天序小大高下相並而相形焉是謂天秩天之生物也有序物之既形也有秩知序然後經正知秩然後禮行凡物能相感者鬼神施受之性也不能感者鬼神亦體而化矣物無孤立之理非同異屈伸終始以發明之則雖物非物也事有始卒乃成非同異有無相感則不見其成不見其成則雖物非物故一屈伸相感而利生焉獨見獨聞雖小異怪也出於疾與妄也共見共聞雖大異誠也出隂陽之正也賢才出國將昌子孫才族將大人之有息蓋剛柔相摩乾坤闔闢之象也寤形開而志交諸外也夢形閉而氣專乎內也寤所以知新於耳目夢所以緣舊於習心醫謂飢夢取飽夢與凡寤夢所感專語氣於五藏之變容有取焉爾聲者形氣相軋而成兩氣者谷響雷聲之類兩形者桴鼓叩擊之類形軋氣羽扇敲矢之類氣軋形人聲笙簧之類是皆物感之良能人皆習知而不察者爾形也聲也臭也味也溫涼也動靜也六者莫不有五行之别同異之變皆帝則之必察者歟誠明篇第六誠明所知乃天德良知非聞見小知而已天人異用不足以言誠天人異知不足以盡明所謂誠明者性與天道不見乎小大之别也義命合一存乎理仁智合一存乎聖動靜合一存乎神隂陽合一存乎道性與天道合一存乎誠天所以長久不已之道乃所謂誠仁人孝子所以事天誠身不過不已於仁孝而已故君子誠之為貴誠有是物則有終有始偽實不有何終始之有故曰不誠無物自明誠由窮理而盡性也自誠明由盡性而窮理也性者萬物之一源非有我之得私也惟大人為能盡其道是故立必俱立知必周知愛必兼愛成不獨成彼自蔽塞而不知順吾理者則亦末如之何矣朱子曰所謂性者人物之所同得非惟己有是人亦有是非惟人有是物亦有是天能為性人謀為能大人盡性不以天能為能而以人謀為能故曰天地設位聖人成能盡性然後知生無所得則死無所喪未嘗無之謂體體之謂性天所性者通極於道氣之昏明不足以蔽之天所命者通極於性遇之吉凶不足以戕之不免乎蔽之戕之者未之學也性通乎氣之外命行乎氣之內氣無內外假有形而言爾故思知人不可不知天盡其性然後能至於命知性知天則隂陽鬼神皆吾分內爾天性在人正猶水性之在冰凝釋雖異為物一也受光有小大昏明其照納不二也問冰水之説何謂近釋氏朱子曰水性在冰只是凍凝成箇冰有甚造化及其釋則這冰復歸於水便有迹了與天性在人自不同猶程子器受日光之説便是否曰是除了器日光便不見却無形了天良能本吾良能顧為有我所喪爾明天人之本無二上達反天理下達徇人欲者與性其總合兩也命其受有則也不極總之要則不至受之分盡性窮理而不可變乃吾則也天所自不能已者謂命不能無感者謂性雖然聖人猶不以所可憂而同其無憂者有相之道存乎我也或問朱子曰物所不能無感謂性曰有此性自是因物有感見於君臣父子日用事物當然處皆感也所謂感而遂通是也此句對了天所不能自已謂命蓋此理自無息止時晝夜寒署無一時停故逝者如斯而程子謂與道為體這道理古今晝夜無須臾息故曰不能已問性只是理安能感恐此語只可名心否曰橫渠此言雖未親切然感固是心所以感者亦是此心中有此理方能感湛一氣之本攻取氣之欲口腹於飲食鼻舌於臭味皆攻取之性也知德者屬厭而已不以嗜欲纍其心不以小害大末喪本焉爾問湛一氣之本攻取氣之欲朱子曰湛一是未感物之時湛然純一此是氣之本攻取如目之欲色耳之欲聲便是氣之欲曰攻取是攻取那物否曰是心能盡性人能𢎞道也性不知檢其心非道𢎞人也盡其性能盡人物之性至於命者亦能至人物之命莫不性諸道命諸天我體物未嘗遺物體我知其不遺也至於命然後能成已成物不失其道以生為性既不通晝夜之道且人與物等故告子之妄不可不詆性於人無不善繫其善反不善反而已過天地之化不善反者也命於人無不正繫其順與不順而已行險以僥幸不順命者也形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉朱子曰天地之性則太極本然之妙萬殊之一本也氣質之性則二氣交運而生一本而萬殊也天地之性是理也才到有隂陽五行處便有氣質之性於此便有昏明厚薄之殊論天地之性則專指理而言論氣質之性則以理與氣雜而言之氣質隂陽五行所為性即太極之全體但論氣質之性即此體墮在氣質之中爾非别有一性也氣質之説起於張程極有功於聖門有補於後學前此未曾有人説到故張程之説立則諸子之説泯矣勉齋黃氏曰自孟子言性善而荀卿言性惡楊雄言善惡混韓文公言三品及至橫渠張子分為天地之性氣質之性然後諸子之説始定蓋自其理而言之不雜乎氣質而為言則是天地賦與萬物之本然者而寓乎氣質之中也故其言曰善反之則天地之性存焉蓋謂天地之性未嘗離乎氣質之中也其以天地為言特指其純粹至善乃天地賦豫之本然也曰形而後有氣質之性其所以有善惡之不同何也曰氣有偏正則所受之理隨而偏正氣有昏明則所受之理隨而昏明木之氣盛則金之氣衰故仁常多而義常少金之氣盛則木之氣衰故義常多而仁常少若此者氣質之性有善惡也曰既言氣質之性有善惡則不復有天地之性也子思子又有未發之中何也曰性固為氣質所雜矣然方其未發也此心湛然物欲不生則氣雖偏而理自正氣雖昏而理自明氣雖有贏乏而理則無勝負及其感物而動則或氣動而理隨之或理動而氣挾之由是至善之理聽命於氣善惡由之而判矣此未發之前天地之性純粹至善而子思之所謂中也記曰人生而靜天之性也程子曰其本也真而靜其未發也五性具焉則理固有寂感而靜固其本也動則有萬變之不同焉愚嘗以是而質之先師矣答曰未發之前氣不用事所以有善而無惡至哉此言也西山真氏曰張子有言為學大益在自求變化氣質此即所謂善反之者也程子亦曰學至氣質變方是有功亦是張子之意人之剛柔緩急有才與不才氣之偏也天本參和不偏養其氣反之本而不偏則盡性而天矣性未成則善惡混故亹亹而繼善者斯為善矣惡盡去則善因以亡故含曰善而曰成之者性德不勝氣性命於氣德勝其氣性命於德窮理盡性則性天德命天理氣之不可變者獨死生修夭而已故論死生則曰有命以言其氣也語富貴則曰在天以言其理此大德所以必受命易簡理得而成位乎天地之中也所謂天理也者能悅諸心能通天下之志之理也能使天下悅且通則天下必歸焉不歸焉者所乘所遇之不同如仲尼與繼世之君也舜禹有天下而不與焉者正謂天理馴致非氣稟當然非志意所與也必曰舜禹云者餘非乘勢則求焉者也朱子曰張子只是説性與氣皆從上面流下來自家之德若不能有以勝其氣則秪是承當得他那所賦之氣若是德有以勝其氣則我之所以受其賦豫者皆是德故窮理盡性則我之所受皆天之德其所以賦豫我者皆天之理氣之不可變者惟死生修夭而臣已蓋死生修夭富貴貧賤這却還他氣至義之於君仁之於父子所謂命也有性焉君子不謂命也這箇却須由我不由他性命於氣是性命都由氣則性不能全其本然命不能順其自然性命於德是性命都由德則性能全天德命能順天理問先生舊説性命于氣之命為聽命之命今以命與性字平説所以後靣分言性天德命天理不知如何曰命字較輕問若將性命作兩字看當云性命皆由于氣由于德曰橫渠文字自如此問窮理盡性則性天德命天理這處性命如何分别曰性是以其定者而言命是以其流行者而言命便是水恁地流性便是將碗盛得來大碗盛得多小碗盛得少潔淨碗盛得清汙漫碗盛得濁潛室陳氏曰義理不勝氣稟則性與命皆隨氣稟中去所以多不善義理勝氣稟則性與命皆向義理中來所以為善德謂義理之性氣謂血氣之性學問之道無他不過欲以義理勝血氣利者為神滯者為物是故風雷有象不速於心心禦見聞不𢎞於性上智下愚習與性相遠既甚而不可變者也纖惡必除善斯成性矣察惡未盡雖善必粗矣不識不知順帝之則有思慮知識則喪其天矣君子所性與天地同流異行而已焉在帝左右察天理而左右也天理者時義而已君子教人舉天理以示之而已其行已也述天理而時措之也和樂道之端乎和則可大樂則可久天地之性久大而已矣莫非天也陽明勝則德性用隂濁勝則物欲行領惡而全好者其必由學乎朱子曰只將自家意思體驗便見得人心虛靜自然清明才為物欲所蔽便暗了此隂濁所以勝也不誠不莊可謂之盡性窮理乎性之德也未嘗偽且慢故知不免乎偽慢者未嘗知其性也勉而後誠莊非性也不勉而誠莊所謂不言而信不怒而威者與生直理順則吉凶莫非正也不直其生者非幸福於回則免難於茍也屈信相感而利生感以誠也情偽相感而利害生雜之偽也至誠則順理而利偽則不循理而害順性命之理則所謂吉凶莫非正也逆理則凶為自取吉其險幸也莫非命也順受其正順性命之理則得性命之正滅理窮欲人為之招也大心篇第七大其心則能體天下之物物有未體則心為有外世人之心止於聞見之狹聖人盡性不以見聞梏其心其視天下無一物非我孟子謂盡心則知性知天以此天大無外故有外之心不足以合天心見聞之知乃物交而知非德性所知德性不知不萌於見聞朱子曰體猶仁體事而無不在言心理流行脈絡貫通無有不到茍一物有未體則便有不到處包括不盡是心為有外蓋私意間隔而物我對立則雖至親且未必能無外矣問體之義曰此是置心在物中究見其理如格物致知之意與體用之體不同問不以聞見梏其心曰此是説聖人盡性事今人理會學先於見聞上做工夫到然後脫然貫通蓋尋常見聞一事只知得一箇道理若到貫通便都是一理曾子是巳盡心則只是極其大心極其大則知性知天而無有外之心矣然孟子之意只是説窮理之至則心自然極其全體而無餘非是要大其心而後知性知天也問如何是有外之心曰只是有私意便內外扞格只見得自家身巳凡物皆不與巳相關便是有外之心問如何是不足以合天心曰天大無外物無不包物理所在一有所遺則吾心為有外便與天心不相似橫渠此説固好然只管如此説相將便無規矩無歸著此心便瞥入虛空裏去了夫子為萬世道德之宗都説得語意平易從得夫子之言便是無外之實西山真氏曰朱子云云蓋慮其弊至此學者未可以是疑張子之説也由象識心徇象喪心知象者心存象之心亦象而已謂之心可乎人謂巳有知由耳目有受也人之有受由內外之合也知合內外於耳目之外則其知也過人遠矣天之明莫大於目故有目接之不知其幾萬里之高也天之聲莫大於雷霆故有耳屬之不知其幾萬里之逺也天之不禦莫大於太虛故心知廓之莫究其極也人病其以耳目見聞纍其心而不務盡其心故思盡其心者必知心所從來而後能耳目雖為性纍然合內外之德知其為啓之之要也成吾身者天之神也不知以性成身而自謂因身發智貪天功為己力吾不知其知也民何知哉因物同異相形萬變相感耳目內外之合貪天功而自謂己知爾體物體身道之本也身而體道其為人也大矣道能物身故大不能物身而纍於身則藐乎其卑矣朱子曰非以身體道蓋是主於義理只知有義理却將身只做物樣看待謂如先理會身上利害是非便是以身體道如顔子非禮勿視便只知有禮不知有己耳只是有義理直把自家作無物看伊川亦云除却身只是理懸空只是箇義理能以天體身則能體物也不疑成心忘然後可與進於道成心者私意也化則無成心矣成心者意之謂與無成心者時中而已矣心存無盡性之理故聖不可知謂神此章言心者亦指私心為言也以我視物則我大以道體物我則道大故君子之大也大於道大於我者容不免狂而已燭天理如向明萬象無所隱窮人欲如専顧影間區區於一物之中爾釋氏不知天命而以心法起滅天地以小緣大以末緣本其不能窮而謂之幻妄真所謂疑冰者歟夏蟲疑冰以其不識釋氏妄意天性而不知範圍天用反以六根之微因緣天地明不能盡則誣天地日月為幻妄蔽其用於一身之小溺其志於虛空之大此所以語大語小流遁失中其蔽於大也塵芥六合其蔽於小也夢幻人世謂之窮理可乎不知窮理而謂盡性可乎謂之無不知可乎塵芥六合謂天地為有窮也夢幻人世明不能究所從也中正篇第八中正然後貫天下之道此君子之所以大居正也蓋得正則得所止得所止則可以𢎞而至於大樂正子顔淵知欲仁矣樂正子不致其學足以為善人信人志於仁無惡而已顔子好學不倦合仁與智具體聖人獨未至聖人之止爾學者中道而立則有位以𢎞之無中道而𢎞則窮大而失其居失其居則無地以崇其德與不及者同此顔子所以克己研幾必欲用其極也未至聖而不已故仲尼賢其進未得中而不居故惜夫未見其止也黃瑞節曰張子所引論語未見其止其説與舊解不同舊解對進而言則止為己義張子以止為聖人之極功故言顔子未至聖人之止未詳是否大中至正之極文必能致其用約必能感而通未至於此其視聖人恍惚前後不可為之像此顔子之嘆乎可欲之謂善志仁則無惡也誠善於心之謂信充內形外之謂美塞乎天地之謂大大能成性之謂聖天地同流隂陽不測之謂神高明不可窮博厚不可極則中道不可識蓋顔子之嘆也君子之道成身成性以為功者也未至於聖皆行而未成之地爾大而未化未能有其大化而後能有其大知德以大中為極可謂知至矣擇中庸而固執之乃至之之漸也惟知學然後能勉能勉然後日進而不息可期矣體正則不待矯而𢎞未正必矯矯而得中然後可大故致曲於誠者必變而後化極其大而後中可求止其中而後大可有大亦聖之任雖非清和一體之偏猶未忘於勉而大爾若聖人則性與天道無所勉焉無所雜者清之極無所異者和之極勉而清非聖人之清勉而和非聖人之和所謂聖者不勉不思而至焉者也勉蓋未能安也思蓋未能有也不尊德性則學問從而不道不致廣大則精微無所立其誠不極高明則擇乎中庸失時措之宜矣絶四之外心可存處蓋必有事焉而聖不可知也不得已當為而為之雖殺人皆義也有心為之雖善皆意也正己而物正大人也正己而正物猶不免有意之纍也有意為善利之也假之也無意為善性之也由之也有意在善且為未盡况有意於未善耶仲尼絶四自始學至成德竭兩端之教也不得已而後為至於不得為而止斯智矣夫意有思也必有待也固不化也我有方也四者有一焉則與天地為不相似天理一貫則無意必固我之鑿意必固我一物存焉非誠也四者盡去則直養而無害矣妄去然後得所止得所止然後得所養而進於大矣無所感而起妄也感而通誠也計度而知昏也不思而得素也事豫則立必有教以先之盡教之善必精義以研之精義入神然後立斯立動斯和矣志道則進據者不止矣依仁則小者可遊而不失和矣志學然後可與適道強禮然後可與立不惑然後可與權博文以集義集義以正經正經然後一以貫天下之道將窮理而不順理將精義而不徙義欲資深且習察吾不知其智也知仁勇天下之達德雖本之有差及所以知之成之則一也蓋謂仁者以生知以安行此五者智者以學知以利行此五者勇者以困知以勉行此五者中心安仁無欲而好仁無畏而惡不仁天下一人而已惟責己一身當然爾行之篤者敦篤云乎哉如天道不已君子於天下逹善逹不善無物我之私循理者共恱之不循理者共改之改之者過雖在人如在己不忘自訟共恱者善雖在己蓋取諸人而為必以與人焉善以天下不善以天下是謂逹善逹不善善人云者志於仁而未致其學能無惡而已君子名之必可言也如是善人欲仁而未致其學者也欲仁故雖不踐成法亦不陷於惡有諸己也不入於室由不學故無自而入聖人之室也惡不仁故不善未嘗不知徒好仁而不惡不仁則習不察行不著是故徒善未必盡義徒是未必盡仁好仁而惡不仁然後盡仁義之道篤信好學篤信不好學不越為善人信士而已好德如好色好仁為甚矣見過而內自訟惡不仁而不使加乎其身惡不仁為甚矣學者不如是不足以成身故孔子未見其人必嘆曰巳矣乎思之甚也孫其志於仁則得仁孫其志於義則得義惟其敏而已慱文約禮由至著入至簡故可使不得叛而去溫故知新多識前言往行以蓄德繹舊業而知新蓋思昔未至而今至緣舊所見聞而察來皆其義也責己者當知天下國家無皆非之理故學至於不尤人學之至也聞而不疑則傳言之見而不殆則學行之中人之德也聞斯行好學之徒也見而識其善而未果於行愈於不知者爾世有不知而作者蓋鑿也妄也夫子所不敢也故曰我無是也以能問不能以多問寡私淑艾以教人隱而未見之仁也為山平地此仲尼所以惜顔回未至蓋與互鄉之進也學者四失為人則失多好高則失寡不察則易苦難則止學者捨禮義則飽食終日無所猷為與下民一致所事不踰衣食之間燕遊之樂爾以心求道正猶以己知人終不若彼自立彼為不思而得也考求迹合以免罪戾者畏罪之人也故曰考道以為無失儒者窮理故率性可以謂之道浮圖不知窮理而自謂之性故其説不可推而行致曲不二則德有定體體象誠定則文節著見一曲致文則餘善兼照明能兼照則必將徙義誠能徙義則德自通變能通其變則圓神無滯有不知則有知無不知則無知是以鄙夫有問仲尼竭兩端而空空易無思無為受命乃如響聖人一言盡天下之道雖鄙夫有問必竭兩端而告之然問者隨才分各足未必能兩端之盡也教人者必知至學之難易知人之美惡當知誰可先傳此誰將後倦此若灑掃應對乃幼而遜弟之事長後教之人必倦弊惟聖人於大德有始有卒故事無大小莫不處極今始學之人未必能繼妄大道教之是誣也知至學之難易知德也知其美惡知人也知其人且知德故能教人使入德仲尼所以問同而答異以此蒙以養正使蒙者不失其正教人者之功也盡其道其惟聖人乎洪鐘未嘗有聲由扣乃有聲聖人未嘗有知由問乃有知有如時雨之化者當其可乘其間而施之不待彼有求有為而後教之也志常繼則罕譬而喻言易入則微而臧凡學官先事士先志謂有官者先教之事未官者使正其志焉志者教之大倫而言也道以德者運於物外使自化也故諭人者先其意而遜其志可也蓋志意兩言則志公而意私爾朱子曰志者心之所之是一直去底意又是志之經營往來底凡營為謀度皆意也能使不仁者仁仁之施厚矣故聖人並答仁智以舉直錯諸枉以責人之心責己則盡道所謂君子之道四丘未能一焉者也以愛己之心愛人則盡仁所謂施諸己而不願亦勿施於人者也以衆人望人則易從所謂以人治人改而止者也此君子所以責己責人愛人之三術也有受教之心雖蠻貊可教為道既異雖黨類難相為謀大人所存蓋必以天下為度故孟子教人雖貨色之欲親長之私逹諸天下而後已子而孚化之衆好者翼飛之則吾道行矣性理大全書卷五

body:
  text: 性理大全書卷三十一性理三氣質之性命才附南軒張氏曰原性之理無有不善人物所同也論性之存乎氣質則人稟天地之精五行之秀固與禽獸草木異然就人之中不無清濁厚薄之不同而實亦未嘗不相近也學者須是變化氣質或偏於剛或偏於柔必反之如禽獸是其氣質之偏不能反也人若不知自反則去本性日以逺矣若變化得過來只是本性所有初未嘗增添故言性者須分别出氣質之性問人之性其氣稟有清濁何也曰二氣迭運參差萬端而萬物各正性命夫豈物物而與之哉氣稟之不同也雖其氣稟之不同而其本莫不善故人貴於能反也太極無不善故性亦無不善人欲初無體也傳曰人生而靜天之性也感物而動性之欲也直至物至知知好惡形焉然後有流而為惡者非性所本有也或問自孟子言性善而荀卿言性惡揚雄言善惡混韓文公言三品及至橫渠張子分為天地之性氣質之性然後諸子之説始定性善者天地之性也餘則所謂氣質者也然嘗疑之張子所謂氣質之性形而後有則天地之性乃未受生以前天理之流行者故又以為極本窮源之性又以為萬物一源如此則可以謂之性而不可以謂之性也程子又有人生而靜以上不容説之語又於好學論言性之本而後言形既生矣則疑若天地之性指命而言命固善矣於人性果何預乎勉齋黃氏曰程張之論非此之謂也蓋自其理而言之不雜乎氣質而為言則是天地賦與萬物之本然者而寓乎氣質之中也故其言曰善反之則天地之性存焉蓋謂天地之性未嘗離乎氣質之中也其以天地為言特指其純粹至善乃天地賦豫之本然也曰形而後有氣質之性其所以有善惡之不同何也曰氣有偏正則所受之理隨而偏正氣有昏明則所受之理隨而昏明木之氣盛則金之氣衰故仁常多而義常少金之氣盛則木之氣衰故義常多而仁常少若此者氣質之性善善惡也曰既言氣質之性有善惡則不復有天地之性矣子思子又有未發之中何也曰性固為氣質所雜矣然方其未發也此心湛然物欲不生則氣雖偏而理自正氣雖昏而理自明氣雖有贏乏而理則無勝負及其感物而動則或氣動而理隨之或理動而氣挾之由是至善之理聽命於氣善惡由之而判矣此未發之前天地之性純粹至善而子思之所謂中也記曰人生而靜天之性也程子曰其本也真而靜其未發也五性具焉則理固有寂感而靜則其本也動則有萬變之不同焉愚嘗以是而質之先師矣答曰未發之前氣不用事所以有善而無惡至哉此言也氣有清濁譬如著些物蔽了發不出如柔弱之人見義不為為義之意却在裏面只是發不出如燈火使紙罩了光依舊在裏面只是發不出來折去了紙便自是光天地之間只是箇陰陽五行其理則為健順五常貫徹古今充塞宇宙捨此之外别無一物亦無一物不是此理以人心言之未發則無不善已發則善惡形焉然原其所以為惡者亦自此理而發非是别有箇惡與理不相干也若别有箇惡與理不相干却是有性外之物也易以陰陽分君子小人周子謂性者剛柔善惡君子小人不同而不出於陰陽善惡不同而不出於剛柔蓋天下未有性外之物也人性本善氣質之稟一昏一明一偏一正故有善惡之不同其明而正者則發無不善昏而偏者則發有善惡然其所以為惡者亦自此理而發也故曰惡亦不可不謂之性也然人性本善若自一條直路而發則無不善故孟子不但言性善雖才與情亦皆只謂之善及其已發而有善有惡者氣稟不同耳然其所以為惡者亦自此理而發故惡亦不可不謂之性孟子所謂莫非命也程子所謂思慮動作皆天也張子所謂莫非天也陽明勝則德性用陰濁則物欲行亦是此意天命之謂性是天分付與人底謂之性惟皇上帝降𠂻于民是也所降之𠂻何嘗不善此性本無不善天將箇性與人便夾了氣與人氣褁這性性才入氣裏面去便有善有惡有清有濁有偏有正清濁偏正雖氣為之然著他夾了則性亦如此譬如一泓之水本清流在沙石上去其清自若流在濁泥中去這清底也濁了不可以濁底為不是水北溪陳氏曰天所命於人以是理本只善而無惡故人所受以為性亦本善而無惡孟子道性善是専就大本上説來説得極親切只是不曽發出氣稟一段所以啓後世紛紛之論蓋人之所以有萬殊不齊只緣氣稟不同這氣只是陰陽五行之氣如陽性剛陰性柔火性燥水性潤金性寒木性溫土性遲重七者夾雜便有參差不齊所以人間所值便有許多般樣然這氣運來運去自有箇真元之會如厯法算到本數湊合所謂日月如合璧五星如連珠時相似聖人便是稟得這真元之會來然天地間參差不齊之時多真元會合之時少如一嵗間極寒極暑陰晦之時多不寒不暑光風霽月之時極少最難得恰好時節人生多是值此不齊之氣如有一等人非常剛烈是值陽氣多有一等人極是軟弱是值陰氣多有人躁暴忿厲是又值陽氣之惡者有人狡譎姦陰此又值陰氣之惡者有人性圓一撥便轉也有一等極愚拗雖一句善言亦説不入與禽獸無異都是氣稟如此陽氣中有善惡陰氣中亦有善惡如通書所謂剛善剛惡柔善柔惡之類不是陰陽氣本惡只是分合轉移齊不齊中便自然成粹駁善惡耳因氣有駁粹便有賢愚氣雖不齊而大本則一雖下愚亦可變而為善然工夫最難非百倍其功者不能故子思曰人一能之已百之人十能之已千之果能此道雖愚必明雖柔必強正為此耳自孟子不説到氣稟所以荀子便以性為惡楊子便以性為善惡混韓文公又以為性有三品都只是説得氣近世東坡蘇氏又以為性未有善惡五峯胡氏又以為性無善惡都只含糊就人與天相接處捉摸説箇性是天生自然底物更不曽説將性端的指定是甚底物直至二程得濓溪先生太極圖發端方始説得分明極至更無去處其言曰性即理也理則自堯舜至於塗人一也此語最是簡切端的如孟子説善善亦只是理但不若指認理字下得較確定胡氏看不徹便謂善者只是贊嘆之辭又誤了既是贊嘆便是那箇是好物方贊嘆豈有不好物而贊嘆之邪程子於本性之外又發出氣稟一段方見得善惡所由來故其言曰論性不論氣不備論氣不論性不明二之則不是也蓋只論大本而不及氣稟則所論有欠闕未備若只論氣稟而不及大本便只説得粗底而道理全然不明千萬世而下學者只得按他説更不可改易氣稟之説從何而起夫子曰性相近也習相逺也惟上智與下愚不移此正是説氣質之性子思子所謂三知三行及所謂雖愚必明雖柔必強亦是説氣質之性但未分明指出氣質字為言耳到二程子始分明指認説出甚詳備橫渠因之又立為定論曰形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉氣質之性是以氣稟言之天地之性是以大本言之其實天地之性亦不離氣質之中只是就那氣質中分别出天地之性不與相雜為言耳若就人品類論則上天所賦皆一般而人隨其所值又各有清濁之不齊如聖人得氣至清所以合下便能生知賦質至粹所以合下便能安行大抵得氣之清者不隔蔽那義理便呈露昭著如銀盞中滿貯清水自透見盞底銀花子甚分明若未嘗有水然賢人得清氣多而濁氣少清中微有些查滓止未便能昏蔽得他所以聰明也易開發自大賢而下或清濁相半或清底少濁底多昏蔽得厚了如盞底銀花子看不見欲見得須十分加澄治之功若能力學也解變化氣質轉昏為明有一般人稟氣清明於理義上儘看得出而行為不篤不能承載得道理多雜詭譎去是又賦質不粹此如井泉甚清貯在銀盞裏面亦透底清徹但泉脈從淤土惡木根中穿過來味不純甘以之煮白米則成赤飯煎白水則成赤湯煎茶則酸澀是有惡味夾雜了又有一般人生下來於世味一切簡淡所為甚純正但與説到道理處全發不來是又賦質純粹而稟氣不清此如井泉脈味純甘絶佳而有泥土渾濁了終不透瑩如溫公恭儉力行篤信好古是甚次第正大資質只緣少那至清之氣識見不高明二程屢將理義發他一向偏執固滯更發不上甚為二程所不滿又有一般人甚好説道理只是執拗自立一家意見是稟氣清中被一條戾氣來衝拗了如泉出來甚清却被一條别水橫衝破了及或遭巉巖石頭橫截衝激不帖順去反成險惡之流看來人生氣稟是有多少般樣或相倍蓰或相什百或相千萬不可以一律齊畢竟清明純粹恰好底極為難得所以聖賢少而愚不肖者多潛室陳氏曰性者人心所具之天理以其稟賦之不齊故先儒分别出來謂有義理之性有氣質之性仁義禮智者義理之性也知覺運動者氣質之性也有義理之性而無氣質之性則義理必無附著有氣質之性而無義理之性則無異於枯死之物故有義理以行乎血氣之中有血氣以受義理之體合虛與氣而性全孟子之時諸子之言性往往皆於氣質上有見而遂指氣質作性但能知其形而下者耳故孟子答之只就義理上説以攻他未曉處氣質之性諸子方得於此孟子所以不復言之義理之性諸子未通於此孟子所以及覆詳説之程子之説正恐後學死執孟子義理之説而遺失氣質之性故并二者而言之曰論性不論氣不備論氣不論性不明程子之論舉其全孟子之論所以矯諸子之偏人能即程子之言而達孟子之意則其不同之意不辨而自明矣識氣質之性善惡方各有著落不然則惡從何處生孟子専説義理之性専説義理則惡無所歸是論性不論氣孟子之説為未備専説氣稟則善為無别是論氣不論性諸子之論所以不明夫本也程子兼氣質論性問目視耳聽此氣質之性也然視之所以明聽之所以聰抑氣質之性邪抑義理之性邪曰目視耳聽物也視明聽聰物之則也來問可施於物則不可施於言性若言性當云好聲好色氣質之性正聲正色義理之性義理只在氣質中但外義理而獨徇氣質則非也西山真氏曰人之氣質有至善而不可移奪者有善少惡多而易於移奪者有善多惡少而難於移奪者又曰性之不能離乎氣猶水之不能離乎土也性雖不雜乎氣而氣汩之則不能不惡矣水雖不雜乎土而土汩之則不能不濁矣然清者其先而濁者其後也善者其先而惡者其後也先善者本然之性也後惡者形而後有也故所謂善者超然於降𠂻之初而所謂惡者雜出於有形之後其非相對而並出也昭昭矣平岩葉氏曰論性之善而不推其氣稟之不同則何以有上智下愚之不移故曰不備論氣質之異而不原其性之皆善則是不達其本也故曰不明然性氣二者元不相離判而二之則亦非矣臨川吳氏曰人得天地之氣而成形有此氣即有此理所有之理謂之性此理在天地則元亨利貞是也其在人而為性則仁義禮智是也性即天理豈有不善但人之生也受氣於父之時既有或清或濁之不同成質於母之時又有或美或惡之不同氣之極清質之極美者為上聖蓋此理在清氣美質之中本然之真無所汚壞此堯舜之性所以為至善而孟子之道性善所以必稱堯舜以實之也其氣之至濁質之至惡者為下愚上聖以下下愚以上或清或濁或美或惡分數多寡有萬不同惟其氣濁而質惡則理在其中者被其拘礙淪染而非復其本然矣此性之所以不能皆善而有萬不同也孟子道性善是就氣質中挑出其本然之理而言然不曽分别性之所以有不善者因氣質之有濁惡而汚壞其性也故雖與告子言而終不足以解告子之惑至今人讀孟子亦見其未有以折倒告子而使之心服也蓋孟子但論得理之無不同不曽論到氣之有不同處是其言之不備也不備者謂但説得一邊不曽説得一邊不完備也故曰論性不論氣不備此指孟子之言性而言也至若荀楊以性為惡以性為善惡混與夫世俗言人性寬性褊性變性急皆是指氣質之不同者為性而不知氣質中之理謂之性此其見之不明也不明者謂其不曉得性字故曰論氣不論性不明此指荀楊世俗之説性者言也程子性即理也一語正是鉞砭世俗錯認性字之非所以為大有功張子書形而後有氣質之性善反之則天地之性存焉故氣質之性君子有弗性者焉此言最分曉而觀者不能解其言反為所惑將謂性有兩種蓋天地之性氣質之性兩性字只是一般非有兩等性也故曰二之則不是言人之性本是得天地之理因有人之形則所得天地之性局在本人氣質中所謂形而後有氣質之性也氣質雖有不同而本性之善則一但氣質不清不美者其本性不免有所汚壞故學者當用反之之功反之如湯武反之也之反謂反之於身而學焉以至變化其不清不美之氣質則天地之性渾然全備具存於氣質之中故曰善反之則天地之性存焉氣質之用小學問之功大能學者氣質可變而不能汚壞吾天地本然之性而吾性非復如前汚壞於氣質者矣故曰氣質之性君子有弗性者焉或問今世言人性善性惡性緩性急性昏性明性剛性柔者何也曰此氣質之性也蓋人之生也天雖賦以是理而人得之以為仁義禮智之性然是性也實具於五藏內之所謂心者焉故必賦以是氣而人得之以為五藏百骸之身然後所謂性者有所寓也是以人之生也稟氣有厚薄而形體運動有肥瘠強弱之殊稟氣有清濁而材質知覺有愚智昏明之異是則告子所謂生之謂性而朱子謂其指人之知覺運動為性者是也是性也實氣也故張子謂氣質之性君子有弗性者焉程子亦謂有自幼而善有自幼而惡是氣稟有然也斯豈天地本然之性云乎哉若論天地本然之性則程子曰性即理也斯言盡之天下之清莫如水先儒以水之清喻性之善人無有不善之性則世無有不清之水也然黃河之水渾渾而流以至于海竟莫能清者何也請循其初原者水之初也水原於天而附於地原之初出曷嘗不清也哉出於岩石之地者瑩然湛然得以全其本然之清出於泥塵之地者自其初出而混於其滓則原雖清而流不能不濁矣非水之濁也地則然也人之性亦猶是性原於天而附於人局於氣質之中人之氣質不同猶地之岩石泥塵有不同也氣質之明粹者其性自如岩石之水也氣質之昏駁者性從而變泥塵之水也水之濁於泥塵者由其地而原之所自則清也故流雖濁而有清之之道河之水甚濁貯之以器投之以膠則泥沉於底而其水可食甚濁固可使之清也沉其濁不如河之甚者乎世之學者非惟無以清之而又有以濁之性之汚壞豈専係乎有生之初哉有生之後目隨所接而增其滋穢外物之淈多於氣質之滓者奚翅千萬不復其原之清而反益其流之濁非其性之罪也雖然原之清天也流之濁人也人者克則天者復亦在乎用力以清之者何如爾程子曰在天曰命在人曰性貴賤夀夭命也仁義禮智亦命也以下兼論命夫動靜者陰陽之本況五氣交運則益參差不齊矣賦生之類宜其雜揉者衆而精一者間或值焉以其間值之難則其數不能長亦宜矣世之服食欲夀者其亦大愚矣夫命者受之於天不可增損加益而欲服食而夀悲哉問富貴貧賤夀夭固有分定君子先盡其在我者則富貴貧賤夀夭可以命言若在我者未盡則貧賤而天理所當然富貴而夀是為僥幸不可謂之命曰雖不可謂之命然富貴貧賤夀夭是亦前定孟子曰求則得之舍則失之是求有益於得也求在我者也求之有道得之有命是求無益於得也求在外者也故君子以義安命小人以命安義或問命與遇異乎曰遇不遇即命也曰長平死者四十萬其命齊乎曰遇白起則命也有如四海九州之人同日而死也則亦常事爾世之人以為是駭然耳所見少也張子曰富貴貧賤者皆命也今有人均為勤苦有富貴者有終身窮餓者其富貴者即是幸會也求而有不得則是求無益於得也道義則不可知命是求在我者也人一已百人十已千如此不至者猶難罪性語氣可也同行報異猶難語命語遇可也氣與遇性與命切近矣猶未易言也問智愚之識殊疑於有性善惡之報差疑於有命曰性通極於無氣其一物爾命稟同於性遇乃適然爾五峯胡氏曰貴賤命也仁義性也人固有逺迹江湖念絶於名利者矣然世或求之而不得免人固有置身市朝心屬於富貴者矣然世或舍之而不得進命之在人分定于天不可變也是以君子貴知命朱子曰性者萬物之原而氣稟則有清濁是以有聖愚之異命者萬物之所同受而陰陽交運參差不齊是以五福六極值遇不一問命字有専以理言者有専以氣言者曰也都相離不得蓋天非氣無以命於人人非氣無以受天所命問先生説命有兩種一種是貧富貴賤死生夀夭一種是清濁偏正智愚賢不肖一種屬氣一種屬理以某觀之兩種皆似屬氣蓋智愚賢不肖清濁偏正亦氣之為也曰固然性則是命之理而已問性分命分何以别曰性分是以理言之命分是兼氣言之命分有多寡厚薄之不同若性分則又都一般此理聖愚賢否皆同問天命謂性之命與死生有命之命不同何也曰死生有命之命是帶氣言之氣便有稟得多少厚薄之不同天命謂性之命是純乎理言之然天之所命畢竟皆不離乎氣但中庸此句乃是以理言之孟子謂性也有命焉此性是兼氣稟食色言之命也有性焉此命是帶氣言之性善又是超出氣説問顔淵不幸短命伯牛死曰命矣夫孔子得之不得曰有命如此之命與天命謂性之命無分别否曰命之正者出於理命之變者出於氣質要之皆天所付豫孟子曰莫之致而至者命也但當自盡其道則所值之命皆正命也因問如今數家之學如康節之説謂皆一定而不可易如何曰也只陰陽盛衰消長之理大數數可見然聖賢不曽主此説如今人説康節之數謂他説一事一物皆有成敗之時都説得膚淺了問亡之命矣夫此命字是就氣稟上説曰死生夀夭固是氣之所稟只看孟子説性也有命焉處便分曉又問不知命與知天命之命如何曰不同知天命謂知其理之所自來譬之於水人皆知其為水聖人則知其發源處如不知命處却是説死生夀夭貧富貴賤之命也問子罕言命若仁義禮智五常皆是天所命如貴賤死生夀夭之命有不同如何曰都是天所命稟得精英之氣便為聖為賢便是得理之全得理之正稟得清明者便英爽稟得敦厚者便溫和稟得清高者便貴稟得豐厚者便富稟得長久者便夀稟得衰頽薄濁者便為愚不肖為貧為賤為夭天有那氣生一箇人出來便有許多物隨他來天之所命固是均一到氣稟處便有不齊只看其稟得來如何耳又問得清明之氣為聖賢昏濁之氣為愚不肖氣之厚者為富貴薄者為貧賤此固然也然聖人得天地清明中和之氣宜無所虧欠而夫子反貧賤何也豈時運使然也抑其所稟亦有不足邪曰便是稟得來有不足他那清明也只管得做聖賢却管不得那富貴稟得那高底則貴稟得厚底則富稟得長底則夀貧賤夭者反是夫子雖得清明者以為聖人然稟得那低底薄底所以貧賤顔子又不如孔子又稟得那短底所以又夭又問一陰一陽宜若停勻則賢不肖宜均何故君子常少而小人常多曰自是他那物事駁雜如何得齊且以撲錢譬之純者常少不純者常多自是他那氣駁雜或前或後所以拗不能得他恰好如何得均平且以一日言之或仁或晴或風或雨或寒或熱或清爽或鶻突一日之間自有許多變便可見矣又問雖是駁雜然畢竟不過只是一陰一陽二氣而已如何會恁地不齊曰便是不如此若只是兩箇單底陽陰則無不齊緣是他那物事錯糅萬變所以不能得他恰好又問如此則天地生聖賢又只是偶然不是有意矣曰天地那裏説我特地要生箇聖賢出來也只是氣數到那裏恰相湊著所以生出聖賢及至生出則若天之有意焉耳又問康節云陽一而陰二所以君子少而小人多此語是否曰也説得來自是那物事好底少而惡底多且如面前事也自是好底事少惡底事多其理只一般問人生有夀夭氣也賢愚亦氣也今觀盜跖極愚而夀顔子極賢而夭如是則夀夭之氣與賢愚之氣容或有異矣明道志程邵公慕云以其間遇之難則其數或不能長亦宜矣吾兒其得氣之精一而數之局者歟詳味此説氣有清濁有短長其清者固所以為賢然雖清而短故於數亦短其濁者固所以為愚然雖濁而長故其數亦長不知果然否曰此説得之貴賤貧富亦是如此但三代以上氣數醇濃故氣之清者必厚必長而聖賢皆富且夀且富以下反是問富貴有命如後世鄙夫小人當堯舜三代之世如何得富貴曰當堯舜三代之世不得富貴在後世則得富貴便是命曰如此則氣稟不一定曰以此氣遇此時是他命好不遇此時便是背所謂資適逢世是也如長平死者四十萬但遇白起便如此只他相撞著便是命人之稟氣富貴貧賤長短皆有定數寓其中稟得盛者其中有許多物事其來無窮亦無盛而短者若木生於山取之或貴而為棟梁或賤而為厠料皆其生時所稟氣數如此定了或指屋柱問云此理也曲直性也所以為曲直命也曲直是説氣稟曰然問遺書論命處注云聖人非不知命然於人事不得不盡如何曰人固有命只是不可不順受其正如知命者不立乎巖墻之下是也若謂其有命却去巖墻之下立萬一到覆壓處却是専言命不得人事盡處便是命問伊川橫渠命遇之説曰所謂命者如天子命我作甚官其官之簡易繁難甚處做得甚處做不得便都是一時命了自家只得去做故孟子只説莫非命也却有箇正與不正所謂正命者蓋天之始初命我如事君忠事父孝便有許多條貫在裏至於有厚薄淺深這却是氣稟了然不謂之命不得只不是正命如桎梏而死喚做非命不得蓋緣他當時稟得箇乖戾之氣便有此然謂之正命不得故君子戰兢如臨深履薄蓋欲順受其正者而不受其不正者且如説當死於水火不成便自赴水火而死而今只恁地看不必去生枝節説命説遇説同説異也潛室陳氏曰有氣質之性命有義理之性命由德上發者為義理由氣上發者為氣質雖其稟賦不同茍能學問以充之謂窮理盡性則向之得於氣質者今也性皆天德命皆天理所謂善反之則天地之性存焉魯齋許氏曰貧賤富貴死生修短禍福稟於氣皆本乎天也是一定之分不可求也其中有正命有非正命者盡其道而不立乎巖墻之下修身以待之然此亦有禍福吉凶死生修短來當以順受所謂莫之致而至者皆正命也乃係乎天之所為也非正命者行險徼幸行非禮義之事致於禍害桎梏死者命亦隨焉人之自召也程子曰性無不善其所以不善者才也受於天之謂性稟於氣之謂才才之善不善由氣之有偏正也乃若其性則無不善矣今夫本之曲直其性也或可以為車或可以為輪其才也然而才之不善亦可以變之在飬其氣以復其善爾故能持其志飬其氣亦可以為善故孟子曰人皆可以為堯舜以下兼論才性出於天才出於氣氣清則才清氣濁則才濁譬猶木焉曲直者性也可以為棟梁可以為榱桶者才也才則有善與不善性則無不善惟上智與下愚不移非謂不可移也而有不移之理所以不移者只有兩般為自暴自棄不肯學也使其肯學不自暴自棄安不可移哉氣清則才善氣濁則才惡稟得至清之氣生者為聖人稟得至濁之氣生者為愚人如韓愈所言公都子所問之人是也然此論生知之聖人若夫學而知之氣無清濁皆可至於善而復性之本所謂堯舜性之是生知也湯武反之是學而知也今人説有才乃是言才之美者也才乃人資質循性修之雖至惡可勝而為善德性謂天賦天資才之美者也少成若天性習慣成自然雖聖人復出不易此言孔子曰性相近也習相逺也唯上智與下愚不移愚非性也不能盡其才也問上智下愚不移是性否曰此是才須理會得性與才所以分處又問中人以上可以語上中人以下不可以語上是才否曰固是然此只是大綱説言中人以上可以與之説近上話中人以下不可與之説近上話也生之謂性凡言性處須看立意如何且如言人性善性之本也生之謂性論其所稟也孔子言性相近若論其本豈可言相近只論其所稟也告子所云固是為孟子問他他説便不是也乃若其情則可以為善若夫為不善非才之罪此言人陷溺其心者非關才事才猶言才料曲可以為輪直可以為梁棟若是毁鑿壞了豈關才事或曰人才有美惡豈可言非才之罪曰才有美惡者是舉天下之言也若説一人之才如因富嵗而賴因凶嵗而暴豈才質之本然耶問人性本明因何有蔽曰此須索理會也孟子言人性善是也雖荀楊亦不知性孟子所以獨出諸儒者以能明性也性無不善而有不善者才也性即理理則自堯舜至于塗人一也才稟於氣氣有清濁稟其清者為賢稟其濁者為愚又問愚可變否曰可孔子謂上智與下愚不移然亦有可移之理惟自暴自棄者則不移也曰下愚所以自暴自棄者才乎曰固是也然却道他不可移不得性只一般豈有不可移却被他自暴棄不肯去學故移不得使肯學者亦有可移之理問韓文公楊雄言性如何曰其所言者才耳朱子曰性者心之理情者心之動才便是那情之會恁地者情與才絶相近但情是遇物而發路陌曲折恁地去底才是那會如此底要之千頭萬緒皆是從心上來問如此則才與心之用相類曰才是心之力是有氣力去做底心是管攝主宰者此心之所以為大也心譬水也性水之理也性所以立乎水之靜情所以行乎水之動欲則水之流而至於濫也才者水之氣力所以能流者然其流有急有緩則是才之不同伊川謂性稟於天才稟於氣是也問性之所以無不善者以其出於天也才之所以有善不善以其出於氣也要之性出於天氣亦出於天何故便至於此曰性是形而上者氣是形而下者形而上者全是天理形而下者只是那查滓至於形又是查滓至濁者也問才出於氣德出於性曰不可才也是性中出德也是有是氣而後有是德人之有才者出來做得事業也是他性中有了便出來做得但溫厚篤實便是德剛明果敢便是才只為他氣之所稟者生到那裏多故為才問能為善使是才曰能為善而本善者是才若云能為善便是才則能為惡亦是才也問人有強弱由氣有剛柔若人有技藝之類如何曰亦是氣如今人看五行亦推測得些小又問如才不足人明得理可為否曰若明得盡豈不可為所謂克念作聖是也然極難若只明得一二如何做得孟子説才皆是指其資質可以為善處伊川所謂才稟於氣氣清則才清氣濁則才濁此與孟子説才小異而語意尤密不可不考乃若其情非才之罪以若訓順者未是猶言如論其情非才之罪也蓋謂情之發有不中節處不必以為才之罪爾退之論才之品有三性之品有五其説勝荀楊諸公多矣説性之品便以仁義禮智言之此尤當理説才之品若如此推究則有千百種之多始言其大槩如此此正是氣質之説但少一箇氣字耳問伊川論才與孟子言才有曰非才之罪也又曰不能盡其才者也又曰非天之降才爾殊也又曰以為未嘗有才焉如孟子之意未嘗以才為不善而伊川却説才有善不善其言曰氣清則才善氣濁則才惡又曰氣清則才清氣濁則才濁意者以氣質為才也以氣質為才則才固有善不善之分矣而孟子却止以才為善者何也曰孟子與伊川論才則皆是孟子所謂才止是指本性而言性之發用無有不善處如人之有才事事做得出來一性之中萬善完具發將出來便是才也便如惻隱羞惡是心也能惻隱羞惡者才也如伊川論才却是指氣質而言也氣質之性古人雖不曽與人説著考之經典却有此意如書云人惟萬物之靈亶聰明作元后與夫天乃錫王勇智之説皆此意也孔子謂性相近也習相逺也孟子辨告子生之謂性亦是説氣質之性近世被濓溪拈掇出來而橫渠二程始有氣質之性之説此伊川論才所以云有善不善者蓋主此而言也或問曰韓愈所謂上中下三品者乃孟子所謂才也才雖不同而所以性則一孟子論性善固極本窮源之論至謂非天之降才爾殊豈才果不殊邪抑所謂才者乃所謂性也才是資稟性是所以然性固行乎才之中要不可指才便謂之性然孟子所以謂之不殊者何也南軒張氏曰孟子之論才與退之上中下三品之説不同退之所分三品只是據氣稟而言耳孟子論才曰非天之降才爾殊也又曰若夫為不善非才之罪也蓋善者性也人之可以為善者才也此自不殊北溪陳氏曰才是才質才能才質猶言才料質幹是以體言才能是會做事底同這件事有人會發揮得有人全發揮不去便是才不同是以用言孟子所謂非才之罪及天之降才非爾殊等語皆把才做善底物他只是以其從性善大本上發來便見都一般要説得全備須如伊川氣清則才清氣濁則才惡之論方盡平岩葉氏曰性本乎理理無不善才本乎氣氣則不齊故或以之為善或以之為惡性理大全書卷三十一

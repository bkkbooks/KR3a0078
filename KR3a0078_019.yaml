body:
  text: 性理大全書卷十九家禮二凡禮有本有文自其施於家者言之則名分之守愛敬之實其本也冠昏喪祭儀章度數者其文也其本者有家日用之常體固不可以一日而不修其文又皆所以紀綱人道之始終雖其行之有時施之有所然非講之素明習之素熟則其臨事之際亦無以合宜而應節是亦不可一日而不講且習焉者也三代之際禮經備矣然其存於今者宫廬器服之制出入起居之節皆已不宜於世世之君子雖或酌以古今之變更為一時之法然亦或詳或略無所折衷至或遺其本而務其末緩於實而急於文自有志好禮之士猶或不能舉其要而困於貧窶者尤患其終不能有以及於禮也熹之愚蓋兩病焉是以嘗獨究觀古今之籍因其大體之不可變者而少加損益於其間以為一家之書大抵謹名分崇愛敬以為之夲至其施行之際則又略浮文敷本實以竊自附於孔子從先進之遺意誠願得與同志之士熟講而勉行之庶幾古人所以修身齊家之道謹終追逺之心猶可以復見而于國家所以崇化導民之意亦或有小補云楊氏復曰先生服母喪參酌古今咸盡其變因成喪葬祭禮又推之於冠昏名曰家禮既成為一童行竊之以逃先生易簀其書始出行於世今按先生所定家鄉邦國王朝禮專以儀禮為經及自述家禮則又通之以古今之宜故冠禮則多取司馬氏昏禮則參諸司馬氏程氏喪禮本之司馬氏後又以高氏為最善及論祔遷則取橫渠遺命治喪則以書儀踈略而用儀禮祭禮兼用司馬氏程氏而先後所見又有不同節祠則以韓魏公所行者為法若夫明大宗小宗之法以寓愛禮存羊之意此又家禮之大義所繫蓋諸書所未暇及而先生於此尤拳拳也惜其書既亡至先生沒而後出不及再修以幸萬世於是竊取先生平日去取折衷之言有以發明家禮之意者若昏禮親迎用溫公入門以後則從伊川之類是也有後來議論始定若祭禮祭始祖初祖而後不祭之類是也有不用疏家之説若深衣續衽鈎邊是也有用先儒舊義與經傳不同若喪服辟領婦人不杖之類是也凡此悉附於逐條之下云通禮此篇所著皆所謂有家日用之常體不可一日而不修者祠堂此章本合在祭禮篇今以報本反始之心尊祖敬宗之意實有家名分之守所以開業傳世之本也故特著此冠于篇端使覽者知所以先立乎其大者而凡後篇所以周旋升降出入向背之曲折亦有所據以考焉然古之廟制不見於經且今士庶人之賤亦有所不得為者故特以祠堂名之而其制度亦多用俗禮云司馬溫公曰宋仁宗時嘗詔聽太子少傅以上皆立家廟而有司終不為之定制度惟文潞公立廟於西京他人皆莫之立故今但以影堂言之朱子曰古命士得立家廟家廟之制內立寢廟中立正廟外立門四面牆圍之非命士止祭於堂上只祭考妣伊川謂無貴賤皆祭自髙祖而下但祭有豐殺踈數不同廟向南坐皆東嚮伊川於此不審乃云廟皆東向祖先位面東自廳側直入其所反轉面西入廟中其制非是古人所以廟面東向坐者蓋户在東牖在西坐于一邊乃是奧處也嘗欲立一家廟小五架屋以後架作一長龕堂以板隔截作四龕堂堂置位牌堂外用簾子小小祭祀時亦可只就其處大祭祀則請出或堂或廳上皆可唐唐大臣皆立廟於京師宋朝惟文潞公法杜佑制立一廟在西京雖如韓司馬家亦不曽立廟杜佑廟祖宗時尚在長安劉氏垓孫曰伊川先生云古者庶人祭於寢士大夫祭於廟庶人無廟可立影堂今文公先生乃曰祠堂者蓋以伊川先生謂祭時不可用影故改影堂曰祠堂云君子將營宫室先立祠堂於正寢之東祠堂之制三間外為中門中門外為兩階皆三級東曰阼階西曰西階階下隨地廣狹以屋覆之令可容家衆敘立又為遺書衣物祭器庫及神厨於其東繚以周垣别為外門常加扄閍若家貧地狹則止立一間不立厨庫而東西壁下置立兩匱西藏遺書衣物東藏祭器亦可正寢謂前堂也地狹則於廳事之東亦可凡祠堂所在之宅宗子世守之不得分析南凡屋之制不問何向背但以前為後為北左為東右為西後皆放此為四龕以奉先世神主祠堂之內以近北一架為四龕每龕內置一卓大宗及繼高祖之小宗則髙祖居西曽祖次之祖次之父次之繼曽祖之小宗則不敢祭髙祖而虛其西龕一繼祖之小宗則不敢祭曾祖而虛其西龕二繼禰之小宗則不敢祭祖而虛其西龕三若大宗世數未滿則亦虛其西龕如小宗之制神主皆藏於櫝中置於卓上南向龕外各垂小簾簾外設香卓於堂中置香爐香盒於其上兩階之間又設香卓亦如之非嫡長子則不敢祭其父若與嫡長同居則死而後其子孫為立祠堂于私室且隨所繼世數為龕俟其出而異居乃備其制若生而異居則預於其地立齋以居如祠堂之圖制死則因以為祠堂主式見喪禮及前程子曰管攝天下人心收宗族厚風俗使人不忘本須是明譜系收世族立宗子法宗子法壞則人不知來處以至流轉四方往往親未絶不相識又曰今無宗子故朝廷無世臣若立宗子法則人知尊祖重本人既重本則朝廷之勢自尊古者子弟從父兄今父兄從子弟由不知本也宗子法廢後世譜牒尚有遺風譜牒又廢人家不知來處無百年之家骨肉無統雖至親恩亦薄張子曰宗法若立則人各知來處朝廷大有所益或問朝廷何所益曰公卿各保其家忠義豈有不立忠義既立朝廷豈有不固司馬溫溫公曰所以西上者神道尚右故也諸或問廟主自西而列朱子曰此也不是古禮問侯廟制太祖居北而南向昭廟二在其東南穆廟二在其西南皆南北相重不知當時每廟一室或共一室各為位也曰古廟制自太祖而下各是一室陸農師禮象圖可考西漢時髙祖廟文帝顧成廟各在一處但無法度不同一處至東漢明帝謙貶不敢自當立廟祔於光武廟後遂以為例至唐太廟及羣臣家廟悉如今制以西為上也至禰處謂之東廟今太廟之制亦然大傳云别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗何也君適長為世子繼先君正統自母弟以下皆不得宗其次適為别子不得禰其父又不可宗嗣君又不可無統屬故死後立為大宗之祖所謂别子為祖也其適子繼之則為大宗直下相傳百世不遷别子若有庶子又不敢禰别子死後立為小宗之祖其長子繼之則為小宗五世則遷别子者謂諸侯之弟别於正適故稱别子也為祖者自與後世為始祖謂此别子子孫為卿大夫立此别子為始祖也繼别為宗謂别子之世世長子當繼别子與族人為不遷之宗也繼禰者為小宗禰謂别子之庶子以庶子所生長子繼此庶子與兄弟為小宗也五世則遷者上從高祖下至玄孫之子高祖廟毁不復相宗又别立宗也然别子之後族人衆多或繼高祖者與三從兄弟為宗至子五世或繼曽祖者興再從兄弟為宗至孫五世或繼祖者與同堂兄弟為宗至曽孫五世或繼禰者與親兄弟為宗至玄孫五世皆自小宗之祖以降而言也魯季友乃桓公别子所自出故為一族之大宗滕文之昭武王為天子以次則周公為長故榺謂魯為宗國又有有大宗而無小宗者皆適則不立小宗也有有小宗而無大宗者無適則不立大宗也今法長子死則主父喪用次子不用姪若宗子法立則用長子之子楊氏復曰先生云人家族衆或主祭者不可以祭及叔伯父之類則須令其嗣子别得祭之今且説同居同出於曾祖便有從兄弟及再從兄弟祭時主於主祭者其他或子不得祭其父母若恁地袞做一處祭不得要好則主祭之嫡孫當一日祭其曽祖及祖及父餘子孫與祭次日却令次位子孫自祭其祖及父又次日却令次位子孫自祭其父此却有古宗法意古今祭禮這般處皆有之今要如宗法祭祀之禮須是在上之家先就宗室及世族家行之做箇樣子方可使祖以下士大夫行之排祖先時以客位西邊為上髙第一髙祖母次之只是正排看正面不曽對排曾祖祖父皆然其中有伯叔伯叔母兄弟嫂婦無人主祭而我為祭者各以昭穆論小黃氏瑞節曰神主位次放宗法也今依本注姑以宗法明之小宗有四繼高祖之小宗者身為玄孫及祀小宗之祖為高祖而曽祖祖父次之繼曽祖之小宗者身為曾孫及祀小宗之祖為曾祖而以上吾不得祀矣繼祖之小宗者身為孫及祀小宗之祖為祖而以上不得祀矣繼禰之小宗者身為子小宗之祖為禰而以上不得祀矣不得祀者以上為大宗之祖吾不得而祀之也大宗亦然先君世子大宗而下又不得而祀之也朱子云宗法須宗室及世族之家先行之方使以下士大夫行之然家禮以宗法為主所謂非嫡長子不敢祭其父皆是意也至於冠昏喪祭莫不以宗法行其間云旁親之無後者以其班祔伯叔祖父母祔于高祖伯叔父母祔于曾祖妻若兄弟若兄弟之妻祔于祖子姪祔于父皆西向主櫝並如正位姪之父自立祠堂則遷而從之程子曰無服之殤不祭下殤之祭終父母之身中殤之祭終兄弟之身長殤之祭終兄弟之子之身成人而無後者其祭終兄弟之孫之身此皆以義起者也楊氏復曰按祔位謂旁親無後及卑幼先亡者祭禮才祭髙祖畢即使人酌獻祔于高祖者曽祖祖考皆然故祝文説以某人祔食尚饗詳見後祭禮篇四時祭條劉氏垓孫曰先生云如祔祭伯叔則祔于曽祖之傍一邊在位牌西邊安伯叔母則祔曽祖母東邊安兄弟嫂妻婦則祔于祖母之傍伊川云曾祖兄弟無主者亦不祭不知何所據而云伊川云只是義起也遇大時節請祖先祭于堂或廳上坐次亦如在廟時排定祔祭旁親者右丈夫左婦女坐以就裏為大凡祔於此者不從昭穆了只以男女左右大小分排在廟却各從昭穆祔置祭田初立祠堂則計見田每龕取其二十之一以為祭田親盡則以為墓田後凡正位祔位皆放此宗子主之以給祭用上世初未置田則合暮下子孫之田計數而割之皆立約聞官不得典賣具祭器牀席倚卓盥盆火爐酒食之器隨其合用之數皆具財於庫中而封鎖之不得他用無庫則貯於匱中不可䝰者列於外門之內主人晨謁於大門之內主人謂宗子主此堂之祭者晨謁深衣焚香再拜出入必告主人主婦近出則入大門瞻禮而行歸亦如之經宿而歸則焚香再拜逺出經旬以上則再拜焚香告云某將適某所敢告又再拜而行歸亦如之但告云某今日歸自某所敢見經月而歸則開中門立於階下再拜升自阼階焚香告畢再拜降復位再拜餘人亦然但不開中門凡主婦謂主人之妻階凡升降惟主人由阼階主婦及餘人雖尊長亦由西凡拜男子再拜則婦人四拜謂之俠拜其男女相答拜亦然正至朔望則參正至朔望前一日灑掃齋宿厥明夙興開門軸簾每龕設新果一大盤於卓上每位茶盞托酒盞盤各一於神主櫝前設東茅聚沙於香卓前别設一卓於阼階上置酒注盞盤一於其上酒一瓶於其西盥盆悅巾各二於阼階下東南有臺架者在西為主人親屬所盥無者在束為執事者所盥巾皆在北主人以下盛服入門就位主人北面於阼階下主婦北面於西階下主人有母則特位於主婦之前主人有諸父諸兄則特位於主人之右少前重行西上有諸母姑嫂姊則特位主婦之左少前重行束上諸弟在主人之右少退子孫外執事者在主人之後重行西上主人弟之妻及諸妹在主婦之左少退子孫婦女內執事者在主婦之後重行東上立定主人盥帨升搢笏啓櫝奉諸考神主置於櫝前主婦盥帨升奉諸妣神主置于考東次出祔主亦如之命長子長婦或長女盥帨升分出諸祔主之卑者亦如之皆畢主婦以下先降復位主人詣香卓前降神搢笏焚香再拜少退立執事者盥帨升開瓶實酒于注一人奉注詣主人之右一人執盞盤詣主人之左主人跪執事者皆跪主人受注斟酒反注取盞盤奉之左執盤右執盞酹于茅上以盞盤授執事者出笏俯伏興少退再拜降復位與在位者皆再拜參神主人升搢笏執注斟酒先正位次祔位欠命長子斟諸祔位之卑者主婦升執茶筅執事者事執湯瓶隨之點茶如前命長婦或長女亦如之子婦執者先降復位主人出笏與主婦分立於香卓之前東西再拜降復位與在位者皆再拜辭神而退冬至則祭始祖畢行禮如上儀立望日不設酒不出主主人點茶長子佐之先降主人於香卓之南再拜乃降餘如上儀以準禮舅沒則姑老不預於祭又曰支子不祭故今專世嫡宗子夫婦為主人主婦其有母及諸父母兄嫂者則設特位於前如此襴凡言盛服者有官則帺頭公服帶靴笏進士則幞頭衫帶處士則幞頭皂衫帶無官者通用帽子衫帶又不能具則或深衣或涼衫有官者亦通服帽子以下但不為盛服婦人則假髻大衣長裙女在室者冠子背子衆妾假髻背子楊氏復曰先生云元旦則在官者有朝謁之禮恐不得專精於祭事某鄉里却止於除夕前三四日行事此亦更在斟酌也者劉氏璋曰司馬溫公注影堂雜儀凡月朔則執事於影堂裝香具茶酒常食數品主人以下皆盛服男女左右敘立如常儀主人主婦親出祖考以下祝版置於位焚香主人以下俱再拜執事者斟祖考前茶酒以授主人主人搢笏跪酹茶酒執笏俯伏興帥男女俱再拜次酹祖妣以下皆遍納祠版出徹月望不設食不出祠版餘如朔儀影堂門無事常閉每旦子孫詣影堂前唱喏出外歸亦然若出外再宿以上歸則入影堂再拜將逺適及遷官凡大事則盥手焚香以其事告退各再拜有時新之物則先薦于影堂忌日則去華飾之服薦酒食如月朔不飲酒不食肉思慕如居喪禮君子有終身之喪忌日之謂也舊儀不見客受弔於禮無之今不取遇水火盜賊則先救先公遺文次祠版次影然後救家財俗節則獻以時食節如清明寒食重午中元重陽之類凡鄉俗所尚者食如角黍凡其節之所尚者薦以大盤間以蔬果禮如正至朔日之儀問俗節之祭如何朱子曰韓魏公處得好謂之節祠殺於正祭但七月十五日用浮屠設素饌祭某不用祭南軒張氏曰今日俗節古所無有故古人雖不殽而情亦自安今人既以此為重至於是日必具羞相宴樂而其節物亦各有宜故世俗之情至於是日不能不思其祖考而復以其物享之雖非禮之正然亦人情之不能已者且古人不祭則不敢以燕况今於此俗節既已據經而廢祭而生者則飲食宴樂隨俗自如非事死如事生事亡如事存之意也又曰朔旦家廟用酒果望旦用茶重午中元元日之類皆名俗節大祭時每位用四味請出木主俗節小祭只就家廟止二味朔旦俗節酒止一上斟一杯楊氏復曰時祭之外各因鄉俗之舊以其所尚之時所用之物奉以大盤陳於廟中而以告朔之禮奠焉則庶幾合乎隆殺之節而盡乎委曲之情可行於久逺而無疑矣有事則告如正至朔日之儀但獻茶酒再拜訖主婦先降復位主人立於香卓之南祝執版立於主人之左跪讀之畢興主人再拜降復位餘並同于告授官祝版云維年歲月朔日孝子某官某敢昭告故某親某官封諡府君故某親某封某氏某以某月某日蒙恩除某官奉承先訓獲霑祿位餘慶所及不勝感慕謹以酒果用伸虔告謹告貶降則言貶某官荒墜先訓皇恐無地謹以後同若弟子則言某之某某餘同告追贈則止告所贈之龕别設香卓於龕前又設一卓於其東置淨水粉盞刷子硯墨筆於其上餘並同但祝版云奉某月某日制書贈故某親某官故某親某封某奉承先訓竊位于朝祗奉恩慶有此褒贈祿不及養摧咽難勝謹以後同若因事特贈則别為文以敘其意告畢再拜主人進奉主置卓上執事者洗去舊字别塗以粉俟乾命善書者改題所贈官封陷中不改洗水以灑祠堂之四壁主人奉主置故處乃降復位後同主人生嫡長子則滿月而見如上儀但不用祝主人立於香卓之前告曰某之婦某氏以某月某日生子名某敢見告畢立於香卓東南西向主婦抱子進立於兩階之間再拜主人乃降復位後同冠昏則見本篇凡言祝版者用版長一尺高五寸以紙書文黏於其上畢則揭而焚之其首尾皆如前但於故高祖考故高祖妣自稱孝元孫於故曾祖考故曾祖妣自稱孝曾孫於故祖考故祖妣自稱孝孫於故考故妣自稱孝子有官封諡則皆稱之無則以生時行第稱號加于府君之上妣曰某氏夫人凡自稱非宗子不言孝告事之祝四代共為一版自稱以其最尊者為主止告正位不告祔位茶酒則并設之朱子曰焚黃近世行之墓次不知於禮何據張魏公贈諡只告于廟疑為得體但今世皆告墓恐未免隨俗耳文楊氏復曰按先生文集有焚黃祝告于家廟亦不云告墓也或有水火盜賊則先救祠堂遷神主遺書次及祭器然後及家財易世則改題主而遞遷之改題遞遷禮見喪禮大祥章大宗之家始祖親盡則藏其主於墓所而大宗猶主其墓田以奉其墓祭歲率宗人一祭之百世不改其第二世以下祖親盡及小宗之家髙祖親盡則遷其主而埋之其墓田則諸位迭掌而歲率其子孫一祭之亦百世不改也或問而今士庶亦有始基之祖莫亦只祭得四代但四代以土則可不祭否朱子曰而今祭四代已為僣古者官師亦只祭得二代若是始基之祖想亦只存得墓祭楊氏復曰此章云始祖親盡則藏其主於墓所喪禮大祥章亦云若有親盡之祖而其别子也則祝版云云告畢而遷于墓所不埋夫藏其主于墓所而不埋則墓所必有祠堂以奉墓祭深衣制度此章本在冠禮之後今以前章已有其文又平日之常服故次前章朱子曰去古益遠其冠服制度僅存而可見者獨有此耳然遠方士子亦所罕見往往人自為制詭異不經近於服妖甚可數也裁用白細布度用指尺中指中節為寸司馬溫公曰凡尺寸皆當用周尺度之周尺一尺當今省尺五寸五分弱楊氏復曰説文云周制尺寸咫尋皆以人之體為法長全四幅其長過脅下屬於裳用布二幅中屈下垂前後共為四幅如今之直領衫但不裁破腋下其下過脅而屬於裳處約圍七尺二寸每幅屬裳三幅裳交解十二幅上屬於衣其長及踝用布六幅每幅裁為二幅一頭廣一頭狹狹頭當廣頭之半以狹頭向上而連其縫以屬於衣其屬衣處約圍七尺二寸每三幅屬衣一幅其下邊及踝處約圍丈四尺四寸圓袂用布二幅各中屈之如衣之長屬於衣之左右而縫合其下以為袂其本之廣如衣之長而漸圓殺之以至袂口則其徑一尺二寸楊氏復曰左右袂各用布一幅屬於衣又按深衣篇云袂之長短反屈之及肘夫袂之長短以反屈及肘為凖則不以一幅為拘方領兩襟相掩衽在腋下則兩領之會自方曲踞用布一幅如裳之長交解裁之如裳之制但以廣頭向上布邊向外左掩其右交映垂之如燕尾狀又稍裁其內旁太半之下令漸如魚腹而末為鳥喙內向綴於裳之右旁禮記深衣續衽鈎邊鄭注鈎邊若今曲裾蔡氏淵曰司馬所載方領與續衽鈎邊之制引證雖詳而不得古意先生病之嘗以理玩經文與身服之宜而得其説謂方領者只是衣領既交自有如矩之象謂續衽鈎邊者只是連續裳旁無前後幅之縫左右交鈎即為鈎邊非有别布一幅裁之如鈎而綴于裳旁也方領之説先生已修之家禮矣而續衽鈎邊則未及修焉記楊氏復曰深衣制度惟續衽鈎邊一節難考按禮玉藻深衣疏皇氏熊氏孔氏三説皆不同皇氏以喪服之衽廣頭在上深衣之衽廣頭在下喪服與深衣二者相對為衽孔氏以衣下屬幅而下裳上屬幅而上衣裳二者相對為衽此其不同者一也皇氏以衽為裳之兩旁皆有孔氏以衽為裳之一邊所有此其不同者二也皇氏所謂廣頭在上為喪服之衽者熊氏又以此為齊祭服之衽一以為吉服之衽一以為凶服之衽此其不同者三也家禮以深衣續衽之制兩廣頭向上似與皇氏喪服之衽熊氏齊祭服之衽相類此為可疑是以先生晚歲所服深衣去家禮舊説曲裾之制而不用蓋有深意恨未得聞其説之詳也及得蔡淵所聞始知先師所以去舊説曲裾之曲復又取禮記深衣篇熟讀之始知鄭康成注續衽二字文義甚明特疏家亂之耳按鄭注曰續猶屬也衽在裳旁者也屬連之不殊裳前後也鄭注之意蓋謂凡裳前三幅後四幅夫既分前後則其旁兩幅分開而不相屬惟深衣裳十二幅交裂裁之皆名為衽見玉藻衽當旁注所謂續衽者指在裳旁兩幅言之謂屬連裳旁兩幅不殊裳前後也疏家不詳考其文義但見衽在裳旁一句意謂别用布一幅裁之如鈎而垂於裳旁妄生穿鑿紛紛異同愈多愈亂自漢至今二千餘年讀者皆求之於别用一副布之中而注之本義為其掩蓋而不可見夫疏所以釋注也今推尋鄭注本文其義如此而皇氏熊氏等所釋其謬如彼皆可以一掃而去之矣先師晚歲知疏家之失而未及修定愚故著鄭注於家禮深衣曲裾之下以破疏家之謬且以見先師晚嵗已定之説云熟劉氏璋曰深衣之制用白細布煆濯灰治使之和其人肥大則布幅隨而闊瘦細則幅隨而狹不必拘於尺寸裳十二幅以應十有二月袂圜應規袂袖口也曲祫如矩應方曲祫者交領也負繩及踝應直負繩謂背後縫上下相當而取直如繩之正非謂用縫為負繩也踝足跟也及踝者裳止其足取長無被上之義下齊如權衡應平裳下曰齊音咨齊緝也取齊如字平若衡而無低昂參差也規矩繩權衡五法已施故聖人服之先王貴之可以為文可以為武可以擯相可以治軍旅自士以上深衣為之次庶人吉服深衣而已夫事尊者蓋以多飾為孝具大父母衣純音準以繢胡對切純緣也繢畫也畫五采以為文相次而畫後人有以織錦為純以代繢文者具父母衣純以青孤子純以素今用黑繒以從簡易也黑緣緣用黑繒領表裏各二寸袂口裳邊表裏各一寸半袂口布外别此緣之廣大帶帶用白繒廣四寸夾縫之其長圍腰而結於前再繚之為兩耳乃垂其餘為紳下與裳齊以黑繒飾其紳復以五采絛廣三分約其相結之處長與紳齊緇冠糊紙為之武高寸許廣三寸袤四寸上為五梁廣如武之袤而長八寸跨頂前後下著於武屈其兩端各半寸自外向內而黑漆之武之兩旁半寸之上竅以受笄笄用齒骨凡白物幅巾用黑繒六尺許中屈之右邊就屈處為橫㡇左邊反屈之自㡇左四五寸間斜縫向左圓曲而下遂循左邊至于兩末復反所縫餘繒使之向裏以㡇當額前褁之至兩鬢旁各綴一帶廣二寸長二尺自巾外過頂後相結而重之黑履白絇繶純綦劉氏垓孫曰履之有絇謂履頭以絛為鼻或用繒一寸屈之為絇所以受繫穿貫者也繶謂履縫中紃音旬也以白絲為下緣故謂之繶純者飾也綦屬於跟所以繫履者也司馬氏居家雜儀此章本在昏禮之後今按此乃家居平日之事所以正倫理篤恩愛者其本皆在于此必能行此然後其儀章度數有可觀焉不然則節文雖具而本實無取君子所不貴也故亦列於首篇使覽者知所先焉凡為家長必謹守禮法以御羣子弟及家衆分之以職謂使之掌倉廪廄庫庖厨舍業田園之類授之以事謂朝夕所幹及非常之事而責其成功制財用之節量入以為出稱家之有無以給上下之衣食及吉凶之費皆有品節而莫不均一裁省冗費禁止奢華常須稍存贏餘以偹不虞凡諸卑幼事無大小毋得専行必咨稟於家長易曰家人有嚴君焉父母之謂也安有嚴君在上而其下敢直行自恣不顧者乎雖非父母當時為家長者亦當咨稟而行之則號令出于一人家政始可得而治矣凡為子婦者毋得蓄私財俸祿及田宅所入盡歸之父母舅姑當用則請而用之不敢私假不敢私與內則曰子婦無私貨無私蓄無私器不敢私假不敢私與婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如新受賜若反賜之則辭不得命如更受賜藏之以待乏鄭康成曰待舅姑之乏也不得命者不見許也又曰婦若有私親兄弟將與之則必復請其故賜而後與之夫人子之身父母之身也身且不敢自有况敢有財帛乎若父子異財互相假借則是有子富而父母貧者父母飢而子飽者賈誼所謂借父耰鉏慮有德色母取箕帚立而誶語不孝不義孰甚於此茝昌改切耰音憂誶音卒凡子事父母孫事祖父母同婦事舅姑孫婦亦同天欲明咸起盥音管洗手也潄櫛阻瑟切梳頭也總所以束髮今之頭􅔮具冠帶丈夫帽子衫帶婦人冠子背子昧爽謂天明暗相交之際適父母舅姑之所省問丈夫唱喏婦人道萬福仍問侍者夜來安否何如侍者曰安乃退其或不安節則侍者以告此即禮之晨省也父母舅姑起子供藥物藥物乃關身之切務人子當親自檢數調煮供進不可但委婢僕脫若有誤即其禍不測婦具晨羞俗謂點心易曰在中饋詩云惟酒食是議凡烹調飲膳婦人之職也近年婦女驕倨皆不肯入庖厨今縱不親執刀匕亦當檢校監視務令精潔供具畢乃退各從其事將食婦請所欲於家長謂父母舅姑或當時家長也卑幼各不得恣所欲退具而供之尊長舉筯子婦乃各退就食丈夫婦人各設食於他所依長幼而坐其飲食必均一幼子又食於他所亦依長幼席地而坐男坐於左女坐於右及夕食亦如之既夜父母舅姑將寢則安置而退丈夫唱喏婦女道安置此即禮之昏定也居間無事則侍於父母舅姑之所容貌必恭執事必謹言語應對必下氣怡色出入起居必謹扶衛之不敢涕唾喧呼於父母舅姑之側父母舅姑不命之坐不敢坐不命之退不敢退凡子受父母之命必籍記而佩之時省而速行之事畢則返命焉或所命有不可行者則和氣柔聲具是非利害而白之待父母之許然後改之若不許茍於事無大害者亦當曲從若以父母之命為非而直行已志雖所執皆是猶為不順之子况未必是乎凡父母有過下氣怡色柔聲以諌諌若不入起敬起孝悅則復諌不悅與其得罪於鄉黨州閭寧熟諌父母怒不悅而撻之流血不敢疾怨起敬起孝楊氏復曰父母有過下氣怡聲以諫所謂幾諫也父母怒而撻之猶不敢怨况下於此者乎諫不入起敬起孝諫而怒亦起敬起孝敬孝之外豈容有他念哉是説也聖人著之論語矣凡為人子弟者不敢以貴富加於父兄宗族加謂恃其富貴不率卑幼之禮凡為人子者出必告反必面有賔客不敢坐於正廳有賔客坐於書院無書院則坐於廳之旁側升降不敢由東階上下馬不敢當廳凡事不敢自擬於其父楊氏復曰告工毒反告與面同反言面者從外來宜知親之顔色安否為人親者無一念而忘其子故有倚門倚閭之望為人子者無一念而忘其親故有出告反面之禮生則出告反面沒則告行飲至事亡如事存也凡父母舅姑有疾子婦無故不離側親調嘗藥餌而供之父母有疾子色不滿容不戲笑不宴逰舍置餘事専以迎醫檢方合藥為務疾已復初顔氏家訓曰父母有疾子拜醫以求藥蓋以醫者親之存亡所繫豈可傲忽也凡子事父母父母所愛亦當愛之所敬亦當敬之至於犬馬盡然而况於人乎楊氏復曰孝子愛敬之心無所不至故父母之所愛敬者雖犬馬之賤亦愛敬之况人乎哉故舉其尤者言之若兄若弟吾父母之所愛也吾其可以不愛乎若薄之是薄吾父母也若親若賢吾父母之所敬也吾其可不敬之乎若嫚之是嫚吾父母也推類而長莫不皆然若晉武惑馮紞之讒不思太后之言而疏齊王攸唐髙宗溺武氏之寵不念太宗顧託之命而殺長孫無忌皆禮經之罪人也凡子事父母樂其心不違其志樂其耳目安其寢處以其飲食忠養之幼事長賤事貴皆倣此劉氏璋曰樂其心者謂左右侍養也晨昏定省也出入從逰也起居奉侍也必當賾討其心之所好者所惡者何在茍非悖乎大義則蔑不可從所以安固老者之行以適其氣也樂其耳目者非聲色之末也善言常入於親耳善行常悅於親目皆所以樂之也安其寢處者謂堂室庭除必完潔簟席氈褥衾枕帳幄必修治之類凡子婦未敬未孝不可遽有憎疾姑教之若不可教然後怒之若不可怒然後笞之屢笞而終不改子放婦出然亦不明言其犯禮也子甚宜其妻父母不悅出子不宜其妻父母曰是善事我子行夫婦之禮焉沒身不衰凡為宫室必辨內外深宫固門內外不共井不共浴堂不共厠男治外事女治內事男子晝無故不處私室婦人無故不窺中門男子夜行以燭婦人有故出中門必擁蔽其面如蓋頭面帽之類男僕非有繕修及有大故謂水火盜賊之類不入中門入中門婦人必避之不可避亦謂如水火盜賊之類亦必以袖遮其面女僕無故不出中門有故出中門亦必擁蔽其面雖小婢亦然鈴下蒼頭但主通內外之言傳致內外之物毋得輒升堂室入庖厨凡卑幼于尊長晨亦省問夜亦安置丈夫唱喏婦人道萬福安置坐而尊長過之則起出遇尊長于塗則下馬不見尊長經再宿以上則再拜五宿以上則四拜賀冬至正旦六拜朔望四拜凡拜數或尊長臨時減而止之則從尊長之命吾家同居宗族衆多冬至朔望聚於堂上此假設南面之堂若宅舍異制臨時從宜丈夫處左西上婦人處右東上左右謂家長之左右皆北向共為一列各以長幼為序婦以夫之長幼為序不以身之長幼為序共拜家長畢長兄立於門之左長姊立於門之右皆南向諸弟妹以次拜訖各就列丈夫西上婦人東上共受卑幼拜以宗族多若人人致拜則不勝煩勞故同列共受拜受拜訖先退後輩立受拜於門東西如前輩之儀若卑幼自逺方至見尊長遇尊長三人以上同處者先共冉拜敘寒暄問起居訖又三再拜而止晨夜唱喏萬福安置若尊長三人以上同處亦三而止所以避煩也凡受女壻及外甥拜立而扶之扶謂搊䇿外孫則立而受之可也凡節序及非時家宴上夀於家長卑幼盛服序立如朔望之儀先冉拜子弟之最長者一人進立於家長之前幼者一人搢笏執酒盞立於其左一人搢笏執酒注立於其右長者搢笏跪斟酒祝曰伏願某官傋膺五福保族宜家尊長飲畢授幼者盞注反其故處長者出笏俯伏興退與卑幼皆再拜家長命諸卑幼坐皆再拜而坐家長命侍者遍酢諸卑幼卑幼皆起序立如前俱再拜就坐飲訖家長命易服皆退易便服還復就坐凡子始生若為之求乳母必擇良家婦人稍溫謹者乳母不良非惟敗亂家法兼令所飼之子性行亦類之子能食飼之教以右手子能言教之自名及唱喏萬福安置稍有知則教之以恭敬尊長有不識尊卑長幼者則嚴訶禁之古有胎教况於己生子始生未有知固舉以禮况於巳有知孔子曰幼成若天性習慣如自然顔氏家訓曰教婦初來教子嬰孩故於其始有知不可不使之知尊卑長幼之禮若侮詈父母毆擊兄姊父母不加訶禁反笑而奬之彼既未辦好惡謂禮當然及其既長習以成性乃怒而禁之不可復制于是父疾其子子怨其父殘忍悖逆無所不至蓋父母無深識逺慮不能防微杜漸溺於小慈養成其惡故也六嵗教之數謂一十百千萬與方名謂東西南北男子始習書字女子始習女工之小者七嵗男女不同席不共食始誦孝經論語雖女子亦宜誦之自七嵗以下謂之孺子早寢晏起食無時八嵗出入門户及即席飲食必後長者始教之以謙讓男子誦尚書女子不出中門九嵗男子誦春秋及諸史始為之講解使曉義理女子亦為之講解論語孝經及列女傳女戒之類略曉大意古之賢女無不觀圗史以自鑒如曺大家之徒皆精通經術議論明正今人或教女子以作歌詩執俗樂殊非所宜也十嵗男子出就外傅居宿於外讀詩禮傅為之講解使知仁義禮智信自是以往可以讀孟荀揚子博觀羣書凡所讀書必擇其精要者而讀之如禮記學記大學中庸樂記之類他書倣此其異端非聖賢之書傅宜禁之勿使妄觀以惑亂其志觀書皆通始可學文辭女子則教以婉娩娩音晚婉娩柔順貌聽從及女工之大者女工謂蠶桑織績裁縫及為飲膳不惟正是婦人之職兼欲使之知衣食所來之艱難不敢恣為奢麗至於纂組華巧之物亦不必習也未冠笄者質明而起總角靧靧音悔洗靣也靣以見尊長佐長者供養祭祀則佐執酒食若既冠笄則皆責以成人之禮不得復言童幼矣凡內外僕妾雞初鳴咸起櫛總盥潄衣服男僕灑掃廳事及庭鈴下蒼頭灑掃中庭女僕灑掃堂室設倚卓陳盥潄櫛靧之具主父主母既起則拂牀襞襞音壁疊衣也衾侍立左右以備使令退而具飲食得間則浣濯紉縫先公後私及夜則復拂牀展衾當晝內外僕妾惟主人之令各從其事以供百役凡女僕同輩謂兄弟所使謂長者為姊後輩謂諸子舍所使謂前輩為姨內則云雖婢妾衣服飲食必後長者鄭康成曰人貴賤不可以無禮故使之序長幼務相雍睦其有鬪爭者主父主母聞之即訶禁之不止即杖之理曲者杖多一止一不止獨杖不止者凡男僕有忠信可任者重其祿能幹家事次之其専務欺詐背公徇私屢為盜竊弄權犯上者逐之凡女僕年滿不願留者縱之勤奮少過者資而嫁之其兩面二舌飾虛造讒離間骨肉者逐之屢為竊盜者逐之放蕩不謹者逐之有離叛之志者逐之冠禮冠楊氏復曰有言書儀中冠禮簡易可行者先生曰不獨書儀古冠禮亦自簡易男子年十五至二十皆可冠司馬溫公曰古者二十而冠皆所以責成人之禮蓋將責為人子為人弟為人臣為人少者之行於其人故其禮不可以不重也近世以來人情輕薄過十歲而總角者少矣彼責以四者之行豈知之哉往往自幼至長愚騃若一由不知成人之道故也今雖未能遽革且自十五以上俟其能通孝經論語粗知禮義然然冠之其亦可也必父母無期以上喪始可行之大功未葬亦不可行前期三日主人告于祠堂古禮筮日今不能然但正月內擇一日可也主人謂冠者之祖父自為繼高祖之宗子者若非宗子則必繼高祖之宗子主之有故則命其次宗子若其父自主之告禮見祠堂章祝版前同但云某之子某若某之某親之子某年漸長成將以某月某日加冠於其首謹以後同若族人以宗子之命自冠其子其祝版亦以宗子為主曰使介子某若宗子已孤而自冠則亦自為主人祝版前同但云某將以某月某日加冠於首謹以後同戒賔古禮筮賔今不能然但擇朋友賢而有禮者一人可也是日主人深衣詣其門所戒者出見如常儀啜茶畢戒者起言曰某有子某若某子某親有子某將加冠於其首願吾子之教之也對曰某不敏恐不能供事以病吾子敢辭戒者曰願吾子之終教之也對曰吾子重有命某敢不從地逺則書初請之辭為書遣子弟致之所戒者辭使者固請乃許而復書曰吾子有命某敢不從同若宗子自冠則戒辭但曰某將加冠於首後前一日宿賔遣子弟以書致辭曰來日某將加冠於子某若某親某子某之首吾子將蒞之敢宿某上某人答書曰某敢不夙興某上某人戒若宗子自冠則辭之所改如其賔陳設設盥帨於廳事如祠堂之儀以帟幕為房於廳事之東北或廳事無兩階則以堊畫而分之後放此司馬溫公曰古禮謹嚴之事皆行之於廟今人既少家廟其影堂亦褊隘難以行禮但冠於外廳笄在中堂可也士冠禮設洗直於東榮南北以堂深水在洗東今私家無罍洗故但用盥盆帨巾而已盥濯手也帨手巾也廳事無兩階則分其中央以東者為阼階西者為賔階無室無房則暫以帟幕截其北為室其東北為房此皆據廳堂南向者言之者劉氏璋曰冠義曰冠禮筮日筮賔所以敬冠事冠禮之始也嘉事之重者也是故古者重冠重冠故行之於廟者所以尊重事尊重事而不敢擅重事所以自卑而尊先祖也厥明夙興陳冠服有官者公服帶靴笏無官者襴衫帶靴通用皂衫深衣大帶履櫛􅔮掠皆卓子陳于房中東領北上酒注盞盤亦以卓子陳于服北幞頭帽子冠笄巾各以一盤盛之蒙以帕以卓子陳于西階下執事者一人守之長子則布席于阼階上之東少北西向衆子則少西南向宗子自冠則如長子之席少南程子曰今行冠禮若制古服而冠冠了又不常著却是偽也必須用時之服主人以下序立主人以下盛服就位主人阼階下少東西向子弟親戚僮僕在其後重行西向北上擇子弟親戚習禮者一人為儐立於門外西向將冠者雙紒四䙆衫勒帛采履在房中南面若非宗子之子則其父立於主人之右尊則少進卑則少退宗子自冠則服如將冠者而就主人之位賔至主人迎入升堂賔自擇其子弟親戚習禮者為贊冠者俱盛服至門外東面立贊者在右少退儐者入告主人主人出門左西向再拜賔答拜主人揖贊者贊者報揖主人遂揖而行賔贊從之入門分庭而行揖讓而至階又揖讓而升主人由阼階先升少東西向賔由西階繼升少西東向贊者盥帨由西階升立於房中西向儐者筵于東序少北西面將冠者出房南面升若非宗子之子則其父從出迎賔入從主人後賔而立於主人之右如前賔揖將冠者就席為加冠巾冠者適房服深衣納履出賔揖將冠者出房立于席右向席贊者取櫛􅔮掠置于席左興立於將冠者之左賔揖將冠者即席西向跪贊者即席如其向跪為之櫛合紒施掠賔乃降主人亦降賔盥畢主人揖升復位執事者以冠巾盤進賔降一等受冠笄執之正容徐詣將冠者前向之祝曰吉月令日始加元服棄爾幼志順爾成德壽考維祺以介景福乃跪加之贊者以巾跪進賔受加之興復位揖冠者適房釋四䙆衫服深衣加大帶納履出房正容南向立良久主若宗子自冠則賔揖之就席賔降盥畢人不降餘並同楊氏復曰書儀始加以巾家禮又先以冠笄乃加巾者蓋冠笄正是古禮再加帽子服皂衫革帶繫鞋賔揖冠者即席跪執事者以帽子盤進賔降二等受之執以詣冠者前祝之曰吉月令辰乃申爾服謹爾威儀淑慎爾德眉壽永年享受遐福乃跪加之興復位揖冠者適房釋深衣服皂衫革帶繫鞋出房立楊氏復曰儀禮書儀再加賔盥如初三加幞頭公服革帶納靴執笏若襴衫納靴禮如再加惟執事者以幞頭盤進賔降沒階受之祝辭曰以歲之正以月之令咸加爾服兄弟具在以成厥德黃耇無疆受天之慶贊者徹帽賔乃加幞頭執事者受帽徹櫛入于房餘並同楊氏復曰儀禮書儀三加賔盥如初乃醮長子則儐者改席于堂中間少西南向衆子則仍故席贊者酌酒于房中出房立于冠者之左賔揖冠者就席右南向乃取酒就席前北向祝之曰旨酒既清嘉薦令芳拜受祭之以定爾祥承天之休壽考不忘冠者再拜升席南向受盞賔復位東向答拜冠者進席前跪祭酒興就席末跪啐酒興降席授贊者盞南向再拜賔東向答拜冠者遂拜贊者贊者賔左東向少退答拜司馬溫公曰古者冠用醴或用酒醴則一獻酒則三醮今私家無醴以酒代之但改醴辭甘醴惟厚為旨酒既清耳所以從簡於劉氏垓孫曰其曰醮者即禮記所謂醮客位加有成也賔字冠者賔降階東向主人降階西向冠者降自西階少東南向賔字之曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之于嘏永受保之曰伯某父仲叔季唯所當冠者對曰某雖不敏敢不夙承祗奉賔或别作辭命以字之之意亦可出就次賔請退主人請禮賔賔出就次主人以冠者見于祠堂如祠堂章內生子而見之儀但改告辭曰某之子某若某親某之子某今日冠畢敢見冠者進立於兩階間再拜餘並同復若宗子自冠則改辭曰某今日冠畢敢見遂再拜降位餘並同若冠者私室有曽祖祖以下祠堂則各因其宗子而見自為繼曽祖以下之宗則自見冠者見于尊長父母堂中南面坐諸叔父兄在東序諸叔父南向諸兄西向諸婦女在西序諸叔母姑南向諸姊嫂東向冠者北向拜父母父母為之起同居有尊長則父母以冠者詣其室拜之尊長為之起還就東西序每列再拜應答拜者笞若非宗子之子則先見宗子及諸尊於父者於堂乃就私室見于父母及餘親若宗子自冠有母則見于母如儀族人宗之者皆來見於堂上宗子西向拜其尊長每列再拜受卑幼者拜司馬溫公曰冠義曰見於母母拜之見於兄弟兄弟拜之成人而與為禮也今則難行但於拜時母為之起立可也下見諸父及兄倣此乃禮賔主人以酒饌延賔及儐贊者酬之以幣而拜謝之幣多少隨宜賔贊有差司馬溫公曰士冠禮乃禮賔以一獻之禮注一獻者獻酢酬賔主人各兩爵而禮成又曰主人酬賔束帛儷皮注束帛十端也儷皮兩鹿皮也又曰贊者皆與贊冠者為介注介賔之輔以贊為之尊之也鄉飲酒禮賢者為賔其次為介又曰賔出主人送于門外再拜歸賔爼注使人歸諸賔家也今慮貧家不能辦故務從簡易冠者遂出見于鄉先生及父之執友冠者拜先生執友皆答拜若有誨之則對如對賔之辭且拜之先生執友不答拜筓女子許嫁笄年十五雖未許嫁亦笄母為主宗子主婦則於中堂非宗子而與宗子同居則於私室與宗子不同居則如上儀前期三日戒賔一日宿賔賔亦擇親姻婦女之賢而有禮者為之以箋紙書其辭使人致之辭如冠禮但子作女冠作笄吾子作某親或某封凡婦人自稱於己之尊長則曰兒卑幼則以屬於夫黨尊長則曰新婦卑幼則曰老婦非親戚而往來者各以其黨為稱後倣此陳設如冠禮但於中堂布席如衆子之位厥明陳服如冠禮但用背子冠筓序立主婦如主人之位將笄者雙紒衫子房中南面賔至主婦迎入升堂如冠禮但不用贊者主婦升自阼階賔為將笄者加冠笄適房服背子略如冠禮但祝用始加之辭不能則省乃醮如冠禮辭亦同乃字如冠禮但改祝辭髦士為女士乃禮賔皆如冠儀程子曰冠禮廢天下無成人或欲如魯襄公十二而冠此不可冠所以責成人事十二年非可責之時既冠矣且不責以成人事則終其身不以成人望之也徒行此節文何益雖天子諸侯亦必二十而冠劉氏璋曰笄今簪也婦人之首飾也女子笄則當許嫁之時然嫁止於二十以其二十而不嫁則為非禮昏禮議昏男子年十六至三十女子年十四至二十司馬溫公曰古者男三十而娶女二十而嫁今令文男年十五女年十三以上並聽昏嫁今為此説所以參古今之道酌禮令之典順天地之理合人情之宜也身及主昏者無期以上喪乃可議昏大功未葬亦不可主昏昏凡主昏如冠禮主人之法但宗子自則以族人之長為主必先使媒氏往來通言俟女氏許之然後納采司馬溫公曰凡議昏姻當先察其壻與婦之性行及家法何如切茍慕其富貴壻茍賢矣今雖貧賤安知異時不富貴乎茍為不肖今雖富盛安知異時不貧賤乎婦者家之所由盛衰也茍慕其一時之富貴而娶之彼挾其富貴鮮有不輕其夫而傲其舅姑養成驕姑之性異日為患庸有極乎借使因婦財以致富依婦勢以取貴茍有丈夫之志氣者能無愧乎又世俗好於襁褓童幼之時輕許為昏亦有指腹為昏者及其既長或不肖無賴或身有惡疾或家貧凍餒或喪服相仍或從宦達方遂至棄信負約速獄致訟者多矣是以先祖太尉嘗曰吾家男女必俟既長然後議昏既通書不數月必成昏故終身無此悔乃子孫所當法也納采納其采擇之禮即今世俗所謂言定也主人具書主人即主昏者書用箋紙如世俗之禮若族人之子則其父具書告于宗子夙興奉以告祠堂如告冠儀其祝版前同但云某之子某若某之某親之子某年已長成未有伉儷已議娶某官某郡姓名之女今日納采不勝感愴謹以後同若宗子自昏則自告乃使子弟為使者如女氏女氏主人出見使者使者盛服如女氏女氏亦宗子為主主人盛服出見使者非宗子之女則其父位於主人之右尊則少進卑則少退啜茶畢使者起致辭曰吾子有惠貺室某也某之某親某官有先人之禮使某請納采從者以書進使者以書授主人主人對曰某之子若妹姪孫蠢愚又弗能教吾子命之某不敢辭北向再拜使者避不答拜使者請退俟命出就次若許嫁者於主人為姑姊則不云蠢愚又弗能教餘辭並同遂奉書以告于祠堂如壻家之儀柷版前同但云某之第幾女若某親某之第幾女年漸長成已許嫁某官某郡姓名之子若某親某今日納采不勝感愴謹以後同出以復書授使者遂禮之主人出延使者升堂授以復書使者受之請退主人請禮賔乃以酒饌禮使者使者至是始與主人交拜揖如常日賔客之禮其從者亦禮之别室皆酬以幣使者復命壻氏主人復以告于祠堂不用祝納幣古禮有問名納吉今不能盡用止用納采納幣以從簡便納幣幣用色繒貧富隨宜少不過兩多不踰十今人更用叉釧羊酒果實之屬亦可具書遣使如女氏女氏受書復書禮賔使者復命並同納采之儀禮如納采但不告廟使者致辭改采為幣從者以書幣進使者以書授主人主人對曰吾子順先典貺某重禮某不敢辭敢不承命乃受書執事者受幣主人再拜使者避之復進請命主人授以復書餘並同楊氏復曰昏禮有納采問名納吉納徴請期親迎六禮家禮略去問名納吉止用納采納幣以從簡便但親迎以前更有請期一節有不可得而略者今以倒推之請期具書遣使如女氏女氏受書復書禮賔使者復命並同納采之儀使者致辭曰吾子有賜命某既申受命矣使某也請吉日主人曰某既前受命矣惟命是聽賔曰某命某聽命於吾子主人曰某固惟命是聽賔曰某受命吾子不許某敢不告期曰某日主人曰某敢不謹須餘並同親迎朱子曰親迎之禮恐從伊川之説為是近則迎於其國逺則迎於其館今妻家逺要行禮一則令妻家就近處設一處却就彼往迎歸館行禮一則妻家出至逺處壻即就彼迎歸至家成禮行有問昏禮今有士人對俗人結姻士人欲昏禮而彼家不從如何曰這也只得宛轉使人去與他商量但古禮也省徑人何苦不行前期一日女氏使人張陳其壻之室世俗謂之鋪房然所張陳者但氈褥帳幔帷幕應用之物其衣服鎖之篋笥不必陳也昏司馬溫公曰文中子曰昏娶而論財夷虜之道也夫姻者所以合二姓之好上以事宗廟下以繼後世也今世俗之貪鄙者將娶婦先問資裝之厚薄將嫁女先問聘財之多少至於立契約云某物若干某物若干以求售其女者亦有既嫁而復欺紿負約者是乃駔儈賣婢鬻奴之法豈得謂之士大夫昏姻哉其舅姑既被欺紿則殘虐其婦以攄其忿由是愛其女者務厚其資裝以悅其舅姑者殊不知彼貪鄙之人不可盈厭資裝既竭則安用汝女哉於是質其女以責貨於女氏貨有盡而責無窮故昏姻之家往往終為仇讎矣是以世俗生男則喜生女則戚至有不舉其女者用此故也然則議昏姻有及於財者皆勿與為昏姻可也厥明壻家設位于室中設倚卓子兩位東西相向蔬果盤盞匕筯如賔客之禮酒壺在東位之後又以卓子置合卺一於其南又南北設二盥盆勺於室東隅又設酒壺盞注於室外或别室以飲從者卺音謹以小匏一判而兩之女家設次于外初昏壻盛服世俗新壻帶花勝擁蔽其面殊失丈夫之容體勿用可也朱子曰昏禮用命服乃是古禮如士乘墨車而執鴈皆大夫之禮也冠帶只是燕服非所以重正昏禮不若從古之為正之黃氏瑞節曰士昏禮謂之攝盛蓋以士而服大夫服乘大夫之車則當執大夫之贄也主人告于祠堂如納采儀祝版前同但云某之子某若某親之子某將以今日親迎于某官某郡某氏不勝感愴謹以後同若宗子自昏則自告朱子曰儀禮雖無娶妻告廟之文而左傳曰圍布几筵告於莊共之廟是古人亦有告廟之禮問今婦人入門即廟見蓋舉世行之近見鄉里諸賢頗信左氏先配後祖之説豈後世紛紛之言不足據莫若從古為正否曰左氏固難盡信然其後説親迎處亦有布几筵告廟而來之説恐所謂後祖者譏其失此禮耳遂醮其子而命之迎先以卓子設酒注盤盞於堂上主人盛服坐於堂之東序西向設壻席於其西北南向壻升自西階立於席西南向贊者取盞斟酒執之詣壻席前壻再拜升席南向受盞跪祭酒興就席末跪啐酒興降席西授贊者盞又再拜進詣父坐前東向跪父命之曰往迎爾相承我宗事勉率以敬若則有常壻曰諾惟恐不堪不敢忘命俯伏興出非宗子之子則宗子告于祠堂而其父醮于私室如儀但改宗事為家事不若宗已孤而自昏則用此禮司馬溫公曰贊者兩家各擇親戚婦人習於禮者為之凡壻及婦人行禮皆贊者相導之壻出乘馬以二燭前導至女家俟于次壻下馬于大門外入俟于次女家主人告于祠堂如納采儀祝版前同但云某之第幾女若某親某之第幾女將以今日歸于某官某郡姓名不勝感愴謹以後同遂醮其女而命之女盛飾姆相之立於室外南向父坐東序西向母坐西序東向設女席于母之東北南向贊者醮以酒如壻禮姆導女出於母左父起命之曰敬之戒之夙夜無違舅姑之命母送至西階上為之整冠斂帔命之曰勉之敬之夙夜無違爾閨門之禮諸母姑嫂姊送至於中門之內為之整裙衫申以父母之命曰謹聽爾父母之言夙夜無愆非宗子之女則宗子告于祠堂而其父醮於私室如儀主人出迎壻入奠鴈主人迎壻于門外揖讓以入壻執鴈以從至于廳事主人升自阼階立西向壻升自西階北向跪置鴈於地主人侍者受之壻俯伏興再拜主人不答拜若族人之女則其父從主人出迎立於其右尊則少進卑則少退凡贄用生鴈左首以生色繪交絡之無則刻木為之取其順陰陽往來之義程子曰向某不再偶也問主人揖壻入壻北面而拜主人不答拜何也朱子曰乃為尊鴈而拜主人自不應答拜姆奉女出登車姆奉女出中門壻揖之降自西階主人不降壻遂出女從之壻舉轎簾以俟婦盤曰未教不足與禮也女乃登車壻乘馬先婦車婦車亦以二燭前導司馬溫公曰男率女女從男夫婦剛柔之義自此始也至其家導婦以入壻至家立于廳事俟婦下車揖之導以入壻婦交拜婦從者布壻席于東方壻從者布婦席於西方壻盥于南婦從者沃之進帨婦盥于北壻從者沃之進悅壻揖婦就席婦拜壻答拜司馬溫公曰從者皆以其家女僕為之女從者沃壻盥于南壻從者沃女盥於北夫婦始接情有亷恥從者交導其志女女子與丈夫為禮則俠音夾拜男子以再拜為禮子以四拜為禮古無壻婦交拜之儀今從俗就坐飲食畢壻出壻揖婦就坐壻東婦西從者斟酒設饌壻婦祭酒舉殽人斟酒壻揖婦舉飲不祭無殽又取卺分置壻婦之前斟酒壻揖婦舉飲不祭無殽壻出就他室姆與婦留室中徹饌置室外設席壻從者餕婦之餘婦從者餕壻之餘司馬溫公曰古者同牢之禮壻在西東面婦在東西面蓋古人尚右故壻在西尊之也今人既尚左且從俗謂劉氏璋曰儀禮疏云卺謂牢瓢以一匏分為兩瓢之卺壻之與父各執一片以酳故云合卺而酳合昏義曰婦至壻揖婦以入共牢而食卺而酳所以合體同尊卑以親之也復入脫服燭出壻脫服婦從者受之婦脫服壻從者受之司馬溫公曰古詩云結髮為夫婦言自小年束髮即為夫婦猶李廣所言結髮與丐奴戰也今世俗昏姻乃有結髮之禮謬誤可笑勿用可也主人禮賔男賔於外廳女賔于中堂古禮明日饗從者今從俗司馬溫公曰不用樂注云曾子問曰娶婦之家三日不舉樂思嗣親也今俗昏禮用樂殊為非禮婦見舅姑明日夙興婦見于舅姑婦夙興盛服俟見舅姑坐於堂上東西相向各置卓子於前家人男女少於舅姑者立於兩序如冠禮之敘婦進立於阼階下北面拜舅升奠贄幣于卓子上舅撫之侍者以入婦降又拜畢詣西階下北面拜姑升奠贄幣姑舉以授侍者婦降又拜若非宗子之子而與宗子同居則先行此禮於舅姑之私室與宗子不同居則如上儀司馬溫公曰古者拜于堂上今拜于下恭也可從衆舅姑禮之如父母醮女之儀婦見于諸尊長婦既受禮降自西階同居有尊於舅姑者則舅姑以婦見於其室如見舅姑之禮還拜諸尊長于兩序如冠禮無贄小郎小姑皆相拜非宗子之子而與宗子同居則既受禮詣其堂上拜之如舅姑禮而還見于兩序其宗子及尊長不同居則廟見而後往若冡婦則饋于舅姑是日食時婦家具盛饌酒壼婦從者設蔬果卓子于堂上舅姑之前設盥盆于阼階東南帨架在東舅姑就坐婦盥升自西階洗盞斟酒置舅卓子上降俟舅飲畢又拜遂獻姑進酒姑受飲畢婦降拜遂執饌升薦于舅姑之前侍立姑後以俟卒食徹飯侍者徹饌分置别室婦就餕姑之餘婦從者餕舅之餘壻從者又餕婦之餘非宗子之子則于私室如儀司馬溫公曰士昏禮婦盥饋特豚合升側載注側載者右胖載之舅爼左胖載之姑爼今恐貧者不辦殺特故但具盛饌而已舅姑饗之如禮婦之儀禮畢舅姑先降自西階婦降自阼階廟見三日主人以婦見于祠堂古者三月而廟見今以其太逺改用三日如子冠而見之儀但告辭曰子某之婦某氏敢見餘並同壻見婦之父母明日壻往見婦之父母婦父迎送揖讓如客禮拜即跪而扶之入見婦母婦母闔門左扉立于門內壻拜于門外皆有幣婦父非宗子即先見宗子夫婦不用幣如上儀然後見婦之父母次見婦黨諸親不用幣婦女相見如上儀婦家禮壻如常儀親迎之夕不當見婦母及諸親及設酒饌以婦未見舅姑故也程子曰昏禮不用樂幽陰之義此説非是昏禮豈是幽陰但古人重此大禮嚴肅其事不用樂也昏禮不賀人之序也此説却是婦質明而見姑舅成婦也三日而後宴樂禮畢也宴不以夜禮也朱子曰人著書只是自入些己意便做病司馬與伊川定昏禮都依儀禮只略改一處便不是古人意司馬云親迎奠鴈見主昏者即出伊川却教拜了又入堂拜大男小女伊川非是伊川云婦至次日見舅姑三月廟見司馬即説婦入門即拜影堂司馬非是蓋親迎不見妻父母者婦未見舅姑也入門不見舅姑者未成婦也今親迎用溫公入門以後用伊川三月廟見改為三日云性理大全書卷十九

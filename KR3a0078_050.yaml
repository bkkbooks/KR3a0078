body:
  text: 性理大全書卷五十學八力行理欲義利君子小人之辨論出處附程子曰人心莫不有知惟蔽於人欲則亡天理也以下理欲義利君子小人之辨欲利己者必損人欲利財者必斂怨人放天理昏者是只為嗜欲亂著他莊子言其嗜欲深者其天機淺此言却最是利者衆人之所同欲也専欲益己其害大矣貪之甚則昏蔽而忘理義求之極則爭奪而致怨仇大凡出義則入利出利則入義天下之事惟義利而已孟子辨舜跖之分只在義利之間言間者謂相去不甚逺所爭毫末耳義與利只是箇公與私也出義便以利言也只那計較便是為有利害若無利害何用計較利害者天下之常情也人皆知趨利而避害聖人則更不論利害惟看義當為不當為便是命在其中也所謂利者不獨財利之利凡有利心便不可如作一事須尋自家穩便處皆利心也聖人以義為利義安處便為利守道當確然而不變得正則逺邪就非則違是無兩從之理雖公天下事若用私意為之便是私人能放這一箇身公共放在天地萬物中一般看則有甚妨礙雖萬身曾何傷公則同私則異同者天心也公則一私則萬殊至當歸一精義無二人心不同如面只是私心可欲莫如善以有諸己為貴若存若亡焉而不為物所誘俗所移者吾未之見也堯舜之為善與桀跖之為惡其自信一也天下善惡皆天理謂之惡者本非惡但或過或不及便如此如楊墨之類又曰天理中物須有美惡蓋物之不齊物之情也但當察之不可自入於惡流於一物何以謂之君子何以謂之小人君子則所見者大且逺小人則所見者小且近君子之志所慮者豈止其一身直慮及天下千萬世小人之慮一朝之忿曾不遑恤其身天地之間皆有對有隂則有陽有善則有惡君子小人之氣常相停但六分君子則治六分小人則亂七分君子則大治七分小人則大亂如是則一無此三字作雖字堯舜之世不能無小人蓋堯舜之世只是以禮樂法度驅而之善盡其道而已然言比屋可封者以其有教雖欲為惡不能成其惡君子好成物故吉小人好敗物故凶義理與客氣常相勝只看消長分數多少為君子小人之别義理所得漸多則自然知得客氣消散得漸少消盡客氣者是大賢問君子之與小人處也必有侵陵困辱之患則如之何曰於是而能反己兢謹以逺其禍則德益進矣詩不曰他山之石可以攻玉張子曰人多言安於貧賤其實只是計窮力屈力短不能營畫耳若稍動得恐未肯安之須是誠知義理之樂於利欲也乃能天下之富貴假外者皆有窮己蓋人欲無饜而外物有限惟道義則無爵而貴取之無窮矣利利於民則可謂利利於身利於國皆非利也利之言利猶言美之為美利誠難言不可以槩而言藍田吕氏曰辭受有義得不得有命皆理之所必然有命有義是有可得可受之理故舜可以受堯之天下無命無義是無可得可受之理故孔子不主彌子以受衛卿二者義命有自合之理無從而間焉有義無命雖有可受之義而無可得之命究其理安得而受之是謂義合於命故益避啓而不受禹之天下有命無義雖有可得之命而無可受之義亦安得而受之是謂命合於義故中國受室養弟子以萬鍾為孟子之所辭二者義命有正合之理時中而已焉上蔡謝氏曰格物窮理須是識得天理始得所謂天理者自然底道理今人乍見孺子將入井皆有怵惕惻隱之心方乍見時其心怵惕所謂天理也要譽於鄉黨朋友內交於孺子父母惡其聲而然即人欲耳天理與人欲相對有一分入欲即滅却一分天理存一分天理即勝得一分人欲和靖尹氏曰君子之心不係於利害惟其是而已五峯胡氏曰人欲盛則天理昏天理素明則無欲矣處富貴與天地同其通處貧賤與天地同其否安死順生與天地同其變化又何宫室妻妾衣服飲食存亡得喪而以介意乎君子畏天命順天時故不行驚衆駭俗之事而常中小人不知天命以利而動肆情妄作故行驚衆駭俗之事必其無忌憚而然也知人之道驗之以事而觀其辭氣從人反躬者鮮不為君子任己蓋非者鮮不為小人朱子曰有箇天理便有箇人欲蓋緣這箇天理須有箇安䪺處才安頓得不恰好便有人欲出來天理人欲分數有多少天理本多人欲也便是天理裏面做出來雖是人欲人欲中自有天理問莫是本來全是天理否曰人生都是天理人欲却是後來沒巴鼻生底人之一心天理存則人欲亡人欲勝則天理滅未有天理人欲夾雜者學者須要於此體認省察之大抵人能於天理人欲界分上立得腳住則儘長進在天理人欲之分只爭些子故周先生只管說幾字然辨之又不可不早故橫渠每說豫字天理人欲幾微之間問飲食之間孰為天理孰為人欲曰飲食者天理也要求美味人欲也不為物欲所昏則渾然天理矣天理人欲無硬定底界至是兩界上工夫這邊工夫多那邊不到占過來若這邊工夫少那邊必侵過來人只有箇天理人欲此勝則彼退彼勝則此退無中立不進退之理凡人不進便退也譬如劉項相拒於滎陽成皋間彼進得一步則此退一步此進一步則彼退一步初學者則要牢劄定腳與他捱捱得一毫去則逐旋捱將去此心莫退終須有勝時勝時甚氣象人只是此一心今日是明日非不是將不是底換了是底今日不好明日好不是將好底換了不好底只此一心但看天理欲欲之消長如何爾以至千載之前千載之後與天地相為始終只此一心學者須是革盡人欲復盡天理方始是學又曰人欲與天理此長彼必短此短彼必長未知學問此心渾為人欲既知學問天理自然發見而人欲漸漸消去者固是好矣然克得一層又有一層大者固不可有而纎微尤要密察凡一事便有兩端是底即天理之公非底乃人欲之私須事事與剖判極處即克治擴充工夫隨事著見然人之氣禀有偏所見亦往往不同如氣禀剛底人則見剛處多而處事必失之太剛柔底人則見柔處多而處事必失之少柔須先就氣禀偏處克治義理身心所自有失而不知所以復之富貴身外之物求之惟恐不得縱使得之於身心無分毫之益况不可必得乎若義理求則得之能不喪其所有可以為聖為賢利害甚明人心之公每為私欲所蔽所以更放不下但常常以此兩端體察若見得時自須猛省急擺脫出來問水火明知其可畏自然畏之不待勉强若是人欲只緣有愛之之意雖知之而不能不好之奈何曰此亦未能真知而已又問真知者還當真知人欲是不好物事否曰如克伐怨欲却不是要去就克伐怨欲上面要知得到只是自就道理這邊看得透則那許多不待除而自去若實是看得大底道理要去求勝做甚麼要去矜誇他人做甚麼求仁而得仁又何怨怨箇甚麼耳目口鼻四肢之欲惟分是安欲箇甚麼見得大處分明這許多小小病痛都如氷消凍解無有痕迹矣今人日中所為皆茍而已其實只將講學做一件好事求異於人然其設心依舊只是為利其視不講者又何以大相逺天下只是善惡兩言而已於二者始分之中須著意看教分明及其流出去則善者一向善但有淺深爾如水清泠便有極清處有稍清處惡者一向惡惡有淺深如水渾濁亦有極渾處有稍渾處問此善惡分處只是天理之公人欲之私耳曰此却是己有說後方有此名只執此為說不濟事須要驗之此心真知得如何是天理如何是人欲幾微間極索理㑹此心常常要醒覺莫令頃刻悠悠憒憒問此只是持敬為要曰敬不是閉眼默坐便為敬須是隨事致敬方其當格物時便敬以格之當誠意時便敬以誠之以致正心修身以後節節常要惺覺執持令此心常在方是能持敬今之言持敬者只是說敬非是持敬若此心常在軀殼中為主便須常如烈火在身有不可犯之色事物之來便成兩畔去又何至如是纒繞氣不從志處乃是天理人欲交戰處也天理人欲並行論其本然之妙則唯有天理而無人欲是以聖人之教必欲其盡去人欲而復全天理所謂人心惟危道心惟微惟精惟一允執厥中者堯舜禹相傳之密㫖也夫人自有生而梏於形體之私則固不能無人心矣然而必有得乎天地之正則又不能無道心矣日用之間二者並行迭為勝負而一身之是非得失天下之治亂安危莫不係焉是以欲其擇之精而不使人心得以雜乎道心欲其守之一而不使天理得以流於人欲則凡其所行無一事之不得其中而於天下國家無所處而不當夫豈任人心之自危而以有時而泯者為當然任道心之自微而幸其須臾之不泯也哉聖賢千言萬語只是明天理滅人欲天理明自不消講學人性本明如寶珠沈溷水中明不可見去了溷水則寶珠依舊自明自家若得知是人欲蔽了便是明珠只從這上便緊緊著力主定一面格物今日格一物明日格一物正如遊兵攻圍拔守人欲自銷鑠將去所以程子說敬字只是謂我身有一箇明底物事在這裏把箇敬字抵敵常常存箇敬在這裏則人欲自然來不得夫子曰為仁由己而由人乎哉緊要處正在這裏問五峯言天理人欲同行而異情同體而異用兩句頗疑同體異用之說然猶未見真有未安處今者得之天理乃自然之理人欲乃自欺之情不順自然即是私僞不是天理即是人欲二者面目自别發於人心自不同常驗之舉動間茍出於天理之所當為胸中自是平正無有慊愧自是寬泰無有不足接人待物自是無乖忤學者雖不常㑹如此要是此心存時便如此此心不存則不如此須是讀書講義理常令此心不間斷則天理常存矣若有放慢時節任人欲發去則胸中自是急迫粗率自是不公不正為不善事雖不欲人之知胸中自是有愧赧然亦自不可掩如何要去天理中見得人欲人欲中見得天理二者敻然判别恐說同體不可亦恐無同行之理若曰心本為利却假以行與那真於為義者其迹相似如此說同行猶可今下天理人欲字似少分别未審是然否曰頃與敬夫商量此兩句謂同行異情者是同體異用者非學無淺深並要辨義利看道理須要就那箇大處看須要前面開闊不要就那箇壁角裏去如今須要天理人欲義理公私分别得明白將自家日用底與他勘驗須是漸漸有見處若不去那大壇場上行理㑹得一句透只是一句道理小了人貴剖判心下令其分明善理明之惡念去之若義理若善惡若是非毋使混淆不别於其心譬如取一家之事取善舍惡又如取一國之事取得舍失處天下之事進賢退不肖蓄疑而不决者其終不成或問義利之别曰只是為己為人之分才為己這許多便自做一邊去義也是為己天理也是為己若為人那許多便自做一邊去須於日用間令所謂義了然明白或言心安處便是義亦有人安其所不當安豈可以安為義也義利之辨初時尚相對在若少間主義功深後那利如何著得如小小竊盜不勞而却矣事無大小皆有義利今做好底事了其間更包得有多少利私在所謂以善為之而不知其道皆是也才有欲順適底意思即是利以敬義二字隨處加功久久自當得力義利之間只得著力分别不當預以難辨為憂聖門只此便是終身事業利是那義裏面生出來底凡事處制得合宜利便隨之所以云利者義之和蓋是義便兼得利若只理㑹利却是從中間半截做下去遺了上面一截義底小人只理㑹後面半截君子從頭來問程子言義安處便為利只是當然而然便安否曰是也只萬物各得其分便是利君得其為君臣得其為臣父得其為父子得其為子何利如之此利字即易所謂利者義之和利便是義之和處義初是不和而却和截然不可犯似不和分别後萬物各得其所便是和不和生於其義義則和而無不利矣一云義則無不和和則無不利矣學者做切己工夫要得不差先須辨義利所在如思一事非特財利利欲只每事求自家安利處便是推此便不可入堯舜之道切須勤勤提省察之於纎微毫忽之間不得放過如此便不㑹錯用工夫人只有一箇公私天下只有一箇邪正將天下正大底道理去處置事便公以自家私意去處之便私凡事只去看箇是非假如今日做得一件事自心安而無疑便是是處一事自不信便是非處間居無事且試自思之其行事有於所當是而非當非而是當好而惡當惡而好自察而知之亦是工夫講學固不可無須是更去自己分上做工夫若只管說不過一兩日都說盡了只是工夫難且如人雖知此事不是不可為忽然無事又自起此念又如臨事時雖知其不義不要做又却不知不覺自去做了是如何又如好事初心本自要做又却終不可做是如何蓋人心本善方其見善欲為之時此是真心發見之端然才發便被氣禀物欲隨即蔽固之不教他發此須自去體察存養看得此最是一件大工夫學者工夫只求一箇是天下之理不過是與非兩端而已從其是則為善徇其非則為惡事親須是孝不然則非事親之道事君須是忠不然則非事君之道凡事皆用審箇是非擇其是而行之聖人教人諄諄不已只是發明此理事事物物上都有箇道理都有是有非所以舜好問而好察邇言雖淺近間言語中莫不有理都要見得破隱惡而揚善自家這裏善惡便分明然以聖明昭鑒才見人便不好便說出來也不得只是揚善那惡底自有不得掩之理才說揚善自家已自分明這亦聖人與人為善之意又云一件事走過眼前譬似閒也有箇道理有箇是非緣天地之閒上蟠下際都無别事都只是這道理天下事只有一箇是一箇非是底便是非底便非問是非自有公論曰如此說便不是了是非只是是非如何是非之外更有一箇公論才說有箇公論便又有箇私論也此却不可不察天下只有一理此是即彼非此非即彼是不容並立故古之聖賢心存目見只有義理都不見有利害可計較日用之間應事接物直是判斷得直截分明而推以及人吐心吐膽亦只如此更無回互若信得及即相與俱入聖賢之域若信不及即在我亦無為人謀而不盡底心而此理是非昭著明白凡事都分做兩邊是底放一邊非底放一邊是底是天理非底是人欲是即守而勿失非即去而勿留此治一身之法也治一家則分别一家之是非治一邑則分别一邑之是非推而一州一路以至天下莫不皆然此直上直下之道若其不分黑白不辨是非而猥曰無黨是大亂之道也學大抵只是分别箇善惡而去就之爾論隂陽則有隂必有陽論善惡則一毫著不得凡事莫非心之所為雖放僻邪侈亦是此心善惡但如反覆手翻一轉便是惡只安頓不著亦便是不善好惡是情好善惡惡是性性中當好善當惡惡泛然好惡乃是私也天理有未純是以為善常不能充其量人欲有未盡是以除惡常不能去其根為善而不能充其量除惡而不能去其根是以雖以一念之頃而公私邪正是非得失之幾未嘗不朋分角立而交戰於其中答何叔京書曰人欲云者正天理之反耳謂因天理而有人欲則可謂人欲亦是天理則不可蓋天理中本無人欲惟其流之有差遂生出人欲來程子謂善惡皆天理此句若甚可駭謂之惡者本非惡此句便都轉了但過與不及便如此所引惡亦不可不謂之性意亦如此問程子云天下善惡皆天理何也曰惻隱是善於不當惻隱處惻隱即是惡剛斷是善於不當剛斷處剛斷即是惡雖是惡然原頭若無這物事却如何做得本皆天理只是被人欲翻了故用之不善而為惡耳問天下下善惡皆天理楊墨之類只是過不及皆出於仁義謂之天理則可如世之大惡謂之天理可乎曰本是天理只是翻了便如此如人之殘忍便是翻了惻隱如放火殺人可謂至惡若把那大去炊飯殺其人之所當殺豈不是天理只緣翻了道理有背有面順之則是背之則非緣有此理方有此惡如溝渠至惡當初若無清泠底水緣何有此問既是翻了天理如何又說皆天理也莫是殘賤底惡初從羞惡上發淫溺貪欲底惡初從惻隱上發後來多過差了原某初發都是天理曰如此說亦好但所謂翻者亦是四端中自有相反處如羞惡自與惻隱相反是非自與辭讓相反如公說也是好意思因而看得舊一句不通處出如用人之智去其詐用人之勇去其暴這兩句意分曉惟是用人之仁去其貪一句沒分曉今公說貪是愛上發來也是思之是淳善底人易得含故茍且姑息貪戀善只是當恁地底惡只是不當恁地底善惡皆是理但善是那順底惡是翻轉來底然以其反而不善則知那善底自在故善惡皆理也然却不可道有惡底理知人之難堯舜以為病而孔子亦有聽言觀行之戒然以豫觀之此特為小人設耳若皆君子則何難知之有哉蓋天地之間有自然之理凡陽必剛剛必明明則易知凡隂必柔柔必暗暗則難測故聖人作易遂以陽為君子隂為小人其所以通幽明之故類萬物之情者雖百世不能易也豫嘗竊推易說以觀天下之人凡其光明正大踈暢洞達如青天白日如高山大川如雷霆之為威而雨露之為澤如龍虎之為猛而麟鳯之為祥磊磊落落無纎芥可疑者必君子也而其依阿淟涊回互隱伏糾結如蛇蚓瑣細如蟣虱如鬼蜮狐蠱如盜賊詛呪閃倐狡獪不可方物者必小人也君子小人之極既定於內則其形於外者雖言談舉止之微無不發見而况於事業文章之際尤所謂粲然者彼小人者雖曰難知而亦豈得而逃哉南軒張氏曰人欲橫流强止遏之未有不奔潰湍決者此鯀治水也水之性無有不下禹能順而治之行其所無事也自然平治人之良心豈能發見之時引而伸之涵養而擴充之天理明人欲自消伊川所謂明得一分天理滅却一分人欲問程子謂視聽思慮動作皆天也但其中要識得真與妄耳胡伯逢疑云既是天安得妄某以謂此六者人生皆備故知均禀于天促順其理則是真違其理則是妄妄即人為之私耳如此言之知不謬否曰有物必有則此天也若非其則則是人為亂之妄而已矣道二義與利而已矣義者亘古今通天下之正逵而利者犯荆棘入險阻之私徑也人之秉彞固有坦然正逵之可遵而乃不由之而反犯荆棘冒險阻顛冥終身而不悔獨何歟血氣之動于欲也動于聲色動于貨財以至于爵祿之可慕則進以求達知名之可利則鋭于求名不寧惟是凡一日夕之間起居飲食遇事接物茍私己自便之事意之所向無不趨之則天理滅而人道或幾乎息矣其胸次營營豈得須臾寧處於斯世亦僥幸以茍免耳徒知有六尺血氣之軀而不知其體元與天地相周流也豈不可惜乎雖然義內也本其良心之不可以自己者反而求之夫豈逺哉學者潛心孔孟必得其門而入愚以為莫先于義理之辨蓋聖學無所為而然也無所為而然者命之所以不己性之所以不偏而教之所以無窮也凡有所為而然者皆人欲之私而非天理之所存此義利之分也自未嘗省察者言之終日之間鮮不為利矣非特名位貨殖而後為利也斯須之頃意之所向一涉於有所為雖有淺深之不同而其徇己自私則一而已如孟子所謂內交要譽惡其聲之類是也是心日滋則善端遏塞欲爾聖賢之門墻以求自得豈非却行以望及前人乎使談高說妙不過渺茫臆度譬猶無根之木無本之水其何益乎學者當立志以為先持敬以為本而精察于動靜之間毫釐之差審其為霄壤之判則有以用吾力矣學然後知不足平時未覺吾利欲之多也灼然有見于義理之辨將日救過不暇由是而不舍則趨益深理益明而不可己也孔子曰古之學者為己今之學者為人為人者無適而非利為己者無適而非義嗟乎義利之辨大矣豈特學者治己之所當先施之天下國家一也王者所以建立邦本垂裕無疆以義故也而伯者所以陷溺人心貽毒後世以利故也孟子當戰國橫流之時發揮天理遏止人欲深切著明撥亂反正之大綱也人之所以不正大者果何由哉有所偏黨則不正矣有所係吝則不大矣是二者皆私也纎毫之萌則正大之體亡矣是當涵泳乎義理之中敬恭乎動靜之際察夫偏黨係吝而克去之則所謂正大者蓋可存其體而得其用矣勉齊黃氏曰人禀隂陽五行之秀氣以生而太極之理已具其根於心也未發則為仁義禮智之性已發則為惻隱羞惡辭讓是非之情其施於身也則為貌之恭言之從視之明聽之聰思之睿其見於事也則為君臣之義父子之恩夫婦之别長幼之序朋友之信與凡百行之當然者是其禀賦之初內外之分固莫非天理之所具然少有不謹則人欲得以間之合乎天理則順直端方而無邪曲偏詖之纍人欲間之則反是矣是故存養省察於幾微之間其惟敬義乎主一之謂敬合宜之謂義主於一則思慮不雜天理常存而內直矣合於宜則品節不差天理常行而外方矣內直外方則所謂具衆理宰萬事有以全吾心本然之妙矣潛室陳氏曰五峯云天理人欲同行異情此語儘當玩味如飲食男女之欲堯舜與桀紂同但中理中節即為天理無理無節即為人欲西山真氏曰義者天理之公也利者人欲之私也二者如氷炭之相反然一於義則利自在其中蓋義者宜也利亦宜也茍以義為心則事無不宜矣不惟宜於己亦且宜於人人己兩得其宜何利如之若以徇利為心則利於己必害於人爭鬭奪攘於是乎興己亦豈能享其利哉大學所謂利専指財利而言伊川先生云利不獨財利之利凡有一豪自便之心即是利此論尤有補於心術之微至南軒先生又謂無為而為皆義也有所為而為即利也其言愈精且微學者不可不知也且如見赤子入井有惻隱之心此乃天理自然形見非有所為而然此即義也若有一毫納交要譽之心即是有所為而為即利心也二者去相去毫釐之間而公私邪正之分則天淵矣故朱子謂南軒此語乃發先賢所未發有功於聖門學者所宜深味也學者存心行事只當以義理為主義所當然雖害不恤義所不當然雖利不計如此方合乎天理之正若此心一出一入於義利之間終是為利所勝正如白黑相和黑必掩白薰蕕共器蕕必掩薰立志之初不可不察也程子曰賢者在下豈可自進以求於君茍自求之必無能信用之理以下論出處擇才而用雖在君以身許國則在已道合而後進得正則吉矣汲汲以求遇者終必自失非君子自重之道也故伊尹武侯救世之心非不切必待禮至而後出者以此賢聖於亂世雖知道之將廢不忍坐視而不救也必區區致力於未極之間强此之衰難彼之進圖其暫安而冀其引久茍得為之孔孟之屑為也王允之於漢謝安之於晉亦其庶矣問家貧親老應舉求仕不免有得失之纍何修而可以免此曰此只是志不勝氣若志勝自無此纍家貧親老須為祿仕然得之不得為有命曰在己固可為親奈何曰為己為親止是一事若不得其如命何孔子曰不知命無以為君子人茍不知命見患難必避遇得喪必動見利必趨其何以為君子古之仕者為人今之仕者為己士之處高位則有拯而無隨在下位則有當拯有當隨拯之不得而後隨問聖人有為貧之仕乎曰為委吏乘田是也或曰抑為之兆乎曰非也為魯司冦則為之兆也或人因以是勉程子從仕曰至於飢餓不能出門戶之時又徐為之謀耳龜山楊氏曰方太公釣於渭不遇文王特一老漁父耳及一朝用之乃有鷹揚之勇非文王有獨見之明誰能知之學者須體此意然後進退隱顯各得其當正叔云古之學者四十而仕未仕以前二十餘年得盡力於學問無他營也故人之成材可用今之士十四五以上便學綴文覓官豈嘗有意為己之學夫以不學之人一旦授之官而使之事君長民治事宜其效不如古也故今之在仕路者人物多凡下不足道以此仕道與祿仕不同常夷甫家貧既召入朝神宗欲優厚之令兼數局如登聞鼓染院之類庶幾俸給可贍其家夷甫一切受之不辭及正叔以白衣擢為勸講之官朝廷亦使之兼他職則固辭蓋前日所以不仕者為道也則今日之仕須其官足以行道乃可受不然是茍祿也然後世道學不明君子之辭受取舍人鮮能知之故常公之不辭人不以為非而程公之辭人亦不以為是和靖尹氏曰君子或出或處歸潔其身而已矣人之行已各有其志出處去就雖有不同要看所存如何耳東平馬氏曰人之利鈍自有時但當行直道無用干人也致堂胡氏曰古之君子不茍就不俯從使去就從違之重在我而不在人在義而不在利庶乎招不來麾不去足以取信於其上也朱子曰士大夫之辭受出處又非獨其身之事而已其所處之得失乃關風俗之盛衰故尤不可以不審也聖賢固不能自為時然其仕止久速皆當其可則其所以自為時者亦非他人之所能奪矣豈以時之不合而變吾所守以徇之哉今人皆不能修身方其為士則役役求仕既仕則復患祿之不加趨走奔馳無一日間何如山林布衣之士道義足於身道義既足於身則何物能嬰之哉諸葛武侯未遇先主只得退藏一向休了也沒奈何孔子弟子不免事季氏亦事勢不得不然捨此則無以自活如今世之科舉亦然如顔閔之徒自把得住自是好不可以一律看人之出處最可畏如漢魏之末漢末則所事者止有箇曹氏魏末所事者止有箇司馬氏耳名義不正則事不可行無可為者有去而已然使聖人當之又不知如何恐於義未精也今人只為不見天理本源而有汲汲以就功名之心故其議論見識往往卑陋多方遷就下梢頭只是成就一箇私意更有甚好事當官勿避事亦勿侵事南軒張氏曰廷對最是直言蓋士人初見君父此是第一步此時可欺則無往而非欺須是立得腳教是勉齊黃氏曰古之君子非仁不存非禮不立非義不行所貴者良貴所樂者真樂人之知不知世之用不用於我何與焉貧富貴賤生死禍福日交乎前不暇顧也後之君子心之所固有事之所當行何者為禮何者為義何者為智懵然莫覺也功名而已耳利祿而已耳以區區之私意小智汲汲然求售於人慮人之不已用也委曲遷就以求順於人幸而得志哆然以為莫已若也小不如意則戚戚然幾不能以終日矣魯齊許氏曰志伊尹之所志學顔子之所學出則有為處則有守丈夫當如此出無所為處無所守所志所學將何為性理大全書卷五十

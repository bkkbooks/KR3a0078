body:
  text: 性理大全書卷十四易學啓蒙一聖人觀象以畫卦揲蓍以命爻使天下後世之人皆有以决嫌疑定猶豫而不迷於吉凶悔吝之塗其功可謂盛矣然其為卦也自本而幹而支其勢若有所迫而自不能已其為蓍也分合進退從橫逆順亦無往而不相值焉是豈聖人心思智慮之所得為也哉特氣數之自然形於法象見於圖書者有以啓於其心而假手焉耳近世學者類喜談易而不察乎此其專於文義者既支離散漫而無所根者其涉於象數者又皆牽合傳㑹而或以為出於聖人心思智慮之所為也若是者豫竊病焉因與同志頗輯舊聞為書四篇以示初學使毋疑於其說云淳熙丙午莫春既望雲臺真逸手記朱子曰易之一書最不易讀某作啓䝉正為見人說得支離竊謂易中所說象數聖人所已言者不過如此今學者但曉得此數條則於易略通大體而象數亦皆有用此外紛紛皆不須理㑹矣其第二篇論太極兩儀四象之屬尤精誠得其說則知聖人畫卦不假纎毫思慮計度而所謂畫前有易者信非虛語也所某一生只看得大學啓蒙兩件文字透見得前賢未到處啓蒙初間只因看歐陽公集內或問易大衍遂將來考算得出蓋看啓䝉方見得聖人一部易皆是假借虛設之辭天下之理若正說出便只作一件用唯以象言則當卜筮之時看是甚事都來應得鶴山魏氏曰朱文公易得於邵子為多蓋不讀邵易則茫不知啓䝉本義之所以作易大傳曰河出圖洛出書聖人則之孔安國云河圖者伏羲氏王天下龍馬出河遂則其文以畫八卦洛書者禹治水時神龜負文而列於背有數至九禹遂因而第之以成九類程子曰孔子感麟而作者秋麟不出春秋豈不作大抵須有發端處如畫八卦因見河圖洛書果無圖書八卦亦須作因見賣兔者曰聖人見河圖洛書而畫八卦然何必圖書只看此兔亦可作八卦數便在中可起古聖人只取神物之至者耳來朱子曰其以河圖洛書為不足信自歐陽公以已有此說然終無奈顧命繫辭論語皆有此言而諸儒所𫝊二圖之數雖有交互而無乖戾順數逆推縱橫曲直皆有明法不可得而破除也五河圖與易之天一地十者合而載天地五十有之數則固易之所自出也洛書與洪範之初一至次九者合而具九疇之數則固範之所自出也繫辭雖不言伏羲受河圖以作易然所謂仰觀俯察遠求近取安知河圖非其中一事耶大抵聖人制作所由初非一端然其法象之規模必有最親切處如洪荒之世天地之間隂陽之氣雖各有象然初未嘗有數也至於河圖之出然後有五十有五之數竒偶生成粲然可見此其所以深發聖人之獨智又非泛然氣象之所可得而擬也是以仰觀俯察遠求近取至此而後兩儀四象八卦之隂陽竒偶可得而言雖繫辭所論聖人作易之由者非一而不害其得此而後決之也玉齊胡氏曰龍馬周禮夏官馬八尺以上為龍言馬之特異如龍也漢武帝元狩三年得神馬於渥窪水中亦此之類神龜大戴禮曰甲蟲三百六十而神龜為之長劉歆云伏羲氏繼天而王受河而畫之八卦是也禹治洪水錫洛書法而陳之九疇是也河圖洛書相為經緯八卦九章相為表裏濳室陳氏曰經緯之說非是以上下為經左右為緯大抵經言其正緯言其變而二圖互為正變主河圖而言則河圖為正洛書為變主洛書而言則洛書為正而河圖又為變要之天地間不過一隂一陽以兩其五行而太極常居其中二圖雖縱橫變動要只是參互呈見此所以謂之相為經緯也表裏之說亦然蓋河圖不但可以畫卦亦可以明疇洛書不特可以明疇亦可以畫卦但當時聖人各因一事以垂法後世伏羲但據河圖而畫卦大禹但據洛書而明疇要知伏羲之畫卦其表為八卦而其裏固可以為疇大禹之叙疇其表為九疇而其裏固可以為卦此所以謂之相為表裏也關子明云河圖之文七前六後八左九右洛書之文九前一後三左七右四前左二前右八後左六後右朱子曰讀大戴禮書又得一證甚明其明堂篇有二九四七五三六一八之語而鄭氏注云法龜文也然則漢人固以九數者為洛書矣邵子曰圓者星也厯紀之數其肇於此乎厯法合二始以定剛柔二中以定律厯二終以紀閏餘是所謂厯紀也方者土也畫州井地之法其放於此乎州有九井九百畝是所謂畫州井地也蓋圓者河圖之數方者洛書之文故羲文因之而造易禹箕叙之而作範也蔡元定曰古今傳自孔安國劉向父子班固皆以為河圖授羲洛書錫禹關子明卲康節皆以十為河圖九為洛書蓋大傳既陳天地五十有五之數洪範又明言天乃錫禹洪範九疇而九官之數戴九履一左三右七二四象肩六八為足正龜背之象也惟劉牧意見以九為河圖十為洛書託言出於希夷既與諸儒舊說不合又引大傳以為二者皆出於伏羲之世其易置圖書並無明驗但謂伏羲兼收圖書則易範之數誠相表裏為可疑耳其實天地之理一而已矣雖時有古今先後之不同而其理則不容於有二也故伏羲但據河圖以作易則不必預見洛書而已逆與之合矣大禹但據洛書以作範則亦不必追考河圖而已暗與之符矣其所以然者何哉誠以此理之外無復它理故也然不特此耳律吕有五聲十二律而其相乘之數究于六十日名有十幹十二支而其相乘之數亦究于六十二者皆出于易之後其起數又各不同然與易之隂陽䇿數多少自相配合皆為六十者若合符契也下至運氣參同太一之屬雖不足道然亦無不相通蓋自然之理也假令今世復有圗書者出其數亦必相符可謂伏羲有取于今日而作易乎大𫝊所謂河出圖洛出書者人則之者亦泛言聖人作易作範其源皆出于天之意如言以卜筮者尚其占與莫大乎蓍龜之類易之書豈有龜與卜之法乎亦言其理無二而已爾朱子曰二始者一二也一竒故為剛二偶故為柔二中者五六也五者十干六者十二辰也二終者九與十也閏餘之法以一十九嵗為一章姑借其說以明十數之為河圖耳又曰圓者星也圎者河圗之數言無那四角底其形便圓又曰河圖既無那四隅則比之洛書固亦為圓矣方者土也方者洛書之文言畫州井地之所依倣而作者也書禹貢禹别九州兾北揚南青東梁西兖東北雍西北徐東南荆西南豫中也孟子言周家井地之制井九百畝其中為公田八家皆私百畝同養公田是皆法洛書之九數也之西山蔡氏曰天下之萬聲出于一闔一闢天下萬理出于一動一靜天下之萬數出于一竒一偶天下之萬象出于一方一圓易平庵項氏曰戴九履一乃乾鑿度九宫之法自有以來諸易師未有以為河圖者至宋劉牧方兩易之關子明洞極經亦然按唐李鼎祚集解易盡備前世諸儒之說獨無所謂關子明者蓋宋阮逸僞作也其說見後山陳氏談叢黃氏瑞節曰楊鼎卿彚六經為圖唐仲友輯經世圖譜並守劉牧之說猶未是正云玉齊胡氏曰唐律厯志僧一行作厯本議云天數始於一地數始於二合二始以厯定剛柔天數中於五地數中於六合二中於定律天數終於九地數終於十合二終以紀閏餘天有五音所以司日也地有六律所以司辰也前漢律厯志云天之中數五五為聲地之中數六六為律聲者宫商角徵羽也律有二陽律為律隂律為吕律以統氣物類曰黃鍾太簇姑洗㽔賔夷則無射是也其制裁竹為筒隂陽各六以節五聲之上下每律吕以五聲加之則以五乘十二以十二乘五是為六十十干自甲至癸十二支自子至亥支干相乘亦為六十隂陽老少䇿數配合為六十者老陽䇿數三十六老隂䇿數二十四合為六十少陽䇿數二十八少隂策數三十二亦合為六十也運氣見黃帝素問五運者甲已化土乙庚化金丙辛化水丁壬化木戊癸化火是也六氣者子午少隂君火司天為主氣寅申少陽相火司天為主氣丑未太隂濕土司天為主氣卯酉陽明燥金司天為主氣辰戌太陽寒水司天為主氣己亥厥隂風木司天為主氣是也以運氣相乘言之甲丙戊庚壬為陽加於子午寅申辰戌計三十日乙丁巳辛癸為隂加於丑未卯酉己亥計三十日總隂陽支干是為六十也參同乃修飬之書後漢魏伯陽所陽作以乾坤為爐鼎坎離為金刀大藥所用以為火候者六十卦也大乙日家有太一統紀之書其說蓋亦主於六十也天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此一節夫子所以發明河圖之說也天地之間一氣而已分而為二則為隂陽而五行造化萬物始終無不管於是焉故河圖之位一與六共宗而居乎北二與七為朋而居乎南三與八同道而居乎東四與九為友而居乎西五與十相守而居乎中蓋其所以為數者不過一隂一陽一竒一偶以兩其五行而已所謂天者陽之輕清而位乎上者也所謂地者隂之重濁而位乎下者也陽數竒故一三五七九皆屬乎天所謂天數五也隂數偶故二四六八十皆屬乎地所謂地數五也天數地數各以類而相求所謂五位之相得者然也天以一生水而地以六成之地以二生火而天以七成之天以三生木而地以八成之地以四生金而天以九成之天以五生土而地以十成之此又其所謂各有合焉者也積五竒而為二十五積五偶而為三十合是二者而為五十有五此河圖之全數皆夫子之意而諸儒之說也朱子曰五行有以質而語其生之序者則曰水火木金土有以氣而語其行之序者則曰木火土金水水隂根陽火陽根隂錯宗而生其端是天一生水地二生火天三生木地四生金到得運行處便水生木木生火火生土土生金金又生水水又生木循環相生又曰陽變隂合初生水火水火氣也流動閃爍其體尚虛其成形猶未定次生木金則確然有定形矣又曰大抵天地生物先其輕清以及重濁天一生水地二生火二物在五行中最輕清金木復重於水火土又重於金木或曰土寄旺於四季各十八日何獨火生土而土生金也曰夏季十八日土氣為最旺故能生秋金也勉齊黃氏曰自一至十特言竒偶之多寡爾初非以次序而言天得竒而為水故曰一生水一之極而為三故曰三生水地得偶而為火故曰二生火二之極而為四故曰四生金何也一極為三以一運之圓而成三故一而三也二極為四以二周之方而成四故二而四也如果以次序言則一生水而未成水必至五行俱足猶待第六而後成水二生火而未成火必待五行俱足然後第七而成火耶如此則全不成造化亦不成義理矣六之成水也猶坎之為卦也一陽居中天一生水也地六包於外陽少隂多而水始盛成七之成火也猶離之為卦也一隂居中地二生火也天七包於外隂少陽多而大始盛成坎屬陽而離屬隂以其內者為主而在外者成之也又曰只以造化本原及人物之初生驗之便自可合天一生水水便有形人生精血湊合成體亦若造化之有水也地二生火火便有氣人有此體便能為聲聲者氣之所為亦若造化之有火也水隂而火陽貌亦屬隂而言亦屬陽也水火雖有形質然乃造化之初故水但能潤火但能炎其形質終是輕清至若天三生水地四生金則形質已全具矣亦如人身耳目既具則人之形成矣木陽而金隂亦猶視陽而聽隂也又曰洪範五行五事皆以造化之初及人物始生言之也造化之初天一生水而三生木地二生火而四生金蓋以隂陽之氣一濕一燥而為水火濕極燥極而為木與金也人物始生精與氣耳大𫝊曰精氣為物子産曰物生始化曰魄既生魄陽曰魄此皆精妙之語精濕而氣燥精實而氣虛精沉而氣浮故精為貌而氣為言精之盛者濕之極故為木為肝為視氣之盛者燥之極故為金為肺為聽大抵貌與視屬精故精衰而目暗言與聽屬氣故氣塞而耳聾此曉然易見者也又曰耳屬金是誠可疑醫家以耳屬腎以肺屬金然配與屬不同屬者管屬之謂配者比並之謂論其管屬則耳屬於腎取其並比則聽比於金也又曰水火木金有兩項看如作行之序看則水火是陽金水是隂行於春夏為陽行于秋冬為隂如作生之序看則水木是陽火金是隂生於天一天三為陽生於地二地四為隂因云太極圖解自一處可疑圖以水隂盛故居右火陽盛故居左金隂稚故次水木陽稚故次火此是說生之序下文却說水木陽也火金隂也却以水為陽火為隂論來物之初生自是幼嫩如陽始生為水尚柔弱到生木已強盛隂始生為火尚微到生金已成質如此則水為陽稚木為陽盛火為隂稚金為隂盛也二雲莊劉氏曰水隂也生于天一火陽也生於地是其方生之始隂陽互根故其運行水居子位極隂之方而陽已生于子火居子位極陽之方而隂已生于午若木生於天三專屬陽故其行於春亦屬陽金生於地四專屬隂故其行於秋亦屬隂不可以隂陽互言矣蓋水火未離乎氣隂陽交合之初其氣自有互根之妙木則陽之發達金則隂之收斂而有定質矣此其所以與水火不同也何思齊翁氏曰水火木金不得土不能各成一器以見之且天一生水一得五便為水之成地二生火二得五便為火之成天三生木三得五便為木之成地四生金四得五便為金之成皆本於中五之土也又曰河圖隂陽之位生數為主而成數配之東北陽方則主之以竒而與合者偶西南隂方則主之以偶而與合者竒也一玉齊胡氏曰一隂一陽以生成言也一竒一偶三五七九為竒二四六八十為偶也隂陽竒偶之合則一六為水二七為火三八為木四九為金五十為土故其在十干則木有甲乙火有丙丁土有戊己金有庚辛水有壬癸所謂兩其五行也五位相得謂一與二三與四五與六七與八九與十各以竒偶為類而相得各有合謂一與六二與七三與八四與九五與十皆兩相合也朱子云相得如兄弟有合如夫婦蓋以相得則取其竒偶之相為次第辦其類而不容紊也有合則取其竒偶之相為生成合其類而不容間相得有合四字該盡河圖之數又云相得有合在十干甲乙木丙丁火戊巳土庚辛金壬癸水便是相得甲與己合乙與庚合丙與辛合丁與壬合戊與癸合便是各有合也至於洛書則雖夫子之所未言然其象其說已具於前有以通之則劉歆所謂經緯表裏者可見矣或曰河圖洛書之位與數其所以不同何也曰河圖以五生數統五成數而同處其方蓋揭其全以示人而道其常數之體也洛書以五竒數統四偶數而各居其所蓋主於陽以統隂而肇其變數之用也節齊蔡氏曰河圖數偶偶者靜靜以動為用故河圖之行合皆竒一合六二合七三合八四合九五合十是故易之吉凶生乎動蓋靜者必動而後生也洛書數竒竒者動動以靜為用故洛書之位合皆偶一合九二合八三合七四合六是故範之吉凶見乎靜蓋動者必靜而後成也九峯蔡氏曰河圖體圓而用方聖人以之而畫卦洛書體方而用圓聖人以之而叙疇卦者隂陽之象也疇者五行之數也象非偶不立數非竒不行竒偶之分象數之始也隂陽五行固非二體八卦九疇亦非二致理一分殊非深於造化者安能識之又曰河圖非無竒也而用則存乎偶洛書非無偶也而用則存乎竒偶者隂陽之對待乎竒者五行之迭運乎行對待者不能孤迭運者不可窮天地之形四時之人物之生萬化之凝其妙矣乎統潜室陳氏曰河圖以生數統成數洛書以竒數偶數若不相似也然一必配六二必配七三必配八四必配九五必居中而配十圖書未嘗不相似也然同方者有內外之分是河圖猶洛書也異位者有比肩之義是洛書亦猶河圖也又如河圖則備數之全洛書則缺數之十此疑若相戾也然河圖之全數乃皆自五而來一得五而為六二得五而為七三得五而為八四得五而為九至其所謂十者乃五得五而為十其實未嘗有十也八卦全不用十洛書雖曰缺十而皆有含十之義一對九而含十二對八而含十三對七而含十四對六而含十十常夾居五之兩端與河圖頗相類是亦未嘗無十也竒雲莊劉氏曰河圖者隂陽生成之合洛書者隂陽偶之分以質而論則分而各居其所是對待之定體也以氣而論則合而同處其方是流行之妙用也然氣質二者初不相離有分則必有合有合則必有分所謂推之於前不見其始之合引之於後不見其終之離又不可以拘泥而觀之也以黃氏瑞節曰九峯蔡氏撰皇極內篇數為一書為易更四聖而象已著範錫神禹而數不傳於是有範數圖有八十一章六千五百六十一變西山真氏云蔡氏範數與三聖之易同功者是也陽玉齊胡氏曰河圖以生成分隂陽以五生數之統五成數之隂而同處其方陽內隂外生成相合交泰之義也洛書以竒偶分隂陽以五竒數之陽統四偶數之隂而各居其所陽正隂偏竒偶既分尊卑之位也河圖數十十者對待以立其體故為常洛書數九九者流行以致其用故為變也常變之說朱子特各舉所重為言非謂河圖專於常有體而無用洛書專於變有用而無體也自河圖四象之合者觀之象之列於四方者各當其所處之位此其體之常象之處於西南者不協夫所生之卦又為用之變矣伏羲則其變者以作易即橫圖卦畫之成而究圓圖卦氣之運則知四象分為八卦隂之老少不動而陽之老少迭遷此主變也豈拘於常者乎自洛書四象之分者觀之象之居于西南者不當其所處之位此其用之變象之列於四方者悉協夫所生之卦又為體之常矣大禹則其常者以作範因武王彜倫攸叙之問以究箕子天錫禹疇之對則知四象分為九疇陽居四正則配四陽之卦以為隂之宰隂居四隅則配四隂之卦以為陽之輔此主常也豈撓於變者乎曰其皆以五居中者何也曰凡數之始一隂一陽而已矣陽之象圓圓者徑一而圍三隂之象方方者徑一而圍四圍三者以一為一故參其一陽而為三圍四者以二為一故兩其一隂而為二是所謂參天兩地者也三二之合則為五矣此河圖洛書之數所以皆以五為中也節齊蔡氏曰天數竒以一為一故三地數偶以二為一故兩卦畫亦然陽竒為一而隂偶為二也玉齊胡氏曰陽之數竒而屬乎天其象為圓圓者取其動也凡物之圓者其直徑則一而橫圍則三若陽則其數以一為一而用其全擬之於象實圍三而二各一竒皆在所用故曰參天隂之數偶而屬乎地其象為方方者取其靜也凡物之方者其直徑則一而橫圍則四若隂則其數以二為一而用其半擬之於象實圍四而四合二偶半在所用故曰兩地夫數始於隂陽倚於參兩參兩之合則為五此圖書之數所以皆以五居中也陽大隂小陽饒隂乏故陽得用全而隂惟用半其尊陽之義實昉於此矣或問參天兩地舊說以為五生數中天參地兩不知其說如何朱子云如此却是三天二地不見參兩之意參天者參之以三兩地者兩之以二也又云一箇天參之而為三一箇地兩之而為二三三為九三二為六兩其三一其二為八兩其二一其三為七此又七八九六之數所由起也然河圖以生數為主故其中之所以為五者亦具五生數之象焉其下一㸃天一之象也其上一㸃地二之象也其左一㸃天三之象也其右一㸃地四之象也其中一㸃天五之象也洛書以竒數為主故其中之所以為五者亦具五竒數之象焉其下一㸃亦天一之象也其左一㸃亦天三之象也其中一㸃則天五之象也其右一㸃則天七之象也其上一㸃則天九之象也玉齊胡氏曰圖之五具五生數之象書之五具五竒數之象蓋皆以其所主者言之有主必有賔而圖之成數與書之偶數亦各具於中央之五數矣圖之中五下一㸃既具天一之象則一與六合而地六之成數自不能離乎天之一矣以至二三四五皆然如是則河圖由一與六以至五與十生成相合而五十五之全數盡具於中央五數之中書之中五下一㸃既具天一之象以至上一㸃既具天九之象則一與二三與四七與六九與八竒偶亦相為吻合而四十五之全數亦盡具於中央之五數矣豈可惟以五數拘之哉其數與位皆三同而二異蓋陽不可易而隂可易成數雖陽固亦生之隂也雲莊劉氏曰圖之一三五七九皆竒數陽也而一三五之位不易七九之位易者亦以天地之間陽動主變故也然陽於北東則不動於西南則互遷者蓋北東陽始生之方西南陽極盛之方陽主進數又必進於極而後變也九玉齊胡氏曰數則河圖自一至十洛書自一至之數位則東西南北之位之位皆三同而二異者圖書之一六皆在北三八皆在東五皆在中三者之位數皆同也圖之二七在南而書則二七在西圖之四九在西而書則四九在南二者之位數皆異也陽不可易専指一三五隂可易統指二七四九成數雖陽指七九固亦生之隂指七為二生數之隂九為四生數之隂也二四以生數言雖屬陽然以偶數言則屬隂不得謂之陽矣故可易七九以竒數言雖屬陽然以成數言只可謂之隂矣故可易其曰成數雖陽固亦生之隂不曰生數雖隂固亦成之陽者蓋但主隂可易而言也曰中央之五既為五數之象矣然其為數也奈何曰以數言之通乎一圖由內及外固各有積實可紀之數矣然河圖之一二三四各居其五象本方之外而六七八九十者又各因五而得數以附於其生數之外洛書之一三七九亦各居其五象本方之外而二四六八者又各因其類以附於竒數之側蓋中者為主而外者為客正者為君而側者為臣亦各有條而不紊也董銖問曰夫河圖之數不過一竒一偶相錯而已故太陽之位即太隂之數太隂之位即太陽之數見其迭隂迭陽隂陽相錯所以為生成也天五地十居中地十亦天五之成數蓋一二三四已含六七八九者以五乘之故也蓋數不過五也洛書之用一二三四以對九八七六其數亦不過十蓋太陽占第一位已含太陽之數少隂占第一位已含少隂之數少陽占第三位已含少陽之數太隂占第四位已含太隂之數雖其隂陽各自為數然五數居中太陽居一得五而成六少隂居二得五而成七少陽居三得五而成八太隂居四得五而成九則與河圖一隂一陽相錯而為生成之數者亦無以異也不知可如此看否朱子答曰所論甚當河圖相錯之說猶佳覺軒蔡氏曰一二三四為四象之位六七八九為四象之數河圖位與數常相錯然五數居中一得五而為六二得五而為七三得五而為八四得五而為九各居其方雖相錯而未嘗不相對也洛書位與數常相對然五數居中一得五而為後右之六二得五而為右之七三得五而為後左之八四得五而為前之九縱橫交綜雖相對而未嘗不相錯也偶玉齊胡氏曰在圖者陽生隂成在書者陽竒隂而皆以陽為尊也圖之數十積之為五十有五書之數九積之為四十有五皆可以紀其實也然以中五計之圖之一二三四者生數之陽也各居其中五本來方位之外六七八九十者成數之隂也又各因五而得數以附於五生數之外中者為主則外者為客矣書之一三七九者四竒數之陽也各居其中五本來方位之外而二四六八者四偶數之隂也又各從其類以附于四竒數之側正者為君則側者為臣矣造化貴陽而賤隂假圖書以顯其理出於自然之妙非可容一毫智力抑揚於其間也曰其多寡之不同何也曰河圖主全故極於十而竒偶之位均論其積實然後見其偶贏而竒乏也洛書主變故極於九而其位與實皆竒贏而偶乏也必皆虛其中也然後隂陽之數均於二十而無偏耳玉齊胡氏曰河圖偶贏而竒乏者地三十天二十五也洛書竒贏而偶乏者天二十五地二十也河圖虛其中之十五洛書虛其中之五則隂陽之數均於二十矣曰其序之不同何也曰河圖以生出之次言之則始下次上次左次右以復于中而又始于下也以運行之次言之則始東次南次中次西次北左旋一周而又始于東也其生數之在內者則陽居下左而隂居上右也其成數之在外者則隂居下左而陽居上右也洛書之次其陽數則首北次東次中次西次南其隂數則首西南次東南次西北次東北也合而言之則首北次西南次東次東南次中次西北次西次東北而究于南也其運行則水克火火克金金克木木克土右旋一周而土復克水也是亦各有說矣思齊翁氏曰河圖運行之序自北而東左旋相生固也然對待之位則北方一六水克南方二七火西方四九金克東方三八木而相克者已寓於相生之中洛書運行之序自北而西右轉相克固也然對待之位則東南方四九金生西北方一六水東北方三八木生西南方二七火其相生者已寓於相克之中蓋造化之運生而不克則生者無從而裁制克而不生則克者亦有時而間斷此圖書生成之妙未嘗不各自全備也次玉齊胡氏曰河圖生出生成之序與洛書竒偶序皆錯雜取義唯運行次序河圖則左旋相生洛書則右轉相克一六為水二七為火三八為木四九為金五十為土河圖則水生木木生火火生土土生金左旋一周而金復生水也洛書則水克火火克金金克木木克土右轉一周而土復克水也曰其七八九六之數不同何也曰河圗六七八九既附于生數之外矣此隂陽老少進退饒乏之正也其九者生數一三五之積也故自北而東自東而西以成於四之外其六者生數二四之積也故自南而西自西而北以成於一之外七則九之自西而南者也八則六之自北而東者也此又隂陽老少互藏其宅之變也洛書之縱橫十五而七八九六迭為消長虛五分十而一含九二含八三含七四含六則參伍錯綜無適而不遇其合焉此變化無窮之所以為妙也玉齊胡氏曰此一節專言圖書七八九六之數以進隂陽之老少也七九為陽陽主進由少陽七而進七之上為八故踰八而進於九九則進之極更無去處了故九為老陽六八為隂隂主退由少隂八而退八之下為七故踰七而退於六六則退之極更無轉處了故六為老隂進則饒故老陽饒於八少陽饒於六退則乏故老隂乏於七少隂乏於九進而饒者陽之常退而乏者隂之常此所謂正也以言其變老陽數九由一三五積而成於四之外四老隂之位也老隂數六由二四積而成於一之外一老陽之位也此二老互藏其宅之變也七八則非由積數而成七與九皆陽故少陽七自九來而居於二之上二少隂之位也八與六皆隂故少隂八自六來而居於三之上三少陽之位也此二少互藏其宅之變也其在洛書雖縱橫有十五之數實皆七八九六之迭為消長一得五為六而與南方之九迭為消長四得五為九而與西北之六迭為消長三得五為八而與西方之七迭為消長二得五為七而與東北之八迭為消長大抵數之進者為長退者為消長者退則又消消者進則又長六進為九則九長而六消九退為六則九反消而六又長矣七進為八則八長而七消八退為七則八反消而七又長矣虛五分十者虛中五之外則縱橫皆十以其十者分之則九者十分一之餘八者十分二之餘七者十分三之餘六者十分四之餘也叄伍錯綜無適而不遇七八九六之合焉此所謂變化無窮之妙也又因是推之圖書之文七與八九與六每相聮屬河圖則二少位東南二老位西北二居南內含東外之八三居東內含南外之七一居北內含西外之九四居西內含北外之六洛書則一得五成六而合九四得五成九而合六二得五成七而合八三得五成八而合七又如二四成六而九居中一八成九而六在旁二六成八而七處內三四成七而八在下是亦九六七八無適而不遇其合也曰然則聖人之則之也奈何曰則河圖者虛其中則洛書者總其實也河圖之虛五與十者太極也竒數二十偶數二十者兩儀也以一二三四為六七八九者四象也析四方之合以為乾坤離坎補四偶之空以為兑震巽艮者八卦也洛書之實其一為五行其二為五事其三為八政其四為五紀其五為皇極其六為三德其七為稽疑其八為庶徵其九為福極其位與數尤曉然矣朱子曰洛書本文只有四十五㸃班固云六十五字皆洛書本文古字畫少恐或有模樣但今無所考漢儒此說未是恐只是以義起之不是數如此蓋皆以天道人事參互言之五行最急故第一五事又參之故第二身既修可推之於政故八政次之政既成又驗之於天道故五紀次之又繼之以皇極居五蓋能推五行正五事用八政修五紀乃可以建極也六三德乃是權衡此皇極者也德既修矣稽疑庶徵繼之者著其驗也又繼之以福極則善惡之效至是不可加矣皇極非大中也皇乃天子極乃極至言皇建此極也不九峯蔡氏曰五行不言用無適而非用也皇極言數非可以數眀也茍明乎此則大禹叙疇之㫖得矣積玉齊胡氏曰伏羲則河圖以作易也圖之數十之為五十有五虛其中十與五者象太極也而其散布於外者凡四十以一三七九為陽儀者二十以二四六八為隂儀者二十此則之以生兩儀也以一二也三四之位而為六七八九之象此則之以生四象析二七之合則七居南為乾而二補東南隅之空以為兊析三八之合則八居東為離而三補東北隅之空以為震析四九之合則九居西為坎而四補西南隅之空以為巽析一六之合則六居北為坤而一補西北隅之空以為艮者此則之以成八卦也然聖人之則河圖也亦因橫圖卦畫之成以發圓圖卦氣之運耳本河圖以為先天橫圖則畫卦之成者老陽居一分之為乾兊少隂居二分之為離震少陽居三分之為巽坎老隂居四分之為艮坤本河圖以為先天圓圖則卦氣之運者老隂居北少隂居東所以分而為艮坤離震者此四卦固無以異於橫圖也少陽居南宜為巽坎而乃為乾兌老陽居西宜為乾兑而乃為巽坎此四卦實有異于橫圖矣其故何哉蓋河圗二象之居于東北者隂之老少也隂主靜而守其常故水木各一其象不能他有所兼一六居北為水其于卦也為艮坤不得為離震矣二八居東為也木其於卦也為離震不得為艮坤矣隂所以小所以居窮冬相錯而為冬與春之卦也河圖二象之居於西南者陽之老少也陽主動而通其變故金火互通其象實能兩有所兼乾居南方火位說卦曰乾為金坎居西方金位而說卦曰坎為赤故四九居西為金其於卦也本為乾兊而亦得為巽坎矣二七居南為火其於卦也本為巽坎而亦得為乾兊矣陽所以為大也所以居大夏相錯而為夏與秋之卦也體河圖以為先天圖圖其卦氣之運分陰分陽有如此者聖人所以作易者寧不可見也哉大禹之則洛書以作範也未必拘拘于書之位次以定疇之先後然自一至九之數實有以默啓聖人作範之心故自初一之五行包天地自然之數餘八法則是大禹參酌天時人事而類之不必盡協於火木金土之位也曰洛書而虛其中則亦太極也竒偶各居二十則亦兩儀也一二三四而含九八七六縱橫十五而互為七八九六則亦四象也四方之正以為乾坤離坎四隅之偏以為兊震巽艮則亦八卦也河圖之一六為水二七為火三八為木四九為金五十為土則固洪範之五行而五十有五者又九疇之子目也是則洛書固可以為易而河圖亦可以為範矣且又安知圖之不為書書之不為圖也耶玉齊胡氏曰四方為乾坤離坎四隅為兊震巽艮者蓋一六老隂之數而畫卦為艮坤艮居六坤居一也三八少隂之數而畫卦為離震離居三震居八也四九老陽之數而畫卦為乾兊乾居九兊居四也二七少陽之數而畫卦為巽坎巽居二坎居七也此洛書亦可以為八卦也九疇子目者五行五五事五八政八五紀五皇極一三德三稽疑七庶徴十福極十一總五十五也曰是其時雖有先後數有多寡然其為理則一而已但易乃伏羲之所先得乎圖而初無所待於書範則大禹之所獨得乎書而未必追考於圖耳且以河圖而虛十則洛書四十有五之數也虛五則大衍五十之數也積五與十則洛書縱橫十五之數也以五乘十以十乘五則又皆大衍之數也洛書之五又自含五而得十而通為大衍之數矣積五與十則得十五而通為河圖之數矣茍明乎此則橫斜曲直無所不通而河圖洛書又豈有先後彼此之間哉玉齊胡氏曰洛書之五又自含五而得十者下一㸃含天一之象上一㸃含地二之象左一㸃含天三之象右一㸃含地四之象中一㸃含天五之象所謂五自含五而得十通在外四十為大衍之數積五與十而得十五者以其所含之五積之則含五與十而為十五通在外四十而為河圖五十五也性理大全書卷十四

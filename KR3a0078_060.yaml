body:
  text: 性理大全書卷六十歴代二西漢髙帝程子曰髙祖其勢可以守闗不放入項王然而須放他入來者有三事一是有未阬二十萬秦子弟在外恐内有父兄為變二是漢王父母妻子在楚三是有懐王元城劉氏與馬永卿論圍棊曰棊中有一事今與公論之某嘗見髙棊云髙低棊不甚相逺但髙棊識先後着耳若低棊即以後着為先着故敗昔有髙棊曰漢髙帝方黥布以窮來歸故洗足不起以挫其鋭布欲自殺後見張御從官如漢王則又大喜過望此識先後着也又有低棊曰梁武帝方侯景以窮來歸遽裂地而王之其後景凡有所須輙痛挫抑之故景反而梁亡此以後著為先着也又曰圍棊有過行者必須皆是髙棊而當局者為利害所昏故藉傍人指之爾若低棊雖是提耳而明告之亦不悟也昔漢髙帝聞韓信欲為假王輙大怒慢罵良平躡足此過行法也且髙帝見處不甚相逺但髙帝當局而迷爾使良平遇暗主雖累千萬言亦何益哉或問髙祖為義帝發䘮是詐後如何却成事朱子曰只縁當時人和詐也無如五伯假之亦是諸侯皆不能假故也漢髙祖取天下所謂仁義者豈有誠心哉其意本謂項羽背約及到新城遇三老董公遮道之言方假此之名以正彼之罪所謂縞素發䘮之舉其意何在似此之謀看當時未必不是欲項羽殺之而後罪之也廣武之㑹太公既已為項羽所執髙祖若去求告他定殺了只得以兵攻之他却不敢殺時髙祖亦自知漢兵已強羽亦知殺得無益不若留之庶可結漢之懽心一云使髙祖屈意事楚則有俱斃而已惟其急於攻楚所以致太公之歸也問舜棄天下猶敝屣曰如此則父子俱就戮爾亦救太公不得若分羮之語自是髙祖説得不是髙祖斬丁公赦季布非誠心欲伸大義特私意耳季布所以生蓋欲示天下功臣是時功臣多故不敢殺季布既是明大義陳平信布皆項羽之臣信布何待反而誅之南軒張氏曰惟仁義足以得天下之心三王是也髙帝之興亦有合乎此是以能剪暴秦滅强項而卒基漢業方懐王遣將入闗諸老將固以為沛公素寛大長者而心歸之至於三章之約其所以得乎民者深矣此非其所謂仁者歟予每愛三老董公之説以為順徳者昌逆徳者亡兵出無名事故不成名其為賊敵可乃服三軍之衆為義帝縞素聲項羽之罪而討之於是五十六萬之師不謀而來從義之所感也使斯時髙帝不入彭城置酒髙㑹率諸侯窮羽所至而誅之天下即定矣惜其誠意不篤不能遂收湯武之功然漢卒勝楚卒亡者良由於此名正義立故也問髙祖規模宏逺何事可驗曰約法三章用三老董公仁義之説此二事可驗嘗讀漢史至平城之圍内外不通者七日用陳平秘計僅而獲免未嘗不為髙帝危之班固號良史於陳平之計亦莫得聞意必猥陋可羞之甚故平亦恥諱不欲自貽笑於後世也猶幸有平計可用耳脱或無䇿則漢家社稷豈不寒心雖欲斬十使封婁敬尚及為乎一聼之誤為禍如此幸免而悔所失已多曷若審聽於初而不輕用以取辱乎又曰髙祖平生好謀能聽自起布衣以有天下用人之言鮮有誤者至此忽輕信十軰之言其病安在蓋由急於功利之過惟帝貪易擊之利遂欲邀功於逺夷此念既萌利害倒置故十軰之言得以入之雖有婁敬之忠反怒其妄言沮軍也是故為人主者又當端其一心勿以小功淺利自惑其聰明則臣下是非之言可以坐照而挾功利之説者亦無隙之可乗矣潛室陳氏曰楚懐王之立也夫將以興漢乎懐王之死也天將以亡楚乎夫懐王項氏所立此冝深徳於項今觀懐王在楚曽無絲粟之助於楚而獨屬意於沛公方其議遣入闗也羽有父兄之怨於秦所遣冝莫如羽者顧不遣羽而遣沛公曰吾以其長者不殺也沛公之帝業蓋於是乎興矣至其與諸將約也曰先入闗者王之沛公先入闗而羽有不平之心使人致命於懐王蓋以為懐王為能右己也而懐王之報命但如約而已以草莽一時之言而重於山河丹書之誓羽雖欲背其約其如負天下之不直何是沛公之帝業又於此乎定矣夫項氏之興本假於亡楚之遺孽顧迫於亞父之言起民間牧羊子而王之蓋亦謂其易制無他而豈料其賢能若是邪始而為項氏之私人而今遂為天下之義主始以為有大造於楚而今則視羽蔑如也則羽此心之鬱鬱悔退豈能乆居人下者自我立之自我廢之或生或殺羽以為此吾家事而不知天下之英雄得執此以為辭也故自三軍縞素之義明沛公之師始堂堂於天下而羽始奄奄九泉下人矣懐王之立曽不足以重楚而懐王之死又適足以資漢然則范増之謀欲為楚也而秪以為漢也嗚呼此豈沛公智慮所能及哉其所得為者天也此豈范増項羽智慮之所不及哉其所不得為者亦天也髙帝之為義帝發䘮也三軍縞素天下之士歸心焉雖然帝亦詭而用之耳夫帝之於懐王也君臣之分未定也生則嘗以天下之義主而事之死則以為天下之義主而䘮之此蓋項氏之短而大其辭以執之是三老董公之善謀豈出於帝之本情哉問髙帝約法三章如何曰沛公之始入闗也與秦父老約法三章是時沛公猶未王闗中也而輒與其民私約如此殆類於兒曹嘔咆之為者當雌雄未定之時務為寛大長者以媚悦其民孰不能者及項氏既滅天下一家正髙帝創法定令之時也而三章之法不移如山豈兒軰咆嘔之恩姑以媚悦於一時者哉使其仁心仁聞出於至誠憐恤之意雖草莽私約遂以為漢世不刋之典真主一言其利愽哉問髙祖大封同姓卒有尾大不掉之患髙祖明逹何不慮此曰懲戒亡秦孤立之弊故大封同姓聖人謂百世損益可知此類是也周以封建亡故秦必損之秦以不封建亡故漢必益之事勢相因必至於此兼漢初戸口减少封諸王時計地故封三庶孽分天下半其後戸口日蕃所以彊大問漢髙人謂其寛仁長者韓彭英盧曽未免於誅死何耶曰方事之殷能奪諸公死力是髙祖善將將處及事之定置諸公於死即將將之餘習未忘寛仁其天資殘忍是無學問問漢髙祖為義帝發䘮與曹操挾天子以令天下未審如何曰為義帝發䘮因人之短而執之挾天子以令天下負己之有而挾之雖皆詭之為名但一則豪傑起事舉動光明一則奸雄不軌蹤跡暗昧為義帝發䘮無君之罪在項羽挾天子以令諸侯無君之責在曹操魯齋許氏曰髙祖自有取天下才量如推車子須是自推得六七分則人扶領二三分雖陡峻處都行得若全推不得全仰别人平地上也行不得况陡險乎諸功臣但輔翼之也躡足不悟後大害事文帝程子曰漢文帝殺薄昭李徳裕以為殺之不當温公以為殺之當説皆未是據史不見他所以殺之之故須是權事勢輕重論之不知當時薄昭有罪漢使人治之因殺漢使也還是薄昭與漢使飲酒因忿怒而致殺之也漢文帝殺薄昭而太后不安柰何既殺之太后不食而死柰何若漢治其罪而殺漢使太后雖不食不可免也須權他那箇輕那箇重然後論他殺得當與不當也龜山楊氏曰文帝以竇廣國有賢行欲相之恐天下以為私不用用申屠嘉此乃文帝以私意自嫌而不以至公處己也廣國果賢邪雖親不可廢果不賢邪雖踈不可用吾何容心哉當是時承平日乆英才間出擇可用者用之可也必曰髙帝舊臣過矣朱子曰三代以下漢之文帝可謂恭儉之主問文帝好黄老亦不免有慘酷處莫是纔好清浄便至於法度不立必至慘酷而後可以服人曰自清浄至慘酷中間大有曲折却如此説不得惟是自家好清浄便一付之法有犯罪者都不消問自家但看法如何只依法行自家這裏更不與你思量得此所以流而為慘酷或曰黄老之教本不為刑名只要理㑹自己亦不説要慘酷但用之者過耳曰縁黄老之術凡事都先退一着做教人不防他到得逼近利害也便不讓别人寕可我殺了你定不容你殺了我他術多是如此所以文景用之如此文帝猶善用之如南越反則卑辭厚禮以誘之呉王不朝賜以几杖等事這退一着都是術數到他教太子晁錯為家令他謂太子亦好學只欠識術數故以晁錯傅之到後來七國之變弄成一塲紛亂看文景許多慈祥愷悌處都只是術數然景帝用得不好如削之亦反不削亦反問文帝欲短䘮或者要為文帝遮䕶謂非文帝短䘮乃景帝之過曰恐不是恁地文帝當時遺詔教大功十五日小功七日纎三日或人以為當時當服大功者只服十五日當服小功者只服七日當服纎者只三日恐亦不解恁地臣為君服不服則已服之必斬衰三年豈有此等級或者又説古者只是臣為君服三年服如諸侯為天子大夫為諸侯及畿内之民服之於天下吏民無三年服道理必不可行此制必是秦人尊君卑臣却行這三年至文帝反而復之耳南軒張氏曰文帝初政良有可觀蓋制事周密為慮深逺懇惻之意有以得人之心三代而下亦未易多見也文帝以庶子居藩國入踐大綂知己之立為漢社稷非為己也故不敢以為己私有司請建太子則先示愽求賢聖之義而又推之於呉王淮南王有司請王諸子則先推諸兄之無後者而立之其辭氣温潤不迫其義誠足以感人也凡所以施惠於民者類非虚文皆有誠意存乎其間千載之下即事而察之不可掩也史於其編年曰帝既施惠天下諸侯四夷逺近驩洽乃修代來功觀諸此又可見其明先後之宜而不敢私己記史者亦可謂善發明矣其待夷狄蓋亦有道以南越尉佗之強恣自髙帝猶難於服之而帝特施恩惠遣使遺以一書而佗即自去帝制下令國中稱漢皇帝賢天子皇恐報書不敢慢予嘗詳味帝所與書則知忠信之可行於蠻貃也如此書之首辭曰朕髙皇帝側室子也棄外奉北藩于代蓋後世之待夷狄徃徃好為夸辭於是等皆在所蓋覆矯飾以示之者也而帝一以其實告語之彼亦豪傑也見吾推誠如此則又安得不服故其報書首曰老夫故越吏也文帝不以髙帝側室之子為諱則佗敢以越吏為歉哉若吾以驕辭蓋之則彼亦且慢以應我必然矣推此一端忠信可行於蠻貃可不信哉以文帝天資之羙初政小心畏忌之時得道學之臣佐之治功之起豈不可追三代之餘風惜其大臣不過絳灌申屠嘉之徒獨有一賈誼為當時英俊而誼之身蓋自多所可恨而卒亦不見庸也故以帝之賢僅能為一時之小康無以垂法於後世如淮南薄昭之事未免䧟於刑名之家衰世之事至於即位歳乆怠肆亦萌新垣平之邪説故得以入之然終以其天資之髙旋即悟也其終詔有曰惟年之乆長懼于不終蓋可見帝之能察乎此矣嗚呼亦賢矣哉故予猶重惜其諸臣之無以佐下風也或問肉刑始于苖堯因之而不革更虞夏商周而又不革漢文以一女子之言而革之何唐虞三代不知出此也文帝除之而刑亦措何邪潛室陳氏曰先儒謂井田學校封建肉刑四者廢一不可不知秦變古法凡古人教民養民處掃地不存單獨留肉刑以濟其虐雖微文帝必有變之者此蓋損益盈虚理勢必至能通變宜民雖成康復起不能易也問漢文平生所為大抵出於黄老至其得力處亦是黄老不聞有無情少恩之病何邪曰文帝天資粹羙却能轉得黄老不好處作好處景帝天資刻忍却將黄老好處轉作不好處問漢文殺薄昭李徳裕以為殺之不當温公以為殺之當未知孰是曰雖未免少恩然以文帝仁厚之資為之乃是借一人以行法於仁厚中有神武焉問漢文時呉王不朝賜以几杖此與唐之陵夷藩鎮邀節旄者何異不幾於姑息之政歟曰文帝是純任徳教權綱在上伸縮由巳唐一向姑息權柄倒持于下予奪由人兩事不可同日語問晦翁以三代而下皆人欲而非天理且如漢文帝資禀純粹如何斷以人欲曰晦翁此語止謂秦漢而下不曾有徹底理㑹學問人其中好者只是天資粹羙暗合聖賢元不從學問中來文帝是若似此人主更從學問中徹底理㑹便是湯文以上人問天下之患莫大於本小末大周之内輕外重宜若難乆而卒綿逺漢之内重外輕宜若足以相制而猶有七國之禍何邪曰周雖諸侯彊大猶能支吾數百年先史喻為百足蟲所以難死者扶之者多也漢七國之禍亦自外重自此以後日以輕矣景帝五峰胡氏曰漢景以郅都寗成為中尉以嚴酷治宗室貴戚人人惴恐夫親親尊尊之道必選天下有節行賢徳之人為之師傅為之交遊則將有大人君子可為天下用何有憂其犯法耶治百姓亦然修崇學校所以教也刑以助教而已非為治之正法也武帝朱子曰武帝病痛固多然天資髙志向大足以有為使合下便得箇真儒輔佐豈不大有可觀惜乎無真儒輔佐不能勝其多欲之私做從那邊去了欲討匈奴便把吕后嫚書做題目要來揜蓋其失他若知得此豈無修文徳以來道理又如討西域初一畨去不透又再去只是要得一馬此是甚氣力若移來就這邊做豈不可末年海内虚耗去秦始皇無幾若不得霍光收拾成甚麽輪臺之悔亦是天資髙方如此嘗因人言太子仁柔不能用武答以正欲其守成若朕所為是襲亡秦之迹可見他當時已自知其罪向若能以仲舒為相汲黯為御史大夫豈不善南軒張氏曰武帝奢侈窮黷之事與秦皇相去何能尺寸然不至於亂亡者有四事焉髙帝寛大文景惠養其得民也深流澤滲漉未能遽泯非若秦自商鞅以來根本已蹶民獨迫於威而强服耳此一也武帝所為每與六經戾夫豈真能尚儒者然猶表章六經聘召儒生為稽古禮文之事未至蕩然盡棄名教如秦之為此二也輪臺之詔雖云已晩然詳味其辭蓋真知悔者誠意所動固足以回天人之心自詔下之後不復萌前日之為思與民休息矣與卒死於行而不之悟者蓋甚有間秦穆之誓聖人取其悔過列之於書予於輪臺之詔每三復焉蓋以為存亡之幾所係耳此三也惟其能悔過也故自是之後侈欲之機息而清明之慮生是以能審於付託昭帝之初霍光當政述文景之事以培植本根於是興利之源窒而惠澤復流有以祈天永命矣此四也以四者相須而維持是以能保其祚然向使武帝老不知悔死於熾然私欲之中則决不能善處其後雖使頼髙文景之澤以免其身旋即殆矣故予深有取於輪臺之詔以為存亡之幾所係也然其能卒知悔者則以其平日猶知誦習六經之言習儒生之論至於力衰而意怠則善端有時而萌故耳然則其所以不至亂亡者亦豈偶然也哉潛室陳氏曰武帝之伐匈奴也不絶大漠不襲王庭則不足以泄其怒其通西域也不窮河源不歴懸度則不足以快其欲其事土木也不千門萬戸則不息其聚歛也不告緡則不休其深刑也不根株則不已其崇儒也不辟雍則不樂其務農也不代田則不為至其老而悔過不下輪臺之詔則不足蓋天地之間凡可以力致者武帝皆能以力致之而有不容於力致者獨其終身用力於神仙曾不獲如其意蓋嘗凝神於蓬萊蜕形於海上魂交黄帝而夢接安期矣亦嘗父事少君師事文成五利公孫卿而賔齊魯之士矣而卒莫能致也豈其力尚不足耶嗚呼武帝窮奢極欲以從富貴之樂使神仙道家之事為不無蓋非帝之所可冀矧其實無有哉今徒狃於力之所可為而謂神仙可以力致曾不察其理之有無也使天下而有是理則須帝之力而可致如其無是理也則雖帝之力何所用哉觀諸此世之言神仙者亦可以已矣問漢法宰相必出於列侯武帝變而通之是耶非耶曰漢法非軍功不侯非列侯不相儒者既無軍功可論永無入相之路此髙祖馬上之陋規非三代之宏規至武帝元朔中始下詔嘉先聖之道招四方之士遂以御史大夫公孫𢎞代薛澤為丞相封平津侯丞相封侯自𢎞始也其後遂為故事夫武帝崇儒之君子厭文吏武功之不學無識陋國初淺近之規以為儒道不能光顯遂革其故習不吝厚爵重封以激厲儒者則武帝之羙意人亦孰得而非之也然公孫𢎞起自徒歩之中以明春秋一經不四年而超取相位貴至封候則論者不能不於是而有憾焉蓋武帝以利而用儒儒者見利而求用自𢎞以明經而為相後之為儒者孰不欲競章句之末習以僥倖於一遇利禄之門一開而士大夫之心術自兹蠱壊矣况漢家以軍功立國必以列侯為相雖漢之陋規然而非軍功不侯則漢之良法使儒者而不相則已使儒者而可相則自版築而遽登相位乎何慊而猶欲假封侯以為重此又武帝之不善變也故自𢎞之侯平津也而由相封侯者漢史自為恩澤侯自是以恩澤侯者相望於前後使恩澤而可候則無復軍功之足竸矣故自侯法之既壊至元成之間士大夫之氣習豢養於富貴之餘無復剛心鋭氣之可畏而委靡巽懦之風猶婦人女子生長于閨房之中求欲如周昌趙堯申屠嘉張蒼軰愈不可得矣夫相者既非真儒侯者又非軍功是武帝更張之善意不免一舉而兩失蓋自命相之法變而儒者之心術壊自封侯之法變而士大夫之氣習壊更張之善者猶若此更張而不善則柰何此變法之所以難也宣帝豫章羅氏曰漢宣帝詰責杜延年治郡不進乃善識治體者夫治郡不進非人臣之大罪而宣帝必欲詰責之何耶蓋中興之際内之朝廷外之郡縣法度未備政事未修民人未安堵或治郡不進則百職廢矣烏可不責之夫一郡尚爾况天下乎予謂漢宣帝識治勢或問宣帝言漢雜王伯此説也似是朱子曰這箇先須辨别得王伯分明方可去論他是與不是胡叔器云如約法三章為義帝發䘮之類做得也似好曰這箇是他有意無意叔器曰有意曰既是有意便不是王又曰宣帝也不識王伯只是把寛慈底便喚做王嚴酷底便喚做伯南軒張氏曰宣帝謂漢家雜伯固其所趨若此然在漢家論之則蓋亦不易之論也自髙祖取天下固以天下為己利而非若湯武弔民伐罪之心故其即位之後反者數起而莫之禁利之所在固其所趨也至其立國規模大抵皆因秦舊而無復三代封建井田公共天下之心矣其合於王道者如約法三章為義帝發䘮要亦未免有假之之意其誠不孚也則其雜伯固有自來夫王道如精金羙玉豈容雜也雜之則是亦伯而已矣惟文帝天資為近之然其薫習操術亦雜於黄老刑名考其施設動皆有術但其資羙而術髙耳深攷自可見至於宣帝則又伯之下者桓文之罪人也西京之亡自宣帝始蓋文景養民之意至是而盡消靡矣且宣帝豈真知所謂徳教者哉而以為不可用也如元帝之好儒生蓋竊其近似之名委靡柔懦敗壊天下者其何徳教之云夫惟王者之政其心本乎天理建立人紀施於萬事仁立義行而無偏弊不舉之處此古人之所以制治保邦而垂裕乎無疆者後世未嘗真知王道顧曰儒生之説迂闊而難行蓋亦未之思矣或問孝宣綜覈名實而王成以為増戸口褒賞遂起天下俗吏之偽然綜覈者安在潛室陳氏曰刑名術數之家各是執一實以御百虚老蘇所謂人服吾之識其一而不知吾之不識其九也宣帝殆用此術間有受人欺處不害他大體也元帝涑水司馬氏曰甚矣闇君之不可與言也天實剥䘮漢室而昏塞孝元之心使如木石不可得入至於此乎哀哉京房之言如此其深切著明也而曾不能喻何哉詩云匪靣命之言提其耳匪手携之言示之事又云誨爾諄諄聽我藐藐噫後之人可不以孝元為監乎項羽范増附涑水司馬氏曰世皆以項羽不能用韓生之言棄闗中之險故失天下竊謂不然夫秦據函谷東嚮以制天下然孝惠昭襄以之興而二世子嬰以之亡顧所以用之之道何如耳地形不足議也項羽放殺其君不義之名明於日月宰制天下王諸侯廢公義而任私意逐其君以置其臣其受封者爭奪不服踈斥忠良猜忌有功使臣下皆無親附之意推此道以行之雖重金襲湯不能以一日守也况三秦之險哉龜山楊氏曰予讀漢紀至髙祖謂項王有一范增不能用故為我禽常以為信然及讀項羽傳觀范增所以佐羽者然後知羽雖用增無益於敗亡也夫秦人齮齕其民天下背而去之莫肯反顧當是時民之就有道正猶飢者之嗜食不必芻豢稲粱而皆可於口也項籍以閭閻匹夫之資首天下豪傑西向而並爭視秦車之覆曾不知戒猶蹈其故轍欲以力致天下所過燒夷殘滅是以秦攻秦也范增曾無一言及此乃區區欲立楚後為足以懐民望何其謬哉其後項王卒有弑義帝之名為敵國之資增實兆之也增之得計不過數欲害沛公耳使項王不改其轍則前日之亡秦是也借令沛公死天下其無沛公乎或問髙祖言項羽有一范增不能用所以亡夫項羽之失無數初未聞范增之有誎使項羽而終用范增又將如何潛室陳氏曰係興亡處但看人物有無是第一節范增豈三傑比耶但就項羽人物言之有此人耳董公庸齋許氏曰方楚漢爭雄之時能使沛公激發天下之大機括者誰歟三老董公説之以三軍素服共誅楚之弑義帝者順徳逆徳之辭昭然與日月爭光人心稍知義者其從順去逆已於此决擇矣董公之説又豈蕭何文墨議論之比以子房號為帝師籌幄之間亦未見有此大計當時仗義而西天下為之響應者董公力也蕭何龜山楊氏曰髙帝收民於暴秦傷殘之餘而蕭何秉國鈞盡革秦苛法與之更始天下宜之作畫一之歌其法令終漢世守之莫能損益也班固謂為一代宗臣豈虚語哉然髙皇帝既平天下於功臣猶多忌刻何為宰輔至出私財以助軍費買田宅以自汙以是媚上僅能免其甚至於械繫之猶不知引去豈工於為天下而拙於謀身耶蓋不學無聞暗於功成身退之義貪冐榮寵惴惴然如持重寳惟恐一跌然而幾踣者亦屢矣蓋髙帝慢而侮人而輕與人爵邑故不得亷節之士而一時頑鈍嗜利無恥者多歸之以何之賢猶不免是惜夫元城劉氏曰蕭何治未央宫之意深矣髙帝項王皆楚人豐沛臨淮相去至近二人之心豈一日忘山東哉羽見秦地皆已燒殘乃思東歸使其如昔日之盛未必不都闗中也漢五年夏雖自雒陽駕之闗中然長安宫殿未成寄治櫟陽又髙帝之在闗中無幾時矣五年秋親征臧荼復至雒六年十二月取韓信還至雒陽七年冬十月自征韓信又自雒陽至長安時宫闕已成乃自櫟陽徙都長安則髙帝都長安之心方定矣然何欲順適其意以就大事不欲令窺其秘也故假辭云爾此何之深意也而史氏見蕭何之意又不欲明言之又不欲不言之乃書上説兩字以見髙帝在何術中而且樂都闗中也南軒張氏曰蕭何佐髙帝定一代規模亦宏逺矣髙帝征伐多在外何守闗中營緝根本漢所以得天下者以闗中根本先壯故也此何相業之大者又何為相之初首薦韓信為大將而三秦之計遂定此亦得為相用人之體曹參雖不逮何然以摧鋒䧟陣勇敢果鋭之氣而施之治民乃能盡歛芒角以清淨為道遵何約束不務變更其人亦寛裕有識矣此參相業也然二子惜皆未之學以髙帝之資質何不能賛助逺追三代之法創業垂統貽之後嗣一時所定未免多襲秦故如井田封建等事皆不能復古在髙帝之世反者固已數起此在何為可憾也至參但知以清淨不擾為善而不知吕氏之禍已復著見當逆為之處以折其謀惠帝憂不知所出但為滛樂不聽政而曾不能引義以强其君心為可罪也矣東萊吕氏曰蕭何治未央但欲髙帝安於此不欲之他爾要之創業之君自當以儉為先何慮不及此也潛室陳氏曰沛公之入闗也諸將爭走金帛財物之府庫蕭何獨先入收丞相府圖籍藏之以故沛公得知天下阨塞戸口多少强弱之處世常以刀筆吏少何此特書生之論耳何非刀筆吏何以知丞相府之有圖籍耶然刀筆吏多矣而何獨知丞相府之有圖籍則自其為郡縣小吏時固已習於國家之體要若此此其器已不在人下矣况當草莽角逐之時見秦氏府庫宫室之盛雖沛公不能不垂涎者而何之器度越人如此沛公之有愧多矣及項羽王沛公於漢中也沛公意大不滿自絳灌以下莫不勸攻項羽何獨諌曰能屈於一人之下而伸於萬乗之上者湯武是也願大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圖也嗚呼何之器度若此其位當不在人下矣昔者晉重耳之亡也從亡三人者皆相國之器也夫以覉旅䘮亡之餘而其從者皆可以相國君子曰用臣如三人公子何患於䘮乎吁此固沛公所以興也問蕭何未央之營前殿建北闕周匝二十重九十五歩街道周廻七十里臺殿四十三所宫門闥凡九十五壯麗如此宜髙帝之所以怒温公譏其非元城乃以為蕭何堅漢髙都長安之深意當從何説為正曰髙帝都闗中之意猶豫未决蓋嫌殘破故也何大建宫室以轉其機至其自夸壯麗今人皆譏其無識不知何不欲以據形勢定根本正言於髙帝恐費分踈姑假世俗之言以順適其意與買田宅自汚意同韓信龜山楊氏曰韓信以機變之才因思歸之衆以臨江東而燕代趙齊之間無堅城彊敵矣其用竒無窮所向風靡自漢興名將未有倫儗也至其軍脩武也又輔以張耳二人皆勇略蓋世余竊怪漢王自稱漢使晨馳入壁即卧内奪其印符麾召諸將易置之而耳信未之知也此其禁防闊踈與棘門覇上之軍何異耶使敵人投間竊發則二人者可得而虜也豈古所謂有制之兵者信亦有未逮歟或問太史公書項籍垓下之敗實被韓信布得陣好是以一敗而竟斃朱子曰不特此耳自韓信左取燕齊趙魏右取九江英布收大司馬周殷而羽漸困于中而手足日翦則不待垓下之敗而其大勢蓋已不勝漢矣張良程子曰張良亦是箇儒者進退間極有道理人道漢髙祖能用張良却不知是張良能用髙祖良計謀不妄發發必中如後來立太子事皆是能使髙祖必從使之左便左使之右便右豈不是良用髙祖乎或言正叔云人言沛公用張良沛公幾曾用得張良張良用沛公耳良之從沛公以為韓報秦也既滅秦於是置沛公闗中辭歸韓已而見沛公有可以取天下之勢故又從之已取天下便欲棄人間事從赤松子遊良不為髙祖之臣可見矣此論甚好以前無人及此龜山楊氏曰此論亦未盡張良蓋始終為韓者方沛公為漢王之國遣良歸韓良因説沛公燒絶棧道此豈復有事漢之意及良歸至韓聞項羽以良從漢王故不遣韓王成之國與俱東至彭城殺之先是良説項梁以韓諸公子横陽君成可立梁遂使良求韓成立為韓王良為韓司徒良以韓見殺之故於是又間行歸漢其意蓋欲為韓報項羽也至漢髙祖用其謀已破項羽平定天下從髙祖西都闗中於是始道引辟榖有從赤松子之語蓋為韓報仇之心於是方已故也據良當時説髙祖燒絶棧道然後歸韓此亦似有意使韓王成若在良輔之并天下未可知良意以謂可與之爭天下者獨髙祖髙祖既阻蜀不出其他不足慮矣不幸韓王成為項羽所殺故無以自資而卒歸漢也如髙祖亦自用張良不盡良之術亦不止於如此須更有事在其臣髙祖非其心也不得已耳子房起布衣徒歩以三寸舌為帝者師其竒謀秘計轉敗為成出於困急之中者數矣故髙祖稱之配蕭韓為三傑天下既平功髙者徃徃以才見忌疑釁一開雖韓信有解衣推食之誠猶不克終竟以葅醢蕭何雖能以功名自全而見疑亦屢矣是三人者惟子房功成智隠不邇權勢視去權利如脱敝屣雖寄身朝市而翛然如江湖萬里之逺鴻㝠鳳舉矰繳不及方諸范蠡其優矣哉夫漢興將相於去就之際皆中機㑹而不違理義者吾獨於子房得之矣或問養虎自遺患事張良當時若放過恐大事去矣如何朱子曰若只計利害即無事可言者當時若放過未取亦不出三年耳問幾㑹之來間不容髪况沛公素無以繫豪傑之心放過即事未可知曰若要作此事先來便莫與項羽講解既已約和即不可為矣大抵張良多隂謀如入闗中初賂秦將之為賈人者此類甚多問伊川却許以有儒者氣象豈以出處之際可觀耶曰為韓報仇事亦是是為君父報仇三代以下人品皆稱子房孔明子房今日説了脱空明日更無愧色畢竟只是黄老之學及後疑戮功臣時更尋討他不著問子房孔明人品曰子房全是黄老皆自黄石一編中來又問一編非今之三略乎曰又有黄石公素書然大率是這様説話輔廣云觀他慱浪沙中事也甚竒偉曰此又忒煞不黄老為君報仇此是他資質好處後來事業則都是黄老了凡事放退一歩若不得那些清髙之意來縁飾遮蓋則其從衡詭譎殆與陳平軰一律耳問邵子云智哉留侯善藏其用如何曰只燒絶棧道其意自在韓而不在漢及韓滅無所歸乃始歸漢則其事可見矣南軒張氏曰子房蓋有儒者氣象三代之後未易得也五世相韓篤春秋復讎之義始終以之其狙擊嬴政非輕舉也其復讎之心茍得以一擊而遂焉則亦慊矣此其大義根諸心建諸天地而不可泯者也子房之心非以功利也始終為韓而漢之爵禄不足以覉縻之故予以為有儒者之氣象三代之後未易多得此其出處大致也至於從容髙帝之旁其計䇿不汲汲於售而所發動中節㑹使髙帝從之有不庸釋者蓋子房非有求於髙帝故能屈伸在已而動無不得此豈獨可以知計名哉髙帝之英武慢侮士大夫其視隨何酈食其陸賈軰皆撫而忽之至如蕭相國之功一旦下之廷尉亦不顧也獨於子房蓋敬而不敢慢順而不可强則以子房所守在義而不以利故爾嗟乎秦漢以來士賤君肆正以在下者急於爵禄而上之人持此以為真足以驕天下之士故也若子房者其可得而驕之哉雖然以髙帝之英武而能虛己以聽信子房蓋亦可謂明也已矣可謂逺也已矣或問髙帝暮年猜忌功臣張良不能開釋帝意及見諸將沙中偶語乃指示曰此屬相聚謀反毋乃益其猜忌之心而温公反謂因事納忠何也潛室陳氏曰子房言無虚發平生智謀都因事方用所以撥轉主心如轉戸樞問子房之於漢髙言無不盡晩年廢立乃不敢言至四皓之來而後定豈天下既定子房之言不足以動帝之聼耶曰此事子房自度不能得之於口舌之間故於人主機括中撥轉來伊川生平不喜人用智獨喜子房此著具見易傳可玩味自是轉移君心一道理未可以一筆勾斷沛公有三傑故雖遷漢中而卒定三秦項羽無三傑故雖王三將而終不能有三秦嗚呼羽非失險也失人也夫項羽遷沛公於巴蜀而王三降將以拒漢漢勢若己屈矣吁彼豈知巴蜀果非死地也耶羽以巴蜀為死地而謀遷沛公沛公亦以死地視巴蜀而忿嫉項羽當是時也取捨屈伸之理惟蕭何知之故何勸王王漢中收用巴蜀還定三秦及其既就國也項羽肺肝之謀惟張良知之故良説王燒絶棧道以示項羽無東意此蕭何之所以强沛公之行也而張良所以安沛公之心也使巴蜀而果能為死地也則蕭何張良之謀是置沛公於死也蕭何張良可謂見之明計之熟矣至於韓信登壇之日畢陳平生之畫略論楚之所以失及漢之所以得漢一日舉兵而東秦民其為沛公耶為三降將耶此三秦還定之謀所以卒定於韓信之手也噫三傑宜人傑也向也蕭何張良有卓越之見而始勸沛公之入今也韓信乗罅漏之餘而徑勸沛公之出其入也所以養其出也其出也所以用其入也三子之見智謀略同故蹙楚之效同熟謂闗中非沛公囊中物耶善乎史臣之論髙祖曰從諫如轉圜也夫天下之勢成敗未易料也見近者昧其勢而慮逺者審其勢蓋勢者成敗之所係也一舉措之不謹則俄頃之間大事去矣方羽之王三降將於三秦而王髙祖於漢中也髙祖蓋不勝其忿而欲奮於一擊之間周勃等又從而協賛之當是時髙帝死固未可定而何以成敗為也及蕭相國進諫而髙祖翻然改悟罷兵就國徐起而還定之如取諸寄此豈有他術也知成敗之勢在己而已己能屈之亦能伸之是以髙帝之還定三秦也不在於引兵故道之時而在於不攻項羽之日不在於拜將之後而在於聽諫之初彭越龜山楊氏曰天下之禍莫大乎不明分分之不明由較材程力之過也予觀韓彭之亡皆以此歟蓋西漢之初髙皇帝以匹夫起阡陌之中一時名將非屠販亡命輕猾之徒則里巷齠齓布衣之交也其平居握手素非有君臣等威也論其材力亦豈足相過哉天下未平而大者已王小者已候皆連城數郡一揺足則秦項之爭復搆矣漢方收民於百戰凋瘵之餘而臨諸候王之上凛乎其猶蹈春氷而常恐其潰也故疑隙一開則葅醢隨之矣嗚呼是豈知先王所以維持天下者哉雖朝委裘植遺腹而不亂者亦有名義以正其分耳故君君臣臣而天下治如將較材程力以彊弱勝負為君臣則天下之禍何時已哉漢之君臣不知出此卒至相夷而不悟悲夫或問司馬温公言漢之所以得天下者大抵皆韓信之功則知彭越又其次耶今考其本末二子各有所長其功一也故張漢家之勢者信之功多於越破魏取代仆趙脅燕擊齊滅楚是也困項氏之勢者越之功多於信焚楚積聚而項氏敗擾梁地而項氏急是也未審如何潛室陳氏曰彭越人物功勲皆非信比但其常以㳺兵出入梁楚間為項氏腹心之疾所以有功於漢曹參程子曰曹參去齊以獄市為託後之為政者留意於獄者則有之矣未聞有治市者龜山楊氏曰曹參從髙帝起豐沛間與之並馳者皆一時熊羆之士而䧟敵攻堅必以參為首宜其勇悍彊鷙果於繫斷天下已定參為齊相乃退然不自用盡召長老諸先生問所以安集百姓者既得蓋公避正堂舎之尊用其言而齊大治其後為漢相亦以治齊者治天下故其効如之觀參所為其始以戰闘為功而終則以清淨無為自守何其不相侔也非其資務學樂用人言而勇於自克其何能爾若參者可不謂賢矣夫初參與蕭何有隙何且死所推賢唯參參代何為相國舉事無所變更一遵用何法二人者茍無體國之誠心忘一己之私忿則排䧟紛更將無所不至推之以為賢守之而勿失尚何有哉其卒為一代宗臣蓋有以也後世如曹參可謂能克己者觀參本武人攻堅䧟敵是其所長至其治國為天下乃以清淨無為為事氣質都變了婁敬龜山楊氏曰婁敬建和親之䇿欲以適長公主妻單于以謂冐頓在固為子壻子壻死外孫為單于豈聞孫敢與大父亢禮哉可毋戰以漸臣也其説何謬哉且子壻之與外孫孰與父子親也彼且殺父以代立况妻之父乎其何足恃哉然屬人主厭兵故以一言之謬而遂成千載之患惜夫周勃程子曰周勃入北軍問曰為劉氏左袒為吕氏右袒既知為劉氏又何必問若不知而問設或右袒當如之何已為將乃問士卒豈不謬哉當誅諸吕時非陳平為之謀亦不克成及迎文帝至覇橋曰願請間此豈請間時耶至於罷相就國每河東守行縣至絳必令家人被甲執兵而見此欲何為可謂至無能之人矣或問周勃雖則重厚少文可屬大事然其畏誅令家人持兵自衛似未得人臣事君之義而班固以為漢伊周何耶潛室陳氏曰周勃處事煞有周章處如既入軍復問左右袒迎文帝至渭橋却欲入私謁皆非召之不來麾之不去舉動安劉事特幸成耳性理大全書卷六十
